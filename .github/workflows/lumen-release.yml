# Build `lumen` binaries for all supported targets.
#
# Triggers:
#   - push of a tag matching `lumen@*`  → build + attach to GitHub release
#                                         (e.g. lumen@1.0, lumen@1.2.3)
#   - workflow_dispatch                 → build artifacts only (manual smoke)
#
# Targets (macOS Intel intentionally dropped — Apple Silicon only):
#   - aarch64-apple-darwin      (Apple Silicon,      macos-14 native)
#   - x86_64-unknown-linux-gnu  (most Linux servers, ubuntu-latest native)
#   - aarch64-unknown-linux-gnu (Linux on ARM,       ubuntu-latest cross)
#
# lumen's serving binary speaks REST/OpenAPI and uses rustls-backed HTTP clients
# for raft/CLI online paths, so there is no openssl in the build graph — the
# aarch64 Linux cross leg needs only the gcc cross-linker, same as cap/vat/meter.
name: lumen-release

on:
  push:
    tags:
      - "lumen@*"
  workflow_dispatch:

permissions:
  contents: write  # needed to create / upload release assets

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation toolchain (Linux aarch64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lumen-${{ matrix.target }}

      - name: Build lumen binary
        # --bin lumen: only the serving binary (skip lumen-consumer / -bench /
        # -openapi-dump; lumen-operator is feature-gated off by default anyway).
        run: cargo build --release --locked -p lumen --bin lumen --features "otel operator raft-wal self-update issue" --target ${{ matrix.target }}

      - name: Package artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          name="lumen-${{ matrix.target }}"
          # Build inside a `pkg/` staging dir, then tar with -C so the
          # archive layout is `lumen-<target>/{lumen,README.md}` — matches
          # what install.sh expects on extract.
          stage="pkg/${name}"
          mkdir -p "${stage}"
          cp "target/${{ matrix.target }}/release/lumen" "${stage}/lumen"
          cp projects/lumen/README.md "${stage}/README.md"
          # Emit the tarball + sha256 into `out/` (workspace root) so
          # upload-artifact's preserved `out/` prefix is shallow and
          # the release glob below is predictable.
          mkdir -p out
          tarball="out/${name}.tar.gz"
          tar -C pkg -czf "${tarball}" "${name}"
          if command -v shasum >/dev/null; then
            shasum -a 256 "${tarball}" | awk '{print $1}' > "${tarball}.sha256"
          else
            sha256sum "${tarball}" | awk '{print $1}' > "${tarball}.sha256"
          fi
          echo "tarball=${tarball}" >> "${GITHUB_OUTPUT}"
          echo "sha=${tarball}.sha256" >> "${GITHUB_OUTPUT}"

      - uses: actions/upload-artifact@v4
        with:
          name: lumen-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.sha }}
          if-no-files-found: error
          overwrite: true

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/lumen@')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # upload-artifact@v4 preserves the source path (`out/...`) inside
      # the artifact, so after merge-multiple the layout is
      # `dist/out/lumen-*.tar.gz`. Glob with `**` so the release picks
      # them up regardless of nesting depth.
      - name: List artifacts (debug)
        run: find dist -type f -maxdepth 4 -print

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/lumen-*.tar.gz
            dist/**/lumen-*.tar.gz.sha256
          generate_release_notes: true
          body: |
            `lumen` release built from tag ${{ github.ref_name }}.

            ## Install

            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/projects/lumen/install.sh | sh
            ```

            Or pick a target tarball below and extract it manually.
            macOS is Apple Silicon only; for Linux choose x86_64 or aarch64.
