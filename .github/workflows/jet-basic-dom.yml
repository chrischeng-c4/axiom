name: jet-basic-dom

# Manual-only: this replacement gate compares Jet against local package-manager,
# browser, and DOM build baselines, and should be controlled deliberately rather
# than used as a repo-wide PR/push gate for shared workspace changes.
on:
  workflow_dispatch:

jobs:
  package-management:
    name: 1 package management replacement
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: jet-basic-dom-package

      - name: Build release jet
        run: cargo build -p jet --release --locked

      - name: Run package manager unit gate
        run: cargo test -p jet --lib pkg_manager -- --nocapture

      - name: Run package management replacement gate
        run: |
          node projects/jet/scripts/compare-pkg-management.mjs \
            --jet-bin target/release/jet \
            --evidence /tmp/jet-basic-dom-gate/pkg-management-compare.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jet-basic-dom-package-evidence
          path: /tmp/jet-basic-dom-gate/pkg-management-compare.json
          if-no-files-found: ignore

  browser-bridge:
    name: 2 browser bridge replacement
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: package-management
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: jet-basic-dom-browser

      - name: Build release jet
        run: cargo build -p jet --release --locked

      - name: Run browser unit gate
        run: cargo test -p jet --lib browser -- --nocapture

      - name: Run Browser Bridge replacement gate
        run: |
          node projects/jet/scripts/verify-browser-bridge-replacement.mjs \
            --jet-bin target/release/jet \
            --evidence /tmp/jet-basic-dom-gate/browser-bridge-replacement.json \
            --baseline-tools playwright \
            --require-baselines

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jet-basic-dom-browser-evidence
          path: /tmp/jet-basic-dom-gate/browser-bridge-replacement.json
          if-no-files-found: ignore

  dom-production-build:
    name: 3 DOM production build comparison
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: browser-bridge
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: jet-basic-dom-build

      - name: Build release jet
        run: cargo build -p jet --release --locked

      - name: Hydrate DOM production fixtures with Jet
        run: |
          JET_BIN="$PWD/target/release/jet"
          for fixture in \
            projects/jet/tests/fixtures/dom-production-build/react-bench \
            projects/jet/tests/fixtures/dom-production-build/mui-visual \
            projects/jet/tests/fixtures/dom-production-build/antd-visual \
            projects/jet/tests/fixtures/dom-production-build/tailwind-visual \
            projects/jet/tests/fixtures/dom-production-build/styled-components-visual
          do
            (cd "$fixture" && "$JET_BIN" install --frozen-lockfile)
          done

      - name: Run production bundler unit gates
        run: |
          cargo test -p jet --lib bundler -- --nocapture
          cargo test -p jet --lib transform -- --nocapture
          cargo test -p jet --lib asset -- --nocapture

      - name: Run DOM production corpus gate
        run: |
          node projects/jet/scripts/compare-dom-build-corpus.mjs \
            --jet-bin target/release/jet \
            --runtime-smoke required \
            --build-samples 3 \
            --out-dir /tmp/jet-basic-dom-gate \
            --evidence /tmp/jet-basic-dom-gate/basic-build-corpus.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jet-basic-dom-build-evidence
          path: /tmp/jet-basic-dom-gate/basic-build-corpus.json
          if-no-files-found: ignore
