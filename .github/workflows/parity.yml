# Jet parity CI gate — issue #2144.
#
# Today this workflow runs against an empty results dir, so the gate
# returns 77 (skipped) and CI stays green. Once the oracle (#2139) is
# wired into CI it will emit `*.channel-result.json` files into
# `/tmp/parity-results` (or similar) and this workflow will start
# enforcing the soft-gate (exit 2) — or the hard-gate (exit 1) once
# `blocking = true` is flipped in `projects/jet/parity/parity-gating.toml`.
name: parity
on:
  pull_request:
    paths:
      - "projects/jet/**"
      - "projects/jet-parity-**/**"
      - "projects/jet/parity-gate/**"
      - ".github/workflows/parity.yml"
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run parity gate
        run: |
          set +e
          cargo run -p jet-parity-gate -- gate --results-dir /tmp/no-results
          ec=$?
          if [ "$ec" = "77" ]; then
            echo "parity gate skipped (no results yet — oracle not wired into CI)"
            exit 0
          fi
          exit $ec
