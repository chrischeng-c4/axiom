<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Example — Spreadsheet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .toolbar {
      display: flex; align-items: center; padding: 8px 12px;
      background: #f5f5f5; border-bottom: 1px solid #ddd; gap: 8px;
    }
    .toolbar button {
      padding: 4px 12px; cursor: pointer; border: 1px solid #ccc;
      background: #fff; border-radius: 4px; font-size: 13px;
    }
    .toolbar button:hover { background: #e8e8e8; }
    .formula-bar {
      display: flex; align-items: center; padding: 4px 12px;
      background: #fff; border-bottom: 1px solid #ddd; gap: 8px;
    }
    #cell-address {
      min-width: 60px; padding: 4px 8px; background: #f0f0f0;
      border: 1px solid #ccc; font-family: monospace; font-size: 13px;
    }
    #formula-input {
      flex: 1; padding: 4px 8px; border: 1px solid #ccc;
      font-family: monospace; font-size: 13px;
    }
    #spreadsheet-container { flex: 1; position: relative; overflow: hidden; }
    #spreadsheet-canvas { display: block; }
    #sheet-tabs {
      display: flex; align-items: center; padding: 4px 8px;
      background: #e8e8e8; border-top: 1px solid #ddd; gap: 4px;
    }
    .sheet-tab {
      padding: 4px 12px; background: #fff; border: 1px solid #ccc;
      cursor: pointer; font-size: 12px; border-radius: 3px 3px 0 0;
    }
    .sheet-tab.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
    #add-sheet-btn { padding: 4px 8px; cursor: pointer; }
    .status-bar {
      padding: 4px 12px; background: #f5f5f5; border-top: 1px solid #ddd;
      font-size: 12px; color: #666;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <button id="undo-btn">Undo</button>
      <button id="redo-btn">Redo</button>
      <span style="width:1px;height:20px;background:#ccc"></span>
      <button id="bold-btn"><b>B</b></button>
      <button id="italic-btn"><i>I</i></button>
      <span style="width:1px;height:20px;background:#ccc"></span>
      <button id="insert-row-btn">+ Row</button>
      <button id="insert-col-btn">+ Col</button>
      <button id="export-btn">Export CSV</button>
    </div>
    <div class="formula-bar">
      <span id="cell-address">A1</span>
      <input type="text" id="formula-input" placeholder="Enter value or formula...">
    </div>
    <div id="spreadsheet-container">
      <canvas id="spreadsheet-canvas"></canvas>
    </div>
    <div id="sheet-tabs">
      <div class="sheet-tab active" data-index="0">Sheet1</div>
      <button id="add-sheet-btn">+</button>
    </div>
    <div class="status-bar">
      <span id="status-text">Ready</span>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
