# jet.toml — counter-demo
#
# Minimum config. Feeding this app through `jet build --wasm` should
# produce dist/app.wasm + dist/app.js + dist/boot.js + dist/index.html
# that renders a clickable counter on a canvas.

[wasm]
# Entry component — the TSX file that defines the root component.
entry = "src/Counter.tsx"
# The function name to mount as the root. Must match an exported
# function component in the entry file.
root_component = "Counter"
# Props passed to the root component factory. Matched positionally
# against the TS interface.
root_props = [0]
