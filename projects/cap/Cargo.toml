[package]
name = "cap"
version = "0.3.61"
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "cap — local resource-protection daemon + CLI wrapper for heavy commands (cargo test, uv run, ...)"

[features]
default = ["release"]
release = ["cli-std/online"]

[lib]
name = "cap"
path = "src/lib.rs"

[[bin]]
name = "cap-full"
path = "src/full_main.rs"

[dependencies]
clap = { version = "4", features = ["derive", "color"] }
tokio = { workspace = true, features = ["full"] }
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
dirs = "5"
libc = "0.2"
toml = "0.8"
chrono.workspace = true
sysinfo = { version = "0.32", default-features = false, features = ["system"] }
cli-std = { path = "../../libs/cli-std", default-features = false }

[dev-dependencies]
tempfile = "3"
# `test-util` enables `tokio::time::pause`, `tokio::time::advance`, and
# the `start_paused` attribute used by Slice 4 grace-period tests.
tokio = { workspace = true, features = ["full", "test-util"] }

[[bench]]
name = "command_resources"
harness = false
