[package]
name = "guard-cli"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "CLI surface for guard — JSON-on-stdout security posture reports"

[lib]
name = "guard_cli"
path = "src/lib.rs"

[[bin]]
name = "guard"
path = "src/bin/guard.rs"

[dependencies]
guard = { path = ".." }
cclab-cli-registry = { path = "../../../crates/cclab-cli-registry" }
clap = { workspace = true, features = ["derive"] }
linkme.workspace = true
serde_json.workspace = true
anyhow.workspace = true
