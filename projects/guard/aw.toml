[project]
name = "guard"
cap_path = "README.md"
label = "project:guard"

[ec.security]
tool = "guard"
dir = "projects/guard"
command = 'target/debug/guard scan projects/guard --profile security-lint --compact --no-persist --vat-runner guard-security-smoke --rig-scenario projects/guard/tests/rig/scenarios/security/guard_self_scan.toml --meter-target projects/guard'

[[workspaces]]
name = "guard"
paths = ["**"]
target = "rust"
test_cmd = 'CC=/usr/bin/cc PATH="$HOME/.rustup/toolchains/stable-aarch64-apple-darwin/bin:/usr/bin:/bin:/usr/sbin:/sbin:$HOME/.cargo/bin" cargo test -p guard -p guard-cli'
codegen.profile = "rust/score-crate"
