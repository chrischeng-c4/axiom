version = 1
name = "guard-security"
default_runner = "guard-security-smoke"

[workspace]
base = "."
workdir = "."
keep = "always"

[env]
PATH = "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

[[runners]]
id = "guard-security-smoke"
cmd = [
  "sh",
  "-c",
  'exec "$VAT_CONFIG_ROOT/../../target/debug/rig" run --scenario tests/rig/scenarios/security/guard_self_scan.toml --compact',
]
timeout_s = 120
