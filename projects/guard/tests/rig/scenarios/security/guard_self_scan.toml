[record]
suite = "guard"
dimension = "security"
case = "guard_self_scan"
subject = "guard security-lint self scan stays clean"
kind = "e2e"
expected = "pass"
required = true

[limits]
timeout_secs = 120

[[steps]]
type = "exec"
name = "security_lint_scan"
cmd = [
  "sh",
  "-c",
  '''
if [ -n "$VAT_CONFIG_ROOT" ]; then
  exec "$VAT_CONFIG_ROOT/../../target/debug/guard" scan . --profile security-lint --compact --no-persist
else
  exec target/debug/guard scan projects/guard --profile security-lint --compact --no-persist
fi
''',
]
timeout_secs = 60
expect_exit_code = 0
