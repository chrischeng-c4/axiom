[package]
name = "jet-manifest-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "CLI subcommand `cclab parse-manifest` — loads jet.declare.d.ts files and prints the merged ParsedManifest as YAML, per binding-manifest.md"

[lib]
name = "jet_manifest_cli"
path = "src/lib.rs"

[dependencies]
cclab-cli-registry = { path = "../../../../crates/cclab-cli-registry" }
jet-wasm = { path = "../../wasm", default-features = false }
linkme.workspace = true
clap = { version = "4", features = ["derive", "color"] }
anyhow = { workspace = true }

[dev-dependencies]
tempfile = "3"
