[package]
name = "jet-conformance-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "CLI subcommand `cclab check-conformance-manifest` — validates conformance.yaml structure and verifies demo_dir / test_file path existence per the React-compat subset rigor spec"

[lib]
name = "jet_conformance_cli"
path = "src/lib.rs"

[dependencies]
cclab-cli-registry = { path = "../../../../crates/cclab-cli-registry" }
linkme.workspace = true
clap = { version = "4", features = ["derive", "color"] }
anyhow = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_yaml = { workspace = true }

[dev-dependencies]
tempfile = "3"
