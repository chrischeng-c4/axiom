# Widget → ARIA mapping (issue #2158, ADR-005).
# Consumed by the SemanticsEmitter implementation, the axe-core
# gate (#2159), the AX-tree diff (#2160), live-regions (#2161),
# and the accname computation (#2163).
#
# Conventions:
#   * `required_states` entries with a trailing "?" denote
#     conditional/optional states that MUST be emitted when the
#     underlying widget property is set, and MAY be omitted when
#     the default value is in effect.
#   * `apg_pattern` references the W3C ARIA Authoring Practices
#     Guide (APG) pattern slug. empty string ("") means no APG-defined
#     pattern applies (typically because the widget maps to a
#     plain landmark/role).
#   * `children` declares the composite-fragment shape. Each
#     child entry is a proxy node emitted underneath the parent
#     proxy. `repeat` is one of "once", "per-item", "per-mark",
#     or "per-step".

schema_version = 1
source         = "MUI per-component a11y notes + ARIA APG (2026-05)"

# -----------------------------------------------------------------
# Inputs / actions
# -----------------------------------------------------------------

[[widget]]
name            = "Button"
role            = "button"
required_states = ["disabled?", "aria-pressed?", "aria-expanded?"]
apg_pattern     = "button"

[[widget]]
name            = "IconButton"
role            = "button"
required_states = ["disabled?", "aria-label", "aria-pressed?"]
apg_pattern     = "button"

[[widget]]
name            = "ToggleButton"
role            = "button"
required_states = ["aria-pressed", "disabled?"]
apg_pattern     = "button"

[[widget]]
name            = "ToggleButtonGroup"
role            = "group"
required_states = ["aria-label", "aria-orientation?"]
apg_pattern     = "toolbar"
children = [
  { role = "button", purpose = "toggle-option", repeat = "per-item" },
]

[[widget]]
name            = "TextField"
role            = "textbox"
required_states = ["aria-label|aria-labelledby", "aria-required?", "aria-invalid?", "aria-describedby?", "disabled?", "readonly?", "aria-multiline?"]
apg_pattern     = "textbox"

[[widget]]
name            = "Checkbox"
role            = "checkbox"
required_states = ["aria-checked", "disabled?", "aria-required?", "aria-invalid?"]
apg_pattern     = "checkbox-mixed-checked"

[[widget]]
name            = "Radio"
role            = "radio"
required_states = ["aria-checked", "disabled?"]
apg_pattern     = "radio"

[[widget]]
name            = "RadioGroup"
role            = "radiogroup"
required_states = ["aria-label|aria-labelledby", "aria-orientation?", "aria-required?", "aria-invalid?"]
apg_pattern     = "radio"
children = [
  { role = "radio", purpose = "option", repeat = "per-item" },
]

[[widget]]
name            = "Switch"
role            = "switch"
required_states = ["aria-checked", "disabled?", "aria-label|aria-labelledby"]
apg_pattern     = "switch"

[[widget]]
name            = "Slider"
role            = "slider"
required_states = ["aria-valuemin", "aria-valuemax", "aria-valuenow", "aria-valuetext?", "aria-orientation?", "disabled?", "aria-label|aria-labelledby"]
apg_pattern     = "slider"
children = [
  { role = "presentation", purpose = "tick-mark", repeat = "per-mark" },
]

[[widget]]
name            = "Select"
role            = "combobox"
required_states = ["aria-expanded", "aria-controls", "aria-haspopup", "aria-label|aria-labelledby", "disabled?", "aria-required?", "aria-invalid?", "aria-activedescendant?"]
apg_pattern     = "combobox-select-only"
children = [
  { role = "listbox", purpose = "popup", repeat = "once" },
]

[[widget]]
name            = "Menu"
role            = "menu"
required_states = ["aria-labelledby", "aria-orientation?", "aria-activedescendant?"]
apg_pattern     = "menubar"
children = [
  { role = "menuitem", purpose = "command", repeat = "per-item" },
]

[[widget]]
name            = "MenuItem"
role            = "menuitem"
required_states = ["disabled?", "aria-haspopup?", "aria-expanded?"]
apg_pattern     = "menubar"

[[widget]]
name            = "Tooltip"
role            = "tooltip"
required_states = ["id"]
apg_pattern     = "tooltip"

[[widget]]
name            = "Dialog"
role            = "dialog"
required_states = ["aria-modal", "aria-label|aria-labelledby", "aria-describedby?"]
apg_pattern     = "dialog-modal"

[[widget]]
name            = "Drawer"
role            = "dialog"
required_states = ["aria-modal", "aria-label|aria-labelledby"]
apg_pattern     = "dialog-modal"

[[widget]]
name            = "Modal"
role            = "dialog"
required_states = ["aria-modal", "aria-label|aria-labelledby"]
apg_pattern     = "dialog-modal"

[[widget]]
name            = "Tabs"
role            = "tablist"
required_states = ["aria-label|aria-labelledby", "aria-orientation?"]
apg_pattern     = "tabs"
children = [
  { role = "tab",     purpose = "tab-header", repeat = "per-item" },
  { role = "tabpanel", purpose = "tab-content", repeat = "per-item" },
]

[[widget]]
name            = "Tab"
role            = "tab"
required_states = ["aria-selected", "aria-controls", "disabled?", "tabindex"]
apg_pattern     = "tabs"

[[widget]]
name            = "Snackbar"
role            = "status"
required_states = ["aria-live", "aria-atomic?"]
apg_pattern     = "alert"

[[widget]]
name            = "Alert"
role            = "alert"
required_states = ["aria-live?", "aria-atomic?"]
apg_pattern     = "alert"

[[widget]]
name            = "Autocomplete"
role            = "combobox"
required_states = ["aria-expanded", "aria-controls", "aria-haspopup", "aria-autocomplete", "aria-activedescendant?", "aria-label|aria-labelledby", "disabled?"]
apg_pattern     = "combobox-autocomplete-list"
children = [
  { role = "listbox", purpose = "suggestions", repeat = "once" },
  { role = "option",  purpose = "suggestion",  repeat = "per-item" },
]

[[widget]]
name            = "DataGrid"
role            = "grid"
required_states = ["aria-rowcount", "aria-colcount", "aria-multiselectable?", "aria-readonly?"]
apg_pattern     = "grid"
children = [
  { role = "row",         purpose = "data-row",  repeat = "per-item" },
  { role = "columnheader", purpose = "col-head", repeat = "per-item" },
  { role = "gridcell",    purpose = "cell",      repeat = "per-item" },
]

[[widget]]
name            = "DatePicker"
role            = "group"
required_states = ["aria-label|aria-labelledby", "aria-haspopup", "aria-expanded?"]
apg_pattern     = "dialog-modal"
children = [
  { role = "textbox", purpose = "date-input", repeat = "once" },
  { role = "button",  purpose = "open-popup", repeat = "once" },
  { role = "dialog",  purpose = "calendar",   repeat = "once" },
]

[[widget]]
name            = "Stepper"
role            = "list"
required_states = ["aria-label|aria-labelledby", "aria-orientation?"]
apg_pattern     = ""
children = [
  { role = "listitem", purpose = "step",        repeat = "per-step" },
  { role = "button",   purpose = "step-button", repeat = "per-step" },
]

[[widget]]
name            = "Pagination"
role            = "navigation"
required_states = ["aria-label"]
apg_pattern     = ""
children = [
  { role = "button", purpose = "page-button", repeat = "per-item" },
]

[[widget]]
name            = "Accordion"
role            = "region"
required_states = ["aria-labelledby"]
apg_pattern     = "accordion"
children = [
  { role = "button", purpose = "summary-toggle", repeat = "once" },
  { role = "region", purpose = "panel",          repeat = "once" },
]

[[widget]]
name            = "Avatar"
role            = "img"
required_states = ["aria-label|alt"]
apg_pattern     = ""

[[widget]]
name            = "Chip"
role            = "button"
required_states = ["disabled?", "aria-label?", "aria-pressed?"]
apg_pattern     = "button"

[[widget]]
name            = "Badge"
role            = "status"
required_states = ["aria-label", "aria-live?"]
apg_pattern     = ""

[[widget]]
name            = "Card"
role            = "region"
required_states = ["aria-labelledby?", "aria-label?"]
apg_pattern     = ""
