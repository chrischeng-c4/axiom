# WPT subset gated by jet's focus parity (issue #2153).
# Source: web-platform-tests / wpt repository.
# Gated path prefix: `html/interaction/focus/sequential-focus-navigation`

schema_version = 1
source_repo    = "web-platform-tests/wpt"
source_rev     = "pinned-by-vendor-subset-issue-2142"

[[suites]]
id   = "sequential-focus-navigation"
path = "html/interaction/focus/sequential-focus-navigation"
# Whitelist of test files we promise jet honours. Files outside this
# list are tracked under #2142 (full WPT subset) but not blocking for
# #2153.
tests = [
  "sequential-focus-navigation.html",
  "sequential-focus-navigation-iframe.html",
  "sequential-focus-navigation-rtl.html",
  "tabindex-negative-not-in-sequence.html",
  "tabindex-positive-order.html",
]

[ordering]
default       = "semantic-tree"        # ADR-003 default
override_attr = "tab_order_override"   # per-subtree opt-in
override_values = ["paint", "manual"]

[gating]
blocking = false                       # v1 ships soft-gate
allow_waivers = true
