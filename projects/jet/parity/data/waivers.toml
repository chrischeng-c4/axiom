# projects/jet/parity/data/waivers.toml
#
# Time-boxed exceptions to the parity gate.
#
# Each row temporarily silences a single (fixture_id, channel) Fail.
# Waivers auto-expire on their `expires_on` date (inclusive). After
# expiry the row is ignored and the underlying Fail surfaces again —
# the file is intentionally NOT auto-purged so the audit trail stays
# intact.
#
# Row schema:
#
# [[waivers]]
# fixture_id  = "mui-button-default"        # matches ChannelResult.fixture_id
# channel     = "pixel"                       # one of the five channels
# expires_on  = "2026-06-01"                  # YYYY-MM-DD, inclusive
# reason      = "anti-aliasing drift; #2199" # free-form, link the tracker
#
# No waivers in v1 — corpus is still being baselined.
