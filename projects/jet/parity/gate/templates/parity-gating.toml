# projects/jet/parity/data/parity-gating.toml
#
# Single source of truth for the jet parity CI gate.
#
# Issue: chrischeng-c4/cclab#2144
# Epic:  #2133 (jet parity foundation)
#
# Channels — the five canonical parity oracle channels (see #2139 / R1).
# Tolerances — per-channel thresholds for "close enough" (#2139 / R6).
# Adapter — which adapter id the gate is comparing against (#2138).
#
# The gate CLI lives at `jet-parity-gate` and exposes:
#
#     cargo run -p jet-parity-gate -- gate \
#         --manifest projects/jet/parity/data/parity-gating.toml \
#         --results-dir <oracle-out>/results \
#         --waivers   projects/jet/parity/data/waivers.toml
#
# Exit codes (R3):
#   0   — all pass (or every fail is covered by an unexpired waiver)
#   1   — blocking fail (blocking = true AND at least one Fail row)
#   2   — soft fail   (blocking = false AND at least one Fail row)
#   77  — skipped     (no *.channel-result.json files found)

channels = [
    "pixel",
    "ax-tree",
    "focus-order",
    "pointer-hit-map",
    "ime-trace",
]

# v1 ships SOFT-GATE. CI surfaces failures (exit code 2) but does not
# block the PR. Flip to `true` once the oracle is producing stable
# results AND the corpus baseline is curated.
blocking      = false
allow_waivers = true

[tolerance]
# Max per-pixel L2 delta in 0..=255 8-bit space. The oracle's pixel
# channel produces an integer summary; rows with diff_value > pixel_delta
# are Fail.
pixel_delta       = 8
# Max fraction of a11y tree nodes that may differ (0.0..=1.0).
a11y_diff_ratio   = 0.05

[adapter]
# Adapter under test. The gate compares the adapter's channel-results
# against the oracle's golden runs. Only one adapter at a time —
# multi-adapter rollouts get one manifest per adapter.
id = "mui-react-dom"
