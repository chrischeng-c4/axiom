[package]
name = "jet-wasm"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Framework-agnostic browser-runtime substrate: Element tree + WebGPU paint planning + event + (future) a11y / text. Framework-specific runtimes (React hooks, Vue reactivity, Angular signals) plug in via feature-gated modules."
publish = false

[lib]
# rlib for cargo test; cdylib for wasm-pack build.
crate-type = ["cdylib", "rlib"]

[features]
default = ["react"]
# Enables the React-specific runtime: fiber, hooks (useState,
# useEffect, useMemo, useCallback, useRef, useReducer), mount +
# flush loop. Target of jet's TSX → Rust transpiler emit.
react = []
# Thin browser host bridge for capabilities WASM cannot call
# directly: fetch, console, localStorage. App/domain/render logic
# stays in Rust/WASM; this feature only exposes imports from
# dist/jet-host.js.
host-bridge = [
  "dep:wasm-bindgen",
  "dep:wasm-bindgen-futures",
  "dep:js-sys",
  "dep:web-sys",
]
# DOM + a live event loop (Element tree -> DOM nodes, click/change
# callbacks -> flush -> rerender). This is the compatibility target
# for form-control and browser-native DOM parity gates.
dom-app = ["react", "host-bridge"]
# Enables the WebGPU paint-planning backend. The backend shares the
# workspace grid WebGPU cell-rect contract without inventing a second
# GPU primitive layout.
webgpu = ["dep:cclab-grid-render-webgpu"]
# WebGPU + a live browser event loop. This reuses the existing
# cclab-grid-wasm RendererHandle instead of duplicating adapter /
# surface ownership in Jet.
webgpu-app = [
  "webgpu",
  "react",
  "host-bridge",
  "dep:cclab-grid-wasm",
  "dep:wasm-bindgen",
  "dep:wasm-bindgen-futures",
  "dep:js-sys",
  "dep:web-sys",
]
# Debug introspection: JetDebug struct + window.__jet_debug bridge +
# serde derives on renderer types. The live app feature (`webgpu-app` for
# `jet build --wasm`) supplies MountHandle + LayoutTree; debug itself only
# supplies the JS-readable inspection model. Only turned on by
# `jet build --wasm --debug` and friends — release builds are unaffected.
debug = [
  "dep:wasm-bindgen",
  "dep:serde",
  "dep:serde_json",
  "dep:serde-wasm-bindgen",
  "dep:js-sys",
]
# Placeholder slots for future framework adapters:
# vue = []
# angular = []
# solid = []

[dependencies]
# Intentionally minimal. Generic runtime primitives (GC, closure,
# async executor) arrive via `cclab-lang-runtime` (pending mamba
# extraction) or jet-local reimpls. Browser APIs are pulled in only
# by host-bridge/debug/webgpu-app features so the pure-Rust test path
# needs no wasm target.
# taffy: pure-Rust flexbox/block layout engine — see
# .aw/tech-design/projects/jet/wasm-renderer/layout-runtime.md.
# Pinned to the Dioxus stable series; pure-Rust, no_std-compatible,
# no web-sys requirement.
taffy = "0.5"
# rustybuzz: pure-Rust HarfBuzz port for text shaping. Pinned to 0.20
# series for ShapeCache stability across jet-wasm versions (font_id
# is hashed from font bytes, but shaping output across major rustybuzz
# versions could shift glyph IDs). See text-shaping.md.
rustybuzz = "0.20"
ttf-parser = "0.25"
# xxh3_64 hasher used by FontFace::from_bytes to derive font_id. The
# algorithm is pinned permanently — changing it would silently
# invalidate ShapeCache keys. See text-shaping.md.
xxhash-rust = { version = "0.8", features = ["xxh3"] }
# Phase 6b: line-breaking + bidi. icu_segmenter is the UAX #14 line
# breaker (compiled-in data tables, wasm32-safe). unicode-bidi is the
# UAX #9 bidi resolver (pure-Rust, zero-deps, Servo/Druid lineage).
# unicode-script provides UAX #24 script properties for the script-
# itemization step. See line-bidi.md.
icu_segmenter = "1.5"
unicode-bidi = "0.3"
unicode-script = "0.5"
cclab-grid-wasm = { path = "../../../crates/cclab-grid-wasm", optional = true }
cclab-grid-render-webgpu = { path = "../../../crates/cclab-grid-render-webgpu", optional = true }
wasm-bindgen = { version = "0.2", optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }
js-sys = { version = "0.3", optional = true }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
serde-wasm-bindgen = { version = "0.6", optional = true }
web-sys = { version = "0.3", optional = true, features = [
  "HtmlCanvasElement",
  "HtmlElement",
  "HtmlInputElement",
  "HtmlTextAreaElement",
  "Window",
  "Document",
  "DocumentFragment",
  "Element",
  "Node",
  "Text",
  "Response",
  "DomRect",
  "EventTarget",
  "Event",
  "MouseEvent",
  "WheelEvent",
  "KeyboardEvent",
] }

[dev-dependencies]
pretty_assertions = "1"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
