<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jet Production Regression Fixture</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const events = [];
        Object.defineProperty(window, "__jetProductionEvents", { value: events });
        const push = (kind, payload) => {
          events.push({
            kind,
            payload: String(payload ?? ""),
            stack: payload?.stack ? String(payload.stack) : null,
          });
        };
        const originalError = console.error;
        console.error = (...args) => {
          push("console.error", args.map(String).join(" "));
          originalError.apply(console, args);
        };
        window.addEventListener("error", (event) => {
          push("window.error", event.error || event.message);
        });
        window.addEventListener("unhandledrejection", (event) => {
          push("unhandledrejection", event.reason);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
