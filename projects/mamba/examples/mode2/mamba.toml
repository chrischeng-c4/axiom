[project]
name = "mode2-example"
version = "0.1.0"
entry_point = "src/main.py"

[dependencies.acme]
source = "git"
git = "https://github.com/example/acme-mamba.git"
rev = "0123456789abcdef0123456789abcdef01234567"
crate = "acme-mamba"
module = "acme"
expose = ["greet"]
features = ["tls"]
registry = "mamba"
abi_version = "0.1"

[build]
target = "native"
opt_level = 2
