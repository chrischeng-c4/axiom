[package]
name = "cryptokit"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Cryptography primitives (PyCA cryptography-equivalent). Mamba mambalibs kit."

[lib]
name = "cryptokit"
crate-type = ["rlib"]

[features]
default = ["hash", "aead", "password", "jwt", "otp", "kdf", "encoding", "qr"]
hash = ["dep:sha2", "dep:sha1", "dep:md-5", "dep:blake3", "dep:hmac", "dep:digest"]
aead = ["dep:aes-gcm", "dep:chacha20poly1305"]
password = ["dep:argon2", "dep:bcrypt"]
jwt = ["dep:jsonwebtoken"]
otp = ["hash"]
kdf = ["dep:hkdf", "dep:pbkdf2", "hash"]
encoding = []
qr = []

[dependencies]
# Hashing
sha2 = { version = "0.10", optional = true }
sha1 = { version = "0.10", optional = true }
md-5 = { version = "0.10", optional = true }
blake3 = { version = "1", optional = true }
hmac = { version = "0.12", optional = true }
digest = { version = "0.10", optional = true }

# AEAD encryption
aes-gcm = { version = "0.10", optional = true }
chacha20poly1305 = { version = "0.10", optional = true }

# Password hashing
argon2 = { version = "0.5", optional = true }
bcrypt = { version = "0.15", optional = true }

# JWT
jsonwebtoken = { version = "9", optional = true }

# KDF
hkdf = { version = "0.12", optional = true }
pbkdf2 = { version = "0.12", optional = true }

# Common
rand = "0.8"
base64.workspace = true
hex = "0.4"
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
