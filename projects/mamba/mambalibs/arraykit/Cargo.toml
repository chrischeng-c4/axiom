[package]
name = "arraykit"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "N-dimensional arrays (NumPy-like). Mamba mambalibs kit."

[lib]
name = "arraykit"
crate-type = ["rlib"]

[dependencies]
thiserror.workspace = true
serde = { workspace = true, optional = true }
rayon = { workspace = true, optional = true }

[dev-dependencies]
tempfile = "3"

[features]
default = []
serde = ["dep:serde"]
parallel = ["dep:rayon"]
