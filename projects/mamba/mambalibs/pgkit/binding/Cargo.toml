[package]
name = "pgkit-binding"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Mamba interface for pgkit under mambalibs.pg"

[lib]
name = "pgkit_binding"
crate-type = ["rlib"]

[dependencies]
cclab-mamba-registry = { path = "../../../../../crates/cclab-mamba-registry" }
