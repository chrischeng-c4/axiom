[package]
name = "cclab-pg"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Native PostgreSQL toolkit core for driver, ORM, migration, and Mamba interfaces"
repository.workspace = true
keywords = ["postgres", "postgresql", "orm", "async", "database"]
categories = ["database", "asynchronous"]

[lib]
name = "cclab_pg"
crate-type = ["rlib"]

[dependencies]
# Async runtime
tokio = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }

# Native interface helpers (optional)
parking_lot = { workspace = true, optional = true }

# PostgreSQL
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-rustls", "postgres", "chrono", "uuid", "json", "rust_decimal"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Types
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { workspace = true }
rust_decimal = { version = "1.36", features = ["serde"] }

# Error handling
thiserror = { workspace = true }

# Shared
cclab-core = { path = "../../../../../crates/cclab-core", features = ["postgres-errors"] }
cclab-schema = { path = "../../../../../crates/cclab-schema" }

# Parallel processing
num_cpus = "1.16"

# Tracing
tracing = { workspace = true }

# Hashing for migration checksums
sha2 = "0.10"

# Unicode normalization for security
unicode-normalization = "0.1"

[dev-dependencies]
tokio-test = "0.4"
qc = { package = "meter", path = "../../../../meter" }
criterion = "0.5"
tempfile = "3.8"
serial_test = "3"
syn = { version = "2", features = ["full", "visit"] }
walkdir = "2"

[[bench]]
name = "main"
harness = false
