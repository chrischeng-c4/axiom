[package]
name = "mediakit"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Image and video processing (PIL/Pillow-equivalent). Mamba mambalibs kit."

[lib]
name = "mediakit"
crate-type = ["rlib"]

[dependencies]
thiserror.workspace = true
serde = { workspace = true, optional = true }
image = { workspace = true, optional = true }

[dev-dependencies]
tempfile = "3"

[features]
default = []
full = ["image", "video", "pdf"]
image = ["dep:image"]
video = []
pdf = []
serde = ["dep:serde"]
