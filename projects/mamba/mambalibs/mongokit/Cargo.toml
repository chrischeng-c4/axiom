[package]
name = "mongokit"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "MongoDB driver (pymongo-equivalent). Mamba mambalibs kit."

[lib]
name = "mongokit"
crate-type = ["rlib"]

[dependencies]
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
thiserror.workspace = true
async-trait.workspace = true
tracing.workspace = true
futures.workspace = true

# MongoDB-specific
mongodb.workspace = true
bson.workspace = true
chrono.workspace = true

# Shared utilities
cclab-core = { path = "../../../../crates/cclab-core", features = ["mongodb-errors"] }
cclab-schema = { path = "../../../../crates/cclab-schema", features = ["bson"] }

[dev-dependencies]
tokio-test = "0.4"

