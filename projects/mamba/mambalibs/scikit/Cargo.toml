[package]
name = "scikit"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Scientific computing (SciPy-equivalent). Mamba mambalibs kit."

[lib]
name = "scikit"
crate-type = ["rlib"]

[dependencies]
thiserror.workspace = true
serde = { workspace = true, optional = true }
rayon = { workspace = true, optional = true }
arraykit = { path = "../arraykit", optional = true }
cclab-frame = { path = "../../../../crates/cclab-frame", optional = true }

[dev-dependencies]
tempfile = "3"

[features]
default = ["stats"]
full = ["stats", "fft", "signal", "interpolate", "optimize", "ts", "spatial", "sparse", "integrate"]
stats = []
fft = []
signal = ["fft"]
interpolate = []
optimize = []
ts = ["arraykit", "cclab-frame", "stats"]
spatial = []
sparse = []
integrate = []
serde = ["dep:serde"]
parallel = ["dep:rayon"]
