[package]
name = "agentkit-graph"
version = "0.1.0"
edition = "2021"
description = "Stateful agent graph runtime (Epic 3 — LangGraph parity)"
license = "MIT"
authors = ["cclab"]

[lib]
name = "agentkit_graph"
crate-type = ["rlib"]

[dependencies]
agent = { path = "../core" }
async-trait = "0.1"
tokio = { version = "1", features = ["sync", "rt", "macros", "fs", "io-util"] }
futures = "0.3"
thiserror = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }
tempfile = "3"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
