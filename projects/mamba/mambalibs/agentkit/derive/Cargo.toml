[package]
name = "agent-derive"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Proc-macro derive for agent::Schema (pydantic-style typed I/O)"

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

[dev-dependencies]
agent = { path = "../core" }
serde_json = "1"
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }
async-trait = "0.1"
trybuild = "1"
