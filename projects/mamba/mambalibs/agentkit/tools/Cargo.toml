[package]
name = "agentkit-tools"
version = "0.1.0"
edition = "2021"
description = "Reusable agent tool implementations (search, fs, HTTP, etc.)"
license = "MIT"
authors = ["cclab"]

[lib]
name = "agentkit_tools"
crate-type = ["rlib"]

[dependencies]
agent = { path = "../core" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "sync"] }
