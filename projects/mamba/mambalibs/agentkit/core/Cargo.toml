[package]
name = "agent"
version = "0.1.0"
edition = "2021"
description = "High-performance LLM agent framework with Rust core"
license = "MIT"
authors = ["cclab"]

[lib]
name = "agent"
crate-type = ["rlib"]

[dependencies]
# Core dependencies
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
futures = "0.3"
bytes = "1"
chrono = { version = "0.4", features = ["serde"] }

# Concurrent data structures
dashmap = "5"
once_cell = "1"

# File operations
walkdir = "2"
glob = "0.3"
regex = "1"
tempfile = "3"

# HTTP client (`mambalibs.http` core)
mambalibs-http = { path = "../../httpkit" }

# URL encoding
urlencoding = "2"

# HTML parsing and escaping
html-escape = "0.2"

# Base64 encoding (for Jira auth)
base64 = "0.22"

# UUID generation
uuid = { version = "1", features = ["v4"] }

# Token counting
tiktoken-rs = "0.9"

# TOML parsing (for manifest tool)
toml = "0.8"

# JSON schema validation (for structured output)
jsonschema = "0.45"

# Proc-macro derive (companion crate, P4/#1952)
agent-derive = { path = "../derive" }

[dev-dependencies]
tokio-test = "0.4"
