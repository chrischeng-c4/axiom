# Mambalibs learn import gate fixture — closes #2848.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Third acceptance ("Test avoids large model or dataset dependencies.")
# is pinned via [dataset_policy].
#
# Out of scope (issue body): ML algorithm coverage.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_learn_import_gate_fixture_2848.rs).

version = 1
fixture = "mambalibs_learn_import_gate"
issue = 2848
parent_issue = 2531
profile = "mambalibs"
family = "learn_import_gate"
library = "learn"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[binding]
surface = "mambalibs"
library = "learn"
import_statement = "from mambalibs import learn"
minimal_exported_symbol = "Model"

[support_status]
allowed_values = ["pass", "xfail", "blocker"]
default_status = "blocker"
current_status = "blocker"
status_must_be_one_of_allowed = true

[supported_case]
case = "learn_import_supported"
command = ["run", "fixture_call.py"]
expected_outcome = "pass"
expected_exit_code = 0
status_under_which_applicable = "pass"
must_import_module = true
must_assert_minimal_symbol = true
asserted_symbol = "Model"
symbol_assertion_kind = "hasattr"

[blocked_case]
case = "learn_import_blocked"
command = ["report-status"]
expected_outcome = "blocked"
expected_exit_code = 0
status_under_which_applicable = "blocker"
linked_blocker_issue = 2848
must_emit_structured_blocker = true
must_name_offending_library = "learn"
must_name_surface = "mambalibs"
must_not_attempt_import = true

[diagnostic_contract]
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true
diagnostic_must_name_library = "learn"
diagnostic_must_name_surface = "mambalibs"
diagnostic_must_name_library_field_key = "library"
diagnostic_must_name_surface_field_key = "surface"
diagnostic_must_name_linked_blocker_field_key = "linked_blocker_issue"

# Acceptance: "Test avoids large model or dataset dependencies."
[dataset_policy]
must_not_download_model = true
must_not_download_dataset = true
must_not_load_pretrained_weights = true
must_run_offline = true
max_dataset_bytes = 1024
max_model_parameters = 0
forbidden_env_vars = ["HF_HOME", "TRANSFORMERS_CACHE", "TORCH_HOME", "XDG_CACHE_HOME"]
rationale = """\
The import gate exercises the mambalibs learn import surface ONLY. \
Downloading models or datasets, or loading pretrained weights, would \
tie the gate to network and large-blob caches — unacceptable for a \
deterministic offline gate."""

[gate_summary_contract]
field_name = "learn_import_status"
field_source_block = "support_status"
field_source_key = "current_status"
allowed_field_values = ["pass", "xfail", "blocker"]

[runner_contract]
keys = [
    "outcome",
    "case",
    "surface",
    "library",
    "import_statement",
    "asserted_symbol",
    "learn_import_status",
    "linked_blocker_issue",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "blocked", "missing", "skip"]
case_values = ["learn_import_supported", "learn_import_blocked"]

[out_of_scope]
# Issue: "Out of scope: ML algorithm coverage."
ml_algorithm_coverage = true
