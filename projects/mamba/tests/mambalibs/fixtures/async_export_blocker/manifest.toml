# Mambalibs async export blocker fixture — closes #2677.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the contract for tracking whether Mode 2 bindings can expose
# async functions to Python. The fixture declares ONE async export
# and ONE supported-status enum slot ("pass" | "xfail" | "blocker"),
# plus a wall-clock-sleep guard so the passing path never depends
# on time, and a behavior assertion through the mambalibs import
# path when supported.
#
# Acceptance (issue body):
#
#   - Async export support status appears in mambalibs gate summary.
#     `[gate_summary_contract]` pins `async_export_status` as a
#     first-class field name and verifies it appears in the gate
#     summary's known field list (cross-references #2676 keys).
#   - Unsupported behavior is not silently skipped.
#     `[unsupported_behavior_contract]` pins
#     distinguish_blocker_from_skip + linked_blocker_issue +
#     `must_not_silently_skip`; `[blocker_case]` carries the
#     blocked outcome.
#   - Passing fixture avoids wall-clock sleeps.
#     `[no_wall_clock_sleeps]` pins
#     forbid_thread_sleep + forbid_asyncio_sleep_above_zero +
#     `pass_path_must_be_compute_only` and `max_sleep_seconds = 0`.
#
# Out of scope (issue body): full async runtime integration.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_async_export_blocker_fixture_2677.rs).

version = 1
fixture = "mambalibs_async_export_blocker"
issue = 2677
parent_issue = 2531
profile = "mambalibs"
family = "async_export_blocker"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The async function the fixture would export under Mode 2.
[binding]
module_name = "mambalibs"
binding_crate = "mambalibs_async_export_blocker_binding"
exported_async_function = "async_roundtrip"
import_statement = "from mambalibs import async_roundtrip"
function_signature = "async def async_roundtrip(x: int) -> int"
return_kind = "int"

# The support status is a three-valued enum. Exactly ONE value
# applies on a given run; the runner publishes the chosen value
# into the mambalibs gate summary as `async_export_status`.
[support_status]
allowed_values = ["pass", "xfail", "blocker"]
default_status = "blocker"
current_status = "blocker"
status_must_be_one_of_allowed = true

# Passing path — used when current_status = "pass". Calls the
# async function via asyncio.run, asserts a deterministic
# round-trip value; no wall-clock sleeps.
[pass_case]
case = "async_export_supported"
command = ["run", "fixture_call.py"]
expected_outcome = "pass"
expected_exit_code = 0
status_under_which_applicable = "pass"
must_call_async_function = true
must_use_asyncio_run = true
must_assert_deterministic_value = true
deterministic_input = 7
deterministic_expected_return_value = 7

# Expected-failure path — used when current_status = "xfail".
# The exception MUST surface as an asyncio-compatible error, NOT
# an interpreter crash.
[xfail_case]
case = "async_export_xfail"
command = ["run", "fixture_call.py"]
expected_outcome = "fail"
expected_exit_code = 1
status_under_which_applicable = "xfail"
must_raise_exception = true
expected_exception_type = "RuntimeError"
must_not_crash_interpreter = true

# Blocker path — used when current_status = "blocker". The fixture
# emits a structured blocker entry instead of running the call;
# the gate summary records the linked issue so dashboards can
# route to the tracker.
[blocker_case]
case = "async_export_blocker"
command = ["report-status"]
expected_outcome = "blocked"
expected_exit_code = 0
status_under_which_applicable = "blocker"
linked_blocker_issue = 2677
must_emit_structured_blocker = true
must_name_offending_feature = "async_export"
must_not_attempt_call = true

[unsupported_behavior_contract]
distinguish_blocker_from_skip = true
distinguish_blocker_from_fail = true
linked_blocker_issue = 2677
must_not_silently_skip = true
must_not_silently_pass = true
must_surface_blocker_in_gate_summary = true

[no_wall_clock_sleeps]
forbid_thread_sleep = true
forbid_asyncio_sleep_above_zero = true
pass_path_must_be_compute_only = true
max_sleep_seconds = 0
rationale = """\
Wall-clock sleeps make async fixtures flaky on CI and worker pools \
and inflate suite wall time. Async correctness is asserted via \
asyncio.run + deterministic return value, not by waiting."""

# Acceptance: "Async export support status appears in mambalibs
# gate summary." The summary field is named `async_export_status`
# and is sourced from `[support_status].current_status`.
[gate_summary_contract]
field_name = "async_export_status"
field_source_block = "support_status"
field_source_key = "current_status"
allowed_field_values = ["pass", "xfail", "blocker"]

[diagnostic_contract]
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true
diagnostic_must_name_async_export_status_field_key = "async_export_status"
diagnostic_must_name_linked_blocker_field_key = "linked_blocker_issue"

[runner_contract]
keys = [
    "outcome",
    "case",
    "module",
    "exported_async_function",
    "async_export_status",
    "linked_blocker_issue",
    "asyncio_run_invoked",
    "wall_clock_seconds",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "blocked", "missing", "skip"]
case_values = [
    "async_export_supported",
    "async_export_xfail",
    "async_export_blocker",
]

[out_of_scope]
# Issue: "Out of scope: full async runtime integration."
full_async_runtime_integration = true
