# Mambalibs local Mode 2 binding crate fixture — closes #2577.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the shape of the canonical local Rust binding crate that the
# rest of the Mode 2 test suite depends on:
#
#   - The fixture crate exposes ONE deterministic exported function
#     through the expected binding path.
#   - The crate is small enough for fast local builds — only the
#     binding skeleton plus the exported function.
#   - The crate documents its role as the canonical Mode 2 test
#     dependency.
#
# Acceptance:
#   - Fixture crate builds independently.
#   - Exported function returns a value that can be asserted from
#     Python.
#   - No cclab production crate behavior is changed.
#
# Out of scope (issue body): testing every cclab library.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_local_mode2_binding_crate_fixture_2577.rs).

version = 1
fixture = "mambalibs_local_mode2_binding_crate"
issue = 2577
parent_issue = 2531
profile = "mambalibs"
family = "local_mode2_binding_crate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The fixture crate skeleton. Crate name + cdylib target + a single
# pyo3 function — nothing else. Track location: under the fixture
# directory so the crate is co-located with the manifest.
[crate]
crate_name = "mambalibs_local_mode2_binding_crate"
relative_path = "."
crate_type = "cdylib"
binding_kind = "pyo3"
module_name = "mambalibs"
exported_function = "answer"
import_statement = "from mambalibs import answer"
must_be_small_local_fixture = true
documented_as_canonical_mode2_dependency = true

[exported_function_contract]
function_name = "answer"
return_kind = "integer"
return_value = 42
must_be_deterministic = true
must_be_assertable_from_python = true
assertion_kind = "exact_equality"

# Acceptance: "Fixture crate builds independently."
[independent_build_case]
case = "binding_crate_builds_independently"
must_build_with_no_workspace_member_dependency = true
must_not_depend_on_cclab_production_crates = true
must_compile_offline = true
expected_outcome = "pass"
expected_exit_code = 0
build_failure_outcome = "fail"
build_failure_exit_code = 1
must_be_fast = true
fast_build_budget_seconds = 60

# Acceptance: "Exported function returns a value that can be asserted
# from Python."
[python_assertion_case]
case = "exported_function_assertable_from_python"
must_use_user_facing_import = "from mambalibs import answer"
must_call_function = "answer"
must_assert_returned_value_exactly = true
asserted_value = 42
expected_outcome = "pass"
expected_exit_code = 0
mismatch_outcome = "fail"
mismatch_exit_code = 3

# Acceptance: "No cclab production crate behavior is changed."
[production_crate_isolation]
must_not_modify_cclab_production_crates = true
forbidden_modifications = [
    "cclab-mamba",
    "cclab-runtime",
    "cclab-jet",
    "cclab-kv",
    "cclab-core",
    "cclab-cli",
    "cclab-pyo3",
]
must_be_test_only = true
must_live_under_tests_fixtures_dir = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "crate_name",
    "exported_function",
    "returned_value",
    "expected_returned_value",
    "build_seconds",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "binding_crate_builds_independently",
    "exported_function_assertable_from_python",
]

[out_of_scope]
# Issue: "Out of scope: testing every cclab library."
testing_every_cclab_library = true
