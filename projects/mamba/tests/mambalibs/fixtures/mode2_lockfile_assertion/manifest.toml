# Mode 2 lockfile assertion fixture — closes #2574.
# Parent: #2531 (mambalibs Mode 2 end-to-end build and import gate).
#
# Pins the shape of the Mode 2 mambalibs lockfile-assertion
# fixture. The fixture extends the Mode 2 fixture project with an
# expected lockfile assertion: equivalent content across runs,
# fails when the dependency is removed, machine-independent:
#
#   - Running the build twice produces equivalent lockfile content.
#   - Removing the dependency changes the lockfile assertion and
#     fails.
#   - Lockfile format is documented in the fixture README or test
#     comment.
#
# Out of scope (issue body): full resolver lockfile policy.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_mode2_lockfile_assertion_fixture_2574.rs).

version = 1
fixture = "mambalibs_mode2_lockfile_assertion"
issue = 2574
parent_issue = 2531
profile = "mambalibs"
family = "mambalibs_mode2_lockfile_assertion"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
mode = "mode_2"
must_cover_lockfile_emission = true
must_cover_lockfile_assertion_in_test = true
must_cover_dependency_removal_diff = true
must_cover_double_build_equivalence = true
must_document_lockfile_format_in_readme_or_comment = true

# Canonical Mode 2 fixture project metadata.
[fixture_project_definition]
project_name = "mamba2574"
project_root_relative_path = "tests/mambalibs/fixtures/mode2_lockfile_assertion/project"
manifest_relative_path = "mamba.toml"
lockfile_relative_path = "mamba.lock"
readme_relative_path = "README.md"
mode_2_dependency_name = "mamba_demo_dep"
mode_2_dependency_version = "0.1.0"

# Acceptance: "Running the build twice produces equivalent lockfile
# content."
[double_build_equivalence_contract]
case = "running_the_build_twice_produces_equivalent_lockfile_content"
must_be_byte_equivalent_across_runs = true
must_be_path_independent = true
must_be_timestamp_independent = true
must_be_user_home_independent = true
must_be_machine_independent = true
forbid_wallclock_in_lockfile = true
forbid_absolute_path_in_lockfile = true
forbid_user_home_path_in_lockfile = true
forbid_temp_directory_path_in_lockfile = true
non_equivalent_lockfile_failure_kind = "mode2_lockfile_not_byte_equivalent_across_runs"
non_equivalent_lockfile_exit_code = 180
must_distinguish_byte_inequivalence_from_machine_dependence = true
machine_dependent_lockfile_failure_kind = "mode2_lockfile_machine_dependent_content"
machine_dependent_lockfile_exit_code = 181

# Acceptance: "Removing the dependency changes the lockfile
# assertion and fails."
[dependency_removal_failure_contract]
case = "removing_the_dependency_changes_the_lockfile_assertion_and_fails"
must_fail_when_mode_2_dependency_removed = true
must_emit_dependency_removal_diff = true
forbid_silently_passing_with_missing_dependency = true
forbid_lockfile_assertion_being_ignored_when_dep_removed = true
dependency_removal_failure_kind = "mode2_lockfile_dependency_removal_undetected"
dependency_removal_exit_code = 182
must_distinguish_dependency_removal_from_version_drift = true
version_drift_failure_kind = "mode2_lockfile_dependency_version_drift"
version_drift_exit_code = 183

# Acceptance: "Lockfile format is documented in the fixture README
# or test comment."
[lockfile_format_documentation_contract]
case = "lockfile_format_is_documented_in_the_fixture_readme_or_test_comment"
must_document_lockfile_format = true
must_document_required_fields = true
must_document_path_normalization_rules = true
must_document_machine_independence_rules = true
allowed_documentation_locations = ["readme", "test_comment"]
documentation_field_name = "lockfile_format_documentation_location"
required_documented_fields = [
    "dependency_name",
    "dependency_version",
    "resolved_artifact_identity",
    "resolved_artifact_kind",
]
forbid_undocumented_lockfile_format = true
missing_documentation_failure_kind = "mode2_lockfile_format_documentation_missing"
missing_documentation_exit_code = 184

[runner_contract]
keys = [
    "outcome",
    "case",
    "project_name",
    "manifest_relative_path",
    "lockfile_relative_path",
    "lockfile_format_documentation_location",
    "dependency_name",
    "dependency_version",
    "resolved_artifact_identity",
    "resolved_artifact_kind",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "running_the_build_twice_produces_equivalent_lockfile_content",
    "removing_the_dependency_changes_the_lockfile_assertion_and_fails",
    "lockfile_format_is_documented_in_the_fixture_readme_or_test_comment",
]

[out_of_scope]
# Issue: "Out of scope: full resolver lockfile policy."
full_resolver_lockfile_policy = true
