# ABI semver gate fixture — closes #2521.
# Umbrella: #2459 (MVP mambalibs).
#
# Pins the shape of the ABI semver gate for the external binding
# crate path. cclab-mamba-registry exposes ABI version constants;
# `mamba build` compares host vs each binding's ABI version before
# link:
#
#   - ABI mismatch produces a readable error, not a link-time
#     symbol fail.
#
# Out of scope: stabilizing the full MbValue/MambaModule public ABI
# surface; this fixture only pins the version-gate semantics.
#
# Shape locked by src/ffi/tests/abi_semver_gate.rs.

version = 1
fixture = "abi_semver_gate"
issue = 2521
umbrella_issue = 2459
profile = "mambalibs"
family = "abi_semver_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_abi_version_constant_exposure = true
must_cover_pre_link_abi_comparison = true
must_cover_readable_mismatch_error = true
must_cover_no_link_time_symbol_failure = true

[abi_version_exposure_contract]
case = "cclab_mamba_registry_exposes_abi_version_constants"
must_expose_host_abi_version_constant = true
must_expose_binding_abi_version_constant = true
must_record_mb_value_abi_version = true
must_record_mamba_module_abi_version = true
abi_version_constants_field_name = "abi_version_constants"
required_abi_version_constants = [
    "host_abi_version",
    "binding_abi_version",
    "mb_value_abi_version",
    "mamba_module_abi_version",
]
forbid_implicit_abi_version_constants = true
forbid_omitting_required_abi_version_constants = true
missing_abi_version_constant_failure_kind = "mambalibs_abi_version_constant_missing"
missing_abi_version_constant_exit_code = 229

# Acceptance: "ABI mismatch produces a readable error, not a
# link-time symbol fail."
[abi_mismatch_readable_error_contract]
case = "abi_mismatch_produces_readable_error_not_link_time_symbol_fail"
must_fail_before_link_when_abi_mismatched = true
must_emit_readable_abi_mismatch_error = true
must_record_host_abi_version_in_error = true
must_record_binding_abi_version_in_error = true
must_record_binding_crate_identity_in_error = true
forbid_link_time_symbol_failure_on_abi_mismatch = true
forbid_silent_load_on_abi_mismatch = true
forbid_freeform_or_implicit_abi_mismatch_error = true
required_error_fields = [
    "host_abi_version",
    "binding_abi_version",
    "binding_crate_name",
    "binding_crate_version",
]
abi_mismatch_error_field_name = "abi_mismatch_error"
abi_mismatch_failure_kind = "mambalibs_abi_mismatch_pre_link"
abi_mismatch_exit_code = 230
link_time_symbol_failure_kind = "mambalibs_abi_mismatch_surfaced_as_link_time_symbol_fail"
link_time_symbol_failure_exit_code = 231
must_distinguish_pre_link_abi_mismatch_from_link_time_symbol_fail = true

[abi_comparison_phase_contract]
case = "mamba_build_compares_abi_version_before_link"
must_run_abi_comparison_during_build = true
must_run_abi_comparison_before_link_phase = true
forbid_running_abi_comparison_after_link = true
forbid_skipping_abi_comparison_when_binding_present = true
build_phase_field_name = "build_phase"
required_build_phases_in_order = [
    "resolve",
    "fetch",
    "abi_compare",
    "link",
    "emit",
]
abi_compare_phase_name = "abi_compare"
phase_out_of_order_failure_kind = "mambalibs_abi_compare_phase_out_of_order"
phase_out_of_order_exit_code = 232
phase_skipped_failure_kind = "mambalibs_abi_compare_phase_skipped"
phase_skipped_exit_code = 233
must_distinguish_phase_out_of_order_from_phase_skipped = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "abi_version_constants",
    "host_abi_version",
    "binding_abi_version",
    "mb_value_abi_version",
    "mamba_module_abi_version",
    "abi_mismatch_error",
    "binding_crate_name",
    "binding_crate_version",
    "build_phase",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "cclab_mamba_registry_exposes_abi_version_constants",
    "abi_mismatch_produces_readable_error_not_link_time_symbol_fail",
    "mamba_build_compares_abi_version_before_link",
]

[out_of_scope]
# Issue body: the underlying public-ABI surface (MbValue,
# MambaModule) is owned by runtime/registry teams and lives outside
# this gate. This fixture only pins the version-gate shape.
public_abi_surface_definition = true
mb_value_struct_layout = true
mamba_module_struct_layout = true
runtime_implementation_of_abi_comparison = true
runtime_implementation_of_link_phase = true
