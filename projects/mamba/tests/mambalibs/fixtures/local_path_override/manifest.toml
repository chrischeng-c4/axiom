# Mambalibs local path override fixture — closes #2671.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the contract for overriding a mambalibs dependency with a
# local path: the override source becomes the artifact; the
# lockfile records the local-path identity; the import probe
# confirms the overridden code ran.
#
# Acceptance (issue body):
#
#   - Missing or wrong override path fails clearly.
#     `[missing_override_path_case]` and `[wrong_override_path_case]`
#     pin fail outcomes + named diagnostics.
#   - Lockfile records the local path dependency identity
#     deterministically.
#     `[lockfile_assertion]` pins source_kind = "local_path",
#     records the override path, must_be_deterministic, and
#     must_be_byte_identical_on_replay.
#   - Import result proves the override was used.
#     `[override_apply_case]` pins import_probe_value_must_be ==
#     the override-only sentinel; the registry-default sentinel
#     value is explicitly NOT acceptable.
#
# Out of scope (issue body): remote registry override policy.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_local_path_override_fixture_2671.rs).

version = 1
fixture = "mambalibs_local_path_override"
issue = 2671
parent_issue = 2531
profile = "mambalibs"
family = "local_path_override"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The mamba project declares ONE mambalibs dependency. The local
# path points to a sibling binding crate whose sentinel value
# differs from the registry-default version. The import probe
# distinguishes which source was used.
[binding]
module_name = "mambalibs"
exported_function = "current_sentinel"
import_statement = "from mambalibs import current_sentinel"
sentinel_attribute = "__sentinel__"
registry_default_sentinel_value = "REGISTRY-DEFAULT"
local_override_sentinel_value = "LOCAL-OVERRIDE"

# Local path under the fixture sandbox — must NOT escape the
# project tree. The lockfile records this path verbatim.
[override]
relative_path = "./local_binding"
override_kind = "local_path"
absolute_path_template = "${FIXTURE_TMPDIR}/local_binding"
binding_crate = "mambalibs_local_path_override_binding"
must_not_escape_project_tree = true

# Step 1 — sync with the local override. Build & import MUST
# resolve to the override source.
[override_apply_case]
case = "override_applied"
command = ["sync"]
expected_outcome = "pass"
expected_exit_code = 0
must_resolve_via_override = true
import_probe_value_must_be = "LOCAL-OVERRIDE"
import_probe_value_must_not_be = "REGISTRY-DEFAULT"
must_record_source_kind = "local_path"

# Acceptance: "Lockfile records the local path dependency identity
# deterministically." Source kind + path + deterministic
# byte-identical replay.
[lockfile_assertion]
file = "mamba.lock"
must_record_source_kind = "local_path"
source_kind_field_key = "source"
must_record_override_path = true
override_path_field_key = "path"
must_record_relative_path = "./local_binding"
must_not_record_index_url = true
must_be_deterministic = true
must_be_byte_identical_on_replay = true

# Acceptance: "Missing or wrong override path fails clearly."
# Both failure modes pinned, each with a named diagnostic.

[missing_override_path_case]
case = "missing_override_path"
command = ["sync"]
override_path_exists = false
expected_outcome = "fail"
expected_exit_code = 1
diagnostic_must_name_offending_path = true
diagnostic_must_name_override_field = true
diagnostic_message_substring = "does_not_exist"
must_not_silently_fall_back_to_registry = true

[wrong_override_path_case]
case = "wrong_override_path"
command = ["sync"]
override_path_target = "./does_not_resolve_here"
expected_outcome = "fail"
expected_exit_code = 1
diagnostic_must_name_offending_path = true
diagnostic_must_name_offending_dependency = true
diagnostic_must_be_actionable = true
must_not_silently_fall_back_to_registry = true

# Acceptance: "Import result proves the override was used." Cross-
# block: the override-applied case's import probe value MUST equal
# the binding's `local_override_sentinel_value` AND MUST differ
# from `registry_default_sentinel_value`. The schema gate enforces
# both.
[import_proof_contract]
must_distinguish_override_from_default = true
must_name_resolved_source_in_summary = true
must_name_import_probe_value_in_summary = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module",
    "exported_function",
    "resolved_source",
    "override_path",
    "lockfile_source_kind",
    "import_probe_value",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "override_applied",
    "missing_override_path",
    "wrong_override_path",
]

[out_of_scope]
# Issue: "Out of scope: remote registry override policy."
remote_registry_override_policy = true
