# Mambalibs pg import gate fixture — closes #2843.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Third acceptance ("Test does not require a live database.") is
# pinned via [live_dependency_policy].
#
# Out of scope (issue body): pg integration behavior.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_pg_import_gate_fixture_2843.rs).

version = 1
fixture = "mambalibs_pg_import_gate"
issue = 2843
parent_issue = 2531
profile = "mambalibs"
family = "pg_import_gate"
library = "pg"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[binding]
surface = "mambalibs"
library = "pg"
import_statement = "from mambalibs import pg"
minimal_exported_symbol = "QueryBuilder"

[support_status]
allowed_values = ["pass", "xfail", "blocker"]
default_status = "blocker"
current_status = "blocker"
status_must_be_one_of_allowed = true

[supported_case]
case = "pg_import_supported"
command = ["run", "fixture_call.py"]
expected_outcome = "pass"
expected_exit_code = 0
status_under_which_applicable = "pass"
must_import_module = true
must_assert_minimal_symbol = true
asserted_symbol = "QueryBuilder"
symbol_assertion_kind = "hasattr"

[blocked_case]
case = "pg_import_blocked"
command = ["report-status"]
expected_outcome = "blocked"
expected_exit_code = 0
status_under_which_applicable = "blocker"
linked_blocker_issue = 2843
must_emit_structured_blocker = true
must_name_offending_library = "pg"
must_name_surface = "mambalibs"
must_not_attempt_import = true

[diagnostic_contract]
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true
diagnostic_must_name_library = "pg"
diagnostic_must_name_surface = "mambalibs"
diagnostic_must_name_library_field_key = "library"
diagnostic_must_name_surface_field_key = "surface"
diagnostic_must_name_linked_blocker_field_key = "linked_blocker_issue"

# Acceptance: "Test does not require a live database."
[live_dependency_policy]
must_not_open_tcp_connection = true
must_not_connect_to_database = true
must_not_read_dsn_env_vars = true
forbidden_env_vars = ["PGHOST", "PGPORT", "PGUSER", "PGPASSWORD", "DATABASE_URL"]
must_run_offline = true
rationale = """\
The import gate exercises the mambalibs pg import surface ONLY. \
Opening a TCP socket or reading PG* environment variables would \
make the test depend on a live Postgres instance — unacceptable \
for a deterministic offline gate."""

[gate_summary_contract]
field_name = "pg_import_status"
field_source_block = "support_status"
field_source_key = "current_status"
allowed_field_values = ["pass", "xfail", "blocker"]

[runner_contract]
keys = [
    "outcome",
    "case",
    "surface",
    "library",
    "import_statement",
    "asserted_symbol",
    "pg_import_status",
    "linked_blocker_issue",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "blocked", "missing", "skip"]
case_values = ["pg_import_supported", "pg_import_blocked"]

[out_of_scope]
# Issue: "Out of scope: pg integration behavior."
pg_integration_behavior = true
