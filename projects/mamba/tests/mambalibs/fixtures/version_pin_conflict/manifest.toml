# Mambalibs version pin conflict fixture — closes #2675.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the contract for Mode 2 dependency version conflicts: when
# the same local binding dependency is requested at incompatible
# versions, the resolver MUST fail deterministically before any
# import, the diagnostic MUST name the dependency and the two
# requested versions, and the lockfile MUST NOT be mutated into a
# partial-success state. A positive single-version fixture remains
# green to prove the failure path does not regress happy paths.
#
# Acceptance (issue body):
#
#   - Conflict fails deterministically before import.
#     `[conflict_case]` pins fail outcome + non-zero exit code +
#     must_fail_before_import = true; `[crash_guard]` pins
#     "must_not_attempt_import_on_conflict".
#   - Error does not mutate lockfile into a partial success state.
#     `[lockfile_integrity]` pins must_remain_unchanged +
#     must_not_record_partial_resolution + lockfile_hash_compare;
#     the runner contract carries `lockfile_before_hash` /
#     `lockfile_after_hash` as first-class keys.
#   - Positive single-version fixture still passes.
#     `[isolation_from_positive_cases]` pins the cross-fixture
#     invariant against #2666 (type roundtrip) — error pathway
#     MUST NOT affect the positive single-version baseline.
#
# Out of scope (issue body): full semver resolver implementation.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_version_pin_conflict_fixture_2675.rs).

version = 1
fixture = "mambalibs_version_pin_conflict"
issue = 2675
parent_issue = 2531
profile = "mambalibs"
family = "version_pin_conflict"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The dependency under conflict. Both requesters name the SAME
# dependency but pin INCOMPATIBLE versions. The diagnostic must
# name this dependency by exactly this string.
[dependency]
name = "mambalibs_version_pin_conflict_binding"
requested_by_a = "fixture_root"
requested_by_b = "transitive_via_helper_crate"
version_a = "0.1.0"
version_b = "0.2.0"
versions_are_incompatible = true
incompatibility_reason = "exact_version_pins_differ"

# Acceptance: "Conflict fails deterministically before import."
[conflict_case]
case = "version_pin_conflict_detected"
command = ["build"]
expected_outcome = "fail"
expected_exit_code = 1
must_fail_before_import = true
must_be_deterministic = true
diagnostic_must_name_dependency = true
diagnostic_must_name_dependency_value = "mambalibs_version_pin_conflict_binding"
diagnostic_must_name_requested_versions = true
diagnostic_must_name_requested_versions_values = ["0.1.0", "0.2.0"]
diagnostic_must_name_requesters = true

# Crash-style failures are NOT acceptable. The error MUST surface
# as a diagnostic; the interpreter (if any) MUST NOT be loaded.
[crash_guard]
must_not_attempt_import_on_conflict = true
fail_if_interpreter_loaded_before_diagnostic = true
fail_if_exit_code_indicates_crash = true
pinned_fail_exit_code = 1

# Acceptance: "Error does not mutate lockfile into a partial
# success state."
[lockfile_integrity]
lockfile_relative_path = "mamba.lock"
must_remain_unchanged = true
must_not_record_partial_resolution = true
must_not_record_either_candidate_version = true
hash_compare_field_keys = ["lockfile_before_hash", "lockfile_after_hash"]
hash_compare_must_be_equal = true

# Acceptance: "Positive single-version fixture still passes."
# The positive happy-path baseline is #2666 (type_roundtrip).
# The conflict pathway MUST NOT regress it.
[isolation_from_positive_cases]
positive_baseline_fixture_issue = 2666
positive_baseline_fixture_must_remain_green = true
this_fixture_must_not_affect_positive_baseline = true

[diagnostic_contract]
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true
diagnostic_must_name_dependency_field_key = "dependency"
diagnostic_must_name_requested_versions_field_key = "requested_versions"
diagnostic_must_name_requesters_field_key = "requesters"

[runner_contract]
keys = [
    "outcome",
    "case",
    "dependency",
    "requested_versions",
    "requesters",
    "lockfile_before_hash",
    "lockfile_after_hash",
    "import_attempted",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = ["version_pin_conflict_detected"]

[out_of_scope]
# Issue: "Out of scope: full semver resolver implementation."
full_semver_resolver_implementation = true
