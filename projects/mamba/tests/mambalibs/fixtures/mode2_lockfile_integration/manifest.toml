# Mode 2 lockfile integration fixture — closes #2522.
# Umbrella: #2459 (MVP mambalibs).
# Depends: #2520 (fetch step), pkgmgr Phase 1.4 lockfile.
#
# Pins the shape of the Mode 2 lockfile-integration decision and
# fixture. Resolves the open decision "share pkgmgr lockfile vs
# independent file (e.g. mamba.lock)" by declaring the canonical
# Mode 2 lockfile filename and provenance and pinning the
# reproducible-build acceptance:
#
#   - Same `mamba.toml` + lockfile builds byte-identical binary
#     across machines.
#
# Out of scope: full pkgmgr lockfile policy (that lives under
# pkgmgr Phase 1.4 and #2574). This fixture only pins the
# integration shape that Mode 2 dependencies share the
# `mamba.lock` file emitted by the same pkgmgr.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/mode2_lockfile_integration_fixture_2522.rs).

version = 1
fixture = "mode2_lockfile_integration"
issue = 2522
umbrella_issue = 2459
profile = "mambalibs"
family = "mode2_lockfile_integration"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
mode = "mode_2"
must_cover_canonical_lockfile_filename = true
must_cover_lockfile_provenance_decision = true
must_cover_mode2_dependency_pinning = true
must_cover_byte_identical_binary_across_machines = true

[dependencies]
depends_on_issue_2520_fetch_step = true
depends_on_pkgmgr_phase_1_4_lockfile = true

# Canonical lockfile filename and provenance decision.
#
# Decision: Mode 2 dependencies share the package-manager lockfile,
# emitted as `mamba.lock` at the project root next to `mamba.toml`.
# A separate file is forbidden so that there is exactly one source
# of truth for dependency identity across both pkgmgr (Mode 1) and
# external binding crates (Mode 2).
[canonical_lockfile_decision_contract]
case = "canonical_lockfile_filename_and_provenance_are_pinned"
canonical_lockfile_filename = "mamba.lock"
canonical_lockfile_relative_path = "mamba.lock"
canonical_lockfile_owner = "pkgmgr"
must_share_lockfile_with_pkgmgr = true
must_emit_single_lockfile_per_project = true
forbid_independent_mode2_lockfile = true
forbid_multiple_lockfiles_per_project = true
forbid_mode2_lockfile_outside_project_root = true
canonical_lockfile_filename_field_name = "lockfile_filename"
canonical_lockfile_owner_field_name = "lockfile_owner"
lockfile_filename_mismatch_failure_kind = "mode2_lockfile_filename_mismatch"
lockfile_filename_mismatch_exit_code = 223
multiple_lockfiles_failure_kind = "mode2_multiple_lockfiles_per_project"
multiple_lockfiles_exit_code = 224
must_distinguish_filename_mismatch_from_multiple_lockfiles = true

# Acceptance: "Same `mamba.toml` + lockfile builds byte-identical
# binary across different machines."
[byte_identical_binary_contract]
case = "same_mamba_toml_and_lockfile_build_byte_identical_binary_across_machines"
must_be_byte_identical_across_machines = true
must_be_byte_identical_across_runs = true
must_be_path_independent = true
must_be_user_home_independent = true
must_be_wallclock_independent = true
forbid_wallclock_in_binary = true
forbid_absolute_path_in_binary = true
forbid_user_home_path_in_binary = true
forbid_machine_dependent_metadata_in_binary = true
binary_artifact_field_name = "binary_artifact_digest"
binary_artifact_digest_algorithm = "sha256"
byte_inequivalence_across_machines_failure_kind = "mode2_binary_not_byte_identical_across_machines"
byte_inequivalence_across_machines_exit_code = 225
byte_inequivalence_across_runs_failure_kind = "mode2_binary_not_byte_identical_across_runs"
byte_inequivalence_across_runs_exit_code = 226
must_distinguish_cross_machine_inequivalence_from_cross_run_inequivalence = true

# Decision: Mode 2 dependency entries inside the shared lockfile
# are required to record the same minimum identity as pkgmgr
# entries plus a Rust-side identity for the binding crate so that
# rebuilds prove identical at the binary level.
[mode2_lockfile_entry_contract]
case = "mode2_lockfile_entry_records_full_identity_for_binding_crate"
must_record_dependency_name = true
must_record_dependency_version = true
must_record_resolved_artifact_identity = true
must_record_resolved_artifact_kind = true
must_record_binding_crate_name = true
must_record_binding_crate_version = true
must_record_rust_target_triple_when_relevant = true
forbid_omitting_required_lockfile_entry_fields = true
forbid_freeform_lockfile_entry = true
required_lockfile_entry_fields = [
    "dependency_name",
    "dependency_version",
    "resolved_artifact_identity",
    "resolved_artifact_kind",
    "binding_crate_name",
    "binding_crate_version",
]
mode2_lockfile_entry_field_name = "mode2_lockfile_entry"
missing_lockfile_entry_field_failure_kind = "mode2_lockfile_entry_missing_required_field"
missing_lockfile_entry_field_exit_code = 227
freeform_lockfile_entry_failure_kind = "mode2_lockfile_entry_freeform"
freeform_lockfile_entry_exit_code = 228
must_distinguish_missing_field_from_freeform_entry = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "lockfile_filename",
    "lockfile_owner",
    "binary_artifact_digest",
    "mode2_lockfile_entry",
    "dependency_name",
    "dependency_version",
    "resolved_artifact_identity",
    "resolved_artifact_kind",
    "binding_crate_name",
    "binding_crate_version",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "canonical_lockfile_filename_and_provenance_are_pinned",
    "same_mamba_toml_and_lockfile_build_byte_identical_binary_across_machines",
    "mode2_lockfile_entry_records_full_identity_for_binding_crate",
]

[out_of_scope]
# Issue body: pkgmgr Phase 1.4 lockfile policy lives elsewhere.
# This fixture pins the shared-lockfile decision and Mode 2 entry
# shape only; runtime resolver/lockfile policy is owned by
# #2520 / #2574 / pkgmgr Phase 1.4.
full_pkgmgr_lockfile_policy = true
runtime_implementation_of_lockfile_emission = true
runtime_implementation_of_binary_artifact_digest = true
runtime_implementation_of_resolved_artifact_identity = true
