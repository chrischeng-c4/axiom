# Mambalibs grid import gate fixture — closes #2847.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Third acceptance ("Test avoids browser or WASM build requirements
# unless explicitly isolated.") is pinned via [browser_policy].
#
# Out of scope (issue body): grid rendering or WASM coverage.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_grid_import_gate_fixture_2847.rs).

version = 1
fixture = "mambalibs_grid_import_gate"
issue = 2847
parent_issue = 2531
profile = "mambalibs"
family = "grid_import_gate"
library = "grid"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[binding]
surface = "mambalibs"
library = "grid"
import_statement = "from mambalibs import grid"
minimal_exported_symbol = "Grid"

[support_status]
allowed_values = ["pass", "xfail", "blocker"]
default_status = "blocker"
current_status = "blocker"
status_must_be_one_of_allowed = true

[supported_case]
case = "grid_import_supported"
command = ["run", "fixture_call.py"]
expected_outcome = "pass"
expected_exit_code = 0
status_under_which_applicable = "pass"
must_import_module = true
must_assert_minimal_symbol = true
asserted_symbol = "Grid"
symbol_assertion_kind = "hasattr"

[blocked_case]
case = "grid_import_blocked"
command = ["report-status"]
expected_outcome = "blocked"
expected_exit_code = 0
status_under_which_applicable = "blocker"
linked_blocker_issue = 2847
must_emit_structured_blocker = true
must_name_offending_library = "grid"
must_name_surface = "mambalibs"
must_not_attempt_import = true

[diagnostic_contract]
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true
diagnostic_must_name_library = "grid"
diagnostic_must_name_surface = "mambalibs"
diagnostic_must_name_library_field_key = "library"
diagnostic_must_name_surface_field_key = "surface"
diagnostic_must_name_linked_blocker_field_key = "linked_blocker_issue"

# Acceptance: "Test avoids browser or WASM build requirements unless
# explicitly isolated."
[browser_policy]
must_not_require_browser_runtime = true
must_not_require_wasm_build = true
must_not_launch_headless_browser = true
must_not_invoke_wasm_pack = true
must_run_in_native_python = true
forbidden_env_vars = ["BROWSER", "PUPPETEER_EXECUTABLE_PATH", "WASM_PACK", "CHROME_BIN"]
rationale = """\
The import gate exercises the mambalibs grid import surface ONLY. \
Launching a browser, downloading a headless Chromium, or invoking \
wasm-pack would tie the gate to an external toolchain — unacceptable \
for a deterministic native-Python offline gate."""

[gate_summary_contract]
field_name = "grid_import_status"
field_source_block = "support_status"
field_source_key = "current_status"
allowed_field_values = ["pass", "xfail", "blocker"]

[runner_contract]
keys = [
    "outcome",
    "case",
    "surface",
    "library",
    "import_statement",
    "asserted_symbol",
    "grid_import_status",
    "linked_blocker_issue",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "blocked", "missing", "skip"]
case_values = ["grid_import_supported", "grid_import_blocked"]

[out_of_scope]
# Issue: "Out of scope: grid rendering or WASM coverage."
grid_rendering_or_wasm_coverage = true
