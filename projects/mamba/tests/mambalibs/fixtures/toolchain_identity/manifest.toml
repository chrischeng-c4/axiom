# Mambalibs toolchain-identity fixture — closes #2581.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the shape of the Mode 2 E2E build summary so that Rust
# toolchain identity is always recorded (on success AND failure),
# kept machine-readable, and missing fields fail the test:
#
#   - Build summary includes Rust toolchain identity on success and
#     failure.
#   - Missing fields fail the test.
#   - Output avoids machine-specific absolute paths unless needed
#     for diagnostics.
#
# Out of scope (issue body): installing or selecting Rust toolchains.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_toolchain_identity_fixture_2581.rs).

version = 1
fixture = "mambalibs_toolchain_identity"
issue = 2581
parent_issue = 2531
profile = "mambalibs"
family = "toolchain_identity"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The fixture wraps the Mode 2 E2E build harness (#2578) and asserts
# the structured summary it emits. Local binding crate is #2577.
[binding]
module_name = "mambalibs"
mamba_build_e2e_harness_fixture_issue = 2578
local_binding_crate_fixture_issue = 2577
must_emit_structured_summary = true

# Acceptance: "Build summary includes Rust toolchain identity on
# success and failure."
[summary_contract]
must_be_machine_readable = true
summary_record_format = "json"
must_emit_on_build_success = true
must_emit_on_build_failure = true
must_include_toolchain_identity_on_success = true
must_include_toolchain_identity_on_failure = true
required_toolchain_fields = [
    "rustc_version",
    "cargo_version",
    "target_triple",
    "build_profile",
]
allowed_build_profile_values = ["debug", "release"]
toolchain_identity_must_be_recorded_before_artifact_check = true

# Acceptance: "Missing fields fail the test."
[missing_field_case]
case = "missing_toolchain_field_fails_test"
must_assert_each_required_field_is_present = true
expected_outcome_when_all_fields_present = "pass"
expected_outcome_when_any_field_missing = "fail"
missing_field_failure_kind = "toolchain_identity_incomplete"
missing_field_exit_code = 8
missing_field_diagnostic_must_name_missing_field = true
must_not_emit_speedup_when_summary_incomplete = true

# Acceptance: "Output avoids machine-specific absolute paths unless
# needed for diagnostics."
[path_redaction_contract]
must_avoid_machine_specific_absolute_paths = true
forbid_user_home_paths_in_summary_unless_diagnostic = true
forbid_tmpdir_random_suffixes_in_summary_unless_diagnostic = true
allowed_path_kinds_in_summary = [
    "relative_to_workspace",
    "diagnostic_only_absolute",
]
diagnostic_paths_must_be_explicitly_marked = true
must_be_deterministic_across_machines = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "rustc_version",
    "cargo_version",
    "target_triple",
    "build_profile",
    "missing_field",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "toolchain_identity_recorded_on_build_success",
    "toolchain_identity_recorded_on_build_failure",
    "missing_toolchain_field_fails_test",
]

[out_of_scope]
# Issue: "Out of scope: installing or selecting Rust toolchains."
installing_or_selecting_rust_toolchains = true
