# Mambalibs fetch import gate fixture — closes #2844.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Third acceptance ("Test performs no external network I/O.") is
# pinned via [network_policy].
#
# Out of scope (issue body): HTTP behavior coverage.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_fetch_import_gate_fixture_2844.rs).

version = 1
fixture = "mambalibs_fetch_import_gate"
issue = 2844
parent_issue = 2531
profile = "mambalibs"
family = "fetch_import_gate"
library = "fetch"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[binding]
surface = "mambalibs"
library = "fetch"
import_statement = "from mambalibs import fetch"
minimal_exported_symbol = "Client"

[support_status]
allowed_values = ["pass", "xfail", "blocker"]
default_status = "blocker"
current_status = "blocker"
status_must_be_one_of_allowed = true

[supported_case]
case = "fetch_import_supported"
command = ["run", "fixture_call.py"]
expected_outcome = "pass"
expected_exit_code = 0
status_under_which_applicable = "pass"
must_import_module = true
must_assert_minimal_symbol = true
asserted_symbol = "Client"
symbol_assertion_kind = "hasattr"

[blocked_case]
case = "fetch_import_blocked"
command = ["report-status"]
expected_outcome = "blocked"
expected_exit_code = 0
status_under_which_applicable = "blocker"
linked_blocker_issue = 2844
must_emit_structured_blocker = true
must_name_offending_library = "fetch"
must_name_surface = "mambalibs"
must_not_attempt_import = true

[diagnostic_contract]
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true
diagnostic_must_name_library = "fetch"
diagnostic_must_name_surface = "mambalibs"
diagnostic_must_name_library_field_key = "library"
diagnostic_must_name_surface_field_key = "surface"
diagnostic_must_name_linked_blocker_field_key = "linked_blocker_issue"

# Acceptance: "Test performs no external network I/O."
[network_policy]
must_not_open_tcp_connection = true
must_not_perform_dns_lookup = true
must_not_emit_http_request = true
must_not_read_proxy_env_vars = true
forbidden_env_vars = ["HTTP_PROXY", "HTTPS_PROXY", "ALL_PROXY", "http_proxy", "https_proxy"]
must_run_offline = true
rationale = """\
External network I/O is non-deterministic and slow; the import \
gate exercises the mambalibs fetch import surface only. Network \
calls are not permitted."""

[gate_summary_contract]
field_name = "fetch_import_status"
field_source_block = "support_status"
field_source_key = "current_status"
allowed_field_values = ["pass", "xfail", "blocker"]

[runner_contract]
keys = [
    "outcome",
    "case",
    "surface",
    "library",
    "import_statement",
    "asserted_symbol",
    "fetch_import_status",
    "linked_blocker_issue",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "blocked", "missing", "skip"]
case_values = ["fetch_import_supported", "fetch_import_blocked"]

[out_of_scope]
# Issue: "Out of scope: HTTP behavior coverage."
http_behavior_coverage = true
