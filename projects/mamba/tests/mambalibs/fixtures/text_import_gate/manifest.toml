# Mambalibs text import gate fixture — closes #2849.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Third acceptance ("Test uses a tiny deterministic string sample only
# if needed.") is pinned via [sample_policy].
#
# Out of scope (issue body): NLP pipeline coverage.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_text_import_gate_fixture_2849.rs).

version = 1
fixture = "mambalibs_text_import_gate"
issue = 2849
parent_issue = 2531
profile = "mambalibs"
family = "text_import_gate"
library = "text"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[binding]
surface = "mambalibs"
library = "text"
import_statement = "from mambalibs import text"
minimal_exported_symbol = "Tokenizer"

[support_status]
allowed_values = ["pass", "xfail", "blocker"]
default_status = "blocker"
current_status = "blocker"
status_must_be_one_of_allowed = true

[supported_case]
case = "text_import_supported"
command = ["run", "fixture_call.py"]
expected_outcome = "pass"
expected_exit_code = 0
status_under_which_applicable = "pass"
must_import_module = true
must_assert_minimal_symbol = true
asserted_symbol = "Tokenizer"
symbol_assertion_kind = "hasattr"

[blocked_case]
case = "text_import_blocked"
command = ["report-status"]
expected_outcome = "blocked"
expected_exit_code = 0
status_under_which_applicable = "blocker"
linked_blocker_issue = 2849
must_emit_structured_blocker = true
must_name_offending_library = "text"
must_name_surface = "mambalibs"
must_not_attempt_import = true

[diagnostic_contract]
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true
diagnostic_must_name_library = "text"
diagnostic_must_name_surface = "mambalibs"
diagnostic_must_name_library_field_key = "library"
diagnostic_must_name_surface_field_key = "surface"
diagnostic_must_name_linked_blocker_field_key = "linked_blocker_issue"

# Acceptance: "Test uses a tiny deterministic string sample only if needed."
[sample_policy]
must_be_tiny = true
must_be_deterministic = true
must_be_string = true
must_be_in_memory = true
sample_required_when_supported_path_runs = false
max_sample_bytes = 64
max_sample_chars = 32
forbid_network_io = true
forbid_disk_io_outside_artifact_root = true
forbid_random_without_fixed_seed = true

[gate_summary_contract]
field_name = "text_import_status"
field_source_block = "support_status"
field_source_key = "current_status"
allowed_field_values = ["pass", "xfail", "blocker"]

[runner_contract]
keys = [
    "outcome",
    "case",
    "surface",
    "library",
    "import_statement",
    "asserted_symbol",
    "text_import_status",
    "linked_blocker_issue",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "blocked", "missing", "skip"]
case_values = ["text_import_supported", "text_import_blocked"]

[out_of_scope]
# Issue: "Out of scope: NLP pipeline coverage."
nlp_pipeline_coverage = true
