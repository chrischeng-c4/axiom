# Mambalibs missing dependency diagnostic fixture — closes #2579.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the diagnostic surface for `from mambalibs import <missing>`
# when the Mode 2 dependency is declared in mamba.toml but the
# binding crate is not yet built (or genuinely missing):
#
#   - Missing dependency does not crash the interpreter.
#   - Error message includes the module name and recovery command.
#   - Positive import fixture (#2576) still passes.
#
# Out of scope (issue body): implementing automatic dependency build.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_missing_dependency_diagnostic_fixture_2579.rs).

version = 1
fixture = "mambalibs_missing_dependency_diagnostic"
issue = 2579
parent_issue = 2531
profile = "mambalibs"
family = "missing_dependency_diagnostic"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The fixture project declares the dependency in mamba.toml but the
# binding crate is NOT built/installed. The Python side attempts
# `from mambalibs import <missing_module>` and the runner asserts the
# diagnostic.
[binding]
module_name = "mambalibs"
missing_fixture_module = "missing_dependency_target"
import_statement = "from mambalibs import missing_dependency_target"
mamba_toml_fixture_issue = 2575
must_be_declared_in_mamba_toml = true
must_not_be_built = true

# Acceptance: "Missing dependency does not crash the interpreter."
[crash_guard]
fail_if_interpreter_segfaults = true
fail_if_interpreter_aborts = true
fail_if_rust_panic_aborts_process = true
fail_if_exit_code_indicates_crash = true
must_exit_with_python_exception_not_crash = true
crash_diagnostic_must_name_crash_mode = true

# Acceptance: "Error message includes module name and recovery
# command."
[error_message_contract]
must_raise_python_exception = true
expected_exception_type = "ImportError"
exception_message_must_include_module_name = true
module_name_substring = "missing_dependency_target"
exception_message_must_include_recovery_command = true
recovery_command_substring = "mamba build"
recovery_command_must_name_subcommand = "build"
recovery_command_alternative_subcommand = "sync"
allowed_recovery_subcommands = ["build", "sync"]
must_be_deterministic = true
recovery_exit_code = 6

# Acceptance: "Positive import fixture still passes."
[positive_fixture_isolation]
positive_fixture_issue = 2576
positive_fixture_must_remain_green = true
this_fixture_must_not_affect_positive_cases = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module",
    "missing_module",
    "exception_type",
    "exception_message",
    "recovery_command",
    "crash_mode",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "missing_dependency_raises_diagnostic_exception",
]

[out_of_scope]
# Issue: "Out of scope: implementing automatic dependency build."
implementing_automatic_dependency_build = true
