# Mambalibs artifact layout validation fixture — closes #2673.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the on-disk artifact layout produced by a Mode 2 build for
# the local binding fixture: module artifact, metadata, lockfile,
# and optional stubs. The fixture normalizes platform-specific
# extension suffixes so the same layout assertion is portable
# across macOS / Linux / Windows.
#
# Acceptance (issue body):
#
#   - Missing artifact files fail with exact path names.
#     `[missing_file_case]` pins fail outcome + exact missing
#     path; `[diagnostic_contract]` enforces path naming.
#   - Platform-specific suffix handling is documented in the test.
#     `[platform_suffix_table]` declares the per-platform shared-
#     library extension; the schema gate asserts macOS / Linux /
#     Windows are all covered.
#   - Import fixture can consume the same artifact layout.
#     `[import_compatibility]` pins the cross-fixture invariant
#     against #2666 — the import fixture reads from the same
#     directory shape.
#
# Out of scope (issue body): installer UX changes.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_artifact_layout_validation_fixture_2673.rs).

version = 1
fixture = "mambalibs_artifact_layout_validation"
issue = 2673
parent_issue = 2531
profile = "mambalibs"
family = "artifact_layout_validation"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The binding crate that produces the artifact under test.
[binding]
module_name = "mambalibs"
binding_crate = "mambalibs_artifact_layout_validation_binding"
exported_function = "echo_roundtrip"
artifact_root = "build/mambalibs_artifact_layout_validation_binding-0.1.0"

# The expected directory tree under [binding.artifact_root]. Each
# entry is a path RELATIVE to the artifact root. The shared-
# library suffix is referenced via the placeholder
# `{shared_lib_ext}` so the runner can substitute the host's
# extension at test time.
[expected_files]
relative_paths = [
    "metadata.json",
    "mamba.lock",
    "module/__init__.py",
    "module/_mambalibs_native{shared_lib_ext}",
]
shared_lib_extension_placeholder = "{shared_lib_ext}"
must_all_be_non_directory = true
must_all_be_under_artifact_root = true

# Acceptance: "Platform-specific suffix handling is documented in
# the test." Per-platform native-extension suffix. The Rust schema
# gate enforces that macOS / Linux / Windows are all present.
[platform_suffix_table]
macos = ".dylib"
linux = ".so"
windows = ".dll"
must_be_deterministic_per_platform = true
documentation = """\
mambalibs ships ONE native shared library per binding. The host \
platform determines the suffix used by Mode 2's loader:\n\
  * macOS → .dylib\n\
  * Linux → .so\n\
  * Windows → .dll\n\
The artifact-layout assertion substitutes the placeholder \
{shared_lib_ext} at runtime with the host suffix."""

# Acceptance: "Missing artifact files fail with exact path names."
[present_layout_case]
case = "layout_present"
command = ["build"]
expected_outcome = "pass"
expected_exit_code = 0
must_create_all_expected_files = true
must_emit_no_unexpected_files = false

[missing_file_case]
case = "missing_artifact_file"
command = ["build"]
omitted_relative_path = "module/__init__.py"
expected_outcome = "fail"
expected_exit_code = 1
diagnostic_must_name_missing_path = true
diagnostic_must_name_missing_path_value = "module/__init__.py"
must_not_silently_succeed = true

[diagnostic_contract]
diagnostic_must_name_offending_artifact_root = true
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true
diagnostic_must_name_missing_path_field_key = "missing_path"

# Acceptance: "Import fixture can consume the same artifact
# layout." The import fixture (#2666 type-roundtrip) MUST read
# from the same layout shape; this fixture pins that the layout
# entries needed for import remain stable.
[import_compatibility]
type_roundtrip_fixture_issue = 2666
must_provide_module_init_for_import = true
must_provide_native_extension_for_import = true
must_not_require_optional_stub_for_import = true
optional_stub_relative_path = "module/_mambalibs_native.pyi"

[runner_contract]
keys = [
    "outcome",
    "case",
    "artifact_root",
    "missing_path",
    "platform_suffix",
    "files_present",
    "files_missing",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = ["layout_present", "missing_artifact_file"]

[out_of_scope]
# Issue: "Out of scope: installer UX changes."
installer_ux_changes = true
