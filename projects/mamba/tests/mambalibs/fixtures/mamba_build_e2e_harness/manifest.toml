# Mambalibs `mamba build` E2E harness fixture — closes #2578.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the shape of an end-to-end harness that runs `mamba build`
# against the #2577 local Mode 2 binding crate fixture and captures
# stdout/stderr/exit/artifact-path.
#
# Acceptance:
#   - Missing build artifact fails the test.
#   - Nonzero build exit fails the test with logs.
#   - Test is isolated from user-level mamba caches.
#
# Out of scope (issue body): publishing or installing the artifact
# globally.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_mamba_build_e2e_harness_fixture_2578.rs).

version = 1
fixture = "mambalibs_mamba_build_e2e_harness"
issue = 2578
parent_issue = 2531
profile = "mambalibs"
family = "mamba_build_e2e_harness"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The fixture project the harness builds against — the #2577 local
# Mode 2 binding crate plus the #2575 mamba.toml Mode 2 dependency
# shape.
[fixture_project]
local_binding_crate_fixture_issue = 2577
mamba_toml_fixture_issue = 2575
relative_path = "../local_mode2_binding_crate"
must_be_offline = true
must_be_deterministic = true
must_be_small = true

# The smallest end-to-end command. The harness invokes one command;
# anything more is out of scope for this fixture.
[build_command]
program = "mamba"
subcommand = "build"
must_be_smallest_e2e_command = true
must_target_fixture_project = true
must_capture_stdout = true
must_capture_stderr = true
must_capture_exit_status = true
must_capture_artifact_path = true

# Acceptance: "Missing build artifact fails the test."
[artifact_case]
case = "build_produces_artifact"
must_assert_artifact_path_is_recorded = true
must_assert_artifact_path_exists_on_disk = true
expected_outcome_when_artifact_present = "pass"
expected_outcome_when_artifact_missing = "fail"
artifact_missing_failure_kind = "artifact_missing"
artifact_missing_exit_code = 4
artifact_missing_diagnostic_must_name_path = true

# Acceptance: "Nonzero build exit fails the test with logs."
[nonzero_exit_case]
case = "build_exits_clean_or_logs_failure"
must_assert_clean_exit_code = 0
expected_outcome_when_build_exits_clean = "pass"
expected_outcome_when_build_exits_nonzero = "fail"
nonzero_exit_failure_kind = "nonzero_build_exit"
nonzero_exit_must_attach_captured_stdout = true
nonzero_exit_must_attach_captured_stderr = true
nonzero_exit_diagnostic_must_name_command = true
nonzero_exit_exit_code = 5
must_not_drop_logs = true

# Acceptance: "Test is isolated from user-level mamba caches."
[user_cache_isolation]
must_isolate_from_user_level_mamba_caches = true
must_use_per_test_temp_cache_dir = true
forbid_reads_from_user_home = true
forbid_writes_to_user_home = true
forbid_reads_from_global_mamba_cache = true
forbid_writes_to_global_mamba_cache = true
forbidden_env_vars = [
    "MAMBA_CACHE_DIR",
    "MAMBA_HOME",
    "XDG_CACHE_HOME",
]
must_set_per_test_cache_dir_via_explicit_arg = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "program",
    "subcommand",
    "stdout_captured",
    "stderr_captured",
    "exit_status",
    "artifact_path",
    "failure_kind",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "build_produces_artifact",
    "build_exits_clean_or_logs_failure",
]

[out_of_scope]
# Issue: "Out of scope: publishing or installing the artifact globally."
publishing_or_global_install = true
