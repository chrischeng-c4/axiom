# mambalibs Mode 2 end-to-end build and import gate fixture —
# closes #2531.
# Parent: #2526 (MVP test completeness and release gates).
#
# Pins the shape of the mambalibs Mode 2 end-to-end build and
# import gate. Prove the mambalibs Mode 2 path from local Rust
# binding dependency to Python import:
#
#   - A local binding crate can be declared, built, locked, and
#     imported.
#   - `from mambalibs import ...` has positive and diagnostic
#     fixtures.
#   - Build summaries expose enough toolchain metadata to debug
#     failures.
#
# Atomic queue: #2574 add Mode 2 lockfile assertion, #2575 add
# mamba.toml Mode 2 dependency fixture, #2576 add from mambalibs
# import fixture, #2577 add local Mode 2 binding crate fixture,
# #2578 add mamba build E2E harness for local binding crate, #2579
# add mambalibs missing dependency diagnostic fixture, #2580 add
# multiple mambalibs import fixture, #2581 record Rust toolchain
# identity in mambalibs build summary, #2582 add mambalibs ABI
# mismatch failure fixture.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_mode2_e2e_gate_fixture_2531.rs).

version = 1
fixture = "mambalibs_mode2_end_to_end_build_and_import"
issue = 2531
parent_issue = 2526
profile = "mambalibs"
family = "mambalibs_mode2_end_to_end_build_and_import"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
mode = "mode_2"
must_cover_local_binding_crate_declaration = true
must_cover_local_binding_crate_build = true
must_cover_local_binding_crate_lock = true
must_cover_local_binding_crate_import = true
must_cover_positive_from_mambalibs_import = true
must_cover_diagnostic_from_mambalibs_import = true
must_cover_build_summary_toolchain_metadata = true

[atomic_queue]
issue_2574_add_mode_2_lockfile_assertion = true
issue_2575_add_mamba_toml_mode_2_dependency_fixture = true
issue_2576_add_from_mambalibs_import_fixture = true
issue_2577_add_local_mode_2_binding_crate_fixture = true
issue_2578_add_mamba_build_e2e_harness_for_local_binding_crate = true
issue_2579_add_mambalibs_missing_dependency_diagnostic_fixture = true
issue_2580_add_multiple_mambalibs_import_fixture = true
issue_2581_record_rust_toolchain_identity_in_mambalibs_build_summary = true
issue_2582_add_mambalibs_abi_mismatch_failure_fixture = true

# Acceptance: "A local binding crate can be declared, built, locked,
# and imported."
[local_binding_crate_lifecycle_contract]
case = "local_binding_crate_can_be_declared_built_locked_and_imported"
must_cover_declared_phase = true
must_cover_built_phase = true
must_cover_locked_phase = true
must_cover_imported_phase = true
forbid_silently_skipping_any_lifecycle_phase = true
forbid_collapsed_or_implicit_lifecycle_phase = true
required_lifecycle_phases = [
    "declared",
    "built",
    "locked",
    "imported",
]
lifecycle_phase_field_name = "lifecycle_phase"
declared_phase_failure_kind = "mambalibs_mode2_declared_phase_failed"
declared_phase_exit_code = 195
built_phase_failure_kind = "mambalibs_mode2_built_phase_failed"
built_phase_exit_code = 196
locked_phase_failure_kind = "mambalibs_mode2_locked_phase_failed"
locked_phase_exit_code = 197
imported_phase_failure_kind = "mambalibs_mode2_imported_phase_failed"
imported_phase_exit_code = 198
must_distinguish_each_phase_failure = true

# Acceptance: "`from mambalibs import ...` has positive and
# diagnostic fixtures."
[positive_and_diagnostic_import_contract]
case = "from_mambalibs_import_has_positive_and_diagnostic_fixtures"
must_cover_positive_import_fixture = true
must_cover_diagnostic_missing_dependency_fixture = true
must_cover_diagnostic_abi_mismatch_fixture = true
forbid_silently_passing_when_dependency_missing = true
forbid_silently_passing_when_abi_mismatched = true
positive_import_fixture_name = "mambalibs_positive_import"
missing_dependency_fixture_name = "mambalibs_missing_dependency_diagnostic"
abi_mismatch_fixture_name = "mambalibs_abi_mismatch_failure"
positive_import_failure_kind = "mambalibs_positive_import_failed"
positive_import_exit_code = 199
missing_dependency_failure_kind = "mambalibs_missing_dependency"
missing_dependency_exit_code = 200
abi_mismatch_failure_kind = "mambalibs_abi_mismatch"
abi_mismatch_exit_code = 201
must_distinguish_missing_dependency_from_abi_mismatch = true

# Acceptance: "Build summaries expose enough toolchain metadata to
# debug failures."
[build_summary_toolchain_metadata_contract]
case = "build_summaries_expose_enough_toolchain_metadata_to_debug_failures"
must_record_rust_toolchain_version = true
must_record_rust_target_triple = true
must_record_rust_profile = true
must_record_mamba_version = true
must_record_python_version = true
must_record_binding_crate_name = true
must_record_binding_crate_version = true
forbid_omitting_required_toolchain_fields = true
forbid_collapsing_toolchain_metadata_into_freeform_text = true
required_toolchain_metadata_fields = [
    "rust_toolchain_version",
    "rust_target_triple",
    "rust_profile",
    "mamba_version",
    "python_version",
    "binding_crate_name",
    "binding_crate_version",
]
toolchain_metadata_field_name = "toolchain_metadata"
missing_toolchain_metadata_failure_kind = "mambalibs_build_summary_toolchain_metadata_missing"
missing_toolchain_metadata_exit_code = 202
toolchain_metadata_freeform_failure_kind = "mambalibs_build_summary_toolchain_metadata_freeform"
toolchain_metadata_freeform_exit_code = 203
must_distinguish_missing_metadata_from_freeform_metadata = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "lifecycle_phase",
    "positive_import_fixture",
    "missing_dependency_fixture",
    "abi_mismatch_fixture",
    "toolchain_metadata",
    "rust_toolchain_version",
    "rust_target_triple",
    "rust_profile",
    "mamba_version",
    "python_version",
    "binding_crate_name",
    "binding_crate_version",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "local_binding_crate_can_be_declared_built_locked_and_imported",
    "from_mambalibs_import_has_positive_and_diagnostic_fixtures",
    "build_summaries_expose_enough_toolchain_metadata_to_debug_failures",
]

[out_of_scope]
# Scope is the manifest gate itself; the nine atomic-queue children
# (#2574-#2582) own runtime implementation of declare/build/lock/
# import, positive and diagnostic fixtures, and toolchain summary
# emission.
runtime_implementation_of_declare_build_lock_import = true
runtime_implementation_of_positive_import_fixture = true
runtime_implementation_of_missing_dependency_diagnostic_fixture = true
runtime_implementation_of_abi_mismatch_failure_fixture = true
runtime_implementation_of_toolchain_metadata_emission = true
