# Mambalibs exported-type roundtrip fixture — closes #2666.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the contract for the simplest Mode 2 binding shape: one
# exported function that accepts and returns primitive values across
# the Rust/Python boundary. The fixture is the per-family entry
# point declared by `[families.type_roundtrip]` in
# `projects/mamba/validation/profiles/mambalibs.toml`.
#
# Acceptance (issue body):
#
#   - Fixture fails on wrong type conversion or return value.
#     `[wrong_type_case].expected_outcome = "fail"` plus
#     `[wrong_return_value_case].expected_outcome = "fail"`.
#   - Failure output names the exported function.
#     `[wrong_type_case].diagnostic_must_name_function = true` and
#     same for the wrong-return-value guard; the `runner_contract`
#     carries `exported_function` as a first-class key.
#   - Fixture remains fast and local.
#     `[fixture_performance]` pins `must_be_fast_and_local`,
#     `must_not_touch_network`, `must_run_in_process`; `[isolation]`
#     forbids global state.
#
# Out of scope (issue body): complex object ownership or async
# bindings — one exported function, primitive values only.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_exported_type_roundtrip_fixture_2666.rs).

version = 1
fixture = "mambalibs_type_roundtrip"
issue = 2666
parent_issue = 2531
profile = "mambalibs"
family = "type_roundtrip"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The local binding crate ships ONE exported function. Mode 2 builds
# the crate into a mambalibs artifact; Python imports the function
# through `from mambalibs import` and exercises it on primitive
# values.
[exported_function]
name = "echo_roundtrip"
binding_crate = "mambalibs_type_roundtrip_binding"
import_statement = "from mambalibs import echo_roundtrip"
accepts_kinds = ["str", "int", "bool"]
returns_kinds = ["str", "int", "bool"]
signature_summary = "echo_roundtrip(value: str | int | bool) -> str | int | bool"
# A failure diagnostic that doesn't name this function is a
# structural failure — the failure-naming acceptance bullet hinges on
# it.
diagnostic_must_name_value = "echo_roundtrip"

# Acceptance: "Assert string, int, or bool roundtrip behavior." —
# one case per primitive kind. Each case is symmetric: the value
# Python sends in MUST be the value it gets back out, with the
# original Python type preserved.

[string_roundtrip_case]
case = "string_roundtrip"
input_kind = "str"
input_value = "hello-mamba"
expected_outcome = "pass"
expected_return_value = "hello-mamba"
expected_return_type = "str"
roundtrip_is_symmetric = true

[int_roundtrip_case]
case = "int_roundtrip"
input_kind = "int"
input_value = 42
expected_outcome = "pass"
expected_return_value = 42
expected_return_type = "int"
roundtrip_is_symmetric = true

[bool_roundtrip_case]
case = "bool_roundtrip"
input_kind = "bool"
input_value = true
expected_outcome = "pass"
expected_return_value = true
expected_return_type = "bool"
roundtrip_is_symmetric = true

# Acceptance: "Fixture fails on wrong type conversion ... ."
# Sending a string where the runner pinned an int expectation MUST
# fail the case, and the diagnostic MUST name `echo_roundtrip`.
[wrong_type_case]
case = "wrong_type"
input_kind = "str"
input_value = "not-an-int"
expected_kind = "int"
expected_outcome = "fail"
diagnostic_must_name_function = true
diagnostic_must_name_expected_kind = true
diagnostic_must_name_actual_kind = true

# Acceptance: "Fixture fails on ... wrong return value." — same
# input/output type, but the runner pins a return value that the
# binding does NOT produce, so the case MUST fail.
[wrong_return_value_case]
case = "wrong_return_value"
input_kind = "str"
input_value = "hello-mamba"
runner_pins_return_value = "WRONG"
expected_outcome = "fail"
diagnostic_must_name_function = true
diagnostic_must_name_expected_value = true
diagnostic_must_name_actual_value = true

# Acceptance: "The fixture remains fast and local."
[fixture_performance]
must_be_fast_and_local = true
must_not_touch_network = true
must_run_in_process = true
must_not_spawn_subprocesses = true
must_complete_under_seconds = 5

[runner_contract]
keys = [
    "outcome",
    "case",
    "exported_function",
    "input_kind",
    "input_value",
    "return_value",
    "return_type",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "string_roundtrip",
    "int_roundtrip",
    "bool_roundtrip",
    "wrong_type",
    "wrong_return_value",
]

[out_of_scope]
# Issue: "Out of scope: complex object ownership or async bindings."
complex_object_ownership_or_async_bindings = true
