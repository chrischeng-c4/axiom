# Mambalibs Rust error propagation fixture — closes #2672.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the contract for surfacing a Rust-side binding error as a
# usable Python exception: the binding returns an Err; the Python
# call raises a typed exception whose message includes the
# fixture's stable error code/text. Interpreter crashes are an
# automatic fail.
#
# Acceptance (issue body):
#
#   - Fixture fails if the error crashes the interpreter.
#     `[crash_guard]` pins fail flags for SIGSEGV, abort,
#     PanicException, and non-zero exit codes outside the pinned
#     value.
#   - Exception message includes the fixture error code or text.
#     `[error_call_case]` pins must_include_error_code +
#     must_include_error_text; the runner contract carries
#     `exception_message` as a first-class key.
#   - Positive import and call fixtures remain separate.
#     `[isolation_from_positive_cases]` pins the cross-fixture
#     invariant against #2666 (type_roundtrip) and #2667
#     (dir_help_introspection) — error propagation MUST NOT
#     regress either.
#
# Out of scope (issue body): full exception hierarchy design.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_rust_error_propagation_fixture_2672.rs).

version = 1
fixture = "mambalibs_rust_error_propagation"
issue = 2672
parent_issue = 2531
profile = "mambalibs"
family = "rust_error_propagation"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Same Mode 2 binding shape; this binding crate adds ONE function
# that always returns an Err. The Python side calls it and asserts
# the resulting exception's type + message.
[binding]
module_name = "mambalibs"
binding_crate = "mambalibs_rust_error_propagation_binding"
exported_error_function = "always_fails"
import_statement = "from mambalibs import always_fails"

# Deterministic, small error payload. The error code is the
# stable contract; the message is human-readable but also pinned
# so the runner can do a substring match.
[error_payload]
error_code = "MAMBALIBS_FIXTURE_ERR_0001"
error_text = "fixture error from always_fails"
exception_type = "RuntimeError"
must_be_deterministic = true
must_be_small_and_local = true

# Acceptance: "Call it from Python and assert exception type and
# message." Calling the failing function MUST raise the pinned
# exception type whose message names BOTH the error code and the
# error text.
[error_call_case]
case = "rust_error_propagated"
command = ["run", "fixture_call.py"]
expected_outcome = "pass"
expected_exit_code = 0
must_raise_exception = true
must_include_error_code = "MAMBALIBS_FIXTURE_ERR_0001"
must_include_error_text = "fixture error from always_fails"
expected_exception_type = "RuntimeError"
must_name_offending_function = "always_fails"

# Acceptance: "Fixture fails if the error crashes the interpreter."
# A binding error MUST surface as an exception — not as a
# segfault, an abort, or a Rust panic that aborts the process.
[crash_guard]
fail_if_interpreter_segfaults = true
fail_if_interpreter_aborts = true
fail_if_rust_panic_aborts_process = true
fail_if_exit_code_indicates_crash = true
pinned_clean_exit_code = 0
diagnostic_must_name_crash_mode = true

# Acceptance: "Positive import and call fixtures remain separate."
# Error propagation lives in its own fixture; #2666 and #2667 MUST
# still be green regardless of this fixture's outcome.
[isolation_from_positive_cases]
type_roundtrip_fixture_must_remain_green = true
type_roundtrip_fixture_issue = 2666
dir_help_fixture_must_remain_green = true
dir_help_fixture_issue = 2667
this_fixture_must_not_affect_positive_cases = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module",
    "exported_function",
    "exception_type",
    "exception_message",
    "error_code",
    "crash_mode",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = ["rust_error_propagated"]

[out_of_scope]
# Issue: "Out of scope: full exception hierarchy design."
full_exception_hierarchy_design = true
