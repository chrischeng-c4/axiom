# Mambalibs clean command fixture — closes #2674.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the contract for the smallest "clean" command that removes
# Mode 2 mambalibs build artifacts deterministically while leaving
# source files and the lockfile policy intact, then verifies that
# rebuild-after-clean still succeeds.
#
# Acceptance (issue body):
#
#   - Clean removes expected artifact paths.
#     `[clean_case]` pins must_remove_relative_paths against
#     `[artifact_paths].relative_paths` and pins
#     must_leave_artifact_root_empty_or_absent.
#   - Clean does not delete source fixture files.
#     `[source_preservation]` pins must_preserve_relative_paths
#     (the binding crate source) AND pins lockfile preservation —
#     `[lockfile_policy]` makes the lockfile a SOURCE-LIKE artifact
#     by default (`must_be_preserved_by_clean = true`).
#   - Rebuild after clean still succeeds.
#     `[rebuild_after_clean_case]` pins expected_outcome = pass
#     and must_recreate_all_expected_files = true; the schema gate
#     enforces that the rebuild's expected paths equal the original
#     clean target set.
#
# Out of scope (issue body): global cache cleanup.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_clean_command_fixture_2674.rs).

version = 1
fixture = "mambalibs_clean_command"
issue = 2674
parent_issue = 2531
profile = "mambalibs"
family = "clean_command"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The binding crate that produces the artifacts under test.
[binding]
module_name = "mambalibs"
binding_crate = "mambalibs_clean_command_binding"
exported_function = "echo_roundtrip"
artifact_root = "build/mambalibs_clean_command_binding-0.1.0"
source_root = "local_binding"

# The artifact tree produced by a successful build, RELATIVE to
# [binding.artifact_root]. The shared-library suffix is referenced
# via {shared_lib_ext} so the same set is portable across
# macOS / Linux / Windows.
[artifact_paths]
relative_paths = [
    "metadata.json",
    "mamba.lock",
    "module/__init__.py",
    "module/_mambalibs_native{shared_lib_ext}",
]
shared_lib_extension_placeholder = "{shared_lib_ext}"

# The source tree that MUST survive a clean. RELATIVE to
# [binding.source_root]. The clean command operates on
# [binding.artifact_root]; it MUST NOT touch [binding.source_root].
[source_preservation]
must_preserve_relative_paths = [
    "Cargo.toml",
    "src/lib.rs",
    "pyproject.toml",
]
must_preserve_source_root = true
must_not_delete_outside_artifact_root = true

# Acceptance: "Clean does not delete source fixture files."
# The lockfile is treated as a SOURCE-LIKE artifact by default —
# it pins exact dependency versions and survives a clean so the
# rebuild reproduces the same closure.
[lockfile_policy]
lockfile_relative_path = "mamba.lock"
must_be_preserved_by_clean = true
rationale = """\
The lockfile pins exact dependency versions for reproducible \
rebuilds. Deleting it on clean would force re-resolution against \
the registry, breaking offline determinism."""

# Acceptance: "Clean removes expected artifact paths."
[clean_case]
case = "clean_removes_artifacts"
command = ["clean"]
expected_outcome = "pass"
expected_exit_code = 0
must_remove_relative_paths = [
    "metadata.json",
    "module/__init__.py",
    "module/_mambalibs_native{shared_lib_ext}",
]
must_leave_artifact_root_empty_or_absent = true
must_not_delete_lockfile = true
must_not_touch_source_root = true

# Acceptance: "Rebuild after clean still succeeds."
[rebuild_after_clean_case]
case = "rebuild_after_clean"
command = ["build"]
expected_outcome = "pass"
expected_exit_code = 0
must_recreate_all_expected_files = true
must_recreate_relative_paths = [
    "metadata.json",
    "mamba.lock",
    "module/__init__.py",
    "module/_mambalibs_native{shared_lib_ext}",
]
must_match_artifact_paths_set = true

[diagnostic_contract]
diagnostic_must_name_artifact_root = true
diagnostic_must_be_deterministic = true
diagnostic_must_name_removed_paths_field_key = "removed_paths"
diagnostic_must_name_preserved_lockfile_field_key = "preserved_lockfile"

[runner_contract]
keys = [
    "outcome",
    "case",
    "artifact_root",
    "source_root",
    "removed_paths",
    "preserved_paths",
    "preserved_lockfile",
    "files_present_after_clean",
    "files_present_after_rebuild",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = ["clean_removes_artifacts", "rebuild_after_clean"]

[out_of_scope]
# Issue: "Out of scope: global cache cleanup."
global_cache_cleanup = true
