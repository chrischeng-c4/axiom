# Mambalibs rebuild cache invalidation fixture — closes #2669.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the contract for the rebuild path: when the local binding
# crate source changes, the next build MUST regenerate the artifact
# and the imported Python value MUST reflect the new source. A
# stale cache hit is a failure.
#
# Acceptance (issue body):
#
#   - Stale artifact reuse fails the test.
#     `[stale_artifact_guard]` pins fail flags for cache reuse
#     after source mutation; `[rebuild_case].rebuild_must_happen`
#     plus `import_probe_must_be_post_mutation` close the loop.
#   - Build cache paths are isolated to the temp fixture project.
#     `[cache_isolation]` pins the cache root under the fixture's
#     temp dir; `[isolation]` forbids global cache reads/writes.
#   - Summary names cache hit or rebuild decision.
#     `[summary_assertion]` pins must_name_cache_decision +
#     cache_decision_field_key + cache_decision_values.
#
# Out of scope (issue body): optimizing rebuild performance.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_rebuild_cache_invalidation_fixture_2669.rs).

version = 1
fixture = "mambalibs_rebuild_cache_invalidation"
issue = 2669
parent_issue = 2531
profile = "mambalibs"
family = "rebuild_cache"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Same Mode 2 binding crate shape as #2666/#2667/#2668. The binding
# exposes a sentinel value the import probe reads; the mutation
# step flips that sentinel so the rebuild path can be detected
# end-to-end.
[binding]
module_name = "mambalibs"
binding_crate = "mambalibs_rebuild_cache_invalidation_binding"
exported_function = "current_sentinel"
import_statement = "from mambalibs import current_sentinel"
sentinel_attribute = "__sentinel__"
initial_sentinel_value = "REBUILD-INITIAL"
mutated_sentinel_value = "REBUILD-MUTATED"

# Build cache MUST live entirely under the fixture's temp project.
# A cache root that escapes to ~/.cache or /tmp/mamba-cache is a
# fail (acceptance: "Build cache paths are isolated to the temp
# fixture project.").
[cache_isolation]
cache_root = "${FIXTURE_TMPDIR}/.mamba-cache"
must_be_under_fixture_tmpdir = true
forbid_global_cache_paths = [
    "${HOME}/.cache/mamba",
    "/tmp/mamba-cache",
    "${XDG_CACHE_HOME}/mamba",
]
must_not_persist_across_fixture_runs = true

# Step 1 — initial build over the binding crate, sentinel set to
# initial. Establishes the cache baseline.
[initial_build_case]
case = "initial_build"
command = ["build"]
expected_outcome = "pass"
expected_exit_code = 0
must_populate_cache = true
expected_cache_decision = "cache_miss"
import_probe_value_must_be = "REBUILD-INITIAL"

# Step 2 — mutate the binding crate source so the sentinel flips
# from REBUILD-INITIAL to REBUILD-MUTATED.
[mutation_step]
mutates_source_file = "src/lib.rs"
mutates_attribute = "__sentinel__"
old_value = "REBUILD-INITIAL"
new_value = "REBUILD-MUTATED"
must_be_deterministic = true

# Step 3 — rebuild. The cache MUST be invalidated; the artifact
# MUST be regenerated; the imported Python value MUST be the
# mutated sentinel. Acceptance: "Rebuild and assert the imported
# result reflects the new artifact."
[rebuild_case]
case = "rebuild_after_mutation"
command = ["build"]
expected_outcome = "pass"
expected_exit_code = 0
rebuild_must_happen = true
expected_cache_decision = "rebuild"
import_probe_must_be_post_mutation = true
import_probe_value_must_be = "REBUILD-MUTATED"
import_probe_must_not_be = "REBUILD-INITIAL"

# Acceptance: "Stale artifact reuse fails the test." If the
# rebuild silently reuses the cached artifact and the import still
# returns the initial sentinel, the case MUST fail with a named
# diagnostic.
[stale_artifact_guard]
fail_if_cache_decision_is_cache_hit_after_mutation = true
fail_if_import_probe_returns_initial_after_mutation = true
fail_if_artifact_bytes_unchanged_after_mutation = true
diagnostic_must_name_offending_artifact = true
diagnostic_must_name_old_and_new_sentinel_values = true

# Acceptance: "Summary names cache hit or rebuild decision."
[summary_assertion]
must_name_cache_decision = true
cache_decision_field_key = "cache_decision"
cache_decision_values = ["cache_miss", "cache_hit", "rebuild"]
must_name_artifact_identity = true
must_name_sentinel_value = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module",
    "exported_function",
    "cache_decision",
    "artifact_identity",
    "sentinel_value",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = ["initial_build", "rebuild_after_mutation"]

[out_of_scope]
# Issue: "Out of scope: optimizing rebuild performance."
optimizing_rebuild_performance = true
