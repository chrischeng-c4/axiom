# Mambalibs `from mambalibs import` fixture — closes #2576.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the MVP user-facing import path from Python code:
#
#   - Python executes `from mambalibs import <fixture_module>`.
#   - The fixture calls the exported function from the local Mode 2
#     binding crate.
#   - The returned value is asserted exactly.
#
# Acceptance:
#   - Test fails if import path is unavailable.
#   - Test fails if the exported function cannot be called.
#   - Output distinguishes import failure from runtime call failure.
#
# Out of scope (issue body): importing every cclab library.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_from_mambalibs_import_fixture_2576.rs).

version = 1
fixture = "mambalibs_from_mambalibs_import"
issue = 2576
parent_issue = 2531
profile = "mambalibs"
family = "from_mambalibs_import"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Binding shape: the local Mode 2 binding crate from #2577 exports a
# tiny deterministic function; Python imports it via the user-facing
# `from mambalibs import ...` path and calls it.
[binding]
module_name = "mambalibs"
binding_crate = "mambalibs_from_mambalibs_import_binding"
fixture_module = "from_mambalibs_import_target"
exported_function = "answer"
import_statement = "from mambalibs import from_mambalibs_import_target"
local_binding_crate_fixture_issue = 2577

# The exported function returns this exact value. Determinism +
# small-and-local: integer, no allocator pressure.
[expected_return_value]
kind = "integer"
value = 42
must_be_deterministic = true
must_be_small_and_local = true
assertion = "exact_equality"

# Acceptance: "Test fails if import path is unavailable."
# Acceptance: "Output distinguishes import failure from runtime call
# failure." (import side)
[import_case]
case = "user_facing_import_succeeds"
must_use_user_facing_import_statement = "from mambalibs import from_mambalibs_import_target"
must_observe_module_attribute = "from_mambalibs_import_target"
expected_outcome_when_import_succeeds = "pass"
expected_outcome_when_import_unavailable = "fail"
import_unavailable_failure_kind = "import_failure"
import_unavailable_exit_code = 2
import_unavailable_diagnostic_must_name_module = true
must_not_mask_runtime_call_failures = true

# Acceptance: "Test fails if the exported function cannot be called."
# Acceptance: "Output distinguishes import failure from runtime call
# failure." (call side)
[call_case]
case = "exported_function_returns_expected_value"
must_call_exported_function = "answer"
must_assert_exact_returned_value = true
asserted_value = 42
expected_outcome_when_call_returns_expected = "pass"
expected_outcome_when_call_fails = "fail"
call_failure_kind = "runtime_call_failure"
call_failure_exit_code = 3
call_failure_diagnostic_must_name_function = true
must_not_mask_import_failures = true

# Acceptance: "Output distinguishes import failure from runtime call
# failure." (cross-cutting summary)
[failure_kind_distinction]
must_distinguish_import_vs_runtime_call_failure = true
failure_kind_field_name = "failure_kind"
allowed_failure_kinds = ["import_failure", "runtime_call_failure", "none"]
must_emit_failure_kind_in_summary = true
must_emit_distinct_exit_codes = true
import_failure_exit_code = 2
runtime_call_failure_exit_code = 3
clean_exit_code = 0

[runner_contract]
keys = [
    "outcome",
    "case",
    "module",
    "fixture_module",
    "exported_function",
    "returned_value",
    "expected_returned_value",
    "failure_kind",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "user_facing_import_succeeds",
    "exported_function_returns_expected_value",
]

[out_of_scope]
# Issue: "Out of scope: importing every cclab library."
importing_every_cclab_library = true
