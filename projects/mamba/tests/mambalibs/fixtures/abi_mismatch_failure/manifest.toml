# Mambalibs ABI mismatch failure fixture — closes #2582.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the diagnostic surface when a Mode 2 mambalibs binding is
# loaded against an incompatible ABI / schema version:
#
#   - ABI mismatch does not panic or produce a vague import error.
#   - Failure message names expected and found ABI/schema version.
#   - Positive Mode 2 fixture (#2576) remains unaffected.
#
# Out of scope (issue body): designing the final ABI compatibility
# policy.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_abi_mismatch_failure_fixture_2582.rs).

version = 1
fixture = "mambalibs_abi_mismatch_failure"
issue = 2582
parent_issue = 2531
profile = "mambalibs"
family = "abi_mismatch_failure"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The fixture supplies a fake binding artifact whose embedded ABI /
# schema version intentionally disagrees with the runtime's expected
# version. The Python side attempts `from mambalibs import <name>`
# and the runner asserts the diagnostic shape.
[binding]
module_name = "mambalibs"
fixture_module = "abi_mismatch_target"
import_statement = "from mambalibs import abi_mismatch_target"
local_binding_crate_fixture_issue = 2577
must_supply_fake_artifact = true
fake_artifact_must_be_small = true
fake_artifact_must_not_be_platform_specific = true

# The runtime's expected ABI version is held by the runtime; the
# fixture artifact intentionally records a different version. The
# concrete numbers are placeholders that the runner reads — they only
# need to differ.
[abi]
expected_abi_version = "1.0.0"
found_abi_version = "0.0.0"
expected_schema_version = 1
found_schema_version = 0
versions_must_differ = true

# Acceptance: "ABI mismatch does not panic or produce a vague import
# error."
[crash_guard]
fail_if_interpreter_segfaults = true
fail_if_interpreter_aborts = true
fail_if_rust_panic_aborts_process = true
fail_if_exit_code_indicates_crash = true
must_exit_with_python_exception_not_crash = true
forbid_vague_import_error = true
vague_diagnostic_must_be_treated_as_test_failure = true

# Acceptance: "Failure message names expected and found ABI or
# schema version."
[error_message_contract]
must_raise_python_exception = true
expected_exception_type = "ImportError"
exception_message_must_name_expected_version = true
exception_message_must_name_found_version = true
expected_version_substring = "1.0.0"
found_version_substring = "0.0.0"
exception_message_must_distinguish_expected_from_found = true
must_be_deterministic = true
abi_mismatch_failure_kind = "abi_mismatch"
abi_mismatch_exit_code = 9

# Acceptance: "Positive Mode 2 fixture remains unaffected."
[positive_fixture_isolation]
positive_fixture_issue = 2576
positive_fixture_must_remain_green = true
this_fixture_must_not_affect_positive_cases = true
this_fixture_must_not_register_globally = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module",
    "expected_abi_version",
    "found_abi_version",
    "exception_type",
    "exception_message",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "abi_mismatch_raises_diagnostic_exception",
]

[out_of_scope]
# Issue: "Out of scope: designing the final ABI compatibility
# policy."
designing_final_abi_compatibility_policy = true
