# Mambalibs CLI summary JSON fixture — closes #2676.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the contract for the mambalibs build/import-gate CLI's
# machine-readable summary: workers and CI MUST be able to parse a
# JSON summary without scraping human-readable logs, every required
# field MUST be present (missing fields fail the test), and failure
# summaries MUST carry an issue or blocker reference when applicable.
#
# Acceptance (issue body):
#
#   - JSON summary can be parsed without scraping logs.
#     `[summary_emission]` pins `must_be_machine_parseable_json`
#     and `must_be_emitted_on_dedicated_stream`; the runner contract
#     carries `summary_json` as a first-class key.
#   - Missing required fields fail the test.
#     `[required_fields]` lists every key that MUST appear; the
#     `[success_case]` cross-checks every required key is present
#     in `[success_case.summary]`; the `[missing_field_case]`
#     omits one required field and pins fail/exit 1 plus a
#     diagnostic naming the missing field.
#   - Failure entry includes issue or blocker reference when
#     applicable. `[failure_case]` pins required fields
#     `linked_issue_or_blocker` + `diagnostic_message` and the
#     schema gate enforces that `linked_issue_or_blocker` appears
#     in `[required_fields_on_failure]`.
#
# Out of scope (issue body): dashboard or reporting UI.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_cli_summary_json_fixture_2676.rs).

version = 1
fixture = "mambalibs_cli_summary_json"
issue = 2676
parent_issue = 2531
profile = "mambalibs"
family = "cli_summary_json"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Summary emission contract — workers and CI parse stdout's JSON
# without inspecting the human-readable log.
[summary_emission]
must_be_machine_parseable_json = true
must_be_emitted_on_dedicated_stream = true
emission_stream = "stdout"
human_output_stream = "stderr"
human_output_must_be_concise = true
# A single JSON document per CLI invocation — not NDJSON, not
# multiple objects. Workers parse stdout end-to-end.
emission_shape = "single_json_object"

# Required fields on EVERY summary regardless of outcome. The
# schema gate enforces presence in both [success_case.summary] and
# [failure_case.summary], and refusal to omit any one of them via
# the [missing_field_case].
[required_fields]
keys = [
    "dependency_name",
    "build_status",
    "artifact_path",
    "import_status",
    "diagnostics",
    "outcome",
]

# Required fields when outcome = "fail". The runner must surface
# the linked issue or blocker so dashboards can route to the
# tracker without log scraping.
[required_fields_on_failure]
keys = [
    "linked_issue_or_blocker",
    "diagnostic_message",
]

[success_case]
case = "summary_success"
command = ["build"]
expected_outcome = "pass"
expected_exit_code = 0
must_emit_summary_json = true

[success_case.summary]
dependency_name = "mambalibs_cli_summary_json_binding"
build_status = "built"
artifact_path = "build/mambalibs_cli_summary_json_binding-0.1.0"
import_status = "imported"
diagnostics = []
outcome = "pass"

[failure_case]
case = "summary_failure"
command = ["build"]
expected_outcome = "fail"
expected_exit_code = 1
must_emit_summary_json = true

[failure_case.summary]
dependency_name = "mambalibs_cli_summary_json_binding"
build_status = "failed"
artifact_path = ""
import_status = "not_attempted"
diagnostics = ["missing required field foo in metadata"]
outcome = "fail"
linked_issue_or_blocker = "#2670"
diagnostic_message = "missing required field foo in metadata"

[missing_field_case]
case = "summary_missing_required_field"
command = ["build"]
expected_outcome = "fail"
expected_exit_code = 1
omitted_required_field = "artifact_path"
diagnostic_must_name_missing_field = true
diagnostic_must_name_missing_field_value = "artifact_path"
must_not_silently_succeed = true
must_be_deterministic = true

[diagnostic_contract]
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true
diagnostic_must_name_missing_field_field_key = "missing_field"
linked_issue_or_blocker_field_key = "linked_issue_or_blocker"

[runner_contract]
keys = [
    "outcome",
    "case",
    "summary_json",
    "summary_parse_status",
    "missing_field",
    "linked_issue_or_blocker",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "summary_success",
    "summary_failure",
    "summary_missing_required_field",
]

[out_of_scope]
# Issue: "Out of scope: dashboard or reporting UI."
dashboard_or_reporting_ui = true
