# Mambalibs schema import gate fixture — closes #2839.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the contract for a focused import gate that exercises the
# cclab schema library through the mambalibs Mode 2 surface. The
# gate either asserts ONE minimal exported symbol (when supported)
# or emits a structured blocker entry linked to the tracking
# issue. Either way, the gate publishes a status into the
# mambalibs real-library gate summary.
#
# Acceptance (issue body):
#
#   - Import success is asserted or unsupported status is linked
#     to a blocker.
#     `[supported_case]` pins the pass path through a minimal
#     symbol assertion; `[blocked_case]` pins the blocked outcome
#     with `linked_blocker_issue`; the schema gate enforces that
#     EXACTLY ONE of the two is selected via
#     `[support_status].current_status`.
#   - Failure output names schema and mambalibs.
#     `[diagnostic_contract]` pins
#     `diagnostic_must_name_library = "schema"` and
#     `diagnostic_must_name_surface = "mambalibs"`.
#   - Test uses a tiny deterministic schema sample only if needed.
#     `[sample_policy]` pins `must_be_tiny` + `must_be_deterministic`
#     and `max_sample_bytes` so the gate can not regress into a
#     heavyweight workload.
#
# Out of scope (issue body): full schema validation behavior.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_schema_import_gate_fixture_2839.rs).

version = 1
fixture = "mambalibs_schema_import_gate"
issue = 2839
parent_issue = 2531
profile = "mambalibs"
family = "schema_import_gate"
library = "schema"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The mambalibs entry point under test. The import statement must
# use the documented mambalibs surface; the minimal exported
# symbol is the smallest publicly-named surface the supported case
# probes.
[binding]
surface = "mambalibs"
library = "schema"
import_statement = "from mambalibs import schema"
minimal_exported_symbol = "Schema"

# Three-valued support status enum; same shape as #2677. The
# runner publishes the chosen value into the mambalibs real-
# library gate summary.
[support_status]
allowed_values = ["pass", "xfail", "blocker"]
default_status = "blocker"
current_status = "blocker"
status_must_be_one_of_allowed = true

[supported_case]
case = "schema_import_supported"
command = ["run", "fixture_call.py"]
expected_outcome = "pass"
expected_exit_code = 0
status_under_which_applicable = "pass"
must_import_module = true
must_assert_minimal_symbol = true
asserted_symbol = "Schema"
symbol_assertion_kind = "hasattr"

[blocked_case]
case = "schema_import_blocked"
command = ["report-status"]
expected_outcome = "blocked"
expected_exit_code = 0
status_under_which_applicable = "blocker"
linked_blocker_issue = 2839
must_emit_structured_blocker = true
must_name_offending_library = "schema"
must_name_surface = "mambalibs"
must_not_attempt_import = true

# Acceptance: "Failure output names schema and mambalibs."
[diagnostic_contract]
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true
diagnostic_must_name_library = "schema"
diagnostic_must_name_surface = "mambalibs"
diagnostic_must_name_library_field_key = "library"
diagnostic_must_name_surface_field_key = "surface"
diagnostic_must_name_linked_blocker_field_key = "linked_blocker_issue"

# Acceptance: "Test uses a tiny deterministic schema sample only
# if needed."
[sample_policy]
must_be_tiny = true
must_be_deterministic = true
sample_required_when_supported_path_runs = false
max_sample_bytes = 128
forbid_network_io = true
forbid_disk_io_outside_artifact_root = true

# Acceptance: "Register schema in the mambalibs real-library gate
# summary." The gate-summary field name is library-scoped so each
# import gate publishes its own slot.
[gate_summary_contract]
field_name = "schema_import_status"
field_source_block = "support_status"
field_source_key = "current_status"
allowed_field_values = ["pass", "xfail", "blocker"]

[runner_contract]
keys = [
    "outcome",
    "case",
    "surface",
    "library",
    "import_statement",
    "asserted_symbol",
    "schema_import_status",
    "linked_blocker_issue",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "blocked", "missing", "skip"]
case_values = ["schema_import_supported", "schema_import_blocked"]

[out_of_scope]
# Issue: "Out of scope: full schema validation behavior."
full_schema_validation_behavior = true
