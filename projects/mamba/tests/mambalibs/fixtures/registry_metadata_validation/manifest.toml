# Mambalibs registry metadata validation fixture — closes #2670.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the shape of the registry-metadata document for a single
# Mode 2 binding crate and the validator that accepts/rejects it.
# The validator is offline-only — no real remote registry traffic;
# `[out_of_scope]` mirrors the issue body.
#
# Acceptance (issue body):
#
#   - Valid fixture metadata passes validation.
#     `[valid_metadata_case]` carries every required field; the
#     fixture pins the validator to "pass" on that exact document.
#   - Missing ABI or export metadata fails validation.
#     `[missing_abi_case]` and `[missing_exports_case]` pin
#     "fail" outcome with the offending field name.
#   - Diagnostic names the missing field.
#     Each failing case pins
#     `diagnostic_must_name_missing_field = true`; the runner
#     contract carries `missing_field` as a first-class key.
#
# Out of scope (issue body): real remote registry implementation.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_registry_metadata_validation_fixture_2670.rs).

version = 1
fixture = "mambalibs_registry_metadata_validation"
issue = 2670
parent_issue = 2531
profile = "mambalibs"
family = "registry_metadata"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The registry metadata schema for a Mode 2 binding crate. Every
# required field is enumerated here so the validator can
# cross-check; per-case blocks below omit individual fields to
# drive the missing-field diagnostics.
[required_fields]
fields = ["name", "version", "abi", "artifact", "exports"]
must_all_be_non_empty = true

# A single Mode 2 binding crate — same shape as #2666/#2667/#2668/#2669.
[binding]
crate_name = "mambalibs_registry_metadata_validation_binding"
module_name = "mambalibs"
exported_function = "echo_roundtrip"

# Acceptance: "Valid fixture metadata passes validation." A
# complete metadata document — name, version, abi, artifact,
# exports — must validate cleanly.
[valid_metadata_case]
case = "valid_metadata"
metadata_file = "metadata.json"
expected_outcome = "pass"
expected_exit_code = 0
diagnostic_must_be_empty = true

# The metadata document this case pins. Each required field is
# populated; the validator MUST accept this exact document.
[valid_metadata_case.metadata]
name = "mambalibs_registry_metadata_validation_binding"
version = "0.1.0"
abi = "mamba-mode2-v1"
artifact = "mambalibs_registry_metadata_validation_binding-0.1.0.mamba"
exports = ["echo_roundtrip"]

# Acceptance: "Missing ABI or export metadata fails validation."
# Two distinct failure cases — one missing `abi`, one missing
# `exports` — each pinned to fail with a diagnostic that names the
# missing field.
[missing_abi_case]
case = "missing_abi"
metadata_file = "metadata_missing_abi.json"
omitted_field = "abi"
expected_outcome = "fail"
expected_exit_code = 1
diagnostic_must_name_missing_field = true
diagnostic_must_name_field_value = "abi"
must_not_silently_accept = true

[missing_exports_case]
case = "missing_exports"
metadata_file = "metadata_missing_exports.json"
omitted_field = "exports"
expected_outcome = "fail"
expected_exit_code = 1
diagnostic_must_name_missing_field = true
diagnostic_must_name_field_value = "exports"
must_not_silently_accept = true

# Acceptance: "Diagnostic names the missing field." Apply to every
# failing case via a single contract block.
[diagnostic_contract]
diagnostic_must_name_offending_metadata_file = true
diagnostic_must_name_missing_field_key = "missing_field"
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "metadata_file",
    "missing_field",
    "validator_decision",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = ["valid_metadata", "missing_abi", "missing_exports"]

[out_of_scope]
# Issue: "Out of scope: real remote registry implementation."
real_remote_registry_implementation = true
