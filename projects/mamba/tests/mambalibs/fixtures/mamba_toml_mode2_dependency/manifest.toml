# Mambalibs mamba.toml Mode 2 dependency fixture — closes #2575.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the shape of a project's mamba.toml that declares a local
# Mode 2 binding crate dependency:
#
#   - `[dependencies]` (or Mode 2 stanza) names the local binding
#     crate fixture and points at a local path.
#   - The parser sees the dependency in tests.
#   - The syntax matches the documented target workflow so the
#     mambalibs E2E harness can consume the fixture verbatim.
#
# Acceptance:
#   - Fixture parse test fails if the dependency stanza is removed.
#   - Fixture is usable by the mambalibs E2E harness.
#   - The syntax matches the documented target workflow.
#
# Out of scope (issue body): resolver implementation changes.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_mamba_toml_mode2_dependency_fixture_2575.rs).

version = 1
fixture = "mambalibs_mamba_toml_mode2_dependency"
issue = 2575
parent_issue = 2531
profile = "mambalibs"
family = "mamba_toml_mode2_dependency"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The actual contents that the project's mamba.toml MUST carry. The
# stanza name and key names track the documented Mode 2 syntax. The
# local binding crate this fixture depends on is the #2577 local
# Mode 2 binding crate fixture.
[mamba_toml]
section_name = "dependencies"
dependency_name = "mambalibs_local_binding"
dependency_source_kind = "local_path"
dependency_path = "../mambalibs_local_binding_crate"
dependency_mode = 2
mode_field_name = "mode"
path_field_name = "path"
declared_in_section = "dependencies"
local_binding_crate_fixture_issue = 2577

# Acceptance: "Fixture parse test fails if the dependency stanza is
# removed." A parser walking the resulting mamba.toml MUST observe
# `[dependencies].mambalibs_local_binding`; removing the stanza MUST
# flip the test result. Cross-fixture reference: the E2E harness
# fixture (#2578) consumes this fixture's mamba.toml verbatim.
[dependency_stanza_removal_case]
case = "dependency_stanza_present"
must_observe_section = "dependencies"
must_observe_dependency_name = "mambalibs_local_binding"
parse_must_fail_if_stanza_removed = true
parse_must_fail_diagnostic_names_dependency_name = true
parse_failure_exit_code_when_missing = 1
expected_outcome_when_present = "pass"
expected_outcome_when_removed = "fail"

# Acceptance: "Fixture is usable by the mambalibs E2E harness."
[e2e_harness_compatibility]
mamba_build_e2e_fixture_issue = 2578
must_be_consumable_by_e2e_harness_verbatim = true
must_not_require_post_processing = true
must_resolve_local_binding_crate_via_relative_path = true
relative_path_root = "fixture_project_dir"

# Acceptance: "The syntax matches the documented target workflow."
[documented_workflow_match]
documented_section_name = "dependencies"
documented_mode_field_name = "mode"
documented_path_field_name = "path"
documented_mode_value_for_mode2 = 2
must_match_documented_section_name = true
must_match_documented_mode_field_name = true
must_match_documented_path_field_name = true
must_match_documented_mode_value = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "section_name",
    "dependency_name",
    "dependency_source_kind",
    "dependency_path",
    "dependency_mode",
    "parse_failure_diagnostic",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "dependency_stanza_present",
    "dependency_stanza_removed",
]

[out_of_scope]
# Issue: "Out of scope: resolver implementation changes."
resolver_implementation_changes = true
