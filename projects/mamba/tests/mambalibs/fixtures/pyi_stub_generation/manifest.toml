# Mambalibs .pyi stub generation fixture — closes #2668.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the contract for typing-stub emission from a Mode 2 binding:
# Mode 2 must either generate a .pyi stub that names the exported
# module + function signature, or report the missing-stub-generator
# as a linked blocker — never silently pass.
#
# Acceptance (issue body):
#
#   - Stub output includes the exported module and function
#     signature.
#     `[stub_generation_case]` pins must_include_module_name,
#     must_include_function_signature, must_include_param_kinds,
#     must_include_return_kind.
#   - Missing stub generation is reported with a linked blocker,
#     not silent pass.
#     `[missing_stub_generator_case]` pins blocked outcome +
#     linked_blocker_issue; `[unsupported_behavior_contract]`
#     forbids silent passes.
#   - Import fixture still works independently.
#     `[import_independence]` pins the cross-fixture invariant —
#     #2666 type-roundtrip must remain green regardless of stub
#     state.
#
# Out of scope (issue body): full typing coverage for every
# library — fixture covers ONE function on ONE binding.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_pyi_stub_generation_fixture_2668.rs).

version = 1
fixture = "mambalibs_pyi_stub_generation"
issue = 2668
parent_issue = 2531
profile = "mambalibs"
family = "pyi_stub_generation"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The same Mode 2 binding shape used by #2666 + #2667. The stub
# generator runs over this binding and writes the expected .pyi
# artifact next to the built wheel.
[binding]
module_name = "mambalibs"
binding_crate = "mambalibs_pyi_stub_generation_binding"
exported_function = "echo_roundtrip"
import_statement = "from mambalibs import echo_roundtrip"
function_signature = "echo_roundtrip(value: str | int | bool) -> str | int | bool"
param_kinds = ["str", "int", "bool"]
return_kind = "str | int | bool"

# Acceptance: "Stub output includes the exported module and
# function signature."
[stub_artifact]
filename = "mambalibs.pyi"
must_be_deterministic = true
must_be_byte_identical_on_replay = true
stub_kind = "pyi"
ships_alongside_wheel = true

[stub_generation_case]
case = "stub_emitted"
command = ["build", "--emit-stubs"]
expected_outcome = "pass"
expected_exit_code = 0
must_create_stub_artifact = true
must_include_module_name = "mambalibs"
must_include_exported_function = "echo_roundtrip"
must_include_function_signature = true
must_include_param_kinds = ["str", "int", "bool"]
must_include_return_kind = "str | int | bool"

# Acceptance: "Missing stub generation is reported with a linked
# blocker, not silent pass." When the stub generator is absent or
# disabled, the case MUST report `blocked` outcome and surface the
# blocker issue id — exit 0 with no stub is a silent pass and is
# forbidden.
[missing_stub_generator_case]
case = "stub_generator_missing"
command = ["build", "--emit-stubs"]
expected_outcome = "blocked"
forbid_silent_pass = true
must_not_create_stub_artifact = true
must_report_missing_generator = true
linked_blocker_issue = 2668
diagnostic_must_name_blocker_issue = true
diagnostic_must_name_offending_feature = "stub_generation"

[unsupported_behavior_contract]
when_stub_generation_unsupported_outcome = "blocked"
forbid_silent_pass = true
must_link_to_blocker_issue = 2668
must_distinguish_blocked_from_fail = true

# Acceptance: "Import fixture still works independently." Stub
# generation is OPTIONAL on the import path — disabling stubs
# MUST NOT regress #2666 type-roundtrip behavior.
[import_independence]
type_roundtrip_fixture_must_remain_green = true
type_roundtrip_fixture_issue = 2666
disabling_stub_generation_must_not_break_import = true
stub_artifact_is_optional_for_import = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module",
    "exported_function",
    "stub_artifact_path",
    "stub_artifact_present",
    "blocker_issue",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip", "blocked"]
case_values = ["stub_emitted", "stub_generator_missing"]

[out_of_scope]
# Issue: "Out of scope: full typing coverage for every library."
full_typing_coverage_for_every_library = true
