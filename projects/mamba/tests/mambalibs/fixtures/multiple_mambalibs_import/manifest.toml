# Mambalibs multiple-import fixture — closes #2580.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the shape of a single Python interpreter run that imports
# TWO Mode 2 libraries through mambalibs and verifies both exported
# functions return their own values without namespace collisions:
#
#   - Both imports succeed in a single interpreter run.
#   - A namespace collision fails with a clear test failure.
#   - Fixture stays offline and deterministic.
#
# Out of scope (issue body): testing all cclab libraries.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_multiple_mambalibs_import_fixture_2580.rs).

version = 1
fixture = "mambalibs_multiple_mambalibs_import"
issue = 2580
parent_issue = 2531
profile = "mambalibs"
family = "multiple_mambalibs_import"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[binding]
module_name = "mambalibs"
must_run_in_single_interpreter = true
must_be_deterministic = true
must_be_offline = true
local_binding_crate_fixture_issue = 2577

[[modules]]
fixture_module = "multi_import_module_a"
exported_function = "answer_a"
import_statement = "from mambalibs import multi_import_module_a"
expected_return_value = 42

[[modules]]
fixture_module = "multi_import_module_b"
exported_function = "answer_b"
import_statement = "from mambalibs import multi_import_module_b"
expected_return_value = 43

# Acceptance: "Both imports succeed in a single interpreter run."
[multi_import_case]
case = "both_modules_import_in_one_run"
must_import_both_in_single_interpreter = true
must_assert_each_exported_function_returns_own_value = true
expected_outcome_when_both_imports_succeed = "pass"
expected_outcome_when_either_import_fails = "fail"
both_imports_failure_kind = "import_failure"
both_imports_failure_exit_code = 2

# Acceptance: "A namespace collision fails with a clear test failure."
[namespace_collision_case]
case = "namespace_collision_is_clear_failure"
must_detect_namespace_collision = true
must_emit_clear_failure_diagnostic = true
collision_failure_kind = "namespace_collision"
collision_failure_exit_code = 7
collision_diagnostic_must_name_colliding_modules = true
collision_diagnostic_must_distinguish_from_import_failure = true
must_not_silently_overwrite_module_binding = true
expected_outcome_when_collision_detected = "fail"

# Acceptance: "Fixture stays offline and deterministic."
[offline_and_deterministic_invariant]
must_be_offline = true
must_be_deterministic = true
forbid_network_access = true
forbid_nondeterministic_inputs = true
must_only_use_local_binding_crates = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module",
    "module_a",
    "module_b",
    "returned_value_a",
    "returned_value_b",
    "expected_returned_value_a",
    "expected_returned_value_b",
    "failure_kind",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "both_modules_import_in_one_run",
    "namespace_collision_is_clear_failure",
]

[out_of_scope]
# Issue: "Out of scope: testing all cclab libraries."
testing_all_cclab_libraries = true
