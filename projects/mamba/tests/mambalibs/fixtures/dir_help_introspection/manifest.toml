# Mambalibs dir/help introspection fixture â€” closes #2667.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the contract for basic Python introspection over an imported
# Mode 2 binding module: dir(), getattr(), and __doc__/__name__ must
# reveal the exported function. The fixture extends the local Mode 2
# binding crate fixture used by #2666 â€” same binding shape, no
# production library behavior changed.
#
# Acceptance (issue body):
#
#   - Fixture fails if exported symbols are hidden from dir or
#     getattr.
#     `[hidden_symbol_guard]` pins the fail flags; per-probe cases
#     pin pass outcomes that depend on the symbol being visible.
#   - Failure distinguishes import failure from introspection
#     failure.
#     `[outcome_distinction]` pins two disjoint failure modes; the
#     runner_contract carries dedicated outcome values.
#   - No production cclab library behavior is changed.
#     `[no_production_change].cclab_library_behavior_unchanged =
#     true`; the fixture lives entirely under
#     `tests/mambalibs/fixtures/dir_help_introspection`.
#
# Out of scope (issue body): rich inspect.signature support.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_dir_help_introspection_fixture_2667.rs).

version = 1
fixture = "mambalibs_dir_help_introspection"
issue = 2667
parent_issue = 2531
profile = "mambalibs"
family = "introspection"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Same Mode 2 binding shape as the type-roundtrip fixture: one
# exported function, primitive values only. Introspection probes
# the imported module surface; the function MUST be discoverable.
[binding]
module_name = "mambalibs"
binding_crate = "mambalibs_dir_help_introspection_binding"
exported_function = "echo_roundtrip"
import_statement = "from mambalibs import echo_roundtrip"
# The module-level introspection probes (`dir`, `getattr`,
# `__doc__`, `__name__`) target the bound module name above. A
# hidden symbol or absent attribute means the binding surface is
# broken â€” fail the case.
must_be_introspectable = true

# Acceptance: "Add a fixture calling dir(), getattr(), and __doc__
# or __name__ on the imported binding module."

[dir_case]
case = "dir_lists_exported_function"
probe = "dir(mambalibs)"
expected_outcome = "pass"
exported_symbol = "echo_roundtrip"
must_contain_exported_symbol = true
diagnostic_must_name_symbol = true
diagnostic_must_name_module = true

[getattr_case]
case = "getattr_returns_exported_function"
probe = "getattr(mambalibs, 'echo_roundtrip')"
expected_outcome = "pass"
exported_symbol = "echo_roundtrip"
must_return_callable = true
must_not_raise_attribute_error = true
diagnostic_must_name_symbol = true

[doc_or_name_case]
case = "doc_or_name_attribute_present"
# At least one of __doc__ or __name__ MUST be set on the imported
# module. The fixture treats either as sufficient.
probes = ["mambalibs.__name__", "mambalibs.__doc__"]
expected_outcome = "pass"
at_least_one_must_be_non_none = true
expected_name_value = "mambalibs"
diagnostic_must_name_attribute = true

# Acceptance: "Fixture fails if exported symbols are hidden from
# dir or getattr." A binding that imports cleanly but omits the
# exported symbol from `dir()` or returns AttributeError from
# `getattr()` MUST fail the gate, not silently pass.
[hidden_symbol_guard]
fail_if_symbol_missing_from_dir = true
fail_if_getattr_raises_attribute_error = true
fail_if_doc_and_name_both_none = true
diagnostic_must_name_offending_symbol = true
diagnostic_must_name_offending_probe = true

# Acceptance: "Failure distinguishes import failure from
# introspection failure." Two disjoint failure modes â€” the runner
# must label each one distinctly so a CI report shows whether the
# binding failed to load at all vs. loaded but exposed a broken
# surface.
[outcome_distinction]
import_failure_outcome = "import_failure"
introspection_failure_outcome = "introspection_failure"
must_be_disjoint = true
diagnostic_must_name_failure_mode = true

# Acceptance: "No production cclab library behavior is changed."
# Test sandbox lives entirely under the fixture directory; no
# production crate edits, no upstream stdlib changes.
[no_production_change]
cclab_library_behavior_unchanged = true
fixture_scope_path = "tests/mambalibs/fixtures/dir_help_introspection"
forbid_touching_production_crates = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module",
    "exported_symbol",
    "probe",
    "probe_result",
    "failure_mode",
    "diagnostic_message",
    "exit_code",
]
outcome_values = [
    "pass",
    "fail",
    "missing",
    "skip",
    "import_failure",
    "introspection_failure",
]
case_values = [
    "dir_lists_exported_function",
    "getattr_returns_exported_function",
    "doc_or_name_attribute_present",
]

[out_of_scope]
# Issue: "Out of scope: rich inspect.signature support."
rich_inspect_signature_support = true
