# Mambalibs log import gate fixture — closes #2841.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the import gate for the cclab log library through the
# mambalibs Mode 2 surface. The third acceptance — "Test avoids
# global logging side effects where possible." — is pinned via the
# `[side_effect_policy]` block.
#
# Out of scope (issue body): full logging pipeline behavior.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_log_import_gate_fixture_2841.rs).

version = 1
fixture = "mambalibs_log_import_gate"
issue = 2841
parent_issue = 2531
profile = "mambalibs"
family = "log_import_gate"
library = "log"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[binding]
surface = "mambalibs"
library = "log"
import_statement = "from mambalibs import log"
minimal_exported_symbol = "Logger"

[support_status]
allowed_values = ["pass", "xfail", "blocker"]
default_status = "blocker"
current_status = "blocker"
status_must_be_one_of_allowed = true

[supported_case]
case = "log_import_supported"
command = ["run", "fixture_call.py"]
expected_outcome = "pass"
expected_exit_code = 0
status_under_which_applicable = "pass"
must_import_module = true
must_assert_minimal_symbol = true
asserted_symbol = "Logger"
symbol_assertion_kind = "hasattr"

[blocked_case]
case = "log_import_blocked"
command = ["report-status"]
expected_outcome = "blocked"
expected_exit_code = 0
status_under_which_applicable = "blocker"
linked_blocker_issue = 2841
must_emit_structured_blocker = true
must_name_offending_library = "log"
must_name_surface = "mambalibs"
must_not_attempt_import = true

[diagnostic_contract]
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true
diagnostic_must_name_library = "log"
diagnostic_must_name_surface = "mambalibs"
diagnostic_must_name_library_field_key = "library"
diagnostic_must_name_surface_field_key = "surface"
diagnostic_must_name_linked_blocker_field_key = "linked_blocker_issue"

# Acceptance: "Test avoids global logging side effects where
# possible."
[side_effect_policy]
must_avoid_root_logger_mutation = true
must_avoid_global_handler_registration = true
must_not_emit_records_outside_artifact_root = true
allow_temporary_local_logger = true
rationale = """\
Tests sharing process-global root-logger state are flaky and \
leak side effects across the suite. The import gate exercises \
the import surface only; if any logging call is needed, use a \
local logger scoped to the fixture's artifact root."""

[gate_summary_contract]
field_name = "log_import_status"
field_source_block = "support_status"
field_source_key = "current_status"
allowed_field_values = ["pass", "xfail", "blocker"]

[runner_contract]
keys = [
    "outcome",
    "case",
    "surface",
    "library",
    "import_statement",
    "asserted_symbol",
    "log_import_status",
    "linked_blocker_issue",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "blocked", "missing", "skip"]
case_values = ["log_import_supported", "log_import_blocked"]

[out_of_scope]
# Issue: "Out of scope: full logging pipeline behavior."
full_logging_pipeline_behavior = true
