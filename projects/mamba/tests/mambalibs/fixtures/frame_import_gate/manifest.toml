# Mambalibs frame import gate fixture — closes #2840.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Pins the contract for a focused import gate that exercises the
# cclab frame library through the mambalibs Mode 2 surface. The
# gate asserts ONE minimal exported symbol on the supported path
# or emits a structured blocker on the unsupported path; the chosen
# status is published into the mambalibs real-library gate summary.
#
# Acceptance (issue body):
#
#   - Import success is asserted or unsupported status is linked
#     to a blocker.
#     `[supported_case]` asserts the minimal symbol;
#     `[blocked_case]` carries `linked_blocker_issue = 2840`.
#   - Failure output names frame and mambalibs.
#     `[diagnostic_contract]` pins both literal names and exposes
#     the corresponding field keys in `[runner_contract].keys`.
#   - Test uses tiny in-memory data only if needed.
#     `[sample_policy]` pins `must_be_tiny`, `must_be_in_memory`,
#     `forbid_disk_io_outside_artifact_root`, and a tight
#     `max_sample_bytes`.
#
# Out of scope (issue body): dataframe operation coverage.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_frame_import_gate_fixture_2840.rs).

version = 1
fixture = "mambalibs_frame_import_gate"
issue = 2840
parent_issue = 2531
profile = "mambalibs"
family = "frame_import_gate"
library = "frame"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[binding]
surface = "mambalibs"
library = "frame"
import_statement = "from mambalibs import frame"
minimal_exported_symbol = "Frame"

[support_status]
allowed_values = ["pass", "xfail", "blocker"]
default_status = "blocker"
current_status = "blocker"
status_must_be_one_of_allowed = true

[supported_case]
case = "frame_import_supported"
command = ["run", "fixture_call.py"]
expected_outcome = "pass"
expected_exit_code = 0
status_under_which_applicable = "pass"
must_import_module = true
must_assert_minimal_symbol = true
asserted_symbol = "Frame"
symbol_assertion_kind = "hasattr"

[blocked_case]
case = "frame_import_blocked"
command = ["report-status"]
expected_outcome = "blocked"
expected_exit_code = 0
status_under_which_applicable = "blocker"
linked_blocker_issue = 2840
must_emit_structured_blocker = true
must_name_offending_library = "frame"
must_name_surface = "mambalibs"
must_not_attempt_import = true

[diagnostic_contract]
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true
diagnostic_must_name_library = "frame"
diagnostic_must_name_surface = "mambalibs"
diagnostic_must_name_library_field_key = "library"
diagnostic_must_name_surface_field_key = "surface"
diagnostic_must_name_linked_blocker_field_key = "linked_blocker_issue"

# Acceptance: "Test uses tiny in-memory data only if needed."
[sample_policy]
must_be_tiny = true
must_be_in_memory = true
must_be_deterministic = true
sample_required_when_supported_path_runs = false
max_sample_bytes = 256
forbid_network_io = true
forbid_disk_io_outside_artifact_root = true

[gate_summary_contract]
field_name = "frame_import_status"
field_source_block = "support_status"
field_source_key = "current_status"
allowed_field_values = ["pass", "xfail", "blocker"]

[runner_contract]
keys = [
    "outcome",
    "case",
    "surface",
    "library",
    "import_statement",
    "asserted_symbol",
    "frame_import_status",
    "linked_blocker_issue",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "blocked", "missing", "skip"]
case_values = ["frame_import_supported", "frame_import_blocked"]

[out_of_scope]
# Issue: "Out of scope: dataframe operation coverage."
dataframe_operation_coverage = true
