# Mode 2 fetch + cargo workspace synth fixture — closes #2520.
# Umbrella: #2459 (MVP mambalibs).
# Depends: #2519 (mamba.toml schema for Mode 2 [dependencies]).
#
# Pins the shape of the Mode 2 `mamba build` fetch + workspace
# synth pass: from `mamba.toml [dependencies]` fetch (git/registry)
# the third-party binding crate, synthesize a cargo workspace, and
# re-link the mamba binary:
#
#   - Example external crate becomes `import`-able from a mamba
#     script after `mamba build`.
#
# Out of scope: the underlying schema definition (owned by #2519)
# and the binary-equivalence reproducibility decision (owned by
# #2522).
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/fetch_and_workspace_synth_fixture_2520.rs).

version = 1
fixture = "fetch_and_workspace_synth"
issue = 2520
umbrella_issue = 2459
depends_on_issue = 2519
profile = "mambalibs"
family = "fetch_and_workspace_synth"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
mode = "mode_2"
must_cover_fetch_from_mamba_toml_dependencies = true
must_cover_cargo_workspace_synthesis = true
must_cover_relink_mamba_binary = true
must_cover_external_crate_importable_after_build = true
must_use_offline_frozen_source_index = true

# Canonical Mode 2 build sources. Git and registry are listed; the
# offline default gate uses a frozen local source index to satisfy
# both shapes deterministically.
[fetch_sources_contract]
case = "fetch_sources_cover_git_and_registry"
must_cover_git_source = true
must_cover_registry_source = true
must_cover_offline_frozen_source_index = true
forbid_resolving_to_live_git_remote_in_default_gate = true
forbid_resolving_to_live_registry_remote_in_default_gate = true
fetch_source_field_name = "fetch_source"
allowed_fetch_source_kinds = ["git", "registry", "frozen_local_source_index"]
forbid_unknown_fetch_source_kind = true
unknown_fetch_source_failure_kind = "mambalibs_fetch_source_unknown_kind"
unknown_fetch_source_exit_code = 234
network_access_in_default_gate_failure_kind = "mambalibs_fetch_network_access_in_default_gate"
network_access_in_default_gate_exit_code = 235
must_distinguish_unknown_source_kind_from_network_access_in_default_gate = true

[cargo_workspace_synthesis_contract]
case = "cargo_workspace_synthesis_includes_host_and_each_binding_crate"
must_synthesize_cargo_workspace = true
must_include_host_crate_in_workspace = true
must_include_each_binding_crate_in_workspace = true
must_emit_synthesized_workspace_manifest = true
forbid_synthesizing_workspace_outside_project = true
forbid_overwriting_user_provided_cargo_toml = true
forbid_partial_workspace_synthesis = true
synthesized_workspace_relative_path = "target/mamba_build/workspace"
workspace_manifest_relative_path = "target/mamba_build/workspace/Cargo.toml"
synthesized_workspace_relative_path_field_name = "synthesized_workspace_path"
workspace_manifest_relative_path_field_name = "workspace_manifest_path"
workspace_missing_failure_kind = "mambalibs_synth_workspace_missing"
workspace_missing_exit_code = 236
workspace_outside_project_failure_kind = "mambalibs_synth_workspace_outside_project"
workspace_outside_project_exit_code = 237
must_distinguish_missing_workspace_from_workspace_outside_project = true

# Acceptance: "Example external crate becomes `import`-able from a
# mamba script after `mamba build`."
[importable_after_build_contract]
case = "example_external_crate_importable_from_mamba_script_after_mamba_build"
must_relink_mamba_binary_after_synth = true
must_register_binding_module_in_mambalibs_namespace = true
must_resolve_from_mambalibs_import_after_build = true
forbid_silent_skip_of_relink_phase = true
forbid_silent_skip_of_module_registration = true
forbid_importable_check_being_skipped = true
example_external_crate_name = "mamba_external_demo_dep"
example_external_crate_version = "0.1.0"
example_external_crate_python_import = "from mambalibs import mamba_external_demo_dep"
example_external_crate_python_import_field_name = "example_python_import_statement"
relink_phase_skipped_failure_kind = "mambalibs_relink_phase_skipped"
relink_phase_skipped_exit_code = 238
module_registration_skipped_failure_kind = "mambalibs_module_registration_skipped"
module_registration_skipped_exit_code = 239
importable_check_skipped_failure_kind = "mambalibs_importable_check_skipped"
importable_check_skipped_exit_code = 240
must_distinguish_relink_skip_from_module_registration_skip = true
must_distinguish_module_registration_skip_from_importable_check_skip = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "fetch_source",
    "synthesized_workspace_path",
    "workspace_manifest_path",
    "example_python_import_statement",
    "binding_crate_name",
    "binding_crate_version",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fetch_sources_cover_git_and_registry",
    "cargo_workspace_synthesis_includes_host_and_each_binding_crate",
    "example_external_crate_importable_from_mamba_script_after_mamba_build",
]

[out_of_scope]
# Issue body: schema is owned by #2519, binary reproducibility is
# owned by #2522. This fixture pins only the fetch + workspace
# synth + relink shape.
mamba_toml_dependencies_schema_definition = true
binary_equivalence_reproducibility_decision = true
runtime_implementation_of_fetch = true
runtime_implementation_of_workspace_synth = true
runtime_implementation_of_relink_phase = true
runtime_implementation_of_mambalibs_module_registration = true
