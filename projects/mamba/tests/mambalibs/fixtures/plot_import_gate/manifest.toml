# Mambalibs plot import gate fixture — closes #2845.
# Parent: #2531 (Mode 2 mambalibs MVP cohort).
#
# Third acceptance ("Test does not require GUI or display services.")
# is pinned via [gui_policy].
#
# Out of scope (issue body): rendering correctness.
#
# Shape locked by tests/mambalibs_integration.rs (mod: tests/mambalibs/mambalibs_plot_import_gate_fixture_2845.rs).

version = 1
fixture = "mambalibs_plot_import_gate"
issue = 2845
parent_issue = 2531
profile = "mambalibs"
family = "plot_import_gate"
library = "plot"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[binding]
surface = "mambalibs"
library = "plot"
import_statement = "from mambalibs import plot"
minimal_exported_symbol = "Figure"

[support_status]
allowed_values = ["pass", "xfail", "blocker"]
default_status = "blocker"
current_status = "blocker"
status_must_be_one_of_allowed = true

[supported_case]
case = "plot_import_supported"
command = ["run", "fixture_call.py"]
expected_outcome = "pass"
expected_exit_code = 0
status_under_which_applicable = "pass"
must_import_module = true
must_assert_minimal_symbol = true
asserted_symbol = "Figure"
symbol_assertion_kind = "hasattr"

[blocked_case]
case = "plot_import_blocked"
command = ["report-status"]
expected_outcome = "blocked"
expected_exit_code = 0
status_under_which_applicable = "blocker"
linked_blocker_issue = 2845
must_emit_structured_blocker = true
must_name_offending_library = "plot"
must_name_surface = "mambalibs"
must_not_attempt_import = true

[diagnostic_contract]
diagnostic_must_be_deterministic = true
diagnostic_must_be_actionable = true
diagnostic_must_name_library = "plot"
diagnostic_must_name_surface = "mambalibs"
diagnostic_must_name_library_field_key = "library"
diagnostic_must_name_surface_field_key = "surface"
diagnostic_must_name_linked_blocker_field_key = "linked_blocker_issue"

# Acceptance: "Test does not require GUI or display services."
[gui_policy]
must_not_open_display = true
must_not_require_window_server = true
must_not_initialize_gui_backend = true
must_not_read_display_env_vars = true
must_run_headless = true
forbidden_env_vars = ["DISPLAY", "WAYLAND_DISPLAY", "XAUTHORITY", "XDG_SESSION_TYPE"]
rationale = """\
The import gate exercises the mambalibs plot import surface ONLY. \
Opening a display, initializing a GUI backend (Qt/Tk/GTK), or reading \
DISPLAY/WAYLAND_DISPLAY would make the test depend on a windowing \
system — unacceptable for a deterministic headless offline gate."""

[gate_summary_contract]
field_name = "plot_import_status"
field_source_block = "support_status"
field_source_key = "current_status"
allowed_field_values = ["pass", "xfail", "blocker"]

[runner_contract]
keys = [
    "outcome",
    "case",
    "surface",
    "library",
    "import_statement",
    "asserted_symbol",
    "plot_import_status",
    "linked_blocker_issue",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "blocked", "missing", "skip"]
case_values = ["plot_import_supported", "plot_import_blocked"]

[out_of_scope]
# Issue: "Out of scope: rendering correctness."
rendering_correctness = true
