# CPython Lib/test denominator fixture — closes #1396.
# Related: #1265 (Goal 1: CPython 3.12 compat), #1397 (typeshed
# surface), PyPy's buildbot summary.
#
# Pins the shape of the canonical mamba conformance denominator.
# The previous metric was self-defined (`cargo test` ~974 hand-written
# fixtures, 100% pass rate against what we wrote). The canonical
# denominator must be CPython's own `Lib/test/test_*.py` so the
# percentage is "we pass Python", not "we pass what we wrote":
#
#   - The runner iterates `Lib/test/test_*.py`, runs each through
#     mamba, and records pass / fail / skip / error per module.
#   - Modules are tiered T1 (language core), T2 (frequently used
#     stdlib), T3 (long tail), and tier totals are reported in
#     `T1 N/M, T2 N/M, T3 N/M` form.
#   - The self-defined fixture percentage MUST NOT be passed off as
#     conformance — it is a regression-prevention metric, separate
#     from this denominator.
#
# Out of scope: behavioural correctness of any individual API
# inside Lib/test, surface coverage (owned by #1397), upstreaming
# CPython.
#
# Shape locked by src/meta_gates/tests/cpython_lib_test_denominator_gate.rs.

version = 1
fixture = "cpython_lib_test_denominator_gate"
issue = 1396
related_issues = [1265, 1397]
profile = "conformance"
family = "cpython_lib_test_denominator_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_iterate_cpython_lib_test_test_files = true
must_record_pass_fail_skip_error_per_module = true
must_tier_modules_t1_t2_t3 = true
must_replace_self_defined_percentage_in_monitoring = true
must_be_offline = true
must_be_deterministic = true

# Acceptance: vendored / submoduled at
# projects/mamba/conformance/cpython-lib-test/.
[denominator_source_contract]
case = "denominator_source_is_vendored_cpython_lib_test"
denominator_source_relative_path = "projects/mamba/conformance/cpython-lib-test"
denominator_source_relative_path_field_name = "denominator_source_path"
must_pin_denominator_source_relative_path = true
forbid_denominator_source_outside_project = true
forbid_using_self_defined_fixtures_as_denominator = true
self_defined_denominator_field_name = "self_defined_fixture_pass_rate"
canonical_denominator_field_name = "cpython_lib_test_denominator"
denominator_source_missing_failure_kind = "cpython_lib_test_denominator_source_missing"
denominator_source_missing_exit_code = 255
denominator_substituted_with_self_defined_failure_kind = "cpython_lib_test_denominator_substituted_with_self_defined"
denominator_substituted_with_self_defined_exit_code = 256
must_distinguish_source_missing_from_substitution = true

# Acceptance: "Runner exists at
# projects/mamba/conformance/cpython_lib_test_runner.rs (or similar)".
[runner_location_contract]
case = "runner_lives_under_projects_mamba_conformance"
runner_relative_path = "projects/mamba/conformance/cpython_lib_test_runner.rs"
runner_relative_path_field_name = "runner_relative_path"
must_pin_runner_relative_path = true
forbid_runner_outside_projects_mamba_conformance = true
runner_missing_failure_kind = "cpython_lib_test_runner_missing"
runner_missing_exit_code = 257
runner_outside_project_failure_kind = "cpython_lib_test_runner_outside_project"
runner_outside_project_exit_code = 258
must_distinguish_runner_missing_from_runner_outside_project = true

# Acceptance: "First run produces pass/fail JSON for all
# Lib/test/test_*.py" + per-module outcome.
[per_module_outcome_contract]
case = "per_module_outcome_records_pass_fail_skip_error"
must_emit_per_module_outcome_json = true
must_record_module_name_in_each_record = true
must_record_outcome_in_each_record = true
must_record_tier_in_each_record = true
forbid_silently_collapsing_pass_and_skip = true
forbid_silently_collapsing_fail_and_error = true
forbid_dropping_modules_with_zero_passes = true
required_outcome_values = ["pass", "fail", "skip", "error"]
outcome_field_name = "outcome"
per_module_record_field_name = "per_module_outcome"
required_per_module_record_fields = [
    "module_name",
    "tier",
    "outcome",
    "duration_ms",
]
pass_collapsed_with_skip_failure_kind = "cpython_lib_test_pass_collapsed_with_skip"
pass_collapsed_with_skip_exit_code = 259
fail_collapsed_with_error_failure_kind = "cpython_lib_test_fail_collapsed_with_error"
fail_collapsed_with_error_exit_code = 260
must_distinguish_pass_skip_collapse_from_fail_error_collapse = true

# Acceptance: "T1 modules listed in spec; baseline T1 number
# recorded" + monitoring loop reports T1/T2/T3.
[tier_definition_contract]
case = "tier_definition_t1_language_core_t2_frequent_stdlib_t3_long_tail"
required_tiers = ["t1", "t2", "t3"]
tier_field_name = "tier"
t1_language_core_modules = [
    "test_grammar",
    "test_syntax",
    "test_class",
    "test_descr",
    "test_exceptions",
    "test_typing",
    "test_generators",
    "test_iter",
    "test_dict",
    "test_list",
    "test_set",
    "test_str",
    "test_int",
    "test_float",
    "test_complex",
    "test_bool",
    "test_bytes",
    "test_bytearray",
    "test_tuple",
    "test_range",
    "test_slice",
    "test_unpack",
    "test_operator",
    "test_with",
    "test_yield_from",
]
t2_frequent_stdlib_modules = [
    "test_os",
    "test_io",
    "test_json",
    "test_re",
    "test_collections",
    "test_itertools",
    "test_functools",
    "test_datetime",
    "test_pathlib",
    "test_subprocess",
    "test_socket",
    "test_threading",
    "test_multiprocessing",
    "test_asyncio",
    "test_unittest",
    "test_logging",
    "test_argparse",
    "test_csv",
    "test_xml",
]
t3_long_tail_is_everything_else = true
forbid_collapsing_tiers_into_overall_only = true
forbid_omitting_tier_aggregate_in_monitoring = true
must_aggregate_per_tier_pass_total = true
tier_aggregate_field_name = "tier_aggregate"
required_tier_aggregate_fields = [
    "tier",
    "pass_count",
    "total_count",
]
tier_missing_failure_kind = "cpython_lib_test_tier_missing"
tier_missing_exit_code = 261
unknown_tier_failure_kind = "cpython_lib_test_unknown_tier"
unknown_tier_exit_code = 262
must_distinguish_tier_missing_from_unknown_tier = true

# Acceptance: monitoring loop reports T1/T2/T3 counts instead of
# self-defined % (canonical denominator REPLACES the old metric).
[monitoring_replacement_contract]
case = "monitoring_loop_replaces_self_defined_percent_with_tiered_denominator"
must_emit_tier_aggregate_for_monitoring = true
must_omit_self_defined_percent_as_conformance_metric = true
forbid_self_defined_percent_being_used_as_conformance = true
forbid_silently_omitting_t1_or_t2_or_t3_in_monitoring = true
monitoring_report_field_name = "monitoring_report"
required_monitoring_report_fields = [
    "t1_pass_count",
    "t1_total_count",
    "t2_pass_count",
    "t2_total_count",
    "t3_pass_count",
    "t3_total_count",
]
monitoring_self_defined_percent_used_as_conformance_failure_kind = "cpython_lib_test_monitoring_self_defined_percent_used_as_conformance"
monitoring_self_defined_percent_used_as_conformance_exit_code = 263
monitoring_tier_omitted_failure_kind = "cpython_lib_test_monitoring_tier_omitted"
monitoring_tier_omitted_exit_code = 264
must_distinguish_self_defined_percent_used_as_conformance_from_tier_omitted = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "denominator_source_path",
    "runner_relative_path",
    "per_module_outcome",
    "tier_aggregate",
    "monitoring_report",
    "module_name",
    "tier",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "skip", "error", "missing"]
case_values = [
    "denominator_source_is_vendored_cpython_lib_test",
    "runner_lives_under_projects_mamba_conformance",
    "per_module_outcome_records_pass_fail_skip_error",
    "tier_definition_t1_language_core_t2_frequent_stdlib_t3_long_tail",
    "monitoring_loop_replaces_self_defined_percent_with_tiered_denominator",
]

[out_of_scope]
# Issue body: surface coverage is owned by #1397, behaviour of
# individual APIs lives upstream in CPython, and upstreaming back
# is also out of scope.
behavioural_correctness_of_individual_apis = true
surface_coverage_per_module = true
upstreaming_back_to_cpython = true
runtime_implementation_of_lib_test_runner = true
