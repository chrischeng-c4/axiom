# Py3.13 conformance epic gate fixture — closes #1266.
# Parent: Py3.12 master epic (#1265 ecosystem + #1260 perf). Sibling:
# #1267 (Py3.14 P3 epic). Gated on Py3.12 epic completing.
#
# Pins the shape of the Py3.13 conformance epic. This epic is GREEN
# only when:
#
#   - R1: Py3.13 is the conformance target (NOT 3.12, NOT 3.14).
#   - R2: Epic is hard-gated on the Py3.12 master epic completing —
#     no Py3.13 workstream starts until 3.12 C1–C5 are met.
#   - R3: All eight conformance criteria C1–C8 (Lib/test ≥95%, PEP
#     667 locals(), PEP 669 sys.monitoring, PEP 742 TypeIs, PEP 705
#     ReadOnly, PEP 696 type-param defaults, PEP 594 removed-stdlib
#     ModuleNotFoundError, REPL graceful degrade) are pinned with
#     per-criterion observable outcomes.
#   - R4: Explicit deferrals (PEP 703 free-threaded, PEP 744 JIT,
#     iOS/Android tiers, performance) are out of scope — folding
#     in is a distinct failure.
#   - R5: Conformance suite forks into a `py313/` subdir so 3.12 and
#     3.13 suites don't collide; CPython 3.13 tag is pinned.
#
# Out of scope: implementing the PEPs themselves; perf work; pkg
# manager work; CPython full regression suite.
#
# Shape locked by src/meta_gates/tests/py313_conformance_epic_gate.rs.

version = 1
fixture = "py313_conformance_epic_gate"
issue = 1266
parent_issue = 1265
related_issues = [1267, 1260, 751]
profile = "mvp"
family = "py313_conformance_epic_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 13
must_be_python_3_13 = true

[surface]
must_cover_py313_is_conformance_target = true
must_cover_hard_gated_on_py312_master_epic = true
must_cover_eight_conformance_criteria_c1_through_c8 = true
must_cover_explicit_deferrals_are_out_of_scope = true
must_cover_conformance_suite_forks_into_py313_subdir = true
must_be_offline = true
must_be_deterministic = true

# R1 — Py3.13 is the target.
[r1_py313_is_conformance_target_contract]
case = "py313_is_the_conformance_target_for_this_epic"
requirement_id = "R1"
must_pin_python_target_to_3_13 = true
forbid_silently_targeting_3_12 = true
forbid_silently_targeting_3_14 = true
python_target_major_field_name = "python_target_major"
python_target_minor_field_name = "python_target_minor"
expected_python_target_major = 3
expected_python_target_minor = 13
silently_targeting_3_12_failure_kind = "py313_epic_silently_targets_3_12"
silently_targeting_3_12_exit_code = 333
silently_targeting_3_14_failure_kind = "py313_epic_silently_targets_3_14"
silently_targeting_3_14_exit_code = 334
must_distinguish_target_3_12_from_target_3_14 = true

# R2 — hard-gated on Py3.12 master epic.
[r2_hard_gated_on_py312_epic_contract]
case = "py313_epic_is_hard_gated_on_py312_master_epic_completing"
requirement_id = "R2"
must_block_until_py312_master_epic_complete = true
must_link_py312_master_epic_as_hard_dependency = true
forbid_starting_workstream_before_py312_complete = true
forbid_silently_lifting_the_hard_gate = true
hard_dependency_epic_issue_field_name = "hard_dependency_epic_issue"
expected_hard_dependency_epic_issue = 1265
py312_master_epic_status_field_name = "py312_master_epic_status"
allowed_py312_master_epic_status_values = ["incomplete", "complete"]
workstream_started_before_py312_complete_failure_kind = "py313_workstream_started_before_py312_epic_complete"
workstream_started_before_py312_complete_exit_code = 335
hard_gate_silently_lifted_failure_kind = "py313_hard_gate_silently_lifted"
hard_gate_silently_lifted_exit_code = 336
must_distinguish_workstream_started_from_gate_silently_lifted = true

# R3 — eight conformance criteria C1–C8.
[r3_eight_conformance_criteria_contract]
case = "eight_py313_conformance_criteria_c1_through_c8_are_pinned"
requirement_id = "R3"
must_pin_c1_cpython_lib_test_at_or_above_95_percent = true
must_pin_c2_pep_667_locals_mutable_dict = true
must_pin_c3_pep_669_sys_monitoring_events = true
must_pin_c4_pep_742_typing_type_is = true
must_pin_c5_pep_705_typing_read_only = true
must_pin_c6_pep_696_type_parameter_defaults = true
must_pin_c7_pep_594_removed_stdlib_module_not_found = true
must_pin_c8_repl_features_degrade_gracefully = true
forbid_silently_dropping_a_conformance_criterion = true
forbid_collapsing_multiple_criteria_into_one_observable = true
required_conformance_criteria = [
    "c1_cpython_lib_test_at_or_above_95_percent",
    "c2_pep_667_locals_mutable_dict",
    "c3_pep_669_sys_monitoring_events",
    "c4_pep_742_typing_type_is",
    "c5_pep_705_typing_read_only",
    "c6_pep_696_type_parameter_defaults",
    "c7_pep_594_removed_stdlib_module_not_found",
    "c8_repl_features_degrade_gracefully",
]
conformance_criteria_field_name = "conformance_criteria"
c1_lib_test_minimum_ratio_field_name = "c1_lib_test_minimum_ratio"
expected_c1_lib_test_minimum_ratio = 0.95
criterion_dropped_failure_kind = "py313_conformance_criterion_dropped"
criterion_dropped_exit_code = 337
criteria_collapsed_failure_kind = "py313_conformance_criteria_collapsed_into_one_observable"
criteria_collapsed_exit_code = 338
must_distinguish_criterion_dropped_from_collapsed = true

# R4 — explicit deferrals (PEP 703, PEP 744, iOS/Android, perf).
[r4_explicit_deferrals_are_out_of_scope_contract]
case = "pep_703_pep_744_mobile_tiers_and_perf_are_explicit_deferrals"
requirement_id = "R4"
must_exclude_pep_703_free_threaded_no_gil = true
must_exclude_pep_744_copy_and_patch_jit = true
must_exclude_ios_tier_support = true
must_exclude_android_tier_support = true
must_exclude_py313_performance_target = true
forbid_folding_deferral_into_epic_to_pass = true
forbid_silently_dropping_deferral_marker = true
explicit_deferrals_field_name = "explicit_deferrals"
explicit_deferrals = [
    "pep_703_free_threaded_no_gil",
    "pep_744_copy_and_patch_jit",
    "ios_tier_support",
    "android_tier_support",
    "py313_performance_target",
]
deferral_folded_into_epic_failure_kind = "py313_deferral_folded_into_epic_to_pass"
deferral_folded_into_epic_exit_code = 339
deferral_marker_dropped_failure_kind = "py313_deferral_marker_silently_dropped"
deferral_marker_dropped_exit_code = 340
must_distinguish_deferral_folded_in_from_marker_dropped = true

# R5 — conformance suite forks into py313/ subdir.
[r5_conformance_suite_forks_into_py313_subdir_contract]
case = "conformance_suite_forks_into_py313_subdir_with_pinned_cpython_tag"
requirement_id = "R5"
must_fork_conformance_suite_into_py313_subdir = true
must_keep_py312_and_py313_suites_separated = true
must_pin_cpython_3_13_release_tag = true
forbid_running_py313_tests_in_py312_subdir = true
forbid_silently_overwriting_py312_baseline_with_py313_results = true
py313_subdir_relative_path = "projects/mamba/tests/cpython/cpython_ported/py313"
py313_subdir_relative_path_field_name = "py313_subdir_relative_path"
cpython_3_13_release_tag_field_name = "cpython_3_13_release_tag"
allowed_cpython_3_13_release_tag_formats = ["v3.13.X", "v3.13.X-rcY"]
py313_tests_in_py312_subdir_failure_kind = "py313_tests_landed_in_py312_subdir"
py313_tests_in_py312_subdir_exit_code = 341
py312_baseline_overwritten_failure_kind = "py313_results_overwrote_py312_baseline"
py312_baseline_overwritten_exit_code = 342
must_distinguish_wrong_subdir_from_baseline_overwritten = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "python_target_major",
    "python_target_minor",
    "hard_dependency_epic_issue",
    "py312_master_epic_status",
    "conformance_criteria",
    "c1_lib_test_minimum_ratio",
    "explicit_deferrals",
    "py313_subdir_relative_path",
    "cpython_3_13_release_tag",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip", "blocked"]
case_values = [
    "py313_is_the_conformance_target_for_this_epic",
    "py313_epic_is_hard_gated_on_py312_master_epic_completing",
    "eight_py313_conformance_criteria_c1_through_c8_are_pinned",
    "pep_703_pep_744_mobile_tiers_and_perf_are_explicit_deferrals",
    "conformance_suite_forks_into_py313_subdir_with_pinned_cpython_tag",
]

[out_of_scope]
# Issue body: PEP 703 / PEP 744 / iOS / Android / perf / pkg manager
# / CPython full regression / implementing PEPs themselves.
pep_703_free_threaded_no_gil = true
pep_744_copy_and_patch_jit = true
ios_tier_support = true
android_tier_support = true
py313_performance_target = true
uv_like_package_management = true
cpython_full_regression_suite = true
implementation_of_pep_667_frame_locals_rework = true
implementation_of_pep_669_sys_monitoring_hooks = true
implementation_of_pep_696_generic_substitution = true
