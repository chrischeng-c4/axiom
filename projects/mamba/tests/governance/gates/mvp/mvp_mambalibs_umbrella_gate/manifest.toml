# MVP mambalibs umbrella fixture — closes #2459.
# Parent: MVP test-completeness epic (#2526) via mambalibs child gate
# #2531. Sibling MVP goal epics: #1265 (Py3.12 ecosystem), #1260
# (perf 10×), #751 (pkg manager).
#
# Pins the shape of the mambalibs umbrella that owns MVP goal 3:
# `from mambalibs import XXXX` for cclab Rust crates exposed as
# mamba binding crates. The umbrella is GREEN only when:
#
#   - R1: `mamba.toml` declares the external binding-crate
#     dependency surface (#2519).
#   - R2: `mamba build` fetches external binding crates (git +
#     registry) and synthesizes the Cargo workspace that links
#     them into the mamba binary (#2520).
#   - R3: `cclab-mamba-registry` ABI semver gate refuses
#     incompatible binding-crate versions (#2521).
#   - R4: Mode 2 lockfile is the source of truth for reproducible
#     builds (#2522).
#   - R5: User code can `from mambalibs import XXXX` and the
#     resolved symbol is the cclab Rust crate's exposed module —
#     not a stub, not a CPython shim.
#
# Out of scope: implementing the runtime under each child issue;
# Mode 1 (in-tree cclab crates already linked at build time);
# packaging the resulting binary; uv-like project workflow (#751).
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/mvp_mambalibs_umbrella_gate_fixture_2459.rs).

version = 1
fixture = "mvp_mambalibs_umbrella_gate"
issue = 2459
parent_issue = 2526
child_issues = [2519, 2520, 2521, 2522]
profile = "mvp"
family = "mvp_mambalibs_umbrella_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_mamba_toml_declares_external_binding_crate_deps = true
must_cover_mamba_build_fetches_and_synthesizes_workspace = true
must_cover_cclab_mamba_registry_abi_semver_gate = true
must_cover_mode_2_lockfile_is_source_of_truth = true
must_cover_from_mambalibs_import_resolves_to_rust_crate_module = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — mamba.toml dependency schema (#2519).
[r1_mamba_toml_external_binding_dep_schema_contract]
case = "mamba_toml_declares_external_binding_crate_dependency_surface"
requirement_id = "R1"
must_define_external_binding_crate_dependency_section = true
must_pin_dependency_kind_field = true
must_pin_dependency_source_field = true
must_pin_dependency_version_field = true
forbid_using_cargo_toml_for_mambalibs_deps = true
forbid_implicit_dependency_declaration = true
external_binding_dep_section_field_name = "external_binding_dep_section"
expected_external_binding_dep_section = "[mambalibs.external]"
dependency_kind_field_name = "dependency_kind"
allowed_dependency_kind_values = ["git", "registry"]
mamba_toml_relative_path_field_name = "mamba_toml_relative_path"
expected_mamba_toml_filename = "mamba.toml"
external_binding_section_missing_failure_kind = "mvp_mambalibs_external_binding_section_missing"
external_binding_section_missing_exit_code = 364
implicit_dependency_failure_kind = "mvp_mambalibs_dependency_declared_implicitly"
implicit_dependency_exit_code = 365
must_distinguish_section_missing_from_implicit_dependency = true

# R2 — `mamba build` fetches + synthesizes workspace (#2520).
[r2_mamba_build_fetch_and_workspace_synth_contract]
case = "mamba_build_fetches_external_binding_crates_and_synthesizes_workspace"
requirement_id = "R2"
must_fetch_external_binding_crate_during_mamba_build = true
must_support_git_source_fetch = true
must_support_registry_source_fetch = true
must_synthesize_cargo_workspace_linking_binding_crates = true
must_link_synthesized_crates_into_mamba_binary = true
forbid_skipping_fetch_step_when_external_binding_declared = true
forbid_linking_without_workspace_synth_step = true
fetch_step_field_name = "fetch_step"
allowed_fetch_step_values = ["git", "registry"]
workspace_synth_step_field_name = "workspace_synth_step"
linked_into_mamba_binary_field_name = "linked_into_mamba_binary"
fetch_step_skipped_failure_kind = "mvp_mambalibs_fetch_step_skipped"
fetch_step_skipped_exit_code = 366
workspace_synth_skipped_failure_kind = "mvp_mambalibs_workspace_synth_skipped"
workspace_synth_skipped_exit_code = 367
must_distinguish_fetch_skipped_from_synth_skipped = true

# R3 — cclab-mamba-registry ABI semver gate (#2521).
[r3_cclab_mamba_registry_abi_semver_gate_contract]
case = "cclab_mamba_registry_refuses_incompatible_binding_crate_versions"
requirement_id = "R3"
must_run_abi_semver_check_on_each_binding_crate = true
must_refuse_incompatible_version = true
must_report_incompatible_version_with_reason = true
forbid_silently_loading_incompatible_binding_crate = true
forbid_treating_missing_abi_metadata_as_compatible = true
abi_semver_check_kind_field_name = "abi_semver_check_kind"
allowed_abi_semver_check_kind_values = ["compatible", "incompatible", "missing_metadata"]
abi_semver_violation_failure_kind = "mvp_mambalibs_abi_semver_violation"
abi_semver_violation_exit_code = 368
missing_abi_metadata_failure_kind = "mvp_mambalibs_abi_metadata_missing"
missing_abi_metadata_exit_code = 369
silent_load_incompatible_failure_kind = "mvp_mambalibs_silent_load_incompatible_crate"
silent_load_incompatible_exit_code = 370
must_distinguish_violation_from_missing_metadata_from_silent_load = true

# R4 — Mode 2 lockfile is source of truth for reproducible builds (#2522).
[r4_mode_2_lockfile_is_source_of_truth_contract]
case = "mode_2_lockfile_is_source_of_truth_for_reproducible_builds"
requirement_id = "R4"
must_emit_mode_2_lockfile_after_first_build = true
must_lock_external_binding_crate_versions_in_lockfile = true
must_resolve_subsequent_builds_from_lockfile = true
must_reject_unlocked_external_binding_crate_in_ci = true
forbid_silently_resolving_outside_lockfile = true
forbid_silently_regenerating_lockfile_in_ci = true
mode_2_lockfile_relative_path_field_name = "mode_2_lockfile_relative_path"
expected_mode_2_lockfile_filename = "mamba.lock"
lockfile_status_field_name = "lockfile_status"
allowed_lockfile_status_values = ["present", "missing", "stale"]
unlocked_in_ci_failure_kind = "mvp_mambalibs_unlocked_external_crate_in_ci"
unlocked_in_ci_exit_code = 371
silent_resolve_outside_lockfile_failure_kind = "mvp_mambalibs_silent_resolve_outside_lockfile"
silent_resolve_outside_lockfile_exit_code = 372
silent_regenerate_lockfile_failure_kind = "mvp_mambalibs_silent_regenerate_lockfile_in_ci"
silent_regenerate_lockfile_exit_code = 373
must_distinguish_unlocked_from_silent_resolve_from_regenerate = true

# R5 — `from mambalibs import XXXX` resolves to Rust crate module.
[r5_from_mambalibs_import_resolves_to_rust_crate_module_contract]
case = "from_mambalibs_import_xxxx_resolves_to_cclab_rust_crate_module"
requirement_id = "R5"
must_make_from_mambalibs_import_resolve_to_rust_crate_module = true
must_expose_rust_crate_exported_surface_through_python_module = true
forbid_resolving_mambalibs_import_to_stub_module = true
forbid_substituting_mambalibs_with_cpython_shim = true
canonical_import_statement = "from mambalibs import XXXX"
canonical_import_statement_field_name = "canonical_import_statement"
resolved_module_kind_field_name = "resolved_module_kind"
allowed_resolved_module_kinds = ["rust_crate_module"]
disallowed_resolved_module_kinds = ["stub_module", "cpython_shim_module", "missing_module"]
resolved_as_stub_failure_kind = "mvp_mambalibs_import_resolved_as_stub_module"
resolved_as_stub_exit_code = 374
resolved_as_cpython_shim_failure_kind = "mvp_mambalibs_import_resolved_as_cpython_shim"
resolved_as_cpython_shim_exit_code = 375
import_missing_failure_kind = "mvp_mambalibs_import_module_missing"
import_missing_exit_code = 376
must_distinguish_stub_from_cpython_shim_from_missing = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "external_binding_dep_section",
    "dependency_kind",
    "mamba_toml_relative_path",
    "fetch_step",
    "workspace_synth_step",
    "linked_into_mamba_binary",
    "abi_semver_check_kind",
    "mode_2_lockfile_relative_path",
    "lockfile_status",
    "canonical_import_statement",
    "resolved_module_kind",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "mamba_toml_declares_external_binding_crate_dependency_surface",
    "mamba_build_fetches_external_binding_crates_and_synthesizes_workspace",
    "cclab_mamba_registry_refuses_incompatible_binding_crate_versions",
    "mode_2_lockfile_is_source_of_truth_for_reproducible_builds",
    "from_mambalibs_import_xxxx_resolves_to_cclab_rust_crate_module",
]

[out_of_scope]
# Issue body + epic split: runtime impl per child is owned by the
# child gates. Mode 1 (in-tree cclab crates) is not part of this
# epic. Packaging the binary and uv-like workflow (#751) are
# separate.
runtime_implementation_per_child_issue = true
mode_1_in_tree_cclab_crates_linking = true
binary_packaging_and_distribution = true
uv_like_package_workflow = true
c_extension_fast_paths = true
runtime_implementation_of_mamba_build_fetcher = true
runtime_implementation_of_cclab_mamba_registry_server = true
runtime_implementation_of_lockfile_resolver = true
