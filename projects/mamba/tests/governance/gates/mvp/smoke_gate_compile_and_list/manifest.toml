# MVP smoke gate compiles and lists tests fixture — closes #2527.
# Parent: #2526 (MVP test completeness and release gates).
#
# Pins the shape of the MVP smoke gate. First worker gate proves the
# mamba test surface is runnable and visible before deeper MVP
# gates:
#
#   - Worker can run the canonical smoke/list commands.
#   - Smoke summary reports total tests, fixture counts, and debt
#     counts.
#   - Coverage tooling points at `projects/mamba` / package `mamba`
#     instead of stale crate paths.
#
# Atomic queue: #2534 make cargo test list the first worker gate,
# #2535 document canonical MVP test profile commands, #2537 add MVP
# smoke test inventory summary, #2538 repair mamba test coverage
# skill path.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/mvp_smoke_gate_compile_and_list_fixture_2527.rs).

version = 1
fixture = "mvp_smoke_gate_compile_and_list"
issue = 2527
parent_issue = 2526
profile = "mvp"
family = "mvp_smoke_gate_compile_and_list"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_canonical_smoke_command = true
must_cover_canonical_list_command = true
must_cover_smoke_summary_emission = true
must_cover_coverage_tooling_path_repair = true
canonical_package_name = "mamba"
canonical_package_relative_path = "projects/mamba"

[atomic_queue]
issue_2534_make_cargo_test_list_the_first_worker_gate = true
issue_2535_document_canonical_mvp_test_profile_commands = true
issue_2537_add_mvp_smoke_test_inventory_summary = true
issue_2538_repair_mamba_test_coverage_skill_path = true

# Acceptance: "Worker can run the canonical smoke/list commands."
[canonical_smoke_and_list_command_contract]
case = "worker_can_run_the_canonical_smoke_and_list_commands"
must_record_canonical_smoke_command = true
must_record_canonical_list_command = true
must_record_smoke_command_in_documentation = true
must_record_list_command_in_documentation = true
forbid_workers_inventing_ad_hoc_smoke_commands = true
forbid_workers_inventing_ad_hoc_list_commands = true
canonical_smoke_command = "cargo test --manifest-path projects/mamba/Cargo.toml"
canonical_list_command = "cargo test --manifest-path projects/mamba/Cargo.toml -- --list"
canonical_smoke_command_field_name = "canonical_smoke_command"
canonical_list_command_field_name = "canonical_list_command"
smoke_command_missing_failure_kind = "mvp_smoke_command_missing"
smoke_command_missing_exit_code = 212
list_command_missing_failure_kind = "mvp_list_command_missing"
list_command_missing_exit_code = 213
must_distinguish_smoke_command_missing_from_list_command_missing = true

# Acceptance: "Smoke summary reports total tests, fixture counts,
# and debt counts."
[smoke_summary_contract]
case = "smoke_summary_reports_total_tests_fixture_counts_and_debt_counts"
must_emit_total_test_count = true
must_emit_fixture_count = true
must_emit_debt_count = true
must_emit_ignored_count = true
must_emit_xfail_count = true
must_emit_skip_count = true
forbid_smoke_summary_being_freeform_text = true
forbid_omitting_required_summary_counts = true
required_summary_fields = [
    "total_test_count",
    "fixture_count",
    "debt_count",
    "ignored_count",
    "xfail_count",
    "skip_count",
]
smoke_summary_field_name = "smoke_summary"
summary_freeform_failure_kind = "mvp_smoke_summary_freeform"
summary_freeform_exit_code = 214
summary_missing_required_count_failure_kind = "mvp_smoke_summary_missing_required_count"
summary_missing_required_count_exit_code = 215
must_distinguish_summary_freeform_from_missing_required_count = true

# Acceptance: "Coverage tooling points at `projects/mamba` / package
# `mamba` instead of stale crate paths."
[coverage_tooling_path_contract]
case = "coverage_tooling_points_at_projects_mamba_and_package_mamba_not_stale_crate_paths"
must_point_coverage_tooling_at_projects_mamba = true
must_point_coverage_tooling_at_package_mamba = true
forbid_pointing_coverage_tooling_at_stale_crate_paths = true
forbid_silently_skipping_coverage_when_path_is_stale = true
required_coverage_target_path = "projects/mamba"
required_coverage_target_package = "mamba"
stale_coverage_path_field_name = "coverage_target_path"
stale_coverage_package_field_name = "coverage_target_package"
stale_coverage_path_failure_kind = "mvp_smoke_coverage_target_path_stale"
stale_coverage_path_exit_code = 216
stale_coverage_package_failure_kind = "mvp_smoke_coverage_target_package_stale"
stale_coverage_package_exit_code = 217
must_distinguish_stale_path_from_stale_package = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "canonical_smoke_command",
    "canonical_list_command",
    "smoke_summary",
    "total_test_count",
    "fixture_count",
    "debt_count",
    "ignored_count",
    "xfail_count",
    "skip_count",
    "coverage_target_path",
    "coverage_target_package",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "worker_can_run_the_canonical_smoke_and_list_commands",
    "smoke_summary_reports_total_tests_fixture_counts_and_debt_counts",
    "coverage_tooling_points_at_projects_mamba_and_package_mamba_not_stale_crate_paths",
]

[out_of_scope]
# Scope is the manifest gate itself; the four atomic-queue children
# (#2534, #2535, #2537, #2538) own runtime implementation of the
# first-worker-gate registration, command documentation, inventory
# summary emission, and coverage tooling path repair.
runtime_implementation_of_first_worker_gate_registration = true
runtime_implementation_of_command_documentation = true
runtime_implementation_of_inventory_summary_emission = true
runtime_implementation_of_coverage_tooling_path_repair = true
