# Python language semantics acceptance suite fixture —
# closes #2774.
# Parent: #2526 (MVP test completeness and release gates).
#
# Pins the shape of the MVP Python language semantics acceptance
# suite. Collect atomic tests for Python language semantics that
# must be correct before mamba can claim MVP language
# compatibility:
#
#   - Child leaf issues are grouped by semantic area.
#   - Required semantic fixtures cannot be skipped or counted as
#     import-only.
#   - Failures report the language feature and fixture id.
#
# Out of scope: optimizing the runtime.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/python_language_semantics_acceptance_suite_fixture_2774.rs).

version = 1
fixture = "python_language_semantics_acceptance_suite"
issue = 2774
parent_issue = 2526
profile = "mvp"
family = "python_language_semantics_acceptance_suite"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_grouping_by_semantic_area = true
must_cover_no_skip_no_import_only_for_required_fixtures = true
must_cover_failure_reporting_language_feature_and_fixture_id = true
must_be_offline = true
must_be_deterministic = true
must_be_runnable_without_network = true

# Canonical list of semantic areas pinned by the issue body.
[semantic_areas_contract]
case = "child_leaf_issues_are_grouped_by_semantic_area"
required_semantic_areas = [
    "scope",
    "functions",
    "classes",
    "descriptors",
    "exceptions",
    "generators",
    "async",
    "pattern_matching",
    "comprehensions",
    "imports",
    "protocol_behavior",
]
semantic_area_field_name = "semantic_area"
forbid_unknown_semantic_area = true
forbid_silently_dropping_required_semantic_area = true
forbid_collapsed_or_implicit_semantic_area = true
unknown_semantic_area_failure_kind = "py_language_semantics_unknown_area"
unknown_semantic_area_exit_code = 241
missing_required_semantic_area_failure_kind = "py_language_semantics_required_area_missing"
missing_required_semantic_area_exit_code = 242
must_distinguish_unknown_area_from_missing_required_area = true

# Acceptance: "Required semantic fixtures cannot be skipped or
# counted as import-only."
[no_skip_no_import_only_contract]
case = "required_semantic_fixtures_cannot_be_skipped_or_counted_as_import_only"
must_fail_required_fixture_when_skipped = true
must_fail_required_fixture_when_xfailed = true
must_fail_required_fixture_when_ignored = true
must_fail_required_fixture_when_classified_as_import_only = true
forbid_silently_passing_required_fixture_via_skip = true
forbid_silently_passing_required_fixture_via_xfail = true
forbid_silently_passing_required_fixture_via_ignore = true
forbid_silently_passing_required_fixture_via_import_only = true
forbid_required_fixture_being_classified_as_import_only = true
required_fixture_classification_field_name = "fixture_classification"
required_classification_allowed_values = ["executed_assertion"]
disallowed_classification_values_for_required_fixtures = [
    "skipped",
    "xfailed",
    "ignored",
    "import_only",
]
required_fixture_skipped_failure_kind = "py_language_semantics_required_fixture_skipped"
required_fixture_skipped_exit_code = 243
required_fixture_import_only_failure_kind = "py_language_semantics_required_fixture_import_only"
required_fixture_import_only_exit_code = 244
must_distinguish_required_fixture_skipped_from_required_fixture_import_only = true

# Acceptance: "Failures report the language feature and fixture id."
[failure_reporting_contract]
case = "failures_report_the_language_feature_and_fixture_id"
must_report_language_feature_on_failure = true
must_report_fixture_id_on_failure = true
forbid_omitting_language_feature_on_failure = true
forbid_omitting_fixture_id_on_failure = true
forbid_collapsed_or_implicit_failure_report = true
required_failure_report_fields = [
    "language_feature",
    "fixture_id",
    "semantic_area",
    "outcome",
]
failure_report_field_name = "failure_report"
language_feature_missing_failure_kind = "py_language_semantics_failure_report_language_feature_missing"
language_feature_missing_exit_code = 245
fixture_id_missing_failure_kind = "py_language_semantics_failure_report_fixture_id_missing"
fixture_id_missing_exit_code = 246
must_distinguish_language_feature_missing_from_fixture_id_missing = true

[child_leaf_size_policy]
must_keep_each_child_leaf_size_agent_sized = true
agent_sized_lower_bound_minutes = 5
agent_sized_upper_bound_minutes = 15
forbid_child_leaf_exceeding_upper_bound = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "semantic_area",
    "language_feature",
    "fixture_id",
    "fixture_classification",
    "failure_report",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "child_leaf_issues_are_grouped_by_semantic_area",
    "required_semantic_fixtures_cannot_be_skipped_or_counted_as_import_only",
    "failures_report_the_language_feature_and_fixture_id",
]

[out_of_scope]
# Issue body: optimizing the runtime is out of scope.
runtime_optimization = true
