# Ignored xfail and skip debt manifest fixture — closes #2533.
# Parent: #2526 (MVP test completeness and release gates).
#
# Pins the shape of the MVP ignored/xfail/skip debt manifest gate.
# Makes ignored, xfail, and skipped tests visible debt that cannot
# inflate MVP pass counts:
#
#   - Ignore, xfail, and skip counts are inventoried and grouped.
#   - Required MVP profile cannot pass with required tests skipped.
#   - New ignored or xfailed tests require linked work-item
#     references.
#
# Atomic queue: #2598 categorize ignored tests by opt-in vs blocker,
# #2599 block ignored tests in required MVP profile, #2600 add skip
# debt counts to smoke summary, #2601 require issue references in
# ignored tests, #2602 add ignore xfail skip inventory command,
# #2603 fail new ignore markers without linked work item.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/ignored_xfail_skip_debt_manifest_fixture_2533.rs).

version = 1
fixture = "ignored_xfail_skip_debt_manifest"
issue = 2533
parent_issue = 2526
profile = "mvp"
family = "ignored_xfail_skip_debt_manifest"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_ignored_xfail_skip_inventory = true
must_cover_required_mvp_profile_skip_block = true
must_cover_new_marker_requires_work_item_reference = true
must_group_counts_by_marker_kind = true
must_emit_inventory_as_machine_readable = true
recognized_marker_kinds = ["ignored", "xfail", "skip"]

[atomic_queue]
issue_2598_categorize_ignored_tests_by_opt_in_vs_blocker = true
issue_2599_block_ignored_tests_in_required_mvp_profile = true
issue_2600_add_skip_debt_counts_to_smoke_summary = true
issue_2601_require_issue_references_in_ignored_tests = true
issue_2602_add_ignore_xfail_skip_inventory_command = true
issue_2603_fail_new_ignore_markers_without_linked_work_item = true

# Acceptance: "Ignore, xfail, and skip counts are inventoried and
# grouped."
[inventory_and_grouping_contract]
case = "ignore_xfail_and_skip_counts_are_inventoried_and_grouped"
must_inventory_ignored_count = true
must_inventory_xfail_count = true
must_inventory_skip_count = true
must_group_counts_by_marker_kind = true
must_emit_per_marker_subtotals = true
must_emit_grand_total = true
forbid_silently_dropping_marker_kinds = true
required_inventory_fields = [
    "ignored_count",
    "xfail_count",
    "skip_count",
    "grand_total_marker_count",
]
inventory_field_name = "marker_inventory"
missing_inventory_failure_kind = "mvp_marker_inventory_missing"
missing_inventory_exit_code = 185
inventory_grouping_failure_kind = "mvp_marker_inventory_not_grouped_by_kind"
inventory_grouping_exit_code = 186
must_distinguish_missing_inventory_from_ungrouped_inventory = true

# Acceptance: "Required MVP profile cannot pass with required tests
# skipped."
[required_profile_skip_block_contract]
case = "required_mvp_profile_cannot_pass_with_required_tests_skipped"
must_fail_required_mvp_profile_when_required_test_skipped = true
must_fail_required_mvp_profile_when_required_test_ignored = true
must_fail_required_mvp_profile_when_required_test_xfailed = true
forbid_silently_passing_with_required_test_skipped = true
forbid_skip_marker_being_treated_as_pass_in_required_profile = true
required_profile_name = "mvp_required"
required_test_skipped_failure_kind = "mvp_required_test_skipped"
required_test_skipped_exit_code = 187
must_distinguish_required_test_skip_from_opt_in_skip = true
opt_in_marker_classification = "opt_in"
blocker_marker_classification = "blocker"
required_classification_field_name = "marker_classification"
allowed_classification_values = ["opt_in", "blocker"]

# Acceptance: "New ignored or xfailed tests require linked work-item
# references."
[work_item_reference_contract]
case = "new_ignored_or_xfailed_tests_require_linked_work_item_references"
must_require_work_item_reference_on_ignored_marker = true
must_require_work_item_reference_on_xfailed_marker = true
must_validate_work_item_reference_format = true
forbid_unreferenced_ignored_marker = true
forbid_unreferenced_xfailed_marker = true
forbid_placeholder_or_stub_work_item_reference = true
work_item_reference_field_name = "work_item_reference"
allowed_work_item_reference_kinds = ["issue", "epic", "tracker"]
work_item_reference_regex = "^#[0-9]+$"
missing_work_item_reference_failure_kind = "mvp_marker_missing_work_item_reference"
missing_work_item_reference_exit_code = 188
invalid_work_item_reference_failure_kind = "mvp_marker_invalid_work_item_reference"
invalid_work_item_reference_exit_code = 189
must_distinguish_missing_reference_from_invalid_reference = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "marker_inventory",
    "ignored_count",
    "xfail_count",
    "skip_count",
    "grand_total_marker_count",
    "required_profile_name",
    "marker_classification",
    "work_item_reference",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "ignore_xfail_and_skip_counts_are_inventoried_and_grouped",
    "required_mvp_profile_cannot_pass_with_required_tests_skipped",
    "new_ignored_or_xfailed_tests_require_linked_work_item_references",
]

[out_of_scope]
# Scope is the manifest gate itself; the six atomic-queue children
# (#2598-#2603) own the runtime implementation of inventory,
# blocking, and reference validation.
runtime_implementation_of_inventory_logic = true
runtime_implementation_of_required_profile_blocking = true
runtime_implementation_of_work_item_reference_validation = true
