# 10x CPython 3.12 performance gate fixture — closes #2530.
# Parent: #2526 (MVP test completeness and release gates).
#
# Pins the shape of the MVP 10x CPython 3.12 performance gate.
# Enforce that mamba averages at least 10x faster than CPython 3.12
# on the required benchmark corpus:
#
#   - Wrong output fails before speedup is accepted.
#   - Required benchmarks have a 1x floor and 10x suite average gate.
#   - CPython comparison runtime is proven to be CPython 3.12.
#   - Summary is machine-readable for CI and worker triage.
#
# Atomic queue: #2563 make perf_comparison output mismatch a hard
# failure, #2564 make perf_benchmark output mismatch a hard failure,
# #2565 add 1x per-benchmark floor checker, #2566 add tier metadata
# to baseline.json, #2567 add MVP performance benchmark manifest,
# #2569 add 10x suite geomean checker, #2570 require internal-time
# markers for accepted perf fixtures, #2571 parse tier headers in
# cross-runtime bench fixtures, #2572 record CPython 3.12 executable
# identity in perf gate, #2573 emit machine-readable performance gate
# summary.
#
# Shape locked by src/meta_gates/tests/perf_10x_cpython_312_gate.rs.

version = 1
fixture = "perf_10x_cpython_312_gate"
issue = 2530
parent_issue = 2526
profile = "mvp"
family = "perf_10x_cpython_312_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_output_mismatch_hard_failure = true
must_cover_one_x_per_benchmark_floor = true
must_cover_ten_x_suite_geomean_gate = true
must_cover_cpython_3_12_identity_recording = true
must_cover_machine_readable_summary = true
must_require_internal_time_markers = true
must_parse_tier_headers_in_cross_runtime_fixtures = true

[atomic_queue]
issue_2563_make_perf_comparison_output_mismatch_a_hard_failure = true
issue_2564_make_perf_benchmark_output_mismatch_a_hard_failure = true
issue_2565_add_one_x_per_benchmark_floor_checker = true
issue_2566_add_tier_metadata_to_baseline_json = true
issue_2567_add_mvp_performance_benchmark_manifest = true
issue_2569_add_ten_x_suite_geomean_checker = true
issue_2570_require_internal_time_markers_for_accepted_perf_fixtures = true
issue_2571_parse_tier_headers_in_cross_runtime_bench_fixtures = true
issue_2572_record_cpython_3_12_executable_identity_in_perf_gate = true
issue_2573_emit_machine_readable_performance_gate_summary = true

# Acceptance: "Wrong output fails before speedup is accepted."
[output_mismatch_hard_failure_contract]
case = "wrong_output_fails_before_speedup_is_accepted"
must_fail_on_perf_comparison_output_mismatch = true
must_fail_on_perf_benchmark_output_mismatch = true
must_check_output_before_recording_speedup = true
forbid_accepting_speedup_when_output_differs_from_cpython = true
forbid_silently_treating_output_mismatch_as_warning = true
output_mismatch_failure_kind = "mvp_perf_output_mismatch"
output_mismatch_exit_code = 204
speedup_accepted_with_mismatch_failure_kind = "mvp_perf_speedup_accepted_with_output_mismatch"
speedup_accepted_with_mismatch_exit_code = 205
must_distinguish_output_mismatch_from_speedup_accepted_with_mismatch = true

# Acceptance: "Required benchmarks have a 1x floor and 10x suite
# average gate."
[one_x_floor_and_ten_x_suite_gate_contract]
case = "required_benchmarks_have_a_one_x_floor_and_ten_x_suite_average_gate"
must_enforce_one_x_per_benchmark_floor = true
must_enforce_ten_x_suite_geomean = true
forbid_required_benchmark_below_one_x = true
forbid_suite_geomean_below_ten_x = true
one_x_floor_field_name = "per_benchmark_floor_ratio"
ten_x_geomean_field_name = "suite_geomean_ratio"
one_x_floor_required_value = 1.0
ten_x_geomean_required_value = 10.0
below_one_x_floor_failure_kind = "mvp_perf_required_benchmark_below_one_x_floor"
below_one_x_floor_exit_code = 206
below_ten_x_geomean_failure_kind = "mvp_perf_suite_geomean_below_ten_x"
below_ten_x_geomean_exit_code = 207
must_distinguish_per_benchmark_floor_from_suite_geomean = true

# Acceptance: "CPython comparison runtime is proven to be CPython
# 3.12."
[cpython_3_12_identity_contract]
case = "cpython_comparison_runtime_is_proven_to_be_cpython_3_12"
must_record_cpython_executable_path = true
must_record_cpython_sys_version = true
must_record_cpython_major_minor = true
must_assert_cpython_major_is_3 = true
must_assert_cpython_minor_is_12 = true
forbid_using_non_cpython_runtime_as_comparison = true
forbid_silently_proceeding_when_cpython_version_unknown = true
required_cpython_identity_fields = [
    "cpython_executable_path",
    "cpython_sys_version",
    "cpython_major",
    "cpython_minor",
]
cpython_identity_field_name = "cpython_identity"
cpython_version_mismatch_failure_kind = "mvp_perf_cpython_version_mismatch"
cpython_version_mismatch_exit_code = 208
cpython_identity_missing_failure_kind = "mvp_perf_cpython_identity_missing"
cpython_identity_missing_exit_code = 209
must_distinguish_version_mismatch_from_identity_missing = true

# Acceptance: "Summary is machine-readable for CI and worker triage."
[machine_readable_summary_contract]
case = "summary_is_machine_readable_for_ci_and_worker_triage"
must_emit_machine_readable_summary = true
must_emit_summary_as_json = true
forbid_summary_being_freeform_text_only = true
forbid_summary_being_collapsed_to_human_text = true
summary_field_name = "perf_gate_summary"
summary_format = "json"
required_summary_fields = [
    "outcome",
    "per_benchmark_floor_ratio",
    "suite_geomean_ratio",
    "cpython_identity",
    "benchmark_results",
    "internal_time_markers",
    "tier_headers",
]
summary_not_machine_readable_failure_kind = "mvp_perf_summary_not_machine_readable"
summary_not_machine_readable_exit_code = 210
summary_missing_required_field_failure_kind = "mvp_perf_summary_missing_required_field"
summary_missing_required_field_exit_code = 211
must_distinguish_not_machine_readable_from_missing_required_field = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "per_benchmark_floor_ratio",
    "suite_geomean_ratio",
    "cpython_identity",
    "cpython_executable_path",
    "cpython_sys_version",
    "cpython_major",
    "cpython_minor",
    "benchmark_results",
    "internal_time_markers",
    "tier_headers",
    "perf_gate_summary",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "wrong_output_fails_before_speedup_is_accepted",
    "required_benchmarks_have_a_one_x_floor_and_ten_x_suite_average_gate",
    "cpython_comparison_runtime_is_proven_to_be_cpython_3_12",
    "summary_is_machine_readable_for_ci_and_worker_triage",
]

[out_of_scope]
# Scope is the manifest gate itself; the ten atomic-queue children
# (#2563-#2573) own runtime implementation of output mismatch
# enforcement, floor/geomean checkers, CPython identity capture,
# tier header parsing, internal-time markers, and machine-readable
# summary emission.
runtime_implementation_of_output_mismatch_enforcement = true
runtime_implementation_of_one_x_floor_checker = true
runtime_implementation_of_ten_x_geomean_checker = true
runtime_implementation_of_tier_metadata_in_baseline_json = true
runtime_implementation_of_performance_benchmark_manifest = true
runtime_implementation_of_internal_time_markers = true
runtime_implementation_of_tier_header_parsing = true
runtime_implementation_of_cpython_3_12_executable_identity_capture = true
runtime_implementation_of_machine_readable_summary_emission = true
