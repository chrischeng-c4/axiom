# MVP performance 10x umbrella fixture — closes #1260.
# Parent epic: MVP goal 2 (perf 10× CPython 3.12), split out of
# #1265 (ecosystem epic) so perf and ecosystem can ship independently.
# Children: #2096, #2110, #2512, #2513, #2516, #2517, #2518.
#
# Pins the shape of the MVP performance umbrella. The MVP perf
# gate is GREEN only when:
#
#   - R1: a baseline against CPython 3.12 exists on the accepted
#     MVP benchmark suite — every accepted entry has a recorded
#     baseline ratio.
#   - R2: geomean across the accepted suite is >= 10× CPython 3.12.
#   - R3: no accepted benchmark is below 1× CPython 3.12 (floor).
#   - R4: benchmarks are tiered (compute / app / dynamic) and the
#     suite is not collapsed into compute-only.
#   - R5: `mamba bench --check` is the canonical CI gate; missing
#     gate counts as missing, not pass.
#
# Out of scope: implementing the runtime fixes per child issue,
# C-extension fast paths, packaging / venv, ecosystem conformance
# (owned by #1265 children).
#
# Shape locked by src/meta_gates/tests/mvp_perf_10x_umbrella_gate.rs.

version = 1
fixture = "mvp_perf_10x_umbrella_gate"
issue = 1260
parent_issue = 2526
child_issues = [2096, 2110, 2512, 2513, 2516, 2517, 2518]
profile = "mvp"
family = "mvp_perf_10x_umbrella_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_cpython_baseline_recorded = true
must_cover_geomean_at_least_10x_cpython = true
must_cover_no_accepted_bench_below_1x_floor = true
must_cover_tiered_benchmarks_compute_app_dynamic = true
must_cover_mamba_bench_check_is_canonical_ci_gate = true
must_be_offline = true
must_be_deterministic = true

# R1 — baseline against CPython 3.12 recorded per accepted entry.
[r1_cpython_baseline_recorded_contract]
case = "cpython_3_12_baseline_recorded_for_every_accepted_benchmark"
requirement_id = "R1"
must_record_cpython_baseline_per_accepted_bench = true
must_use_cpython_3_12_as_baseline_runtime = true
must_record_ratio_field_for_each_accepted_bench = true
forbid_skipping_baseline_for_accepted_bench = true
forbid_using_non_3_12_cpython_as_baseline = true
baseline_runtime_field_name = "baseline_runtime"
expected_baseline_runtime = "cpython_3_12"
ratio_field_name = "ratio_vs_cpython"
accepted_bench_count_field_name = "accepted_bench_count"
baseline_missing_failure_kind = "mvp_perf_baseline_missing_for_accepted_bench"
baseline_missing_exit_code = 313
non_3_12_baseline_failure_kind = "mvp_perf_baseline_runtime_is_not_cpython_3_12"
non_3_12_baseline_exit_code = 314
must_distinguish_baseline_missing_from_non_3_12_baseline = true

# R2 — geomean across the accepted suite >= 10× CPython 3.12.
[r2_geomean_at_least_10x_contract]
case = "geomean_across_accepted_suite_is_at_least_10x_cpython"
requirement_id = "R2"
must_compute_geomean_across_accepted_suite = true
must_fail_when_geomean_below_10x_cpython = true
forbid_silently_passing_when_geomean_below_target = true
forbid_replacing_geomean_with_arithmetic_mean = true
geomean_target_field_name = "geomean_target"
expected_geomean_target = 10.0
geomean_observed_field_name = "geomean_observed"
geomean_below_target_failure_kind = "mvp_perf_geomean_below_10x_target"
geomean_below_target_exit_code = 315
geomean_replaced_with_arithmetic_mean_failure_kind = "mvp_perf_geomean_replaced_with_arithmetic_mean"
geomean_replaced_with_arithmetic_mean_exit_code = 316
must_distinguish_below_target_from_replaced_with_arithmetic_mean = true

# R3 — floor: no accepted bench below 1× CPython 3.12.
[r3_no_accepted_bench_below_1x_floor_contract]
case = "no_accepted_benchmark_is_below_1x_cpython_3_12_floor"
requirement_id = "R3"
must_enforce_floor_per_accepted_bench = true
must_report_violating_bench_names_when_floor_broken = true
forbid_allowing_below_1x_for_accepted_bench = true
forbid_silently_excluding_below_1x_bench_from_geomean = true
floor_ratio_field_name = "floor_ratio"
expected_floor_ratio = 1.0
floor_violations_field_name = "floor_violations"
floor_violation_failure_kind = "mvp_perf_accepted_bench_below_1x_floor"
floor_violation_exit_code = 317
silent_exclusion_failure_kind = "mvp_perf_accepted_bench_silently_excluded_from_geomean"
silent_exclusion_exit_code = 318
must_distinguish_floor_violation_from_silent_exclusion = true

# R4 — benchmarks are tiered (compute / app / dynamic), not compute-only.
[r4_tiered_benchmarks_compute_app_dynamic_contract]
case = "benchmarks_are_tiered_compute_app_and_dynamic_not_collapsed"
requirement_id = "R4"
must_tier_benchmarks_into_compute_app_dynamic = true
must_record_tier_per_accepted_bench = true
must_require_nonzero_app_bench_count = true
must_require_nonzero_dynamic_bench_count = true
forbid_collapsing_suite_into_compute_only = true
forbid_omitting_tier_field_per_bench = true
required_tiers = ["compute", "app", "dynamic"]
tier_field_name = "tier"
compute_count_field_name = "compute_bench_count"
app_count_field_name = "app_bench_count"
dynamic_count_field_name = "dynamic_bench_count"
suite_collapsed_compute_only_failure_kind = "mvp_perf_suite_collapsed_to_compute_only"
suite_collapsed_compute_only_exit_code = 319
tier_missing_failure_kind = "mvp_perf_tier_missing_for_accepted_bench"
tier_missing_exit_code = 320
must_distinguish_suite_collapsed_from_tier_missing = true

# R5 — `mamba bench --check` is the canonical CI gate.
[r5_mamba_bench_check_is_canonical_gate_contract]
case = "mamba_bench_check_is_canonical_ci_gate_for_mvp_perf"
requirement_id = "R5"
must_wire_mamba_bench_check_as_ci_gate = true
must_fail_check_when_geomean_below_target = true
must_fail_check_when_any_accepted_bench_below_floor = true
forbid_treating_missing_check_as_pass = true
forbid_silently_skipping_check_in_ci = true
ci_gate_command_field_name = "ci_gate_command"
expected_ci_gate_command = "mamba bench --check"
ci_gate_status_field_name = "ci_gate_status"
allowed_ci_gate_status_values = ["pass", "fail", "missing"]
check_missing_treated_as_pass_failure_kind = "mvp_perf_check_missing_treated_as_pass"
check_missing_treated_as_pass_exit_code = 321
check_skipped_in_ci_failure_kind = "mvp_perf_check_silently_skipped_in_ci"
check_skipped_in_ci_exit_code = 322
must_distinguish_check_missing_from_skipped_in_ci = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "baseline_runtime",
    "ratio_vs_cpython",
    "accepted_bench_count",
    "geomean_target",
    "geomean_observed",
    "floor_ratio",
    "floor_violations",
    "tier",
    "compute_bench_count",
    "app_bench_count",
    "dynamic_bench_count",
    "ci_gate_command",
    "ci_gate_status",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "cpython_3_12_baseline_recorded_for_every_accepted_benchmark",
    "geomean_across_accepted_suite_is_at_least_10x_cpython",
    "no_accepted_benchmark_is_below_1x_cpython_3_12_floor",
    "benchmarks_are_tiered_compute_app_and_dynamic_not_collapsed",
    "mamba_bench_check_is_canonical_ci_gate_for_mvp_perf",
]

[out_of_scope]
# Issue body + epic split: runtime fixes per child issue belong to
# those issues; ecosystem conformance belongs to #1265; perf
# C-extensions and packaging / venv are owned by other epics.
runtime_implementation_per_child_issue = true
ecosystem_conformance_owned_by_1265 = true
c_extension_fast_paths = true
package_manager_and_venv = true
runtime_implementation_of_mir_escape_analysis = true
runtime_implementation_of_mb_object_layout = true
runtime_implementation_of_rwlock_fast_path = true
