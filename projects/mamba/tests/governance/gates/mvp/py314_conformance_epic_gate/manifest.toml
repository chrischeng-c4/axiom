# Py3.14 conformance epic gate fixture — closes #1267.
# Parent: Py3.13 conformance epic (#1266). Transitive: Py3.12 master
# epic (#1265). Sibling: Py3.12 (P0), Py3.13 (P2).
#
# Pins the shape of the Py3.14 conformance epic. This epic is GREEN
# only when:
#
#   - R1: Py3.14 is the conformance target (NOT 3.12, NOT 3.13).
#   - R2: Doubly hard-gated — Py3.13 (#1266) AND Py3.12 (#1265)
#     master epics both complete before any Py3.14 workstream starts.
#   - R3: All eight conformance criteria C1–C8 (Lib/test ≥95%, PEP
#     649 deferred annotations, PEP 750 t-strings, PEP 758
#     parenthesis-free except, PEP 765 finally SyntaxWarning, PEP
#     734 interpreters, PEP 784 compression.zstd, UUID v6/v7/v8)
#     are pinned with per-criterion observable outcomes.
#   - R4: Explicit deferrals (PEP 779 free-threaded GA, PEP 768
#     remote debugging, PEP 793 new C API, PEP 761 sigstore, perf)
#     are out of scope.
#   - R5: Conformance suite forks into a `py314/` subdir (sibling to
#     `py313/`); CPython 3.14 release tag is pinned.
#
# Out of scope: implementing the PEPs themselves; perf work; pkg
# manager; sigstore release infra; new C API surface.
#
# Shape locked by src/meta_gates/tests/py314_conformance_epic_gate.rs.

version = 1
fixture = "py314_conformance_epic_gate"
issue = 1267
parent_issue = 1266
related_issues = [1265, 1260, 751]
profile = "mvp"
family = "py314_conformance_epic_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 14
must_be_python_3_14 = true

[surface]
must_cover_py314_is_conformance_target = true
must_cover_doubly_hard_gated_on_py313_and_py312_epics = true
must_cover_eight_conformance_criteria_c1_through_c8 = true
must_cover_explicit_deferrals_are_out_of_scope = true
must_cover_conformance_suite_forks_into_py314_subdir = true
must_be_offline = true
must_be_deterministic = true

# R1 — Py3.14 is the target.
[r1_py314_is_conformance_target_contract]
case = "py314_is_the_conformance_target_for_this_epic"
requirement_id = "R1"
must_pin_python_target_to_3_14 = true
forbid_silently_targeting_3_12 = true
forbid_silently_targeting_3_13 = true
python_target_major_field_name = "python_target_major"
python_target_minor_field_name = "python_target_minor"
expected_python_target_major = 3
expected_python_target_minor = 14
silently_targeting_3_12_failure_kind = "py314_epic_silently_targets_3_12"
silently_targeting_3_12_exit_code = 343
silently_targeting_3_13_failure_kind = "py314_epic_silently_targets_3_13"
silently_targeting_3_13_exit_code = 344
must_distinguish_target_3_12_from_target_3_13 = true

# R2 — doubly hard-gated on Py3.13 and Py3.12.
[r2_doubly_hard_gated_contract]
case = "py314_epic_is_doubly_hard_gated_on_py313_and_py312_epics"
requirement_id = "R2"
must_block_until_py313_epic_complete = true
must_block_until_py312_epic_complete_transitively = true
must_link_py313_epic_as_hard_dependency = true
must_link_py312_epic_as_transitive_dependency = true
forbid_starting_workstream_before_py313_complete = true
forbid_silently_lifting_either_gate = true
hard_dependency_epic_issue_field_name = "hard_dependency_epic_issue"
transitive_dependency_epic_issue_field_name = "transitive_dependency_epic_issue"
expected_hard_dependency_epic_issue = 1266
expected_transitive_dependency_epic_issue = 1265
py313_master_epic_status_field_name = "py313_master_epic_status"
py312_master_epic_status_field_name = "py312_master_epic_status"
allowed_epic_status_values = ["incomplete", "complete"]
workstream_started_before_py313_complete_failure_kind = "py314_workstream_started_before_py313_epic_complete"
workstream_started_before_py313_complete_exit_code = 345
gate_silently_lifted_failure_kind = "py314_doubly_hard_gate_silently_lifted"
gate_silently_lifted_exit_code = 346
must_distinguish_workstream_started_from_gate_lifted = true

# R3 — eight conformance criteria C1–C8.
[r3_eight_conformance_criteria_contract]
case = "eight_py314_conformance_criteria_c1_through_c8_are_pinned"
requirement_id = "R3"
must_pin_c1_cpython_lib_test_at_or_above_95_percent = true
must_pin_c2_pep_649_deferred_annotations = true
must_pin_c3_pep_750_template_strings = true
must_pin_c4_pep_758_parenthesis_free_except = true
must_pin_c5_pep_765_finally_control_flow_syntax_warning = true
must_pin_c6_pep_734_interpreters_stdlib = true
must_pin_c7_pep_784_compression_zstd = true
must_pin_c8_uuid_v6_v7_v8 = true
forbid_silently_dropping_a_conformance_criterion = true
forbid_collapsing_multiple_criteria_into_one_observable = true
required_conformance_criteria = [
    "c1_cpython_lib_test_at_or_above_95_percent",
    "c2_pep_649_deferred_annotations",
    "c3_pep_750_template_strings",
    "c4_pep_758_parenthesis_free_except",
    "c5_pep_765_finally_control_flow_syntax_warning",
    "c6_pep_734_interpreters_stdlib",
    "c7_pep_784_compression_zstd",
    "c8_uuid_v6_v7_v8",
]
conformance_criteria_field_name = "conformance_criteria"
c1_lib_test_minimum_ratio_field_name = "c1_lib_test_minimum_ratio"
expected_c1_lib_test_minimum_ratio = 0.95
criterion_dropped_failure_kind = "py314_conformance_criterion_dropped"
criterion_dropped_exit_code = 347
criteria_collapsed_failure_kind = "py314_conformance_criteria_collapsed_into_one_observable"
criteria_collapsed_exit_code = 348
must_distinguish_criterion_dropped_from_collapsed = true

# R4 — explicit deferrals (PEP 779, PEP 768, PEP 793, PEP 761, perf).
[r4_explicit_deferrals_are_out_of_scope_contract]
case = "pep_779_pep_768_pep_793_pep_761_and_perf_are_explicit_deferrals"
requirement_id = "R4"
must_exclude_pep_779_free_threaded_ga = true
must_exclude_pep_768_remote_debugging = true
must_exclude_pep_793_new_c_api_for_type_construction = true
must_exclude_pep_761_sigstore_signing = true
must_exclude_py314_performance_target = true
forbid_folding_deferral_into_epic_to_pass = true
forbid_silently_dropping_deferral_marker = true
explicit_deferrals_field_name = "explicit_deferrals"
explicit_deferrals = [
    "pep_779_free_threaded_ga",
    "pep_768_remote_debugging",
    "pep_793_new_c_api_for_type_construction",
    "pep_761_sigstore_signing",
    "py314_performance_target",
]
deferral_folded_into_epic_failure_kind = "py314_deferral_folded_into_epic_to_pass"
deferral_folded_into_epic_exit_code = 349
deferral_marker_dropped_failure_kind = "py314_deferral_marker_silently_dropped"
deferral_marker_dropped_exit_code = 350
must_distinguish_deferral_folded_in_from_marker_dropped = true

# R5 — conformance suite forks into py314/ subdir.
[r5_conformance_suite_forks_into_py314_subdir_contract]
case = "conformance_suite_forks_into_py314_subdir_with_pinned_cpython_tag"
requirement_id = "R5"
must_fork_conformance_suite_into_py314_subdir = true
must_keep_py312_py313_py314_suites_separated = true
must_pin_cpython_3_14_release_tag = true
forbid_running_py314_tests_in_py313_subdir = true
forbid_silently_overwriting_py313_baseline_with_py314_results = true
py314_subdir_relative_path = "projects/mamba/tests/cpython/cpython_ported/py314"
py314_subdir_relative_path_field_name = "py314_subdir_relative_path"
cpython_3_14_release_tag_field_name = "cpython_3_14_release_tag"
allowed_cpython_3_14_release_tag_formats = ["v3.14.X", "v3.14.X-rcY"]
py314_tests_in_py313_subdir_failure_kind = "py314_tests_landed_in_py313_subdir"
py314_tests_in_py313_subdir_exit_code = 351
py313_baseline_overwritten_failure_kind = "py314_results_overwrote_py313_baseline"
py313_baseline_overwritten_exit_code = 352
must_distinguish_wrong_subdir_from_baseline_overwritten = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "python_target_major",
    "python_target_minor",
    "hard_dependency_epic_issue",
    "transitive_dependency_epic_issue",
    "py313_master_epic_status",
    "py312_master_epic_status",
    "conformance_criteria",
    "c1_lib_test_minimum_ratio",
    "explicit_deferrals",
    "py314_subdir_relative_path",
    "cpython_3_14_release_tag",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip", "blocked"]
case_values = [
    "py314_is_the_conformance_target_for_this_epic",
    "py314_epic_is_doubly_hard_gated_on_py313_and_py312_epics",
    "eight_py314_conformance_criteria_c1_through_c8_are_pinned",
    "pep_779_pep_768_pep_793_pep_761_and_perf_are_explicit_deferrals",
    "conformance_suite_forks_into_py314_subdir_with_pinned_cpython_tag",
]

[out_of_scope]
# Issue body: PEP 779 / PEP 768 / PEP 793 / PEP 761 / perf / pkg
# manager / implementing the PEPs themselves.
pep_779_free_threaded_ga = true
pep_768_remote_debugging = true
pep_793_new_c_api_for_type_construction = true
pep_761_sigstore_signing = true
py314_performance_target = true
uv_like_package_management = true
implementation_of_pep_649_deferred_annotation_lazy_resolution = true
implementation_of_pep_750_template_object = true
implementation_of_pep_734_subinterpreter_runtime = true
implementation_of_pep_784_zstd_compression_backend = true
