# MVP Py3.12 ecosystem umbrella fixture — closes #1265.
# Parent epic: MVP goal 1 (Py3.12 ecosystem). Perf is split to #1260,
# mambalibs to #2459, package manager to #751. Children: #1234, #1257,
# #1259, #1263, #1396, #1397, #1537.
#
# Pins the shape of the MVP Py3.12 ecosystem umbrella. The umbrella is
# GREEN only when:
#
#   - R1: Py3.12 language + runtime behavior is the target — no
#     silent regression to 3.10 or 3.11.
#   - R2: The three canonical 3P programs (pytest hello, Flask hello,
#     requests.get) run unmodified.
#   - R3: The supported stdlib surface has an explicit denominator
#     (CPython Lib/test + typeshed-derived per-module coverage).
#   - R4: No MVP P0/P1 conformance blockers remain open for the
#     supported Python 3.12 subset.
#   - R5: Future-version epics (3.13 / 3.14), perf (10×), mambalibs,
#     and pkg manager are explicitly NOT folded into this gate.
#
# Out of scope: Python 3.13/3.14 conformance (#1266 / #1267),
# perf target (#1260), mambalibs (#2459), uv-like package management
# (#751), C-extension fast paths.
#
# Shape locked by src/meta_gates/tests/mvp_py312_ecosystem_umbrella_gate.rs.

version = 1
fixture = "mvp_py312_ecosystem_umbrella_gate"
issue = 1265
parent_issue = 2526
child_issues = [1234, 1257, 1259, 1263, 1396, 1397, 1537]
profile = "mvp"
family = "mvp_py312_ecosystem_umbrella_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_py312_language_and_runtime_target = true
must_cover_three_canonical_3p_programs_run_unmodified = true
must_cover_stdlib_surface_has_explicit_denominator = true
must_cover_no_p0_p1_conformance_blockers_remain_open = true
must_cover_future_versions_and_other_epics_are_excluded = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — Py3.12 language + runtime is the target.
[r1_py312_is_the_target_contract]
case = "py312_language_and_runtime_behavior_is_the_target_for_mvp"
requirement_id = "R1"
must_pin_python_target_to_3_12 = true
must_run_on_real_py312_grammar_and_runtime_behavior = true
forbid_silently_regressing_to_3_10_or_3_11 = true
forbid_treating_py313_features_as_required_under_mvp = true
python_target_major_field_name = "python_target_major"
python_target_minor_field_name = "python_target_minor"
expected_python_target_major = 3
expected_python_target_minor = 12
silent_regression_failure_kind = "mvp_ecosystem_silent_regression_to_pre_3_12"
silent_regression_exit_code = 323
py313_required_failure_kind = "mvp_ecosystem_py313_feature_required_under_mvp"
py313_required_exit_code = 324
must_distinguish_silent_regression_from_py313_required = true

# R2 — three canonical 3P programs run unmodified (wired through #1263).
[r2_three_canonical_3p_programs_contract]
case = "three_canonical_3p_programs_pytest_flask_requests_run_unmodified"
requirement_id = "R2"
must_wire_pytest_hello_program = true
must_wire_flask_hello_program = true
must_wire_requests_https_get_program = true
must_wire_3p_libs_umbrella_under_1263 = true
forbid_dropping_any_canonical_3p_program = true
forbid_silently_substituting_canonical_3p_program = true
required_canonical_3p_programs = [
    "pytest_hello_world",
    "flask_hello_world",
    "requests_https_get",
]
canonical_3p_programs_field_name = "canonical_3p_programs"
threep_umbrella_relative_path = "projects/mamba/tests/governance/gates/third_party/c3_3p_libs_conformance_umbrella_gate/manifest.toml"
threep_umbrella_relative_path_field_name = "threep_umbrella_relative_path"
canonical_3p_program_missing_failure_kind = "mvp_ecosystem_canonical_3p_program_missing"
canonical_3p_program_missing_exit_code = 325
canonical_3p_program_substituted_failure_kind = "mvp_ecosystem_canonical_3p_program_silently_substituted"
canonical_3p_program_substituted_exit_code = 326
must_distinguish_program_missing_from_substituted = true

# R3 — explicit denominator: CPython Lib/test + typeshed coverage.
[r3_stdlib_denominator_is_explicit_contract]
case = "stdlib_surface_has_explicit_denominator_via_lib_test_and_typeshed"
requirement_id = "R3"
must_pin_cpython_lib_test_denominator_under_1396 = true
must_pin_typeshed_surface_denominator_under_1397 = true
must_report_per_module_pass_fail_in_ci = true
forbid_relying_on_implicit_denominator = true
forbid_dropping_either_denominator_dimension = true
cpython_lib_test_gate_relative_path = "projects/mamba/tests/governance/gates/cpython_lib_test_denominator_gate/manifest.toml"
typeshed_surface_gate_relative_path = "projects/mamba/tests/governance/gates/typeshed_surface_gate/manifest.toml"
cpython_lib_test_gate_relative_path_field_name = "cpython_lib_test_gate_relative_path"
typeshed_surface_gate_relative_path_field_name = "typeshed_surface_gate_relative_path"
denominator_implicit_failure_kind = "mvp_ecosystem_stdlib_denominator_is_implicit"
denominator_implicit_exit_code = 327
denominator_dimension_dropped_failure_kind = "mvp_ecosystem_stdlib_denominator_dimension_dropped"
denominator_dimension_dropped_exit_code = 328
must_distinguish_implicit_denominator_from_dimension_dropped = true

# R4 — no MVP P0/P1 conformance blockers remain open for 3.12 subset.
[r4_no_p0_p1_blockers_remain_open_contract]
case = "no_p0_or_p1_conformance_blockers_remain_open_for_py312_subset"
requirement_id = "R4"
must_track_p0_blocker_count = true
must_track_p1_blocker_count = true
must_require_zero_p0_blockers_for_umbrella_green = true
must_require_zero_p1_blockers_for_umbrella_green = true
forbid_treating_p0_blocker_as_p2_to_pass = true
forbid_silently_closing_blocker_without_fix = true
required_priority_tiers = ["p0", "p1", "p2"]
priority_tier_field_name = "priority_tier"
p0_blocker_count_field_name = "p0_blocker_count"
p1_blocker_count_field_name = "p1_blocker_count"
expected_p0_blocker_count_for_green = 0
expected_p1_blocker_count_for_green = 0
p0_blocker_open_failure_kind = "mvp_ecosystem_p0_blocker_remains_open"
p0_blocker_open_exit_code = 329
p1_blocker_open_failure_kind = "mvp_ecosystem_p1_blocker_remains_open"
p1_blocker_open_exit_code = 330
must_distinguish_p0_from_p1_blocker_open = true

# R5 — explicit non-scope: 3.13/3.14, perf, mambalibs, pkg manager.
[r5_other_epics_explicitly_excluded_contract]
case = "future_versions_perf_mambalibs_pkg_manager_are_excluded_from_umbrella"
requirement_id = "R5"
must_exclude_py313_conformance_from_umbrella = true
must_exclude_py314_conformance_from_umbrella = true
must_exclude_10x_perf_target_from_umbrella = true
must_exclude_mambalibs_from_umbrella = true
must_exclude_uv_like_package_manager_from_umbrella = true
forbid_folding_other_epic_into_umbrella_to_pass = true
excluded_epic_issues_field_name = "excluded_epic_issues"
excluded_epic_issues = [1266, 1267, 1260, 2459, 751]
epic_folded_into_umbrella_failure_kind = "mvp_ecosystem_other_epic_folded_into_umbrella"
epic_folded_into_umbrella_exit_code = 331
excluded_epic_marked_required_failure_kind = "mvp_ecosystem_excluded_epic_marked_required"
excluded_epic_marked_required_exit_code = 332
must_distinguish_epic_folded_in_from_excluded_marked_required = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "python_target_major",
    "python_target_minor",
    "canonical_3p_programs",
    "threep_umbrella_relative_path",
    "cpython_lib_test_gate_relative_path",
    "typeshed_surface_gate_relative_path",
    "priority_tier",
    "p0_blocker_count",
    "p1_blocker_count",
    "excluded_epic_issues",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "py312_language_and_runtime_behavior_is_the_target_for_mvp",
    "three_canonical_3p_programs_pytest_flask_requests_run_unmodified",
    "stdlib_surface_has_explicit_denominator_via_lib_test_and_typeshed",
    "no_p0_or_p1_conformance_blockers_remain_open_for_py312_subset",
    "future_versions_perf_mambalibs_pkg_manager_are_excluded_from_umbrella",
]

[out_of_scope]
# Issue body: 3.13/3.14, perf, mambalibs, pkg manager are tracked
# elsewhere. Runtime fixes per child belong to the child gates.
python_3_13_conformance = true
python_3_14_conformance = true
ten_x_performance_target = true
mambalibs_import_path = true
uv_like_package_management = true
c_extension_fast_paths = true
runtime_implementation_per_child_program = true
