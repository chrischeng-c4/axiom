# MVP test completeness + release gates epic — closes #2526.
# Parent of all MVP gate parents: smoke (#2527), CPython Lib/test
# (#2528), ecosystem real-world (#2529), perf 10× (#2530), mambalibs
# (#2531), package manager (#2532), skip/xfail debt (#2533). First
# atomic wave #2534-#2603 (64 leaf issues).
#
# Pins the shape of the MVP test-completeness umbrella. The umbrella
# is GREEN only when:
#
#   - R1: All seven parent gates are wired with manifests.
#   - R2: Each leaf is agent-sized (5-15 min) and worker takes one
#     leaf at a time.
#   - R3: Default gates are offline + deterministic unless the leaf
#     explicitly opts into live integration.
#   - R4: No required test hides behind skip / xfail / Stub outcomes
#     — debt is observable, not silenced.
#   - R5: First atomic wave (#2534-#2603, 64 leaves) is enumerated;
#     the leaf range is the denominator, not a TODO.
#
# Out of scope: implementing the seven child gates (owned by their
# own issues); content of the 64 leaves; C-extensions; release infra
# beyond test gates.
#
# Shape locked by src/meta_gates/tests/mvp_test_completeness_epic_gate.rs.

version = 1
fixture = "mvp_test_completeness_epic_gate"
issue = 2526
child_issues = [2527, 2528, 2529, 2530, 2531, 2532, 2533]
profile = "mvp"
family = "mvp_test_completeness_epic_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_seven_parent_gates_are_wired = true
must_cover_worker_takes_one_agent_sized_leaf_at_a_time = true
must_cover_default_offline_and_deterministic = true
must_cover_no_required_test_hides_behind_skip_xfail_stub = true
must_cover_first_atomic_wave_leaf_range_is_enumerated = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — seven parent gates wired with manifests.
[r1_seven_parent_gates_wired_contract]
case = "seven_parent_gates_smoke_libtest_ecosystem_perf_mambalibs_pkgmgr_debt_are_wired"
requirement_id = "R1"
must_wire_smoke_gate_2527 = true
must_wire_cpython_lib_test_gate_2528 = true
must_wire_ecosystem_real_world_gate_2529 = true
must_wire_perf_10x_gate_2530 = true
must_wire_mambalibs_gate_2531 = true
must_wire_package_manager_gate_2532 = true
must_wire_skip_xfail_debt_gate_2533 = true
forbid_collapsing_seven_parent_gates_into_fewer = true
forbid_silently_dropping_a_parent_gate = true
required_parent_gate_issues = [2527, 2528, 2529, 2530, 2531, 2532, 2533]
parent_gate_issues_field_name = "parent_gate_issues"
parent_gate_missing_failure_kind = "mvp_test_completeness_parent_gate_missing"
parent_gate_missing_exit_code = 353
parent_gates_collapsed_failure_kind = "mvp_test_completeness_parent_gates_collapsed_to_fewer"
parent_gates_collapsed_exit_code = 354
must_distinguish_parent_gate_missing_from_collapsed = true

# R2 — worker takes one agent-sized leaf at a time (5-15 min).
[r2_one_agent_sized_leaf_at_a_time_contract]
case = "worker_takes_one_agent_sized_leaf_5_to_15_min_at_a_time"
requirement_id = "R2"
must_require_worker_take_one_leaf_at_a_time = true
must_require_leaf_be_agent_sized_5_to_15_min = true
forbid_combining_multiple_leaves_into_one_pr = true
forbid_taking_oversized_leaf_without_split = true
leaf_size_minimum_minutes_field_name = "leaf_size_minimum_minutes"
leaf_size_maximum_minutes_field_name = "leaf_size_maximum_minutes"
expected_leaf_size_minimum_minutes = 5
expected_leaf_size_maximum_minutes = 15
leaves_per_pr_field_name = "leaves_per_pr"
expected_leaves_per_pr = 1
multiple_leaves_per_pr_failure_kind = "mvp_test_completeness_multiple_leaves_in_single_pr"
multiple_leaves_per_pr_exit_code = 355
oversized_leaf_without_split_failure_kind = "mvp_test_completeness_oversized_leaf_without_split"
oversized_leaf_without_split_exit_code = 356
must_distinguish_multiple_leaves_from_oversized_without_split = true

# R3 — default offline + deterministic.
[r3_default_offline_and_deterministic_contract]
case = "default_gates_are_offline_and_deterministic_unless_leaf_opts_in_to_live"
requirement_id = "R3"
must_default_gates_to_offline = true
must_default_gates_to_deterministic = true
must_require_explicit_opt_in_for_live_integration = true
forbid_silently_enabling_live_network_in_default_gate = true
forbid_silently_introducing_nondeterminism = true
default_network_field_name = "default_network"
expected_default_network = "offline"
default_determinism_field_name = "default_determinism"
expected_default_determinism = "deterministic"
live_integration_opt_in_field_name = "live_integration_opt_in"
silent_live_network_failure_kind = "mvp_test_completeness_live_network_in_default_gate"
silent_live_network_exit_code = 357
silent_nondeterminism_failure_kind = "mvp_test_completeness_silent_nondeterminism"
silent_nondeterminism_exit_code = 358
must_distinguish_live_network_from_silent_nondeterminism = true

# R4 — no required test hides behind skip / xfail / Stub.
[r4_no_required_test_hides_behind_skip_xfail_stub_contract]
case = "no_required_test_hides_behind_skip_xfail_or_stub_outcomes"
requirement_id = "R4"
must_forbid_required_test_marked_skip = true
must_forbid_required_test_marked_xfail = true
must_forbid_required_test_emitting_stub_outcome = true
must_track_skip_xfail_stub_debt_under_2533 = true
forbid_silently_marking_required_test_as_skip = true
forbid_silently_marking_required_test_as_xfail = true
forbid_silently_emitting_stub_outcome_for_required_test = true
disallowed_hiding_outcomes = ["skip", "xfail", "stub"]
disallowed_hiding_outcomes_field_name = "disallowed_hiding_outcomes_for_required_test"
debt_gate_issue_field_name = "debt_gate_issue"
expected_debt_gate_issue = 2533
required_test_hidden_by_skip_failure_kind = "mvp_test_completeness_required_test_hidden_by_skip"
required_test_hidden_by_skip_exit_code = 359
required_test_hidden_by_xfail_failure_kind = "mvp_test_completeness_required_test_hidden_by_xfail"
required_test_hidden_by_xfail_exit_code = 360
required_test_emitted_stub_failure_kind = "mvp_test_completeness_required_test_emitted_stub_outcome"
required_test_emitted_stub_exit_code = 361
must_distinguish_skip_from_xfail_from_stub_hiding = true

# R5 — first atomic wave leaf range is enumerated (#2534-#2603, 64).
[r5_first_atomic_wave_enumerated_contract]
case = "first_atomic_wave_leaf_range_2534_to_2603_is_enumerated_with_64_leaves"
requirement_id = "R5"
must_pin_first_wave_leaf_range_start = true
must_pin_first_wave_leaf_range_end = true
must_pin_first_wave_leaf_count = true
forbid_leaving_first_wave_range_as_todo = true
forbid_silently_resizing_first_wave_count = true
first_wave_leaf_range_start_field_name = "first_wave_leaf_range_start"
first_wave_leaf_range_end_field_name = "first_wave_leaf_range_end"
first_wave_leaf_count_field_name = "first_wave_leaf_count"
expected_first_wave_leaf_range_start = 2534
expected_first_wave_leaf_range_end = 2603
expected_first_wave_leaf_count = 64
first_wave_range_is_todo_failure_kind = "mvp_test_completeness_first_wave_range_is_todo"
first_wave_range_is_todo_exit_code = 362
first_wave_count_silently_resized_failure_kind = "mvp_test_completeness_first_wave_count_silently_resized"
first_wave_count_silently_resized_exit_code = 363
must_distinguish_range_is_todo_from_count_resized = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "parent_gate_issues",
    "leaf_size_minimum_minutes",
    "leaf_size_maximum_minutes",
    "leaves_per_pr",
    "default_network",
    "default_determinism",
    "live_integration_opt_in",
    "disallowed_hiding_outcomes_for_required_test",
    "debt_gate_issue",
    "first_wave_leaf_range_start",
    "first_wave_leaf_range_end",
    "first_wave_leaf_count",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "seven_parent_gates_smoke_libtest_ecosystem_perf_mambalibs_pkgmgr_debt_are_wired",
    "worker_takes_one_agent_sized_leaf_5_to_15_min_at_a_time",
    "default_gates_are_offline_and_deterministic_unless_leaf_opts_in_to_live",
    "no_required_test_hides_behind_skip_xfail_or_stub_outcomes",
    "first_atomic_wave_leaf_range_2534_to_2603_is_enumerated_with_64_leaves",
]

[out_of_scope]
# Issue body: implementing the seven child gates and the 64 leaves
# belongs to those issues; release infra beyond test gates is
# elsewhere.
implementation_of_seven_child_gates = true
implementation_of_first_wave_64_leaves = true
release_infra_beyond_test_gates = true
c_extension_fast_paths = true
runtime_implementation_of_smoke_gate = true
runtime_implementation_of_cpython_lib_test_gate = true
runtime_implementation_of_ecosystem_real_world_gate = true
runtime_implementation_of_perf_10x_gate = true
runtime_implementation_of_mambalibs_gate = true
runtime_implementation_of_package_manager_gate = true
runtime_implementation_of_skip_xfail_debt_gate = true
