# uv-like package manager offline E2E gate fixture — closes #2532.
# Parent: #2526 (MVP test completeness and release gates).
#
# Pins the shape of the MVP uv-like package manager offline E2E
# gate. Test the uv-like package manager through an offline
# deterministic project workflow:
#
#   - Default package-manager gate is offline.
#   - Resolver conflict, yanked version, transitive dependency,
#     wheel install, lockfile, environment activation, and console
#     script paths are covered.
#   - Live PyPI remains opt-in.
#
# Atomic queue: #2584 unignore resolver yanked-version test using
# frozen index, #2585 add frozen local simple-index fixture, #2586
# add package-manager lockfile determinism test, #2587 unignore
# resolver conflict test using frozen index, #2588 add offline
# init-add-install-sync-run E2E skeleton, #2589 add venv
# site-packages import activation test, #2590 keep live PyPI checks
# outside default MVP gate, #2591 add pure-Python wheel install
# fixture, #2592 add transitive dependency resolution fixture,
# #2593 add console script entrypoint fixture.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/uv_like_pkgmgr_offline_e2e_fixture_2532.rs).

version = 1
fixture = "uv_like_package_manager_offline_e2e"
issue = 2532
parent_issue = 2526
profile = "mvp"
family = "uv_like_package_manager_offline_e2e"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_offline_default_gate = true
must_cover_resolver_conflict_path = true
must_cover_yanked_version_path = true
must_cover_transitive_dependency_path = true
must_cover_pure_python_wheel_install_path = true
must_cover_lockfile_determinism_path = true
must_cover_venv_site_packages_activation_path = true
must_cover_console_script_entrypoint_path = true
must_keep_live_pypi_opt_in = true
must_use_frozen_local_simple_index = true

[atomic_queue]
issue_2584_unignore_resolver_yanked_version_test_using_frozen_index = true
issue_2585_add_frozen_local_simple_index_fixture = true
issue_2586_add_package_manager_lockfile_determinism_test = true
issue_2587_unignore_resolver_conflict_test_using_frozen_index = true
issue_2588_add_offline_init_add_install_sync_run_e2e_skeleton = true
issue_2589_add_venv_site_packages_import_activation_test = true
issue_2590_keep_live_pypi_checks_outside_default_mvp_gate = true
issue_2591_add_pure_python_wheel_install_fixture = true
issue_2592_add_transitive_dependency_resolution_fixture = true
issue_2593_add_console_script_entrypoint_fixture = true

# Acceptance: "Default package-manager gate is offline."
[offline_default_gate_contract]
case = "default_package_manager_gate_is_offline"
must_default_to_offline_mode = true
must_fail_when_network_access_attempted_in_default_gate = true
must_use_frozen_local_simple_index = true
forbid_resolving_against_live_pypi_in_default_gate = true
forbid_downloading_artifacts_from_network_in_default_gate = true
network_access_attempted_failure_kind = "mvp_pkgmgr_network_access_attempted_in_offline_gate"
network_access_attempted_exit_code = 190
must_distinguish_network_attempt_from_index_misconfiguration = true
index_misconfiguration_failure_kind = "mvp_pkgmgr_frozen_index_misconfigured"
index_misconfiguration_exit_code = 191

# Acceptance: "Resolver conflict, yanked version, transitive
# dependency, wheel install, lockfile, environment activation, and
# console script paths are covered."
[covered_paths_contract]
case = "resolver_conflict_yanked_version_transitive_wheel_lockfile_activation_console_script_paths_are_covered"
must_cover_resolver_conflict_path = true
must_cover_yanked_version_path = true
must_cover_transitive_dependency_path = true
must_cover_pure_python_wheel_install_path = true
must_cover_lockfile_determinism_path = true
must_cover_venv_site_packages_activation_path = true
must_cover_console_script_entrypoint_path = true
forbid_silently_dropping_any_required_path = true
required_covered_paths = [
    "resolver_conflict",
    "yanked_version",
    "transitive_dependency",
    "pure_python_wheel_install",
    "lockfile_determinism",
    "venv_site_packages_activation",
    "console_script_entrypoint",
]
covered_paths_field_name = "covered_paths"
missing_covered_path_failure_kind = "mvp_pkgmgr_required_path_uncovered"
missing_covered_path_exit_code = 192
must_distinguish_missing_path_from_uncovered_path = true
uncovered_path_failure_kind = "mvp_pkgmgr_required_path_present_but_not_executed"
uncovered_path_exit_code = 193

# Acceptance: "Live PyPI remains opt-in."
[live_pypi_opt_in_contract]
case = "live_pypi_remains_opt_in"
must_keep_live_pypi_opt_in = true
must_not_run_live_pypi_in_default_gate = true
forbid_live_pypi_being_required_for_default_gate_to_pass = true
forbid_silently_enabling_live_pypi_in_default_gate = true
live_pypi_opt_in_field_name = "live_pypi_opt_in"
default_live_pypi_opt_in_value = false
live_pypi_enabled_in_default_gate_failure_kind = "mvp_pkgmgr_live_pypi_enabled_in_default_gate"
live_pypi_enabled_in_default_gate_exit_code = 194
must_distinguish_live_pypi_opt_in_from_offline_gate_breach = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "covered_paths",
    "live_pypi_opt_in",
    "frozen_index_path",
    "lockfile_determinism_status",
    "venv_activation_status",
    "console_script_entrypoint_status",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "default_package_manager_gate_is_offline",
    "resolver_conflict_yanked_version_transitive_wheel_lockfile_activation_console_script_paths_are_covered",
    "live_pypi_remains_opt_in",
]

[out_of_scope]
# Scope is the manifest gate itself; the ten atomic-queue children
# (#2584-#2593) own runtime implementation of resolver, lockfile,
# venv, wheel install, console script entry, and live PyPI opt-in.
runtime_implementation_of_resolver_conflict_detection = true
runtime_implementation_of_yanked_version_handling = true
runtime_implementation_of_transitive_dependency_resolution = true
runtime_implementation_of_pure_python_wheel_install = true
runtime_implementation_of_lockfile_determinism = true
runtime_implementation_of_venv_site_packages_activation = true
runtime_implementation_of_console_script_entrypoint = true
runtime_implementation_of_live_pypi_opt_in_path = true
