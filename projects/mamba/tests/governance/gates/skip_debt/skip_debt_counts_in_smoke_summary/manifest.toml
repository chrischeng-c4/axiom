# Skip-debt counts in smoke summary fixture — closes #2600.
# Parent: #2533 (ignored xfail and skip debt manifest gate).
#
# Pins the shape that wires ignore / xfail / skip inventory counts into
# the first smoke gate's summary so the worker hand-off can see how
# much of the suite is debt-deferred at a glance. Counts must be
# grouped by MVP objective where available, link back to the
# inventory output, and stay compact for the worker:
#
#   - Smoke summary includes ignore, xfail, and skip totals.
#   - Counts link back to the inventory command or output file.
#   - A test covers the summary fields.
#
# Out of scope (issue body): changing individual skip behavior.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/skip_debt_counts_smoke_summary_fixture_2600.rs).

version = 1
fixture = "skip_debt_counts_in_smoke_summary"
issue = 2600
parent_issue = 2533
profile = "skip_debt"
family = "skip_debt_counts_in_smoke_summary"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[smoke_gate_cross_reference]
fixture_issue = 2527
must_extend_existing_smoke_summary = true
must_not_break_existing_summary_consumers = true

[inventory_cross_reference]
categorization_fixture_issue = 2598
mvp_required_guard_fixture_issue = 2599
must_share_marker_kinds = true
shared_marker_kinds = ["ignore", "xfail", "skip"]

# Acceptance: "Smoke summary includes ignore, xfail, and skip totals."
[totals_in_summary_contract]
case = "smoke_summary_includes_ignore_xfail_skip_totals"
must_emit_ignore_total = true
must_emit_xfail_total = true
must_emit_skip_total = true
must_emit_combined_skip_debt_total = true
must_emit_counts_by_mvp_objective_when_available = true
summary_record_format = "json"
totals_required_fields = [
    "ignore_total",
    "xfail_total",
    "skip_total",
    "skip_debt_total",
    "counts_by_mvp_objective",
]
missing_total_failure_kind = "smoke_summary_missing_skip_debt_total"
missing_total_exit_code = 45
nonzero_count_must_not_be_omitted = true

# Acceptance: "Counts link back to the inventory command or output file."
[inventory_link_contract]
case = "counts_link_back_to_inventory"
must_link_back_to_inventory = true
inventory_link_field_name = "inventory_link"
allowed_inventory_link_kinds = [
    "command",
    "output_file",
]
must_state_inventory_link_kind = true
link_field_name_for_kind = "inventory_link_kind"
missing_inventory_link_failure_kind = "summary_missing_inventory_link"
missing_inventory_link_exit_code = 46
unknown_inventory_link_kind_failure_kind = "summary_inventory_link_kind_unknown"
unknown_inventory_link_kind_exit_code = 47

# Acceptance: "A test covers the summary fields."
[summary_fields_coverage_contract]
case = "summary_fields_are_tested"
must_have_test_covering_summary_fields = true
must_assert_every_required_field_present = true
must_assert_field_types_are_integers_for_counts = true
must_keep_summary_compact = true
summary_max_bytes = 4096
oversize_summary_failure_kind = "smoke_summary_exceeds_compact_budget"
oversize_summary_exit_code = 48

[runner_contract]
keys = [
    "outcome",
    "case",
    "ignore_total",
    "xfail_total",
    "skip_total",
    "skip_debt_total",
    "counts_by_mvp_objective",
    "inventory_link",
    "inventory_link_kind",
    "summary_size_bytes",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "smoke_summary_includes_ignore_xfail_skip_totals",
    "counts_link_back_to_inventory",
    "summary_fields_are_tested",
]

[out_of_scope]
# Issue: "Out of scope: changing individual skip behavior."
changing_individual_skip_behavior = true
