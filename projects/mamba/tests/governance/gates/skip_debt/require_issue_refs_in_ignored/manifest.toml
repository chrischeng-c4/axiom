# Require issue references in ignored tests fixture — closes #2601.
# Parent: #2533 (ignored xfail and skip debt manifest gate).
#
# Pins the lint that every `#[ignore]` in mamba tests must carry a
# nearby project-mamba issue reference OR a documented opt-in category
# (cross-ref #2598). Validation emits exact file:line for violations
# and runs without compiling the project (source-only scan):
#
#   - An ignored test without a linked issue fails validation.
#   - Existing ignored tests are either annotated or listed as current
#     violations.
#   - Validation can run without compiling the project.
#
# Out of scope (issue body): resolving the ignored tests.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/require_issue_refs_in_ignored_fixture_2601.rs).

version = 1
fixture = "require_issue_refs_in_ignored"
issue = 2601
parent_issue = 2533
profile = "skip_debt"
family = "require_issue_refs_in_ignored"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[categorization_cross_reference]
fixture_issue = 2598
inherited_category_allowed_values = ["opt_in", "blocker", "flaky", "obsolete"]
must_share_category_allowed_values = true

# What counts as a "nearby" linked issue reference for a #[ignore].
[reference_rule]
must_validate_reference_within_same_attribute_block = true
nearby_window_in_lines = 5
allowed_reference_kinds = [
    "issue_number",
    "documented_opt_in_category",
]
issue_number_pattern_must_match_project_mamba_only = true
project_mamba_label_required = "project:mamba"
forbid_external_repository_references = true

# Acceptance: "An ignored test without a linked issue fails validation."
[unlinked_ignore_failure_contract]
case = "unlinked_ignore_fails_validation"
must_validate_every_ignore_attribute = true
must_require_either_issue_reference_or_opt_in_category = true
unlinked_ignore_failure_kind = "ignore_attribute_without_linked_reference"
unlinked_ignore_exit_code = 49
must_emit_exact_file_for_violation = true
must_emit_exact_line_for_violation = true
violation_record_format = "json"
violation_required_fields = [
    "file",
    "line",
    "ignore_kind",
    "reference_kind",
    "reference_value",
    "failure_kind",
    "exit_code",
]

# Acceptance: "Existing ignored tests are either annotated or listed
# as current violations."
[existing_inventory_contract]
case = "existing_ignored_tests_are_annotated_or_listed"
must_emit_existing_violations_inventory = true
existing_inventory_record_format = "json"
existing_inventory_required_fields = [
    "file",
    "line",
    "category",
    "reference",
    "annotated",
]
must_separate_annotated_from_violations = true
must_not_silently_pass_unannotated = true
missing_inventory_failure_kind = "existing_violations_inventory_missing"
missing_inventory_exit_code = 50
inventory_must_be_committed_to_repo = true
inventory_relative_path_within_repo = "projects/mamba/tests/governance/gates/skip_debt/require_issue_refs_in_ignored/existing_violations.json"

# Acceptance: "Validation can run without compiling the project."
[compile_free_contract]
case = "validation_runs_without_compiling_project"
must_run_without_cargo_check = true
must_run_without_cargo_build = true
must_run_without_cargo_test = true
must_be_pure_source_scan = true
allowed_scan_modes = [
    "regex_scan_of_test_sources",
    "syn_parse_without_typeck",
]
forbidden_scan_modes = [
    "cargo_check",
    "cargo_build",
    "cargo_test",
    "rustc_invocation_with_codegen",
]
compile_free_violation_failure_kind = "validation_required_compilation_step"
compile_free_violation_exit_code = 51

[runner_contract]
keys = [
    "outcome",
    "case",
    "file",
    "line",
    "ignore_kind",
    "reference_kind",
    "reference_value",
    "annotated",
    "category",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "unlinked_ignore_fails_validation",
    "existing_ignored_tests_are_annotated_or_listed",
    "validation_runs_without_compiling_project",
]

[out_of_scope]
# Issue: "Out of scope: resolving the ignored tests."
resolving_ignored_tests = true
