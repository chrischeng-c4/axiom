# Ignore/xfail/skip inventory command fixture — closes #2602.
# Parent: #2533 (ignored xfail and skip debt manifest gate).
#
# Pins the single command (or test helper) that walks the mamba test
# tree and emits the canonical ignore / xfail / skip inventory used by
# the smoke summary (#2600) and the per-violation gates (#2598 /
# #2599 / #2601):
#
#   - Inventory command reports current debt counts.
#   - Command exits nonzero on parse errors or unknown marker formats.
#   - Summary can be linked from the MVP smoke report.
#
# Out of scope (issue body): removing existing debt.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/ignore_xfail_skip_inventory_command_fixture_2602.rs).

version = 1
fixture = "ignore_xfail_skip_inventory_command"
issue = 2602
parent_issue = 2533
profile = "skip_debt"
family = "ignore_xfail_skip_inventory_command"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[invocation]
must_have_single_canonical_entry_point = true
canonical_command_template = "mamba test inventory --debt"
must_be_runnable_offline = true
must_be_deterministic = true
must_not_require_cargo_build = true

[scan_scope]
must_scan_rust_test_ignores = true
must_scan_fixture_xfail_markers = true
must_scan_runtime_skip_annotations = true
scanned_marker_kinds = [
    "rust_ignore_attribute",
    "fixture_xfail_marker",
    "runtime_skip_annotation",
]
must_scan_only_within_projects_mamba_tests = true
scan_root_relative_path = "projects/mamba/tests"

[summary_cross_reference]
smoke_summary_fixture_issue = 2600
must_be_consumable_by_smoke_summary = true
shared_marker_kinds = ["ignore", "xfail", "skip"]

# Acceptance: "Inventory command reports current debt counts."
[debt_counts_contract]
case = "inventory_reports_debt_counts"
must_emit_counts_grouped_by_path = true
must_emit_counts_grouped_by_category = true
counts_record_format = "json"
counts_required_fields = [
    "path",
    "category",
    "marker_kind",
    "count",
    "total",
]
must_emit_counts_for_every_scanned_marker_kind = true
missing_counts_failure_kind = "inventory_missing_required_counts_field"
missing_counts_exit_code = 52

# Acceptance: "Command exits nonzero on parse errors or unknown
# marker formats."
[parse_error_contract]
case = "command_exits_nonzero_on_parse_or_unknown_marker"
parse_error_must_exit_nonzero = true
unknown_marker_format_must_exit_nonzero = true
parse_error_failure_kind = "inventory_marker_parse_error"
parse_error_exit_code = 53
unknown_marker_failure_kind = "inventory_unknown_marker_format"
unknown_marker_exit_code = 54
must_distinguish_parse_error_from_unknown_marker = true
must_emit_exact_file_and_line_for_parse_error = true

# Acceptance: "Summary can be linked from the MVP smoke report."
[smoke_link_contract]
case = "summary_linkable_from_smoke_report"
must_emit_link_artifact = true
link_artifact_format = "json"
link_artifact_required_fields = [
    "command",
    "command_template",
    "output_file_path",
    "schema_version",
    "checksum",
]
link_artifact_relative_path_within_repo = "projects/mamba/tests/governance/gates/skip_debt/ignore_xfail_skip_inventory_command/link.json"
must_be_stable_across_runs_on_identical_input = true
must_emit_schema_version = true
schema_version_field_name = "schema_version"
checksum_field_name = "checksum"
missing_link_artifact_failure_kind = "smoke_link_artifact_missing"
missing_link_artifact_exit_code = 55

[runner_contract]
keys = [
    "outcome",
    "case",
    "command",
    "path",
    "category",
    "marker_kind",
    "count",
    "total",
    "schema_version",
    "checksum",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "inventory_reports_debt_counts",
    "command_exits_nonzero_on_parse_or_unknown_marker",
    "summary_linkable_from_smoke_report",
]

[out_of_scope]
# Issue: "Out of scope: removing existing debt."
removing_existing_debt = true
