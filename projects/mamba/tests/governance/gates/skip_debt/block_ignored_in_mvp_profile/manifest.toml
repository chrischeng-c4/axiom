# Block-ignored-in-MVP-profile fixture — closes #2599.
# Parent: #2533 (ignored xfail and skip debt manifest gate).
#
# Pins the rule that the required MVP profile must reject any test id
# or fixture id that carries an ignore / xfail marker. Cross-references
# the categorization fixture #2598 (opt_in / blocker / flaky /
# obsolete) — required items in the MVP profile cannot carry ANY
# ignore marker, regardless of category. Non-required exploratory
# items remain free to be xfail with reason:
#
#   - A required fixture marked xfail fails the MVP profile
#     validation.
#   - A non-required exploratory fixture may remain xfail with reason.
#   - Failure output is actionable for the worker.
#
# Out of scope (issue body): defining every required fixture.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/block_ignored_in_mvp_profile_fixture_2599.rs).

version = 1
fixture = "block_ignored_in_mvp_profile"
issue = 2599
parent_issue = 2533
profile = "skip_debt"
family = "block_ignored_in_mvp_profile"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[categorization_cross_reference]
fixture_issue = 2598
must_share_category_allowed_values = true
inherited_category_allowed_values = ["opt_in", "blocker", "flaky", "obsolete"]

# Which marker kinds count as "ignored" for this gate.
[ignore_marker_kinds]
must_treat_ignore_as_skip = true
ignored_marker_kinds = [
    "ignore",
    "xfail",
    "skip",
]
must_apply_to_required_regardless_of_category = true

# Acceptance: "A required fixture marked xfail fails the MVP profile validation."
[required_xfail_blocked_contract]
case = "required_fixture_marked_xfail_fails_mvp_profile"
required_id_must_have_no_ignore_marker = true
required_id_with_ignore_marker_failure_kind = "mvp_required_item_carries_ignore_marker"
required_id_with_ignore_marker_exit_code = 42
must_validate_required_fixture_ids = true
must_validate_required_test_ids = true
must_block_on_any_ignored_marker_kind = true

# Acceptance: "A non-required exploratory fixture may remain xfail with reason."
[exploratory_xfail_allowed_contract]
case = "exploratory_fixture_may_remain_xfail_with_reason"
exploratory_id_may_remain_ignored = true
exploratory_id_must_state_reason = true
reason_field_name = "ignore_reason"
empty_reason_failure_kind = "exploratory_ignore_reason_empty"
empty_reason_exit_code = 43
must_not_block_exploratory_with_nonempty_reason = true
must_distinguish_exploratory_from_required_validation_path = true

# Acceptance: "Failure output is actionable for the worker."
[actionable_failure_output_contract]
case = "failure_output_is_actionable_for_worker"
must_emit_failure_record = true
failure_record_format = "json"
failure_required_fields = [
    "required_id",
    "marker_kind",
    "category",
    "ignore_reason",
    "parent_objective",
    "remediation_hint",
    "failure_kind",
    "exit_code",
]
must_name_parent_objective_per_violation = true
must_emit_remediation_hint = true
missing_parent_objective_failure_kind = "violation_missing_parent_objective"
missing_parent_objective_exit_code = 44

[runner_contract]
keys = [
    "outcome",
    "case",
    "required_id",
    "marker_kind",
    "category",
    "ignore_reason",
    "parent_objective",
    "remediation_hint",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "required_fixture_marked_xfail_fails_mvp_profile",
    "exploratory_fixture_may_remain_xfail_with_reason",
    "failure_output_is_actionable_for_worker",
]

[out_of_scope]
# Issue: "Out of scope: defining every required fixture."
defining_every_required_fixture = true
