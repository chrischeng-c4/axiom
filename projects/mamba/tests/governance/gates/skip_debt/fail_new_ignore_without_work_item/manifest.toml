# Fail-new-ignore-without-work-item fixture — closes #2603.
# Parent: #2533 (ignored xfail and skip debt manifest gate).
#
# Pins the guard that compares the current ignore / xfail marker
# inventory against a committed baseline (cross-ref the inventory
# command fixture #2602) and rejects any new marker that doesn't
# carry a linked work item (cross-ref #2601). Updating the baseline
# itself is an explicit review step gated by a CODEOWNERS-protected
# path so it can't slide in by accident:
#
#   - Adding #[ignore] without a work item fails the guard.
#   - Adding xfail without a work item fails the guard.
#   - Updating the baseline remains an explicit review step.
#
# Out of scope (issue body): making all existing markers pass
# immediately.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/fail_new_ignore_without_work_item_fixture_2603.rs).

version = 1
fixture = "fail_new_ignore_without_work_item"
issue = 2603
parent_issue = 2533
profile = "skip_debt"
family = "fail_new_ignore_without_work_item"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[inventory_cross_reference]
fixture_issue = 2602
must_consume_inventory_output = true
must_be_consistent_with_inventory_marker_kinds = true
shared_marker_kinds = ["ignore", "xfail", "skip"]

[reference_cross_reference]
fixture_issue = 2601
must_share_work_item_reference_definition = true

# The committed baseline against which the guard diffs.
[baseline]
baseline_relative_path_within_repo = "projects/mamba/tests/governance/gates/skip_debt/fail_new_ignore_without_work_item/baseline.json"
baseline_format = "json"
must_be_committed_to_repo = true
must_be_versioned = true
schema_version_field_name = "schema_version"
must_emit_baseline_checksum = true
checksum_field_name = "checksum"

# Acceptance: "Adding #[ignore] without a work item fails the guard."
[new_ignore_without_work_item_contract]
case = "new_ignore_without_work_item_fails_guard"
must_compare_current_inventory_to_baseline = true
must_emit_added_markers_diff = true
diff_record_format = "json"
diff_required_fields = [
    "file",
    "line",
    "marker_kind",
    "work_item_link",
    "baseline_status",
    "failure_kind",
    "exit_code",
]
must_fail_when_new_ignore_lacks_work_item = true
new_ignore_without_work_item_failure_kind = "new_ignore_without_work_item"
new_ignore_without_work_item_exit_code = 56

# Acceptance: "Adding xfail without a work item fails the guard."
[new_xfail_without_work_item_contract]
case = "new_xfail_without_work_item_fails_guard"
must_fail_when_new_xfail_lacks_work_item = true
new_xfail_without_work_item_failure_kind = "new_xfail_without_work_item"
new_xfail_without_work_item_exit_code = 57
must_distinguish_new_xfail_from_new_ignore = true
must_apply_same_work_item_rule_to_all_marker_kinds = true

# Acceptance: "Updating the baseline remains an explicit review step."
[baseline_review_contract]
case = "baseline_update_is_explicit_review_step"
must_require_explicit_review_to_update_baseline = true
must_require_codeowners_review_for_baseline_path = true
codeowners_review_required = true
baseline_must_be_in_codeowners_protected_path = true
forbid_silent_baseline_update = true
silent_baseline_update_failure_kind = "baseline_updated_without_review"
silent_baseline_update_exit_code = 58
must_emit_review_required_message_on_baseline_diff = true
review_required_message_field_name = "review_required_message"

[runner_contract]
keys = [
    "outcome",
    "case",
    "file",
    "line",
    "marker_kind",
    "work_item_link",
    "baseline_status",
    "review_required_message",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "new_ignore_without_work_item_fails_guard",
    "new_xfail_without_work_item_fails_guard",
    "baseline_update_is_explicit_review_step",
]

[out_of_scope]
# Issue: "Out of scope: making all existing markers pass immediately."
making_all_existing_markers_pass_immediately = true
