# Ignored-test categorization fixture — closes #2598.
# Parent: #2533 (ignored xfail and skip debt manifest gate).
#
# Pins the shape of the categorization rule that the ignore/xfail/skip
# inventory uses to distinguish "we chose not to run this" debt from
# "mamba can't do this yet" debt. Four mandatory categories — opt_in,
# blocker, flaky, obsolete — drive the per-category counters and the
# blocker→work_item link requirement:
#
#   - Inventory summary shows counts by category.
#   - Unclassified ignore markers fail validation.
#   - MVP-required tests cannot be categorized only as opt_in unless
#     justified.
#
# Out of scope (issue body): deleting obsolete tests.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/ignored_test_categorization_fixture_2598.rs).

version = 1
fixture = "ignored_test_categorization"
issue = 2598
parent_issue = 2533
profile = "skip_debt"
family = "ignored_test_categorization"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[categories]
allowed_values = ["opt_in", "blocker", "flaky", "obsolete"]
required_for_every_ignored_marker = true
case_sensitive = true
must_be_lowercase = true
unknown_category_failure_kind = "ignore_category_unknown"
unknown_category_exit_code = 36

# Acceptance: "Inventory summary shows counts by category."
[summary_counts_contract]
case = "inventory_summary_shows_counts_by_category"
must_emit_summary_section = true
summary_record_format = "json"
must_emit_count_for_every_category = true
must_emit_total_count = true
summary_required_fields = [
    "category",
    "count",
    "total",
    "profile",
]
missing_category_count_failure_kind = "summary_missing_category_count"
missing_category_count_exit_code = 37

# Acceptance: "Unclassified ignore markers fail validation."
[validation_contract]
case = "unclassified_ignore_markers_fail_validation"
must_validate_every_ignored_marker_has_category = true
must_validate_category_is_in_allowed_values = true
must_validate_blocker_links_work_item = true
unclassified_marker_failure_kind = "ignore_marker_unclassified"
unclassified_marker_exit_code = 38
blocker_without_work_item_failure_kind = "blocker_missing_work_item_link"
blocker_without_work_item_exit_code = 39
must_distinguish_unclassified_from_blocker_link_missing = true

# Acceptance: "MVP-required tests cannot be categorized only as opt_in
# unless justified."
[mvp_required_guard_contract]
case = "mvp_required_tests_cannot_be_only_opt_in_without_justification"
must_block_opt_in_only_for_mvp_required = true
must_require_explicit_justification_when_mvp_required_is_opt_in = true
justification_field_name = "mvp_required_opt_in_justification"
must_require_justification_to_link_work_item = true
mvp_required_opt_in_without_justification_failure_kind = "mvp_required_opt_in_unjustified"
mvp_required_opt_in_without_justification_exit_code = 40
justification_missing_work_item_failure_kind = "opt_in_justification_missing_work_item"
justification_missing_work_item_exit_code = 41

[runner_contract]
keys = [
    "outcome",
    "case",
    "marker_id",
    "marker_kind",
    "category",
    "work_item_link",
    "mvp_required",
    "justification_present",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "inventory_summary_shows_counts_by_category",
    "unclassified_ignore_markers_fail_validation",
    "mvp_required_tests_cannot_be_only_opt_in_without_justification",
]

[out_of_scope]
# Issue: "Out of scope: deleting obsolete tests."
deleting_obsolete_tests = true
