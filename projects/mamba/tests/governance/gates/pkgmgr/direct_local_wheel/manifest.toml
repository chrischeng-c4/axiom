# Package manager direct local wheel fixture — closes #2689.
# Parent: #2532 (package manager validation cohort).
#
# Pins the contract for installing from a direct local wheel path
# (outside the frozen simple-index lookup path):
#
#   - Direct local wheel install works offline.
#   - Lockfile records deterministic local source metadata.
#   - Missing wheel path fails with a clear diagnostic.
#
# Out of scope (issue body): remote URL dependencies.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_direct_local_wheel_fixture_2689.rs).

version = 1
fixture = "pkgmgr_direct_local_wheel"
issue = 2689
parent_issue = 2532
profile = "package_manager"
family = "direct_local_wheel"

network = "offline"
# Direct file path — not the simple-index path. The resolver must
# bypass any index lookup and consume the wheel by its on-disk path.
index_source = "direct_file_path"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The wheel under test. The on-disk filename follows PEP 427 so the
# resolver can read name/version/tags from the filename alone.
[wheel]
name = "frozen_local_wheel"
version = "0.1.0"
filename = "frozen_local_wheel-0.1.0-py3-none-any.whl"
relative_path = "wheels/frozen_local_wheel-0.1.0-py3-none-any.whl"
python_tag = "py3"
abi_tag = "none"
platform_tag = "any"

# Acceptance: "Direct local wheel install works offline." The action
# adds the wheel via its direct file path — not via package name.
[action]
command = ["add", "./wheels/frozen_local_wheel-0.1.0-py3-none-any.whl"]
expected_outcome = "pass"
expected_exit_code = 0
must_install_package = true

# Acceptance: "Lockfile records deterministic local source metadata."
# The lockfile pins the local source via path + hash, not via an
# index URL. Replay must be byte-identical.
[lockfile_assertion]
file = "mamba.lock"
must_contain_dependency = "frozen_local_wheel"
must_pin_version = "0.1.0"
must_record_source_kind = "direct_file"
must_record_relative_path = "wheels/frozen_local_wheel-0.1.0-py3-none-any.whl"
must_record_hash = true
hash_algorithm = "sha256"
deterministic = true
byte_identical_on_replay = true
must_not_record_index_url = true

# After install, the package metadata must be reachable and the
# import probe must succeed.
[install_assertion]
must_install_package = "frozen_local_wheel"
import_probe = "frozen_local_wheel"
expected_import_outcome = "import_ok"
metadata_records_local_source = true

# Acceptance: "Missing wheel path fails with a clear diagnostic."
# If the path does not exist on disk, the resolver fails before any
# install side-effects, and the diagnostic names the missing path.
[missing_wheel_case]
relative_path = "wheels/does_not_exist-0.0.0-py3-none-any.whl"
expected_outcome = "fail"
expected_exit_code = 1
must_fail_before_install = true
must_not_install_package = true
must_not_mutate_lockfile = true
diagnostic_must_name_path = true
diagnostic_message_substring = "does_not_exist"

[runner_contract]
keys = [
    "outcome",
    "wheel_name",
    "wheel_version",
    "wheel_path",
    "source_kind",
    "exit_code",
    "diagnostic_message",
    "case",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = ["direct_local_wheel", "missing_wheel"]

[out_of_scope]
# Issue: "Out of scope: remote URL dependencies."
remote_url_dependencies = true
