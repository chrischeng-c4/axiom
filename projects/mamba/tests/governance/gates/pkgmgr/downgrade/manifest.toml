# Package manager downgrade fixture — closes #2855.
# Parent: #2532 (package manager validation cohort).
#
# Pins the contract for downgrading a frozen-index dependency to an
# older pinned version (or tightening a constraint):
#
#   - Downgrade changes only expected package entries.
#   - Constraint conflict reports deterministic diagnostic.
#   - Fixture is offline and isolated.
#
# Out of scope (issue body): full version-selection UX.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_downgrade_fixture_2855.rs).

version = 1
fixture = "pkgmgr_downgrade"
issue = 2855
parent_issue = 2532
profile = "package_manager"
family = "downgrade"

network = "offline"
index_source = "frozen_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Frozen-index package ships two versions. Each version exposes a
# sentinel attribute so the import probe can confirm exactly which
# version is installed.
[package]
name = "frozen_versioned_pkg"
older_version = "0.1.0"
newer_version = "0.2.0"
module_name = "frozen_versioned_pkg"
sentinel_attribute = "__version__"
older_sentinel_value = "0.1.0"
newer_sentinel_value = "0.2.0"

# A second, unrelated frozen-index package the lockfile already
# carries. Its entry MUST be unchanged by the downgrade.
[other_dependency]
name = "frozen_unrelated_pkg"
version = "0.1.0"
must_be_unchanged = true

# Initial pin: newer version. The downgrade flips this to the older.
[initial_state]
command = ["add", "frozen_versioned_pkg==0.2.0"]
expected_outcome = "pass"
expected_exit_code = 0
locked_version_must_be = "0.2.0"
import_probe_value_must_be = "0.2.0"

# Acceptance: "Downgrade changes only expected package entries."
[downgrade_action]
command = ["add", "frozen_versioned_pkg==0.1.0"]
expected_outcome = "pass"
expected_exit_code = 0
locked_version_must_become = "0.1.0"
locked_version_must_no_longer_be = "0.2.0"
must_only_touch_target_package = true
import_probe_value_must_be = "0.1.0"

# The lockfile diff is bounded to the target package. Other entries
# are byte-identical between the initial state and the downgrade.
[lockfile_diff_assertion]
file = "mamba.lock"
deterministic = true
byte_identical_on_replay = true
must_record_old_version = "0.2.0"
must_record_new_version = "0.1.0"
must_only_change_target_package = "frozen_versioned_pkg"
other_packages_byte_identical = true
must_not_touch_unrelated = "frozen_unrelated_pkg"

# Acceptance: "Constraint conflict reports deterministic diagnostic."
# When the constraint is unsatisfiable against the frozen index
# (e.g. a non-existent version), the resolver reports a stable
# diagnostic with the names and the constraint.
[constraint_conflict_case]
command = ["add", "frozen_versioned_pkg==9.9.9"]
expected_outcome = "fail"
expected_exit_code = 1
must_not_mutate_lockfile = true
diagnostic_is_deterministic = true
must_name_package = true
must_name_requested_constraint = true
must_name_available_versions = true
diagnostic_message_substring = "frozen_versioned_pkg"

[runner_contract]
keys = [
    "outcome",
    "case",
    "package",
    "previous_version",
    "next_version",
    "import_outcome",
    "lockfile_change_count",
    "exit_code",
    "diagnostic_message",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = ["initial_pin", "downgrade", "constraint_conflict"]

[out_of_scope]
# Issue: "Out of scope: full version-selection UX."
full_version_selection_ux = true
