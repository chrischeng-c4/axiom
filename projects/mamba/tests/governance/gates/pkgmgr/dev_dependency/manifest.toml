# Package manager dev dependency fixture — closes #2852.
# Parent: #2532 (package manager validation cohort).
#
# Pins the contract for dev dependencies separated from runtime
# dependencies in the uv-like workflow:
#
#   - Dev dependency is recorded distinctly from runtime dependency.
#   - Runtime-only install does not expose dev dependency unless
#     policy says otherwise.
#   - Unsupported dev dependency behavior is a linked blocker, not
#     silent pass.
#
# Out of scope (issue body): full dependency group UX. The fixture
# covers ONE dev dep and ONE runtime dep — no group fan-out.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_dev_dependency_fixture_2852.rs).

version = 1
fixture = "pkgmgr_dev_dependency"
issue = 2852
parent_issue = 2532
profile = "package_manager"
family = "dev_dependency"

network = "offline"
index_source = "frozen_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The frozen local index ships one runtime dep and one dev-only dep.
# The dev dep must NOT leak into the runtime environment.
[dependencies]
runtime_name = "frozen_runtime_pkg"
runtime_version = "0.1.0"
dev_name = "frozen_dev_pkg"
dev_version = "0.1.0"

# Acceptance: "Dev dependency is recorded distinctly from runtime
# dependency." The action adds the dev dep via a `--dev` flag.
[add_dev_action]
command = ["add", "--dev", "frozen_dev_pkg==0.1.0"]
expected_outcome = "pass"
expected_exit_code = 0
must_add_dev_section = true

# The lockfile carries two distinct sections. The runtime section
# does NOT contain the dev dep; the dev section does.
[lockfile_assertion]
file = "mamba.lock"
deterministic = true
byte_identical_on_replay = true
must_contain_runtime_dependency = "frozen_runtime_pkg"
must_contain_dev_dependency = "frozen_dev_pkg"
runtime_section_must_not_contain = "frozen_dev_pkg"
dev_section_must_not_contain = "frozen_runtime_pkg"
runtime_section_key = "dependencies"
dev_section_key = "dev-dependencies"

# Acceptance: "Runtime-only install does not expose dev dependency
# unless policy says otherwise."
[runtime_only_sync_case]
command = ["sync"]
expected_outcome = "pass"
expected_exit_code = 0
must_install_runtime_dependency = true
must_not_install_dev_dependency = true
runtime_import_probe = "frozen_runtime_pkg"
runtime_expected_import_outcome = "import_ok"
dev_import_probe = "frozen_dev_pkg"
dev_expected_import_outcome = "module_not_found"

# Opt-in install behavior. When supported, the dev sync pulls in the
# dev dep as well. When not yet supported, the runner must surface
# a linked blocker — not silently pass.
[dev_sync_case]
command = ["sync", "--dev"]
supported = true
expected_outcome = "pass"
expected_exit_code = 0
must_install_runtime_dependency = true
must_install_dev_dependency = true
dev_import_probe = "frozen_dev_pkg"
dev_expected_import_outcome = "import_ok"

# Acceptance: "Unsupported dev dependency behavior is a linked
# blocker, not silent pass." The unsupported-state contract pins the
# outcome and the linked tracking issue.
[unsupported_behavior_contract]
when_dev_sync_unsupported_outcome = "blocked"
must_emit_blocker_diagnostic = true
must_link_tracking_issue = true
linked_blocker_issue = 2852
forbid_silent_pass = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "runtime_dependency",
    "dev_dependency",
    "lockfile_runtime_section_contains_dev",
    "lockfile_dev_section_contains_dev",
    "runtime_import_outcome",
    "dev_import_outcome",
    "exit_code",
    "blocker_issue",
]
outcome_values = ["pass", "fail", "missing", "skip", "blocked"]
case_values = ["add_dev", "runtime_only_sync", "dev_sync"]

[out_of_scope]
# Issue: "Out of scope: full dependency group UX."
full_dependency_group_ux = true
