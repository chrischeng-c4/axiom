# Package manager init fixture — closes #2679.
# Parent: #2532 (package manager validation cohort).
# Profile: #2816 / validation/profiles/package_manager.toml [families.init].
#
# Pins the contract for `mamba init` in an empty directory:
#
#   - Init creates the expected files exactly once.
#   - Re-running init is idempotent (default policy: keep-existing).
#   - No user home or global cache state is modified.
#   - Runs offline; no network reads or writes.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_init_fixture_2679.rs).

version = 1
fixture = "pkgmgr_init"
issue = 2679
parent_issue = 2532
profile = "package_manager"
family = "init"

# Acceptance: "Keep the test offline."
network = "offline"

# Acceptance: "No user home or global cache state is modified."
[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Acceptance: "Init creates the expected files exactly once."
# The list below is the canonical first-run output of `mamba init`.
# `must_exist` are created with the default content; `must_not_exist`
# pins what init does NOT create on a fresh run.
[outputs]
must_exist = [
    "mamba.toml",
    ".python-version",
    ".gitignore",
    "README.md",
    "src/__init__.py",
]
must_not_exist = [
    "mamba.lock",
    ".venv",
    "node_modules",
]

# Default `mamba.toml` fields the gate locks in.
[outputs.manifest_defaults]
# The created mamba.toml MUST carry these top-level keys with the
# given default values. Field names match the `[project]` PEP 621
# style table; the gate accepts either an inline or split table.
project_name_from_dir = true
project_version = "0.1.0"
python_requires = ">=3.12"
dependencies_default = []
dev_dependencies_default = []

# Acceptance: "Re-running init fails or is idempotent according to
# documented policy."
[reentry]
policy = "idempotent_keep_existing"
# When invoked a second time on the same project, the command must
# NOT overwrite the existing mamba.toml. Touch-mtime check pins this.
must_preserve = ["mamba.toml", "src/__init__.py", "README.md"]
# Second-run exit must be a clean success — not an error — when the
# directory is already initialized.
expected_exit_code = 0
expected_stderr_contains = "already initialized"

[runner_contract]
# JSON keys the gate runner emits per fixture invocation. Locked so
# the package_manager profile runner can render its summary.
keys = [
    "outcome",
    "project_path",
    "files_created",
    "files_preserved",
    "exit_code",
    "reentry_policy",
]
outcome_values = ["pass", "fail", "missing", "skip"]
