# Package manager index fixture — closes #507.
# Parent: #459 (package management).
# Profile: validation/profiles/package_manager.toml [families.index].
#
# Pins the contract for generating a frozen local package index from
# local wheel artifacts:
#
#   - `mamba index build` creates the normalized package/version layout.
#   - The generated layout is consumable by `mamba add --index` and
#     `mamba lock --index`.
#   - Malformed wheel filenames fail before output mutation.
#   - Runs offline; no PyPI / external network.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_index_fixture_507.rs).

version = 1
fixture = "pkgmgr_index"
issue = 507
parent_issue = 459
profile = "package_manager"
family = "index"

network = "offline"
index_source = "generated_frozen_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[wheel]
name = "frozen_index_demo"
version = "0.2.0"
filename = "frozen_index_demo-0.2.0-py3-none-any.whl"
python_tag = "py3"
abi_tag = "none"
platform_tag = "any"

[action]
command = ["index", "build", "--out", "index", "wheels"]
expected_exit_code = 0
must_create_index_layout = "index/frozen-index-demo/0.2.0/frozen_index_demo-0.2.0-py3-none-any.whl"
byte_identical_on_replay = true

[consumer_assertion]
add_command = ["add", "frozen-index-demo", "--index", "index"]
lock_command = ["lock", "--index", "index"]
must_pin_version = "0.2.0"
must_run_offline = true

[malformed_wheel_case]
filename = "not-a-valid-wheel.whl"
expected_exit_code = 1
must_fail_before_output_mutation = true
diagnostic_message_substring = "parse wheel filename"

[runner_contract]
keys = [
    "outcome",
    "wheel_name",
    "wheel_version",
    "index_path",
    "exit_code",
    "diagnostic_stream",
]
outcome_values = ["pass", "fail", "missing", "skip"]
