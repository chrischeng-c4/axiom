# Package manager lock fixture — closes #2682.
# Parent: #2532 (package manager validation cohort).
# Profile: validation/profiles/package_manager.toml [families.lock].
#
# Pins the contract for `mamba lock` against a project whose
# mamba.toml lists one direct dependency that pulls in one
# transitive dependency from the frozen local index:
#
#   - Lockfile contains both direct and transitive dependencies.
#   - No package files are installed during lock (site-packages
#     stays untouched until `sync` / `install`).
#   - Lock failure diagnostics are deterministic.
#   - Runs offline against the frozen local index.
#
# Out of scope (issue body): resolver algorithm improvements.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_lock_fixture_2682.rs).

version = 1
fixture = "pkgmgr_lock"
issue = 2682
parent_issue = 2532
profile = "package_manager"
family = "lock"

network = "offline"
index_source = "frozen_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Starting state — project mentions one direct dep in mamba.toml;
# no lockfile, no installed site-packages yet. The frozen local
# index carries the direct dep and one transitive dep.
[setup]
project_initialized = true
direct_dependency = "frozen_demo_pkg"
direct_version = "0.1.0"
transitive_dependency = "frozen_demo_transitive"
transitive_version = "0.2.0"
lockfile_present = false
site_packages_populated = false

[action]
command = ["lock"]
expected_exit_code = 0

# Acceptance: "Lockfile contains direct and transitive
# dependencies."
[lockfile_assertion]
file = "mamba.lock"
must_exist = true
must_contain_dependencies = [
    "frozen_demo_pkg",
    "frozen_demo_transitive",
]
must_distinguish_direct_vs_transitive = true
deterministic = true
byte_identical_on_replay = true

# Acceptance: "No package files are installed during lock-only run."
[install_assertion]
site_packages_must_remain_untouched = true
project_env_must_not_be_created = true
no_wheels_extracted = true

# Acceptance: "Lock failure diagnostics are deterministic."
# Failure case: the project declares a dep the frozen local index
# does not carry. The gate runs this on a SECOND project setup and
# expects a non-zero exit + a deterministic, named diagnostic.
[failure_case]
unresolvable_dependency = "package_that_does_not_exist"
expected_exit_code = 1
expected_stderr_contains = "no candidate"
diagnostic_is_deterministic = true
diagnostic_must_name_failing_dependency = true
must_not_write_partial_lockfile = true

[runner_contract]
keys = [
    "outcome",
    "project_path",
    "lockfile_path",
    "resolved_count",
    "direct_count",
    "transitive_count",
    "exit_code",
    "diagnostic_stream",
]
outcome_values = ["pass", "fail", "missing", "skip"]

[out_of_scope]
# Issue: "Out of scope: resolver algorithm improvements."
resolver_algorithm_improvements = true
