# Package manager extras resolution fixture — closes #2690.
# Parent: #2532 (package manager validation cohort).
#
# Pins the contract for extras dependency resolution against the
# frozen local index:
#
#   - Extra dependency appears only when requested.
#   - Runtime import of extra dependency matches lockfile state.
#   - No network is used.
#
# Out of scope (issue body): all marker and extras combinations —
# the fixture covers ONE optional extra declared by ONE base package.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_extras_resolution_fixture_2690.rs).

version = 1
fixture = "pkgmgr_extras_resolution"
issue = 2690
parent_issue = 2532
profile = "package_manager"
family = "extras_resolution"

network = "offline"
index_source = "frozen_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Base package on the frozen index declares one optional extra. The
# extra pulls in exactly one additional dependency.
[base_package]
name = "frozen_extras_base"
version = "0.1.0"

[extra]
name = "fancy"
dependency = "frozen_extras_fancy_dep"
dependency_version = "0.1.0"

# Without the extra requested, the lockfile must NOT include the
# extra dependency, and the runtime import of the extra dep must
# fail (module_not_found).
[without_extra_case]
command = ["add", "frozen_extras_base==0.1.0"]
expected_outcome = "pass"
expected_exit_code = 0
must_install_base = true
must_not_install_extra_dependency = true
import_probe = "frozen_extras_fancy_dep"
expected_import_outcome = "module_not_found"

# Acceptance: "Extra dependency appears only when requested." The
# `[extra]` form follows PEP 508: `pkg[extra]`.
[with_extra_case]
command = ["add", "frozen_extras_base[fancy]==0.1.0"]
expected_outcome = "pass"
expected_exit_code = 0
must_install_base = true
must_install_extra_dependency = true
import_probe = "frozen_extras_fancy_dep"
expected_import_outcome = "import_ok"

# Acceptance: "Assert lockfile contents differ deterministically."
[lockfile_diff_assertion]
file = "mamba.lock"
deterministic = true
byte_identical_on_replay = true
without_extra_must_not_contain = "frozen_extras_fancy_dep"
with_extra_must_contain = "frozen_extras_fancy_dep"
extras_field_required_when_requested = true
extras_field_value_when_requested = ["fancy"]

# Acceptance: "Runtime import of extra dependency matches lockfile
# state." Both directions must hold — the runtime import probe
# matches the lockfile contents.
[runtime_lockfile_consistency]
without_extra_import_matches_lockfile = true
with_extra_import_matches_lockfile = true
diagnostic_must_name_extra_when_mismatched = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "base_package",
    "extra_name",
    "extra_dependency",
    "lockfile_contains_extra_dep",
    "import_outcome",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = ["without_extra", "with_extra"]

[out_of_scope]
# Issue: "Out of scope: all marker and extras combinations."
all_marker_and_extras_combinations = true
