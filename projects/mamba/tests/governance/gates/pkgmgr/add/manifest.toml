# Package manager add fixture — closes #2681.
# Parent: #2532 (package manager validation cohort).
# Profile: validation/profiles/package_manager.toml [families.add].
#
# Pins the contract for `mamba add <dep>` against a freshly-init'd
# project, resolving against the frozen local index:
#
#   - Add records the requested dependency deterministically.
#   - Missing package fails with a clear diagnostic.
#   - Runs offline; no PyPI / external network.
#
# Out of scope (issue body): complex version selection. The fixture
# uses a single specifier shape (`name==version`) and one package.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_add_fixture_2681.rs).

version = 1
fixture = "pkgmgr_add"
issue = 2681
parent_issue = 2532
profile = "package_manager"
family = "add"

# Acceptance: "Test runs without PyPI or external network."
network = "offline"
index_source = "frozen_local"

# Acceptance: project sandbox stays inside its temp directory; no
# user home reads, no global cache reads/writes.
[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Starting state — init'd project, no deps, no lockfile.
[setup]
project_initialized = true
dependencies_present = []
lockfile_present = false

# The action under test (happy path).
[action]
command = ["add", "frozen_demo_pkg==0.1.0"]
dependency = "frozen_demo_pkg"
version = "0.1.0"
expected_exit_code = 0

# Acceptance: "Add records the requested dependency
# deterministically."
[metadata_assertion]
file = "mamba.toml"
must_contain_dependency = "frozen_demo_pkg"
must_record_version = "0.1.0"
# Determinism: running `add` twice with the same args (against the
# same setup) must produce a byte-identical mamba.toml.
deterministic = true
byte_identical_on_replay = true

[lockfile_assertion]
file = "mamba.lock"
must_exist_after_add = true
must_contain_dependency = "frozen_demo_pkg"
must_pin_version = "0.1.0"
deterministic = true
byte_identical_on_replay = true

# Acceptance: "Missing package fails with a clear diagnostic."
# Second invocation against a package the frozen index does NOT
# carry; the gate runs this on the SAME project and expects the
# command to fail cleanly without mutating the project state.
[missing_package_case]
command = ["add", "package_that_does_not_exist"]
expected_exit_code = 1
expected_stderr_contains = "not found"
must_not_mutate_metadata = true
must_not_mutate_lockfile = true

[runner_contract]
keys = [
    "outcome",
    "project_path",
    "added_dependency",
    "added_version",
    "lockfile_path",
    "exit_code",
    "diagnostic_stream",
]
outcome_values = ["pass", "fail", "missing", "skip"]

[out_of_scope]
# Issue: "Out of scope: complex version selection."
complex_version_selection = true
