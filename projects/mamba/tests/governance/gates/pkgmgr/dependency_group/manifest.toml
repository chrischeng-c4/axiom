# Package manager dependency group fixture — closes #2856.
# Parent: #2532 (package manager validation cohort).
#
# Pins the contract for optional dependency groups beyond the
# default runtime set (PEP 735 spirit):
#
#   - Group dependency is included only when requested.
#   - Summary names selected groups.
#   - Fixture is fully offline.
#
# Out of scope (issue body): every group-selection CLI variant —
# the fixture covers ONE named group with ONE dependency.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_dependency_group_fixture_2856.rs).

version = 1
fixture = "pkgmgr_dependency_group"
issue = 2856
parent_issue = 2532
profile = "package_manager"
family = "dependency_group"

network = "offline"
index_source = "frozen_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The project declares ONE runtime dep + ONE named dependency group
# called "docs". The docs group pulls ONE dep from the frozen index.
[runtime_dependency]
name = "frozen_runtime_pkg"
version = "0.1.0"

[group]
name = "docs"
dependency = "frozen_docs_pkg"
dependency_version = "0.1.0"

# Default sync (no group requested). The docs dep MUST NOT install.
[default_sync_case]
command = ["sync"]
expected_outcome = "pass"
expected_exit_code = 0
must_install_runtime_dependency = true
must_not_install_group_dependency = true
group_import_probe = "frozen_docs_pkg"
group_expected_import_outcome = "module_not_found"
summary_selected_groups_must_be = []

# Acceptance: "Group dependency is included only when requested."
[group_sync_case]
command = ["sync", "--group", "docs"]
expected_outcome = "pass"
expected_exit_code = 0
must_install_runtime_dependency = true
must_install_group_dependency = true
group_import_probe = "frozen_docs_pkg"
group_expected_import_outcome = "import_ok"
summary_selected_groups_must_be = ["docs"]

# Lockfile carries a `[dependency-groups]` table that's deterministic
# across runs. The lockfile shape is the same with or without the
# group selected; only the per-sync install plan differs.
[lockfile_assertion]
file = "mamba.lock"
deterministic = true
byte_identical_on_replay = true
must_contain_runtime_dependency = "frozen_runtime_pkg"
must_contain_group_section = "dependency-groups"
must_contain_group_dependency = "frozen_docs_pkg"
group_section_records_group_name = "docs"
runtime_section_must_not_contain = "frozen_docs_pkg"

# Acceptance: "Summary names selected groups."
[summary_assertion]
must_name_selected_groups = true
must_name_available_groups = true
must_name_runtime_dependency_count = true
must_name_group_dependency_count = true
selected_groups_field_key = "selected_groups"
available_groups_field_key = "available_groups"

[runner_contract]
keys = [
    "outcome",
    "case",
    "selected_groups",
    "available_groups",
    "runtime_dependency",
    "group_dependency",
    "runtime_import_outcome",
    "group_import_outcome",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = ["default_sync", "group_sync"]

[out_of_scope]
# Issue: "Out of scope: every group-selection CLI variant."
every_group_selection_cli_variant = true
