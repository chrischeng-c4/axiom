# Package manager sync idempotence fixture — closes #2683.
# Parent: #2532 (package manager validation cohort).
# Profile: validation/profiles/package_manager.toml [families.sync].
#
# Pins the contract for `mamba sync` against an init'd project with
# an existing lockfile and frozen local index: running sync twice
# against the same inputs must be a clean no-op the second time.
#
#   - Second sync does not change lockfile content.
#   - Installed package import still works after both syncs.
#   - Output states idempotent no-op or equivalent behavior.
#   - Runs offline against the frozen local index.
#
# Out of scope (issue body): performance tuning of sync.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_sync_idempotence_fixture_2683.rs).

version = 1
fixture = "pkgmgr_sync_idempotence"
issue = 2683
parent_issue = 2532
profile = "package_manager"
family = "sync"

network = "offline"
index_source = "frozen_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Starting state — project initialized, lockfile already pinned, no
# environment yet (first sync will create it).
[setup]
project_initialized = true
locked_dependency = "frozen_demo_pkg"
locked_version = "0.1.0"
lockfile_present = true
project_env_present = false

# First run — installs the locked deps into a fresh env.
[first_run]
command = ["sync"]
expected_exit_code = 0
must_create_env = true
must_install_locked_dependency = true

# Second run — must be a clean no-op.
[second_run]
command = ["sync"]
expected_exit_code = 0
must_not_create_env = true
must_not_reinstall_packages = true

# Acceptance: "Second sync does not change lockfile content."
[lockfile_assertion]
file = "mamba.lock"
must_be_unchanged_between_runs = true
byte_identical_between_runs = true

# Acceptance: "Installed package import still works after both
# syncs."
[environment_assertion]
import_probe = "frozen_demo_pkg"
expected_import_outcome_after_first_run = "import_ok"
expected_import_outcome_after_second_run = "import_ok"

# Acceptance: "Output states idempotent no-op or equivalent
# behavior." The runner reports a structured "no-op"/"unchanged"
# signal for the second invocation.
[idempotence_assertion]
second_run_must_report_no_op = true
allowed_no_op_signals = [
    "no_op",
    "unchanged",
    "already_synced",
    "up_to_date",
]
second_run_changed_file_count_is_zero = true

[runner_contract]
keys = [
    "outcome",
    "project_path",
    "lockfile_path",
    "environment_path",
    "first_run_changed_files",
    "second_run_changed_files",
    "exit_code",
    "no_op_signal",
]
outcome_values = ["pass", "fail", "missing", "skip"]

[out_of_scope]
# Issue: "Out of scope: performance tuning of sync."
sync_performance_tuning = true
