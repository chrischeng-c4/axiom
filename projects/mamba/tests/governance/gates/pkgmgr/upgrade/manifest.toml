# Package manager upgrade fixture — closes #2857.
# Parent: #2532 (package manager validation cohort).
#
# Pins the contract for upgrading a frozen-index dependency from an
# older pinned version to a newer one:
#
#   - Upgrade changes only expected package entries.
#   - Wrong or missing version change fails the test.
#   - Output names old and new versions.
#
# Out of scope (issue body): full resolver backtracking policy.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_upgrade_fixture_2857.rs).

version = 1
fixture = "pkgmgr_upgrade"
issue = 2857
parent_issue = 2532
profile = "package_manager"
family = "upgrade"

network = "offline"
index_source = "frozen_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Frozen-index package ships two versions. Each version exposes a
# sentinel attribute so the import probe can confirm exactly which
# version is installed.
[package]
name = "frozen_versioned_pkg"
older_version = "0.1.0"
newer_version = "0.2.0"
module_name = "frozen_versioned_pkg"
sentinel_attribute = "__version__"
older_sentinel_value = "0.1.0"
newer_sentinel_value = "0.2.0"

# A second, unrelated frozen-index package the lockfile already
# carries. Its entry MUST be unchanged by the upgrade.
[other_dependency]
name = "frozen_unrelated_pkg"
version = "0.1.0"
must_be_unchanged = true

# Initial pin: older version.
[initial_state]
command = ["add", "frozen_versioned_pkg==0.1.0"]
expected_outcome = "pass"
expected_exit_code = 0
locked_version_must_be = "0.1.0"
import_probe_value_must_be = "0.1.0"

# Acceptance: "Upgrade changes only expected package entries."
[upgrade_action]
command = ["add", "frozen_versioned_pkg==0.2.0"]
expected_outcome = "pass"
expected_exit_code = 0
locked_version_must_become = "0.2.0"
locked_version_must_no_longer_be = "0.1.0"
must_only_touch_target_package = true
import_probe_value_must_be = "0.2.0"

# The lockfile diff is bounded to the target package. Other entries
# are byte-identical between the initial state and the upgrade.
[lockfile_diff_assertion]
file = "mamba.lock"
deterministic = true
byte_identical_on_replay = true
must_record_old_version = "0.1.0"
must_record_new_version = "0.2.0"
must_only_change_target_package = "frozen_versioned_pkg"
other_packages_byte_identical = true
must_not_touch_unrelated = "frozen_unrelated_pkg"

# Acceptance: "Output names old and new versions."
[output_assertion]
must_name_package = true
must_name_old_version = true
must_name_new_version = true
output_records_diff_direction = "upgrade"
old_version_field_key = "from_version"
new_version_field_key = "to_version"

# Acceptance: "Wrong or missing version change fails the test."
# Repeating the upgrade with the same version is a no-op — but if
# the runner reports a version *change* anyway, that's a wrong
# version change and the gate fails.
[wrong_change_guard]
fail_if_lockfile_records_unchanged_as_change = true
fail_if_lockfile_records_change_for_unrelated_package = true
fail_if_old_or_new_version_missing_from_output = true
diagnostic_must_name_offending_package = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "package",
    "from_version",
    "to_version",
    "import_outcome",
    "lockfile_change_count",
    "exit_code",
    "diagnostic_message",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = ["initial_pin", "upgrade"]

[out_of_scope]
# Issue: "Out of scope: full resolver backtracking policy."
full_resolver_backtracking_policy = true
