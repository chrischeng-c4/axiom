# Package manager environment marker fixture — closes #2688.
# Parent: #2532 (package manager validation cohort).
#
# Pins the contract for evaluating a basic PEP 508 environment
# marker during resolution against the frozen local index:
#
#   - Marker result is recorded in lockfile or resolver summary.
#   - Wrong marker inclusion fails the test.
#   - Current runtime metadata used for marker evaluation is
#     visible in the summary.
#
# Out of scope (issue body): every PEP 508 marker expression — the
# fixture covers ONE simple Python-version marker.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_env_marker_fixture_2688.rs).

version = 1
fixture = "pkgmgr_env_marker"
issue = 2688
parent_issue = 2532
profile = "package_manager"
family = "env_marker"

network = "offline"
index_source = "frozen_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The marker the fixture covers — one simple python_version
# comparison. Mamba targets Python 3.12, so this marker must
# evaluate to true under the test runtime.
[marker]
expression = 'python_version >= "3.12"'
expected_evaluation = true
marker_kind = "python_version"

# The frozen-index dependency declares two extras gated by the
# marker. One should be INCLUDED in the lockfile, the other
# EXCLUDED. Both candidates exist on the frozen index — the
# resolver must pick based on the marker only.
[candidates]
included_dependency = "frozen_marker_modern"
included_version = "0.1.0"
included_marker = 'python_version >= "3.12"'

excluded_dependency = "frozen_marker_legacy"
excluded_version = "0.1.0"
excluded_marker = 'python_version < "3.12"'

# Acceptance: "Marker result is recorded in lockfile or resolver
# summary." The runner emits a structured summary alongside the
# lockfile.
[marker_record_assertion]
recorded_in_lockfile = true
recorded_in_resolver_summary = true
record_keys = [
    "marker_expression",
    "marker_evaluation",
    "runtime_python_version",
    "runtime_platform",
]

[lockfile_assertion]
file = "mamba.lock"
must_contain_dependency = "frozen_marker_modern"
must_not_contain_dependency = "frozen_marker_legacy"

# Acceptance: "Wrong marker inclusion fails the test." If the
# resolver mistakenly pulls the excluded dep, the gate must fail.
[wrong_inclusion_guard]
fail_if_excluded_present_in_lockfile = true
fail_if_excluded_imported = true
diagnostic_must_name_marker = true

# Acceptance: "Current runtime metadata used for marker evaluation
# is visible." The summary surfaces enough metadata that debugging
# a wrong-marker result does not require log scraping.
[runtime_visibility]
summary_must_name_python_version = true
summary_must_name_implementation = true
summary_must_name_platform = true

[runner_contract]
keys = [
    "outcome",
    "marker_expression",
    "marker_evaluation",
    "runtime_python_version",
    "runtime_implementation",
    "runtime_platform",
    "included_count",
    "excluded_count",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]

[out_of_scope]
# Issue: "Out of scope: every PEP 508 marker expression."
every_pep508_marker_expression = true
