# Package manager editable local project fixture — closes #2853.
# Parent: #2532 (package manager validation cohort).
#
# Pins the contract for installing a local project in editable mode:
#
#   - Editable behavior status is visible in the package-manager
#     summary.
#   - Passing path proves import reflects a source change without
#     reinstall.
#   - Unsupported behavior is linked to a blocker and not counted as
#     pass.
#
# Out of scope (issue body): publishing editable artifacts.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_editable_local_project_fixture_2853.rs).

version = 1
fixture = "pkgmgr_editable_local_project"
issue = 2853
parent_issue = 2532
profile = "package_manager"
family = "editable_local_project"

network = "offline"
index_source = "direct_local_project"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Tiny local project under tests/governance/gates/pkgmgr/editable_local_project/project.
# The project ships one module that exposes a sentinel symbol the
# import probe reads back.
[local_project]
name = "frozen_editable_proj"
version = "0.1.0"
relative_path = "project"
module_name = "frozen_editable_proj"
sentinel_attribute = "__sentinel__"
initial_sentinel_value = "EDITABLE-INITIAL"
mutated_sentinel_value = "EDITABLE-MUTATED"

# Acceptance: "Editable behavior status is visible in the
# package-manager summary." The summary must carry an editable flag
# and the install kind.
[summary_assertion]
must_name_install_kind = true
expected_install_kind = "editable"
must_name_editable_flag = true
must_name_local_project_path = true
must_name_status = true

# Action: add the local project in editable mode.
[editable_install_action]
command = ["add", "--editable", "./project"]
expected_outcome = "pass"
expected_exit_code = 0
must_install_package = true
must_record_editable_source = true

# Acceptance: "Passing path proves import reflects a source change
# without reinstall." Mutate the sentinel, re-import, observe.
[live_reload_case]
import_probe_attribute = "__sentinel__"
first_import_expected_value = "EDITABLE-INITIAL"
second_import_expected_value = "EDITABLE-MUTATED"
mutate_between_imports = true
no_reinstall_between_imports = true
must_drop_import_cache_between_reads = true

# Lockfile records the editable install distinctly from a regular
# wheel install.
[lockfile_assertion]
file = "mamba.lock"
deterministic = true
byte_identical_on_replay = true
must_contain_dependency = "frozen_editable_proj"
must_record_install_kind = "editable"
must_record_relative_path = "project"
must_not_record_wheel_hash = true

# Acceptance: "Unsupported behavior is linked to a blocker and not
# counted as pass."
[unsupported_behavior_contract]
when_editable_unsupported_outcome = "blocked"
must_emit_blocker_diagnostic = true
must_link_tracking_issue = true
linked_blocker_issue = 2853
forbid_silent_pass = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "project_name",
    "project_path",
    "install_kind",
    "first_sentinel",
    "second_sentinel",
    "reinstall_count",
    "exit_code",
    "blocker_issue",
]
outcome_values = ["pass", "fail", "missing", "skip", "blocked"]
case_values = ["editable_install", "live_reload"]

[out_of_scope]
# Issue: "Out of scope: publishing editable artifacts."
publishing_editable_artifacts = true
