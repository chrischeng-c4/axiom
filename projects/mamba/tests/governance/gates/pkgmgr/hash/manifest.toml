# Package manager hash verification fixture — closes #2686.
# Parent: #2532 (package manager validation cohort).
# Profile: validation/profiles/package_manager.toml [families.hash].
#
# Pins the contract for hash-checked installs: the package manager
# must compare every package artifact against an expected hash and
# refuse to install on mismatch.
#
#   - Hash mismatch fails before installation is accepted.
#   - Diagnostic names package, version, expected hash, observed
#     hash (or hash shape).
#   - Correct hash path still installs and imports.
#   - Runs offline against the frozen local index.
#
# Out of scope (issue body): remote download transport.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_hash_verification_fixture_2686.rs).

version = 1
fixture = "pkgmgr_hash_verification"
issue = 2686
parent_issue = 2532
profile = "package_manager"
family = "hash"

network = "offline"
index_source = "frozen_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The frozen-index package the fixture verifies. The hash value
# here is a SHA-256 sentinel — the gate substitutes the real hash
# at run time, but the SHAPE is locked (sha256: 64 hex chars).
[package]
name = "frozen_demo_pkg"
version = "0.1.0"
hash_algorithm = "sha256"
expected_hash_hex_length = 64

# Acceptance: "Correct hash path still installs and imports."
[correct_hash_case]
hash_matches = true
command = ["sync"]
expected_exit_code = 0
must_install_package = true
import_probe = "frozen_demo_pkg"
expected_import_outcome = "import_ok"

# Acceptance: "Hash mismatch fails before installation is accepted."
[tampered_hash_case]
hash_matches = false
command = ["sync"]
expected_exit_code = 1
# Verification must fail BEFORE the wheel is unpacked / installed.
must_fail_before_install = true
must_not_install_package = true
import_probe = "frozen_demo_pkg"
expected_import_outcome = "module_not_found"

# Acceptance: "Diagnostic names package, version, expected hash,
# and observed hash shape."
[diagnostic_assertion]
must_name_package = true
must_name_version = true
must_name_expected_hash = true
must_name_observed_hash_shape = true
# The diagnostic must NOT print the full secret/observed hex
# blindly when it differs in length; instead it reports the SHAPE
# (algorithm + length) plus a fingerprint prefix. This keeps
# pinning behavior stable across runs.
observed_hash_shape_keys = ["algorithm", "length", "prefix"]

[runner_contract]
keys = [
    "outcome",
    "package_name",
    "package_version",
    "expected_hash",
    "observed_hash_prefix",
    "case",
    "exit_code",
]
case_values = ["correct_hash", "tampered_hash"]
outcome_values = ["pass", "fail", "missing", "skip"]

[out_of_scope]
# Issue: "Out of scope: remote download transport."
remote_download_transport = true
