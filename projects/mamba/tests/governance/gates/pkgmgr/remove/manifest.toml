# Package manager remove fixture — closes #2680.
# Parent: #2532 (package manager validation cohort).
#
# Pins the contract for `mamba remove <dep>` against a project that
# was previously initialized and had one dependency added from the
# frozen local index:
#
#   - Removed dependency no longer appears in project metadata.
#   - Lockfile is updated deterministically (same input → same bytes).
#   - Import of the removed package fails in the project environment.
#   - Runs offline; no network reads or writes.
#
# Out of scope (issue body): garbage collection of shared global
# caches — that lives in the cache fixture cohort.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_remove_fixture_2680.rs).

version = 1
fixture = "pkgmgr_remove"
issue = 2680
parent_issue = 2532
profile = "package_manager"
family = "remove"

# Acceptance: workflow runs offline against the frozen local index.
network = "offline"
index_source = "frozen_local"

# Acceptance: "No user home or global cache state is modified."
[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Starting state — project already initialized with one dependency
# added from the frozen local index. The gate sets this up before
# invoking `mamba remove`.
[setup]
project_initialized = true
dependency_added = "frozen_demo_pkg"
dependency_version = "0.1.0"
lockfile_present = true
environment_synced = true

# The action under test.
[action]
command = ["remove", "frozen_demo_pkg"]
expected_exit_code = 0

# Acceptance: "Removed dependency no longer appears in project
# metadata."
[metadata_assertion]
file = "mamba.toml"
must_not_contain_dependency = "frozen_demo_pkg"
# Other deps (if any) must survive — `must_preserve_other_deps`
# names the gate behavior, not a specific list (the setup adds one
# dep here so there are none to preserve).
must_preserve_other_deps = true
# The project's name/version/python_requires fields must not be
# touched by a remove operation.
must_preserve_fields = ["project_name", "project_version", "python_requires"]

# Acceptance: "Lockfile is updated deterministically."
[lockfile_assertion]
file = "mamba.lock"
must_exist = true
must_not_contain_dependency = "frozen_demo_pkg"
# Determinism: invoking `remove` twice (after restoring the same
# starting state) must produce a byte-identical lockfile.
deterministic = true
byte_identical_on_replay = true

# Acceptance: "Import of the removed package fails in the project
# environment."
[environment_assertion]
# Probe the project env by running an in-process import. The gate
# expects this to fail with a ModuleNotFoundError-class outcome.
import_probe = "frozen_demo_pkg"
expected_import_outcome = "module_not_found"
# The .venv (or equivalent project env directory) must still exist
# after remove — remove does not nuke the whole environment.
project_env_must_exist = true

# Re-running `mamba remove frozen_demo_pkg` on a project that no
# longer has that dependency must be a clean no-op (idempotent).
[reentry]
policy = "idempotent_no_op"
expected_exit_code = 0
expected_stderr_contains = "not installed"

# Out of scope per issue #2680 — cache GC lives elsewhere.
[out_of_scope]
global_cache_garbage_collection = true

[runner_contract]
# JSON keys the gate runner emits per fixture invocation. Locked so
# the package_manager profile runner can render its summary.
keys = [
    "outcome",
    "project_path",
    "removed_dependency",
    "lockfile_path",
    "environment_path",
    "exit_code",
    "reentry_policy",
]
outcome_values = ["pass", "fail", "missing", "skip"]
