# Package manager JSON summary fixture — closes #2687.
# Parent: #2532 (package manager validation cohort).
#
# Pins the JSON summary contract for package-manager E2E runs:
# every workflow emits a parseable JSON envelope that names the
# package count, env/lockfile paths, frozen offline source, and on
# failure the command + exit status + diagnostic message.
#
#   - JSON summary can be parsed without log scraping.
#   - Missing required fields fail the test.
#   - Failure path includes command, exit status, and diagnostic
#     message.
#
# Out of scope (issue body): UI or report rendering.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_json_summary_fixture_2687.rs).

version = 1
fixture = "pkgmgr_json_summary"
issue = 2687
parent_issue = 2532
profile = "package_manager"
family = "json_summary"

network = "offline"
index_source = "frozen_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Acceptance: "JSON summary can be parsed without log scraping."
# The envelope is JSON-only (no embedded human-readable banner)
# and emitted to stdout on a single line.
[envelope]
format = "json"
stream = "stdout"
one_object_per_invocation = true
strict_json = true
# Required envelope schema version — bumped when keys are removed.
schema_version = 1

# Acceptance: "Emit or assert JSON summary fields for init, lock,
# sync, install, run, and diagnostics." The runner must cover every
# verb listed in the issue body.
[covered_workflows]
verbs = ["init", "lock", "sync", "install", "run", "diagnostics"]

# Acceptance: "Include package count, environment path, lockfile
# path, and offline source identity."
[required_fields]
shared = [
    "verb",
    "outcome",
    "exit_code",
    "package_count",
    "environment_path",
    "lockfile_path",
    "offline_source",
    "duration_ms",
    "schema_version",
]
# Per-verb extra fields the gate also requires when applicable.
init = ["project_path", "files_created"]
lock = ["resolved_count", "direct_count", "transitive_count"]
sync = ["installed_count", "changed_files"]
install = ["installed_count", "executable_paths"]
run = ["script_path", "stdout_sentinel"]
diagnostics = ["report_path"]

# Acceptance: "Missing required fields fail the test."
[missing_field_assertion]
fail_on_missing_required = true
report_all_missing_fields = true
must_name_missing_field_in_diagnostic = true

# Acceptance: "Cover one success and one failure path."
[success_case]
workflow = "sync"
expected_outcome = "pass"
expected_exit_code = 0
must_include_package_count_greater_than_zero = true

[failure_case]
workflow = "sync"
expected_outcome = "fail"
expected_exit_code = 1
# Acceptance: "Failure path includes command, exit status, and
# diagnostic message."
must_include_command = true
must_include_exit_status = true
must_include_diagnostic_message = true
diagnostic_message_substring = "frozen_local"

[runner_contract]
keys = [
    "outcome",
    "verb",
    "schema_version",
    "exit_code",
    "package_count",
    "environment_path",
    "lockfile_path",
    "offline_source",
    "diagnostic_message",
    "command",
]
outcome_values = ["pass", "fail", "missing", "skip"]

[out_of_scope]
# Issue: "Out of scope: UI or report rendering."
ui_or_report_rendering = true
