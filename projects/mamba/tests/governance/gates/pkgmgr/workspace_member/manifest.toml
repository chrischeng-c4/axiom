# Package manager workspace member fixture — closes #2854.
# Parent: #2532 (package manager validation cohort).
#
# Pins the contract for uv-like workspace member projects:
#
#   - Workspace status appears in package-manager summary.
#   - Passing path proves one member can depend on another.
#   - Unsupported path is linked and not counted as pass.
#
# Out of scope (issue body): monorepo publishing behavior.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_workspace_member_fixture_2854.rs).

version = 1
fixture = "pkgmgr_workspace_member"
issue = 2854
parent_issue = 2532
profile = "package_manager"
family = "workspace_member"

network = "offline"
index_source = "workspace_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Two local member packages under tests/governance/gates/pkgmgr/workspace_member/workspace.
# member_a depends on member_b via a workspace-local reference.
[workspace]
relative_path = "workspace"
members_glob = "members/*"

[member_a]
name = "frozen_ws_member_a"
version = "0.1.0"
relative_path = "workspace/members/member_a"
module_name = "frozen_ws_member_a"
sentinel_attribute = "__sentinel__"
sentinel_value = "WS-MEMBER-A-OK"

[member_b]
name = "frozen_ws_member_b"
version = "0.1.0"
relative_path = "workspace/members/member_b"
module_name = "frozen_ws_member_b"
exposes_symbol = "compute"
exposed_value = "WS-MEMBER-B-OK"

# member_a imports `compute` from member_b. The fixture asserts the
# round-trip resolves via the local workspace, not the frozen index.
[member_dependency]
declarant = "frozen_ws_member_a"
target = "frozen_ws_member_b"
imported_symbol = "compute"
expected_imported_value = "WS-MEMBER-B-OK"

# Acceptance: "Workspace status appears in package-manager summary."
[summary_assertion]
must_name_workspace_kind = true
expected_workspace_kind = "local"
must_name_member_count = true
expected_member_count = 2
must_name_each_member = true
must_name_status = true

# Action: sync the workspace root. The runner walks the members glob
# and ensures both members are discovered and linkable.
[workspace_sync_action]
command = ["sync"]
expected_outcome = "pass"
expected_exit_code = 0
must_discover_member_a = true
must_discover_member_b = true
must_record_member_count = 2

# Acceptance: "Passing path proves one member can depend on another."
[cross_member_dependency_case]
import_probe_module = "frozen_ws_member_a"
import_probe_attribute = "__sentinel__"
first_import_expected_value = "WS-MEMBER-A-OK"
indirect_import_module = "frozen_ws_member_b"
indirect_import_symbol = "compute"
indirect_expected_value = "WS-MEMBER-B-OK"
resolves_via_workspace_not_index = true

[lockfile_assertion]
file = "mamba.lock"
deterministic = true
byte_identical_on_replay = true
must_record_workspace_kind = "local"
must_record_member_count = 2
must_contain_dependency_a = "frozen_ws_member_a"
must_contain_dependency_b = "frozen_ws_member_b"
must_record_member_relative_paths = true
must_not_resolve_members_via_index = true

# Acceptance: "Unsupported path is linked and not counted as pass."
[unsupported_behavior_contract]
when_workspace_unsupported_outcome = "blocked"
must_emit_blocker_diagnostic = true
must_link_tracking_issue = true
linked_blocker_issue = 2854
forbid_silent_pass = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "workspace_kind",
    "member_count",
    "members",
    "import_outcome",
    "indirect_import_outcome",
    "exit_code",
    "blocker_issue",
]
outcome_values = ["pass", "fail", "missing", "skip", "blocked"]
case_values = ["workspace_sync", "cross_member_dependency"]

[out_of_scope]
# Issue: "Out of scope: monorepo publishing behavior."
monorepo_publishing_behavior = true
