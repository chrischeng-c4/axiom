# Package manager cache isolation fixture — closes #2685.
# Parent: #2532 (package manager validation cohort).
# Profile: validation/profiles/package_manager.toml [families.cache].
#
# Pins the contract for package-manager workflows that run with an
# explicit temp cache root:
#
#   - Test fails if the user home cache is read or written.
#   - Temp cache cleanup is deterministic — the gate knows what is
#     left behind after the workflow finishes.
#   - Summary names the cache root used (debug aid).
#   - Runs offline against the frozen local index.
#
# Out of scope (issue body): global cache implementation policy.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_cache_isolation_fixture_2685.rs).

version = 1
fixture = "pkgmgr_cache_isolation"
issue = 2685
parent_issue = 2532
profile = "package_manager"
family = "cache"

network = "offline"
index_source = "frozen_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Acceptance: "Test fails if user home cache is used."
[user_cache_guard]
abort_on_user_home_read = true
abort_on_user_home_write = true
# Common default cache directories the gate watches. The guard
# walks these paths during the run; if any access is observed the
# fixture reports `fail` regardless of the workflow exit code.
watched_paths = [
    "~/.cache/mamba",
    "~/.cache/uv",
    "~/.cache/pip",
    "~/Library/Caches/mamba",
    "~/Library/Caches/uv",
    "~/Library/Caches/pip",
]

# Explicit temp cache root the workflow operates against. The gate
# creates this directory before the run and removes it after.
[temp_cache]
cache_root_env_var = "MAMBA_CACHE_DIR"
cache_root_must_be_under_tempdir = true
must_be_created_before_run = true
must_be_removed_after_run = true

# Acceptance: "Temp cache cleanup is deterministic." The gate
# captures the set of files present in the cache after the run
# and compares against a manifest of expected entries.
[cleanup_assertion]
deterministic = true
captures_post_run_inventory = true
inventory_baseline_path = "cache_inventory.toml"
allowed_residue = []

# The workflow exercise. Sync brings in the locked dep from the
# frozen local index and populates the temp cache.
[workflow]
preparatory_command = ["sync"]
expected_exit_code = 0
must_populate_temp_cache = true
must_not_populate_user_cache = true

# Acceptance: "Summary includes cache root used for debugging."
[summary]
must_include_cache_root = true
must_include_cache_byte_count = true
must_include_user_cache_access_count = true

[runner_contract]
keys = [
    "outcome",
    "cache_root",
    "cache_byte_count",
    "user_cache_access_count",
    "workflow_exit_code",
    "cleanup_status",
]
outcome_values = ["pass", "fail", "missing", "skip"]
cleanup_status_values = ["clean", "residue_detected", "removal_failed"]

[out_of_scope]
# Issue: "Out of scope: global cache implementation policy."
global_cache_implementation_policy = true
