# Package manager run fixture — closes #2684.
# Parent: #2532 (package manager validation cohort).
# Profile: validation/profiles/package_manager.toml [families.run].
#
# Pins the contract for `mamba run <script>` executing inside the
# project package environment:
#
#   - Running without sync or install fails with a clear diagnostic.
#   - Running after sync prints the expected sentinel.
#   - No global PATH or user environment mutation is required.
#   - Runs offline against the frozen local index.
#
# Out of scope (issue body): shell aliases and interactive commands.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pkgmgr_run_fixture_2684.rs).

version = 1
fixture = "pkgmgr_run"
issue = 2684
parent_issue = 2532
profile = "package_manager"
family = "run"

network = "offline"
index_source = "frozen_local"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true
# Acceptance: "No global PATH or user environment mutation is
# required." `run` must operate without touching the user's shell
# environment.
forbid_global_path_mutation = true
forbid_user_shell_env_mutation = true

# Starting state — project initialized with a lockfile that pins
# one local-index dep, but env NOT yet synced. The fixture covers
# two ordered phases: pre-sync failure, then post-sync success.
[setup]
project_initialized = true
locked_dependency = "frozen_demo_pkg"
locked_version = "0.1.0"
lockfile_present = true
project_env_present_initial = false
# The script the gate executes via `mamba run`. The script imports
# the installed dep and prints the sentinel below.
script_path = "scripts/print_sentinel.py"
expected_stdout_sentinel = "frozen-demo-sentinel:OK"

# Acceptance: "Running without sync or install fails with a clear
# diagnostic." Phase 1: run before any sync/install.
[unsynced_failure_case]
command = ["run", "scripts/print_sentinel.py"]
expected_exit_code = 1
expected_stderr_contains = "environment is not synced"
must_not_print_sentinel = true
must_not_create_env = true

# Acceptance: "Running after sync prints the expected sentinel."
# Phase 2: sync first, then run.
[synced_success_case]
preparatory_command = ["sync"]
command = ["run", "scripts/print_sentinel.py"]
expected_exit_code = 0
expected_stdout_contains = "frozen-demo-sentinel:OK"
must_use_project_env = true
must_resolve_dependency_from_project_env = true

# Acceptance flag block — what `run` does NOT touch.
[no_global_state_assertion]
user_path_must_be_unchanged = true
user_shell_env_must_be_unchanged = true
no_system_site_packages_used = true

[runner_contract]
keys = [
    "outcome",
    "project_path",
    "script_path",
    "environment_path",
    "stdout_sentinel",
    "exit_code",
    "phase",
]
phase_values = ["unsynced", "synced"]
outcome_values = ["pass", "fail", "missing", "skip"]

[out_of_scope]
# Issue: "Out of scope: shell aliases and interactive commands."
shell_aliases = true
interactive_commands = true
