# C3 — 3P Libs layer conformance umbrella fixture — closes #1263.
# Parent: epic Py3.12 single master tracking (criterion C3, #1265).
# Children: #1234 (pytest gate), #1257 (Flask gate), #1259 (requests
# gate). Depends: core 99% conformance epic + WS2 stdlib coverage.
#
# Pins the shape of the C3 umbrella gate. Three canonical third-party
# Python programs must run unmodified on mamba (pytest hello, Flask
# hello, requests.get). This umbrella gate fixes the parent shape so
# the child gates cannot drift away from the same Definition of Done:
#
#   - Exactly three required programs (pytest_hello, flask_hello,
#     requests_get) — no more, no less.
#   - Each child gate is wired to its own fixture under
#     projects/mamba/tests/governance/gates/third_party/<family>_gate/.
#   - The umbrella is GREEN only when all three child gates are
#     GREEN; partial pass (e.g. 2/3) reports as parent FAIL with the
#     missing-child names enumerated.
#   - The umbrella reports per-child status alongside the layer
#     blocker tier (core / stdlib / 3p-dep) so triage stays
#     observable.
#
# Out of scope: implementing the runtime under each child gate,
# expanding the 3P set beyond pytest+Flask+requests, performance
# gates, C-extension fast paths.
#
# Shape locked by src/meta_gates/tests/c3_3p_libs_conformance_umbrella_gate.rs.

version = 1
fixture = "c3_3p_libs_conformance_umbrella_gate"
issue = 1263
parent_issue = 1265
child_issues = [1234, 1257, 1259]
profile = "third_party"
family = "c3_3p_libs_conformance_umbrella_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_required_programs_set = true
must_cover_child_gate_wiring = true
must_cover_umbrella_green_only_when_all_children_green = true
must_cover_per_child_blocker_tier_reporting = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# Definition of Done: exactly three programs (pytest, Flask, requests).
[required_programs_contract]
case = "exactly_three_required_programs_pytest_flask_requests"
required_programs = [
    "pytest_hello_world",
    "flask_hello_world",
    "requests_https_get",
]
required_programs_field_name = "required_programs"
must_pin_exactly_three_required_programs = true
forbid_adding_or_dropping_required_program = true
forbid_implicit_required_program = true
required_program_missing_failure_kind = "c3_umbrella_required_program_missing"
required_program_missing_exit_code = 295
unknown_required_program_failure_kind = "c3_umbrella_unknown_required_program"
unknown_required_program_exit_code = 296
must_distinguish_required_program_missing_from_unknown_required_program = true

# Each child program is wired to its own fixture under
# projects/mamba/tests/governance/gates/third_party/<family>_gate/.
[child_gate_wiring_contract]
case = "each_child_program_is_wired_to_its_own_fixture"
must_wire_pytest_hello_to_child_gate = true
must_wire_flask_hello_to_child_gate = true
must_wire_requests_get_to_child_gate = true
forbid_collapsing_children_into_a_single_combined_gate = true
forbid_silently_dropping_a_child_from_the_wiring = true
child_gate_wiring_field_name = "child_gate_wiring"
pytest_child_gate_relative_path = "projects/mamba/tests/governance/gates/third_party/c3_pytest_runs_unmodified_gate/manifest.toml"
flask_child_gate_relative_path = "projects/mamba/tests/governance/gates/third_party/c3_flask_runs_unmodified_gate/manifest.toml"
requests_child_gate_relative_path = "projects/mamba/tests/governance/gates/third_party/c3_requests_runs_unmodified_gate/manifest.toml"
pytest_child_issue = 1234
flask_child_issue = 1257
requests_child_issue = 1259
child_gate_missing_failure_kind = "c3_umbrella_child_gate_missing"
child_gate_missing_exit_code = 297
child_gate_collapsed_failure_kind = "c3_umbrella_child_gates_collapsed_into_single_gate"
child_gate_collapsed_exit_code = 298
must_distinguish_child_gate_missing_from_child_gate_collapsed = true

# Umbrella GREEN only when all three children GREEN.
[umbrella_green_aggregation_contract]
case = "umbrella_is_green_only_when_all_three_children_are_green"
must_aggregate_children_into_umbrella_outcome = true
must_report_parent_fail_with_missing_child_names_when_partial = true
must_report_per_child_outcome_alongside_umbrella_outcome = true
forbid_umbrella_passing_when_any_child_failing = true
forbid_umbrella_passing_when_any_child_missing = true
forbid_silently_passing_umbrella_via_2_of_3 = true
required_per_child_outcome_fields = [
    "child_program",
    "child_outcome",
    "child_failure_kind",
]
per_child_outcome_field_name = "per_child_outcome"
umbrella_outcome_field_name = "umbrella_outcome"
allowed_umbrella_outcome_values = ["pass", "fail", "missing"]
umbrella_passing_with_child_fail_failure_kind = "c3_umbrella_passing_with_child_fail"
umbrella_passing_with_child_fail_exit_code = 299
umbrella_passing_with_child_missing_failure_kind = "c3_umbrella_passing_with_child_missing"
umbrella_passing_with_child_missing_exit_code = 300
must_distinguish_passing_with_child_fail_from_passing_with_child_missing = true

# Per-child blocker tier reporting (core / stdlib / 3p_dep).
[blocker_tier_reporting_contract]
case = "per_child_blocker_tier_reporting_core_stdlib_or_3p_dep"
must_report_blocker_tier_per_child = true
must_distinguish_core_blocker_from_stdlib_blocker = true
must_distinguish_stdlib_blocker_from_3p_dep_blocker = true
forbid_collapsing_blocker_tier_into_overall_only = true
forbid_omitting_blocker_tier_when_child_blocked = true
required_blocker_tiers = ["core", "stdlib", "3p_dep"]
blocker_tier_field_name = "blocker_tier"
blocker_tier_missing_failure_kind = "c3_umbrella_blocker_tier_missing"
blocker_tier_missing_exit_code = 301
unknown_blocker_tier_failure_kind = "c3_umbrella_unknown_blocker_tier"
unknown_blocker_tier_exit_code = 302
must_distinguish_blocker_tier_missing_from_unknown_blocker_tier = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "required_programs",
    "child_gate_wiring",
    "per_child_outcome",
    "umbrella_outcome",
    "child_program",
    "child_outcome",
    "child_failure_kind",
    "blocker_tier",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "exactly_three_required_programs_pytest_flask_requests",
    "each_child_program_is_wired_to_its_own_fixture",
    "umbrella_is_green_only_when_all_three_children_are_green",
    "per_child_blocker_tier_reporting_core_stdlib_or_3p_dep",
]

[out_of_scope]
# Issue body: runtime implementation per child is owned by the
# child gates; expanding beyond pytest+Flask+requests is a separate
# epic; perf / C-extensions are out of scope.
runtime_implementation_per_child_program = true
expanding_required_programs_beyond_pytest_flask_requests = true
performance_gates = true
c_extension_fast_paths = true
ws2_stdlib_layer_implementation = true
core_99_percent_conformance_epic_implementation = true
