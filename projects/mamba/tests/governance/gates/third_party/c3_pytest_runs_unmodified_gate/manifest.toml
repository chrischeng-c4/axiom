# C3 — pytest runs unmodified fixture — closes #1234.
# Related: #1263 (3P Libs layer conformance), #1259 (requests),
# #1257 (Flask), #1265 (Goal 1 MVP Py3.12 ecosystem).
#
# Pins the shape of the C3 pytest acceptance gate. `pytest` from PyPI
# must run unmodified under mamba — no patched pytest fork, no
# mamba-specific shim layer, no test-case rewriting on disk. The
# gate locks the six requirements R1–R6 from the issue body so future
# regressions can be reported as a single distinguishable failure:
#
#   - R1: `pip install pytest` + `pytest -q test_hello.py` exits 0.
#   - R2: AssertionRewritingHook produces diff output (assertrepr).
#   - R3: @pytest.fixture works at function + module scope, including
#     params=[...].
#   - R4: @pytest.mark.parametrize emits N runs with distinct IDs.
#   - R5: `pytest -v` exit + pass/fail counts match CPython 3.12
#     baseline (timing modulo).
#   - R6: conformance suite stays at 591/591 and cpython_compat at
#     54/54 (no acceptance regression).
#
# Out of scope: Flask (WS-A.3), requests (WS-A.4), pytest plugins
# beyond core, C-extension fast paths, perf gates.
#
# Shape locked by src/meta_gates/tests/c3_pytest_runs_unmodified_gate.rs.

version = 1
fixture = "c3_pytest_runs_unmodified_gate"
issue = 1234
related_issues = [1263, 1259, 1257, 1265]
profile = "third_party"
family = "c3_pytest_runs_unmodified_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_pytest_q_exit_zero = true
must_cover_assert_rewrite_diff_output = true
must_cover_fixture_function_and_module_scope = true
must_cover_parametrize_distinct_ids = true
must_cover_pytest_v_matches_cpython_baseline = true
must_cover_no_regression_on_conformance_and_cpython_compat = true
must_be_offline = true
must_be_deterministic = true

# R1 — `pytest -q test_hello.py` exits 0 on a trivial test_x.
[r1_pytest_q_exit_zero_contract]
case = "pytest_q_test_hello_exits_zero_on_trivial_assert"
requirement_id = "R1"
must_install_pytest_unmodified_from_pypi = true
must_run_pytest_q_against_test_hello = true
must_exit_zero_when_test_passes = true
forbid_modifying_pytest_on_disk_before_run = true
forbid_skipping_pytest_q_with_workaround_runner = true
hello_test_relative_path = "tests/governance/gates/third_party/c3_pytest_runs_unmodified_gate/test_hello.py"
hello_test_relative_path_field_name = "hello_test_path"
pytest_q_exit_code_field_name = "pytest_q_exit_code"
must_record_pytest_q_exit_code = true
pytest_q_nonzero_exit_failure_kind = "c3_pytest_q_nonzero_exit"
pytest_q_nonzero_exit_exit_code = 265
pytest_q_modified_runner_failure_kind = "c3_pytest_q_modified_runner_used_instead_of_pypi_pytest"
pytest_q_modified_runner_exit_code = 266
must_distinguish_nonzero_exit_from_modified_runner = true

# R2 — AssertionRewritingHook produces diff output, not bare
# `AssertionError`.
[r2_assert_rewrite_diff_output_contract]
case = "assertion_rewriting_hook_produces_diff_output_not_bare_assertion_error"
requirement_id = "R2"
must_install_assertion_rewriting_hook = true
must_emit_assertrepr_compare_diff_on_failure = true
must_match_cpython_3_12_diff_output_modulo_paths_and_line_numbers = true
forbid_falling_back_to_bare_assertion_error_output = true
forbid_silently_disabling_assert_rewrite = true
assert_rewrite_hook_name_field_name = "assert_rewrite_hook_name"
expected_assert_rewrite_hook_name = "AssertionRewritingHook"
diff_output_field_name = "assert_rewrite_diff_output"
assert_rewrite_hook_missing_failure_kind = "c3_pytest_assert_rewrite_hook_missing"
assert_rewrite_hook_missing_exit_code = 267
assert_rewrite_bare_assertion_error_failure_kind = "c3_pytest_assert_rewrite_fell_back_to_bare_assertion_error"
assert_rewrite_bare_assertion_error_exit_code = 268
must_distinguish_hook_missing_from_bare_assertion_error_fallback = true

# R3 — @pytest.fixture function + module scope + params=[...] chain.
[r3_fixture_scope_and_parametrize_contract]
case = "pytest_fixture_function_and_module_scope_including_params_chain"
requirement_id = "R3"
must_resolve_function_scope_fixture = true
must_resolve_module_scope_fixture = true
must_resolve_parametrized_fixture_with_params_list = true
must_support_module_scope_feeding_function_scope_chain = true
forbid_silently_treating_module_scope_as_function_scope = true
forbid_silently_dropping_params_from_parametrized_fixture = true
required_fixture_scopes = ["function", "module"]
fixture_scope_field_name = "fixture_scope"
fixture_chain_path_field_name = "fixture_chain"
fixture_scope_collapsed_failure_kind = "c3_pytest_fixture_scope_collapsed_to_function"
fixture_scope_collapsed_exit_code = 269
fixture_params_dropped_failure_kind = "c3_pytest_fixture_params_silently_dropped"
fixture_params_dropped_exit_code = 270
must_distinguish_scope_collapse_from_params_drop = true

# R4 — @pytest.mark.parametrize produces N runs with distinct IDs.
[r4_parametrize_distinct_ids_contract]
case = "pytest_mark_parametrize_emits_n_runs_with_distinct_ids"
requirement_id = "R4"
must_collect_n_runs_for_parametrize_n_cases = true
must_emit_distinct_test_id_per_parametrize_case = true
must_surface_ids_in_dash_v_output = true
forbid_collapsing_parametrize_to_single_run = true
forbid_silently_reusing_test_id_across_parametrize_cases = true
parametrize_case_count_field_name = "parametrize_case_count"
test_ids_field_name = "parametrize_test_ids"
parametrize_collapsed_failure_kind = "c3_pytest_parametrize_collapsed_to_single_run"
parametrize_collapsed_exit_code = 271
parametrize_duplicate_id_failure_kind = "c3_pytest_parametrize_duplicate_test_id"
parametrize_duplicate_id_exit_code = 272
must_distinguish_parametrize_collapse_from_duplicate_id = true

# R5 — `pytest -v` exit + pass/fail counts match CPython 3.12.
[r5_pytest_v_matches_cpython_baseline_contract]
case = "pytest_v_exit_and_pass_fail_counts_match_cpython_3_12_baseline"
requirement_id = "R5"
must_run_pytest_v = true
must_compare_exit_code_against_cpython_3_12_baseline = true
must_compare_pass_count_against_cpython_3_12_baseline = true
must_compare_fail_count_against_cpython_3_12_baseline = true
forbid_comparing_timing_as_part_of_baseline_match = true
forbid_silently_ignoring_baseline_divergence = true
baseline_runtime = "cpython_3_12"
exit_code_field_name = "pytest_v_exit_code"
pass_count_field_name = "pytest_v_pass_count"
fail_count_field_name = "pytest_v_fail_count"
baseline_exit_divergence_failure_kind = "c3_pytest_v_baseline_exit_divergence"
baseline_exit_divergence_exit_code = 273
baseline_count_divergence_failure_kind = "c3_pytest_v_baseline_pass_or_fail_count_divergence"
baseline_count_divergence_exit_code = 274
must_distinguish_exit_divergence_from_count_divergence = true

# R6 — conformance 591/591 and cpython_compat 54/54 stay green.
[r6_no_regression_on_existing_suites_contract]
case = "conformance_591_591_and_cpython_compat_54_54_stay_green"
requirement_id = "R6"
must_keep_conformance_suite_passing = true
must_keep_cpython_compat_suite_passing = true
forbid_silently_relaxing_conformance_count = true
forbid_silently_relaxing_cpython_compat_count = true
required_conformance_pass_count = 591
required_conformance_total_count = 591
required_cpython_compat_pass_count = 54
required_cpython_compat_total_count = 54
conformance_pass_count_field_name = "conformance_pass_count"
cpython_compat_pass_count_field_name = "cpython_compat_pass_count"
conformance_regression_failure_kind = "c3_pytest_conformance_regression"
conformance_regression_exit_code = 275
cpython_compat_regression_failure_kind = "c3_pytest_cpython_compat_regression"
cpython_compat_regression_exit_code = 276
must_distinguish_conformance_regression_from_cpython_compat_regression = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "hello_test_path",
    "pytest_q_exit_code",
    "assert_rewrite_hook_name",
    "assert_rewrite_diff_output",
    "fixture_scope",
    "fixture_chain",
    "parametrize_case_count",
    "parametrize_test_ids",
    "pytest_v_exit_code",
    "pytest_v_pass_count",
    "pytest_v_fail_count",
    "conformance_pass_count",
    "cpython_compat_pass_count",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "pytest_q_test_hello_exits_zero_on_trivial_assert",
    "assertion_rewriting_hook_produces_diff_output_not_bare_assertion_error",
    "pytest_fixture_function_and_module_scope_including_params_chain",
    "pytest_mark_parametrize_emits_n_runs_with_distinct_ids",
    "pytest_v_exit_and_pass_fail_counts_match_cpython_3_12_baseline",
    "conformance_591_591_and_cpython_compat_54_54_stay_green",
]

[out_of_scope]
# Issue body: Flask (#1257), requests (#1259), pytest plugins beyond
# core, C-extension fast paths, perf gates.
flask_werkzeug_wsgi = true
requests_urllib3_tls_ssl = true
pytest_plugins_beyond_core = true
c_extension_fast_paths = true
performance_gates = true
runtime_implementation_of_assert_rewrite = true
runtime_implementation_of_fixture_resolution = true
