# C3 — requests runs unmodified (HTTPS GET) fixture — closes #1259.
# Related: #1263 (3P Libs layer), #1234 (pytest harness), #1257
# (Flask), #1265 (Goal 1 MVP Py3.12 ecosystem).
#
# Pins the shape of the C3 requests HTTPS-GET acceptance gate.
# `requests` from PyPI must run unmodified under mamba — no patched
# requests fork, no mamba-specific shim layer, no curl substitution.
# The gate locks R0–R4 from the issue body so future regressions can
# be reported as a single distinguishable failure:
#
#   - R0: ssl fidelity spike must complete with a written
#     multi-week vs multi-month estimate and an audit of the
#     current `ssl_mod.rs` surface vs the gaps to a real TLS
#     handshake.
#   - R1: `import requests` succeeds.
#   - R2: `requests.get(https_url)` completes DNS + TLS handshake +
#     request + response over real or loopback HTTPS.
#   - R3: `r.status_code`, `r.headers`, `r.json()`, `r.text` return
#     CPython-equivalent values.
#   - R4: Conformance fixture under
#     `projects/mamba/tests/cpython/3p/requests_https_get/`
#     runs against an httpbin-style mirror or vendored test server.
#
# Out of scope: Flask (#1257), pytest (#1234), pkgmgr / venv,
# performance gates, C-extension fast paths.
#
# Shape locked by src/meta_gates/tests/c3_requests_runs_unmodified_gate.rs.

version = 1
fixture = "c3_requests_runs_unmodified_gate"
issue = 1259
related_issues = [1263, 1234, 1257, 1265]
profile = "third_party"
family = "c3_requests_runs_unmodified_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_ssl_fidelity_spike_estimate = true
must_cover_requests_import = true
must_cover_https_get_completes_handshake_and_request = true
must_cover_response_fields_match_cpython = true
must_cover_conformance_fixture_under_3p_requests_https_get = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R0 — ssl fidelity spike: audit + handshake attempt + written estimate.
[r0_ssl_fidelity_spike_contract]
case = "ssl_fidelity_spike_must_complete_with_written_estimate"
requirement_id = "R0"
must_audit_current_ssl_mod_surface = true
must_attempt_real_tls_handshake_against_known_server = true
must_emit_written_estimate_multi_week_vs_multi_month = true
forbid_skipping_spike_before_full_implementation = true
forbid_collapsing_spike_into_implementation_phase = true
ssl_mod_relative_path = "crates/mamba/src/runtime/stdlib/ssl_mod.rs"
ssl_mod_relative_path_field_name = "ssl_mod_path"
spike_estimate_kind_field_name = "ssl_spike_estimate_kind"
allowed_spike_estimate_kinds = ["multi_week", "multi_month"]
spike_target_handshake_host_field_name = "ssl_spike_target_host"
ssl_spike_audit_missing_failure_kind = "c3_requests_ssl_spike_audit_missing"
ssl_spike_audit_missing_exit_code = 285
ssl_spike_estimate_missing_failure_kind = "c3_requests_ssl_spike_estimate_missing"
ssl_spike_estimate_missing_exit_code = 286
must_distinguish_audit_missing_from_estimate_missing = true

# R1 — `import requests` succeeds.
[r1_requests_import_contract]
case = "import_requests_resolves_and_module_object_present"
requirement_id = "R1"
must_install_requests_unmodified_from_pypi = true
must_resolve_import_requests = true
must_expose_requests_module_object = true
forbid_modifying_requests_on_disk_before_run = true
forbid_substituting_urllib3_with_mamba_shim = true
canonical_import_statement = "import requests"
canonical_import_statement_field_name = "canonical_import_statement"
module_object_field_name = "requests_module"
requests_import_failure_kind = "c3_requests_import_failed"
requests_import_failure_exit_code = 287
requests_shim_substitution_failure_kind = "c3_requests_urllib3_substituted_with_mamba_shim"
requests_shim_substitution_failure_exit_code = 288
must_distinguish_import_failure_from_shim_substitution = true

# R2 — requests.get(https_url) completes DNS + TLS + request + response.
[r2_https_get_completes_handshake_and_request_contract]
case = "requests_get_over_https_completes_dns_tls_request_and_response"
requirement_id = "R2"
must_resolve_dns_for_target_host = true
must_complete_tls_handshake_against_target_host = true
must_send_http_get_after_handshake = true
must_receive_http_response_after_send = true
forbid_skipping_tls_handshake = true
forbid_falling_back_to_plain_http_when_https_requested = true
default_loopback_target_url = "https://127.0.0.1:8443/get"
default_loopback_target_url_field_name = "loopback_target_url"
target_url_field_name = "https_target_url"
phases_completed_field_name = "https_phases_completed"
required_phases = ["dns_resolve", "tls_handshake", "request_send", "response_receive"]
tls_handshake_failure_kind = "c3_requests_tls_handshake_failure"
tls_handshake_failure_exit_code = 289
http_plain_fallback_failure_kind = "c3_requests_plain_http_fallback_when_https_requested"
http_plain_fallback_failure_exit_code = 290
must_distinguish_tls_handshake_failure_from_plain_http_fallback = true

# R3 — response.status_code / headers / json / text match CPython.
[r3_response_fields_match_cpython_contract]
case = "response_status_code_headers_json_and_text_match_cpython"
requirement_id = "R3"
must_record_status_code_int = true
must_record_headers_mapping = true
must_record_json_dict_when_application_json = true
must_record_text_str = true
forbid_dropping_status_code_field = true
forbid_collapsing_headers_into_string_blob = true
forbid_silently_returning_bytes_for_text = true
required_response_fields = ["status_code", "headers", "json", "text"]
response_fields_field_name = "response_fields"
status_code_field_name = "response_status_code"
headers_field_name = "response_headers"
json_field_name = "response_json"
text_field_name = "response_text"
response_status_code_divergence_failure_kind = "c3_requests_response_status_code_divergence"
response_status_code_divergence_exit_code = 291
response_body_divergence_failure_kind = "c3_requests_response_body_divergence"
response_body_divergence_exit_code = 292
must_distinguish_status_code_divergence_from_body_divergence = true

# R4 — Conformance fixture under
# projects/mamba/tests/cpython/3p/requests_https_get/
# runs against an httpbin-style mirror or vendored test server.
[r4_conformance_fixture_runs_against_httpbin_mirror_contract]
case = "conformance_fixture_runs_against_httpbin_mirror_or_vendored_server"
requirement_id = "R4"
must_provide_httpbin_style_mirror_or_vendored_server = true
must_pin_fixture_relative_path = true
must_assert_response_status_in_fixture = true
must_assert_response_body_in_fixture = true
must_tear_down_test_server_at_end_of_fixture = true
forbid_resolving_to_live_internet_in_default_gate = true
forbid_fixture_passing_when_request_did_not_run = true
fixture_relative_path = "projects/mamba/tests/cpython/3p/requests_https_get"
fixture_relative_path_field_name = "fixture_relative_path"
allowed_test_server_kinds = ["vendored_https_server", "httpbin_mirror"]
test_server_kind_field_name = "test_server_kind"
fixture_request_skipped_failure_kind = "c3_requests_fixture_request_skipped"
fixture_request_skipped_exit_code = 293
fixture_live_internet_used_failure_kind = "c3_requests_fixture_live_internet_used_in_default_gate"
fixture_live_internet_used_exit_code = 294
must_distinguish_request_skipped_from_live_internet_used = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "ssl_mod_path",
    "ssl_spike_estimate_kind",
    "ssl_spike_target_host",
    "canonical_import_statement",
    "requests_module",
    "https_target_url",
    "loopback_target_url",
    "https_phases_completed",
    "response_fields",
    "response_status_code",
    "response_headers",
    "response_json",
    "response_text",
    "fixture_relative_path",
    "test_server_kind",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "ssl_fidelity_spike_must_complete_with_written_estimate",
    "import_requests_resolves_and_module_object_present",
    "requests_get_over_https_completes_dns_tls_request_and_response",
    "response_status_code_headers_json_and_text_match_cpython",
    "conformance_fixture_runs_against_httpbin_mirror_or_vendored_server",
]

[out_of_scope]
# Issue body: Flask (#1257), pytest (#1234), pkgmgr / venv,
# performance gates, C-extension fast paths.
flask_werkzeug_wsgi = true
pytest_harness = true
pkgmgr_and_venv = true
performance_gates = true
c_extension_fast_paths = true
runtime_implementation_of_ssl_context = true
runtime_implementation_of_socket_ssl_wrap = true
runtime_implementation_of_http_client_https_connection = true
