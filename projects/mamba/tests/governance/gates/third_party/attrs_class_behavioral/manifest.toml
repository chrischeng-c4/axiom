# attrs third-party behavioral fixture — closes #2642.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline attrs class behavioral fixture.
# attrs is a common dependency across packaging and framework code;
# the fixture imports attrs and defines one canonical class with
# defaults and a converter, then asserts construction, defaults,
# equality, and repr. Unsupported attrs behavior on the current
# runtime is exposed as xfail or blocker with a linked issue:
#
#   - Fixture fails if attrs cannot import.
#   - Fixture asserts constructor, default, and equality or repr
#     behavior.
#   - Unsupported behavior is visible as xfail or blocker with
#     issue reference.
#
# Out of scope (issue body): full attrs feature coverage.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/third_party_attrs_class_fixture_2642.rs).

version = 1
fixture = "third_party_attrs_class_behavioral"
issue = 2642
parent_issue = 2529
profile = "third_party"
family = "third_party_attrs_class_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["attrs", "attr"]
must_be_importable_via_import_statement = true
must_register_attrs_in_ecosystem_manifest = true
must_cover_attrs_define = true
must_cover_attrs_field_default = true
must_cover_attrs_field_converter_when_supported = true
must_cover_instance_construction = true
must_cover_equality = true
must_cover_repr = true
import_statement = "import attrs"

# Canonical attrs class. One field with int default, one with str
# default, one with int converter.
[attrs_class_definition]
class_name = "Point2642"
field_a_name = "x"
field_a_type = "int"
field_a_default_python_repr = "0"
field_b_name = "label"
field_b_type = "str"
field_b_default_python_repr = "'mamba'"
field_c_name = "n"
field_c_type = "int"
field_c_default_python_repr = "0"
field_c_converter = "int"

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 16
sample_min_records = 3

# Construction + defaults.
[[construction_cases]]
call = "Point2642()"
expected_x = 0
expected_label = "mamba"
expected_n = 0

[[construction_cases]]
call = "Point2642(x=5, label='hello', n='7')"
expected_x = 5
expected_label = "hello"
expected_n = 7

# Equality.
[[equality_cases]]
left_call = "Point2642(x=1, label='a', n=2)"
right_call = "Point2642(x=1, label='a', n=2)"
expected_relation = "equal"

[[equality_cases]]
left_call = "Point2642(x=1, label='a', n=2)"
right_call = "Point2642(x=1, label='b', n=2)"
expected_relation = "not_equal"

# Repr.
[[repr_cases]]
call = "Point2642()"
expected_repr = "Point2642(x=0, label='mamba', n=0)"

# Acceptance: "Fixture fails if attrs cannot import."
[import_failure_contract]
case = "fixture_fails_if_attrs_cannot_import"
must_fail_on_import_error = true
must_fail_on_missing_attrs_module = true
must_emit_import_failure_kind_when_attrs_missing = true
forbid_silent_fallback_when_attrs_missing = true
attrs_import_failure_kind = "third_party_attrs_import_failed"
attrs_import_failure_exit_code = 141

# Acceptance: "Fixture asserts constructor, default, and equality or
# repr behavior."
[constructor_default_equality_repr_contract]
case = "fixture_asserts_constructor_default_and_equality_or_repr"
must_fail_on_incorrect_construction = true
must_fail_on_incorrect_field_default = true
must_fail_on_incorrect_equality = true
must_fail_on_incorrect_repr = true
construction_mismatch_failure_kind = "attrs_construction_mismatch"
construction_mismatch_exit_code = 142
field_default_mismatch_failure_kind = "attrs_field_default_mismatch"
field_default_mismatch_exit_code = 143
equality_mismatch_failure_kind = "attrs_equality_mismatch"
equality_mismatch_exit_code = 144
repr_mismatch_failure_kind = "attrs_repr_mismatch"
repr_mismatch_exit_code = 145
must_distinguish_each_attrs_behavior_failure_kind = true

# Acceptance: "Unsupported behavior is visible as xfail or blocker
# with issue reference."
[unsupported_behavior_xfail_or_blocker_contract]
case = "unsupported_behavior_visible_as_xfail_or_blocker_with_issue_reference"
must_mark_unsupported_attrs_behavior_with_xfail_or_blocker = true
must_link_xfail_or_blocker_to_issue = true
allowed_unsupported_outcome_values = ["xfail", "blocker"]
unsupported_outcome_link_field_name = "blocker_issue"
forbid_silently_skipping_unsupported_attrs_behavior = true
forbid_falsely_passing_unsupported_attrs_behavior = true
missing_link_failure_kind = "attrs_unsupported_missing_xfail_or_blocker_link"
missing_link_exit_code = 146
allowed_unsupported_attrs_paths = [
    "attrs_validators_runtime_check",
    "attrs_slots_with_inheritance",
    "attrs_field_factory_complex_callable",
]

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "call",
    "expected_x",
    "expected_label",
    "expected_n",
    "expected_repr",
    "expected_relation",
    "blocker_issue",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "xfail", "blocker", "missing", "skip"]
case_values = [
    "fixture_fails_if_attrs_cannot_import",
    "fixture_asserts_constructor_default_and_equality_or_repr",
    "unsupported_behavior_visible_as_xfail_or_blocker_with_issue_reference",
]

[out_of_scope]
# Issue: "Out of scope: full attrs feature coverage."
full_attrs_feature_coverage = true
