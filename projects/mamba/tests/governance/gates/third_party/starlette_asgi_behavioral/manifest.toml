# starlette ASGI third-party behavioral fixture — closes #2648.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline starlette ASGI behavioral fixture.
# The fixture imports starlette and constructs a tiny ASGI app with
# one route. The app is exercised through an in-process test client
# or a direct ASGI call. No external sockets, no full server
# lifecycle:
#
#   - Fixture fails if starlette cannot import.
#   - Fixture avoids external sockets.
#   - Summary records ASGI framework coverage.
#
# Out of scope (issue body): full server lifecycle.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/third_party_starlette_asgi_fixture_2648.rs).

version = 1
fixture = "third_party_starlette_asgi_behavioral"
issue = 2648
parent_issue = 2529
profile = "third_party"
family = "third_party_starlette_asgi_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["starlette"]
must_be_importable_via_import_statement = true
must_register_starlette_in_ecosystem_manifest = true
must_cover_starlette_application_construction = true
must_cover_route_definition = true
must_cover_handler_function = true
must_cover_in_process_testclient_or_direct_asgi_call = true
must_assert_response_status = true
must_assert_response_body = true
must_use_synchronous_test_client_or_direct_asgi_call = true
import_statement = "import starlette"

# Canonical starlette app.
[asgi_application_definition]
app_variable = "app_2648"
route_path = "/mamba/2648"
route_method = "GET"
handler_name = "mamba_2648_handler"
handler_response_body_python_repr = "{'ok': True, 'n': 2648}"
handler_response_status = 200

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 8
sample_min_records = 1

# Deterministic in-process request through TestClient or direct
# ASGI call.
[[asgi_call_cases]]
request_method = "GET"
request_path = "/mamba/2648"
expected_response_status = 200
expected_response_json_python_repr = "{'ok': True, 'n': 2648}"
expected_response_body_substring = "2648"

# Acceptance: "Fixture fails if starlette cannot import."
[import_failure_contract]
case = "fixture_fails_if_starlette_cannot_import"
must_fail_on_import_error = true
must_fail_on_missing_starlette_module = true
must_emit_import_failure_kind_when_starlette_missing = true
forbid_silent_fallback_when_starlette_missing = true
starlette_import_failure_kind = "third_party_starlette_import_failed"
starlette_import_failure_exit_code = 167

# Acceptance: "Fixture avoids external sockets."
[no_external_sockets_contract]
case = "fixture_avoids_external_sockets"
must_not_open_external_socket = true
must_not_bind_to_external_interface = true
must_not_listen_on_real_port = true
forbid_use_of_socket_socket_bind = true
forbid_use_of_socket_socket_listen = true
forbid_use_of_uvicorn_run = true
must_use_in_process_testclient_or_direct_asgi_call = true
external_socket_failure_kind = "starlette_external_socket_used"
external_socket_exit_code = 168
server_lifecycle_failure_kind = "starlette_full_server_lifecycle_used"
server_lifecycle_exit_code = 169
must_distinguish_external_socket_from_full_server_lifecycle = true

# Acceptance: "Summary records ASGI framework coverage."
[asgi_framework_coverage_reporting_contract]
case = "summary_records_asgi_framework_coverage"
must_emit_asgi_framework_coverage_in_runner_output = true
asgi_framework_coverage_field_name = "asgi_framework_dependencies_covered"
required_asgi_framework_dependencies_covered = ["starlette"]
must_emit_summary_record_with_asgi_framework_coverage = true
summary_record_format = "json"
forbid_silent_or_implicit_asgi_framework_coverage = true
missing_asgi_framework_coverage_failure_kind = "starlette_asgi_framework_coverage_missing"
missing_asgi_framework_coverage_exit_code = 170
must_distinguish_asgi_framework_coverage_from_overall_outcome = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "app_variable",
    "route_path",
    "route_method",
    "request_method",
    "request_path",
    "expected_response_status",
    "expected_response_json_python_repr",
    "expected_response_body_substring",
    "asgi_framework_dependencies_covered",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "xfail", "blocker", "missing", "skip"]
case_values = [
    "fixture_fails_if_starlette_cannot_import",
    "fixture_avoids_external_sockets",
    "summary_records_asgi_framework_coverage",
]

[out_of_scope]
# Issue: "Out of scope: full server lifecycle."
full_server_lifecycle = true
