# urllib3 response third-party behavioral fixture — closes #2643.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline urllib3 response behavioral
# fixture. The fixture imports urllib3 and constructs an
# HTTPResponse (or equivalent deterministic in-memory response
# object) populated from a fixed body, status, and headers — no
# network, no live pool, no TLS:
#
#   - Fixture fails if urllib3 cannot import.
#   - No external network I/O occurs.
#   - Runner records it under HTTP-client dependency coverage.
#
# Out of scope (issue body): live connection pools and TLS.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/third_party_urllib3_response_fixture_2643.rs).

version = 1
fixture = "third_party_urllib3_response_behavioral"
issue = 2643
parent_issue = 2529
profile = "third_party"
family = "third_party_urllib3_response_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["urllib3"]
must_be_importable_via_import_statement = true
must_register_urllib3_in_ecosystem_manifest = true
must_cover_urllib3_httpresponse_construction = true
must_cover_status_access = true
must_cover_headers_access = true
must_cover_data_access = true
must_construct_response_from_in_memory_body = true
import_statement = "import urllib3"

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 8
sample_min_records = 1

# Deterministic HTTPResponse. Body is a fixed in-memory byte
# string; status and headers are fixed.
[[response_cases]]
body_bytes_python_repr = "b'{\"ok\": true, \"n\": 2643}'"
status = 200
headers_python_repr = "{'Content-Type': 'application/json', 'Content-Length': '21'}"
expected_status = 200
expected_data_bytes_python_repr = "b'{\"ok\": true, \"n\": 2643}'"
expected_content_type_header = "application/json"
expected_content_length_header = "21"

# Acceptance: "Fixture fails if urllib3 cannot import."
[import_failure_contract]
case = "fixture_fails_if_urllib3_cannot_import"
must_fail_on_import_error = true
must_fail_on_missing_urllib3_module = true
must_emit_import_failure_kind_when_urllib3_missing = true
forbid_silent_fallback_when_urllib3_missing = true
urllib3_import_failure_kind = "third_party_urllib3_import_failed"
urllib3_import_failure_exit_code = 147

# Acceptance: "No external network I/O occurs."
[no_external_network_io_contract]
case = "no_external_network_io_occurs"
must_not_perform_network_io = true
must_not_open_connection_pool = true
must_not_perform_dns_resolution = true
forbid_use_of_socket_connect = true
forbid_use_of_urllib3_poolmanager_request = true
forbid_use_of_urllib3_connectionfromurl = true
must_use_in_memory_body_for_response = true
network_io_failure_kind = "urllib3_external_network_io_used"
network_io_exit_code = 148
connection_pool_failure_kind = "urllib3_connection_pool_used"
connection_pool_exit_code = 149
must_distinguish_network_io_from_connection_pool_use = true

# Acceptance: "Runner records it under HTTP-client dependency
# coverage."
[http_client_coverage_reporting_contract]
case = "runner_records_under_http_client_dependency_coverage"
must_emit_http_client_dependency_coverage_in_runner_output = true
http_client_coverage_field_name = "http_client_dependencies_covered"
required_http_client_dependencies_covered = ["urllib3"]
must_emit_summary_record_with_http_client_coverage = true
summary_record_format = "json"
forbid_silent_or_implicit_http_client_coverage = true
missing_http_client_coverage_failure_kind = "urllib3_http_client_coverage_missing"
missing_http_client_coverage_exit_code = 150
must_distinguish_http_client_coverage_from_overall_outcome = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "body_bytes_python_repr",
    "status",
    "headers_python_repr",
    "expected_status",
    "expected_data_bytes_python_repr",
    "expected_content_type_header",
    "expected_content_length_header",
    "http_client_dependencies_covered",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_if_urllib3_cannot_import",
    "no_external_network_io_occurs",
    "runner_records_under_http_client_dependency_coverage",
]

[out_of_scope]
# Issue: "Out of scope: live connection pools and TLS."
live_connection_pools = true
tls = true
