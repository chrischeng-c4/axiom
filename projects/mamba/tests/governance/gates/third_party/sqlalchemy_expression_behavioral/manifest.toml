# SQLAlchemy expression third-party behavioral fixture — closes #2644.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline SQLAlchemy expression behavioral
# fixture. The fixture imports sqlalchemy, builds a tiny table
# expression in memory, and compiles or stringifies it
# deterministically. No database connection, no driver, no I/O:
#
#   - Fixture fails if SQLAlchemy cannot import.
#   - Fixture does not open a database connection.
#   - Summary records SQLAlchemy as ORM/tooling coverage.
#
# Out of scope (issue body): DB driver integration.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/third_party_sqlalchemy_expression_fixture_2644.rs).

version = 1
fixture = "third_party_sqlalchemy_expression_behavioral"
issue = 2644
parent_issue = 2529
profile = "third_party"
family = "third_party_sqlalchemy_expression_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["sqlalchemy"]
must_be_importable_via_import_statement = true
must_register_sqlalchemy_in_ecosystem_manifest = true
must_cover_metadata_construction = true
must_cover_table_construction = true
must_cover_column_construction = true
must_cover_select_expression_construction = true
must_cover_expression_compilation_or_stringification = true
must_not_require_database_engine = true
import_statement = "import sqlalchemy"

# Canonical SQLAlchemy expression. One MetaData, one Table with two
# Columns, one select() against it.
[expression_definition]
metadata_variable = "metadata_2644"
table_name = "mamba_2644"
column_a_name = "id"
column_a_type = "Integer"
column_a_primary_key = true
column_b_name = "label"
column_b_type = "String"
select_expression_python_repr = "select(mamba_2644)"

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 8
sample_min_records = 1

# Deterministic compilation. Compile the canonical select against
# the default dialect (no engine, no driver bind).
[[compilation_cases]]
expression_python_repr = "select(mamba_2644)"
dialect = "default"
expected_sql_substring_lower = "select"
expected_sql_must_contain_table_name = "mamba_2644"
expected_sql_must_contain_column_id = "id"
expected_sql_must_contain_column_label = "label"

# Acceptance: "Fixture fails if SQLAlchemy cannot import."
[import_failure_contract]
case = "fixture_fails_if_sqlalchemy_cannot_import"
must_fail_on_import_error = true
must_fail_on_missing_sqlalchemy_module = true
must_emit_import_failure_kind_when_sqlalchemy_missing = true
forbid_silent_fallback_when_sqlalchemy_missing = true
sqlalchemy_import_failure_kind = "third_party_sqlalchemy_import_failed"
sqlalchemy_import_failure_exit_code = 151

# Acceptance: "Fixture does not open a database connection."
[no_database_connection_contract]
case = "fixture_does_not_open_a_database_connection"
must_not_open_database_connection = true
must_not_create_engine_with_real_dsn = true
must_not_perform_network_io = true
forbid_use_of_create_engine_connect = true
forbid_use_of_session_execute_against_engine = true
forbid_use_of_dbapi_driver = true
must_compile_expression_without_engine_bind = true
must_distinguish_engine_connect_from_dbapi_driver_use = true
engine_connect_failure_kind = "sqlalchemy_engine_connect_used"
engine_connect_exit_code = 152
dbapi_driver_failure_kind = "sqlalchemy_dbapi_driver_used"
dbapi_driver_exit_code = 153

# Acceptance: "Summary records SQLAlchemy as ORM/tooling coverage."
[orm_tooling_coverage_reporting_contract]
case = "summary_records_sqlalchemy_as_orm_tooling_coverage"
must_emit_orm_tooling_coverage_in_runner_output = true
orm_tooling_coverage_field_name = "orm_tooling_dependencies_covered"
required_orm_tooling_dependencies_covered = ["sqlalchemy"]
must_emit_summary_record_with_orm_tooling_coverage = true
summary_record_format = "json"
forbid_silent_or_implicit_orm_tooling_coverage = true
missing_orm_tooling_coverage_failure_kind = "sqlalchemy_orm_tooling_coverage_missing"
missing_orm_tooling_coverage_exit_code = 154
must_distinguish_orm_tooling_coverage_from_overall_outcome = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "expression_python_repr",
    "dialect",
    "expected_sql_substring_lower",
    "expected_sql_must_contain_table_name",
    "expected_sql_must_contain_column_id",
    "expected_sql_must_contain_column_label",
    "orm_tooling_dependencies_covered",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_if_sqlalchemy_cannot_import",
    "fixture_does_not_open_a_database_connection",
    "summary_records_sqlalchemy_as_orm_tooling_coverage",
]

[out_of_scope]
# Issue: "Out of scope: DB driver integration."
db_driver_integration = true
