# PyYAML load/dump third-party behavioral fixture — closes #2646.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline PyYAML load/dump behavioral
# fixture. The fixture imports yaml and exercises safe_load and
# safe_dump on a small mapping/list sample. Native-extension
# limitations (libyaml C bindings) are surfaced explicitly:
#
#   - Fixture fails if yaml cannot import.
#   - Fixture fails on wrong parsed or dumped shape.
#   - Native-extension limitations are recorded explicitly if present.
#
# Out of scope (issue body): YAML spec edge cases.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/third_party_pyyaml_load_dump_fixture_2646.rs).

version = 1
fixture = "third_party_pyyaml_load_dump_behavioral"
issue = 2646
parent_issue = 2529
profile = "third_party"
family = "third_party_pyyaml_load_dump_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["yaml"]
must_be_importable_via_import_statement = true
must_register_pyyaml_in_ecosystem_manifest = true
must_cover_yaml_safe_load = true
must_cover_yaml_safe_dump = true
must_cover_mapping_round_trip = true
must_cover_list_round_trip = true
must_use_only_safe_load_and_safe_dump = true
forbid_use_of_yaml_load_without_loader = true
forbid_use_of_unsafe_loader = true
import_statement = "import yaml"

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 16
sample_min_records = 2

# safe_load.
[[load_cases]]
yaml_input = "name: mamba\nn: 2646\n"
expected_parsed_python_repr = "{'name': 'mamba', 'n': 2646}"

[[load_cases]]
yaml_input = "- 1\n- 2\n- 3\n"
expected_parsed_python_repr = "[1, 2, 3]"

# safe_dump. The expected dumped form is the canonical PyYAML
# default_flow_style=False output for the same mapping/list.
[[dump_cases]]
python_value_repr = "{'name': 'mamba', 'n': 2646}"
expected_dumped_substring_name = "name: mamba"
expected_dumped_substring_n = "n: 2646"

[[dump_cases]]
python_value_repr = "[1, 2, 3]"
expected_dumped_substring_item_1 = "- 1"
expected_dumped_substring_item_2 = "- 2"
expected_dumped_substring_item_3 = "- 3"

# Acceptance: "Fixture fails if yaml cannot import."
[import_failure_contract]
case = "fixture_fails_if_yaml_cannot_import"
must_fail_on_import_error = true
must_fail_on_missing_yaml_module = true
must_emit_import_failure_kind_when_yaml_missing = true
forbid_silent_fallback_when_yaml_missing = true
yaml_import_failure_kind = "third_party_pyyaml_import_failed"
yaml_import_failure_exit_code = 159

# Acceptance: "Fixture fails on wrong parsed or dumped shape."
[shape_mismatch_contract]
case = "fixture_fails_on_wrong_parsed_or_dumped_shape"
must_fail_on_incorrect_parsed_shape = true
must_fail_on_incorrect_dumped_shape = true
parsed_shape_mismatch_failure_kind = "pyyaml_parsed_shape_mismatch"
parsed_shape_mismatch_exit_code = 160
dumped_shape_mismatch_failure_kind = "pyyaml_dumped_shape_mismatch"
dumped_shape_mismatch_exit_code = 161
must_distinguish_parsed_from_dumped_shape_failure = true

# Acceptance: "Native-extension limitations are recorded explicitly
# if present."
[native_extension_limitation_reporting_contract]
case = "native_extension_limitations_recorded_explicitly_if_present"
must_record_libyaml_availability = true
libyaml_availability_field_name = "libyaml_available"
allowed_libyaml_availability_values = ["available", "unavailable"]
must_record_native_extension_limitations_when_unavailable = true
native_extension_limitation_field_name = "native_extension_limitations"
forbid_silently_hiding_native_extension_limitations = true
forbid_falsely_reporting_libyaml_available = true
missing_native_extension_report_failure_kind = "pyyaml_native_extension_report_missing"
missing_native_extension_report_exit_code = 162

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "yaml_input",
    "expected_parsed_python_repr",
    "python_value_repr",
    "expected_dumped_substring_name",
    "expected_dumped_substring_n",
    "expected_dumped_substring_item_1",
    "expected_dumped_substring_item_2",
    "expected_dumped_substring_item_3",
    "libyaml_available",
    "native_extension_limitations",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_if_yaml_cannot_import",
    "fixture_fails_on_wrong_parsed_or_dumped_shape",
    "native_extension_limitations_recorded_explicitly_if_present",
]

[out_of_scope]
# Issue: "Out of scope: YAML spec edge cases."
yaml_spec_edge_cases = true
