# C3 — Flask runs unmodified (WSGI hello-world) fixture — closes #1257.
# Related: #1263 (3P Libs layer), #1234 (pytest harness), #1265
# (Goal 1 MVP Py3.12 ecosystem).
#
# Pins the shape of the C3 Flask WSGI hello-world acceptance gate.
# Flask from PyPI must run unmodified under mamba — no patched Flask
# fork, no mamba-specific shim layer, no werkzeug substitution. The
# gate locks the four requirements R1–R4 from the issue body so
# future regressions can be reported as a single distinguishable
# failure:
#
#   - R1: `from flask import Flask` succeeds and `Flask(__name__)`
#     constructs the app.
#   - R2: `@app.route("/")` decorator registers the endpoint.
#   - R3: `app.run()` starts the dev server and responds to HTTP/1.1
#     GET on port 5000 (configurable for offline gate).
#   - R4: Conformance fixture spawns the server, curls it, asserts
#     the rendered "hello world" body and 200 status.
#
# Out of scope: requests (#1259), pytest (#1234), TLS (#1259's
# urllib3 stack), Flask plugins, performance gates.
#
# Shape locked by src/meta_gates/tests/c3_flask_runs_unmodified_gate.rs.

version = 1
fixture = "c3_flask_runs_unmodified_gate"
issue = 1257
related_issues = [1263, 1234, 1265]
profile = "third_party"
family = "c3_flask_runs_unmodified_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_flask_import_and_app_construction = true
must_cover_route_decorator_registration = true
must_cover_dev_server_responds_to_http_get = true
must_cover_conformance_fixture_spawns_server_curls_and_asserts = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — Flask import + Flask(__name__) constructs the app.
[r1_flask_import_and_app_construction_contract]
case = "from_flask_import_flask_then_flask_dunder_name_constructs_app"
requirement_id = "R1"
must_install_flask_unmodified_from_pypi = true
must_resolve_from_flask_import_flask = true
must_construct_app_with_dunder_name = true
forbid_modifying_flask_on_disk_before_run = true
forbid_substituting_werkzeug_with_mamba_shim = true
canonical_import_statement = "from flask import Flask"
canonical_import_statement_field_name = "canonical_import_statement"
app_object_field_name = "flask_app"
flask_import_failure_kind = "c3_flask_import_failed"
flask_import_failure_exit_code = 277
flask_app_construction_failure_kind = "c3_flask_app_construction_failed"
flask_app_construction_failure_exit_code = 278
must_distinguish_import_failure_from_construction_failure = true

# R2 — @app.route("/") decorator registers the endpoint.
[r2_route_decorator_registration_contract]
case = "app_route_slash_decorator_registers_endpoint_for_get"
requirement_id = "R2"
must_resolve_app_route_decorator = true
must_register_endpoint_for_root_path = true
must_register_endpoint_for_http_get_method = true
forbid_silently_dropping_route_registration = true
forbid_collapsing_multiple_routes_into_single_endpoint = true
canonical_route_path = "/"
canonical_route_method = "GET"
endpoint_path_field_name = "endpoint_path"
endpoint_method_field_name = "endpoint_method"
route_registration_missing_failure_kind = "c3_flask_route_registration_missing"
route_registration_missing_exit_code = 279
route_method_mismatched_failure_kind = "c3_flask_route_method_mismatched"
route_method_mismatched_exit_code = 280
must_distinguish_registration_missing_from_method_mismatched = true

# R3 — app.run() starts the dev server and responds to HTTP/1.1 GET.
[r3_dev_server_responds_to_http_get_contract]
case = "app_run_starts_dev_server_and_responds_to_http_get"
requirement_id = "R3"
must_start_werkzeug_dev_server = true
must_bind_to_loopback_only_in_default_gate = true
must_respond_to_http_1_1_get = true
must_emit_200_status_for_registered_route = true
must_emit_hello_world_body_for_registered_route = true
forbid_binding_to_non_loopback_in_default_gate = true
forbid_silently_falling_back_to_non_wsgi_server = true
default_bind_host = "127.0.0.1"
default_bind_port = 5000
bind_host_field_name = "bind_host"
bind_port_field_name = "bind_port"
http_status_field_name = "http_status"
http_body_field_name = "http_body"
expected_http_status = 200
expected_http_body = "hello world"
dev_server_bind_failure_kind = "c3_flask_dev_server_bind_failure"
dev_server_bind_failure_exit_code = 281
dev_server_response_mismatch_failure_kind = "c3_flask_dev_server_response_mismatch"
dev_server_response_mismatch_exit_code = 282
must_distinguish_bind_failure_from_response_mismatch = true

# R4 — Conformance fixture spawns server, curls it, asserts response.
[r4_conformance_fixture_spawns_server_curls_and_asserts_contract]
case = "conformance_fixture_spawns_server_curls_and_asserts_response"
requirement_id = "R4"
must_spawn_dev_server_inside_fixture = true
must_curl_or_equivalent_against_dev_server = true
must_assert_response_status_in_fixture = true
must_assert_response_body_in_fixture = true
must_tear_down_dev_server_at_end_of_fixture = true
forbid_dev_server_leaked_between_fixtures = true
forbid_fixture_passing_when_curl_did_not_run = true
fixture_relative_path = "projects/mamba/tests/cpython/3p/flask_hello_world"
fixture_relative_path_field_name = "fixture_relative_path"
http_client_kind_field_name = "http_client_kind"
allowed_http_client_kinds = ["curl", "wsgi_test_client", "urllib"]
fixture_curl_skipped_failure_kind = "c3_flask_fixture_curl_skipped"
fixture_curl_skipped_exit_code = 283
fixture_server_leaked_failure_kind = "c3_flask_fixture_dev_server_leaked"
fixture_server_leaked_exit_code = 284
must_distinguish_curl_skipped_from_server_leaked = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "canonical_import_statement",
    "flask_app",
    "endpoint_path",
    "endpoint_method",
    "bind_host",
    "bind_port",
    "http_status",
    "http_body",
    "fixture_relative_path",
    "http_client_kind",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "from_flask_import_flask_then_flask_dunder_name_constructs_app",
    "app_route_slash_decorator_registers_endpoint_for_get",
    "app_run_starts_dev_server_and_responds_to_http_get",
    "conformance_fixture_spawns_server_curls_and_asserts_response",
]

[out_of_scope]
# Issue body: requests (#1259), pytest (#1234), Flask plugins,
# C-extension paths, performance.
requests_urllib3_tls_ssl = true
pytest_harness = true
flask_extensions_beyond_core = true
c_extension_fast_paths = true
performance_gates = true
runtime_implementation_of_werkzeug_dev_server = true
runtime_implementation_of_socket_listen_accept = true
