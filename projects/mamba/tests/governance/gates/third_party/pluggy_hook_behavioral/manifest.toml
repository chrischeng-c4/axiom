# pluggy hook third-party behavioral fixture — closes #2647.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline pluggy hook behavioral fixture.
# The fixture imports pluggy, defines one hookspec and one
# hookimpl, registers the plugin on a PluginManager, and invokes
# the hook deterministically:
#
#   - Fixture fails if pluggy cannot import.
#   - Fixture asserts hook call result exactly.
#   - Runner records it as plugin-framework coverage.
#
# Out of scope (issue body): pytest behavior beyond pluggy smoke.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/third_party_pluggy_hook_fixture_2647.rs).

version = 1
fixture = "third_party_pluggy_hook_behavioral"
issue = 2647
parent_issue = 2529
profile = "third_party"
family = "third_party_pluggy_hook_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["pluggy"]
must_be_importable_via_import_statement = true
must_register_pluggy_in_ecosystem_manifest = true
must_cover_pluginmanager_construction = true
must_cover_hookspec_definition = true
must_cover_hookimpl_definition = true
must_cover_register_plugin = true
must_cover_add_hookspecs = true
must_cover_invoke_hook = true
import_statement = "import pluggy"

# Canonical pluggy plugin. One hookspec, one hookimpl, one
# project_name "mamba2647".
[plugin_definition]
project_name = "mamba2647"
hook_name = "mamba_2647_compute"
hookspec_signature = "(x: int, y: int) -> int"
hookimpl_returns_python_repr = "x + y"
plugin_class_name = "Mamba2647Plugin"

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 8
sample_min_records = 1

# Deterministic hook call. firstresult=False (list returned).
[[hook_call_cases]]
call_args_python_repr = "x=2, y=5"
expected_result_python_repr = "[7]"

[[hook_call_cases]]
call_args_python_repr = "x=10, y=-3"
expected_result_python_repr = "[7]"

# Acceptance: "Fixture fails if pluggy cannot import."
[import_failure_contract]
case = "fixture_fails_if_pluggy_cannot_import"
must_fail_on_import_error = true
must_fail_on_missing_pluggy_module = true
must_emit_import_failure_kind_when_pluggy_missing = true
forbid_silent_fallback_when_pluggy_missing = true
pluggy_import_failure_kind = "third_party_pluggy_import_failed"
pluggy_import_failure_exit_code = 163

# Acceptance: "Fixture asserts hook call result exactly."
[hook_call_result_contract]
case = "fixture_asserts_hook_call_result_exactly"
must_assert_hook_call_result_exactly = true
must_fail_on_hook_result_mismatch = true
must_fail_on_hook_invocation_error = true
forbid_partial_or_substring_match_of_hook_result = true
hook_result_mismatch_failure_kind = "pluggy_hook_result_mismatch"
hook_result_mismatch_exit_code = 164
hook_invocation_error_failure_kind = "pluggy_hook_invocation_error"
hook_invocation_error_exit_code = 165
must_distinguish_hook_result_mismatch_from_invocation_error = true

# Acceptance: "Runner records it as plugin-framework coverage."
[plugin_framework_coverage_reporting_contract]
case = "runner_records_pluggy_as_plugin_framework_coverage"
must_emit_plugin_framework_coverage_in_runner_output = true
plugin_framework_coverage_field_name = "plugin_framework_dependencies_covered"
required_plugin_framework_dependencies_covered = ["pluggy"]
must_emit_summary_record_with_plugin_framework_coverage = true
summary_record_format = "json"
forbid_silent_or_implicit_plugin_framework_coverage = true
missing_plugin_framework_coverage_failure_kind = "pluggy_plugin_framework_coverage_missing"
missing_plugin_framework_coverage_exit_code = 166
must_distinguish_plugin_framework_coverage_from_overall_outcome = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "project_name",
    "hook_name",
    "call_args_python_repr",
    "expected_result_python_repr",
    "plugin_framework_dependencies_covered",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_if_pluggy_cannot_import",
    "fixture_asserts_hook_call_result_exactly",
    "runner_records_pluggy_as_plugin_framework_coverage",
]

[out_of_scope]
# Issue: "Out of scope: pytest behavior beyond pluggy smoke."
pytest_behavior_beyond_pluggy_smoke = true
