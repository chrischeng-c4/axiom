# httpx mock transport third-party behavioral fixture — closes #2645.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline httpx mock transport behavioral
# fixture. The fixture imports httpx and exercises a deterministic
# request flow through httpx.MockTransport — no real socket, no DNS,
# no TLS, no async:
#
#   - Fixture fails if httpx cannot import.
#   - Fixture performs no external network I/O.
#   - Failure output distinguishes transport setup from response
#     parsing.
#
# Out of scope (issue body): async HTTP and TLS behavior.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/third_party_httpx_mock_transport_fixture_2645.rs).

version = 1
fixture = "third_party_httpx_mock_transport_behavioral"
issue = 2645
parent_issue = 2529
profile = "third_party"
family = "third_party_httpx_mock_transport_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["httpx"]
must_be_importable_via_import_statement = true
must_register_httpx_in_ecosystem_manifest = true
must_cover_httpx_mocktransport_construction = true
must_cover_httpx_client_construction_with_mock_transport = true
must_cover_request_method = true
must_cover_request_url = true
must_cover_response_status = true
must_cover_response_json_or_text = true
must_use_synchronous_client = true
import_statement = "import httpx"

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 8
sample_min_records = 1

# Deterministic request flow. Method + URL fixed; mock transport
# returns a fixed JSON body and status.
[[request_cases]]
request_method = "GET"
request_url = "https://mamba.invalid/2645"
mock_response_status = 200
mock_response_json_python_repr = "{'ok': True, 'n': 2645}"
expected_response_status = 200
expected_response_json_python_repr = "{'ok': True, 'n': 2645}"
expected_response_text_substring = "2645"

# Acceptance: "Fixture fails if httpx cannot import."
[import_failure_contract]
case = "fixture_fails_if_httpx_cannot_import"
must_fail_on_import_error = true
must_fail_on_missing_httpx_module = true
must_emit_import_failure_kind_when_httpx_missing = true
forbid_silent_fallback_when_httpx_missing = true
httpx_import_failure_kind = "third_party_httpx_import_failed"
httpx_import_failure_exit_code = 155

# Acceptance: "Fixture performs no external network I/O."
[no_external_network_io_contract]
case = "fixture_performs_no_external_network_io"
must_not_perform_network_io = true
must_not_perform_dns_resolution = true
must_not_open_socket = true
forbid_use_of_socket_connect = true
forbid_use_of_httpcore_real_pool = true
must_use_mock_transport_for_request = true
network_io_failure_kind = "httpx_external_network_io_used"
network_io_exit_code = 156

# Acceptance: "Failure output distinguishes transport setup from
# response parsing."
[transport_setup_vs_response_parsing_contract]
case = "failure_output_distinguishes_transport_setup_from_response_parsing"
must_distinguish_transport_setup_failure_from_response_parsing_failure = true
transport_setup_failure_kind = "httpx_mock_transport_setup_failed"
transport_setup_exit_code = 157
response_parsing_failure_kind = "httpx_response_parsing_failed"
response_parsing_exit_code = 158
must_emit_failure_phase_field_in_runner_output = true
failure_phase_field_name = "failure_phase"
allowed_failure_phase_values = ["transport_setup", "response_parsing"]
forbid_collapsed_or_implicit_failure_phase = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "request_method",
    "request_url",
    "mock_response_status",
    "mock_response_json_python_repr",
    "expected_response_status",
    "expected_response_json_python_repr",
    "expected_response_text_substring",
    "failure_phase",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_if_httpx_cannot_import",
    "fixture_performs_no_external_network_io",
    "failure_output_distinguishes_transport_setup_from_response_parsing",
]

[out_of_scope]
# Issue: "Out of scope: async HTTP and TLS behavior."
async_http = true
tls_behavior = true
