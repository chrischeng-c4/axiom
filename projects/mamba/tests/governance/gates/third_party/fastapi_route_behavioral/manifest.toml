# FastAPI route third-party behavioral fixture — closes #2650.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline FastAPI route behavioral fixture.
# The fixture imports fastapi, defines one route, and exercises it
# with a deterministic in-process call when supported. No external
# network, no real server process:
#
#   - Fixture appears in ecosystem reports even if blocked.
#   - Import and route setup failures are distinguishable.
#   - No external network or server process is required.
#
# Out of scope (issue body): full pydantic and OpenAPI generation
# coverage.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/third_party_fastapi_route_fixture_2650.rs).

version = 1
fixture = "third_party_fastapi_route_behavioral"
issue = 2650
parent_issue = 2529
profile = "third_party"
family = "third_party_fastapi_route_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["fastapi"]
must_be_importable_via_import_statement = true
must_register_fastapi_in_ecosystem_manifest = true
must_cover_fastapi_application_construction = true
must_cover_route_decoration_with_get = true
must_cover_handler_function = true
must_cover_in_process_testclient_or_direct_asgi_call_when_supported = true
must_assert_response_status = true
must_assert_response_body = true
import_statement = "import fastapi"

# Canonical FastAPI route.
[route_definition]
app_variable = "app_2650"
route_path = "/mamba/2650"
route_method = "GET"
handler_name = "mamba_2650_handler"
handler_response_body_python_repr = "{'ok': True, 'n': 2650}"
handler_response_status = 200

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 8
sample_min_records = 1

# Deterministic in-process call. Skipped or marked xfail/blocker
# if TestClient/ASGI call is not supported on the current runtime;
# the fixture still appears in reports.
[[route_call_cases]]
request_method = "GET"
request_path = "/mamba/2650"
expected_response_status = 200
expected_response_json_python_repr = "{'ok': True, 'n': 2650}"
expected_response_body_substring = "2650"

# Acceptance: "Fixture appears in ecosystem reports even if blocked."
[ecosystem_reporting_when_blocked_contract]
case = "fixture_appears_in_ecosystem_reports_even_if_blocked"
must_emit_ecosystem_report_entry_for_every_outcome = true
must_emit_ecosystem_report_entry_when_blocked = true
must_emit_ecosystem_report_entry_when_xfail = true
must_emit_ecosystem_report_entry_when_skip = true
must_emit_ecosystem_report_entry_when_missing = true
forbid_suppressing_ecosystem_report_for_blocked_outcomes = true
ecosystem_report_field_name = "ecosystem_dependencies_covered"
required_ecosystem_dependencies_covered = ["fastapi"]
missing_ecosystem_report_entry_failure_kind = "fastapi_ecosystem_report_entry_missing"
missing_ecosystem_report_entry_exit_code = 171

# Acceptance: "Import and route setup failures are distinguishable."
[import_vs_route_setup_failure_contract]
case = "import_and_route_setup_failures_are_distinguishable"
must_distinguish_import_failure_from_route_setup_failure = true
must_fail_on_import_error = true
must_fail_on_route_setup_error = true
forbid_silent_fallback_when_fastapi_missing = true
forbid_collapsed_or_implicit_failure_phase = true
fastapi_import_failure_kind = "third_party_fastapi_import_failed"
fastapi_import_failure_exit_code = 172
fastapi_route_setup_failure_kind = "fastapi_route_setup_failed"
fastapi_route_setup_failure_exit_code = 173
failure_phase_field_name = "failure_phase"
allowed_failure_phase_values = ["import", "route_setup"]

# Acceptance: "No external network or server process is required."
[no_external_network_or_server_process_contract]
case = "no_external_network_or_server_process_is_required"
must_not_perform_network_io = true
must_not_open_external_socket = true
must_not_listen_on_real_port = true
must_not_spawn_server_process = true
forbid_use_of_socket_socket_bind = true
forbid_use_of_socket_socket_listen = true
forbid_use_of_uvicorn_run = true
forbid_use_of_subprocess_for_server = true
must_use_in_process_testclient_or_direct_asgi_call_when_supported = true
external_network_failure_kind = "fastapi_external_network_used"
external_network_exit_code = 174
server_process_failure_kind = "fastapi_external_server_process_used"
server_process_exit_code = 175
must_distinguish_external_network_from_server_process_use = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "app_variable",
    "route_path",
    "route_method",
    "request_method",
    "request_path",
    "expected_response_status",
    "expected_response_json_python_repr",
    "expected_response_body_substring",
    "ecosystem_dependencies_covered",
    "failure_phase",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "xfail", "blocker", "missing", "skip"]
case_values = [
    "fixture_appears_in_ecosystem_reports_even_if_blocked",
    "import_and_route_setup_failures_are_distinguishable",
    "no_external_network_or_server_process_is_required",
]

[out_of_scope]
# Issue: "Out of scope: full pydantic and OpenAPI generation
# coverage."
full_pydantic_coverage = true
openapi_generation_coverage = true
