# cclab-qc-mamba binding gate — closes #2095. Parent profiler
# infra issue #2093. This issue is the in-process binding that
# bridges cclab-qc (the cclab profiler) to mamba so Python-side
# bench fixtures can be profiled in-process without forking
# /usr/bin/time -l or shelling out to py-spy.
#
# Use case (from #2096 body): when base64 reports memory 0.50×,
# we want PhaseBreakdown to tell us whether the overhead is in
# PythonExtract (boundary copy in/out of PyO3), RustConvert
# (bytes-object construction inside mamba runtime), JITCompile,
# JITExec, GC, or unattributed.
#
# The gate is GREEN only when:
#
#   - R1: A PyO3-exposed cclab.qc module is callable from
#     Python code running under mamba. The API surface is
#     cProfile-shaped: enable(), disable(), get_stats(), and a
#     decorator/context-manager convenience wrapper.
#   - R2: A py-spy-compatible sampling bridge walks mamba JIT
#     frames. mamba's JIT-compiled frames appear in the same
#     stack-sample stream as interpreted-Python frames; no
#     "<unknown jit frame>" placeholders.
#   - R3: PhaseBreakdown attributes time/RSS to the six
#     canonical buckets: PythonExtract, RustConvert, JITCompile,
#     JITExec, GC, Other. Every sample is attributed to exactly
#     one bucket. Double-counting is refused.
#   - R4: Zero-overhead-when-disabled — the binding compiles
#     out to a no-op when the qc feature is off; with qc on but
#     no active session, the per-call hot path adds ≤ 5 ns.
#   - R5: Correctness invariants — sample count, warmup_iters,
#     and elapsed_ns are recorded with each session; results
#     across two consecutive sessions for the same workload
#     remain within ±10% noise.
#
# Out of scope: implementing cclab-qc itself (parent #2093);
# rewriting cProfile or py-spy; SaaS uploads; cross-machine
# aggregation.
#
# Shape locked by src/meta_gates/tests/cclab_qc_mamba_binding_gate.rs.

version = 1
fixture = "cclab_qc_mamba_binding_gate"
issue = 2095
parent_issue = 2093
profile = "conformance"
family = "cclab_qc_mamba_binding_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_pyo3_module_exposes_cprofile_shaped_api = true
must_cover_pyspy_sampling_bridge_walks_jit_frames = true
must_cover_phase_breakdown_attribution_six_buckets = true
must_cover_zero_overhead_when_disabled = true
must_cover_correctness_invariants_recorded = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — PyO3 module with cProfile-shaped API.
[r1_pyo3_cprofile_shaped_api_contract]
case = "cclab_qc_pyo3_module_exposes_enable_disable_get_stats_and_context_manager_callable_under_mamba"
requirement_id = "R1"
must_expose_enable_function = true
must_expose_disable_function = true
must_expose_get_stats_function = true
must_expose_context_manager_convenience_wrapper = true
must_be_importable_under_mamba = true
forbid_requiring_separate_process_for_basic_profiling = true
pyo3_module_name_field_name = "pyo3_module_name"
expected_pyo3_module_name = "cclab.qc"
required_api_surface_field_name = "required_api_surface"
required_api_surface = ["enable", "disable", "get_stats", "profile_context_manager"]
import_fails_under_mamba_failure_kind = "infra_cclab_qc_import_fails_under_mamba"
import_fails_under_mamba_exit_code = 488
api_surface_missing_failure_kind = "infra_cclab_qc_api_surface_missing"
api_surface_missing_exit_code = 489
must_distinguish_import_fail_from_api_missing = true

# R2 — py-spy sampling bridge walks JIT frames.
[r2_pyspy_sampling_bridge_walks_jit_frames_contract]
case = "py_spy_stack_sampling_walks_mamba_jit_frames_and_does_not_emit_unknown_jit_frame_placeholders"
requirement_id = "R2"
must_walk_mamba_jit_frames = true
must_emit_jit_frame_with_python_source_location = true
forbid_emitting_unknown_jit_frame_placeholder = true
forbid_dropping_jit_frame_from_stack_sample = true
sampling_mode_field_name = "sampling_mode"
allowed_sampling_mode_values = ["py_spy_compatible_sampling", "cprofile_deterministic"]
expected_sampling_mode_for_r2 = "py_spy_compatible_sampling"
unknown_jit_frame_failure_kind = "infra_cclab_qc_unknown_jit_frame_emitted"
unknown_jit_frame_exit_code = 490
jit_frame_dropped_failure_kind = "infra_cclab_qc_jit_frame_dropped_from_sample"
jit_frame_dropped_exit_code = 491
must_distinguish_unknown_frame_from_dropped_frame = true

# R3 — PhaseBreakdown attribution to six canonical buckets.
[r3_phase_breakdown_attribution_six_buckets_contract]
case = "phase_breakdown_attributes_every_sample_to_exactly_one_of_six_canonical_buckets_no_double_count"
requirement_id = "R3"
must_define_six_canonical_buckets = true
must_attribute_every_sample_to_exactly_one_bucket = true
forbid_double_counting_across_buckets = true
forbid_leaving_sample_unattributed_silently = true
canonical_buckets_field_name = "canonical_buckets"
canonical_buckets = [
    "PythonExtract",
    "RustConvert",
    "JITCompile",
    "JITExec",
    "GC",
    "Other",
]
double_count_failure_kind = "infra_cclab_qc_phase_breakdown_double_counted"
double_count_exit_code = 492
sample_unattributed_failure_kind = "infra_cclab_qc_sample_silently_unattributed"
sample_unattributed_exit_code = 493
bucket_missing_failure_kind = "infra_cclab_qc_canonical_bucket_missing"
bucket_missing_exit_code = 494
must_distinguish_double_count_from_unattributed_from_bucket_missing = true

# R4 — zero-overhead when disabled.
[r4_zero_overhead_when_disabled_contract]
case = "qc_feature_off_compiles_to_no_op_and_qc_on_idle_session_hot_path_overhead_under_5_ns"
requirement_id = "R4"
must_compile_out_when_feature_off = true
must_keep_idle_session_overhead_under_5_ns_per_call = true
forbid_unconditional_hot_path_call_to_session_check = true
forbid_silently_widening_overhead_budget = true
feature_off_compile_kind_field_name = "feature_off_compile_kind"
allowed_feature_off_compile_kind_values = ["no_op_when_feature_off", "always_compiled_in"]
expected_feature_off_compile_kind = "no_op_when_feature_off"
idle_session_overhead_budget_ns_field_name = "idle_session_overhead_budget_ns"
expected_idle_session_overhead_budget_ns = 5
feature_off_not_compiled_out_failure_kind = "infra_cclab_qc_feature_off_not_compiled_out"
feature_off_not_compiled_out_exit_code = 495
idle_session_overhead_exceeded_failure_kind = "infra_cclab_qc_idle_session_overhead_exceeded"
idle_session_overhead_exceeded_exit_code = 496
overhead_budget_widened_failure_kind = "infra_cclab_qc_overhead_budget_silently_widened"
overhead_budget_widened_exit_code = 497
must_distinguish_not_compiled_out_from_exceeded_from_widened = true

# R5 — correctness invariants recorded with each session.
[r5_correctness_invariants_recorded_contract]
case = "session_records_sample_count_warmup_iters_elapsed_ns_and_two_consecutive_sessions_match_within_10_percent"
requirement_id = "R5"
must_record_sample_count = true
must_record_warmup_iters = true
must_record_elapsed_ns = true
must_assert_two_consecutive_sessions_within_10_percent = true
forbid_dropping_invariant_field_from_session = true
required_session_fields_field_name = "required_session_fields"
required_session_fields = ["sample_count", "warmup_iters", "elapsed_ns"]
consecutive_session_noise_tolerance_field_name = "consecutive_session_noise_tolerance"
expected_consecutive_session_noise_tolerance = "10_percent"
invariant_field_missing_failure_kind = "infra_cclab_qc_session_invariant_field_missing"
invariant_field_missing_exit_code = 498
consecutive_session_diverged_failure_kind = "infra_cclab_qc_consecutive_session_diverged_beyond_10_percent"
consecutive_session_diverged_exit_code = 499
must_distinguish_field_missing_from_session_diverged = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "pyo3_module_name",
    "required_api_surface",
    "sampling_mode",
    "canonical_buckets",
    "feature_off_compile_kind",
    "idle_session_overhead_budget_ns",
    "required_session_fields",
    "consecutive_session_noise_tolerance",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "cclab_qc_pyo3_module_exposes_enable_disable_get_stats_and_context_manager_callable_under_mamba",
    "py_spy_stack_sampling_walks_mamba_jit_frames_and_does_not_emit_unknown_jit_frame_placeholders",
    "phase_breakdown_attributes_every_sample_to_exactly_one_of_six_canonical_buckets_no_double_count",
    "qc_feature_off_compiles_to_no_op_and_qc_on_idle_session_hot_path_overhead_under_5_ns",
    "session_records_sample_count_warmup_iters_elapsed_ns_and_two_consecutive_sessions_match_within_10_percent",
]

[out_of_scope]
# This issue is the BINDING between cclab-qc and mamba. The
# profiler itself is owned by parent #2093. cProfile and py-spy
# upstream behavior are not changed; SaaS uploads and
# cross-machine aggregation are not in scope.
implementation_of_cclab_qc_profiler_itself = true
rewriting_cprofile_or_pyspy_upstream = true
saas_upload_or_cross_machine_aggregation = true
non_mamba_runtime_profiler_targets = true
c_extension_fast_paths = true
