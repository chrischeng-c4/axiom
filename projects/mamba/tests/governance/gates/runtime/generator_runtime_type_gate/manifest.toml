# Generator runtime type cross-cutting gate — closes #2182.
# Surfaced as 3-of-3 cross-cutting confirmation during Wave-5
# close-out (2026-05-15) per the
# project_mamba_phase2_crosscutting_blockers protocol.
#
# Today every stdlib lib that exposes a true iterator/generator
# API in CPython is shipped as **list-aliased** under mamba: the
# shim eagerly builds a list and returns MbObject::List. This
# works behaviorally but defeats streaming, forces eager
# allocation, and is the root cause of the subset-B memory
# regressions on csv (mem 0.13×), xml.etree (mem 0.68×), and
# glob (Wave-5 Task #66 aliased to glob.glob).
#
# The gate is GREEN only when:
#
#   - R1: A first-class MbObject::Generator runtime variant is
#     added. Closure-based shape is the locked design (option A
#     in the issue body). Options B (coroutine) and C
#     (Iterator-trait box) are explicitly refused.
#   - R2: class.rs gains a Generator dispatch for mb_iter_next so
#     `for x in gen:` lowers to next_fn() under the JIT without
#     materializing a list.
#   - R3: csv.reader is retrofitted as the worked example. After
#     conversion csv.reader returns MbObject::Generator (not
#     MbObject::List), and the csv mem ratio moves materially
#     vs the pre-conversion Wave-4 baseline (0.13×).
#   - R4: Phase 2 follow-on libs are enumerated and pinned (not
#     implemented in this issue): xml.etree.ElementTree.iter,
#     glob.iglob, re.finditer, itertools.chain.from_iterable,
#     xml.etree.iterparse, os.walk, mmap.find (iterator mode).
#   - R5: Design alternative B (coroutine / yield-on-stack-switch
#     via tokio::sync::mpsc) and alternative C (Box<dyn
#     Iterator>) are explicitly recorded as rejected, with the
#     refusal reason pinned so a later retrofit cannot quietly
#     switch shape.
#
# Out of scope: phase 2 retrofits; eliminating MbObject::List
# entirely; rewriting CPython baselines.
#
# Shape locked by src/runtime/tests/generator_runtime_type_gate.rs.

version = 1
fixture = "generator_runtime_type_gate"
issue = 2182
profile = "conformance"
family = "generator_runtime_type_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_generator_mbobject_variant_added = true
must_cover_class_rs_iter_next_dispatches_on_generator = true
must_cover_csv_reader_retrofit_as_worked_example = true
must_cover_phase_2_followons_enumerated = true
must_cover_design_alternatives_b_and_c_refused = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — MbObject::Generator variant added, closure-based shape.
[r1_generator_mbobject_variant_added_contract]
case = "mbobject_generator_variant_added_with_closure_based_next_fn_and_box_dyn_any_state"
requirement_id = "R1"
must_add_mbobject_generator_variant = true
must_pin_closure_based_shape = true
must_carry_next_fn_field = true
must_carry_boxed_state_field = true
forbid_replacing_list_aliased_with_other_runtime_shape = true
forbid_adding_generator_variant_without_next_fn_field = true
mbobject_variant_field_name = "mbobject_variant"
expected_mbobject_variant = "Generator"
generator_shape_field_name = "generator_shape"
allowed_generator_shape_values = ["closure_based", "coroutine_based", "iterator_trait_object"]
expected_generator_shape = "closure_based"
next_fn_field_name = "next_fn_field_name"
expected_next_fn_field = "next_fn"
state_field_name = "state_field_name"
expected_state_field = "state"
variant_missing_failure_kind = "runtime_generator_mbobject_variant_missing"
variant_missing_exit_code = 453
wrong_shape_failure_kind = "runtime_generator_wrong_shape"
wrong_shape_exit_code = 454
next_fn_field_missing_failure_kind = "runtime_generator_next_fn_field_missing"
next_fn_field_missing_exit_code = 455
must_distinguish_variant_missing_from_wrong_shape_from_next_fn_missing = true

# R2 — class.rs mb_iter_next dispatches on Generator.
[r2_class_rs_iter_next_dispatches_on_generator_contract]
case = "class_rs_mb_iter_next_dispatches_on_generator_variant_without_materializing_a_list"
requirement_id = "R2"
must_dispatch_mb_iter_next_on_generator = true
must_invoke_next_fn_per_step = true
forbid_materializing_full_list_in_for_loop_lowering = true
forbid_silently_falling_back_to_list_iter_dispatch = true
dispatch_entrypoint_field_name = "dispatch_entrypoint"
expected_dispatch_entrypoint = "mb_iter_next"
dispatch_kind_field_name = "dispatch_kind"
allowed_dispatch_kind_values = ["per_step_next_fn", "materialize_full_list", "silent_fallback_to_list_iter"]
expected_dispatch_kind = "per_step_next_fn"
materialization_in_lowering_failure_kind = "runtime_generator_for_loop_lowering_materialized_list"
materialization_in_lowering_exit_code = 456
dispatch_missing_failure_kind = "runtime_generator_class_rs_dispatch_missing"
dispatch_missing_exit_code = 457
silent_fallback_failure_kind = "runtime_generator_silent_list_iter_fallback"
silent_fallback_exit_code = 458
must_distinguish_materialization_from_dispatch_missing_from_silent_fallback = true

# R3 — csv.reader retrofit as worked example, mem moves vs
# pre-conversion 0.13× baseline.
[r3_csv_reader_retrofit_as_worked_example_contract]
case = "csv_reader_converted_to_generator_and_mem_ratio_moves_vs_pre_conversion_baseline"
requirement_id = "R3"
must_convert_csv_reader_to_generator = true
must_convert_csv_dictreader_to_generator = true
must_record_pre_conversion_mem_ratio = true
must_record_post_conversion_mem_ratio = true
must_assert_post_better_than_pre = true
forbid_keeping_list_aliased_csv_reader = true
worked_example_lib_field_name = "worked_example_lib"
expected_worked_example_lib = "csv"
worked_example_api_field_name = "worked_example_api"
allowed_worked_example_api_values = ["csv.reader", "csv.DictReader"]
pre_conversion_mem_ratio_field_name = "pre_conversion_mem_ratio"
expected_pre_conversion_mem_ratio = "0.13x"
mem_ratio_must_improve_field_name = "mem_ratio_must_improve"
expected_mem_ratio_must_improve = true
still_list_aliased_failure_kind = "runtime_generator_csv_reader_still_list_aliased"
still_list_aliased_exit_code = 459
mem_did_not_move_failure_kind = "runtime_generator_csv_mem_did_not_move"
mem_did_not_move_exit_code = 460
must_distinguish_still_list_aliased_from_mem_did_not_move = true

# R4 — phase 2 follow-on libs enumerated, not implemented here.
[r4_phase_2_followons_enumerated_contract]
case = "phase_2_followon_libs_pinned_in_manifest_and_explicitly_marked_out_of_scope_for_this_issue"
requirement_id = "R4"
must_pin_phase_2_followon_set = true
must_mark_phase_2_followons_out_of_scope_for_this_issue = true
forbid_silently_dropping_followon_from_set = true
phase_2_followons_field_name = "phase_2_followons"
phase_2_followons = [
    "xml.etree.ElementTree.iter",
    "glob.iglob",
    "re.finditer",
    "itertools.chain.from_iterable",
    "xml.etree.iterparse",
    "os.walk",
    "mmap.find_iterator_mode",
]
followon_dropped_failure_kind = "runtime_generator_phase_2_followon_silently_dropped"
followon_dropped_exit_code = 461
followon_implemented_in_phase_1_failure_kind = "runtime_generator_phase_2_followon_implemented_in_phase_1"
followon_implemented_in_phase_1_exit_code = 462
must_distinguish_followon_dropped_from_followon_pulled_into_phase_1 = true

# R5 — design alternatives B and C refused.
[r5_design_alternatives_b_and_c_refused_contract]
case = "coroutine_based_and_iterator_trait_object_designs_refused_and_recorded_with_reason"
requirement_id = "R5"
must_refuse_coroutine_based_design = true
must_refuse_iterator_trait_object_design = true
must_record_refusal_reason_for_each_alternative = true
forbid_silently_switching_to_alternative_b_or_c = true
refused_designs_field_name = "refused_designs"
refused_designs = ["coroutine_based", "iterator_trait_object"]
coroutine_refusal_reason_field_name = "coroutine_refusal_reason"
expected_coroutine_refusal_reason = "heavy_runtime_not_aligned_with_force_typed_compilation"
iterator_trait_refusal_reason_field_name = "iterator_trait_refusal_reason"
expected_iterator_trait_refusal_reason = "box_dyn_allocation_per_generator_costs_dominate_short_iter_streams"
silently_switched_to_coroutine_failure_kind = "runtime_generator_silently_switched_to_coroutine_based_design"
silently_switched_to_coroutine_exit_code = 463
silently_switched_to_iterator_trait_failure_kind = "runtime_generator_silently_switched_to_iterator_trait_object_design"
silently_switched_to_iterator_trait_exit_code = 464
refusal_reason_missing_failure_kind = "runtime_generator_refusal_reason_missing"
refusal_reason_missing_exit_code = 465
must_distinguish_switch_to_coroutine_from_switch_to_iterator_trait_from_refusal_reason_missing = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "mbobject_variant",
    "generator_shape",
    "next_fn_field_name",
    "state_field_name",
    "dispatch_entrypoint",
    "dispatch_kind",
    "worked_example_lib",
    "worked_example_api",
    "pre_conversion_mem_ratio",
    "mem_ratio_must_improve",
    "phase_2_followons",
    "refused_designs",
    "coroutine_refusal_reason",
    "iterator_trait_refusal_reason",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "mbobject_generator_variant_added_with_closure_based_next_fn_and_box_dyn_any_state",
    "class_rs_mb_iter_next_dispatches_on_generator_variant_without_materializing_a_list",
    "csv_reader_converted_to_generator_and_mem_ratio_moves_vs_pre_conversion_baseline",
    "phase_2_followon_libs_pinned_in_manifest_and_explicitly_marked_out_of_scope_for_this_issue",
    "coroutine_based_and_iterator_trait_object_designs_refused_and_recorded_with_reason",
]

[out_of_scope]
# This issue ships only the runtime variant + class.rs dispatch +
# csv.reader retrofit. Phase 2 follow-on retrofits, eliminating
# MbObject::List entirely, and CPython baseline changes are out
# of scope.
phase_2_retrofits_of_other_stdlib_iterators = true
elimination_of_mbobject_list = true
cpython_baseline_change = true
non_iterator_stdlib_perf_work = true
c_extension_fast_paths = true
