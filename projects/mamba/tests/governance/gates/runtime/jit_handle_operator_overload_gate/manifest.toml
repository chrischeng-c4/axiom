# JIT handle+handle operator-overload gate — closes #2129.
# Surfaced by fractions Task #45 (commit afafc64a2, 2026-05-15).
#
# Today mamba's JIT lowers `int + int` to a native i64 add at
# codegen time. For stdlib types that ship via the
# integer-handle pattern (Fraction, Decimal, future Complex /
# Matrix / money), the operand <class 'int'> is actually a
# handle-table id, not an arithmetic int. The native add
# silently produces meaningless arithmetic on the handle ids
# and `class.rs::mb_call_method.__add__` is never reached.
# `a.__add__(b)` as explicit method-call syntax DOES work; the
# gap is purely the `+` operator codegen path.
#
# The gate is GREEN only when:
#
#   - R1: For an operand whose dynamic origin is a typed-handle
#     stdlib (Fraction, Decimal, etc.), `+`/`-`/`*`/`/` MUST NOT
#     fold to native i64. The JIT must route through dunder
#     dispatch (`class.rs::mb_call_method.__{add,sub,mul,truediv,floordiv,mod,pow,neg}__`).
#   - R2: A module-level-dispatcher workaround (e.g.
#     `fractions.fraction_add`) is recorded for each affected
#     lib as the in-flight tactical mitigation, with the lib
#     and prefix pinned so cross-runtime bench fixtures cannot
#     silently desync from the workaround.
#   - R3: The `hasattr`-conditional-binding JIT trap (sibling
#     fingerprint of #2099) is refused. Cross-runtime fixtures
#     must use `sys.implementation.name` branches instead of
#     `if hasattr(mod, "x"): x = mod.x`.
#   - R4: Three escalating Phase 3 fix paths are enumerated and
#     bounded: compile-time type inference, MbValue::TypedHandle
#     tag, wrapper-Instance approach. Implementation deferred to
#     mamba-stdlib-module section_type codegen under #1265 Phase
#     3; THIS issue ships only the gate (no runtime change).
#   - R5: Method-call-only handle libs (hashlib, hmac,
#     struct.Struct, queue.Queue, io.BytesIO, re.Pattern) are
#     explicitly recorded as NOT affected and out-of-scope, so
#     the gate doesn't widen to libs that do not have operator
#     overload.
#
# Out of scope: implementing the Phase 3 fix; rewriting #2099;
# changing CPython baselines; touching method-call-only handles.
#
# Shape locked by src/codegen/cranelift/tests/jit_handle_operator_overload.rs.

version = 1
fixture = "jit_handle_operator_overload_gate"
issue = 2129
profile = "conformance"
family = "jit_handle_operator_overload_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_jit_must_not_fold_handle_arith_to_native = true
must_cover_module_level_dispatcher_workaround_recorded = true
must_cover_hasattr_conditional_binding_refused = true
must_cover_phase_3_fix_paths_enumerated = true
must_cover_method_call_only_libs_explicitly_unaffected = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — JIT must not fold handle arithmetic to native i64.
[r1_jit_must_not_fold_handle_arith_to_native_contract]
case = "jit_routes_arithmetic_operators_for_typed_handle_operands_through_dunder_dispatch_not_native_i64"
requirement_id = "R1"
must_route_through_dunder_for_typed_handle_operands = true
must_cover_add_sub_mul_truediv_floordiv_mod_pow_neg = true
forbid_folding_to_native_i64_add_for_typed_handle_operands = true
forbid_silently_succeeding_with_wrong_arithmetic_result = true
affected_operators_field_name = "affected_operators"
affected_operators = ["__add__", "__sub__", "__mul__", "__truediv__", "__floordiv__", "__mod__", "__pow__", "__neg__"]
dispatch_path_field_name = "dispatch_path"
allowed_dispatch_path_values = ["dunder_via_class_rs_mb_call_method", "native_i64_fold", "silently_wrong"]
expected_dispatch_path = "dunder_via_class_rs_mb_call_method"
native_fold_used_failure_kind = "jit_handle_arith_native_fold_used_on_typed_handle"
native_fold_used_exit_code = 466
dunder_dispatch_missing_failure_kind = "jit_handle_arith_dunder_dispatch_missing"
dunder_dispatch_missing_exit_code = 467
silently_wrong_failure_kind = "jit_handle_arith_silently_wrong_result_emitted"
silently_wrong_exit_code = 468
must_distinguish_native_fold_from_dunder_missing_from_silently_wrong = true

# R2 — module-level-dispatcher workaround recorded per affected lib.
[r2_module_level_dispatcher_workaround_recorded_contract]
case = "module_level_dispatcher_workaround_recorded_with_lib_name_prefix_and_dispatch_fn_pattern_per_affected_lib"
requirement_id = "R2"
must_pin_dispatcher_prefix_per_lib = true
must_record_workaround_per_affected_lib = true
forbid_silently_dropping_workaround_record = true
affected_libs_field_name = "affected_libs"
affected_libs = ["fractions", "decimal"]
fractions_prefix_field_name = "fractions_dispatcher_prefix"
expected_fractions_prefix = "fraction_"
decimal_prefix_field_name = "decimal_dispatcher_prefix"
expected_decimal_prefix = "decimal_"
worked_example_call_field_name = "worked_example_call"
expected_worked_example_call = "fractions.fraction_add"
workaround_dropped_failure_kind = "jit_handle_arith_workaround_record_dropped"
workaround_dropped_exit_code = 469
prefix_mismatch_failure_kind = "jit_handle_arith_dispatcher_prefix_mismatch"
prefix_mismatch_exit_code = 470
must_distinguish_workaround_dropped_from_prefix_mismatch = true

# R3 — hasattr-conditional-binding JIT trap refused.
[r3_hasattr_conditional_binding_refused_contract]
case = "hasattr_conditional_binding_pattern_is_refused_for_cross_runtime_fixtures_use_sys_implementation_name_branch_instead"
requirement_id = "R3"
must_refuse_hasattr_conditional_binding_pattern = true
must_pin_sys_implementation_name_branch_as_correct_pattern = true
forbid_using_hasattr_conditional_binding_in_cross_runtime_fixtures = true
forbid_silently_dropping_hasattr_branch_due_to_jit_type_confusion = true
runtime_detection_pattern_field_name = "runtime_detection_pattern"
allowed_runtime_detection_pattern_values = ["sys_implementation_name_branch", "hasattr_conditional_binding"]
expected_runtime_detection_pattern = "sys_implementation_name_branch"
sibling_fingerprint_field_name = "sibling_jit_fingerprint"
expected_sibling_fingerprint = "issue_2099_jit_branch_drop_after_stdlib_call"
hasattr_pattern_used_failure_kind = "jit_handle_arith_hasattr_conditional_binding_used"
hasattr_pattern_used_exit_code = 471
jit_silently_dropped_branch_failure_kind = "jit_handle_arith_jit_silently_dropped_hasattr_branch"
jit_silently_dropped_branch_exit_code = 472
must_distinguish_pattern_used_from_jit_drop = true

# R4 — three Phase 3 fix paths enumerated, deferred under #1265.
[r4_phase_3_fix_paths_enumerated_contract]
case = "three_phase_3_fix_paths_enumerated_and_deferred_to_mamba_stdlib_module_section_type_codegen_under_1265"
requirement_id = "R4"
must_enumerate_three_phase_3_fix_paths = true
must_defer_implementation_to_1265_phase_3 = true
forbid_implementing_phase_3_fix_in_this_issue = true
forbid_silently_dropping_fix_path_from_enumeration = true
phase_3_fix_paths_field_name = "phase_3_fix_paths"
phase_3_fix_paths = [
    "compile_time_type_inference",
    "mbvalue_typed_handle_tag",
    "wrapper_instance_approach",
]
phase_3_owner_issue_field_name = "phase_3_owner_issue"
expected_phase_3_owner_issue = 1265
phase_3_implemented_in_this_issue_failure_kind = "jit_handle_arith_phase_3_implemented_in_this_issue"
phase_3_implemented_in_this_issue_exit_code = 473
fix_path_dropped_failure_kind = "jit_handle_arith_phase_3_fix_path_dropped"
fix_path_dropped_exit_code = 474
must_distinguish_phase_3_implemented_from_fix_path_dropped = true

# R5 — method-call-only handle libs explicitly NOT affected.
[r5_method_call_only_libs_explicitly_unaffected_contract]
case = "method_call_only_typed_handle_libs_are_recorded_as_not_affected_and_out_of_scope_for_this_gate"
requirement_id = "R5"
must_pin_unaffected_libs_set = true
must_mark_unaffected_libs_out_of_scope = true
forbid_widening_gate_to_method_call_only_libs = true
unaffected_libs_field_name = "unaffected_libs"
unaffected_libs = [
    "hashlib",
    "hmac",
    "struct.Struct",
    "queue.Queue",
    "io.BytesIO",
    "re.Pattern",
]
unaffected_lib_widened_into_gate_failure_kind = "jit_handle_arith_unaffected_lib_pulled_into_gate"
unaffected_lib_widened_into_gate_exit_code = 475
unaffected_lib_dropped_from_record_failure_kind = "jit_handle_arith_unaffected_lib_dropped_from_record"
unaffected_lib_dropped_from_record_exit_code = 476
must_distinguish_widened_into_gate_from_dropped_from_record = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "affected_operators",
    "dispatch_path",
    "affected_libs",
    "fractions_dispatcher_prefix",
    "decimal_dispatcher_prefix",
    "worked_example_call",
    "runtime_detection_pattern",
    "sibling_jit_fingerprint",
    "phase_3_fix_paths",
    "phase_3_owner_issue",
    "unaffected_libs",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "jit_routes_arithmetic_operators_for_typed_handle_operands_through_dunder_dispatch_not_native_i64",
    "module_level_dispatcher_workaround_recorded_with_lib_name_prefix_and_dispatch_fn_pattern_per_affected_lib",
    "hasattr_conditional_binding_pattern_is_refused_for_cross_runtime_fixtures_use_sys_implementation_name_branch_instead",
    "three_phase_3_fix_paths_enumerated_and_deferred_to_mamba_stdlib_module_section_type_codegen_under_1265",
    "method_call_only_typed_handle_libs_are_recorded_as_not_affected_and_out_of_scope_for_this_gate",
]

[out_of_scope]
# This gate locks acceptance for the operator-overload gap only.
# Phase 3 implementation, sibling-issue #2099, CPython baseline
# changes, and method-call-only handles are out of scope.
phase_3_implementation_of_typed_handle_tag_or_wrapper_instance = true
fix_of_issue_2099_jit_branch_drop = true
cpython_baseline_change = true
method_call_only_handle_libs = true
c_extension_fast_paths = true
