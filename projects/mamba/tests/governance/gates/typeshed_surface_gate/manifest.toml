# Typeshed-based per-module surface coverage fixture — closes #1397.
# Related: #1396 (CPython Lib/test denominator), #1265 (Goal 1).
#
# Pins the shape of the mamba surface-coverage runner. For each
# stdlib module mamba claims to implement, parse the typeshed
# `.pyi` stub for the canonical public-name set and compare it to
# the names mamba's introspection actually exposes:
#
#   - Surface coverage is reported per-module as `present/declared`.
#   - Coverage is aggregated by tier (T1/T2/T3) alongside the
#     Lib/test pass rate.
#   - "We have the module" does not mean "we cover its surface" —
#     partial implementations are reported as partial coverage,
#     not silently counted as full.
#
# Out of scope: behavioural correctness of each name (owned by
# #1396 / Lib/test), and stabilizing typeshed itself (third-party).
#
# Shape locked by src/meta_gates/tests/typeshed_surface_gate.rs.

version = 1
fixture = "typeshed_surface_gate"
issue = 1397
related_issues = [1396, 1265]
profile = "conformance"
family = "typeshed_surface_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_parse_typeshed_stub_for_each_module = true
must_introspect_mamba_module_for_each_module = true
must_report_per_module_attribute_coverage = true
must_aggregate_coverage_by_tier = true
must_be_offline = true
must_be_deterministic = true

# Acceptance: "Stub parser + introspection runner at
# projects/mamba/conformance/typeshed_surface.rs".
[runner_location_contract]
case = "runner_lives_under_projects_mamba_conformance"
runner_relative_path = "projects/mamba/conformance/typeshed_surface.rs"
runner_relative_path_field_name = "runner_relative_path"
must_pin_runner_relative_path = true
forbid_runner_outside_projects_mamba_conformance = true
runner_missing_failure_kind = "typeshed_surface_runner_missing"
runner_missing_exit_code = 247
runner_outside_project_failure_kind = "typeshed_surface_runner_outside_project"
runner_outside_project_exit_code = 248
must_distinguish_runner_missing_from_runner_outside_project = true

# Acceptance: "Per-module attribute coverage JSON".
[per_module_coverage_contract]
case = "per_module_attribute_coverage_json_is_emitted"
must_emit_per_module_coverage_json = true
must_include_module_name_in_each_record = true
must_include_declared_public_names_count_in_each_record = true
must_include_present_public_names_count_in_each_record = true
must_include_missing_public_names_list_in_each_record = true
must_include_tier_in_each_record = true
forbid_collapsing_module_records_into_aggregate_only = true
forbid_silently_dropping_modules_with_zero_coverage = true
required_per_module_record_fields = [
    "module_name",
    "tier",
    "declared_public_names_count",
    "present_public_names_count",
    "missing_public_names",
    "coverage_ratio",
]
coverage_record_field_name = "per_module_coverage"
per_module_record_missing_failure_kind = "typeshed_surface_per_module_record_missing"
per_module_record_missing_exit_code = 249
zero_coverage_module_dropped_failure_kind = "typeshed_surface_zero_coverage_module_dropped"
zero_coverage_module_dropped_exit_code = 250
must_distinguish_record_missing_from_zero_coverage_module_dropped = true

# Acceptance: "T1/T2/T3 aggregate surface coverage reported
# alongside Lib/test pass rate".
[tier_aggregation_contract]
case = "tier_aggregation_t1_t2_t3_alongside_lib_test_pass_rate"
must_report_t1_aggregate = true
must_report_t2_aggregate = true
must_report_t3_aggregate = true
must_report_alongside_lib_test_pass_rate = true
forbid_collapsing_tiers_into_overall_only = true
forbid_omitting_lib_test_pass_rate_neighbor = true
required_tier_names = ["t1", "t2", "t3"]
tier_field_name = "tier"
required_aggregate_fields = [
    "tier",
    "modules_total",
    "declared_public_names_total",
    "present_public_names_total",
    "coverage_ratio",
    "lib_test_pass_count",
    "lib_test_total_count",
]
aggregate_field_name = "tier_aggregate"
tier_aggregate_missing_failure_kind = "typeshed_surface_tier_aggregate_missing"
tier_aggregate_missing_exit_code = 251
lib_test_neighbor_missing_failure_kind = "typeshed_surface_lib_test_neighbor_missing"
lib_test_neighbor_missing_exit_code = 252
must_distinguish_tier_aggregate_missing_from_lib_test_neighbor_missing = true

# "Partial implementations must not silently count as full."
[partial_vs_full_contract]
case = "partial_module_must_not_be_counted_as_full"
must_compute_coverage_ratio_as_present_over_declared = true
must_treat_missing_public_names_as_uncovered = true
forbid_treating_module_present_as_full_coverage = true
forbid_implicit_coverage_inflation = true
coverage_ratio_field_name = "coverage_ratio"
coverage_inflation_failure_kind = "typeshed_surface_coverage_inflation"
coverage_inflation_exit_code = 253
module_present_but_partial_misreported_as_full_failure_kind = "typeshed_surface_module_partial_misreported_as_full"
module_present_but_partial_misreported_as_full_exit_code = 254
must_distinguish_coverage_inflation_from_partial_misreported_as_full = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "runner_relative_path",
    "per_module_coverage",
    "tier_aggregate",
    "coverage_ratio",
    "tier",
    "module_name",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "runner_lives_under_projects_mamba_conformance",
    "per_module_attribute_coverage_json_is_emitted",
    "tier_aggregation_t1_t2_t3_alongside_lib_test_pass_rate",
    "partial_module_must_not_be_counted_as_full",
]

[out_of_scope]
# Issue body: behavioural correctness is owned by #1396 (CPython
# Lib/test). Stabilizing typeshed itself is upstream-third-party.
behavioural_correctness_of_named_public_apis = true
typeshed_upstream_curation = true
runtime_implementation_of_stub_parser = true
runtime_implementation_of_introspection_runner = true
