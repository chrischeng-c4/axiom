# Class attribute lookup benchmark fixture — closes #2655.
# Parent: #2530 (performance benchmark cohort).
#
# Acceptance:
# - Benchmark has tier metadata and internal timing marker.
# - Wrong lookup result fails the benchmark.
# - Summary reports speedup separately from other runtime benchmarks.
#
# Out of scope (issue body): optimizing object layout.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/perf_class_attr_lookup_fixture_2655.rs).

version = 1
fixture = "perf_class_attr_lookup"
issue = 2655
parent_issue = 2530
profile = "performance"
family = "core_objects"
benchmark_id = "class_attr_lookup"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[workload]
description = "Repeatedly read instance attributes and call a method on a single small class."
class_kind = "plain_python_class"
class_attribute_count = 4
method_count = 1
n_iterations = 10000
must_use_single_instance = true
must_avoid_inlining_attribute_into_local = true
deterministic = true
random_seed = 0

# Acceptance: "Wrong lookup result fails the benchmark."
[checksum_contract]
must_validate_before_accepting_timing = true
checksum_kind = "accumulated_attribute_sum"
checksum_field_name = "checksum"
expected_checksum_field_name = "expected_checksum"
on_mismatch = "fail"
on_mismatch_exit_code = 1
on_mismatch_must_block_speedup_record = true
diagnostic_must_name_benchmark = "class_attr_lookup"

# Acceptance: "Benchmark has tier metadata and internal timing marker."
[timing_contract]
tier = "core"
timing_mode = "wall_clock"
allowed_timing_modes = ["wall_clock", "cpu_time"]
warmup_iterations = 1
measured_iterations = 5
report_aggregate = "median"
must_emit_internal_timing_marker = true
internal_timing_marker_field_name = "internal_elapsed_seconds"
must_report_per_iteration = true

# Acceptance: "Summary reports speedup separately from other runtime
# benchmarks."
[performance_summary_contract]
must_appear_in_machine_readable_summary = true
summary_record_field_name = "speedup"
baseline_label = "cpython"
candidate_label = "mamba"
must_be_keyed_by_benchmark_id = true
must_not_pool_with_other_benchmarks = true
required_record_keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "checksum",
    "expected_checksum",
    "baseline_seconds",
    "candidate_seconds",
    "internal_elapsed_seconds",
    "speedup",
    "outcome",
]
outcome_values = ["pass", "fail", "skip"]

[runner_contract]
keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "n_iterations",
    "checksum",
    "expected_checksum",
    "internal_elapsed_seconds",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "skip"]

[out_of_scope]
# Issue: "Out of scope: optimizing object layout."
object_layout_optimization = true
