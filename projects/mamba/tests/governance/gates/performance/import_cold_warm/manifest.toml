# Import cold+warm benchmark fixture — closes #2660.
# Parent: #2530 (performance benchmark cohort).
#
# Acceptance:
# - Benchmark output validates imported sentinel values.
# - Summary distinguishes cold import from warm import.
# - Fixture declares whether startup cost is included.
#
# Out of scope (issue body): optimizing import system.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/perf_import_cold_warm_fixture_2660.rs).

version = 1
fixture = "perf_import_cold_warm"
issue = 2660
parent_issue = 2530
profile = "performance"
family = "core_import"
benchmark_id = "import_cold_warm"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[workload]
description = "Import one tiny local module and one stdlib module; check sentinels."
local_module_name = "import_cold_warm_target"
stdlib_module_name = "json"
local_module_sentinel_name = "LOCAL_SENTINEL"
local_module_sentinel_value = 0xC01D
stdlib_sentinel_attribute = "dumps"
must_invalidate_module_cache_between_cold_runs = true
deterministic = true
random_seed = 0

# Acceptance: "Benchmark output validates imported sentinel values."
[checksum_contract]
must_validate_before_accepting_timing = true
must_validate_local_sentinel_value = true
must_validate_stdlib_sentinel_callable = true
checksum_field_name = "checksum"
expected_checksum_field_name = "expected_checksum"
local_sentinel_field_name = "local_sentinel"
expected_local_sentinel_field_name = "expected_local_sentinel"
on_mismatch = "fail"
on_mismatch_exit_code = 1
on_mismatch_must_block_speedup_record = true
diagnostic_must_name_benchmark = "import_cold_warm"

# Acceptance: "Fixture declares whether startup cost is included."
[timing_contract]
tier = "core"
timing_mode = "wall_clock"
allowed_timing_modes = ["wall_clock", "cpu_time"]
startup_cost_included = true
must_declare_startup_cost_included = true
warmup_iterations = 0
measured_iterations = 5
report_aggregate = "median"
must_report_per_iteration = true
must_distinguish_cold_and_warm_timings = true

# Acceptance: "Summary distinguishes cold import from warm import."
[performance_summary_contract]
must_appear_in_machine_readable_summary = true
must_emit_cold_and_warm_speedups_separately = true
cold_speedup_record_field_name = "cold_speedup"
warm_speedup_record_field_name = "warm_speedup"
cold_label = "cold"
warm_label = "warm"
allowed_phase_labels = ["cold", "warm"]
baseline_label = "cpython"
candidate_label = "mamba"
must_be_keyed_by_benchmark_id_and_phase = true
required_record_keys = [
    "benchmark_id",
    "phase",
    "tier",
    "timing_mode",
    "startup_cost_included",
    "checksum",
    "expected_checksum",
    "local_sentinel",
    "expected_local_sentinel",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
]
outcome_values = ["pass", "fail", "skip"]

[runner_contract]
keys = [
    "benchmark_id",
    "phase",
    "tier",
    "timing_mode",
    "startup_cost_included",
    "checksum",
    "expected_checksum",
    "local_sentinel",
    "expected_local_sentinel",
    "cold_speedup",
    "warm_speedup",
    "baseline_seconds",
    "candidate_seconds",
    "outcome",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "skip"]

[out_of_scope]
# Issue: "Out of scope: optimizing import system."
import_system_optimization = true
