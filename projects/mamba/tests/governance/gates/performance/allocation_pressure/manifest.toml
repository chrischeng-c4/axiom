# Allocation pressure benchmark fixture — closes #2661.
# Parent: #2530 (performance benchmark cohort).
#
# Acceptance:
# - Wrong aggregate result fails the benchmark.
# - Benchmark reports both speedup and optional memory signal if
#   available.
# - Fixture declares tier and timing mode.
#
# Out of scope (issue body): allocator implementation changes.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/perf_allocation_pressure_fixture_2661.rs).

version = 1
fixture = "perf_allocation_pressure"
issue = 2661
parent_issue = 2530
profile = "performance"
family = "core_memory"
benchmark_id = "allocation_pressure"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[workload]
description = "Allocate many small short-lived lists, dicts, tuples, and objects in a tight loop."
allocation_kinds = ["list", "dict", "tuple", "object"]
n_iterations = 10000
per_iteration_allocations = 4
must_not_retain_allocations_across_iterations = true
must_aggregate_into_checksum_only = true
deterministic = true
random_seed = 0

# Acceptance: "Wrong aggregate result fails the benchmark."
[checksum_contract]
must_validate_before_accepting_timing = true
checksum_kind = "aggregate_field_sum"
checksum_field_name = "aggregate_checksum"
expected_checksum_field_name = "expected_aggregate_checksum"
on_mismatch = "fail"
on_mismatch_exit_code = 1
on_mismatch_must_block_speedup_record = true
diagnostic_must_name_benchmark = "allocation_pressure"

# Acceptance: "Fixture declares tier and timing mode."
[timing_contract]
tier = "core"
timing_mode = "wall_clock"
allowed_timing_modes = ["wall_clock", "cpu_time"]
warmup_iterations = 1
measured_iterations = 5
report_aggregate = "median"
must_report_per_iteration = true

# Acceptance: "Benchmark reports both speedup and optional memory signal if
# available."
[performance_summary_contract]
must_appear_in_machine_readable_summary = true
summary_record_field_name = "speedup"
baseline_label = "cpython"
candidate_label = "mamba"
must_be_keyed_by_benchmark_id = true
must_emit_optional_memory_signal_when_available = true
memory_signal_field_name = "memory_signal"
memory_signal_required = false
memory_signal_unit = "bytes"
allowed_memory_signal_states = ["measured", "unavailable"]
required_record_keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "aggregate_checksum",
    "expected_aggregate_checksum",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "memory_signal",
    "memory_signal_state",
    "outcome",
]
outcome_values = ["pass", "fail", "skip"]

[runner_contract]
keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "n_iterations",
    "per_iteration_allocations",
    "aggregate_checksum",
    "expected_aggregate_checksum",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "memory_signal",
    "memory_signal_state",
    "outcome",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "skip"]

[out_of_scope]
# Issue: "Out of scope: allocator implementation changes."
allocator_implementation_changes = true
