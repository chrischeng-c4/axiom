# Generator iteration benchmark fixture — closes #2662.
# Parent: #2530 (performance benchmark cohort).
#
# Acceptance:
# - Wrong generator output fails the benchmark.
# - Benchmark is categorized separately because generator runtime may
#   have dedicated work.
# - Fixture declares tier and timing mode.
#
# Out of scope (issue body): generator optimization.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/perf_generator_iteration_fixture_2662.rs).

version = 1
fixture = "perf_generator_iteration"
issue = 2662
parent_issue = 2530
profile = "performance"
family = "core_generator"
benchmark_id = "generator_iteration"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[workload]
description = "Create a deterministic integer generator and consume it, summing yielded values."
generator_kind = "yield_integers"
n_yields = 100000
start_value = 0
step = 1
must_consume_fully = true
must_aggregate_yielded_values_into_checksum = true
deterministic = true
random_seed = 0

# Acceptance: "Wrong generator output fails the benchmark."
[checksum_contract]
must_validate_before_accepting_timing = true
checksum_kind = "sum_of_yielded_values"
checksum_field_name = "yielded_checksum"
expected_checksum_field_name = "expected_yielded_checksum"
must_validate_yield_count = true
yield_count_field_name = "yield_count"
expected_yield_count_field_name = "expected_yield_count"
on_mismatch = "fail"
on_mismatch_exit_code = 1
on_mismatch_must_block_speedup_record = true
diagnostic_must_name_benchmark = "generator_iteration"

# Acceptance: "Fixture declares tier and timing mode."
[timing_contract]
tier = "core"
timing_mode = "wall_clock"
allowed_timing_modes = ["wall_clock", "cpu_time"]
warmup_iterations = 1
measured_iterations = 5
report_aggregate = "median"
must_report_per_iteration = true

# Acceptance: "Benchmark is categorized separately because generator
# runtime may have dedicated work."
[performance_summary_contract]
must_appear_in_machine_readable_summary = true
summary_record_field_name = "speedup"
baseline_label = "cpython"
candidate_label = "mamba"
must_be_keyed_by_benchmark_id = true
must_categorize_separately = true
benchmark_category = "generator"
category_field_name = "category"
must_not_pool_with_other_benchmarks = true
allowed_categories = [
    "dict",
    "class",
    "function",
    "string",
    "exception",
    "list",
    "import",
    "allocator",
    "generator",
    "regex",
    "async",
    "json",
]
required_record_keys = [
    "benchmark_id",
    "category",
    "tier",
    "timing_mode",
    "yielded_checksum",
    "expected_yielded_checksum",
    "yield_count",
    "expected_yield_count",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
]
outcome_values = ["pass", "fail", "skip"]

[runner_contract]
keys = [
    "benchmark_id",
    "category",
    "tier",
    "timing_mode",
    "n_yields",
    "yielded_checksum",
    "expected_yielded_checksum",
    "yield_count",
    "expected_yield_count",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "skip"]

[out_of_scope]
# Issue: "Out of scope: generator optimization."
generator_optimization = true
