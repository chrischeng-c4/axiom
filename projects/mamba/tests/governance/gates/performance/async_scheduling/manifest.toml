# Async scheduling benchmark fixture — closes #2664.
# Parent: #2530 (performance benchmark cohort).
#
# Acceptance:
# - Fixture does not depend on real-time sleep duration.
# - Unsupported async behavior is visible and linked to a blocker.
# - Passing path reports speedup against CPython 3.12.
#
# Out of scope (issue body): async runtime optimization.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/perf_async_scheduling_fixture_2664.rs).

version = 1
fixture = "perf_async_scheduling"
issue = 2664
parent_issue = 2530
profile = "performance"
family = "core_async"
benchmark_id = "async_scheduling"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[workload]
description = "Schedule and await many tiny coroutines that yield to the loop without using asyncio.sleep with a nonzero delay."
n_coroutines = 10000
coroutine_kind = "yields_and_returns_integer"
must_use_event_loop = true
forbid_asyncio_sleep_with_nonzero_delay = true
forbid_time_sleep = true
forbid_real_time_dependency = true
allowed_yield_primitive = "asyncio.sleep(0)"
deterministic = true
random_seed = 0

# Validation: result must be checked before timing.
[checksum_contract]
must_validate_before_accepting_timing = true
checksum_kind = "sum_of_coroutine_results"
checksum_field_name = "result_checksum"
expected_checksum_field_name = "expected_result_checksum"
must_validate_completion_count = true
completion_count_field_name = "completion_count"
expected_completion_count_field_name = "expected_completion_count"
on_mismatch = "fail"
on_mismatch_exit_code = 1
on_mismatch_must_block_speedup_record = true
diagnostic_must_name_benchmark = "async_scheduling"

# Acceptance: "Fixture does not depend on real-time sleep duration."
[timing_contract]
tier = "core"
timing_mode = "wall_clock"
allowed_timing_modes = ["wall_clock", "cpu_time"]
must_not_depend_on_real_time_sleep_duration = true
forbid_wall_clock_sleep_in_workload = true
warmup_iterations = 1
measured_iterations = 5
report_aggregate = "median"
must_report_per_iteration = true

# Acceptance: "Passing path reports speedup against CPython 3.12."
[performance_summary_contract]
must_appear_in_machine_readable_summary = true
summary_record_field_name = "speedup"
baseline_label = "cpython"
baseline_version = "3.12"
must_pin_baseline_version = true
candidate_label = "mamba"
must_be_keyed_by_benchmark_id = true
must_only_record_speedup_on_pass = true
required_record_keys = [
    "benchmark_id",
    "status",
    "tier",
    "timing_mode",
    "result_checksum",
    "expected_result_checksum",
    "completion_count",
    "expected_completion_count",
    "baseline_label",
    "baseline_version",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
]
outcome_values = ["pass", "fail", "skip"]

# Acceptance: "Unsupported async behavior is visible and linked to a
# blocker."
[status_contract]
allowed_status_values = ["pass", "xfail", "blocker"]
must_link_blocker_to_issue_when_status_is_blocker = true
blocker_issue_field_name = "blocker_issue"
xfail_reason_field_name = "xfail_reason"
unsupported_async_behavior_must_be_visible = true
status_field_name = "status"
must_appear_in_summary = true

[runner_contract]
keys = [
    "benchmark_id",
    "status",
    "tier",
    "timing_mode",
    "n_coroutines",
    "result_checksum",
    "expected_result_checksum",
    "completion_count",
    "expected_completion_count",
    "baseline_label",
    "baseline_version",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
    "blocker_issue",
    "xfail_reason",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "skip"]

[out_of_scope]
# Issue: "Out of scope: async runtime optimization."
async_runtime_optimization = true
