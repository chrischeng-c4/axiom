# Exception throw+catch benchmark fixture — closes #2658.
# Parent: #2530 (performance benchmark cohort).
#
# Acceptance:
# - Benchmark fails if exception control flow is wrong.
# - Speedup is reported separately because exceptions may be a
#   lower-priority tier.
# - Fixture declares tier and timing mode.
#
# Out of scope (issue body): exception runtime optimization.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/perf_exception_throw_catch_fixture_2658.rs).

version = 1
fixture = "perf_exception_throw_catch"
issue = 2658
parent_issue = 2530
profile = "performance"
family = "core_control_flow"
benchmark_id = "exception_throw_catch"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[workload]
description = "Raise and catch a local exception at fixed intervals inside a tight loop."
exception_kind = "local_custom"
raise_interval = 8
n_iterations = 10000
must_count_raises = true
must_count_catches = true
deterministic = true
random_seed = 0

# Acceptance: "Benchmark fails if exception control flow is wrong."
[checksum_contract]
must_validate_before_accepting_timing = true
checksum_kind = "raise_count_and_catch_count"
checksum_field_name = "checksum"
expected_checksum_field_name = "expected_checksum"
raise_count_field_name = "raise_count"
catch_count_field_name = "catch_count"
expected_raise_count_field_name = "expected_raise_count"
expected_catch_count_field_name = "expected_catch_count"
must_assert_raise_count_equals_catch_count = true
must_assert_counts_match_interval_schedule = true
on_mismatch = "fail"
on_mismatch_exit_code = 1
on_mismatch_must_block_speedup_record = true
diagnostic_must_name_benchmark = "exception_throw_catch"

# Acceptance: "Fixture declares tier and timing mode."
[timing_contract]
tier = "extended"
timing_mode = "wall_clock"
allowed_timing_modes = ["wall_clock", "cpu_time"]
warmup_iterations = 1
measured_iterations = 5
report_aggregate = "median"
must_report_per_iteration = true

# Acceptance: "Speedup is reported separately because exceptions may be a
# lower-priority tier."
[performance_summary_contract]
must_appear_in_machine_readable_summary = true
summary_record_field_name = "speedup"
baseline_label = "cpython"
candidate_label = "mamba"
must_be_keyed_by_benchmark_id = true
must_not_pool_with_other_benchmarks = true
must_emit_tier_in_summary = true
tier_field_name = "tier"
required_record_keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "checksum",
    "expected_checksum",
    "raise_count",
    "catch_count",
    "expected_raise_count",
    "expected_catch_count",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
]
outcome_values = ["pass", "fail", "skip"]

[runner_contract]
keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "n_iterations",
    "raise_interval",
    "checksum",
    "expected_checksum",
    "raise_count",
    "catch_count",
    "expected_raise_count",
    "expected_catch_count",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "skip"]

[out_of_scope]
# Issue: "Out of scope: exception runtime optimization."
exception_runtime_optimization = true
