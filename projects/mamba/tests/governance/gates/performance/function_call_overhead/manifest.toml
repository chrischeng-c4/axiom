# Function-call overhead benchmark fixture — closes #2656.
# Parent: #2530 (performance benchmark cohort).
#
# Acceptance:
# - Benchmark reports speedup against CPython 3.12.
# - Wrong computed result fails before timing is accepted.
# - Fixture declares its tier and timing mode.
#
# Out of scope (issue body): optimizing call dispatch.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/perf_function_call_overhead_fixture_2656.rs).

version = 1
fixture = "perf_function_call_overhead"
issue = 2656
parent_issue = 2530
profile = "performance"
family = "core_call"
benchmark_id = "function_call_overhead"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[workload]
description = "Call a tiny pure-Python function in a tight loop."
function_kind = "pure_python"
function_signature = "def f(x: int) -> int"
function_body_summary = "returns x + 1"
must_be_pure = true
must_not_allocate_per_call = true
n_iterations = 100000
deterministic = true
random_seed = 0

# Acceptance: "Wrong computed result fails before timing is accepted."
[checksum_contract]
must_validate_before_accepting_timing = true
checksum_kind = "accumulated_return_sum"
checksum_field_name = "checksum"
expected_checksum_field_name = "expected_checksum"
on_mismatch = "fail"
on_mismatch_exit_code = 1
on_mismatch_must_block_speedup_record = true
diagnostic_must_name_benchmark = "function_call_overhead"

# Acceptance: "Fixture declares its tier and timing mode."
[timing_contract]
tier = "core"
timing_mode = "wall_clock"
allowed_timing_modes = ["wall_clock", "cpu_time"]
warmup_iterations = 1
measured_iterations = 5
report_aggregate = "median"
must_report_per_iteration = true

# Acceptance: "Benchmark reports speedup against CPython 3.12."
[performance_summary_contract]
must_appear_in_machine_readable_summary = true
summary_record_field_name = "speedup"
baseline_label = "cpython"
baseline_version = "3.12"
must_pin_baseline_version = true
candidate_label = "mamba"
must_be_keyed_by_benchmark_id = true
required_record_keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "checksum",
    "expected_checksum",
    "baseline_label",
    "baseline_version",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
]
outcome_values = ["pass", "fail", "skip"]

[runner_contract]
keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "n_iterations",
    "checksum",
    "expected_checksum",
    "baseline_label",
    "baseline_version",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "skip"]

[out_of_scope]
# Issue: "Out of scope: optimizing call dispatch."
call_dispatch_optimization = true
