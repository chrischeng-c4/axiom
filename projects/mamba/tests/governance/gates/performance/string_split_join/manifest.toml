# String split+join benchmark fixture — closes #2657.
# Parent: #2530 (performance benchmark cohort).
#
# Acceptance:
# - Wrong split or join result fails the benchmark.
# - Speedup is included in the 10x suite candidate set.
# - Fixture declares tier and timing mode.
#
# Out of scope (issue body): string allocator implementation work.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/perf_string_split_join_fixture_2657.rs).

version = 1
fixture = "perf_string_split_join"
issue = 2657
parent_issue = 2530
profile = "performance"
family = "core_strings"
benchmark_id = "string_split_join"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[workload]
description = "Split a fixed string by separator, then join the parts and compare."
input_kind = "fixed_string"
input_size_bytes = 1024
separator = ","
n_iterations = 10000
must_use_same_input_each_iteration = true
deterministic = true
random_seed = 0

# Acceptance: "Wrong split or join result fails the benchmark."
[checksum_contract]
must_validate_before_accepting_timing = true
must_validate_output_length = true
must_validate_content_checksum = true
checksum_field_name = "checksum"
expected_checksum_field_name = "expected_checksum"
length_field_name = "joined_length"
expected_length_field_name = "expected_joined_length"
on_mismatch = "fail"
on_mismatch_exit_code = 1
on_mismatch_must_block_speedup_record = true
diagnostic_must_name_benchmark = "string_split_join"

# Acceptance: "Fixture declares tier and timing mode."
[timing_contract]
tier = "core"
timing_mode = "wall_clock"
allowed_timing_modes = ["wall_clock", "cpu_time"]
warmup_iterations = 1
measured_iterations = 5
report_aggregate = "median"
must_report_per_iteration = true

# Acceptance: "Speedup is included in the 10x suite candidate set."
[performance_summary_contract]
must_appear_in_machine_readable_summary = true
summary_record_field_name = "speedup"
baseline_label = "cpython"
candidate_label = "mamba"
ten_x_suite_candidate = true
ten_x_suite_candidate_set_field_name = "ten_x_candidates"
must_be_keyed_by_benchmark_id = true
required_record_keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "checksum",
    "expected_checksum",
    "joined_length",
    "expected_joined_length",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "ten_x_suite_candidate",
    "outcome",
]
outcome_values = ["pass", "fail", "skip"]

[runner_contract]
keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "n_iterations",
    "checksum",
    "expected_checksum",
    "joined_length",
    "expected_joined_length",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "ten_x_suite_candidate",
    "outcome",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "skip"]

[out_of_scope]
# Issue: "Out of scope: string allocator implementation work."
string_allocator_implementation = true
