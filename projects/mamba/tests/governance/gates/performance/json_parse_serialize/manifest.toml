# JSON parse/serialize benchmark fixture — closes #2665.
# Parent: #2530 (performance benchmark cohort).
#
# Acceptance:
# - Wrong JSON behavior fails the benchmark.
# - Speedup is reported against CPython 3.12.
# - Fixture declares tier and timing mode.
#
# Out of scope (issue body): full JSON microbenchmark suite.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/perf_json_parse_serialize_fixture_2665.rs).

version = 1
fixture = "perf_json_parse_serialize"
issue = 2665
parent_issue = 2530
profile = "performance"
family = "core_json"
benchmark_id = "json_parse_serialize"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[workload]
description = "Round-trip a fixed JSON payload through json.loads and json.dumps and verify field-level shape."
payload_kind = "embedded_fixed_json"
payload_byte_size = 2048
payload_must_be_fixed = true
payload_must_be_deterministic = true
must_exercise_json_loads = true
must_exercise_json_dumps = true
n_iterations = 1000
deterministic = true
random_seed = 0

# Acceptance: "Wrong JSON behavior fails the benchmark."
[checksum_contract]
must_validate_before_accepting_timing = true
must_validate_parsed_field_set = true
must_validate_parsed_field_values = true
must_validate_serialized_shape = true
must_validate_round_trip_equality = true
parsed_field_set_field_name = "parsed_field_set"
expected_parsed_field_set_field_name = "expected_parsed_field_set"
serialized_shape_field_name = "serialized_shape"
expected_serialized_shape_field_name = "expected_serialized_shape"
on_mismatch = "fail"
on_mismatch_exit_code = 1
on_mismatch_must_block_speedup_record = true
diagnostic_must_name_benchmark = "json_parse_serialize"

# Acceptance: "Fixture declares tier and timing mode."
[timing_contract]
tier = "core"
timing_mode = "wall_clock"
allowed_timing_modes = ["wall_clock", "cpu_time"]
must_separate_loads_and_dumps_timings = true
loads_timing_field_name = "loads_seconds"
dumps_timing_field_name = "dumps_seconds"
warmup_iterations = 1
measured_iterations = 5
report_aggregate = "median"
must_report_per_iteration = true

# Acceptance: "Speedup is reported against CPython 3.12."
[performance_summary_contract]
must_appear_in_machine_readable_summary = true
summary_record_field_name = "speedup"
baseline_label = "cpython"
baseline_version = "3.12"
must_pin_baseline_version = true
candidate_label = "mamba"
must_be_keyed_by_benchmark_id = true
must_report_loads_and_dumps_speedups_separately = true
loads_speedup_field_name = "loads_speedup"
dumps_speedup_field_name = "dumps_speedup"
required_record_keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "parsed_field_set",
    "expected_parsed_field_set",
    "serialized_shape",
    "expected_serialized_shape",
    "baseline_label",
    "baseline_version",
    "loads_seconds",
    "dumps_seconds",
    "loads_speedup",
    "dumps_speedup",
    "speedup",
    "outcome",
]
outcome_values = ["pass", "fail", "skip"]

[runner_contract]
keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "n_iterations",
    "parsed_field_set",
    "expected_parsed_field_set",
    "serialized_shape",
    "expected_serialized_shape",
    "baseline_label",
    "baseline_version",
    "loads_seconds",
    "dumps_seconds",
    "loads_speedup",
    "dumps_speedup",
    "speedup",
    "outcome",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "skip"]

[out_of_scope]
# Issue: "Out of scope: full JSON microbenchmark suite."
full_json_microbenchmark_suite = true
