# Regex findall benchmark fixture — closes #2663.
# Parent: #2530 (performance benchmark cohort).
#
# Acceptance:
# - Wrong match result fails before speedup is accepted.
# - Benchmark appears in machine-readable summary.
# - Fixture declares tier and timing mode.
#
# Out of scope (issue body): regex engine optimization.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/perf_regex_findall_fixture_2663.rs).

version = 1
fixture = "perf_regex_findall"
issue = 2663
parent_issue = 2530
profile = "performance"
family = "core_regex"
benchmark_id = "regex_findall"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[workload]
description = "Run re.findall over a deterministic small realistic text with single-group and multi-group patterns."
text_source_kind = "embedded_string"
text_byte_size = 4096
must_be_realistic_small_text = true
patterns = [
    { name = "single_group_word", pattern = "\\w+", group_count = 1 },
    { name = "multi_group_kv", pattern = "(\\w+)=(\\d+)", group_count = 2 },
]
must_exercise_single_group = true
must_exercise_multi_group = true
n_iterations = 1000
deterministic = true
random_seed = 0

# Acceptance: "Wrong match result fails before speedup is accepted."
[checksum_contract]
must_validate_before_accepting_timing = true
must_validate_match_count = true
match_count_field_name = "match_count"
expected_match_count_field_name = "expected_match_count"
must_validate_match_checksum = true
checksum_kind = "sum_of_match_lengths"
checksum_field_name = "match_checksum"
expected_checksum_field_name = "expected_match_checksum"
on_mismatch = "fail"
on_mismatch_exit_code = 1
on_mismatch_must_block_speedup_record = true
on_mismatch_must_fail_before_speedup_accepted = true
diagnostic_must_name_benchmark = "regex_findall"

# Acceptance: "Fixture declares tier and timing mode."
[timing_contract]
tier = "core"
timing_mode = "wall_clock"
allowed_timing_modes = ["wall_clock", "cpu_time"]
warmup_iterations = 1
measured_iterations = 5
report_aggregate = "median"
must_report_per_iteration = true

# Acceptance: "Benchmark appears in machine-readable summary."
[performance_summary_contract]
must_appear_in_machine_readable_summary = true
summary_record_field_name = "speedup"
summary_record_format = "json"
must_be_machine_readable = true
machine_readable_format_field_name = "summary_format"
baseline_label = "cpython"
candidate_label = "mamba"
must_be_keyed_by_benchmark_id = true
must_report_per_pattern = true
pattern_records_field_name = "per_pattern"
required_record_keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "match_count",
    "expected_match_count",
    "match_checksum",
    "expected_match_checksum",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
]
outcome_values = ["pass", "fail", "skip"]

[runner_contract]
keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "n_iterations",
    "match_count",
    "expected_match_count",
    "match_checksum",
    "expected_match_checksum",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "skip"]

[out_of_scope]
# Issue: "Out of scope: regex engine optimization."
regex_engine_optimization = true
