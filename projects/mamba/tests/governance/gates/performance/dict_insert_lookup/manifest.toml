# Dict insert+lookup benchmark fixture — closes #2654.
# Parent: #2530 (performance benchmark cohort).
#
# Acceptance:
# - Benchmark fails on wrong checksum.
# - Speedup appears in the machine-readable performance summary.
# - Fixture declares tier and timing mode.
#
# Out of scope (issue body): hash-table implementation changes.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/perf_dict_insert_lookup_fixture_2654.rs).

version = 1
fixture = "perf_dict_insert_lookup"
issue = 2654
parent_issue = 2530
profile = "performance"
family = "core_collections"
benchmark_id = "dict_insert_lookup"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[workload]
description = "Insert N small string keys into a dict then read them back."
key_kind = "string"
key_size_bytes = 16
value_kind = "int"
n_keys = 10000
deterministic = true
random_seed = 0
must_pre_generate_keys = true
must_avoid_intern_only_keys = true

[checksum_contract]
must_validate_before_accepting_timing = true
checksum_kind = "sum_of_values"
checksum_field_name = "checksum"
expected_checksum_field_name = "expected_checksum"
on_mismatch = "fail"
on_mismatch_exit_code = 1
diagnostic_must_name_benchmark = "dict_insert_lookup"

[timing_contract]
tier = "core"
timing_mode = "wall_clock"
allowed_timing_modes = ["wall_clock", "cpu_time"]
warmup_iterations = 1
measured_iterations = 5
report_aggregate = "median"
must_disable_jit_warm_caches_between_iterations = false
must_report_per_iteration = true

[performance_summary_contract]
must_appear_in_machine_readable_summary = true
summary_record_field_name = "speedup"
baseline_label = "cpython"
candidate_label = "mamba"
required_record_keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "checksum",
    "expected_checksum",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
]
outcome_values = ["pass", "fail", "skip"]

[runner_contract]
keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "n_keys",
    "checksum",
    "expected_checksum",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "skip"]

[out_of_scope]
# Issue: "Out of scope: hash-table implementation changes."
hash_table_implementation_changes = true
