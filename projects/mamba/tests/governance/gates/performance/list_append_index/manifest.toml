# List append+index benchmark fixture — closes #2659.
# Parent: #2530 (performance benchmark cohort).
#
# Acceptance:
# - Benchmark fails on wrong list contents or checksum.
# - Benchmark reports speedup against CPython 3.12.
# - Fixture declares its tier and timing mode.
#
# Out of scope (issue body): list representation optimization.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/perf_list_append_index_fixture_2659.rs).

version = 1
fixture = "perf_list_append_index"
issue = 2659
parent_issue = 2530
profile = "performance"
family = "core_collections"
benchmark_id = "list_append_index"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[workload]
description = "Append integers to a list then read selected indexes back."
element_kind = "int"
n_appends = 10000
n_indexed_reads = 1000
index_selection_kind = "deterministic_stride"
index_stride = 7
deterministic = true
random_seed = 0
must_pre_compute_index_set = true

# Acceptance: "Benchmark fails on wrong list contents or checksum."
[checksum_contract]
must_validate_before_accepting_timing = true
must_validate_final_list_length = true
must_validate_indexed_read_checksum = true
checksum_field_name = "checksum"
expected_checksum_field_name = "expected_checksum"
final_length_field_name = "final_length"
expected_final_length_field_name = "expected_final_length"
on_mismatch = "fail"
on_mismatch_exit_code = 1
on_mismatch_must_block_speedup_record = true
diagnostic_must_name_benchmark = "list_append_index"

# Acceptance: "Fixture declares its tier and timing mode."
[timing_contract]
tier = "core"
timing_mode = "wall_clock"
allowed_timing_modes = ["wall_clock", "cpu_time"]
warmup_iterations = 1
measured_iterations = 5
report_aggregate = "median"
must_report_per_iteration = true

# Acceptance: "Benchmark reports speedup against CPython 3.12."
[performance_summary_contract]
must_appear_in_machine_readable_summary = true
summary_record_field_name = "speedup"
baseline_label = "cpython"
baseline_version = "3.12"
must_pin_baseline_version = true
candidate_label = "mamba"
must_be_keyed_by_benchmark_id = true
required_record_keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "checksum",
    "expected_checksum",
    "final_length",
    "expected_final_length",
    "baseline_label",
    "baseline_version",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
]
outcome_values = ["pass", "fail", "skip"]

[runner_contract]
keys = [
    "benchmark_id",
    "tier",
    "timing_mode",
    "n_appends",
    "n_indexed_reads",
    "checksum",
    "expected_checksum",
    "final_length",
    "expected_final_length",
    "baseline_label",
    "baseline_version",
    "baseline_seconds",
    "candidate_seconds",
    "speedup",
    "outcome",
    "diagnostic_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "skip"]

[out_of_scope]
# Issue: "Out of scope: list representation optimization."
list_representation_optimization = true
