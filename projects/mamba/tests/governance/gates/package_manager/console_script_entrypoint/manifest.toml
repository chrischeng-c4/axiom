# Console script entrypoint fixture — closes #2593.
# Parent: #2532 (uv-like package manager offline E2E gate).
#
# Pins the shape of the offline test that proves the package manager
# installs a wheel exposing one [project.scripts] console_scripts
# entry, and that the project's `run` command can invoke the
# generated entry point and observe a deterministic sentinel on
# stdout without touching the user's PATH:
#
#   - Entry point executable is created or made invokable by the run
#     command.
#   - Command output matches the fixture sentinel.
#   - Test avoids user-level PATH mutation.
#
# Out of scope (issue body): shell completion and script shims for
# every platform.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/console_script_entrypoint_fixture_2593.rs).

version = 1
fixture = "console_script_entrypoint"
issue = 2593
parent_issue = 2532
profile = "package_manager"
family = "console_script_entrypoint"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[index]
kind = "frozen_local_simple_index"
local_simple_index_fixture_issue = 2585
must_be_offline = true
must_be_deterministic = true

# One local package fixture declaring exactly one console_scripts entry.
[package]
package_name = "gamma"
package_version = "1.0.0"
wheel_filename = "gamma-1.0.0-py3-none-any.whl"
must_be_pure_python = true
must_be_py3_none_any = true
console_script_name = "gamma-hello"
console_script_module = "gamma.cli"
console_script_callable = "main"
console_script_entry_point_spec = "gamma-hello = gamma.cli:main"
must_declare_exactly_one_console_script = true

# The sentinel the generated command must print to stdout.
[sentinel]
expected_stdout = "gamma-hello: 42"
expected_stdout_match_mode = "exact_line"
must_match_after_trim = true

# Acceptance: "Entry point executable is created or made invokable by the run command."
[entry_point_install_contract]
case = "entry_point_is_invokable_via_run_command"
must_install_console_script = true
must_make_entry_point_invokable_via_run_command = true
run_command_template = "mamba run gamma-hello"
must_resolve_entry_point_from_project_env = true
must_not_depend_on_global_console_script_registration = true
entry_point_missing_failure_kind = "console_script_entry_point_missing"
entry_point_missing_exit_code = 31
entry_point_not_invokable_failure_kind = "console_script_not_invokable_via_run"
entry_point_not_invokable_exit_code = 32

# Acceptance: "Command output matches the fixture sentinel."
[command_output_contract]
case = "command_output_matches_sentinel"
must_capture_stdout = true
must_capture_stderr = true
must_capture_exit_status = true
expected_run_exit_code = 0
must_assert_stdout_matches_sentinel = true
sentinel_mismatch_failure_kind = "console_script_sentinel_mismatch"
sentinel_mismatch_exit_code = 33
run_failure_failure_kind = "console_script_run_failed"
run_failure_exit_code = 34

# Acceptance: "Test avoids user-level PATH mutation."
[path_isolation_contract]
case = "test_avoids_user_level_path_mutation"
forbid_modifying_user_path = true
forbid_writing_to_user_home_bin = true
forbid_writing_to_system_bin = true
must_run_through_project_env_only = true
must_not_require_shell_rc_changes = true
path_mutation_failure_kind = "user_path_mutation_detected"
path_mutation_exit_code = 35
allowed_path_resolution_modes = [
    "project_local_entry_point",
    "managed_run_command_dispatch",
]

[runner_contract]
keys = [
    "outcome",
    "case",
    "package",
    "version",
    "console_script_name",
    "console_script_entry_point_spec",
    "run_command",
    "stdout_capture",
    "stderr_capture",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "entry_point_is_invokable_via_run_command",
    "command_output_matches_sentinel",
    "test_avoids_user_level_path_mutation",
]

[out_of_scope]
# Issue: "Out of scope: shell completion and script shims for every platform."
shell_completion = true
per_platform_script_shims = true
