# Pure-Python wheel install fixture — closes #2591.
# Parent: #2532 (uv-like package manager offline E2E gate).
#
# Pins the shape of the wheel-install test that proves the package
# manager can install a tiny pure-Python wheel from the frozen local
# index fixture (#2585) into a temp project environment, with
# install extracting files and installed metadata + import sentinel
# verifiable:
#
#   - Missing wheel file fails fixture validation.
#   - Install succeeds offline.
#   - Imported package returns an expected sentinel value.
#
# Out of scope (issue body): native wheel support.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/pure_python_wheel_install_fixture_2591.rs).

version = 1
fixture = "pure_python_wheel_install"
issue = 2591
parent_issue = 2532
profile = "package_manager"
family = "pure_python_wheel_install"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[index]
kind = "frozen_local_simple_index"
local_simple_index_fixture_issue = 2585
must_be_offline = true
must_be_deterministic = true

[wheel]
package_name = "alpha"
package_version = "1.0.0"
wheel_filename = "alpha-1.0.0-py3-none-any.whl"
must_be_pure_python = true
must_be_py3_none_any = true
must_be_minimal = true
sentinel_attribute = "answer"
sentinel_value = 42
import_statement = "import alpha"
import_assert_template = "alpha.answer == 42"

[temp_environment]
must_use_per_test_temp_env = true
must_use_per_test_temp_project = true
must_clean_up_on_success = true
must_preserve_on_failure_for_diagnostics = true

# Acceptance: "Missing wheel file fails fixture validation."
[validation_case]
case = "missing_wheel_file_fails_fixture_validation"
must_validate_wheel_file_exists_on_disk = true
must_validate_wheel_file_matches_index_metadata = true
validation_must_run_before_install_attempt = true
missing_wheel_failure_kind = "wheel_file_missing"
missing_wheel_exit_code = 23
missing_wheel_diagnostic_must_name_path = true
must_distinguish_from_resolver_failures = true

# Acceptance: "Install succeeds offline."
[offline_install_case]
case = "install_succeeds_offline"
must_run_install_command = true
install_command_template = "mamba install alpha"
must_be_offline = true
forbid_network_access = true
must_extract_wheel_into_temp_env = true
must_capture_install_stdout = true
must_capture_install_stderr = true
must_capture_install_exit_status = true
expected_install_exit_code = 0
must_assert_dist_info_present_after_install = true
dist_info_dir_pattern = "alpha-1.0.0.dist-info"
must_assert_record_file_present = true
record_file_path_within_dist_info = "RECORD"

# Acceptance: "Imported package returns an expected sentinel value."
[import_sentinel_case]
case = "imported_package_returns_expected_sentinel"
must_run_import_script_after_install = true
must_assert_sentinel_attribute_present = true
must_assert_sentinel_value_equals_expected = true
sentinel_mismatch_failure_kind = "sentinel_value_mismatch"
sentinel_mismatch_exit_code = 24
import_failure_failure_kind = "import_failed_after_install"
import_failure_exit_code = 25
must_be_deterministic = true
must_distinguish_sentinel_mismatch_from_import_failure = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "package",
    "version",
    "wheel_filename",
    "dist_info_dir",
    "sentinel_attribute",
    "sentinel_expected_value",
    "sentinel_observed_value",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "missing_wheel_file_fails_fixture_validation",
    "install_succeeds_offline",
    "imported_package_returns_expected_sentinel",
]

[out_of_scope]
# Issue: "Out of scope: native wheel support."
native_wheel_support = true
