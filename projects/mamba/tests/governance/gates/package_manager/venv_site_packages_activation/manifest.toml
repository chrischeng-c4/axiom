# Venv site-packages import activation fixture — closes #2589.
# Parent: #2532 (uv-like package manager offline E2E gate).
#
# Pins the shape of the test that verifies installed packages are
# visible to mamba through the project environment path. The fixture
# installs one pure-Python package from the frozen local index
# (#2585) into a temp environment, then runs mamba against a script
# importing that package, asserting site-packages activation:
#
#   - Import succeeds only after install or sync.
#   - Test fails if site-packages is not on the runtime path.
#   - Test avoids global Python or user cache state.
#
# Out of scope (issue body): virtualenv UX polish.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/venv_site_packages_activation_fixture_2589.rs).

version = 1
fixture = "venv_site_packages_activation"
issue = 2589
parent_issue = 2532
profile = "package_manager"
family = "venv_site_packages_activation"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[index]
kind = "frozen_local_simple_index"
local_simple_index_fixture_issue = 2585
must_be_offline = true
must_be_deterministic = true

[package_under_test]
name = "alpha"
version = "1.0.0"
must_be_pure_python = true
import_name = "alpha"
import_statement = "import alpha"

[temp_environment]
must_use_per_test_temp_env = true
must_use_per_test_temp_project = true
must_clean_up_on_success = true
must_preserve_on_failure_for_diagnostics = true
must_record_sys_path_per_run = true

# Acceptance: "Import succeeds only after install or sync."
[install_then_import_case]
case = "import_succeeds_only_after_install_or_sync"
must_run_import_script_before_install = true
must_assert_import_fails_before_install = true
must_run_install_or_sync = true
must_run_import_script_after_install = true
must_assert_import_succeeds_after_install = true
allowed_activation_commands = ["install", "sync"]
pre_install_failure_kind = "import_succeeded_before_install"
pre_install_failure_exit_code = 19
post_install_failure_kind = "import_failed_after_install"
post_install_failure_exit_code = 20
must_be_deterministic = true

# Acceptance: "Test fails if site-packages is not on the runtime
# path."
[site_packages_path_contract]
must_assert_site_packages_on_runtime_path = true
must_assert_site_packages_path_is_under_temp_env = true
site_packages_missing_failure_kind = "site_packages_not_on_runtime_path"
site_packages_missing_exit_code = 21
diagnostic_must_print_sys_path_when_missing = true
must_distinguish_from_import_failed_after_install = true

# Acceptance: "Test avoids global Python or user cache state."
[global_state_isolation]
forbid_reads_from_user_home = true
forbid_writes_to_user_home = true
forbid_reads_from_global_python_install = true
forbid_writes_to_global_python_install = true
forbid_pythonpath_inheritance_from_parent = true
forbid_pythonhome_inheritance_from_parent = true
forbidden_env_vars = ["PYTHONPATH", "PYTHONHOME", "PIP_CACHE_DIR", "MAMBA_CACHE_DIR"]
must_use_clean_environment_for_subprocess = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "package",
    "version",
    "import_statement",
    "phase",
    "sys_path",
    "site_packages_path",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "import_succeeds_only_after_install_or_sync",
    "site_packages_must_be_on_runtime_path",
    "no_global_python_or_user_cache_state",
]

[out_of_scope]
# Issue: "Out of scope: virtualenv UX polish."
virtualenv_ux_polish = true
