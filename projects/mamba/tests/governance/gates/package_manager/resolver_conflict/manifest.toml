# Resolver conflict fixture — closes #2587.
# Parent: #2532 (uv-like package manager offline E2E gate).
#
# Pins the shape of the resolver conflict test that proves the
# resolver emits a deterministic conflict diagnostic naming the
# incompatible packages or constraints, running entirely against a
# frozen local simple-index (no network):
#
#   - Test runs in the default package-manager profile.
#   - Conflict result is deterministic and offline.
#   - Diagnostic is stable enough for regression checks.
#
# Out of scope (issue body): implementing a full SAT resolver
# redesign.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/resolver_conflict_fixture_2587.rs).

version = 1
fixture = "resolver_conflict"
issue = 2587
parent_issue = 2532
profile = "package_manager"
family = "resolver_conflict"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[index]
kind = "frozen_local_simple_index"
local_simple_index_fixture_issue = 2585
must_be_frozen = true
must_be_offline = true
must_be_deterministic = true

[test_unignore]
must_remove_ignore_marker = true
must_only_remove_for_this_focused_test = true
must_not_remove_unrelated_ignore_markers = true

# Two top-level requirements whose transitive constraints cannot be
# satisfied simultaneously. Concrete names/constraints are
# placeholders — the runner reads them; they only need to disagree.
[[requirements]]
name = "left"
version_constraint = ">=2.0,<3.0"

[[requirements]]
name = "right"
version_constraint = ">=1.0,<2.0"

[conflict]
must_be_unsatisfiable = true
incompatible_pair = ["left", "right"]
incompatible_constraint_a = ">=2.0,<3.0"
incompatible_constraint_b = ">=1.0,<2.0"
constraints_must_disagree = true

# Acceptance: "Test runs in the default package-manager profile."
[default_profile_case]
must_be_default_profile = true
profile_name = "package_manager"
must_run_in_default_profile_without_extra_flags = true
must_not_require_opt_in_marker = true

# Acceptance: "Conflict result is deterministic and offline."
[determinism_and_offline_contract]
must_run_offline = true
forbid_network_access = true
forbid_dns_lookups = true
forbid_outbound_sockets = true
must_be_deterministic_across_runs = true
must_produce_identical_diagnostic_across_runs = true

# Acceptance: "Diagnostic is stable enough for regression checks."
[diagnostic_stability_contract]
must_name_incompatible_packages = true
must_name_incompatible_constraints = true
must_be_machine_readable = true
diagnostic_record_format = "json"
conflict_failure_kind = "resolver_conflict"
conflict_exit_code = 16
must_distinguish_from_yanked_rejection_exit_code = true
yanked_rejection_exit_code_from_2584 = 10
must_distinguish_from_no_candidate_exit_code = true
no_candidate_exit_code_from_2584 = 11

[runner_contract]
keys = [
    "outcome",
    "case",
    "incompatible_package_a",
    "incompatible_package_b",
    "incompatible_constraint_a",
    "incompatible_constraint_b",
    "diagnostic_message",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "resolver_conflict_produces_stable_diagnostic",
]

[out_of_scope]
# Issue: "Out of scope: implementing a full SAT resolver redesign."
implementing_full_sat_resolver_redesign = true
