# Offline init-add-install-sync-run E2E skeleton — closes #2588.
# Parent: #2532 (uv-like package manager offline E2E gate).
#
# Pins the canonical uv-like workflow skeleton for the MVP package
# manager. The fixture runs end-to-end against the frozen local
# simple-index (#2585), names every workflow step, executes
# supported steps in order in a temp project, and marks unsupported
# steps with explicit blockers (not silent skips):
#
#   - Test names every workflow step and current status.
#   - Supported steps execute in order in a temp project.
#   - Unsupported steps are linked to follow-up issues or blockers.
#
# Out of scope (issue body): making every step fully implemented in
# this issue.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/init_add_install_sync_run_e2e_fixture_2588.rs).

version = 1
fixture = "init_add_install_sync_run_e2e"
issue = 2588
parent_issue = 2532
profile = "package_manager"
family = "init_add_install_sync_run_e2e"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[index]
kind = "frozen_local_simple_index"
local_simple_index_fixture_issue = 2585
must_be_offline = true
must_be_deterministic = true

[temp_project]
must_use_per_test_temp_dir = true
forbid_writes_outside_temp_dir = true
must_clean_up_on_success = true
must_preserve_on_failure_for_diagnostics = true
must_capture_command_output_per_step = true
must_capture_project_file_changes_per_step = true

# Canonical workflow steps in declared order. Each step has an
# explicit `status`: "supported" steps must execute; "blocked" steps
# must link to a follow-up issue and must not silently skip.
[[steps]]
order = 1
name = "init"
status = "supported"
must_create_project_files = true
expected_artifacts = ["mamba.toml"]

[[steps]]
order = 2
name = "add"
status = "supported"
must_modify_project_files = true
expected_artifacts = ["mamba.toml"]

[[steps]]
order = 3
name = "install"
status = "supported"
must_modify_project_files = true
expected_artifacts = ["mamba.lock"]

[[steps]]
order = 4
name = "sync"
status = "supported"
must_be_idempotent_after_install = true
expected_artifacts = ["mamba.lock"]

[[steps]]
order = 5
name = "run"
status = "blocked"
blocker_issue = 1262
blocker_reason = "Phase 1.5 virtual environment tracking required for `mamba run`"

# Acceptance: "Test names every workflow step and current status."
[step_naming_contract]
must_name_every_workflow_step = true
must_record_status_per_step = true
allowed_status_values = ["supported", "blocked", "skipped"]
forbid_silent_skip_for_blocked_step = true
forbid_silent_skip_for_unknown_step = true
must_print_step_name_and_status_in_order = true

# Acceptance: "Supported steps execute in order in a temp project."
[step_execution_contract]
must_execute_supported_steps_in_declared_order = true
must_fail_if_order_violated = true
must_record_per_step_exit_status = true
must_record_per_step_captured_output = true
must_record_per_step_project_file_diff = true
expected_outcome_when_all_supported_steps_pass = "pass"
expected_outcome_when_any_supported_step_fails = "fail"
supported_step_failure_kind = "supported_step_failed"
supported_step_failure_exit_code = 17

# Acceptance: "Unsupported steps are linked to follow-up issues or
# blockers."
[blocker_contract]
must_link_each_blocked_step_to_followup_issue = true
must_emit_blocker_diagnostic_for_each_blocked_step = true
forbid_silent_skip_of_blocked_step = true
blocker_step_failure_kind = "blocked_step_without_followup"
blocker_step_failure_exit_code = 18
must_distinguish_blocked_from_supported_failures = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "step_order",
    "step_name",
    "step_status",
    "blocker_issue",
    "captured_output",
    "project_file_diff",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "workflow_steps_named_and_statuses_recorded",
    "supported_steps_execute_in_declared_order",
    "blocked_steps_link_to_followup_issues",
]

[out_of_scope]
# Issue: "Out of scope: making every step fully implemented in this
# issue."
making_every_step_fully_implemented_in_this_issue = true
