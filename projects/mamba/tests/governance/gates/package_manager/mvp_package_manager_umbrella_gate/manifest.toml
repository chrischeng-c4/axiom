# MVP package manager umbrella fixture — closes #751.
# Parent: MVP test-completeness epic (#2526) via package
# manager child gate #2532. Sibling MVP goal epics: #1265
# (Py3.12 ecosystem), #1260 (perf 10×), #2459 (mambalibs).
# Current child issues: #1262 (Phase 1.5 venv).
#
# Pins the shape of the MVP package manager umbrella that owns
# MVP goal 4: uv-like project workflow. The umbrella is GREEN
# only when:
#
#   - R1: PyPI-compatible package index client fetches sdist
#     and wheels from a PEP 503/691 endpoint.
#   - R2: Dependency resolver produces a deterministic
#     resolution graph from declared specs.
#   - R3: Wheel install path lands a PEP 427 wheel into the
#     project environment without shell activation.
#   - R4: Deterministic lockfile is the source of truth for
#     reproducible installs (mamba.lock for project deps; sister
#     to mamba.lock for mambalibs binding-crate deps under
#     #2459).
#   - R5: PEP 405 virtual environment + `mamba init`, `mamba
#     add`, `mamba remove`, `mamba install`, `mamba sync`,
#     `mamba run` workflow verbs exist and are wired.
#
# Out of scope: implementing the runtime under each verb; the
# global cache impl; parallel download/install impl;
# wheel-build-from-sdist impl; resolver backtracking heuristics.
#
# Shape locked by src/pkgmgr/tests/mvp_package_manager_umbrella_gate.rs.

version = 1
fixture = "mvp_package_manager_umbrella_gate"
issue = 751
parent_issue = 2526
child_issues = [1262]
profile = "package_manager"
family = "mvp_package_manager_umbrella_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_pypi_compatible_index_client = true
must_cover_dependency_resolver = true
must_cover_wheel_install_path = true
must_cover_deterministic_lockfile_is_source_of_truth = true
must_cover_pep_405_venv_and_verb_workflow = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — PyPI-compatible package index client.
[r1_pypi_compatible_index_client_contract]
case = "pypi_compatible_index_client_fetches_sdist_and_wheels"
requirement_id = "R1"
must_speak_pep_503_simple_index = true
must_speak_pep_691_json_index = true
must_fetch_wheel_artifact = true
must_fetch_sdist_artifact = true
forbid_relying_on_non_pep_index_protocol = true
forbid_silently_skipping_index_protocol_negotiation = true
index_protocol_field_name = "index_protocol"
allowed_index_protocol_values = ["pep_503_simple", "pep_691_json"]
artifact_kind_field_name = "artifact_kind"
allowed_artifact_kind_values = ["wheel", "sdist"]
non_pep_index_failure_kind = "mvp_package_manager_non_pep_index_protocol"
non_pep_index_exit_code = 377
index_protocol_skipped_failure_kind = "mvp_package_manager_index_protocol_negotiation_skipped"
index_protocol_skipped_exit_code = 378
must_distinguish_non_pep_protocol_from_skipped_negotiation = true

# R2 — Dependency resolver.
[r2_dependency_resolver_contract]
case = "dependency_resolver_produces_deterministic_resolution_graph"
requirement_id = "R2"
must_resolve_from_declared_specs = true
must_produce_deterministic_resolution_graph = true
must_report_unsatisfiable_with_reason = true
forbid_silently_dropping_unsatisfiable_constraint = true
forbid_nondeterministic_resolver_output = true
resolver_outcome_field_name = "resolver_outcome"
allowed_resolver_outcome_values = ["resolved", "unsatisfiable", "ambiguous"]
unsatisfiable_silently_dropped_failure_kind = "mvp_package_manager_unsatisfiable_constraint_silently_dropped"
unsatisfiable_silently_dropped_exit_code = 379
nondeterministic_resolution_failure_kind = "mvp_package_manager_nondeterministic_resolution"
nondeterministic_resolution_exit_code = 380
must_distinguish_unsatisfiable_drop_from_nondeterminism = true

# R3 — Wheel install path.
[r3_wheel_install_path_contract]
case = "wheel_install_lands_pep_427_wheel_in_project_env_without_shell_activation"
requirement_id = "R3"
must_install_pep_427_wheel = true
must_install_into_project_env = true
must_make_installed_package_importable_without_shell_activation = true
forbid_requiring_shell_activation_for_import = true
forbid_installing_outside_project_env = true
wheel_install_outcome_field_name = "wheel_install_outcome"
allowed_wheel_install_outcome_values = ["installed", "rejected_non_pep_427", "rejected_outside_env"]
installed_importable_field_name = "installed_importable_without_activation"
shell_activation_required_failure_kind = "mvp_package_manager_shell_activation_required"
shell_activation_required_exit_code = 381
install_outside_env_failure_kind = "mvp_package_manager_install_outside_project_env"
install_outside_env_exit_code = 382
non_pep_427_wheel_failure_kind = "mvp_package_manager_non_pep_427_wheel"
non_pep_427_wheel_exit_code = 383
must_distinguish_shell_required_from_outside_env_from_non_pep_427 = true

# R4 — Deterministic lockfile.
[r4_deterministic_lockfile_is_source_of_truth_contract]
case = "deterministic_lockfile_is_source_of_truth_for_reproducible_installs"
requirement_id = "R4"
must_emit_lockfile_on_first_resolve = true
must_pin_resolved_versions_in_lockfile = true
must_resolve_subsequent_installs_from_lockfile = true
must_reject_unlocked_install_in_ci = true
forbid_silently_regenerating_lockfile_in_ci = true
forbid_silently_resolving_outside_lockfile = true
project_lockfile_relative_path_field_name = "project_lockfile_relative_path"
expected_project_lockfile_filename = "mamba.lock"
lockfile_status_field_name = "lockfile_status"
allowed_lockfile_status_values = ["present", "missing", "stale"]
unlocked_in_ci_failure_kind = "mvp_package_manager_unlocked_install_in_ci"
unlocked_in_ci_exit_code = 384
silent_resolve_outside_lockfile_failure_kind = "mvp_package_manager_silent_resolve_outside_lockfile"
silent_resolve_outside_lockfile_exit_code = 385
silent_regenerate_lockfile_failure_kind = "mvp_package_manager_silent_regenerate_lockfile_in_ci"
silent_regenerate_lockfile_exit_code = 386
must_distinguish_unlocked_from_silent_resolve_from_regenerate = true

# R5 — PEP 405 venv + verb workflow.
[r5_pep_405_venv_and_verb_workflow_contract]
case = "pep_405_venv_and_init_add_remove_install_sync_run_verbs_are_wired"
requirement_id = "R5"
must_create_pep_405_compatible_venv = true
must_wire_mamba_init_verb = true
must_wire_mamba_add_verb = true
must_wire_mamba_remove_verb = true
must_wire_mamba_install_verb = true
must_wire_mamba_sync_verb = true
must_wire_mamba_run_verb = true
forbid_silently_dropping_a_verb = true
forbid_skipping_pep_405_venv_creation = true
venv_layout_field_name = "venv_layout"
allowed_venv_layout_values = ["pep_405"]
required_verbs_field_name = "required_verbs"
required_verbs = ["init", "add", "remove", "install", "sync", "run"]
verb_missing_failure_kind = "mvp_package_manager_verb_missing"
verb_missing_exit_code = 387
non_pep_405_venv_failure_kind = "mvp_package_manager_non_pep_405_venv"
non_pep_405_venv_exit_code = 388
venv_creation_skipped_failure_kind = "mvp_package_manager_venv_creation_skipped"
venv_creation_skipped_exit_code = 389
must_distinguish_verb_missing_from_non_pep_405_from_creation_skipped = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "index_protocol",
    "artifact_kind",
    "resolver_outcome",
    "wheel_install_outcome",
    "installed_importable_without_activation",
    "project_lockfile_relative_path",
    "lockfile_status",
    "venv_layout",
    "required_verbs",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "pypi_compatible_index_client_fetches_sdist_and_wheels",
    "dependency_resolver_produces_deterministic_resolution_graph",
    "wheel_install_lands_pep_427_wheel_in_project_env_without_shell_activation",
    "deterministic_lockfile_is_source_of_truth_for_reproducible_installs",
    "pep_405_venv_and_init_add_remove_install_sync_run_verbs_are_wired",
]

[out_of_scope]
# Issue body + epic split: runtime impl per verb is owned by
# child gates (#1262 venv is the first; further child issues to
# be filed). Global cache, parallel download/install, sdist→wheel
# build path, and resolver backtracking heuristics are tracked
# separately. Mambalibs binding-crate dep surface is #2459, not
# this epic.
runtime_implementation_per_verb = true
global_cache_implementation = true
parallel_download_install_implementation = true
wheel_build_from_sdist_implementation = true
resolver_backtracking_heuristics = true
mambalibs_binding_crate_dependency_surface = true
c_extension_fast_paths = true
