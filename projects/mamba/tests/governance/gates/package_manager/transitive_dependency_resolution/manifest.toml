# Transitive dependency resolution fixture — closes #2592.
# Parent: #2532 (uv-like package manager offline E2E gate).
#
# Pins the shape of the offline resolver test that proves the package
# manager installs a one-edge transitive dependency from the frozen
# local index (#2585): request A, expect both A and B installed and
# importable, with the lockfile + resolver diagnostic naming the
# A→B edge:
#
#   - Lockfile contains both direct and transitive dependency entries.
#   - Runtime import proves transitive dependency activation.
#   - Resolver output names the dependency edge.
#
# Out of scope (issue body): complex backtracking cases beyond one
# transitive edge.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/transitive_dependency_resolution_fixture_2592.rs).

version = 1
fixture = "transitive_dependency_resolution"
issue = 2592
parent_issue = 2532
profile = "package_manager"
family = "transitive_dependency_resolution"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[index]
kind = "frozen_local_simple_index"
local_simple_index_fixture_issue = 2585
must_be_offline = true
must_be_deterministic = true

# Direct dependency requested by the user-facing command.
[direct_dependency]
package_name = "alpha"
package_version = "1.0.0"
import_statement = "import alpha"

# Transitive dependency pulled in via direct's metadata.
[transitive_dependency]
package_name = "beta"
package_version = "1.0.0"
import_statement = "import beta"

# Single dependency edge under test: A → B.
[dependency_edge]
from_package = "alpha"
to_package = "beta"
constraint = ">=1.0.0,<2.0.0"
must_be_single_edge = true

# Acceptance: "Lockfile contains both direct and transitive dependency entries."
[lockfile_contract]
case = "lockfile_contains_direct_and_transitive_entries"
must_emit_lockfile = true
lockfile_format = "toml"
must_record_direct_dependency_entry = true
must_record_transitive_dependency_entry = true
must_mark_direct_as_root_requirement = true
must_mark_transitive_as_dependency_of_direct = true
must_pin_exact_version_for_direct = true
must_pin_exact_version_for_transitive = true
missing_transitive_entry_failure_kind = "transitive_dependency_missing_from_lockfile"
missing_transitive_entry_exit_code = 26
unpinned_lockfile_entry_failure_kind = "lockfile_entry_unpinned"
unpinned_lockfile_entry_exit_code = 27

# Acceptance: "Runtime import proves transitive dependency activation."
[runtime_import_contract]
case = "runtime_import_proves_transitive_activation"
must_run_import_script_after_install = true
import_script_must_import_direct_dependency = true
import_script_must_import_transitive_dependency = true
expected_import_exit_code = 0
transitive_not_importable_failure_kind = "transitive_dependency_not_importable"
transitive_not_importable_exit_code = 28
must_distinguish_transitive_import_failure_from_direct_import_failure = true
direct_not_importable_failure_kind = "direct_dependency_not_importable"
direct_not_importable_exit_code = 29

# Acceptance: "Resolver output names the dependency edge."
[resolver_diagnostic_contract]
case = "resolver_output_names_dependency_edge"
must_emit_resolver_diagnostic = true
diagnostic_record_format = "json"
must_name_direct_dependency_in_diagnostic = true
must_name_transitive_dependency_in_diagnostic = true
must_name_edge_from_field = "from"
must_name_edge_to_field = "to"
must_name_constraint_field = "constraint"
edge_missing_from_diagnostic_failure_kind = "edge_missing_from_diagnostic"
edge_missing_from_diagnostic_exit_code = 30

[runner_contract]
keys = [
    "outcome",
    "case",
    "direct_package",
    "direct_version",
    "transitive_package",
    "transitive_version",
    "edge_from",
    "edge_to",
    "edge_constraint",
    "lockfile_path",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "lockfile_contains_direct_and_transitive_entries",
    "runtime_import_proves_transitive_activation",
    "resolver_output_names_dependency_edge",
]

[out_of_scope]
# Issue: "Out of scope: complex backtracking cases beyond one transitive edge."
complex_backtracking_beyond_one_edge = true
