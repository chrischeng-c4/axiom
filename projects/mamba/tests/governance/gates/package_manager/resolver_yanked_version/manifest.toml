# Resolver yanked-version fixture — closes #2584.
# Parent: #2532 (uv-like package manager offline E2E gate).
#
# Pins the shape of the resolver test that proves yanked versions
# are avoided by default and only selected when explicitly allowed,
# running entirely against a frozen local simple-index (no network):
#
#   - Test runs without network.
#   - Yanked version behavior is deterministic.
#   - Failure output names the selected or rejected version.
#
# Out of scope (issue body): every PyPI metadata edge case.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/resolver_yanked_version_fixture_2584.rs).

version = 1
fixture = "resolver_yanked_version"
issue = 2584
parent_issue = 2532
profile = "package_manager"
family = "resolver_yanked_version"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The resolver runs against a frozen local simple-index served from
# disk; the upstream public index is never contacted.
[index]
kind = "frozen_local_simple_index"
local_simple_index_fixture_issue = 2585
must_be_frozen = true
must_be_offline = true
must_be_deterministic = true

# Test target: re-enable the previously ignored yanked-version
# resolver test against this frozen index.
[test_unignore]
must_remove_ignore_marker = true
must_only_remove_for_this_focused_test = true
must_not_remove_unrelated_ignore_markers = true

# Acceptance: "Test runs without network."
[network_gate]
forbid_network_access = true
forbid_dns_lookups = true
forbid_outbound_sockets = true
must_run_against_local_index_only = true
test_must_fail_if_network_access_observed = true

# Acceptance: "Yanked version behavior is deterministic."
[yanked_behavior_contract]
must_avoid_yanked_versions_by_default = true
must_select_yanked_version_only_when_explicitly_allowed = true
allow_yanked_flag_name = "--allow-yanked"
deterministic_resolution_across_runs = true
must_record_yanked_decision_in_resolution_log = true
yanked_decision_log_format = "json"

# Acceptance: "Failure output names the selected or rejected
# version."
[diagnostic_contract]
failure_message_must_name_rejected_version = true
failure_message_must_name_selected_version_when_available = true
failure_message_must_include_yanked_marker = true
failure_message_must_be_deterministic = true
yanked_rejection_failure_kind = "yanked_version_rejected"
yanked_rejection_exit_code = 10
no_candidate_failure_kind = "no_acceptable_version"
no_candidate_exit_code = 11

[runner_contract]
keys = [
    "outcome",
    "case",
    "package",
    "selected_version",
    "rejected_version",
    "yanked_versions_seen",
    "allow_yanked",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "resolver_avoids_yanked_version_by_default",
    "resolver_selects_yanked_version_when_explicitly_allowed",
    "resolver_fails_when_no_acceptable_version",
]

[out_of_scope]
# Issue: "Out of scope: every PyPI metadata edge case."
every_pypi_metadata_edge_case = true
