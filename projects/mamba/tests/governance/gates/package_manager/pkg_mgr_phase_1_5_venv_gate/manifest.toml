# Package manager Phase 1.5 virtual environment fixture —
# closes #1262. Parent: MVP package manager umbrella (#751)
# via its child child_issues entry; sibling Phase 1
# tracking siblings cover index client, resolver, wheel
# installer, lockfile.
#
# Pins the shape of the venv layer that owns F5 of the
# package manager epic: PEP 405 layout + activation-free
# import via `mamba run`. The gate is GREEN only when:
#
#   - R1: `pyvenv.cfg` is written with `home`,
#     `include-system-site-packages = false`, and `version`.
#   - R2: PEP 405 directory tree (`bin/`, `lib/pythonX.Y/
#     site-packages/`, `include/`) is created atomically.
#   - R3: `mamba venv create <path>` CLI verb exists, refuses
#     to overwrite an existing `pyvenv.cfg`, accepts `--python`.
#   - R4: `mamba run` overrides `sys.prefix` and
#     `sys.exec_prefix` to the venv root.
#   - R5: Packages in the venv `site-packages` are importable
#     by `mamba run` with no activation step.
#   - R6: `mamba venv remove <path>` cleans the tree only when
#     `pyvenv.cfg` exists in the target.
#   - R7: `bin/python` is a symlink by default, copy on
#     `--copies`; falls back to copy on no-symlink filesystems.
#   - R8: Windows layout uses `Scripts/` and
#     `Lib/site-packages/`.
#
# Out of scope: activation shell scripts, pip shims, conda
# compat, interpreter download/install, Windows CI.
#
# Shape locked by src/pkgmgr/tests/venv_phase_gate.rs.

version = 1
fixture = "pkg_mgr_phase_1_5_venv_gate"
issue = 1262
parent_issue = 751
profile = "package_manager"
family = "pkg_mgr_phase_1_5_venv_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_pyvenv_cfg_creation = true
must_cover_pep_405_directory_layout = true
must_cover_mamba_venv_create_cli_verb = true
must_cover_sys_prefix_override_in_mamba_run = true
must_cover_site_packages_discovery_without_activation = true
must_cover_mamba_venv_remove_cli_verb = true
must_cover_interpreter_symlink_or_copy = true
must_cover_cross_platform_layout_variant = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — pyvenv.cfg creation.
[r1_pyvenv_cfg_creation_contract]
case = "pyvenv_cfg_is_written_with_home_include_system_site_packages_and_version"
requirement_id = "R1"
priority = "P1"
must_write_pyvenv_cfg_in_venv_root = true
must_write_home_key = true
must_write_include_system_site_packages_false = true
must_write_version_key = true
must_use_key_equals_value_format = true
forbid_omitting_required_pyvenv_cfg_keys = true
pyvenv_cfg_filename_field_name = "pyvenv_cfg_filename"
expected_pyvenv_cfg_filename = "pyvenv.cfg"
required_pyvenv_cfg_keys_field_name = "required_pyvenv_cfg_keys"
required_pyvenv_cfg_keys = ["home", "include-system-site-packages", "version"]
pyvenv_cfg_missing_failure_kind = "mvp_package_manager_pyvenv_cfg_missing"
pyvenv_cfg_missing_exit_code = 390
pyvenv_cfg_key_missing_failure_kind = "mvp_package_manager_pyvenv_cfg_required_key_missing"
pyvenv_cfg_key_missing_exit_code = 391
must_distinguish_cfg_missing_from_required_key_missing = true

# R2 — directory layout.
[r2_pep_405_directory_layout_contract]
case = "pep_405_directory_tree_bin_lib_site_packages_include_is_created_atomically"
requirement_id = "R2"
priority = "P1"
must_create_bin_dir = true
must_create_lib_pythonxy_site_packages_dir = true
must_create_include_dir = true
must_match_pythonxy_major_minor = true
must_create_directory_tree_atomically = true
forbid_leaving_partial_layout_on_error = true
required_subdirs_field_name = "required_subdirs_posix"
required_subdirs_posix = ["bin", "lib/python3.12/site-packages", "include"]
atomic_creation_field_name = "atomic_creation"
partial_layout_failure_kind = "mvp_package_manager_partial_venv_layout_on_error"
partial_layout_exit_code = 392
required_subdir_missing_failure_kind = "mvp_package_manager_venv_required_subdir_missing"
required_subdir_missing_exit_code = 393
must_distinguish_partial_layout_from_subdir_missing = true

# R3 — `mamba venv create <path>` CLI.
[r3_mamba_venv_create_cli_contract]
case = "mamba_venv_create_cli_verb_creates_venv_refuses_overwrite_supports_python_flag"
requirement_id = "R3"
priority = "P1"
must_register_mamba_venv_create_verb = true
must_accept_path_positional_argument = true
must_accept_python_optional_flag = true
must_refuse_to_overwrite_existing_pyvenv_cfg = true
forbid_silently_overwriting_existing_venv = true
verb_name_field_name = "verb_name"
expected_verb_name = "venv create"
python_flag_field_name = "python_flag"
expected_python_flag = "--python"
overwrite_outcome_field_name = "overwrite_outcome"
allowed_overwrite_outcome_values = ["refused_existing_pyvenv_cfg", "created_new"]
silent_overwrite_failure_kind = "mvp_package_manager_silent_venv_overwrite"
silent_overwrite_exit_code = 394
venv_create_verb_missing_failure_kind = "mvp_package_manager_venv_create_verb_missing"
venv_create_verb_missing_exit_code = 395
must_distinguish_silent_overwrite_from_verb_missing = true

# R4 — sys.prefix / sys.exec_prefix override.
[r4_sys_prefix_override_in_mamba_run_contract]
case = "mamba_run_overrides_sys_prefix_and_exec_prefix_to_venv_root"
requirement_id = "R4"
priority = "P1"
must_set_sys_prefix_to_venv_root = true
must_set_sys_exec_prefix_to_venv_root = true
must_apply_override_inside_mamba_run = true
forbid_relying_on_environment_variable_activation = true
forbid_leaking_system_python_prefix_when_venv_active = true
sys_prefix_target_field_name = "sys_prefix_target"
allowed_sys_prefix_target_values = ["venv_root", "system_python_root"]
sys_prefix_leak_failure_kind = "mvp_package_manager_sys_prefix_leak_system_python"
sys_prefix_leak_exit_code = 396
env_var_activation_required_failure_kind = "mvp_package_manager_env_var_activation_required"
env_var_activation_required_exit_code = 397
must_distinguish_prefix_leak_from_env_var_required = true

# R5 — site-packages discovery.
[r5_site_packages_discovery_without_activation_contract]
case = "venv_site_packages_is_importable_by_mamba_run_without_activation_step"
requirement_id = "R5"
priority = "P1"
must_prepend_venv_site_packages_to_sys_path = true
must_resolve_imports_from_venv_site_packages = true
must_apply_before_user_code_executes = true
forbid_requiring_shell_activation_for_import = true
forbid_resolving_imports_from_system_python_first = true
sys_path_order_field_name = "sys_path_first_entry"
expected_sys_path_first_entry = "venv_site_packages"
import_resolution_source_field_name = "import_resolution_source"
allowed_import_resolution_source_values = ["venv_site_packages", "system_site_packages"]
shell_activation_required_failure_kind = "mvp_package_manager_venv_shell_activation_required"
shell_activation_required_exit_code = 398
system_site_packages_shadow_failure_kind = "mvp_package_manager_system_site_packages_shadowed_venv"
system_site_packages_shadow_exit_code = 399
must_distinguish_shell_required_from_system_shadow = true

# R6 — `mamba venv remove <path>`.
[r6_mamba_venv_remove_cli_contract]
case = "mamba_venv_remove_cleans_tree_only_when_pyvenv_cfg_present"
requirement_id = "R6"
priority = "P2"
must_register_mamba_venv_remove_verb = true
must_require_pyvenv_cfg_for_removal = true
must_refuse_to_delete_directory_without_pyvenv_cfg = true
must_print_removed_top_level_entries = true
forbid_silently_deleting_non_venv_directory = true
remove_verb_name_field_name = "remove_verb_name"
expected_remove_verb_name = "venv remove"
removal_outcome_field_name = "removal_outcome"
allowed_removal_outcome_values = ["removed", "refused_no_pyvenv_cfg"]
silent_non_venv_delete_failure_kind = "mvp_package_manager_silent_delete_non_venv_directory"
silent_non_venv_delete_exit_code = 400
remove_verb_missing_failure_kind = "mvp_package_manager_venv_remove_verb_missing"
remove_verb_missing_exit_code = 401
must_distinguish_silent_delete_from_verb_missing = true

# R7 — interpreter symlink/copy.
[r7_interpreter_symlink_or_copy_contract]
case = "bin_python_is_symlink_by_default_or_copy_on_flag_or_no_symlink_fs"
requirement_id = "R7"
priority = "P2"
must_default_to_symlink_for_bin_python = true
must_support_copies_flag = true
must_fall_back_to_copy_on_no_symlink_fs = true
forbid_silently_dropping_bin_python = true
copies_flag_field_name = "copies_flag"
expected_copies_flag = "--copies"
interpreter_link_kind_field_name = "interpreter_link_kind"
allowed_interpreter_link_kind_values = ["symlink", "copy"]
bin_python_missing_failure_kind = "mvp_package_manager_bin_python_missing"
bin_python_missing_exit_code = 402
copies_flag_missing_failure_kind = "mvp_package_manager_copies_flag_missing"
copies_flag_missing_exit_code = 403
must_distinguish_bin_python_missing_from_copies_flag_missing = true

# R8 — cross-platform support.
[r8_cross_platform_layout_variant_contract]
case = "windows_layout_uses_scripts_and_lib_site_packages_unix_layout_uses_bin_and_lib_pythonxy_site_packages"
requirement_id = "R8"
priority = "P3"
must_select_layout_by_platform = true
must_use_bin_on_posix = true
must_use_scripts_on_windows = true
must_use_lib_pythonxy_site_packages_on_posix = true
must_use_lib_site_packages_on_windows = true
forbid_silently_using_posix_layout_on_windows = true
platform_field_name = "platform"
allowed_platform_values = ["posix", "windows"]
posix_bin_dir_field_name = "posix_bin_dir"
expected_posix_bin_dir = "bin"
windows_bin_dir_field_name = "windows_bin_dir"
expected_windows_bin_dir = "Scripts"
posix_site_packages_dir_field_name = "posix_site_packages_dir"
expected_posix_site_packages_dir = "lib/python3.12/site-packages"
windows_site_packages_dir_field_name = "windows_site_packages_dir"
expected_windows_site_packages_dir = "Lib/site-packages"
wrong_platform_layout_failure_kind = "mvp_package_manager_wrong_platform_layout"
wrong_platform_layout_exit_code = 404
platform_selection_skipped_failure_kind = "mvp_package_manager_platform_selection_skipped"
platform_selection_skipped_exit_code = 405
must_distinguish_wrong_layout_from_selection_skipped = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "priority",
    "pyvenv_cfg_filename",
    "required_pyvenv_cfg_keys",
    "required_subdirs_posix",
    "atomic_creation",
    "verb_name",
    "python_flag",
    "overwrite_outcome",
    "sys_prefix_target",
    "sys_path_first_entry",
    "import_resolution_source",
    "remove_verb_name",
    "removal_outcome",
    "copies_flag",
    "interpreter_link_kind",
    "platform",
    "posix_bin_dir",
    "windows_bin_dir",
    "posix_site_packages_dir",
    "windows_site_packages_dir",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "pyvenv_cfg_is_written_with_home_include_system_site_packages_and_version",
    "pep_405_directory_tree_bin_lib_site_packages_include_is_created_atomically",
    "mamba_venv_create_cli_verb_creates_venv_refuses_overwrite_supports_python_flag",
    "mamba_run_overrides_sys_prefix_and_exec_prefix_to_venv_root",
    "venv_site_packages_is_importable_by_mamba_run_without_activation_step",
    "mamba_venv_remove_cleans_tree_only_when_pyvenv_cfg_present",
    "bin_python_is_symlink_by_default_or_copy_on_flag_or_no_symlink_fs",
    "windows_layout_uses_scripts_and_lib_site_packages_unix_layout_uses_bin_and_lib_pythonxy_site_packages",
]

[out_of_scope]
# Issue body: activation shell scripts, pip shims, conda
# compat, interpreter download, Windows CI all explicit.
activation_shell_scripts_for_other_shells = true
pip_compatibility_shims = true
conda_environment_compatibility = true
virtual_environment_cloning_between_machines = true
python_interpreter_compilation_or_download = true
windows_full_ci_validation = true
c_extension_fast_paths = true
