# Frozen local simple-index fixture — closes #2585.
# Parent: #2532 (uv-like package manager offline E2E gate).
#
# Pins the shape of a tiny frozen PEP 503 simple-index served from
# disk: at least two packages, at least one dependency edge, files
# kept local + small, deterministic across runs, and missing fixture
# files fail validation:
#
#   - Default package-manager tests do not hit PyPI.
#   - Fixture can serve or load package metadata deterministically.
#   - Missing fixture files fail validation.
#
# Out of scope (issue body): live PyPI integration.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/frozen_local_simple_index_fixture_2585.rs).

version = 1
fixture = "frozen_local_simple_index"
issue = 2585
parent_issue = 2532
profile = "package_manager"
family = "frozen_local_simple_index"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[index]
kind = "frozen_local_simple_index"
layout_pep = 503
must_be_offline = true
must_be_deterministic = true
must_serve_from_local_disk = true
must_be_small = true

# PEP 503 "/simple/" entry and per-package index pages.
[index_layout]
root_relative_path = "simple/"
per_package_subdir_kind = "normalized_project_name"
must_include_root_index_html = true
must_include_per_package_index_html_for_each_package = true
must_include_at_least_one_wheel_per_package = true

[[packages]]
name = "alpha"
version = "1.0.0"
filename = "alpha-1.0.0-py3-none-any.whl"
depends_on = []

[[packages]]
name = "beta"
version = "1.0.0"
filename = "beta-1.0.0-py3-none-any.whl"
depends_on = ["alpha"]

[graph]
must_declare_at_least_two_packages = true
must_declare_at_least_one_dependency_edge = true
edges = [
    { from = "beta", to = "alpha" },
]

# Acceptance: "Default package-manager tests do not hit PyPI."
[default_offline_gate]
must_be_default_for_package_manager_tests = true
forbid_network_access_in_default_tests = true
forbid_pypi_origin = true
forbid_dns_lookups = true
forbid_outbound_sockets = true
default_index_url_must_point_to_local_fixture = true

# Acceptance: "Fixture can serve or load package metadata
# deterministically."
[determinism_contract]
must_load_metadata_deterministically_across_runs = true
must_serve_metadata_deterministically_when_run_as_server = true
load_mode_allowed = true
serve_mode_allowed = true
allowed_modes = ["load", "serve"]
checksum_must_be_recorded_for_each_artifact = true
checksum_algorithm = "sha256"
checksum_record_format = "json"

# Acceptance: "Missing fixture files fail validation."
[validation_contract]
must_validate_all_declared_files_exist = true
must_validate_per_package_index_html_exists = true
must_validate_root_index_html_exists = true
missing_file_failure_kind = "fixture_file_missing"
missing_file_exit_code = 12
missing_file_diagnostic_must_name_path = true
validation_must_run_before_any_resolver_use = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "package",
    "version",
    "filename",
    "checksum",
    "missing_file_path",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "default_tests_resolve_against_local_index",
    "metadata_loads_deterministically",
    "missing_fixture_file_fails_validation",
]

[out_of_scope]
# Issue: "Out of scope: live PyPI integration."
live_pypi_integration = true
