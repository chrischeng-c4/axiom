# Live-PyPI opt-in fixture — closes #2590.
# Parent: #2532 (uv-like package manager offline E2E gate).
#
# Pins the shape that keeps live PyPI checks outside the default MVP
# gate: live checks are opt-in via feature/env flag, the default
# package-manager gate asserts no network test runs, and CI/worker
# summary shows live checks as opt-in:
#
#   - Default package-manager gate runs without network.
#   - Live PyPI tests still have an explicit command path.
#   - CI or worker summary shows live checks as opt-in.
#
# Out of scope (issue body): removing live integration coverage.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/live_pypi_opt_in_fixture_2590.rs).

version = 1
fixture = "live_pypi_opt_in"
issue = 2590
parent_issue = 2532
profile = "package_manager"
family = "live_pypi_opt_in"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# The default profile uses the frozen local simple-index (#2585).
[default_index]
kind = "frozen_local_simple_index"
local_simple_index_fixture_issue = 2585
must_be_offline = true
must_be_deterministic = true

# Live-PyPI tests must be gated behind a feature flag AND/OR an
# explicit environment variable; both names are pinned so the runner
# can detect either gate.
[opt_in_gate]
must_be_opt_in = true
opt_in_cargo_feature_name = "live-pypi"
opt_in_env_var_name = "MAMBA_LIVE_PYPI"
forbid_running_under_default_profile = true
must_attach_ignore_marker_when_not_opted_in = true

# Acceptance: "Default package-manager gate runs without network."
[default_profile_network_assertion]
must_assert_no_network_in_default_profile = true
must_be_part_of_default_package_manager_gate = true
forbid_dns_lookups_in_default_profile = true
forbid_outbound_sockets_in_default_profile = true
must_fail_if_network_access_observed_in_default_profile = true
default_profile_network_violation_failure_kind = "network_in_default_profile"
default_profile_network_violation_exit_code = 22

# Acceptance: "Live PyPI tests still have an explicit command path."
[live_command_path_contract]
must_document_live_command_separately = true
documented_command_template = "cargo test --features live-pypi -- --ignored live_pypi"
documented_command_must_include_feature_flag = true
documented_command_must_include_ignore_filter = true
live_command_must_be_excluded_from_default_test_run = true

# Acceptance: "CI or worker summary shows live checks as opt-in."
[summary_visibility_contract]
must_emit_summary_section = true
summary_must_record_live_checks_as_opt_in = true
summary_must_record_default_profile_as_offline = true
summary_must_be_machine_readable = true
summary_record_format = "json"
summary_required_fields = [
    "default_profile",
    "default_profile_network_mode",
    "live_pypi_opt_in",
    "live_pypi_executed",
    "live_pypi_skip_reason",
]
allowed_default_profile_network_mode_values = ["offline"]

[runner_contract]
keys = [
    "outcome",
    "case",
    "profile",
    "live_pypi_opt_in",
    "live_pypi_executed",
    "network_access_observed",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "default_profile_runs_offline",
    "live_pypi_tests_are_explicit",
    "summary_records_live_checks_as_opt_in",
]

[out_of_scope]
# Issue: "Out of scope: removing live integration coverage."
removing_live_integration_coverage = true
