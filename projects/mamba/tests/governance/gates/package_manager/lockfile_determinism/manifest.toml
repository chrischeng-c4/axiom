# Package-manager lockfile determinism fixture — closes #2586.
# Parent: #2532 (uv-like package manager offline E2E gate).
#
# Pins the shape of the lockfile-determinism test that runs lock
# generation twice against the frozen local simple-index and compares
# normalized lockfile content:
#
#   - Two lock runs produce equivalent normalized content.
#   - Changing one fixture package version changes the lockfile
#     deterministically.
#   - Machine-specific temp paths are excluded.
#
# Out of scope (issue body): final lockfile format design beyond
# required fields.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/lockfile_determinism_fixture_2586.rs).

version = 1
fixture = "lockfile_determinism"
issue = 2586
parent_issue = 2532
profile = "package_manager"
family = "lockfile_determinism"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

# Cross-reference the frozen local simple-index fixture (#2585)
# that this test resolves against, and the Mode 2 lockfile fixture
# (#2574) that defines lockfile assertion shape.
[index]
kind = "frozen_local_simple_index"
local_simple_index_fixture_issue = 2585
must_be_offline = true
must_be_deterministic = true

[lockfile]
mode2_lockfile_fixture_issue = 2574
required_fields = [
    "name",
    "version",
    "hash",
    "source_url",
]
hash_algorithm = "sha256"

# Acceptance: "Two lock runs produce equivalent normalized content."
[double_lock_case]
case = "two_lock_runs_produce_equivalent_normalized_content"
must_run_lock_generation_twice = true
must_compare_normalized_content = true
normalization_must_be_deterministic = true
expected_outcome_when_runs_are_equivalent = "pass"
expected_outcome_when_runs_differ = "fail"
divergence_failure_kind = "lockfile_nondeterministic"
divergence_exit_code = 13
divergence_diagnostic_must_show_normalized_diff = true

# Acceptance: "Changing one fixture package version changes the
# lockfile deterministically."
[version_change_case]
case = "version_change_propagates_deterministically_to_lockfile"
must_change_one_fixture_package_version = true
must_assert_lockfile_changes_for_that_package = true
must_assert_unchanged_packages_remain_byte_equivalent = true
expected_outcome_when_lockfile_reflects_change = "pass"
expected_outcome_when_lockfile_does_not_reflect_change = "fail"
version_change_failure_kind = "version_change_not_propagated"
version_change_exit_code = 14
must_be_deterministic_for_change_diff = true

# Acceptance: "Machine-specific temp paths are excluded."
[path_redaction_contract]
must_exclude_machine_specific_temp_paths_from_lockfile = true
forbid_tmpdir_random_suffixes_in_lockfile = true
forbid_user_home_paths_in_lockfile = true
allowed_path_kinds_in_lockfile = [
    "relative_to_project",
    "frozen_local_index_url",
]
machine_specific_path_failure_kind = "machine_specific_path_in_lockfile"
machine_specific_path_exit_code = 15
normalization_must_strip_random_temp_suffixes = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "lockfile_path",
    "run_index",
    "normalized_hash",
    "changed_package",
    "old_version",
    "new_version",
    "machine_specific_path",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "two_lock_runs_produce_equivalent_normalized_content",
    "version_change_propagates_deterministically_to_lockfile",
    "machine_specific_paths_are_excluded_from_lockfile",
]

[out_of_scope]
# Issue: "Out of scope: final lockfile format design beyond required
# fields."
final_lockfile_format_design_beyond_required_fields = true
