# Cloud SDK ecosystem umbrella gate — closes #1537. Parent
# #1265 (py3.12 master). Sibling #1263 (3P libs umbrella).
#
# Mamba's real-world production target is the Python cloud-SDK
# ecosystem running unmodified: AWS via boto3, Azure via
# azure-sdk-for-python, GCP via google-cloud-* on the
# grpclib + pure-python-protobuf path (NOT the grpcio C++ wrapper).
#
# This issue is the UMBRELLA. It only locks the epic-level
# acceptance shape — per-lib DoD lives in the leaf issues. The
# umbrella closes when AWS, Azure, and GCP each have a canonical
# hello-world running unmodified.
#
# The gate is GREEN only when:
#
#   - R1: AWS leaf set (boto3 #1500, botocore #1501,
#     s3transfer #1502, jmespath #1503) is enumerated; the
#     AWS hello-world `boto3.client("s3").list_buckets()` runs
#     unmodified on mamba.
#   - R2: Azure leaf set (azure-core #1504, azure-identity
#     #1505, azure-storage-blob #1506, azure-keyvault-secrets
#     #1507) is enumerated; the Azure hello-world
#     `BlobServiceClient.from_connection_string(cs).list_containers()`
#     runs unmodified on mamba.
#   - R3: GCP leaf set (google-api-core #1509,
#     google-cloud-storage #1510, google-cloud-pubsub #1511,
#     googleapis-common-protos #1512, protobuf #1513,
#     grpclib #1514) is enumerated on the grpclib+pure-python
#     path; the GCP hello-world `Client().list_buckets()` from
#     google.cloud.storage runs unmodified.
#   - R4: grpcio (#1515) is recorded as DEFERRED (C++ wrapper
#     blocker), and the gRPC server-side, regional/federation
#     oddities, and per-lib perf vs CPython are explicitly
#     out-of-scope for the umbrella (they're covered by leaf
#     issues + #1265 Goal 2 floor).
#   - R5: stdlib-dependency edges are recorded so a leaf-lib
#     regression caused by a stdlib gap routes to the right
#     upstream stdlib issue: ssl #1414, socket #1415, asyncio
#     #1416, urllib.parse #1419, hashlib #1424, hmac #1425.
#
# Out of scope: implementing any leaf lib; gRPC server; cloud
# regional/federation oddities; per-lib perf gates (already
# covered by #1265 Goal 2 + per-lib gates).
#
# Shape locked by src/meta_gates/tests/cloud_sdk_umbrella_gate.rs.

version = 1
fixture = "cloud_sdk_umbrella_gate"
issue = 1537
parent_issue = 1265
profile = "conformance"
family = "cloud_sdk_umbrella_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_aws_leaf_set_and_hello_world = true
must_cover_azure_leaf_set_and_hello_world = true
must_cover_gcp_leaf_set_via_grpclib_path_and_hello_world = true
must_cover_grpcio_deferred_and_out_of_scope_carveouts = true
must_cover_stdlib_dependency_edges_recorded = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — AWS leaf set + hello-world.
[r1_aws_leaf_set_and_hello_world_contract]
case = "aws_leaf_set_enumerated_and_boto3_s3_list_buckets_hello_world_runs_unmodified_on_mamba"
requirement_id = "R1"
must_enumerate_aws_leaf_set = true
must_pin_aws_hello_world_call = true
forbid_silently_dropping_aws_leaf = true
forbid_modifying_aws_hello_world_to_pass = true
aws_leafs_field_name = "aws_leafs"
aws_leafs = [
    { lib = "boto3", issue = 1500 },
    { lib = "botocore", issue = 1501 },
    { lib = "s3transfer", issue = 1502 },
    { lib = "jmespath", issue = 1503 },
]
aws_hello_world_field_name = "aws_hello_world"
expected_aws_hello_world = "boto3.client('s3').list_buckets()"
aws_leaf_dropped_failure_kind = "ecosystem_cloud_sdk_aws_leaf_dropped"
aws_leaf_dropped_exit_code = 500
aws_hello_modified_failure_kind = "ecosystem_cloud_sdk_aws_hello_world_modified_to_pass"
aws_hello_modified_exit_code = 501
must_distinguish_aws_leaf_dropped_from_hello_modified = true

# R2 — Azure leaf set + hello-world.
[r2_azure_leaf_set_and_hello_world_contract]
case = "azure_leaf_set_enumerated_and_blob_service_client_list_containers_hello_world_runs_unmodified_on_mamba"
requirement_id = "R2"
must_enumerate_azure_leaf_set = true
must_pin_azure_hello_world_call = true
forbid_silently_dropping_azure_leaf = true
forbid_modifying_azure_hello_world_to_pass = true
azure_leafs_field_name = "azure_leafs"
azure_leafs = [
    { lib = "azure-core", issue = 1504 },
    { lib = "azure-identity", issue = 1505 },
    { lib = "azure-storage-blob", issue = 1506 },
    { lib = "azure-keyvault-secrets", issue = 1507 },
]
azure_hello_world_field_name = "azure_hello_world"
expected_azure_hello_world = "BlobServiceClient.from_connection_string(cs).list_containers()"
azure_leaf_dropped_failure_kind = "ecosystem_cloud_sdk_azure_leaf_dropped"
azure_leaf_dropped_exit_code = 502
azure_hello_modified_failure_kind = "ecosystem_cloud_sdk_azure_hello_world_modified_to_pass"
azure_hello_modified_exit_code = 503
must_distinguish_azure_leaf_dropped_from_hello_modified = true

# R3 — GCP leaf set on grpclib+pure-python path + hello-world.
[r3_gcp_leaf_set_via_grpclib_path_and_hello_world_contract]
case = "gcp_leaf_set_pinned_on_grpclib_plus_pure_python_protobuf_path_and_google_cloud_storage_list_buckets_runs_unmodified"
requirement_id = "R3"
must_enumerate_gcp_leaf_set = true
must_pin_gcp_grpclib_path = true
must_pin_pure_python_protobuf_backend = true
must_pin_gcp_hello_world_call = true
forbid_silently_dropping_gcp_leaf = true
forbid_silently_switching_to_grpcio_path = true
gcp_leafs_field_name = "gcp_leafs"
gcp_leafs = [
    { lib = "google-api-core", issue = 1509 },
    { lib = "google-cloud-storage", issue = 1510 },
    { lib = "google-cloud-pubsub", issue = 1511 },
    { lib = "googleapis-common-protos", issue = 1512 },
    { lib = "protobuf", issue = 1513 },
    { lib = "grpclib", issue = 1514 },
]
gcp_grpc_transport_field_name = "gcp_grpc_transport"
allowed_gcp_grpc_transport_values = ["grpclib_pure_python", "grpcio_c_wrapper"]
expected_gcp_grpc_transport = "grpclib_pure_python"
gcp_hello_world_field_name = "gcp_hello_world"
expected_gcp_hello_world = "google.cloud.storage.Client().list_buckets()"
gcp_leaf_dropped_failure_kind = "ecosystem_cloud_sdk_gcp_leaf_dropped"
gcp_leaf_dropped_exit_code = 504
gcp_switched_to_grpcio_failure_kind = "ecosystem_cloud_sdk_gcp_silently_switched_to_grpcio_path"
gcp_switched_to_grpcio_exit_code = 505
gcp_hello_modified_failure_kind = "ecosystem_cloud_sdk_gcp_hello_world_modified_to_pass"
gcp_hello_modified_exit_code = 506
must_distinguish_gcp_leaf_dropped_from_grpcio_switch_from_hello_modified = true

# R4 — grpcio deferred + umbrella carve-outs.
[r4_grpcio_deferred_and_out_of_scope_carveouts_contract]
case = "grpcio_recorded_as_deferred_and_grpc_server_regional_oddities_and_perf_carveouts_pinned"
requirement_id = "R4"
must_record_grpcio_deferred = true
must_carve_out_grpc_server_side = true
must_carve_out_cloud_regional_federation_oddities = true
must_carve_out_per_lib_perf_vs_cpython_at_umbrella_level = true
forbid_silently_unblocking_grpcio_in_this_umbrella = true
deferred_libs_field_name = "deferred_libs"
deferred_libs = [
    { lib = "grpcio", issue = 1515, reason = "c_plus_plus_wrapper_blocker" },
]
carved_out_axes_field_name = "carved_out_axes"
carved_out_axes = [
    "grpc_server_side",
    "cloud_regional_federation_oddities",
    "per_lib_perf_vs_cpython",
]
grpcio_unblocked_in_umbrella_failure_kind = "ecosystem_cloud_sdk_grpcio_unblocked_in_umbrella"
grpcio_unblocked_in_umbrella_exit_code = 507
carve_out_violated_failure_kind = "ecosystem_cloud_sdk_carve_out_violated"
carve_out_violated_exit_code = 508
must_distinguish_grpcio_unblocked_from_carve_out_violation = true

# R5 — stdlib dependency edges recorded.
[r5_stdlib_dependency_edges_recorded_contract]
case = "stdlib_dependency_edges_recorded_so_leaf_regressions_route_to_correct_upstream_stdlib_issue"
requirement_id = "R5"
must_pin_stdlib_dependency_edges = true
forbid_silently_dropping_stdlib_dependency_edge = true
stdlib_dependency_edges_field_name = "stdlib_dependency_edges"
stdlib_dependency_edges = [
    { stdlib = "ssl", issue = 1414 },
    { stdlib = "socket", issue = 1415 },
    { stdlib = "asyncio", issue = 1416 },
    { stdlib = "urllib.parse", issue = 1419 },
    { stdlib = "hashlib", issue = 1424 },
    { stdlib = "hmac", issue = 1425 },
]
stdlib_edge_dropped_failure_kind = "ecosystem_cloud_sdk_stdlib_dependency_edge_dropped"
stdlib_edge_dropped_exit_code = 509
stdlib_edge_unrelated_added_failure_kind = "ecosystem_cloud_sdk_unrelated_stdlib_edge_added"
stdlib_edge_unrelated_added_exit_code = 510
must_distinguish_edge_dropped_from_unrelated_edge_added = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "aws_leafs",
    "aws_hello_world",
    "azure_leafs",
    "azure_hello_world",
    "gcp_leafs",
    "gcp_grpc_transport",
    "gcp_hello_world",
    "deferred_libs",
    "carved_out_axes",
    "stdlib_dependency_edges",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "aws_leaf_set_enumerated_and_boto3_s3_list_buckets_hello_world_runs_unmodified_on_mamba",
    "azure_leaf_set_enumerated_and_blob_service_client_list_containers_hello_world_runs_unmodified_on_mamba",
    "gcp_leaf_set_pinned_on_grpclib_plus_pure_python_protobuf_path_and_google_cloud_storage_list_buckets_runs_unmodified",
    "grpcio_recorded_as_deferred_and_grpc_server_regional_oddities_and_perf_carveouts_pinned",
    "stdlib_dependency_edges_recorded_so_leaf_regressions_route_to_correct_upstream_stdlib_issue",
]

[out_of_scope]
# Umbrella-level carve-outs. Per-lib DoD lives in leaf issues.
implementation_of_any_leaf_lib = true
grpc_server_side = true
cloud_regional_or_federation_oddities = true
per_lib_perf_vs_cpython = true
c_extension_fast_paths = true
