# Socket local loopback stdlib behavioral fixture — closes #2636.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the loopback-only socket behavioral fixture
# required by web libraries. The fixture exercises bind, connect,
# send, and recv on a tiny in-process payload over 127.0.0.1 only,
# closes both sockets deterministically, and never reaches an
# external host. Unsupported socket behavior on the current runtime
# must be marked blocker with a linked issue, not silently skipped:
#
#   - Fixture never reaches external network.
#   - Unsupported socket behavior is a blocker with issue reference.
#   - Passing fixture closes sockets deterministically.
#
# Out of scope (issue body): TLS and async networking.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_socket_loopback_fixture_2636.rs).

version = 1
fixture = "stdlib_socket_loopback_behavioral"
issue = 2636
parent_issue = 2529
profile = "stdlib"
family = "stdlib_socket_loopback_behavioral"

network = "loopback_only"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["socket"]
must_be_importable_via_import_statement = true
must_register_socket_in_stdlib_manifest = true
must_cover_socket_socket = true
must_cover_bind = true
must_cover_connect = true
must_cover_send = true
must_cover_recv = true
must_cover_close = true
must_use_af_inet = true
must_use_sock_stream = true

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 8
sample_min_records = 1

# Loopback roundtrip. A tiny deterministic payload sent through a
# 127.0.0.1 listening socket and read back from the accepted client
# socket. Port is ephemeral (bind to 0).
[[loopback_roundtrip_cases]]
bind_host = "127.0.0.1"
bind_port = 0
address_family = "AF_INET"
socket_type = "SOCK_STREAM"
payload_bytes_python_repr = "b'mamba_2636_ping'"
expected_received_bytes_python_repr = "b'mamba_2636_ping'"
recv_buffer_size = 64
must_send_and_recv_exact_payload = true

# Acceptance: "Fixture never reaches external network."
[no_external_network_contract]
case = "fixture_never_reaches_external_network"
must_bind_only_to_loopback = true
allowed_bind_hosts = ["127.0.0.1", "::1"]
forbid_bind_to_0_0_0_0 = true
forbid_connect_to_non_loopback_host = true
forbid_dns_resolution = true
must_not_consult_resolv_conf = true
must_not_use_external_proxy_env_vars = true
forbidden_env_vars = ["HTTP_PROXY", "HTTPS_PROXY", "ALL_PROXY", "http_proxy", "https_proxy", "all_proxy"]
external_network_use_failure_kind = "socket_external_network_used"
external_network_use_exit_code = 112
dns_resolution_failure_kind = "socket_dns_resolution_used"
dns_resolution_exit_code = 113
must_distinguish_external_network_from_dns = true

# Acceptance: "Unsupported socket behavior is a blocker with issue
# reference."
[unsupported_behavior_blocker_contract]
case = "unsupported_socket_behavior_is_blocker_with_issue_reference"
must_mark_unsupported_socket_path_with_blocker = true
must_link_blocker_to_issue = true
blocker_outcome_value = "blocker"
blocker_link_field_name = "blocker_issue"
forbid_silently_skipping_unsupported_socket_behavior = true
forbid_falsely_passing_unsupported_socket_behavior = true
missing_blocker_link_failure_kind = "socket_unsupported_missing_blocker_link"
missing_blocker_link_exit_code = 114
allowed_unsupported_socket_paths = [
    "socket_setsockopt_so_reuseport",
    "socket_sendfile_zero_copy",
    "socket_socketpair_af_unix",
]

# Acceptance: "Passing fixture closes sockets deterministically."
[deterministic_close_contract]
case = "passing_fixture_closes_sockets_deterministically"
must_close_listening_socket_on_pass = true
must_close_accepted_socket_on_pass = true
must_close_client_socket_on_pass = true
must_close_sockets_even_on_failure = true
must_use_with_statement_or_explicit_close = true
forbid_relying_on_gc_to_close_sockets = true
leaked_socket_failure_kind = "socket_not_closed_after_run"
leaked_socket_exit_code = 115
close_order_after_pass = [
    "accepted_socket",
    "client_socket",
    "listening_socket",
]

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "bind_host",
    "bind_port",
    "address_family",
    "socket_type",
    "payload_bytes_python_repr",
    "received_bytes_python_repr",
    "blocker_issue",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "blocker", "missing", "skip"]
case_values = [
    "fixture_never_reaches_external_network",
    "unsupported_socket_behavior_is_blocker_with_issue_reference",
    "passing_fixture_closes_sockets_deterministically",
]

[out_of_scope]
# Issue: "Out of scope: TLS and async networking."
tls = true
async_networking = true
