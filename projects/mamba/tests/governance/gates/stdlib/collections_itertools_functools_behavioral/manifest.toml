# Collections / itertools / functools stdlib behavioral fixture —
# closes #2632.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline behavioral fixture covering common
# functional and collection helpers used by Python libraries:
#   * collections.Counter + collections.defaultdict
#   * itertools.chain + itertools.islice
#   * functools.lru_cache + functools.partial
#
# Each helper family asserts a small deterministic result so the
# fixture stays fast enough to live inside the ecosystem gate:
#
#   - Fixture fails when any helper behavior is wrong.
#   - Failure output identifies the helper family.
#   - Fixture remains fast enough for the ecosystem gate.
#
# Out of scope (issue body): full iterator algebra compatibility.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_collections_itertools_functools_fixture_2632.rs).

version = 1
fixture = "stdlib_collections_itertools_functools_behavioral"
issue = 2632
parent_issue = 2529
profile = "stdlib"
family = "stdlib_collections_itertools_functools_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["collections", "itertools", "functools"]
must_be_importable_via_import_statement = true
must_cover_counter = true
must_cover_defaultdict = true
must_cover_chain = true
must_cover_islice = true
must_cover_lru_cache = true
must_cover_partial = true
helper_families = ["collections", "itertools", "functools"]

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 32
sample_min_records = 6

# collections.Counter.
[[helper_cases]]
family = "collections"
helper = "Counter"
input_python_repr = "['a', 'b', 'a', 'c', 'b', 'a']"
expected_python_repr = "{'a': 3, 'b': 2, 'c': 1}"

# collections.defaultdict.
[[helper_cases]]
family = "collections"
helper = "defaultdict_list"
input_python_repr = "[('k', 1), ('k', 2), ('j', 3)]"
expected_python_repr = "{'k': [1, 2], 'j': [3]}"

# itertools.chain.
[[helper_cases]]
family = "itertools"
helper = "chain"
input_python_repr = "[[1, 2], [3], [4, 5]]"
expected_python_repr = "[1, 2, 3, 4, 5]"

# itertools.islice.
[[helper_cases]]
family = "itertools"
helper = "islice"
input_python_repr = "[range(10), 2, 5]"
expected_python_repr = "[2, 3, 4]"

# functools.lru_cache.
[[helper_cases]]
family = "functools"
helper = "lru_cache"
input_python_repr = "fib_of_n_with_lru_cache(10)"
expected_python_repr = "55"

# functools.partial.
[[helper_cases]]
family = "functools"
helper = "partial"
input_python_repr = "partial(int, base=2)('1010')"
expected_python_repr = "10"

# Acceptance: "Fixture fails when any helper behavior is wrong."
[failure_on_incorrect_behavior_contract]
case = "fixture_fails_on_any_helper_behavior_mismatch"
must_fail_on_incorrect_counter = true
must_fail_on_incorrect_defaultdict = true
must_fail_on_incorrect_chain = true
must_fail_on_incorrect_islice = true
must_fail_on_incorrect_lru_cache = true
must_fail_on_incorrect_partial = true
collections_helper_mismatch_failure_kind = "collections_helper_mismatch"
collections_helper_mismatch_exit_code = 89
itertools_helper_mismatch_failure_kind = "itertools_helper_mismatch"
itertools_helper_mismatch_exit_code = 90
functools_helper_mismatch_failure_kind = "functools_helper_mismatch"
functools_helper_mismatch_exit_code = 91
must_distinguish_each_helper_family = true

# Acceptance: "Failure output identifies the helper family."
[failure_naming_contract]
case = "failure_output_identifies_helper_family"
must_emit_helper_family_in_failure_output = true
helper_family_field_name = "helper_family"
allowed_helper_family_values = ["collections", "itertools", "functools"]
must_emit_helper_name_in_failure_output = true
helper_name_field_name = "helper"
forbid_generic_unnamed_helper_failure = true
unnamed_helper_failure_kind = "helper_failure_missing_family"
unnamed_helper_failure_exit_code = 92

# Acceptance: "Fixture remains fast enough for the ecosystem gate."
[performance_budget_contract]
case = "fixture_remains_fast_enough_for_ecosystem_gate"
must_run_in_ecosystem_profile = true
ecosystem_profile_fixture_issue = 2814
max_total_runtime_ms = 1000
max_per_helper_runtime_ms = 100
must_not_perform_network_io = true
must_not_perform_disk_io = true
forbid_sleep_calls = true
forbid_long_running_recursion_above_iteration_count = 10000
performance_budget_failure_kind = "helper_fixture_over_budget"
performance_budget_exit_code = 93

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "helper_family",
    "helper",
    "input_python_repr",
    "expected_python_repr",
    "actual_python_repr",
    "duration_ms",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_on_any_helper_behavior_mismatch",
    "failure_output_identifies_helper_family",
    "fixture_remains_fast_enough_for_ecosystem_gate",
]

[out_of_scope]
# Issue: "Out of scope: full iterator algebra compatibility."
full_iterator_algebra_compatibility = true
