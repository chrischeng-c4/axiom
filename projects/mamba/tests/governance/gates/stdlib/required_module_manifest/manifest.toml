# Required stdlib module manifest fixture — closes #2624.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the machine-readable manifest of required Py3.12 stdlib modules
# for the MVP ecosystem gate. Each required module declares its
# canonical name, its fixture id, required status, and the owning MVP
# objective. The gate validates that every required module has at
# least one fixture reference and reports optional modules separately:
#
#   - Missing fixture reference for a required stdlib module fails
#     validation.
#   - Optional modules are reported separately.
#   - Manifest is consumed by the ecosystem summary.
#
# Out of scope (issue body): implementing every module fixture in this
# issue.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_required_module_manifest_fixture_2624.rs).

version = 1
fixture = "stdlib_required_module_manifest"
issue = 2624
parent_issue = 2529
profile = "stdlib"
family = "stdlib_required_module_manifest"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

# The canonical machine-readable required-module list.
# Each entry MUST include name + fixture_issue + required +
# mvp_objective. Required entries point to their owning fixture issue
# under #2625 / #2626 / etc. (the smoke matrix + per-module behavioral
# fixtures sit downstream of this manifest).
[[modules]]
name = "json"
fixture_issue = 2628
required = true
mvp_objective = "ecosystem_stdlib_behavioral"

[[modules]]
name = "datetime"
fixture_issue = 2626
required = true
mvp_objective = "ecosystem_stdlib_behavioral"

[[modules]]
name = "pathlib"
fixture_issue = 2629
required = true
mvp_objective = "ecosystem_stdlib_behavioral"

[[modules]]
name = "logging"
fixture_issue = 2631
required = true
mvp_objective = "ecosystem_stdlib_behavioral"

[[modules]]
name = "argparse"
fixture_issue = 2639
required = true
mvp_objective = "ecosystem_stdlib_behavioral"

# Optional stdlib module — must be reported in the optional section
# rather than the required validation path.
[[modules]]
name = "turtle"
fixture_issue = 0
required = false
mvp_objective = "ecosystem_stdlib_optional"

# Acceptance: "Missing fixture reference for a required stdlib module
# fails validation."
[required_fixture_reference_contract]
case = "required_module_without_fixture_reference_fails_validation"
must_validate_every_required_module_has_fixture_reference = true
required_module_required_fields = [
    "name",
    "fixture_issue",
    "required",
    "mvp_objective",
]
missing_fixture_reference_failure_kind = "required_stdlib_module_missing_fixture_reference"
missing_fixture_reference_exit_code = 59
must_emit_module_name_in_diagnostic = true
must_emit_owning_mvp_objective_in_diagnostic = true
fixture_issue_zero_is_treated_as_missing_for_required = true

# Acceptance: "Optional modules are reported separately."
[optional_modules_reporting_contract]
case = "optional_modules_are_reported_separately"
must_separate_optional_from_required_in_report = true
must_not_fail_validation_for_optional_without_fixture = true
optional_report_record_format = "json"
optional_report_required_fields = [
    "name",
    "required",
    "fixture_issue",
    "mvp_objective",
]
missing_optional_section_failure_kind = "optional_section_missing_from_report"
missing_optional_section_exit_code = 60
must_distinguish_required_from_optional_validation_path = true

# Acceptance: "Manifest is consumed by the ecosystem summary."
[ecosystem_summary_consumption_contract]
case = "manifest_is_consumed_by_ecosystem_summary"
must_be_consumable_by_ecosystem_summary = true
must_emit_consumption_artifact = true
consumption_artifact_format = "json"
consumption_artifact_relative_path_within_repo = "projects/mamba/tests/governance/gates/stdlib/required_module_manifest/ecosystem_link.json"
consumption_artifact_required_fields = [
    "manifest_path",
    "schema_version",
    "checksum",
    "required_count",
    "optional_count",
]
must_be_stable_across_runs_on_identical_input = true
missing_consumption_artifact_failure_kind = "ecosystem_consumption_artifact_missing"
missing_consumption_artifact_exit_code = 61

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "fixture_issue",
    "required",
    "mvp_objective",
    "manifest_path",
    "schema_version",
    "checksum",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "required_module_without_fixture_reference_fails_validation",
    "optional_modules_are_reported_separately",
    "manifest_is_consumed_by_ecosystem_summary",
]

[out_of_scope]
# Issue: "Out of scope: implementing every module fixture in this issue."
implementing_every_module_fixture = true
