# Csv / pickle / tomllib stdlib behavioral fixture — closes #2635.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline data-serialization fixture covering
# the three serialization helpers Python projects most commonly use:
#   * csv (read + write) via in-memory io.StringIO
#   * pickle roundtrip via io.BytesIO (HIGHEST_PROTOCOL)
#   * tomllib parsing (Py3.12 stdlib) — explicit pass / xfail /
#     blocker on the current runtime.
#
# All inputs are tiny deterministic in-memory strings, no network or
# locale dependency:
#
#   - Fixture fails on wrong parsed or roundtripped data.
#   - tomllib behavior is explicitly pass, xfail, or blocker on the
#     current runtime.
#   - No network or locale dependency.
#
# Out of scope (issue body): binary protocol compatibility matrix.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_csv_pickle_tomllib_fixture_2635.rs).

version = 1
fixture = "stdlib_csv_pickle_tomllib_behavioral"
issue = 2635
parent_issue = 2529
profile = "stdlib"
family = "stdlib_csv_pickle_tomllib_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["csv", "pickle", "tomllib"]
must_be_importable_via_import_statement = true
must_cover_csv_reader = true
must_cover_csv_writer = true
must_cover_pickle_dumps = true
must_cover_pickle_loads = true
must_cover_tomllib_loads = true
must_use_in_memory_stringio_for_csv = true
must_use_in_memory_bytesio_for_pickle = true
must_use_in_memory_string_for_tomllib = true

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 32
sample_min_records = 4

# csv read.
[[csv_read_cases]]
input_text = "a,b,c\n1,2,3\n4,5,6\n"
expected_rows = [
    ["a", "b", "c"],
    ["1", "2", "3"],
    ["4", "5", "6"],
]

# csv write.
[[csv_write_cases]]
input_rows = [
    ["a", "b"],
    ["1", "2"],
]
expected_output_text = "a,b\r\n1,2\r\n"
line_terminator = "\r\n"

# pickle roundtrip.
[[pickle_roundtrip_cases]]
input_python_repr = "{'k': [1, 2, 3]}"
protocol = "HIGHEST_PROTOCOL"
must_match_after_loads = true

[[pickle_roundtrip_cases]]
input_python_repr = "(1, 2.5, 'three', True, None)"
protocol = "HIGHEST_PROTOCOL"
must_match_after_loads = true

# tomllib parse.
[[tomllib_parse_cases]]
input_text = "key = \"value\"\n[section]\nn = 42\n"
expected_python_repr = "{'key': 'value', 'section': {'n': 42}}"
runtime_outcome = "pass"

# Acceptance: "Fixture fails on wrong parsed or roundtripped data."
[failure_on_incorrect_behavior_contract]
case = "fixture_fails_on_wrong_parsed_or_roundtripped_data"
must_fail_on_incorrect_csv_read = true
must_fail_on_incorrect_csv_write = true
must_fail_on_incorrect_pickle_roundtrip = true
must_fail_on_incorrect_tomllib_parse = true
csv_read_mismatch_failure_kind = "csv_read_mismatch"
csv_read_mismatch_exit_code = 105
csv_write_mismatch_failure_kind = "csv_write_mismatch"
csv_write_mismatch_exit_code = 106
pickle_roundtrip_mismatch_failure_kind = "pickle_roundtrip_mismatch"
pickle_roundtrip_mismatch_exit_code = 107
tomllib_parse_mismatch_failure_kind = "tomllib_parse_mismatch"
tomllib_parse_mismatch_exit_code = 108
must_distinguish_each_serializer = true

# Acceptance: "tomllib behavior is explicitly pass, xfail, or blocker
# on the current runtime."
[tomllib_runtime_status_contract]
case = "tomllib_behavior_is_explicit_pass_xfail_or_blocker"
must_emit_explicit_runtime_status_for_tomllib = true
runtime_status_field_name = "runtime_outcome"
allowed_runtime_status_values = ["pass", "xfail", "blocker"]
must_link_blocker_to_issue = true
blocker_link_field_name = "blocker_issue"
forbid_silently_skipping_tomllib = true
forbid_falsely_passing_tomllib = true
implicit_tomllib_status_failure_kind = "tomllib_runtime_status_implicit_or_missing"
implicit_tomllib_status_exit_code = 109

# Acceptance: "No network or locale dependency."
[no_network_or_locale_contract]
case = "no_network_or_locale_dependency"
must_not_perform_network_io = true
must_not_consult_locale_setting = true
forbid_use_of_LC_ALL_or_LANG_environment_variables = true
forbid_locale_dependent_csv_dialect = true
must_pin_csv_dialect = true
pinned_csv_dialect_name = "excel"
must_use_utf8_for_text_streams = true
network_io_failure_kind = "csv_pickle_tomllib_network_io_used"
network_io_exit_code = 110
locale_dependency_failure_kind = "csv_pickle_tomllib_locale_dependency_used"
locale_dependency_exit_code = 111
must_distinguish_network_from_locale_dependency = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "csv_input_text",
    "csv_expected_rows",
    "csv_expected_output_text",
    "pickle_input_python_repr",
    "tomllib_input_text",
    "tomllib_expected_python_repr",
    "runtime_outcome",
    "blocker_issue",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "xfail", "blocker", "missing", "skip"]
case_values = [
    "fixture_fails_on_wrong_parsed_or_roundtripped_data",
    "tomllib_behavior_is_explicit_pass_xfail_or_blocker",
    "no_network_or_locale_dependency",
]

[out_of_scope]
# Issue: "Out of scope: binary protocol compatibility matrix."
binary_protocol_compatibility_matrix = true
