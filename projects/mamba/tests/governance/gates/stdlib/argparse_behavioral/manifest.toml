# Argparse stdlib behavioral fixture — closes #2639.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline argparse behavioral fixture
# required by CLI libraries and package tools. The fixture defines
# one canonical parser with a flag and a positional argument and
# exercises:
#   * Successful parse: positional + flag, asserting the resulting
#     namespace.
#   * Default flag: positional present, flag absent — asserts the
#     default value.
#   * Invalid args: error path must NOT call SystemExit on the host
#     process — runner intercepts via exit_on_error=False or
#     parse_known_args + try/except + ArgumentError.
#
# Output is deterministic and locale-independent — no LC_ALL/LANG
# influence, no locale-dependent prog/usage strings:
#
#   - Fixture fails if option parsing is wrong.
#   - Error path does not terminate the whole test process
#     unexpectedly.
#   - Output is deterministic and locale-independent.
#
# Out of scope (issue body): full help formatting compatibility.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_argparse_fixture_2639.rs).

version = 1
fixture = "stdlib_argparse_behavioral"
issue = 2639
parent_issue = 2529
profile = "stdlib"
family = "stdlib_argparse_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["argparse"]
must_be_importable_via_import_statement = true
must_register_argparse_in_stdlib_manifest = true
must_cover_argument_parser = true
must_cover_add_argument_flag = true
must_cover_add_argument_positional = true
must_cover_parse_args = true
must_cover_parse_args_error_path = true
import_statement = "import argparse"

# Canonical parser. One flag (--verbose store_true, default False)
# and one positional ("name", required).
[parser_definition]
prog = "mamba_2639"
description = "mamba 2639 argparse fixture"
flag_name = "--verbose"
flag_action = "store_true"
flag_default = false
positional_name = "name"
positional_required = true
exit_on_error = false

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 16
sample_min_records = 3

# Successful parse.
[[parse_success_cases]]
argv = ["alice", "--verbose"]
expected_name = "alice"
expected_verbose = true

[[parse_success_cases]]
argv = ["bob"]
expected_name = "bob"
expected_verbose = false

# Invalid args. Missing required positional + unknown flag. The
# runner must capture the error WITHOUT terminating the host
# process.
[[parse_failure_cases]]
argv = []
expected_error_kind = "missing_required_positional"
must_not_call_systemexit_on_host = true

[[parse_failure_cases]]
argv = ["alice", "--no-such-flag"]
expected_error_kind = "unknown_flag"
must_not_call_systemexit_on_host = true

# Acceptance: "Fixture fails if option parsing is wrong."
[failure_on_wrong_parsing_contract]
case = "fixture_fails_if_option_parsing_is_wrong"
must_fail_on_incorrect_namespace_value = true
must_fail_on_incorrect_flag_default = true
must_fail_on_incorrect_positional_value = true
must_fail_on_missing_expected_error = true
namespace_mismatch_failure_kind = "argparse_namespace_mismatch"
namespace_mismatch_exit_code = 126
flag_default_mismatch_failure_kind = "argparse_flag_default_mismatch"
flag_default_mismatch_exit_code = 127
positional_mismatch_failure_kind = "argparse_positional_mismatch"
positional_mismatch_exit_code = 128
missing_expected_error_failure_kind = "argparse_missing_expected_error"
missing_expected_error_exit_code = 129
must_distinguish_each_parsing_failure_kind = true

# Acceptance: "Error path does not terminate the whole test process
# unexpectedly."
[error_path_non_terminating_contract]
case = "error_path_does_not_terminate_host_process_unexpectedly"
must_use_exit_on_error_false_or_explicit_handler = true
forbid_uncaught_systemexit_during_parse_failure = true
forbid_calling_sys_exit_from_runner_on_argparse_error = true
host_process_terminated_failure_kind = "argparse_error_path_terminated_host_process"
host_process_terminated_exit_code = 130
must_report_error_via_failure_kind_not_via_exit = true

# Acceptance: "Output is deterministic and locale-independent."
[deterministic_locale_independent_output_contract]
case = "output_is_deterministic_and_locale_independent"
must_be_reproducible_across_runs = true
must_not_consult_locale_setting = true
forbid_use_of_LC_ALL_or_LANG_environment_variables = true
forbid_locale_dependent_prog_or_usage_string = true
must_pin_prog_name_explicitly = true
pinned_prog_name = "mamba_2639"
locale_dependency_failure_kind = "argparse_locale_dependency_used"
locale_dependency_exit_code = 131
nondeterministic_output_failure_kind = "argparse_nondeterministic_output"
nondeterministic_output_exit_code = 132
must_distinguish_locale_from_nondeterminism = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "argv",
    "expected_name",
    "expected_verbose",
    "expected_error_kind",
    "actual_error_kind",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_if_option_parsing_is_wrong",
    "error_path_does_not_terminate_host_process_unexpectedly",
    "output_is_deterministic_and_locale_independent",
]

[out_of_scope]
# Issue: "Out of scope: full help formatting compatibility."
full_help_formatting_compatibility = true
