# Dataclasses / typing stdlib behavioral fixture — closes #2633.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline behavioral fixture covering core
# dataclasses + typing behavior required by modern Python packages.
# The fixture defines one canonical dataclass with defaults and type
# annotations and asserts instance creation, field defaults, repr,
# equality, and typing.get_type_hints. typing behavior that depends
# on runtime introspection mamba does not yet support is marked
# xfail with a linked blocker so the gate does not silently regress:
#
#   - Fixture fails on wrong dataclass initialization or equality
#     behavior.
#   - Current unsupported typing behavior is marked with a linked
#     blocker if needed.
#   - Fixture is part of the ecosystem summary.
#
# Out of scope (issue body): exhaustive typing semantics.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_dataclasses_typing_fixture_2633.rs).

version = 1
fixture = "stdlib_dataclasses_typing_behavioral"
issue = 2633
parent_issue = 2529
profile = "stdlib"
family = "stdlib_dataclasses_typing_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["dataclasses", "typing"]
must_be_importable_via_import_statement = true
must_cover_dataclass_decorator = true
must_cover_field_with_default = true
must_cover_field_with_default_factory = true
must_cover_instance_creation = true
must_cover_repr = true
must_cover_equality = true
must_cover_get_type_hints_when_supported = true

# Canonical dataclass.
[dataclass_definition]
class_name = "Point"
field_a_name = "x"
field_a_type = "int"
field_a_default_python_repr = "0"
field_b_name = "y"
field_b_type = "int"
field_b_default_python_repr = "1"
field_c_name = "tags"
field_c_type = "list[str]"
field_c_default_factory_python_repr = "list"

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 32
sample_min_records = 4

# Instance creation + field defaults.
[[instance_creation_cases]]
call = "Point()"
expected_x = 0
expected_y = 1
expected_tags_python_repr = "[]"

[[instance_creation_cases]]
call = "Point(x=5, y=7, tags=['a', 'b'])"
expected_x = 5
expected_y = 7
expected_tags_python_repr = "['a', 'b']"

# Repr.
[[repr_cases]]
call = "Point()"
expected_repr = "Point(x=0, y=1, tags=[])"

# Equality.
[[equality_cases]]
left_call = "Point(x=1, y=2, tags=['k'])"
right_call = "Point(x=1, y=2, tags=['k'])"
expected_relation = "equal"

[[equality_cases]]
left_call = "Point(x=1, y=2, tags=['k'])"
right_call = "Point(x=1, y=3, tags=['k'])"
expected_relation = "not_equal"

# typing.get_type_hints — gated by the supported flag below.
[[get_type_hints_cases]]
target = "Point"
expected_hints_python_repr = "{'x': int, 'y': int, 'tags': list[str]}"
supported = true

# Acceptance: "Fixture fails on wrong dataclass initialization or
# equality behavior."
[failure_on_incorrect_behavior_contract]
case = "fixture_fails_on_wrong_initialization_or_equality"
must_fail_on_incorrect_instance_creation = true
must_fail_on_incorrect_field_defaults = true
must_fail_on_incorrect_repr = true
must_fail_on_incorrect_equality = true
initialization_mismatch_failure_kind = "dataclass_initialization_mismatch"
initialization_mismatch_exit_code = 94
field_defaults_mismatch_failure_kind = "dataclass_field_defaults_mismatch"
field_defaults_mismatch_exit_code = 95
repr_mismatch_failure_kind = "dataclass_repr_mismatch"
repr_mismatch_exit_code = 96
equality_mismatch_failure_kind = "dataclass_equality_mismatch"
equality_mismatch_exit_code = 97
must_distinguish_each_failure_kind = true

# Acceptance: "Current unsupported typing behavior is marked with a
# linked blocker if needed."
[unsupported_typing_blocker_contract]
case = "unsupported_typing_behavior_marked_with_linked_blocker"
must_mark_unsupported_typing_with_xfail = true
must_link_unsupported_typing_to_blocker_issue = true
blocker_link_field_name = "blocker_issue"
forbid_silently_skipping_unsupported_typing = true
forbid_falsely_passing_unsupported_typing = true
unsupported_typing_outcome_value = "xfail"
missing_blocker_link_failure_kind = "unsupported_typing_missing_blocker_link"
missing_blocker_link_exit_code = 98
allowed_unsupported_typing_paths = [
    "get_type_hints_string_forward_ref",
    "typing_protocol_runtime_checkable",
    "typing_paramspec_runtime",
]

# Acceptance: "Fixture is part of the ecosystem summary."
[ecosystem_summary_inclusion_contract]
case = "fixture_is_part_of_ecosystem_summary"
must_be_listed_in_ecosystem_summary = true
ecosystem_summary_fixture_issue = 2814
must_emit_summary_record = true
summary_record_format = "json"
summary_required_fields = [
    "fixture",
    "outcome",
    "duration_ms",
    "covered_modules",
    "case",
]
covered_modules_in_summary = ["dataclasses", "typing"]
missing_summary_record_failure_kind = "ecosystem_summary_missing_dataclasses_typing"
missing_summary_record_exit_code = 99

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "call",
    "expected_repr",
    "expected_relation",
    "expected_hints_python_repr",
    "blocker_issue",
    "covered_modules",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "xfail", "missing", "skip"]
case_values = [
    "fixture_fails_on_wrong_initialization_or_equality",
    "unsupported_typing_behavior_marked_with_linked_blocker",
    "fixture_is_part_of_ecosystem_summary",
]

[out_of_scope]
# Issue: "Out of scope: exhaustive typing semantics."
exhaustive_typing_semantics = true
