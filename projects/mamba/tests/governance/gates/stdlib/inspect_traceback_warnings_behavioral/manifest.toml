# Inspect / traceback / warnings stdlib behavioral fixture —
# closes #2640.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline introspection + diagnostics
# behavioral fixture covering the three helpers frameworks and
# test runners rely on:
#   * inspect.signature on a canonical function — asserts
#     parameter names, kinds, defaults, and the str(signature)
#     stable form.
#   * traceback formatting on a captured exception — asserts that
#     the failure exception type name and last-frame qualname
#     appear in the formatted output, AVOIDING line-number
#     brittleness.
#   * warnings.catch_warnings + simplefilter("always") on a tiny
#     warning emission — asserts the captured warning category,
#     message, and count.
#
#   - Fixture fails on wrong signature or warning capture
#     behavior.
#   - Traceback assertion avoids line-number brittleness where
#     possible.
#   - Runner reports diagnostics-module coverage.
#
# Out of scope (issue body): full frame introspection
# compatibility.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_inspect_traceback_warnings_fixture_2640.rs).

version = 1
fixture = "stdlib_inspect_traceback_warnings_behavioral"
issue = 2640
parent_issue = 2529
profile = "stdlib"
family = "stdlib_inspect_traceback_warnings_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["inspect", "traceback", "warnings"]
must_be_importable_via_import_statement = true
must_register_inspect_in_stdlib_manifest = true
must_register_traceback_in_stdlib_manifest = true
must_register_warnings_in_stdlib_manifest = true
must_cover_inspect_signature = true
must_cover_traceback_format_exception = true
must_cover_warnings_catch_warnings = true
must_cover_warnings_simplefilter_always = true
must_cover_warnings_warn = true

# Canonical function inspected. Two regular params, one defaulted
# kwarg.
[inspected_function_definition]
function_name = "mamba_2640_target"
param_a_name = "x"
param_a_kind = "POSITIONAL_OR_KEYWORD"
param_b_name = "y"
param_b_kind = "POSITIONAL_OR_KEYWORD"
param_b_default_python_repr = "0"
param_c_name = "label"
param_c_kind = "KEYWORD_ONLY"
param_c_default_python_repr = "'mamba'"
expected_signature_str = "(x, y=0, *, label='mamba')"

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 16
sample_min_records = 3

# inspect.signature.
[[signature_cases]]
target = "mamba_2640_target"
expected_param_names = ["x", "y", "label"]
expected_param_kinds = ["POSITIONAL_OR_KEYWORD", "POSITIONAL_OR_KEYWORD", "KEYWORD_ONLY"]
expected_signature_str = "(x, y=0, *, label='mamba')"

# traceback. Asserts substrings, NOT line numbers.
[[traceback_cases]]
raise_python_repr = "ValueError('mamba 2640 traceback')"
must_assert_exception_type_in_output = true
expected_exception_type_substring = "ValueError"
must_assert_last_frame_qualname_in_output = true
expected_last_frame_qualname_substring = "mamba_2640_target"
must_assert_exception_message_in_output = true
expected_exception_message_substring = "mamba 2640 traceback"
forbid_assertion_on_exact_line_number = true
allowed_brittleness_softening_strategies = [
    "substring_match",
    "regex_match",
    "normalize_line_numbers",
]

# warnings.
[[warnings_cases]]
warning_category = "UserWarning"
warning_message = "mamba 2640 warning"
filter = "always"
expected_warning_count = 1
expected_warning_category_name = "UserWarning"
expected_warning_message_substring = "mamba 2640 warning"

# Acceptance: "Fixture fails on wrong signature or warning capture
# behavior."
[failure_on_wrong_signature_or_warning_contract]
case = "fixture_fails_on_wrong_signature_or_warning_capture_behavior"
must_fail_on_incorrect_signature_str = true
must_fail_on_incorrect_param_names = true
must_fail_on_incorrect_param_kinds = true
must_fail_on_incorrect_warning_count = true
must_fail_on_incorrect_warning_category = true
must_fail_on_incorrect_warning_message = true
signature_mismatch_failure_kind = "inspect_signature_mismatch"
signature_mismatch_exit_code = 133
warning_capture_mismatch_failure_kind = "warnings_capture_mismatch"
warning_capture_mismatch_exit_code = 134
must_distinguish_signature_from_warning_failure = true

# Acceptance: "Traceback assertion avoids line-number brittleness
# where possible."
[traceback_avoids_line_number_brittleness_contract]
case = "traceback_assertion_avoids_line_number_brittleness"
must_assert_traceback_by_substring_or_qualname = true
forbid_assertion_on_exact_line_number = true
must_normalize_or_strip_line_numbers_when_compared = true
allowed_softening_strategies = [
    "substring_match",
    "regex_match",
    "normalize_line_numbers",
]
brittle_traceback_assertion_failure_kind = "traceback_assertion_brittle_to_line_numbers"
brittle_traceback_assertion_exit_code = 135

# Acceptance: "Runner reports diagnostics-module coverage."
[diagnostics_coverage_reporting_contract]
case = "runner_reports_diagnostics_module_coverage"
must_emit_diagnostics_coverage_in_runner_output = true
diagnostics_coverage_field_name = "diagnostics_modules_covered"
required_diagnostics_modules_covered = ["inspect", "traceback", "warnings"]
must_emit_summary_record_with_diagnostics_coverage = true
summary_record_format = "json"
missing_diagnostics_coverage_failure_kind = "diagnostics_coverage_missing"
missing_diagnostics_coverage_exit_code = 136

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "target",
    "expected_signature_str",
    "expected_param_names",
    "expected_param_kinds",
    "raise_python_repr",
    "warning_category",
    "warning_message",
    "expected_warning_count",
    "diagnostics_modules_covered",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_on_wrong_signature_or_warning_capture_behavior",
    "traceback_assertion_avoids_line_number_brittleness",
    "runner_reports_diagnostics_module_coverage",
]

[out_of_scope]
# Issue: "Out of scope: full frame introspection compatibility."
full_frame_introspection_compatibility = true
