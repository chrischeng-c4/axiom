# Stdlib import smoke matrix fixture — closes #2627.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the lightweight import smoke matrix that imports
# every required Py3.12 stdlib module from the required-module
# manifest (#2624) and reports per-module pass / fail / xfail / skip.
# Behavioral correctness is intentionally out of scope; each per-
# module behavioral fixture (e.g. #2626 datetime, #2628 json, ...)
# carries its own gate downstream of this matrix.
#
#   - Removing a required stdlib module from the import matrix fails
#     validation.
#   - Import failures name the exact module.
#   - The smoke summary includes stdlib import totals.
#
# Out of scope (issue body): behavioral correctness for each module.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_import_smoke_matrix_fixture_2627.rs).

version = 1
fixture = "stdlib_import_smoke_matrix"
issue = 2627
parent_issue = 2529
profile = "stdlib"
family = "stdlib_import_smoke_matrix"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

# Cross-reference to the required-module manifest fixture (#2624).
# The matrix derives the required-module set from that manifest; the
# guard below catches drift if a required module is removed without
# also being removed from #2624.
[required_module_manifest_cross_reference]
fixture_issue = 2624
must_consume_required_module_manifest = true
must_match_required_module_set_exactly = true
shared_required_modules = [
    "json",
    "datetime",
    "pathlib",
    "logging",
    "argparse",
]

# The matrix output record format. One record per attempted import.
[matrix_record]
record_format = "json"
record_required_fields = [
    "module_name",
    "outcome",
    "duration_ms",
    "error_message",
    "exit_code",
]
outcome_values = ["pass", "fail", "xfail", "skip"]
must_emit_one_record_per_required_module = true
must_emit_one_record_per_optional_module = true
must_distinguish_required_from_optional_in_record = true
required_flag_field_name = "required"

# The matrix must stay lightweight enough to live in the smoke profile.
[smoke_budget]
must_run_in_smoke_profile = true
smoke_profile_fixture_issue = 2527
max_total_runtime_ms = 5000
max_per_module_runtime_ms = 500
must_run_imports_in_isolated_subprocess_or_subinterpreter = true

# Acceptance: "Removing a required stdlib module from the import
# matrix fails validation."
[required_module_coverage_contract]
case = "removing_required_module_from_matrix_fails_validation"
must_compare_matrix_modules_to_required_module_manifest = true
must_fail_when_required_module_is_missing_from_matrix = true
missing_required_module_failure_kind = "required_stdlib_module_missing_from_import_matrix"
missing_required_module_exit_code = 67
must_emit_missing_module_name_in_diagnostic = true
must_emit_required_module_manifest_path_in_diagnostic = true

# Acceptance: "Import failures name the exact module."
[import_failure_naming_contract]
case = "import_failure_names_the_exact_module"
must_emit_module_name_on_import_failure = true
must_emit_python_exception_type_on_import_failure = true
must_emit_python_exception_message_on_import_failure = true
import_failure_record_required_fields = [
    "module_name",
    "exception_type",
    "exception_message",
    "outcome",
    "exit_code",
]
import_failure_failure_kind = "stdlib_module_import_failed"
import_failure_exit_code = 68
forbid_generic_unnamed_import_failure = true

# Acceptance: "The smoke summary includes stdlib import totals."
[smoke_summary_totals_contract]
case = "smoke_summary_includes_stdlib_import_totals"
must_emit_stdlib_import_totals_in_smoke_summary = true
totals_record_format = "json"
totals_required_fields = [
    "stdlib_import_total",
    "stdlib_import_pass",
    "stdlib_import_fail",
    "stdlib_import_xfail",
    "stdlib_import_skip",
]
must_be_consumable_by_smoke_summary_emitter = true
smoke_summary_fixture_issue = 2527
missing_stdlib_totals_failure_kind = "smoke_summary_missing_stdlib_import_totals"
missing_stdlib_totals_exit_code = 69

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "required",
    "duration_ms",
    "exception_type",
    "exception_message",
    "stdlib_import_total",
    "stdlib_import_pass",
    "stdlib_import_fail",
    "stdlib_import_xfail",
    "stdlib_import_skip",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "xfail", "skip", "missing"]
case_values = [
    "removing_required_module_from_matrix_fails_validation",
    "import_failure_names_the_exact_module",
    "smoke_summary_includes_stdlib_import_totals",
]

[out_of_scope]
# Issue: "Out of scope: behavioral correctness for each module."
behavioral_correctness_for_each_module = true
