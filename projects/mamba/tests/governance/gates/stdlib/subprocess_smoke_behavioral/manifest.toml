# Subprocess stdlib smoke fixture — closes #2641.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline subprocess smoke fixture covering
# the minimum surface tooling relies on, while keeping the default
# safe: shell=False, argv list passed directly, no untrusted input,
# no shell pipelines, no signal handling. The fixture invokes the
# current Python interpreter (sys.executable) with a deterministic
# -c snippet and asserts exit status, stdout, and stderr.
#
# Status is one of pass / xfail / blocker with a linked issue when
# the current runtime cannot run the smoke command:
#
#   - Fixture does not invoke shell with untrusted input.
#   - Unsupported behavior is visible as blocker, not silent skip.
#   - Runner records subprocess status separately.
#
# Out of scope (issue body): shell pipelines and signal handling.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_subprocess_smoke_fixture_2641.rs).

version = 1
fixture = "stdlib_subprocess_smoke_behavioral"
issue = 2641
parent_issue = 2529
profile = "stdlib"
family = "stdlib_subprocess_smoke_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["subprocess"]
must_be_importable_via_import_statement = true
must_register_subprocess_in_stdlib_manifest = true
must_cover_subprocess_run = true
must_cover_subprocess_capture_output = true
must_cover_subprocess_check_returncode = true
must_use_argv_list_form = true
must_pass_shell_equal_false = true
must_use_sys_executable_as_command = true

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 8
sample_min_records = 2

# Smoke command. Deterministic, no shell, no untrusted input.
# Prints exactly the canonical line to stdout and exits 0.
[[smoke_cases]]
argv = ["{sys.executable}", "-c", "import sys; sys.stdout.write('mamba 2641 smoke\\n'); sys.stderr.write(''); sys.exit(0)"]
shell = false
expected_returncode = 0
expected_stdout = "mamba 2641 smoke\n"
expected_stderr = ""
runtime_outcome = "pass"
timeout_seconds = 30

# Negative-stderr / non-zero exit. Used to lock the stderr capture
# path independently from stdout.
[[smoke_cases]]
argv = ["{sys.executable}", "-c", "import sys; sys.stderr.write('mamba 2641 error\\n'); sys.exit(3)"]
shell = false
expected_returncode = 3
expected_stdout = ""
expected_stderr = "mamba 2641 error\n"
runtime_outcome = "pass"
timeout_seconds = 30

# Acceptance: "Fixture does not invoke shell with untrusted input."
[no_shell_untrusted_input_contract]
case = "fixture_does_not_invoke_shell_with_untrusted_input"
must_set_shell_false = true
must_pass_argv_as_list_not_string = true
forbid_shell_equal_true = true
forbid_calling_subprocess_call_with_string_argv = true
forbid_string_interpolation_into_command = true
forbid_use_of_subprocess_getoutput = true
forbid_use_of_os_system = true
shell_used_failure_kind = "subprocess_shell_used"
shell_used_exit_code = 137
untrusted_input_failure_kind = "subprocess_untrusted_input_in_command"
untrusted_input_exit_code = 138
must_distinguish_shell_use_from_untrusted_input = true

# Acceptance: "Unsupported behavior is visible as blocker, not
# silent skip."
[unsupported_behavior_blocker_contract]
case = "unsupported_behavior_is_visible_as_blocker_not_silent_skip"
must_mark_unsupported_subprocess_behavior_with_blocker = true
must_link_blocker_to_issue = true
blocker_outcome_value = "blocker"
blocker_link_field_name = "blocker_issue"
forbid_silently_skipping_unsupported_subprocess_behavior = true
forbid_falsely_passing_unsupported_subprocess_behavior = true
missing_blocker_link_failure_kind = "subprocess_unsupported_missing_blocker_link"
missing_blocker_link_exit_code = 139
allowed_unsupported_subprocess_paths = [
    "subprocess_run_with_input_kwarg",
    "subprocess_popen_communicate_with_timeout",
    "subprocess_check_output_text_mode",
]

# Acceptance: "Runner records subprocess status separately."
[separate_status_recording_contract]
case = "runner_records_subprocess_status_separately"
must_record_subprocess_status_in_runner_output = true
status_field_name = "subprocess_status"
allowed_status_values = ["pass", "xfail", "blocker"]
must_emit_summary_record_with_subprocess_status = true
summary_record_format = "json"
forbid_silent_or_implicit_subprocess_status = true
missing_status_failure_kind = "subprocess_status_missing_or_implicit"
missing_status_exit_code = 140
must_distinguish_subprocess_status_from_overall_outcome = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "argv",
    "shell",
    "expected_returncode",
    "expected_stdout",
    "expected_stderr",
    "actual_returncode",
    "actual_stdout",
    "actual_stderr",
    "subprocess_status",
    "blocker_issue",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "xfail", "blocker", "missing", "skip"]
case_values = [
    "fixture_does_not_invoke_shell_with_untrusted_input",
    "unsupported_behavior_is_visible_as_blocker_not_silent_skip",
    "runner_records_subprocess_status_separately",
]

[out_of_scope]
# Issue: "Out of scope: shell pipelines and signal handling."
shell_pipelines = true
signal_handling = true
