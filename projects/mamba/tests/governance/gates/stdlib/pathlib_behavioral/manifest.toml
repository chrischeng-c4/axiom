# Pathlib stdlib behavioral fixture — closes #2629.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline pathlib behavioral fixture covering
# path-construction and joining behavior used by package tooling.
# Assertions are anchored on a deterministic sample of PurePath
# (or tempdir-backed Path) operations: joining, suffix, name,
# parent, and relative_to. Machine-specific absolute path
# expectations are intentionally avoided:
#
#   - Fixture fails on wrong path component behavior.
#   - Fixture avoids machine-specific absolute path expectations.
#   - Runner records pathlib under required stdlib coverage.
#
# Out of scope (issue body): platform-specific filesystem edge cases.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_pathlib_behavioral_fixture_2629.rs).

version = 1
fixture = "stdlib_pathlib_behavioral"
issue = 2629
parent_issue = 2529
profile = "stdlib"
family = "stdlib_pathlib_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
module_name = "pathlib"
must_be_importable_via_import_statement = true
import_statement = "import pathlib"
must_cover_purepath = true
must_cover_path_joining = true
must_cover_suffix = true
must_cover_name = true
must_cover_parent = true
must_cover_relative_to = true
must_allow_tempdir_backed_path = true

# Deterministic sample anchored on PurePosixPath so behavior is
# stable across host platforms.
[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 32
sample_min_records = 5
purepath_class_name = "PurePosixPath"

# Joining: PurePosixPath("a") / "b" / "c.txt" == "a/b/c.txt".
[[joining_cases]]
parts = ["a", "b", "c.txt"]
expected_joined_str = "a/b/c.txt"

[[joining_cases]]
parts = ["pkg", "sub", "mod.py"]
expected_joined_str = "pkg/sub/mod.py"

# Suffix.
[[suffix_cases]]
input_path = "a/b/c.txt"
expected_suffix = ".txt"

[[suffix_cases]]
input_path = "a/b/c.tar.gz"
expected_suffix = ".gz"

# Name.
[[name_cases]]
input_path = "a/b/c.txt"
expected_name = "c.txt"

[[name_cases]]
input_path = "pkg/sub/mod.py"
expected_name = "mod.py"

# Parent.
[[parent_cases]]
input_path = "a/b/c.txt"
expected_parent_str = "a/b"

# Relative_to.
[[relative_to_cases]]
input_path = "a/b/c.txt"
base_path = "a"
expected_relative_str = "b/c.txt"

# Acceptance: "Fixture fails on wrong path component behavior."
[failure_on_incorrect_behavior_contract]
case = "fixture_fails_on_wrong_path_component_behavior"
must_fail_on_incorrect_joining = true
must_fail_on_incorrect_suffix = true
must_fail_on_incorrect_name = true
must_fail_on_incorrect_parent = true
must_fail_on_incorrect_relative_to = true
joining_mismatch_failure_kind = "pathlib_joining_mismatch"
joining_mismatch_exit_code = 74
suffix_mismatch_failure_kind = "pathlib_suffix_mismatch"
suffix_mismatch_exit_code = 75
name_mismatch_failure_kind = "pathlib_name_mismatch"
name_mismatch_exit_code = 76
parent_mismatch_failure_kind = "pathlib_parent_mismatch"
parent_mismatch_exit_code = 77
relative_to_mismatch_failure_kind = "pathlib_relative_to_mismatch"
relative_to_mismatch_exit_code = 78
must_distinguish_each_component_mismatch = true

# Acceptance: "Fixture avoids machine-specific absolute path
# expectations."
[machine_agnostic_path_contract]
case = "fixture_avoids_machine_specific_absolute_path_expectations"
forbid_assertions_on_absolute_paths = true
forbid_assertions_on_user_home_paths = true
forbid_assertions_on_current_working_directory_paths = true
must_use_purepath_or_relative_paths_only = true
allowed_path_classes = ["PurePosixPath", "PurePath", "Path_under_tempdir"]
forbidden_assertion_patterns = [
    "starts_with_slash",
    "starts_with_drive_letter",
    "contains_home_dir",
    "contains_user_name",
    "contains_temp_dir_absolute_prefix",
]
machine_specific_assertion_failure_kind = "pathlib_machine_specific_absolute_path"
machine_specific_assertion_exit_code = 79

# Acceptance: "Runner records pathlib under required stdlib coverage."
[required_ecosystem_gate_contract]
case = "runner_records_pathlib_under_required_stdlib_coverage"
must_be_listed_in_required_module_manifest = true
required_module_manifest_fixture_issue = 2624
manifest_module_name = "pathlib"
must_be_required_in_manifest = true
must_run_in_default_ecosystem_profile = true
must_fail_default_profile_if_skipped = true
runner_must_record_module_name = "pathlib"
runner_coverage_field_name = "stdlib_required_module_covered"
skipped_in_required_profile_failure_kind = "required_stdlib_fixture_skipped"
skipped_in_required_profile_exit_code = 80

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "input_path",
    "expected_joined_str",
    "expected_suffix",
    "expected_name",
    "expected_parent_str",
    "expected_relative_str",
    "stdlib_required_module_covered",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_on_wrong_path_component_behavior",
    "fixture_avoids_machine_specific_absolute_path_expectations",
    "runner_records_pathlib_under_required_stdlib_coverage",
]

[out_of_scope]
# Issue: "Out of scope: platform-specific filesystem edge cases."
platform_specific_filesystem_edge_cases = true
