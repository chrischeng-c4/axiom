# Hashlib / hmac / secrets stdlib behavioral fixture — closes #2638.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline crypto-helper behavioral fixture
# covering the three helpers package indexes and auth libraries
# rely on:
#   * hashlib.sha256 on a fixed byte string — known digest is the
#     classic NIST "abc" vector.
#   * hmac.compare_digest — both an equal/equal and equal/unequal
#     case, asserting the constant-time semantic via boolean
#     outcome.
#   * secrets.token_bytes / secrets.token_hex — asserted by shape
#     only (length, alphabet), never exact value.
#
# All inputs are in-memory bytes, no /dev/urandom dependency in the
# manifest itself:
#
#   - Fixture fails on wrong digest or comparison result.
#   - Random output is tested only by shape or length, not exact
#     value.
#   - No external services are used.
#
# Out of scope (issue body): cryptographic performance or OpenSSL
# provider coverage.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_hashlib_hmac_secrets_fixture_2638.rs).

version = 1
fixture = "stdlib_hashlib_hmac_secrets_behavioral"
issue = 2638
parent_issue = 2529
profile = "stdlib"
family = "stdlib_hashlib_hmac_secrets_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["hashlib", "hmac", "secrets"]
must_be_importable_via_import_statement = true
must_register_hashlib_in_stdlib_manifest = true
must_register_hmac_in_stdlib_manifest = true
must_register_secrets_in_stdlib_manifest = true
must_cover_hashlib_sha256 = true
must_cover_hmac_compare_digest = true
must_cover_secrets_token_bytes = true
must_cover_secrets_token_hex = true

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 16
sample_min_records = 3

# hashlib.sha256. The "abc" digest is the classic NIST test vector;
# the empty digest is the well-known empty-input digest.
[[sha256_cases]]
input_bytes_python_repr = "b'abc'"
expected_hexdigest = "ba7816bf8f01cfea414140de5dae2223b00361a396177a9cb410ff61f20015ad"
expected_digest_len = 32

[[sha256_cases]]
input_bytes_python_repr = "b''"
expected_hexdigest = "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
expected_digest_len = 32

# hmac.compare_digest. Boolean outcome asserted; constant-time
# semantic is the runtime contract.
[[hmac_compare_digest_cases]]
left_bytes_python_repr = "b'\\x00\\x01\\x02\\x03'"
right_bytes_python_repr = "b'\\x00\\x01\\x02\\x03'"
expected_result = true

[[hmac_compare_digest_cases]]
left_bytes_python_repr = "b'\\x00\\x01\\x02\\x03'"
right_bytes_python_repr = "b'\\x00\\x01\\x02\\x04'"
expected_result = false

# secrets shape. Asserted by length + alphabet only; never asserts
# exact bytes.
[[secrets_shape_cases]]
helper = "token_bytes"
input_nbytes = 16
expected_output_type = "bytes"
expected_output_len = 16
must_assert_shape_only = true
forbid_assert_exact_value = true

[[secrets_shape_cases]]
helper = "token_hex"
input_nbytes = 16
expected_output_type = "str"
expected_output_len = 32
allowed_alphabet = "0123456789abcdef"
must_assert_shape_only = true
forbid_assert_exact_value = true

# Acceptance: "Fixture fails on wrong digest or comparison result."
[failure_on_wrong_digest_or_comparison_contract]
case = "fixture_fails_on_wrong_digest_or_comparison_result"
must_fail_on_incorrect_sha256_hexdigest = true
must_fail_on_incorrect_sha256_digest_length = true
must_fail_on_incorrect_hmac_compare_digest_result = true
sha256_digest_mismatch_failure_kind = "sha256_digest_mismatch"
sha256_digest_mismatch_exit_code = 122
hmac_compare_digest_mismatch_failure_kind = "hmac_compare_digest_mismatch"
hmac_compare_digest_mismatch_exit_code = 123
must_distinguish_sha256_from_hmac_failure = true

# Acceptance: "Random output is tested only by shape or length, not
# exact value."
[shape_only_random_contract]
case = "random_output_is_tested_only_by_shape_or_length"
must_assert_secrets_output_length_only = true
must_assert_secrets_output_type_only = true
must_assert_token_hex_alphabet_only = true
forbid_asserting_exact_secrets_token_value = true
forbid_pinning_pseudorandom_seed = true
exact_value_assertion_failure_kind = "secrets_exact_value_asserted"
exact_value_assertion_exit_code = 124
must_distinguish_shape_only_violation_from_other_failures = true

# Acceptance: "No external services are used."
[no_external_services_contract]
case = "no_external_services_are_used"
must_not_perform_network_io = true
must_not_use_external_random_provider_endpoint = true
forbid_use_of_socket_connect = true
forbid_use_of_external_kms_or_hsm = true
forbid_calling_openssl_engine = true
external_service_use_failure_kind = "hashlib_hmac_secrets_external_service_used"
external_service_use_exit_code = 125

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "input_bytes_python_repr",
    "expected_hexdigest",
    "expected_digest_len",
    "left_bytes_python_repr",
    "right_bytes_python_repr",
    "expected_result",
    "helper",
    "input_nbytes",
    "expected_output_type",
    "expected_output_len",
    "allowed_alphabet",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_on_wrong_digest_or_comparison_result",
    "random_output_is_tested_only_by_shape_or_length",
    "no_external_services_are_used",
]

[out_of_scope]
# Issue: "Out of scope: cryptographic performance or OpenSSL provider
# coverage."
cryptographic_performance = true
openssl_provider_coverage = true
