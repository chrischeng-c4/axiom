# Urllib.parse / email stdlib behavioral fixture — closes #2637.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline urllib.parse + email behavioral
# fixture covering URL and email parsing behavior used by web and
# packaging libraries. The fixture exercises:
#   * urllib.parse.urlparse on a fixed URL and asserts every
#     component (scheme, netloc, path, query, fragment).
#   * urllib.parse.urlencode on a deterministic mapping with stable
#     ordering.
#   * email.message.EmailMessage construction with headers and a
#     plain-text payload, asserting both header and payload behavior.
#
# All inputs are in-memory strings — no network, no MTA, no DNS:
#
#   - Fixture fails on wrong URL component parsing.
#   - Fixture fails on wrong email header or payload behavior.
#   - No network I/O is used.
#
# Out of scope (issue body): HTTP client behavior.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_urllib_parse_email_fixture_2637.rs).

version = 1
fixture = "stdlib_urllib_parse_email_behavioral"
issue = 2637
parent_issue = 2529
profile = "stdlib"
family = "stdlib_urllib_parse_email_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["urllib.parse", "email", "email.message"]
must_be_importable_via_import_statement = true
must_register_urllib_parse_in_stdlib_manifest = true
must_register_email_in_stdlib_manifest = true
must_cover_urllib_parse_urlparse = true
must_cover_urllib_parse_urlencode = true
must_cover_email_message_emailmessage = true
must_cover_email_set_header = true
must_cover_email_get_header = true
must_cover_email_set_content = true
must_cover_email_get_content = true
urllib_parse_import_statement = "from urllib.parse import urlparse, urlencode"
email_import_statement = "from email.message import EmailMessage"

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 32
sample_min_records = 3

# URL parsing. Each case fixes the input URL and every expected
# component so a wrong component immediately fails.
[[urlparse_cases]]
input_url = "https://user:pw@example.test:8443/a/b/c?x=1&y=2#frag"
expected_scheme = "https"
expected_netloc = "user:pw@example.test:8443"
expected_hostname = "example.test"
expected_port = 8443
expected_username = "user"
expected_password = "pw"
expected_path = "/a/b/c"
expected_query = "x=1&y=2"
expected_fragment = "frag"

[[urlparse_cases]]
input_url = "https://pkg.example.test/simple/"
expected_scheme = "https"
expected_netloc = "pkg.example.test"
expected_hostname = "pkg.example.test"
expected_path = "/simple/"
expected_query = ""
expected_fragment = ""

# URL encoding. Stable ordering preserves the input mapping order.
[[urlencode_cases]]
input_pairs = [
    ["name", "Ada Lovelace"],
    ["lang", "py"],
]
expected_output = "name=Ada+Lovelace&lang=py"

# Email message. Plain-text payload + From/To/Subject headers, all
# in-memory, no MTA.
[[email_message_cases]]
header_from = "ada@example.test"
header_to = "babbage@example.test"
header_subject = "mamba 2637 fixture"
content_type = "text/plain"
charset = "utf-8"
payload_text = "hello mamba 2637\n"
expected_get_content_value = "hello mamba 2637\n"
expected_get_content_type_value = "text/plain"
must_assert_header_from = true
must_assert_header_to = true
must_assert_header_subject = true
must_assert_get_content = true
must_assert_get_content_type = true

# Acceptance: "Fixture fails on wrong URL component parsing."
[failure_on_wrong_url_component_contract]
case = "fixture_fails_on_wrong_url_component_parsing"
must_fail_on_incorrect_scheme = true
must_fail_on_incorrect_netloc = true
must_fail_on_incorrect_hostname = true
must_fail_on_incorrect_port = true
must_fail_on_incorrect_path = true
must_fail_on_incorrect_query = true
must_fail_on_incorrect_fragment = true
must_fail_on_incorrect_urlencode_output = true
url_component_mismatch_failure_kind = "urlparse_component_mismatch"
url_component_mismatch_exit_code = 116
urlencode_mismatch_failure_kind = "urlencode_output_mismatch"
urlencode_mismatch_exit_code = 117
must_distinguish_urlparse_from_urlencode = true

# Acceptance: "Fixture fails on wrong email header or payload
# behavior."
[failure_on_wrong_email_behavior_contract]
case = "fixture_fails_on_wrong_email_header_or_payload_behavior"
must_fail_on_incorrect_header_from = true
must_fail_on_incorrect_header_to = true
must_fail_on_incorrect_header_subject = true
must_fail_on_incorrect_payload_text = true
must_fail_on_incorrect_content_type = true
email_header_mismatch_failure_kind = "email_header_mismatch"
email_header_mismatch_exit_code = 118
email_payload_mismatch_failure_kind = "email_payload_mismatch"
email_payload_mismatch_exit_code = 119
email_content_type_mismatch_failure_kind = "email_content_type_mismatch"
email_content_type_mismatch_exit_code = 120
must_distinguish_email_header_from_payload_from_content_type = true

# Acceptance: "No network I/O is used."
[no_network_io_contract]
case = "no_network_io_is_used"
must_not_perform_network_io = true
must_not_perform_smtp = true
must_not_perform_dns_resolution = true
forbid_connect_to_mta_host = true
forbid_use_of_socket_connect = true
network_io_failure_kind = "urllib_email_network_io_used"
network_io_exit_code = 121

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "input_url",
    "expected_scheme",
    "expected_netloc",
    "expected_path",
    "input_pairs",
    "expected_output",
    "header_from",
    "header_to",
    "header_subject",
    "payload_text",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_on_wrong_url_component_parsing",
    "fixture_fails_on_wrong_email_header_or_payload_behavior",
    "no_network_io_is_used",
]

[out_of_scope]
# Issue: "Out of scope: HTTP client behavior."
http_client_behavior = true
