# Tempfile / shutil / glob stdlib behavioral fixture — closes #2630.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline tempdir-backed fixture covering the
# deterministic filesystem helpers commonly used by package and test
# tooling: tempfile.mkdtemp + TemporaryDirectory, shutil.copy +
# shutil.rmtree, and glob.glob (pattern matching). All filesystem
# state is contained inside the per-fixture tempdir so the run is
# safe on any host:
#
#   - Fixture uses only test temp directories.
#   - Fixture fails on wrong glob or copy behavior.
#   - Cleanup does not depend on user filesystem state.
#
# Out of scope (issue body): platform-specific permission behavior.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_tempfile_shutil_glob_fixture_2630.rs).

version = 1
fixture = "stdlib_tempfile_shutil_glob_behavioral"
issue = 2630
parent_issue = 2529
profile = "stdlib"
family = "stdlib_tempfile_shutil_glob_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["tempfile", "shutil", "glob"]
must_be_importable_via_import_statement = true
must_cover_tempfile_temporary_directory = true
must_cover_tempfile_mkdtemp = true
must_cover_shutil_copy = true
must_cover_shutil_rmtree = true
must_cover_glob_glob = true
must_cover_file_creation = true
must_cover_cleanup = true

# Deterministic helper sample. Each case operates inside an isolated
# tempdir so on-disk state is reproducible and host-independent.
[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 32
sample_min_records = 4
must_isolate_each_case_in_its_own_tempdir = true

[[file_creation_cases]]
relative_path = "a.txt"
contents = "alpha"
expected_exists_after_create = true

[[copy_cases]]
source_relative_path = "a.txt"
destination_relative_path = "copy_of_a.txt"
expected_destination_exists = true
expected_destination_contents = "alpha"

[[glob_cases]]
pattern = "*.txt"
created_relative_paths = ["a.txt", "b.txt", "c.md"]
expected_match_relative_paths = ["a.txt", "b.txt"]
must_sort_match_results = true

[[cleanup_cases]]
relative_paths_to_remove = ["a.txt", "copy_of_a.txt", "b.txt", "c.md"]
expected_tempdir_is_empty_after_rmtree = true

# Acceptance: "Fixture uses only test temp directories."
[temp_only_filesystem_contract]
case = "fixture_uses_only_test_temp_directories"
must_root_all_writes_under_a_per_run_tempdir = true
must_use_tempfile_temporary_directory_or_mkdtemp = true
forbid_writes_outside_per_run_tempdir = true
forbid_reads_outside_per_run_tempdir = true
forbid_assertions_on_absolute_tempdir_path = true
tempdir_prefix_must_be_deterministic = true
tempdir_prefix_value = "mamba_stdlib_2630_"
write_outside_tempdir_failure_kind = "tempfile_write_escaped_tempdir"
write_outside_tempdir_exit_code = 81

# Acceptance: "Fixture fails on wrong glob or copy behavior."
[failure_on_incorrect_behavior_contract]
case = "fixture_fails_on_wrong_glob_or_copy_behavior"
must_fail_on_incorrect_glob_match = true
must_fail_on_incorrect_copy_contents = true
must_fail_on_incorrect_copy_destination_existence = true
glob_mismatch_failure_kind = "glob_match_set_mismatch"
glob_mismatch_exit_code = 82
copy_mismatch_failure_kind = "shutil_copy_mismatch"
copy_mismatch_exit_code = 83
must_distinguish_glob_from_copy_mismatch = true

# Acceptance: "Cleanup does not depend on user filesystem state."
[cleanup_independence_contract]
case = "cleanup_does_not_depend_on_user_filesystem_state"
must_clean_up_inside_per_run_tempdir_only = true
must_succeed_without_pre_existing_user_files = true
must_succeed_without_pre_existing_user_directories = true
must_remove_per_run_tempdir_on_completion = true
forbid_calls_to_user_home_paths = true
forbid_calls_to_current_working_directory_paths = true
forbid_environment_dependent_paths = true
forbidden_environment_variables = [
    "HOME",
    "USERPROFILE",
    "TMPDIR_FROM_USER_SHELL_PROFILE",
]
cleanup_dependency_failure_kind = "cleanup_depended_on_user_filesystem"
cleanup_dependency_exit_code = 84

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "relative_path",
    "source_relative_path",
    "destination_relative_path",
    "pattern",
    "expected_match_relative_paths",
    "actual_match_relative_paths",
    "tempdir_prefix",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_uses_only_test_temp_directories",
    "fixture_fails_on_wrong_glob_or_copy_behavior",
    "cleanup_does_not_depend_on_user_filesystem_state",
]

[out_of_scope]
# Issue: "Out of scope: platform-specific permission behavior."
platform_specific_permission_behavior = true
