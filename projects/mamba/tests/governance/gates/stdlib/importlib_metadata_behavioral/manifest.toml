# Importlib / importlib.metadata stdlib behavioral fixture —
# closes #2634.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline importlib + importlib.metadata
# behavioral fixture covering the core surface package tooling
# relies on: dynamic import-by-name and one deterministic metadata
# lookup or graceful PackageNotFoundError path. Installed-
# distribution coverage is intentionally out of scope:
#
#   - Fixture fails when dynamic import by name is broken.
#   - Metadata not-found behavior is deterministic.
#   - Failure output distinguishes importlib from metadata behavior.
#
# Out of scope (issue body): full installed-distribution metadata
# coverage.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_importlib_metadata_fixture_2634.rs).

version = 1
fixture = "stdlib_importlib_metadata_behavioral"
issue = 2634
parent_issue = 2529
profile = "stdlib"
family = "stdlib_importlib_metadata_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
covered_modules = ["importlib", "importlib.metadata"]
must_be_importable_via_import_statement = true
import_statement = "import importlib"
metadata_import_statement = "from importlib import metadata as importlib_metadata"
must_cover_importlib_import_module = true
must_cover_importlib_metadata_lookup = true
must_cover_metadata_packagenotfounderror_path = true
must_cover_module_object_has_attribute_after_import = true

[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 32
sample_min_records = 3

# Dynamic import-by-name. Each case must resolve via
# importlib.import_module + assert one well-known attribute on the
# returned module so a real import (not a stub) actually happened.
[[import_by_name_cases]]
target_module_name = "json"
expected_module_attribute = "loads"

[[import_by_name_cases]]
target_module_name = "datetime"
expected_module_attribute = "datetime"

# Metadata not-found. A package name that is guaranteed to not be
# installed must raise importlib.metadata.PackageNotFoundError —
# deterministically, without a network round-trip.
[[metadata_not_found_cases]]
target_package_name = "mamba_stdlib_2634_definitely_not_installed_pkg"
expected_exception_type = "PackageNotFoundError"
must_not_perform_network_io = true

# Acceptance: "Fixture fails when dynamic import by name is broken."
[failure_on_broken_dynamic_import_contract]
case = "fixture_fails_when_dynamic_import_by_name_is_broken"
must_fail_when_import_module_returns_none = true
must_fail_when_import_module_raises_unexpected_exception = true
must_fail_when_imported_module_missing_expected_attribute = true
must_call_importlib_import_module_explicitly = true
forbid_use_of_top_level_import_statement_for_dynamic_path = true
dynamic_import_failure_kind = "importlib_dynamic_import_failed"
dynamic_import_exit_code = 100
unexpected_exception_failure_kind = "importlib_dynamic_import_unexpected_exception"
unexpected_exception_exit_code = 101
missing_attribute_failure_kind = "importlib_dynamic_import_missing_attribute"
missing_attribute_exit_code = 102
must_distinguish_each_dynamic_import_failure_mode = true

# Acceptance: "Metadata not-found behavior is deterministic."
[deterministic_not_found_contract]
case = "metadata_not_found_behavior_is_deterministic"
must_raise_packagenotfounderror_for_unknown_package = true
must_not_perform_network_io_on_not_found = true
must_not_consult_user_site_packages_for_not_found = true
must_be_reproducible_across_runs = true
not_found_exception_type_field_name = "exception_type"
not_found_exception_type_value = "PackageNotFoundError"
forbid_silent_fallback_to_none = true
nondeterministic_not_found_failure_kind = "metadata_not_found_nondeterministic"
nondeterministic_not_found_exit_code = 103

# Acceptance: "Failure output distinguishes importlib from metadata
# behavior."
[failure_kind_separation_contract]
case = "failure_output_distinguishes_importlib_from_metadata"
must_emit_subject_module_in_failure_output = true
subject_module_field_name = "subject_module"
allowed_subject_module_values = ["importlib", "importlib.metadata"]
must_distinguish_importlib_failure_kinds_from_metadata_failure_kinds = true
forbid_shared_failure_kind_across_subjects = true
mixed_subject_failure_kind = "import_failure_subject_module_mixed"
mixed_subject_exit_code = 104

[runner_contract]
keys = [
    "outcome",
    "case",
    "subject_module",
    "target_module_name",
    "target_package_name",
    "expected_module_attribute",
    "expected_exception_type",
    "actual_exception_type",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_when_dynamic_import_by_name_is_broken",
    "metadata_not_found_behavior_is_deterministic",
    "failure_output_distinguishes_importlib_from_metadata",
]

[out_of_scope]
# Issue: "Out of scope: full installed-distribution metadata coverage."
full_installed_distribution_metadata_coverage = true
