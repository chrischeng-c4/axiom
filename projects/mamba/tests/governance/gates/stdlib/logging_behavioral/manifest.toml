# Logging stdlib behavioral fixture — closes #2631.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline logging behavioral fixture covering
# core logger / handler / formatter behavior commonly used by
# applications and third-party packages. The fixture creates a fresh
# logger per case, attaches an in-memory StreamHandler, captures the
# emitted records, asserts level filtering + formatting, and tears
# everything down — so no global logging state can leak across runs:
#
#   - Fixture fails when level filtering or formatting is wrong.
#   - No global logging state leaks across tests.
#   - Fixture output is deterministic.
#
# Out of scope (issue body): multiprocessing or file logging.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_logging_behavioral_fixture_2631.rs).

version = 1
fixture = "stdlib_logging_behavioral"
issue = 2631
parent_issue = 2529
profile = "stdlib"
family = "stdlib_logging_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
module_name = "logging"
must_be_importable_via_import_statement = true
import_statement = "import logging"
must_cover_get_logger = true
must_cover_set_level = true
must_cover_stream_handler = true
must_cover_formatter = true
must_cover_level_filtering = true
must_cover_message_formatting = true
must_cover_handler_emit = true
must_capture_output_via_in_memory_stream = true
in_memory_stream_class_name = "io.StringIO"

# Deterministic sample: each case constructs a fresh per-case logger
# and StringIO sink so output is byte-for-byte stable.
[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 32
sample_min_records = 4
logger_name_prefix_value = "mamba_stdlib_2631."
formatter_format_string = "%(levelname)s:%(name)s:%(message)s"
must_use_isolated_logger_per_case = true

# Level filtering: messages below logger level must be dropped.
[[level_filtering_cases]]
logger_level = "INFO"
log_call_level = "DEBUG"
message = "hidden"
expected_captured_messages = []

[[level_filtering_cases]]
logger_level = "INFO"
log_call_level = "INFO"
message = "visible"
expected_captured_messages = ["INFO:case:visible"]

[[level_filtering_cases]]
logger_level = "WARNING"
log_call_level = "ERROR"
message = "err"
expected_captured_messages = ["ERROR:case:err"]

# Formatting: format string applied to a single record.
[[formatting_cases]]
logger_level = "DEBUG"
log_call_level = "WARNING"
message = "boom"
formatter_format_string = "%(levelname)s:%(name)s:%(message)s"
expected_formatted_line = "WARNING:case:boom"

[[formatting_cases]]
logger_level = "DEBUG"
log_call_level = "INFO"
message = "hi"
formatter_format_string = "[%(levelname)s] %(message)s"
expected_formatted_line = "[INFO] hi"

# Acceptance: "Fixture fails when level filtering or formatting is
# wrong."
[failure_on_incorrect_behavior_contract]
case = "fixture_fails_on_wrong_level_filtering_or_formatting"
must_fail_on_incorrect_level_filtering = true
must_fail_on_incorrect_formatting = true
level_filtering_mismatch_failure_kind = "logging_level_filtering_mismatch"
level_filtering_mismatch_exit_code = 85
formatting_mismatch_failure_kind = "logging_formatting_mismatch"
formatting_mismatch_exit_code = 86
must_distinguish_level_filtering_from_formatting = true

# Acceptance: "No global logging state leaks across tests."
[no_global_state_leak_contract]
case = "no_global_logging_state_leaks_across_tests"
must_use_isolated_logger_per_case = true
must_create_logger_with_unique_per_case_name = true
must_remove_handler_after_case = true
must_close_handler_after_case = true
must_clear_logger_handlers_after_case = true
forbid_use_of_root_logger_directly = true
forbid_basic_config_calls = true
must_not_mutate_global_logging_module_state = true
forbidden_global_mutations = [
    "logging.basicConfig",
    "logging.disable",
    "logging.lastResort_replacement",
    "logging.captureWarnings_toggle",
]
global_state_leak_failure_kind = "logging_global_state_leaked"
global_state_leak_exit_code = 87

# Acceptance: "Fixture output is deterministic."
[deterministic_output_contract]
case = "fixture_output_is_deterministic"
must_strip_timestamps_from_compared_output = true
must_strip_process_and_thread_ids_from_compared_output = true
must_compare_exact_bytes_after_stripping = true
forbid_assertion_on_asctime = true
forbid_assertion_on_process_id = true
forbid_assertion_on_thread_id = true
forbid_assertion_on_module_path = true
nondeterministic_output_failure_kind = "logging_nondeterministic_output"
nondeterministic_output_exit_code = 88

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "logger_name",
    "logger_level",
    "log_call_level",
    "message",
    "formatter_format_string",
    "expected_formatted_line",
    "expected_captured_messages",
    "actual_captured_messages",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_on_wrong_level_filtering_or_formatting",
    "no_global_logging_state_leaks_across_tests",
    "fixture_output_is_deterministic",
]

[out_of_scope]
# Issue: "Out of scope: multiprocessing or file logging."
multiprocessing_or_file_logging = true
