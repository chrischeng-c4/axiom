# Json stdlib behavioral fixture — closes #2628.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline json behavioral fixture covering the
# core json.dumps / json.loads surface used by ecosystem packages.
# Assertions are anchored on a deterministic sample of roundtrips
# touching dict, list, string escaping, numeric, boolean, and null:
#
#   - Fixture fails on wrong roundtrip or escaping behavior.
#   - Fixture is part of the required ecosystem gate.
#   - Failure output names json as the module.
#
# Out of scope (issue body): full JSON compliance suite.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_json_behavioral_fixture_2628.rs).

version = 1
fixture = "stdlib_json_behavioral"
issue = 2628
parent_issue = 2529
profile = "stdlib"
family = "stdlib_json_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
module_name = "json"
must_be_importable_via_import_statement = true
import_statement = "import json"
must_cover_dumps = true
must_cover_loads = true
must_cover_dict = true
must_cover_list = true
must_cover_string_escaping = true
must_cover_numeric = true
must_cover_boolean = true
must_cover_null = true

# Deterministic roundtrip sample. Each case asserts json.loads(
# json.dumps(value)) == value AND that json.dumps(value) is byte-for-
# byte stable under the locked serialization options.
[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 32
sample_min_records = 6

# Dict roundtrip.
[[roundtrip_cases]]
kind = "dict"
input_python_repr = "{\"k\": 1}"
expected_dumps = "{\"k\": 1}"

# List roundtrip.
[[roundtrip_cases]]
kind = "list"
input_python_repr = "[1, 2, 3]"
expected_dumps = "[1, 2, 3]"

# Numeric (int + float).
[[roundtrip_cases]]
kind = "numeric"
input_python_repr = "[0, -1, 2147483648, 3.5]"
expected_dumps = "[0, -1, 2147483648, 3.5]"

# Boolean.
[[roundtrip_cases]]
kind = "boolean"
input_python_repr = "[true, false]"
expected_dumps = "[true, false]"

# Null.
[[roundtrip_cases]]
kind = "null"
input_python_repr = "null"
expected_dumps = "null"

# String escaping. Backslash, quote, newline, tab, and a non-ASCII
# code point that must escape as \\uXXXX when ensure_ascii=true.
[[escaping_cases]]
input_python_string = "a\\b\"c\nd\teé"
ensure_ascii = true
expected_dumps = "\"a\\\\b\\\"c\\nd\\te\\u00e9\""

[[escaping_cases]]
input_python_string = "ascii-only"
ensure_ascii = true
expected_dumps = "\"ascii-only\""

# Acceptance: "Fixture fails on wrong roundtrip or escaping behavior."
[failure_on_incorrect_behavior_contract]
case = "fixture_fails_on_wrong_roundtrip_or_escaping"
must_fail_on_incorrect_roundtrip = true
must_fail_on_incorrect_escaping = true
roundtrip_mismatch_failure_kind = "json_roundtrip_mismatch"
roundtrip_mismatch_exit_code = 70
escaping_mismatch_failure_kind = "json_escaping_mismatch"
escaping_mismatch_exit_code = 71
must_distinguish_roundtrip_from_escaping = true

# Acceptance: "Fixture is part of the required ecosystem gate."
[required_ecosystem_gate_contract]
case = "fixture_is_part_of_required_ecosystem_gate"
must_be_listed_in_required_module_manifest = true
required_module_manifest_fixture_issue = 2624
manifest_module_name = "json"
must_be_required_in_manifest = true
must_run_in_default_ecosystem_profile = true
must_fail_default_profile_if_skipped = true
skipped_in_required_profile_failure_kind = "required_stdlib_fixture_skipped"
skipped_in_required_profile_exit_code = 72

# Acceptance: "Failure output names json as the module."
[failure_naming_contract]
case = "failure_output_names_json_as_the_module"
must_emit_module_name_in_failure_output = true
module_name_field_name = "module_name"
module_name_value = "json"
forbid_generic_unnamed_json_failure = true
unnamed_failure_failure_kind = "json_failure_missing_module_name"
unnamed_failure_exit_code = 73

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "roundtrip_kind",
    "input_python_repr",
    "expected_dumps",
    "actual_dumps",
    "ensure_ascii",
    "input_python_string",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_on_wrong_roundtrip_or_escaping",
    "fixture_is_part_of_required_ecosystem_gate",
    "failure_output_names_json_as_the_module",
]

[out_of_scope]
# Issue: "Out of scope: full JSON compliance suite."
full_json_compliance_suite = true
