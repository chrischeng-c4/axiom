# Datetime stdlib behavioral fixture — closes #2626.
# Parent: #2529 (Py3.12 ecosystem MVP gate).
#
# Pins the shape of the offline datetime behavioral fixture that
# covers the core date / datetime / timedelta / isoformat surface
# common Python libraries lean on. Arithmetic + comparison are
# asserted on a small deterministic sample; timezone / locale
# sensitive paths are excluded unless deterministic:
#
#   - Fixture fails on incorrect arithmetic or formatting.
#   - Fixture is part of the required ecosystem gate.
#   - Timezone or locale-sensitive behavior is avoided unless
#     deterministic.
#
# Out of scope (issue body): full timezone database compatibility.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/stdlib_datetime_behavioral_fixture_2626.rs).

version = 1
fixture = "stdlib_datetime_behavioral"
issue = 2626
parent_issue = 2529
profile = "stdlib"
family = "stdlib_datetime_behavioral"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
module_name = "datetime"
must_be_importable_via_import_statement = true
import_statement = "import datetime"
must_cover_date = true
must_cover_datetime = true
must_cover_timedelta = true
must_cover_isoformat_parse = true
must_cover_isoformat_format = true

# Deterministic sample for arithmetic + comparison + isoformat.
[deterministic_sample]
must_be_deterministic = true
must_be_small_enough_for_per_run_check = true
sample_max_records = 32
sample_min_records = 4

[[arithmetic_cases]]
left = "2020-01-01"
delta_days = 31
expected_right = "2020-02-01"
operator = "add_timedelta_days"

[[arithmetic_cases]]
left = "2024-02-29"
delta_days = 1
expected_right = "2024-03-01"
operator = "add_timedelta_days"

[[comparison_cases]]
left = "2020-01-01T00:00:00"
right = "2020-01-01T00:00:01"
expected_relation = "less_than"

[[comparison_cases]]
left = "2020-01-01T00:00:00"
right = "2020-01-01T00:00:00"
expected_relation = "equal"

[[isoformat_cases]]
input = "2020-01-01T12:34:56"
expected_year = 2020
expected_month = 1
expected_day = 1
expected_hour = 12
expected_minute = 34
expected_second = 56

[[isoformat_cases]]
input = "1999-12-31T23:59:59"
expected_year = 1999
expected_month = 12
expected_day = 31
expected_hour = 23
expected_minute = 59
expected_second = 59

# Acceptance: "Fixture fails on incorrect arithmetic or formatting."
[failure_on_incorrect_behavior_contract]
case = "fixture_fails_on_incorrect_arithmetic_or_formatting"
must_fail_on_incorrect_arithmetic = true
must_fail_on_incorrect_comparison = true
must_fail_on_incorrect_isoformat_parse = true
must_fail_on_incorrect_isoformat_format = true
arithmetic_mismatch_failure_kind = "datetime_arithmetic_mismatch"
arithmetic_mismatch_exit_code = 62
comparison_mismatch_failure_kind = "datetime_comparison_mismatch"
comparison_mismatch_exit_code = 63
isoformat_mismatch_failure_kind = "datetime_isoformat_mismatch"
isoformat_mismatch_exit_code = 64
must_distinguish_arithmetic_from_comparison_from_isoformat = true

# Acceptance: "Fixture is part of the required ecosystem gate."
[required_ecosystem_gate_contract]
case = "fixture_is_part_of_required_ecosystem_gate"
must_be_listed_in_required_module_manifest = true
required_module_manifest_fixture_issue = 2624
manifest_module_name = "datetime"
must_be_required_in_manifest = true
must_run_in_default_ecosystem_profile = true
must_fail_default_profile_if_skipped = true
skipped_in_required_profile_failure_kind = "required_stdlib_fixture_skipped"
skipped_in_required_profile_exit_code = 65

# Acceptance: "Timezone or locale-sensitive behavior is avoided
# unless deterministic."
[timezone_locale_safety_contract]
case = "timezone_and_locale_behavior_is_deterministic_or_avoided"
forbid_naive_local_now_comparison = true
forbid_locale_sensitive_string_formatting = true
forbid_implicit_system_timezone_dependency = true
allowed_timezone_modes = [
    "utc_only",
    "fixed_offset",
    "naive_in_utc_for_arithmetic",
]
forbidden_timezone_modes = [
    "system_local_timezone",
    "implicit_dst_dependent",
    "locale_dependent_strftime",
]
nondeterministic_path_failure_kind = "datetime_nondeterministic_path_used"
nondeterministic_path_exit_code = 66

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "operator",
    "left",
    "right",
    "expected_right",
    "expected_relation",
    "isoformat_input",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_on_incorrect_arithmetic_or_formatting",
    "fixture_is_part_of_required_ecosystem_gate",
    "timezone_and_locale_behavior_is_deterministic_or_avoided",
]

[out_of_scope]
# Issue: "Out of scope: full timezone database compatibility."
full_timezone_database_compatibility = true
