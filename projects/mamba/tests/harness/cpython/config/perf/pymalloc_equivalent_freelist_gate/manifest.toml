# pymalloc-equivalent freelist + small-string interning gate —
# closes #1382. Parent #1265 P1 (tier:compute ≥10×), parent
# #1260 (perf bottoms tracker). Companion to #1274 (leak fix);
# #1274 closes the LEAK, this issue closes the residual alloc
# SPEED gap.
#
# Today mamba routes every short-lived alloc through the global
# heap. CPython hits `"".join(["hello", " ", "world", "!"])` at
# ~140 ns because:
#   1. All four short strings are interned (singletons reused
#      across iters; no alloc per iter).
#   2. List literal goes through pymalloc small-object freelist.
#   3. The 12-char join result lands in pymalloc's small-block
#      arena (<= 512 bytes uses arena freelists).
# Mamba's string_concat sits at 0.27× CPython on this snippet.
#
# The gate is GREEN only when:
#
#   - R1: A small-string interning path is added. Codegen
#     replaces `mb_str_new("hello")` per-call allocs with a
#     compile-time `MB_STR_HELLO` pointer. Runtime
#     `mb_str_intern(&'static str) -> MbStrHandle` returns a
#     refcount-immortal handle. Interning threshold pinned at
#     ≤ 64 bytes for the literal-constant fast path.
#   - R2: A small-object freelist (per-thread arena) is added
#     for objects ≤ 512 bytes covering tiny lists (≤16
#     elements), short strings (≤64 bytes), small tuples (≤8
#     elements). Frees recycle into the freelist, not back to
#     the global allocator.
#   - R3: `string_concat` reaches ≥ 1.0× CPython floor on the
#     baseline workload (structural target ≥ 1.5×).
#     Floor-compliance count must move from 5/8 → ≥ 6/8 on the
#     perf-tier compliance dashboard.
#   - R4: Correctness invariants — `mb_release` of a
#     small-arena object MUST NOT call global `free()`
#     (verifiable via allocator-counter). Large-object path
#     (> 512 bytes) MUST remain on the global allocator (no
#     regression). Refcount immortality for interned strings
#     must hold (no premature free).
#   - R5: Fix path bounded to {small_string_interning_path,
#     per_thread_small_object_arena, mimalloc_size_class_wrap,
#     vendored_pymalloc_obmalloc_thin_layer}. Replacing the
#     global allocator wholesale or changing CPython baseline
#     are refused.
#
# Out of scope: large-object allocator change; runtime
# `sys.intern()` of concat results (deferred); rewriting mamba
# refcount; CPython baseline change.
#
# Shape locked by src/runtime/tests/pymalloc_freelist.rs.

version = 1
fixture = "pymalloc_equivalent_freelist_gate"
issue = 1382
parent_issue = 1265
profile = "conformance"
family = "pymalloc_equivalent_freelist_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
