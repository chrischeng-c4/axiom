requirement_id = "R1"
must_add_intern_runtime_api = true
must_make_codegen_emit_intern_handle_for_literal_constants = true
must_keep_intern_threshold_at_64_bytes = true
forbid_silently_doing_per_call_alloc_for_interned_literal = true
forbid_silently_widening_intern_threshold = true
intern_runtime_api_field_name = "intern_runtime_api"
expected_intern_runtime_api = "mb_str_intern"
intern_threshold_bytes_field_name = "intern_threshold_bytes"
expected_intern_threshold_bytes = 64
intern_handle_kind_field_name = "intern_handle_kind"
allowed_intern_handle_kind_values = ["refcount_immortal_handle", "refcounted_handle", "per_call_alloc"]
expected_intern_handle_kind = "refcount_immortal_handle"
per_call_alloc_for_intern_failure_kind = "perf_pymalloc_per_call_alloc_for_interned_literal"
per_call_alloc_for_intern_exit_code = 511
intern_threshold_widened_failure_kind = "perf_pymalloc_intern_threshold_silently_widened"
intern_threshold_widened_exit_code = 512
intern_api_missing_failure_kind = "perf_pymalloc_intern_runtime_api_missing"
intern_api_missing_exit_code = 513
must_distinguish_per_call_alloc_from_widened_from_api_missing = true

# R2 — small-object freelist.
[r2_small_object_freelist_added_contract]
case = "per_thread_arena_for_small_objects_under_512_bytes_recycles_frees_instead_of_returning_to_global_allocator"
requirement_id = "R2"
must_add_per_thread_arena = true
must_cover_tiny_list_short_string_small_tuple_size_classes = true
must_recycle_frees_into_freelist = true
must_keep_small_object_threshold_at_512_bytes = true
forbid_returning_small_object_free_to_global_allocator = true
forbid_widening_small_object_threshold_silently = true
small_object_threshold_bytes_field_name = "small_object_threshold_bytes"
expected_small_object_threshold_bytes = 512
covered_size_classes_field_name = "covered_size_classes"
covered_size_classes = [
    "tiny_list_up_to_16_elements",
    "short_string_up_to_64_bytes",
    "small_tuple_up_to_8_elements",
]
free_returned_to_global_failure_kind = "perf_pymalloc_small_object_free_returned_to_global"
free_returned_to_global_exit_code = 514
size_class_dropped_failure_kind = "perf_pymalloc_size_class_dropped_from_arena"
size_class_dropped_exit_code = 515
small_object_threshold_widened_failure_kind = "perf_pymalloc_small_object_threshold_silently_widened"
small_object_threshold_widened_exit_code = 516
must_distinguish_global_free_from_size_class_dropped_from_threshold_widened = true

# R3 — string_concat ≥ 1.0× CPython floor + compliance count.
[r3_string_concat_meets_1x_floor_contract]
case = "string_concat_reaches_at_least_1_0x_cpython_on_baseline_and_floor_compliance_count_moves_from_5_of_8_to_at_least_6_of_8"
requirement_id = "R3"
must_meet_or_exceed_string_concat_cpython_floor = true
must_move_floor_compliance_count = true
forbid_silently_changing_workload = true
forbid_silently_widening_compliance_metric = true
bench_name_field_name = "bench_name"
expected_bench_name = "string_concat"
baseline_snippet_field_name = "baseline_snippet"
expected_baseline_snippet = "join_hello_space_world_bang_n_iter"
cpython_ratio_floor_field_name = "cpython_ratio_floor"
expected_cpython_ratio_floor = "1.0x"
structural_target_field_name = "structural_target"
expected_structural_target = "1.5x"
pre_fix_compliance_field_name = "pre_fix_floor_compliance"
expected_pre_fix_compliance = "5_of_8"
post_fix_compliance_floor_field_name = "post_fix_floor_compliance_floor"
expected_post_fix_compliance_floor = "6_of_8"
floor_not_met_failure_kind = "perf_pymalloc_string_concat_floor_not_met"
floor_not_met_exit_code = 517
compliance_did_not_move_failure_kind = "perf_pymalloc_floor_compliance_count_did_not_move"
compliance_did_not_move_exit_code = 518
must_distinguish_floor_not_met_from_compliance_did_not_move = true

# R4 — correctness invariants.
[r4_correctness_invariants_arena_vs_global_contract]
case = "mb_release_of_small_arena_object_never_calls_global_free_and_large_object_path_stays_on_global_allocator"
requirement_id = "R4"
must_route_arena_release_to_freelist_not_global_free = true
must_keep_large_object_path_on_global_allocator = true
must_keep_interned_string_refcount_immortal = true
forbid_arena_release_calling_global_free = true
forbid_regressing_large_object_path = true
forbid_premature_free_of_interned_string = true
allocator_counter_field_name = "allocator_counter"
allowed_allocator_counter_values = [
    "global_free_calls_for_arena_object",
    "global_free_calls_for_large_object",
    "freelist_recycle_for_arena_object",
]
expected_arena_release_counter = "freelist_recycle_for_arena_object"
arena_global_free_called_failure_kind = "perf_pymalloc_arena_release_called_global_free"
arena_global_free_called_exit_code = 519
large_object_regressed_failure_kind = "perf_pymalloc_large_object_path_regressed"
large_object_regressed_exit_code = 520
interned_string_premature_free_failure_kind = "perf_pymalloc_interned_string_prematurely_freed"
interned_string_premature_free_exit_code = 521
must_distinguish_arena_global_free_from_large_regress_from_premature_free = true

# R5 — fix path bounded.
[r5_fix_path_bounded_contract]
case = "fix_path_bounded_to_small_string_interning_per_thread_arena_mimalloc_wrap_or_vendored_pymalloc_thin_layer"
requirement_id = "R5"
must_pin_allowed_fix_paths = true
must_forbid_wholesale_global_allocator_replacement = true
must_forbid_cpython_baseline_change = true
allowed_fix_path_kind_field_name = "fix_path_kind"
allowed_fix_path_kind_values = [
    "small_string_interning_path",
    "per_thread_small_object_arena",
    "mimalloc_size_class_wrap",
    "vendored_pymalloc_obmalloc_thin_layer",
]
disallowed_fix_path_kind_values_field_name = "disallowed_fix_path_kind_values"
