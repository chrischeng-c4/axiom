must_cover_small_object_freelist_added = true
must_cover_string_concat_meets_1x_floor = true
must_cover_correctness_invariants_arena_vs_global = true
must_cover_fix_path_bounded = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — small-string interning path.
[r1_small_string_interning_added_contract]
