# MIR escape analysis gate — closes #2516. Parent: perf
# umbrella #2458 (also a sibling of #1260 the MVP perf 10×
# umbrella). Targets short-lived list/dict literals that pay
# gc_track + gc_untrack per iteration without ever escaping
# scope (NOTES-NEXT.md §0(a)).
#
# The gate is GREEN only when:
#
#   - R1: A MIR pass detects literals that never escape their
#     enclosing scope. The detection is sound: a value flagged
#     non-escaping must provably not be reachable past the
#     scope (no return, no store-to-arg, no closure capture,
#     no exception path).
#   - R2: Codegen for non-escaping list/dict literals skips
#     gc_track and gc_untrack and emits the value into a
#     stack-or-arena slot.
#   - R3: Detection is conservative under uncertainty —
#     unknown reachability means must_track.
#   - R4: Bench acceptance: string_concat and list_sort_builtin
#     each show ≥ 1.5× improvement vs the pre-pass mamba
#     baseline. CPython baseline shape is preserved (mamba ≥
#     CPython is unchanged for these benches; ratio numerator
#     improves).
#   - R5: Correctness regression-guard: a value that DOES
#     escape (returned, stored, captured, raised) must remain
#     gc_track-ed. Misclassifying an escaping value as
#     non-escaping is a hard fail.
#
# Out of scope: per-frame stack/arena allocator impl (separate
# perf issue); broader pymalloc-equivalent freelist (#1382);
# changing CPython baseline measurement.
#
# Shape locked by src/mir/tests/escape_analysis_gate.rs.

version = 1
fixture = "mir_escape_analysis_skip_gc_track_gate"
issue = 2516
parent_issue = 2458
profile = "conformance"
family = "mir_escape_analysis_skip_gc_track_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_mir_pass_detects_non_escaping_literals = true
must_cover_codegen_skips_gc_track_for_non_escaping = true
must_cover_conservative_must_track_under_uncertainty = true
must_cover_bench_acceptance_string_concat_and_list_sort_builtin = true
must_cover_escaping_value_must_remain_gc_tracked = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — MIR pass detects non-escaping literals.
[r1_mir_pass_detects_non_escaping_literals_contract]
case = "mir_escape_analysis_pass_detects_list_and_dict_literals_that_never_escape_scope"
requirement_id = "R1"
must_run_pass_before_codegen = true
must_classify_each_literal_as_escaping_or_non_escaping = true
must_propagate_through_intra_scope_aliasing = true
must_treat_return_as_escape = true
must_treat_store_to_arg_as_escape = true
must_treat_closure_capture_as_escape = true
must_treat_exception_path_as_escape = true
forbid_classifying_escaping_value_as_non_escaping = true
literal_kind_field_name = "literal_kind"
allowed_literal_kind_values = ["list_literal", "dict_literal"]
escape_classification_field_name = "escape_classification"
allowed_escape_classification_values = ["escaping", "non_escaping"]
escaping_misclassified_failure_kind = "perf_mir_escape_escaping_value_misclassified_as_non_escaping"
escaping_misclassified_exit_code = 417
pass_not_run_before_codegen_failure_kind = "perf_mir_escape_pass_not_run_before_codegen"
pass_not_run_before_codegen_exit_code = 418
must_distinguish_misclassification_from_pass_not_run = true

# R2 — codegen skips gc_track + gc_untrack.
[r2_codegen_skips_gc_track_for_non_escaping_contract]
case = "codegen_emits_non_escaping_literal_without_gc_track_or_gc_untrack"
requirement_id = "R2"
must_skip_gc_track_call_for_non_escaping = true
must_skip_gc_untrack_call_for_non_escaping = true
must_emit_value_into_stack_or_arena_slot = true
forbid_silently_emitting_gc_track_for_non_escaping = true
forbid_emitting_gc_untrack_without_matching_gc_track = true
codegen_slot_kind_field_name = "codegen_slot_kind"
allowed_codegen_slot_kind_values = ["stack", "arena", "heap_tracked"]
gc_track_emission_field_name = "gc_track_emission"
allowed_gc_track_emission_values = ["emitted", "skipped"]
gc_track_emitted_for_non_escaping_failure_kind = "perf_mir_escape_gc_track_emitted_for_non_escaping"
gc_track_emitted_for_non_escaping_exit_code = 419
unbalanced_gc_untrack_failure_kind = "perf_mir_escape_unbalanced_gc_untrack"
unbalanced_gc_untrack_exit_code = 420
must_distinguish_track_emitted_from_unbalanced_untrack = true

# R3 — conservative under uncertainty.
[r3_conservative_must_track_under_uncertainty_contract]
case = "uncertain_reachability_must_classify_literal_as_escaping_must_track"
requirement_id = "R3"
must_default_to_escaping_when_reachability_unknown = true
must_default_to_escaping_when_pass_lacks_information = true
forbid_unsound_non_escaping_classification_on_uncertainty = true
uncertainty_outcome_field_name = "uncertainty_outcome"
allowed_uncertainty_outcome_values = ["defaulted_to_escaping", "defaulted_to_non_escaping"]
unsound_non_escaping_failure_kind = "perf_mir_escape_unsound_non_escaping_under_uncertainty"
unsound_non_escaping_exit_code = 421
must_distinguish_unsoundness_from_normal_escape_classification = true

# R4 — bench acceptance.
[r4_bench_acceptance_string_concat_and_list_sort_builtin_contract]
case = "string_concat_and_list_sort_builtin_each_improve_at_least_1_5x_vs_pre_pass_mamba_baseline"
requirement_id = "R4"
must_compare_against_pre_pass_mamba_baseline = true
must_preserve_cpython_baseline_measurement = true
must_apply_per_bench_minimum_improvement = true
forbid_geomean_only_acceptance = true
forbid_silently_changing_cpython_baseline = true
required_benches_field_name = "required_benches"
required_benches = ["string_concat", "list_sort_builtin"]
minimum_per_bench_improvement_field_name = "minimum_per_bench_improvement"
expected_minimum_per_bench_improvement = "1.5x"
baseline_kind_field_name = "baseline_kind"
allowed_baseline_kind_values = ["pre_pass_mamba", "cpython"]
per_bench_below_minimum_failure_kind = "perf_mir_escape_per_bench_below_1_5x"
per_bench_below_minimum_exit_code = 422
cpython_baseline_silently_changed_failure_kind = "perf_mir_escape_cpython_baseline_silently_changed"
cpython_baseline_silently_changed_exit_code = 423
geomean_only_acceptance_failure_kind = "perf_mir_escape_geomean_only_acceptance"
geomean_only_acceptance_exit_code = 424
must_distinguish_below_minimum_from_baseline_change_from_geomean_only = true

# R5 — escaping value must remain gc_track-ed.
[r5_escaping_value_must_remain_gc_tracked_contract]
case = "escaping_literal_must_remain_gc_tracked_and_gc_untracked_under_pass"
requirement_id = "R5"
must_keep_gc_track_for_escaping_literal = true
must_keep_gc_untrack_for_escaping_literal = true
forbid_dropping_gc_track_for_escaping_literal = true
forbid_dropping_gc_untrack_for_escaping_literal = true
escape_path_field_name = "escape_path"
allowed_escape_path_values = ["return", "store_to_arg", "closure_capture", "exception_path"]
escaping_track_dropped_failure_kind = "perf_mir_escape_escaping_gc_track_dropped"
escaping_track_dropped_exit_code = 425
escaping_untrack_dropped_failure_kind = "perf_mir_escape_escaping_gc_untrack_dropped"
escaping_untrack_dropped_exit_code = 426
must_distinguish_track_dropped_from_untrack_dropped = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "literal_kind",
    "escape_classification",
    "codegen_slot_kind",
    "gc_track_emission",
    "uncertainty_outcome",
    "required_benches",
    "minimum_per_bench_improvement",
    "baseline_kind",
    "escape_path",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "mir_escape_analysis_pass_detects_list_and_dict_literals_that_never_escape_scope",
    "codegen_emits_non_escaping_literal_without_gc_track_or_gc_untrack",
    "uncertain_reachability_must_classify_literal_as_escaping_must_track",
    "string_concat_and_list_sort_builtin_each_improve_at_least_1_5x_vs_pre_pass_mamba_baseline",
    "escaping_literal_must_remain_gc_tracked_and_gc_untracked_under_pass",
]

[out_of_scope]
# Issue body + perf-primary doctrine: this gate only owns the
# MIR escape analysis pass + the gc_track skip. The stack /
# arena allocator impl, pymalloc-equivalent freelist (#1382),
# and CPython baseline measurement are out of scope.
per_frame_stack_or_arena_allocator_implementation = true
pymalloc_equivalent_freelist_1382 = true
cpython_baseline_measurement_method = true
non_literal_value_escape_analysis = true
c_extension_fast_paths = true
