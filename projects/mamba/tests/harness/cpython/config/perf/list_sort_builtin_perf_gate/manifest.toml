# list_sort_builtin perf gate — closes #2513. Parent perf
# umbrella: #2458. Currently mamba 400050ns / cpython 411ns =
# 0.001× (1000× slower). The gate is GREEN only when:
#
#   - R1: list_sort_builtin reaches ≥ 1.0× CPython on the
#     baseline workload pinned below — primary perf-first
#     acceptance.
#   - R2: No other accepted bench regresses below its
#     currently-passing floor while list_sort_builtin is
#     improved. Regression is measured against the same
#     baseline shape (per-bench, not geomean).
#   - R3: The 1000× starting deficit is recorded with the
#     measurement shape that produced it (mamba_ns,
#     cpython_ns, ratio, sample_count, warmup_iters) so
#     future regressions are diagnosable.
#   - R4: The list.sort() implementation under mamba must
#     remain stable (timsort stability invariant), in-place,
#     and preserve key=, reverse=, cmp-not-supplied semantics.
#     Performance fixes that break correctness are rejected.
#   - R5: The fix path is bounded to list dispatch / sort
#     specialization / comparator inlining. Replacing sort()
#     with a non-stable algorithm, or sorting outside the
#     in-place contract, is out of scope and refused.
#
# Out of scope: implementing the optimization itself; sort
# perf for non-builtin types (numpy, pandas); changing the
# CPython baseline harness.
#
# Shape locked by src/runtime/tests/list_sort_builtin_perf_gate.rs.

version = 1
fixture = "list_sort_builtin_perf_gate"
issue = 2513
parent_issue = 2458
profile = "conformance"
family = "list_sort_builtin_perf_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_list_sort_builtin_meets_1x_cpython_floor = true
must_cover_no_other_accepted_bench_regresses = true
must_cover_starting_deficit_is_recorded_with_measurement_shape = true
must_cover_timsort_stability_in_place_and_kwargs_preserved = true
must_cover_fix_path_bounded_to_list_dispatch_or_sort_specialization = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — 1.0× CPython floor on list_sort_builtin.
[r1_list_sort_builtin_meets_1x_cpython_contract]
case = "list_sort_builtin_reaches_at_least_1_0x_cpython_on_baseline_workload"
requirement_id = "R1"
must_meet_or_exceed_cpython_ratio_floor = true
must_pin_canonical_bench_name = true
must_pin_baseline_workload = true
forbid_silently_changing_workload_to_meet_floor = true
forbid_silently_disabling_bench_to_meet_floor = true
bench_name_field_name = "bench_name"
expected_bench_name = "list_sort_builtin"
cpython_ratio_floor_field_name = "cpython_ratio_floor"
expected_cpython_ratio_floor = "1.0x"
workload_field_name = "workload"
allowed_workload_values = ["random_int_list_n_1000", "sorted_int_list_n_1000", "reverse_int_list_n_1000"]
ratio_below_floor_failure_kind = "perf_list_sort_builtin_ratio_below_1x_cpython"
ratio_below_floor_exit_code = 427
workload_silently_changed_failure_kind = "perf_list_sort_builtin_workload_silently_changed"
workload_silently_changed_exit_code = 428
bench_silently_disabled_failure_kind = "perf_list_sort_builtin_bench_silently_disabled"
bench_silently_disabled_exit_code = 429
must_distinguish_ratio_below_from_workload_change_from_silently_disabled = true

# R2 — no other accepted bench regresses.
[r2_no_other_accepted_bench_regresses_contract]
case = "improving_list_sort_builtin_does_not_regress_any_other_accepted_bench_below_its_floor"
requirement_id = "R2"
must_measure_each_accepted_bench_post_change = true
must_compare_against_per_bench_pre_change_floor = true
must_apply_per_bench_regression_threshold = true
forbid_geomean_only_regression_check = true
forbid_silently_widening_regression_threshold = true
regression_check_mode_field_name = "regression_check_mode"
allowed_regression_check_mode_values = ["per_bench", "geomean_only"]
expected_regression_check_mode = "per_bench"
regression_threshold_field_name = "regression_threshold"
expected_regression_threshold = "1.0x_pre_change"
per_bench_regression_failure_kind = "perf_list_sort_builtin_caused_per_bench_regression"
per_bench_regression_exit_code = 430
geomean_only_check_failure_kind = "perf_list_sort_builtin_used_geomean_only_check"
geomean_only_check_exit_code = 431
regression_threshold_widened_failure_kind = "perf_list_sort_builtin_regression_threshold_silently_widened"
regression_threshold_widened_exit_code = 432
must_distinguish_per_bench_regression_from_geomean_from_threshold_widening = true

# R3 — starting deficit recorded with measurement shape.
[r3_starting_deficit_recorded_with_measurement_shape_contract]
case = "starting_deficit_1000x_recorded_with_mamba_ns_cpython_ns_ratio_samples_warmup"
requirement_id = "R3"
must_record_mamba_ns = true
must_record_cpython_ns = true
must_record_ratio = true
must_record_sample_count = true
must_record_warmup_iters = true
forbid_recording_ratio_without_underlying_ns = true
required_measurement_fields_field_name = "required_measurement_fields"
required_measurement_fields = [
    "mamba_ns",
    "cpython_ns",
    "ratio",
    "sample_count",
    "warmup_iters",
]
starting_mamba_ns_field_name = "starting_mamba_ns"
expected_starting_mamba_ns = 400050
starting_cpython_ns_field_name = "starting_cpython_ns"
expected_starting_cpython_ns = 411
starting_ratio_field_name = "starting_ratio"
expected_starting_ratio = "0.001x"
ratio_without_ns_failure_kind = "perf_list_sort_builtin_ratio_without_underlying_ns"
ratio_without_ns_exit_code = 433
measurement_field_missing_failure_kind = "perf_list_sort_builtin_measurement_field_missing"
measurement_field_missing_exit_code = 434
must_distinguish_ratio_without_ns_from_field_missing = true

# R4 — timsort stability, in-place, kwargs preserved.
[r4_timsort_stability_in_place_and_kwargs_preserved_contract]
case = "list_sort_under_mamba_preserves_timsort_stability_in_place_and_key_reverse_kwargs"
requirement_id = "R4"
must_preserve_timsort_stability = true
must_preserve_in_place_contract = true
must_preserve_key_kwarg = true
must_preserve_reverse_kwarg = true
must_reject_cmp_kwarg_per_python_3 = true
forbid_replacing_sort_with_non_stable_algorithm = true
forbid_sorting_outside_in_place_contract = true
sort_algorithm_kind_field_name = "sort_algorithm_kind"
allowed_sort_algorithm_kind_values = ["timsort"]
in_place_contract_field_name = "in_place_contract"
allowed_in_place_contract_values = ["in_place", "returns_new_list"]
expected_in_place_contract = "in_place"
required_kwargs_field_name = "required_kwargs"
required_kwargs = ["key", "reverse"]
non_stable_algorithm_failure_kind = "perf_list_sort_builtin_non_stable_algorithm_substituted"
non_stable_algorithm_exit_code = 435
not_in_place_failure_kind = "perf_list_sort_builtin_not_in_place"
not_in_place_exit_code = 436
required_kwarg_missing_failure_kind = "perf_list_sort_builtin_required_kwarg_missing"
required_kwarg_missing_exit_code = 437
must_distinguish_non_stable_from_not_in_place_from_kwarg_missing = true

# R5 — fix path bounded.
[r5_fix_path_bounded_to_dispatch_or_specialization_contract]
case = "fix_path_bounded_to_list_dispatch_or_sort_specialization_or_comparator_inlining"
requirement_id = "R5"
must_pin_allowed_fix_paths = true
must_forbid_non_stable_substitution = true
must_forbid_out_of_place_sort_path = true
must_forbid_changing_cpython_baseline_harness = true
allowed_fix_path_kind_field_name = "fix_path_kind"
allowed_fix_path_kind_values = [
    "list_dispatch_specialization",
    "sort_specialization_for_typed_keys",
    "comparator_inlining",
]
disallowed_fix_path_kind_values_field_name = "disallowed_fix_path_kind_values"
disallowed_fix_path_kind_values = [
    "non_stable_algorithm_substitution",
    "out_of_place_sort",
    "cpython_baseline_harness_change",
]
disallowed_fix_path_used_failure_kind = "perf_list_sort_builtin_disallowed_fix_path_used"
disallowed_fix_path_used_exit_code = 438
cpython_harness_changed_failure_kind = "perf_list_sort_builtin_cpython_harness_changed"
cpython_harness_changed_exit_code = 439
must_distinguish_disallowed_fix_path_from_cpython_harness_change = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "bench_name",
    "cpython_ratio_floor",
    "workload",
    "regression_check_mode",
    "regression_threshold",
    "required_measurement_fields",
    "starting_mamba_ns",
    "starting_cpython_ns",
    "starting_ratio",
    "sort_algorithm_kind",
    "in_place_contract",
    "required_kwargs",
    "fix_path_kind",
    "disallowed_fix_path_kind_values",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "list_sort_builtin_reaches_at_least_1_0x_cpython_on_baseline_workload",
    "improving_list_sort_builtin_does_not_regress_any_other_accepted_bench_below_its_floor",
    "starting_deficit_1000x_recorded_with_mamba_ns_cpython_ns_ratio_samples_warmup",
    "list_sort_under_mamba_preserves_timsort_stability_in_place_and_key_reverse_kwargs",
    "fix_path_bounded_to_list_dispatch_or_sort_specialization_or_comparator_inlining",
]

[out_of_scope]
implementation_of_specific_optimization = true
sort_perf_for_non_builtin_types_numpy_pandas = true
cpython_baseline_harness_change = true
non_list_sort_benches = true
c_extension_fast_paths = true
