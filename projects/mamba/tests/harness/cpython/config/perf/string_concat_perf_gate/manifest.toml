# string_concat perf gate — closes #2512. Parent perf
# umbrella: #2458. Currently mamba 420776ns / cpython 143ns =
# 0.0003× (3333× slower). Shape mirrors the list_sort_builtin
# perf gate (#2513) so reviewers can compare the two failing
# benches side by side.
#
# The gate is GREEN only when:
#
#   - R1: string_concat reaches ≥ 1.0× CPython on the
#     baseline workload pinned below.
#   - R2: No other accepted bench regresses below its
#     pre-change per-bench floor. Per-bench check, not
#     geomean.
#   - R3: Starting deficit (mamba_ns=420776, cpython_ns=143,
#     ratio=0.0003×) is recorded with sample_count and
#     warmup_iters so future regressions are diagnosable.
#   - R4: Correctness guard: `+`, `+=`, `''.join()`, and
#     f-string semantics under mamba remain identical to
#     CPython 3.12. Unicode-correctness is preserved (no
#     latin-1 short-circuit for multibyte input). String is
#     still immutable (no in-place mutation as an
#     optimization).
#   - R5: Fix path bounded to {bytes_concat_buffer,
#     small_string_interning, ropes_or_chunked_repr,
#     jit_string_dispatch_specialization}. CPython baseline
#     harness change is refused.
#
# Out of scope: implementing the optimization itself; non-str
# concat (bytes, bytearray) perf; CPython baseline harness
# change.
#
# Shape locked by src/runtime/tests/string_concat_perf_gate.rs.

version = 1
fixture = "string_concat_perf_gate"
issue = 2512
parent_issue = 2458
profile = "conformance"
family = "string_concat_perf_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_string_concat_meets_1x_cpython_floor = true
must_cover_no_other_accepted_bench_regresses = true
must_cover_starting_deficit_is_recorded_with_measurement_shape = true
must_cover_str_semantics_and_unicode_correctness_preserved = true
must_cover_fix_path_bounded_to_known_specialization_set = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — 1.0× CPython floor on string_concat.
[r1_string_concat_meets_1x_cpython_contract]
case = "string_concat_reaches_at_least_1_0x_cpython_on_baseline_workload"
requirement_id = "R1"
must_meet_or_exceed_cpython_ratio_floor = true
must_pin_canonical_bench_name = true
must_pin_baseline_workload = true
forbid_silently_changing_workload_to_meet_floor = true
forbid_silently_disabling_bench_to_meet_floor = true
bench_name_field_name = "bench_name"
expected_bench_name = "string_concat"
cpython_ratio_floor_field_name = "cpython_ratio_floor"
expected_cpython_ratio_floor = "1.0x"
workload_field_name = "workload"
allowed_workload_values = ["ascii_short_concat_n_1000", "unicode_short_concat_n_1000", "mixed_concat_plus_and_join_n_1000"]
ratio_below_floor_failure_kind = "perf_string_concat_ratio_below_1x_cpython"
ratio_below_floor_exit_code = 440
workload_silently_changed_failure_kind = "perf_string_concat_workload_silently_changed"
workload_silently_changed_exit_code = 441
bench_silently_disabled_failure_kind = "perf_string_concat_bench_silently_disabled"
bench_silently_disabled_exit_code = 442
must_distinguish_ratio_below_from_workload_change_from_silently_disabled = true

# R2 — no other accepted bench regresses.
[r2_no_other_accepted_bench_regresses_contract]
case = "improving_string_concat_does_not_regress_any_other_accepted_bench_below_its_floor"
requirement_id = "R2"
must_measure_each_accepted_bench_post_change = true
must_compare_against_per_bench_pre_change_floor = true
must_apply_per_bench_regression_threshold = true
forbid_geomean_only_regression_check = true
forbid_silently_widening_regression_threshold = true
regression_check_mode_field_name = "regression_check_mode"
allowed_regression_check_mode_values = ["per_bench", "geomean_only"]
expected_regression_check_mode = "per_bench"
regression_threshold_field_name = "regression_threshold"
expected_regression_threshold = "1.0x_pre_change"
per_bench_regression_failure_kind = "perf_string_concat_caused_per_bench_regression"
per_bench_regression_exit_code = 443
geomean_only_check_failure_kind = "perf_string_concat_used_geomean_only_check"
geomean_only_check_exit_code = 444
regression_threshold_widened_failure_kind = "perf_string_concat_regression_threshold_silently_widened"
regression_threshold_widened_exit_code = 445
must_distinguish_per_bench_regression_from_geomean_from_threshold_widening = true

# R3 — starting deficit recorded with measurement shape.
[r3_starting_deficit_recorded_with_measurement_shape_contract]
case = "starting_deficit_3333x_recorded_with_mamba_ns_cpython_ns_ratio_samples_warmup"
requirement_id = "R3"
must_record_mamba_ns = true
must_record_cpython_ns = true
must_record_ratio = true
must_record_sample_count = true
must_record_warmup_iters = true
forbid_recording_ratio_without_underlying_ns = true
required_measurement_fields_field_name = "required_measurement_fields"
required_measurement_fields = [
    "mamba_ns",
    "cpython_ns",
    "ratio",
    "sample_count",
    "warmup_iters",
]
starting_mamba_ns_field_name = "starting_mamba_ns"
expected_starting_mamba_ns = 420776
starting_cpython_ns_field_name = "starting_cpython_ns"
expected_starting_cpython_ns = 143
starting_ratio_field_name = "starting_ratio"
expected_starting_ratio = "0.0003x"
ratio_without_ns_failure_kind = "perf_string_concat_ratio_without_underlying_ns"
ratio_without_ns_exit_code = 446
measurement_field_missing_failure_kind = "perf_string_concat_measurement_field_missing"
measurement_field_missing_exit_code = 447
must_distinguish_ratio_without_ns_from_field_missing = true

# R4 — str semantics + unicode correctness preserved.
[r4_str_semantics_and_unicode_correctness_preserved_contract]
case = "str_concat_under_mamba_preserves_plus_iadd_join_fstring_and_unicode_semantics"
requirement_id = "R4"
must_preserve_plus_operator_semantics = true
must_preserve_iadd_operator_semantics = true
must_preserve_join_method_semantics = true
must_preserve_fstring_semantics = true
must_preserve_unicode_correctness_for_multibyte_input = true
must_preserve_str_immutability = true
forbid_in_place_mutation_of_str_object = true
forbid_latin_1_shortcircuit_on_multibyte_input = true
required_str_ops_field_name = "required_str_ops"
required_str_ops = ["plus", "iadd", "join", "fstring"]
immutability_violation_failure_kind = "perf_string_concat_str_immutability_violation"
immutability_violation_exit_code = 448
unicode_correctness_violation_failure_kind = "perf_string_concat_unicode_correctness_violation"
unicode_correctness_violation_exit_code = 449
required_str_op_missing_failure_kind = "perf_string_concat_required_str_op_missing"
required_str_op_missing_exit_code = 450
must_distinguish_immutability_from_unicode_from_op_missing = true

# R5 — fix path bounded to known specialization set.
[r5_fix_path_bounded_to_known_specialization_set_contract]
case = "fix_path_bounded_to_bytes_buffer_or_interning_or_ropes_or_jit_specialization"
requirement_id = "R5"
must_pin_allowed_fix_paths = true
must_forbid_in_place_str_mutation_path = true
must_forbid_latin_1_shortcircuit_path = true
must_forbid_changing_cpython_baseline_harness = true
allowed_fix_path_kind_field_name = "fix_path_kind"
allowed_fix_path_kind_values = [
    "bytes_concat_buffer",
    "small_string_interning",
    "ropes_or_chunked_repr",
    "jit_string_dispatch_specialization",
]
disallowed_fix_path_kind_values_field_name = "disallowed_fix_path_kind_values"
disallowed_fix_path_kind_values = [
    "in_place_str_mutation",
    "latin_1_shortcircuit_for_multibyte_input",
    "cpython_baseline_harness_change",
]
disallowed_fix_path_used_failure_kind = "perf_string_concat_disallowed_fix_path_used"
disallowed_fix_path_used_exit_code = 451
cpython_harness_changed_failure_kind = "perf_string_concat_cpython_harness_changed"
cpython_harness_changed_exit_code = 452
must_distinguish_disallowed_fix_path_from_cpython_harness_change = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "bench_name",
    "cpython_ratio_floor",
    "workload",
    "regression_check_mode",
    "regression_threshold",
    "required_measurement_fields",
    "starting_mamba_ns",
    "starting_cpython_ns",
    "starting_ratio",
    "required_str_ops",
    "fix_path_kind",
    "disallowed_fix_path_kind_values",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "string_concat_reaches_at_least_1_0x_cpython_on_baseline_workload",
    "improving_string_concat_does_not_regress_any_other_accepted_bench_below_its_floor",
    "starting_deficit_3333x_recorded_with_mamba_ns_cpython_ns_ratio_samples_warmup",
    "str_concat_under_mamba_preserves_plus_iadd_join_fstring_and_unicode_semantics",
    "fix_path_bounded_to_bytes_buffer_or_interning_or_ropes_or_jit_specialization",
]

[out_of_scope]
implementation_of_specific_optimization = true
bytes_or_bytearray_concat_perf = true
cpython_baseline_harness_change = true
non_string_concat_benches = true
c_extension_fast_paths = true
