# base64 perf-primary memory gate — closes #2096. Parent
# perf umbrella #1265 (Py3.12 feature parity + perf superiority).
# First Phase 2 perf-tier lib that shipped speed-PASS but
# memory-FAIL under the new perf-primary doctrine: base64 hits
# 14.39× speed but 0.50× memory (mamba 22.25 MB vs cpython
# 11.61 MB) on base64/encode_decode at commit 9793051d4.
#
# Under feedback_mamba_perf_is_the_product: if mamba isn't
# faster AND lower memory, mamba has no reason to exist. Speed
# wins paid for with 2× RAM are not acceptable. The gate is
# GREEN only when:
#
#   - R1: base64/encode_decode reaches memory ratio ≥ 1.0×
#     CPython on the pinned cross-runtime harness; mamba RSS
#     must be ≤ CPython RSS on the canonical workload.
#   - R2: Speed gate must hold across the memory fix. mamba's
#     base64 speed advantage cannot regress below its current
#     14.39× post-fix; the fix is not allowed to trade speed
#     for memory.
#   - R3: Starting deficit (mamba 22.25 MB, cpython 11.61 MB,
#     memory ratio 0.50×, speed ratio 14.39×) is recorded with
#     sample_count and warmup_iters so future regressions are
#     diagnosable.
#   - R4: Memory-layout fix is bounded to the bytes-object
#     header / capacity-field / COW path (subset-A: input-clone
#     elimination via shim borrow; subset-B: MbObject header
#     layout shrink). In-place mutation of bytes outside the
#     CPython contract, and changing CPython baseline harness,
#     are refused.
#   - R5: Sibling Phase 2 compute-tier bytes-touching libs
#     (hashlib, hmac, zlib, gzip, lzma, bz2, codecs) are
#     enumerated as the unblock-targets. THIS issue ships only
#     the base64 acceptance gate; sibling retrofits are
#     follow-ons.
#
# Out of scope: implementing the bytes-layout shrink itself;
# rewriting cross_runtime harness; widening memory gate to
# non-bytes libs.
#
# Shape locked by src/runtime/tests/base64_memory_gate.rs.

version = 1
fixture = "base64_memory_gate"
issue = 2096
parent_issue = 1265
profile = "conformance"
family = "base64_memory_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_base64_memory_meets_1x_cpython_floor = true
must_cover_speed_gate_holds_across_memory_fix = true
must_cover_starting_deficit_recorded_with_measurement_shape = true
must_cover_fix_path_bounded_to_bytes_layout_or_clone_elim = true
must_cover_sibling_bytes_libs_enumerated_as_unblock_targets = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — memory floor on base64/encode_decode.
[r1_base64_memory_meets_1x_cpython_contract]
case = "base64_encode_decode_memory_ratio_reaches_at_least_1_0x_cpython_on_pinned_workload"
requirement_id = "R1"
must_meet_or_exceed_cpython_memory_ratio_floor = true
must_pin_canonical_bench_name = true
must_pin_baseline_workload = true
forbid_silently_changing_workload_to_meet_floor = true
forbid_silently_disabling_bench_to_meet_floor = true
bench_name_field_name = "bench_name"
expected_bench_name = "base64/encode_decode"
memory_ratio_floor_field_name = "memory_ratio_floor"
expected_memory_ratio_floor = "1.0x"
workload_field_name = "workload"
allowed_workload_values = [
    "base64_encode_short_n_1000",
    "base64_decode_short_n_1000",
    "base64_encode_decode_roundtrip_n_1000",
]
memory_below_floor_failure_kind = "perf_base64_memory_ratio_below_1x_cpython"
memory_below_floor_exit_code = 477
workload_silently_changed_failure_kind = "perf_base64_workload_silently_changed"
workload_silently_changed_exit_code = 478
bench_silently_disabled_failure_kind = "perf_base64_bench_silently_disabled"
bench_silently_disabled_exit_code = 479
must_distinguish_memory_below_from_workload_change_from_silently_disabled = true

# R2 — speed gate must hold across memory fix.
[r2_speed_gate_holds_across_memory_fix_contract]
case = "fix_must_not_regress_speed_below_pre_fix_baseline_post_change_speed_ratio_must_stay_at_least_pre_fix"
requirement_id = "R2"
must_measure_post_fix_speed_ratio = true
must_compare_against_pre_fix_speed_baseline = true
forbid_silently_trading_speed_for_memory = true
forbid_silently_widening_speed_regression_threshold = true
pre_fix_speed_ratio_field_name = "pre_fix_speed_ratio"
expected_pre_fix_speed_ratio = "14.39x"
speed_regression_threshold_field_name = "speed_regression_threshold"
expected_speed_regression_threshold = "1.0x_pre_fix"
speed_regressed_failure_kind = "perf_base64_speed_regressed_for_memory_win"
speed_regressed_exit_code = 480
speed_threshold_widened_failure_kind = "perf_base64_speed_regression_threshold_silently_widened"
speed_threshold_widened_exit_code = 481
must_distinguish_speed_regressed_from_threshold_widening = true

# R3 — starting deficit recorded with measurement shape.
[r3_starting_deficit_recorded_with_measurement_shape_contract]
case = "starting_deficit_0_50x_mem_and_14_39x_speed_recorded_with_mamba_mb_cpython_mb_samples_warmup"
requirement_id = "R3"
must_record_mamba_mb = true
must_record_cpython_mb = true
must_record_memory_ratio = true
must_record_speed_ratio = true
must_record_sample_count = true
must_record_warmup_iters = true
forbid_recording_ratio_without_underlying_mb = true
required_measurement_fields_field_name = "required_measurement_fields"
required_measurement_fields = [
    "mamba_mb",
    "cpython_mb",
    "memory_ratio",
    "speed_ratio",
    "sample_count",
    "warmup_iters",
]
starting_mamba_mb_field_name = "starting_mamba_mb"
expected_starting_mamba_mb = "22.25"
starting_cpython_mb_field_name = "starting_cpython_mb"
expected_starting_cpython_mb = "11.61"
starting_memory_ratio_field_name = "starting_memory_ratio"
expected_starting_memory_ratio = "0.50x"
starting_speed_ratio_field_name = "starting_speed_ratio"
expected_starting_speed_ratio = "14.39x"
ratio_without_mb_failure_kind = "perf_base64_ratio_without_underlying_mb"
ratio_without_mb_exit_code = 482
measurement_field_missing_failure_kind = "perf_base64_measurement_field_missing"
measurement_field_missing_exit_code = 483
must_distinguish_ratio_without_mb_from_field_missing = true

# R4 — fix path bounded to bytes layout / clone elim.
[r4_fix_path_bounded_to_bytes_layout_or_clone_elim_contract]
case = "fix_path_bounded_to_subset_a_input_clone_elim_or_subset_b_mbobject_bytes_header_shrink_no_other_paths"
requirement_id = "R4"
must_pin_allowed_fix_paths = true
must_forbid_in_place_bytes_mutation_path = true
must_forbid_changing_cpython_baseline_harness = true
allowed_fix_path_kind_field_name = "fix_path_kind"
allowed_fix_path_kind_values = [
    "subset_a_input_clone_elimination_via_shim_borrow",
    "subset_b_mbobject_bytes_header_shrink",
    "subset_b_bytes_capacity_field_removal",
    "subset_b_copy_on_write_for_short_lived_bytes",
]
disallowed_fix_path_kind_values_field_name = "disallowed_fix_path_kind_values"
disallowed_fix_path_kind_values = [
    "in_place_bytes_mutation_outside_cpython_contract",
    "cpython_baseline_harness_change",
    "skip_bench_to_pass_gate",
]
disallowed_fix_path_used_failure_kind = "perf_base64_disallowed_fix_path_used"
disallowed_fix_path_used_exit_code = 484
cpython_harness_changed_failure_kind = "perf_base64_cpython_harness_changed"
cpython_harness_changed_exit_code = 485
must_distinguish_disallowed_fix_path_from_cpython_harness_change = true

# R5 — sibling Phase 2 bytes-touching libs enumerated.
[r5_sibling_bytes_libs_enumerated_as_unblock_targets_contract]
case = "sibling_phase_2_bytes_touching_libs_enumerated_as_followon_unblock_targets_but_not_in_this_issue"
requirement_id = "R5"
must_pin_sibling_unblock_target_set = true
must_mark_sibling_retrofits_out_of_scope_for_this_issue = true
forbid_silently_dropping_sibling_from_set = true
sibling_unblock_targets_field_name = "sibling_unblock_targets"
sibling_unblock_targets = [
    "hashlib",
    "hmac",
    "zlib",
    "gzip",
    "lzma",
    "bz2",
    "codecs",
]
sibling_dropped_failure_kind = "perf_base64_sibling_unblock_target_dropped"
sibling_dropped_exit_code = 486
sibling_implemented_in_this_issue_failure_kind = "perf_base64_sibling_retrofit_implemented_in_this_issue"
sibling_implemented_in_this_issue_exit_code = 487
must_distinguish_sibling_dropped_from_sibling_pulled_in = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "bench_name",
    "memory_ratio_floor",
    "workload",
    "pre_fix_speed_ratio",
    "speed_regression_threshold",
    "required_measurement_fields",
    "starting_mamba_mb",
    "starting_cpython_mb",
    "starting_memory_ratio",
    "starting_speed_ratio",
    "fix_path_kind",
    "disallowed_fix_path_kind_values",
    "sibling_unblock_targets",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "base64_encode_decode_memory_ratio_reaches_at_least_1_0x_cpython_on_pinned_workload",
    "fix_must_not_regress_speed_below_pre_fix_baseline_post_change_speed_ratio_must_stay_at_least_pre_fix",
    "starting_deficit_0_50x_mem_and_14_39x_speed_recorded_with_mamba_mb_cpython_mb_samples_warmup",
    "fix_path_bounded_to_subset_a_input_clone_elim_or_subset_b_mbobject_bytes_header_shrink_no_other_paths",
    "sibling_phase_2_bytes_touching_libs_enumerated_as_followon_unblock_targets_but_not_in_this_issue",
]

[out_of_scope]
implementation_of_bytes_layout_shrink = true
sibling_lib_retrofits = true
cpython_baseline_harness_change = true
non_bytes_lib_memory_gate = true
c_extension_fast_paths = true
