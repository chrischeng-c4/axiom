# Typed generator FFI gate — closes #1381. Parent #1265 P1
# (tier:compute ≥10×), parent #1260 (perf bottoms tracker).
# Sister (closed): #1187 (state-machine rewrite — structure
# only; this issue closes the residual FFI-boundary cost).
#
# Today `generator_sum` sits at 0.66× CPython for `yield i` over
# 10000 ints. Even when codegen knows both producer and consumer
# are `int`, each yield crosses the FFI as `MbValue` →
# 10000× box + 10000× unbox + 10000× refcount. Strong-typing
# wins the loop body but loses at the FFI surface.
#
# The gate is GREEN only when:
#
#   - R1: New typed entry points are added:
#     `mb_next_i64(h) -> { value: i64, done: bool }`,
#     `mb_next_f64(h) -> { value: f64, done: bool }`, plus
#     the existing `mb_next_value(h) -> MbValue` as the
#     untyped fallback. Per-yield primitive boxing is refused
#     when both producer and consumer are typed.
#   - R2: Codegen emits the typed variant when the iterator's
#     element type is statically known. `for x in gen(10000):
#     total += x` with `def gen(n: int) -> Iterator[int]` MUST
#     emit zero `mb_box_int` / `mb_unbox_int` calls on the
#     yield path (Cranelift-IR verifiable).
#   - R3: `generator_sum` reaches ≥ 3.0× CPython on the
#     typed-generator-annotated baseline workload
#     (mypyc-class). Floor compliance count must move 5/8 →
#     ≥ 6/8.
#   - R4: Correctness invariants — untyped generators
#     (`Iterator[Any]`, no annotation) remain on the existing
#     `mb_next_value` fallback (no regression). Typed
#     specialization must not change observable yield order,
#     terminal `done=true` semantics, or `StopIteration`
#     propagation under exception path.
#   - R5: Fix path bounded to {monomorphized_typed_ffi_entry,
#     codegen_static_type_inference,
#     for_loop_lowering_skip_boxing_when_typed}. Removing the
#     `mb_next_value` fallback, or changing CPython baseline
#     harness, is refused.
#
# Out of scope: implementing the typed FFI itself; rewriting
# generator state machine (#1187 already closed); large-object
# allocator; CPython baseline change.
#
# Shape locked by src/ffi/tests/typed_generator_ffi_gate.rs.

version = 1
fixture = "typed_generator_ffi_gate"
issue = 1381
parent_issue = 1265
profile = "conformance"
family = "typed_generator_ffi_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
