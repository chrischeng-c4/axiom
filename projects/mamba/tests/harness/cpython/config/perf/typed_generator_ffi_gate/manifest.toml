requirement_id = "R1"
must_add_mb_next_i64_entrypoint = true
must_add_mb_next_f64_entrypoint = true
must_keep_mb_next_value_as_untyped_fallback = true
forbid_per_yield_primitive_boxing_when_both_typed = true
forbid_removing_untyped_fallback_in_this_issue = true
typed_ffi_entrypoints_field_name = "typed_ffi_entrypoints"
typed_ffi_entrypoints = [
    "mb_next_i64",
    "mb_next_f64",
    "mb_next_value",
]
typed_return_record_kind_field_name = "typed_return_record_kind"
allowed_typed_return_record_kind_values = ["value_and_done_struct", "tagged_union", "out_param_with_bool_return"]
expected_typed_return_record_kind = "value_and_done_struct"
typed_entrypoint_missing_failure_kind = "perf_typed_gen_typed_entrypoint_missing"
typed_entrypoint_missing_exit_code = 525
per_yield_boxing_when_both_typed_failure_kind = "perf_typed_gen_per_yield_boxing_when_both_typed"
per_yield_boxing_when_both_typed_exit_code = 526
untyped_fallback_removed_failure_kind = "perf_typed_gen_untyped_fallback_removed_in_this_issue"
untyped_fallback_removed_exit_code = 527
must_distinguish_typed_missing_from_boxing_from_fallback_removed = true

# R2 — codegen emits typed variant when statically known.
[r2_codegen_emits_typed_variant_when_statically_known_contract]
case = "for_loop_over_iterator_int_annotated_generator_emits_zero_mb_box_int_or_mb_unbox_int_calls_on_yield_path"
requirement_id = "R2"
must_emit_typed_variant_when_element_type_known = true
must_skip_boxing_on_yield_to_consume_path = true
must_verify_via_cranelift_ir = true
forbid_emitting_box_int_call_on_typed_yield_path = true
forbid_emitting_unbox_int_call_on_typed_yield_path = true
expected_box_int_call_count_on_typed_path_field_name = "expected_box_int_call_count_on_typed_path"
expected_box_int_call_count_on_typed_path = 0
expected_unbox_int_call_count_on_typed_path_field_name = "expected_unbox_int_call_count_on_typed_path"
expected_unbox_int_call_count_on_typed_path = 0
ir_verification_kind_field_name = "ir_verification_kind"
allowed_ir_verification_kind_values = ["cranelift_clif_inspection", "post_compile_disassembly", "no_ir_check"]
expected_ir_verification_kind = "cranelift_clif_inspection"
box_int_emitted_on_typed_path_failure_kind = "perf_typed_gen_box_int_emitted_on_typed_path"
box_int_emitted_on_typed_path_exit_code = 528
unbox_int_emitted_on_typed_path_failure_kind = "perf_typed_gen_unbox_int_emitted_on_typed_path"
unbox_int_emitted_on_typed_path_exit_code = 529
ir_verification_skipped_failure_kind = "perf_typed_gen_ir_verification_silently_skipped"
ir_verification_skipped_exit_code = 530
must_distinguish_box_from_unbox_from_ir_skip = true

# R3 — generator_sum ≥ 3.0× CPython + compliance.
[r3_generator_sum_meets_3x_floor_contract]
case = "generator_sum_typed_reaches_at_least_3_0x_cpython_on_baseline_and_floor_compliance_moves_5_of_8_to_6_of_8"
requirement_id = "R3"
must_meet_or_exceed_generator_sum_3x_floor = true
must_move_floor_compliance_count = true
forbid_silently_changing_workload = true
forbid_silently_widening_compliance_metric = true
bench_name_field_name = "bench_name"
expected_bench_name = "generator_sum_typed"
baseline_workload_field_name = "baseline_workload"
expected_baseline_workload = "yield_i_over_10000_ints_annotated_iterator_int"
cpython_ratio_floor_field_name = "cpython_ratio_floor"
