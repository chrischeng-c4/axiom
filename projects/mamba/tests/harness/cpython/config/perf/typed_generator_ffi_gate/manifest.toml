must_preserve_stopiteration_propagation_on_exception_path = true
forbid_regressing_untyped_generator_speed = true
forbid_changing_observable_yield_semantics_via_typed_path = true
untyped_fallback_entrypoint_field_name = "untyped_fallback_entrypoint"
expected_untyped_fallback_entrypoint = "mb_next_value"
preserved_semantic_axes_field_name = "preserved_semantic_axes"
preserved_semantic_axes = [
    "yield_order",
    "terminal_done_true",
    "stopiteration_propagation_on_exception_path",
]
untyped_regressed_failure_kind = "perf_typed_gen_untyped_generator_regressed"
untyped_regressed_exit_code = 533
yield_order_changed_failure_kind = "perf_typed_gen_yield_order_changed"
yield_order_changed_exit_code = 534
