must_cover_codegen_emits_typed_variant_when_statically_known = true
must_cover_generator_sum_meets_3x_floor = true
must_cover_untyped_fallback_no_regression = true
must_cover_fix_path_bounded = true
must_be_offline_or_loopback_only = true
must_be_deterministic = true

# R1 — typed FFI entry points added.
[r1_typed_ffi_entrypoints_added_contract]
