# Minimal unittest dispatch path fixture — closes #2545.
# Parent: #2528 (CPython Lib/test executes assertions instead of
# stub pass).
#
# Pins the shape of the smallest fixture that makes one tiny
# CPython Lib/test-style seed flow through unittest discovery far
# enough to execute a real assertion. Offline, deterministic,
# Stub-free:
#
#   - The fixture fails when its sentinel assertion is inverted.
#   - The fixture is not classified as Stub.
#   - No broad unittest implementation work is included here.
#
# Out of scope (issue body): expanding full unittest compatibility
# beyond the dispatch path needed for the sentinel.
#
# Shape locked by tests/schema_gates.rs (mod: tests/schema_gates/cpython_lib_test_minimal_unittest_dispatch_fixture_2545.rs).

version = 1
fixture = "cpython_lib_test_minimal_unittest_dispatch"
issue = 2545
parent_issue = 2528
profile = "cpython_lib_test"
family = "cpython_lib_test_minimal_unittest_dispatch"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[determinism]
must_be_deterministic = true
must_be_offline = true
must_be_repeatable_across_runs = true
forbid_wallclock_dependence = true
forbid_random_seed_dependence = true

# Canonical CPython Lib/test-style seed. One module, one
# TestCase subclass, one assertion. Sized so the unittest runner
# only needs minimal dispatch surface: discovery, instantiation,
# setUp/run/tearDown, assertEqual.
[seed_module_definition]
module_name = "test_mamba_2545_minimal"
testcase_class_name = "Mamba2545MinimalTestCase"
testcase_method_name = "test_two_plus_two_equals_four"
assertion_kind = "assertEqual"
assertion_lhs_python_repr = "2 + 2"
assertion_rhs_python_repr = "4"
sentinel_inversion_lhs_python_repr = "2 + 2"
sentinel_inversion_rhs_python_repr = "5"

# Runner command worker should run to dispatch the seed. Echoed
# in fixture comment / harness summary so the worker can copy it.
[runner_command]
must_record_runner_command_in_summary = true
runner_command_field_name = "runner_command"
canonical_runner_command = "mamba -m unittest -v test_mamba_2545_minimal"
forbid_invocation_via_pytest = true
forbid_invocation_via_nose = true
forbid_invocation_via_ad_hoc_harness = true

# Acceptance: "The fixture fails when its sentinel assertion is
# inverted."
[sentinel_failure_contract]
case = "fixture_fails_when_sentinel_assertion_is_inverted"
must_pass_with_original_assertion = true
must_fail_with_inverted_assertion = true
must_emit_assertion_error_kind_on_inversion = true
forbid_silent_pass_on_inverted_assertion = true
forbid_inverted_assertion_being_caught_by_runner = true
original_assertion_expected_outcome = "pass"
inverted_assertion_expected_outcome = "fail"
inverted_assertion_failure_kind = "unittest_assertion_failed"
inverted_assertion_exit_code = 176
must_distinguish_assertion_failure_from_runner_error = true
runner_error_failure_kind = "unittest_runner_error"
runner_error_exit_code = 177

# Acceptance: "The fixture is not classified as Stub."
[non_stub_classification_contract]
case = "fixture_is_not_classified_as_stub"
must_not_be_classified_as_stub = true
must_execute_real_assertion_during_dispatch = true
must_not_be_marked_as_passthrough = true
must_not_be_marked_as_placeholder = true
forbid_classification_value_stub = true
forbid_classification_value_passthrough = true
forbid_classification_value_placeholder = true
classification_field_name = "classification"
allowed_classification_values = ["real", "executed"]
forbid_silent_or_implicit_classification = true
stub_classification_failure_kind = "unittest_seed_classified_as_stub"
stub_classification_exit_code = 178

# Acceptance: "No broad unittest implementation work is included
# here."
[narrow_dispatch_scope_contract]
case = "no_broad_unittest_implementation_work_is_included_here"
must_limit_scope_to_minimal_dispatch_path = true
must_not_implement_full_unittest_runner = true
must_not_implement_test_loader_full_protocol = true
must_not_implement_test_suite_full_protocol = true
must_not_implement_test_result_full_protocol = true
required_dispatch_surface = [
    "unittest.TestCase",
    "unittest.TestCase.setUp",
    "unittest.TestCase.tearDown",
    "unittest.TestCase.run",
    "unittest.TestCase.assertEqual",
]
forbidden_surface = [
    "unittest.TestLoader.loadTestsFromModule_full_protocol",
    "unittest.TestSuite.run_full_protocol",
    "unittest.TextTestRunner_full_features",
    "unittest.mock_full_protocol",
]
scope_overshoot_failure_kind = "unittest_dispatch_scope_overshoot"
scope_overshoot_exit_code = 179

[runner_contract]
keys = [
    "outcome",
    "case",
    "module_name",
    "testcase_class_name",
    "testcase_method_name",
    "assertion_kind",
    "runner_command",
    "classification",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "fixture_fails_when_sentinel_assertion_is_inverted",
    "fixture_is_not_classified_as_stub",
    "no_broad_unittest_implementation_work_is_included_here",
]

[out_of_scope]
# Issue: "Out of scope: expanding full unittest compatibility beyond
# the dispatch path needed for the sentinel."
full_unittest_compatibility_beyond_dispatch_path = true
