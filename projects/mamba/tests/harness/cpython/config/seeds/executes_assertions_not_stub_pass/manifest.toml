# CPython Lib/test executes assertions not stub pass fixture —
# closes #2528.
# Parent: #2526 (MVP test completeness and release gates).
#
# Pins the shape of the CPython Lib/test parent gate. CPython
# Lib/test coverage must mean executed assertions, not import-only
# or Stub pass:
#
#   - Runtime assertion pass, import pass, stub, fail, timeout, and
#     parser-only are separate categories.
#   - MVP pass count excludes Stub and parser-only checks.
#   - Missing or unbaselined seed fixtures fail the gate.
#
# Atomic queue: #2536 CPython Lib/test seed baseline inventory
# check, #2539 add unittest assertion sentinel seed, #2540 add
# AssertionPass outcome to CPython Lib/test runner, #2541 add
# missing CPython Lib/test seed baseline entries, #2542 rename
# CPython Lib/test Pass to ImportPass, #2543 emit CPython Lib/test
# machine-readable summary, #2544 make Stub never count as MVP
# pass, #2545 wire one minimal unittest dispatch path, #2546 split
# CPython parser-only checks from runtime checks, #2547 add CPython
# Lib/test allowlist regression gate.
#
# Shape locked by src/meta_gates/tests/cpython_lib_test_real_assertions_gate.rs.

version = 1
fixture = "cpython_lib_test_executes_assertions_not_stub_pass"
issue = 2528
parent_issue = 2526
profile = "cpython_lib_test"
family = "cpython_lib_test_executes_assertions_not_stub_pass"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_assertion_pass_outcome = true
must_cover_import_pass_outcome = true
must_cover_stub_outcome = true
must_cover_fail_outcome = true
must_cover_timeout_outcome = true
must_cover_parser_only_outcome = true
must_exclude_stub_from_mvp_pass_count = true
must_exclude_parser_only_from_mvp_pass_count = true
must_fail_on_missing_seed_baseline_entries = true
must_fail_on_unbaselined_seed_fixtures = true

[atomic_queue]
issue_2536_cpython_lib_test_seed_baseline_inventory_check = true
issue_2539_add_unittest_assertion_sentinel_seed = true
issue_2540_add_assertion_pass_outcome_to_cpython_lib_test_runner = true
issue_2541_add_missing_cpython_lib_test_seed_baseline_entries = true
issue_2542_rename_cpython_lib_test_pass_to_import_pass = true
issue_2543_emit_cpython_lib_test_machine_readable_summary = true
issue_2544_make_stub_never_count_as_mvp_pass = true
issue_2545_wire_one_minimal_unittest_dispatch_path = true
issue_2546_split_cpython_parser_only_checks_from_runtime_checks = true
issue_2547_add_cpython_lib_test_allowlist_regression_gate = true

# Acceptance: "Runtime assertion pass, import pass, stub, fail,
# timeout, and parser-only are separate categories."
[separate_outcome_categories_contract]
case = "runtime_assertion_pass_import_pass_stub_fail_timeout_and_parser_only_are_separate_categories"
must_define_assertion_pass_category = true
must_define_import_pass_category = true
must_define_stub_category = true
must_define_fail_category = true
must_define_timeout_category = true
must_define_parser_only_category = true
forbid_collapsing_outcome_categories = true
forbid_aliasing_stub_to_assertion_pass = true
forbid_aliasing_import_pass_to_assertion_pass = true
forbid_aliasing_parser_only_to_assertion_pass = true
required_outcome_categories = [
    "assertion_pass",
    "import_pass",
    "stub",
    "fail",
    "timeout",
    "parser_only",
]
outcome_category_field_name = "outcome_category"
collapsed_outcome_failure_kind = "cpython_lib_test_outcome_collapsed"
collapsed_outcome_exit_code = 218
must_distinguish_each_outcome_category = true

# Acceptance: "MVP pass count excludes Stub and parser-only checks."
[mvp_pass_count_exclusion_contract]
case = "mvp_pass_count_excludes_stub_and_parser_only_checks"
must_exclude_stub_from_mvp_pass_count = true
must_exclude_parser_only_from_mvp_pass_count = true
forbid_stub_being_treated_as_mvp_pass = true
forbid_parser_only_being_treated_as_mvp_pass = true
forbid_silently_inflating_mvp_pass_count = true
mvp_pass_count_field_name = "mvp_pass_count"
excluded_outcome_categories_field_name = "excluded_from_mvp_pass_count"
required_excluded_outcome_categories = ["stub", "parser_only"]
stub_in_mvp_pass_count_failure_kind = "cpython_lib_test_stub_counted_as_mvp_pass"
stub_in_mvp_pass_count_exit_code = 219
parser_only_in_mvp_pass_count_failure_kind = "cpython_lib_test_parser_only_counted_as_mvp_pass"
parser_only_in_mvp_pass_count_exit_code = 220
must_distinguish_stub_inclusion_from_parser_only_inclusion = true

# Acceptance: "Missing or unbaselined seed fixtures fail the gate."
[missing_or_unbaselined_seed_contract]
case = "missing_or_unbaselined_seed_fixtures_fail_the_gate"
must_fail_on_missing_seed_baseline_entries = true
must_fail_on_unbaselined_seed_fixtures = true
forbid_silently_passing_with_missing_baseline = true
forbid_silently_passing_with_unbaselined_seed = true
seed_baseline_inventory_field_name = "seed_baseline_inventory"
missing_seed_baseline_failure_kind = "cpython_lib_test_seed_baseline_entry_missing"
missing_seed_baseline_exit_code = 221
unbaselined_seed_failure_kind = "cpython_lib_test_seed_unbaselined"
unbaselined_seed_exit_code = 222
must_distinguish_missing_baseline_entry_from_unbaselined_seed = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "outcome_category",
    "mvp_pass_count",
    "excluded_from_mvp_pass_count",
    "seed_baseline_inventory",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "runtime_assertion_pass_import_pass_stub_fail_timeout_and_parser_only_are_separate_categories",
    "mvp_pass_count_excludes_stub_and_parser_only_checks",
    "missing_or_unbaselined_seed_fixtures_fail_the_gate",
]

[out_of_scope]
# Scope is the manifest gate itself; the ten atomic-queue children
# (#2536, #2539-#2547) own runtime implementation of seed baseline
# inventory, sentinel seed, outcome categories, allowlist regression
# gate, and parser-only check split.
runtime_implementation_of_seed_baseline_inventory_check = true
runtime_implementation_of_unittest_assertion_sentinel_seed = true
runtime_implementation_of_assertion_pass_outcome = true
runtime_implementation_of_seed_baseline_entries = true
runtime_implementation_of_import_pass_rename = true
runtime_implementation_of_machine_readable_summary = true
runtime_implementation_of_stub_never_counts_as_mvp_pass = true
runtime_implementation_of_minimal_unittest_dispatch_path = true
runtime_implementation_of_parser_only_runtime_split = true
runtime_implementation_of_allowlist_regression_gate = true
