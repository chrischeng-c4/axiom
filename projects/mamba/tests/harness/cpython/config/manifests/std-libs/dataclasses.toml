# Manifest for the stdlib `dataclasses` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/dataclasses/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic behavior/real_world cases come out as fillable skeletons
#     (status="generated"), then an agent fills the body.
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py.
# CPython 3.12 is the oracle. bench/ is kept as-is (not regenerated here).

bucket = "std-libs"
lib    = "dataclasses"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_dataclasses"
subject   = "dataclasses"
kind      = "mechanical"
probe     = "attr"
attr      = "dataclass"

[[case]]
dimension = "surface"
case      = "dataclass_is_callable"
subject   = "dataclasses.dataclass"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "field_is_callable"
subject   = "dataclasses.field"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "fields_is_callable"
subject   = "dataclasses.fields"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "asdict_is_callable"
subject   = "dataclasses.asdict"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "astuple_is_callable"
subject   = "dataclasses.astuple"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "replace_is_callable"
subject   = "dataclasses.replace"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "is_dataclass_is_callable"
subject   = "dataclasses.is_dataclass"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "make_dataclass_is_callable"
subject   = "dataclasses.make_dataclass"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "frozen_instance_error_is_exception"
subject   = "dataclasses.FrozenInstanceError"
kind      = "mechanical"
probe     = "attr"
attr      = "__cause__"
module    = "dataclasses"

[[case]]
dimension = "surface"
case      = "missing_sentinel_present"
subject   = "dataclasses.MISSING"
kind      = "mechanical"
probe     = "not_callable"

# ===========================================================================
# BEHAVIOR — semantic (output matches CPython 3.12)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "decorator_generates_init_repr_eq"
subject   = "dataclasses.dataclass"
kind      = "semantic"
intent    = "@dataclass synthesizes __init__ (positional fields), __repr__ (ClassName(x=1.0, y=2.0)), and __eq__ (field-wise) for a two-field class"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "is_dataclass_class_and_instance"
subject   = "dataclasses.is_dataclass"
kind      = "semantic"
intent    = "is_dataclass is True for both the dataclass class and its instance, and False for a plain object()"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "fields_returns_field_objects"
subject   = "dataclasses.fields"
kind      = "semantic"
intent    = "fields() returns a tuple of Field objects in declaration order, each carrying name/type/default/default_factory attributes"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "asdict_returns_field_dict"
subject   = "dataclasses.asdict"
kind      = "semantic"
intent    = "asdict() converts a flat dataclass instance into a plain {field: value} dict"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "astuple_returns_field_tuple"
subject   = "dataclasses.astuple"
kind      = "semantic"
intent    = "astuple() converts a flat dataclass instance into a field-ordered tuple"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "field_default_and_default_factory"
subject   = "dataclasses.field"
kind      = "semantic"
intent    = "field(default=...) and field(default_factory=...) supply per-field defaults so a no-arg constructor yields the declared default values"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "post_init_runs_after_init"
subject   = "dataclasses.dataclass"
kind      = "semantic"
intent    = "__post_init__ runs after the synthesized __init__ and can derive an init=False field from the constructor-set fields"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "init_false_field_excluded"
subject   = "dataclasses.field"
kind      = "semantic"
intent    = "field(init=False) is excluded from the synthesized __init__ parameter list (its Field.init is False) while init=True fields are included"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "repr_false_field_hidden"
subject   = "dataclasses.field"
kind      = "semantic"
intent    = "field(repr=False) suppresses that field from the synthesized __repr__ while repr=True fields still appear"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "order_true_generates_comparisons"
subject   = "dataclasses.dataclass"
kind      = "semantic"
intent    = "@dataclass(order=True) generates <, >, <= from a lexicographic field-tuple comparison (first field dominates, later fields break ties)"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "unsafe_hash_makes_hashable"
subject   = "dataclasses.dataclass"
kind      = "semantic"
intent    = "@dataclass(unsafe_hash=True) synthesizes a field-based __hash__ so equal instances hash equal and can be used as set members"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "default_factory_not_shared"
subject   = "dataclasses.field"
kind      = "semantic"
intent    = "field(default_factory=list) builds a fresh list per instance so mutating one instance's list does not affect another"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "classvar_excluded_from_fields"
subject   = "dataclasses.dataclass"
kind      = "semantic"
intent    = "a typing.ClassVar-annotated attribute is excluded from dataclass field processing while plain-annotated fields are kept"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "asdict_recurses_nested_dataclass"
subject   = "dataclasses.asdict"
kind      = "semantic"
intent    = "asdict() recursively converts a nested dataclass field into a nested dict, preserving leaf values"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "replace_copies_with_overrides"
subject   = "dataclasses.replace"
kind      = "semantic"
intent    = "replace() returns a new instance with only the named fields overridden, leaving the original and unspecified fields untouched"
source    = "Lib/test/test_dataclasses.py"

[[case]]
dimension = "behavior"
case      = "frozen_default_hashable_dedups_in_set"
subject   = "dataclasses.dataclass"
kind      = "semantic"
intent    = "@dataclass(frozen=True) is hashable by default so equal frozen instances hash equal and deduplicate inside a set"
source    = "Lib/test/test_dataclasses.py"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc; assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "mutable_list_default_raises"
subject    = "dataclasses.dataclass"
kind       = "mechanical"
import     = "import dataclasses\nfrom typing import List"
call       = "dataclasses.dataclass(type('Bad', (), {'__annotations__': {'items': list}, 'items': []}))"
expect_exc = "ValueError"
source     = "Lib/test/test_dataclasses.py"

[[case]]
dimension  = "errors"
case       = "frozen_setattr_raises"
subject    = "dataclasses.FrozenInstanceError"
kind       = "mechanical"
import     = "import dataclasses\n\n@dataclasses.dataclass(frozen=True)\nclass _P:\n    x: int\n    y: int\n\n_p = _P(1, 2)"
call       = "setattr(_p, 'x', 10)"
expect_exc = "dataclasses.FrozenInstanceError"
source     = "Lib/test/test_dataclasses.py"

[[case]]
dimension  = "errors"
case       = "frozen_delattr_raises"
subject    = "dataclasses.FrozenInstanceError"
kind       = "mechanical"
import     = "import dataclasses\n\n@dataclasses.dataclass(frozen=True)\nclass _P:\n    x: int\n    y: int\n\n_p = _P(1, 2)"
call       = "delattr(_p, 'x')"
expect_exc = "dataclasses.FrozenInstanceError"
source     = "Lib/test/test_dataclasses.py"

[[case]]
dimension  = "errors"
case       = "required_after_default_raises"
subject    = "dataclasses.dataclass"
kind       = "mechanical"
import     = "import dataclasses"
call       = "dataclasses.dataclass(type('WrongOrder', (), {'__annotations__': {'a': int, 'b': int}, 'a': 1}))"
expect_exc = "TypeError"
source     = "Lib/test/test_dataclasses.py"

[[case]]
dimension  = "errors"
case       = "non_callable_default_factory_raises"
subject    = "dataclasses.field"
kind       = "mechanical"
import     = "import dataclasses"
call       = "dataclasses.dataclass(type('BadFactory', (), {'__annotations__': {'items': list}, 'items': dataclasses.field(default_factory=42)}))()"
expect_exc = "TypeError"
source     = "Lib/test/test_dataclasses.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "config_model_roundtrip"
subject   = "dataclasses"
kind      = "semantic"
intent    = "an end-user config-model flow: define a nested @dataclass schema with field defaults/default_factory, construct instances, serialize via asdict/astuple, immutably update via replace, and compare via the synthesized __eq__"
source    = "Lib/test/test_dataclasses.py"
