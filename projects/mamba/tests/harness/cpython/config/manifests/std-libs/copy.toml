# Manifest for the stdlib `copy` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/copy/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# plus the loose feature fixtures (atomic_identity, containers, pickle_protocol,
# reduce_reconstruct, subclasses_slots). bench/ is kept as-is. The CPython 3.12
# `copy` module is the oracle; mamba already passes the legacy corpus, so no
# xfail is set here.

bucket = "std-libs"
lib    = "copy"

# ===========================================================================
# SURFACE — mechanical probes (API existence / callability)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_copy"
subject   = "copy"
kind      = "mechanical"
probe     = "attr"
attr      = "copy"

[[case]]
dimension = "surface"
case      = "copy_is_callable"
subject   = "copy.copy"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "deepcopy_is_callable"
subject   = "copy.deepcopy"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "error_is_exception_subclass"
subject   = "copy.Error"
kind      = "mechanical"
probe     = "callable"
module    = "copy"

[[case]]
dimension = "surface"
case      = "error_alias_attr_present"
subject   = "copy"
kind      = "mechanical"
probe     = "attr"
attr      = "error"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc), self-asserting
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "custom_copy_hook_propagates"
subject    = "copy.copy"
kind       = "mechanical"
call       = "copy.copy(type('BadCopy', (), {'__copy__': lambda self: (_ for _ in ()).throw(copy.Error('refused'))})())"
expect_exc = "copy.Error"
source     = "Lib/test/test_copy.py"

[[case]]
dimension  = "errors"
case       = "custom_deepcopy_hook_propagates"
subject    = "copy.deepcopy"
kind       = "mechanical"
call       = "copy.deepcopy(type('BadDeepCopy', (), {'__deepcopy__': lambda self, memo: (_ for _ in ()).throw(copy.Error('refused'))})())"
expect_exc = "copy.Error"
source     = "Lib/test/test_copy.py"

[[case]]
dimension  = "errors"
case       = "getstate_exception_propagates"
subject    = "copy.copy"
kind       = "mechanical"
call       = "copy.copy(type('EvilState', (), {'__getstate__': lambda self: (_ for _ in ()).throw(ValueError('no state'))})())"
expect_exc = "ValueError"
source     = "Lib/test/test_copy.py"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "shallow_list_shares_inner"
subject   = "copy.copy"
kind      = "semantic"
intent    = "shallow copy of a nested list makes a new outer list but shares the inner sublists"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "shallow_dict_shares_values"
subject   = "copy.copy"
kind      = "semantic"
intent    = "shallow copy of a dict makes a new outer mapping but shares the mutable values"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "shallow_outer_mutation_isolated"
subject   = "copy.copy"
kind      = "semantic"
intent    = "appending to a shallow-copied list does not change the original's length, but mutating a shared inner list is visible in both"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "deepcopy_nested_independent"
subject   = "copy.deepcopy"
kind      = "semantic"
intent    = "deepcopy of a doubly-nested dict makes every level an independent object so mutating a deep value leaves the original untouched"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "deepcopy_reflexive_list_cycle"
subject   = "copy.deepcopy"
kind      = "semantic"
intent    = "deepcopy of a self-referential list rebuilds the cycle: the copy points to itself, not to the original"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "deepcopy_memo_shares_repeated_ref"
subject   = "copy.deepcopy"
kind      = "semantic"
intent    = "the memo makes two references to the same object inside one structure stay shared (and equal a single new object) after deepcopy"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "deepcopy_instance_recursive"
subject   = "copy.deepcopy"
kind      = "semantic"
intent    = "deepcopy of a linked-node instance copies the chain into fresh, independent instances"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "copy_atomic_returns_identity"
subject   = "copy.copy"
kind      = "semantic"
intent    = "copy.copy of immutable atoms (None, ints, floats, str, bytes, range, slice, frozenset, type, function code, empty/immutable tuples) returns the very same object"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "deepcopy_atomic_returns_identity"
subject   = "copy.deepcopy"
kind      = "semantic"
intent    = "deepcopy of immutable atoms and tuples-of-immutables returns the same object, but a tuple holding a mutable member is rebuilt with an independent inner copy"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "copy_mutable_containers_new_but_equal"
subject   = "copy.copy"
kind      = "semantic"
intent    = "shallow copy of bytearray/set/list/dict (including empty ones) yields a distinct object that compares equal, with mutable members still shared"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "deepcopy_tuple_with_mutable_rebuilt"
subject   = "copy.deepcopy"
kind      = "semantic"
intent    = "deepcopy of a tuple containing a list returns a new tuple whose inner list is independent of the original"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "pickle_getstate_setstate_drives_copy"
subject   = "copy.deepcopy"
kind      = "semantic"
intent    = "with no __copy__/__deepcopy__, copy falls back to the pickle protocol so __getstate__/__setstate__ drive the copied state and deepcopy makes it independent"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "pickle_getnewargs_reconstructs"
subject   = "copy.copy"
kind      = "semantic"
intent    = "__getnewargs__ and __getnewargs_ex__ feed the reconstructed instance's __new__ so an int subclass with extra state copies correctly"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "reduce_ex_priority_string_returns_self"
subject   = "copy.copy"
kind      = "semantic"
intent    = "__reduce_ex__ is consulted once with protocol 4 and takes priority over __reduce__; a string result means copy returns the object itself"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "reduce_tuple_reconstructs_state"
subject   = "copy.deepcopy"
kind      = "semantic"
intent    = "a __reduce__ 3-tuple (callable, args, state) reconstructs the instance, applying the state dict for copy and an independent copy of it for deepcopy"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "reduce_string_returns_self"
subject   = "copy.copy"
kind      = "semantic"
intent    = "a __reduce__ returning a string means both copy and deepcopy return the object itself"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "copyreg_pickle_supplies_reducer"
subject   = "copy.copy"
kind      = "semantic"
intent    = "copyreg.pickle registers a reducer for a class that defines none, so copy succeeds after registration where it failed before"
import    = "import copy\nimport copyreg"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "deepcopy_reflexive_instance"
subject   = "copy.deepcopy"
kind      = "semantic"
intent    = "deepcopy of an instance that stores a reference to itself rebuilds the self-reference through the memo"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "deepcopy_bound_method_rebinds"
subject   = "copy.deepcopy"
kind      = "semantic"
intent    = "deepcopying an object that stores one of its own bound methods rebinds the method's __self__ to the copy, not the original"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "subclass_builtins_keep_data_and_attrs"
subject   = "copy.deepcopy"
kind      = "semantic"
intent    = "list/dict/tuple subclasses keep both their element data and extra instance attributes through shallow (shared inners) and deep (independent) copies"
source    = "Lib/test/test_copy.py"

[[case]]
dimension = "behavior"
case      = "slots_shallow_shares_deep_copies"
subject   = "copy.deepcopy"
kind      = "semantic"
intent    = "a __slots__ instance shares its slot value under shallow copy and gets an independent slot value under deepcopy"
source    = "Lib/test/test_copy.py"

# ===========================================================================
# REAL_WORLD — semantic end-user scenario
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "config_template_clone_isolated"
subject   = "copy.deepcopy"
kind      = "semantic"
intent    = "deepcopy a shared default-config template into a per-request config so mutating one request's nested settings never leaks into the template or sibling requests"
source    = "Lib/test/test_copy.py"
