# Manifest for the stdlib `linecache` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/linecache/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, cache_dict.py, lazycache.py,
# real_world/_stub.py). bench/ is left as-is.
#
# linecache is forgiving: most missing-file / out-of-range / bad-name lookups
# return "" or [] rather than raising. The one strict path is a non-integer
# lineno (TypeError). Every fixture clears the cache and routes all filesystem
# use through tempfile so nothing leaks into the repo.

bucket = "std-libs"
lib = "linecache"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_linecache"
subject   = "linecache"
kind      = "mechanical"
probe     = "attr"
attr      = "getline"

[[case]]
dimension = "surface"
case      = "getline_is_callable"
subject   = "linecache.getline"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "getlines_is_callable"
subject   = "linecache.getlines"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "checkcache_is_callable"
subject   = "linecache.checkcache"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "clearcache_is_callable"
subject   = "linecache.clearcache"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "lazycache_is_callable"
subject   = "linecache.lazycache"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "updatecache_is_callable"
subject   = "linecache.updatecache"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "cache_is_dict"
subject   = "linecache.cache"
kind      = "mechanical"
probe     = "type"
typename  = "dict"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc)
# ===========================================================================

# The one strict path: a non-integer (float) lineno raises TypeError.
[[case]]
dimension  = "errors"
case       = "getline_float_lineno_raises"
subject    = "linecache.getline"
kind       = "mechanical"
call       = "linecache.getline(__file__, 1.1)"
expect_exc = "TypeError"
source     = "Lib/test/test_linecache.py"

# ===========================================================================
# ERRORS — semantic (forgiving "no raise" paths that return "" / [] / None)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "getline_missing_file_returns_empty"
subject   = "linecache.getline"
kind      = "semantic"
intent    = "getline of a non-existent file returns '' without raising"
source    = "Lib/test/test_linecache.py"

[[case]]
dimension = "errors"
case      = "getline_out_of_range_returns_empty"
subject   = "linecache.getline"
kind      = "semantic"
intent    = "getline with a line number past EOF returns '' without raising"
source    = "Lib/test/test_linecache.py"

[[case]]
dimension = "errors"
case      = "getlines_missing_file_returns_empty_list"
subject   = "linecache.getlines"
kind      = "semantic"
intent    = "getlines of a non-existent file returns [] without raising"
source    = "Lib/test/test_linecache.py"

[[case]]
dimension = "errors"
case      = "updatecache_missing_file_returns_empty_list"
subject   = "linecache.updatecache"
kind      = "semantic"
intent    = "updatecache of a non-existent file returns [] without raising"
source    = "Lib/test/test_linecache.py"

[[case]]
dimension = "errors"
case      = "checkcache_missing_file_no_raise"
subject   = "linecache.checkcache"
kind      = "semantic"
intent    = "checkcache on a missing/unknown filename does not raise and returns None"

[[case]]
dimension = "errors"
case      = "clearcache_no_raise"
subject   = "linecache.clearcache"
kind      = "semantic"
intent    = "clearcache always succeeds and returns None"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- getline --------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "getline_one_based_indexing"
subject   = "linecache.getline"
kind      = "semantic"
intent    = "getline is 1-based: line 1 is the first source line, line 3 the third, over a tempfile"
source    = "Lib/test/test_linecache.py"

[[case]]
dimension = "behavior"
case      = "getline_zero_and_negative_return_empty"
subject   = "linecache.getline"
kind      = "semantic"
intent    = "getline with lineno 0, -1, or 2**15 returns '' (only 1..len map to lines), over a tempfile"
source    = "Lib/test/test_linecache.py"

[[case]]
dimension = "behavior"
case      = "getline_bad_filename_returns_empty"
subject   = "linecache.getline"
kind      = "semantic"
intent    = "getline with an empty or syntactically-invalid filename returns '' without raising"
source    = "Lib/test/test_linecache.py"

[[case]]
dimension = "behavior"
case      = "getline_round_trips_with_open"
subject   = "linecache.getline"
kind      = "semantic"
intent    = "every line read directly via open() equals getline of that 1-based lineno, over a tempfile"
source    = "Lib/test/test_linecache.py"

# --- getlines -------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "getlines_returns_list_per_line"
subject   = "linecache.getlines"
kind      = "semantic"
intent    = "getlines returns a list[str] with one newline-terminated entry per source line, over a tempfile"
source    = "Lib/test/test_linecache.py"

# --- cache dict / checkcache / clearcache ---------------------------------

[[case]]
dimension = "behavior"
case      = "getline_populates_cache"
subject   = "linecache.cache"
kind      = "semantic"
intent    = "getline populates linecache.cache, keyed by filename, for each file read, over a TemporaryDirectory"
source    = "Lib/test/test_linecache.py"

[[case]]
dimension = "behavior"
case      = "clearcache_empties_cache"
subject   = "linecache.clearcache"
kind      = "semantic"
intent    = "clearcache removes every populated entry from linecache.cache, over a TemporaryDirectory"
source    = "Lib/test/test_linecache.py"

[[case]]
dimension = "behavior"
case      = "checkcache_keeps_unchanged_file"
subject   = "linecache.checkcache"
kind      = "semantic"
intent    = "checkcache keeps the cache entry of an unchanged on-disk file, over a TemporaryDirectory"
source    = "Lib/test/test_linecache.py"

[[case]]
dimension = "behavior"
case      = "checkcache_drops_vanished_file"
subject   = "linecache.checkcache"
kind      = "semantic"
intent    = "checkcache drops the cache entry once its backing file is deleted, over a TemporaryDirectory"
source    = "Lib/test/test_linecache.py"

# --- lazycache ------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "lazycache_registers_then_materializes"
subject   = "linecache.lazycache"
kind      = "semantic"
intent    = "lazycache registers a lazy 1-tuple entry for an absent file via a loader's get_source and returns True; a later getlines materializes the source"
source    = "Lib/test/test_linecache.py"

[[case]]
dimension = "behavior"
case      = "lazycache_already_cached_returns_false"
subject   = "linecache.lazycache"
kind      = "semantic"
intent    = "lazycache leaves a fully-cached 4-tuple entry untouched and returns False"
source    = "Lib/test/test_linecache.py"

[[case]]
dimension = "behavior"
case      = "lazycache_no_globals_returns_false"
subject   = "linecache.lazycache"
kind      = "semantic"
intent    = "lazycache with module_globals=None has nothing to load from, returns False, and caches nothing"
source    = "Lib/test/test_linecache.py"

[[case]]
dimension = "behavior"
case      = "lazycache_bad_filename_returns_false"
subject   = "linecache.lazycache"
kind      = "semantic"
intent    = "lazycache rejects non-cacheable names (empty string, angle-bracketed) and returns False"
source    = "Lib/test/test_linecache.py"

# ===========================================================================
# REAL_WORLD — semantic (one end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "traceback_style_source_snippet"
subject   = "linecache"
kind      = "semantic"
intent    = "a traceback-style tool writes a source file, then uses checkcache + getline to print a context snippet (the failing line plus the lines above and below), the way traceback/inspect render frames"
source    = "Lib/test/test_linecache.py"
