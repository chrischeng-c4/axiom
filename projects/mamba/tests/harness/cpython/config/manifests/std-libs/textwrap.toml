# Manifest for the stdlib `textwrap` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/textwrap/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py,
# dedent.py, real_world/_stub.py). bench/ is left as-is.
#
# mamba gap (repo memory: project-mamba-stdlib-stub-audit-2026-05-26):
# `textwrap.fill`/`textwrap.wrap`/`textwrap.shorten` are silent stubs under
# mamba — `fill` returns the input unchanged (no wrap), `wrap` does not split
# to width, and width<=0 / placeholder-too-large paths do not raise. Cases
# whose verdict depends on real wrapping/width-bounding/raising therefore carry
# xfail. `textwrap.dedent` and `textwrap.indent` are NOT flagged as stubbed, so
# their cases stay green.

bucket = "std-libs"
lib = "textwrap"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_textwrap"
subject   = "textwrap"
kind      = "mechanical"
probe     = "attr"
attr      = "wrap"

[[case]]
dimension = "surface"
case      = "wrap_is_callable"
subject   = "textwrap.wrap"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "fill_is_callable"
subject   = "textwrap.fill"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "dedent_is_callable"
subject   = "textwrap.dedent"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "indent_is_callable"
subject   = "textwrap.indent"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "shorten_is_callable"
subject   = "textwrap.shorten"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "textwrapper_has_wrap"
subject   = "textwrap.TextWrapper"
kind      = "mechanical"
probe     = "attr"
attr      = "wrap"
module    = "textwrap"

[[case]]
dimension = "surface"
case      = "textwrapper_has_fill"
subject   = "textwrap.TextWrapper"
kind      = "mechanical"
probe     = "attr"
attr      = "fill"
module    = "textwrap"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "wrap_zero_width_raises"
subject    = "textwrap.wrap"
kind       = "mechanical"
call       = "textwrap.wrap(\"hello\", width=0)"
expect_exc = "ValueError"
xfail      = "textwrap.wrap is a silent stub under mamba — width<=0 does not raise (repo memory project-mamba-stdlib-stub-audit-2026-05-26)"

[[case]]
dimension  = "errors"
case       = "wrap_negative_width_raises"
subject    = "textwrap.wrap"
kind       = "mechanical"
call       = "textwrap.wrap(\"hello\", width=-5)"
expect_exc = "ValueError"
xfail      = "textwrap.wrap is a silent stub under mamba — width<=0 does not raise (repo memory project-mamba-stdlib-stub-audit-2026-05-26)"

[[case]]
dimension  = "errors"
case       = "fill_zero_width_raises"
subject    = "textwrap.fill"
kind       = "mechanical"
call       = "textwrap.fill(\"hello\", width=0)"
expect_exc = "ValueError"
xfail      = "textwrap.fill is a silent stub under mamba — width<=0 does not raise (repo memory project-mamba-stdlib-stub-audit-2026-05-26)"

[[case]]
dimension  = "errors"
case       = "shorten_width_too_small_raises"
subject    = "textwrap.shorten"
kind       = "mechanical"
call       = "textwrap.shorten(\"hello world\", width=2, placeholder=\"[...]\")"
expect_exc = "ValueError"
xfail      = "textwrap.shorten is a silent stub under mamba — placeholder-too-large does not raise (repo memory project-mamba-stdlib-stub-audit-2026-05-26)"

[[case]]
dimension  = "errors"
case       = "shorten_placeholder_over_width_raises"
subject    = "textwrap.shorten"
kind       = "mechanical"
call       = "textwrap.shorten(\"x\" * 20, width=8, placeholder=\"(.......)\")"
expect_exc = "ValueError"
xfail      = "textwrap.shorten is a silent stub under mamba — placeholder-too-large does not raise (repo memory project-mamba-stdlib-stub-audit-2026-05-26)"

[[case]]
dimension  = "errors"
case       = "dedent_non_str_raises"
subject    = "textwrap.dedent"
kind       = "mechanical"
call       = "textwrap.dedent(123)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "indent_non_str_raises"
subject    = "textwrap.indent"
kind       = "mechanical"
call       = "textwrap.indent(123, \"  \")"
expect_exc = "AttributeError"

