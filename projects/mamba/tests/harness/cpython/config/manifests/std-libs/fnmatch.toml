# Manifest for the stdlib `fnmatch` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/fnmatch/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py,
# the loose feature fixtures bytes_patterns.py / translate_edge.py /
# fnmatch_basic.py, plus extra cases drawn from the CPython oracle
# Lib/test/test_fnmatch.py. No coverage dropped. bench/ kept as-is.

bucket = "std-libs"
lib = "fnmatch"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_fnmatch"
subject   = "fnmatch"
kind      = "mechanical"
probe     = "attr"
attr      = "fnmatch"

[[case]]
dimension = "surface"
case      = "fnmatch_is_callable"
subject   = "fnmatch.fnmatch"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "fnmatchcase_is_callable"
subject   = "fnmatch.fnmatchcase"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "filter_is_callable"
subject   = "fnmatch.filter"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "translate_is_callable"
subject   = "fnmatch.translate"
kind      = "mechanical"
probe     = "callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc). CPython raises TypeError for
# non-string args and for mixing the bytes/str type barrier.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "fnmatch_int_pattern_raises"
subject    = "fnmatch.fnmatch"
kind       = "mechanical"
call       = "fnmatch.fnmatch(\"a.py\", 123)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "fnmatch_int_name_raises"
subject    = "fnmatch.fnmatch"
kind       = "mechanical"
call       = "fnmatch.fnmatch(123, \"*.py\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "translate_int_raises"
subject    = "fnmatch.translate"
kind       = "mechanical"
call       = "fnmatch.translate(123)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "filter_non_iterable_raises"
subject    = "fnmatch.filter"
kind       = "mechanical"
call       = "fnmatch.filter(123, \"*.py\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "fnmatch_str_name_bytes_pattern_raises"
subject    = "fnmatch.fnmatch"
kind       = "mechanical"
call       = "fnmatch.fnmatch(\"test\", b\"*\")"
expect_exc = "TypeError"
source     = "Lib/test/test_fnmatch.py"

[[case]]
dimension  = "errors"
case       = "fnmatch_bytes_name_str_pattern_raises"
subject    = "fnmatch.fnmatch"
kind       = "mechanical"
call       = "fnmatch.fnmatch(b\"test\", \"*\")"
expect_exc = "TypeError"
source     = "Lib/test/test_fnmatch.py"

[[case]]
dimension  = "errors"
case       = "fnmatchcase_str_name_bytes_pattern_raises"
subject    = "fnmatch.fnmatchcase"
kind       = "mechanical"
call       = "fnmatch.fnmatchcase(\"test\", b\"*\")"
expect_exc = "TypeError"
source     = "Lib/test/test_fnmatch.py"

[[case]]
dimension  = "errors"
case       = "fnmatchcase_bytes_name_str_pattern_raises"
subject    = "fnmatch.fnmatchcase"
kind       = "mechanical"
call       = "fnmatch.fnmatchcase(b\"test\", \"*\")"
expect_exc = "TypeError"
source     = "Lib/test/test_fnmatch.py"

[[case]]
dimension  = "errors"
case       = "filter_str_names_bytes_pattern_raises"
subject    = "fnmatch.filter"
kind       = "mechanical"
call       = "fnmatch.filter([\"test\"], b\"*\")"
expect_exc = "TypeError"
source     = "Lib/test/test_fnmatch.py"

[[case]]
dimension  = "errors"
case       = "filter_bytes_names_str_pattern_raises"
subject    = "fnmatch.filter"
kind       = "mechanical"
call       = "fnmatch.filter([b\"test\"], \"*\")"
expect_exc = "TypeError"
source     = "Lib/test/test_fnmatch.py"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

# --- fnmatchcase: glob metacharacters (case-sensitive, OS-independent) -----

[[case]]
dimension = "behavior"
case      = "star_matches_any_run"
subject   = "fnmatch.fnmatchcase"
kind      = "semantic"
intent    = "* matches any run of characters including zero and the empty string; '*.txt' matches multi-segment names and a leading dot, and bare '*' matches the empty string"

[[case]]
dimension = "behavior"
case      = "question_matches_exactly_one"
subject   = "fnmatch.fnmatchcase"
kind      = "semantic"
intent    = "? matches exactly one character: 'a?c' matches 'abc' but not 'ac' (too few) nor 'aXXc' (too many)"
source    = "Lib/test/test_fnmatch.py"

[[case]]
dimension = "behavior"
case      = "char_class_inclusive_range"
subject   = "fnmatch.fnmatchcase"
kind      = "semantic"
intent    = "[a-z] matches an inclusive lowercase range: both endpoints 'a' and 'z' match, a digit '0' does not"
source    = "Lib/test/test_fnmatch.py"

[[case]]
dimension = "behavior"
case      = "char_class_negated"
subject   = "fnmatch.fnmatchcase"
kind      = "semantic"
intent    = "[!a-z] is a negated class: a digit '0' matches, a lowercase letter 'a' does not"
source    = "Lib/test/test_fnmatch.py"

[[case]]
dimension = "behavior"
case      = "char_class_set_membership"
subject   = "fnmatch.fnmatchcase"
kind      = "semantic"
intent    = "[abc] matches set membership: '[abc]at' matches 'cat' but not 'xat'; the negated '[!abc]at' matches 'xat'"
source    = "Lib/test/test_fnmatch.py"

[[case]]
dimension = "behavior"
case      = "fnmatchcase_is_case_sensitive"
subject   = "fnmatch.fnmatchcase"
kind      = "semantic"
intent    = "fnmatchcase is strictly case-sensitive regardless of OS: 'README.MD' matches '*.MD', but 'readme.md' does not match '*.MD' (only '*.md')"
source    = "Lib/test/test_fnmatch.py"

[[case]]
dimension = "behavior"
case      = "star_crosses_path_separators"
subject   = "fnmatch.fnmatchcase"
kind      = "semantic"
intent    = "fnmatch is string-level not path-level: * spans '/' so 'a/b/c.txt' matches '*.txt' and '*/*.txt'"

# --- filter ---------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "filter_keeps_matching_in_order"
subject   = "fnmatch.filter"
kind      = "semantic"
intent    = "filter returns the matching names in input order; mixed list filtered by '*.txt' keeps only the .txt names in their original positions"
source    = "Lib/test/test_fnmatch.py"

[[case]]
dimension = "behavior"
case      = "filter_no_matches_empty_list"
subject   = "fnmatch.filter"
kind      = "semantic"
intent    = "filter returns [] when nothing matches the pattern"

[[case]]
dimension = "behavior"
case      = "filter_all_matches_returns_all"
subject   = "fnmatch.filter"
kind      = "semantic"
intent    = "filter returns the whole list (a new equal list) when every name matches"

[[case]]
dimension = "behavior"
case      = "filter_prefix_pattern"
subject   = "fnmatch.filter"
kind      = "semantic"
intent    = "filter(['Python','Ruby','Perl','Tcl'], 'P*') keeps the names starting with P in order: ['Python','Perl']"
source    = "Lib/test/test_fnmatch.py"

# --- translate regex semantics --------------------------------------------

[[case]]
dimension = "behavior"
case      = "translate_returns_anchored_regex"
subject   = "fnmatch.translate"
kind      = "semantic"
intent    = "translate returns a str regex wrapped in (?s:...)\\Z that is anchored to the full string: the compiled regex matches 'script.py' but not 'script.py.bak'"

[[case]]
dimension = "behavior"
case      = "translate_single_metachar_substitutions"
subject   = "fnmatch.translate"
kind      = "semantic"
intent    = "translate maps * -> .*, ? -> ., and pins the exact 3.12 strings for '*', '?', 'a?b*', '*.txt'"
source    = "Lib/test/test_fnmatch.py"

[[case]]
dimension = "behavior"
case      = "translate_bracket_expressions"
subject   = "fnmatch.translate"
kind      = "semantic"
intent    = "translate bracket rules: [abc]->[abc], []]->[]] (literal close-bracket first), [!x]->[^x], [^x]->[\\^x] (literal caret escaped), [x->\\[x (unterminated bracket is literal)"
source    = "Lib/test/test_fnmatch.py"

[[case]]
dimension = "behavior"
case      = "translate_collapses_consecutive_stars"
subject   = "fnmatch.translate"
kind      = "semantic"
intent    = "translate squashes runs of consecutive stars to a single .*: '*********'->(?s:.*)\\Z, 'A*********'->(?s:A.*)\\Z, '*********A'->(?s:.*A)\\Z, 'A*********?[?]?'->(?s:A.*.[?].)\\Z"
source    = "Lib/test/test_fnmatch.py"

[[case]]
dimension = "behavior"
case      = "translate_atomic_groups_prevent_backtracking"
subject   = "fnmatch.translate"
kind      = "semantic"
intent    = "translate rewrites interior '*literal' runs into atomic groups: '**a*a****a' -> (?s:(?>.*?a)(?>.*?a).*a)\\Z, and the undocumented paste-multiple-results feature still matches the intended strings"
source    = "Lib/test/test_fnmatch.py"

# --- bytes patterns --------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "bytes_patterns_match_like_str"
subject   = "fnmatch.fnmatch"
kind      = "semantic"
intent    = "all-bytes args match like the str version: fnmatch(b'test.py', b'*.py') is True, fnmatch(b'test.rs', b'*.py') is False, fnmatchcase stays case-sensitive on bytes"
source    = "Lib/test/test_fnmatch.py"

[[case]]
dimension = "behavior"
case      = "filter_bytes_returns_bytes"
subject   = "fnmatch.filter"
kind      = "semantic"
intent    = "filter with bytes names + bytes pattern keeps the matching bytes objects (every result element is bytes); filter(['Python',...], 'P*') with str is unaffected"
source    = "Lib/test/test_fnmatch.py"

# --- forgiving patterns (no raise) ----------------------------------------

[[case]]
dimension = "behavior"
case      = "unterminated_bracket_no_match"
subject   = "fnmatch.fnmatch"
kind      = "semantic"
intent    = "a malformed pattern is forgiving, not an error: an unterminated bracket '[abc' does not raise and treats the bracket literally so it does not match 'a'"

# ===========================================================================
# REAL_WORLD — semantic (one realistic end-user flow)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "select_source_files_in_listing"
subject   = "fnmatch.filter"
kind      = "semantic"
intent    = "a realistic flow: given a directory listing, use fnmatch.filter to select the Python source files (*.py) while skipping other extensions, mirroring how a build tool picks inputs"
