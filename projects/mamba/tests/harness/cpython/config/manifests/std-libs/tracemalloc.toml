# Manifest for the stdlib `tracemalloc` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/tracemalloc/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, filters.py, live_tracing.py, snapshot.py,
# statistics.py, traceback_repr.py, real_world/_stub.py). bench/ is left as-is.
#
# Note (recovered from the legacy behavior.py): mamba's tracemalloc is a thin
# shim over GC counters, not a full per-allocation tracer. The legacy
# behavior monolith only asserted the parity-compatible bit (the nine entries
# are callable); the richer Snapshot/Filter/Traceback/Statistic semantics
# (snapshot.py, statistics.py, filters.py, traceback_repr.py, live_tracing.py)
# are CPython-green but exercise behaviour mamba's shim does not implement.
# Those carry xfail so conformance skips mamba for them while CPython stays the
# oracle. Class subjects (Filter/DomainFilter/Snapshot/Traceback) infer the
# importable module `tracemalloc` correctly (the inferer stops at the first
# CapWords component, leaving `tracemalloc`).

bucket = "std-libs"
lib = "tracemalloc"

