# Manifest for the stdlib `tomllib` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/tomllib/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the retired monoliths surface.py / behavior.py / errors.py
# plus the real_world placeholder. bench/ is kept as-is. CPython 3.12 oracle:
# Lib/test/test_tomllib/.

bucket = "std-libs"
lib = "tomllib"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_tomllib"
subject   = "tomllib"
kind      = "mechanical"
probe     = "attr"
attr      = "loads"

[[case]]
dimension = "surface"
case      = "loads_is_callable"
subject   = "tomllib.loads"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "load_is_callable"
subject   = "tomllib.load"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "tomldecodeerror_attr"
subject   = "tomllib"
kind      = "mechanical"
probe     = "attr"
attr      = "TOMLDecodeError"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc); generator emits assert-it-raised
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "unclosed_array_raises"
subject    = "tomllib.loads"
kind       = "mechanical"
call       = "tomllib.loads('key = [unclosed')"
expect_exc = "tomllib.TOMLDecodeError"
source     = "Lib/test/test_tomllib/test_error.py"

[[case]]
dimension  = "errors"
case       = "unclosed_inline_table_raises"
subject    = "tomllib.loads"
kind       = "mechanical"
call       = "tomllib.loads('key = {unclosed')"
expect_exc = "tomllib.TOMLDecodeError"
source     = "Lib/test/test_tomllib/test_error.py"

[[case]]
dimension  = "errors"
case       = "invalid_value_char_raises"
subject    = "tomllib.loads"
kind       = "mechanical"
call       = "tomllib.loads('key = @invalid')"
expect_exc = "tomllib.TOMLDecodeError"
source     = "Lib/test/test_tomllib/test_error.py"

[[case]]
dimension  = "errors"
case       = "duplicate_key_raises"
subject    = "tomllib.loads"
kind       = "mechanical"
call       = "tomllib.loads('a = 1\\na = 2\\n')"
expect_exc = "tomllib.TOMLDecodeError"
source     = "Lib/test/test_tomllib/test_error.py"

[[case]]
dimension  = "errors"
case       = "bad_date_raises"
subject    = "tomllib.loads"
kind       = "mechanical"
call       = "tomllib.loads('d = 2024-13-01\\n')"
expect_exc = "tomllib.TOMLDecodeError"
source     = "Lib/test/test_tomllib/test_error.py"

[[case]]
dimension  = "errors"
case       = "unterminated_string_raises"
subject    = "tomllib.loads"
kind       = "mechanical"
call       = "tomllib.loads('a = \"unterminated\\n')"
expect_exc = "tomllib.TOMLDecodeError"
source     = "Lib/test/test_tomllib/test_error.py"

[[case]]
dimension  = "errors"
case       = "invalid_statement_raises"
subject    = "tomllib.loads"
kind       = "mechanical"
call       = "tomllib.loads('not = a = toml = file')"
expect_exc = "tomllib.TOMLDecodeError"
source     = "Lib/test/test_tomllib/test_error.py"

[[case]]
dimension  = "errors"
case       = "missing_value_raises"
subject    = "tomllib.loads"
kind       = "mechanical"
call       = "tomllib.loads('\\n\\nfwfw=')"
expect_exc = "tomllib.TOMLDecodeError"
source     = "Lib/test/test_tomllib/test_error.py"

[[case]]
dimension  = "errors"
case       = "str_file_typeerror"
subject    = "tomllib.load"
kind       = "mechanical"
import     = "import tomllib\nimport io"
call       = "tomllib.load(io.StringIO('a = 1'))"
expect_exc = "TypeError"
source     = "Lib/test/test_tomllib/test_misc.py"

[[case]]
dimension  = "errors"
case       = "invalid_parse_float_raises"
subject    = "tomllib.loads"
kind       = "mechanical"
call       = "tomllib.loads('f=0.1', parse_float=lambda s: {})"
expect_exc = "ValueError"
source     = "Lib/test/test_tomllib/test_error.py"

# ===========================================================================
# BEHAVIOR — semantic (output matches CPython); agent fills the body
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "basic_vs_literal_string_escapes"
subject   = "tomllib.loads"
kind      = "semantic"
intent    = "basic strings process backslash escapes (\\n -> newline); literal single-quoted strings keep the backslash literal"
source    = "Lib/test/test_tomllib/test_data.py"

[[case]]
dimension = "behavior"
case      = "integer_radix_and_underscores"
subject   = "tomllib.loads"
kind      = "semantic"
intent    = "integers parse in decimal, hex (0xFF=255), octal (0o77=63), binary (0b1010=10), signed, and with underscore separators (1_000_000)"
source    = "Lib/test/test_tomllib/test_data.py"

[[case]]
dimension = "behavior"
case      = "float_forms_and_special"
subject   = "tomllib.loads"
kind      = "semantic"
intent    = "floats parse plain (3.14159), negative, exponent (6.022e23, 1e-10), and the special values inf and nan"
source    = "Lib/test/test_tomllib/test_data.py"

[[case]]
dimension = "behavior"
case      = "datetime_date_time_types"
subject   = "tomllib.loads"
kind      = "semantic"
intent    = "offset datetime parses to datetime.datetime, a bare date to datetime.date, a bare time to datetime.time, with correct year/month fields"
source    = "Lib/test/test_tomllib/test_misc.py"

[[case]]
dimension = "behavior"
case      = "mixed_and_nested_arrays"
subject   = "tomllib.loads"
kind      = "semantic"
intent    = "TOML 1.0 arrays hold mixed types ([1, 2.0, 'three']) and nest ([[1,2],[3,4]]) into the corresponding Python list structure"
source    = "Lib/test/test_tomllib/test_data.py"

[[case]]
dimension = "behavior"
case      = "deep_nested_tables"
subject   = "tomllib.loads"
kind      = "semantic"
intent    = "a dotted [a.b.c] header builds nested dicts so data['a']['b']['c']['value'] resolves"
source    = "Lib/test/test_tomllib/test_data.py"

[[case]]
dimension = "behavior"
case      = "inline_table_to_dict"
subject   = "tomllib.loads"
kind      = "semantic"
intent    = "an inline table point = {x = 1, y = 2} parses to the Python dict {'x': 1, 'y': 2}"
source    = "Lib/test/test_tomllib/test_data.py"

[[case]]
dimension = "behavior"
case      = "array_of_tables_to_list"
subject   = "tomllib.loads"
kind      = "semantic"
intent    = "repeated [[products]] headers build a Python list of dicts in document order, preserving each table's keys"
source    = "Lib/test/test_tomllib/test_data.py"

[[case]]
dimension = "behavior"
case      = "boolean_literals"
subject   = "tomllib.loads"
kind      = "semantic"
intent    = "the literals true and false parse to the Python singletons True and False"
source    = "Lib/test/test_tomllib/test_data.py"

[[case]]
dimension = "behavior"
case      = "parse_float_hook_decimal"
subject   = "tomllib.loads"
kind      = "semantic"
intent    = "the parse_float hook routes every float token through a custom callable (Decimal), including inf and nan, leaving other types untouched"
source    = "Lib/test/test_tomllib/test_misc.py"

[[case]]
dimension = "behavior"
case      = "load_from_binary_file"
subject   = "tomllib.load"
kind      = "semantic"
intent    = "tomllib.load reads from a binary file object (BytesIO and an on-disk tempfile opened 'rb') and yields the same dict tomllib.loads would"
source    = "Lib/test/test_tomllib/test_misc.py"

# ===========================================================================
# REAL_WORLD — semantic end-to-end scenario; agent fills the body
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "app_config_load_and_query"
subject   = "tomllib.loads"
kind      = "semantic"
intent    = "an application loads a realistic pyproject-style config (sections, arrays of tables, inline tables, typed scalars) and queries server host/port, a list of products, and a nested build setting, asserting each value"
source    = "Lib/test/test_tomllib/test_misc.py"
