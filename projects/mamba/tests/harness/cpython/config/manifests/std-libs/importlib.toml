# Manifest for the stdlib `importlib` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/importlib/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the real_world placeholder. importlib's submodules (util / abc / machinery /
# resources) are exposed by CPython as module objects that are NOT auto-loaded
# on a plain `import importlib`; each must be imported explicitly. Cases that
# touch a submodule therefore set an explicit `import = "import importlib.<sub>"`
# (the import inferer would otherwise emit only `import importlib`, leaving the
# attribute unresolved).

bucket = "std-libs"
lib = "importlib"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable / not_callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_importlib"
subject   = "importlib"
kind      = "mechanical"
probe     = "attr"
attr      = "import_module"

[[case]]
dimension = "surface"
case      = "import_module_is_callable"
subject   = "importlib.import_module"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "reload_is_callable"
subject   = "importlib.reload"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "invalidate_caches_is_callable"
subject   = "importlib.invalidate_caches"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "util_find_spec_is_callable"
subject   = "importlib.util.find_spec"
kind      = "mechanical"
import    = "import importlib.util"
probe     = "callable"

# Submodules are module objects (callable() == False) and require explicit
# import — a plain `import importlib` does not bind them.

[[case]]
dimension = "surface"
case      = "util_submodule_not_callable"
subject   = "importlib.util"
kind      = "mechanical"
import    = "import importlib.util"
probe     = "not_callable"

[[case]]
dimension = "surface"
case      = "abc_submodule_not_callable"
subject   = "importlib.abc"
kind      = "mechanical"
import    = "import importlib.abc"
probe     = "not_callable"

[[case]]
dimension = "surface"
case      = "machinery_submodule_not_callable"
subject   = "importlib.machinery"
kind      = "mechanical"
import    = "import importlib.machinery"
probe     = "not_callable"

[[case]]
dimension = "surface"
case      = "resources_submodule_not_callable"
subject   = "importlib.resources"
kind      = "mechanical"
import    = "import importlib.resources"
probe     = "not_callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc), all filesystem/network-free
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "import_module_missing_raises"
subject    = "importlib.import_module"
kind       = "mechanical"
call       = "importlib.import_module(\"no_such_module_xyzzy_123\")"
expect_exc = "ModuleNotFoundError"
source     = "Lib/test/test_importlib"

[[case]]
dimension  = "errors"
case       = "import_module_empty_name_raises"
subject    = "importlib.import_module"
kind       = "mechanical"
call       = "importlib.import_module(\"\")"
expect_exc = "ValueError"
source     = "Lib/test/test_importlib"

[[case]]
dimension  = "errors"
case       = "import_module_relative_no_package_raises"
subject    = "importlib.import_module"
kind       = "mechanical"
call       = "importlib.import_module(\".relative_no_pkg\")"
expect_exc = "TypeError"
source     = "Lib/test/test_importlib"

[[case]]
dimension  = "errors"
case       = "reload_non_module_raises"
subject    = "importlib.reload"
kind       = "mechanical"
call       = "importlib.reload(42)"
expect_exc = "TypeError"
source     = "Lib/test/test_importlib"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "import_module_imports_real_module"
subject   = "importlib.import_module"
kind      = "semantic"
intent    = "import_module(\"json\") returns the json module object whose __name__ is 'json', equivalent to a plain import"
source    = "Lib/test/test_importlib"

[[case]]
dimension = "behavior"
case      = "invalidate_caches_returns_none"
subject   = "importlib.invalidate_caches"
kind      = "semantic"
intent    = "invalidate_caches() runs without error and returns None"

[[case]]
dimension = "behavior"
case      = "find_spec_missing_returns_none"
subject   = "importlib.util.find_spec"
kind      = "semantic"
import    = "import importlib.util"
intent    = "find_spec for a non-existent module name returns None rather than raising"
source    = "Lib/test/test_importlib"

[[case]]
dimension = "behavior"
case      = "module_not_found_error_is_import_error"
subject   = "importlib.import_module"
kind      = "semantic"
intent    = "ModuleNotFoundError is a subclass of ImportError, so import_module misses can be caught as ImportError"
source    = "Lib/test/test_importlib"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario, filesystem-free)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "plugin_registry_dynamic_import"
subject   = "importlib.import_module"
kind      = "semantic"
intent    = "a plugin loader resolves a batch of dotted module names from configuration via import_module, skipping unavailable plugins by catching ModuleNotFoundError, and collects the imported module objects into a registry the way an extensible app discovers optional backends"
source    = "Lib/test/test_importlib"
