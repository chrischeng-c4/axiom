# ===========================================================================
# ERRORS — mechanical (call + expect_exc; assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "ref_int_raises"
subject    = "weakref.ref"
kind       = "mechanical"
call       = "weakref.ref(42)"
expect_exc = "TypeError"
source     = "Lib/test/test_weakref.py"

[[case]]
dimension  = "errors"
case       = "ref_str_raises"
subject    = "weakref.ref"
kind       = "mechanical"
call       = "weakref.ref('hello')"
expect_exc = "TypeError"
source     = "Lib/test/test_weakref.py"

[[case]]
dimension  = "errors"
case       = "ref_tuple_raises"
subject    = "weakref.ref"
kind       = "mechanical"
call       = "weakref.ref((1, 2, 3))"
expect_exc = "TypeError"
source     = "Lib/test/test_weakref.py"

[[case]]
dimension  = "errors"
case       = "proxy_int_raises"
subject    = "weakref.proxy"
kind       = "mechanical"
call       = "weakref.proxy(42)"
expect_exc = "TypeError"
source     = "Lib/test/test_weakref.py"

[[case]]
dimension  = "errors"
case       = "weakmethod_plain_function_raises"
subject    = "weakref.WeakMethod"
kind       = "mechanical"
import     = "import weakref\n\ndef _meth():\n    return 1"
call       = "weakref.WeakMethod(_meth)"
expect_exc = "TypeError"
source     = "Lib/test/test_weakref.py"

[[case]]
dimension  = "errors"
case       = "weakvaluedictionary_missing_key_raises"
subject    = "weakref.WeakValueDictionary"
kind       = "mechanical"
import     = "import weakref\n\n_wvd = weakref.WeakValueDictionary()"
call       = "_wvd['missing']"
expect_exc = "KeyError"
source     = "Lib/test/test_weakref.py"

[[case]]
dimension  = "errors"
case       = "weakvaluedictionary_int_value_raises"
subject    = "weakref.WeakValueDictionary"
kind       = "mechanical"
import     = "import weakref\n\n_wvd = weakref.WeakValueDictionary()"
call       = "_wvd.__setitem__('k', 42)"
expect_exc = "TypeError"
source     = "Lib/test/test_weakref.py"

[[case]]
dimension  = "errors"
case       = "ref_reinit_bogus_args_raises"
subject    = "weakref.ref"
kind       = "mechanical"
import     = "import weakref\n\n_r = weakref.ref(Exception)"
call       = "_r.__init__(0, 0, 0, 0, 0)"
expect_exc = "TypeError"
source     = "Lib/test/test_weakref.py"

[[case]]
dimension  = "errors"
case       = "hash_proxy_raises"
subject    = "weakref.proxy"
kind       = "mechanical"
import     = "import weakref\n\nclass _Hashable:\n    def __hash__(self):\n        return 42\n\n_h = _Hashable()\n_p = weakref.proxy(_h)"
call       = "hash(_p)"
expect_exc = "TypeError"
source     = "Lib/test/test_weakref.py"

# ===========================================================================
# BEHAVIOR — semantic (CPython is the oracle; mamba gaps carry xfail #1466)
# ===========================================================================

# --- live deref / proxy transparency (mamba-supported subset) ---

[[case]]
dimension = "behavior"
case      = "ref_deref_returns_referent"
subject   = "weakref.ref"
kind      = "semantic"
intent    = "ref() returns the exact referent object while it is alive; its attributes read through"
source    = "Lib/test/test_weakref.py"

[[case]]
dimension = "behavior"
case      = "proxy_attribute_forwarding"
subject   = "weakref.proxy"
kind      = "semantic"
intent    = "proxy forwards attribute reads transparently to the live referent"
source    = "Lib/test/test_weakref.py"

# --- proxy operator forwarding (mamba diverges: proxy is not transparent) ---

[[case]]
dimension = "behavior"
case      = "proxy_numeric_operator_forwarding"
subject   = "weakref.proxy"
kind      = "semantic"
intent    = "proxy forwards +, reflected +, // and //= to the referent's numeric dunders"
xfail     = "mamba proxy not operator-transparent: proxy + float diverges from CPython (refcount-only shim, gh #1466)"
source    = "Lib/test/test_weakref.py"

[[case]]
dimension = "behavior"
case      = "proxy_matmul_operator_forwarding"
subject   = "weakref.proxy"
kind      = "semantic"
intent    = "proxy forwards @, reflected @, and @= to __matmul__/__rmatmul__/__imatmul__"
xfail     = "mamba proxy not operator-transparent: proxy @ diverges from CPython (refcount-only shim, gh #1466)"
source    = "Lib/test/test_weakref.py"

[[case]]
dimension = "behavior"
case      = "proxy_index_and_bool_forwarding"
