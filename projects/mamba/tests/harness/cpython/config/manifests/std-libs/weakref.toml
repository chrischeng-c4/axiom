# Manifest for the stdlib `weakref` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/weakref/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the loose feature files (introspection.py / proxy_operators.py /
# proxy_protocols.py) plus the golden-paired test_weakref{,_semantics}.py.
# CPython 3.12 is the oracle.
#
# mamba runtime is refcount-only (no tracing GC integration, gh #1466): a
# `weakref.ref` does not expire on referent collection, `getweakrefcount`
# returns 0, GC callbacks/finalize-on-collect never fire, proxy operator
# forwarding and the ref repr/type metadata diverge. Every case that depends
# on those carries an xfail citing #1466 so conformance skips mamba while CPython
# stays the green oracle.

bucket = "std-libs"
lib    = "weakref"

