# Manifest for the stdlib `pprint` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/pprint/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, collections_repr.py, depth.py, dict_formatting.py,
# integers.py, namespace_dataclass.py, recursion.py, wrapping.py, and the
# real_world/_stub.py placeholder). bench/ is left as-is.
#
# Oracle note (recovered while decomposing errors.py): the legacy errors
# monolith printed on BOTH branches of every try/except, so it exited 0 even
# for inputs that do NOT raise. Verified against CPython 3.12: width=-1 does
# NOT raise, and pformat(mixed, sort_dicts=True) does NOT raise (pprint catches
# the unorderable-key TypeError internally and falls back to insertion order).
# Those two go to errors/ as semantic "no raise" cases; only the genuine
# raisers (negative depth/indent, depth=0, width=0, extra positional) are
# mechanical call+expect_exc.
#
# The PrettyPrinter subject is CapWords, so the import inferer stops before it;
# those cases carry an explicit module = "pprint".

bucket = "std-libs"
lib = "pprint"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_pprint"
subject   = "pprint"
kind      = "mechanical"
probe     = "attr"
attr      = "pformat"

[[case]]
dimension = "surface"
case      = "pformat_is_callable"
subject   = "pprint.pformat"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "pprint_is_callable"
subject   = "pprint.pprint"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "pp_is_callable"
subject   = "pprint.pp"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "saferepr_is_callable"
subject   = "pprint.saferepr"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "isreadable_is_callable"
subject   = "pprint.isreadable"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "isrecursive_is_callable"
subject   = "pprint.isrecursive"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "prettyprinter_is_callable"
subject   = "pprint.PrettyPrinter"
kind      = "mechanical"
probe     = "callable"
module    = "pprint"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc); genuine raisers only
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "negative_depth_raises"
subject    = "pprint.PrettyPrinter"
kind       = "mechanical"
call       = "pprint.PrettyPrinter(depth=-1)"
expect_exc = "ValueError"
module     = "pprint"
source     = "Lib/test/test_pprint.py"

[[case]]
dimension  = "errors"
case       = "negative_indent_raises"
subject    = "pprint.PrettyPrinter"
kind       = "mechanical"
call       = "pprint.PrettyPrinter(indent=-1)"
expect_exc = "ValueError"
module     = "pprint"

[[case]]
dimension  = "errors"
case       = "zero_depth_raises"
subject    = "pprint.PrettyPrinter"
kind       = "mechanical"
call       = "pprint.PrettyPrinter(depth=0)"
expect_exc = "ValueError"
module     = "pprint"

[[case]]
dimension  = "errors"
case       = "zero_width_raises"
subject    = "pprint.PrettyPrinter"
kind       = "mechanical"
call       = "pprint.PrettyPrinter(width=0)"
expect_exc = "ValueError"
module     = "pprint"

[[case]]
dimension  = "errors"
case       = "extra_positional_arg_raises"
subject    = "pprint.PrettyPrinter"
kind       = "mechanical"
call       = "pprint.PrettyPrinter(4, 40, 5, __import__('io').StringIO(), True)"
expect_exc = "TypeError"
module     = "pprint"
source     = "Lib/test/test_pprint.py"

# ===========================================================================
# ERRORS — semantic ("no raise" cases that the legacy monolith silently
# treated as raisers; verified against the CPython 3.12 oracle as NON-raising)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "negative_width_no_raise"
subject   = "pprint.PrettyPrinter"
kind      = "semantic"
intent    = "PrettyPrinter(width=-1) does NOT raise under CPython 3.12 (only depth/indent and zero width/depth are validated); constructing it succeeds"
module    = "pprint"
source    = "Lib/test/test_pprint.py"

[[case]]
dimension = "errors"
case      = "unorderable_keys_sort_no_raise"
subject   = "pprint.pformat"
kind      = "semantic"
intent    = "pformat({1:'a','two':'b'}, sort_dicts=True) does NOT raise: pprint catches the unorderable-key TypeError internally and falls back to insertion order"
source    = "Lib/test/test_pprint.py"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "scalar_pformat"
subject   = "pprint.pformat"
kind      = "semantic"
intent    = "pformat renders scalars verbatim: 42->'42', 'hello'->\"'hello'\", None->'None', True->'True'"
source    = "Lib/test/test_pprint.py"

[[case]]
dimension = "behavior"
case      = "pprint_returns_none"
subject   = "pprint.pprint"
kind      = "semantic"
intent    = "pprint() prints as a side effect and returns None (the return contract, independent of stream)"
source    = "Lib/test/test_pprint.py"

[[case]]
dimension = "behavior"
case      = "pformat_eval_roundtrip"
subject   = "pprint.pformat"
kind      = "semantic"
intent    = "pformat output is round-trippable for readable values: eval(pformat('hello'))=='hello' and eval(pformat((1,2,3)))==(1,2,3)"
source    = "Lib/test/test_pprint.py"

[[case]]
dimension = "behavior"
case      = "redirect_stdout_none_no_crash"
subject   = "pprint.pprint"
kind      = "semantic"
intent    = "with contextlib.redirect_stdout(None) both pprint() and PrettyPrinter().pprint() resolve the stream lazily and do not crash"
source    = "Lib/test/test_pprint.py"

[[case]]
dimension = "behavior"
case      = "depth_truncation"
subject   = "pprint.pformat"
kind      = "semantic"
intent    = "unbounded depth reproduces repr; depth=1 collapses past the first level to (...)/{...}/[...]; depth=2 keeps two levels then truncates, across nested tuple/dict/list"
source    = "Lib/test/test_pprint.py"

[[case]]
dimension = "behavior"
case      = "dict_key_ordering"
subject   = "pprint.pformat"
kind      = "semantic"
intent    = "pprint sorts dict keys by default (and inside nested lists), sort_dicts=False preserves insertion order, and heterogeneous sortable keys order deterministically by key value"
source    = "Lib/test/test_pprint.py"

[[case]]
dimension = "behavior"
case      = "integer_formatting"
subject   = "pprint.pformat"
kind      = "semantic"
intent    = "plain ints render as decimal repr; underscore_numbers=True groups thousands (1_234_567); an int subclass is rendered via its own __repr__"
source    = "Lib/test/test_pprint.py"

[[case]]
dimension = "behavior"
case      = "collections_repr"
subject   = "pprint.pformat"
kind      = "semantic"
intent    = "pprint keeps each container's repr prefix (Counter/OrderedDict/deque/ChainMap/defaultdict/mappingproxy, deque maxlen=) while wrapping contents, and User* wrappers format like their builtin"
source    = "Lib/test/test_pprint.py"

[[case]]
dimension = "behavior"
case      = "namespace_and_dataclass_repr"
subject   = "pprint.pformat"
kind      = "semantic"
intent    = "SimpleNamespace renders as namespace(field=value,...) (subclass uses its own class name) and a dataclass renders as ClassName(field=value,...); both wrap and align fields to the width"
source    = "Lib/test/test_pprint.py"

[[case]]
dimension = "behavior"
case      = "recursive_marker_rendered"
subject   = "pprint.pformat"
kind      = "semantic"
intent    = "a self-referential list is rendered with a <Recursion ...> marker instead of looping forever"
source    = "Lib/test/test_pprint.py"

[[case]]
dimension = "behavior"
case      = "isrecursive_isreadable_predicates"
subject   = "pprint.isrecursive"
kind      = "semantic"
intent    = "isrecursive reports reference cycles and isreadable reports eval-back-ability: True for acyclic literals, False for cyclic structures and non-literal reprs (functions/modules/object()); breaking a cycle restores readability"
source    = "Lib/test/test_pprint.py"

[[case]]
dimension = "behavior"
case      = "line_wrapping"
subject   = "pprint.pformat"
kind      = "semantic"
intent    = "pformat breaks a composite only when its single-line render exceeds width; indent sets the continuation offset, compact bounds every line to width, and long str/bytes split across adjacent literals (round-tripping via eval)"
source    = "Lib/test/test_pprint.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "config_dump_roundtrip"
subject   = "pprint.pformat"
kind      = "semantic"
intent    = "a config-dump workflow: pformat a nested settings dict with sort_dicts/width/indent, assert the rendered block, and eval it back to the identical structure"
source    = "Lib/test/test_pprint.py"
