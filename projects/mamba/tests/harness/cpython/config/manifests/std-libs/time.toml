# Manifest for the stdlib `time` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/time/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py)
# plus the loose feature files strftime_special.py and tzset.py. bench/ is
# left as-is; real_world/_stub.py is promoted into surface_walkthrough.py.
#
# CPython 3.12 is the oracle. `time` is a real native module under mamba (not a
# stub) per the time surface/behavior fixtures; no xfails are inherited.

bucket = "std-libs"
lib = "time"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_time"
subject   = "time"
kind      = "mechanical"
probe     = "attr"
attr      = "time"

