# ===========================================================================
# SURFACE — semantic (the 36-entry public-surface presence sweep is one rule
# over a table of names; cohesion keeps it a single file)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "public_surface_present"
subject   = "time"
kind      = "semantic"
intent    = "all 36 typeshed public entries (clock constants, clock readers, conversion fns, tz globals, struct_time) resolve via getattr(time, name)"
source    = "Lib/test/test_time.py"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc; each deterministically raises under
# CPython 3.12 on this platform)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "strptime_format_mismatch_raises"
subject    = "time.strptime"
kind       = "mechanical"
call       = "time.strptime('not_a_date', '%Y-%m-%d')"
expect_exc = "ValueError"
source     = "Lib/test/test_time.py"

[[case]]
dimension  = "errors"
case       = "mktime_short_tuple_raises"
subject    = "time.mktime"
kind       = "mechanical"
call       = "time.mktime((2024, 1, 1))"
expect_exc = "TypeError"
source     = "Lib/test/test_time.py"

[[case]]
dimension  = "errors"
case       = "sleep_negative_raises"
subject    = "time.sleep"
kind       = "mechanical"
call       = "time.sleep(-1)"
expect_exc = "ValueError"
source     = "Lib/test/test_time.py"

[[case]]
dimension  = "errors"
case       = "clock_gettime_bad_id_raises"
subject    = "time.clock_gettime"
kind       = "mechanical"
call       = "time.clock_gettime(999999)"
expect_exc = "OSError"
source     = "Lib/test/test_time.py"

[[case]]
dimension  = "errors"
case       = "asctime_int_arg_raises"
subject    = "time.asctime"
kind       = "mechanical"
call       = "time.asctime(123)"
expect_exc = "TypeError"
source     = "Lib/test/test_time.py"

[[case]]
dimension  = "errors"
case       = "strftime_bytes_format_raises"
subject    = "time.strftime"
kind       = "mechanical"
call       = "time.strftime(b'%S', time.gmtime(0))"
expect_exc = "TypeError"
source     = "Lib/test/test_time.py"

# ===========================================================================
# ERRORS — semantic (one rule over a table of inputs; cohesion keeps the
# inputs together in a single file rather than one-file-per-input)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "insane_timestamp_overflows"
subject   = "time.gmtime"
kind      = "semantic"
intent    = "an out-of-range timestamp (1e200) raises OverflowError (not a garbage struct_time) across ctime, gmtime, and localtime"
source    = "Lib/test/test_time.py"

[[case]]
dimension = "errors"
case      = "strptime_bytes_args_raise"
subject   = "time.strptime"
kind      = "semantic"
intent    = "strptime rejects bytes for either argument: time.strptime(b'2009', '%Y') and time.strptime('2009', b'%Y') both raise TypeError"
source    = "Lib/test/test_time.py"

[[case]]
dimension = "errors"
case      = "sleep_non_number_raises"
subject   = "time.sleep"
kind      = "semantic"
intent    = "sleep requires a real number; passing a list, a str, or a complex each raises TypeError"
source    = "Lib/test/test_time.py"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- clock readers: type + invariants -------------------------------------

[[case]]
dimension = "behavior"
case      = "time_returns_positive_float"
subject   = "time.time"
kind      = "semantic"
intent    = "time.time() returns a float of seconds since the unix epoch, greater than 1e9"

[[case]]
dimension = "behavior"
case      = "time_ns_returns_positive_int"
subject   = "time.time_ns"
kind      = "semantic"
intent    = "time.time_ns() returns an int of nanoseconds since the epoch, greater than zero, consistent with time.time() to within one second"

[[case]]
dimension = "behavior"
case      = "monotonic_non_decreasing"
subject   = "time.monotonic"
kind      = "semantic"
intent    = "ten successive time.monotonic() reads are float and never go backward (each >= the previous)"
source    = "Lib/test/test_time.py"

[[case]]
dimension = "behavior"
case      = "perf_counter_advances"
subject   = "time.perf_counter"
kind      = "semantic"
intent    = "time.perf_counter() is a float and strictly advances across a busy interval (two reads bracketing a 1000-iteration loop)"

[[case]]
dimension = "behavior"
case      = "process_time_non_negative_float"
subject   = "time.process_time"
kind      = "semantic"
intent    = "time.process_time() returns a non-negative float"

# --- struct_time / gmtime / strftime / strptime ----------------------------

[[case]]
dimension = "behavior"
case      = "gmtime_epoch_components"
subject   = "time.gmtime"
kind      = "semantic"
intent    = "time.gmtime(0) is the unix epoch 1970-01-01 00:00:00 UTC: year/mon/mday/hour/min/sec and tm_wday=3 (Thu) tm_yday=1"
source    = "Lib/test/test_time.py"

[[case]]
dimension = "behavior"
case      = "gmtime_epoch_tuple_slice"
subject   = "time.gmtime"
kind      = "semantic"
intent    = "tuple(time.gmtime(0))[:6] equals (1970, 1, 1, 0, 0, 0) — struct_time is tuple-like by index and by slice"
source    = "Lib/test/test_time.py"

[[case]]
dimension = "behavior"
case      = "struct_time_index_access"
subject   = "time.struct_time"
kind      = "semantic"
intent    = "struct_time supports integer index access mirroring the named fields: gmtime(0)[0]==1970, [1]==1, [5]==0"
module    = "time"

[[case]]
dimension = "behavior"
case      = "strftime_epoch_datetime"
subject   = "time.strftime"
kind      = "semantic"
intent    = "strftime('%Y-%m-%d %H:%M:%S', gmtime(0)) renders the epoch as '1970-01-01 00:00:00'"
source    = "Lib/test/test_time.py"

[[case]]
dimension = "behavior"
case      = "strftime_julian_day"
subject   = "time.strftime"
kind      = "semantic"
intent    = "%j is the zero-padded day-of-year: nine days after the epoch is Jan 10, tm_yday==10, strftime('%j') == '010'"

[[case]]
dimension = "behavior"
case      = "strftime_zero_field_defaults"
subject   = "time.strftime"
kind      = "semantic"
intent    = "strftime substitutes documented defaults for zero-valued fields: (2000,)+(0,)*8 with '%Y %m %d %H %M %S %w %j' yields '2000 01 01 00 00 00 1 001'"
source    = "Lib/test/test_time.py"

[[case]]
dimension = "behavior"
case      = "strptime_parses_datetime"
subject   = "time.strptime"
kind      = "semantic"
intent    = "strptime('2023-06-15 12:30:00', '%Y-%m-%d %H:%M:%S') returns a struct_time with year=2023, mon=6, mday=15, hour=12"
source    = "Lib/test/test_time.py"

[[case]]
dimension = "behavior"
case      = "strptime_zone_directives"
subject   = "time.strptime"
kind      = "semantic"
intent    = "strptime understands %Z (zone name -> tm_zone == 'UTC') and %z (offset -> tm_gmtoff == 5*3600)"
source    = "Lib/test/test_time.py"

# --- ctime / asctime / conversion round-trips ------------------------------

[[case]]
dimension = "behavior"
case      = "ctime_canonical_form"
subject   = "time.ctime"
kind      = "semantic"
intent    = "ctime renders a fixed timestamp in the 24-char canonical form: 1973-09-16 01:03:52 -> 'Sun Sep 16 01:03:52 1973' and 2000-01-01 -> 'Sat Jan  1 00:00:00 2000' (struct built with tm_isdst=-1 so mktime resolves DST)"
source    = "Lib/test/test_time.py"

[[case]]
dimension = "behavior"
case      = "ctime_now_returns_str"
subject   = "time.ctime"
kind      = "semantic"
intent    = "ctime() and ctime(None) both use the current time and return a str without raising"
source    = "Lib/test/test_time.py"

[[case]]
dimension = "behavior"
case      = "ctime_asctime_mktime_consistent"
subject   = "time.ctime"
kind      = "semantic"
intent    = "for 'now', ctime(t) == asctime(localtime(t)) and int(mktime(localtime(t))) round-trips to int(t)"
source    = "Lib/test/test_time.py"

# --- now / None forms -------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "gmtime_none_means_now"
subject   = "time.gmtime"
kind      = "semantic"
intent    = "gmtime() and gmtime(None) both mean 'now': their mktime values differ by less than one second"
source    = "Lib/test/test_time.py"

[[case]]
dimension = "behavior"
case      = "localtime_none_means_now"
subject   = "time.localtime"
kind      = "semantic"
intent    = "localtime() and localtime(None) both mean 'now': their mktime values differ by less than one second"
source    = "Lib/test/test_time.py"

# --- get_clock_info ---------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "get_clock_info_flags"
subject   = "time.get_clock_info"
kind      = "semantic"
intent    = "get_clock_info reports the right monotonic/adjustable flags: 'monotonic' is monotonic & not adjustable, 'time' is not monotonic & adjustable, 'process_time' is monotonic & not adjustable"
source    = "Lib/test/test_time.py"

# --- localtime tz-aware round-trip -----------------------------------------

[[case]]
dimension = "behavior"
case      = "localtime_mktime_roundtrip"
subject   = "time.localtime"
kind      = "semantic"
intent    = "localtime exposes tm_gmtoff and tm_zone; localtime(mktime(localtime(now))) round-trips equal and preserves tm_gmtoff and tm_zone"
source    = "Lib/test/test_time.py"

[[case]]
dimension = "behavior"
case      = "gmtime_struct_fields_in_range"
subject   = "time.gmtime"
kind      = "semantic"
intent    = "gmtime of an arbitrary timestamp (1_700_000_000) yields a struct_time whose mon is 1..12, mday 1..31, hour 0..23"

# --- strftime passthrough ---------------------------------------------------

[[case]]
dimension = "behavior"
case      = "strftime_passes_non_directive_chars"
subject   = "time.strftime"
kind      = "semantic"
intent    = "strftime copies non-directive characters verbatim — bare emoji, lone/paired UTF-16 surrogates, and embedded NUL bytes (single, 1000-run, and interleaved with %c/%B directives) pass through unchanged; only %-directives are interpreted"

# --- tzset (Unix/macOS) -----------------------------------------------------

[[case]]
dimension = "behavior"
case      = "tzset_rereads_tz_env"
subject   = "time.tzset"
kind      = "semantic"
intent    = "tzset re-reads the TZ env var: UTC+0 makes gmtime==localtime with daylight/timezone 0 and tm_isdst 0; EST+05EDT makes gmtime!=localtime with tzname ('EST','EDT'), daylight 1, timezone 18000, altzone 14400, December tm_isdst 0; original TZ restored in finally"
source    = "Lib/test/test_time.py"

# ===========================================================================
# REAL_WORLD — semantic (promoted from the placeholder real_world/_stub.py)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "surface_walkthrough"
subject   = "time"
kind      = "semantic"
intent    = "a downstream consumer drives a clock/conversion flow end-to-end: read a wall clock, format with strftime, parse it back with strptime, round-trip through mktime/localtime, and time a workload with monotonic/perf_counter — asserting each step"
