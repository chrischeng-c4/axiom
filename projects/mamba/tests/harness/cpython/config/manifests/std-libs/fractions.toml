# Manifest for the stdlib `fractions` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/fractions/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# plus the loose feature fixtures (as_integer_ratio.py / int_subclass.py /
# slots.py). bench/ is kept as-is. CPython 3.12 is the oracle.

bucket = "std-libs"
lib    = "fractions"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_fractions"
subject   = "fractions"
kind      = "mechanical"
probe     = "attr"
attr      = "Fraction"

[[case]]
dimension = "surface"
case      = "fraction_is_callable"
subject   = "fractions.Fraction"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "limit_denominator_is_callable"
subject   = "fractions.Fraction.limit_denominator"
kind      = "mechanical"
probe     = "callable"
module    = "fractions"

[[case]]
dimension = "surface"
case      = "as_integer_ratio_is_callable"
subject   = "fractions.Fraction.as_integer_ratio"
kind      = "mechanical"
probe     = "callable"
module    = "fractions"

[[case]]
dimension = "surface"
case      = "is_integer_is_callable"
subject   = "fractions.Fraction.is_integer"
kind      = "mechanical"
probe     = "callable"
module    = "fractions"

[[case]]
dimension = "surface"
case      = "numerator_attr"
subject   = "fractions.Fraction(3, 4)"
kind      = "mechanical"
probe     = "attr"
attr      = "numerator"
module    = "fractions"

[[case]]
dimension = "surface"
case      = "denominator_attr"
subject   = "fractions.Fraction(3, 4)"
kind      = "mechanical"
probe     = "attr"
attr      = "denominator"
module    = "fractions"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc; generator emits assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "zero_denominator_raises"
subject    = "fractions.Fraction"
kind       = "mechanical"
call       = "fractions.Fraction(1, 0)"
expect_exc = "ZeroDivisionError"
source     = "Lib/test/test_fractions.py"

[[case]]
dimension  = "errors"
case       = "bad_string_raises"
subject    = "fractions.Fraction"
kind       = "mechanical"
call       = "fractions.Fraction('not_a_number')"
expect_exc = "ValueError"
source     = "Lib/test/test_fractions.py"

[[case]]
dimension  = "errors"
case       = "unsupported_type_raises"
subject    = "fractions.Fraction"
kind       = "mechanical"
call       = "fractions.Fraction([1, 2])"
expect_exc = "TypeError"
source     = "Lib/test/test_fractions.py"

[[case]]
dimension  = "errors"
case       = "float_inf_raises"
subject    = "fractions.Fraction"
kind       = "mechanical"
call       = "fractions.Fraction(float('inf'))"
expect_exc = "OverflowError"
source     = "Lib/test/test_fractions.py"

[[case]]
dimension  = "errors"
case       = "float_nan_raises"
subject    = "fractions.Fraction"
kind       = "mechanical"
call       = "fractions.Fraction(float('nan'))"
expect_exc = "ValueError"
source     = "Lib/test/test_fractions.py"

[[case]]
dimension  = "errors"
case       = "divide_by_zero_fraction_raises"
subject    = "fractions.Fraction"
kind       = "mechanical"
call       = "fractions.Fraction(1, 2) / fractions.Fraction(0)"
expect_exc = "ZeroDivisionError"
source     = "Lib/test/test_fractions.py"

# ===========================================================================
# BEHAVIOR — semantic (skeletons; an agent fills the body)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "reduces_to_lowest_terms"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "Fraction always reduces to lowest terms: 12/8 -> 3/2 and -4/6 -> -2/3"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "denominator_always_positive"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "the denominator is always positive: 1/-2 normalizes the sign onto the numerator (-1/2)"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "exact_decimal_arithmetic"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "exact arithmetic with no float error: 1/10 + 2/10 == 3/10 exactly, unlike float 0.1 + 0.2 != 0.3"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "construct_from_string"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "Fraction parses fraction and decimal strings: '3/4' -> 3/4, '0.5' -> 1/2, '-3/4' -> -3/4, with surrounding whitespace stripped"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "construct_from_float_exact"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "Fraction(float) captures the exact binary value: Fraction(0.5) == 1/2, while Fraction(0.1) has a large denominator that limit_denominator(100) tidies back to 1/10"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "construct_from_decimal"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "Fraction(Decimal('1.5')) constructs the exact rational 3/2 from a decimal.Decimal"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "limit_denominator_best_approximation"
subject   = "fractions.Fraction.limit_denominator"
kind      = "semantic"
intent    = "limit_denominator caps the denominator while finding the closest value: 355/113 limited to <=10 has denom <=10, and pi captured to 1000 gives 355/113"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "equality_with_int_and_float"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "a Fraction compares equal across numeric types: Fraction(6,3) == 2 and == 2.0, and Fraction(1,2) == 0.5"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "ordering_with_int_and_float"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "Fraction ordering mixes with numeric types: 1/3 < 0.5, 2/3 > 0.5, and equality after reduction (1/2 == 2/4) with 1/3 < 1/2 < 3/4"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "power_positive_and_negative"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "integer powers stay exact: (2/3)**2 == 4/9 and (2/3)**-1 == 3/2"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "floor_ceil_trunc_round"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "math.floor/ceil/trunc and round operate on a Fraction: floor(7/3)=2, ceil(7/3)=3, trunc(-7/3)=-2, round(5/2)=2 (banker's rounding)"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "mixed_arithmetic_with_int"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "arithmetic mixes with int and reduces to a plain int when whole: Fraction(1,2) + 1 == 3/2 and Fraction(3,4) * 4 == 3"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "as_integer_ratio_normalizes"
subject   = "fractions.Fraction.as_integer_ratio"
kind      = "semantic"
intent    = "as_integer_ratio returns a reduced (numerator, denominator) tuple with the sign on the numerator: 4/6 -> (2,3), 4/-6 -> (-2,3), 0/6 -> (0,1), Fraction(7) -> (7,1)"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "is_integer_predicate"
subject   = "fractions.Fraction.is_integer"
kind      = "semantic"
intent    = "is_integer() is True exactly when the reduced denominator is 1: True for 1/1, 2/2, -2/2, 4/-2 and False for 1/2, -1/2, 3/4"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "str_and_repr"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "str shows num/den (or the bare integer when denom is 1) and repr shows Fraction(n, d): str(3/4)=='3/4', str(Fraction(5))=='5', repr(3/4)=='Fraction(3, 4)'"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "int_float_bool_conversions"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "numeric conversions truncate toward zero / convert exactly: int(7/3)==2, float(1/4)==0.25, bool(Fraction(0)) is False, bool(1/2) is True"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "hash_matches_equal_values"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "hash agrees with == across numeric types so Fractions key dicts correctly: hash(Fraction(6,3)) == hash(2) == hash(2.0)"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "divmod_floordiv_mod"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "floor division, modulo and divmod stay exact: 7/2 // 2 == 1, 7/2 % 2 == 3/2, divmod(7/2, 2) == (1, 3/2)"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "numbers_abc_membership"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "a Fraction registers as a numbers.Rational (and therefore Number) but not numbers.Integral"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "real_imag_conjugate"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "as a real number a Fraction exposes .real == itself, .imag == 0, and conjugate() == itself"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "copy_deepcopy_roundtrip"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "copy.copy and copy.deepcopy return an equal Fraction (immutable value semantics)"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "preserves_rational_component_types"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "built from objects exposing .numerator/.denominator, Fraction divides through by the gcd but keeps the original component type rather than coercing to plain int (int subclass MyInt)"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "is_immutable_slots"
subject   = "fractions.Fraction"
kind      = "semantic"
intent    = "Fraction uses __slots__: instances reject arbitrary attribute assignment, numerator/denominator are read-only, and there is no instance __dict__"
module    = "fractions"
source    = "Lib/test/test_fractions.py"

[[case]]
dimension = "behavior"
case      = "format_fixed_point"
subject   = "fractions.Fraction.__format__"
kind      = "semantic"
intent    = "Fraction supports presentation-type formatting: format(Fraction(1,3), '.4f') == '0.3333' and format(Fraction(1,2), '.2f') == '0.50'"
module    = "fractions"
source    = "Lib/test/test_fractions.py"
