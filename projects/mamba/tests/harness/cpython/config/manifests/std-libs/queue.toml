# Manifest for the stdlib `queue` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/queue/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py,
# queue_basic.py + queue_basic.expected golden, real_world/_stub.py). bench/
# (ctor_qsize_bulk.py, put_get_bulk.py) is left as-is.
#
# CPython 3.12 is the oracle. queue.Queue / LifoQueue / PriorityQueue /
# SimpleQueue + the Empty/Full exceptions; instance methods put / get /
# put_nowait / get_nowait / empty / full / qsize / task_done / join.

bucket = "std-libs"
lib = "queue"

