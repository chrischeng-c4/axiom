# ===========================================================================
# ERRORS — mechanical (call + expect_exc, assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "get_nowait_on_empty_raises"
subject    = "queue.Queue.get_nowait"
kind       = "mechanical"
call       = "queue.Queue().get_nowait()"
expect_exc = "queue.Empty"
module     = "queue"
source     = "Lib/test/test_queue.py"

[[case]]
dimension  = "errors"
case       = "get_block_false_on_empty_raises"
subject    = "queue.Queue.get"
kind       = "mechanical"
call       = "queue.Queue().get(block=False)"
expect_exc = "queue.Empty"
module     = "queue"
source     = "Lib/test/test_queue.py"

[[case]]
dimension  = "errors"
case       = "get_timeout_on_empty_raises"
subject    = "queue.Queue.get"
kind       = "mechanical"
call       = "queue.Queue().get(timeout=0.001)"
expect_exc = "queue.Empty"
module     = "queue"
source     = "Lib/test/test_queue.py"

[[case]]
dimension  = "errors"
case       = "put_nowait_on_full_raises"
subject    = "queue.Queue.put_nowait"
kind       = "mechanical"
call       = "(lambda q: (q.put_nowait('a'), q.put_nowait('b')))(queue.Queue(maxsize=1))"
expect_exc = "queue.Full"
module     = "queue"
source     = "Lib/test/test_queue.py"

[[case]]
dimension  = "errors"
case       = "task_done_too_many_raises"
subject    = "queue.Queue.task_done"
kind       = "mechanical"
call       = "(lambda q: (q.put('x'), q.get(), q.task_done(), q.task_done()))(queue.Queue())"
expect_exc = "ValueError"
module     = "queue"
source     = "Lib/test/test_queue.py"

[[case]]
dimension  = "errors"
case       = "get_negative_timeout_raises"
subject    = "queue.Queue.get"
kind       = "mechanical"
call       = "queue.Queue().get(timeout=-1)"
expect_exc = "ValueError"
module     = "queue"
source     = "Lib/test/test_queue.py"

[[case]]
dimension  = "errors"
case       = "put_negative_timeout_raises"
subject    = "queue.Queue.put"
kind       = "mechanical"
call       = "queue.Queue(maxsize=1).put(1, timeout=-1)"
expect_exc = "ValueError"
module     = "queue"
source     = "Lib/test/test_queue.py"

# ===========================================================================
# BEHAVIOR — semantic (output matches CPython)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "fifo_order"
subject   = "queue.Queue"
kind      = "semantic"
intent    = "Queue is FIFO: putting 10,20,30,40,50 then draining gives them back in insertion order"
source    = "Lib/test/test_queue.py"

[[case]]
dimension = "behavior"
case      = "lifo_order"
subject   = "queue.LifoQueue"
kind      = "semantic"
intent    = "LifoQueue is LIFO (stack): putting 1,2,3,4 then draining gives 4,3,2,1"
source    = "Lib/test/test_queue.py"

[[case]]
dimension = "behavior"
case      = "priority_order"
subject   = "queue.PriorityQueue"
kind      = "semantic"
intent    = "PriorityQueue dequeues by ascending priority regardless of insertion order: (5,e),(1,a),(3,c),(2,b),(4,d) drain sorted by key"
source    = "Lib/test/test_queue.py"

[[case]]
dimension = "behavior"
case      = "maxsize_zero_is_unlimited"
subject   = "queue.Queue"
kind      = "semantic"
intent    = "maxsize=0 means unlimited capacity: 100 puts succeed, qsize()==100 and full() stays False"
source    = "Lib/test/test_queue.py"

[[case]]
dimension = "behavior"
case      = "task_done_join_unblocks"
subject   = "queue.Queue.join"
kind      = "semantic"
intent    = "join() blocks until every queued item is task_done(): a worker thread drains 3 items and the main thread's join() returns once all are marked done"
module    = "queue"
source    = "Lib/test/test_queue.py"

[[case]]
dimension = "behavior"
case      = "qsize_empty_full_reflect_state"
subject   = "queue.Queue"
kind      = "semantic"
intent    = "qsize()/empty()/full() track current occupancy: a maxsize=3 queue reports empty then full as items are put, and not-full after a get"
source    = "Lib/test/test_queue.py"

[[case]]
dimension = "behavior"
case      = "simplequeue_fifo_roundtrip"
subject   = "queue.SimpleQueue"
kind      = "semantic"
intent    = "SimpleQueue is an unbounded FIFO: put 100 then 200 and get them back in order"
source    = "Lib/test/test_queue.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "producer_consumer_pipeline"
subject   = "queue.Queue"
kind      = "semantic"
intent    = "a producer enqueues a bounded work batch and a daemon consumer thread drains it via get/task_done; the producer join()s the queue and asserts every job was processed exactly once"
source    = "Lib/test/test_queue.py"
