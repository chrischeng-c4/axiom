# Manifest for the stdlib `urllib.request` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/urllib_request/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the real_world/_stub.py placeholder. bench/ (urllib_request_type_read_hot.py)
# is left as-is.
#
# The lib's dotted submodule is `urllib.request`, so class/function subjects set
# an explicit `import = "from urllib.request import ..."` (the import inferer
# stops at the first CapWords component, e.g. `Request`, and cannot recover the
# dotted package `urllib.request`). The `from urllib.request import X` form also
# dodges the mamba dotted-import quirk (repo-memory
# project_mamba_dotted_import_quirk: `import urllib.request` then
# `urllib.request.X` resolves to None).
#
# MAMBA GAP (probed 2026-05-29 with mamba 0.3.60): `urllib.request` is an
# essentially-empty stub on mamba — the module resolves to a bare dict,
# `Request(url)` returns a dict (no `.get_method`/`.full_url`/...),
# `pathname2url(p)` returns `{}`, and `build_opener()` returns a dict. So EVERY
# urllib.request case (surface probes, Request/header behavior, error paths, the
# real-world client flow) is a known mamba gap and carries `xfail`; CPython 3.12
# remains the green oracle for all of them. `conformance` skips mamba for xfail
# cases, so the corpus stays CPython-green and never reddens CI on the gap.
#
# Network-dependent legacy cases (behavior.py Rule 8 urlopen-unreachable,
# errors.py urlopen ftp/bad-scheme) are intentionally DROPPED — they violate the
# no-network determinism rule. Their in-memory, deterministic siblings (method
# selection, header normalization, build_opener type error, full_url setter
# ValueError) are preserved below.

bucket = "std-libs"
lib = "urllib_request"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable)
#
# The module-level probe uses `import urllib.request` + attr; the class/function
# probes embed the dotted subject in `assert callable(urllib.request.X)`. Both
# forms exercise the unimplemented mamba stub -> xfail. CPython is green.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_urllib_request"
subject   = "urllib.request"
kind      = "mechanical"
import    = "import urllib.request"
probe     = "attr"
attr      = "urlopen"
xfail     = "urllib.request unimplemented on mamba: module is a near-empty stub, hasattr(urllib.request, 'urlopen') is False (probed 2026-05-29, mamba 0.3.60; repo-memory project_mamba_dotted_import_quirk)"

