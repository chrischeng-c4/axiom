# REAL_WORLD — semantic end-user scenario
#
# Replaces the real_world/_stub.py placeholder with a realistic in-memory
# request-building flow (no network): construct a POST Request with a JSON
# body and custom headers, then inspect the method / headers / parsed URL the
# way an HTTP-client wrapper would before dispatch.
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "build_post_request"
subject   = "urllib.request.Request"
kind      = "semantic"
import    = "from urllib.request import Request"
intent    = "an HTTP-client wrapper builds a POST Request with a JSON body and headers, then reads back get_method()=='POST', the title-cased Content-Type header, and the parsed host/selector before dispatch (in-memory, no network)"
source    = "Lib/test/test_urllib2.py"
xfail     = "urllib.request unimplemented on mamba: Request() returns a dict (probed 2026-05-29, mamba 0.3.60)"
