# ===========================================================================
# ERRORS — mechanical (call + expect_exc, assert-it-raised)
#
# Bodies use the `from urllib.request import X` form (set via `import`). Both
# fire under CPython; mamba's stub does not raise -> xfail. The network-
# dependent urlopen error paths from the legacy errors.py monolith (ftp / bad
# scheme) are dropped (no-network determinism rule).
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "build_opener_non_handler_raises"
subject    = "urllib.request.build_opener"
kind       = "mechanical"
import     = "from urllib.request import build_opener"
call       = "build_opener('not_a_handler')"
expect_exc = "TypeError"
source     = "Lib/test/test_urllib2.py"
xfail      = "urllib.request unimplemented on mamba: build_opener is a stub that does not raise on a non-handler arg (probed 2026-05-29, mamba 0.3.60)"

