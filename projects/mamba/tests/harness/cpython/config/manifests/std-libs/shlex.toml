# Manifest for the stdlib `shlex` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/shlex/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the real_world/ stub. Source oracle: Lib/test/test_shlex.py.

bucket = "std-libs"
lib = "shlex"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_shlex"
subject   = "shlex"
kind      = "mechanical"
probe     = "attr"
attr      = "split"

[[case]]
dimension = "surface"
case      = "split_is_callable"
subject   = "shlex.split"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "quote_is_callable"
subject   = "shlex.quote"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "join_is_callable"
subject   = "shlex.join"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "shlex_class_is_callable"
subject   = "shlex.shlex"
kind      = "mechanical"
probe     = "callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc, assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "split_unclosed_double_quote_raises"
subject    = "shlex.split"
kind       = "mechanical"
call       = "shlex.split('a \"unclosed quote')"
expect_exc = "ValueError"
source     = "Lib/test/test_shlex.py"

[[case]]
dimension  = "errors"
case       = "split_unclosed_single_quote_raises"
subject    = "shlex.split"
kind       = "mechanical"
call       = "shlex.split(\"a 'unclosed single\")"
expect_exc = "ValueError"
source     = "Lib/test/test_shlex.py"

[[case]]
dimension  = "errors"
case       = "split_trailing_escape_raises"
subject    = "shlex.split"
kind       = "mechanical"
call       = "shlex.split('a \\\\')"
expect_exc = "ValueError"
source     = "Lib/test/test_shlex.py"

[[case]]
dimension  = "errors"
case       = "split_none_raises"
subject    = "shlex.split"
kind       = "mechanical"
call       = "shlex.split(None)"
expect_exc = "ValueError"
source     = "Lib/test/test_shlex.py"

[[case]]
dimension  = "errors"
case       = "split_int_raises"
subject    = "shlex.split"
kind       = "mechanical"
call       = "shlex.split(123)"
expect_exc = "AttributeError"
source     = "Lib/test/test_shlex.py"

[[case]]
dimension  = "errors"
case       = "quote_int_raises"
subject    = "shlex.quote"
kind       = "mechanical"
call       = "shlex.quote(42)"
expect_exc = "TypeError"
source     = "Lib/test/test_shlex.py"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- split ----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "split_whitespace_tokens"
subject   = "shlex.split"
kind      = "semantic"
intent    = "whitespace-separated words split into a token list; the empty string yields an empty list"
source    = "Lib/test/test_shlex.py"

[[case]]
dimension = "behavior"
case      = "split_quoted_segment_is_one_token"
subject   = "shlex.split"
kind      = "semantic"
intent    = "a double-quoted segment is collapsed into a single token with the quotes stripped, e.g. split('\"hello world\" foo') == ['hello world', 'foo']"
source    = "Lib/test/test_shlex.py"
xfail     = "mamba shlex.split does not process quotes (returns raw whitespace split); repo-memory project_mamba_stdlib_stub_audit_2026_05_26"

# --- quote ----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "quote_safe_word_unchanged"
subject   = "shlex.quote"
kind      = "semantic"
intent    = "a word built only from the shell-safe set (letters/digits/@%_-+=:,./) is returned unchanged, no quoting added"
source    = "Lib/test/test_shlex.py"

[[case]]
dimension = "behavior"
case      = "quote_wraps_whitespace"
subject   = "shlex.quote"
kind      = "semantic"
intent    = "a value containing whitespace is wrapped in single quotes, e.g. quote('hello world') == \"'hello world'\""
source    = "Lib/test/test_shlex.py"

[[case]]
dimension = "behavior"
case      = "quote_empty_string"
subject   = "shlex.quote"
kind      = "semantic"
intent    = "the empty string quotes to the two-character literal '' so it survives a shell word boundary"
source    = "Lib/test/test_shlex.py"

[[case]]
dimension = "behavior"
case      = "quote_embedded_single_quote"
subject   = "shlex.quote"
kind      = "semantic"
intent    = "an embedded single quote is escaped with the classic '\"'\"' splice, e.g. quote(\"it's\") == '\\'it\\'\"\\'\"\\'s\\''"
source    = "Lib/test/test_shlex.py"

# --- join -----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "join_quotes_each_element"
subject   = "shlex.join"
kind      = "semantic"
intent    = "join applies quote() to every element: safe words pass through, a word with a space is single-quoted, and an empty list joins to the empty string"
source    = "Lib/test/test_shlex.py"

# ===========================================================================
# REAL_WORLD — semantic
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "join_split_command_roundtrip"
subject   = "shlex.join"
kind      = "semantic"
intent    = "a build-tool argv with a spaced path round-trips: shlex.split(shlex.join(argv)) reproduces the original argv list"
source    = "Lib/test/test_shlex.py"
xfail     = "round-trip relies on shlex.split processing the quotes shlex.join emits; mamba split does not process quotes (repo-memory project_mamba_stdlib_stub_audit_2026_05_26)"
