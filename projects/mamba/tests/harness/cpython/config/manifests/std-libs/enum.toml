kind      = "mechanical"
probe     = "callable"
module    = "enum"

[[case]]
dimension = "surface"
case      = "flag_is_callable"
subject   = "enum.Flag"
kind      = "mechanical"
probe     = "callable"
module    = "enum"

[[case]]
dimension = "surface"
case      = "strenum_is_callable"
subject   = "enum.StrEnum"
kind      = "mechanical"
probe     = "callable"
module    = "enum"

[[case]]
dimension = "surface"
case      = "auto_is_callable"
subject   = "enum.auto"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "unique_is_callable"
