# ===========================================================================
# ERRORS — mechanical (call + expect_exc; assert-it-raised)
# ===========================================================================
# Method/exception subjects carry CapWords leaves; every errors case sets
# module="enum" so the inferred import is `import enum` (the call exprs use
# the dotted `enum.*` names).

[[case]]
dimension  = "errors"
case       = "lookup_unknown_value_raises"
subject    = "enum.Enum"
kind       = "mechanical"
module     = "enum"
call       = "enum.Enum('Color', {'RED': 1})(99)"
expect_exc = "ValueError"
source     = "Lib/test/test_enum.py"

[[case]]
dimension  = "errors"
case       = "lookup_unknown_name_raises"
subject    = "enum.Enum"
kind       = "mechanical"
module     = "enum"
call       = "enum.Enum('Color', {'RED': 1})['YELLOW']"
expect_exc = "KeyError"
source     = "Lib/test/test_enum.py"

[[case]]
dimension  = "errors"
case       = "member_reassign_raises"
subject    = "enum.Enum"
kind       = "mechanical"
module     = "enum"
call       = "setattr(enum.Enum('Color', {'RED': 1}), 'RED', 99)"
expect_exc = "AttributeError"
source     = "Lib/test/test_enum.py"

[[case]]
dimension  = "errors"
case       = "subclass_with_members_raises"
subject    = "enum.Enum"
kind       = "semantic"
module     = "enum"
intent     = "subclassing an Enum that already has members raises TypeError (a populated Enum is final), while subclassing a memberless Enum is allowed"
source     = "Lib/test/test_enum.py"

[[case]]
dimension  = "errors"
case       = "strenum_nonstr_value_raises"
subject    = "enum.StrEnum"
kind       = "semantic"
module     = "enum"
intent     = "defining a StrEnum with a non-string member value raises TypeError (StrEnum members must be str)"
source     = "Lib/test/test_enum.py"

[[case]]
dimension  = "errors"
case       = "unique_decorator_rejects_aliases"
subject    = "enum.unique"
kind       = "semantic"
module     = "enum"
intent     = "@enum.unique on a class containing a duplicate value (an alias) raises ValueError; an all-distinct class is accepted"
source     = "Lib/test/test_enum.py"

[[case]]
dimension  = "errors"
case       = "functional_empty_member_name_raises"
subject    = "enum.Enum"
kind       = "mechanical"
module     = "enum"
call       = "enum.Enum('Empty', ('', 'B', 'C'))"
expect_exc = "ValueError"
source     = "Lib/test/test_enum.py"

[[case]]
dimension  = "errors"
case       = "plain_enum_ordering_raises"
subject    = "enum.Enum"
kind       = "semantic"
module     = "enum"
intent     = "plain (non-Int) Enum members are unordered: a < comparison between two members raises TypeError"
source     = "Lib/test/test_enum.py"

[[case]]
dimension  = "errors"
case       = "verify_unique_rejects_duplicate"
subject    = "enum.verify"
kind       = "semantic"
module     = "enum"
intent     = "@verify(UNIQUE) on an IntEnum with two members sharing a value raises ValueError (the decorator form of @unique)"
source     = "Lib/test/test_enum.py"

[[case]]
dimension  = "errors"
case       = "verify_continuous_rejects_gaps"
subject    = "enum.verify"
kind       = "semantic"
module     = "enum"
intent     = "@verify(CONTINUOUS) on an Enum whose integer values leave a gap (3, 4, 11) raises ValueError"
source     = "Lib/test/test_enum.py"

[[case]]
dimension  = "errors"
case       = "verify_named_flags_rejects_unnamed_bit"
subject    = "enum.verify"
kind       = "semantic"
module     = "enum"
intent     = "@verify(NAMED_FLAGS) on a Flag whose composite member (B=3) covers a bit (0b001) that has no single-bit name raises ValueError"
source     = "Lib/test/test_enum.py"

[[case]]
dimension  = "errors"
case       = "convert_old_underscore_helper_gone"
subject    = "enum.IntEnum"
kind       = "mechanical"
module     = "enum"
call       = "enum.IntEnum._convert('X', __name__, filter=lambda n: False)"
expect_exc = "AttributeError"
source     = "Lib/test/test_enum.py"

# ===========================================================================
# BEHAVIOR — semantic (observable behavior matches CPython 3.12)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "member_value_name_identity"
subject   = "enum.Enum"
kind      = "semantic"
module    = "enum"
intent    = "an Enum member exposes .value and .name, is an instance of its class, and equals itself by identity and ==; distinct members are !="
source    = "Lib/test/test_enum.py"

[[case]]
dimension = "behavior"
case      = "lookup_by_value_and_name"
subject   = "enum.Enum"
kind      = "semantic"
module    = "enum"
intent    = "Color(2) returns the member with value 2 and Color['BLUE'] returns the member named BLUE; both are the canonical singleton members"
source    = "Lib/test/test_enum.py"

[[case]]
dimension = "behavior"
case      = "members_are_singletons"
subject   = "enum.Enum"
kind      = "semantic"
module    = "enum"
intent    = "value lookup, name lookup, and attribute access all return the identical singleton object (Suit(1) is Suit['CLUBS'] is Suit.CLUBS)"
