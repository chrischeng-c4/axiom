# Manifest for the stdlib `enum` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/enum/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, convert.py, flag.py, functional.py, mixin.py,
# special.py, strenum.py, verify.py). bench/ and real_world/_stub.py are left
# as-is.
#
# Method/exception subjects (enum.Enum, enum.StrEnum, enum.IntEnum, enum.Flag,
# enum.unique, enum.verify, ...) have CapWords leaves, so the import inferer
# would import the class name; every such case sets module="enum" (the import
# inferer would otherwise stop at the first CapWords component).

bucket = "std-libs"
lib = "enum"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_enum"
subject   = "enum"
kind      = "mechanical"
probe     = "attr"
attr      = "Enum"

[[case]]
dimension = "surface"
case      = "enum_is_callable"
subject   = "enum.Enum"
kind      = "mechanical"
probe     = "callable"
module    = "enum"

[[case]]
dimension = "surface"
case      = "intenum_is_callable"
subject   = "enum.IntEnum"
kind      = "mechanical"
probe     = "callable"
module    = "enum"

