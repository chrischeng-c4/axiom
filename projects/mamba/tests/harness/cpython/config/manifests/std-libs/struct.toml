# Manifest for the stdlib `struct` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/struct/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + paired-.expected golden shape (surface.py,
# behavior.py, errors.py, loose feature files formats.py / half_float.py /
# iter_unpack.py / pack_offset.py / parse_integer_overflow.py / struct_class.py,
# struct_conformance.py/.expected, struct_ops.py/.expected). bench/ is left
# as-is.
#
# mamba gotcha (xfail block): the struct shim does not model value bounds or
# buffer-size checks — write_int_le/be truncate via to_le/be_bytes()[..size]
# with no range check, and the module header states "writes are silently
# clipped (CPython raises struct.error; mamba surfaces truncation)"
# (src/runtime/stdlib/struct_mod.rs). So every overflow / wrong-size / bad-type
# / float-into-int error path silently succeeds under mamba instead of raising;
# those errors/security cases carry xfail (WI #3929; repo-memory
# project_mamba_runtime_correctness_gaps_2026_05_13).

bucket = "std-libs"
lib = "struct"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_struct"
subject   = "struct"
kind      = "mechanical"
probe     = "attr"
attr      = "pack"

[[case]]
dimension = "surface"
case      = "pack_is_callable"
subject   = "struct.pack"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "unpack_is_callable"
subject   = "struct.unpack"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "calcsize_is_callable"
subject   = "struct.calcsize"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "pack_into_is_callable"
subject   = "struct.pack_into"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "unpack_from_is_callable"
subject   = "struct.unpack_from"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "iter_unpack_is_callable"
subject   = "struct.iter_unpack"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "struct_class_is_callable"
subject   = "struct.Struct"
kind      = "mechanical"
probe     = "callable"
module    = "struct"

[[case]]
dimension = "surface"
case      = "error_is_present"
subject   = "struct"
kind      = "mechanical"
probe     = "attr"
attr      = "error"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc, assert-it-raised)
#
# Under CPython 3.12 every malformed-format / dangling-count / embedded-null
# path raises struct.error and the non-buffer path raises TypeError. The
# value-bounds / wrong-size / wrong-type subset is xfail under mamba (shim has
# no range or size validation — silently truncates / succeeds).
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "invalid_format_char_raises"
subject    = "struct.pack"
kind       = "mechanical"
call       = "struct.pack(\"z\", 1)"
expect_exc = "struct.error"

[[case]]
dimension  = "errors"
case       = "too_many_args_raises"
subject    = "struct.pack"
kind       = "mechanical"
call       = "struct.pack(\"i\", 1, 2, 3)"
expect_exc = "struct.error"

[[case]]
dimension  = "errors"
case       = "too_few_args_raises"
subject    = "struct.pack"
kind       = "mechanical"
call       = "struct.pack(\"ii\", 1)"
expect_exc = "struct.error"

[[case]]
dimension  = "errors"
case       = "embedded_null_in_format_raises"
subject    = "struct.calcsize"
kind       = "mechanical"
call       = "struct.calcsize(\"2\\u0000i\")"
expect_exc = "struct.error"
source     = "Lib/test/test_struct.py"

[[case]]
dimension  = "errors"
case       = "trailing_repeat_count_raises"
subject    = "struct.pack"
kind       = "mechanical"
call       = "struct.pack(\"12345\")"
expect_exc = "struct.error"

[[case]]
dimension  = "errors"
case       = "dangling_repeat_count_raises"
subject    = "struct.calcsize"
kind       = "mechanical"
call       = "struct.calcsize(\"4\")"
expect_exc = "struct.error"

[[case]]
dimension  = "errors"
case       = "stray_byteorder_marker_raises"
subject    = "struct.calcsize"
kind       = "mechanical"
call       = "struct.calcsize(\"i@i\")"
expect_exc = "struct.error"

[[case]]
dimension  = "errors"
case       = "unpack_non_buffer_type_error"
subject    = "struct.unpack"
kind       = "mechanical"
call       = "struct.unpack(\"b\", 0)"
expect_exc = "TypeError"
source     = "Lib/test/test_struct.py"

# --- xfail subset: shim has no bounds/size/type validation ---

[[case]]
dimension  = "errors"
case       = "pack_value_out_of_range_raises"
subject    = "struct.pack"
kind       = "mechanical"
call       = "struct.pack(\"b\", 1000)"
expect_exc = "struct.error"
xfail      = "struct shim truncates instead of raising (WI #3929; struct_mod.rs has no range check)"

[[case]]
dimension  = "errors"
case       = "unpack_wrong_size_raises"
subject    = "struct.unpack"
kind       = "mechanical"
call       = "struct.unpack(\"ii\", b\"only4bytes\")"
expect_exc = "struct.error"
xfail      = "struct shim does not validate buffer size; zero-pads/accepts instead of raising (WI #3929)"

[[case]]
dimension  = "errors"
case       = "bad_type_for_int_code_raises"
subject    = "struct.pack"
kind       = "mechanical"
call       = "struct.pack(\"i\", \"not_int\")"
expect_exc = "struct.error"
xfail      = "struct shim does not type-check pack args; accepts non-int silently (WI #3929)"

[[case]]
dimension  = "errors"
case       = "float_into_int_code_raises"
subject    = "struct.pack"
kind       = "mechanical"
call       = "struct.pack(\"i\", 1.5)"
expect_exc = "struct.error"
xfail      = "struct shim does not reject a float for an int code; coerces/truncates (WI #3929)"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- core pack/unpack contract -------------------------------------------

[[case]]
dimension = "behavior"
case      = "endianness_byte_order"
subject   = "struct.pack"
kind      = "semantic"
intent    = "big-endian '>I' and little-endian '<I' lay an asymmetric u32 down in opposite byte order; >i 1 == b'\\x00\\x00\\x00\\x01', <i 1 == b'\\x01\\x00\\x00\\x00'"

[[case]]
dimension = "behavior"
case      = "signed_unsigned_view"
subject   = "struct.unpack"
kind      = "semantic"
intent    = "the bytes of signed '>i' -1 re-interpreted as unsigned '>I' read back as 0xFFFFFFFF (two's-complement view)"

[[case]]
dimension = "behavior"
case      = "format_char_sizes"
subject   = "struct.calcsize"
kind      = "semantic"
intent    = "calcsize maps each standard code to its fixed width: b=1, h=2, i=4, q=8, e=2, f=4, d=8; width is independent of the byte-order prefix ('>I' and '<I' both 4)"

[[case]]
dimension = "behavior"
case      = "native_int_size"
subject   = "struct.calcsize"
kind      = "semantic"
intent    = "native '@i' uses the platform int width so calcsize('@i') is 4 or 8 (and may carry native alignment), unlike the standard-size '=i'"

[[case]]
dimension = "behavior"
case      = "float_roundtrip"
subject   = "struct.pack"
kind      = "semantic"
intent    = "'>f' is 32-bit IEEE 754: packing then unpacking 3.14 round-trips to within float32 precision (abs error < 1e-3)"

[[case]]
dimension = "behavior"
case      = "double_roundtrip"
subject   = "struct.pack"
kind      = "semantic"
intent    = "'>d' is 64-bit IEEE 754: packing then unpacking 3.141592653589793 round-trips exactly"

# --- string / char / bool / pad codes ------------------------------------

[[case]]
dimension = "behavior"
case      = "string_field_s_code"
subject   = "struct.pack"
kind      = "semantic"
intent    = "'Ns' is a fixed N-byte field: short input zero-pads ('3s' b'ab' -> b'ab\\x00'), long input truncates ('3s' b'abcd' -> b'abc'), '0s' is empty, and unpack returns the raw N bytes"

[[case]]
dimension = "behavior"
case      = "pascal_string_p_code"
subject   = "struct.pack"
kind      = "semantic"
intent    = "'Np' is a Pascal string (length byte then data): '2p' b'abc' -> b'\\x01a', '4p' b'abc' -> b'\\x03abc', the stored length caps at 255, and unpack drops the length byte"

[[case]]
dimension = "behavior"
case      = "pad_and_char_codes"
subject   = "struct.pack"
kind      = "semantic"
intent    = "'c' packs one literal byte and 'x' is a zero pad byte that consumes no argument: '>xc' b'a' -> b'\\x00a', '>cx' b'a' -> b'a\\x00'"

[[case]]
dimension = "behavior"
case      = "bool_code_truthiness"
subject   = "struct.pack"
kind      = "semantic"
intent    = "'?' packs any object by truthiness to 0x00/0x01 (0/[] -> 0, 5/[1] -> 1) and unpacks any non-zero byte to True, only b'\\x00' to False"

[[case]]
dimension = "behavior"
case      = "mixed_record_all_byteorders"
subject   = "struct.pack"
kind      = "semantic"
intent    = "a heterogeneous 'cbHid?' record round-trips identically under every byte-order prefix ('', '@', '<', '>', '=', '!')"

[[case]]
dimension = "behavior"
case      = "half_float_e_code"
subject   = "struct.pack"
kind      = "semantic"
intent    = "'e' is 16-bit IEEE 754: exact LE/BE bit patterns for representable values, smallest normal/subnormal round-trip, NaN packs with exponent bits set, values past the half range raise OverflowError, and nearest-even rounding at a tie"

# --- Struct class ---------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "struct_caches_size_and_format"
subject   = "struct.Struct"
kind      = "semantic"
intent    = "a compiled Struct('>IB') caches .size == 5 and .format == '>IB'; a Struct built from a bytes format normalizes .format back to the same str"
module    = "struct"

[[case]]
dimension = "behavior"
case      = "struct_subclass_init"
subject   = "struct.Struct"
kind      = "semantic"
intent    = "Struct can be subclassed with the format set in __init__ via super().__init__('>h'); the subclass packs/unpacks like the base"
module    = "struct"

[[case]]
dimension = "behavior"
case      = "struct_reinit_rebinds_format"
subject   = "struct.Struct"
kind      = "semantic"
intent    = "calling __init__ again on a Struct rebinds it to a new format: Struct('i') then __init__('ii') changes .size 4 -> 8 and round-trips two ints"
module    = "struct"

[[case]]
dimension = "behavior"
case      = "unpack_from_buffer_protocol"
subject   = "struct.unpack"
kind      = "semantic"
intent    = "unpack reads from any buffer-protocol object (memoryview, bytearray), not just bytes: '>I' on b'\\x12\\x34\\x56\\x78' yields 0x12345678 from each"

# --- pack_into / unpack_from offsets --------------------------------------

[[case]]
dimension = "behavior"
case      = "pack_into_writes_at_offset"
subject   = "struct.pack_into"
kind      = "semantic"
intent    = "pack_into writes the packed field at the given byte offset inside a mutable buffer; two '>I' writes at offsets 0 and 4 leave the rest untouched and match the standalone pack output"

[[case]]
dimension = "behavior"
case      = "unpack_from_slides_window"
subject   = "struct.unpack_from"
kind      = "semantic"
intent    = "unpack_from slides a fixed-size '4s' window across bytes and bytearray inputs at each offset, defaults offset to 0, and accepts keyword args buffer=/offset="

# --- iter_unpack ----------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "iter_unpack_yields_records"
subject   = "struct.iter_unpack"
kind      = "semantic"
intent    = "both Struct.iter_unpack and module struct.iter_unpack yield successive '>IB' records from a flat byte buffer and then raise StopIteration (stays stopped on repeat next())"

[[case]]
dimension = "behavior"
case      = "iter_unpack_length_hint"
subject   = "struct.iter_unpack"
kind      = "semantic"
intent    = "operator.length_hint on a struct unpack-iterator reports the count of records still to yield, decrementing to 0 as the iterator drains"
module    = "struct"

[[case]]
dimension = "behavior"
case      = "iter_unpack_buffer_inputs"
subject   = "struct.iter_unpack"
kind      = "semantic"
intent    = "Struct.iter_unpack accepts any buffer-protocol input (memoryview, bytearray) and produces the same record list as from bytes"
module    = "struct"

[[case]]
dimension = "behavior"
case      = "iter_unpack_type_not_constructible"
subject   = "struct.iter_unpack"
kind      = "semantic"
intent    = "the unpack-iterator type itself cannot be instantiated directly; calling type(it)() raises TypeError"
module    = "struct"

# ===========================================================================
# REAL_WORLD — semantic
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "parse_wire_header"
subject   = "struct.unpack"
kind      = "semantic"
intent    = "decode a fixed binary wire-protocol header ('<IBBHQ': magic, version, flags, length, seq) end-to-end: encode then decode round-trips the record and the LE/BE endianness contract holds; struct.error resolves as an attribute"

# ===========================================================================
# SECURITY — semantic (adversarial bounds / malformed-format hardening)
# ===========================================================================

[[case]]
dimension = "security"
case      = "parse_integer_overflow"
subject   = "struct.pack"
kind      = "semantic"
intent    = "adversarial hardening: out-of-range pack values (i/B/I/b/H/Q over/under bounds), wrong-size unpack buffers, and malformed/hostile calcsize formats (unknown char, dangling count, embedded NUL, stray marker) must each raise struct.error rather than silently truncate; the boundary values themselves round-trip cleanly"
xfail     = "struct shim models no bounds/size checks; out-of-range writes are silently clipped and wrong-size buffers accepted (WI #3929; repo-memory project_mamba_runtime_correctness_gaps_2026_05_13)"

[[case]]
dimension = "security"
case      = "pack_into_buffer_bounds"
subject   = "struct.pack_into"
kind      = "semantic"
intent    = "pack_into/unpack_from past the end of, or before the start of, a mutable buffer raise struct.error with descriptive messages that quote the required size and the offset (incl. negative-offset 'no space'/'out of range' wording)"
xfail     = "struct shim silently clips out-of-range pack_into writes instead of raising struct.error (WI #3929; struct_mod.rs mb_struct_pack_into)"
