# Manifest for the stdlib `code` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/code/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py,
# the loose feature file code_object.py, and the real_world/_stub.py
# placeholder). bench/ is left as-is.
#
# Two distinct subjects share this lib:
#   * the stdlib `code` module (InteractiveConsole / InteractiveInterpreter /
#     compile_command / interact) — the REPL/sandbox engine.
#   * `types.CodeType` (a function's __code__ object) — the code_object.py
#     feature file. Those cases set module="types" so the inferer imports the
#     right module (CapWords leaf CodeType would otherwise mis-infer).

bucket = "std-libs"
lib = "code"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_code"
subject   = "code"
kind      = "mechanical"
probe     = "attr"
attr      = "InteractiveConsole"

[[case]]
dimension = "surface"
case      = "interactive_console_is_callable"
subject   = "code.InteractiveConsole"
kind      = "mechanical"
probe     = "callable"
module    = "code"

[[case]]
dimension = "surface"
case      = "interactive_interpreter_is_callable"
subject   = "code.InteractiveInterpreter"
kind      = "mechanical"
probe     = "callable"
module    = "code"

[[case]]
dimension = "surface"
case      = "compile_command_is_callable"
subject   = "code.compile_command"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "interact_is_callable"
subject   = "code.interact"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "console_push_is_callable"
subject   = "code.InteractiveConsole.push"
kind      = "mechanical"
probe     = "callable"
module    = "code"

[[case]]
dimension = "surface"
case      = "console_resetbuffer_is_callable"
subject   = "code.InteractiveConsole.resetbuffer"
kind      = "mechanical"
probe     = "callable"
module    = "code"

[[case]]
dimension = "surface"
case      = "interpreter_runsource_is_callable"
subject   = "code.InteractiveInterpreter.runsource"
kind      = "mechanical"
probe     = "callable"
