# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "repl_session_drives_console"
subject   = "code.InteractiveConsole"
kind      = "semantic"
module    = "code"
intent    = "a captured REPL session drives one InteractiveConsole over a shared namespace: feed a multi-line def then call it, an expression statement, a name rebind, and a deliberate error line; assert the namespace state, push() return values, and that the error was reported to stderr rather than raised"
