# ===========================================================================
# ERRORS — mechanical (call + expect_exc -> assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "compile_command_bad_syntax_raises"
subject    = "code.compile_command"
kind       = "mechanical"
call       = "code.compile_command(\"def (:\")"
expect_exc = "SyntaxError"

[[case]]
dimension  = "errors"
case       = "code_replace_nlocals_low_raises"
subject    = "types.CodeType"
kind       = "mechanical"
call       = "(lambda a, b: a + b).__code__.replace(co_nlocals=1)"
expect_exc = "ValueError"
module     = "types"
source     = "Lib/test/test_code.py"

[[case]]
dimension  = "errors"
case       = "code_replace_nlocals_high_raises"
subject    = "types.CodeType"
kind       = "mechanical"
call       = "(lambda a, b: a + b).__code__.replace(co_nlocals=3)"
expect_exc = "ValueError"
module     = "types"
source     = "Lib/test/test_code.py"

# ===========================================================================
# BEHAVIOR — semantic (the `code` module REPL/sandbox engine)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "console_push_false_for_complete"
subject   = "code.InteractiveConsole.push"
kind      = "semantic"
module    = "code"
intent    = "InteractiveConsole.push returns False for complete statements: an assignment ('x = 42') and a bare expression ('1 + 1') each complete immediately"

[[case]]
dimension = "behavior"
case      = "console_push_true_then_blank_completes"
subject   = "code.InteractiveConsole.push"
kind      = "semantic"
module    = "code"
intent    = "push returns True while a compound statement is incomplete ('if True:'), accepts the indented body as a bool, and a final blank line completes the block (returns False)"

[[case]]
dimension = "behavior"
case      = "console_resetbuffer_clears_partial"
subject   = "code.InteractiveConsole.resetbuffer"
kind      = "semantic"
module    = "code"
intent    = "resetbuffer discards a partial multi-line statement so the next complete push ('y = 7') starts fresh and returns False"

[[case]]
dimension = "behavior"
case      = "console_locals_shared_with_engine"
subject   = "code.InteractiveConsole"
kind      = "semantic"
module    = "code"
intent    = "the locals dict passed to InteractiveConsole is shared: a pushed statement reading a seeded name ('start') and writing a new one ('result') mutates that very dict"

[[case]]
dimension = "behavior"
case      = "console_locals_seed_visible"
subject   = "code.InteractiveConsole"
kind      = "semantic"
module    = "code"
intent    = "a fresh InteractiveConsole exposes its seeded locals dict via .locals, and the seeded value ('init_val' == 99) is readable"

[[case]]
dimension = "behavior"
case      = "console_subclasses_interpreter"
subject   = "code.InteractiveConsole"
kind      = "semantic"
module    = "code"
intent    = "InteractiveConsole is a subclass of InteractiveInterpreter, so an instance isinstance-checks as both"

[[case]]
dimension = "behavior"
case      = "runsource_updates_locals"
subject   = "code.InteractiveInterpreter.runsource"
kind      = "semantic"
module    = "code"
intent    = "InteractiveInterpreter.runsource executes complete source and the result lands in the supplied locals dict: 'answer = 6 * 7' sets answer == 42"

[[case]]
dimension = "behavior"
case      = "runsource_false_complete_true_incomplete"
subject   = "code.InteractiveInterpreter.runsource"
kind      = "semantic"
module    = "code"
intent    = "runsource returns False for complete source ('z = 10') and True for incomplete source ('def foo():') that needs more input"

[[case]]
dimension = "behavior"
case      = "runsource_exec_error_caught_to_stderr"
subject   = "code.InteractiveInterpreter.runsource"
kind      = "semantic"
module    = "code"
intent    = "an exception from executed source is caught (not propagated): runsource('1 / 0') returns False and the traceback (containing 'ZeroDivisionError') is written to stderr via showtraceback"

[[case]]
dimension = "behavior"
case      = "console_runsource_syntax_error_caught"
subject   = "code.InteractiveConsole.runsource"
kind      = "semantic"
module    = "code"
intent    = "a genuine SyntaxError in source is caught and reported, not raised: ic.runsource('def bad(:') returns False with the error sent to showsyntaxerror"

[[case]]
dimension = "behavior"
case      = "interpreter_exec_into_namespace"
subject   = "code.InteractiveInterpreter"
kind      = "semantic"
module    = "code"
intent    = "an interpreter built over an explicit namespace dict execs source into it: after runsource('x = 42') the namespace holds x == 42"

[[case]]
dimension = "behavior"
case      = "compile_command_complete_returns_code"
subject   = "code.compile_command"
kind      = "semantic"
intent    = "compile_command returns a types.CodeType object for complete source ('1 + 2'), not None"

[[case]]
dimension = "behavior"
case      = "compile_command_incomplete_returns_none"
subject   = "code.compile_command"
kind      = "semantic"
intent    = "compile_command returns None for source that is syntactically incomplete and may still be continued ('if True:' / 'def f():')"

