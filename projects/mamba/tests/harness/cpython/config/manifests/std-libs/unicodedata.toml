# Manifest for the stdlib `unicodedata` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/unicodedata/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py)
# plus the loose feature files (case_mapping.py, linebreak.py,
# versioned_ucd.py) and the real_world/_stub.py placeholder. bench/ is left
# as-is.
#
# Oracle: CPython 3.12; provenance Lib/test/test_unicodedata.py.

bucket = "std-libs"
lib = "unicodedata"

