# ===========================================================================
# ERRORS — mechanical (call + expect_exc; generator emits assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "lookup_unknown_name_raises"
subject    = "unicodedata.lookup"
kind       = "mechanical"
call       = 'unicodedata.lookup("NO_SUCH_CHARACTER_NAME_XYZZY")'
expect_exc = "KeyError"
source     = "Lib/test/test_unicodedata.py"

[[case]]
dimension  = "errors"
case       = "name_no_name_raises"
subject    = "unicodedata.name"
kind       = "mechanical"
call       = "unicodedata.name(chr(0))"
expect_exc = "ValueError"
source     = "Lib/test/test_unicodedata.py"

[[case]]
dimension  = "errors"
case       = "decimal_non_decimal_raises"
subject    = "unicodedata.decimal"
kind       = "mechanical"
call       = 'unicodedata.decimal("A")'
expect_exc = "ValueError"
source     = "Lib/test/test_unicodedata.py"

[[case]]
dimension  = "errors"
case       = "numeric_non_numeric_raises"
subject    = "unicodedata.numeric"
kind       = "mechanical"
call       = 'unicodedata.numeric("A")'
expect_exc = "ValueError"
source     = "Lib/test/test_unicodedata.py"

[[case]]
dimension  = "errors"
case       = "digit_non_digit_raises"
subject    = "unicodedata.digit"
kind       = "mechanical"
call       = 'unicodedata.digit("A")'
expect_exc = "ValueError"
source     = "Lib/test/test_unicodedata.py"

[[case]]
dimension  = "errors"
case       = "normalize_bad_form_raises"
subject    = "unicodedata.normalize"
kind       = "mechanical"
call       = 'unicodedata.normalize("NO_SUCH_FORM", "abc")'
expect_exc = "ValueError"
source     = "Lib/test/test_unicodedata.py"

[[case]]
dimension  = "errors"
case       = "normalize_no_args_raises"
subject    = "unicodedata.normalize"
kind       = "mechanical"
call       = "unicodedata.normalize()"
expect_exc = "TypeError"
source     = "Lib/test/test_unicodedata.py"

[[case]]
dimension  = "errors"
case       = "name_non_char_raises"
subject    = "unicodedata.name"
kind       = "mechanical"
call       = "unicodedata.name(123)"
expect_exc = "TypeError"
source     = "Lib/test/test_unicodedata.py"

[[case]]
dimension  = "errors"
case       = "category_multi_char_raises"
subject    = "unicodedata.category"
kind       = "mechanical"
call       = 'unicodedata.category("xx")'
expect_exc = "TypeError"
source     = "Lib/test/test_unicodedata.py"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule each; agent fills the body)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "nfd_decomposes_to_base_plus_mark"
subject   = "unicodedata.normalize"
kind      = "semantic"
intent    = "NFD splits precomposed e-acute into base 'e' (U+0065) followed by combining acute (U+0301)"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "nfc_composes_to_single_char"
subject   = "unicodedata.normalize"
kind      = "semantic"
intent    = "NFC recomposes e-acute back into the single precomposed code point (length 1)"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "nfkd_expands_compatibility_ligature"
subject   = "unicodedata.normalize"
kind      = "semantic"
intent    = "NFKD maps the fi ligature (U+FB01) to the ASCII pair 'fi'"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "category_letter_case_classes"
subject   = "unicodedata.category"
kind      = "semantic"
intent    = "category returns Lu/Ll/Lt for uppercase 'A', lowercase 'a', and titlecase digraph (U+01F2)"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "numeric_digit_decimal_values"
subject   = "unicodedata.numeric"
kind      = "semantic"
intent    = "digit('5')==5, decimal('7')==7, numeric vulgar-half (U+00BD)==0.5"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "is_normalized_nfc_nfd_distinguishes_forms"
subject   = "unicodedata.is_normalized"
kind      = "semantic"
intent    = "is_normalized reports True/False correctly for precomposed vs decomposed e-acute under NFC and NFD"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "name_lookup_round_trip"
subject   = "unicodedata.lookup"
kind      = "semantic"
intent    = "name() and lookup() are inverses over a sample of named characters (A Z 0 9 e-acute n-tilde alpha)"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "combining_class_zero_for_base_nonzero_for_marks"
subject   = "unicodedata.combining"
kind      = "semantic"
intent    = "combining is 0 for base letters A/Z and positive for the combining grave (U+0300) and acute (U+0301) marks"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "decomposition_string_for_precomposed"
subject   = "unicodedata.decomposition"
kind      = "semantic"
intent    = "decomposition('A') is empty while e-acute yields a non-empty mapping starting with code point 0065"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "decomposition_fraction_tag_format"
subject   = "unicodedata.decomposition"
kind      = "semantic"
intent    = "the vulgar fraction one quarter (U+00BC) decomposes to the tagged form '<fraction> 0031 2044 0034'"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "hangul_algorithmic_round_trip"
subject   = "unicodedata.normalize"
kind      = "semantic"
intent    = "precomposed Hangul syllables decompose to six jamo under NFD and recompose losslessly under NFC (no UCD table entries)"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "normalize_empty_string_is_empty"
subject   = "unicodedata.normalize"
kind      = "semantic"
intent    = "normalizing the empty string yields the empty string for every form NFC/NFD/NFKC/NFKD"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "name_default_for_unnamed_char"
subject   = "unicodedata.name"
kind      = "semantic"
intent    = "name() returns the supplied default for an unnamed control character (NUL) instead of raising"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "mirrored_flags_bracket_chars"
subject   = "unicodedata.mirrored"
kind      = "semantic"
intent    = "mirrored is 0 for 'A' and 1 for the open parenthesis '(' (a bidi-mirrored bracket)"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "east_asian_width_width_classes"
subject   = "unicodedata.east_asian_width"
kind      = "semantic"
intent    = "east_asian_width returns Na for space, W for a CJK char (U+C894), H for halfwidth (U+FF66), F for fullwidth (U+FF1F)"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "case_mapping_titlecase_and_late_uppercase"
subject   = "str.title"
kind      = "semantic"
module    = "unicodedata"
intent    = "Unicode-aware case maps: DZ digraph (U+01C4/5/6) all titlecase to U+01C5; turned-g (U+1D79) uppercases to U+A77D; only U+0000 maps to a NUL"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "splitlines_unicode_line_boundaries"
subject   = "str.splitlines"
kind      = "semantic"
module    = "unicodedata"
intent    = "str.splitlines breaks on exactly the Unicode line-boundary set (LF/VT/FF/CR/FS/GS/RS/NEL/LS/PS) over the BMP, not just ASCII newlines"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "ucd_3_2_0_pins_old_unicode_version"
subject   = "unicodedata.ucd_3_2_0"
kind      = "semantic"
intent    = "the frozen ucd_3_2_0 database reports unidata_version '3.2.0' and disagrees with the live UCD on a post-3.2 mirrored change (U+0F3A) while stable properties agree"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "pr29_composition_is_stable"
subject   = "unicodedata.normalize"
kind      = "semantic"
intent    = "PR-29 sequences are stable under NFC: normalize('NFC', text) returns text for the documented composition-exclusion cases"
source    = "Lib/test/test_unicodedata.py"

[[case]]
dimension = "behavior"
case      = "issue29456_hangul_recompose"
subject   = "unicodedata.normalize"
kind      = "semantic"
intent    = "NFC of Hangul jamo sequences recomposes per issue #29456 (e.g. choseong+jungseong U+1100 U+1175 + jongseong collapses to the precomposed syllable)"
source    = "Lib/test/test_unicodedata.py"

# ===========================================================================
# REAL_WORLD — semantic end-to-end scenario
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "accent_folding_search_normalizer"
subject   = "unicodedata"
kind      = "semantic"
intent    = "a diacritic-insensitive search helper folds accents by NFD-decomposing text and dropping combining marks (category 'Mn'), so 'cafe' matches an accented 'cafe' corpus entry"
source    = "Lib/test/test_unicodedata.py"
