# Manifest for the stdlib `keyword` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/keyword/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py,
# the syntactic_reservation.py feature file, and the real_world fixtures.
# CPython 3.12 is the oracle. bench/ is kept as-is (not regenerated).

bucket = "std-libs"
lib    = "keyword"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_keyword"
subject   = "keyword"
kind      = "mechanical"
probe     = "attr"
attr      = "iskeyword"

[[case]]
dimension = "surface"
case      = "iskeyword_is_callable"
subject   = "keyword.iskeyword"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "issoftkeyword_is_callable"
subject   = "keyword.issoftkeyword"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "kwlist_is_list"
subject   = "keyword.kwlist"
kind      = "mechanical"
probe     = "type"
typename  = "list"

[[case]]
dimension = "surface"
case      = "softkwlist_is_list"
subject   = "keyword.softkwlist"
kind      = "mechanical"
probe     = "type"
typename  = "list"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc)
#
# The keyword module defines no exception classes of its own. The one
# exception path documented by the legacy feature file is the syntactic
# reservation rule: binding a hard keyword as a name is a SyntaxError,
# even via exec() at runtime.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "bind_hard_keyword_raises_syntaxerror"
subject    = "keyword.kwlist"
kind       = "mechanical"
call       = 'exec("if = 42")'
expect_exc = "SyntaxError"
source     = "Lib/test/test_keyword.py"

# ===========================================================================
# BEHAVIOR — semantic (output matches CPython 3.12)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "iskeyword_hard_keywords"
subject   = "keyword.iskeyword"
kind      = "semantic"
intent    = "iskeyword returns True for every hard keyword in kwlist (all 35)"
source    = "Lib/test/test_keyword.py"

[[case]]
dimension = "behavior"
case      = "iskeyword_rejects_non_keywords"
subject   = "keyword.iskeyword"
kind      = "semantic"
intent    = "iskeyword returns False for ordinary identifiers, empty string, and soft keywords"
source    = "Lib/test/test_keyword.py"

[[case]]
dimension = "behavior"
case      = "iskeyword_case_sensitive"
subject   = "keyword.iskeyword"
kind      = "semantic"
intent    = "iskeyword is case-sensitive: 'class'/'True' are keywords, 'Class'/'CLASS'/'true'/'FALSE' are not"
source    = "Lib/test/test_keyword.py"

[[case]]
dimension = "behavior"
case      = "iskeyword_non_string_returns_false"
subject   = "keyword.iskeyword"
kind      = "semantic"
intent    = "iskeyword(int) and iskeyword(None) return False without raising"
source    = "Lib/test/test_keyword.py"

[[case]]
dimension = "behavior"
case      = "kwlist_matches_iskeyword"
subject   = "keyword.kwlist"
kind      = "semantic"
intent    = "kwlist is sorted, duplicate-free, and iskeyword(x) == (x in kwlist) for every tested value"
source    = "Lib/test/test_keyword.py"

[[case]]
dimension = "behavior"
case      = "kwlist_has_35_hard_keywords"
subject   = "keyword.kwlist"
kind      = "semantic"
intent    = "kwlist contains exactly 35 hard keywords on CPython 3.12, including async/await (PEP 492)"
source    = "Lib/test/test_keyword.py"

[[case]]
dimension = "behavior"
case      = "issoftkeyword_soft_keywords"
subject   = "keyword.issoftkeyword"
kind      = "semantic"
intent    = "issoftkeyword is True for soft keywords (match/case/type/_) and False for hard keywords"
source    = "Lib/test/test_keyword.py"

[[case]]
dimension = "behavior"
case      = "softkwlist_exact_contents"
subject   = "keyword.softkwlist"
kind      = "semantic"
intent    = "softkwlist is exactly ['_', 'case', 'match', 'type'] (sorted) on CPython 3.12 (PEP 695 'type')"
source    = "Lib/test/test_keyword.py"

[[case]]
dimension = "behavior"
case      = "soft_and_hard_lists_disjoint"
subject   = "keyword.softkwlist"
kind      = "semantic"
intent    = "kwlist and softkwlist are disjoint; soft keywords are absent from kwlist and bind as ordinary names via exec"
source    = "Lib/test/test_keyword.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenarios)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "lint_reserved_names"
subject   = "keyword.iskeyword"
kind      = "semantic"
intent    = "code-generator rejects candidate names colliding with hard keywords while allowing soft keywords as identifiers"

[[case]]
dimension = "real_world"
case      = "lex_check"
subject   = "keyword.iskeyword"
kind      = "semantic"
intent    = "static checker partitions a candidate name list into reserved-rejected and accepted, soft keywords accepted"
