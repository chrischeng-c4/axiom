# Manifest for the stdlib `secrets` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/secrets/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py),
# the loose feature file compare_digest.py, and real_world/. CPython 3.12 is
# the oracle. `secrets` is a thin wrapper around os.urandom + random.SystemRandom;
# random output is never value-asserted, only shape / length / charset / range.

bucket = "std-libs"
lib = "secrets"

# ===========================================================================
# SURFACE — mechanical probes (callable / type / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "token_bytes_is_callable"
subject   = "secrets.token_bytes"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "token_hex_is_callable"
subject   = "secrets.token_hex"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "token_urlsafe_is_callable"
subject   = "secrets.token_urlsafe"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "randbits_is_callable"
subject   = "secrets.randbits"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "randbelow_is_callable"
subject   = "secrets.randbelow"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "choice_is_callable"
subject   = "secrets.choice"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "compare_digest_is_callable"
subject   = "secrets.compare_digest"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "system_random_is_callable"
subject   = "secrets.SystemRandom"
kind      = "mechanical"
module    = "secrets"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "default_entropy_attr"
subject   = "secrets"
kind      = "mechanical"
probe     = "attr"
attr      = "DEFAULT_ENTROPY"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc), self-asserting raise
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "randbelow_zero_raises"
subject    = "secrets.randbelow"
kind       = "mechanical"
call       = "secrets.randbelow(0)"
expect_exc = "ValueError"
source     = "Lib/test/test_secrets.py"

[[case]]
dimension  = "errors"
case       = "randbelow_negative_raises"
subject    = "secrets.randbelow"
kind       = "mechanical"
call       = "secrets.randbelow(-5)"
expect_exc = "ValueError"
source     = "Lib/test/test_secrets.py"

[[case]]
dimension  = "errors"
case       = "choice_empty_sequence_raises"
subject    = "secrets.choice"
kind       = "mechanical"
call       = "secrets.choice([])"
expect_exc = "IndexError"
source     = "Lib/test/test_secrets.py"

[[case]]
dimension  = "errors"
case       = "token_bytes_negative_raises"
subject    = "secrets.token_bytes"
kind       = "mechanical"
call       = "secrets.token_bytes(-1)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "token_urlsafe_negative_raises"
subject    = "secrets.token_urlsafe"
kind       = "mechanical"
call       = "secrets.token_urlsafe(-1)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "compare_digest_str_bytes_raises"
subject    = "secrets.compare_digest"
kind       = "mechanical"
call       = 'secrets.compare_digest("abc", b"abc")'
expect_exc = "TypeError"
source     = "Lib/test/test_secrets.py"

[[case]]
dimension  = "errors"
case       = "compare_digest_bytes_str_raises"
subject    = "secrets.compare_digest"
kind       = "mechanical"
call       = 'secrets.compare_digest(b"abc", "abc")'
expect_exc = "TypeError"
source     = "Lib/test/test_secrets.py"

# ===========================================================================
# BEHAVIOR — semantic (output matches CPython); random output checked only
# by shape / length / charset / range, never by exact value
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "token_bytes_length_matches_request"
subject   = "secrets.token_bytes"
kind      = "semantic"
intent    = "token_bytes(n) returns exactly n bytes for n in 0,1,8,16,32,64 (default is DEFAULT_ENTROPY=32)"
source    = "Lib/test/test_secrets.py"

[[case]]
dimension = "behavior"
case      = "token_bytes_not_all_zero"
subject   = "secrets.token_bytes"
kind      = "semantic"
intent    = "a 32-byte token_bytes draw is not all-zero (cryptographically random, not a stub)"

[[case]]
dimension = "behavior"
case      = "token_hex_length_is_double"
subject   = "secrets.token_hex"
kind      = "semantic"
intent    = "token_hex(n) returns a lowercase-hex str of length 2*n for n in 4,8,16,32; default is 64 chars (2*DEFAULT_ENTROPY)"
source    = "Lib/test/test_secrets.py"

[[case]]
dimension = "behavior"
case      = "token_urlsafe_charset_and_length"
subject   = "secrets.token_urlsafe"
kind      = "semantic"
intent    = "token_urlsafe(n) returns an unpadded URL-safe base64 str (chars in A-Za-z0-9-_) of length >= n; token_urlsafe(3) is exactly 4 chars"
source    = "Lib/test/test_secrets.py"

[[case]]
dimension = "behavior"
case      = "randbits_in_range"
subject   = "secrets.randbits"
kind      = "semantic"
intent    = "randbits(k) returns an int in [0, 2**k) for k in 1,8,16,32,64; randbits(0) is 0"
source    = "Lib/test/test_secrets.py"

[[case]]
dimension = "behavior"
case      = "randbelow_in_range"
subject   = "secrets.randbelow"
kind      = "semantic"
intent    = "randbelow(n) returns an int in range(n) for n>=2 across repeated draws; randbelow(1) is always 0"
source    = "Lib/test/test_secrets.py"

[[case]]
dimension = "behavior"
case      = "choice_returns_member_without_mutation"
subject   = "secrets.choice"
kind      = "semantic"
intent    = "choice(seq) returns an element of seq across repeated draws and never mutates the input sequence"
source    = "Lib/test/test_secrets.py"

[[case]]
dimension = "behavior"
case      = "token_hex_outputs_are_unique"
subject   = "secrets.token_hex"
kind      = "semantic"
intent    = "100 consecutive token_hex(16) draws are all distinct (no collision / no constant stub)"

[[case]]
dimension = "behavior"
case      = "compare_digest_returns_real_bool"
subject   = "secrets.compare_digest"
kind      = "semantic"
intent    = "compare_digest returns a genuine bool (True for equal, False for unequal) for both str and bytes operands"
source    = "Lib/test/test_secrets.py"

[[case]]
dimension = "behavior"
case      = "compare_digest_distinguishes_length"
subject   = "secrets.compare_digest"
kind      = "semantic"
intent    = "compare_digest reports unequal for same-prefix different-length operands and for equal-length last-char-differing operands, str and bytes alike"
source    = "Lib/test/test_secrets.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "session_token_signing"
subject   = "secrets"
kind      = "semantic"
intent    = "auth flow: mint an opaque session token via secrets, derive a server-side lookup key via hashlib.sha256, then per-request HMAC-sign the body and constant-time-verify via compare_digest; random output checked by shape only"
source    = "Lib/test/test_secrets.py"
