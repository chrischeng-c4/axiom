# ===========================================================================
# ERRORS — mechanical (call + expect_exc, assert-it-raised)
#
# Bodies use the `from urllib.parse import X` form (set via `import`) to dodge
# the mamba dotted-import quirk; the call expression references the imported
# bare name. Network-dependent error paths from the legacy errors.py monolith
# (urlopen bad-scheme / bad-host) are intentionally dropped — they violate the
# no-network determinism rule — and replaced with the in-memory exception-path
# and hierarchy coverage below plus the encoding-error cases.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "quote_bytes_with_encoding_typeerror"
subject    = "urllib.parse.quote"
kind       = "mechanical"
import     = "from urllib.parse import quote"
call       = "quote(b'\\xa2\\xd8', encoding='latin-1')"
expect_exc = "TypeError"
source     = "Lib/test/test_urllib.py"

[[case]]
dimension  = "errors"
case       = "quote_unencodable_char_unicodeerror"
subject    = "urllib.parse.quote"
kind       = "mechanical"
import     = "from urllib.parse import quote"
call       = "quote('\\u6f22', encoding='latin-1')"
expect_exc = "UnicodeEncodeError"
source     = "Lib/test/test_urllib.py"

[[case]]
