# Manifest for the stdlib `urllib` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/urllib/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + paired-.expected golden shape (surface.py,
# behavior.py, errors.py, parse_broad.py/.expected, http_status.py/.expected,
# quote_edges.py, quote_unicode.py, unquote_edges.py, urlencode_edges.py,
# request_object.py, real_world/_stub.py). bench/ is left as-is.
#
# Authoring rule (mamba gotcha, repo-memory project_mamba_dotted_import_quirk):
# `import urllib.parse` then `urllib.parse.X` resolves to None under mamba, so
# every SEMANTIC body uses the `from urllib.parse import X` form (works on both
# runtimes). Mechanical SURFACE probes embed the dotted subject verbatim in
# their `assert callable(urllib.parse.X)` body — that form hits the quirk, so
# the dotted-submodule probes carry xfail citing the quirk. urllib.error /
# urllib.request class subjects set an explicit `module`/`import` because the
# import inferer stops at the first CapWords component.

bucket = "std-libs"
lib = "urllib"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
#
# Dotted-submodule probes (urllib.parse.X / urllib.request.X) embed the dotted
# subject in the body and hit the mamba dotted-import quirk -> xfail.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_urllib_parse"
subject   = "urllib.parse"
kind      = "mechanical"
probe     = "attr"
attr      = "quote"
import    = "import urllib.parse"

