# ===========================================================================
# BEHAVIOR — semantic (skeletons; an agent fills the body).
#
# Each rule names exactly one observable structural-typing fact about an ABC.
# Subjects are CapWords classes -> set module="collections.abc" so the import
# inferer does not stop short of the importable module.
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "builtin_isinstance_relations"
subject   = "collections.abc.Sequence"
kind      = "semantic"
module    = "collections.abc"
intent    = "built-in list/dict/set/frozenset/tuple/str register as instances of the matching ABCs (list is MutableSequence, dict is MutableMapping, set is MutableSet, frozenset/tuple/str are Set/Sequence)"
source    = "Lib/test/test_collections_abc.py"

[[case]]
dimension = "behavior"
case      = "hashable_sized_container_builtins"
subject   = "collections.abc.Hashable"
kind      = "semantic"
module    = "collections.abc"
intent    = "int/str/tuple are Hashable while list/dict/set are not; list/dict are Sized and Container"
source    = "Lib/test/test_collections_abc.py"

[[case]]
dimension = "behavior"
case      = "abc_subclass_hierarchy"
subject   = "collections.abc.Iterator"
kind      = "semantic"
module    = "collections.abc"
intent    = "issubclass relations hold between the ABCs: Iterator<Iterable, MutableSequence<Sequence, MutableMapping<Mapping, MutableSet<Set, Sequence<Reversible"
source    = "Lib/test/test_collections_abc.py"

[[case]]
dimension = "behavior"
case      = "custom_iter_is_iterable"
subject   = "collections.abc.Iterable"
kind      = "semantic"
module    = "collections.abc"
intent    = "a class defining __iter__ is recognized as Iterable via structural subclass hook, while a plain object is not"
source    = "Lib/test/test_collections_abc.py"

[[case]]
dimension = "behavior"
case      = "custom_iterator_protocol"
subject   = "collections.abc.Iterator"
kind      = "semantic"
module    = "collections.abc"
intent    = "a class defining __iter__ and __next__ is an Iterator and iterates to exhaustion via list()"
source    = "Lib/test/test_collections_abc.py"

[[case]]
dimension = "behavior"
case      = "custom_len_is_sized"
subject   = "collections.abc.Sized"
kind      = "semantic"
module    = "collections.abc"
intent    = "a class defining __len__ is recognized as Sized via the structural subclass hook"
source    = "Lib/test/test_collections_abc.py"

[[case]]
dimension = "behavior"
case      = "custom_contains_is_container"
subject   = "collections.abc.Container"
kind      = "semantic"
module    = "collections.abc"
intent    = "a class defining __contains__ is a Container and drives the `in` operator"
source    = "Lib/test/test_collections_abc.py"

[[case]]
dimension = "behavior"
case      = "custom_call_is_callable"
subject   = "collections.abc.Callable"
kind      = "semantic"
module    = "collections.abc"
intent    = "a class defining __call__ is recognized as Callable and is invokable"
source    = "Lib/test/test_collections_abc.py"

[[case]]
dimension = "behavior"
case      = "register_virtual_mapping"
subject   = "collections.abc.Mapping"
kind      = "semantic"
module    = "collections.abc"
intent    = "Mapping.register() makes an unrelated mapping-shaped class a virtual subclass recognized by isinstance"
source    = "Lib/test/test_collections_abc.py"

[[case]]
dimension = "behavior"
case      = "generator_is_iterator_iterable"
subject   = "collections.abc.Generator"
kind      = "semantic"
module    = "collections.abc"
intent    = "a generator object is an instance of Generator, Iterator, and Iterable"
source    = "Lib/test/test_collections_abc.py"

[[case]]
dimension = "behavior"
case      = "reversible_builtins"
subject   = "collections.abc.Reversible"
kind      = "semantic"
module    = "collections.abc"
intent    = "tuple/str/list are Reversible and (since 3.8) dict is Reversible too"
source    = "Lib/test/test_collections_abc.py"

[[case]]
dimension = "behavior"
case      = "mutable_sequence_mixin_methods"
subject   = "collections.abc.MutableSequence"
kind      = "semantic"
module    = "collections.abc"
intent    = "subclassing MutableSequence with the five abstract methods yields working mixin methods append() and reverse()"
source    = "Lib/test/test_collections_abc.py"

