# Manifest for the stdlib `collections.abc` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/collections_abc/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the real_world placeholder _stub.py. bench/ stays as-is (perf, golden-less).
# No coverage lost.
#
# `collections_abc` is the dotted submodule `collections.abc`; the import
# inferer resolves `collections.abc.Iterable` -> `collections.abc`, but the ABC
# subjects are CapWords classes, so we set module="collections.abc" explicitly
# on those that would otherwise stop the inferer short.

bucket = "std-libs"
lib = "collections_abc"

# ===========================================================================
# SURFACE — mechanical probes.
#
# The collections.abc public ABC names exist as module attributes, and the
# built-in / ABC subclass-hierarchy relations are static structural facts.
# Each `attr` probe names one ABC; the import inferer resolves the module
# (collections.abc) from the dotted subject.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_collections_abc"
subject   = "collections.abc"
kind      = "mechanical"
module    = "collections.abc"
probe     = "attr"
attr      = "Iterable"

