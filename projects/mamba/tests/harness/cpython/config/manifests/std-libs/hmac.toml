# Manifest for the stdlib `hmac` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/hmac/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py)
# plus the loose feature files (class_api.py, copy.py, block_size_warning.py)
# and the un-headered real_world/api_request_signature.py. bench/ is left
# as-is.
#
# Method subjects (hmac.HMAC.*) carry an explicit `module = "hmac"` so the
# import inferer — which stops at the first CapWords component (HMAC) — never
# has to guess.

bucket = "std-libs"
lib = "hmac"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "new_is_callable"
subject   = "hmac.new"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "digest_is_callable"
subject   = "hmac.digest"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "compare_digest_is_callable"
subject   = "hmac.compare_digest"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "hmac_class_attr"
subject   = "hmac"
kind      = "mechanical"
probe     = "attr"
attr      = "HMAC"

[[case]]
dimension = "surface"
case      = "hmac_update_is_callable"
subject   = "hmac.HMAC.update"
kind      = "mechanical"
probe     = "callable"
module    = "hmac"

[[case]]
dimension = "surface"
case      = "hmac_digest_is_callable"
subject   = "hmac.HMAC.digest"
kind      = "mechanical"
probe     = "callable"
module    = "hmac"

[[case]]
dimension = "surface"
case      = "hmac_hexdigest_is_callable"
subject   = "hmac.HMAC.hexdigest"
kind      = "mechanical"
probe     = "callable"
module    = "hmac"

[[case]]
dimension = "surface"
case      = "hmac_copy_is_callable"
subject   = "hmac.HMAC.copy"
kind      = "mechanical"
probe     = "callable"
module    = "hmac"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc; self-asserting assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "str_key_raises"
subject    = "hmac.new"
kind       = "mechanical"
call       = 'hmac.new("not bytes", b"msg", "sha256")'
expect_exc = "TypeError"
source     = "Lib/test/test_hmac.py"

[[case]]
dimension  = "errors"
case       = "unknown_digestmod_raises"
subject    = "hmac.new"
kind       = "mechanical"
call       = 'hmac.new(b"key", b"msg", "no_such_hash")'
expect_exc = "ValueError"
source     = "Lib/test/test_hmac.py"

[[case]]
dimension  = "errors"
case       = "str_update_raises"
subject    = "hmac.HMAC.update"
kind       = "mechanical"
call       = 'hmac.new(b"key", digestmod="sha256").update("not bytes")'
expect_exc = "TypeError"
module     = "hmac"
source     = "Lib/test/test_hmac.py"

[[case]]
dimension  = "errors"
case       = "mixed_type_compare_raises"
subject    = "hmac.compare_digest"
kind       = "mechanical"
call       = 'hmac.compare_digest("string", b"bytes")'
expect_exc = "TypeError"
source     = "Lib/test/test_hmac.py"

[[case]]
dimension  = "errors"
case       = "none_digestmod_raises"
subject    = "hmac.new"
kind       = "mechanical"
call       = 'hmac.new(b"key", b"msg", None)'
expect_exc = "TypeError"
source     = "Lib/test/test_hmac.py"

[[case]]
dimension  = "errors"
case       = "missing_digestmod_raises"
subject    = "hmac.new"
kind       = "mechanical"
call       = 'hmac.new(b"key", b"msg")'
expect_exc = "TypeError"
source     = "Lib/test/test_hmac.py"

[[case]]
dimension  = "errors"
case       = "empty_digestmod_raises"
subject    = "hmac.HMAC"
kind       = "mechanical"
call       = 'hmac.HMAC(b"key", msg=b"msg", digestmod="")'
expect_exc = "TypeError"
module     = "hmac"
source     = "Lib/test/test_hmac.py"

# ===========================================================================
# BEHAVIOR — semantic (observable output matches CPython)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "sha256_known_vector"
subject   = "hmac.new"
kind      = "semantic"
intent    = "HMAC-SHA256 of key='key' over the pangram matches the published RFC/NIST hexdigest f7bc83f4...2d1a3cd8"
source    = "Lib/test/test_hmac.py"

[[case]]
dimension = "behavior"
case      = "digest_sizes_per_algorithm"
subject   = "hmac.new"
kind      = "semantic"
intent    = "HMAC digest length tracks the underlying hash: md5 -> 16 bytes, sha1 -> 20 bytes, sha256 -> 32 bytes, and differing algorithms over the same key/msg yield differing MACs"
source    = "Lib/test/test_hmac.py"

[[case]]
dimension = "behavior"
case      = "one_shot_equals_object_path"
subject   = "hmac.digest"
kind      = "semantic"
intent    = "the hmac.digest(...) one-shot fast path returns the same bytes as hmac.new(...).digest(), for both a string and a hashlib-constructor digestmod"
source    = "Lib/test/test_hmac.py"

[[case]]
dimension = "behavior"
case      = "incremental_equals_single"
subject   = "hmac.HMAC.update"
kind      = "semantic"
intent    = "feeding the message in chunks via update() yields the same digest as supplying it whole at construction"
module    = "hmac"
source    = "Lib/test/test_hmac.py"

[[case]]
dimension = "behavior"
case      = "key_and_message_sensitivity"
subject   = "hmac.new"
kind      = "semantic"
intent    = "changing the key, or the message, changes the MAC; an empty message and an empty key are both valid and produce a full-length digest"
source    = "Lib/test/test_hmac.py"

[[case]]
dimension = "behavior"
case      = "compare_digest_equality"
subject   = "hmac.compare_digest"
kind      = "semantic"
intent    = "compare_digest is True for equal bytes/str, False for differing or different-length inputs, and never raises for same-type args"
source    = "Lib/test/test_hmac.py"

[[case]]
dimension = "behavior"
case      = "class_constructor_digestmod_spellings"
subject   = "hmac.HMAC"
kind      = "semantic"
intent    = "hmac.HMAC accepts a string name, a hashlib-module constructor, or a keyword-only digestmod, all equivalent to hmac.new; the object reports digest_size=32, block_size=64, name='hmac-sha256'"
module    = "hmac"
source    = "Lib/test/test_hmac.py"

[[case]]
dimension = "behavior"
case      = "copy_is_independent_snapshot"
subject   = "hmac.HMAC.copy"
kind      = "semantic"
intent    = "copy() returns a distinct object that freezes the original's state at copy time; the original keeps accumulating after digest(), and sibling copies diverge independently"
module    = "hmac"
source    = "Lib/test/test_hmac.py"

[[case]]
dimension = "behavior"
case      = "small_block_size_warns"
subject   = "hmac.HMAC"
kind      = "semantic"
intent    = "a caller-supplied digestmod that lacks block_size, or reports a suspiciously small one, triggers a RuntimeWarning mentioning block_size"
module    = "hmac"
source    = "Lib/test/test_hmac.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "api_request_signature"
subject   = "hmac"
kind      = "semantic"
intent    = "a service-to-service client signs a 1 MiB request body with a shared secret across sha256/sha1/md5, verifies single-shot vs chunked-update parity, copy() isolation, the hmac.digest one-shot path, and compare_digest accept/reject of the canonical signature"
source    = "Lib/test/test_hmac.py"
