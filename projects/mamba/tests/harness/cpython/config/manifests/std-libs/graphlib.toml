# Manifest for the stdlib `graphlib` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/graphlib/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py
# plus the loose feature files equivalence.py and lifecycle.py.
#
# graphlib's public surface is small: TopologicalSorter (the scheduler) and
# CycleError (a ValueError subclass). Mamba models a TopologicalSorter as an
# integer handle into a side table; CPython models it as a class instance.
# Fixtures assert only parity-compatible observable behavior.

bucket = "std-libs"
lib = "graphlib"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_graphlib"
subject   = "graphlib"
kind      = "mechanical"
probe     = "attr"
attr      = "TopologicalSorter"

[[case]]
dimension = "surface"
case      = "topologicalsorter_is_callable"
subject   = "graphlib.TopologicalSorter"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "cycleerror_is_exception_type"
subject   = "graphlib.CycleError"
kind      = "mechanical"
probe     = "attr"
attr      = "__cause__"
module    = "graphlib"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc, self-asserting assert-it-raised)
# ===========================================================================

# CycleError is a ValueError subclass; static_order() is a generator so the
# raise surfaces on iteration (list(...)).

[[case]]
dimension  = "errors"
case       = "simple_cycle_raises"
subject    = "graphlib.TopologicalSorter"
kind       = "mechanical"
module     = "graphlib"
call       = "list(graphlib.TopologicalSorter({'A': {'B'}, 'B': {'A'}}).static_order())"
expect_exc = "graphlib.CycleError"
source     = "Lib/test/test_graphlib.py"

[[case]]
dimension  = "errors"
case       = "long_cycle_raises"
subject    = "graphlib.TopologicalSorter"
kind       = "mechanical"
module     = "graphlib"
call       = "list(graphlib.TopologicalSorter({'X': {'Y'}, 'Y': {'Z'}, 'Z': {'X'}}).static_order())"
expect_exc = "graphlib.CycleError"
source     = "Lib/test/test_graphlib.py"

[[case]]
dimension  = "errors"
case       = "prepare_twice_raises"
subject    = "graphlib.TopologicalSorter"
kind       = "mechanical"
module     = "graphlib"
call       = "(lambda t: (t.prepare(), t.prepare()))(graphlib.TopologicalSorter())"
expect_exc = "ValueError"
source     = "Lib/test/test_graphlib.py"

[[case]]
dimension  = "errors"
case       = "get_ready_before_prepare_raises"
subject    = "graphlib.TopologicalSorter"
kind       = "mechanical"
module     = "graphlib"
call       = "graphlib.TopologicalSorter().get_ready()"
expect_exc = "ValueError"
source     = "Lib/test/test_graphlib.py"

[[case]]
dimension  = "errors"
case       = "done_before_prepare_raises"
subject    = "graphlib.TopologicalSorter"
kind       = "mechanical"
module     = "graphlib"
call       = "graphlib.TopologicalSorter().done(3)"
expect_exc = "ValueError"
source     = "Lib/test/test_graphlib.py"

[[case]]
dimension  = "errors"
case       = "is_active_before_prepare_raises"
subject    = "graphlib.TopologicalSorter"
kind       = "mechanical"
module     = "graphlib"
call       = "graphlib.TopologicalSorter().is_active()"
expect_exc = "ValueError"
source     = "Lib/test/test_graphlib.py"

[[case]]
dimension  = "errors"
case       = "done_not_passed_out_raises"
subject    = "graphlib.TopologicalSorter"
kind       = "mechanical"
module     = "graphlib"
call       = "(lambda t: (t.add(1, 2, 3, 4), t.add(2, 3, 4), t.prepare(), t.get_ready(), t.done(2)))(graphlib.TopologicalSorter())"
expect_exc = "ValueError"
source     = "Lib/test/test_graphlib.py"

[[case]]
dimension  = "errors"
case       = "done_unknown_node_raises"
subject    = "graphlib.TopologicalSorter"
kind       = "mechanical"
module     = "graphlib"
call       = "(lambda t: (t.add(1, 2), t.prepare(), t.done(24)))(graphlib.TopologicalSorter())"
expect_exc = "ValueError"
source     = "Lib/test/test_graphlib.py"

[[case]]
dimension  = "errors"
case       = "unhashable_predecessor_raises"
subject    = "graphlib.TopologicalSorter"
kind       = "mechanical"
module     = "graphlib"
call       = "graphlib.TopologicalSorter().add({}, 1)"
expect_exc = "TypeError"
source     = "Lib/test/test_graphlib.py"

[[case]]
dimension  = "errors"
case       = "unhashable_successor_raises"
subject    = "graphlib.TopologicalSorter"
kind       = "mechanical"
module     = "graphlib"
call       = "graphlib.TopologicalSorter().add(1, {})"
expect_exc = "TypeError"
source     = "Lib/test/test_graphlib.py"

# ===========================================================================
# BEHAVIOR — semantic (observable output must match CPython 3.12)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "noarg_construction_succeeds"
subject   = "graphlib.TopologicalSorter"
kind      = "semantic"
module    = "graphlib"
intent    = "TopologicalSorter is callable and a no-arg construction succeeds, yielding a non-None object on both runtimes"

[[case]]
dimension = "behavior"
case      = "static_order_linear_chain"
subject   = "graphlib.TopologicalSorter"
kind      = "semantic"
module    = "graphlib"
intent    = "static_order on the chain A<-B<-C ({'A':{'B'},'B':{'C'},'C':set()}) yields dependencies before dependents: ['C','B','A']"
source    = "Lib/test/test_graphlib.py"

[[case]]
dimension = "behavior"
case      = "incremental_add_equals_batched"
subject   = "graphlib.TopologicalSorter"
kind      = "semantic"
module    = "graphlib"
intent    = "repeated add(1,dep) calls accumulate to the same static_order as a single add of the dep set {2,3,4,5}"
source    = "Lib/test/test_graphlib.py"

[[case]]
dimension = "behavior"
case      = "generator_deps_consumed"
subject   = "graphlib.TopologicalSorter"
kind      = "semantic"
module    = "graphlib"
intent    = "dependencies may be any iterable including a one-shot generator: {0: (2*x+1 for x in range(5))} gives static_order [1,3,5,7,9,0]"
source    = "Lib/test/test_graphlib.py"

[[case]]
dimension = "behavior"
case      = "insertion_order_groups_invariant"
subject   = "graphlib.TopologicalSorter"
kind      = "semantic"
module    = "graphlib"
intent    = "the order edges are added in does not change the grouping produced by the parallel prepare/get_ready/done driver loop"
source    = "Lib/test/test_graphlib.py"

[[case]]
dimension = "behavior"
case      = "manual_driver_loop_lifecycle"
subject   = "graphlib.TopologicalSorter"
kind      = "semantic"
module    = "graphlib"
intent    = "prepare/get_ready/done/is_active drive parallel scheduling: leaves come out first as a tuple, done() unblocks dependents, is_active stays True until every released node is done"
source    = "Lib/test/test_graphlib.py"
