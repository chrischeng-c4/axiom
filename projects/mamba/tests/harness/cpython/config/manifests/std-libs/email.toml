# ===========================================================================
# ERRORS — mechanical (call + expect_exc; generator emits assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "header_bad_charset_raises"
subject    = "email.header.Header"
kind       = "mechanical"
import     = "from email.header import Header"
call       = "Header(\"hi\", charset=\"no_such_charset\")"
expect_exc = "LookupError"
source     = "Lib/test/test_email.py"

[[case]]
dimension  = "errors"
case       = "message_from_bytes_str_raises"
subject    = "email.message_from_bytes"
kind       = "mechanical"
import     = "import email"
call       = "email.message_from_bytes(\"not bytes\")"
expect_exc = "AttributeError"
source     = "Lib/test/test_email.py"

[[case]]
