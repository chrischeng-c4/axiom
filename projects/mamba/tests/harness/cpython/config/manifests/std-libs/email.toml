case      = "malformed_header_collects_defect_no_raise"
subject   = "email.message_from_string"
kind      = "semantic"
import    = "from email import message_from_string"
intent    = "parsing a header line without a colon under the default policy does NOT raise; the defect is collected in msg.defects (non-empty) instead"
source    = "Lib/test/test_email.py"

[[case]]
