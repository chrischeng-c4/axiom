# Manifest for the stdlib `email` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/email/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the loose feature files (encoded_words.py / message_api.py /
# payload_codec.py), preserving every existing case. bench/ is left as-is.
#
# Note on imports: many subjects are CapWords classes inside lowercase
# submodules (email.message.EmailMessage, email.parser.Parser,
# email.header.Header). The import inferer stops at the first CapWords
# component and yields the importable submodule (email.message, email.parser,
# email.header, email.mime.text, email.mime.multipart, email.charset), so no
# explicit override is needed there. Module-level subjects (email.utils.*,
# email.policy.*, email.message_from_*) infer the right module too. Errors
# cases that need a specific bound name set an explicit `import`.

bucket = "std-libs"
lib    = "email"

