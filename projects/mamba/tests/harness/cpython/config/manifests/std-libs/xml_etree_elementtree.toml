# Manifest for the stdlib `xml.etree.ElementTree` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/xml_etree_elementtree/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, children.py, nodes.py, parser.py, serialize.py,
# real_world/_stub.py). bench/ is left as-is.
#
# Import note: the module is `xml.etree.ElementTree` whose leaf component
# `ElementTree` is CapWords, so the import inferer stops too early. Every case
# therefore sets an explicit `import = "import xml.etree.ElementTree as ET"` and
# writes its `subject` / `call` against the `ET` alias.

bucket = "std-libs"
lib    = "xml_etree_elementtree"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr). API-existence only; the rich
# element/attribute semantics live under behavior/.
# ===========================================================================

