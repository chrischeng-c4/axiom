# ===========================================================================
# ERRORS — mechanical (call + expect_exc; generator emits assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "fromstring_malformed_raises_parseerror"
subject    = "ET.fromstring"
kind       = "mechanical"
call       = "ET.fromstring(\"<unclosed>\")"
expect_exc = "ET.ParseError"
import     = "import xml.etree.ElementTree as ET"
source     = "Lib/test/test_xml_etree.py"

[[case]]
dimension  = "errors"
case       = "element_index_out_of_range_raises"
