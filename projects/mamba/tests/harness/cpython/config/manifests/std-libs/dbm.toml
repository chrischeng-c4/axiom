# Manifest for the stdlib `dbm` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/dbm/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the loose feature fixtures dumb_backend.py / whichdb.py, preserving every
# existing rule. The dumb-backend cases target `dbm.dumb` (the always-available
# pure-Python fallback) so messages and detection are deterministic.

bucket = "std-libs"
lib = "dbm"

# ===========================================================================
# SURFACE — mechanical probes
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_dbm"
subject   = "dbm"
kind      = "mechanical"
probe     = "attr"
attr      = "open"

[[case]]
dimension = "surface"
case      = "open_is_callable"
subject   = "dbm.open"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "whichdb_is_callable"
subject   = "dbm.whichdb"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "error_is_tuple"
subject   = "dbm.error"
kind      = "mechanical"
probe     = "type"
typename  = "tuple"

[[case]]
dimension = "surface"
case      = "dumb_open_is_callable"
subject   = "dbm.dumb.open"
kind      = "mechanical"
probe     = "callable"
import    = "import dbm.dumb"

# dbm.dumb.error subclasses OSError — needs an issubclass check, so it is a
# small semantic surface case rather than a plain mechanical probe.
[[case]]
dimension = "surface"
case      = "dumb_error_subclasses_oserror"
subject   = "dbm.dumb.error"
kind      = "semantic"
import    = "import dbm.dumb"
intent    = "dbm.dumb.error is the dumb-backend exception type and subclasses OSError"
source    = "Lib/test/test_dbm.py"

# ===========================================================================
# ERRORS — mechanical (single-expression call + expect_exc)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "open_missing_read_raises_error"
subject    = "dbm.open"
kind       = "mechanical"
call       = "dbm.open(\"/no/such/dir/no_such_dbm_path_xyz_qwer\", \"r\")"
expect_exc = "dbm.error"
source     = "Lib/test/test_dbm.py"

[[case]]
dimension  = "errors"
case       = "dumb_invalid_flag_raises_valueerror"
subject    = "dbm.dumb.open"
kind       = "mechanical"
import     = "import dbm.dumb"
call       = "dbm.dumb.open(\"/tmp/__mamba_dbm_unused__/db\", \"q\")"
expect_exc = "ValueError"

# ===========================================================================
# ERRORS — semantic (multi-statement: an open db / closed handle is required)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "missing_key_raises_keyerror"
subject   = "dbm.open"
kind      = "semantic"
intent    = "indexing an absent key on an open db raises KeyError"
source    = "Lib/test/test_dbm.py"

[[case]]
dimension = "errors"
case      = "write_to_readonly_raises"
subject   = "dbm.open"
kind      = "semantic"
intent    = "writing a key to a db opened in read mode ('r') raises"

[[case]]
dimension = "errors"
case      = "dumb_getitem_on_closed_raises"
subject   = "dbm.dumb"
kind      = "semantic"
import    = "import dbm.dumb"
intent    = "getitem on a closed dumb handle raises dbm.dumb.error with the fixed 'already been closed' message"

[[case]]
dimension = "errors"
case      = "dumb_setitem_on_closed_raises"
subject   = "dbm.dumb"
kind      = "semantic"
import    = "import dbm.dumb"
intent    = "setitem on a closed dumb handle raises dbm.dumb.error with the fixed 'already been closed' message"

[[case]]
dimension = "errors"
case      = "dumb_contains_on_closed_raises"
subject   = "dbm.dumb"
kind      = "semantic"
import    = "import dbm.dumb"
intent    = "membership test on a closed dumb handle raises dbm.dumb.error with the fixed 'already been closed' message"

[[case]]
dimension = "errors"
case      = "dumb_keys_on_closed_raises"
subject   = "dbm.dumb"
kind      = "semantic"
import    = "import dbm.dumb"
intent    = "keys() on a closed dumb handle raises dbm.dumb.error with the fixed 'already been closed' message"

[[case]]
dimension = "errors"
case      = "dumb_len_on_closed_raises"
subject   = "dbm.dumb"
kind      = "semantic"
import    = "import dbm.dumb"
intent    = "len() on a closed dumb handle raises dbm.dumb.error with the fixed 'already been closed' message"

[[case]]
dimension = "errors"
case      = "dumb_double_close_no_raise"
subject   = "dbm.dumb"
kind      = "semantic"
import    = "import dbm.dumb"
intent    = "closing an already-closed dumb handle a second time is a no-op and does not raise"

[[case]]
dimension = "errors"
case      = "dumb_readonly_write_raises"
subject   = "dbm.dumb"
kind      = "semantic"
import    = "import dbm.dumb"
intent    = "writing through a read-only dumb handle raises dbm.dumb.error with the fixed 'opened for reading only' message"

[[case]]
dimension = "errors"
case      = "dumb_readonly_del_raises"
subject   = "dbm.dumb"
kind      = "semantic"
import    = "import dbm.dumb"
intent    = "deleting through a read-only dumb handle raises dbm.dumb.error with the fixed 'opened for reading only' message"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "str_values_stored_as_bytes"
subject   = "dbm.open"
kind      = "semantic"
intent    = "str inputs are stored and read back as bytes; bytes keys/values round-trip unchanged"
source    = "Lib/test/test_dbm.py"

[[case]]
dimension = "behavior"
case      = "del_removes_key"
subject   = "dbm.open"
kind      = "semantic"
intent    = "del db[key] removes only that key; the remaining keys stay present"

[[case]]
dimension = "behavior"
case      = "data_persists_across_reopen"
subject   = "dbm.open"
kind      = "semantic"
intent    = "data written under mode 'c' survives close and is readable after reopen in mode 'r'"

[[case]]
dimension = "behavior"
case      = "n_flag_truncates_existing"
subject   = "dbm.open"
kind      = "semantic"
intent    = "opening an existing db with the 'n' flag truncates it to empty before new writes"

[[case]]
dimension = "behavior"
case      = "whichdb_reports_module_name"
subject   = "dbm.whichdb"
kind      = "semantic"
intent    = "whichdb returns a non-empty backend module name (str) for an existing db"
source    = "Lib/test/test_dbm.py"

[[case]]
dimension = "behavior"
case      = "whichdb_detects_dumb_backend"
subject   = "dbm.whichdb"
kind      = "semantic"
import    = "import dbm\nimport dbm.dumb"
intent    = "whichdb identifies a dumb-format db as 'dbm.dumb' for both str and bytes path spellings, even when empty"
source    = "Lib/test/test_dbm.py"

[[case]]
dimension = "behavior"
case      = "whichdb_empty_db_file_is_none"
subject   = "dbm.whichdb"
kind      = "semantic"
intent    = "whichdb returns None for a non-existent path and for a bare empty .db file (issue 17198)"
source    = "Lib/test/test_dbm.py"

[[case]]
dimension = "behavior"
case      = "keys_iteration_matches_inserts"
subject   = "dbm.open"
kind      = "semantic"
intent    = "keys() after reopen reports exactly the inserted keys (as bytes), regardless of order"
source    = "Lib/test/test_dbm.py"

[[case]]
dimension = "behavior"
case      = "len_reports_live_key_count"
subject   = "dbm.open"
kind      = "semantic"
intent    = "len(db) reflects the live key count across inserts and a delete"

[[case]]
dimension = "behavior"
case      = "setdefault_like_dict"
subject   = "dbm.open"
kind      = "semantic"
intent    = "setdefault stores and returns the default for a new key, and keeps the existing value on a second call"
source    = "Lib/test/test_dbm.py"

[[case]]
dimension = "behavior"
case      = "get_returns_none_for_missing"
subject   = "dbm.open"
kind      = "semantic"
intent    = "get returns the stored value for a present key, None for an absent key, and the supplied default otherwise"
source    = "Lib/test/test_dbm.py"

[[case]]
dimension = "behavior"
case      = "empty_bytes_value_distinct_from_absent"
subject   = "dbm.open"
kind      = "semantic"
intent    = "an empty-bytes value is stored and present, and stays distinguishable from an absent key (get -> None)"
source    = "Lib/test/test_dbm.py"

[[case]]
dimension = "behavior"
case      = "overwrite_replaces_value"
subject   = "dbm.open"
kind      = "semantic"
intent    = "overwriting a key replaces its value and keeps the db at one key (CPython bug #482460)"
source    = "Lib/test/test_dbm.py"

[[case]]
dimension = "behavior"
case      = "str_and_bytes_keys_same_entry"
subject   = "dbm.open"
kind      = "semantic"
intent    = "a str-written key is reachable via its bytes form, and keys() reports the bytes spelling"

[[case]]
dimension = "behavior"
case      = "utf8_keys_values_roundtrip"
subject   = "dbm.open"
kind      = "semantic"
intent    = "a non-ASCII (UTF-8) str key round-trips and is readable via its UTF-8-encoded bytes form"

# items() is part of the full Mapping interface that the always-available dumb
# backend provides (the ndbm backend omits it), so pin this case to dbm.dumb.
[[case]]
dimension = "behavior"
case      = "items_yields_all_pairs"
subject   = "dbm.dumb"
kind      = "semantic"
import    = "import dbm.dumb"
intent    = "items() yields every stored (key, value) pair as bytes (dumb backend)"

# ===========================================================================
# REAL_WORLD — semantic (one realistic end-user flow)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "key_value_store_session"
subject   = "dbm.open"
kind      = "semantic"
intent    = "a small persistent key-value session: open 'c', write user records, close, reopen 'r', read back, update one record, and confirm it persists"

# ===========================================================================
# SECURITY — semantic (untrusted input)
# ===========================================================================

[[case]]
dimension = "security"
case      = "untrusted_binary_keys_values_isolated"
subject   = "dbm.dumb"
kind      = "semantic"
import    = "import dbm.dumb"
intent    = "untrusted binary keys/values (NUL bytes, path-traversal-looking strings, long blobs) are stored and read back verbatim by the dumb backend with no interpretation or collision"
