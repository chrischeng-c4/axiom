# Manifest for the stdlib `compileall` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/compileall/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py
# and the loose feature files optimize_levels.py / path_options.py /
# symlink_limit.py / workers.py. CPython 3.12 is the oracle.

bucket = "std-libs"
lib = "compileall"

# ===========================================================================
# SURFACE — mechanical probes (the three public compile entrypoints + main)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_compileall"
subject   = "compileall"
kind      = "mechanical"
probe     = "attr"
attr      = "compile_dir"

[[case]]
dimension = "surface"
case      = "compile_dir_is_callable"
subject   = "compileall.compile_dir"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "compile_file_is_callable"
subject   = "compileall.compile_file"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "compile_path_is_callable"
subject   = "compileall.compile_path"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "main_is_callable"
subject   = "compileall.main"
kind      = "mechanical"
probe     = "callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc); the few paths that truly raise
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "workers_negative_raises"
subject    = "compileall.compile_dir"
kind       = "mechanical"
call       = "compileall.compile_dir(tempfile.mkdtemp(), workers=-1)"
import     = "import compileall\nimport tempfile"
expect_exc = "ValueError"
source     = "Lib/test/test_compileall.py"

[[case]]
dimension  = "errors"
case       = "ddir_with_stripdir_prependdir_raises"
subject    = "compileall.compile_dir"
kind       = "mechanical"
call       = "compileall.compile_dir(tempfile.mkdtemp(), quiet=True, ddir=\"/bar\", stripdir=\"/foo\", prependdir=\"/bar\")"
import     = "import compileall\nimport tempfile"
expect_exc = "ValueError"
source     = "Lib/test/test_compileall.py"

# ===========================================================================
# ERRORS — semantic (documented NON-raising paths; compileall returns
# True/False rather than raising on these, which is itself the contract)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "missing_file_returns_true_no_raise"
subject   = "compileall.compile_file"
kind      = "semantic"
intent    = "compile_file on a non-existent .py path does NOT raise; it reports success (True) because there is nothing to fail at"

[[case]]
dimension = "errors"
case      = "missing_dir_returns_true_no_raise"
subject   = "compileall.compile_dir"
kind      = "semantic"
intent    = "compile_dir on a non-existent directory does NOT raise; it returns True (no files means no failures)"

[[case]]
dimension = "errors"
case      = "ddir_none_no_raise"
subject   = "compileall.compile_file"
kind      = "semantic"
intent    = "compile_file with ddir=None is accepted (does not raise); it only affects the recorded source path and still returns True"

[[case]]
dimension = "errors"
case      = "optimize_minus_one_no_raise"
subject   = "compileall.compile_file"
kind      = "semantic"
intent    = "optimize=-1 means 'use the interpreter default'; compile_file accepts it without raising and returns True"

[[case]]
dimension = "errors"
case      = "syntax_error_returns_false_no_raise"
subject   = "compileall.compile_file"
kind      = "semantic"
intent    = "a .py file with a SyntaxError makes compile_file return False rather than raising; the bad source is reported, not propagated"
source    = "Lib/test/test_compileall.py"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "compile_file_creates_pyc_in_pycache"
subject   = "compileall.compile_file"
kind      = "semantic"
intent    = "compile_file on a valid .py returns True and creates a matching .pyc under __pycache__ whose name starts with the module name"
source    = "Lib/test/test_compileall.py"

[[case]]
dimension = "behavior"
case      = "compile_dir_compiles_all_py_files"
subject   = "compileall.compile_dir"
kind      = "semantic"
intent    = "compile_dir returns True and produces one .pyc under __pycache__ for every .py file in the directory"
source    = "Lib/test/test_compileall.py"

[[case]]
dimension = "behavior"
case      = "compile_dir_rx_skips_matching_files"
subject   = "compileall.compile_dir"
kind      = "semantic"
intent    = "compile_dir with rx=<compiled regex> skips files whose path matches the pattern and compiles only the rest"
source    = "Lib/test/test_compileall.py"

[[case]]
dimension = "behavior"
case      = "compile_file_legacy_writes_pyc_next_to_source"
subject   = "compileall.compile_file"
kind      = "semantic"
intent    = "compile_file with legacy=True writes the .pyc next to the .py source (legacy layout) instead of under __pycache__"

[[case]]
dimension = "behavior"
case      = "compile_path_returns_bool"
subject   = "compileall.compile_path"
kind      = "semantic"
intent    = "compile_path walks sys.path entries and returns a bool/int verdict without raising"
source    = "Lib/test/test_compileall.py"

[[case]]
dimension = "behavior"
case      = "optimize_list_builds_one_pyc_per_level"
subject   = "compileall.compile_file"
kind      = "semantic"
intent    = "optimize=[0, 2] builds one tagged .pyc per requested level in a single call (level 0 and level 2 present, level 1 absent), and the optimization tag is embedded in the filename"
source    = "Lib/test/test_compileall.py"

[[case]]
dimension = "behavior"
case      = "maxlevels_bounds_recursion_depth"
subject   = "compileall.compile_dir"
kind      = "semantic"
intent    = "maxlevels bounds compile_dir recursion: a depth-3 source is left uncompiled at maxlevels=2 but compiled at maxlevels=3"
source    = "Lib/test/test_compileall.py"

[[case]]
dimension = "behavior"
case      = "pathlib_path_inputs_accepted"
subject   = "compileall.compile_dir"
kind      = "semantic"
intent    = "pathlib.Path arguments are accepted everywhere a str path is: compile_dir(Path(d), prependdir=Path(...)) and compile_file(Path(src), stripdir=Path(...)) both succeed and create the cache file"
source    = "Lib/test/test_compileall.py"

[[case]]
dimension = "behavior"
case      = "non_py_file_skipped_no_pycache"
subject   = "compileall.compile_file"
kind      = "semantic"
intent    = "compile_file on a non-.py file is a no-op: it never creates a __pycache__ directory"
source    = "Lib/test/test_compileall.py"

[[case]]
dimension = "behavior"
case      = "workers_one_compiles_serially"
subject   = "compileall.compile_dir"
kind      = "semantic"
intent    = "compile_dir with workers=1 compiles every file in-process (serial, no process pool) and produces one .pyc per source"
source    = "Lib/test/test_compileall.py"

# ===========================================================================
# SECURITY — semantic (adversarial / untrusted source handling)
# ===========================================================================

[[case]]
dimension = "security"
case      = "non_ascii_error_report_survives_ascii_stream"
subject   = "compileall.compile_dir"
kind      = "semantic"
intent    = "a source file with a non-ASCII byte literal triggers a SyntaxError whose report is written through an ASCII-only stdout stream; compile_dir returns False and the report names the SyntaxError with NO UnicodeEncodeError leaking through"
source    = "Lib/test/test_compileall.py"

# ===========================================================================
# REAL_WORLD — semantic (realistic end-user build/packaging scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "symlink_limit_filters_by_dest_tree"
subject   = "compileall.compile_dir"
kind      = "semantic"
intent    = "a build that compiles a directory of symlinks with limit_sl_dest=<allowed tree>: symlinks resolving inside the allowed tree are compiled, symlinks resolving elsewhere are skipped"
source    = "Lib/test/test_compileall.py"
