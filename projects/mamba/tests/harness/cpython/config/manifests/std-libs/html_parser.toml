[[case]]
dimension = "errors"
case      = "subclass_handler_exception_propagates"
subject   = "html.parser.HTMLParser"
kind      = "semantic"
import    = "from html.parser import HTMLParser"
intent    = "an exception raised inside a subclass handle_starttag override propagates out of feed() (ValueError on a <script> tag)"

[[case]]
dimension = "errors"
case      = "malformed_input_does_not_raise"
subject   = "html.parser.HTMLParser"
kind      = "semantic"
import    = "from html.parser import HTMLParser"
intent    = "the default parser is forgiving: feeding an unclosed tag (<html><body><unclosed_tag>text) records what it can and does NOT raise"

[[case]]
dimension = "errors"
case      = "get_starttag_text_none_when_no_tag"
subject   = "html.parser.HTMLParser"
kind      = "semantic"
import    = "from html.parser import HTMLParser"
intent    = "get_starttag_text() returns None on a fresh parser with no current start tag"

[[case]]
dimension = "errors"
case      = "convert_charrefs_false_bad_entity_no_raise"
subject   = "html.parser.HTMLParser"
kind      = "semantic"
import    = "from html.parser import HTMLParser"
intent    = "with convert_charrefs=False, feeding a non-entity (&not_an_entity;) does not raise"

