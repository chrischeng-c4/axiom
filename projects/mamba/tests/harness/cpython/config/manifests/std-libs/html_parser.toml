# Manifest for the stdlib `html.parser` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/html_parser/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the retired monoliths (surface.py / behavior.py / errors.py)
# and the loose feature files (attributes.py / declarations.py / tolerant.py /
# html_parser_basic.py). CPython 3.12 is the oracle.
#
# Import note: `html.parser.HTMLParser` is a CapWords class under a dotted
# submodule. The import inferer stops at the first CapWords component and would
# pick `html.parser`, but mamba's `import html.parser` binding does not always
# surface attributes through the dotted path. Cases therefore set an explicit
# `import` line (`from html.parser import HTMLParser` / `from html import
# parser`) so the body round-trips on both runtimes.

bucket = "std-libs"
lib = "html_parser"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "htmlparser_is_callable"
subject   = "html.parser.HTMLParser"
kind      = "mechanical"
probe     = "callable"
import    = "import html.parser"

[[case]]
dimension = "surface"
case      = "module_has_htmlparser"
subject   = "html.parser"
kind      = "mechanical"
probe     = "attr"
attr      = "HTMLParser"
import    = "import html.parser"

[[case]]
dimension = "surface"
case      = "html_has_parser_submodule"
subject   = "html"
kind      = "mechanical"
probe     = "attr"
attr      = "parser"
import    = "import html.parser"

[[case]]
dimension = "surface"
case      = "html_escape_is_callable"
subject   = "html.escape"
kind      = "mechanical"
probe     = "callable"
import    = "import html"

[[case]]
dimension = "surface"
case      = "html_unescape_is_callable"
subject   = "html.unescape"
kind      = "mechanical"
probe     = "callable"
import    = "import html"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "feed_int_raises_typeerror"
subject    = "html.parser.HTMLParser"
kind       = "mechanical"
import     = "from html.parser import HTMLParser"
call       = "HTMLParser().feed(123)"
expect_exc = "TypeError"

