# Manifest for the stdlib `stat` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/stat/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the legacy behavior oracle file. All prior coverage is preserved;
# representative-input rules stay one cohesive table per file.
#
# Oracle: Lib/test/test_stat.py (CPython 3.12).

bucket = "std-libs"
lib    = "stat"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_stat"
subject   = "stat"
kind      = "mechanical"
probe     = "attr"
attr      = "S_ISDIR"

[[case]]
dimension = "surface"
case      = "s_isdir_is_callable"
subject   = "stat.S_ISDIR"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "s_isreg_is_callable"
subject   = "stat.S_ISREG"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "s_islnk_is_callable"
subject   = "stat.S_ISLNK"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "s_isfifo_is_callable"
subject   = "stat.S_ISFIFO"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "s_ischr_is_callable"
subject   = "stat.S_ISCHR"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "s_isblk_is_callable"
subject   = "stat.S_ISBLK"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "s_issock_is_callable"
subject   = "stat.S_ISSOCK"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "s_imode_is_callable"
