# ===========================================================================
# ERRORS — mechanical (call + expect_exc)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "s_isdir_non_int_raises"
subject    = "stat.S_ISDIR"
kind       = "mechanical"
call       = "stat.S_ISDIR(\"not_int\")"
expect_exc = "TypeError"
source     = "Lib/test/test_stat.py"

[[case]]
dimension  = "errors"
case       = "s_imode_non_int_raises"
subject    = "stat.S_IMODE"
kind       = "mechanical"
call       = "stat.S_IMODE(\"not_int\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "s_ifmt_non_int_raises"
subject    = "stat.S_IFMT"
kind       = "mechanical"
call       = "stat.S_IFMT(None)"
expect_exc = "TypeError"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "s_is_predicates_match_file_type"
subject   = "stat.S_ISDIR"
kind      = "semantic"
intent    = "each S_IS* predicate returns True only for its own file-type mode and False for a regular-file mode: S_ISDIR(0o040755), S_ISREG(0o100644), S_ISLNK(0o120755), S_ISFIFO(0o010000), S_ISCHR(0o020000), S_ISBLK(0o060000), S_ISSOCK(0o140000)"
source    = "Lib/test/test_stat.py"

[[case]]
dimension = "behavior"
case      = "s_imode_strips_file_type_bits"
subject   = "stat.S_IMODE"
kind      = "semantic"
intent    = "S_IMODE strips the file-type bits and keeps only the permission bits: S_IMODE(0o100755) == 0o755"

[[case]]
dimension = "behavior"
case      = "s_ifmt_extracts_file_type_bits"
subject   = "stat.S_IFMT"
kind      = "semantic"
intent    = "S_IFMT extracts only the file-type bits: S_IFMT(0o100644) == S_IFREG == 0o100000 and S_IFMT(0o040755) == S_IFDIR"
source    = "Lib/test/test_stat.py"

[[case]]
dimension = "behavior"
case      = "filemode_renders_ls_long_style"
subject   = "stat.filemode"
kind      = "semantic"
intent    = "filemode renders an ls -l style string: filemode(0o100644) == '-rw-r--r--' and filemode(0o040755) == 'drwxr-xr-x'"
source    = "Lib/test/test_stat.py"

[[case]]
dimension = "behavior"
case      = "filemode_zero_mode_is_forgiving"
subject   = "stat.filemode"
kind      = "semantic"
intent    = "filemode(0) is forgiving: it returns a 10-char string '?---------' rather than raising"

[[case]]
dimension = "behavior"
case      = "file_type_constants_are_octal_ints"
subject   = "stat.S_IFREG"
kind      = "semantic"
intent    = "file-type constants are ints with the documented octal values: S_IFREG==0o100000, S_IFDIR==0o040000, S_IFLNK==0o120000"
source    = "Lib/test/test_stat.py"

[[case]]
dimension = "behavior"
case      = "permission_constants_are_octal_ints"
subject   = "stat.S_IRUSR"
kind      = "semantic"
intent    = "permission constants are ints with the documented octal values: S_IRUSR==0o400, S_IWGRP==0o020, S_IXOTH==0o001, S_IRWXU==0o700, S_ISUID==0o4000"
source    = "Lib/test/test_stat.py"

[[case]]
dimension = "behavior"
case      = "st_field_indices"
subject   = "stat.ST_MODE"
kind      = "semantic"
intent    = "stat-result field index constants carry the documented positions: ST_MODE==0, ST_SIZE==6, ST_MTIME==8"
source    = "Lib/test/test_stat.py"

# ===========================================================================
# REAL_WORLD — semantic end-user scenario
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "classify_real_file_from_os_stat"
subject   = "stat.S_ISREG"
kind      = "semantic"
intent    = "the canonical end-user flow: create a real temp file, call os.stat, and feed st_mode through S_ISREG / S_ISDIR / S_IMODE / filemode to classify it as a regular file"
source    = "Lib/test/test_stat.py"
