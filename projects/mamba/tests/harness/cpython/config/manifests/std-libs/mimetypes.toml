# Manifest for the stdlib `mimetypes` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/mimetypes/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + paired-.expected golden shape
# (surface.py, behavior.py, errors.py, plus loose feature fixtures
# mimetypes_ops.py/.expected, pathlike.py, strict_mode.py). bench/
# (guess_type_bulk) and real_world/_stub.py are left as-is.
#
# mimetypes is forgiving: unknown extensions return (None, None) and
# add_type(non-str, ...) does NOT raise under CPython 3.12, so those
# "no-raise" paths are semantic behavior cases, not mechanical errors.
# Only guess_type(non-str) and MimeTypes().read(missing) actually raise.

bucket = "std-libs"
lib = "mimetypes"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_mimetypes"
subject   = "mimetypes"
kind      = "mechanical"
probe     = "attr"
attr      = "guess_type"

[[case]]
dimension = "surface"
case      = "guess_type_is_callable"
subject   = "mimetypes.guess_type"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "guess_extension_is_callable"
subject   = "mimetypes.guess_extension"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "guess_all_extensions_is_callable"
subject   = "mimetypes.guess_all_extensions"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "add_type_is_callable"
subject   = "mimetypes.add_type"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "init_is_callable"
subject   = "mimetypes.init"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "read_mime_types_is_callable"
subject   = "mimetypes.read_mime_types"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "mimetypes_class_is_callable"
subject   = "mimetypes.MimeTypes"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "types_map_is_dict"
subject   = "mimetypes.types_map"
kind      = "mechanical"
probe     = "type"
typename  = "dict"

[[case]]
dimension = "surface"
case      = "suffix_map_is_dict"
subject   = "mimetypes.suffix_map"
kind      = "mechanical"
probe     = "type"
typename  = "dict"

[[case]]
dimension = "surface"
case      = "encodings_map_is_dict"
subject   = "mimetypes.encodings_map"
kind      = "mechanical"
probe     = "type"
typename  = "dict"

[[case]]
dimension = "surface"
case      = "common_types_is_dict"
subject   = "mimetypes.common_types"
kind      = "mechanical"
probe     = "type"
typename  = "dict"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc, assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "guess_type_non_str_raises"
subject    = "mimetypes.guess_type"
kind       = "mechanical"
call       = "mimetypes.guess_type(123)"
expect_exc = "TypeError"
source     = "Lib/test/test_mimetypes.py"

[[case]]
dimension  = "errors"
case       = "read_missing_file_raises"
subject    = "mimetypes.MimeTypes"
kind       = "mechanical"
import     = "import mimetypes"
call       = "mimetypes.MimeTypes().read('/no/such/mime.types')"
expect_exc = "FileNotFoundError"

# ===========================================================================
# ERRORS — semantic (forgiving "no-raise" paths CPython does NOT reject)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "unknown_extension_returns_none_none"
subject   = "mimetypes.guess_type"
kind      = "semantic"
intent    = "an unregistered extension is not an error: guess_type returns (None, None) rather than raising"

[[case]]
dimension = "errors"
case      = "add_type_non_str_no_raise"
subject   = "mimetypes.add_type"
kind      = "semantic"
intent    = "add_type(non-str, ext) does NOT raise under CPython 3.12 (the mapping is forgiving); it silently registers a non-string type"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

# --- guess_type: default IANA table -------------------------------------

[[case]]
dimension = "behavior"
case      = "guess_type_common_types"
subject   = "mimetypes.guess_type"
kind      = "semantic"
intent    = "common filenames map to their IANA type with no encoding: .html/.css/.js/.png/.jpg/.json/.pdf"
source    = "Lib/test/test_mimetypes.py"

[[case]]
dimension = "behavior"
case      = "guess_type_encoding_layer"
subject   = "mimetypes.guess_type"
kind      = "semantic"
intent    = "a compression suffix yields the encoding: file.gz -> (None, 'gzip') and archive.tar.gz -> ('application/x-tar', 'gzip')"
source    = "Lib/test/test_mimetypes.py"

[[case]]
dimension = "behavior"
case      = "guess_type_suffix_map_tgz"
subject   = "mimetypes.guess_type"
kind      = "semantic"
intent    = "suffix_map collapses .tgz/.svgz: backup.tgz and archive.svgz resolve through the suffix table to (type, encoding)"
source    = "Lib/test/test_mimetypes.py"

[[case]]
dimension = "behavior"
case      = "guess_type_case_insensitive"
subject   = "mimetypes.guess_type"
kind      = "semantic"
intent    = "extension matching is case-insensitive: FILE.HTML and file.html both map to text/html"
source    = "Lib/test/test_mimetypes.py"

[[case]]
dimension = "behavior"
case      = "guess_type_url_only_extension"
subject   = "mimetypes.guess_type"
kind      = "semantic"
intent    = "URL-style inputs are matched by trailing extension only: http://example.com/path/file.json?q=1 -> application/json"
source    = "Lib/test/test_mimetypes.py"

[[case]]
dimension = "behavior"
case      = "guess_type_pathlike_object"
subject   = "mimetypes.MimeTypes"
kind      = "semantic"
import    = "import mimetypes"
intent    = "guess_type accepts any os.PathLike (__fspath__) and only the final extension matters: a FakePath('LICENSE.txt') guesses identically to the string, and a directory-only path returns (None, None)"
source    = "Lib/test/test_mimetypes.py"

# --- guess_extension / guess_all_extensions ------------------------------

[[case]]
dimension = "behavior"
case      = "guess_extension_dotted_string"
subject   = "mimetypes.guess_extension"
kind      = "semantic"
intent    = "guess_extension returns a single dotted extension string for a known type (image/png)"
source    = "Lib/test/test_mimetypes.py"

[[case]]
dimension = "behavior"
case      = "guess_all_extensions_list"
subject   = "mimetypes.guess_all_extensions"
kind      = "semantic"
intent    = "guess_all_extensions returns the full list of registered extensions for a type: text/html yields .html and .htm"
source    = "Lib/test/test_mimetypes.py"

[[case]]
dimension = "behavior"
case      = "types_map_values_roundtrip"
subject   = "mimetypes.guess_extension"
kind      = "semantic"
intent    = "every value in the default types_map round-trips: each registered MIME type has at least one guess_extension result"
source    = "Lib/test/test_mimetypes.py"

# --- add_type / init mutation ---------------------------------------------

[[case]]
dimension = "behavior"
case      = "add_type_persists"
subject   = "mimetypes.add_type"
kind      = "semantic"
intent    = "add_type registers a type so later guess_type calls see it: add_type('application/x-behavior-test', '.btest') then guess_type('document.btest') returns it"
source    = "Lib/test/test_mimetypes.py"

[[case]]
dimension = "behavior"
case      = "init_resets_registry"
subject   = "mimetypes.init"
kind      = "semantic"
intent    = "init() rebuilds the global registry from defaults, discarding add_type edits: a registered foo/bar disappears after init()"
source    = "Lib/test/test_mimetypes.py"

[[case]]
dimension = "behavior"
case      = "init_fresh_dict_identity"
subject   = "mimetypes.init"
kind      = "semantic"
intent    = "re-running init() yields fresh dict objects (new identity) with equal content for types_map/suffix_map/encodings_map/common_types"

# --- strict vs non-strict -------------------------------------------------

[[case]]
dimension = "behavior"
case      = "strict_hides_common_types"
subject   = "mimetypes.MimeTypes"
kind      = "semantic"
import    = "import mimetypes"
intent    = "the non-standard image/jpg alias is hidden under strict (default) but visible under strict=False for both guess_extension and guess_all_extensions"
source    = "Lib/test/test_mimetypes.py"

[[case]]
dimension = "behavior"
case      = "add_type_strict_flag_routes_table"
subject   = "mimetypes.MimeTypes"
kind      = "semantic"
import    = "import mimetypes"
intent    = "add_type(strict=) routes to the strict vs common table: default add_type lands in the strict table, strict=False in the loose one, and guess_all_extensions(strict=False) sees both"
source    = "Lib/test/test_mimetypes.py"

[[case]]
dimension = "behavior"
case      = "guess_all_extensions_returns_copy"
subject   = "mimetypes.MimeTypes"
kind      = "semantic"
import    = "import mimetypes"
intent    = "guess_all_extensions returns a fresh list copy: mutating the result cannot corrupt the internal table"
source    = "Lib/test/test_mimetypes.py"

[[case]]
dimension = "behavior"
case      = "keyword_argument_names"
subject   = "mimetypes.MimeTypes"
kind      = "semantic"
import    = "import mimetypes"
intent    = "the public keyword-argument names url=/type=/strict= are part of the API: guess_type(url=, strict=), guess_extension(type=, strict=), guess_all_extensions(type=, strict=)"
source    = "Lib/test/test_mimetypes.py"

# --- read_mime_types ------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "read_mime_types_parses_table"
subject   = "mimetypes.read_mime_types"
kind      = "semantic"
intent    = "read_mime_types parses a 'type ext ext' rules file into a {'.ext': 'type'} dict, mapping each extension to its type and skipping '# comment' lines"
source    = "Lib/test/test_mimetypes.py"

# ===========================================================================
# REAL_WORLD — semantic end-user scenario
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "http_download_filename_dispatch"
subject   = "mimetypes.guess_type"
kind      = "semantic"
intent    = "an HTTP-server-style flow classifies a batch of requested filenames via guess_type to pick a Content-Type header, falling back to application/octet-stream for unknown extensions"
