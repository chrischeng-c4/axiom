# ===========================================================================
# ERRORS — mechanical (call + expect_exc -> assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "sqrt_str_raises_typeerror"
subject    = "cmath.sqrt"
kind       = "mechanical"
call       = "cmath.sqrt(\"hello\")"
expect_exc = "TypeError"
source     = "Lib/test/test_cmath.py"

[[case]]
dimension  = "errors"
case       = "log_zero_raises_valueerror"
subject    = "cmath.log"
kind       = "mechanical"
call       = "cmath.log(0)"
expect_exc = "ValueError"
source     = "Lib/test/test_cmath.py"

[[case]]
dimension  = "errors"
case       = "exp_huge_raises_overflowerror"
subject    = "cmath.exp"
kind       = "mechanical"
call       = "cmath.exp(1e9)"
expect_exc = "OverflowError"
source     = "Lib/test/test_cmath.py"

[[case]]
dimension  = "errors"
case       = "isclose_negative_rel_tol_raises_valueerror"
subject    = "cmath.isclose"
kind       = "mechanical"
call       = "cmath.isclose(1.0, 1.0, rel_tol=-1.0)"
expect_exc = "ValueError"
source     = "Lib/test/test_cmath.py"

[[case]]
dimension  = "errors"
case       = "abs_overflow_raises_overflowerror"
subject    = "abs"
kind       = "mechanical"
call       = "abs(complex(1.4e308, 1.4e308))"
expect_exc = "OverflowError"
import     = "import cmath  # noqa: F401"
source     = "Lib/test/test_cmath.py"

[[case]]
dimension  = "errors"
case       = "isclose_complex_rel_tol_raises_typeerror"
subject    = "cmath.isclose"
kind       = "mechanical"
call       = "cmath.isclose(1j, 1j, rel_tol=1j)"
expect_exc = "TypeError"
source     = "Lib/test/test_cmath.py"

[[case]]
dimension  = "errors"
case       = "isclose_complex_abs_tol_raises_typeerror"
subject    = "cmath.isclose"
kind       = "mechanical"
call       = "cmath.isclose(1j, 1j, abs_tol=1j)"
expect_exc = "TypeError"
source     = "Lib/test/test_cmath.py"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

# --- sqrt -----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "sqrt_neg_one_is_imaginary_unit"
subject   = "cmath.sqrt"
kind      = "semantic"
intent    = "sqrt(-1) is the imaginary unit 1j: real part ~ 0, imag part ~ 1"

[[case]]
dimension = "behavior"
case      = "sqrt_neg_four_is_two_j"
subject   = "cmath.sqrt"
kind      = "semantic"
intent    = "sqrt(-4) == 2j on the principal branch"

[[case]]
dimension = "behavior"
case      = "sqrt_positive_real_result"
subject   = "cmath.sqrt"
kind      = "semantic"
intent    = "sqrt(4) returns a complex equal to 2 (zero imaginary part)"

# --- exp / log ------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "exp_euler_identity"
subject   = "cmath.exp"
kind      = "semantic"
intent    = "Euler's identity: exp(j*pi) + 1 has magnitude ~ 0"

[[case]]
dimension = "behavior"
case      = "log_inverts_exp"
subject   = "cmath.log"
kind      = "semantic"
intent    = "log is the inverse of exp: log(exp(1+1j)) == 1+1j to tolerance"

[[case]]
dimension = "behavior"
case      = "log_one_is_zero"
subject   = "cmath.log"
kind      = "semantic"
intent    = "log(1) == 0 (zero magnitude)"

[[case]]
dimension = "behavior"
case      = "log_neg_one_is_pi_j"
subject   = "cmath.log"
kind      = "semantic"
intent    = "log(-1) == pi*j on the principal branch"

# --- polar / rect / phase -------------------------------------------------

[[case]]
dimension = "behavior"
case      = "polar_rect_round_trip"
subject   = "cmath.polar"
kind      = "semantic"
intent    = "polar and rect are inverse operations across a table of representative complex points"

[[case]]
dimension = "behavior"
case      = "phase_round_trip_in_principal_range"
subject   = "cmath.phase"
kind      = "semantic"
intent    = "phase of rect(1, theta) recovers theta (mapped into the principal range (-pi, pi]) across a table of angles"

# --- trig identities ------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "sin_cos_pythagorean_identity"
subject   = "cmath.sin"
kind      = "semantic"
intent    = "the Pythagorean identity sin(z)**2 + cos(z)**2 == 1 holds for a complex argument"

# --- complex arithmetic ---------------------------------------------------

[[case]]
dimension = "behavior"
case      = "complex_multiply_algebraic"
subject   = "cmath"
kind      = "semantic"
intent    = "complex multiplication follows the algebraic rule: (1+2j)*(3+4j) == -5+10j"

# --- isclose --------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "isclose_rel_tol_near"
subject   = "cmath.isclose"
kind      = "semantic"
intent    = "isclose with rel_tol accepts two nearly-equal complex values"

[[case]]
dimension = "behavior"
case      = "isclose_abs_tol_near_and_far"
subject   = "cmath.isclose"
kind      = "semantic"
intent    = "isclose with abs_tol: nearby values are close, far-apart values are not"

# --- isinf / isnan / isfinite ---------------------------------------------

[[case]]
dimension = "behavior"
case      = "isinf_detects_infinite_component"
subject   = "cmath.isinf"
kind      = "semantic"
intent    = "isinf is True when either the real or imaginary component is infinite, and accepts plain int/float too"

[[case]]
dimension = "behavior"
case      = "isnan_detects_nan_component"
subject   = "cmath.isnan"
kind      = "semantic"
intent    = "isnan is True when a component is NaN and False for finite int/complex; accepts float('nan')"

[[case]]
dimension = "behavior"
case      = "isfinite_only_for_finite"
subject   = "cmath.isfinite"
kind      = "semantic"
intent    = "isfinite is True for a finite complex and False once a component is infinite"

# --- module constants -----------------------------------------------------

[[case]]
dimension = "behavior"
case      = "pi_e_match_math"
subject   = "cmath.pi"
kind      = "semantic"
intent    = "cmath.pi and cmath.e agree with the math module values to float tolerance"

[[case]]
dimension = "behavior"
case      = "inf_lives_on_real_axis"
subject   = "cmath.inf"
kind      = "semantic"
intent    = "cmath.inf has +inf real part and 0 imaginary part; infj is the imaginary-axis mirror"

[[case]]
dimension = "behavior"
case      = "nan_carries_one_nan_component"
subject   = "cmath.nan"
kind      = "semantic"
intent    = "cmath.nan carries NaN in the real component and a clean +0 imaginary; nanj is the imaginary-axis mirror"

[[case]]
dimension = "behavior"
case      = "nan_constants_positive_sign_bits"
subject   = "cmath.nan"
kind      = "semantic"
intent    = "every component of the cmath.nan / cmath.nanj constants has a positive sign bit (copysign(1, c) == 1)"

[[case]]
dimension = "behavior"
case      = "special_constant_reprs"
subject   = "cmath.inf"
kind      = "semantic"
intent    = "repr of the special constants uses the compact spellings 'inf', 'infj', 'nan', 'nanj'"

# --- IEEE special-value corners: abs() ------------------------------------

[[case]]
dimension = "behavior"
case      = "abs_zero_is_zero"
subject   = "abs"
kind      = "semantic"
intent    = "abs() of complex zero (and signed zero) is 0.0"
import    = "import cmath  # noqa: F401"

[[case]]
dimension = "behavior"
case      = "abs_infinite_component_is_inf"
subject   = "abs"
kind      = "semantic"
intent    = "abs() of any complex with an infinite component is +inf, and an infinite component beats a NaN component"
import    = "import math"

[[case]]
dimension = "behavior"
case      = "abs_nan_without_inf_is_nan"
subject   = "abs"
kind      = "semantic"
intent    = "abs() is NaN when a component is NaN and no component is infinite"
import    = "import math"

# --- IEEE special-value corners: phase() ----------------------------------

[[case]]
dimension = "behavior"
case      = "phase_signed_zero_real_axis"
subject   = "cmath.phase"
kind      = "semantic"
intent    = "phase() on the real axis respects signed zero: phase(+0+0j)=0, (+0-0j)=-0, (-0+0j)=pi, (-0-0j)=-pi"

[[case]]
dimension = "behavior"
case      = "phase_at_infinity_compass_angles"
subject   = "cmath.phase"
kind      = "semantic"
intent    = "phase() of directions at infinity collapses to the compass angles (pi/4, 3pi/4, etc.); a finite component is dwarfed by an infinite one"

[[case]]
dimension = "behavior"
case      = "phase_nan_component_is_nan"
subject   = "cmath.phase"
kind      = "semantic"
intent    = "phase() is NaN when any component is NaN"

# ===========================================================================
# REAL_WORLD — semantic end-user scenario
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "ac_circuit_impedance"
subject   = "cmath"
kind      = "semantic"
intent    = "model an AC series RLC circuit: build complex impedance Z = R + j(wL - 1/(wC)), recover its magnitude and phase with abs()/cmath.phase(), and confirm polar/rect round-trips Z"
