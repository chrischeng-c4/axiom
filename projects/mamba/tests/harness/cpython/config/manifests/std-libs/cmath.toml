# Manifest for the stdlib `cmath` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/cmath/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the loose feature files constants.py / special_values.py. bench/ kept as-is.
# CPython 3.12 is the oracle (Lib/test/test_cmath.py).

bucket = "std-libs"
lib = "cmath"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr existence)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_cmath"
subject   = "cmath"
kind      = "mechanical"
probe     = "attr"
attr      = "sqrt"

[[case]]
dimension = "surface"
case      = "sqrt_is_callable"
subject   = "cmath.sqrt"
kind      = "mechanical"
probe     = "callable"

