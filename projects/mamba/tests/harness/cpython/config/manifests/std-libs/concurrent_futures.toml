# ===========================================================================
# ERRORS — mechanical (call + expect_exc; the generator wraps in
# try/except and asserts-it-raised, so each is self-asserting)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "submit_after_shutdown_raises"
subject    = "concurrent.futures.Executor.submit"
kind       = "mechanical"
import     = "from concurrent.futures import ThreadPoolExecutor\n_ex = ThreadPoolExecutor(max_workers=1)\n_ex.shutdown(wait=True)"
call       = "_ex.submit(lambda: 1)"
expect_exc = "RuntimeError"

[[case]]
dimension  = "errors"
case       = "set_result_twice_raises"
subject    = "concurrent.futures.Future.set_result"
kind       = "mechanical"
import     = "from concurrent.futures import Future, InvalidStateError\n_f = Future()\n_f.set_result(1)"
call       = "_f.set_result(2)"
expect_exc = "InvalidStateError"

[[case]]
dimension  = "errors"
case       = "result_after_set_exception_raises"
subject    = "concurrent.futures.Future.result"
kind       = "mechanical"
import     = "from concurrent.futures import Future\n_f = Future()\n_f.set_exception(ValueError('inner'))"
call       = "_f.result()"
expect_exc = "ValueError"

# ===========================================================================
# ERRORS — semantic (cases beyond the plain call/expect_exc template:
# timeout on a still-running future, and no-raise / value-echo paths)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "result_timeout_on_pending_raises"
subject   = "concurrent.futures.Future.result"
kind      = "semantic"
intent    = "Future.result(timeout) on a future whose task is still running raises concurrent.futures.TimeoutError before the task finishes"
module    = "concurrent.futures"

[[case]]
dimension = "errors"
case      = "cancel_after_done_returns_false"
subject   = "concurrent.futures.Future.cancel"
kind      = "semantic"
intent    = "calling Future.cancel() after a result has been set returns False and does NOT raise (the completed future is uncancellable)"
module    = "concurrent.futures"

[[case]]
dimension = "errors"
case      = "cancelled_error_is_exception"
subject   = "concurrent.futures.CancelledError"
kind      = "semantic"
intent    = "concurrent.futures.CancelledError is a subclass of BaseException (and of Exception in 3.12)"
module    = "concurrent.futures"

[[case]]
dimension = "errors"
case      = "broken_executor_is_runtimeerror"
subject   = "concurrent.futures.BrokenExecutor"
kind      = "semantic"
intent    = "concurrent.futures.BrokenExecutor is a subclass of RuntimeError"
module    = "concurrent.futures"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file; from behavior.py and the
# behavioral half of the legacy surface.py)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "submit_returns_future_with_result"
subject   = "concurrent.futures.ThreadPoolExecutor.submit"
kind      = "semantic"
intent    = "ThreadPoolExecutor.submit returns a concurrent.futures.Future whose .result() yields the task's return value (submit(lambda: 42).result() == 42)"
module    = "concurrent.futures"

[[case]]
dimension = "behavior"
case      = "future_state_done_not_cancelled"
subject   = "concurrent.futures.Future.done"
kind      = "semantic"
intent    = "after .result() returns, a successful future reports done() True and cancelled() False"
module    = "concurrent.futures"

[[case]]
dimension = "behavior"
case      = "exception_none_for_success"
subject   = "concurrent.futures.Future.exception"
kind      = "semantic"
intent    = "Future.exception() returns None for a future that completed successfully"
module    = "concurrent.futures"

[[case]]
dimension = "behavior"
case      = "exception_captures_task_error"
subject   = "concurrent.futures.Future.exception"
kind      = "semantic"
intent    = "Future.exception() returns the exception object raised inside the task (a ValueError with its original message) rather than re-raising it"
module    = "concurrent.futures"

[[case]]
dimension = "behavior"
case      = "map_applies_over_iterable"
subject   = "concurrent.futures.Executor.map"
kind      = "semantic"
intent    = "Executor.map applies the function to each element and yields results in input order: map(x*2, [1,2,3,4]) -> [2,4,6,8]"
module    = "concurrent.futures"

[[case]]
dimension = "behavior"
case      = "as_completed_yields_all_futures"
subject   = "concurrent.futures.as_completed"
kind      = "semantic"
intent    = "as_completed yields every submitted future exactly once as it finishes; collecting results over range(5) squares gives the full set {0,1,4,9,16}"
module    = "concurrent.futures"

[[case]]
dimension = "behavior"
case      = "thread_pool_runs_all_tasks"
subject   = "concurrent.futures.ThreadPoolExecutor.submit"
kind      = "semantic"
intent    = "every submitted task runs to completion under a 4-worker pool: submitting i->i*i for range(10) records all ten inputs and returns all ten squares"
module    = "concurrent.futures"

[[case]]
dimension = "behavior"
case      = "result_reraises_task_exception"
subject   = "concurrent.futures.Future.result"
kind      = "semantic"
intent    = "an exception raised inside a task is re-raised (same type and message) when the future's .result() is called"
module    = "concurrent.futures"

[[case]]
dimension = "behavior"
case      = "wait_partitions_done_not_done"
subject   = "concurrent.futures.wait"
kind      = "semantic"
intent    = "wait(..., return_when=ALL_COMPLETED) returns a (done, not_done) pair; with all five futures finished done has 5 and not_done is empty"
module    = "concurrent.futures"

[[case]]
dimension = "behavior"
case      = "map_propagates_task_exception"
subject   = "concurrent.futures.Executor.map"
kind      = "semantic"
intent    = "if any mapped task raises, iterating the Executor.map result propagates that exception (ValueError) to the consumer"
module    = "concurrent.futures"

[[case]]
dimension = "behavior"
case      = "add_done_callback_fires"
subject   = "concurrent.futures.Future.add_done_callback"
kind      = "semantic"
intent    = "a callback registered with Future.add_done_callback is invoked once the future completes and observes the future's result"
module    = "concurrent.futures"

[[case]]
dimension = "behavior"
case      = "context_manager_completes_futures"
subject   = "concurrent.futures.ThreadPoolExecutor.__exit__"
kind      = "semantic"
intent    = "using the executor as a context manager blocks on __exit__ until all in-flight futures are done(), so every future reports done() True after the with-block"
module    = "concurrent.futures"

[[case]]
dimension = "behavior"
case      = "nested_submit_resolves"
subject   = "concurrent.futures.ThreadPoolExecutor.submit"
kind      = "semantic"
intent    = "a task may submit further tasks to the same pool and await their results; outer tasks i for range(3) returning inner i*10 give {0,10,20}"
module    = "concurrent.futures"

[[case]]
dimension = "behavior"
case      = "max_workers_caps_concurrency"
subject   = "concurrent.futures.ThreadPoolExecutor"
kind      = "semantic"
intent    = "max_workers=2 caps simultaneously-running tasks at 2; a concurrency tracker across six tasks never observes more than two active at once"
module    = "concurrent.futures"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "parallel_map_reduce_pipeline"
subject   = "concurrent.futures.ThreadPoolExecutor"
kind      = "semantic"
intent    = "a downstream batch job fans a CPU-light transform over a work list with ThreadPoolExecutor (submit + as_completed + map), aggregates the per-item results into a deterministic reduced total, and shows the pool drains cleanly on context exit"
module    = "concurrent.futures"
