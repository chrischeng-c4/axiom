# Manifest for the stdlib `concurrent.futures` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/concurrent_futures/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py.
# `lib` is the underscore form `concurrent_futures`; the importable module is
# the dotted `concurrent.futures`, so every case sets an explicit `module` /
# `import` (the bare subject would otherwise infer `concurrent`). bench/ is
# left as-is.

bucket = "std-libs"
lib    = "concurrent_futures"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "thread_pool_executor_is_callable"
subject   = "concurrent.futures.ThreadPoolExecutor"
kind      = "mechanical"
probe     = "callable"
module    = "concurrent.futures"

