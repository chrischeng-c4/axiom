# Manifest for the stdlib `http.server` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/http_server/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the real_world placeholder. The lib's dotted submodule is `http.server`, so
# class/exception/handler subjects set an explicit `module = "http.server"`
# (the import inferer stops at the first CapWords component and cannot recover
# the dotted package).
#
# Determinism rule (REAL-WORLD-CONVENTION.md): NO live server, NO sockets, NO
# threads, NO loopback requests, NO wall-clock comparisons. The legacy monoliths
# spun up real HTTPServer instances with worker threads and made urllib requests
# over 127.0.0.1 — non-deterministic and prohibited. Every behavior/real_world/
# security case here drives the same handler machinery network-free via
# BytesIO-backed rfile/wfile (parse_request / send_response / send_header /
# end_headers / send_error), exactly the way the sibling http_client corpus
# rebuilt its coverage without a live connection. The original observable
# contracts (200/404 responses, custom headers, request-path capture, status
# codes, error pages) are preserved — only the transport is replaced.
#
# bench/ (http_server_type_read_hot.py) is left as-is.

bucket = "std-libs"
lib = "http_server"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_http_server"
subject   = "http.server"
kind      = "mechanical"
module    = "http.server"
probe     = "attr"
attr      = "HTTPServer"

[[case]]
dimension = "surface"
case      = "httpserver_class_present"
subject   = "http.server.HTTPServer"
kind      = "mechanical"
module    = "http.server"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "basehttprequesthandler_class_present"
subject   = "http.server.BaseHTTPRequestHandler"
kind      = "mechanical"
module    = "http.server"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "simplehttprequesthandler_class_present"
subject   = "http.server.SimpleHTTPRequestHandler"
kind      = "mechanical"
module    = "http.server"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "cgihttprequesthandler_class_present"
subject   = "http.server.CGIHTTPRequestHandler"
kind      = "mechanical"
module    = "http.server"
probe     = "callable"

[[case]]
dimension = "surface"
