# ===========================================================================
# ERRORS — mechanical (call + expect_exc), all network-free
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "httpstatus_unknown_value_raises_valueerror"
subject    = "http.HTTPStatus"
kind       = "mechanical"
import     = "from http import HTTPStatus"
call       = "HTTPStatus(999)"
expect_exc = "ValueError"
source     = "Lib/test/test_httpservers.py"

[[case]]
dimension  = "errors"
case       = "send_header_before_send_response_only_raises"
subject    = "http.server.BaseHTTPRequestHandler"
kind       = "mechanical"
import     = "import http.server\nfrom io import BytesIO\n_h = http.server.BaseHTTPRequestHandler.__new__(http.server.BaseHTTPRequestHandler)\n_h.wfile = BytesIO()"
call       = "_h.send_header(\"X\", \"y\")"
expect_exc = "AttributeError"
source     = "Lib/test/test_httpservers.py"

# ===========================================================================
# BEHAVIOR — semantic (network-free handler machinery via BytesIO)
# ===========================================================================

# --- HTTPStatus constants & reason phrases ---------------------------------

[[case]]
dimension = "behavior"
case      = "httpstatus_named_codes_equal_int_values"
subject   = "http.HTTPStatus"
kind      = "semantic"
import    = "from http import HTTPStatus"
intent    = "the named HTTPStatus members equal their canonical integer codes: OK==200, NO_CONTENT==204, NOT_FOUND==404, INTERNAL_SERVER_ERROR==500"
source    = "Lib/test/test_httpservers.py"

[[case]]
dimension = "behavior"
case      = "httpstatus_phrase_text"
subject   = "http.HTTPStatus"
kind      = "semantic"
import    = "from http import HTTPStatus"
intent    = "each HTTPStatus member exposes its canonical reason phrase: HTTPStatus.OK.phrase=='OK' and HTTPStatus.NOT_FOUND.phrase=='Not Found'"
source    = "Lib/test/test_httpservers.py"

[[case]]
dimension = "behavior"
case      = "responses_table_maps_codes_to_phrases"
subject   = "http.server.BaseHTTPRequestHandler.responses"
kind      = "semantic"
module    = "http.server"
intent    = "BaseHTTPRequestHandler.responses[code] yields a (short, long) phrase pair whose short phrase matches the standard reason text for 200, 404, and 500"
source    = "Lib/test/test_httpservers.py"

# --- request-line parsing (parse_request, network-free) -------------------

[[case]]
dimension = "behavior"
case      = "parse_request_captures_command_path_version"
subject   = "http.server.BaseHTTPRequestHandler"
kind      = "semantic"
module    = "http.server"
intent    = "feeding a raw 'GET /api/v1?key=val HTTP/1.1' request line through a BytesIO-backed handler's parse_request sets .command=='GET', .path=='/api/v1?key=val', and .request_version=='HTTP/1.1'"
source    = "Lib/test/test_httpservers.py"

[[case]]
dimension = "behavior"
case      = "parse_request_post_method_captured"
subject   = "http.server.BaseHTTPRequestHandler"
kind      = "semantic"
module    = "http.server"
intent    = "parse_request on a 'POST /submit HTTP/1.1' request line records .command=='POST' and .path=='/submit', so a do_POST dispatcher would be selected"
source    = "Lib/test/test_httpservers.py"

# --- response writing (send_response / send_header / end_headers) ---------

[[case]]
dimension = "behavior"
case      = "send_response_writes_200_status_line"
subject   = "http.server.BaseHTTPRequestHandler"
kind      = "semantic"
module    = "http.server"
intent    = "a BytesIO-backed handler with protocol_version='HTTP/1.1' that calls send_response(200) then end_headers writes a 'HTTP/1.1 200 OK' status line as the first wire line, the success path the legacy GET-returns-200 case asserted"
source    = "Lib/test/test_httpservers.py"

[[case]]
dimension = "behavior"
case      = "send_response_404_status_line"
subject   = "http.server.BaseHTTPRequestHandler"
kind      = "semantic"
module    = "http.server"
intent    = "send_response(404) on a BytesIO-backed handler writes a 'HTTP/1.1 404 Not Found' status line, the not-found path the legacy 404 case asserted, without a live server"
source    = "Lib/test/test_httpservers.py"

[[case]]
dimension = "behavior"
case      = "send_header_custom_fields_on_wire"
subject   = "http.server.BaseHTTPRequestHandler"
kind      = "semantic"
module    = "http.server"
intent    = "send_header('X-Custom','my-value') and send_header('Content-Type','application/json') followed by end_headers emit 'X-Custom: my-value' and 'Content-Type: application/json' header lines into the BytesIO wfile, preserving the legacy custom-headers contract"
source    = "Lib/test/test_httpservers.py"

[[case]]
dimension = "behavior"
case      = "end_headers_terminates_with_blank_line"
subject   = "http.server.BaseHTTPRequestHandler"
kind      = "semantic"
module    = "http.server"
intent    = "after send_response_only and one send_header, end_headers writes the CRLFCRLF blank-line header/body separator so the response header block is well-formed"
source    = "Lib/test/test_httpservers.py"

# --- error pages (send_error) ---------------------------------------------

[[case]]
dimension = "behavior"
case      = "send_error_writes_status_and_html_body"
subject   = "http.server.BaseHTTPRequestHandler"
kind      = "semantic"
module    = "http.server"
intent    = "send_error(HTTPStatus.NOT_FOUND) on a BytesIO-backed handler writes a '404 Not Found' status line and an HTML error body containing the 'Not Found' phrase via the DEFAULT_ERROR_MESSAGE template"
source    = "Lib/test/test_httpservers.py"

# ===========================================================================
# SECURITY — semantic (adversarial / untrusted input, network-free)
# ===========================================================================

[[case]]
dimension = "security"
case      = "malformed_request_line_rejected"
subject   = "http.server.BaseHTTPRequestHandler"
kind      = "semantic"
module    = "http.server"
intent    = "a single-token garbage request line ('NONSENSE') fed to parse_request is rejected (returns False) instead of being dispatched, so a malformed request cannot reach a do_* handler"
source    = "Lib/test/test_httpservers.py"

[[case]]
dimension = "security"
case      = "bogus_http_version_rejected"
subject   = "http.server.BaseHTTPRequestHandler"
kind      = "semantic"
module    = "http.server"
intent    = "a request line advertising an unsupported 'HTTP/9.9' version is rejected by parse_request (returns False) and the handler writes a 505 'Invalid HTTP version' error page rather than honoring the bogus protocol"
source    = "Lib/test/test_httpservers.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario, network-free)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "request_router_dispatches_by_path"
subject   = "http.server.BaseHTTPRequestHandler"
kind      = "semantic"
module    = "http.server"
intent    = "a BaseHTTPRequestHandler subclass overrides do_GET to route a batch of parsed request paths ('/', '/health', '/missing') to 200 or 404 BytesIO responses, the way a tiny dev-server app dispatches incoming requests by path without a live socket"
source    = "Lib/test/test_httpservers.py"
