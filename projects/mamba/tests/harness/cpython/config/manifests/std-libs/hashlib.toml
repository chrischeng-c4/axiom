# ===========================================================================
# SURFACE — semantic (multi-fact probes that exceed the single-probe template:
# the guaranteed/available set algebra and the hash-object attribute contract)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "algorithms_guaranteed_set_contents"
subject   = "hashlib.algorithms_guaranteed"
kind      = "semantic"
intent    = "algorithms_guaranteed is a set/frozenset of names containing at least 'sha256' and 'md5'"

[[case]]
dimension = "surface"
case      = "guaranteed_subset_of_available"
subject   = "hashlib.algorithms_available"
kind      = "semantic"
intent    = "algorithms_available is a set/frozenset, guaranteed is a subset of it, and there is no placeholder 'undefined' algorithm"

[[case]]
dimension = "surface"
case      = "every_available_constructible_via_new"
subject   = "hashlib.new"
kind      = "semantic"
intent    = "every advertised algorithm in algorithms_available is constructible via new(name, usedforsecurity=False) without raising"

[[case]]
dimension = "surface"
case      = "hash_object_attribute_contract"
subject   = "hashlib.sha256"
kind      = "semantic"
intent    = "a sha256 hash object exposes digest_size==32, block_size==64, name=='sha256', a 64-char str hexdigest, and a 32-byte digest"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc). Hash-object method subjects infer
# `hashlib` as the import (no CapWords component), so no module= is needed.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "new_unknown_algorithm_raises"
subject    = "hashlib.new"
kind       = "mechanical"
call       = "hashlib.new('no_such_algorithm')"
expect_exc = "ValueError"
source     = "Lib/test/test_hashlib.py"

[[case]]
dimension  = "errors"
case       = "new_nonstr_name_raises"
subject    = "hashlib.new"
kind       = "mechanical"
call       = "hashlib.new(1)"
expect_exc = "TypeError"
source     = "Lib/test/test_hashlib.py"

[[case]]
dimension  = "errors"
case       = "update_str_raises"
subject    = "hashlib.sha256"
kind       = "mechanical"
call       = "hashlib.sha256().update('not bytes')"
expect_exc = "TypeError"
source     = "Lib/test/test_hashlib.py"

[[case]]
dimension  = "errors"
case       = "update_int_raises"
subject    = "hashlib.sha256"
kind       = "mechanical"
call       = "hashlib.sha256().update(123)"
expect_exc = "TypeError"
source     = "Lib/test/test_hashlib.py"

[[case]]
dimension  = "errors"
case       = "pbkdf2_unknown_hash_raises"
subject    = "hashlib.pbkdf2_hmac"
kind       = "mechanical"
call       = "hashlib.pbkdf2_hmac('no_such_hash', b'password', b'salt', 1)"
expect_exc = "ValueError"
source     = "Lib/test/test_hashlib.py"

[[case]]
dimension  = "errors"
case       = "pbkdf2_zero_iterations_raises"
subject    = "hashlib.pbkdf2_hmac"
kind       = "mechanical"
call       = "hashlib.pbkdf2_hmac('sha256', b'pw', b'salt', 0)"
expect_exc = "ValueError"
source     = "Lib/test/test_hashlib.py"

[[case]]
dimension  = "errors"
case       = "shake_hexdigest_without_length_raises"
subject    = "hashlib.shake_128"
kind       = "mechanical"
call       = "hashlib.shake_128(b'data').hexdigest()"
expect_exc = "TypeError"
source     = "Lib/test/test_hashlib.py"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- known-answer vectors -------------------------------------------------

[[case]]
dimension = "behavior"
case      = "sha256_empty_known_vector"
subject   = "hashlib.sha256"
kind      = "semantic"
intent    = "sha256 of the empty input is the fixed constant e3b0c442...b7852b855"

[[case]]
dimension = "behavior"
case      = "md5_hello_known_vector"
subject   = "hashlib.md5"
kind      = "semantic"
intent    = "md5(b'hello') hexdigest is the reference 5d41402abc4b2a76b9719d911017c592"

[[case]]
dimension = "behavior"
case      = "sha1_hello_known_vector"
subject   = "hashlib.sha1"
kind      = "semantic"
intent    = "sha1(b'hello') hexdigest is the reference aaf4c61ddcc5e8a2dabede0f3b482cd9aea9434d"

[[case]]
dimension = "behavior"
case      = "sha512_digest_sizes"
subject   = "hashlib.sha512"
kind      = "semantic"
intent    = "sha512 has digest_size 64 bytes and a 128-char hexdigest"

# --- core digest properties -----------------------------------------------

[[case]]
dimension = "behavior"
case      = "digest_is_deterministic"
subject   = "hashlib.sha256"
kind      = "semantic"
intent    = "the same input always produces the same digest: sha256(b'test') equals itself across two constructions"

[[case]]
dimension = "behavior"
case      = "different_inputs_differ"
subject   = "hashlib.sha256"
kind      = "semantic"
intent    = "different inputs produce different digests: sha256(b'a') != sha256(b'b')"

[[case]]
dimension = "behavior"
case      = "update_equivalent_to_concatenation"
subject   = "hashlib.sha256"
kind      = "semantic"
intent    = "incremental update() chained over 'hello'+'world' equals the one-shot digest of 'helloworld'"

[[case]]
dimension = "behavior"
case      = "copy_is_independent"
subject   = "hashlib.sha256"
kind      = "semantic"
intent    = "copy() snapshots state: updating the original after copy() leaves the copy's digest equal to the un-updated base"

[[case]]
dimension = "behavior"
case      = "hexdigest_repeatable"
subject   = "hashlib.sha256"
kind      = "semantic"
intent    = "hexdigest() does not consume state (repeatable) and digest().hex() equals hexdigest()"

# --- new() ----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "new_equals_direct_constructor"
subject   = "hashlib.new"
kind      = "semantic"
intent    = "new('sha256', data) produces the same digest as the direct sha256(data) constructor"

[[case]]
dimension = "behavior"
case      = "new_name_case_normalized"
subject   = "hashlib.new"
kind      = "semantic"
intent    = "new() is case-insensitive: new('SHA256').name=='sha256', new('Sha1').name=='sha1', and the uppercase-name digest matches the direct constructor"

# --- BLAKE2 family --------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "blake2_default_digest_sizes"
subject   = "hashlib.blake2b"
kind      = "semantic"
intent    = "blake2b default digest_size is 64, blake2s default digest_size is 32"
source    = "Lib/test/test_hashlib.py"

[[case]]
dimension = "behavior"
case      = "blake2b_empty_known_vector"
subject   = "hashlib.blake2b"
kind      = "semantic"
intent    = "blake2b(b'') hexdigest begins with the known prefix 786a02f742015903c6c6fd852552d272"
source    = "Lib/test/test_hashlib.py"

[[case]]
dimension = "behavior"
case      = "blake2_digest_size_param"
subject   = "hashlib.blake2b"
kind      = "semantic"
intent    = "the digest_size= parameter shrinks output exactly: blake2b(digest_size=16) is 16 bytes, blake2s(digest_size=8) is 8 bytes"
source    = "Lib/test/test_hashlib.py"

[[case]]
dimension = "behavior"
case      = "blake2b_keyed_mac"
subject   = "hashlib.blake2b"
kind      = "semantic"
intent    = "a keyed blake2b (MAC use) differs from the unkeyed hash of the same data and is deterministic given the same key"
source    = "Lib/test/test_hashlib.py"

[[case]]
dimension = "behavior"
case      = "blake2b_incremental_equals_oneshot"
subject   = "hashlib.blake2b"
kind      = "semantic"
intent    = "blake2b incremental update('hello')+update(' world') equals the one-shot digest, and .name reports 'blake2b'/'blake2s'"
source    = "Lib/test/test_hashlib.py"

# --- SHA-3 family ---------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "sha3_256_known_vectors"
subject   = "hashlib.sha3_256"
kind      = "semantic"
intent    = "sha3_256 NIST FIPS-202 known answers: sha3_256(b'abc') and sha3_256(b'') match their reference hexdigests"
source    = "Lib/test/test_hashlib.py"

[[case]]
dimension = "behavior"
case      = "sha3_digest_sizes"
subject   = "hashlib.sha3_256"
kind      = "semantic"
intent    = "sha3 digest_size matches the trailing bit count / 8: sha3_224=28, sha3_256=32, sha3_384=48, sha3_512=64"
source    = "Lib/test/test_hashlib.py"

[[case]]
dimension = "behavior"
case      = "sha3_256_block_size_sponge_rate"
subject   = "hashlib.sha3_256"
kind      = "semantic"
intent    = "the sponge rate gives sha3_256 a non-power-of-two block_size of 136, unlike SHA-2; .name is the canonical 'sha3_512'"
source    = "Lib/test/test_hashlib.py"

[[case]]
dimension = "behavior"
case      = "sha3_256_incremental_and_copy"
subject   = "hashlib.sha3_256"
kind      = "semantic"
intent    = "sha3_256 incremental update equals one-shot, and copy() is an independent snapshot unaffected by later updates"
source    = "Lib/test/test_hashlib.py"

# --- SHAKE XOFs -----------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "shake_known_vectors"
subject   = "hashlib.shake_128"
kind      = "semantic"
intent    = "variable-length hexdigest: shake_128(b'abc').hexdigest(16) and shake_256(b'abc').hexdigest(32) match their reference values"
source    = "Lib/test/test_hashlib.py"

[[case]]
dimension = "behavior"
case      = "shake_length_controls_output"
subject   = "hashlib.shake_128"
kind      = "semantic"
intent    = "the requested length sizes the output: shake_128.digest(8) is 8 bytes, hexdigest(8) is 16 hex chars, shake_256.digest(100) is 100 bytes"
source    = "Lib/test/test_hashlib.py"

[[case]]
dimension = "behavior"
case      = "shake_output_prefix_stable"
subject   = "hashlib.shake_128"
kind      = "semantic"
intent    = "the XOF stream is prefix-stable: a 32-byte shake_128 output starts with the same bytes as the 8-byte output of the same input"
source    = "Lib/test/test_hashlib.py"

[[case]]
dimension = "behavior"
case      = "shake_incremental_and_attrs"
subject   = "hashlib.shake_128"
kind      = "semantic"
intent    = "shake_128 incremental update equals one-shot, .name is 'shake_128', and digest_size is 0 because length is per-call"
source    = "Lib/test/test_hashlib.py"

# --- pbkdf2_hmac KDF ------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "pbkdf2_known_vector"
subject   = "hashlib.pbkdf2_hmac"
kind      = "semantic"
intent    = "one iteration of PBKDF2-HMAC-SHA256 over ('password','salt') matches the known prefix 120fb6cffcf8b32c43e7225256c4f837"
source    = "Lib/test/test_hashlib.py"

[[case]]
dimension = "behavior"
case      = "pbkdf2_dklen_controls_length"
subject   = "hashlib.pbkdf2_hmac"
kind      = "semantic"
intent    = "default output length equals the hash's digest_size (32 for sha256); dklen= overrides it exactly (16 over sha256, 40 over sha1)"
source    = "Lib/test/test_hashlib.py"

[[case]]
dimension = "behavior"
case      = "pbkdf2_inputs_change_key"
subject   = "hashlib.pbkdf2_hmac"
kind      = "semantic"
intent    = "pbkdf2 is deterministic for identical inputs; changing the iteration count or the salt changes the derived key"
source    = "Lib/test/test_hashlib.py"

# --- file_digest ----------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "file_digest_streams_file"
subject   = "hashlib.file_digest"
kind      = "semantic"
intent    = "file_digest streams a temp file's bytes and matches the in-memory digest: by algorithm name, by constructor callable, for md5, and for an empty file"
source    = "Lib/test/test_hashlib.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenarios)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "sha256_artifact"
subject   = "hashlib.sha256"
kind      = "semantic"
intent    = "a build tool / content-addressed store digests a 1 MiB artifact for a stable cache key: sha256 + md5 one-shot vs chunked update, copy() isolation, and new(name, data) all agree"
