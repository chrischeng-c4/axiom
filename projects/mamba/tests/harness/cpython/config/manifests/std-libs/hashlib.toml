# Manifest for the stdlib `hashlib` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/hashlib/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + paired-.expected golden shape (surface.py,
# behavior.py, errors.py, the loose feature files blake2.py / sha3.py /
# shake.py / pbkdf2.py / file_digest.py, and the trivial import probes
# hashlib_conformance.py/.expected + hashlib_ops.py/.expected). bench/ and
# real_world/ are preserved (real_world re-homed under the [tool.mamba] record).

bucket = "std-libs"
lib = "hashlib"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_hashlib"
subject   = "hashlib"
kind      = "mechanical"
probe     = "attr"
attr      = "sha256"

[[case]]
dimension = "surface"
case      = "md5_is_callable"
subject   = "hashlib.md5"
kind      = "mechanical"
probe     = "callable"

