# Manifest for the stdlib `gzip` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/gzip/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, gzipfile_attrs.py, read_features.py, truncated.py,
# decompression_bomb.py, real_world/log_shipper_roundtrip.py). bench/ is left
# as-is (bench/compress_1mb.py). No paired .expected goldens existed.
#
# gzip ships green on mamba (no `# mamba-xfail` directives on any legacy
# fixture), so no case carries an xfail.

bucket = "std-libs"
lib = "gzip"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_gzip"
subject   = "gzip"
kind      = "mechanical"
probe     = "attr"
attr      = "compress"

[[case]]
dimension = "surface"
case      = "compress_is_callable"
subject   = "gzip.compress"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "decompress_is_callable"
subject   = "gzip.decompress"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "open_is_callable"
subject   = "gzip.open"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "gzipfile_is_callable"
subject   = "gzip.GzipFile"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "badgzipfile_present"
subject   = "gzip"
kind      = "mechanical"
probe     = "attr"
attr      = "BadGzipFile"

[[case]]
dimension = "surface"
case      = "read_constant_is_int"
subject   = "gzip.READ"
kind      = "mechanical"
probe     = "type"
typename  = "int"

[[case]]
dimension = "surface"
case      = "write_constant_is_int"
subject   = "gzip.WRITE"
kind      = "mechanical"
probe     = "type"
typename  = "int"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc, self-asserting)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "decompress_non_gzip_raises_badgzipfile"
subject    = "gzip.decompress"
kind       = "mechanical"
call       = "gzip.decompress(b'not a gzip stream')"
expect_exc = "gzip.BadGzipFile"
source     = "Lib/test/test_gzip.py"

[[case]]
dimension  = "errors"
case       = "decompress_magic_only_raises_eoferror"
subject    = "gzip.decompress"
kind       = "mechanical"
call       = "gzip.decompress(gzip.compress(b'hello gzip')[:4])"
expect_exc = "EOFError"
source     = "Lib/test/test_gzip.py"

[[case]]
dimension  = "errors"
case       = "decompress_missing_trailer_raises_eoferror"
subject    = "gzip.decompress"
kind       = "mechanical"
call       = "gzip.decompress(gzip.compress(b'trailer matters')[:-8])"
expect_exc = "EOFError"
source     = "Lib/test/test_gzip.py"

[[case]]
dimension  = "errors"
case       = "decompress_truncated_trailer_raises_eoferror"
subject    = "gzip.decompress"
kind       = "mechanical"
call       = "gzip.decompress(gzip.compress(b'trailer matters')[:-4])"
expect_exc = "EOFError"
source     = "Lib/test/test_gzip.py"

[[case]]
dimension  = "errors"
case       = "compress_level_out_of_range_raises_zliberror"
subject    = "gzip.compress"
kind       = "mechanical"
call       = "gzip.compress(b'x', compresslevel=10)"
expect_exc = "zlib.error"
import     = "import gzip\nimport zlib"
source     = "Lib/test/test_gzip.py"

# ===========================================================================
# BEHAVIOR — semantic (observable output matches CPython 3.12)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "compress_decompress_roundtrips_full_byte_range"
subject   = "gzip.decompress"
kind      = "semantic"
intent    = "compress then decompress round-trips an arbitrary payload covering the full 0..255 byte range repeated 10 times, byte-for-byte"

[[case]]
dimension = "behavior"
case      = "compress_has_gzip_magic_and_deflate_method"
subject   = "gzip.compress"
kind      = "semantic"
intent    = "a compressed stream starts with the gzip magic bytes 0x1f 0x8b and a CM byte of 0x08 (DEFLATE), and is itself a bytes object"

[[case]]
dimension = "behavior"
case      = "higher_level_smaller_or_equal_same_output"
subject   = "gzip.compress"
kind      = "semantic"
intent    = "compresslevel 1 and 9 both decompress back to the same input, and for repetitive data level 9 produces output no larger than level 1"

[[case]]
dimension = "behavior"
case      = "compress_mtime_zero_is_deterministic"
subject   = "gzip.compress"
kind      = "semantic"
intent    = "two compress calls on the same data with mtime=0 produce byte-identical streams (no embedded wall-clock timestamp)"

[[case]]
dimension = "behavior"
case      = "compress_shrinks_compressible_data"
subject   = "gzip.compress"
kind      = "semantic"
intent    = "compressing highly repetitive data at level 6 yields a stream strictly smaller than the uncompressed input"

[[case]]
dimension = "behavior"
case      = "empty_bytes_roundtrip"
subject   = "gzip.decompress"
kind      = "semantic"
intent    = "compressing then decompressing empty bytes round-trips to empty bytes"

[[case]]
dimension = "behavior"
case      = "badgzipfile_is_oserror_subclass"
subject   = "gzip.BadGzipFile"
kind      = "semantic"
intent    = "gzip.BadGzipFile is a subclass of OSError (the exception hierarchy contract on Python 3.12+)"
module    = "gzip"
source    = "Lib/test/test_gzip.py"

[[case]]
dimension = "behavior"
case      = "open_path_binary_roundtrip"
subject   = "gzip.open"
kind      = "semantic"
intent    = "gzip.open on a tempfile path writes bytes in 'wb' and reads them back identically in 'rb'"

[[case]]
dimension = "behavior"
case      = "open_path_text_roundtrip"
subject   = "gzip.open"
kind      = "semantic"
intent    = "gzip.open on a tempfile path in 'wt' writes str and 'rt' reads the same str back"

[[case]]
dimension = "behavior"
case      = "open_fileobj_read_modes"
subject   = "gzip.open"
kind      = "semantic"
intent    = "gzip.open accepts an in-memory BytesIO fileobj and honours 'r'/'rb' (bytes) and 'rt' (decoded str) read modes over the same compressed payload"

[[case]]
dimension = "behavior"
case      = "gzipfile_bytesio_roundtrip"
subject   = "gzip.GzipFile"
kind      = "semantic"
intent    = "GzipFile over a BytesIO fileobj writes in 'wb' and reads back the same bytes in 'rb'"
module    = "gzip"

[[case]]
dimension = "behavior"
case      = "gzipfile_multi_write_single_stream"
subject   = "gzip.GzipFile"
kind      = "semantic"
intent    = "two successive writes to one GzipFile concatenate into a single decompressed stream"
module    = "gzip"

[[case]]
dimension = "behavior"
case      = "gzipfile_capability_flags_and_name"
subject   = "gzip.GzipFile"
kind      = "semantic"
intent    = "a GzipFile over a nameless fileobj reports name=='' , mode==WRITE/READ, the complementary readable/writable/seekable flags, closed transitions across the with-block, and fileno() raises UnsupportedOperation with no underlying fd"
module    = "gzip"

[[case]]
dimension = "behavior"
case      = "gzipfile_write_returns_count_and_tell_tracks"
subject   = "gzip.GzipFile"
kind      = "semantic"
intent    = "GzipFile.write() accepts any buffer (array.array) and returns the byte count while tell() tracks the uncompressed position"
module    = "gzip"

[[case]]
dimension = "behavior"
case      = "gzipfile_write_seek_write_doubles"
subject   = "gzip.GzipFile"
kind      = "semantic"
intent    = "write, seek forward by the data length, then write again: the closed stream decompresses to the message repeated twice"
module    = "gzip"

[[case]]
dimension = "behavior"
case      = "gzipfile_decodes_fextra_header"
subject   = "gzip.GzipFile"
kind      = "semantic"
intent    = "a gzip member carrying an optional FEXTRA field (header flag 0x04) is decoded by skipping the extra field and still recovering the payload"
module    = "gzip"
source    = "Lib/test/test_gzip.py"

[[case]]
dimension = "behavior"
case      = "gzipfile_flush_prefix_incomplete_until_close"
subject   = "gzip.GzipFile"
kind      = "semantic"
intent    = "flush() commits a syncable prefix but the trailer is only written on close: the closed stream decompresses while the flushed-only prefix raises EOFError"
module    = "gzip"

[[case]]
dimension = "behavior"
case      = "gzipfile_read_truncated_stream_raises_eoferror"
subject   = "gzip.GzipFile"
kind      = "semantic"
intent    = "reading a stream missing its 8-byte trailer through GzipFile raises EOFError once the reader walks past the payload, while a sized read of exactly the payload length still recovers the bytes; header-only prefixes raise EOFError on first read"
module    = "gzip"
source    = "Lib/test/test_gzip.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "log_shipper_roundtrip"
subject   = "gzip.compress"
kind      = "semantic"
intent    = "a log-shipper batches plaintext log lines, gzip-compresses each batch, the consumer decompresses and CRC32-validates: two distinct batches compress to distinct streams, each round-trips exactly, the gzip magic/DEFLATE header is present, zlib.crc32 over decoded equals crc over original, and the typeshed-declared names all resolve"
source    = "Lib/test/test_gzip.py"

# ===========================================================================
# SECURITY — semantic (adversarial / untrusted input)
# ===========================================================================

[[case]]
dimension = "security"
case      = "decompression_bomb_bounded"
subject   = "gzip.GzipFile"
kind      = "semantic"
intent    = "a tiny gzip blob expanding >1000x (48 MB payload) is contained by three defenses: bounded read(n) chunks aborting at a 1 MB guard cap, a single size-guarded read(cap) limiting output, and a pre-inflation expansion-ratio budget that declines the bomb up front while benign small input still round-trips"
module    = "gzip"
