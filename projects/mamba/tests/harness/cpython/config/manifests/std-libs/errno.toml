# Manifest for the stdlib `errno` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/errno/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py
# and the loose feature file errorcode_consistency.py. errno is a module of
# integer constants plus a parallel `errorcode` dict; it has no callables that
# raise, so the "errors" dimension covers attribute / key lookup failures.
# Extra coverage mirrors the CPython oracle Lib/test/test_errno.py
# (test_using_errorcode, test_attributes_in_errorcode, std_c_errors).

bucket = "std-libs"
lib = "errno"

# ===========================================================================
# SURFACE — mechanical probes
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_errno"
subject   = "errno"
kind      = "mechanical"
probe     = "attr"
attr      = "errorcode"

[[case]]
dimension = "surface"
case      = "errorcode_is_dict"
subject   = "errno.errorcode"
kind      = "mechanical"
probe     = "type"
typename  = "dict"

[[case]]
dimension = "surface"
case      = "errorcode_not_callable"
subject   = "errno.errorcode"
kind      = "mechanical"
probe     = "not_callable"

[[case]]
dimension = "surface"
case      = "eperm_attr_exists"
subject   = "errno"
kind      = "mechanical"
probe     = "attr"
attr      = "EPERM"

[[case]]
dimension = "surface"
case      = "edom_attr_exists"
subject   = "errno"
kind      = "mechanical"
probe     = "attr"
attr      = "EDOM"
source    = "Lib/test/test_errno.py"

[[case]]
dimension = "surface"
case      = "erange_attr_exists"
subject   = "errno"
kind      = "mechanical"
probe     = "attr"
attr      = "ERANGE"
source    = "Lib/test/test_errno.py"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc; self-asserting "it raised")
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "missing_attribute_raises"
subject    = "errno"
kind       = "mechanical"
call       = "errno.NO_SUCH_ERRNO"
expect_exc = "AttributeError"

[[case]]
dimension  = "errors"
case       = "errorcode_unknown_key_raises"
subject    = "errno.errorcode"
kind       = "mechanical"
call       = "errno.errorcode[99999]"
expect_exc = "KeyError"

# ===========================================================================
# BEHAVIOR — semantic (observable rule; output matches CPython 3.12)
# ===========================================================================

# --- POSIX-stable numeric constants ---------------------------------------

[[case]]
dimension = "behavior"
case      = "posix_constant_values"
subject   = "errno.EPERM"
kind      = "semantic"
intent    = "the POSIX-stable low constants pin to their documented numbers: EPERM==1, ENOENT==2, EBADF==9, EACCES==13"

[[case]]
dimension = "behavior"
case      = "eagain_equals_ewouldblock"
subject   = "errno.EAGAIN"
kind      = "semantic"
intent    = "EAGAIN and EWOULDBLOCK alias the same errno value (EAGAIN == EWOULDBLOCK)"

[[case]]
dimension = "behavior"
case      = "std_c_errors_are_int"
subject   = "errno.EDOM"
kind      = "semantic"
intent    = "the standard-C math errors EDOM and ERANGE are exposed as ints (not just POSIX errors are present)"
source    = "Lib/test/test_errno.py"

[[case]]
dimension = "behavior"
case      = "constants_are_distinct"
subject   = "errno.EACCES"
kind      = "semantic"
intent    = "distinct named errors carry distinct values: EACCES != ENOENT"

# --- errorcode dict shape and lookups -------------------------------------

[[case]]
dimension = "behavior"
case      = "errorcode_maps_int_to_name"
subject   = "errno.errorcode"
kind      = "semantic"
intent    = "errorcode is a dict mapping the errno int to its uppercase name: errorcode[1]=='EPERM', errorcode[2]=='ENOENT', errorcode[13]=='EACCES'"

[[case]]
dimension = "behavior"
case      = "errorcode_get_by_constant"
subject   = "errno.errorcode"
kind      = "semantic"
intent    = "errorcode can be looked up by a named constant: errorcode.get(errno.EACCES) == 'EACCES' and errorcode[errno.ENOENT] == 'ENOENT'"

[[case]]
dimension = "behavior"
case      = "errorcode_get_unknown_is_none"
subject   = "errno.errorcode"
kind      = "semantic"
intent    = "errorcode.get on an errno number that is not present returns None (the dict .get default)"

[[case]]
dimension = "behavior"
case      = "errorcode_key_value_types"
subject   = "errno.errorcode"
kind      = "semantic"
intent    = "every errorcode key is an int and every value is a str"

# --- errorcode <-> module attribute round-trip consistency ----------------

[[case]]
dimension = "behavior"
case      = "errorcode_values_are_attrs"
subject   = "errno.errorcode"
kind      = "semantic"
intent    = "every name in errorcode.values() is a real module attribute whose int round-trips back to the same errorcode key"
source    = "Lib/test/test_errno.py"

[[case]]
dimension = "behavior"
case      = "uppercase_attrs_are_errorcode_keys"
subject   = "errno.errorcode"
kind      = "semantic"
intent    = "every uppercase module attribute is an int whose value appears as a key in errorcode"
source    = "Lib/test/test_errno.py"

# ===========================================================================
# REAL_WORLD — semantic (one realistic end-user flow)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "translate_oserror_errno_to_name"
subject   = "errno.errorcode"
kind      = "semantic"
intent    = "a realistic flow: catch an OSError raised by opening a missing file, then translate its .errno to the symbolic name via errorcode and confirm it is ENOENT"
