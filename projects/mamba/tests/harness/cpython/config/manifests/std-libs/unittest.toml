# Manifest for the stdlib `unittest` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/unittest/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py)
# plus the loose feature files (result_events.py, run_result.py, subtests.py).
# No paired .expected goldens and no bench/ existed for this lib.
#
# subject="unittest.TestCase[...]" infers module "unittest" (the inferer stops
# at the first CapWords component, leaving "unittest"), which is the real
# importable module, so no per-case module=/import= override is needed.

bucket = "std-libs"
lib = "unittest"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_unittest"
subject   = "unittest"
kind      = "mechanical"
probe     = "attr"
attr      = "TestCase"

[[case]]
dimension = "surface"
case      = "testcase_is_type"
subject   = "unittest.TestCase"
kind      = "mechanical"
probe     = "type"
typename  = "type"

[[case]]
dimension = "surface"
case      = "testresult_is_type"
subject   = "unittest.TestResult"
kind      = "mechanical"
probe     = "type"
typename  = "type"

[[case]]
dimension = "surface"
case      = "testsuite_is_type"
subject   = "unittest.TestSuite"
kind      = "mechanical"
probe     = "type"
typename  = "type"

[[case]]
dimension = "surface"
case      = "testloader_is_type"
subject   = "unittest.TestLoader"
kind      = "mechanical"
probe     = "type"
typename  = "type"

[[case]]
dimension = "surface"
case      = "skiptest_is_attr"
subject   = "unittest"
kind      = "mechanical"
probe     = "attr"
attr      = "SkipTest"

[[case]]
dimension = "surface"
case      = "testcase_run_is_callable"
subject   = "unittest.TestCase.run"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "testcase_assertequal_is_callable"
subject   = "unittest.TestCase.assertEqual"
kind      = "mechanical"
probe     = "callable"

# Richer surface checks that a single mechanical probe cannot express
# (subclass relationship, identity of a class attribute, instance
# introspection) become small semantic surface cases.

[[case]]
dimension = "surface"
case      = "skiptest_subclasses_exception"
subject   = "unittest.SkipTest"
kind      = "semantic"
intent    = "unittest.SkipTest is a subclass of the builtin Exception"
source    = "Lib/test/test_unittest/"

[[case]]
dimension = "surface"
case      = "failureexception_is_assertionerror"
subject   = "unittest.TestCase.failureException"
kind      = "semantic"
intent    = "TestCase.failureException defaults to the builtin AssertionError"
source    = "Lib/test/test_unittest/"

[[case]]
dimension = "surface"
case      = "testcase_introspection_surface"
subject   = "unittest.TestCase"
kind      = "semantic"
intent    = "a trivial TestCase exposes the documented introspection surface: id() is a str, countTestCases() == 1, defaultTestResult() is a TestResult, shortDescription() is None"
source    = "Lib/test/test_unittest/"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "named_ctor_missing_method_raises"
subject    = "unittest.FunctionTestCase"
kind       = "semantic"
intent     = "constructing a TestCase with a method name that is not an attribute of the class raises ValueError"
source     = "Lib/test/test_unittest/"

[[case]]
dimension  = "errors"
case       = "assertequal_mismatch_raises"
subject    = "unittest.TestCase.assertEqual"
kind       = "semantic"
intent     = "calling assertEqual(1, 2) on a TestCase instance raises the failureException (AssertionError) outside a runner"
source     = "Lib/test/test_unittest/"

[[case]]
dimension  = "errors"
case       = "assertraises_no_exception_raises"
subject    = "unittest.TestCase.assertRaises"
kind       = "semantic"
intent     = "an assertRaises(ValueError) block whose body raises nothing raises AssertionError on context exit"
source     = "Lib/test/test_unittest/"

[[case]]
dimension  = "errors"
case       = "skiptest_raise_is_skiptest"
subject    = "unittest.SkipTest"
kind       = "mechanical"
call       = "raise unittest.SkipTest('skipping')"
expect_exc = "unittest.SkipTest"

[[case]]
dimension  = "errors"
case       = "bare_testcase_run_missing_method_raises"
subject    = "unittest.TestCase.run"
kind       = "semantic"
intent     = "running a bare unittest.TestCase() with no selected test method raises AttributeError (no _testMethodName-resolvable method)"
source     = "Lib/test/test_unittest/"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- TestCase construction + naming (from legacy behavior.py) -------------

[[case]]
dimension = "behavior"
case      = "id_ends_with_bound_method_name"
subject   = "unittest.TestCase"
kind      = "semantic"
intent    = "TestCase('test_a').id() ends with '.<ClassName>.test_a'; the named ctor selects that test method"
source    = "Lib/test/test_unittest/"

[[case]]
dimension = "behavior"
case      = "default_method_is_runtest"
subject   = "unittest.TestCase"
kind      = "semantic"
intent    = "with no method name given, the default-selected method is runTest, so id() ends with '.runTest'"
source    = "Lib/test/test_unittest/"

[[case]]
dimension = "behavior"
case      = "counttestcases_single_instance"
subject   = "unittest.TestCase"
kind      = "semantic"
intent    = "a single TestCase instance reports countTestCases() == 1"
source    = "Lib/test/test_unittest/"

[[case]]
dimension = "behavior"
case      = "bare_testcase_runs_asserts"
subject   = "unittest.TestCase"
kind      = "semantic"
intent    = "a bare TestCase() can run individual asserts directly: assertEqual(3, 3) passes and a mismatch raises failureException inside assertRaises"
source    = "Lib/test/test_unittest/"

[[case]]
dimension = "behavior"
case      = "setup_teardown_default_noops"
subject   = "unittest.TestCase"
kind      = "semantic"
intent    = "the default setUp() and tearDown() are safe no-ops callable directly without error"
source    = "Lib/test/test_unittest/"

# --- Loader behavior (from legacy errors.py loader probes) ----------------

[[case]]
dimension = "behavior"
case      = "loadtestsfromname_missing_name_yields_failing_test"
subject   = "unittest.TestLoader.loadTestsFromName"
kind      = "semantic"
intent    = "loadTestsFromName for a non-existent top-level name does not raise; it returns a one-test suite that records an error when run"
source    = "Lib/test/test_unittest/"

[[case]]
dimension = "behavior"
case      = "loadtestsfromtestcase_non_testcase_empty_suite"
subject   = "unittest.TestLoader.loadTestsFromTestCase"
kind      = "semantic"
intent    = "loadTestsFromTestCase on a class that is not a TestCase subclass does not raise in 3.12; it returns an empty TestSuite (no test_* methods to collect)"
source    = "Lib/test/test_unittest/"

# --- TestResult counters (from legacy errors.py tail) ---------------------

[[case]]
dimension = "behavior"
case      = "testresult_initial_counters_empty"
subject   = "unittest.TestResult"
kind      = "semantic"
intent    = "a fresh TestResult starts with empty failures and errors lists"
source    = "Lib/test/test_unittest/"

# --- TestResult lifecycle event ordering (from result_events.py) ----------

[[case]]
dimension = "behavior"
case      = "passing_test_event_ordering"
subject   = "unittest.TestResult"
kind      = "semantic"
intent    = "a passing test run via defaultTestResult() brackets the run with startTestRun/stopTestRun and reports addSuccess: startTestRun, startTest, body, addSuccess, stopTest, stopTestRun"
source    = "Lib/test/test_unittest/"

[[case]]
dimension = "behavior"
case      = "failing_test_reports_addfailure"
subject   = "unittest.TestResult"
kind      = "semantic"
intent    = "a failing test reports addFailure (not addError) between startTest/stopTest, and a custom failureException is honored for self.fail()"
source    = "Lib/test/test_unittest/"

# --- TestCase.run / __call__ / defaultTestResult wiring (run_result.py) ---

[[case]]
dimension = "behavior"
case      = "run_returns_given_result"
subject   = "unittest.TestCase.run"
kind      = "semantic"
intent    = "TestCase.run(result) returns the same TestResult object it was handed"
source    = "Lib/test/test_unittest/"

[[case]]
dimension = "behavior"
case      = "call_delegates_to_run"
subject   = "unittest.TestCase.__call__"
kind      = "semantic"
intent    = "calling the instance delegates to run() with the supplied result and returns run()'s return value"
source    = "Lib/test/test_unittest/"

[[case]]
dimension = "behavior"
case      = "run_uses_default_result"
subject   = "unittest.TestCase.run"
kind      = "semantic"
intent    = "TestCase.run() with no argument falls back to the object's defaultTestResult()"
source    = "Lib/test/test_unittest/"

[[case]]
dimension = "behavior"
case      = "passing_run_records_no_failures"
subject   = "unittest.TestResult"
kind      = "semantic"
intent    = "after a passing run, the result has testsRun == 1, empty failures/errors, and wasSuccessful() is True"
source    = "Lib/test/test_unittest/"

# --- subTest context behavior under debug and failfast (subtests.py) ------

[[case]]
dimension = "behavior"
case      = "debug_runs_subtest_inline"
subject   = "unittest.TestCase.debug"
kind      = "semantic"
intent    = "debug() runs the test in-line and a passing subTest does not interrupt control flow"
source    = "Lib/test/test_unittest/"

[[case]]
dimension = "behavior"
case      = "failfast_stops_on_failing_subtest"
subject   = "unittest.TestResult"
kind      = "semantic"
intent    = "under failfast, a failing subTest halts the suite immediately: test_a's subtests run, test_b fails on its second subTest, test_c never runs, and exactly one failure is recorded"
source    = "Lib/test/test_unittest/"
