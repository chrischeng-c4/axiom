# Manifest for the stdlib `calendar` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/calendar/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# This is the reference corpus for the regularization loop.

bucket = "std-libs"
lib = "calendar"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_calendar"
subject   = "calendar"
kind      = "mechanical"
probe     = "attr"
attr      = "isleap"

[[case]]
dimension = "surface"
case      = "isleap_is_callable"
subject   = "calendar.isleap"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "leapdays_is_callable"
subject   = "calendar.leapdays"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "monthrange_is_callable"
subject   = "calendar.monthrange"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "weekday_is_callable"
subject   = "calendar.weekday"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "day_name_not_callable"
subject   = "calendar.day_name"
kind      = "mechanical"
probe     = "not_callable"

[[case]]
dimension = "surface"
case      = "month_name_not_callable"
subject   = "calendar.month_name"
kind      = "mechanical"
probe     = "not_callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "day_abbr_negative_index_raises"
subject    = "calendar.day_abbr"
kind       = "mechanical"
call       = "calendar.day_abbr[-10]"
expect_exc = "IndexError"
source     = "Lib/test/test_calendar.py"

[[case]]
dimension  = "errors"
case       = "day_name_index_7_raises"
subject    = "calendar.day_name"
kind       = "mechanical"
call       = "calendar.day_name[7]"
expect_exc = "IndexError"
source     = "Lib/test/test_calendar.py"

[[case]]
dimension  = "errors"
case       = "month_name_index_13_raises"
subject    = "calendar.month_name"
kind       = "mechanical"
call       = "calendar.month_name[13]"
expect_exc = "IndexError"

[[case]]
dimension  = "errors"
case       = "formatmonth_month_13_raises"
subject    = "calendar.TextCalendar"
kind       = "mechanical"
call       = "calendar.TextCalendar().formatmonth(2017, 13)"
expect_exc = "calendar.IllegalMonthError"
source     = "Lib/test/test_calendar.py"

[[case]]
dimension  = "errors"
case       = "formatmonth_month_neg1_raises"
subject    = "calendar.TextCalendar"
kind       = "mechanical"
call       = "calendar.TextCalendar().formatmonth(2017, -1)"
expect_exc = "calendar.IllegalMonthError"
source     = "Lib/test/test_calendar.py"

[[case]]
dimension  = "errors"
case       = "itermonthdays2_bad_month_raises"
subject    = "calendar.Calendar"
kind       = "mechanical"
call       = "list(calendar.Calendar().itermonthdays2(2024, 13))"
expect_exc = "calendar.IllegalMonthError"

[[case]]
dimension  = "errors"
case       = "setfirstweekday_7_raises"
subject    = "calendar.setfirstweekday"
kind       = "mechanical"
call       = "calendar.setfirstweekday(7)"
expect_exc = "ValueError"
source     = "Lib/test/test_calendar.py"

[[case]]
dimension  = "errors"
case       = "setfirstweekday_negative_valueerror"
subject    = "calendar.setfirstweekday"
kind       = "mechanical"
call       = "calendar.setfirstweekday(-1)"
expect_exc = "ValueError"
source     = "Lib/test/test_calendar.py"

[[case]]
dimension  = "errors"
case       = "setfirstweekday_str_typeerror"
subject    = "calendar.setfirstweekday"
kind       = "mechanical"
call       = "calendar.setfirstweekday(\"flabber\")"
expect_exc = "TypeError"
source     = "Lib/test/test_calendar.py"

# ===========================================================================
# ERRORS — semantic (message-echo asserts + happy-path "no raise" cases that
# go beyond the plain call/expect_exc mechanical template)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "monthrange_month_65_echoes_value"
subject   = "calendar.monthrange"
kind      = "semantic"
intent    = "monthrange(2004, 65) raises IllegalMonthError whose message text echoes the offending month number 65"

[[case]]
dimension = "errors"
case      = "setfirstweekday_123_echoes_value"
subject   = "calendar.setfirstweekday"
kind      = "semantic"
intent    = "setfirstweekday(123) raises IllegalWeekdayError whose message text echoes the offending weekday number 123"
source    = "Lib/test/test_calendar.py"

[[case]]
dimension = "errors"
case      = "monthrange_negative_year_no_raise"
subject   = "calendar.monthrange"
kind      = "semantic"
intent    = "monthrange accepts a negative (proleptic Gregorian) year; monthrange(-1, 1) does NOT raise"

[[case]]
dimension = "errors"
case      = "monthrange_valid_no_raise"
subject   = "calendar.monthrange"
kind      = "semantic"
intent    = "the happy path: monthrange(2024, 2) returns (weekday_of_first, num_days) without raising"

