# Manifest for the stdlib `warnings` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/warnings/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py),
# the loose feature files (dedup.py / formatting.py / warn_forms.py), and the
# basic surface probe (warnings_basic.py). bench/ is kept as-is. CPython 3.12
# is the oracle.

bucket = "std-libs"
lib = "warnings"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable)
# Recovered from warnings_basic.py (the has_* / callable surface walker) and
# the issubclass category checks in the legacy surface.py monolith.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_warnings"
subject   = "warnings"
kind      = "mechanical"
probe     = "attr"
attr      = "warn"

[[case]]
dimension = "surface"
case      = "warn_is_callable"
subject   = "warnings.warn"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "warn_explicit_is_callable"
subject   = "warnings.warn_explicit"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "filterwarnings_is_callable"
subject   = "warnings.filterwarnings"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "simplefilter_is_callable"
subject   = "warnings.simplefilter"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "resetwarnings_is_callable"
subject   = "warnings.resetwarnings"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "showwarning_is_callable"
subject   = "warnings.showwarning"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "formatwarning_is_callable"
subject   = "warnings.formatwarning"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "catch_warnings_is_callable"
subject   = "warnings.catch_warnings"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "warningmessage_attr"
subject   = "warnings"
kind      = "mechanical"
probe     = "attr"
attr      = "WarningMessage"

[[case]]
dimension = "surface"
case      = "filters_attr"
subject   = "warnings"
kind      = "mechanical"
probe     = "attr"
attr      = "filters"

[[case]]
dimension = "surface"
case      = "defaultaction_attr"
subject   = "warnings"
kind      = "mechanical"
probe     = "attr"
attr      = "defaultaction"

[[case]]
dimension = "surface"
case      = "onceregistry_attr"
subject   = "warnings"
kind      = "mechanical"
probe     = "attr"
attr      = "onceregistry"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc), recovered from errors.py
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "bad_action_raises"
subject    = "warnings.simplefilter"
kind       = "mechanical"
call       = "warnings.simplefilter(\"not_a_valid_action\")"
expect_exc = "AssertionError"

[[case]]
dimension  = "errors"
case       = "bad_category_raises"
subject    = "warnings.warn"
kind       = "mechanical"
call       = "warnings.warn(\"hi\", category=int)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "bad_lineno_raises"
subject    = "warnings.warn_explicit"
kind       = "mechanical"
call       = "warnings.warn_explicit(\"hi\", UserWarning, \"file\", \"not_an_int\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "bad_regex_raises"
subject    = "warnings.filterwarnings"
kind       = "mechanical"
import     = "import re\nimport warnings"
call       = "warnings.filterwarnings(\"ignore\", message=\"*(\")"
expect_exc = "re.error"

# ===========================================================================
# ERRORS — semantic (the "error" filter turns warn() into a raise; this needs
# a catch_warnings context, so it is beyond the single-expr mechanical form)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "error_filter_turns_warn_into_raise"
subject   = "warnings.simplefilter"
kind      = "semantic"
intent    = "under simplefilter(\"error\") inside a catch_warnings block, warnings.warn raises the warning category as an exception (UserWarning)"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- catch_warnings recording surface (from legacy surface.py + behavior.py)

[[case]]
dimension = "behavior"
case      = "catch_warnings_records_single"
subject   = "warnings.catch_warnings"
kind      = "semantic"
intent    = "catch_warnings(record=True) with simplefilter(\"always\") captures one WarningMessage carrying the category and message text"

[[case]]
dimension = "behavior"
case      = "catch_warnings_records_multiple"
subject   = "warnings.catch_warnings"
kind      = "semantic"
intent    = "catch_warnings(record=True) collects every emitted warning in order; two warns of different categories yield two records whose categories match"

[[case]]
dimension = "behavior"
case      = "catch_warnings_restores_filters"
subject   = "warnings.catch_warnings"
kind      = "semantic"
intent    = "catch_warnings restores the filter state on exit: an \"error\" filter active inside the block is gone afterward, so a later warn no longer raises"

[[case]]
dimension = "behavior"
case      = "ignore_filter_suppresses"
subject   = "warnings.simplefilter"
kind      = "semantic"
intent    = "simplefilter(\"ignore\") suppresses warnings so a record=True catch_warnings collects nothing"

# --- WarningMessage attributes ---------------------------------------------

[[case]]
dimension = "behavior"
case      = "warningmessage_attribute_types"
subject   = "warnings.WarningMessage"
kind      = "semantic"
module    = "warnings"
intent    = "a recorded WarningMessage exposes category (Warning subclass), message (text), lineno (int) and filename (str) with the correct types"

# --- filter actions: always / once (from behavior.py) ----------------------

[[case]]
dimension = "behavior"
case      = "always_captures_every_occurrence"
subject   = "warnings.simplefilter"
kind      = "semantic"
intent    = "simplefilter(\"always\") captures every occurrence: warning the same message 5 times records 5 messages"

[[case]]
dimension = "behavior"
case      = "once_captures_first_occurrence_only"
subject   = "warnings.simplefilter"
kind      = "semantic"
intent    = "simplefilter(\"once\") collapses identical repeats: warning the same message 5 times records exactly 1"

# --- filterwarnings filtering by category / message (from behavior.py) -----

[[case]]
dimension = "behavior"
case      = "filterwarnings_filters_by_category"
subject   = "warnings.filterwarnings"
kind      = "semantic"
intent    = "filterwarnings(\"ignore\", category=DeprecationWarning) drops DeprecationWarning while a concurrent UserWarning is still captured"

[[case]]
dimension = "behavior"
case      = "filterwarnings_filters_by_message_regex"
subject   = "warnings.filterwarnings"
kind      = "semantic"
intent    = "filterwarnings(\"ignore\", message=\".*skip_me.*\") drops messages matching the regex while non-matching messages are kept"

# --- reset / category inference (from behavior.py) -------------------------

[[case]]
dimension = "behavior"
case      = "resetwarnings_clears_filters"
subject   = "warnings.resetwarnings"
kind      = "semantic"
intent    = "resetwarnings() clears installed filters so a subsequent simplefilter(\"always\") + warn is captured again"

[[case]]
dimension = "behavior"
case      = "future_warning_category_captured"
subject   = "warnings.warn"
kind      = "semantic"
intent    = "warn(msg, FutureWarning) records a WarningMessage whose category is a FutureWarning subclass"

# --- warn() call shapes (from warn_forms.py) -------------------------------

[[case]]
dimension = "behavior"
case      = "warn_defaults_to_userwarning"
subject   = "warnings.warn"
kind      = "semantic"
intent    = "a bare-string warn() with no category defaults the recorded category to UserWarning"

[[case]]
dimension = "behavior"
case      = "warn_instance_infers_category"
subject   = "warnings.warn"
kind      = "semantic"
intent    = "warn(DeprecationWarning(\"...\")) infers the category from the instance and keeps the instance as the recorded message object"

[[case]]
dimension = "behavior"
case      = "warn_stacklevel_records_location"
subject   = "warnings.warn"
kind      = "semantic"
intent    = "warn(msg, UserWarning, stacklevel=2) emitted from a helper still records well-typed lineno (int) and filename (str) location fields"

[[case]]
dimension = "behavior"
case      = "filter_precedence_first_match_wins"
subject   = "warnings.filterwarnings"
kind      = "semantic"
intent    = "filters are an ordered list; append=False prepends so a front \"ignore\" wins over a later \"error\", suppressing the warning"

# --- de-duplication / warn_explicit (from dedup.py) ------------------------

[[case]]
dimension = "behavior"
case      = "warn_explicit_default_emits_once_per_location"
subject   = "warnings.warn_explicit"
kind      = "semantic"
intent    = "under the \"default\" action, repeated warn_explicit at the same (message, category, location) with a shared registry emits only once and populates the registry"

[[case]]
dimension = "behavior"
case      = "warn_explicit_distinct_locations_each_emit"
subject   = "warnings.warn_explicit"
kind      = "semantic"
intent    = "distinct linenos are distinct registry keys under \"default\", so warn_explicit at two different locations emits twice"

[[case]]
dimension = "behavior"
case      = "module_action_emits_once"
subject   = "warnings.simplefilter"
kind      = "semantic"
intent    = "the \"module\" action collapses repeats of the same warning from one module to a single emission across 5 warns"

[[case]]
dimension = "behavior"
case      = "once_action_emits_once"
subject   = "warnings.simplefilter"
kind      = "semantic"
intent    = "the \"once\" action collapses identical repeats globally to a single emission across 5 warns"

# --- formatwarning / showwarning rendering (from formatting.py) ------------

[[case]]
dimension = "behavior"
case      = "formatwarning_renders_canonical_line"
subject   = "warnings.formatwarning"
kind      = "semantic"
intent    = "formatwarning renders '<file>:<lineno>: <Category>: <message>\\n' exactly, e.g. 'app.py:42: UserWarning: disk low\\n'"

[[case]]
dimension = "behavior"
case      = "formatwarning_appends_source_line"
subject   = "warnings.formatwarning"
kind      = "semantic"
intent    = "the optional line= source argument is appended on its own line indented two spaces after the canonical warning line"

[[case]]
dimension = "behavior"
case      = "showwarning_override_intercepts"
subject   = "warnings.showwarning"
kind      = "semantic"
intent    = "warn() dispatches through warnings.showwarning, so replacing the hook intercepts every warning's rendered fields; the original hook is restored afterward"

# ===========================================================================
# REAL_WORLD — semantic
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "deprecation_shim_workflow"
subject   = "warnings"
kind      = "semantic"
intent    = "a library deprecates an old API: the shim raises DeprecationWarning via warn(stacklevel=2); a consumer uses catch_warnings(record=True) + simplefilter to assert the warning fires once with the right category and message, then confirms the new API is warning-free"
