# Manifest for the stdlib `zoneinfo` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/zoneinfo/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py,
# preserving all coverage and expanding it into one-case files. The CPython
# 3.12 oracle is Lib/test/test_zoneinfo/. `ZoneInfo` / `ZoneInfoNotFoundError`
# / `InvalidTZPathWarning` are CapWords so the import inferer stops short of a
# usable module — those cases set `module = "zoneinfo"` explicitly.

bucket = "std-libs"
lib    = "zoneinfo"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_zoneinfo"
subject   = "zoneinfo"
kind      = "mechanical"
probe     = "attr"
attr      = "ZoneInfo"

[[case]]
dimension = "surface"
case      = "zoneinfo_class_is_callable"
subject   = "zoneinfo.ZoneInfo"
kind      = "mechanical"
probe     = "callable"
module    = "zoneinfo"

[[case]]
dimension = "surface"
case      = "available_timezones_is_callable"
subject   = "zoneinfo.available_timezones"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "reset_tzpath_is_callable"
subject   = "zoneinfo.reset_tzpath"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "from_file_is_callable"
subject   = "zoneinfo.ZoneInfo.from_file"
kind      = "mechanical"
probe     = "callable"
module    = "zoneinfo"

[[case]]
dimension = "surface"
case      = "no_cache_is_callable"
subject   = "zoneinfo.ZoneInfo.no_cache"
kind      = "mechanical"
probe     = "callable"
module    = "zoneinfo"

[[case]]
dimension = "surface"
case      = "clear_cache_is_callable"
subject   = "zoneinfo.ZoneInfo.clear_cache"
kind      = "mechanical"
probe     = "callable"
module    = "zoneinfo"

[[case]]
dimension = "surface"
case      = "tzpath_attr"
subject   = "zoneinfo"
kind      = "mechanical"
probe     = "attr"
attr      = "TZPATH"

[[case]]
dimension = "surface"
case      = "not_found_error_attr"
subject   = "zoneinfo"
kind      = "mechanical"
probe     = "attr"
attr      = "ZoneInfoNotFoundError"

[[case]]
dimension = "surface"
case      = "invalid_tz_path_warning_attr"
subject   = "zoneinfo"
kind      = "mechanical"
probe     = "attr"
attr      = "InvalidTZPathWarning"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc -> assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "unknown_zone_raises_not_found"
subject    = "zoneinfo.ZoneInfo"
kind       = "mechanical"
call       = 'zoneinfo.ZoneInfo("No/Such/Timezone")'
expect_exc = "zoneinfo.ZoneInfoNotFoundError"
module     = "zoneinfo"
source     = "Lib/test/test_zoneinfo/test_zoneinfo.py"

[[case]]
dimension  = "errors"
case       = "path_traversal_key_raises_value_error"
subject    = "zoneinfo.ZoneInfo"
kind       = "mechanical"
call       = 'zoneinfo.ZoneInfo("../etc/passwd")'
expect_exc = "ValueError"
module     = "zoneinfo"
source     = "Lib/test/test_zoneinfo/test_zoneinfo.py"

[[case]]
dimension  = "errors"
case       = "not_found_caught_as_keyerror"
subject    = "zoneinfo.ZoneInfoNotFoundError"
kind       = "mechanical"
call       = 'zoneinfo.ZoneInfo("No/Such/Timezone")'
expect_exc = "KeyError"
module     = "zoneinfo"
source     = "Lib/test/test_zoneinfo/test_zoneinfo.py"

[[case]]
dimension  = "errors"
case       = "from_file_missing_raises"
subject    = "zoneinfo.ZoneInfo.from_file"
kind       = "mechanical"
call       = 'zoneinfo.ZoneInfo.from_file(open("/no/such/tz/file", "rb"), key="X")'
expect_exc = "FileNotFoundError"
module     = "zoneinfo"
source     = "Lib/test/test_zoneinfo/test_zoneinfo.py"

# ===========================================================================
# BEHAVIOR — semantic (observable behavior matches CPython)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "import_succeeds"
subject   = "zoneinfo"
kind      = "semantic"
intent    = "the module imports and exposes its public surface (ZoneInfo, available_timezones, TZPATH)"
source    = "Lib/test/test_zoneinfo/test_zoneinfo.py"

[[case]]
dimension = "behavior"
case      = "utc_zone_zero_offset"
subject   = "zoneinfo.ZoneInfo"
kind      = "semantic"
intent    = "ZoneInfo('UTC') yields a zero utcoffset, zero dst, and tzname 'UTC' for any datetime"
module    = "zoneinfo"
source    = "Lib/test/test_zoneinfo/test_zoneinfo.py"

[[case]]
dimension = "behavior"
case      = "key_attribute_roundtrip"
subject   = "zoneinfo.ZoneInfo"
kind      = "semantic"
intent    = "a constructed ZoneInfo carries its lookup key on .key and str() returns that key"
module    = "zoneinfo"
source    = "Lib/test/test_zoneinfo/test_zoneinfo.py"

[[case]]
dimension = "behavior"
case      = "dst_transition_offsets"
subject   = "zoneinfo.ZoneInfo"
kind      = "semantic"
intent    = "America/New_York reports EST/-5h in January and EDT/-4h with a 1h dst in July"
module    = "zoneinfo"
source    = "Lib/test/test_zoneinfo/test_zoneinfo.py"

[[case]]
dimension = "behavior"
case      = "construction_is_cached"
subject   = "zoneinfo.ZoneInfo"
kind      = "semantic"
intent    = "repeated ZoneInfo(key) returns the same cached instance; no_cache(key) returns a distinct one"
module    = "zoneinfo"
source    = "Lib/test/test_zoneinfo/test_zoneinfo.py"

[[case]]
dimension = "behavior"
case      = "available_timezones_returns_set"
subject   = "zoneinfo.available_timezones"
kind      = "semantic"
intent    = "available_timezones() returns a non-empty set of str keys that includes the well-known UTC zone"
source    = "Lib/test/test_zoneinfo/test_zoneinfo.py"

[[case]]
dimension = "behavior"
case      = "invalid_tz_path_is_runtime_warning"
subject   = "zoneinfo.InvalidTZPathWarning"
kind      = "semantic"
intent    = "InvalidTZPathWarning is a subclass of RuntimeWarning so callers can filter it as a warning"
module    = "zoneinfo"
source    = "Lib/test/test_zoneinfo/test_zoneinfo.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "aware_datetime_conversion_between_zones"
subject   = "zoneinfo.ZoneInfo"
kind      = "semantic"
intent    = "a downstream app builds a UTC-aware datetime and converts it to America/New_York and Asia/Tokyo, asserting the localized wall-clock times"
module    = "zoneinfo"
source    = "Lib/test/test_zoneinfo/test_zoneinfo.py"

# ===========================================================================
# SECURITY — semantic (adversarial / untrusted-input case)
# ===========================================================================

[[case]]
dimension = "security"
case      = "untrusted_key_path_traversal_rejected"
subject   = "zoneinfo.ZoneInfo"
kind      = "semantic"
intent    = "untrusted zone keys with traversal/absolute components ('../etc/passwd', '/etc/passwd') are rejected, never escaping TZPATH to read arbitrary files"
module    = "zoneinfo"
source    = "Lib/test/test_zoneinfo/test_zoneinfo.py"
