# ===========================================================================
# ERRORS — mechanical (call + expect_exc; single self-contained expression)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "make_archive_bad_format_raises"
subject    = "shutil.make_archive"
kind       = "mechanical"
call       = "shutil.make_archive(\"/tmp/mamba_shutil_test_archive\", \"no_such_format\")"
expect_exc = "ValueError"
source     = "Lib/test/test_shutil.py"

[[case]]
dimension  = "errors"
case       = "disk_usage_missing_path_raises"
subject    = "shutil.disk_usage"
kind       = "mechanical"
call       = "shutil.disk_usage(\"/no/such/path_for_usage\")"
expect_exc = "FileNotFoundError"
source     = "Lib/test/test_shutil.py"

[[case]]
dimension  = "errors"
case       = "rmtree_missing_path_raises"
subject    = "shutil.rmtree"
kind       = "mechanical"
call       = "shutil.rmtree(\"/no/such/path_to_rmtree\")"
expect_exc = "FileNotFoundError"
source     = "Lib/test/test_shutil.py"

[[case]]
dimension  = "errors"
case       = "register_archive_format_noncallable_raises"
subject    = "shutil.register_archive_format"
kind       = "mechanical"
call       = "shutil.register_archive_format(\"mamba_bad_fmt\", 1)"
expect_exc = "TypeError"
source     = "Lib/test/test_shutil.py"

[[case]]
dimension  = "errors"
case       = "register_archive_format_bad_extra_args_raises"
subject    = "shutil.register_archive_format"
kind       = "mechanical"
call       = "shutil.register_archive_format(\"mamba_bad_extra\", lambda: None, [(1, 2), (1, 2, 3)])"
expect_exc = "TypeError"
source     = "Lib/test/test_shutil.py"

# ===========================================================================
# ERRORS — semantic (tempdir / symlink / fifo setup beyond a single expr,
# plus the ignore_errors=True swallow path)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "copy_missing_source_raises"
subject   = "shutil.copy"
kind      = "semantic"
intent    = "copy() of a non-existent source path raises FileNotFoundError (set up in a TemporaryDirectory)"
source    = "Lib/test/test_shutil.py"

[[case]]
dimension = "errors"
case      = "copytree_existing_dest_raises"
subject   = "shutil.copytree"
kind      = "semantic"
intent    = "copytree() onto an already-existing destination directory raises FileExistsError (both dirs in a TemporaryDirectory)"
source    = "Lib/test/test_shutil.py"

[[case]]
dimension = "errors"
case      = "move_missing_source_raises"
subject   = "shutil.move"
kind      = "semantic"
intent    = "move() of a non-existent source path raises FileNotFoundError (set up in a TemporaryDirectory)"
source    = "Lib/test/test_shutil.py"

[[case]]
dimension = "errors"
case      = "rmtree_ignore_errors_swallows"
subject   = "shutil.rmtree"
kind      = "semantic"
intent    = "rmtree(nonexistent, ignore_errors=True) swallows the FileNotFoundError and returns without raising"
source    = "Lib/test/test_shutil.py"

[[case]]
dimension = "errors"
case      = "copyfile_same_file_symlink_raises"
subject   = "shutil.copyfile"
kind      = "semantic"
intent    = "copyfile() of a file onto a symlink that points back to it raises shutil.SameFileError (src + dst symlink built in a TemporaryDirectory)"
source    = "Lib/test/test_shutil.py"

[[case]]
dimension = "errors"
case      = "rmtree_symlink_raises"
subject   = "shutil.rmtree"
kind      = "semantic"
intent    = "rmtree() refuses to follow a symlink-to-directory and raises OSError instead of deleting the link target (TemporaryDirectory)"
source    = "Lib/test/test_shutil.py"

[[case]]
dimension = "errors"
case      = "rmtree_fifo_raises"
subject   = "shutil.rmtree"
kind      = "semantic"
intent    = "rmtree() on a named pipe (FIFO) raises NotADirectoryError on POSIX; guarded by hasattr(os, 'mkfifo') so non-POSIX platforms exit 0 via a skip path"
source    = "Lib/test/test_shutil.py"

# ===========================================================================
# BEHAVIOR — semantic (observable file-operation semantics; all sandboxed in
# a TemporaryDirectory or in-memory BytesIO)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "copyfile_binary_roundtrip"
subject   = "shutil.copyfile"
kind      = "semantic"
intent    = "copyfile copies a 256-byte binary file byte-for-byte; the destination reads back identical to the source"
source    = "Lib/test/test_shutil.py"

[[case]]
dimension = "behavior"
case      = "copy_preserves_permissions"
subject   = "shutil.copy"
kind      = "semantic"
intent    = "copy() copies content and permission bits; a 0o644 source yields a 0o644 destination (stat.S_IMODE)"
source    = "Lib/test/test_shutil.py"

[[case]]
dimension = "behavior"
case      = "copy2_returns_dest_path"
subject   = "shutil.copy2"
kind      = "semantic"
intent    = "copy2() returns the destination path string and the destination file exists after the copy"
source    = "Lib/test/test_shutil.py"

[[case]]
dimension = "behavior"
case      = "move_renames_file"
subject   = "shutil.move"
kind      = "semantic"
intent    = "move() relocates a file: the source path disappears, the destination appears, and the content is preserved"
source    = "Lib/test/test_shutil.py"

[[case]]
dimension = "behavior"
case      = "rmtree_removes_nested"
subject   = "shutil.rmtree"
kind      = "semantic"
intent    = "rmtree removes a deeply nested directory tree (a/b/c with a file) so the top-level directory no longer exists"
