[[case]]
dimension = "behavior"
case      = "copytree_copies_tree"
subject   = "shutil.copytree"
kind      = "semantic"
intent    = "copytree recreates a directory tree (a top-level file plus a subdir file) at the destination with identical content"
source    = "Lib/test/test_shutil.py"

[[case]]
dimension = "behavior"
case      = "copyfileobj_streams"
subject   = "shutil.copyfileobj"
kind      = "semantic"
intent    = "copyfileobj copies bytes from one file-like object to another; an io.BytesIO source content lands verbatim in the destination BytesIO"
