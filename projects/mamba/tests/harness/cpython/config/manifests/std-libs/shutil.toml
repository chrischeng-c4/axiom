[[case]]
dimension = "behavior"
case      = "disk_usage_total_invariant"
subject   = "shutil.disk_usage"
kind      = "semantic"
intent    = "disk_usage('/') returns a (total, used, free) named tuple with total > 0 and total == used + free"
