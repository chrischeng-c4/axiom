# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "snapshot_archive_restore_cycle"
subject   = "shutil"
kind      = "semantic"
intent    = "a backup tool stages a project tree, copytree-snapshots it, make_archive packs the snapshot to a zip, unpack_archive restores it into a fresh dir, and the restored content matches the original; rmtree cleans up — all inside one TemporaryDirectory"
source    = "Lib/test/test_shutil.py"
