# Manifest for the stdlib `shutil` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/shutil/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the retired root monoliths (surface.py / behavior.py /
# errors.py) and the loose feature file terminal_size.py. bench/ (which_hot.py)
# is left as-is. All cases were CPython-3.12-green in the monoliths and carried
# no `# mamba-xfail` directive, so every case is xfail="" here.
#
# Authoring notes (mamba gotchas, this lib):
#   - filesystem cases all go through tempfile.TemporaryDirectory (no system
#     mutation; symlink/fifo cases guarded by hasattr where POSIX-only).
#   - `shutil.SameFileError` is a CapWords leaf, so import inference stops at
#     `shutil` and emits `import shutil` correctly (no module= needed).

bucket = "std-libs"
lib = "shutil"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_shutil"
subject   = "shutil"
kind      = "mechanical"
probe     = "attr"
attr      = "which"

