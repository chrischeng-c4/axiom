# Manifest for the stdlib `http.client` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/http_client/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the real_world placeholder. The lib's dotted submodule is `http.client`, so
# class/exception subjects set an explicit `module = "http.client"` (the import
# inferer stops at the first CapWords component and cannot recover the dotted
# package).

bucket = "std-libs"
lib = "http_client"

# ===========================================================================
# SURFACE — mechanical probes (attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_http_client"
subject   = "http.client"
kind      = "mechanical"
module    = "http.client"
probe     = "attr"
attr      = "HTTPConnection"

[[case]]
dimension = "surface"
case      = "status_ok_constant"
subject   = "http.client.OK"
kind      = "mechanical"
module    = "http.client"
probe     = "attr"
attr      = "real"

[[case]]
dimension = "surface"
case      = "responses_is_dict"
subject   = "http.client.responses"
kind      = "mechanical"
module    = "http.client"
probe     = "type"
typename  = "dict"

[[case]]
dimension = "surface"
case      = "httpconnection_class_present"
subject   = "http.client.HTTPConnection"
kind      = "mechanical"
module    = "http.client"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "httpsconnection_class_present"
subject   = "http.client.HTTPSConnection"
kind      = "mechanical"
module    = "http.client"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "httpresponse_class_present"
subject   = "http.client.HTTPResponse"
kind      = "mechanical"
module    = "http.client"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "httpexception_class_present"
subject   = "http.client.HTTPException"
kind      = "mechanical"
module    = "http.client"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "invalidurl_class_present"
subject   = "http.client.InvalidURL"
kind      = "mechanical"
module    = "http.client"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "remotedisconnected_class_present"
subject   = "http.client.RemoteDisconnected"
kind      = "mechanical"
module    = "http.client"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "parse_headers_is_callable"
subject   = "http.client.parse_headers"
kind      = "mechanical"
module    = "http.client"
probe     = "callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc), all network-free
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "putrequest_control_char_url_raises_invalidurl"
subject    = "http.client.HTTPConnection"
kind       = "mechanical"
module     = "http.client"
call       = "http.client.HTTPConnection(\"example.com\").putrequest(\"GET\", \"/foo\\r\\nHost: evil\")"
expect_exc = "http.client.InvalidURL"
source     = "Lib/test/test_httplib.py"

[[case]]
dimension  = "errors"
case       = "putrequest_control_char_method_raises_valueerror"
subject    = "http.client.HTTPConnection"
kind       = "mechanical"
module     = "http.client"
call       = "http.client.HTTPConnection(\"example.com\").putrequest(\"BAD\\nMETHOD\", \"/\")"
expect_exc = "ValueError"
source     = "Lib/test/test_httplib.py"

[[case]]
dimension  = "errors"
case       = "putheader_before_putrequest_raises_cannotsendheader"
subject    = "http.client.HTTPConnection"
kind       = "mechanical"
module     = "http.client"
call       = "http.client.HTTPConnection(\"example.com\").putheader(\"X\", \"y\")"
expect_exc = "http.client.CannotSendHeader"
source     = "Lib/test/test_httplib.py"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- status constants -----------------------------------------------------

[[case]]
dimension = "behavior"
case      = "status_constants_equal_int_values"
subject   = "http.client.OK"
kind      = "semantic"
module    = "http.client"
intent    = "the named status constants (OK, CREATED, NO_CONTENT, BAD_REQUEST, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, INTERNAL_SERVER_ERROR) compare equal to their canonical integer codes"
source    = "Lib/test/test_httplib.py"

[[case]]
dimension = "behavior"
case      = "status_constants_support_int_arithmetic"
subject   = "http.client.OK"
kind      = "semantic"
module    = "http.client"
intent    = "status constants behave as ints under arithmetic: NOT_FOUND - OK == 204 and INTERNAL_SERVER_ERROR - BAD_REQUEST == 100"

[[case]]
dimension = "behavior"
case      = "http_port_https_port_defaults"
subject   = "http.client.HTTP_PORT"
kind      = "semantic"
module    = "http.client"
intent    = "the default port constants are HTTP_PORT == 80 and HTTPS_PORT == 443"

# --- responses table ------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "responses_maps_codes_to_reason_phrases"
subject   = "http.client.responses"
kind      = "semantic"
module    = "http.client"
intent    = "responses[code] yields the standard reason phrase for each canonical status code (200->'OK', 201->'Created', 404->'Not Found', 500->'Internal Server Error', ...)"
source    = "Lib/test/test_httplib.py"

[[case]]
dimension = "behavior"
case      = "responses_contains_all_standard_codes"
subject   = "http.client.responses"
kind      = "semantic"
module    = "http.client"
intent    = "the responses table contains every common standard status code (200, 201, 204, 206, 301, 302, 304, 400, 401, 403, 404, 405, 500, 503)"

# --- status classification ------------------------------------------------

[[case]]
dimension = "behavior"
case      = "status_code_class_ranges"
subject   = "http.client.OK"
kind      = "semantic"
module    = "http.client"
intent    = "status codes classify by hundreds range: 1xx informational, 2xx success, 3xx redirect, 4xx client error, 5xx server error via integer comparison"

# --- exception hierarchy --------------------------------------------------

[[case]]
dimension = "behavior"
case      = "exception_hierarchy_rooted_at_httpexception"
subject   = "http.client.HTTPException"
kind      = "semantic"
module    = "http.client"
intent    = "HTTPException subclasses Exception, and NotConnected / InvalidURL / UnknownProtocol / BadStatusLine / IncompleteRead all subclass HTTPException"
source    = "Lib/test/test_httplib.py"

# --- exception payloads ---------------------------------------------------

[[case]]
dimension = "behavior"
case      = "incompleteread_exposes_partial_and_expected"
subject   = "http.client.IncompleteRead"
kind      = "semantic"
module    = "http.client"
intent    = "IncompleteRead(partial, expected) stores the bytes read so far on .partial and the missing count on .expected"
source    = "Lib/test/test_httplib.py"

[[case]]
dimension = "behavior"
case      = "badstatusline_carries_offending_line"
subject   = "http.client.BadStatusLine"
kind      = "semantic"
module    = "http.client"
intent    = "BadStatusLine(line) is raisable and its string form carries the offending status line text"

# --- header parsing -------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "parse_headers_empty_yields_empty_message"
subject   = "http.client.parse_headers"
kind      = "semantic"
module    = "http.client"
intent    = "parse_headers on an empty byte stream returns an HTTPMessage with no header fields"

[[case]]
dimension = "behavior"
case      = "parse_headers_reads_field_values"
subject   = "http.client.parse_headers"
kind      = "semantic"
module    = "http.client"
intent    = "parse_headers reads a CRLF-terminated header block into an HTTPMessage whose case-insensitive lookup returns the field values"

# ===========================================================================
# SECURITY — semantic (adversarial / untrusted input, network-free)
# ===========================================================================

[[case]]
dimension = "security"
case      = "crlf_injection_in_request_url_rejected"
subject   = "http.client.HTTPConnection"
kind      = "semantic"
module    = "http.client"
intent    = "an attacker-supplied request URL containing CR/LF (header-injection / request-smuggling attempt) is rejected by putrequest with InvalidURL before any bytes are sent"
source    = "Lib/test/test_httplib.py"

[[case]]
dimension = "security"
case      = "crlf_injection_in_method_rejected"
subject   = "http.client.HTTPConnection"
kind      = "semantic"
module    = "http.client"
intent    = "an attacker-supplied HTTP method containing control characters is rejected by putrequest with ValueError, preventing request-line smuggling"
source    = "Lib/test/test_httplib.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario, network-free)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "status_code_response_router"
subject   = "http.client.responses"
kind      = "semantic"
module    = "http.client"
intent    = "a response-handling router branches on http.client status constants and the responses table to dispatch a batch of (code) results into success / redirect / client-error / server-error buckets with their reason phrases, the way a client library classifies replies"
