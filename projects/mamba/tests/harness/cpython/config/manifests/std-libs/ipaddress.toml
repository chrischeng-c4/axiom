# Manifest for the stdlib `ipaddress` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/ipaddress/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py
# plus the loose feature fixtures format.py / interface.py. Coverage preserved
# verbatim; one observable concern per file. bench/ left untouched.
#
# CapWords subjects (IPv4Address, AddressValueError, ...) carry an explicit
# `module = "ipaddress"` because the import inferer stops at the first CapWords
# component and would otherwise try `import IPv4Address`.

bucket = "std-libs"
lib = "ipaddress"

