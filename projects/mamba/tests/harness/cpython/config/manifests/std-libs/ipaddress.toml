# ===========================================================================
# ERRORS — mechanical (call + expect_exc, generator emits assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "bad_ip_string_raises_valueerror"
subject    = "ipaddress.ip_address"
kind       = "mechanical"
call       = "ipaddress.ip_address(\"not.an.ip\")"
expect_exc = "ValueError"
source     = "Lib/test/test_ipaddress.py"

[[case]]
dimension  = "errors"
case       = "invalid_ipv4_octet_raises_valueerror"
subject    = "ipaddress.ip_address"
kind       = "mechanical"
call       = "ipaddress.ip_address(\"999.0.0.1\")"
expect_exc = "ValueError"
source     = "Lib/test/test_ipaddress.py"

[[case]]
dimension  = "errors"
case       = "ipv4address_octet_over_255_raises"
subject    = "ipaddress.IPv4Address"
kind       = "mechanical"
module     = "ipaddress"
call       = "ipaddress.IPv4Address(\"256.0.0.1\")"
expect_exc = "ipaddress.AddressValueError"
source     = "Lib/test/test_ipaddress.py"

[[case]]
dimension  = "errors"
case       = "ipv6address_bad_colon_raises"
subject    = "ipaddress.IPv6Address"
kind       = "mechanical"
module     = "ipaddress"
call       = "ipaddress.IPv6Address(\":::1\")"
expect_exc = "ipaddress.AddressValueError"
source     = "Lib/test/test_ipaddress.py"

[[case]]
dimension  = "errors"
case       = "prefix_over_32_raises_netmaskvalueerror"
subject    = "ipaddress.IPv4Network"
kind       = "mechanical"
module     = "ipaddress"
call       = "ipaddress.IPv4Network(\"10.0.0.0/40\")"
expect_exc = "ipaddress.NetmaskValueError"
source     = "Lib/test/test_ipaddress.py"

[[case]]
dimension  = "errors"
case       = "strict_host_bits_set_raises_valueerror"
subject    = "ipaddress.IPv4Network"
kind       = "mechanical"
module     = "ipaddress"
call       = "ipaddress.IPv4Network(\"10.0.0.1/24\", strict=True)"
expect_exc = "ValueError"
source     = "Lib/test/test_ipaddress.py"

[[case]]
dimension  = "errors"
case       = "cross_version_address_compare_raises_typeerror"
subject    = "ipaddress.ip_address"
kind       = "mechanical"
call       = "ipaddress.ip_address(\"1.1.1.1\") < ipaddress.ip_address(\"::1\")"
expect_exc = "TypeError"
source     = "Lib/test/test_ipaddress.py"

[[case]]
dimension  = "errors"
case       = "cross_version_network_compare_raises_typeerror"
subject    = "ipaddress.ip_network"
kind       = "mechanical"
call       = "ipaddress.ip_network(\"1.1.1.1/32\") < ipaddress.ip_network(\"::1/128\")"
expect_exc = "TypeError"
source     = "Lib/test/test_ipaddress.py"

[[case]]
dimension  = "errors"
case       = "subnet_of_cross_version_raises_typeerror"
subject    = "ipaddress.IPv4Network"
kind       = "mechanical"
module     = "ipaddress"
call       = "ipaddress.IPv4Network(\"10.0.0.0/30\").subnet_of(ipaddress.IPv6Network(\"::1/128\"))"
expect_exc = "TypeError"
source     = "Lib/test/test_ipaddress.py"

[[case]]
dimension  = "errors"
case       = "supernet_of_cross_version_raises_typeerror"
subject    = "ipaddress.IPv6Network"
kind       = "mechanical"
module     = "ipaddress"
call       = "ipaddress.IPv6Network(\"::1/128\").supernet_of(ipaddress.IPv4Network(\"10.0.0.0/30\"))"
expect_exc = "TypeError"
source     = "Lib/test/test_ipaddress.py"

