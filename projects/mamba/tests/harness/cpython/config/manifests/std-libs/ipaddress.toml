subject   = "ipaddress.IPv4Address"
kind      = "semantic"
module    = "ipaddress"
intent    = "format() on an IPv4Address honors b/x/X, grouping '_', the alternate '#' prefix, 'n' (== 'b'), and 's'/'' textual forms"
