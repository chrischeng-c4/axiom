# ===========================================================================
# BEHAVIOR — semantic (one observable rule each; CPython 3.12 is the oracle)
# ===========================================================================

# --- ip_address dispatch / surface values --------------------------------

[[case]]
dimension = "behavior"
case      = "ip_address_dispatches_ipv4"
subject   = "ipaddress.ip_address"
kind      = "semantic"
intent    = "ip_address of a dotted-quad string returns an IPv4Address whose str, packed, and int forms match the input"

[[case]]
dimension = "behavior"
case      = "ip_address_dispatches_ipv6"
subject   = "ipaddress.ip_address"
kind      = "semantic"
intent    = "ip_address of a colon-hex string returns an IPv6Address whose str is the compressed form"

[[case]]
dimension = "behavior"
case      = "ipv4_version_and_packed_length"
subject   = "ipaddress.ip_address"
kind      = "semantic"
intent    = "an IPv4 address reports version 4, a 4-byte packed form, and its compressed text equals the input"

[[case]]
dimension = "behavior"
case      = "ipv6_version_and_packed_length"
subject   = "ipaddress.ip_address"
kind      = "semantic"
intent    = "an IPv6 address reports version 6, a 16-byte packed form, and compresses ::1 correctly"

[[case]]
dimension = "behavior"
case      = "address_length_constants"
subject   = "ipaddress.IPV4LENGTH"
kind      = "semantic"
module    = "ipaddress"
intent    = "the IPV4LENGTH / IPV6LENGTH bit-width constants are 32 and 128"

