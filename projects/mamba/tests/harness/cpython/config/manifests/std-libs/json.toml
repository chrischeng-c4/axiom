# Manifest for the stdlib `json` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/json/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the loose feature scripts (broad / edges / formatting / *_conformance /
# json_dumps_return / json_edge_cases / json_encode_decode / *_broad), plus the
# recursion_bomb security payload and the real_world placeholder. No coverage
# is dropped; the many redundant dumps/loads print-scripts collapse into the
# behavior rules they were exercising.

bucket = "std-libs"
lib    = "json"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_json"
subject   = "json"
kind      = "mechanical"
probe     = "attr"
attr      = "dumps"

[[case]]
dimension = "surface"
case      = "dumps_is_callable"
subject   = "json.dumps"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "loads_is_callable"
subject   = "json.loads"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "dump_is_callable"
subject   = "json.dump"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "load_is_callable"
subject   = "json.load"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "encoder_is_callable"
subject   = "json.JSONEncoder"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "decoder_is_callable"
subject   = "json.JSONDecoder"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "decodeerror_is_attr"
subject   = "json"
kind      = "mechanical"
probe     = "attr"
attr      = "JSONDecodeError"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc), assert-it-raised
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "loads_truncated_object_raises"
subject    = "json.loads"
kind       = "mechanical"
call       = 'json.loads("{")'
expect_exc = "json.JSONDecodeError"
source     = "Lib/test/json/test_fail.py"

[[case]]
dimension  = "errors"
case       = "loads_bare_identifier_raises"
subject    = "json.loads"
kind       = "mechanical"
call       = 'json.loads("undefined")'
expect_exc = "json.JSONDecodeError"
source     = "Lib/test/json/test_fail.py"

[[case]]
dimension  = "errors"
case       = "loads_trailing_garbage_raises"
subject    = "json.loads"
kind       = "mechanical"
call       = 'json.loads("{} extra")'
expect_exc = "json.JSONDecodeError"
source     = "Lib/test/json/test_fail.py"

[[case]]
dimension  = "errors"
case       = "loads_invalid_token_raises"
subject    = "json.loads"
kind       = "mechanical"
call       = 'json.loads("{invalid}")'
expect_exc = "json.JSONDecodeError"
source     = "Lib/test/json/test_fail.py"

[[case]]
dimension  = "errors"
case       = "dumps_unserializable_object_raises"
subject    = "json.dumps"
kind       = "mechanical"
call       = "json.dumps(object())"
expect_exc = "TypeError"
source     = "Lib/test/json/test_dump.py"

[[case]]
dimension  = "errors"
case       = "dumps_bytes_raises"
subject    = "json.dumps"
kind       = "mechanical"
call       = 'json.dumps(b"bytes are not json")'
expect_exc = "TypeError"
source     = "Lib/test/json/test_dump.py"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "dumps_scalar_type_mapping"
subject   = "json.dumps"
kind      = "semantic"
intent    = "Python scalars map to JSON tokens: True->true, False->false, None->null, int->number, float->number, str->quoted"
source    = "Lib/test/json/test_pass1.py"

[[case]]
dimension = "behavior"
case      = "loads_scalar_type_mapping"
subject   = "json.loads"
kind      = "semantic"
intent    = "JSON tokens map back to Python types: true is True, false is False, null is None, integer->int, decimal->float"
source    = "Lib/test/json/test_pass1.py"

[[case]]
dimension = "behavior"
case      = "nested_structure_roundtrip"
subject   = "json.loads"
kind      = "semantic"
intent    = "a deeply nested dict/list/scalar tree survives dumps->loads byte-for-value round-trip unchanged"
source    = "Lib/test/json/test_pass1.py"

[[case]]
dimension = "behavior"
case      = "mixed_array_roundtrip"
subject   = "json.dumps"
kind      = "semantic"
intent    = "a heterogeneous array of int/str/float/bool/None/dict round-trips through dumps->loads unchanged"
source    = "Lib/test/json/test_pass1.py"

[[case]]
dimension = "behavior"
case      = "empty_containers_roundtrip"
subject   = "json.dumps"
kind      = "semantic"
intent    = "empty list and empty dict serialize to [] and {} and load back to equal empty containers"

[[case]]
dimension = "behavior"
case      = "sort_keys_orders_object"
subject   = "json.dumps"
kind      = "semantic"
intent    = "sort_keys=True emits object keys in deterministic ascending order regardless of insertion order"
source    = "Lib/test/json/test_separators.py"

[[case]]
dimension = "behavior"
case      = "separators_compact_output"
subject   = "json.dumps"
kind      = "semantic"
intent    = "separators=(',',':') drops all inter-token whitespace producing the most compact serialization"
source    = "Lib/test/json/test_separators.py"

[[case]]
dimension = "behavior"
case      = "indent_int_pretty_prints"
subject   = "json.dumps"
kind      = "semantic"
intent    = "integer indent emits a newline plus N spaces per nesting level and never leaves trailing whitespace on a line"
source    = "Lib/test/json/test_indent.py"

[[case]]
dimension = "behavior"
case      = "indent_string_tab"
subject   = "json.dumps"
kind      = "semantic"
intent    = "a string indent of a tab indents each level with a literal tab character (json.tool --tab equivalent)"
source    = "Lib/test/json/test_indent.py"

[[case]]
dimension = "behavior"
case      = "indent_zero_keeps_newlines"
subject   = "json.dumps"
kind      = "semantic"
intent    = "indent=0 still emits newlines between items but with no leading spaces"
source    = "Lib/test/json/test_indent.py"

[[case]]
dimension = "behavior"
case      = "ensure_ascii_escaping"
subject   = "json.dumps"
kind      = "semantic"
intent    = "non-ASCII characters are \\uXXXX-escaped by default but emitted verbatim when ensure_ascii=False; both round-trip"
source    = "Lib/test/json/test_unicode.py"

[[case]]
dimension = "behavior"
case      = "float_token_parsing"
subject   = "json.loads"
kind      = "semantic"
intent    = "exponent and signed-zero float tokens parse correctly: 1e2 is 100.0 and -0.0 equals 0.0"
source    = "Lib/test/json/test_float.py"

[[case]]
dimension = "behavior"
case      = "large_integer_roundtrip"
subject   = "json.dumps"
kind      = "semantic"
intent    = "a large integer (10**15) survives the dumps->loads round-trip with exact value and int type preserved"

[[case]]
dimension = "behavior"
case      = "string_escape_roundtrip"
subject   = "json.dumps"
kind      = "semantic"
intent    = "embedded quote, backslash, and newline characters are escaped on dump and restored verbatim on load"
source    = "Lib/test/json/test_scanstring.py"

[[case]]
dimension = "behavior"
case      = "custom_encoder_default_hook"
subject   = "json.JSONEncoder"
kind      = "semantic"
intent    = "a JSONEncoder subclass overriding default() serializes an otherwise-unsupported type (a set encoded as a sorted list)"
source    = "Lib/test/json/test_default.py"
module    = "json"

[[case]]
dimension = "behavior"
case      = "decode_error_attributes"
subject   = "json.JSONDecodeError"
kind      = "semantic"
intent    = "a JSONDecodeError raised by loads exposes msg/pos/lineno/colno locating the malformed token"
source    = "Lib/test/json/test_fail.py"
module    = "json"

# ===========================================================================
# REAL_WORLD — semantic end-to-end integration
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "api_surface_walkthrough"
subject   = "json"
kind      = "semantic"
intent    = "a downstream consumer drives dumps/loads/JSONEncoder/sort_keys/indent/separators together over a realistic config record, asserting each result and a deterministic round-trip"
source    = "Lib/test/json/test_pass1.py"

# ===========================================================================
# SECURITY — semantic adversarial / untrusted input
# ===========================================================================

[[case]]
dimension    = "security"
case         = "recursion_bomb_raises_not_crash"
subject      = "json.JSONDecoder"
kind         = "semantic"
intent       = "a deeply nested JSON payload (['*N + ]'*N) drives the pure-Python scanner past sys.getrecursionlimit() and must raise a catchable RecursionError rather than crashing the interpreter"
source       = "Lib/test/json/test_recursion.py"
module       = "json"
xfail        = "deep recursion aborts the process (fatal runtime error: stack overflow) instead of raising RecursionError; mamba enforces no recursion limit, and json.JSONDecoder is an integer-handle stub with no scan_once / json.scanner submodule (src/runtime/stdlib/json_mod.rs:281,409)"
