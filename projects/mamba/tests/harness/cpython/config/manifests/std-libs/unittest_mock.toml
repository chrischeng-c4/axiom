# Manifest for the stdlib `unittest.mock` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/unittest_mock/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py,
# real_world/_stub.py). bench/ is left as-is.
#
# Import note (mamba/CPython gotcha): the subject lives in the dotted submodule
# `unittest.mock`. The import inferer stops at the first CapWords component and
# would emit `import unittest` (which does NOT make `unittest.mock` resolvable),
# so every mechanical case pins `module = "unittest.mock"`. Semantic fixtures
# use `from unittest.mock import ...` (mamba's submodule dotted-access is a
# known parity gap; from-imports resolve on both runtimes).

bucket = "std-libs"
lib = "unittest_mock"

