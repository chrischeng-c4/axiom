# ===========================================================================
# ERRORS — mechanical (single-expression call + expect_exc)
#
# The mechanical errors template wraps one `call` line in try/except and
# asserts the exception fired. Setup-requiring paths (call-then-assert,
# patch.object as a `with`) are expressed as SEMANTIC errors below.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "assert_called_never_called_raises"
subject    = "unittest.mock.Mock.assert_called"
kind       = "mechanical"
call       = "unittest.mock.MagicMock().assert_called()"
expect_exc = "AssertionError"
module     = "unittest.mock"
source     = "Lib/test/test_unittest/testmock/testmock.py"

[[case]]
dimension  = "errors"
case       = "assert_called_once_with_no_call_raises"
subject    = "unittest.mock.Mock.assert_called_once_with"
kind       = "mechanical"
call       = "unittest.mock.MagicMock().assert_called_once_with(42)"
expect_exc = "AssertionError"
module     = "unittest.mock"
source     = "Lib/test/test_unittest/testmock/testmock.py"

[[case]]
dimension  = "errors"
case       = "plain_mock_len_raises"
subject    = "unittest.mock.Mock"
kind       = "mechanical"
call       = "len(unittest.mock.Mock())"
expect_exc = "TypeError"
module     = "unittest.mock"
source     = "Lib/test/test_unittest/testmock/testmock.py"

