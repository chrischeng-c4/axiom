# Manifest for the stdlib `io` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/io/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py, the
# loose feature scripts closed_stream.py, file_open_errors.py, file_open_modes.py,
# io_conformance.py(+.expected), io_ops.py(+.expected), text_encoding.py,
# text_wrapper.py, and the real_world placeholder. bench/ (io_type_read_hot.py)
# is left as-is.
#
# `io` is a flat module (no dotted submodule), so the import inferer recovers
# `import io` for every class/constant subject (it stops at the first CapWords
# component, e.g. `io.BytesIO` -> module `io`). No explicit `module=` needed.

bucket = "std-libs"
lib = "io"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_io"
subject   = "io"
kind      = "mechanical"
probe     = "attr"
attr      = "StringIO"

[[case]]
dimension = "surface"
case      = "stringio_is_callable"
subject   = "io.StringIO"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "bytesio_is_callable"
subject   = "io.BytesIO"
kind      = "mechanical"
probe     = "callable"

[[case]]
