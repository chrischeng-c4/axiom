[[case]]
dimension = "errors"
case      = "open_invalid_mode_raises"
subject   = "io.open"
kind      = "semantic"
intent    = "open() with a nonsensical mode string ('rwax+') raises ValueError"
source    = "Lib/test/test_io.py"

[[case]]
dimension = "errors"
case      = "open_exclusive_existing_raises"
subject   = "io.open"
kind      = "semantic"
intent    = "open(path, 'x') on an already-existing file raises FileExistsError"
