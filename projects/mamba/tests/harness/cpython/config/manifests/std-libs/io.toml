# ===========================================================================
# SURFACE — semantic (class-hierarchy / type-identity probes that go beyond
# the plain attr/callable mechanical template)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "stringio_instance_is_textiobase"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "io.StringIO() is an instance of io.StringIO and of io.TextIOBase"

[[case]]
dimension = "surface"
case      = "bytesio_instance_is_bufferediobase"
subject   = "io.BytesIO"
kind      = "semantic"
