subject   = "io.TextIOWrapper"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "bufferedreader_is_callable"
subject   = "io.BufferedReader"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "bufferedwriter_is_callable"
subject   = "io.BufferedWriter"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "iobase_present"
subject   = "io"
kind      = "mechanical"
probe     = "attr"
attr      = "IOBase"

[[case]]
dimension = "surface"
case      = "textiobase_present"
subject   = "io"
kind      = "mechanical"
probe     = "attr"
attr      = "TextIOBase"

[[case]]
dimension = "surface"
case      = "rawiobase_present"
subject   = "io"
kind      = "mechanical"
probe     = "attr"
attr      = "RawIOBase"

[[case]]
dimension = "surface"
case      = "bufferediobase_present"
subject   = "io"
kind      = "mechanical"
probe     = "attr"
attr      = "BufferedIOBase"

[[case]]
dimension = "surface"
case      = "unsupportedoperation_present"
subject   = "io"
kind      = "mechanical"
probe     = "attr"
attr      = "UnsupportedOperation"

[[case]]
dimension = "surface"
case      = "open_is_callable"
