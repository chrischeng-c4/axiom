[[case]]
dimension = "errors"
case      = "open_closefd_false_filename_raises"
subject   = "io.open"
kind      = "semantic"
intent    = "open(path, closefd=False) raises ValueError because closefd=False is only valid for an existing fd, not a filename"
source    = "Lib/test/test_io.py"

[[case]]
dimension = "errors"
case      = "open_nul_in_path_raises"
subject   = "io.open"
kind      = "semantic"
