[[case]]
dimension = "surface"
case      = "stringio_subclasses_iobase"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "io.StringIO and io.BytesIO are both subclasses of io.IOBase"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

# --- seek constants -------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "seek_constants_values"
subject   = "io.SEEK_SET"
kind      = "semantic"
intent    = "the seek-origin constants are SEEK_SET == 0, SEEK_CUR == 1, SEEK_END == 2"

# --- StringIO -------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "stringio_write_returns_char_count"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "StringIO.write returns the number of characters written (write('hello') -> 5)"

[[case]]
dimension = "behavior"
case      = "stringio_seek0_read_full"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "after writing then seek(0), read() returns the full buffer contents"

[[case]]
dimension = "behavior"
case      = "stringio_read_n_caps_chars"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "read(n) returns at most n characters from the current position"

[[case]]
dimension = "behavior"
case      = "stringio_getvalue_ignores_position"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "getvalue() returns the entire buffer regardless of the current read/write position"

[[case]]
dimension = "behavior"
case      = "stringio_getvalue_without_seek"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "getvalue() returns written content without needing a prior seek(0)"

[[case]]
dimension = "behavior"
case      = "stringio_tell_tracks_position"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "tell() starts at 0, advances by characters read, and returns to 0 after seek(0)"

[[case]]
dimension = "behavior"
case      = "stringio_readable_writable_seekable"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "a StringIO reports readable(), writable(), and seekable() all True"

[[case]]
dimension = "behavior"
case      = "stringio_readline_yields_line"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "readline() returns the next line including its trailing newline"

[[case]]
dimension = "behavior"
case      = "stringio_iteration_yields_lines"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "iterating a StringIO yields each line (newline-terminated) in order"

[[case]]
dimension = "behavior"
case      = "stringio_truncate_shrinks"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "truncate() at the current position drops everything after it"

[[case]]
dimension = "behavior"
case      = "stringio_seek_end_positions_at_end"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "seek(0, SEEK_END) returns and positions at the byte/char length of the buffer"

[[case]]
dimension = "behavior"
case      = "stringio_close_marks_closed"
subject   = "io.StringIO"
kind      = "semantic"
intent    = "close() sets .closed True and a subsequent read() raises ValueError"

# --- BytesIO --------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "bytesio_write_read_roundtrip"
subject   = "io.BytesIO"
kind      = "semantic"
intent    = "BytesIO writes and reads bytes; seek(0) then read() returns the written bytes"

[[case]]
dimension = "behavior"
case      = "bytesio_getvalue_returns_bytes"
subject   = "io.BytesIO"
kind      = "semantic"
intent    = "BytesIO.getvalue() returns a bytes object equal to the written content"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc; generator emits assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "read_closed_bytesio_raises"
subject    = "io.BytesIO"
kind       = "mechanical"
call       = "_b = io.BytesIO(b'hello'); _b.close(); _b.read()"
expect_exc = "ValueError"
source     = "Lib/test/test_io.py"

[[case]]
dimension  = "errors"
case       = "read_closed_stringio_raises"
subject    = "io.StringIO"
kind       = "mechanical"
call       = "_s = io.StringIO('text'); _s.close(); _s.read()"
expect_exc = "ValueError"
source     = "Lib/test/test_io.py"

[[case]]
dimension  = "errors"
case       = "seek_bad_whence_raises"
subject    = "io.BytesIO"
kind       = "mechanical"
call       = "io.BytesIO(b'data').seek(0, 99)"
expect_exc = "ValueError"
source     = "Lib/test/test_io.py"

[[case]]
dimension  = "errors"
case       = "seek_negative_set_raises"
subject    = "io.BytesIO"
kind       = "mechanical"
call       = "io.BytesIO(b'data').seek(-1, 0)"
expect_exc = "ValueError"
source     = "Lib/test/test_io.py"

[[case]]
dimension  = "errors"
case       = "write_bytes_to_stringio_raises"
subject    = "io.StringIO"
kind       = "mechanical"
call       = "io.StringIO().write(b'bytes')"
expect_exc = "TypeError"
source     = "Lib/test/test_io.py"

[[case]]
dimension  = "errors"
case       = "write_str_to_bytesio_raises"
subject    = "io.BytesIO"
kind       = "mechanical"
call       = "io.BytesIO().write('str')"
expect_exc = "TypeError"
source     = "Lib/test/test_io.py"

[[case]]
dimension  = "errors"
case       = "read_on_write_only_raises"
subject    = "io.BufferedWriter"
kind       = "mechanical"
call       = "io.BufferedWriter(io.BytesIO()).read(5)"
expect_exc = "io.UnsupportedOperation"
source     = "Lib/test/test_io.py"

# ===========================================================================
# ERRORS — semantic (open()-driven paths needing a tempdir / multi-step setup
# that the plain call/expect_exc mechanical template cannot express)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "closed_file_ops_raise_value_error"
subject   = "io"
kind      = "semantic"
intent    = "every operation (flush/read/write/seek/tell/truncate/next/...) on a closed file object raises ValueError, across text, buffered and raw layers"
