# ===========================================================================
# SURFACE — semantic (constant VALUES + exception class hierarchy; goes beyond
# a plain existence probe so it is a value-bearing surface contract)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "constant_values_match_cpython"
subject   = "socket"
kind      = "semantic"
intent    = "the well-known integer constants pin to their CPython values: AF_INET == 2, SOCK_STREAM == 1, SOCK_DGRAM == 2"

[[case]]
dimension = "surface"
case      = "error_class_hierarchy"
subject   = "socket.error"
kind      = "semantic"
module    = "socket"
intent    = "socket.error is OSError, and socket.timeout / socket.gaierror / socket.herror are all subclasses of socket.error"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc; assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "recv_on_closed_socket_raises"
subject    = "socket.socket"
kind       = "mechanical"
module     = "socket"
call       = "(lambda s: (s.close(), s.recv(1024)))(socket.socket())"
expect_exc = "OSError"

[[case]]
dimension  = "errors"
case       = "bad_address_family_raises"
subject    = "socket.socket"
kind       = "mechanical"
module     = "socket"
call       = "socket.socket(99999, socket.SOCK_STREAM)"
expect_exc = "OSError"

[[case]]
dimension  = "errors"
case       = "inet_aton_bad_ip_raises"
subject    = "socket.inet_aton"
kind       = "mechanical"
call       = "socket.inet_aton(\"not.an.ip.address\")"
expect_exc = "OSError"

[[case]]
dimension  = "errors"
case       = "getaddrinfo_unresolvable_host_raises"
subject    = "socket.getaddrinfo"
kind       = "mechanical"
call       = "socket.getaddrinfo(\"definitely_not_a_real_host_xyzzy.invalid\", 80)"
expect_exc = "socket.gaierror"

[[case]]
dimension  = "errors"
case       = "fileno_float_typeerror"
subject    = "socket.socket"
kind       = "mechanical"
module     = "socket"
call       = "socket.socket(socket.AF_INET, socket.SOCK_STREAM, fileno=42.5)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "fileno_str_typeerror"
subject    = "socket.socket"
kind       = "mechanical"
module     = "socket"
call       = "socket.socket(socket.AF_INET, socket.SOCK_STREAM, fileno=\"foo\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "fileno_negative_valueerror"
subject    = "socket.socket"
kind       = "mechanical"
module     = "socket"
call       = "socket.socket(socket.AF_INET, socket.SOCK_STREAM, fileno=-1)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "close_none_typeerror"
subject    = "socket.close"
kind       = "mechanical"
call       = "socket.close(None)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "close_bad_fd_oserror"
subject    = "socket.close"
kind       = "mechanical"
call       = "socket.close(-1)"
expect_exc = "OSError"

