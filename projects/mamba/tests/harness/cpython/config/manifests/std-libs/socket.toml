# --- TCP / UDP data transport (loopback only) -----------------------------

[[case]]
dimension = "behavior"
case      = "tcp_pair_send_recv_roundtrip"
subject   = "socket.socket"
kind      = "semantic"
module    = "socket"
intent    = "a loopback TCP socket pair (server thread + client) exchanges ping/pong: the server receives b'ping' and the client receives the b'pong' reply"

[[case]]
dimension = "behavior"
case      = "udp_sendto_recvfrom_roundtrip"
subject   = "socket.socket"
kind      = "semantic"
module    = "socket"
intent    = "a connectionless UDP socket pair on loopback delivers a datagram: sendto(b'hello udp') is read back verbatim by recvfrom on the bound server"

[[case]]
dimension = "behavior"
case      = "nonblocking_accept_raises_blockingio"
subject   = "socket.socket"
kind      = "semantic"
module    = "socket"
intent    = "a listening socket put in setblocking(False) with no pending connection raises BlockingIOError (a socket.error) from accept()"

[[case]]
dimension = "behavior"
case      = "getsockname_returns_bound_address"
subject   = "socket.socket"
kind      = "semantic"
module    = "socket"
intent    = "after bind(('127.0.0.1', 0)) getsockname() reports host '127.0.0.1' and a positive integer ephemeral port"

[[case]]
dimension = "behavior"
case      = "so_reuseaddr_setsockopt_roundtrip"
subject   = "socket.socket"
kind      = "semantic"
module    = "socket"
intent    = "setsockopt(SOL_SOCKET, SO_REUSEADDR, 1) is observable via getsockopt as a nonzero value"

[[case]]
dimension = "behavior"
case      = "connect_refused_to_unused_port_raises"
subject   = "socket.socket"
kind      = "semantic"
module    = "socket"
intent    = "connecting (with a short timeout) to loopback port 1 raises a ConnectionRefusedError / timeout / OSError"

# --- address parsing (no live network) ------------------------------------

[[case]]
dimension = "behavior"
case      = "inet_aton_ntoa_roundtrip"
subject   = "socket.inet_aton"
kind      = "semantic"
intent    = "inet_ntoa(inet_aton(ip)) is the identity for several dotted-quad IPv4 addresses including 255.255.255.255"

[[case]]
dimension = "behavior"
case      = "getservbyname_well_known_ports"
subject   = "socket.getservbyname"
kind      = "semantic"
intent    = "getservbyname maps well-known service names to their IANA ports: http=80, https=443, ftp=21, ssh=22"

[[case]]
dimension = "behavior"
case      = "gethostbyname_literal_ipv4_is_identity"
subject   = "socket.gethostbyname"
kind      = "semantic"
intent    = "a literal IPv4 address resolves to itself with no DNS round-trip (127.0.0.1, 10.0.0.1, 255.255.255.255)"

[[case]]
dimension = "behavior"
case      = "getaddrinfo_parses_numeric_ipv6_and_scope"
subject   = "socket.getaddrinfo"
kind      = "semantic"
intent    = "getaddrinfo lower-cases a numeric IPv6 literal and threads a %scope id into the sockaddr's scope-id field"

[[case]]
dimension = "behavior"
case      = "getnameinfo_numeric_flags_reverse"
subject   = "socket.getnameinfo"
kind      = "semantic"
intent    = "getnameinfo with NI_NUMERICHOST|NI_NUMERICSERV reverses a numeric IPv6 address/port without DNS, lower-casing the host"

# --- socket object lifecycle / introspection ------------------------------

[[case]]
dimension = "behavior"
case      = "create_server_binds_loopback_listener"
subject   = "socket.create_server"
kind      = "semantic"
intent    = "create_server(('127.0.0.1', 0)) returns an AF_INET SOCK_STREAM socket bound to 127.0.0.1 on a positive ephemeral port; reuse_port toggles SO_REUSEPORT"

[[case]]
dimension = "behavior"
case      = "listen_backlog_and_type_flags_stable"
subject   = "socket.socket"
kind      = "semantic"
module    = "socket"
intent    = "listen() accepts a zero/negative/absent backlog, and the reported .type stays SOCK_STREAM across SOCK_NONBLOCK/SOCK_CLOEXEC request flags and timeout/blocking changes"

[[case]]
dimension = "behavior"
case      = "weakref_proxy_dies_after_collection"
subject   = "socket.socket"
kind      = "semantic"
module    = "socket"
intent    = "a weakref.proxy mirrors a live socket's fileno but raises ReferenceError once the socket is dropped and gc-collected"

[[case]]
dimension = "behavior"
case      = "create_connection_all_errors_exceptiongroup"
subject   = "socket.create_connection"
kind      = "semantic"
intent    = "create_connection(..., all_errors=True) to a closed port raises an ExceptionGroup of one OSError per resolved address"

[[case]]
dimension = "behavior"
case      = "inheritable_flag_toggles_and_dup"
subject   = "socket.socket"
kind      = "semantic"
module    = "socket"
intent    = "sockets are non-inheritable by default, set_inheritable toggles the flag both ways, and dup() yields an independent non-inheritable live descriptor"

[[case]]
dimension = "behavior"
case      = "repr_reports_fd_family_type_and_state"
subject   = "socket.socket"
kind      = "semantic"
module    = "socket"
intent    = "repr() of a socket shows fd/family/type/proto, gains laddr after bind, and shows [closed] after close; the family/type IntEnum members carry rich repr and numeric str"

[[case]]
dimension = "behavior"
case      = "makefile_returns_readable_file"
subject   = "socket.socket"
kind      = "semantic"
module    = "socket"
intent    = "makefile('rb', buffering=0) is readable but not writable/seekable, raises ValueError on capability queries after close, and a closed socket-file reprs with name=-1"

[[case]]
dimension = "behavior"
case      = "live_socket_not_picklable_enums_roundtrip"
subject   = "socket.socket"
kind      = "semantic"
module    = "socket"
intent    = "a live socket object is unpicklable (TypeError) at every protocol, while the AddressFamily/SocketKind IntEnum constants round-trip through pickle preserving value"

