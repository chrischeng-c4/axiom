# ===========================================================================

[[case]]
dimension = "errors"
case      = "fileno_negative_message_echoes_descriptor"
subject   = "socket.socket"
kind      = "semantic"
module    = "socket"
intent    = "socket(fileno=-1) / fileno=-42 raises ValueError whose message names 'negative file descriptor'"

[[case]]
dimension = "errors"
case      = "timeout_is_timeouterror_alias"
subject   = "socket.timeout"
kind      = "semantic"
module    = "socket"
intent    = "socket.timeout is the builtin TimeoutError alias (Python 3.10+)"

[[case]]
dimension = "errors"
case      = "getaddrinfo_out_of_range_port_is_gaierror"
subject   = "socket.getaddrinfo"
kind      = "semantic"
intent    = "an out-of-range port (2**64, 2**63, -(2**63)-1) surfaces as socket.gaierror, never OverflowError; boundary ports 0 and 65535 are accepted"

