# Manifest for the stdlib `socket` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/socket/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, create_server.py, fileno_validation.py,
# inheritable.py, lifecycle.py, pickle_support.py, repr.py, resolution.py,
# socketio.py). bench/ and real_world/_stub.py are left as-is.
#
# `socket.socket` / `socket.create_server` etc. are module-level callables, so
# the inferred import (`import socket`) is correct for every case; no explicit
# module=/import= override is needed.

bucket = "std-libs"
lib    = "socket"

