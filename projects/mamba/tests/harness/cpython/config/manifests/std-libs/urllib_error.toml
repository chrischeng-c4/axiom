# Manifest for the stdlib `urllib.error` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/urllib_error/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py
# (errors.py was a behavior-shaped print harness, not an exception path), the
# loose feature fixture urllib_error_basic.py + its paired .expected golden, and
# the real_world/_stub.py placeholder. bench/ is left as-is.
#
# The lib's dotted submodule is `urllib.error`, so class/exception subjects set
# an explicit `import = "from urllib.error import ..."` (the import inferer stops
# at the first CapWords component, e.g. `URLError`, and cannot recover the dotted
# package `urllib.error`). The `from urllib.error import X` form also dodges the
# mamba dotted-import quirk (repo-memory project_mamba_dotted_import_quirk:
# `import urllib.error` then `urllib.error.X` resolves to None), so every
# SEMANTIC body references the bare imported name and works on both runtimes.
#
# Mechanical SURFACE probes embed the dotted subject verbatim in their assert
# body (`assert callable(urllib.error.URLError)` etc.), which hits the mamba
# dotted-import quirk -> those probes carry xfail citing the quirk; CPython is
# green regardless.

bucket = "std-libs"
lib = "urllib_error"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable)
#
# The module-level probe uses `import urllib.error` + attr; the class probes
# embed the dotted subject in `assert callable(...)`, hitting the dotted-import
# quirk on mamba -> xfail.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_urllib_error"
subject   = "urllib.error"
kind      = "mechanical"
import    = "import urllib.error"
probe     = "attr"
attr      = "URLError"

[[case]]
dimension = "surface"
case      = "urlerror_is_callable"
subject   = "urllib.error.URLError"
kind      = "mechanical"
import    = "import urllib.error"
probe     = "callable"
xfail     = "mamba dotted-import quirk: import urllib.error; urllib.error.URLError -> None (repo-memory project_mamba_dotted_import_quirk)"

[[case]]
dimension = "surface"
case      = "httperror_is_callable"
subject   = "urllib.error.HTTPError"
kind      = "mechanical"
import    = "import urllib.error"
probe     = "callable"
xfail     = "mamba dotted-import quirk: import urllib.error; urllib.error.HTTPError -> None (repo-memory project_mamba_dotted_import_quirk)"

[[case]]
dimension = "surface"
case      = "contenttooshorterror_is_callable"
subject   = "urllib.error.ContentTooShortError"
kind      = "mechanical"
import    = "import urllib.error"
probe     = "callable"
xfail     = "mamba dotted-import quirk: import urllib.error; urllib.error.ContentTooShortError -> None (repo-memory project_mamba_dotted_import_quirk)"

# ===========================================================================
# ERRORS — semantic (exception hierarchy / raise-catch, ported from the
# legacy surface.py + behavior.py raise blocks)
#
# These exercise the documented exception hierarchy and that the classes are
# raiseable/catchable as their base types. Bodies use `from urllib.error import
# ...` (set via `import`) so they reference bare names and dodge the dotted
# quirk. There is no plain call/expect_exc mechanical path here: urllib.error
# defines exception *classes*, and the legacy "errors.py" monolith was actually
# a behavior print harness, not an exception-raising errors file. The
# network-dependent urlopen paths are intentionally NOT introduced (they would
# violate the no-network determinism rule).
# ===========================================================================

[[case]]
dimension = "errors"
case      = "urlerror_is_oserror"
subject   = "urllib.error.URLError"
kind      = "semantic"
import    = "from urllib.error import URLError"
intent    = "URLError is a subclass of OSError (documented exception hierarchy root) and is raiseable/catchable as OSError"

[[case]]
dimension = "errors"
case      = "httperror_is_urlerror"
subject   = "urllib.error.HTTPError"
kind      = "semantic"
import    = "from urllib.error import URLError, HTTPError"
intent    = "HTTPError is a subclass of URLError and is catchable as URLError when raised"

[[case]]
dimension = "errors"
case      = "httperror_is_oserror"
subject   = "urllib.error.HTTPError"
kind      = "semantic"
import    = "from urllib.error import HTTPError"
intent    = "HTTPError is a subclass of OSError and is catchable as OSError when raised"

[[case]]
dimension = "errors"
case      = "contenttooshort_is_urlerror"
subject   = "urllib.error.ContentTooShortError"
kind      = "semantic"
import    = "from urllib.error import URLError, ContentTooShortError"
intent    = "ContentTooShortError is a subclass of URLError"

# ===========================================================================
# BEHAVIOR — semantic (observable output matches CPython 3.12)
#
# Ported from behavior.py / errors.py / surface.py / urllib_error_basic.py.
# Bodies use `from urllib.error import ...`.
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "urlerror_reason_preserved"
subject   = "urllib.error.URLError"
kind      = "semantic"
import    = "from urllib.error import URLError"
intent    = "URLError(reason) preserves the reason string verbatim on the .reason attribute"
source    = "Lib/test/test_urllib2.py"

[[case]]
dimension = "behavior"
case      = "urlerror_reason_is_exception_object"
subject   = "urllib.error.URLError"
kind      = "semantic"
import    = "from urllib.error import URLError"
intent    = "URLError(exc) stores the exception object identically as .reason (an OSError instance is kept by identity)"
source    = "Lib/test/test_urllib2.py"

[[case]]
dimension = "behavior"
case      = "urlerror_filename_second_arg"
subject   = "urllib.error.URLError"
kind      = "semantic"
import    = "from urllib.error import URLError"
intent    = "URLError(reason, filename) records the optional second positional as .filename"
source    = "Lib/test/test_urllib2.py"

[[case]]
dimension = "behavior"
case      = "urlerror_str_includes_reason"
subject   = "urllib.error.URLError"
kind      = "semantic"
import    = "from urllib.error import URLError"
intent    = "str(URLError(reason)) renders an <urlopen error ...> message that contains the reason text"
source    = "Lib/test/test_urllib2.py"

[[case]]
dimension = "behavior"
case      = "httperror_core_attributes"
subject   = "urllib.error.HTTPError"
kind      = "semantic"
import    = "from urllib.error import HTTPError"
intent    = "HTTPError(url, code, msg, hdrs, fp) exposes .code, .url, .msg verbatim"
source    = "Lib/test/test_urllib2.py"

[[case]]
dimension = "behavior"
case      = "httperror_reason_aliases_msg"
subject   = "urllib.error.HTTPError"
kind      = "semantic"
import    = "from urllib.error import HTTPError"
intent    = "HTTPError.reason aliases .msg and HTTPError.filename aliases .url per CPython 3.12"
source    = "Lib/test/test_urllib2.py"

[[case]]
dimension = "behavior"
case      = "httperror_read_returns_body"
subject   = "urllib.error.HTTPError"
kind      = "semantic"
import    = "from urllib.error import HTTPError"
intent    = "HTTPError.read() returns the full body bytes from the fp passed at construction"
source    = "Lib/test/test_urllib2.py"

[[case]]
dimension = "behavior"
case      = "contenttooshorterror_content"
subject   = "urllib.error.ContentTooShortError"
kind      = "semantic"
import    = "from urllib.error import ContentTooShortError"
intent    = "ContentTooShortError(message, content) keeps the partial content on .content and the message on .reason"
source    = "Lib/test/test_urllib2.py"

# ===========================================================================
# REAL_WORLD — semantic end-user scenario
#
# Replaces the real_world/_stub.py placeholder with a realistic HTTP-client
# error-dispatch flow that branches on the urllib.error hierarchy.
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "http_client_error_dispatch"
subject   = "urllib.error.HTTPError"
kind      = "semantic"
import    = "from urllib.error import URLError, HTTPError, ContentTooShortError"
intent    = "an HTTP client classifies failures by catching HTTPError then URLError then ContentTooShortError, extracting the right field from each (status code, reason, partial content)"
