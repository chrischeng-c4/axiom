# Manifest for the stdlib `os.path` (posixpath) conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/os_path/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py)
# and the real_world/_stub.py placeholder. bench/join_hot.py is left as-is.
#
# Subjects are dotted `os.path.<fn>`; the import inferer drops the leaf and
# emits `import os.path`, which is what every fixture needs. CPython 3.12's
# posixpath is the oracle.

bucket = "std-libs"
lib    = "os_path"

# ===========================================================================
# SURFACE — mechanical probes (import / callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_os_path"
subject   = "os.path"
kind      = "mechanical"
probe     = "attr"
attr      = "join"

[[case]]
dimension = "surface"
case      = "join_is_callable"
subject   = "os.path.join"
kind      = "mechanical"
probe     = "callable"

