# ===========================================================================
# ERRORS — mechanical (call + expect_exc; generator emits assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "join_int_arg_raises"
subject    = "os.path.join"
kind       = "mechanical"
call       = "os.path.join(123, 'x')"
expect_exc = "TypeError"
source     = "Lib/test/test_posixpath.py"

[[case]]
dimension  = "errors"
case       = "join_mixed_str_bytes_raises"
subject    = "os.path.join"
kind       = "mechanical"
call       = "os.path.join('a', b'b')"
expect_exc = "TypeError"
source     = "Lib/test/test_posixpath.py"

[[case]]
dimension  = "errors"
case       = "getsize_missing_file_raises"
subject    = "os.path.getsize"
kind       = "mechanical"
call       = "os.path.getsize('/no/such/file_xyzzy')"
expect_exc = "FileNotFoundError"
source     = "Lib/test/test_posixpath.py"

[[case]]
dimension  = "errors"
case       = "samefile_missing_files_raises"
subject    = "os.path.samefile"
kind       = "mechanical"
call       = "os.path.samefile('/no/such/a', '/no/such/b')"
expect_exc = "FileNotFoundError"
source     = "Lib/test/test_posixpath.py"

[[case]]
dimension  = "errors"
case       = "commonpath_mixed_abs_rel_raises"
subject    = "os.path.commonpath"
kind       = "mechanical"
call       = "os.path.commonpath(['/abs/path', 'rel/path'])"
expect_exc = "ValueError"
source     = "Lib/test/test_posixpath.py"

[[case]]
dimension  = "errors"
case       = "commonpath_empty_iterable_raises"
subject    = "os.path.commonpath"
kind       = "mechanical"
call       = "os.path.commonpath([])"
expect_exc = "ValueError"
source     = "Lib/test/test_posixpath.py"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

# --- join ------------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "join_combines_segments"
subject   = "os.path.join"
kind      = "semantic"
intent    = "join glues path segments with the POSIX '/' separator across two-, three-, and four-segment inputs"
source    = "Lib/test/test_posixpath.py"

[[case]]
dimension = "behavior"
case      = "join_absolute_segment_resets"
subject   = "os.path.join"
kind      = "semantic"
intent    = "an absolute (leading-slash) segment discards everything before it; join('a','b','/abs','c') == '/abs/c' and join('/root','/other') == '/other'"
source    = "Lib/test/test_posixpath.py"

[[case]]
dimension = "behavior"
case      = "join_trailing_slash_preserved"
subject   = "os.path.join"
kind      = "semantic"
intent    = "join keeps an empty/trailing-slash final component; join('a','') == 'a/' and join('a','b/') == 'a/b/' while join('a/','b') == 'a/b'"
source    = "Lib/test/test_posixpath.py"

# --- split / basename / dirname --------------------------------------------

[[case]]
dimension = "behavior"
case      = "split_head_tail"
subject   = "os.path.split"
kind      = "semantic"
intent    = "split returns (head, tail); '/usr/local/bin/python' splits to ('/usr/local/bin','python') and a bare 'file.py' to ('','file.py')"
source    = "Lib/test/test_posixpath.py"

[[case]]
dimension = "behavior"
case      = "basename_last_component"
subject   = "os.path.basename"
kind      = "semantic"
intent    = "basename returns the final component; '/usr/local/bin/python' -> 'python', 'file.py' -> 'file.py', and a trailing slash -> '' "
source    = "Lib/test/test_posixpath.py"

[[case]]
dimension = "behavior"
case      = "dirname_directory_part"
subject   = "os.path.dirname"
kind      = "semantic"
intent    = "dirname returns the directory part; '/usr/local/bin/python' -> '/usr/local/bin' and a bare 'file.py' -> '' "
source    = "Lib/test/test_posixpath.py"

# --- splitext --------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "splitext_name_and_extension"
subject   = "os.path.splitext"
kind      = "semantic"
intent    = "splitext peels the last extension; 'file.py' -> ('file','.py'), 'archive.tar.gz' -> ('archive.tar','.gz'), 'noext' -> ('noext','')"
source    = "Lib/test/test_posixpath.py"

[[case]]
dimension = "behavior"
case      = "splitext_dotfile_has_no_extension"
subject   = "os.path.splitext"
kind      = "semantic"
intent    = "a leading-dot hidden file has no extension; splitext('.hidden') == ('.hidden','')"
source    = "Lib/test/test_posixpath.py"

# --- isabs -----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "isabs_distinguishes_absolute_relative"
subject   = "os.path.isabs"
kind      = "semantic"
intent    = "isabs is True only for a leading-slash path; isabs('/usr') is True, isabs('relative') and isabs('') are False"
source    = "Lib/test/test_posixpath.py"

# --- normpath --------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "normpath_collapses_dots_and_slashes"
subject   = "os.path.normpath"
kind      = "semantic"
intent    = "normpath collapses '//', '.', and '..' segments; '/usr//local/../local/bin/./python' -> '/usr/local/bin/python', './a/../b' -> 'b', 'a/b/c/../../d' -> 'a/d', and '/' is unchanged"
source    = "Lib/test/test_posixpath.py"

# --- abspath / expanduser --------------------------------------------------

[[case]]
dimension = "behavior"
case      = "abspath_returns_absolute_path"
subject   = "os.path.abspath"
kind      = "semantic"
intent    = "abspath('.') yields a path that isabs() reports as absolute (cwd-dependent, so only the absoluteness is asserted)"
source    = "Lib/test/test_posixpath.py"

[[case]]
dimension = "behavior"
case      = "expanduser_tilde_is_absolute"
subject   = "os.path.expanduser"
kind      = "semantic"
intent    = "expanduser('~') expands the bare tilde to an absolute home directory path (only absoluteness is asserted, the value is environment-dependent)"
source    = "Lib/test/test_posixpath.py"

# --- relpath ---------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "relpath_child_parent_sibling"
subject   = "os.path.relpath"
kind      = "semantic"
intent    = "relpath walks the tree; child '/usr/local/bin' from '/usr/local' is 'bin', parent is '..', and sibling '/usr/lib' from '/usr/local/bin' is '../../lib'"
source    = "Lib/test/test_posixpath.py"

# --- commonpath ------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "commonpath_longest_shared_prefix"
subject   = "os.path.commonpath"
kind      = "semantic"
intent    = "commonpath returns the longest shared directory prefix; commonpath(['/usr/local/bin','/usr/local/lib']) == '/usr/local'"
source    = "Lib/test/test_posixpath.py"

# --- filesystem predicates (tempfile-backed) -------------------------------

[[case]]
dimension = "behavior"
case      = "exists_isfile_isdir_on_real_paths"
subject   = "os.path.exists"
kind      = "semantic"
intent    = "inside a TemporaryDirectory, a written file is exists()/isfile() but not isdir(), the directory is isdir() but not isfile(), and a missing name is not exists()"
source    = "Lib/test/test_posixpath.py"

[[case]]
dimension = "behavior"
case      = "exists_nonstring_returns_false_no_raise"
subject   = "os.path.exists"
kind      = "semantic"
intent    = "exists is forgiving on a non-path argument: exists(123) returns False rather than raising (CPython behavior, NOT an error path)"
source    = "Lib/test/test_posixpath.py"

[[case]]
dimension = "behavior"
case      = "getsize_returns_byte_count"
subject   = "os.path.getsize"
kind      = "semantic"
intent    = "getsize returns the file's byte length; an 11-byte payload written to a temp file reports getsize == 11"
source    = "Lib/test/test_posixpath.py"

[[case]]
dimension = "behavior"
case      = "samefile_same_path_and_abspath"
subject   = "os.path.samefile"
kind      = "semantic"
intent    = "samefile is True when both arguments resolve to the same file: a temp file vs itself, and the temp file vs its abspath()"
source    = "Lib/test/test_posixpath.py"

[[case]]
dimension = "behavior"
case      = "realpath_missing_path_does_not_raise"
subject   = "os.path.realpath"
kind      = "semantic"
intent    = "realpath on a non-existent path does not raise; it returns the canonicalized path string (here still rooted under '/no')"
source    = "Lib/test/test_posixpath.py"

# ===========================================================================
# REAL_WORLD — semantic (one end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "asset_path_resolver_walkthrough"
subject   = "os.path"
kind      = "semantic"
intent    = "a static-asset/build-tool resolver drives join/normpath/isabs/splitext/basename/dirname/relpath/commonpath together, then materializes files in a TemporaryDirectory and confirms exists/isfile/isdir/getsize/samefile against the synthesized layout"
source    = "Lib/test/test_posixpath.py"
