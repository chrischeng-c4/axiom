# Manifest for the stdlib `zipfile` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/zipfile/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, bad_crc.py, comment.py, decompression_bomb.py,
# seek_tell.py, zip64.py, zipinfo.py, real_world/_stub.py). bench/ is left
# as-is (bench/compression_constants_read_hot.py). No paired .expected
# goldens existed.
#
# Every legacy fixture is CPython-3.12 green AND carried no `# mamba-xfail`
# directive, so no case carries an xfail.

bucket = "std-libs"
lib = "zipfile"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable / type / value-shape)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_zipfile"
subject   = "zipfile"
kind      = "mechanical"
probe     = "attr"
attr      = "ZipFile"

[[case]]
dimension = "surface"
case      = "zipfile_is_callable"
subject   = "zipfile.ZipFile"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "zipinfo_is_callable"
subject   = "zipfile.ZipInfo"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "is_zipfile_is_callable"
subject   = "zipfile.is_zipfile"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "zip_bzip2_present"
subject   = "zipfile"
kind      = "mechanical"
probe     = "attr"
attr      = "ZIP_BZIP2"

[[case]]
dimension = "surface"
case      = "zip_lzma_present"
subject   = "zipfile"
kind      = "mechanical"
probe     = "attr"
attr      = "ZIP_LZMA"

[[case]]
dimension = "surface"
case      = "badzipfile_present"
subject   = "zipfile"
kind      = "mechanical"
probe     = "attr"
attr      = "BadZipFile"

[[case]]
dimension = "surface"
case      = "largezipfile_present"
subject   = "zipfile"
kind      = "mechanical"
probe     = "attr"
attr      = "LargeZipFile"

[[case]]
dimension = "surface"
case      = "zip_stored_constant_is_int"
subject   = "zipfile.ZIP_STORED"
kind      = "mechanical"
probe     = "type"
typename  = "int"

[[case]]
dimension = "surface"
case      = "zip_deflated_constant_is_int"
subject   = "zipfile.ZIP_DEFLATED"
kind      = "mechanical"
probe     = "type"
typename  = "int"

# ===========================================================================
# SURFACE — semantic (constant values + ZipInfo attribute surface beyond the
# plain attr/type/callable mechanical template)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "compression_constant_values"
subject   = "zipfile.ZIP_STORED"
kind      = "semantic"
intent    = "ZIP_STORED == 0 and ZIP_DEFLATED == 8 (the canonical CPython 3.12 method codes)"

[[case]]
dimension = "surface"
case      = "version_constants"
subject   = "zipfile.DEFAULT_VERSION"
kind      = "semantic"
intent    = "DEFAULT_VERSION == 20 and ZIP64_VERSION == 45 (advertised PKZIP feature-version constants)"

[[case]]
dimension = "surface"
case      = "struct_size_constants"
subject   = "zipfile.sizeEndCentDir"
kind      = "semantic"
intent    = "fixed on-disk structure sizes: sizeEndCentDir==22, sizeCentralDir==46, sizeEndCentDir64==56, sizeEndCentDir64Locator==20"

[[case]]
dimension = "surface"
case      = "zipinfo_attribute_surface"
subject   = "zipfile.ZipInfo"
kind      = "semantic"
intent    = "a ZipInfo from getinfo exposes the documented attributes filename, file_size, compress_size, compress_type"
module    = "zipfile"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc, self-asserting)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "invalid_data_raises_badzipfile"
subject    = "zipfile.ZipFile"
kind       = "mechanical"
call       = "zipfile.ZipFile(io.BytesIO(b'not a zip'))"
expect_exc = "zipfile.BadZipFile"
import     = "import zipfile\nimport io"

[[case]]
dimension  = "errors"
case       = "bad_constructor_mode_raises_valueerror"
subject    = "zipfile.ZipFile"
kind       = "mechanical"
call       = "zipfile.ZipFile(io.BytesIO(), 'q')"
expect_exc = "ValueError"
import     = "import zipfile\nimport io"

[[case]]
dimension  = "errors"
case       = "bad_compression_raises_notimplementederror"
subject    = "zipfile.ZipFile"
kind       = "mechanical"
call       = "zipfile.ZipFile(io.BytesIO(), 'w', -1)"
expect_exc = "NotImplementedError"
import     = "import zipfile\nimport io"

[[case]]
dimension  = "errors"
case       = "pre_1980_date_raises_valueerror"
subject    = "zipfile.ZipInfo"
kind       = "mechanical"
call       = "zipfile.ZipInfo('old', (1979, 1, 1, 0, 0, 0))"
expect_exc = "ValueError"
import     = "import zipfile"

[[case]]
dimension  = "errors"
case       = "missing_path_raises_oserror"
subject    = "zipfile.ZipFile"
kind       = "mechanical"
call       = "zipfile.ZipFile(os.path.join(tempfile.mkdtemp(), 'nope.zip'))"
expect_exc = "OSError"
import     = "import zipfile\nimport os\nimport tempfile"

# ===========================================================================
# ERRORS — semantic (paths needing setup beyond the plain call/expect_exc
# template: an open archive, a closed archive, a crafted bad-CRC blob)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "read_missing_member_raises_keyerror"
subject   = "zipfile.ZipFile"
kind      = "semantic"
intent    = "reading a member that is not in the archive raises KeyError; open() of the same missing member also raises KeyError"
module    = "zipfile"

[[case]]
dimension = "errors"
case      = "bad_open_modes_raise_valueerror"
subject   = "zipfile.ZipFile"
kind      = "semantic"
intent    = "ZipFile.open() rejects the bogus per-member modes 'q', 'U', 'rU' with ValueError"
module    = "zipfile"

[[case]]
dimension = "errors"
case      = "str_comment_raises_typeerror"
subject   = "zipfile.ZipFile"
kind      = "semantic"
intent    = "assigning a str (not bytes) to ZipFile.comment raises TypeError"
module    = "zipfile"

[[case]]
dimension = "errors"
case      = "operations_after_close_raise_valueerror"
subject   = "zipfile.ZipFile"
kind      = "semantic"
intent    = "after close(), each of read/open/testzip/writestr on the ZipFile raises ValueError"
module    = "zipfile"

[[case]]
dimension = "errors"
case      = "empty_file_raises_badzipfile"
subject   = "zipfile.ZipFile"
kind      = "semantic"
intent    = "opening a zero-byte file in read mode raises BadZipFile"
module    = "zipfile"

[[case]]
dimension = "errors"
case      = "bad_crc_read_raises_badzipfile"
subject   = "zipfile.ZipFile"
kind      = "semantic"
intent    = "a crafted STORED entry whose recorded CRC does not match its content raises BadZipFile on read(), and also on a chunked open()/read() stream"
module    = "zipfile"
source    = "Lib/test/test_zipfile"

[[case]]
dimension = "errors"
case      = "truncated_archive_raises_badzipfile"
subject   = "zipfile.ZipFile"
kind      = "semantic"
intent    = "every proper prefix of a valid archive (truncated to n bytes for all n) fails to open with BadZipFile"
module    = "zipfile"
source    = "Lib/test/test_zipfile"

# ===========================================================================
# BEHAVIOR — semantic (observable output matches CPython 3.12)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "namelist_read_roundtrip"
subject   = "zipfile.ZipFile"
kind      = "semantic"
intent    = "writestr two members to an in-memory archive, reopen, and confirm namelist contains both names, read returns the exact bytes, and open() yields a file-like object with the same content"
module    = "zipfile"

[[case]]
dimension = "behavior"
case      = "stored_preserves_content"
subject   = "zipfile.ZipFile"
kind      = "semantic"
intent    = "ZIP_STORED writes no compression: file_size equals compress_size and the content round-trips byte-for-byte"
module    = "zipfile"

[[case]]
dimension = "behavior"
case      = "deflated_compresses_repetitive_data"
subject   = "zipfile.ZipFile"
kind      = "semantic"
intent    = "ZIP_DEFLATED shrinks highly repetitive data so compress_size < file_size while the decompressed content round-trips exactly"
module    = "zipfile"

[[case]]
