source    = "Lib/test/test_zipfile"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "archive_build_extract_roundtrip"
subject   = "zipfile.ZipFile"
kind      = "semantic"
intent    = "an end-user packaging flow: build a multi-member DEFLATED archive on disk (text + nested binary), confirm is_zipfile detects it, reopen and read each member back, then extractall into a separate temp directory and verify every extracted file's bytes match the originals"
module    = "zipfile"

# ===========================================================================
# SECURITY — semantic (adversarial / untrusted input)
# ===========================================================================

[[case]]
dimension = "security"
case      = "decompression_bomb_ratio_guard"
subject   = "zipfile.ZipFile"
kind      = "semantic"
intent    = "a DEFLATE bomb (48 MiB of zeros in a tiny archive) is contained by metadata before extraction: file_size/compress_size expose a >100x ratio up front, a size-cap guard refuses the member while admitting a benign small one, and a bounded streaming reader stops at its own 8 MiB limit without materialising the whole payload"
module    = "zipfile"
