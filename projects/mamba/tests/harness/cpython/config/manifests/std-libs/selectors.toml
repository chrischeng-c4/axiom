# Manifest for the stdlib `selectors` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/selectors/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + paired-golden shape (surface.py,
# behavior.py, errors.py, selectors_basic.py/.expected). bench/ and the
# real_world/_stub.py placeholder are left as-is.
#
# `selectors.*` selector classes are CapWords, so the import inferer stops at
# the class and yields the importable module `selectors` for every subject —
# no explicit module= is needed. CPython 3.12 is the oracle. The conformance
# host is macOS, where DefaultSelector resolves to KqueueSelector; the
# socketpair/select cases use only the portable EVENT_READ/EVENT_WRITE subset.

bucket = "std-libs"
lib = "selectors"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable / not_callable)
# ===========================================================================

# --- module import + event-mask constants ---------------------------------

[[case]]
dimension = "surface"
case      = "import_selectors"
subject   = "selectors"
kind      = "mechanical"
probe     = "attr"
attr      = "DefaultSelector"

[[case]]
dimension = "surface"
case      = "event_read_attr"
subject   = "selectors"
kind      = "mechanical"
probe     = "attr"
