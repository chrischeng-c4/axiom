# ===========================================================================
# ERRORS — mechanical (call + expect_exc; generator emits assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "register_bad_events_raises"
subject    = "selectors.DefaultSelector"
kind       = "mechanical"
call       = "selectors.DefaultSelector().register(socket.socket(), 999, None)"
expect_exc = "ValueError"
import     = "import selectors\nimport socket"
source     = "Lib/test/test_selectors.py"

[[case]]
dimension  = "errors"
case       = "register_negative_fd_raises"
subject    = "selectors.DefaultSelector"
kind       = "mechanical"
call       = "selectors.DefaultSelector().register(-10, selectors.EVENT_READ)"
expect_exc = "ValueError"
import     = "import selectors"
source     = "Lib/test/test_selectors.py"

# ===========================================================================
# ERRORS — semantic (stateful: register first, then assert the second op
# raises on the same selector; goes beyond the one-shot call/expect template)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "register_duplicate_raises_keyerror"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "registering the same socket twice on one DefaultSelector raises KeyError on the second register"
source    = "Lib/test/test_selectors.py"

[[case]]
dimension = "errors"
case      = "unregister_missing_raises_keyerror"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "unregistering a never-registered socket raises KeyError"
source    = "Lib/test/test_selectors.py"

[[case]]
dimension = "errors"
case      = "modify_missing_raises_keyerror"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "modify() on a never-registered socket raises KeyError"
source    = "Lib/test/test_selectors.py"

[[case]]
dimension = "errors"
case      = "get_key_missing_raises_keyerror"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "get_key() on a never-registered file object raises KeyError"
source    = "Lib/test/test_selectors.py"

[[case]]
dimension = "errors"
case      = "select_zero_timeout_returns_list"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "select(timeout=0) on a selector with no ready fds returns an empty list without blocking or raising"

# ===========================================================================
# BEHAVIOR — semantic (observable I/O multiplexing rules; CPython 3.12 oracle)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "select_detects_readable_socket"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "select() reports a listening server socket as readable once a client connects; the ready key's fileobj is the server socket and the mask carries EVENT_READ"
source    = "Lib/test/test_selectors.py"

[[case]]
dimension = "behavior"
case      = "select_detects_writable_socket"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "a freshly connected socketpair endpoint registered for EVENT_WRITE is reported writable by select() with EVENT_WRITE in the mask"
source    = "Lib/test/test_selectors.py"

[[case]]
dimension = "behavior"
case      = "register_returns_selector_key"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "register() returns a SelectorKey whose fileobj is the socket, fd is an int, events is the requested mask, and data is the passed-in object"
source    = "Lib/test/test_selectors.py"

[[case]]
dimension = "behavior"
case      = "modify_changes_events"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "modify() updates the registered events mask in place and returns the updated SelectorKey, observable via get_key()"
source    = "Lib/test/test_selectors.py"

[[case]]
dimension = "behavior"
case      = "unregister_clears_map"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "unregister() removes the fd so get_map() is empty afterward"
source    = "Lib/test/test_selectors.py"

[[case]]
dimension = "behavior"
case      = "unregister_then_register_reuses_fd"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "after unregister(), the same socket can be re-registered with a different events mask"
source    = "Lib/test/test_selectors.py"

[[case]]
dimension = "behavior"
case      = "get_map_returns_registered_keys"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "get_map() exposes the registered fd->SelectorKey mapping; the registered socket's fd is present and maps back to its key"
source    = "Lib/test/test_selectors.py"

[[case]]
dimension = "behavior"
case      = "context_manager_registers_and_closes"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "DefaultSelector used as a context manager registers inside the with-block (get_map length 1) and is usable for the block's duration"
source    = "Lib/test/test_selectors.py"

# ===========================================================================
# REAL-WORLD — semantic (end-to-end multiplexed echo round-trip)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "echo_roundtrip_over_socketpair"
subject   = "selectors.DefaultSelector"
kind      = "semantic"
intent    = "an event-loop-style echo: register both ends of a socketpair, select() to learn when the read end is ready, and verify a byte payload round-trips through the multiplexed selector"
