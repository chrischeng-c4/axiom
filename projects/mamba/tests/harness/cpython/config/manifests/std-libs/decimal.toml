# Manifest for the stdlib `decimal` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/decimal/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the loose feature files (comparisons.py / construction.py / context_api.py
# / conversions.py / formatting.py) plus real_world/financial_calc.py. bench/ is
# left as-is. CPython 3.12 is the oracle.

bucket = "std-libs"
lib = "decimal"

