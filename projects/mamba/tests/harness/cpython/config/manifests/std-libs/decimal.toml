# ===========================================================================
# ERRORS — semantic (hierarchy + non-raising NaN comparison rules that go
# beyond the plain call/expect_exc mechanical template)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "exception_hierarchy"
subject   = "decimal.DecimalException"
kind      = "semantic"
intent    = "every decimal signal derives from DecimalException<:ArithmeticError, and the documented aliases hold: DivisionByZero<:ZeroDivisionError, FloatOperation<:TypeError, Overflow<:Rounded,Inexact, Underflow<:Subnormal, ConversionSyntax/DivisionImpossible/InvalidContext<:InvalidOperation, DivisionUndefined<:ZeroDivisionError"
module    = "decimal"
source    = "Lib/test/test_decimal.py"

[[case]]
dimension = "errors"
case      = "nan_equality_is_false"
subject   = "decimal.Decimal"
kind      = "semantic"
intent    = "comparing Decimal('NaN') == Decimal('NaN') returns False (not a raise, not NaN), and != is always True"
module    = "decimal"
source    = "Lib/test/test_decimal.py"

[[case]]
dimension = "errors"
case      = "nan_ordering_raises_invalidoperation"
subject   = "decimal.Decimal"
kind      = "semantic"
intent    = "ordering a Decimal NaN via the comparison dunder raises InvalidOperation, while the reflected comparison from a non-Decimal partner returns NotImplemented"
module    = "decimal"
source    = "Lib/test/test_decimal.py"

