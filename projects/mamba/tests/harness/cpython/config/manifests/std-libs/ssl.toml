# Manifest for the stdlib `ssl` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/ssl/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, ciphers.py, constructors.py, context.py,
# context_callbacks.py, context_config.py, enums.py, memory_bio.py, rand.py,
# sslsocket.py). bench/ is left as-is; real_world/_stub.py is left as-is.
#
# Method/exception subjects (ssl.SSLContext.*, ssl.MemoryBIO.*, ssl.SSLError)
# stop the import inferer at the first CapWords component, so each carries an
# explicit module = "ssl".
#
# No network traffic in any fixture: handshakes never happen, only pre-connect
# / pure-API behavior (CPython 3.12 is the oracle; distilled from
# Lib/test/test_ssl.py).

bucket = "std-libs"
lib = "ssl"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_ssl"
subject   = "ssl"
kind      = "mechanical"
probe     = "attr"
attr      = "SSLContext"

