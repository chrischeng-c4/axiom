# Manifest for the stdlib `platform` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/platform/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the loose feature fixtures (comparable_version.py / parse_os_release.py /
# sys_version.py / uname_namedtuple.py). No coverage is dropped.
#
# All subjects are `platform.<lowercase leaf>` so the import inferer resolves
# to `import platform` with no module=/import= override needed. The private
# helpers (_comparable_version / _parse_os_release / _sys_version) are reached
# via the `platform` module object inside the filled bodies.

bucket = "std-libs"
lib = "platform"

# ===========================================================================
# SURFACE — mechanical probes (import / callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_platform"
subject   = "platform"
kind      = "mechanical"
probe     = "attr"
attr      = "system"

[[case]]
dimension = "surface"
case      = "system_is_callable"
subject   = "platform.system"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "node_is_callable"
subject   = "platform.node"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "release_is_callable"
subject   = "platform.release"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "version_is_callable"
subject   = "platform.version"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "machine_is_callable"
subject   = "platform.machine"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "processor_is_callable"
subject   = "platform.processor"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "platform_is_callable"
