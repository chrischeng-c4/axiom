# ===========================================================================
# BEHAVIOR — semantic (CPython 3.12 oracle)
# ===========================================================================
#
# System-dependent values (OS casing, host arch, hostname, build release)
# diverge across machines, so the per-function cases assert only structural
# shape (type + non-empty), matching the legacy behavior.py monolith.

[[case]]
dimension = "behavior"
case      = "system_returns_nonempty_str"
subject   = "platform.system"
kind      = "semantic"
intent    = "system() returns a non-empty str naming the OS (value is host-dependent, so only shape is asserted)"
source    = "Lib/test/test_platform.py"

[[case]]
dimension = "behavior"
case      = "node_returns_str"
subject   = "platform.node"
kind      = "semantic"
intent    = "node() returns a str hostname (may be empty, so only type is asserted)"
source    = "Lib/test/test_platform.py"

[[case]]
dimension = "behavior"
case      = "release_returns_str"
subject   = "platform.release"
kind      = "semantic"
intent    = "release() returns a str OS release (value host-dependent, only type asserted)"
source    = "Lib/test/test_platform.py"

[[case]]
dimension = "behavior"
case      = "machine_returns_nonempty_str"
subject   = "platform.machine"
kind      = "semantic"
intent    = "machine() returns a non-empty str naming the host architecture (value host-dependent, only shape asserted)"
source    = "Lib/test/test_platform.py"

[[case]]
dimension = "behavior"
case      = "processor_returns_str"
subject   = "platform.processor"
kind      = "semantic"
intent    = "processor() returns a str (may be empty on some hosts, only type asserted)"
source    = "Lib/test/test_platform.py"

[[case]]
dimension = "behavior"
case      = "platform_returns_str"
subject   = "platform.platform"
kind      = "semantic"
intent    = "platform() returns a str summary of the platform (value host-dependent, only type asserted)"
source    = "Lib/test/test_platform.py"

[[case]]
dimension = "behavior"
case      = "python_version_dotted_str"
subject   = "platform.python_version"
kind      = "semantic"
intent    = "python_version() returns a dotted version str that starts with '3.' under CPython 3.12"
source    = "Lib/test/test_platform.py"

[[case]]
dimension = "behavior"
case      = "python_implementation_is_cpython"
subject   = "platform.python_implementation"
kind      = "semantic"
intent    = "python_implementation() returns 'CPython' on the reference interpreter"
source    = "Lib/test/test_platform.py"

[[case]]
dimension = "behavior"
case      = "python_version_tuple_joins_to_version"
subject   = "platform.python_version_tuple"
kind      = "semantic"
intent    = "python_version_tuple() yields a 3-part tuple of digit strings whose '.'-join equals python_version()"
source    = "Lib/test/test_platform.py"

[[case]]
dimension = "behavior"
case      = "comparable_version_ordering"
subject   = "platform._comparable_version"
kind      = "semantic"
intent    = "_comparable_version sorts version strings: numeric segments compare numerically, separators (. _ - +) normalize, and the pre-release ladder is dev<alpha<beta<candidate<final<post"
source    = "Lib/test/test_platform.py"

[[case]]
dimension = "behavior"
case      = "parse_os_release_parsing"
subject   = "platform._parse_os_release"
kind      = "semantic"
intent    = "_parse_os_release strips quotes, resolves shell escapes, skips comment/blank/malformed lines, and supplies default ID/NAME/PRETTY_NAME"
source    = "Lib/test/test_platform.py"

[[case]]
dimension = "behavior"
case      = "sys_version_banner_parsing"
subject   = "platform._sys_version"
kind      = "semantic"
intent    = "_sys_version parses an interpreter banner into (name, version, branch, revision, buildno, builddate, compiler), applying the build-date truncation rules and the compiler suffix"
source    = "Lib/test/test_platform.py"

[[case]]
dimension = "behavior"
case      = "uname_namedtuple_contract"
subject   = "platform.uname"
kind      = "semantic"
intent    = "uname() returns a 6-field named tuple: positional/negative/attribute access agree, _fields/_asdict/_replace behave, and the value round-trips through tuple()/slice/copy"
source    = "Lib/test/test_platform.py"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc; self-asserting)
# ===========================================================================
#
# Only host-INDEPENDENT raises are mechanized here. freedesktop_os_release()
# is intentionally omitted: it returns a dict on Linux but raises on non-Linux,
# so it is not a deterministic CPython-green oracle across hosts.

[[case]]
dimension  = "errors"
case       = "system_alias_no_args_raises"
subject    = "platform.system_alias"
kind       = "mechanical"
call       = "platform.system_alias()"
expect_exc = "TypeError"
source     = "Lib/test/test_platform.py"

[[case]]
dimension  = "errors"
case       = "libc_ver_missing_executable_raises"
subject    = "platform.libc_ver"
kind       = "mechanical"
call       = 'platform.libc_ver("/no/such/exe")'
expect_exc = "FileNotFoundError"

[[case]]
dimension  = "errors"
case       = "sys_version_malformed_banner_raises"
subject    = "platform._sys_version"
kind       = "mechanical"
call       = 'platform._sys_version("2. 4.3 (truncation) \\n[GCC]")'
expect_exc = "ValueError"
source     = "Lib/test/test_platform.py"

[[case]]
dimension  = "errors"
case       = "uname_index_out_of_range_raises"
subject    = "platform.uname"
kind       = "mechanical"
call       = "platform.uname()[6]"
expect_exc = "IndexError"
source     = "Lib/test/test_platform.py"
