# Manifest for the stdlib `subprocess` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/subprocess/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the loose feature files (call_helpers.py / popen_pipes.py / run_args.py).
# bench/pipe_const_read_hot.py is kept as-is. CPython 3.12 is the oracle.

bucket = "std-libs"
lib = "subprocess"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "run_is_callable"
subject   = "subprocess.run"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "popen_is_callable"
subject   = "subprocess.Popen"
kind      = "mechanical"
module    = "subprocess"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "call_is_callable"
subject   = "subprocess.call"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "check_call_is_callable"
subject   = "subprocess.check_call"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "check_output_is_callable"
subject   = "subprocess.check_output"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "pipe_is_int"
subject   = "subprocess.PIPE"
kind      = "mechanical"
probe     = "type"
typename  = "int"

[[case]]
dimension = "surface"
case      = "stdout_is_int"
subject   = "subprocess.STDOUT"
kind      = "mechanical"
probe     = "type"
typename  = "int"

[[case]]
dimension = "surface"
case      = "devnull_is_int"
subject   = "subprocess.DEVNULL"
kind      = "mechanical"
probe     = "type"
typename  = "int"

[[case]]
dimension = "surface"
case      = "completedprocess_present"
subject   = "subprocess"
kind      = "mechanical"
probe     = "attr"
attr      = "CompletedProcess"

[[case]]
dimension = "surface"
case      = "calledprocesserror_present"
subject   = "subprocess"
kind      = "mechanical"
probe     = "attr"
attr      = "CalledProcessError"

[[case]]
dimension = "surface"
case      = "timeoutexpired_present"
subject   = "subprocess"
kind      = "mechanical"
probe     = "attr"
attr      = "TimeoutExpired"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc, assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "missing_command_raises_filenotfound"
subject    = "subprocess.run"
kind       = "mechanical"
call       = "subprocess.run(['definitely_not_a_real_command_xyzzy'], capture_output=True)"
expect_exc = "FileNotFoundError"
source     = "Lib/test/test_subprocess.py"

[[case]]
dimension  = "errors"
case       = "nul_in_argv_raises_valueerror"
subject    = "subprocess.Popen"
kind       = "mechanical"
module     = "subprocess"
import     = "import subprocess\nimport sys"
call       = "subprocess.Popen([sys.executable, '-c', 'pass#\\x00'])"
expect_exc = "ValueError"
source     = "Lib/test/test_subprocess.py"

[[case]]
dimension  = "errors"
case       = "nul_in_env_name_raises_valueerror"
subject    = "subprocess.Popen"
kind       = "mechanical"
module     = "subprocess"
import     = "import os\nimport subprocess\nimport sys"
call       = "subprocess.Popen([sys.executable, '-c', 'pass'], env={**os.environ, 'FRUIT\\x00VEGETABLE': 'cabbage'})"
expect_exc = "ValueError"
source     = "Lib/test/test_subprocess.py"

[[case]]
dimension  = "errors"
case       = "non_integer_bufsize_raises_typeerror"
subject    = "subprocess.Popen"
kind       = "mechanical"
module     = "subprocess"
import     = "import subprocess\nimport sys"
call       = "subprocess.Popen([sys.executable, '-c', 'pass'], 'orange')"
expect_exc = "TypeError"
source     = "Lib/test/test_subprocess.py"

# ===========================================================================
# ERRORS — semantic (exception object inspection beyond plain call/expect_exc)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "check_true_raises_calledprocesserror"
subject   = "subprocess.CalledProcessError"
kind      = "semantic"
module    = "subprocess"
intent    = "subprocess.run(check=True) on a non-zero exit raises CalledProcessError whose .returncode echoes the child's exit code"
source    = "Lib/test/test_subprocess.py"

[[case]]
dimension = "errors"
case      = "calledprocesserror_attrs"
subject   = "subprocess.CalledProcessError"
kind      = "semantic"
module    = "subprocess"
intent    = "a CalledProcessError raised by check=True exposes .returncode and a list .cmd"
source    = "Lib/test/test_subprocess.py"

[[case]]
dimension = "errors"
case      = "timeout_raises_timeoutexpired"
subject   = "subprocess.TimeoutExpired"
kind      = "semantic"
module    = "subprocess"
intent    = "a child that outlives the timeout= deadline makes subprocess.run raise TimeoutExpired"
source    = "Lib/test/test_subprocess.py"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

# --- run() result object --------------------------------------------------

[[case]]
dimension = "behavior"
case      = "run_returns_completedprocess"
subject   = "subprocess.run"
kind      = "semantic"
intent    = "subprocess.run(capture_output=True, text=True) returns a CompletedProcess with returncode 0, captured stdout, and accessible str stderr for a simple echo"
source    = "Lib/test/test_subprocess.py"

[[case]]
dimension = "behavior"
case      = "run_capture_splits_stdout_stderr"
subject   = "subprocess.run"
kind      = "semantic"
intent    = "capture_output=True captures the child's stdout and stderr into separate CompletedProcess fields"
source    = "Lib/test/test_subprocess.py"

[[case]]
dimension = "behavior"
case      = "run_returncode_reflects_exit_status"
subject   = "subprocess.run"
kind      = "semantic"
intent    = "CompletedProcess.returncode equals the child's process exit status (SystemExit(3) -> returncode 3)"
source    = "Lib/test/test_subprocess.py"

[[case]]
dimension = "behavior"
case      = "run_check_returncode_zero_no_raise"
subject   = "subprocess.run"
kind      = "semantic"
intent    = "CompletedProcess.check_returncode() does not raise when the child exited 0"
source    = "Lib/test/test_subprocess.py"

