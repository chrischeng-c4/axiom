# Manifest for the stdlib `inspect` + `traceback` conformance corpus.
#
# `inspect_traceback` is the consolidated fixture dir for inspect/traceback
# behaviors that touch both modules (frame introspection + traceback
# formatting). One [[case]] per fixture. `fixture_gen.py` turns this into the
# files under tests/cpython/std-libs/inspect_traceback/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py).
# The lib name maps to TWO real modules: `inspect` and `traceback`; each case's
# subject is a dotted API on one of them, so the import inferer resolves the
# right module automatically (inspect.* -> inspect, traceback.* -> traceback).
#
# mamba gotchas (repo memory):
#   - traceback.format_exc returns the literal "NoneType: None\n" stub
#     regardless of active exception (no frame walk).
#   - e.__traceback__ is None under mamba, so extract_tb over a live traceback
#     diverges.

bucket = "std-libs"
lib = "inspect_traceback"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_inspect"
subject   = "inspect"
kind      = "mechanical"
probe     = "attr"
attr      = "currentframe"

[[case]]
dimension = "surface"
case      = "import_traceback"
subject   = "traceback"
kind      = "mechanical"
probe     = "attr"
attr      = "extract_tb"

[[case]]
dimension = "surface"
case      = "currentframe_is_callable"
subject   = "inspect.currentframe"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "getframeinfo_is_callable"
subject   = "inspect.getframeinfo"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "stack_is_callable"
subject   = "inspect.stack"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "format_stack_is_callable"
subject   = "traceback.format_stack"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "extract_tb_is_callable"
subject   = "traceback.extract_tb"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "format_exception_is_callable"
subject   = "traceback.format_exception"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "print_exc_is_callable"
subject   = "traceback.print_exc"
kind      = "mechanical"
probe     = "callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "getframeinfo_none_raises"
subject    = "inspect.getframeinfo"
kind       = "mechanical"
call       = "inspect.getframeinfo(None)"
expect_exc = "AttributeError"
source     = "Lib/test/test_traceback.py"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "currentframe_yields_frame"
subject   = "inspect.currentframe"
kind      = "semantic"
intent    = "inspect.currentframe() returns the caller's frame object (not None) with a positive f_lineno"
source    = "Lib/test/test_traceback.py"

[[case]]
dimension = "behavior"
case      = "stack_top_is_module"
subject   = "inspect.stack"
kind      = "semantic"
intent    = "inspect.stack() returns a non-empty list of FrameInfo records; the top frame's .function is the running scope name ('<module>' at top level)"
source    = "Lib/test/test_traceback.py"

[[case]]
dimension = "behavior"
case      = "format_stack_nonempty_str_list"
subject   = "traceback.format_stack"
kind      = "semantic"
intent    = "traceback.format_stack() at top level returns a non-empty list whose every entry is a str line of formatted stack text"
source    = "Lib/test/test_traceback.py"

[[case]]
dimension = "behavior"
case      = "extract_tb_yields_frames"
subject   = "traceback.extract_tb"
kind      = "semantic"
intent    = "inside an except block, traceback.extract_tb(e.__traceback__) walks the live traceback and yields at least one FrameSummary"
source    = "Lib/test/test_traceback.py"

[[case]]
dimension = "behavior"
case      = "format_exception_names_exc"
subject   = "traceback.format_exception"
kind      = "semantic"
intent    = "inside an except block, traceback.format_exception(*sys.exc_info()) returns a list of str lines and the active exception type name appears among them"
source    = "Lib/test/test_traceback.py"

[[case]]
dimension = "behavior"
case      = "print_exc_no_active_exception_no_raise"
subject   = "traceback.print_exc"
kind      = "semantic"
intent    = "traceback.print_exc() with no exception active does not raise; redirected to a StringIO it emits the 'NoneType: None' sentinel and returns None"
source    = "Lib/test/test_traceback.py"
