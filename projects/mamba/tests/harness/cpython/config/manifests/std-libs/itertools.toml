[[case]]
dimension  = "errors"
case       = "zip_longest_propagates_source_error"
subject    = "itertools.zip_longest"
kind       = "mechanical"
import     = "import itertools\n\nclass _R:\n    def __init__(self, n):\n        self.n = n\n    def __iter__(self):\n        return self\n    def __next__(self):\n        if self.n > 0:\n            self.n -= 1\n            return 1\n        raise RuntimeError('boom')"
call       = "list(itertools.zip_longest(_R(3), _R(9), fillvalue=0))"
expect_exc = "RuntimeError"
source     = "Lib/test/test_itertools.py"
