# Manifest for the stdlib `itertools` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/itertools/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the loose feature scripts (basic / edges / patterns_broad / deep_broad /
# chain_count_broad / groupby_deep / lazy_consumption / exception_propagation /
# itertools_* conformance). bench/ and real_world/_stub.py are kept as-is.
#
# Every `subject` that bottoms out on a `chain.from_iterable` attribute uses an
# explicit `module = "itertools"` because the import inferer drops the leaf and
# would land on the non-importable `itertools.chain`.

bucket = "std-libs"
lib = "itertools"

