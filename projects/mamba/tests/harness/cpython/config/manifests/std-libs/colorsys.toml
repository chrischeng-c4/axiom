# Manifest for the stdlib `colorsys` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/colorsys/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py)
# plus the real_world/_stub.py placeholder. bench/ (rgb_to_hls_bulk.py) is left
# as-is.
#
# colorsys is a pure-math module: six conversion functions, no classes, no
# exceptions of its own (only TypeError for bad arguments). CPython 3.12 is the
# oracle; float comparisons use an EPS tolerance because the conversions trail
# in IEEE-754 lsbs.

bucket = "std-libs"
lib = "colorsys"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_colorsys"
subject   = "colorsys"
kind      = "mechanical"
probe     = "attr"
attr      = "rgb_to_hsv"

[[case]]
dimension = "surface"
case      = "rgb_to_hsv_is_callable"
subject   = "colorsys.rgb_to_hsv"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "hsv_to_rgb_is_callable"
subject   = "colorsys.hsv_to_rgb"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "rgb_to_hls_is_callable"
subject   = "colorsys.rgb_to_hls"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "hls_to_rgb_is_callable"
subject   = "colorsys.hls_to_rgb"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "rgb_to_yiq_is_callable"
subject   = "colorsys.rgb_to_yiq"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "yiq_to_rgb_is_callable"
subject   = "colorsys.yiq_to_rgb"
kind      = "mechanical"
probe     = "callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc); colorsys only raises TypeError for
# non-numeric arguments or the wrong arity.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "rgb_to_hsv_str_input_raises"
subject    = "colorsys.rgb_to_hsv"
kind       = "mechanical"
call       = "colorsys.rgb_to_hsv(\"a\", \"b\", \"c\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "rgb_to_hls_none_input_raises"
subject    = "colorsys.rgb_to_hls"
kind       = "mechanical"
call       = "colorsys.rgb_to_hls(None, 0.5, 0.5)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "rgb_to_yiq_too_few_args_raises"
subject    = "colorsys.rgb_to_yiq"
kind       = "mechanical"
call       = "colorsys.rgb_to_yiq(0.5)"
expect_exc = "TypeError"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- round-trips (forward then inverse recovers the original RGB) ----------

[[case]]
dimension = "behavior"
case      = "hsv_roundtrip"
subject   = "colorsys.rgb_to_hsv"
kind      = "semantic"
intent    = "rgb_to_hsv then hsv_to_rgb recovers the original RGB across a representative color table (red/green/blue/gray/arbitrary)"
source    = "Lib/test/test_colorsys.py"

[[case]]
dimension = "behavior"
case      = "hls_roundtrip"
subject   = "colorsys.rgb_to_hls"
kind      = "semantic"
intent    = "rgb_to_hls then hls_to_rgb recovers the original RGB across a representative color table"
source    = "Lib/test/test_colorsys.py"

[[case]]
dimension = "behavior"
case      = "yiq_roundtrip"
subject   = "colorsys.rgb_to_yiq"
kind      = "semantic"
intent    = "rgb_to_yiq then yiq_to_rgb recovers the original RGB across a representative color table"
source    = "Lib/test/test_colorsys.py"

# --- HSV component rules ---------------------------------------------------

[[case]]
dimension = "behavior"
case      = "hsv_primary_hues"
subject   = "colorsys.rgb_to_hsv"
kind      = "semantic"
intent    = "the HSV hue of pure red is 0, pure green is 1/3, pure blue is 2/3"

[[case]]
dimension = "behavior"
case      = "hsv_gray_zero_saturation"
subject   = "colorsys.rgb_to_hsv"
kind      = "semantic"
intent    = "any gray (r==g==b) has HSV saturation 0 across the [0,1] value range"

[[case]]
dimension = "behavior"
case      = "hsv_white_black_extremes"
subject   = "colorsys.rgb_to_hsv"
kind      = "semantic"
intent    = "white (1,1,1) maps to HSV saturation 0 / value 1 and black (0,0,0) maps to value 0"

# --- HLS component rules ---------------------------------------------------

[[case]]
dimension = "behavior"
case      = "hls_primary_lightness_half"
subject   = "colorsys.rgb_to_hls"
kind      = "semantic"
intent    = "each fully-saturated primary color (red/green/blue) has HLS lightness exactly 0.5"

[[case]]
dimension = "behavior"
case      = "hls_nearwhite_one_way"
subject   = "colorsys.rgb_to_hls"
kind      = "semantic"
intent    = "gh-106498 near-white inputs convert forward to a stable HLS even though the inverse is not exact: rgb_to_hls(0.9999999999999999,1,1)==(0.5,1.0,1.0) and hls_to_rgb of that is (1.0,1.0,1.0)"
source    = "Lib/test/test_colorsys.py"

# --- YIQ component rules ---------------------------------------------------

[[case]]
dimension = "behavior"
case      = "yiq_red_luminance"
subject   = "colorsys.rgb_to_yiq"
kind      = "semantic"
intent    = "the YIQ luminance (Y) of pure red is the documented 0.3 coefficient"

# --- full CPython oracle value tables --------------------------------------

[[case]]
dimension = "behavior"
case      = "hsv_value_table"
subject   = "colorsys.rgb_to_hsv"
kind      = "semantic"
intent    = "the canonical CPython RGB<->HSV value table (black/blue/green/cyan/red/purple/yellow/white/grey) matches in both directions"
source    = "Lib/test/test_colorsys.py"

[[case]]
dimension = "behavior"
case      = "hls_value_table"
subject   = "colorsys.rgb_to_hls"
kind      = "semantic"
intent    = "the canonical CPython RGB<->HLS value table (black/blue/green/cyan/red/purple/yellow/white/grey) matches in both directions"
source    = "Lib/test/test_colorsys.py"

[[case]]
dimension = "behavior"
case      = "yiq_value_table"
subject   = "colorsys.rgb_to_yiq"
kind      = "semantic"
intent    = "the canonical CPython RGB<->YIQ value table (black/blue/green/cyan/red/purple/yellow/white/grey) matches in both directions"
source    = "Lib/test/test_colorsys.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "palette_conversion_pipeline"
subject   = "colorsys"
kind      = "semantic"
intent    = "a UI palette tool round-trips a list of named RGB swatches through HSV, HLS, and YIQ, asserting each recovers the original and aggregating a deterministic checksum over the converted channels"
