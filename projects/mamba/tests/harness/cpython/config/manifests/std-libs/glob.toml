# Manifest for the stdlib `glob` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/glob/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py,
# the loose feature fixture glob_conformance.py (+ its .expected golden), and
# the real_world/_stub.py placeholder, plus extra cases drawn from the CPython
# oracle Lib/test/test_glob.py. No coverage dropped. bench/ kept as-is.
#
# Authoring rule (mamba gotcha): a fixture that creates files must do so inside
# tempfile.TemporaryDirectory(); paths are joined with os.path.join and results
# are sorted before comparison (glob order is filesystem-dependent).

bucket = "std-libs"
lib = "glob"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_glob"
subject   = "glob"
kind      = "mechanical"
probe     = "attr"
attr      = "glob"

[[case]]
dimension = "surface"
case      = "glob_is_callable"
subject   = "glob.glob"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "iglob_is_callable"
subject   = "glob.iglob"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "escape_is_callable"
subject   = "glob.escape"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "has_magic_is_callable"
subject   = "glob.has_magic"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "glob0_is_callable"
subject   = "glob.glob0"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "glob1_is_callable"
subject   = "glob.glob1"
kind      = "mechanical"
probe     = "callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc). glob is forgiving with malformed
# patterns (returns []), but it propagates TypeError for non-str/bytes args.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "int_pattern_raises"
subject    = "glob.glob"
kind       = "mechanical"
call       = "glob.glob(123)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "none_pattern_raises"
subject    = "glob.glob"
kind       = "mechanical"
call       = "glob.glob(None)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "iglob_int_pattern_raises"
subject    = "glob.iglob"
kind       = "mechanical"
call       = "list(glob.iglob(123))"
expect_exc = "TypeError"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

# --- core wildcard matching -----------------------------------------------

[[case]]
dimension = "behavior"
case      = "star_matches_extension"
subject   = "glob.glob"
kind      = "semantic"
intent    = "glob('*.txt') returns a list of the matching paths; in a temp dir of {a.txt,b.txt,c.py} the *.txt pattern yields exactly the two .txt files (sorted basenames ['a.txt','b.txt'])"
source    = "Lib/test/test_glob.py"

[[case]]
dimension = "behavior"
case      = "qmark_matches_exactly_one_char"
subject   = "glob.glob"
kind      = "semantic"
intent    = "? matches exactly one character, not zero or many: '?.txt' over {a.txt,ab.txt,abc.txt} matches only 'a.txt'"
source    = "Lib/test/test_glob.py"

[[case]]
dimension = "behavior"
case      = "char_class_matches_set"
subject   = "glob.glob"
kind      = "semantic"
intent    = "the character class [abc] matches any one of the listed chars: '[abc].txt' over {a,b,c,d}.txt yields a.txt,b.txt,c.txt and not d.txt"
source    = "Lib/test/test_glob.py"

[[case]]
dimension = "behavior"
case      = "no_match_returns_empty_list"
subject   = "glob.glob"
kind      = "semantic"
intent    = "a pattern with no matching entry returns an empty list (not None, not a raise): glob('*.xyz') in a dir with no .xyz files == []"

[[case]]
dimension = "behavior"
case      = "results_are_existing_paths"
subject   = "glob.glob"
kind      = "semantic"
intent    = "every path glob returns actually exists on disk: os.path.exists is True for each result of glob('*.txt') in a populated temp dir"

[[case]]
dimension = "behavior"
case      = "glob_returns_str_paths"
subject   = "glob.glob"
kind      = "semantic"
intent    = "a str pattern yields str results: every element of glob('*') in a temp dir is a str"
source    = "Lib/test/test_glob.py"

[[case]]
dimension = "behavior"
case      = "empty_pattern_returns_empty_list"
subject   = "glob.glob"
kind      = "semantic"
intent    = "glob('') returns [] (the empty pattern matches nothing)"
source    = "Lib/test/test_glob.py"

# --- directories vs files --------------------------------------------------

[[case]]
dimension = "behavior"
case      = "results_include_directories"
subject   = "glob.glob"
kind      = "semantic"
intent    = "glob('*') includes both files and subdirectories: a temp dir with a file 'file.txt' and a subdir 'subdir' yields both basenames"

# --- recursive ** ----------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "double_star_recursive_descends_all_levels"
subject   = "glob.glob"
kind      = "semantic"
intent    = "with recursive=True, '**/*.txt' descends every level: a tree {a.txt, sub/b.txt, sub/deep/c.txt} yields all three relative paths"
source    = "Lib/test/test_glob.py"

[[case]]
dimension = "behavior"
case      = "double_star_non_recursive_stays_one_level"
subject   = "glob.glob"
kind      = "semantic"
intent    = "with recursive=False, '**/*.txt' behaves like a single '*' segment and does NOT reach the deep 'sub/deep/c.txt' entry"
source    = "Lib/test/test_glob.py"

# --- iglob -----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "iglob_is_iterator"
subject   = "glob.iglob"
kind      = "semantic"
intent    = "iglob returns a lazy iterator (has __iter__ and __next__) whose materialized results match glob() for the same pattern"
source    = "Lib/test/test_glob.py"

[[case]]
dimension = "behavior"
case      = "iglob_matches_glob_results"
subject   = "glob.iglob"
kind      = "semantic"
intent    = "iglob and glob produce the same set of paths for one pattern: sorted(glob('*.py')) == sorted(iglob('*.py')) over {x,y,z}.py"
source    = "Lib/test/test_glob.py"

# --- escape ----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "escape_exact_strings"
subject   = "glob.escape"
kind      = "semantic"
intent    = "escape wraps each glob metacharacter in a literal character class: escape('plain')=='plain', escape('a*')=='a[*]', escape('a?b')=='a[?]b', escape('file*.txt')=='file[*].txt'"
source    = "Lib/test/test_glob.py"

[[case]]
dimension = "behavior"
case      = "escape_neutralizes_metachars"
subject   = "glob.escape"
kind      = "semantic"
intent    = "escape() makes a name with literal glob metachars matchable: a real file 'file[1].txt' is found by glob(escape(path)) and nothing else"
source    = "Lib/test/test_glob.py"

# --- has_magic -------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "has_magic_detects_wildcards"
subject   = "glob.has_magic"
kind      = "semantic"
intent    = "has_magic is True iff the pattern contains a glob metachar (* ? [): True for 'a*', 'a?b', 'x[1]'; False for 'plain' and 'path/to/file'"
source    = "Lib/test/test_glob.py"

# --- glob0 / glob1 helpers -------------------------------------------------

[[case]]
dimension = "behavior"
case      = "glob0_literal_basename"
subject   = "glob.glob0"
kind      = "semantic"
intent    = "glob0(dirname, literal) returns [literal] when the named entry exists in dirname and [] when it does not (literal-basename helper)"

[[case]]
dimension = "behavior"
case      = "glob1_pattern_in_dirname"
subject   = "glob.glob1"
kind      = "semantic"
intent    = "glob1(dirname, pattern) returns the basenames inside dirname matching pattern: '*.txt' yields only the .txt basenames, '*.rs' only the .rs ones"

# ===========================================================================
# REAL_WORLD — semantic (one realistic end-user flow)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "collect_project_sources_by_extension"
subject   = "glob.glob"
kind      = "semantic"
intent    = "a realistic build-tool flow: lay out a small project tree in a temp dir, then use recursive glob('**/*.py') to collect every Python source while skipping data/doc files, mirroring how a packager gathers inputs"
