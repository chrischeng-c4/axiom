# Manifest for the stdlib `numbers` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/numbers/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the real_world placeholder _stub.py. bench/ stays as-is (perf, golden-less).
# No coverage lost.
#
# numbers defines the numeric-tower ABCs Number / Complex / Real / Rational /
# Integral. The ABC names are CapWords classes, so the import inferer would
# stop short of the module; every Capword subject sets module="numbers".

bucket = "std-libs"
lib = "numbers"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable).
#
# The module import probe plus each of the five tower ABCs is callable
# (recovered from behavior.py's callable() block and surface.py's import).
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_numbers"
subject   = "numbers"
kind      = "mechanical"
probe     = "attr"
attr      = "Number"

[[case]]
dimension = "surface"
case      = "number_is_callable"
subject   = "numbers.Number"
kind      = "mechanical"
module    = "numbers"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "complex_is_callable"
subject   = "numbers.Complex"
kind      = "mechanical"
module    = "numbers"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "real_is_callable"
subject   = "numbers.Real"
kind      = "mechanical"
module    = "numbers"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "rational_is_callable"
subject   = "numbers.Rational"
kind      = "mechanical"
module    = "numbers"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "integral_is_callable"
subject   = "numbers.Integral"
kind      = "mechanical"
module    = "numbers"
probe     = "callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc), self-asserting raise.
#
# Instantiating an ABC that still carries abstract methods raises TypeError.
# Number has no abstract methods (it IS instantiable — that positive path is a
# behavior case, not an error). Subjects are CapWords classes; set
# module="numbers" so the import inferer resolves the real importable module.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "instantiate_complex_raises"
subject    = "numbers.Complex"
kind       = "mechanical"
module     = "numbers"
call       = "numbers.Complex()"
expect_exc = "TypeError"
source     = "Lib/test/test_abc.py"

[[case]]
dimension  = "errors"
case       = "instantiate_real_raises"
subject    = "numbers.Real"
kind       = "mechanical"
module     = "numbers"
call       = "numbers.Real()"
expect_exc = "TypeError"
source     = "Lib/test/test_abc.py"

[[case]]
dimension  = "errors"
case       = "instantiate_rational_raises"
subject    = "numbers.Rational"
kind       = "mechanical"
module     = "numbers"
call       = "numbers.Rational()"
expect_exc = "TypeError"
source     = "Lib/test/test_abc.py"

[[case]]
dimension  = "errors"
case       = "instantiate_integral_raises"
subject    = "numbers.Integral"
kind       = "mechanical"
module     = "numbers"
call       = "numbers.Integral()"
expect_exc = "TypeError"
source     = "Lib/test/test_abc.py"

[[case]]
dimension  = "errors"
case       = "incomplete_integral_subclass_raises"
subject    = "numbers.Integral"
kind       = "mechanical"
module     = "numbers"
call       = "type('WrongInt', (numbers.Integral,), {})()"
expect_exc = "TypeError"
source     = "Lib/test/test_abc.py"

# ===========================================================================
# BEHAVIOR — semantic (skeletons; an agent fills the body).
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "number_has_no_abstracts_instantiable"
subject   = "numbers.Number"
kind      = "semantic"
module    = "numbers"
intent    = "Number declares no abstract methods, so it is concrete and Number() instantiates without raising"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "tower_abcs_are_callable"
subject   = "numbers.Number"
kind      = "semantic"
module    = "numbers"
intent    = "all five tower ABCs (Number/Complex/Real/Rational/Integral) are callable class objects, not function-name stubs (#1261)"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "concrete_builtin_registrations"
subject   = "numbers.Integral"
kind      = "semantic"
module    = "numbers"
intent    = "int registers as Integral, float as Real (not Integral), complex as Complex (not Real), bool as Integral, and str is not a Number"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "tower_inheritance_chain"
subject   = "numbers.Integral"
kind      = "semantic"
module    = "numbers"
intent    = "the numeric tower nests Integral < Rational < Real < Complex < Number via __bases__, issubclass, and the Integral MRO"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "fraction_is_rational_not_integral"
subject   = "numbers.Rational"
kind      = "semantic"
module    = "numbers"
intent    = "fractions.Fraction is a Rational and a Real but not an Integral"
source    = "Lib/test/test_fractions.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario).
# Promotes the _stub.py placeholder to a numeric-tower dispatch flow.
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "numeric_tower_dispatch"
subject   = "numbers.Number"
kind      = "semantic"
module    = "numbers"
intent    = "a value-classifier walks the numeric tower (Integral->Real->Complex->Number) to label mixed inputs and reject non-numbers, the way a serializer or validator dispatches by abstract numeric kind"
source    = "Lib/test/test_abc.py"
