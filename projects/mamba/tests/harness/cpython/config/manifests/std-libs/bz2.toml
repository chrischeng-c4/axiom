# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "archive_roundtrip"
subject   = "bz2.compress"
kind      = "semantic"
intent    = "an archival pipeline bzip2-compresses two distinct document batches, verifies the BZh magic header, round-trips each batch, and cross-checks zlib.crc32 over the decoded bytes"
