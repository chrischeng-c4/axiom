# ===========================================================================
# ERRORS — mechanical (call + expect_exc, generator emits assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "decompress_bad_stream_raises"
subject    = "bz2.decompress"
kind       = "mechanical"
call       = 'bz2.decompress(b"not a bz2 stream")'
expect_exc = "OSError"
source     = "Lib/test/test_bz2.py"

[[case]]
dimension  = "errors"
case       = "compress_level_zero_raises"
subject    = "bz2.compress"
kind       = "mechanical"
call       = 'bz2.compress(b"x", 0)'
expect_exc = "ValueError"
source     = "Lib/test/test_bz2.py"

[[case]]
dimension  = "errors"
case       = "compress_level_ten_raises"
subject    = "bz2.compress"
kind       = "mechanical"
call       = 'bz2.compress(b"x", 10)'
expect_exc = "ValueError"
source     = "Lib/test/test_bz2.py"

[[case]]
dimension  = "errors"
case       = "decompressor_ctor_positional_raises"
subject    = "bz2.BZ2Decompressor"
kind       = "mechanical"
call       = "bz2.BZ2Decompressor(42)"
expect_exc = "TypeError"
module     = "bz2"
source     = "Lib/test/test_bz2.py"

[[case]]
dimension  = "errors"
case       = "decompressor_noarg_raises"
subject    = "bz2.BZ2Decompressor"
kind       = "mechanical"
call       = "bz2.BZ2Decompressor().decompress()"
expect_exc = "TypeError"
module     = "bz2"
source     = "Lib/test/test_bz2.py"

[[case]]
dimension  = "errors"
case       = "decompress_after_eof_raises"
subject    = "bz2.BZ2Decompressor"
kind       = "mechanical"
call       = '(lambda d: (d.decompress(bz2.compress(b"x")), d.decompress(b"more"))) (bz2.BZ2Decompressor())'
expect_exc = "EOFError"
module     = "bz2"
source     = "Lib/test/test_bz2.py"

[[case]]
dimension  = "errors"
case       = "bz2file_bad_mode_raises"
subject    = "bz2.BZ2File"
kind       = "mechanical"
import     = "import bz2, io"
call       = 'bz2.BZ2File(io.BytesIO(), "z")'
expect_exc = "ValueError"
source     = "Lib/test/test_bz2.py"

[[case]]
dimension  = "errors"
case       = "bz2file_float_filename_raises"
subject    = "bz2.BZ2File"
kind       = "mechanical"
call       = "bz2.BZ2File(123.456)"
expect_exc = "TypeError"
module     = "bz2"
source     = "Lib/test/test_bz2.py"

[[case]]
dimension  = "errors"
case       = "bz2file_compresslevel_zero_raises"
subject    = "bz2.BZ2File"
kind       = "mechanical"
import     = "import bz2, io"
call       = 'bz2.BZ2File(io.BytesIO(), "w", compresslevel=0)'
expect_exc = "ValueError"
source     = "Lib/test/test_bz2.py"

[[case]]
dimension  = "errors"
case       = "bz2file_compresslevel_ten_raises"
subject    = "bz2.BZ2File"
kind       = "mechanical"
import     = "import bz2, io"
call       = 'bz2.BZ2File(io.BytesIO(), "w", compresslevel=10)'
expect_exc = "ValueError"
source     = "Lib/test/test_bz2.py"

[[case]]
dimension  = "errors"
case       = "open_text_param_in_binary_mode_raises"
subject    = "bz2.open"
kind       = "mechanical"
import     = "import bz2, io"
call       = 'bz2.open(io.BytesIO(), "rb", encoding="utf-8")'
expect_exc = "ValueError"
source     = "Lib/test/test_bz2.py"

[[case]]
dimension  = "errors"
case       = "open_text_binary_mode_combo_raises"
subject    = "bz2.open"
kind       = "mechanical"
import     = "import bz2, io"
call       = 'bz2.open(io.BytesIO(), "wbt")'
expect_exc = "ValueError"
source     = "Lib/test/test_bz2.py"

