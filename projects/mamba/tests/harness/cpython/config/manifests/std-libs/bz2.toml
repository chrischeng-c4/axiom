# Manifest for the stdlib `bz2` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/bz2/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# plus the loose feature fixtures (bz2file_io.py, decompressor.py, open_modes.py,
# decompression_bomb.py) and real_world/archive_roundtrip.py. CPython 3.12 is
# the oracle. bench/ is left as-is (not modeled here).

bucket = "std-libs"
lib    = "bz2"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "compress_is_callable"
subject   = "bz2.compress"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "decompress_is_callable"
subject   = "bz2.decompress"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "open_is_callable"
subject   = "bz2.open"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "bz2file_present"
subject   = "bz2"
kind      = "mechanical"
probe     = "attr"
attr      = "BZ2File"

[[case]]
