# ===========================================================================
# SECURITY — semantic (adversarial / untrusted input)
# ===========================================================================

[[case]]
dimension = "security"
case      = "decompression_bomb_bounded"
subject   = "bz2.BZ2Decompressor"
kind      = "semantic"
intent    = "a high-ratio decompression bomb is contained by max_length-bounded BZ2Decompressor.decompress under a total budget, with EOFError after the stream ends and trailing attacker bytes routed to unused_data"
module    = "bz2"
source    = "Lib/test/test_bz2.py"
