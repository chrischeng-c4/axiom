# ===========================================================================
# BEHAVIOR — semantic (output matches CPython 3.12)
# ===========================================================================

# --- generation -----------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "uuid4_is_version_4_random"
subject   = "uuid.uuid4"
kind      = "semantic"
intent    = "uuid4() returns a version-4 UUID with the RFC 4122 variant, and two successive calls differ (random)"
source    = "Lib/test/test_uuid.py"

[[case]]
dimension = "behavior"
case      = "uuid5_is_deterministic"
subject   = "uuid.uuid5"
kind      = "semantic"
intent    = "uuid5(NAMESPACE_DNS, 'example.com') is deterministic: two calls with the same name yield equal version-5 UUIDs"
source    = "Lib/test/test_uuid.py"

[[case]]
dimension = "behavior"
case      = "uuid5_python_org_rfc_vector"
subject   = "uuid.uuid5"
kind      = "semantic"
intent    = "uuid5(NAMESPACE_DNS, 'python.org') equals the known SHA-1 vector '886313e1-3b8a-5372-9b90-0c9aee199e5d'"
source    = "Lib/test/test_uuid.py"

[[case]]
dimension = "behavior"
case      = "uuid3_is_deterministic_md5"
subject   = "uuid.uuid3"
kind      = "semantic"
intent    = "uuid3(NAMESPACE_URL, 'http://test.com') is MD5-deterministic (two calls equal) and reports version 3"
source    = "Lib/test/test_uuid.py"

[[case]]
dimension = "behavior"
case      = "uuid1_node_clock_seq_roundtrip"
subject   = "uuid.uuid1"
kind      = "semantic"
intent    = "uuid1(node, clock_seq) with explicit values round-trips both fields, reports version 1, RFC 4122 variant, and a positive 60-bit time"
source    = "Lib/test/test_uuid.py"

[[case]]
dimension = "behavior"
case      = "uuid1_default_is_version_1"
subject   = "uuid.uuid1"
kind      = "semantic"
intent    = "uuid1() with no args is still a version-1 RFC 4122 UUID and accepts the live getnode() value without raising"
source    = "Lib/test/test_uuid.py"

[[case]]
dimension = "behavior"
case      = "getnode_is_stable_48_bit"
subject   = "uuid.getnode"
kind      = "semantic"
intent    = "getnode() returns a stable 48-bit unsigned node id (repeat calls equal) that feeds uuid1().node within range"
source    = "Lib/test/test_uuid.py"

