# Manifest for the stdlib `uuid` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/uuid/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature + paired-.expected golden
# shape (surface.py, behavior.py, errors.py, getnode.py, safe_uuid.py, uuid1.py,
# uuid_basic.py/.expected). bench/ (uuid4_hex_bulk.py) is left as-is.
#
# `uuid` is a top-level module, so the import inferer resolves `uuid.*` and
# `uuid.UUID.*` subjects to `import uuid` with no override needed. The
# SafeUUID enum case additionally needs `enum`, set via an explicit `import`.

bucket = "std-libs"
lib = "uuid"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_uuid"
subject   = "uuid"
kind      = "mechanical"
probe     = "attr"
attr      = "UUID"

[[case]]
dimension = "surface"
case      = "uuid1_is_callable"
subject   = "uuid.uuid1"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "uuid3_is_callable"
subject   = "uuid.uuid3"
kind      = "mechanical"
probe     = "callable"

