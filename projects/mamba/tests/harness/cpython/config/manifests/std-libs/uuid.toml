# ===========================================================================
# ERRORS — mechanical (call + expect_exc; assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "bad_string_raises_valueerror"
subject    = "uuid.UUID"
kind       = "mechanical"
call       = 'uuid.UUID("not_a_uuid")'
