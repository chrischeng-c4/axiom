kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "uuid_class_is_callable"
subject   = "uuid.UUID"
kind      = "mechanical"
probe     = "callable"
module    = "uuid"

[[case]]
