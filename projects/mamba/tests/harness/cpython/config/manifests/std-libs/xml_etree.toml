# ===========================================================================
# ERRORS — mechanical (call + expect_exc; assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "fromstring_malformed_raises"
subject    = "xml.etree.ElementTree.fromstring"
kind       = "mechanical"
import     = "import xml.etree.ElementTree as ET"
call       = "ET.fromstring(\"<unclosed>text</wrong>\")"
expect_exc = "ET.ParseError"
source     = "Lib/test/test_xml_etree.py"

[[case]]
dimension  = "errors"
case       = "fromstring_empty_raises"
