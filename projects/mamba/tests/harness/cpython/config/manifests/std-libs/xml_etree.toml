# Manifest for the stdlib `xml.etree.ElementTree` conformance corpus.
#
# The lib slug is the dotted-submodule alias `xml_etree`; the REAL importable
# module is `xml.etree.ElementTree`. The import inferer stops at the first
# CapWords component (`ElementTree`), so it cannot guess the module from a
# subject like `xml.etree.ElementTree.fromstring` — every case therefore sets
# an explicit `module = "xml.etree.ElementTree"` (or an `import =` override for
# the errors cases, so the raising call reads `ET.<call>`).
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/xml_etree/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the loose feature files mutation.py / namespace.py / serialize.py / xpath.py /
# fileio.py / pullparser.py and the security fixture entity_expansion_bomb.py.

bucket = "std-libs"
lib    = "xml_etree"

