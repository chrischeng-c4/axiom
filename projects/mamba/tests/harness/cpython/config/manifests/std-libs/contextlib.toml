# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "transactional_resource_cleanup"
subject   = "contextlib.ExitStack"
kind      = "semantic"
module    = "contextlib"
intent    = "a transactional batch job acquires several resources through one ExitStack, commits on success, and on a mid-batch failure unwinds every already-acquired resource in LIFO order before the error surfaces — the canonical all-or-nothing cleanup pattern"
