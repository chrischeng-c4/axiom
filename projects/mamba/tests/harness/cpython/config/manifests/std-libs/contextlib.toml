# Manifest for the stdlib `contextlib` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/contextlib/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the loose feature files abstract_cm.py / context_decorator.py / exit_stack.py
# / reuse_reentrant.py, plus the real_world placeholder _stub.py. bench/ stays
# as-is. No coverage lost.
#
# Most surface probes name CapWords classes (ExitStack, AbstractContextManager,
# ContextDecorator) or class methods; the import inferer stops at the first
# CapWords component, so module="contextlib" is set explicitly on those.

bucket = "std-libs"
lib = "contextlib"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_contextlib"
subject   = "contextlib"
kind      = "mechanical"
probe     = "attr"
attr      = "contextmanager"

[[case]]
dimension = "surface"
case      = "contextmanager_is_callable"
subject   = "contextlib.contextmanager"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "closing_is_callable"
subject   = "contextlib.closing"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "nullcontext_is_callable"
subject   = "contextlib.nullcontext"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "suppress_is_callable"
subject   = "contextlib.suppress"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "redirect_stdout_is_callable"
subject   = "contextlib.redirect_stdout"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "redirect_stderr_is_callable"
subject   = "contextlib.redirect_stderr"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "exit_stack_is_callable"
subject   = "contextlib.ExitStack"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "abstract_context_manager_attr"
subject   = "contextlib"
kind      = "mechanical"
probe     = "attr"
attr      = "AbstractContextManager"

[[case]]
dimension = "surface"
case      = "context_decorator_attr"
subject   = "contextlib"
kind      = "mechanical"
probe     = "attr"
attr      = "ContextDecorator"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc, generator emits assert-it-raised).
#
# The exception subjects (ExitStack.enter_context, AbstractContextManager())
# would stop the import inferer at the CapWords class, so module="contextlib"
# is set on those.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "suppress_does_not_catch_other_type"
subject    = "contextlib.suppress"
kind       = "mechanical"
call       = "exec('import contextlib\\nwith contextlib.suppress(ValueError):\\n    raise KeyError(\"x\")')"
expect_exc = "KeyError"
source     = "Lib/test/test_contextlib.py"

[[case]]
dimension  = "errors"
case       = "abstract_missing_exit_not_instantiable"
subject    = "contextlib.AbstractContextManager"
kind       = "mechanical"
module     = "contextlib"
call       = "type('MissingExit', (contextlib.AbstractContextManager,), {})()"
expect_exc = "TypeError"
source     = "Lib/test/test_contextlib.py"

[[case]]
dimension  = "errors"
case       = "enter_context_rejects_non_cm"
subject    = "contextlib.ExitStack"
kind       = "mechanical"
module     = "contextlib"
call       = "contextlib.ExitStack().enter_context(object())"
expect_exc = "TypeError"
source     = "Lib/test/test_contextlib.py"

# ===========================================================================
# ERRORS — semantic (paths beyond the plain call/expect_exc mechanical
# template: assert-on-message, exact exception identity, no-raise happy paths).
# ===========================================================================

[[case]]
dimension = "errors"
case      = "contextmanager_no_yield_raises_runtimeerror"
subject   = "contextlib.contextmanager"
kind      = "semantic"
intent    = "a @contextmanager-decorated function that never yields raises RuntimeError when its with-block is entered (the inner generator stops immediately)"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "errors"
case      = "contextmanager_second_yield_raises_runtimeerror"
subject   = "contextlib.contextmanager"
kind      = "semantic"
intent    = "a @contextmanager generator that yields a second time raises RuntimeError at __exit__ (the manager forbids resuming past the single yield point)"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "errors"
case      = "contextmanager_param_errors_raise_typeerror"
subject   = "contextlib.contextmanager"
kind      = "semantic"
intent    = "a @contextmanager-wrapped factory validates its own signature: calling it with missing/extra/wrong arguments raises TypeError before any with-block"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "errors"
case      = "contextmanager_reraises_chained_runtimeerror"
subject   = "contextlib.contextmanager"
kind      = "semantic"
intent    = "a @contextmanager that converts a body exception via `raise RuntimeError(...) from exc` propagates the new RuntimeError out, with __cause__ set to the original"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "errors"
case      = "contextmanager_stopiteration_passes_through"
subject   = "contextlib.contextmanager"
kind      = "semantic"
intent    = "PEP 479: a StopIteration raised inside the with-body is NOT swallowed or replaced by the manager — the same StopIteration instance propagates unchanged"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "errors"
case      = "context_decorator_typo_exit_raises_typeerror"
subject   = "contextlib.ContextDecorator"
kind      = "semantic"
module    = "contextlib"
intent    = "a ContextDecorator subclass that misspells __exit__ raises TypeError at enter time, with a message mentioning the context manager protocol"
source    = "Lib/test/test_contextlib.py"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- contextmanager decorator ---------------------------------------------

[[case]]
dimension = "behavior"
case      = "contextmanager_yields_value_in_order"
subject   = "contextlib.contextmanager"
kind      = "semantic"
intent    = "a @contextmanager runs the pre-yield body on enter, yields its value to `as`, then runs the post-yield body on exit, in that order (before/during/after)"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "behavior"
case      = "contextmanager_finally_runs_on_exception"
subject   = "contextlib.contextmanager"
kind      = "semantic"
intent    = "a @contextmanager whose body raises still runs its finally-clause cleanup before the exception propagates out of the with-block"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "behavior"
case      = "contextmanager_can_suppress_by_catching_yield"
subject   = "contextlib.contextmanager"
kind      = "semantic"
intent    = "a @contextmanager that wraps `yield` in try/except ValueError swallows a ValueError raised in the body, so it does not propagate"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "behavior"
case      = "contextmanager_forwards_keyword_arguments"
subject   = "contextlib.contextmanager"
kind      = "semantic"
intent    = "a @contextmanager forwards positional and keyword arguments verbatim to the wrapped generator (even argument names like self/func/args/kwds)"
source    = "Lib/test/test_contextlib.py"

# --- closing ---------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "closing_calls_close_on_exit"
subject   = "contextlib.closing"
kind      = "semantic"
intent    = "contextlib.closing(obj) calls obj.close() when the with-block exits normally, and obj is not closed before the block ends"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "behavior"
case      = "closing_calls_close_on_exception"
subject   = "contextlib.closing"
kind      = "semantic"
intent    = "contextlib.closing(obj) still calls obj.close() when the with-body raises, before re-raising the exception"
source    = "Lib/test/test_contextlib.py"

# --- nullcontext -----------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "nullcontext_yields_its_argument"
subject   = "contextlib.nullcontext"
kind      = "semantic"
intent    = "nullcontext(value) yields the value to `as` and is a no-op manager; nullcontext() with no argument yields None"
source    = "Lib/test/test_contextlib.py"

# --- suppress --------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "suppress_catches_listed_exceptions_only"
subject   = "contextlib.suppress"
kind      = "semantic"
intent    = "suppress(KeyError, IndexError) swallows a listed exception but lets an unlisted ValueError propagate out of the with-block"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "behavior"
case      = "suppress_is_reusable_and_reentrant"
subject   = "contextlib.suppress"
kind      = "semantic"
intent    = "a single suppress() instance can be entered repeatedly (reusable) and nested within itself (reentrant); the outer block resumes after an inner block swallows an exception"
source    = "Lib/test/test_contextlib.py"

# --- redirect_stdout / redirect_stderr -------------------------------------

[[case]]
dimension = "behavior"
case      = "redirect_stdout_captures_print"
subject   = "contextlib.redirect_stdout"
kind      = "semantic"
intent    = "redirect_stdout(buf) routes print() output into buf for the duration of the with-block and yields buf as the enter result"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "behavior"
case      = "redirect_stderr_captures_stderr"
subject   = "contextlib.redirect_stderr"
kind      = "semantic"
intent    = "redirect_stderr(buf) routes writes to sys.stderr into buf for the duration of the with-block"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "behavior"
case      = "redirect_stdout_reusable_restores_stream"
subject   = "contextlib.redirect_stdout"
kind      = "semantic"
intent    = "a single redirect_stdout(buf) instance is reusable: re-entering keeps writing to the same target and sys.stdout is restored after each block"
source    = "Lib/test/test_contextlib.py"

# --- ExitStack -------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "exitstack_callbacks_run_lifo"
subject   = "contextlib.ExitStack"
kind      = "semantic"
module    = "contextlib"
intent    = "ExitStack.callback returns the registered function unchanged and replays stored args/kwargs at unwind time, in LIFO order"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "behavior"
case      = "exitstack_enter_context_exits_lifo"
subject   = "contextlib.ExitStack"
kind      = "semantic"
module    = "contextlib"
intent    = "ExitStack.enter_context enters each context manager and exits them in LIFO order when the stack closes"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "behavior"
case      = "exitstack_push_registers_raw_exit_callable"
subject   = "contextlib.ExitStack"
kind      = "semantic"
module    = "contextlib"
intent    = "ExitStack.push registers a raw __exit__-style callable (bypassing the __enter__ check) and a push()ed callback returning True suppresses a body exception"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "behavior"
case      = "exitstack_pop_all_transfers_callbacks"
subject   = "contextlib.ExitStack"
kind      = "semantic"
module    = "contextlib"
intent    = "ExitStack.pop_all moves the registered callbacks to a fresh stack; closing the original is then a no-op and closing the new stack fires the callbacks"
source    = "Lib/test/test_contextlib.py"

[[case]]
dimension = "behavior"
case      = "exitstack_propagation_order_keeps_earliest"
subject   = "contextlib.ExitStack"
kind      = "semantic"
module    = "contextlib"
intent    = "with callbacks running LIFO, a suppressor swallows the later-raised exception and the earlier raised exception is the one that propagates out"
source    = "Lib/test/test_contextlib.py"

# --- AbstractContextManager ------------------------------------------------

[[case]]
dimension = "behavior"
case      = "abstract_cm_structural_subclass"
subject   = "contextlib.AbstractContextManager"
kind      = "semantic"
module    = "contextlib"
intent    = "any class defining both __enter__ and __exit__ is a virtual subclass of AbstractContextManager via __subclasshook__; setting either to None opts the class back out"
