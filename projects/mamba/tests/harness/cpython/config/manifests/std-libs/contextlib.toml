case      = "abstract_cm_default_enter_returns_self"
subject   = "contextlib.AbstractContextManager"
kind      = "semantic"
module    = "contextlib"
intent    = "the default __enter__ provided by AbstractContextManager returns self, so a concrete subclass that only defines __exit__ yields itself to `as`"
