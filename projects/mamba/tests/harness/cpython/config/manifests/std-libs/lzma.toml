# Manifest for the stdlib `lzma` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/lzma/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, decompressor.py, filters.py, lzmafile.py,
# decompression_bomb.py, real_world/archive_roundtrip.py). bench/ is left
# as-is.
#
# mamba gap (src/runtime/stdlib/lzma_mod.rs): only lzma.compress / decompress
# are real (and they ignore every kwarg — format/preset/filters/memlimit/check
# are dropped). LZMAFile, open, LZMAError, LZMACompressor, LZMADecompressor are
# sentinel-string stubs; constructing/calling them does NOT behave like the
# class. Filter-property helpers (_encode/_decode_filter_properties,
# is_check_supported) and several FILTER_* constants are absent. Cases that
# depend on any of these carry an xfail citing lzma_mod.rs.

bucket = "std-libs"
lib = "lzma"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_lzma"
subject   = "lzma"
kind      = "mechanical"
probe     = "attr"
attr      = "compress"

