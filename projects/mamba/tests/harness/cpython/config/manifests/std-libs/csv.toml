# Manifest for the stdlib `csv` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/csv/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the loose feature files dialects.py / dict_io.py / writer_values.py (plus the
# trivial csv_conformance.py / csv_ops.py import probes). CPython 3.12 oracle:
# Lib/test/test_csv.py.

bucket = "std-libs"
lib    = "csv"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_csv"
subject   = "csv"
kind      = "mechanical"
probe     = "attr"
attr      = "reader"

[[case]]
dimension = "surface"
case      = "reader_is_callable"
subject   = "csv.reader"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "writer_is_callable"
subject   = "csv.writer"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "dictreader_is_callable"
subject   = "csv.DictReader"
kind      = "mechanical"
probe     = "callable"
module    = "csv"

[[case]]
dimension = "surface"
case      = "dictwriter_is_callable"
subject   = "csv.DictWriter"
kind      = "mechanical"
probe     = "callable"
module    = "csv"

[[case]]
dimension = "surface"
case      = "register_dialect_is_callable"
subject   = "csv.register_dialect"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "list_dialects_is_callable"
subject   = "csv.list_dialects"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "field_size_limit_is_callable"
subject   = "csv.field_size_limit"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "quote_minimal_is_zero"
subject   = "csv.QUOTE_MINIMAL"
kind      = "mechanical"
probe     = "attr"
attr      = "real"

[[case]]
dimension = "surface"
case      = "quote_all_is_int"
subject   = "csv.QUOTE_ALL"
kind      = "mechanical"
probe     = "type"
typename  = "int"

[[case]]
dimension = "surface"
case      = "error_is_present"
subject   = "csv.Error"
kind      = "mechanical"
probe     = "callable"
module    = "csv"

[[case]]
dimension = "surface"
case      = "dialect_is_present"
subject   = "csv.Dialect"
kind      = "mechanical"
probe     = "callable"
module    = "csv"

# ===========================================================================
# BEHAVIOR — semantic rules (output must match CPython 3.12 exactly)
# ===========================================================================

# --- reader / writer core (from behavior.py) ---

[[case]]
dimension = "behavior"
case      = "reader_quoted_field_keeps_embedded_comma"
subject   = "csv.reader"
kind      = "semantic"
intent    = "a double-quoted field preserves an embedded comma; remaining fields split normally and all come back as str"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "writer_stringifies_each_value"
subject   = "csv.writer"
kind      = "semantic"
intent    = "writerow renders int/float/bool/None via str(): None becomes empty, others their str() form"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "quote_all_wraps_every_field"
subject   = "csv.writer"
kind      = "semantic"
intent    = "quoting=QUOTE_ALL wraps each written field in the quotechar"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "delimiter_changes_separator_both_ways"
subject   = "csv.writer"
kind      = "semantic"
intent    = "a custom delimiter is used by writer output and honored by reader parsing"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "empty_field_round_trips"
subject   = "csv.writer"
kind      = "semantic"
intent    = "an empty middle field survives a writer -> reader round trip as an empty string"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "custom_quotechar_used_for_quoting"
subject   = "csv.writer"
kind      = "semantic"
intent    = "a custom quotechar replaces the default double-quote when QUOTE_ALL wraps fields"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "writerows_emits_each_row"
subject   = "csv.writer"
kind      = "semantic"
intent    = "writerows emits one parsed row per input sequence in order"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "default_lineterminator_is_crlf"
subject   = "csv.writer"
kind      = "semantic"
intent    = "the default line terminator written after a row is carriage-return + newline"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "reader_line_num_tracks_consumed_lines"
subject   = "csv.reader"
kind      = "semantic"
intent    = "reader.line_num starts at 0, increments per consumed source line, and stays put at EOF"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "writer_none_fields_render_empty"
subject   = "csv.writer"
kind      = "semantic"
intent    = "None fields render as empty; a lone None field becomes a quoted empty string"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "writer_accepts_any_value_iterable"
subject   = "csv.writer"
kind      = "semantic"
intent    = "writerow consumes an arbitrary iterable (e.g. a generator) and stringifies each value"
source    = "Lib/test/test_csv.py"

# --- DictReader / DictWriter (from behavior.py + dict_io.py) ---

[[case]]
dimension = "behavior"
case      = "dictreader_infers_fieldnames_from_first_row"
subject   = "csv.DictReader"
kind      = "semantic"
intent    = "DictReader uses the first row as fieldnames and maps each later row to those keys"
module    = "csv"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "dictwriter_writeheader_writes_fieldnames_row"
subject   = "csv.DictWriter"
kind      = "semantic"
intent    = "DictWriter.writeheader emits the fieldnames as the first row, followed by mapped data rows"
module    = "csv"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "dictreader_restkey_collects_extra_values"
subject   = "csv.DictReader"
kind      = "semantic"
intent    = "trailing values beyond fieldnames are collected into a list under restkey"
module    = "csv"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "dictreader_restval_fills_missing_values"
subject   = "csv.DictReader"
kind      = "semantic"
intent    = "missing trailing values are filled with restval; the default restval is None"
module    = "csv"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "dict_fieldnames_materialized_from_iterable"
subject   = "csv.DictReader"
kind      = "semantic"
intent    = "DictReader and DictWriter accept any iterable for fieldnames and store it as a list"
module    = "csv"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "dictwriter_writeheader_returns_char_count"
subject   = "csv.DictWriter"
kind      = "semantic"
intent    = "writeheader returns the number of characters written and emits the CRLF-terminated header"
module    = "csv"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "dictwriter_extrasaction_ignore_drops_unknown_keys"
subject   = "csv.DictWriter"
kind      = "semantic"
intent    = "extrasaction='ignore' silently drops keys not in fieldnames and writes only the known fields"
module    = "csv"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "dict_field_order_preserved_round_trip"
subject   = "csv.DictWriter"
kind      = "semantic"
intent    = "fieldname order survives a DictWriter header -> DictReader round trip across several orderings"
module    = "csv"
source    = "Lib/test/test_csv.py"

# --- dialect machinery (from dialects.py) ---

[[case]]
dimension = "behavior"
case      = "builtin_dialects_registered"
subject   = "csv.list_dialects"
kind      = "semantic"
intent    = "the built-in excel, excel-tab, and unix dialects are always present in list_dialects"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "register_get_unregister_dialect_round_trip"
subject   = "csv.register_dialect"
kind      = "semantic"
intent    = "a registered named dialect is usable by reader/writer and disappears after unregister_dialect"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "custom_dialect_subclass_instance_accepted"
subject   = "csv.Dialect"
kind      = "semantic"
intent    = "a custom Dialect subclass instance drives parsing: adjacent delimiters yield empty fields"
module    = "csv"
source    = "Lib/test/test_csv.py"

[[case]]
dimension = "behavior"
case      = "escapechar_round_trips_under_quote_none"
subject   = "csv.writer"
kind      = "semantic"
intent    = "under QUOTE_NONE the escapechar escapes an embedded delimiter and the value round-trips through reader"
source    = "Lib/test/test_csv.py"

# ===========================================================================
# ERRORS — mechanical assert-it-raised (CPython 3.12 oracle confirms the type)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "unknown_dialect_raises"
subject   = "csv.reader"
kind      = "mechanical"
call      = 'csv.reader(["a,b"], dialect="no_such_dialect")'
expect_exc = "csv.Error"

[[case]]
dimension = "errors"
case      = "out_of_range_quoting_raises"
subject   = "csv.writer"
kind      = "mechanical"
call      = "csv.writer([], quoting=999)"
expect_exc = "TypeError"

[[case]]
dimension = "errors"
case      = "negative_quoting_raises"
subject   = "csv.reader"
kind      = "mechanical"
call      = "csv.reader([], quoting=-1)"
expect_exc = "TypeError"

[[case]]
dimension = "errors"
case      = "unknown_kwarg_raises"
subject   = "csv.reader"
kind      = "mechanical"
call      = "csv.reader([], bad_attr=0)"
expect_exc = "TypeError"

[[case]]
dimension = "errors"
case      = "delimiter_none_raises"
subject   = "csv.reader"
kind      = "mechanical"
call      = "csv.reader([], delimiter=None)"
expect_exc = "TypeError"

[[case]]
dimension = "errors"
case      = "field_too_large_raises"
subject   = "csv.field_size_limit"
kind      = "mechanical"
call      = 'csv.field_size_limit(10) and list(csv.reader(["a" * 50 + ",b"]))'
expect_exc = "csv.Error"

[[case]]
dimension = "errors"
case      = "dictwriter_extra_field_raises"
subject   = "csv.DictWriter"
kind      = "mechanical"
call      = 'csv.DictWriter(__import__("io").StringIO(), fieldnames=["a", "b"], extrasaction="raise").writerow({"a": 1, "b": 2, "extra": 3})'
expect_exc = "ValueError"
module    = "csv"

[[case]]
dimension = "errors"
case      = "dictwriter_bad_extrasaction_raises"
subject   = "csv.DictWriter"
kind      = "mechanical"
call      = 'csv.DictWriter(__import__("io").StringIO(), ["f1", "f2"], extrasaction="raised")'
expect_exc = "ValueError"
module    = "csv"

[[case]]
dimension = "errors"
case      = "get_unknown_dialect_raises"
subject   = "csv.get_dialect"
kind      = "mechanical"
call      = 'csv.get_dialect("nonesuch")'
expect_exc = "csv.Error"

[[case]]
dimension = "errors"
case      = "unregister_unknown_dialect_raises"
subject   = "csv.unregister_dialect"
kind      = "mechanical"
call      = 'csv.unregister_dialect("nonesuch")'
expect_exc = "csv.Error"

[[case]]
dimension = "errors"
case      = "incomplete_dialect_subclass_raises"
subject   = "csv.Dialect"
kind      = "mechanical"
call      = 'type("_Incomplete", (csv.Dialect,), {"delimiter": "\\t"})()'
expect_exc = "csv.Error"
module    = "csv"

[[case]]
dimension = "errors"
case      = "writerows_none_raises"
subject   = "csv.writer"
kind      = "mechanical"
call      = "csv.writer([]).writerows(None)"
expect_exc = "TypeError"

[[case]]
dimension = "errors"
case      = "writerows_propagates_file_error"
subject   = "csv.writer"
kind      = "mechanical"
import     = "import csv\nclass _BrokenFile:\n    def write(self, buf):\n        raise OSError('boom')"
call      = "csv.writer(_BrokenFile()).writerows([['a']])"
expect_exc = "OSError"
