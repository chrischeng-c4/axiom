# REAL_WORLD — semantic
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "ascii_transport_round_trip"
subject   = "base64.b64encode"
kind      = "semantic"
intent    = "end-user scenario: serialise a small binary blob to base64 for an ASCII-only transport, then decode it back, also via the urlsafe alphabet"
