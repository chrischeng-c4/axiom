# ===========================================================================
# ERRORS — mechanical (call + expect_exc, self-asserting)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "b64decode_invalid_chars_validate_raises"
subject    = "base64.b64decode"
kind       = "mechanical"
import     = "import base64\nimport binascii"
call       = "base64.b64decode(b'not_base64!@#$', validate=True)"
expect_exc = "binascii.Error"
source     = "Lib/test/test_base64.py"

[[case]]
dimension  = "errors"
case       = "b64decode_odd_padding_raises"
subject    = "base64.b64decode"
kind       = "mechanical"
import     = "import base64\nimport binascii"
call       = "base64.b64decode(b'abc')"
expect_exc = "binascii.Error"
source     = "Lib/test/test_base64.py"

[[case]]
dimension  = "errors"
case       = "b64decode_str_odd_padding_raises"
subject    = "base64.b64decode"
kind       = "mechanical"
import     = "import base64\nimport binascii"
call       = "base64.b64decode('abc')"
expect_exc = "binascii.Error"

[[case]]
dimension  = "errors"
case       = "urlsafe_b64decode_odd_padding_raises"
subject    = "base64.urlsafe_b64decode"
kind       = "mechanical"
import     = "import base64\nimport binascii"
call       = "base64.urlsafe_b64decode(b'abc')"
expect_exc = "binascii.Error"

[[case]]
dimension  = "errors"
case       = "b16decode_odd_length_raises"
subject    = "base64.b16decode"
kind       = "mechanical"
import     = "import base64\nimport binascii"
call       = "base64.b16decode(b'abc')"
expect_exc = "binascii.Error"

[[case]]
dimension  = "errors"
case       = "b32decode_bad_chars_raises"
subject    = "base64.b32decode"
kind       = "mechanical"
import     = "import base64\nimport binascii"
call       = "base64.b32decode(b'not_b32_chars!', casefold=False)"
expect_exc = "binascii.Error"

[[case]]
dimension  = "errors"
case       = "a85decode_out_of_range_char_raises"
subject    = "base64.a85decode"
kind       = "mechanical"
call       = "base64.a85decode(b'!!!!y')"
expect_exc = "ValueError"
source     = "Lib/test/test_base64.py"

[[case]]
dimension  = "errors"
case       = "b85decode_illegal_char_raises"
subject    = "base64.b85decode"
kind       = "mechanical"
call       = "base64.b85decode(b'0000\"')"
expect_exc = "ValueError"
source     = "Lib/test/test_base64.py"

[[case]]
dimension  = "errors"
case       = "b85decode_overflow_group_raises"
subject    = "base64.b85decode"
kind       = "mechanical"
call       = "base64.b85decode(b'|NsC1')"
expect_exc = "ValueError"
source     = "Lib/test/test_base64.py"

[[case]]
dimension  = "errors"
case       = "legacy_encode_text_input_raises"
subject    = "base64.encode"
kind       = "mechanical"
import     = "import base64\nfrom io import BytesIO, StringIO"
call       = "base64.encode(StringIO('YWJj\\n'), BytesIO())"
expect_exc = "TypeError"
source     = "Lib/test/test_base64.py"

# ===========================================================================
# ERRORS — semantic (contract assertions beyond a single call/expect_exc)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "binascii_error_is_valueerror_subclass"
subject   = "base64.b64decode"
kind      = "semantic"
intent    = "binascii.Error is a subclass of ValueError so callers can catch either; this is part of the public decode contract"
source    = "Lib/test/test_base64.py"

[[case]]
dimension = "errors"
case      = "decoders_reject_non_ascii_str"
subject   = "base64.b64decode"
kind      = "semantic"
intent    = "every str-accepting decoder (b64/standard_b64/urlsafe_b64/b32/b16/b85/a85) rejects a str containing non-ASCII characters with ValueError"
source    = "Lib/test/test_base64.py"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- b64 round-trip / padding / vectors -----------------------------------

[[case]]
dimension = "behavior"
case      = "b64_all_bytes_round_trip"
subject   = "base64.b64encode"
kind      = "semantic"
intent    = "b64encode then b64decode round-trips every byte value 0..255 unchanged"

[[case]]
dimension = "behavior"
case      = "b64_padding_by_remainder"
subject   = "base64.b64encode"
kind      = "semantic"
intent    = "b64 padding follows the 3-byte group remainder: 1 byte -> 'YQ==', 2 bytes -> 'YWI=', 3 bytes -> 'YWJj' (no padding)"

[[case]]
dimension = "behavior"
case      = "b64_rfc4648_vectors"
subject   = "base64.b64encode"
kind      = "semantic"
intent    = "the published RFC 4648 base64 vectors for '', 'f', 'fo', 'foo', 'foob', 'fooba', 'foobar' encode to their canonical outputs"
source    = "Lib/test/test_base64.py"

[[case]]
dimension = "behavior"
case      = "b64decode_accepts_str_and_bytes"
subject   = "base64.b64decode"
kind      = "semantic"
intent    = "b64decode accepts both a bytes and a str payload, decoding 'aGVsbG8=' to b'hello' either way"

[[case]]
dimension = "behavior"
case      = "b64decode_ignores_whitespace_by_default"
subject   = "base64.b64decode"
kind      = "semantic"
intent    = "with validate=False (default) b64decode ignores embedded whitespace, decoding b'aGVsbG8=\\n' to b'hello'"

[[case]]
dimension = "behavior"
case      = "b64_altchars_round_trip"
subject   = "base64.b64encode"
kind      = "semantic"
intent    = "b64encode/b64decode honor a custom altchars=b'-_' two-char alphabet and round-trip through it"

[[case]]
dimension = "behavior"
case      = "b64encode_is_deterministic"
subject   = "base64.b64encode"
kind      = "semantic"
intent    = "b64encode is a pure function: the same input always produces the same output"

# --- urlsafe ---------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "urlsafe_differs_from_standard"
subject   = "base64.urlsafe_b64encode"
kind      = "semantic"
intent    = "urlsafe_b64encode replaces '+'/'/' with '-'/'_' so its output differs from standard b64encode for bytes that hit those positions, and still round-trips"

[[case]]
dimension = "behavior"
case      = "urlsafe_alphabet_has_no_plus_or_slash"
subject   = "base64.urlsafe_b64encode"
kind      = "semantic"
intent    = "urlsafe_b64encode never emits '+' or '/' even when round-tripping every byte value 0..255"

# --- b16 / b32 / b32hex ----------------------------------------------------

[[case]]
dimension = "behavior"
case      = "b16_uppercase_hex_and_casefold"
subject   = "base64.b16encode"
kind      = "semantic"
intent    = "b16encode emits uppercase hex (b'ABCDEF'); b16decode with casefold=True accepts lowercase input"

[[case]]
dimension = "behavior"
case      = "b16_rfc4648_vectors"
subject   = "base64.b16encode"
kind      = "semantic"
intent    = "the published RFC 4648 base16 vectors for '', 'f', 'fo', 'foo', 'foob', 'fooba', 'foobar' encode to their canonical uppercase-hex outputs"
source    = "Lib/test/test_base64.py"

[[case]]
dimension = "behavior"
case      = "b32_alphabet_and_round_trip"
subject   = "base64.b32encode"
kind      = "semantic"
intent    = "b32encode emits only the A-Z, 2-7, '=' alphabet and b32decode round-trips it back"

[[case]]
dimension = "behavior"
case      = "b32_rfc4648_vectors"
subject   = "base64.b32encode"
kind      = "semantic"
intent    = "the published RFC 4648 base32 vectors for '', 'f', 'fo', 'foo', 'foob', 'fooba', 'foobar' encode to their canonical outputs"
source    = "Lib/test/test_base64.py"

[[case]]
dimension = "behavior"
case      = "b32hex_rfc4648_vectors_and_round_trip"
subject   = "base64.b32hexencode"
kind      = "semantic"
intent    = "the RFC 4648 base32hex (extended-hex alphabet) vectors encode canonically and b32hexdecode reverses b32hexencode"
source    = "Lib/test/test_base64.py"

# --- ascii85 / base85 ------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "a85_all_bytes_round_trip"
subject   = "base64.a85encode"
kind      = "semantic"
intent    = "a85encode then a85decode round-trips every byte value 0..255 unchanged"
source    = "Lib/test/test_base64.py"

[[case]]
dimension = "behavior"
case      = "a85_adobe_framing_round_trip"
subject   = "base64.a85encode"
kind      = "semantic"
intent    = "a85encode(adobe=True) wraps output in '<~'/'~>' framing and a85decode(adobe=True) round-trips it, including the empty stream '<~~>'"
source    = "Lib/test/test_base64.py"

[[case]]
dimension = "behavior"
case      = "b85_all_bytes_round_trip"
subject   = "base64.b85encode"
kind      = "semantic"
intent    = "b85encode then b85decode round-trips every byte value 0..255 unchanged, and empty input round-trips to empty bytes"
source    = "Lib/test/test_base64.py"

# --- encodebytes / decodebytes (line wrapping) -----------------------------

[[case]]
dimension = "behavior"
case      = "encodebytes_wraps_at_76_columns"
subject   = "base64.encodebytes"
kind      = "semantic"
intent    = "encodebytes inserts newlines so every line is at most 76 chars, and decodebytes round-trips the wrapped output back to the original"
source    = "Lib/test/test_base64.py"

# --- legacy file-object API ------------------------------------------------

[[case]]
dimension = "behavior"
case      = "legacy_stream_encode_decode_round_trip"
subject   = "base64.encode"
kind      = "semantic"
intent    = "the legacy base64.encode/base64.decode file-object API line-wraps to base64 and back through in-memory BytesIO streams"
source    = "Lib/test/test_base64.py"

