# --- seed / reproducibility -----------------------------------------------

[[case]]
dimension = "behavior"
case      = "seed_makes_stream_reproducible"
subject   = "random.seed"
kind      = "semantic"
intent    = "re-seeding the module RNG with the same value (99) reproduces the same randint sequence; two seeded runs of [randint(0,100) for _ in range(5)] are equal"
source    = "Lib/test/test_random.py"

[[case]]
dimension = "behavior"
case      = "module_helpers_share_default_generator"
subject   = "random.seed"
kind      = "semantic"
intent    = "module-level helpers share one default generator: random.seed(2024) then [random.random() for _ in range(5)] replays identically after re-seeding"
source    = "Lib/test/test_random.py"

[[case]]
dimension = "behavior"
case      = "seed_accepts_scalar_str_bytes_types"
subject   = "random.Random.seed"
kind      = "semantic"
intent    = "Random().seed accepts None / int (incl. huge & negative) / bool / float / str / bytes seeds without raising, and a bytes seed reproduces the same first draw"
module    = "random"
source    = "Lib/test/test_random.py"

[[case]]
dimension = "behavior"
case      = "seed_does_not_mutate_bytearray_buffer"
subject   = "random.Random.seed"
kind      = "semantic"
intent    = "seeding from a bytearray must not mutate the caller's buffer (bug 44018): seed(bytearray(b'1234')) leaves the bytearray unchanged"
module    = "random"
source    = "Lib/test/test_random.py"

