# Manifest for the stdlib `random` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/random/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + paired-.expected golden shape (surface.py,
# behavior.py, errors.py, loose feature files module.py / choices_weights.py /
# distributions.py / sample_counts.py / seed_args.py / state.py / subclassing.py
# / system_random.py, and random_conformance.py/.expected, random_ops.py/.expected).
# bench/ is left as-is.
#
# Authoring rule (mamba gotcha, repo-memory): `random` is seeded everywhere so
# the stream is deterministic; method/exception subjects whose dotted name hits
# a CapWords component (random.Random.*, random.SystemRandom.*) set
# `module = "random"` so the import inferer doesn't stop short.

bucket = "std-libs"
lib = "random"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr / type)
# ===========================================================================

