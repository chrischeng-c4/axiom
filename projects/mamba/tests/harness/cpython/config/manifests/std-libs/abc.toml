# Manifest for the stdlib `abc` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/abc/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py,
# the loose feature fixture abc_basic.py, and the real_world placeholder
# _stub.py. bench/ stays as-is (perf, golden-less). No coverage lost.

bucket = "std-libs"
lib = "abc"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
#
# The eight CPython 3.12 public abc names (abc_basic.py / surface.py), each
# probed as callable, plus the module-import probe and the bound register.
# `abstractmethod` etc. are CapWords-free so the import inferer resolves to
# `abc`; ABC/ABCMeta are CapWords -> set module="abc" explicitly.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_abc"
subject   = "abc"
kind      = "mechanical"
probe     = "attr"
attr      = "ABC"

[[case]]
dimension = "surface"
case      = "abc_class_is_callable"
subject   = "abc.ABC"
kind      = "mechanical"
module    = "abc"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "abcmeta_is_callable"
subject   = "abc.ABCMeta"
kind      = "mechanical"
module    = "abc"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "abstractmethod_is_callable"
subject   = "abc.abstractmethod"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "abstractclassmethod_is_callable"
subject   = "abc.abstractclassmethod"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "abstractstaticmethod_is_callable"
subject   = "abc.abstractstaticmethod"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "abstractproperty_is_callable"
subject   = "abc.abstractproperty"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "get_cache_token_is_callable"
subject   = "abc.get_cache_token"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "update_abstractmethods_is_callable"
subject   = "abc.update_abstractmethods"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "abcmeta_has_register"
subject   = "abc.ABCMeta"
kind      = "mechanical"
module    = "abc"
probe     = "attr"
attr      = "register"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc), self-asserting raise.
#
# Subjects are CapWords classes; set module="abc" so the import inferer does
# not stop short of the importable module.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "instantiate_abstract_raises"
subject    = "abc.ABC"
kind       = "mechanical"
module     = "abc"
call       = "type('A', (abc.ABC,), {'required': abc.abstractmethod(lambda self: 0)})()"
expect_exc = "TypeError"
source     = "Lib/test/test_abc.py"

[[case]]
dimension  = "errors"
case       = "register_non_class_raises"
subject    = "abc.ABCMeta"
kind       = "mechanical"
module     = "abc"
call       = "type('M', (), {}, metaclass=abc.ABCMeta).register(42)"
expect_exc = "TypeError"
source     = "Lib/test/test_abc.py"

# ===========================================================================
# BEHAVIOR — semantic (skeletons; an agent fills the body).
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "abstract_base_not_instantiable"
subject   = "abc.ABC"
kind      = "semantic"
intent    = "instantiating an ABC subclass with an unimplemented abstractmethod raises TypeError"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "partial_concrete_still_abstract"
subject   = "abc.ABC"
kind      = "semantic"
intent    = "a subclass that does not override the abstractmethod is still abstract and not instantiable"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "full_concrete_instantiable"
subject   = "abc.ABC"
kind      = "semantic"
intent    = "a subclass that implements the abstractmethod is concrete, instantiable, and has an empty __abstractmethods__"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "all_abstract_methods_required"
subject   = "abc.abstractmethod"
kind      = "semantic"
intent    = "with multiple abstract methods, every one must be implemented before the class is instantiable"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "abstract_method_super_default_body"
subject   = "abc.abstractmethod"
kind      = "semantic"
intent    = "an abstractmethod may carry a default body reachable via super() from the concrete override"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "register_virtual_subclass"
subject   = "abc.ABCMeta.register"
kind      = "semantic"
module    = "abc"
intent    = "register() makes an unrelated class a virtual subclass for issubclass and isinstance without inheritance"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "subclasshook_structural_check"
subject   = "abc.ABCMeta"
kind      = "semantic"
module    = "abc"
intent    = "a custom __subclasshook__ drives structural issubclass checks (has __len__ -> Sized) returning NotImplemented to fall through"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "abstractmethods_set_contents"
subject   = "abc.ABC"
kind      = "semantic"
intent    = "__abstractmethods__ lists exactly the unimplemented abstract names and is empty once all are overridden"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "abcmeta_explicit_metaclass"
subject   = "abc.ABCMeta"
kind      = "semantic"
module    = "abc"
intent    = "using ABCMeta directly as metaclass gives the same abstract-enforcement and isinstance behavior as inheriting ABC"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "isinstance_issubclass_via_inheritance"
subject   = "abc.ABC"
kind      = "semantic"
intent    = "a real subclass of an ABC passes isinstance and issubclass against the ABC base"
source    = "Lib/test/test_abc.py"

[[case]]
dimension = "behavior"
case      = "get_cache_token_returns_int"
subject   = "abc.get_cache_token"
kind      = "semantic"
intent    = "get_cache_token() returns an int per the CPython contract"
source    = "Lib/test/test_abc.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario).
# Promotes the _stub.py placeholder to a real plugin-registry flow.
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "plugin_interface_registry"
subject   = "abc.ABC"
kind      = "semantic"
intent    = "a plugin system defines an ABC interface, enforces abstractmethod implementation on real plugins, and accepts a duck-typed third-party class via register()"
source    = "Lib/test/test_abc.py"
