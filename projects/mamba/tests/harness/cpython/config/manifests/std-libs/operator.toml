# ERRORS — mechanical (call + expect_exc; self-asserting assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "add_mixed_types_typeerror"
subject    = "operator.add"
kind       = "mechanical"
call       = "operator.add(1, \"a\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "truediv_by_zero_zerodivision"
subject    = "operator.truediv"
kind       = "mechanical"
call       = "operator.truediv(1, 0)"
expect_exc = "ZeroDivisionError"

[[case]]
dimension  = "errors"
case       = "index_float_typeerror"
subject    = "operator.index"
kind       = "mechanical"
call       = "operator.index(1.5)"
