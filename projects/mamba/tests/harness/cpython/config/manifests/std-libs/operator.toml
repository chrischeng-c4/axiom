case      = "contains_not_truth_semantics"
subject   = "operator.contains"
kind      = "semantic"
intent    = "contains tests membership (b in a), not_ returns the boolean negation, and truth maps any object to its bool — all returning the bool singletons"

[[case]]
dimension = "behavior"
