intent    = "a multi-key itemgetter returns a tuple of the indexed elements in argument order"
xfail     = "operator.itemgetter(i)(row) returns 0 instead of row[i] under mamba (repo-memory project_mamba_operator_itemgetter_returns_zero)"

[[case]]
dimension = "behavior"
case      = "itemgetter_slice_negative_and_sortkey"
subject   = "operator.itemgetter"
kind      = "semantic"
intent    = "itemgetter accepts negative indices and slice objects as keys and works as a map/sort key over a list of records"
xfail     = "operator.itemgetter(i)(row) returns 0 instead of row[i] under mamba (repo-memory project_mamba_operator_itemgetter_returns_zero)"

[[case]]
dimension = "behavior"
case      = "attrgetter_dotted_and_multi"
subject   = "operator.attrgetter"
kind      = "semantic"
intent    = "attrgetter reads a single attribute, walks a dotted path through nested objects, and with multiple names returns a tuple in argument order"

[[case]]
dimension = "behavior"
case      = "methodcaller_args_kwargs_defaults"
subject   = "operator.methodcaller"
kind      = "semantic"
intent    = "methodcaller binds positional and keyword arguments at construction and forwards them to the named method, while the method's own defaults still apply"

[[case]]
dimension = "behavior"
case      = "inplace_dispatches_to_dunders"
subject   = "operator.iadd"
kind      = "semantic"
intent    = "each in-place function dispatches to its __i*__ dunder; iconcat falls back to __iadd__ when no __iconcat__ exists; in-place numeric ops on built-in ints behave like the binary form"

[[case]]
dimension = "behavior"
case      = "setitem_delitem_mutate_in_place"
subject   = "operator.setitem"
kind      = "semantic"
intent    = "setitem and delitem mutate lists and dicts in place and both return None"

[[case]]
dimension = "behavior"
case      = "index_uses_dunder_index"
subject   = "operator.index"
kind      = "semantic"
intent    = "index returns the integer from a type's __index__ and passes true ints through unchanged"

[[case]]
dimension = "behavior"
case      = "length_hint_len_hint_and_default"
subject   = "operator.length_hint"
kind      = "semantic"
intent    = "length_hint prefers __len__, falls back to __length_hint__, and returns the supplied default only when no length information is available"

[[case]]
dimension = "behavior"
case      = "call_invokes_callable"
subject   = "operator.call"
kind      = "semantic"
intent    = "call(obj, *args, **kwargs) invokes the callable forwarding positional and keyword arguments exactly"

[[case]]
dimension = "behavior"
case      = "matmul_dispatches_to_dunder"
subject   = "operator.matmul"
kind      = "semantic"
intent    = "matmul dispatches to a type's __matmul__ dunder"

# ===========================================================================
# REAL_WORLD — semantic (one end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "sort_group_records_pipeline"
subject   = "operator.attrgetter"
kind      = "semantic"
intent    = "a records-processing pipeline sorts namedtuple rows by attrgetter, groups them with itertools.groupby, and uses methodcaller to normalize a text field — the canonical operator.* application combo"
xfail     = "the pipeline keys on operator.itemgetter which returns 0 under mamba (repo-memory project_mamba_operator_itemgetter_returns_zero)"

# ===========================================================================
# SECURITY — semantic (one adversarial / untrusted-dunder case)
# ===========================================================================

[[case]]
dimension = "security"
case      = "malicious_dunder_exception_propagates"
subject   = "operator.attrgetter"
kind      = "semantic"
intent    = "attrgetter, itemgetter and methodcaller are thin delegators: an exception raised inside an attacker-controlled __getattr__/__getitem__ propagates unchanged and is never swallowed or remapped"
