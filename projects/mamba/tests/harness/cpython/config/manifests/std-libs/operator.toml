# Manifest for the stdlib `operator` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/operator/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, attrgetter.py, itemgetter.py, methodcaller.py,
# inplace.py, mutation.py, protocols.py). bench/ is left as-is; the
# real_world/ _stub.py placeholder is promoted to a real scenario.
#
# Mamba gotcha (repo-memory project_mamba_operator_itemgetter_returns_zero):
# `operator.itemgetter(i)(row)` returns 0 instead of row[i] under mamba and
# swallows the would-be IndexError/KeyError, so every itemgetter-result and
# itemgetter-raises case is xfail (CPython-green here; conformance skips mamba).

bucket = "std-libs"
lib = "operator"

