subject   = "operator.concat"
kind      = "semantic"
intent    = "concat joins two sequences of the same type (str/list/tuple) and length_hint reports the size of sized objects and ranges, with 0 for empty"

[[case]]
dimension = "behavior"
case      = "public_func_aliases_its_dunder"
subject   = "operator"
kind      = "semantic"
intent    = "each public function whose name has a dunder twin IS that twin object (operator.add is operator.__add__, etc.) across the whole module surface"

[[case]]
dimension = "behavior"
case      = "truth_not_propagate_bool_error"
subject   = "operator.truth"
kind      = "semantic"
intent    = "truth and not_ delegate to __bool__; an exception raised inside __bool__ propagates unchanged out of both functions"

[[case]]
