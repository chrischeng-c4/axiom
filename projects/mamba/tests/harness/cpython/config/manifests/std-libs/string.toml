# Manifest for the stdlib `string` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/string/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + paired-.expected golden shape
# (surface.py, behavior.py, errors.py, constants.py/.expected,
# constants_broad.py/.expected, formatter.py, formatter_overrides.py,
# template_advanced.py, template_overrides.py). bench/ is left as-is.
#
# mamba gotcha (repo-memory project_mamba_stdlib_stub_audit_2026_05_26 +
# project_mamba_operator_itemgetter_returns_zero): string.Template and
# string.Formatter are silent dict-stubs on mamba — .substitute()/.format()/
# .vformat() raise AttributeError or return wrong values. Every case that
# actually drives Template substitution or Formatter formatting carries an
# xfail so the conformance harness skips mamba; the callable()/attr surface probes and the
# string-constant + str-method behaviors are real parity and stay un-xfailed.

bucket = "std-libs"
lib = "string"

