# ===========================================================================
# ERRORS — mechanical (call + expect_exc; assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "get_context_unknown_method_raises"
subject    = "multiprocessing.get_context"
kind       = "mechanical"
call       = "multiprocessing.get_context('no_such_method')"
expect_exc = "ValueError"
source     = "Lib/test/_test_multiprocessing.py"

[[case]]
dimension  = "errors"
case       = "value_bad_typecode_raises"
subject    = "multiprocessing.Value"
kind       = "mechanical"
call       = "multiprocessing.Value('not_a_typecode')"
expect_exc = "(AttributeError, TypeError)"

[[case]]
dimension  = "errors"
case       = "queue_get_nowait_empty_raises"
subject    = "multiprocessing.Queue"
kind       = "mechanical"
import     = "import multiprocessing\nimport queue as _queue\n_q = multiprocessing.Queue()"
call       = "_q.get_nowait()"
expect_exc = "_queue.Empty"
source     = "Lib/test/_test_multiprocessing.py"

[[case]]
dimension  = "errors"
case       = "queue_put_nowait_full_raises"
subject    = "multiprocessing.Queue"
kind       = "mechanical"
import     = "import multiprocessing\nimport queue as _queue\n_q = multiprocessing.Queue(maxsize=1)\n_q.put_nowait('a')"
call       = "_q.put_nowait('b')"
expect_exc = "_queue.Full"
source     = "Lib/test/_test_multiprocessing.py"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file; from behavior.py)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "process_start_join_runs_target"
subject   = "multiprocessing.Process"
kind      = "semantic"
intent    = "Process.start() then join() executes the module-level target in a child; the child puts 42 on a Queue and the parent reads it back with exitcode 0 (spawn-guarded under __main__)"
source    = "Lib/test/_test_multiprocessing.py"

[[case]]
dimension = "behavior"
case      = "pipe_bidirectional_echo"
subject   = "multiprocessing.Pipe"
kind      = "semantic"
intent    = "a Pipe gives two Connection ends; the parent sends 'hello', the child recvs it, sends back data*2, and the parent recvs 'hellohello' (spawn-guarded under __main__)"
source    = "Lib/test/_test_multiprocessing.py"

[[case]]
dimension = "behavior"
case      = "value_shared_across_process"
subject   = "multiprocessing.Value"
kind      = "semantic"
intent    = "a Value('i', 0) is shared memory; a child sets .value = 99 and after join the parent observes 99 (spawn-guarded under __main__)"
source    = "Lib/test/_test_multiprocessing.py"

[[case]]
dimension = "behavior"
case      = "array_shared_across_process"
subject   = "multiprocessing.Array"
kind      = "semantic"
intent    = "an Array('i', [1,2,3,4,5]) is shared memory; a child does arr[2] += 10 and after join the parent observes arr[2] == 13 (spawn-guarded under __main__)"
source    = "Lib/test/_test_multiprocessing.py"

[[case]]
dimension = "behavior"
case      = "pool_map_distributes_work"
subject   = "multiprocessing.Pool"
kind      = "semantic"
intent    = "Pool(processes=2).map applies a module-level square fn over [1,2,3,4,5] across worker processes and returns [1,4,9,16,25] in input order (spawn-guarded under __main__)"
source    = "Lib/test/_test_multiprocessing.py"

[[case]]
dimension = "behavior"
case      = "pool_apply_single_call"
subject   = "multiprocessing.Pool"
kind      = "semantic"
intent    = "Pool(processes=1).apply runs a single module-level call in a worker and returns its value: apply(square, (7,)) == 49 (spawn-guarded under __main__)"
source    = "Lib/test/_test_multiprocessing.py"

[[case]]
dimension = "behavior"
case      = "process_terminate_stops_running"
subject   = "multiprocessing.Process"
kind      = "semantic"
intent    = "a daemon Process running a spin loop reports is_alive() True after start, and after terminate()+join() reports is_alive() False (spawn-guarded under __main__)"
source    = "Lib/test/_test_multiprocessing.py"

[[case]]
dimension = "behavior"
case      = "queue_fifo_order"
subject   = "multiprocessing.Queue"
kind      = "semantic"
intent    = "a Queue is FIFO and process-safe; putting 0..4 then getting five times returns [0,1,2,3,4] in order (spawn-guarded under __main__)"
source    = "Lib/test/_test_multiprocessing.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario; promotes the old
# real_world/_stub.py placeholder to a meaningful fan-out/aggregate flow)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "pool_map_reduce_pipeline"
subject   = "multiprocessing.Pool"
kind      = "semantic"
intent    = "a batch job fans a CPU-light transform over a work list with a process Pool (map + imap_unordered), reduces the per-item results to a deterministic total, and shows the pool drains cleanly on context exit (spawn-guarded under __main__)"
