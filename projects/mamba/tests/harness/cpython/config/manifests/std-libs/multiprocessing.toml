# Manifest for the stdlib `multiprocessing` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/multiprocessing/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the real_world/_stub.py placeholder. bench/ is left as-is.
#
# Authoring rule (spawn re-exec): the macOS default start method is `spawn`,
# which re-imports the fixture in each child. So every fixture that spawns a
# Process or Pool defines its worker function(s) at MODULE level and guards the
# spawning code (and the final print) under `if __name__ == "__main__":`. Pool
# work functions must be picklable module-level functions (no lambdas/closures).
#
# Class subjects (Process, Queue, Pool, ...) infer the module `multiprocessing`
# fine, but the errors setup cases that need a pre-built Queue/Value carry an
# explicit multi-line `import` preamble.

bucket = "std-libs"
lib    = "multiprocessing"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_multiprocessing"
subject   = "multiprocessing"
kind      = "mechanical"
probe     = "attr"
attr      = "Process"

[[case]]
dimension = "surface"
case      = "process_is_callable"
subject   = "multiprocessing.Process"
kind      = "mechanical"
probe     = "callable"

