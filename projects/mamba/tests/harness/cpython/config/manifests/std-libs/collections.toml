# --- deque ----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "deque_append_both_ends"
subject   = "collections.deque"
kind      = "semantic"
intent    = "deque supports appendleft/append/popleft on both ends and iterates in order"

[[case]]
dimension = "behavior"
case      = "deque_rotate_shifts_elements"
subject   = "collections.deque"
kind      = "semantic"
intent    = "deque.rotate(n) shifts elements right by n (negative rotates left), wrapping around"

[[case]]
dimension = "behavior"
case      = "deque_maxlen_drops_from_opposite_end"
subject   = "collections.deque"
kind      = "semantic"
intent    = "a maxlen-bounded deque silently drops the oldest element on overflow rather than raising, keeping only the most recent maxlen items"

# --- ChainMap -------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "chainmap_first_map_wins_lookup"
subject   = "collections.ChainMap"
kind      = "semantic"
intent    = "ChainMap looks up keys front-to-back so the first map shadows later ones; coercion to dict and .items() flatten with first-map-wins precedence"

[[case]]
dimension = "behavior"
case      = "chainmap_new_child_and_parents"
subject   = "collections.ChainMap"
kind      = "semantic"
intent    = "new_child pushes a fresh writable front map (writes/deletes touch only it, falling through to parents), and .parents drops the front map re-exposing inherited values"

[[case]]
dimension = "behavior"
case      = "chainmap_bool_and_iteration"
subject   = "collections.ChainMap"
kind      = "semantic"
intent    = "a ChainMap is truthy iff any underlying map is non-empty, and iteration visits each distinct key exactly once across all maps"

[[case]]
dimension = "behavior"
case      = "chainmap_pop_only_front_map"
subject   = "collections.ChainMap"
kind      = "semantic"
intent    = "pop/popitem consider only the first map (pop returns the default when the key is gone), and popitem on a drained front map raises KeyError"

[[case]]
dimension = "behavior"
case      = "chainmap_union_operators"
subject   = "collections.ChainMap"
kind      = "semantic"
intent    = "PEP 584 | merges the other mapping into a copy of the first map preserving trailing maps; |= mutates in place; ChainMap | dict and dict | ChainMap fold correctly; result type follows the left operand"

# --- collections.abc ------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "abc_subclass_and_register"
subject   = "collections.abc.Hashable"
kind      = "semantic"
intent    = "direct subclassing of the one-trick-pony ABCs makes issubclass true, and register() makes a structurally-unrelated class a virtual subclass"
module    = "collections.abc"

[[case]]
dimension = "behavior"
case      = "abc_mapping_views_are_set_like"
subject   = "collections.abc.KeysView"
kind      = "semantic"
intent    = "mapping keys()/items()/values() are ABC instances and the set-like key/item views support set operations against plain sets, snapshotting at the time of the operation"
module    = "collections.abc"

[[case]]
dimension = "behavior"
case      = "abc_mutablesequence_mixins"
subject   = "collections.abc.MutableSequence"
kind      = "semantic"
intent    = "a MutableSequence subclass implementing the abstract methods gets append/extend/reverse/pop/remove/+= mixed in over a backing list"
module    = "collections.abc"

[[case]]
dimension = "behavior"
case      = "abc_set_mixins_provide_algebra"
subject   = "collections.abc.Set"
kind      = "semantic"
intent    = "a Set subclass implementing __contains__/__iter__/__len__ gets &, |, -, ^, ordering, equality, and isdisjoint mixed in, returning the same Set subclass via _from_iterable"
module    = "collections.abc"

[[case]]
dimension = "behavior"
case      = "abc_mutableset_mixins_mutate"
subject   = "collections.abc.MutableSet"
kind      = "semantic"
intent    = "a MutableSet subclass adding add/discard gets pop and the in-place operators ^=, |=, -= mixed in, mutating and returning the same object"
module    = "collections.abc"

