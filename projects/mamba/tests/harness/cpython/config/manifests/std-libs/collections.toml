# ===========================================================================
# ERRORS — mechanical (call + expect_exc); assert-it-raised template
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "deque_popleft_empty_raises"
subject    = "collections.deque"
kind       = "mechanical"
call       = "collections.deque().popleft()"
expect_exc = "IndexError"

[[case]]
dimension  = "errors"
case       = "deque_pop_empty_raises"
subject    = "collections.deque"
kind       = "mechanical"
call       = "collections.deque().pop()"
expect_exc = "IndexError"

[[case]]
dimension  = "errors"
case       = "ordereddict_move_to_end_missing_raises"
subject    = "collections.OrderedDict"
kind       = "mechanical"
call       = "collections.OrderedDict([('a', 1)]).move_to_end('missing')"
expect_exc = "KeyError"

[[case]]
dimension  = "errors"
case       = "chainmap_pop_from_back_map_raises"
subject    = "collections.ChainMap"
kind       = "mechanical"
call       = "collections.ChainMap({'a': 1}, {'b': 2}).pop('b')"
expect_exc = "KeyError"

[[case]]
dimension  = "errors"
case       = "counter_non_iterable_init_raises"
subject    = "collections.Counter"
kind       = "mechanical"
call       = "collections.Counter(123)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "defaultdict_noncallable_factory_raises"
subject    = "collections.defaultdict"
kind       = "mechanical"
call       = "collections.defaultdict('not callable')"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "defaultdict_none_factory_missing_raises"
subject    = "collections.defaultdict"
kind       = "mechanical"
call       = "collections.defaultdict(None)['x']"
expect_exc = "KeyError"

[[case]]
dimension  = "errors"
case       = "counter_update_two_positional_raises"
subject    = "collections.Counter"
kind       = "mechanical"
call       = "collections.Counter().update({}, {})"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "counter_subtract_two_positional_raises"
subject    = "collections.Counter"
kind       = "mechanical"
call       = "collections.Counter().subtract({}, {})"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "counter_fromkeys_raises"
subject    = "collections.Counter"
kind       = "mechanical"
call       = "collections.Counter.fromkeys('abc')"
expect_exc = "NotImplementedError"

[[case]]
dimension  = "errors"
case       = "counter_unhashable_raises"
subject    = "collections.Counter"
kind       = "mechanical"
call       = "hash(collections.Counter(a=1))"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "namedtuple_bad_field_name_raises"
subject    = "collections.namedtuple"
kind       = "mechanical"
call       = "collections.namedtuple('Bad', 'x class')"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "namedtuple_wrong_arity_raises"
subject    = "collections.namedtuple"
kind       = "mechanical"
call       = "collections.namedtuple('Point', 'x y')(1)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "namedtuple_field_readonly_raises"
subject    = "collections.namedtuple"
kind       = "mechanical"
call       = "setattr(collections.namedtuple('Point', 'x y')(1, 2), 'x', 3)"
expect_exc = "AttributeError"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- Counter: construction / lookup -------------------------------------

[[case]]
dimension = "behavior"
case      = "counter_counts_from_iterable"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "Counter('abracadabra') tallies element frequencies; a present key returns its count and a missing key returns 0 without being inserted"

[[case]]
dimension = "behavior"
case      = "counter_most_common_orders_by_count"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "Counter.most_common(n) returns the n highest-count (element, count) pairs in descending-count order"

[[case]]
dimension = "behavior"
case      = "counter_preserves_first_seen_order"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "Counter preserves the first-occurrence insertion order of its keys: Counter('abracadabra').items() == [('a',5),('b',2),('r',2),('c',1),('d',1)]"

[[case]]
dimension = "behavior"
case      = "counter_is_dict_subclass"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "Counter is a dict subclass: isinstance/issubclass of dict, == a plain dict of equal counts, canonical repr Counter({...}), and .get(missing, default) returns the default"

[[case]]
dimension = "behavior"
case      = "counter_keeps_zero_and_negative_counts"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "counts may reach zero or go negative and the keys persist until explicitly deleted (c['b'] -= 2 -> 0 still in c; c['e'] = -5 kept)"

# --- Counter: arithmetic / multiset --------------------------------------

[[case]]
dimension = "behavior"
case      = "counter_add_and_subtract_operators"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "Counter + sums counts elementwise; Counter - subtracts and drops non-positive results"

[[case]]
dimension = "behavior"
case      = "counter_update_accumulates"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "Counter.update(mapping) adds the mapping's counts onto the existing tallies rather than replacing them"

[[case]]
dimension = "behavior"
case      = "counter_elements_expands_multiset"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "Counter.elements() yields each element repeated by its count, and sorted(elements()) round-trips a source string as a multiset"

[[case]]
dimension = "behavior"
case      = "counter_total_sums_all_counts"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "Counter.total() sums every count including zero and negative ones (Counter(a=10, b=5, c=0).total() == 15)"

[[case]]
dimension = "behavior"
case      = "counter_unary_plus_minus_filter_signs"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "unary + keeps only positive counts; unary - flips signs and keeps the now-positive ones"

[[case]]
dimension = "behavior"
case      = "counter_equality_treats_missing_as_zero"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "Counter equality treats a missing key as count 0, so Counter(a=3, b=2, c=0) == Counter('ababa')"

[[case]]
dimension = "behavior"
case      = "counter_ordering_compares_counts_elementwise"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "multiset ordering <, <=, >, >= compare counts elementwise (missing == 0) across a representative table of Counter pairs"

[[case]]
dimension = "behavior"
case      = "counter_subtract_keeps_negative_results"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "Counter.subtract keeps negative results (unlike __sub__): subtracting overlapping counts and a string of elements yields the expected signed tallies"

[[case]]
dimension = "behavior"
case      = "counter_multiset_ops_match_set_ops"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "on counts of 0/1 the multiset operators +, -, |, & agree with the corresponding set operations on the present elements"

