# Manifest for the stdlib `collections` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/collections/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature + paired-.expected shape
# (surface.py, behavior.py, errors.py; abc_registration.py, abc_set.py,
# chainmap.py, chainmap_union.py, counter_multiset.py, namedtuple_defaults.py,
# namedtuple_factory.py, namedtuple_instance.py, user_wrappers.py;
# counter_broad/.expected, counter_ops/.expected, counter_ordered_broad/.expected,
# counter_str_broad/.expected, defaultdict_broad/.expected, namedtuple_basic/.expected,
# collections_ops/.expected, collections_conformance/.expected,
# collections_api_conformance/.expected; real_world/_stub.py). bench/ is left
# as-is. The legacy collections_deque_r5.py probed mamba-internal stub names
# (collections.deque_append / deque_pop / deque_rotate) that do NOT exist in
# CPython 3.12 — it was never CPython-green, so it is dropped (real deque
# append/popleft/rotate coverage lives in behavior/ + bench/).
#
# Class/exception subjects (collections.Counter, collections.deque, etc.) infer
# their import as `import collections`; the bodies use `from collections import …`
# where that reads better, so several cases carry an explicit `module`/`import`.
# collections.abc cases set module="collections.abc" (the dotted submodule the
# CapWords inferer cannot reach).

bucket = "std-libs"
lib = "collections"

