# ===========================================================================
# REAL_WORLD — semantic end-user scenario
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "word_frequency_report"
subject   = "collections.Counter"
kind      = "semantic"
intent    = "a log/text analytics job tokenizes a paragraph, builds a Counter word-frequency table, ranks the top tokens with most_common, groups lines by length with defaultdict(list), and rolls a fixed-size recent-window with a maxlen deque"
