# Manifest for the stdlib `argparse` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/argparse/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# plus the loose feature files (actions.py / namespace.py / filetype.py) and the
# real_world placeholder. CPython 3.12 is the oracle.

bucket = "std-libs"
lib = "argparse"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_argparse"
subject   = "argparse"
kind      = "mechanical"
probe     = "attr"
attr      = "ArgumentParser"

[[case]]
dimension = "surface"
case      = "argument_parser_is_callable"
subject   = "argparse.ArgumentParser"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "namespace_is_callable"
subject   = "argparse.Namespace"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "filetype_is_callable"
subject   = "argparse.FileType"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "argument_error_is_class"
subject   = "argparse.ArgumentError"
kind      = "mechanical"
probe     = "type"
typename  = "type"

[[case]]
dimension = "surface"
case      = "argument_type_error_is_class"
subject   = "argparse.ArgumentTypeError"
kind      = "mechanical"
probe     = "type"
typename  = "type"

[[case]]
dimension = "surface"
case      = "action_class_exists"
subject   = "argparse.Action"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "argument_defaults_help_formatter_exists"
subject   = "argparse.ArgumentDefaultsHelpFormatter"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "raw_text_help_formatter_exists"
subject   = "argparse.RawTextHelpFormatter"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "raw_description_help_formatter_exists"
subject   = "argparse.RawDescriptionHelpFormatter"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "add_argument_is_callable"
subject   = "argparse.ArgumentParser.add_argument"
kind      = "mechanical"
probe     = "callable"
module    = "argparse"

[[case]]
dimension = "surface"
case      = "parse_args_is_callable"
subject   = "argparse.ArgumentParser.parse_args"
kind      = "mechanical"
probe     = "callable"
module    = "argparse"

[[case]]
dimension = "surface"
case      = "parse_known_args_is_callable"
subject   = "argparse.ArgumentParser.parse_known_args"
kind      = "mechanical"
probe     = "callable"
module    = "argparse"

# --- module-level constants (semantic: value equality, not mere existence) ---

[[case]]
dimension = "surface"
case      = "suppress_constant_value"
subject   = "argparse.SUPPRESS"
kind      = "semantic"
intent    = "the SUPPRESS sentinel equals the documented '==SUPPRESS==' string"

[[case]]
dimension = "surface"
case      = "remainder_constant_value"
subject   = "argparse.REMAINDER"
kind      = "semantic"
intent    = "the REMAINDER nargs sentinel equals the documented '...' string"

[[case]]
dimension = "surface"
case      = "all_matches_public_names"
subject   = "argparse.__all__"
kind      = "semantic"
intent    = "argparse.__all__ lists every public non-module name and includes the core ArgumentParser/Namespace/FileType/ArgumentError/SUPPRESS exports"
module    = "argparse"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc, self-asserting)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "duplicate_option_string_raises"
subject    = "argparse.ArgumentParser"
kind       = "mechanical"
call       = "_p = argparse.ArgumentParser(); _p.add_argument('--flag'); _p.add_argument('--flag')"
expect_exc = "argparse.ArgumentError"

[[case]]
dimension  = "errors"
case       = "bad_conflict_handler_raises"
subject    = "argparse.ArgumentParser"
kind       = "mechanical"
call       = "argparse.ArgumentParser(conflict_handler='nope')"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "duplicate_subparser_name_raises"
subject    = "argparse.ArgumentParser"
kind       = "mechanical"
call       = "_p = argparse.ArgumentParser(); _sp = _p.add_subparsers(); _sp.add_parser('build'); _sp.add_parser('build')"
expect_exc = "argparse.ArgumentError"

# ===========================================================================
# ERRORS — semantic (parse-failure SystemExit / message echoes / no-raise
# happy paths that go beyond the plain call+expect_exc mechanical template)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "required_argument_missing_exits"
subject   = "argparse.ArgumentParser.parse_args"
kind      = "semantic"
intent    = "parse_args raises SystemExit when a required=True option is absent from the argument vector"
module    = "argparse"

[[case]]
dimension = "errors"
case      = "invalid_choice_exits"
subject   = "argparse.ArgumentParser.parse_args"
kind      = "semantic"
intent    = "parse_args raises SystemExit when a value is not in the declared choices= set, but accepts a valid choice"
module    = "argparse"

[[case]]
dimension = "errors"
case      = "unknown_option_exits"
subject   = "argparse.ArgumentParser.parse_args"
kind      = "semantic"
intent    = "parse_args raises SystemExit (status 2) on an unrecognized option, captured with stderr redirected"
module    = "argparse"

[[case]]
dimension = "errors"
case      = "nargs_plus_empty_exits"
subject   = "argparse.ArgumentParser.parse_args"
kind      = "semantic"
intent    = "a nargs='+' positional with zero supplied values raises SystemExit, but a single value parses"
module    = "argparse"

[[case]]
dimension = "errors"
case      = "argument_type_error_becomes_systemexit"
subject   = "argparse.ArgumentTypeError"
kind      = "semantic"
intent    = "a custom type= callable raising ArgumentTypeError is intercepted by argparse and re-raised as SystemExit (status 2), while a valid value parses cleanly"
module    = "argparse"

[[case]]
dimension = "errors"
case      = "argument_error_str_is_message"
subject   = "argparse.ArgumentError"
kind      = "semantic"
intent    = "ArgumentError(None, msg) with no bound action stringifies to just the message text"

[[case]]
dimension = "errors"
case      = "exit_on_error_false_raises_argument_error"
subject   = "argparse.ArgumentParser"
kind      = "semantic"
intent    = "with exit_on_error=False a parse failure (bad int value) raises ArgumentError instead of printing to stderr and exiting; good args still parse"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- argument typing / coercion -------------------------------------------

[[case]]
dimension = "behavior"
case      = "type_coerces_value"
subject   = "argparse.ArgumentParser.add_argument"
kind      = "semantic"
intent    = "type= coerces the raw string into the declared type (float and str), so the Namespace attribute carries the converted value"
module    = "argparse"

[[case]]
dimension = "behavior"
case      = "type_not_applied_to_default"
subject   = "argparse.ArgumentParser.add_argument"
kind      = "semantic"
intent    = "type= is not applied to a default value (CPython bpo-15906): a list default with action='append' stays the untouched list when no value is supplied"
module    = "argparse"

[[case]]
dimension = "behavior"
case      = "append_replaces_list_default"
subject   = "argparse.ArgumentParser.add_argument"
kind      = "semantic"
intent    = "with action='append' and a list default, supplied values replace (do not extend) the default, collecting only the parsed items"
module    = "argparse"

# --- store_true / store_false / append ------------------------------------

[[case]]
dimension = "behavior"
case      = "store_true_false_flags"
subject   = "argparse.ArgumentParser.add_argument"
kind      = "semantic"
intent    = "action='store_true' defaults False and flips True when present; action='store_false' defaults True and flips False when present"
module    = "argparse"

[[case]]
dimension = "behavior"
case      = "append_collects_multiple"
subject   = "argparse.ArgumentParser.add_argument"
kind      = "semantic"
intent    = "action='append' collects repeated occurrences of the same option into an ordered list"
module    = "argparse"

# --- nargs ------------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "nargs_star_zero_or_more"
subject   = "argparse.ArgumentParser.add_argument"
kind      = "semantic"
intent    = "nargs='*' yields an empty list for zero positionals and a list of all supplied positionals otherwise"
module    = "argparse"

[[case]]
dimension = "behavior"
case      = "nargs_optional_const_default"
subject   = "argparse.ArgumentParser.add_argument"
kind      = "semantic"
intent    = "nargs='?' with const and default: absent option yields default, bare flag yields const, explicit value yields that value"
module    = "argparse"

# --- defaults / set_defaults / metavar -------------------------------------

[[case]]
dimension = "behavior"
case      = "set_defaults_overrides"
subject   = "argparse.ArgumentParser.set_defaults"
kind      = "semantic"
intent    = "set_defaults overrides an add_argument default and injects extra Namespace attributes not declared as arguments"
module    = "argparse"

[[case]]
dimension = "behavior"
case      = "metavar_does_not_affect_parsing"
subject   = "argparse.ArgumentParser.add_argument"
kind      = "semantic"
intent    = "metavar= changes only the help display name; the default and the parsed value are unaffected"
module    = "argparse"

# --- args vector shapes -----------------------------------------------------

[[case]]
dimension = "behavior"
case      = "parse_args_accepts_tuple"
subject   = "argparse.ArgumentParser.parse_args"
kind      = "semantic"
intent    = "parse_args accepts a tuple argument vector, not just a list, parsing positionals and options identically"
module    = "argparse"

[[case]]
dimension = "behavior"
case      = "parse_known_args_returns_extras"
subject   = "argparse.ArgumentParser.parse_known_args"
kind      = "semantic"
intent    = "parse_known_args returns (namespace, extras) where known options are parsed and unrecognized tokens land in the extras list"
module    = "argparse"

# --- positionals / subparsers ----------------------------------------------

[[case]]
dimension = "behavior"
case      = "positional_argument"
subject   = "argparse.ArgumentParser.add_argument"
kind      = "semantic"
intent    = "a bare positional argument name binds the next argv token to that Namespace attribute"
module    = "argparse"

[[case]]
dimension = "behavior"
case      = "subparsers_dispatch"
subject   = "argparse.ArgumentParser.add_subparsers"
kind      = "semantic"
intent    = "add_subparsers(dest=) records the chosen subcommand and the selected subparser's own options on the same Namespace"
module    = "argparse"

# --- Action object (from actions.py) ---------------------------------------

[[case]]
dimension = "behavior"
case      = "dest_derivation"
subject   = "argparse.ArgumentParser.add_argument"
kind      = "semantic"
intent    = "dest is derived from the first long option, falling back to the first short option when no long option is given"
module    = "argparse"

[[case]]
dimension = "behavior"
case      = "action_attribute_surface"
subject   = "argparse.ArgumentParser.add_argument"
kind      = "semantic"
intent    = "the Action returned by add_argument exposes every constructor keyword (nargs/const/default/type/choices/help/metavar/dest) as an attribute"
module    = "argparse"

[[case]]
dimension = "behavior"
case      = "custom_action_call"
subject   = "argparse.Action"
kind      = "semantic"
intent    = "a user-defined Action subclass has its __call__ invoked during parse_args, letting it write a derived value onto the Namespace"

[[case]]
dimension = "behavior"
case      = "custom_action_constructed_at_add_time"
subject   = "argparse.Action"
kind      = "semantic"
intent    = "a user-defined Action subclass is instantiated at add_argument time with the resolved constructor keywords (dest/const/default), before any parse"

# --- Namespace semantics (from namespace.py + behavior.py) ------------------

[[case]]
dimension = "behavior"
case      = "namespace_attribute_access"
subject   = "argparse.Namespace"
kind      = "semantic"
intent    = "Namespace(**kwargs) turns keyword arguments into attributes readable via dot access and via vars() as a dict"

[[case]]
dimension = "behavior"
case      = "namespace_missing_attr_raises"
subject   = "argparse.Namespace"
kind      = "semantic"
intent    = "reading an unset attribute of an empty Namespace raises AttributeError"

[[case]]
dimension = "behavior"
case      = "namespace_membership"
subject   = "argparse.Namespace"
kind      = "semantic"
intent    = "the `in` operator tests attribute membership by name, independent of construction order, and reports absent names as not-in"

[[case]]
dimension = "behavior"
case      = "namespace_equality_contents"
subject   = "argparse.Namespace"
kind      = "semantic"
intent    = "Namespace equality compares contents (order-independent); differing contents compare unequal"

[[case]]
dimension = "behavior"
case      = "namespace_eq_notimplemented_vs_other"
subject   = "argparse.Namespace"
kind      = "semantic"
intent    = "comparing a Namespace to a non-Namespace returns NotImplemented from __eq__/__ne__, so == None falls back to False and != None to True"

# ===========================================================================
# REAL-WORLD — semantic (one realistic end-user CLI flow)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "subcommand_cli_dispatch"
subject   = "argparse.ArgumentParser"
kind      = "semantic"
intent    = "a git-style CLI with subcommands (add/commit) plus global --verbose flag parses each subcommand's own options and dispatches deterministically over a realistic argv set"
