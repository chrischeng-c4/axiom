# Manifest for the stdlib `heapq` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/heapq/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py)
# plus the loose feature fixtures (heapsort_property.py, merge_advanced.py) and
# real_world/top_k_stream.py. bench/ is left as-is.
#
# heapq is an all-lowercase module exposing only module-level functions
# (heappush, heappop, heapify, heapreplace, heappushpop, nlargest, nsmallest,
# merge), so import inference resolves `heapq` for every subject -- no explicit
# module=/import= overrides are needed.

bucket = "std-libs"
lib = "heapq"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_heapq"
subject   = "heapq"
kind      = "mechanical"
probe     = "attr"
attr      = "heappush"

[[case]]
dimension = "surface"
case      = "heappush_is_callable"
subject   = "heapq.heappush"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "heappop_is_callable"
subject   = "heapq.heappop"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "heapify_is_callable"
subject   = "heapq.heapify"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "heapreplace_is_callable"
subject   = "heapq.heapreplace"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "heappushpop_is_callable"
subject   = "heapq.heappushpop"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "nlargest_is_callable"
subject   = "heapq.nlargest"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "nsmallest_is_callable"
subject   = "heapq.nsmallest"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "merge_is_callable"
subject   = "heapq.merge"
kind      = "mechanical"
probe     = "callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc -> assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "heappop_empty_raises"
subject    = "heapq.heappop"
kind       = "mechanical"
call       = "heapq.heappop([])"
expect_exc = "IndexError"

[[case]]
dimension  = "errors"
case       = "heapreplace_empty_raises"
subject    = "heapq.heapreplace"
kind       = "mechanical"
call       = "heapq.heapreplace([], 1)"
expect_exc = "IndexError"

[[case]]
dimension  = "errors"
case       = "heapify_mixed_types_raises"
subject    = "heapq.heapify"
kind       = "mechanical"
call       = "heapq.heapify([1, \"two\", 3])"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "nlargest_non_iterable_raises"
subject    = "heapq.nlargest"
kind       = "mechanical"
call       = "heapq.nlargest(3, 123)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "heapify_non_list_raises"
subject    = "heapq.heapify"
kind       = "mechanical"
call       = "heapq.heapify(10)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "heappush_non_list_raises"
subject    = "heapq.heappush"
kind       = "mechanical"
call       = "heapq.heappush(10, 10)"
expect_exc = "TypeError"

# ===========================================================================
# ERRORS — semantic (a happy-path "no raise" that goes beyond the plain
# call/expect_exc mechanical template)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "heappushpop_empty_no_raise"
subject   = "heapq.heappushpop"
kind      = "semantic"
intent    = "heappushpop on an empty heap does NOT raise: with no root to compare, the pushed item is returned unchanged"

# ===========================================================================
# BEHAVIOR — semantic (output matches CPython 3.12)
# ===========================================================================

# --- heapify / heappop ordering -------------------------------------------

[[case]]
dimension = "behavior"
case      = "heappop_yields_ascending"
subject   = "heapq.heappop"
kind      = "semantic"
intent    = "draining a heapified list via repeated heappop yields the elements in ascending (sorted) order"

[[case]]
dimension = "behavior"
case      = "heapify_min_at_root"
subject   = "heapq.heapify"
kind      = "semantic"
intent    = "heapify rearranges a list in place so the minimum element sits at index 0 (the root)"

[[case]]
dimension = "behavior"
case      = "heapify_maintains_invariant"
subject   = "heapq.heapify"
kind      = "semantic"
intent    = "after heapify every parent heap[i] is <= its children heap[2i+1] and heap[2i+2] (the min-heap invariant)"

# --- heapreplace ----------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "heapreplace_pops_then_pushes"
subject   = "heapq.heapreplace"
kind      = "semantic"
intent    = "heapreplace returns the current smallest and then inserts the new value; replacing the root of [1,2,3] with 0 returns 1 and leaves 0 at the root"

# --- heappushpop ----------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "heappushpop_smaller_returns_input"
subject   = "heapq.heappushpop"
kind      = "semantic"
intent    = "heappushpop with a value smaller than the current min returns that value immediately and leaves the heap unchanged"

[[case]]
dimension = "behavior"
case      = "heappushpop_larger_pops_min"
subject   = "heapq.heappushpop"
kind      = "semantic"
intent    = "heappushpop with a value larger than the current min pops and returns the old min, and the new value is inserted into the heap"

[[case]]
dimension = "behavior"
case      = "heappushpop_preserves_type_on_tie"
subject   = "heapq.heappushpop"
kind      = "semantic"
intent    = "heappushpop preserves element identity/type on a numeric tie: pushing 10.0 onto [10] keeps the int 10 in the heap and returns the float 10.0"

[[case]]
dimension = "behavior"
case      = "heappushpop_single_element_larger"
subject   = "heapq.heappushpop"
kind      = "semantic"
intent    = "heappushpop on a one-element heap with a larger value returns the old min and the heap now holds only the new value"

# --- nlargest / nsmallest -------------------------------------------------

[[case]]
dimension = "behavior"
case      = "nlargest_with_key"
subject   = "heapq.nlargest"
kind      = "semantic"
intent    = "nlargest(n, data, key=len) selects the n elements with the largest key, ordered largest-key first"

[[case]]
dimension = "behavior"
case      = "nsmallest_with_key"
subject   = "heapq.nsmallest"
kind      = "semantic"
intent    = "nsmallest(n, data, key=...) selects the n elements with the smallest projected key, smallest first"

[[case]]
dimension = "behavior"
case      = "nlargest_nsmallest_clamp_n"
subject   = "heapq.nlargest"
kind      = "semantic"
intent    = "nlargest/nsmallest clamp n at the boundaries: n=0 returns [] and n>len returns the whole sequence fully sorted"

# --- tuple ordering -------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "tuples_ordered_lexicographically"
subject   = "heapq.heappush"
kind      = "semantic"
intent    = "tuples pushed onto a heap are compared lexicographically; popping yields them in ascending tuple order"

# --- merge ----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "merge_two_sorted_inputs"
subject   = "heapq.merge"
kind      = "semantic"
intent    = "merge() lazily combines two already-sorted inputs into one ascending iterator"

[[case]]
dimension = "behavior"
case      = "merge_empty_inputs"
subject   = "heapq.merge"
kind      = "semantic"
intent    = "merge() of empty inputs (and of no inputs, and with key=) yields nothing"

[[case]]
dimension = "behavior"
case      = "merge_key_projects_order"
subject   = "heapq.merge"
kind      = "semantic"
intent    = "merge(key=) merges on the projected key order, not the raw element order, interleaving two row streams by their numeric field"

[[case]]
dimension = "behavior"
case      = "merge_reverse_descending"
subject   = "heapq.merge"
kind      = "semantic"
intent    = "merge(reverse=True) merges descending inputs into a single descending result"

[[case]]
dimension = "behavior"
case      = "merge_kway_multi_input"
subject   = "heapq.merge"
kind      = "semantic"
intent    = "merge() combines more than two sorted inputs k-way in a single pass"

[[case]]
dimension = "behavior"
case      = "merge_is_stable_on_ties"
subject   = "heapq.merge"
kind      = "semantic"
intent    = "merge() is stable: records with equal keys keep their original per-stream input order within each key band"

[[case]]
dimension = "behavior"
case      = "merge_propagates_input_exceptions"
subject   = "heapq.merge"
kind      = "semantic"
intent    = "merge() does not swallow exceptions raised by its input iterators; an IndexError from a faulty generator surfaces to the caller"

# --- heap-sort property (bulk vs incremental, selection invariant) --------

[[case]]
dimension = "behavior"
case      = "heapsort_property_both_paths"
subject   = "heapq.heapify"
kind      = "semantic"
intent    = "draining a heap yields the same order as sorted() for both heap-construction paths (bulk heapify and incremental heappush), and nlargest/nsmallest agree with the sorted slices, over a deterministic pseudo-random sequence across several sizes"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "top_k_stream"
subject   = "heapq.heappushpop"
kind      = "semantic"
intent    = "streaming top-K log pipeline: offline nlargest/nsmallest batch top-K, a running size-K min-heap via heappushpop, a one-shot heapreplace root swap, and merge of two sorted runs -- the streaming result must equal the offline batch"
