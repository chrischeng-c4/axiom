# Manifest for the stdlib `asyncio` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/asyncio/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature + paired-.expected shape
# (surface.py, behavior.py, errors.py, asyncio_ops.py/.expected,
# real_world/_stub.py placeholder). bench/asyncio_type_read_hot.py is left
# as-is (perf, golden-less).
#
# xfail map (probed against installed mamba 0.3.60): the asyncio shim only
# exposes the coroutine entry points (run/sleep/gather/create_task/
# ensure_future/wait/wait_for/shield) as module-level callables; the
# synchronization-primitive *classes* (Task/Future/Event/Lock/Queue/
# Semaphore), get_event_loop/get_running_loop, the InvalidStateError type,
# and the asyncio.TimeoutError/CancelledError exception-subclass relationship
# are not implemented (attribute resolves to a dict/None), so every case that
# touches them is xfail. See repo-memory project_mamba_py312_session_handoff
# (async-gen runtime + ~30 stdlib stubs remaining).

bucket = "std-libs"
lib = "asyncio"

