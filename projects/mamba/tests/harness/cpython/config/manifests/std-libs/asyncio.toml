case       = "run_non_coro_raises"
subject    = "asyncio.run"
kind       = "mechanical"
call       = "asyncio.run(42)"
expect_exc = "ValueError"
xfail      = "mamba asyncio shim: asyncio.run(42) returns silently instead of raising (mamba 0.3.60)"

# ===========================================================================
# BEHAVIOR — semantic (output matches CPython)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "run_executes_coroutine"
subject   = "asyncio.run"
kind      = "semantic"
intent    = "asyncio.run drives a coroutine to completion and returns its value (run(coro_returning_42) == 42)"

[[case]]
dimension = "behavior"
case      = "gather_returns_results_in_order"
subject   = "asyncio.gather"
kind      = "semantic"
intent    = "asyncio.gather runs coroutines concurrently and returns their results in submission order ([10, 20])"

[[case]]
dimension = "behavior"
case      = "task_exception_propagates_on_await"
subject   = "asyncio.create_task"
kind      = "semantic"
intent    = "awaiting a Task whose coroutine raised re-raises the original exception, and the task is done() and not cancelled()"

[[case]]
dimension = "behavior"
case      = "task_cancellation_raises_cancelled_error"
subject   = "asyncio.create_task"
kind      = "semantic"
intent    = "cancelling a running Task makes awaiting it raise CancelledError and sets task.cancelled() True"
xfail     = "mamba asyncio shim: create_task returns a non-Task (int) lacking .cancel() (mamba 0.3.60)"

[[case]]
dimension = "behavior"
case      = "wait_for_timeout_raises_timeout_error"
subject   = "asyncio.wait_for"
kind      = "semantic"
intent    = "asyncio.wait_for raises asyncio.TimeoutError when the wrapped coroutine exceeds the timeout"
xfail     = "mamba asyncio shim: wait_for does not enforce the timeout / raise TimeoutError (mamba 0.3.60)"

[[case]]
dimension = "behavior"
case      = "lock_serializes_critical_section"
subject   = "asyncio.Lock"
kind      = "semantic"
intent    = "an asyncio.Lock used as an async context manager guarantees only one coroutine is inside the critical section at a time"
module    = "asyncio"
xfail     = "mamba asyncio shim: asyncio.Lock not implemented (mamba 0.3.60)"

[[case]]
dimension = "behavior"
case      = "queue_preserves_fifo_order"
subject   = "asyncio.Queue"
kind      = "semantic"
intent    = "asyncio.Queue dequeues items in the same order they were enqueued (FIFO: [0,1,2,3,4])"
module    = "asyncio"
xfail     = "mamba asyncio shim: asyncio.Queue not implemented (mamba 0.3.60)"

[[case]]
dimension = "behavior"
case      = "event_wakes_waiter_after_set"
subject   = "asyncio.Event"
kind      = "semantic"
intent    = "an asyncio.Event wakes a waiting coroutine only after another coroutine calls set(); the waiter observes 'setting' before 'woke'"
module    = "asyncio"
xfail     = "mamba asyncio shim: asyncio.Event not implemented (mamba 0.3.60)"

[[case]]
dimension = "behavior"
case      = "semaphore_caps_concurrency"
subject   = "asyncio.Semaphore"
kind      = "semantic"
intent    = "an asyncio.Semaphore(2) limits the number of coroutines in its critical section to at most 2 at once"
module    = "asyncio"
xfail     = "mamba asyncio shim: asyncio.Semaphore not implemented (mamba 0.3.60)"

[[case]]
