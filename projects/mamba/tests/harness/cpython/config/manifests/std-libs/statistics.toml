# ===========================================================================
# BEHAVIOR — semantic (output matches CPython 3.12 exactly)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "mean_type_preservation"
subject   = "statistics.mean"
kind      = "semantic"
intent    = "mean of an all-int list reduces to the exact value (3 for 1..5, 2.5 for 1..4) and mean of floats returns a float"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "mean_ieee_special_values"
subject   = "statistics.mean"
kind      = "semantic"
intent    = "a single nan poisons the mean (float and Decimal alike), a single signed infinity dominates and is preserved, and +inf with -inf yields nan rather than an error"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "median_even_and_odd_lengths"
subject   = "statistics.median"
kind      = "semantic"
intent    = "median averages the middle two on even-length input ([1,3,5,7] -> 4) and returns the exact middle on odd-length ([1,3,5] -> 3), keeping int return for odd int input"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "median_low_and_high"
subject   = "statistics.median_low"
kind      = "semantic"
intent    = "median_low picks the lower of the two middle values and median_high the upper on even-length data ([1,3,5,7] -> 3 and 5)"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "median_grouped_interpolation"
subject   = "statistics.median_grouped"
kind      = "semantic"
intent    = "median_grouped treats each value as a unit-interval midpoint and interpolates within the median class (Fraction and Decimal inputs), and a run of one repeated value collapses to that value as a float"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "mode_single_most_common"
subject   = "statistics.mode"
kind      = "semantic"
intent    = "mode returns the single most common value over any hashable iterable (ints, characters, words) and on a tie returns the first-seen value, never erroring"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "multimode_first_seen_order"
subject   = "statistics.multimode"
kind      = "semantic"
intent    = "multimode returns every most-common value preserving first-seen order ('aabbbbccddddeeffffgg' -> ['b','d','f']) and returns [] for empty input"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "sample_vs_population_stdev"
subject   = "statistics.stdev"
kind      = "semantic"
intent    = "sample stdev (ddof=1) exceeds population pstdev (ddof=0) on the same data, with exact CPython values for [2,4,4,4,5,5,7,9]"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "variance_is_stdev_squared"
subject   = "statistics.variance"
kind      = "semantic"
intent    = "sample variance equals the square of the sample stdev for the same data, with the exact CPython value 4.571428571428571"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "fmean_returns_float"
subject   = "statistics.fmean"
kind      = "semantic"
intent    = "fmean always returns a float regardless of input numeric type (float/Decimal/Fraction/bool, tuple, iterator) and its weights act as repetition counts so uniform weights equal the unweighted mean"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "geometric_mean_nth_root"
subject   = "statistics.geometric_mean"
kind      = "semantic"
intent    = "geometric_mean is the nth root of the product (geometric_mean([54,24,36]) ~ 36.0, [4.0,9.0] ~ 6.0)"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "harmonic_mean_contract"
subject   = "statistics.harmonic_mean"
kind      = "semantic"
intent    = "harmonic_mean is the reciprocal of the mean of reciprocals ([1,2,4] -> 1.7142857142857142), a single zero collapses it to 0, a singleton is the value itself, and weights repeat data points (harmonic_mean([40,60],[5,30]) == 56.0)"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "normaldist_properties"
subject   = "statistics.NormalDist"
kind      = "semantic"
intent    = "a NormalDist derives mean/median/mode == mu, stdev == sigma, and variance == sigma**2 (NormalDist(100,15) -> variance 225)"
module    = "statistics"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "normaldist_cdf_pdf_inv_cdf"
subject   = "statistics.NormalDist"
kind      = "semantic"
intent    = "the standard normal has cdf(0) == 0.5, a pdf peaking at the mean, and inv_cdf inverts cdf; zscore standardises a value (NormalDist(100,15).zscore(142) == 2.8)"
module    = "statistics"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "normaldist_arithmetic"
subject   = "statistics.NormalDist"
kind      = "semantic"
intent    = "translating/scaling a NormalDist shifts/scales it (X+10, 10*X, X/10), adding two NormalDists combines variances (sigma=sqrt(12**2+5**2)=13), and unary negation flips the mean and copies"
module    = "statistics"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "normaldist_value_dunders"
subject   = "statistics.NormalDist"
kind      = "semantic"
intent    = "NormalDist is a value type: repr round-trips, equality is by (mu,sigma), it is hashable (set dedups equal instances), copy/deepcopy preserve equality, and __slots__ means no instance __dict__"
module    = "statistics"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "normaldist_from_samples"
subject   = "statistics.NormalDist"
kind      = "semantic"
intent    = "NormalDist.from_samples reconstructs an estimate (from_samples([96,107,90,92,110]) == NormalDist(99,9)) and samples(seed=...) is reproducible for a fixed seed and differs across seeds"
module    = "statistics"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "quantiles_quartiles"
subject   = "statistics.quantiles"
kind      = "semantic"
intent    = "quantiles(n=4) returns the three quartiles, with the middle quartile equal to the median over 1..100 (~50.5)"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "quantiles_exclusive_vs_inclusive"
subject   = "statistics.quantiles"
kind      = "semantic"
intent    = "n cut points produce n-1 boundaries (n=1 -> []), the exclusive default and the 'inclusive' method give the documented CPython values, and the result element type follows the input numeric type"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "correlation_and_covariance"
subject   = "statistics.correlation"
kind      = "semantic"
intent    = "correlation/covariance track the sign of a linear relationship (+1/-1/0/0.5), correlation is scale-invariant while covariance is not, and the 'ranked' method gives Spearman correlation"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "behavior"
case      = "linear_regression_slope_intercept"
subject   = "statistics.linear_regression"
kind      = "semantic"
intent    = "linear_regression returns (slope, intercept) recovering known lines, and proportional=True forces a zero intercept (line through the origin)"
source    = "Lib/test/test_statistics.py"

# ===========================================================================
# ERRORS — semantic (multi-call contracts beyond one call/expect_exc)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "bivariate_reject_unequal_and_small_inputs"
subject   = "statistics.linear_regression"
kind      = "semantic"
intent    = "covariance/correlation/linear_regression all raise StatisticsError on unequal-length or fewer-than-two-point inputs, constant x cannot be regressed, and an unknown correlation method is a ValueError"
source    = "Lib/test/test_statistics.py"

[[case]]
dimension = "errors"
case      = "quantiles_argument_error_contract"
subject   = "statistics.quantiles"
kind      = "semantic"
intent    = "quantiles n<1 and one-element data are StatisticsError, a non-int n and a stray positional cut-count are TypeError, and an unknown method is a ValueError"
source    = "Lib/test/test_statistics.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "grade_distribution_report"
subject   = "statistics"
kind      = "semantic"
intent    = "a grading analytics job computes mean/median/mode/stdev/variance over a synthetic score set, fits a NormalDist via from_samples to z-score a student, derives quartile cutoffs with quantiles, and correlates two assignment columns -- asserting each result against deterministic CPython values"
source    = "Lib/test/test_statistics.py"
