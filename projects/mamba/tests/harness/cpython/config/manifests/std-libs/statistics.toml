# ===========================================================================
# ERRORS — mechanical (call + expect_exc -> assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "mean_empty_raises"
subject    = "statistics.mean"
kind       = "mechanical"
call       = "statistics.mean([])"
expect_exc = "statistics.StatisticsError"
source     = "Lib/test/test_statistics.py"

[[case]]
dimension  = "errors"
case       = "median_empty_raises"
subject    = "statistics.median"
kind       = "mechanical"
