# Manifest for the stdlib `statistics` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/statistics/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, means.py, medians.py, bivariate.py, normaldist.py,
# quantiles.py, real_world/_stub.py). bench/ is left as-is.
#
# Method / classmethod subjects (statistics.NormalDist.*) set an explicit
# `module = "statistics"` so the import inferer does not stop at the CapWords
# `NormalDist` component and emit a broken import.

bucket = "std-libs"
lib    = "statistics"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_statistics"
subject   = "statistics"
kind      = "mechanical"
probe     = "attr"
attr      = "mean"

