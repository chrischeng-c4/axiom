# Manifest for the stdlib `locale` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/locale/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, collation.py, encoding.py, format_string.py).
# bench/ is left as-is.
#
# All assertions hold in the default 'C' locale (the only locale guaranteed
# present), so no locale-gating is needed. LC_* integer values are libc-defined
# and differ across platforms (Linux glibc vs macOS Darwin) — fixtures assert
# *type* int parity, never specific numeric values. No mamba xfail is known for
# locale (none of the legacy fixtures carried a # mamba-xfail directive).

bucket = "std-libs"
lib = "locale"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_locale"
subject   = "locale"
kind      = "mechanical"
probe     = "attr"
attr      = "setlocale"

[[case]]
dimension = "surface"
case      = "getlocale_is_callable"
subject   = "locale.getlocale"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "setlocale_is_callable"
subject   = "locale.setlocale"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "format_string_is_callable"
subject   = "locale.format_string"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "lc_all_is_int"
subject   = "locale.LC_ALL"
kind      = "mechanical"
probe     = "type"
typename  = "int"

[[case]]
dimension = "surface"
case      = "lc_ctype_is_int"
subject   = "locale.LC_CTYPE"
kind      = "mechanical"
probe     = "type"
typename  = "int"

[[case]]
dimension = "surface"
case      = "lc_time_is_int"
subject   = "locale.LC_TIME"
kind      = "mechanical"
probe     = "type"
typename  = "int"

[[case]]
dimension = "surface"
case      = "lc_numeric_is_int"
subject   = "locale.LC_NUMERIC"
kind      = "mechanical"
probe     = "type"
typename  = "int"

[[case]]
dimension = "surface"
case      = "error_is_exception_subclass"
subject   = "locale.Error"
kind      = "mechanical"
module    = "locale"
probe     = "attr"
attr      = "args"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc); self-asserting assert-it-raised
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "setlocale_unknown_locale_raises"
subject    = "locale.setlocale"
kind       = "mechanical"
call       = 'locale.setlocale(locale.LC_ALL, "no_such_locale_xyzzy")'
expect_exc = "locale.Error"
source     = "Lib/test/test_locale.py"

[[case]]
dimension  = "errors"
case       = "setlocale_str_category_raises"
subject    = "locale.setlocale"
kind       = "mechanical"
call       = 'locale.setlocale("not_a_category", "C")'
expect_exc = "(TypeError, locale.Error)"
source     = "Lib/test/test_locale.py"

[[case]]
dimension  = "errors"
case       = "setlocale_unknown_category_int_raises"
subject    = "locale.setlocale"
kind       = "mechanical"
call       = 'locale.setlocale(999999, "C")'
expect_exc = "locale.Error"
source     = "Lib/test/test_locale.py"

[[case]]
dimension  = "errors"
case       = "setlocale_bytes_locale_raises"
subject    = "locale.setlocale"
kind       = "mechanical"
call       = 'locale.setlocale(locale.LC_ALL, b"fi_FI")'
expect_exc = "TypeError"
source     = "Lib/test/test_locale.py"

[[case]]
dimension  = "errors"
case       = "setlocale_bytes_tuple_raises"
subject    = "locale.setlocale"
kind       = "mechanical"
call       = 'locale.setlocale(locale.LC_ALL, (b"not", b"valid"))'
expect_exc = "TypeError"
source     = "Lib/test/test_locale.py"

[[case]]
dimension  = "errors"
case       = "atof_non_numeric_raises"
subject    = "locale.atof"
kind       = "mechanical"
call       = 'locale.atof("not a number")'
expect_exc = "ValueError"
source     = "Lib/test/test_locale.py"

[[case]]
dimension  = "errors"
case       = "atoi_non_integer_raises"
subject    = "locale.atoi"
kind       = "mechanical"
call       = 'locale.atoi("not an int")'
expect_exc = "ValueError"
source     = "Lib/test/test_locale.py"

[[case]]
dimension  = "errors"
case       = "strcoll_embedded_null_left_raises"
subject    = "locale.strcoll"
kind       = "mechanical"
call       = 'locale.strcoll("a\x00", "a")'
expect_exc = "ValueError"
source     = "Lib/test/test_locale.py"

[[case]]
dimension  = "errors"
case       = "strcoll_embedded_null_right_raises"
subject    = "locale.strcoll"
kind       = "mechanical"
call       = 'locale.strcoll("a", "a\x00")'
expect_exc = "ValueError"
source     = "Lib/test/test_locale.py"

[[case]]
dimension  = "errors"
case       = "strxfrm_embedded_null_raises"
subject    = "locale.strxfrm"
kind       = "mechanical"
call       = 'locale.strxfrm("a\x00")'
expect_exc = "ValueError"
source     = "Lib/test/test_locale.py"

[[case]]
dimension  = "errors"
case       = "strcoll_str_none_raises"
subject    = "locale.strcoll"
kind       = "mechanical"
call       = 'locale.strcoll("a", None)'
expect_exc = "TypeError"
source     = "Lib/test/test_locale.py"

[[case]]
dimension  = "errors"
case       = "strcoll_bytes_none_raises"
subject    = "locale.strcoll"
kind       = "mechanical"
call       = 'locale.strcoll(b"a", None)'
expect_exc = "TypeError"
source     = "Lib/test/test_locale.py"

# ===========================================================================
# BEHAVIOR — semantic (output matches CPython); agent-filled bodies
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "getlocale_returns_two_tuple"
subject   = "locale.getlocale"
kind      = "semantic"
intent    = "getlocale() returns a (language, encoding) 2-tuple"
source    = "Lib/test/test_locale.py"

[[case]]
dimension = "behavior"
case      = "error_is_exception"
subject   = "locale.Error"
kind      = "semantic"
module    = "locale"
intent    = "locale.Error is a subclass of Exception"
source    = "Lib/test/test_locale.py"

[[case]]
dimension = "behavior"
case      = "strcoll_orders_like_c"
subject   = "locale.strcoll"
kind      = "semantic"
intent    = "strcoll returns <0, 0, >0 for a<b, a==a, b>a in the C locale (byte ordering)"
source    = "Lib/test/test_locale.py"

[[case]]
dimension = "behavior"
case      = "strxfrm_preserves_order"
subject   = "locale.strxfrm"
kind      = "semantic"
intent    = "strxfrm maps a string to a str sort key whose comparison preserves the original order"
source    = "Lib/test/test_locale.py"

[[case]]
dimension = "behavior"
case      = "getencoding_resolves_to_codec"
subject   = "locale.getencoding"
kind      = "semantic"
intent    = "getencoding returns a non-empty codec-resolvable encoding name"
source    = "Lib/test/test_locale.py"

[[case]]
dimension = "behavior"
case      = "getpreferredencoding_resolves_to_codec"
subject   = "locale.getpreferredencoding"
kind      = "semantic"
intent    = "getpreferredencoding returns a str; if non-empty it resolves via codecs.lookup"
source    = "Lib/test/test_locale.py"

[[case]]
dimension = "behavior"
case      = "parse_localename_bare_encoding"
subject   = "locale._parse_localename"
kind      = "semantic"
intent    = "_parse_localename of a bare encoding 'UTF-8' yields (None, 'UTF-8')"
source    = "Lib/test/test_locale.py"

[[case]]
dimension = "behavior"
case      = "setlocale_query_returns_str"
subject   = "locale.setlocale"
kind      = "semantic"
intent    = "setlocale(category) with no locale arg queries (does not change) and returns a str for every standard LC_ category"
source    = "Lib/test/test_locale.py"

[[case]]
dimension = "behavior"
case      = "format_string_mapping_passthrough"
subject   = "locale.format_string"
kind      = "semantic"
intent    = "format_string with a %(name)s mapping passes straight through to plain %-formatting"
source    = "Lib/test/test_locale.py"

[[case]]
dimension = "behavior"
case      = "format_string_percent_escape"
subject   = "locale.format_string"
kind      = "semantic"
intent    = "format_string preserves a literal %% escape and formats a single float arg like %-formatting"
source    = "Lib/test/test_locale.py"

[[case]]
dimension = "behavior"
case      = "format_string_tuple_args"
subject   = "locale.format_string"
kind      = "semantic"
intent    = "format_string with positional tuple args plus an escaped %% mid-string matches plain %-formatting"
source    = "Lib/test/test_locale.py"

[[case]]
dimension = "behavior"
case      = "format_string_mapping_with_escape"
subject   = "locale.format_string"
kind      = "semantic"
intent    = "format_string with a mapping and an escaped %% literal matches plain %-formatting"
source    = "Lib/test/test_locale.py"
