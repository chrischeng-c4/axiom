# ===========================================================================
# SECURITY — semantic (adversarial / untrusted input)
# ===========================================================================

[[case]]
dimension = "security"
case      = "catastrophic_backtracking_bounded"
subject   = "re.Pattern.search"
kind      = "semantic"
intent    = "classic ReDoS nested-quantifier patterns (^(a+)+$ etc.) matched against pathological non-matching input finish under a 1.0s wall-clock budget, proving the engine is not exponential on hostile input"
module    = "re"

[[case]]
