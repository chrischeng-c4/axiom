[[case]]
dimension = "behavior"
case      = "scanner_tokenizes"
subject   = "re.Scanner"
kind      = "semantic"
intent    = "re.Scanner walks the input calling per-pattern callbacks (a None callback consumes silently); scan() returns (tokens, remainder)"
