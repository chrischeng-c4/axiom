# --- match / search anchoring --------------------------------------------

[[case]]
dimension = "behavior"
case      = "match_anchors_at_start"
subject   = "re.match"
kind      = "semantic"
intent    = "re.match anchors at the start: r'\\d+' matches '123abc' (group '123') but returns None for 'abc123'"

[[case]]
dimension = "behavior"
case      = "search_finds_anywhere"
subject   = "re.search"
kind      = "semantic"
intent    = "re.search finds the first hit anywhere: r'\\d+' on 'abc123def' yields group '123'"

[[case]]
dimension = "behavior"
case      = "search_reports_span_positions"
subject   = "re.search"
kind      = "semantic"
intent    = "the Match object exposes start/end/span: re.search(r'\\d+', 'abc123') gives start 3, end 6, span (3, 6)"

[[case]]
dimension = "behavior"
case      = "fullmatch_requires_whole_string"
subject   = "re.fullmatch"
kind      = "semantic"
intent    = "re.fullmatch requires the whole string to match: r'\\d{3}' matches '123' but returns None for '1234'"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "match_empty_pattern_succeeds"
subject   = "re.match"
kind      = "semantic"
intent    = "the empty pattern matches at the start of any string: re.match('', 'abc') is not None"

# --- findall --------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "findall_no_groups_returns_flat_list"
subject   = "re.findall"
kind      = "semantic"
intent    = "findall with no capture groups returns a flat list of whole matches: r'\\w+' on 'hello world foo' is ['hello','world','foo']"

[[case]]
dimension = "behavior"
case      = "findall_one_group_returns_group_text"
subject   = "re.findall"
kind      = "semantic"
intent    = "findall with one capture group returns the group's text, not the whole match: r'(\\d+)' on 'abc123def456' is ['123','456']"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "findall_multi_groups_returns_tuples"
subject   = "re.findall"
kind      = "semantic"
intent    = "findall with multiple groups returns a list of group tuples: r'(\\w+)=(\\d+)' on 'a=1 b=2 c=3' is [('a','1'),('b','2'),('c','3')]"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "findall_no_match_returns_empty_list"
subject   = "re.findall"
kind      = "semantic"
intent    = "findall returns an empty list (never None) when nothing matches: r'\\d+' on 'no digits' and on '' are both []"

[[case]]
dimension = "behavior"
case      = "findall_alternation"
subject   = "re.findall"
kind      = "semantic"
intent    = "findall over an alternation collects each alternative hit: r'cat|dog' on 'I have a cat and a dog' is ['cat','dog']"

# --- sub / subn / split ---------------------------------------------------

[[case]]
dimension = "behavior"
case      = "sub_replaces_all_matches"
subject   = "re.sub"
kind      = "semantic"
intent    = "sub replaces every non-overlapping match by default: r'\\d+' -> 'NUM' on 'abc123def456' is 'abcNUMdefNUM'"

[[case]]
dimension = "behavior"
case      = "sub_count_limits_replacements"
subject   = "re.sub"
kind      = "semantic"
intent    = "the count keyword caps replacements: re.sub(r'a','b','aaaaa',count=1) is 'baaaa' while count=0 means replace all"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "sub_numeric_backreference"
subject   = "re.sub"
kind      = "semantic"
intent    = "a numeric backreference in the replacement re-inserts a captured group: re.sub(r'(\\w+)', r'[\\1]', 'hello world') is '[hello] [world]'"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "sub_callable_replacement"
subject   = "re.sub"
kind      = "semantic"
intent    = "a callable replacement is invoked per match with the Match object: re.sub(r'\\d+', lambda m: str(int(m.group())*2), 'a1b2c3') is 'a2b4c6'"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "sub_symbolic_group_reference"
subject   = "re.sub"
kind      = "semantic"
intent    = "\\g<name> and \\g<N> symbolic references reinsert groups; an unmatched optional group expands to the empty string"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "subn_returns_string_and_count"
subject   = "re.subn"
kind      = "semantic"
intent    = "subn returns (new_string, num_subs): re.subn(r'\\d+','X','a1 b22 c333') is ('aX bX cX', 3); a no-match leaves count 0"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "subn_empty_match_repetition"
subject   = "re.subn"
kind      = "semantic"
intent    = "an empty-matching pattern inserts between every character: re.subn(r'b*','x','xyz') is ('xxxyxzx', 4)"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "split_no_groups"
subject   = "re.split"
kind      = "semantic"
intent    = "split breaks on the separator pattern and drops it: re.split(r'\\s+','hello  world  foo') is ['hello','world','foo']"

[[case]]
dimension = "behavior"
case      = "split_captured_separators_kept"
subject   = "re.split"
kind      = "semantic"
intent    = "a capturing group in the split pattern keeps the separators: re.split(r'(\\d+)','a1b2c3') is ['a','1','b','2','c','3','']"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "split_maxsplit_limit"
subject   = "re.split"
kind      = "semantic"
intent    = "maxsplit caps the number of splits: re.split(r':','a:b:c:d',maxsplit=2) is ['a','b','c:d']"
source    = "Lib/test/test_re.py"

# --- escape ---------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "escape_makes_metachars_literal"
subject   = "re.escape"
kind      = "semantic"
intent    = "re.escape turns metacharacters into literals: the escaped 'a.b+c?' matches that exact text but the escaped dot does NOT match an arbitrary char"
source    = "Lib/test/test_re.py"

# --- flags ----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "ignorecase_flag"
subject   = "re.IGNORECASE"
kind      = "semantic"
intent    = "re.IGNORECASE makes the match case-insensitive: re.search(r'hello','HELLO',re.IGNORECASE) is not None"

[[case]]
dimension = "behavior"
case      = "dotall_flag"
subject   = "re.DOTALL"
kind      = "semantic"
intent    = "by default '.' does not match newline; re.DOTALL makes 'a.b' match 'a\\nb'"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "multiline_flag"
subject   = "re.MULTILINE"
kind      = "semantic"
intent    = "re.MULTILINE makes ^ and $ per-line: r'^\\w+' over 'line1\\nline2\\nline3' findall is ['line1','line2','line3']"
source    = "Lib/test/test_re.py"

# --- groups / named groups ------------------------------------------------

[[case]]
dimension = "behavior"
case      = "numbered_groups"
subject   = "re.Match.group"
kind      = "semantic"
intent    = "numbered groups: re.search(r'(\\w+)\\s+(\\w+)','hello world') gives group(1)='hello', group(2)='world', groups()=('hello','world')"
module    = "re"

[[case]]
dimension = "behavior"
case      = "named_groups_and_groupdict"
subject   = "re.Match.groupdict"
kind      = "semantic"
intent    = "named groups resolve by name and groupdict() returns the name->text map: r'(?P<year>\\d{4})-(?P<month>\\d{2})' on '2024-03'"
module    = "re"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "group_multi_id_returns_tuple"
subject   = "re.Match.group"
kind      = "semantic"
intent    = "group() with several ids returns them in id order: re.match(r'(a)(b)','ab').group(2,1) is ('b','a'), and group()==group(0)=='ab'"
module    = "re"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "getitem_index_and_name"
subject   = "re.Match.__getitem__"
kind      = "semantic"
intent    = "Match supports m[index] and m[name]; unmatched optional/alternation groups give None"
module    = "re"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "match_format_map"
subject   = "re.Match.__getitem__"
kind      = "semantic"
intent    = "a Match object is usable as the mapping in str.format_map; unmatched named groups render as 'None'"
module    = "re"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "span_start_end_per_group"
subject   = "re.Match.span"
kind      = "semantic"
intent    = "span(n)/start(n)/end(n) report per-group offsets: re.search(r'(\\d+)-(\\d+)','id: 12-345') has span()=(4,10), span(1)=(4,6), span(2)=(7,10)"
module    = "re"

# --- Match / Pattern attributes -------------------------------------------

[[case]]
dimension = "behavior"
case      = "match_pos_endpos_string_attrs"
subject   = "re.Match.string"
kind      = "semantic"
intent    = "a Match exposes pos/endpos describing the search window and .string the original subject: re.match(r'(a)','a') has pos 0, endpos 1, string 'a'"
module    = "re"

[[case]]
dimension = "behavior"
case      = "pattern_groups_groupindex_attrs"
subject   = "re.Pattern.groupindex"
kind      = "semantic"
intent    = "a compiled Pattern reports .groups count, .groupindex name->number map, and the original .pattern source string"
module    = "re"

# --- compiled pattern reuse -----------------------------------------------

[[case]]
dimension = "behavior"
case      = "compiled_pattern_reuse"
subject   = "re.Pattern.findall"
kind      = "semantic"
intent    = "a compiled pattern is reusable across method calls: re.compile(r'[aeiou]').findall('hello world') is ['e','o','o'] and .sub('_','hello') is 'h_ll_'"
module    = "re"

[[case]]
dimension = "behavior"
case      = "finditer_yields_matches"
subject   = "re.Pattern.finditer"
kind      = "semantic"
intent    = "finditer yields Match objects in order, and honors the optional pos/endpos window: re.compile(r':+').finditer over 'a:b::c:::d' all vs windowed (3,8)"
module    = "re"
source    = "Lib/test/test_re.py"

# --- expand ---------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "match_expand_template"
subject   = "re.Match.expand"
kind      = "semantic"
intent    = "Match.expand fills a template from the captured groups by number (\\1) and by name (\\g<name>)"
module    = "re"
source    = "Lib/test/test_re.py"

# --- zero-width / boundaries / anchors ------------------------------------

[[case]]
dimension = "behavior"
case      = "word_boundary_anchor"
subject   = "re.search"
kind      = "semantic"
intent    = "\\b is a zero-width word boundary: r'\\b\\w+\\b' on '   hello   ' captures 'hello'"

[[case]]
dimension = "behavior"
case      = "word_boundary_zero_width_count"
subject   = "re.findall"
kind      = "semantic"
intent    = "\\b is zero-width with one boundary on each side of a word: findall(r'\\b','a') is two hits, findall(r'\\B','a') is zero, and search(r'\\b','') is None"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "string_start_end_anchors"
subject   = "re.search"
kind      = "semantic"
intent    = "\\A anchors at string start and \\Z at string end even under MULTILINE: r'^\\Aabc\\Z$' matches 'abc' but rejects '\\nabc\\n'"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "class_shortcut_escapes"
subject   = "re.search"
kind      = "semantic"
intent    = "the class shortcuts \\d \\D \\w \\W \\s \\S match digit/non-digit, word/non-word, space/non-space respectively, for both str and bytes patterns"
source    = "Lib/test/test_re.py"

# --- lookaround / conditional groups --------------------------------------

[[case]]
dimension = "behavior"
case      = "positive_negative_lookahead"
subject   = "re.match"
kind      = "semantic"
intent    = "positive lookahead (?=...) constrains without consuming (r'a(?=\\d)' on 'a5' matches 'a', end 1); negative lookahead (?!...) blocks the forbidden follow"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "positive_negative_lookbehind"
subject   = "re.search"
kind      = "semantic"
intent    = "positive lookbehind (?<=...) requires the preceding text (r'(?<=b)c' matches 'abc'); negative lookbehind (?<!...) forbids it"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "conditional_group"
subject   = "re.match"
kind      = "semantic"
intent    = "a conditional group (?(1)yes|no) branches on whether group 1 matched: r'^(\\()?([^()]+)(?(1)\\))$' accepts '(a)' and 'a' but rejects 'a)' and '(a'"
source    = "Lib/test/test_re.py"

# --- atomic groups / possessive quantifiers -------------------------------

[[case]]
dimension = "behavior"
case      = "atomic_group_no_backtrack"
subject   = "re.match"
kind      = "semantic"
intent    = "an atomic group (?>bc|b) takes its match and refuses to give it back: r'a(?>bc|b)c' rejects 'abc' but accepts 'abcc'"
source    = "Lib/test/test_re.py"

[[case]]
dimension = "behavior"
case      = "possessive_quantifiers"
subject   = "re.match"
kind      = "semantic"
intent    = "possessive quantifiers (*+, ++, ?+, {m,n}+) never give back: r'e*+e' fails on 'eeee' while r'e++a' matches 'eeea'"
source    = "Lib/test/test_re.py"

# --- VERBOSE / inline flags -----------------------------------------------

[[case]]
dimension = "behavior"
case      = "verbose_ignores_whitespace_and_comments"
subject   = "re.VERBOSE"
kind      = "semantic"
intent    = "re.VERBOSE ignores unescaped whitespace and # comments in the pattern; the compiled pattern still reports the VERBOSE flag in .flags"
