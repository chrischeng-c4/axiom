# Manifest for the stdlib `re` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/re/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + paired-.expected golden shape (surface.py,
# behavior.py, errors.py, broad.py/.expected, re_conformance.py/.expected,
# groups_edges, ops_broad, pattern_matching, re_api_conformance, re_edge,
# findall_sub_broad, lookaround, match_object, possessive_atomic, scanner,
# special_escapes, subn_expand, verbose_inline_flags, redos_patterns,
# real_world/re_behavioral, real_world/regex_logs). bench/ is left as-is.
#
# Authoring rule (mamba gotcha): a hoisted `_search = PAT.search; _search(x)`
# returns None under mamba, so fixtures call `PAT.search(x)` / `re.search(...)`
# inline, never via a hoisted bound method.

bucket = "std-libs"
lib = "re"

