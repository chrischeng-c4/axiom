[[case]]
dimension = "behavior"
case      = "inline_scoped_flags"
subject   = "re.fullmatch"
kind      = "semantic"
intent    = "(?i) enables case-insensitivity globally while scoped (?i:...) limits it to that group and (?-x:...) re-enables whitespace significance inside"
source    = "Lib/test/test_re.py"

