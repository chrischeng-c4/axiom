# ===========================================================================
# SURFACE — semantic (public-name closure + IOBase interface checks that go
# beyond a single attr/callable probe)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "public_api_no_unexpected_names"
subject   = "tempfile"
kind      = "semantic"
intent    = "every documented public name is present and nothing else leaks: the set of non-underscore dir(tempfile) names equals the documented public set"

[[case]]
dimension = "surface"
case      = "spooled_mirrors_iobase_interface"
subject   = "tempfile.SpooledTemporaryFile"
kind      = "semantic"
intent    = "SpooledTemporaryFile exposes the full IOBase method/attr subset (seek, read, write, close, closed, flush, readable, writable, __enter__, __exit__, __iter__, ...)"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc -> assert-it-raised)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "read_closed_named_file_raises"
subject   = "tempfile.NamedTemporaryFile"
kind      = "semantic"
intent    = "reading a NamedTemporaryFile after it has been closed raises ValueError (the open w+b file reads fine; only the closed handle raises)"
source    = "Lib/test/test_tempfile.py"

[[case]]
dimension  = "errors"
case       = "mkstemp_nonexistent_dir_raises"
subject    = "tempfile.mkstemp"
kind       = "mechanical"
call       = "tempfile.mkstemp(dir='/nonexistent_dir_xyzzy')"
expect_exc = "FileNotFoundError"
source     = "Lib/test/test_tempfile.py"

[[case]]
dimension  = "errors"
case       = "named_file_bad_mode_raises"
subject    = "tempfile.NamedTemporaryFile"
kind       = "mechanical"
call       = "tempfile.NamedTemporaryFile(mode='Q')"
expect_exc = "ValueError"
source     = "Lib/test/test_tempfile.py"

[[case]]
dimension  = "errors"
case       = "infer_return_type_mixes_str_bytes_raises"
subject    = "tempfile._infer_return_type"
kind       = "mechanical"
call       = "tempfile._infer_return_type('', b'')"
expect_exc = "TypeError"
source     = "Lib/test/test_tempfile.py"

# ===========================================================================
# ERRORS — semantic (a no-raise behavior on the errors path that does not fit
# the plain call/expect_exc template)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "spooled_negative_max_size_no_raise"
subject   = "tempfile.SpooledTemporaryFile"
kind      = "semantic"
intent    = "SpooledTemporaryFile(max_size=-1) does NOT raise; a negative max_size just rolls the spool to disk on first write"
source    = "Lib/test/test_tempfile.py"

