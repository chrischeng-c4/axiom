# Manifest for the stdlib `tempfile` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/tempfile/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic behavior/real_world come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the loose feature files infer_return_type.py / named_lifecycle.py / spooled.py
# / tempfile_basic.py. bench/ is kept as-is. CPython 3.12 is the oracle.
#
# Import inference: every subject is `tempfile.<Class>` or `tempfile.<fn>`, so
# the inferer (stops at the first CapWords component) resolves the module to
# `tempfile` for all of them — no explicit module=/import= override needed.

bucket = "std-libs"
lib = "tempfile"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_tempfile"
subject   = "tempfile"
kind      = "mechanical"
probe     = "attr"
attr      = "gettempdir"

[[case]]
