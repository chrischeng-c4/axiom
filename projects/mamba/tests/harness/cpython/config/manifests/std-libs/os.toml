# --- os.path string operations --------------------------------------------

[[case]]
dimension = "behavior"
case      = "path_join_uses_separator"
subject   = "os.path.join"
kind      = "semantic"
intent    = "os.path.join('a','b','c') joins with the platform separator so normalizing os.sep to '/' yields 'a/b/c'"

[[case]]
dimension = "behavior"
case      = "path_join_absolute_resets"
subject   = "os.path.join"
kind      = "semantic"
intent    = "os.path.join discards earlier components when a later one is absolute: join('a','/b','c') ends at '/b/c'"

[[case]]
dimension = "behavior"
case      = "path_split_head_tail"
subject   = "os.path.split"
kind      = "semantic"
intent    = "os.path.split('/tmp/dir/file.txt') splits into ('/tmp/dir', 'file.txt')"

[[case]]
dimension = "behavior"
case      = "path_basename_dirname"
subject   = "os.path.basename"
kind      = "semantic"
intent    = "basename/dirname of '/tmp/dir/file.txt' are 'file.txt' and '/tmp/dir'"

[[case]]
dimension = "behavior"
case      = "path_splitext_rule"
subject   = "os.path.splitext"
kind      = "semantic"
intent    = "os.path.splitext splits the final extension only: file.txt, file.tar.gz, noext, .hidden cases"

[[case]]
dimension = "behavior"
case      = "path_abspath_idempotent"
subject   = "os.path.abspath"
kind      = "semantic"
intent    = "os.path.abspath of an already-absolute path is idempotent and isabs reports it absolute"

[[case]]
dimension = "behavior"
case      = "path_exists_isdir_isfile"
subject   = "os.path.exists"
kind      = "semantic"
intent    = "the cwd exists and is a dir (not a file); a nonexistent path does not exist"

# --- low-level fd I/O and filesystem ops ----------------------------------

[[case]]
dimension = "behavior"
case      = "fd_open_write_read_roundtrip"
subject   = "os.open"
kind      = "semantic"
intent    = "low-level os.open/os.write/os.lseek/os.read/os.close round-trips bytes (bytes, bytearray, memoryview) through a temp file; os.access reports R_OK and W_OK"

[[case]]
dimension = "behavior"
case      = "makedirs_nested_and_exist_ok"
subject   = "os.makedirs"
kind      = "semantic"
intent    = "os.makedirs creates a full nested chain; re-creating raises FileExistsError by default but exist_ok=True suppresses it"

[[case]]
dimension = "behavior"
case      = "removedirs_prunes_empty_parents"
subject   = "os.removedirs"
kind      = "semantic"
intent    = "os.removedirs deletes the leaf and prunes now-empty parents up the chain, but stops at the first non-empty parent"

[[case]]
dimension = "behavior"
case      = "scandir_yields_direntry"
subject   = "os.scandir"
kind      = "semantic"
intent    = "os.scandir yields os.DirEntry objects exposing name/path and is_file()/is_dir() predicates over a temp dir containing a file and a subdir"

[[case]]
dimension = "behavior"
case      = "devnull_discards_writes"
subject   = "os.devnull"
kind      = "semantic"
intent    = "writing bytes to os.devnull is discarded and reading it back yields empty bytes"

# --- path encoding (PEP 519 / fs codec) -----------------------------------

[[case]]
dimension = "behavior"
case      = "fsencode_fsdecode_roundtrip"
subject   = "os.fsencode"
kind      = "semantic"
intent    = "os.fsencode(str)->bytes and os.fsdecode(bytes)->str round-trip identically for encodable unicode names, and each is a no-op on its own target type"

[[case]]
dimension = "behavior"
case      = "fspath_returns_and_protocol"
subject   = "os.fspath"
kind      = "semantic"
intent    = "os.fspath returns str/bytes unchanged and honors the __fspath__ protocol on a PathLike object"

[[case]]
dimension = "behavior"
case      = "pathlike_structural_subclass"
subject   = "os.PathLike"
kind      = "semantic"
intent    = "a class defining __fspath__ is a virtual subclass/instance of os.PathLike; one lacking it is not; explicit subclassing routes through os.fspath; PathLike[bytes] is a GenericAlias"
module    = "os"

[[case]]
dimension = "behavior"
case      = "urandom_length_and_entropy"
subject   = "os.urandom"
kind      = "semantic"
intent    = "os.urandom(n) returns exactly n bytes for several n, and two independent 16-byte draws differ"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "directory_tree_walk_and_size"
subject   = "os.walk"
kind      = "semantic"
intent    = "a backup-sizing tool builds a small directory tree under a TemporaryDirectory, os.walk recurses it bottom-and-top, and the per-file os.path.getsize total matches the bytes written"

# ===========================================================================
# SECURITY — semantic (adversarial / untrusted input)
# ===========================================================================

[[case]]
dimension = "security"
case      = "exec_argv_and_env_validation"
subject   = "os.execve"
kind      = "semantic"
intent    = "the exec* family validates arguments before replacing the process: empty argv -> ValueError, missing program -> OSError, and env keys/values with embedded NUL or '=' in the key -> ValueError"
source    = "Lib/test/test_os.py"
