# ===========================================================================
# ERRORS — mechanical (call + expect_exc, assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "stat_missing_file_raises"
subject    = "os.stat"
kind       = "mechanical"
call       = "os.stat('/no/such/path/xyzzy')"
expect_exc = "FileNotFoundError"
source     = "Lib/test/test_os.py"

[[case]]
dimension  = "errors"
case       = "remove_missing_file_raises"
subject    = "os.remove"
kind       = "mechanical"
call       = "os.remove('/no/such/file_to_remove_xyzzy')"
expect_exc = "FileNotFoundError"
source     = "Lib/test/test_os.py"

[[case]]
dimension  = "errors"
case       = "scandir_empty_string_raises"
subject    = "os.scandir"
kind       = "mechanical"
call       = "list(os.scandir(''))"
expect_exc = "FileNotFoundError"
source     = "Lib/test/test_os.py"

[[case]]
dimension  = "errors"
case       = "kill_bad_pid_raises"
subject    = "os.kill"
kind       = "mechanical"
call       = "os.kill(99999999, 0)"
expect_exc = "OSError"
source     = "Lib/test/test_os.py"

[[case]]
dimension  = "errors"
case       = "umask_str_raises_typeerror"
subject    = "os.umask"
kind       = "mechanical"
call       = "os.umask('x')"
expect_exc = "TypeError"
source     = "Lib/test/test_os.py"

[[case]]
dimension  = "errors"
case       = "rename_int_dst_raises_typeerror"
subject    = "os.rename"
kind       = "mechanical"
call       = "os.rename('/tmp/some_src', 0)"
expect_exc = "TypeError"
source     = "Lib/test/test_os.py"

[[case]]
dimension  = "errors"
case       = "write_str_raises_typeerror"
subject    = "os.write"
kind       = "mechanical"
call       = "os.write(1, 'beans')"
expect_exc = "TypeError"
source     = "Lib/test/test_os.py"

[[case]]
dimension  = "errors"
case       = "fspath_int_raises_typeerror"
subject    = "os.fspath"
kind       = "mechanical"
call       = "os.fspath(42)"
expect_exc = "TypeError"
source     = "Lib/test/test_os.py"

[[case]]
dimension  = "errors"
case       = "scandir_float_raises_typeerror"
subject    = "os.scandir"
kind       = "mechanical"
call       = "os.scandir(1.234)"
expect_exc = "TypeError"
source     = "Lib/test/test_os.py"

[[case]]
dimension  = "errors"
case       = "direntry_not_instantiable"
subject    = "os.DirEntry"
kind       = "mechanical"
