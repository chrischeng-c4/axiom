# --- ERRORS (semantic): paths needing setup beyond a single call ----------

[[case]]
dimension = "errors"
case      = "rmdir_nonempty_raises_oserror"
subject   = "os.rmdir"
kind      = "semantic"
intent    = "os.rmdir on a directory that still contains a child raises OSError ('Directory not empty'); cleanup leaves no temp tree behind"
source    = "Lib/test/test_os.py"

[[case]]
dimension = "errors"
case      = "utime_times_and_ns_raises_valueerror"
subject   = "os.utime"
kind      = "semantic"
intent    = "os.utime(path, (5, 5), ns=(5, 5)) rejects supplying both a times tuple and ns= at once with ValueError, against a real temp file"
source    = "Lib/test/test_os.py"

[[case]]
dimension = "errors"
case      = "utime_short_ns_raises_typeerror"
subject   = "os.utime"
kind      = "semantic"
intent    = "os.utime(path, ns=(5,)) rejects a wrong-length ns tuple with TypeError, against a real temp file"
source    = "Lib/test/test_os.py"

[[case]]
dimension = "errors"
case      = "getenv_missing_returns_none"
subject   = "os.getenv"
kind      = "semantic"
intent    = "os.getenv on an undefined variable with no default returns None (no raise)"
source    = "Lib/test/test_os.py"

