# Manifest for the stdlib `os` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/os/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the loose feature fixtures (exec_errors / fd_io / fsencode / makedirs /
# pathlike / scandir / urandom) plus the golden-compared os_*_conformance /
# os_ops scripts. No coverage lost. bench/ is kept as-is.

bucket = "std-libs"
lib = "os"

