# ===========================================================================
# ERRORS — mechanical (call + expect_exc) where the raising expression is a
# single statement; semantic where a malformed temp file must be staged first.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "load_missing_file_raises"
subject    = "http.cookiejar.MozillaCookieJar"
kind       = "mechanical"
call       = "http.cookiejar.MozillaCookieJar().load('/no/such/cookies.txt')"
expect_exc = "FileNotFoundError"
source     = "Lib/test/test_http_cookiejar.py"

[[case]]
dimension  = "errors"
case       = "save_no_filename_raises"
subject    = "http.cookiejar.MozillaCookieJar"
kind       = "mechanical"
call       = "http.cookiejar.MozillaCookieJar().save()"
expect_exc = "ValueError"
source     = "Lib/test/test_http_cookiejar.py"

[[case]]
dimension = "errors"
case      = "load_malformed_mozilla_raises_loaderror"
subject   = "http.cookiejar.MozillaCookieJar"
kind      = "semantic"
import    = "import http.cookiejar"
intent    = "MozillaCookieJar.load of a file that is not a Netscape cookies.txt raises http.cookiejar.LoadError (staged via a tempfile)"
source    = "Lib/test/test_http_cookiejar.py"

[[case]]
dimension = "errors"
case      = "load_malformed_lwp_raises_loaderror"
subject   = "http.cookiejar.LWPCookieJar"
kind      = "semantic"
import    = "import http.cookiejar"
intent    = "LWPCookieJar.load of a file that is not LWP cookie format raises http.cookiejar.LoadError (staged via a tempfile)"
source    = "Lib/test/test_http_cookiejar.py"

[[case]]
dimension = "errors"
case      = "loaderror_is_oserror_subclass"
subject   = "http.cookiejar.LoadError"
kind      = "semantic"
import    = "import http.cookiejar"
intent    = "http.cookiejar.LoadError is a subclass of OSError"
source    = "Lib/test/test_http_cookiejar.py"

[[case]]
dimension = "errors"
case      = "lwp_load_missing_is_plain_oserror_not_loaderror"
subject   = "http.cookiejar.LWPCookieJar"
kind      = "semantic"
import    = "import http.cookiejar"
intent    = "loading a nonexistent file raises a plain OSError (FileNotFoundError), not LoadError; the LoadError branch must not fire"
source    = "Lib/test/test_http_cookiejar.py"

