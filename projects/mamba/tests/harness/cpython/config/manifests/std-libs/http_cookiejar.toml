# Manifest for the stdlib `http.cookiejar` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/http_cookiejar/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Dotted submodule: lib `http_cookiejar` maps to the real module
# `http.cookiejar`. Subjects are dotted (`http.cookiejar.<x>`); the import
# inferer keeps the lowercase `http.cookiejar` head and stops at the first
# CapWords class, so `import http.cookiejar` is emitted automatically. Where a
# body needs `from http.cookiejar import <names>` we set an explicit `import`.
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the loose feature files datetime_parsing.py / domain_rules.py /
# header_words.py / parse_ns_headers.py / request_helpers.py /
# http_cookiejar_basic.py.

bucket = "std-libs"
lib = "http_cookiejar"

# ===========================================================================
# SURFACE — mechanical probes (attr presence + callable shape of the public
# 8-entry surface: Cookie, CookieJar, CookiePolicy, DefaultCookiePolicy,
# FileCookieJar, LWPCookieJar, MozillaCookieJar, LoadError)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_http_cookiejar"
subject   = "http.cookiejar"
kind      = "mechanical"
probe     = "attr"
attr      = "CookieJar"
import    = "import http.cookiejar"

[[case]]
