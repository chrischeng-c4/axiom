# Manifest for the stdlib `sys` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/sys/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature + paired-.expected shape
# (surface.py, behavior.py, errors.py, attributes.py, hooks.py,
# introspection.py, sys_ops.py/.expected). bench/ and real_world/_stub.py are
# left as-is.
#
# All subjects live in the single top-level module `sys`, so the import
# inference (`import sys`) is correct for every case; no per-case module=
# override is needed.

bucket = "std-libs"
lib = "sys"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable / not_callable / type / sequence)
# ===========================================================================

