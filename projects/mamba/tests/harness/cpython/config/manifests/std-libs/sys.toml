# ===========================================================================
# ERRORS — semantic (str-subclass intern; goes beyond plain call/expect_exc
# because it needs a local subclass definition first)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "intern_str_subclass_rejected"
subject   = "sys.intern"
kind      = "semantic"
intent    = "sys.intern only accepts an exact str; a str subclass instance raises TypeError"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- version_info ---------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "version_info_attributes"
subject   = "sys.version_info"
kind      = "semantic"
intent    = "version_info exposes major==3, non-negative minor/micro, and a valid releaselevel in (alpha, beta, candidate, final)"

[[case]]
dimension = "behavior"
case      = "version_info_indexable_and_named"
subject   = "sys.version_info"
kind      = "semantic"
intent    = "version_info is a 5-field named tuple: index i equals the named field, it slices to a tuple, and compares as a tuple (> (1, 0, 0))"

# --- modules cache --------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "modules_caches_imported"
subject   = "sys.modules"
kind      = "semantic"
intent    = "sys.modules caches imported modules by name: sys.modules['math'] is the math object and sys.modules['os'] is the os object"

# --- path -----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "path_entries_are_str"
subject   = "sys.path"
kind      = "semantic"
intent    = "every entry of sys.path is a str"

# --- maxsize --------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "maxsize_platform_word"
subject   = "sys.maxsize"
kind      = "semantic"
intent    = "sys.maxsize is the platform pointer-word signed max: 2**63-1 on 64-bit (struct.calcsize('P')*8 == 64), else 2**31-1"

# --- getsizeof ------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "getsizeof_positive_int"
subject   = "sys.getsizeof"
kind      = "semantic"
intent    = "getsizeof returns a positive int for both a small int and an empty list"

[[case]]
dimension = "behavior"
case      = "getsizeof_default_fallback"
subject   = "sys.getsizeof"
kind      = "semantic"
intent    = "the second positional arg is a default size: ignored for a normal object (real size returned), but returned when the object's __sizeof__ raises"

# --- recursion limit ------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "recursionlimit_roundtrip"
subject   = "sys.setrecursionlimit"
kind      = "semantic"
intent    = "setrecursionlimit(500) is observable via getrecursionlimit(), then restored to the original limit"

# --- exc_info / exception -------------------------------------------------

[[case]]
dimension = "behavior"
case      = "exc_info_none_outside_handler"
subject   = "sys.exc_info"
kind      = "semantic"
intent    = "outside any except block, exc_info() returns (None, None, None)"

[[case]]
dimension = "behavior"
case      = "exc_info_inside_handler"
subject   = "sys.exc_info"
kind      = "semantic"
intent    = "inside an except ValueError block, exc_info()[0] is ValueError and str(exc_info()[1]) is the raised message"

[[case]]
dimension = "behavior"
case      = "exc_info_links_traceback"
subject   = "sys.exc_info"
kind      = "semantic"
intent    = "exc_info() returns (ValueError, the caught instance, the instance's __traceback__) for a live exception"
xfail     = "mamba e.__traceback__ is None / exc_info linkage incomplete (repo-memory project_mamba_module_exec_del_silent_divergences)"

[[case]]
dimension = "behavior"
case      = "exception_none_outside_live_inside"
subject   = "sys.exception"
kind      = "semantic"
intent    = "sys.exception() is None outside a handler and is the caught instance inside an except ValueError block (3.11+)"

# --- intern ---------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "intern_returns_same_object"
subject   = "sys.intern"
kind      = "semantic"
intent    = "interning the same string twice returns the identical object (a is b)"

# --- byteorder ------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "byteorder_consistent_with_struct"
subject   = "sys.byteorder"
kind      = "semantic"
intent    = "sys.byteorder is 'little' or 'big' and packing 1 as a 4-byte unsigned int with the matching endian prefix yields bytes"

# --- implementation -------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "implementation_describes_interpreter"
subject   = "sys.implementation"
kind      = "semantic"
intent    = "sys.implementation has a lowercase name, a version whose first two fields index as (major, minor), an int hexversion, and a str cache_tag"

# --- is_finalizing --------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "is_finalizing_false_during_run"
subject   = "sys.is_finalizing"
kind      = "semantic"
intent    = "sys.is_finalizing() is False during normal (non-shutdown) execution"

# --- structured info structs (attributes.py) -----------------------------

[[case]]
dimension = "behavior"
case      = "float_info_shape"
subject   = "sys.float_info"
kind      = "semantic"
intent    = "float_info has 11 fields, radix 2, and a positive max"

[[case]]
dimension = "behavior"
case      = "int_info_shape"
subject   = "sys.int_info"
kind      = "semantic"
intent    = "int_info has 4 fields, bits_per_digit a multiple of 5, sizeof_digit >= 1, and default_max_str_digits above the str_digits_check_threshold"

[[case]]
dimension = "behavior"
case      = "hash_info_shape"
subject   = "sys.hash_info"
kind      = "semantic"
intent    = "hash_info has 9 fields, a modulus that fits in 'width' bits, and a known algorithm name (fnv / siphash13 / siphash24)"

[[case]]
dimension = "behavior"
case      = "flags_documented_fields"
subject   = "sys.flags"
kind      = "semantic"
intent    = "every documented sys.flags field exists with the right type (bool for dev_mode/safe_path, int otherwise) and utf8_mode is 0/1/2"

# --- hooks (hooks.py) -----------------------------------------------------

[[case]]
dimension = "behavior"
case      = "displayhook_prints_repr_binds_underscore"
subject   = "sys.__displayhook__"
kind      = "semantic"
intent    = "__displayhook__(42) writes '42\\n' to stdout and binds builtins._ to 42 for a non-None value"

[[case]]
dimension = "behavior"
case      = "displayhook_none_writes_nothing"
subject   = "sys.__displayhook__"
kind      = "semantic"
intent    = "__displayhook__(None) writes nothing and leaves builtins._ unset"

[[case]]
dimension = "behavior"
case      = "excepthook_formats_active_exception"
subject   = "sys.__excepthook__"
kind      = "semantic"
intent    = "__excepthook__(*exc_info()) for an active ValueError(42) writes a traceback to stderr ending in 'ValueError: 42\\n'"
xfail     = "mamba exc_info / traceback formatting incomplete (repo-memory project_mamba_traceback_format_exc_stub)"

[[case]]
dimension = "behavior"
case      = "asyncgen_hooks_roundtrip"
subject   = "sys.set_asyncgen_hooks"
kind      = "semantic"
intent    = "asyncgen hooks default to None and round-trip through set_asyncgen_hooks(firstiter=)/(finalizer=) and get_asyncgen_hooks(), then restore"

# --- introspection (introspection.py) -------------------------------------

[[case]]
dimension = "behavior"
case      = "meta_path_unique_finders"
subject   = "sys.meta_path"
kind      = "semantic"
intent    = "sys.meta_path is a list of import finders with no duplicate entries"

[[case]]
dimension = "behavior"
case      = "stdlib_module_names_str_set"
subject   = "sys.stdlib_module_names"
kind      = "semantic"
intent    = "stdlib_module_names is a frozenset of str naming bundled modules and contains 'sys'"

[[case]]
dimension = "behavior"
case      = "thread_info_shape"
subject   = "sys.thread_info"
kind      = "semantic"
intent    = "thread_info is a 3-field struct with a documented name (nt/pthread/pthread-stubs/solaris/None) and lock (semaphore/mutex+cond/None)"

[[case]]
dimension = "behavior"
case      = "switchinterval_roundtrip"
subject   = "sys.setswitchinterval"
kind      = "semantic"
intent    = "the switch interval is a small positive float (< 0.5) that survives a setswitchinterval(0.05)/getswitchinterval round trip, then restores"

[[case]]
dimension = "behavior"
case      = "stdout_stderr_share_encoding"
subject   = "sys.__stdout__"
kind      = "semantic"
intent    = "the original __stdout__ and __stderr__ streams report the same encoding"

[[case]]
dimension = "behavior"
case      = "getdefaultencoding_is_utf8"
subject   = "sys.getdefaultencoding"
kind      = "semantic"
intent    = "sys.getdefaultencoding() returns 'utf-8' on CPython 3.12"
