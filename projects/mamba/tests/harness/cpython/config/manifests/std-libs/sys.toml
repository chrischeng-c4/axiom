# ===========================================================================
# ERRORS — mechanical (call + expect_exc; generator emits assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "setrecursionlimit_zero_raises"
subject    = "sys.setrecursionlimit"
kind       = "mechanical"
call       = "sys.setrecursionlimit(0)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "setrecursionlimit_negative_raises"
subject    = "sys.setrecursionlimit"
kind       = "mechanical"
call       = "sys.setrecursionlimit(-5)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "exit_raises_systemexit"
subject    = "sys.exit"
kind       = "mechanical"
call       = "sys.exit(42)"
expect_exc = "SystemExit"

[[case]]
dimension  = "errors"
case       = "missing_attr_raises"
subject    = "sys"
kind       = "mechanical"
call       = "sys.no_such_attr_xyzzy"
expect_exc = "AttributeError"

[[case]]
dimension  = "errors"
case       = "intern_no_arg_raises"
subject    = "sys.intern"
kind       = "mechanical"
call       = "sys.intern()"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "getrecursionlimit_extra_arg_raises"
subject    = "sys.getrecursionlimit"
kind       = "mechanical"
call       = "sys.getrecursionlimit(42)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "getdefaultencoding_extra_arg_raises"
subject    = "sys.getdefaultencoding"
kind       = "mechanical"
call       = "sys.getdefaultencoding(42)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "setswitchinterval_str_raises"
subject    = "sys.setswitchinterval"
kind       = "mechanical"
call       = "sys.setswitchinterval('a')"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "setswitchinterval_zero_raises"
subject    = "sys.setswitchinterval"
kind       = "mechanical"
call       = "sys.setswitchinterval(0.0)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "displayhook_no_arg_raises"
