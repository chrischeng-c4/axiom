# ===========================================================================
# ERRORS — mechanical (call + expect_exc)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "get_missing_section_raises"
subject    = "configparser.ConfigParser.get"
kind       = "mechanical"
module     = "configparser"
call       = "configparser.ConfigParser().get('nosection', 'key')"
expect_exc = "configparser.NoSectionError"
source     = "Lib/test/test_configparser.py"

[[case]]
dimension  = "errors"
case       = "get_missing_option_raises"
subject    = "configparser.ConfigParser.get"
kind       = "mechanical"
import     = "import configparser\n_cp_no_opt = configparser.ConfigParser()\n_cp_no_opt.read_string('[s1]\\nkey=val\\n')"
call       = "_cp_no_opt.get('s1', 'nokey')"
expect_exc = "configparser.NoOptionError"
source     = "Lib/test/test_configparser.py"

[[case]]
dimension  = "errors"
case       = "add_duplicate_section_raises"
subject    = "configparser.ConfigParser.add_section"
kind       = "mechanical"
import     = "import configparser\n_cp_dup_sec = configparser.ConfigParser()\n_cp_dup_sec.read_string('[s1]\\nk=v\\n')"
call       = "_cp_dup_sec.add_section('s1')"
expect_exc = "configparser.DuplicateSectionError"
source     = "Lib/test/test_configparser.py"

[[case]]
dimension  = "errors"
case       = "duplicate_option_in_section_raises"
subject    = "configparser.ConfigParser.read_string"
kind       = "mechanical"
module     = "configparser"
call       = "configparser.ConfigParser().read_string('[s]\\na = 1\\na = 2\\n')"
expect_exc = "configparser.DuplicateOptionError"
source     = "Lib/test/test_configparser.py"

[[case]]
dimension  = "errors"
case       = "keys_before_section_header_raises"
subject    = "configparser.ConfigParser.read_string"
kind       = "mechanical"
module     = "configparser"
call       = "configparser.ConfigParser().read_string('key = value\\n')"
expect_exc = "configparser.MissingSectionHeaderError"
source     = "Lib/test/test_configparser.py"

[[case]]
dimension  = "errors"
case       = "set_none_without_allow_no_value_raises"
subject    = "configparser.ConfigParser.set"
kind       = "mechanical"
import     = "import configparser\n_cp_set_none = configparser.ConfigParser(allow_no_value=False)\n_cp_set_none.add_section('s')"
call       = "_cp_set_none.set('s', 'opt', None)"
expect_exc = "TypeError"
source     = "Lib/test/test_configparser.py"

[[case]]
dimension  = "errors"
case       = "parsing_error_without_source_raises"
subject    = "configparser.ParsingError"
kind       = "mechanical"
module     = "configparser"
call       = "configparser.ParsingError()"
expect_exc = "TypeError"
source     = "Lib/test/test_configparser.py"

[[case]]
dimension  = "errors"
case       = "interpolation_missing_referent_raises"
subject    = "configparser.ConfigParser.get"
kind       = "mechanical"
import     = "import configparser\n_cp_miss = configparser.ConfigParser()\n_cp_miss.read_string('[s]\\nv = %(absent)s\\n')"
call       = "_cp_miss.get('s', 'v')"
expect_exc = "configparser.InterpolationMissingOptionError"
source     = "Lib/test/test_configparser.py"

[[case]]
dimension  = "errors"
case       = "interpolation_cycle_exceeds_depth_raises"
subject    = "configparser.ConfigParser.get"
kind       = "mechanical"
import     = "import configparser\n_cp_cyc = configparser.ConfigParser()\n_cp_cyc.read_string('[s]\\na = %(b)s\\nb = %(a)s\\n')"
call       = "_cp_cyc.get('s', 'a')"
expect_exc = "configparser.InterpolationDepthError"
source     = "Lib/test/test_configparser.py"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- basic read / typed accessors -----------------------------------------

[[case]]
dimension = "behavior"
case      = "read_string_populates_sections"
subject   = "configparser.ConfigParser.read_string"
kind      = "semantic"
module    = "configparser"
intent    = "read_string parses an ini blob; sections() lists non-DEFAULT sections (DEFAULT excluded), has_section / has_option / options reflect the parsed content, and get returns the raw string value"
source    = "Lib/test/test_configparser.py"

[[case]]
dimension = "behavior"
case      = "getint_returns_int"
subject   = "configparser.ConfigParser.getint"
kind      = "semantic"
module    = "configparser"
intent    = "getint coerces a numeric option string to a Python int (key2 = 42 -> 42, type int)"

[[case]]
dimension = "behavior"
case      = "getfloat_returns_float"
subject   = "configparser.ConfigParser.getfloat"
kind      = "semantic"
module    = "configparser"
intent    = "getfloat coerces a numeric option string to a Python float (key3 = 3.14 -> 3.14, type float)"

[[case]]
dimension = "behavior"
case      = "getboolean_true_false_variants"
subject   = "configparser.ConfigParser.getboolean"
kind      = "semantic"
module    = "configparser"
intent    = "getboolean recognizes the full true/false vocabulary: yes/on/1/true -> True and no/off/0/false -> False"

[[case]]
dimension = "behavior"
case      = "get_fallback_for_missing_option"
subject   = "configparser.ConfigParser.get"
kind      = "semantic"
module    = "configparser"
intent    = "get(section, option, fallback=...) returns the fallback instead of raising when the option is absent"

# --- interpolation ----------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "interpolation_same_section_substitution"
subject   = "configparser.ConfigParser.get"
kind      = "semantic"
module    = "configparser"
intent    = "basic %(name)s interpolation substitutes another option in the same section (base=/home, full=%(base)s/bob -> /home/bob)"
source    = "Lib/test/test_configparser.py"

[[case]]
dimension = "behavior"
case      = "interpolation_literal_percent"
subject   = "configparser.ConfigParser.get"
kind      = "semantic"
module    = "configparser"
intent    = "a doubled %% in a value is an escaped literal percent sign (p = 100%% -> 100%)"
source    = "Lib/test/test_configparser.py"

[[case]]
dimension = "behavior"
case      = "interpolation_raw_bypass"
subject   = "configparser.ConfigParser.get"
kind      = "semantic"
module    = "configparser"
intent    = "get(..., raw=True) returns the uninterpolated template string verbatim (%(base)s/bob), bypassing substitution"
source    = "Lib/test/test_configparser.py"

[[case]]
dimension = "behavior"
case      = "extended_interpolation_cross_section"
subject   = "configparser.ExtendedInterpolation"
kind      = "semantic"
module    = "configparser"
intent    = "ExtendedInterpolation resolves ${section:option} cross-section references (${paths:home}/bob -> /home/bob)"
source    = "Lib/test/test_configparser.py"

# --- DEFAULT section / case-folding -----------------------------------------

[[case]]
dimension = "behavior"
case      = "default_section_inherited_by_all"
subject   = "configparser.ConfigParser.get"
kind      = "semantic"
module    = "configparser"
intent    = "options in the DEFAULT section are inherited by every other section (color=blue in DEFAULT is visible from s1 and s2)"
source    = "Lib/test/test_configparser.py"

[[case]]
dimension = "behavior"
case      = "keys_are_case_insensitive"
subject   = "configparser.ConfigParser.get"
kind      = "semantic"
module    = "configparser"
intent    = "option keys are case-folded by the default optionxform, so MyKey is retrievable as mykey or MYKEY"
source    = "Lib/test/test_configparser.py"

# --- mutation / IO ----------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "write_produces_parseable_ini"
subject   = "configparser.ConfigParser.write"
kind      = "semantic"
module    = "configparser"
intent    = "assigning a section dict then write(buf) emits parseable ini text containing the [section] header and 'key = value' lines"
source    = "Lib/test/test_configparser.py"

[[case]]
dimension = "behavior"
case      = "read_dict_populates_from_nested_dict"
subject   = "configparser.ConfigParser.read_dict"
kind      = "semantic"
module    = "configparser"
intent    = "read_dict populates the parser from a nested {section: {key: value}} mapping; values come back as strings and coerce via getint"
source    = "Lib/test/test_configparser.py"

[[case]]
dimension = "behavior"
case      = "read_file_accepts_line_iterable"
subject   = "configparser.ConfigParser.read_file"
kind      = "semantic"
module    = "configparser"
intent    = "read_file accepts any iterable of lines (not just a file object) and populates sections; the section is then a member and its keys are readable"
source    = "Lib/test/test_configparser.py"

[[case]]
dimension = "behavior"
case      = "remove_option_and_section"
subject   = "configparser.ConfigParser.remove_option"
kind      = "semantic"
module    = "configparser"
intent    = "remove_option deletes one key leaving siblings intact; remove_section deletes the whole section so has_section/has_option go False"
source    = "Lib/test/test_configparser.py"

# --- mapping protocol -------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "section_membership_via_in"
subject   = "configparser.ConfigParser.__contains__"
kind      = "semantic"
module    = "configparser"
intent    = "the parser supports `name in parser` section membership; a parsed section is a member, DEFAULT is always a member, and an absent section is not"
source    = "Lib/test/test_configparser.py"

[[case]]
dimension = "behavior"
case      = "sectionproxy_repr"
subject   = "configparser.SectionProxy"
kind      = "semantic"
module    = "configparser"
intent    = "repr of a section proxy is the fixed '<Section: name>' form"
source    = "Lib/test/test_configparser.py"

# --- inline comments --------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "inline_comment_prefix_stripping"
subject   = "configparser.ConfigParser"
kind      = "semantic"
module    = "configparser"
intent    = "with inline_comment_prefixes=(';','#','//') a prefix preceded by whitespace strips the trailing comment, while a prefix glued to the value is kept verbatim; without inline prefixes the marker stays part of the value"
source    = "Lib/test/test_configparser.py"

# --- custom converters ------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "custom_converter_synthesizes_accessor"
subject   = "configparser.ConfigParser.converters"
kind      = "semantic"
module    = "configparser"
intent    = "registering converters['decimal'] synthesizes a getdecimal() accessor on both the parser and each section proxy, returning the converted value"
source    = "Lib/test/test_configparser.py"

[[case]]
dimension = "behavior"
case      = "removing_converter_retires_accessor"
subject   = "configparser.ConfigParser.converters"
kind      = "semantic"
module    = "configparser"
intent    = "deleting converters['decimal'] retires the synthesized getdecimal() accessor on both the parser and its section proxies, so a later call raises AttributeError"
source    = "Lib/test/test_configparser.py"

# --- exception structure / pickling -----------------------------------------

[[case]]
dimension = "behavior"
case      = "exception_attributes_are_structured"
subject   = "configparser.DuplicateOptionError"
kind      = "semantic"
module    = "configparser"
intent    = "configparser exceptions carry structured attributes, not just a message: DuplicateOptionError exposes section/option/source/lineno and a canonical str, InterpolationDepthError keeps option/section/args, and ParsingError accepts source positionally or by keyword"
source    = "Lib/test/test_configparser.py"

[[case]]
dimension = "behavior"
case      = "exceptions_survive_pickle_roundtrip"
subject   = "configparser.Error"
kind      = "semantic"
module    = "configparser"
intent    = "every configparser exception reconstructs identical args/message/repr and named attributes across all pickle protocols, including ParsingError with accumulated per-line errors"
source    = "Lib/test/test_configparser.py"

# ===========================================================================
# REAL_WORLD — semantic
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "app_config_with_defaults_and_interpolation"
subject   = "configparser.ConfigParser"
kind      = "semantic"
module    = "configparser"
intent    = "an end-to-end app-config flow: write a layered ini (DEFAULT + service sections using %(...)s interpolation) to a tempfile, read it back with read(), and resolve typed settings (host/port via getint, debug via getboolean, an interpolated log path) the way a service boot would"
source    = "Lib/test/test_configparser.py"
