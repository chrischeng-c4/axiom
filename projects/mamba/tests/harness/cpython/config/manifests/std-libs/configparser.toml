# Manifest for the stdlib `configparser` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/configparser/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py
# and the loose feature files converters.py / inline_comments.py /
# interpolation.py / pickling.py. bench/ is left as-is.
#
# Method/exception subjects (configparser.ConfigParser.<m>, configparser.<Err>)
# stop the import inferer at the first CapWords component, so they carry an
# explicit module = "configparser".

bucket = "std-libs"
lib = "configparser"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_configparser"
subject   = "configparser"
kind      = "mechanical"
probe     = "attr"
attr      = "ConfigParser"

[[case]]
dimension = "surface"
case      = "configparser_is_callable"
subject   = "configparser.ConfigParser"
kind      = "mechanical"
probe     = "callable"

