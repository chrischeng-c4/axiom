# Manifest for the stdlib `getopt` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/getopt/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py)
# and the real_world/_stub.py placeholder. bench/ is left as-is.
#
# Provenance: legacy fixtures + CPython Lib/test/test_getopt.py. mamba parses
# getopt/gnu_getopt correctly post-#1261 (module-attribute callables fixed), so
# no case is xfail.

bucket = "std-libs"
lib = "getopt"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_getopt"
subject   = "getopt"
kind      = "mechanical"
probe     = "attr"
attr      = "getopt"

[[case]]
dimension = "surface"
case      = "getopt_is_callable"
subject   = "getopt.getopt"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "gnu_getopt_is_callable"
subject   = "getopt.gnu_getopt"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "getopterror_is_exception_type"
subject   = "getopt.GetoptError"
kind      = "mechanical"
probe     = "attr"
attr      = "__cause__"
module    = "getopt"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc -> assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "unknown_short_option_raises"
subject    = "getopt.getopt"
kind       = "mechanical"
call       = "getopt.getopt(['-x'], 'ab:')"
expect_exc = "getopt.GetoptError"
source     = "Lib/test/test_getopt.py"

[[case]]
dimension  = "errors"
case       = "missing_argument_raises"
subject    = "getopt.getopt"
kind       = "mechanical"
call       = "getopt.getopt(['-b'], 'ab:')"
expect_exc = "getopt.GetoptError"
source     = "Lib/test/test_getopt.py"

[[case]]
dimension  = "errors"
case       = "unknown_long_option_raises"
subject    = "getopt.getopt"
kind       = "mechanical"
call       = "getopt.getopt(['--unknown'], '', ['help'])"
expect_exc = "getopt.GetoptError"
source     = "Lib/test/test_getopt.py"

[[case]]
dimension  = "errors"
case       = "ambiguous_long_prefix_raises"
subject    = "getopt.getopt"
kind       = "mechanical"
call       = "getopt.getopt(['--he'], '', ['help', 'header'])"
expect_exc = "getopt.GetoptError"
source     = "Lib/test/test_getopt.py"

[[case]]
dimension  = "errors"
case       = "long_option_unwanted_arg_raises"
subject    = "getopt.getopt"
kind       = "mechanical"
call       = "getopt.getopt(['--flag=x'], '', ['flag'])"
expect_exc = "getopt.GetoptError"
source     = "Lib/test/test_getopt.py"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "short_option_no_arg"
subject   = "getopt.getopt"
kind      = "semantic"
intent    = "a bare short flag '-v' parses to [('-v', '')] with no remaining args"
source    = "Lib/test/test_getopt.py"

[[case]]
dimension = "behavior"
case      = "short_option_with_arg"
subject   = "getopt.getopt"
kind      = "semantic"
intent    = "a short option declared 'o:' consumes its following argument -> [('-o', 'foo')]"
source    = "Lib/test/test_getopt.py"

[[case]]
dimension = "behavior"
case      = "long_option_flag"
subject   = "getopt.getopt"
kind      = "semantic"
intent    = "a long flag '--help' (no '=') parses to [('--help', '')] with empty value"
source    = "Lib/test/test_getopt.py"

[[case]]
dimension = "behavior"
case      = "long_option_inline_value"
subject   = "getopt.getopt"
kind      = "semantic"
intent    = "a long option with inline '--output=foo' splits name and value -> [('--output', 'foo')]"
source    = "Lib/test/test_getopt.py"

[[case]]
dimension = "behavior"
case      = "posix_stops_at_first_nonoption"
subject   = "getopt.getopt"
kind      = "semantic"
intent    = "POSIX getopt stops scanning at the first non-option, leaving the rest as args"
source    = "Lib/test/test_getopt.py"

[[case]]
dimension = "behavior"
case      = "gnu_permutes_nonoptions"
subject   = "getopt.gnu_getopt"
kind      = "semantic"
intent    = "GNU getopt permutes options past intervening non-options, collecting them as args"
source    = "Lib/test/test_getopt.py"

[[case]]
dimension = "behavior"
case      = "double_dash_terminates_options"
subject   = "getopt.getopt"
kind      = "semantic"
intent    = "'--' terminates option processing; everything after it is treated as args"
source    = "Lib/test/test_getopt.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user CLI parsing scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "libref_unix_and_long_options"
subject   = "getopt.getopt"
kind      = "semantic"
intent    = "the Library Reference example: parse a Unix-style argv (clustered '-cfoo', separate '-d bar') and a long-option argv ('--condition=foo', '--output-file abc.def') into the documented optlist + trailing args"
source    = "Lib/test/test_getopt.py"
