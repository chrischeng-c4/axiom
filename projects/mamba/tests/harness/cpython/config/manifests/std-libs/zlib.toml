# Manifest for the stdlib `zlib` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/zlib/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, checksums.py, stream_objects.py, version.py, and the
# real_world/_stub.py placeholder). bench/ is left as-is (bench/compress_1mb.py).
# No paired .expected goldens existed.
#
# zlib ships green on mamba (no `# mamba-xfail` directives on any legacy
# fixture), so no case carries an xfail. zlib's compress/decompress use real
# flate2 DEFLATE (#1265 Task #17) and crc32/adler32 are CPython-parity.

bucket = "std-libs"
lib = "zlib"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_zlib"
subject   = "zlib"
kind      = "mechanical"
probe     = "attr"
attr      = "compress"

[[case]]
dimension = "surface"
case      = "compress_is_callable"
subject   = "zlib.compress"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "decompress_is_callable"
subject   = "zlib.decompress"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "compressobj_is_callable"
subject   = "zlib.compressobj"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "decompressobj_is_callable"
subject   = "zlib.decompressobj"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "adler32_is_callable"
subject   = "zlib.adler32"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "crc32_is_callable"
subject   = "zlib.crc32"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "error_present"
subject   = "zlib"
kind      = "mechanical"
probe     = "attr"
attr      = "error"

[[case]]
dimension = "surface"
case      = "deflated_constant_is_int"
subject   = "zlib.DEFLATED"
kind      = "mechanical"
probe     = "type"
typename  = "int"

[[case]]
dimension = "surface"
case      = "max_wbits_constant_is_int"
subject   = "zlib.MAX_WBITS"
kind      = "mechanical"
probe     = "type"
typename  = "int"

[[case]]
dimension = "surface"
case      = "zlib_version_is_str"
subject   = "zlib.ZLIB_VERSION"
kind      = "mechanical"
probe     = "type"
typename  = "str"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc, self-asserting)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "decompress_invalid_data_raises_error"
subject    = "zlib.decompress"
kind       = "mechanical"
call       = "zlib.decompress(b'not zlib compressed data xyz')"
expect_exc = "zlib.error"

[[case]]
dimension  = "errors"
case       = "compress_level_out_of_range_raises_error"
subject    = "zlib.compress"
kind       = "mechanical"
call       = "zlib.compress(b'x', 10)"
expect_exc = "zlib.error"

[[case]]
dimension  = "errors"
case       = "decompress_truncated_stream_raises_error"
subject    = "zlib.decompress"
kind       = "mechanical"
call       = "zlib.decompress(zlib.compress(b'hello zlib')[:3])"
expect_exc = "zlib.error"

[[case]]
dimension  = "errors"
case       = "decompressobj_bad_wbits_raises_valueerror"
subject    = "zlib.decompressobj"
kind       = "mechanical"
call       = "zlib.decompressobj(99)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "decompressobj_neg_wbits_raises_valueerror"
subject    = "zlib.decompressobj"
kind       = "mechanical"
call       = "zlib.decompressobj(-1)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "compressobj_wbits_zero_raises_valueerror"
subject    = "zlib.compressobj"
kind       = "mechanical"
call       = "zlib.compressobj(1, zlib.DEFLATED, 0)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "adler32_non_bytes_raises_typeerror"
subject    = "zlib.adler32"
kind       = "mechanical"
call       = "zlib.adler32(42)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "crc32_non_bytes_raises_typeerror"
subject    = "zlib.crc32"
kind       = "mechanical"
call       = "zlib.crc32('not bytes')"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "decompressobj_flush_zero_length_raises_valueerror"
subject    = "zlib.decompressobj"
kind       = "mechanical"
call       = "zlib.decompressobj().flush(0)"
expect_exc = "ValueError"

# ===========================================================================
# BEHAVIOR — semantic (observable output matches CPython 3.12)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "compress_decompress_roundtrips_varied_payloads"
subject   = "zlib.decompress"
kind      = "semantic"
intent    = "compress then decompress round-trips a range of payloads byte-for-byte: empty, single byte, the full 0..255 byte range, a 10000-byte repeat, and repeated text"

[[case]]
dimension = "behavior"
case      = "higher_level_smaller_or_equal"
subject   = "zlib.compress"
kind      = "semantic"
intent    = "for repetitive data level 9 produces a stream no larger than level 1, and both decompress back to the original"

[[case]]
dimension = "behavior"
case      = "compress_is_deterministic_per_level"
subject   = "zlib.compress"
kind      = "semantic"
intent    = "two compress calls on the same data at the same level produce byte-identical streams"

[[case]]
dimension = "behavior"
case      = "raw_deflate_negative_wbits_roundtrip"
subject   = "zlib.compress"
kind      = "semantic"
intent    = "compress with wbits=-15 (raw DEFLATE, no zlib header/trailer) and decompress with wbits=-15 round-trips the input"

[[case]]
dimension = "behavior"
case      = "crc32_exact_values_and_seed_chaining"
subject   = "zlib.crc32"
kind      = "semantic"
intent    = "crc32 returns the IEEE 802.3 unsigned 32-bit value, seeds with 0, passes a seed through for empty input, matches documented values for explicit seeds, chains incrementally to equal the one-shot over the concatenation, and stays unsigned for a large seed"

[[case]]
dimension = "behavior"
case      = "adler32_exact_values_and_seed_chaining"
subject   = "zlib.adler32"
kind      = "semantic"
intent    = "adler32 returns the mod-65521 unsigned 32-bit value, seeds with 1, passes a seed through for empty input, matches documented values for explicit seeds, chains incrementally to equal the one-shot over the concatenation, and stays unsigned for a large seed"

[[case]]
dimension = "behavior"
case      = "crc32_matches_binascii_crc32"
subject   = "zlib.crc32"
kind      = "semantic"
intent    = "zlib.crc32 and binascii.crc32 produce identical checksums over the same input"
import    = "import binascii\nimport zlib"

[[case]]
dimension = "behavior"
case      = "streaming_compress_concatenates"
subject   = "zlib.compressobj"
kind      = "semantic"
intent    = "feeding a payload to compressobj in successive chunks then flushing yields a stream that one-shot decompress recovers to the full input"

[[case]]
dimension = "behavior"
case      = "streaming_decompress_chunked"
subject   = "zlib.decompressobj"
kind      = "semantic"
intent    = "feeding a compressed stream to decompressobj in fixed-size chunks then flushing reassembles the original input"

[[case]]
dimension = "behavior"
case      = "compressobj_full_param_set_roundtrip"
subject   = "zlib.compressobj"
kind      = "semantic"
intent    = "compressobj accepts the full positional parameter set (level, method, negative wbits, memLevel, strategy) and the matching raw decompressor recovers the input"

[[case]]
dimension = "behavior"
case      = "preset_dictionary_roundtrip"
subject   = "zlib.compressobj"
kind      = "semantic"
intent    = "a preset zdict supplied to both compressobj and decompressobj round-trips the payload, while a decompressor without the dict raises zlib.error"

[[case]]
dimension = "behavior"
case      = "decompressobj_eof_flag_flips_at_stream_end"
subject   = "zlib.decompressobj"
kind      = "semantic"
intent    = "the decompressobj eof flag is False before input and mid-stream, and flips to True only once the full stream has been fed"

[[case]]
dimension = "behavior"
case      = "decompressobj_unused_data_captures_trailing_bytes"
subject   = "zlib.decompressobj"
kind      = "semantic"
intent    = "bytes appended after a complete deflate stream land in unused_data (not in the output), and unconsumed_tail is empty without a max_length cap"

[[case]]
dimension = "behavior"
case      = "decompressobj_max_length_caps_via_unconsumed_tail"
subject   = "zlib.decompressobj"
kind      = "semantic"
intent    = "a max_length argument caps output bytes, the remaining input reappears in unconsumed_tail, and resuming from unconsumed_tail reconstructs the full payload"

[[case]]
dimension = "behavior"
case      = "compressobj_copy_forks_state"
subject   = "zlib.compressobj"
kind      = "semantic"
intent    = "copy() forks a compressor at the copy point so both share the pre-copy prefix then diverge with independent follow-up input, each decompressing to its own concatenation"

[[case]]
dimension = "behavior"
case      = "z_sync_flush_yields_decodable_chunk"
subject   = "zlib.compressobj"
kind      = "semantic"
intent    = "flushing a compressor with Z_SYNC_FLUSH emits a chunk that a decompressor can decode mid-stream without the final flush"

[[case]]
dimension = "behavior"
case      = "version_constants_shape_and_values"
subject   = "zlib.ZLIB_VERSION"
kind      = "semantic"
intent    = "ZLIB_VERSION and ZLIB_RUNTIME_VERSION are non-empty strings sharing a major version, and the named method/strategy/flush constants (DEFLATED, MAX_WBITS, Z_BEST_COMPRESSION, Z_FILTERED, Z_SYNC_FLUSH, DEF_BUF_SIZE) hold their documented int values"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "log_batch_compress_crc_roundtrip"
subject   = "zlib.compress"
kind      = "semantic"
intent    = "a log shipper compresses each plaintext batch with zlib.compress, the consumer decompresses and crc32-validates: two distinct batches compress to distinct streams, each round-trips exactly, and zlib.crc32 over the decoded payload equals the crc over the original"
