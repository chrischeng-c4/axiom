# Manifest for the stdlib `urllib.parse` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/urllib_parse/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + paired-.expected golden shape (surface.py,
# behavior.py, errors.py, and the loose feature files basic.py/.expected,
# codecs.py, ipv6_hosts.py, ports.py, sanitize.py, schemes.py, plus the
# real_world/_stub.py placeholder). bench/urlparse_bulk.py is left as-is.
#
# Authoring rule (mamba gotcha, repo-memory project_mamba_dotted_import_quirk):
# `import urllib.parse` then `urllib.parse.X` resolves to None under mamba, so
# every SEMANTIC body uses the `from urllib.parse import X` form (works on both
# runtimes). Mechanical SURFACE probes embed the dotted subject verbatim in
# their `assert callable(urllib.parse.X)` body — that form hits the quirk, so
# every dotted-submodule probe carries an xfail citing the quirk.

bucket = "std-libs"
lib = "urllib_parse"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable)
#
# The module probe imports `urllib.parse` and checks an attribute exists. The
# per-callable probes embed the dotted subject in the body and hit the mamba
# dotted-import quirk -> xfail.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_urllib_parse"
subject   = "urllib.parse"
kind      = "mechanical"
probe     = "attr"
attr      = "urlparse"
import    = "import urllib.parse"

[[case]]
dimension = "surface"
case      = "urlparse_is_callable"
subject   = "urllib.parse.urlparse"
kind      = "mechanical"
probe     = "callable"
import    = "import urllib.parse"
xfail     = "mamba dotted-import quirk: urllib.parse.urlparse -> None (repo-memory project_mamba_dotted_import_quirk)"

