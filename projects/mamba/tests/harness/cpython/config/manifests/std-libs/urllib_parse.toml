# ===========================================================================
# ERRORS — mechanical (call + expect_exc, assert-it-raised)
#
# Bodies use the `from urllib.parse import X` form (set via `import`) to dodge
# the mamba dotted-import quirk; the call expression references the imported
# bare name. The bad-port cases trigger ValueError lazily on the `.port`
# attribute access of an already-parsed result, so they carry their own
# `from urllib.parse import urlsplit` import and call the attribute.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "urlparse_mix_str_bytes_raises"
subject    = "urllib.parse.urlparse"
kind       = "mechanical"
import     = "from urllib.parse import urlparse"
call       = "urlparse('www.python.org', b'http')"
expect_exc = "TypeError"
source     = "Lib/test/test_urlparse.py"

[[case]]
dimension  = "errors"
case       = "urlunsplit_mix_str_bytes_raises"
subject    = "urllib.parse.urlunsplit"
kind       = "mechanical"
import     = "from urllib.parse import urlunsplit"
call       = "urlunsplit(('http', b'h', '', '', ''))"
expect_exc = "TypeError"
source     = "Lib/test/test_urlparse.py"

[[case]]
dimension  = "errors"
case       = "urlencode_bare_str_raises"
subject    = "urllib.parse.urlencode"
kind       = "mechanical"
import     = "from urllib.parse import urlencode"
call       = "urlencode('foo')"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "parse_qsl_strict_bad_pair_raises"
subject    = "urllib.parse.parse_qsl"
kind       = "mechanical"
import     = "from urllib.parse import parse_qsl"
call       = "parse_qsl('novalkey', strict_parsing=True)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "parse_qsl_empty_separator_raises"
subject    = "urllib.parse.parse_qsl"
kind       = "mechanical"
import     = "from urllib.parse import parse_qsl"
