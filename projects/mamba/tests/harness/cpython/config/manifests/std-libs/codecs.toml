# Manifest for the stdlib `codecs` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/codecs/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the loose feature files (charmap.py / error_handlers.py / escape_codecs.py
# / idna.py / incremental.py / module_functions.py / streams.py /
# transform_codecs.py). All cases are CPython-3.12 green.
#
# Subject note: codecs exposes class/exception subjects (codecs.CodecInfo,
# codecs.EncodedFile, codecs.IncrementalEncoder) whose import inferer stops at
# the first CapWords component, so those cases carry an explicit module="codecs".

bucket = "std-libs"
lib = "codecs"

