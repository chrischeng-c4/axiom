# Manifest for the stdlib `bisect` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/bisect/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# plus the loose feature fixtures (comparison_protocol.py, key_parameter.py)
# and real_world/sorted_schedule.py. CPython 3.12 is the oracle. bench/ is
# kept as-is (perf, golden-less) and is not regenerated here.

bucket = "std-libs"
lib = "bisect"

# ===========================================================================
# SURFACE — mechanical probes (API existence: the five public callables +
# the two aliases all resolve and are callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_bisect"
subject   = "bisect"
kind      = "mechanical"
probe     = "attr"
attr      = "bisect_left"

[[case]]
dimension = "surface"
case      = "bisect_left_is_callable"
subject   = "bisect.bisect_left"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "bisect_right_is_callable"
subject   = "bisect.bisect_right"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "bisect_is_callable"
subject   = "bisect.bisect"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "insort_left_is_callable"
subject   = "bisect.insort_left"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "insort_right_is_callable"
subject   = "bisect.insort_right"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "insort_is_callable"
subject   = "bisect.insort"
kind      = "mechanical"
probe     = "callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc; the generator emits assert-it-raised)
# bisect defines no exception classes of its own; it surfaces builtins on
# out-of-spec arguments.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "negative_lo_raises_valueerror"
subject    = "bisect.bisect_left"
kind       = "mechanical"
call       = "bisect.bisect_left([1, 2, 3], 2, lo=-1)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "insort_tuple_raises_attributeerror"
subject    = "bisect.insort"
kind       = "mechanical"
call       = "bisect.insort((1, 2, 3), 4)"
expect_exc = "AttributeError"

[[case]]
dimension  = "errors"
case       = "mixed_types_raise_typeerror"
subject    = "bisect.bisect_left"
kind       = "mechanical"
call       = "bisect.bisect_left([1, 2, 3], \"x\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "missing_x_arg_raises_typeerror"
subject    = "bisect.bisect_left"
kind       = "mechanical"
call       = "bisect.bisect_left([1, 2, 3])"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "non_sequence_first_arg_raises_typeerror"
subject    = "bisect.bisect_left"
kind       = "mechanical"
call       = "bisect.bisect_left(10, 10)"
expect_exc = "TypeError"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file; output matches CPython)
# ===========================================================================

# --- the leftmost / rightmost insertion-point contract --------------------

[[case]]
dimension = "behavior"
case      = "bisect_left_leftmost_of_equal"
subject   = "bisect.bisect_left"
kind      = "semantic"
intent    = "bisect_left returns the insertion point left of all equal elements"

[[case]]
dimension = "behavior"
case      = "bisect_right_rightmost_of_equal"
subject   = "bisect.bisect_right"
kind      = "semantic"
intent    = "bisect_right returns the insertion point right of all equal elements"

[[case]]
dimension = "behavior"
case      = "absent_element_insertion_point"
subject   = "bisect.bisect_left"
kind      = "semantic"
intent    = "for an absent element both bisect_left and bisect_right give the same insertion index"

[[case]]
dimension = "behavior"
case      = "empty_list_returns_zero"
subject   = "bisect.bisect_left"
kind      = "semantic"
intent    = "bisect_left and bisect_right on an empty list both return 0"

[[case]]
dimension = "behavior"
case      = "bisect_alias_equals_bisect_right"
subject   = "bisect.bisect"
kind      = "semantic"
intent    = "bisect is an alias for bisect_right and returns the identical index"

[[case]]
dimension = "behavior"
case      = "return_type_is_int"
subject   = "bisect.bisect_left"
kind      = "semantic"
intent    = "bisect_left returns a plain int insertion index"

# --- lo / hi window --------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "lo_hi_restrict_search_range"
subject   = "bisect.bisect_left"
kind      = "semantic"
intent    = "lo and hi confine the binary search to the [lo, hi) sub-window"

# --- insort family ---------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "insort_left_inserts_left_of_equal"
subject   = "bisect.insort_left"
kind      = "semantic"
intent    = "insort_left keeps the list sorted and inserts left of an equal run"

[[case]]
dimension = "behavior"
case      = "insort_right_inserts_right_of_equal"
subject   = "bisect.insort_right"
kind      = "semantic"
intent    = "insort_right keeps the list sorted and inserts right of an equal run"

[[case]]
dimension = "behavior"
case      = "insort_alias_equals_insort_right"
subject   = "bisect.insort"
kind      = "semantic"
intent    = "insort is an alias for insort_right and produces the identical list"

[[case]]
dimension = "behavior"
case      = "insort_builds_sorted_from_scratch"
subject   = "bisect.insort"
kind      = "semantic"
intent    = "repeated insort on an initially-empty list builds a fully sorted list"

# --- comparable-sequence generality ---------------------------------------

[[case]]
dimension = "behavior"
case      = "string_sequence_bisect"
subject   = "bisect.bisect_left"
kind      = "semantic"
intent    = "bisect works on any comparable sorted sequence, e.g. a sorted list of strings"

[[case]]
dimension = "behavior"
case      = "grade_lookup_via_bisect"
subject   = "bisect.bisect"
kind      = "semantic"
intent    = "the classic grade-band lookup: bisect maps a score to its grade bucket"

# --- comparison protocol (from comparison_protocol.py) ---------------------

[[case]]
dimension = "behavior"
case      = "nonbool_lt_taken_by_truthiness"
subject   = "bisect.bisect_left"
kind      = "semantic"
intent    = "a __lt__ returning a non-bool is interpreted by truthiness during the search"
source    = "Lib/test/test_bisect.py"

[[case]]
dimension = "behavior"
case      = "notimplemented_lt_falls_back_to_gt"
subject   = "bisect.bisect_left"
kind      = "semantic"
intent    = "when __lt__ returns NotImplemented the reflected __gt__ drives the comparison"
source    = "Lib/test/test_bisect.py"

[[case]]
dimension = "behavior"
case      = "insort_calls_sequence_insert"
subject   = "bisect.insort_left"
kind      = "semantic"
intent    = "insort uses the sequence's own insert(); a list subclass overriding insert observes the call"
source    = "Lib/test/test_bisect.py"

# --- key= parameter and keyword call form (Py3.10+) -----------------------

[[case]]
dimension = "behavior"
case      = "key_equals_precomputed_search"
subject   = "bisect.bisect_left"
kind      = "semantic"
intent    = "bisect_*(arr, x, key=f) matches searching the precomputed [f(v) for v in arr] with x"
source    = "Lib/test/test_bisect.py"

[[case]]
dimension = "behavior"
case      = "insort_honors_key"
subject   = "bisect.insort_right"
kind      = "semantic"
intent    = "insort_right honors key= and keeps the list sorted by the projected key"
source    = "Lib/test/test_bisect.py"

[[case]]
dimension = "behavior"
case      = "accepts_keyword_arguments"
subject   = "bisect.bisect_left"
kind      = "semantic"
intent    = "all functions accept a / x / lo / hi as keyword arguments"
source    = "Lib/test/test_bisect.py"

# ===========================================================================
# REAL_WORLD — semantic (one end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "sorted_schedule"
subject   = "bisect.insort_right"
kind      = "semantic"
intent    = "a task runner keeps a deadline-sorted schedule: insort_right inserts, bisect_left finds next-due"
