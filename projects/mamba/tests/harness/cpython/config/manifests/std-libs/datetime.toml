# ERRORS — mechanical (call + expect_exc), assert-it-raised
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "date_month_13_raises"
subject    = "datetime.date"
kind       = "mechanical"
call       = "datetime.date(2024, 13, 1)"
expect_exc = "ValueError"
module     = "datetime"

[[case]]
