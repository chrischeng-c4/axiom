source     = "Lib/test/datetimetester.py"

[[case]]
dimension  = "errors"
case       = "timedelta_mixed_int_ops_raise"
subject    = "datetime.timedelta"
kind       = "semantic"
intent     = "timedelta +/- int (either operand order) raises TypeError; int // timedelta raises TypeError; timedelta // 0 and timedelta / 0.0 raise ZeroDivisionError"
