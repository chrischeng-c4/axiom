case      = "current_time_constructors"
subject   = "datetime.datetime"
kind      = "semantic"
intent    = "the present-time entry points work without asserting an exact clock value: now()/today() return instances anchored in the present (year >= 2024), utcnow() (deprecated) still returns a datetime, and combine() rebuilds a datetime from a date and a time"
module    = "datetime"
