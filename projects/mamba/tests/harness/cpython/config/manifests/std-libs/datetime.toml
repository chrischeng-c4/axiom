[[case]]
dimension  = "errors"
case       = "naive_aware_compare_raises"
subject    = "datetime.datetime"
kind       = "semantic"
intent     = "comparing a naive datetime against an aware one with `<` raises TypeError (CPython refuses to order across the naive/aware boundary)"
module     = "datetime"

[[case]]
dimension  = "errors"
case       = "datetime_plus_int_raises"
subject    = "datetime.datetime"
kind       = "semantic"
intent     = "datetime + int, int + datetime, datetime * timedelta, and datetime + datetime are each rejected with TypeError"
module     = "datetime"
source     = "Lib/test/datetimetester.py"

[[case]]
dimension  = "errors"
case       = "timedelta_divmod_by_int_raises"
subject    = "datetime.timedelta"
kind       = "semantic"
intent     = "divmod(timedelta, int) is unsupported (TypeError) even though timedelta / int and timedelta // int are valid"
