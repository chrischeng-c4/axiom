# Manifest for the stdlib `datetime` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/datetime/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the loose feature files (attributes_broad.py, datetime_api_conformance.py,
# datetime_conformance.py, datetime_ops.py, datetime_r6_iso.py,
# datetime_conversions.py, fold_and_tzinfo.py, iso_formatting.py,
# timedelta_arithmetic.py, timedelta_limits.py, timezone_class.py).
# bench/ is kept as-is.
#
# Method/class subjects (e.g. datetime.date, datetime.timedelta.min) need an
# explicit module="datetime" because the import inferer stops at the first
# CapWords component — but the public datetime API is all CapWords classes, so
# every case carries module="datetime".

bucket = "std-libs"
lib    = "datetime"

# ===========================================================================
