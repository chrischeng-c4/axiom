# Manifest for the stdlib `array` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/array/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the loose feature files operators.py / empty_ops.py / nan_compare.py /
# unicode_typecode.py, plus the real_world/typed_buffer_pipeline scenario. No
# coverage lost — each legacy rule becomes one named one-case file.

bucket = "std-libs"
lib = "array"

