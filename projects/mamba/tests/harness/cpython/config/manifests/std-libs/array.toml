# ===========================================================================
# ERRORS — mechanical (call + expect_exc); types verified against CPython 3.12
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "no_args_typeerror"
subject    = "array.array"
kind       = "mechanical"
call       = "array.array()"
expect_exc = "TypeError"
source     = "Lib/test/test_array.py"

[[case]]
dimension  = "errors"
case       = "kwarg_typeerror"
subject    = "array.array"
kind       = "mechanical"
call       = "array.array(spam=42)"
expect_exc = "TypeError"
source     = "Lib/test/test_array.py"

[[case]]
dimension  = "errors"
case       = "multichar_typecode_typeerror"
subject    = "array.array"
kind       = "mechanical"
call       = "array.array(\"xx\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "bad_typecode_valueerror"
subject    = "array.array"
kind       = "mechanical"
call       = "array.array(\"Z\")"
expect_exc = "ValueError"
source     = "Lib/test/test_array.py"

[[case]]
dimension  = "errors"
case       = "wrong_init_type_typeerror"
subject    = "array.array"
kind       = "mechanical"
call       = "array.array(\"i\", \"abc\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "append_overflow_overflowerror"
subject    = "array.array.append"
kind       = "mechanical"
module     = "array"
call       = "array.array(\"b\").append(1000)"
expect_exc = "OverflowError"
source     = "Lib/test/test_array.py"

[[case]]
dimension  = "errors"
case       = "pop_empty_indexerror"
subject    = "array.array.pop"
kind       = "mechanical"
module     = "array"
call       = "array.array(\"i\").pop()"
expect_exc = "IndexError"

[[case]]
dimension  = "errors"
case       = "append_type_mismatch_typeerror"
subject    = "array.array.append"
kind       = "mechanical"
module     = "array"
call       = "array.array(\"i\", [1, 2, 3]).append(\"x\")"
expect_exc = "TypeError"
source     = "Lib/test/test_array.py"

[[case]]
dimension  = "errors"
case       = "frombytes_nonmultiple_valueerror"
subject    = "array.array"
kind       = "mechanical"
call       = "array.array(\"i\", b\"12345\")"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "remove_missing_valueerror"
subject    = "array.array.remove"
kind       = "mechanical"
module     = "array"
call       = "array.array(\"i\", [1, 2, 3]).remove(99)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "index_missing_valueerror"
subject    = "array.array.index"
kind       = "mechanical"
module     = "array"
call       = "array.array(\"i\", [1, 2, 3]).index(99)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "int_array_rejects_float_typeerror"
subject    = "array.array"
kind       = "mechanical"
call       = "array.array(\"i\", [1, 2.5])"
expect_exc = "TypeError"
source     = "Lib/test/test_array.py"

[[case]]
dimension  = "errors"
case       = "mixed_typecode_concat_typeerror"
subject    = "array.array"
kind       = "mechanical"
call       = "array.array(\"i\", [1]) + array.array(\"d\", [1.0])"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "int_typecode_rejects_str_init_typeerror"
subject    = "array.array"
kind       = "mechanical"
call       = "array.array(\"b\", \"foo\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "getitem_out_of_range_indexerror"
subject    = "array.array"
kind       = "mechanical"
call       = "array.array(\"i\", [1, 2, 3])[99]"
expect_exc = "IndexError"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

# --- construction & metadata ----------------------------------------------

[[case]]
dimension = "behavior"
case      = "int_array_construct_and_index"
subject   = "array.array"
kind      = "semantic"
intent    = "array('i', [1,2,3]) reports typecode 'i', itemsize 4, len 3, and supports positive and negative indexing"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "double_array_typecode_itemsize"
subject   = "array.array"
kind      = "semantic"
intent    = "a 'd' (double) array reports typecode 'd' and itemsize 8 and stores floats with full precision"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "byte_array_typecode_itemsize"
subject   = "array.array"
kind      = "semantic"
intent    = "a 'b' (signed char) array reports typecode 'b', itemsize 1, and stores values across the -128..127 range"

[[case]]
dimension = "behavior"
case      = "typecodes_lists_core_codes"
subject   = "array.typecodes"
kind      = "semantic"
intent    = "array.typecodes is a str containing every core integer and float code in 'bBhHiIlLqQfd', and each advertised code constructs an empty array of that code"
source    = "Lib/test/test_array.py"

# --- bytes / list round-trips ---------------------------------------------

[[case]]
dimension = "behavior"
case      = "tobytes_frombytes_roundtrip"
subject   = "array.array"
kind      = "semantic"
intent    = "tobytes()/frombytes() round-trip preserves int values; 3 int32 elements serialize to 12 bytes"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "double_tobytes_frombytes_roundtrip"
subject   = "array.array"
kind      = "semantic"
intent    = "a 'd' array round-trips through tobytes()/frombytes(); 3 doubles serialize to 24 bytes and reload to the same values"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "bytes_initializer_consumed_as_raw_words"
subject   = "array.array"
kind      = "semantic"
intent    = "a bytes initializer is consumed as raw machine words, not values; b'1234' (4 bytes) into typecode 'H' (itemsize 2) yields 2 elements"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "fromlist_appends_values"
subject   = "array.array"
kind      = "semantic"
intent    = "fromlist appends each value to the end of the array and membership tests scan by value"
source    = "Lib/test/test_array.py"

# --- mutation -------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "append_pop_lifo_at_end"
subject   = "array.array"
kind      = "semantic"
intent    = "append adds at the end and pop()/pop(0) remove from end/front like a list"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "insert_places_at_index"
subject   = "array.array"
kind      = "semantic"
intent    = "insert places an element at the given index, including a negative index meaning 'before last'"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "remove_deletes_first_occurrence"
subject   = "array.array"
kind      = "semantic"
intent    = "remove deletes only the first matching occurrence, leaving later duplicates intact"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "reverse_in_place"
subject   = "array.array"
kind      = "semantic"
intent    = "reverse reverses the array elements in place"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "extend_accepts_list_and_array"
subject   = "array.array"
kind      = "semantic"
intent    = "extend appends from any iterable, accepting both a plain list and another array of the same typecode"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "count_and_index_like_list"
subject   = "array.array"
kind      = "semantic"
intent    = "count returns the number of matching elements and index returns the position of the first match, like list"
source    = "Lib/test/test_array.py"

# --- sequence protocol & operators ----------------------------------------

[[case]]
dimension = "behavior"
case      = "slice_returns_new_array_same_typecode"
subject   = "array.array"
kind      = "semantic"
intent    = "slicing returns a new array of the same typecode holding the sliced values"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "concat_same_typecode"
subject   = "array.array"
kind      = "semantic"
intent    = "the + operator concatenates two same-typecode arrays into a new array"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "repeat_tiles_elements"
subject   = "array.array"
kind      = "semantic"
intent    = "the * operator tiles the elements n times into a new array"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "lexicographic_comparison"
subject   = "array.array"
kind      = "semantic"
intent    = "arrays compare lexicographically element by element, with a longer prefix-equal array comparing greater"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "byteswap_reverses_element_bytes"
subject   = "array.array"
kind      = "semantic"
intent    = "byteswap reverses the byte order of each element; 0x0001 in an 'H' array becomes 0x0100 (256)"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "slice_assignment_changes_length"
subject   = "array.array"
kind      = "semantic"
intent    = "assigning an array to a slice can change the length of the target array"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "slice_deletion_removes_range"
subject   = "array.array"
kind      = "semantic"
intent    = "del array[a:b] removes the contiguous range of elements"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "empty_array_ops_stay_empty"
subject   = "array.array"
kind      = "semantic"
intent    = "self slice-assign, concat, repeat and in-place concat on a zero-length array all leave it empty rather than raising; empty tolist()/tobytes() are empty"
source    = "Lib/test/test_array.py"

# --- registration / NaN / unicode -----------------------------------------

[[case]]
dimension = "behavior"
case      = "registers_as_mutable_sequence"
subject   = "array.array"
kind      = "semantic"
intent    = "an array is an instance of collections.abc.MutableSequence and collections.abc.Reversible"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "buffer_info_reports_count"
subject   = "array.array"
kind      = "semantic"
intent    = "buffer_info() returns a (address, element_count) tuple whose second item equals len(array)"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "nan_array_never_equal_or_ordered"
subject   = "array.array"
kind      = "semantic"
intent    = "two 'd' arrays each holding a single NaN follow IEEE-754: != is True, every other relation (==, <, <=, >, >=, even == itself) is False"
source    = "Lib/test/test_array.py"

[[case]]
dimension = "behavior"
case      = "unicode_typecode_roundtrips_text"
subject   = "array.array"
kind      = "semantic"
intent    = "the 'u' typecode round-trips text via fromunicode/tounicode and accepts a str initializer while integer typecodes reject one (DeprecationWarning for 'u' silenced)"
source    = "Lib/test/test_array.py"

# ===========================================================================
# REAL_WORLD — semantic end-to-end scenario
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "typed_buffer_pipeline"
subject   = "array.array"
kind      = "semantic"
intent    = "a numeric tool builds a typed array from a bytes buffer, runs in-place mutations (append/insert/pop/remove/reverse/byteswap), queries metadata (typecode/itemsize/buffer_info/count/index), extends and fromlists, and serializes back to bytes, asserting a deterministic aggregate at each step"
source    = "Lib/test/test_array.py"
