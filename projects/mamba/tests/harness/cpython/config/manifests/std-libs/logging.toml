# Manifest for the stdlib `logging` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/logging/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the loose feature files (config.py / formatter.py / handler.py /
# hierarchy.py / levels.py / logger_class.py). bench/ kept as-is.
#
# Class/exception subjects (Logger, Handler, Formatter, Manager, ...) stop the
# import inferer at the first CapWords component, so each such case sets an
# explicit module="logging" (or module="logging.config" for the configurator
# cases). CPython 3.12 is the oracle.

bucket = "std-libs"
lib = "logging"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_logging"
subject   = "logging"
kind      = "mechanical"
probe     = "attr"
attr      = "getLogger"

[[case]]
dimension = "surface"
case      = "getlogger_is_callable"
subject   = "logging.getLogger"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "basicconfig_is_callable"
subject   = "logging.basicConfig"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "getlevelname_is_callable"
subject   = "logging.getLevelName"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "getlevelnamesmapping_is_callable"
subject   = "logging.getLevelNamesMapping"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "makelogrecord_is_callable"
subject   = "logging.makeLogRecord"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "logger_attr"
subject   = "logging"
kind      = "mechanical"
probe     = "attr"
attr      = "Logger"

[[case]]
dimension = "surface"
case      = "handler_attr"
subject   = "logging"
kind      = "mechanical"
probe     = "attr"
attr      = "Handler"

[[case]]
dimension = "surface"
case      = "formatter_attr"
subject   = "logging"
kind      = "mechanical"
probe     = "attr"
attr      = "Formatter"

[[case]]
dimension = "surface"
case      = "streamhandler_attr"
subject   = "logging"
kind      = "mechanical"
probe     = "attr"
attr      = "StreamHandler"

[[case]]
dimension = "surface"
case      = "filehandler_attr"
subject   = "logging"
kind      = "mechanical"
probe     = "attr"
attr      = "FileHandler"

[[case]]
dimension = "surface"
case      = "nullhandler_attr"
subject   = "logging"
kind      = "mechanical"
probe     = "attr"
attr      = "NullHandler"

[[case]]
dimension = "surface"
case      = "filter_attr"
subject   = "logging"
kind      = "mechanical"
probe     = "attr"
attr      = "Filter"

[[case]]
dimension = "surface"
case      = "bufferingformatter_attr"
subject   = "logging"
kind      = "mechanical"
probe     = "attr"
