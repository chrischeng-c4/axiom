[[case]]
dimension = "surface"
case      = "manager_attr"
subject   = "logging"
kind      = "mechanical"
probe     = "attr"
attr      = "Manager"

# ===========================================================================
# BEHAVIOR — semantic (output / state matches CPython exactly)
# ===========================================================================

# --- level constants & enablement (ex-surface.py) -------------------------

[[case]]
dimension = "behavior"
case      = "level_constants_canonical_values"
subject   = "logging.DEBUG"
kind      = "semantic"
module    = "logging"
intent    = "the six built-in level constants have their canonical numeric values: DEBUG=10, INFO=20, WARNING=30, ERROR=40, CRITICAL=50, NOTSET=0"

[[case]]
dimension = "behavior"
case      = "getlogger_caches_by_name"
subject   = "logging.getLogger"
kind      = "semantic"
intent    = "getLogger(name) returns a logging.Logger, and a second call with the same name returns the identical cached instance"

[[case]]
dimension = "behavior"
case      = "logger_name_attribute"
subject   = "logging.Logger"
kind      = "semantic"
module    = "logging"
intent    = "a logger's .name attribute echoes the dotted name it was fetched with"

[[case]]
dimension = "behavior"
case      = "setlevel_isenabledfor"
subject   = "logging.Logger"
kind      = "semantic"
module    = "logging"
intent    = "after setLevel(WARNING) the logger.level reads WARNING; isEnabledFor is False for DEBUG and True for WARNING and ERROR"

# --- handler / stream capture (ex-behavior.py) ----------------------------

[[case]]
dimension = "behavior"
case      = "streamhandler_captures_record"
subject   = "logging.StreamHandler"
kind      = "semantic"
module    = "logging"
intent    = "a StreamHandler over an io.StringIO captures an emitted INFO record's message into the underlying stream"

[[case]]
dimension = "behavior"
case      = "logger_drops_below_level"
subject   = "logging.Logger"
kind      = "semantic"
module    = "logging"
intent    = "a logger set to WARNING drops DEBUG/INFO records but emits WARNING records to its handler's stream"

[[case]]
dimension = "behavior"
case      = "formatter_controls_output"
subject   = "logging.Formatter"
kind      = "semantic"
module    = "logging"
intent    = "a Formatter('%(levelname)s|%(message)s') makes an ERROR record render as 'ERROR|formatted_msg' in the handler stream"

[[case]]
dimension = "behavior"
case      = "child_propagates_to_parent"
subject   = "logging.Logger"
kind      = "semantic"
module    = "logging"
intent    = "a record on a dotted child logger propagates up to a handler installed on its ancestor"

[[case]]
dimension = "behavior"
case      = "propagate_false_stops"
subject   = "logging.Logger"
kind      = "semantic"
module    = "logging"
intent    = "setting child.propagate=False stops a child record from reaching a handler on the parent"

[[case]]
dimension = "behavior"
case      = "exception_includes_traceback"
subject   = "logging.Logger"
kind      = "semantic"
module    = "logging"
intent    = "Logger.exception() inside an except block emits both the supplied message and the active exception's type name"

[[case]]
dimension = "behavior"
case      = "nullhandler_discards"
subject   = "logging.NullHandler"
kind      = "semantic"
module    = "logging"
intent    = "a logger whose only handler is NullHandler discards records silently without raising"

# --- level-name lookup (ex-levels.py) -------------------------------------

[[case]]
dimension = "behavior"
case      = "getlevelname_name_to_number"
subject   = "logging.getLevelName"
kind      = "semantic"
intent    = "getLevelName resolves a level name to its numeric level: 'INFO' -> INFO, 'WARNING' -> 30"

[[case]]
dimension = "behavior"
case      = "getlevelname_number_to_name"
subject   = "logging.getLevelName"
kind      = "semantic"
intent    = "getLevelName resolves a numeric level back to its name: INFO -> 'INFO', ERROR (40) -> 'ERROR'"

[[case]]
dimension = "behavior"
case      = "fatal_aliases_critical"
subject   = "logging.FATAL"
kind      = "semantic"
module    = "logging"
intent    = "FATAL is an alias for CRITICAL: getLevelName('FATAL') == FATAL == CRITICAL == 50 (issue 27935)"

[[case]]
dimension = "behavior"
case      = "getlevelnamesmapping_fresh_copy"
subject   = "logging.getLevelNamesMapping"
kind      = "semantic"
intent    = "getLevelNamesMapping returns a name->number dict containing the builtins, and hands back a fresh independent copy on every call"

# --- logger hierarchy / getChild (ex-hierarchy.py) ------------------------

[[case]]
dimension = "behavior"
case      = "getchild_matches_getlogger"
subject   = "logging.Logger"
kind      = "semantic"
module    = "logging"
intent    = "getChild appends to the dotted name; top.getChild('mod') is the same cached instance as getLogger('top.mod'), and chained/dotted-suffix getChild agree"

[[case]]
dimension = "behavior"
case      = "root_child_is_bare_named"
subject   = "logging.Logger"
kind      = "semantic"
module    = "logging"
intent    = "a child of the root logger has the bare name with no leading dot: root.getChild('x') is getLogger('x')"

[[case]]
dimension = "behavior"
case      = "getchildren_immediate_only"
subject   = "logging.Logger"
kind      = "semantic"
module    = "logging"
intent    = "getChildren reports only immediate children (direct child listed, grandchild excluded) and a leaf logger has an empty getChildren set"

# --- records / Filter / BufferingFormatter / styles (ex-formatter.py) -----

[[case]]
dimension = "behavior"
case      = "makelogrecord_repr_shape"
subject   = "logging.makeLogRecord"
kind      = "semantic"
intent    = "str(makeLogRecord({})) has the documented '<LogRecord: ...>' repr shape"

[[case]]
dimension = "behavior"
case      = "base_filter_passes_all"
subject   = "logging.Filter"
kind      = "semantic"
module    = "logging"
intent    = "a bare logging.Filter() passes every record (filter() returns truthy with no name restriction configured)"

[[case]]
dimension = "behavior"
case      = "bufferingformatter_joins_batch"
subject   = "logging.BufferingFormatter"
kind      = "semantic"
module    = "logging"
intent    = "BufferingFormatter.format joins a record batch in order ('one','two' -> 'onetwo') and returns '' for an empty batch"

[[case]]
dimension = "behavior"
case      = "formatter_brace_style"
subject   = "logging.Formatter"
kind      = "semantic"
module    = "logging"
intent    = "Formatter(style='{') formats with str.format placeholders: '{levelname}|{message}' renders 'INFO|hi'"

# --- handler naming / emit / setStream (ex-handler.py) --------------------

[[case]]
dimension = "behavior"
case      = "handler_name_settable"
subject   = "logging.Handler"
kind      = "semantic"
module    = "logging"
intent    = "Handler.name is a settable attribute that round-trips through assignment and re-assignment"

[[case]]
dimension = "behavior"
case      = "streamhandler_setstream_returns_prior"
subject   = "logging.StreamHandler"
kind      = "semantic"
module    = "logging"
intent    = "StreamHandler defaults to sys.stderr; setStream returns the previously attached stream, and returns None when the stream is unchanged"

# --- custom logger classes / Manager (ex-logger_class.py) -----------------

[[case]]
dimension = "behavior"
case      = "setloggerclass_roundtrip"
subject   = "logging.setLoggerClass"
kind      = "semantic"
intent    = "setLoggerClass(MyLogger subclass) round-trips through getLoggerClass and restores the default Logger class"

[[case]]
dimension = "behavior"
case      = "manager_uses_custom_class"
subject   = "logging.Manager"
kind      = "semantic"
module    = "logging"
intent    = "a Manager.setLoggerClass(custom) routes getLogger through the custom Logger subclass, and its overridden _log receives the message; setLogRecordFactory stores the handed-in factory"

# --- configurator cfg:// resolution (ex-config.py) ------------------------

[[case]]
dimension = "behavior"
case      = "configurator_resolves_cfg_refs"
subject   = "logging.config.BaseConfigurator"
kind      = "semantic"
module    = "logging.config"
intent    = "BaseConfigurator.convert resolves cfg:// references by index and key: tuple/list indices, nested index, dotted key, and bracketed key all resolve into the backing dict"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc; assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "setlevel_unknown_name_raises"
subject    = "logging.Logger"
kind       = "mechanical"
module     = "logging"
call       = "logging.getLogger('err.setlevel').setLevel('NO_SUCH_LEVEL')"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "getlogger_int_name_raises"
subject    = "logging.getLogger"
kind       = "mechanical"
call       = "logging.getLogger(123)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "base_handler_emit_not_implemented"
subject    = "logging.Handler"
kind       = "mechanical"
module     = "logging"
call       = "logging.Handler().emit(None)"
expect_exc = "NotImplementedError"

[[case]]
dimension  = "errors"
case       = "formatter_unknown_style_raises"
subject    = "logging.Formatter"
kind       = "mechanical"
module     = "logging"
call       = "logging.Formatter(None, None, 'x')"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "setloggerclass_non_logger_raises"
subject    = "logging.setLoggerClass"
kind       = "mechanical"
call       = "logging.setLoggerClass(object)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "manager_setloggerclass_non_logger_raises"
subject    = "logging.Manager"
kind       = "mechanical"
module     = "logging"
call       = "logging.Manager(None).setLoggerClass(int)"
expect_exc = "TypeError"

# --- errors (semantic: go beyond plain call/expect_exc) -------------------

[[case]]
dimension = "errors"
case      = "configurator_bad_cfg_refs_raise"
subject   = "logging.config.BaseConfigurator"
kind      = "semantic"
module    = "logging.config"
intent    = "bad cfg:// references raise documented errors: an unknown top-level key -> KeyError, a malformed prefix 'cfg://!' -> ValueError, and an out-of-range bracket index -> KeyError"

[[case]]
dimension = "errors"
case      = "fileconfig_empty_file_runtimeerror"
subject   = "logging.config.fileConfig"
kind      = "semantic"
module    = "logging.config"
intent    = "fileConfig on an empty .ini config file (created inside a TemporaryDirectory) raises RuntimeError"

[[case]]
dimension = "errors"
case      = "fileconfig_missing_file_filenotfound"
subject   = "logging.config.fileConfig"
kind      = "semantic"
module    = "logging.config"
intent    = "fileConfig on a path that does not exist (inside a TemporaryDirectory) raises FileNotFoundError"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "app_logging_setup"
subject   = "logging"
kind      = "semantic"
intent    = "an application configures a named logger with a StreamHandler + Formatter, sets WARNING level, then logs across DEBUG..ERROR and asserts only WARNING and ERROR lines appear in the captured buffer with the configured format"
