# ===========================================================================
# ERRORS — semantic (argument-evaluation order: a regression beyond the plain
# call/expect_exc template)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "binary_funcs_reject_bad_first_before_second"
subject   = "math.atan2"
kind      = "semantic"
intent    = "atan2/copysign/remainder validate the first operand's type before touching the second; a bad first arg raises TypeError without ever calling __float__ on the second operand (bpo-39871 regression)"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

# --- constants ------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "constants_values"
subject   = "math.pi"
kind      = "semantic"
intent    = "the named constants carry their canonical IEEE-754 values: pi==3.141592653589793, e==2.718281828459045, tau==2*pi; inf is infinite and nan != nan"

# --- sqrt -----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "sqrt_returns_float"
subject   = "math.sqrt"
kind      = "semantic"
intent    = "math.sqrt always returns a float (sqrt(4) is 2.0, not int 2) and sqrt(2)==1.4142135623730951; sqrt(0)==0.0, sqrt(1)==1.0"

# --- floor / ceil ---------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "floor_ceil_return_int"
subject   = "math.floor"
kind      = "semantic"
intent    = "in Python 3.12 math.floor and math.ceil return int (not float); floor rounds toward -inf, ceil toward +inf, across positive/negative/integral inputs"

# --- trunc ----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "trunc_toward_zero"
subject   = "math.trunc"
kind      = "semantic"
intent    = "math.trunc rounds toward zero and returns int: trunc(3.7)==3, trunc(-3.7)==-3, trunc(0.5)==0"

# --- trig -----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "trig_identities"
subject   = "math.sin"
kind      = "semantic"
intent    = "core trig identities within 1e-10: sin(pi)~=0, cos(pi)==-1, tan(pi/4)==1, sin(0)==0, cos(0)==1, sin(pi/2)==1"

[[case]]
dimension = "behavior"
case      = "inverse_trig"
subject   = "math.atan2"
kind      = "semantic"
intent    = "inverse-trig round trips: asin(0)==0, acos(1)==0, atan(0)==0, and atan2(1, 1)==pi/4 within 1e-10"

# --- hypot / dist ---------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "hypot_variadic"
subject   = "math.hypot"
kind      = "semantic"
intent    = "math.hypot is variadic: hypot()==0.0, hypot(-5)==5.0, hypot(3, 4)==5.0 (2-arg), hypot(3, 4, 12)==13.0 (N-arg Euclidean norm)"

[[case]]
dimension = "behavior"
case      = "dist_euclidean"
subject   = "math.dist"
kind      = "semantic"
intent    = "math.dist computes Euclidean distance over equal-length point sequences: dist([0,0],[3,4])==5.0, dist([1,2,3],[4,6,15])==13.0, and accepts tuple inputs"

# --- degrees / radians ----------------------------------------------------

[[case]]
dimension = "behavior"
case      = "degrees_radians_inverse"
subject   = "math.degrees"
kind      = "semantic"
intent    = "degrees and radians are inverses: degrees(pi)==180.0 and radians(180)==pi within 1e-10"

# --- log family -----------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "log_family"
subject   = "math.log"
kind      = "semantic"
intent    = "log(1)==0, log(e)==1, two-arg log(8, 2)==3, log10(1000)==3, log2(8)==3, all within 1e-10"

[[case]]
dimension = "behavior"
case      = "expm1_log1p_small_arg"
subject   = "math.expm1"
kind      = "semantic"
intent    = "small-arg precision builtins: expm1(0.0)==0.0, expm1(1.0)==1.7182818284590453, log1p(0.0)==0.0, log1p(1.0)==0.6931471805599453"

# --- exp ------------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "exp_underflow_to_zero"
subject   = "math.exp"
kind      = "semantic"
intent    = "exp(0)==1.0, exp(1) is e, and exp of a huge negative argument underflows silently to 0.0 (no exception)"

# --- factorial ------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "factorial_table"
subject   = "math.factorial"
kind      = "semantic"
intent    = "math.factorial over a representative table: 0!==1, 1!==1, 5!==120, 10!==3628800, returning int"

# --- gcd / lcm ------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "gcd_variadic"
subject   = "math.gcd"
kind      = "semantic"
intent    = "math.gcd is variadic (CPython 3.9+): gcd()==0, gcd(7)==7, gcd(-12)==12 (abs), gcd(12, 18)==6, gcd(48, 36, 60, 84)==12"

[[case]]
dimension = "behavior"
case      = "lcm_variadic"
subject   = "math.lcm"
kind      = "semantic"
intent    = "math.lcm is variadic: lcm()==1, lcm(-7)==7 (abs), lcm(4, 6)==12, lcm(4, 6, 9)==36, lcm(2, 3, 5, 7)==210, and any zero argument short-circuits to 0"

# --- comb / perm ----------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "comb_perm"
subject   = "math.comb"
kind      = "semantic"
intent    = "binomial coefficient and permutations: comb(5, 2)==10, comb(10, 0)==1, perm(5, 2)==20"

# --- isqrt ----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "isqrt_floor_root"
subject   = "math.isqrt"
kind      = "semantic"
intent    = "math.isqrt returns the integer floor of the square root: isqrt(0)==0, isqrt(99)==9, isqrt(100)==10, isqrt(101)==10, isqrt(10**12)==1000000"

# --- fsum -----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "fsum_exact_summation"
subject   = "math.fsum"
kind      = "semantic"
intent    = "math.fsum sums ten 0.1 terms to exactly 1.0 where a naive float sum would drift, demonstrating extended-precision (Shewchuk) accumulation"

# --- prod -----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "prod_type_promotion"
subject   = "math.prod"
kind      = "semantic"
intent    = "math.prod keeps an all-int reduction integer-typed, promotes to float when any factor is float, honours the start kwarg, and returns the empty-product identity (1)"

# --- sumprod --------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "sumprod_dot_product"
subject   = "math.sumprod"
kind      = "semantic"
intent    = "math.sumprod is an extended-precision dot product: int operands stay int (sumprod([1,2,3],[4,5,6])==32), empty operands give 0, bool coerces like 0/1, and catastrophic 1e101 cancellation leaves 2.0 exactly"

# --- modf / frexp ---------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "modf_frexp_decomposition"
subject   = "math.modf"
kind      = "semantic"
intent    = "modf(3.75) splits into (0.75, 3.0) fractional/integral float parts and frexp(8.0) returns the (mantissa, exponent) pair (0.5, 4)"

# --- copysign / fabs / fmod -----------------------------------------------

[[case]]
dimension = "behavior"
case      = "copysign_carries_sign"
subject   = "math.copysign"
kind      = "semantic"
intent    = "copysign carries the sign bit of the second arg onto the magnitude of the first: copysign(3, -1)==-3.0, copysign(-5, 1)==5.0, and copysign(1, nan) uses NaN's positive sign -> 1.0"

[[case]]
dimension = "behavior"
case      = "fmod_fabs"
subject   = "math.fmod"
kind      = "semantic"
intent    = "fmod keeps the dividend's sign (fmod(-10, 3)==-1.0, fmod(10, 3)==1.0) and fabs returns the absolute value as a float (fabs(-3.14)==3.14)"

# --- remainder ------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "remainder_round_half_even"
subject   = "math.remainder"
kind      = "semantic"
intent    = "IEEE-754 remainder rounds the quotient to nearest-even: remainder(7, 3)==1.0, remainder(7.5, 5)==-2.5, remainder(-7, 3)==-1.0, remainder(10, 4)==2.0"

# --- ldexp ----------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "ldexp_power_of_two"
subject   = "math.ldexp"
kind      = "semantic"
intent    = "math.ldexp(x, i) scales x by 2**i exactly: ldexp(1.5, 3)==12.0, ldexp(1.0, -3)==0.125, ldexp(0.0, 100)==0.0"

# --- pow ------------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "pow_returns_float"
subject   = "math.pow"
kind      = "semantic"
intent    = "math.pow always returns a float: pow(2, 10)==1024.0, pow(5, 0)==1.0, pow(2, -1)==0.5, pow(2, 0.5) is sqrt(2)"

# --- predicates -----------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "isnan_isinf_isfinite"
subject   = "math.isnan"
kind      = "semantic"
intent    = "the float predicates classify correctly: isnan(nan) and isnan(float('nan')) are True but isnan(1.0) False; isinf(inf) and isinf(-inf) True; isfinite(1.0) True but isfinite(inf)/isfinite(nan) False"

# --- inf / nan comparisons ------------------------------------------------

[[case]]
dimension = "behavior"
case      = "inf_comparisons"
subject   = "math.inf"
kind      = "semantic"
intent    = "math.inf compares as positive infinity (inf > 0, inf == float('inf')) and -math.inf == float('-inf'); nan compares unequal to itself"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "stats_summary_pipeline"
subject   = "math"
kind      = "semantic"
intent    = "a numeric-analytics pipeline drives sqrt/fsum/dist/hypot/log together: compute an extended-precision mean and population standard deviation over a sample, the Euclidean norm of a vector, and a geometric-mean via fsum of logs, asserting each deterministic result"

