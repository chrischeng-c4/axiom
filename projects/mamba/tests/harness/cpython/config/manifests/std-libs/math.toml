# ===========================================================================
# ERRORS — mechanical (call + expect_exc; generator emits assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "sqrt_str_typeerror"
subject    = "math.sqrt"
kind       = "mechanical"
call       = "math.sqrt(\"hello\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "sqrt_negative_valueerror"
subject    = "math.sqrt"
kind       = "mechanical"
call       = "math.sqrt(-1)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "log_zero_valueerror"
subject    = "math.log"
kind       = "mechanical"
call       = "math.log(0)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "log_negative_valueerror"
subject    = "math.log"
kind       = "mechanical"
call       = "math.log(-1)"
expect_exc = "ValueError"

[[case]]
