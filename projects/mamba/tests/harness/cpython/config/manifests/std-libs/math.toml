# Manifest for the stdlib `math` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/math/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + paired-.expected golden shape
# (surface.py, behavior.py, errors.py, arg_eval_order.py, sumprod.py,
# broad.py/.expected, ops_broad.py/.expected, constants_broad.py/.expected,
# deep_broad.py/.expected, edges.py/.expected, math_conformance.py/.expected,
# math_api_conformance.py/.expected, math_edge_cases.py/.expected,
# math_ops.py/.expected). bench/ is left as-is.
#
# All cases are CPython-3.12 green; math is fully implemented in mamba's
# runtime/stdlib/math_mod.rs (#760, #1261 stub batch closed expm1/log1p/
# ldexp/remainder/dist/prod/isqrt/variadic-gcd-lcm/N-arg-hypot). No known
# mamba gap → no xfail.

bucket = "std-libs"
lib = "math"

# ===========================================================================
