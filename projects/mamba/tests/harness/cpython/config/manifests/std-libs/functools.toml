# ===========================================================================
# ERRORS — mechanical (call + expect_exc; assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "reduce_empty_no_initial_raises"
subject    = "functools.reduce"
kind       = "mechanical"
call       = "functools.reduce(lambda a, b: a + b, [])"
expect_exc = "TypeError"
source     = "Lib/test/test_functools.py"

[[case]]
dimension  = "errors"
case       = "reduce_non_iterable_raises"
subject    = "functools.reduce"
kind       = "mechanical"
call       = "functools.reduce(lambda a, b: a + b, 123)"
expect_exc = "TypeError"
source     = "Lib/test/test_functools.py"

[[case]]
dimension  = "errors"
case       = "partial_non_callable_raises"
subject    = "functools.partial"
kind       = "mechanical"
call       = "functools.partial(42, 1)"
expect_exc = "TypeError"
source     = "Lib/test/test_functools.py"

[[case]]
dimension  = "errors"
case       = "partial_no_args_raises"
subject    = "functools.partial"
kind       = "mechanical"
call       = "functools.partial()"
expect_exc = "TypeError"
source     = "Lib/test/test_functools.py"

[[case]]
dimension  = "errors"
case       = "partialmethod_non_callable_raises"
subject    = "functools.partialmethod"
kind       = "mechanical"
call       = 'type("Bad", (), {"m": functools.partialmethod(None, 1)})'
expect_exc = "TypeError"
source     = "Lib/test/test_functools.py"

[[case]]
dimension  = "errors"
case       = "total_ordering_no_op_raises"
subject    = "functools.total_ordering"
kind       = "mechanical"
call       = 'functools.total_ordering(type("E", (), {}))'
expect_exc = "ValueError"
source     = "Lib/test/test_functools.py"

[[case]]
dimension  = "errors"
case       = "lru_cache_bad_maxsize_raises"
subject    = "functools.lru_cache"
kind       = "mechanical"
call       = 'functools.lru_cache(maxsize="all")(lambda x: x)'
expect_exc = "TypeError"
source     = "Lib/test/test_functools.py"

[[case]]
dimension  = "errors"
case       = "cmp_to_key_result_not_hashable_raises"
subject    = "functools.cmp_to_key"
kind       = "mechanical"
call       = "hash(functools.cmp_to_key(lambda x, y: 0)(1))"
expect_exc = "TypeError"
source     = "Lib/test/test_functools.py"

[[case]]
dimension  = "errors"
case       = "singledispatch_no_positional_arg_raises"
subject    = "functools.singledispatch"
kind       = "mechanical"
call       = "functools.singledispatch(lambda *a: None)()"
expect_exc = "TypeError"
source     = "Lib/test/test_functools.py"

[[case]]
dimension  = "errors"
case       = "update_wrapper_missing_updated_attr_raises"
subject    = "functools.update_wrapper"
kind       = "mechanical"
call       = 'functools.update_wrapper(lambda: 0, lambda: 0, assigned=("attr",), updated=("missing_d",))'
expect_exc = "AttributeError"
source     = "Lib/test/test_functools.py"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "reduce_fold_with_and_without_initial"
subject   = "functools.reduce"
kind      = "semantic"
intent    = "fold a binary op over a list with and without an initial seed (sum, product, max), and a single-element / empty+initial short-circuit that never calls func"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "reduce_iterates_getitem_sequence_protocol"
subject   = "functools.reduce"
kind      = "semantic"
intent    = "reduce drives an arbitrary __getitem__ sequence (IndexError stops), with and without an initial, including the empty custom sequence"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "partial_binds_positional_and_keyword"
subject   = "functools.partial"
kind      = "semantic"
intent    = "partial binds leading positional args and default keywords; call-time positionals append and call-time kwargs win on conflict"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "partial_exposes_func_args_keywords"
subject   = "functools.partial"
kind      = "semantic"
intent    = "partial.func/.args/.keywords expose the captured callable and bound arguments"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "partial_repr_names_type_and_args"
subject   = "functools.partial"
kind      = "semantic"
intent    = "repr(partial(...)) is module-qualified and reflects the captured positional args"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "partial_nesting_flattens"
subject   = "functools.partial"
kind      = "semantic"
intent    = "a partial of a partial flattens: func resolves to the base callable and the merged signature equals a single flat partial"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "partial_copy_shares_members"
subject   = "functools.partial"
kind      = "semantic"
intent    = "copy.copy(partial) preserves func and shares the same args/keywords objects"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "partial_wraps_bound_and_unbound_methods"
subject   = "functools.partial"
kind      = "semantic"
intent    = "partial wraps both an unbound (str.join) and a bound (''.join) method as the underlying callable"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "partialmethod_binds_in_class_body"
subject   = "functools.partialmethod"
kind      = "semantic"
intent    = "partialmethod binds a positional-only argument when declared in a class body"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "lru_cache_caches_and_counts_hits_misses"
subject   = "functools.lru_cache"
kind      = "semantic"
intent    = "lru_cache memoizes by args so the body runs once per distinct key, and cache_info tracks hits/misses"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "lru_cache_maxsize_evicts_lru"
subject   = "functools.lru_cache"
kind      = "semantic"
intent    = "lru_cache(maxsize=N) bounds currsize at N and evicts the least-recently-used entry"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "lru_cache_clear_resets_state"
subject   = "functools.lru_cache"
kind      = "semantic"
intent    = "cache_clear zeroes hits/misses/currsize on a previously populated cache"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "lru_cache_bare_and_unbounded_forms"
subject   = "functools.lru_cache"
kind      = "semantic"
intent    = "the bare @lru_cache form and @lru_cache(maxsize=None) both cache; unbounded grows currsize with each distinct key"
