[[case]]
dimension = "behavior"
case      = "update_wrapper_from_builtin_resets_annotations"
subject   = "functools.update_wrapper"
kind      = "semantic"
intent    = "update_wrapper from a builtin (max, type) copies name/doc and resets __annotations__ to empty"
