[[case]]
dimension = "behavior"
case      = "total_ordering_propagates_notimplemented"
subject   = "functools.total_ordering"
kind      = "semantic"
intent    = "when the seed comparison returns NotImplemented, the derived operators also return NotImplemented rather than guessing"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "total_ordering_does_not_override_inherited"
subject   = "functools.total_ordering"
kind      = "semantic"
intent    = "total_ordering does not overwrite rich comparisons inherited from a base (an int subclass keeps int's ordering)"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "cached_property_computes_once_per_instance"
subject   = "functools.cached_property"
kind      = "semantic"
intent    = "cached_property computes once per instance, keeps independent instances separate, allows manual overwrite, and works under inheritance"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "cmp_to_key_orders_and_sorts"
subject   = "functools.cmp_to_key"
kind      = "semantic"
intent    = "cmp_to_key turns an old-style cmp into key objects that compare via the cmp, drive sorted(), and are not hashable"
