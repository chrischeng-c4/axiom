[[case]]
dimension = "behavior"
case      = "singledispatch_dispatches_on_first_arg_type"
subject   = "functools.singledispatch"
kind      = "semantic"
intent    = "singledispatch picks the implementation by the first argument's type via explicit register, decorator register, .dispatch, MRO, ABC, and annotation/union registration"
source    = "Lib/test/test_functools.py"

[[case]]
dimension = "behavior"
case      = "singledispatchmethod_dispatches_with_classmethod_staticmethod"
subject   = "functools.singledispatchmethod"
kind      = "semantic"
intent    = "singledispatchmethod dispatches a method by its first non-self argument and stacks with classmethod/staticmethod, threading cls/self correctly"
source    = "Lib/test/test_functools.py"

