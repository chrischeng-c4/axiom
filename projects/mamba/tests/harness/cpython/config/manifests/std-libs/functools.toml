[[case]]
dimension = "behavior"
case      = "cache_memoizes_recursive_fib"
subject   = "functools.cache"
kind      = "semantic"
intent    = "functools.cache memoizes a recursive fibonacci and a multi-arg adder so repeated keys return the cached value"
