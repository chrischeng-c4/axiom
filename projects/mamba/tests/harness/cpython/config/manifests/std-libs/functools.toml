[[case]]
dimension = "behavior"
case      = "total_ordering_derives_from_any_seed_op"
subject   = "functools.total_ordering"
kind      = "semantic"
intent    = "total_ordering seeded from __lt__ or __ge__ derives the other three ordering operators consistently, including equal-value boundaries"
