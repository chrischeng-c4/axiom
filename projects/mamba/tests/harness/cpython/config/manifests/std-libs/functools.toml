# Manifest for the stdlib `functools` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/functools/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + paired-.expected golden shape (surface.py,
# behavior.py, errors.py, plus the loose feature scripts basic/edges/deep_broad,
# functools_api_conformance, functools_conformance, functools_ops,
# functools_r6_r10, partial_reduce, reduce_cache_broad, reduce_patterns_broad,
# cmp_to_key, singledispatch, singledispatchmethod, total_ordering_edges,
# update_wrapper, partial_advanced). bench/ is left as-is.

bucket = "std-libs"
lib = "functools"

