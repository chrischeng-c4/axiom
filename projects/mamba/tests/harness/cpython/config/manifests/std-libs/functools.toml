[[case]]
dimension = "behavior"
case      = "wraps_copies_name_and_doc"
subject   = "functools.wraps"
kind      = "semantic"
intent    = "@wraps copies __name__ and __doc__ from the wrapped function to the wrapper and sets __wrapped__"
