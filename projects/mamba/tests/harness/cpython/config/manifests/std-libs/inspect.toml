intent    = "isfunction is True for a def, False for a non-function (int) and for a class"

[[case]]
dimension = "behavior"
case      = "isclass_true_for_class_false_for_instance"
subject   = "inspect.isclass"
kind      = "semantic"
intent    = "isclass is True for a class object, False for an instance of it and for a function"

[[case]]
dimension = "behavior"
case      = "ismodule_true_for_module_false_for_func"
subject   = "inspect.ismodule"
kind      = "semantic"
intent    = "ismodule is True for an imported module, False for a function"

[[case]]
dimension = "behavior"
case      = "isbuiltin_true_for_len"
subject   = "inspect.isbuiltin"
kind      = "semantic"
