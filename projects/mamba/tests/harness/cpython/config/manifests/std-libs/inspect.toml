# ===========================================================================
# ERRORS -- mechanical (call + expect_exc), assert-it-raised
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "getfile_builtin_raises_typeerror"
subject    = "inspect.getfile"
kind       = "mechanical"
call       = "inspect.getfile(len)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "getsource_builtin_raises_typeerror"
subject    = "inspect.getsource"
kind       = "mechanical"
call       = "inspect.getsource(len)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "getsourcelines_int_raises_typeerror"
subject    = "inspect.getsourcelines"
kind       = "mechanical"
call       = "inspect.getsourcelines(int)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "signature_type_raises_valueerror"
subject    = "inspect.signature"
kind       = "mechanical"
call       = "inspect.signature(type)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "signature_int_raises_typeerror"
subject    = "inspect.signature"
kind       = "mechanical"
call       = "inspect.signature(42)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "getmro_int_raises_attributeerror"
subject    = "inspect.getmro"
kind       = "mechanical"
call       = "inspect.getmro(42)"
expect_exc = "AttributeError"

[[case]]
dimension  = "errors"
case       = "parameter_bad_kind_raises_valueerror"
subject    = "inspect.Parameter"
kind       = "mechanical"
call       = "inspect.Parameter('x', kind=999)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "getclosurevars_class_raises_typeerror"
subject    = "inspect.getclosurevars"
kind       = "mechanical"
call       = "inspect.getclosurevars(list)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "signature_unhashable_default_hash_raises_typeerror"
subject    = "inspect.signature"
kind       = "mechanical"
call       = "hash(inspect.signature(lambda a={}: None))"
expect_exc = "TypeError"

