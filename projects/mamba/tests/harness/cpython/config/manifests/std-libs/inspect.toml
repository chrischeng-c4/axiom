[[case]]
dimension = "behavior"
case      = "ismethod_bound_vs_unbound"
subject   = "inspect.ismethod"
kind      = "semantic"
intent    = "ismethod is True for a bound method on an instance, False for the plain function accessed on the class"

[[case]]
dimension = "behavior"
