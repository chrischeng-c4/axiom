# Manifest for the stdlib `inspect` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/inspect/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic behavior cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the loose feature files (bound_arguments.py, doc_and_annotations.py,
# parameter_object.py, predicates_extra.py, runtime_state.py,
# signature_object.py). bench/ is left as-is.
#
# All subjects are `inspect.<X>`: the import inferer stops at the first CapWords
# component, so `inspect.Parameter` / `inspect.Signature` still resolve to
# `import inspect` -- no module/import override is needed.

bucket = "std-libs"
lib = "inspect"

