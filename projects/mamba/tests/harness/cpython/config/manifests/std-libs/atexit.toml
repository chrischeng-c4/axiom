# Manifest for the stdlib `atexit` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/atexit/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths (surface.py / behavior.py / errors.py)
# and the loose feature files (order.py / run_exitfuncs.py / unregister.py),
# preserving all CPython-3.12 coverage.
#
# mamba gap (#652): atexit is a stub — handlers are tracked by string name,
# `_run_exitfuncs()` never invokes them, and `register()` does not validate
# callability (no TypeError for non-callables). See
# src/runtime/stdlib/atexit_mod.rs. Any case whose correctness depends on a
# registered callback actually FIRING, or on register() rejecting a
# non-callable, is xfail'd; the pure register/count/clear/return-self surface
# matches CPython and stays green.

bucket = "std-libs"
lib = "atexit"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_atexit"
subject   = "atexit"
kind      = "mechanical"
probe     = "attr"
attr      = "register"

[[case]]
dimension = "surface"
case      = "register_is_callable"
subject   = "atexit.register"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "unregister_is_callable"
subject   = "atexit.unregister"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "clear_is_callable"
subject   = "atexit._clear"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "ncallbacks_is_callable"
subject   = "atexit._ncallbacks"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "run_exitfuncs_is_callable"
subject   = "atexit._run_exitfuncs"
kind      = "mechanical"
probe     = "callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "register_non_callable_raises_typeerror"
subject    = "atexit.register"
kind       = "mechanical"
call       = "atexit.register(42)"
expect_exc = "TypeError"
source     = "Lib/test/test_atexit.py"
xfail      = "atexit.register() does not validate callability — accepts a non-callable silently instead of raising TypeError (stub, #652; src/runtime/stdlib/atexit_mod.rs)"

# ===========================================================================
# BEHAVIOR — semantic (agent-filled bodies, CPython-3.12 oracle)
# ===========================================================================

# --- Register / count / clear surface that mamba MATCHES (no firing needed). --

[[case]]
dimension = "behavior"
case      = "register_returns_registered_callable"
subject   = "atexit.register"
kind      = "semantic"
intent    = "register() returns the callable it was given (identity), the documented return contract"
source    = "Lib/test/test_atexit.py"

[[case]]
dimension = "behavior"
case      = "ncallbacks_counts_registrations"
subject   = "atexit._ncallbacks"
kind      = "semantic"
intent    = "_clear()/register()/_ncallbacks() track the queue length: 0 after clear, increments per register"
source    = "Lib/test/test_atexit.py"

[[case]]
dimension = "behavior"
case      = "run_exitfuncs_returns_none_and_drains"
subject   = "atexit._run_exitfuncs"
kind      = "semantic"
intent    = "_run_exitfuncs() returns None and drains the queue so _ncallbacks() is 0 afterwards"
source    = "Lib/test/test_atexit.py"

[[case]]
dimension = "behavior"
case      = "unregister_missing_is_silent"
subject   = "atexit.unregister"
kind      = "semantic"
intent    = "unregister() of a callable that was never registered is a silent no-op (no raise), queue length unchanged"
source    = "Lib/test/test_atexit.py"

[[case]]
dimension = "behavior"
case      = "run_after_clear_runs_nothing"
subject   = "atexit._run_exitfuncs"
kind      = "semantic"
intent    = "_run_exitfuncs() after _clear() runs nothing and leaves an empty queue"
source    = "Lib/test/test_atexit.py"

# --- Callback-firing semantics that mamba's stub does NOT honour (xfail). ----

[[case]]
dimension = "behavior"
case      = "order_lifo_with_forwarded_args"
subject   = "atexit._run_exitfuncs"
kind      = "semantic"
intent    = "callbacks fire in LIFO (reverse-registration) order with the positional and keyword args captured at register() time"
source    = "Lib/test/test_atexit.py"
xfail     = "_run_exitfuncs() never invokes registered handlers (stub loop body is empty, #652; src/runtime/stdlib/atexit_mod.rs) so no callback fires"

[[case]]
dimension = "behavior"
case      = "register_bound_method_fires"
subject   = "atexit.register"
kind      = "semantic"
intent    = "a bound method registered with an argument fires at _run_exitfuncs() like any other callable"
source    = "Lib/test/test_atexit.py"
xfail     = "_run_exitfuncs() never invokes registered handlers (stub, #652)"

[[case]]
dimension = "behavior"
case      = "register_duplicate_fires_twice"
subject   = "atexit.register"
kind      = "semantic"
intent    = "the same callable registered twice fires twice at _run_exitfuncs()"
source    = "Lib/test/test_atexit.py"
xfail     = "_run_exitfuncs() never invokes registered handlers (stub, #652)"

[[case]]
dimension = "behavior"
case      = "run_one_shot_drain"
subject   = "atexit._run_exitfuncs"
kind      = "semantic"
intent    = "_run_exitfuncs() runs each callback exactly once; a second call is a no-op because the queue is already drained"
source    = "Lib/test/test_atexit.py"
xfail     = "_run_exitfuncs() never invokes registered handlers (stub, #652)"

[[case]]
dimension = "behavior"
case      = "run_stress_128_each_once"
subject   = "atexit._run_exitfuncs"
kind      = "semantic"
intent    = "128 registered callbacks each fire exactly once and the queue drains to empty"
source    = "Lib/test/test_atexit.py"
xfail     = "_run_exitfuncs() never invokes registered handlers (stub, #652)"

[[case]]
dimension = "behavior"
case      = "run_raising_callback_is_isolated"
subject   = "atexit._run_exitfuncs"
kind      = "semantic"
intent    = "a callback that raises does not abort the run: the exception is reported to stderr and remaining callbacks still execute"
source    = "Lib/test/test_atexit.py"
xfail     = "_run_exitfuncs() never invokes registered handlers (stub, #652)"

[[case]]
dimension = "behavior"
case      = "unregister_by_identity_net_effect"
subject   = "atexit.unregister"
kind      = "semantic"
intent    = "unregister() matches by callable identity: dropping one of two distinct registered callables leaves only the other to fire"
source    = "Lib/test/test_atexit.py"
xfail     = "unregister matches by string name not callable identity, and _run_exitfuncs() never fires handlers (stub, #652)"

[[case]]
dimension = "behavior"
case      = "unregister_removes_all_copies"
subject   = "atexit.unregister"
kind      = "semantic"
intent    = "unregister() removes every copy of a duplicated registration so the callback fires zero times"
source    = "Lib/test/test_atexit.py"
xfail     = "unregister matches by string name not callable identity, and _run_exitfuncs() never fires handlers (stub, #652)"

# ===========================================================================
# REAL_WORLD — semantic (end-to-end consumer flow)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "shutdown_cleanup_orchestration"
subject   = "atexit"
kind      = "semantic"
intent    = "a teardown manager wires register/unregister/_clear/_ncallbacks/_run_exitfuncs together: it registers ordered cleanups, cancels one, runs the rest in LIFO order with forwarded args, and confirms the queue drained"
source    = "Lib/test/test_atexit.py"
xfail     = "_run_exitfuncs() never invokes registered handlers and unregister matches by name not identity (stub, #652)"
