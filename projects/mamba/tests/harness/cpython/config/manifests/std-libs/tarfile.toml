# Manifest for the stdlib `tarfile` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/tarfile/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, filters.py, limits.py, number_fields.py,
# pax_header.py). No paired .expected goldens existed. bench/ is left as-is
# (bench/tarfile_type_read_hot.py); the real_world/_stub.py placeholder stays.
#
# tarfile ships green on mamba (no `# mamba-xfail` directives on any legacy
# fixture), so no case carries an xfail.
#
# Subjects naming a class/exception (TarInfo, ReadError, tobuf, ...) set an
# explicit `module = "tarfile"` so the import inferer does not stop at the
# CapWords component.

bucket = "std-libs"
lib = "tarfile"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_tarfile"
subject   = "tarfile"
kind      = "mechanical"
probe     = "attr"
attr      = "open"

[[case]]
dimension = "surface"
case      = "open_is_callable"
subject   = "tarfile.open"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "is_tarfile_is_callable"
subject   = "tarfile.is_tarfile"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "tarfile_class_is_callable"
subject   = "tarfile.TarFile"
kind      = "mechanical"
module    = "tarfile"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "tarinfo_class_is_callable"
subject   = "tarfile.TarInfo"
kind      = "mechanical"
module    = "tarfile"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "regtype_attr"
subject   = "tarfile"
kind      = "mechanical"
probe     = "attr"
attr      = "REGTYPE"

[[case]]
dimension = "surface"
case      = "dirtype_attr"
subject   = "tarfile"
kind      = "mechanical"
probe     = "attr"
attr      = "DIRTYPE"

[[case]]
dimension = "surface"
case      = "symtype_attr"
subject   = "tarfile"
kind      = "mechanical"
probe     = "attr"
attr      = "SYMTYPE"

[[case]]
dimension = "surface"
case      = "encoding_attr"
subject   = "tarfile"
kind      = "mechanical"
probe     = "attr"
attr      = "ENCODING"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc -> assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "open_non_tar_raises_readerror"
subject    = "tarfile.open"
kind       = "mechanical"
import     = "import tarfile\nimport io"
call       = "tarfile.open(fileobj=io.BytesIO(b'not a tar file'))"
expect_exc = "tarfile.ReadError"
source     = "Lib/test/test_tarfile.py"

[[case]]
dimension  = "errors"
case       = "open_missing_file_raises_filenotfound"
subject    = "tarfile.open"
kind       = "mechanical"
call       = "tarfile.open('/no/such/file.tar')"
expect_exc = "FileNotFoundError"

[[case]]
dimension  = "errors"
case       = "open_bad_mode_raises"
subject    = "tarfile.open"
kind       = "mechanical"
import     = "import tarfile\nimport io"
call       = "tarfile.open(fileobj=io.BytesIO(), mode='X')"
expect_exc = "(ValueError, tarfile.CompressionError)"

[[case]]
dimension  = "errors"
case       = "compresslevel_plain_mode_raises_typeerror"
subject    = "tarfile.open"
kind       = "mechanical"
import     = "import tarfile\nimport io"
call       = "tarfile.open(fileobj=io.BytesIO(), mode='w:', compresslevel=5)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "compresslevel_bz2_zero_raises_valueerror"
subject    = "tarfile.open"
kind       = "mechanical"
import     = "import tarfile\nimport io"
call       = "tarfile.open(fileobj=io.BytesIO(), mode='w:bz2', compresslevel=0)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "ustar_name_too_long_raises_valueerror"
subject    = "tarfile.TarInfo"
kind       = "mechanical"
module     = "tarfile"
call       = "tarfile.TarInfo('0123456789' * 10 + '0').tobuf(tarfile.USTAR_FORMAT)"
expect_exc = "ValueError"
source     = "Lib/test/test_tarfile.py"

[[case]]
dimension  = "errors"
case       = "ustar_uid_overflow_raises_valueerror"
subject    = "tarfile.TarInfo"
kind       = "mechanical"
import     = "import tarfile\n_ti = tarfile.TarInfo('name')\n_ti.uid = 2097152"
call       = "_ti.tobuf(tarfile.USTAR_FORMAT)"
expect_exc = "ValueError"
source     = "Lib/test/test_tarfile.py"

[[case]]
dimension  = "errors"
case       = "gnu_uid_overflow_raises_valueerror"
subject    = "tarfile.TarInfo"
kind       = "mechanical"
import     = "import tarfile\n_ti = tarfile.TarInfo('name')\n_ti.uid = 72057594037927936"
call       = "_ti.tobuf(tarfile.GNU_FORMAT)"
expect_exc = "ValueError"
source     = "Lib/test/test_tarfile.py"

[[case]]
dimension  = "errors"
case       = "itn_negative_ustar_raises_valueerror"
subject    = "tarfile.itn"
kind       = "mechanical"
call       = "tarfile.itn(-1, 8, tarfile.USTAR_FORMAT)"
expect_exc = "ValueError"
source     = "Lib/test/test_tarfile.py"

[[case]]
dimension  = "errors"
case       = "itn_too_big_ustar_raises_valueerror"
subject    = "tarfile.itn"
kind       = "mechanical"
call       = "tarfile.itn(2097152, 8, tarfile.USTAR_FORMAT)"
expect_exc = "ValueError"
source     = "Lib/test/test_tarfile.py"

[[case]]
dimension  = "errors"
case       = "data_filter_parent_traversal_raises"
subject    = "tarfile.data_filter"
kind       = "mechanical"
import     = "import tarfile\n_esc = tarfile.TarInfo('../escape.txt')\n_esc.size = 0"
call       = "tarfile.data_filter(_esc, 'dest')"
expect_exc = "tarfile.OutsideDestinationError"
source     = "Lib/test/test_tarfile.py"

[[case]]
dimension  = "errors"
case       = "extractall_bad_filter_name_raises_valueerror"
subject    = "tarfile.TarFile"
kind       = "mechanical"
import     = "import tarfile\nimport io\n_buf = io.BytesIO()\ntarfile.open(fileobj=_buf, mode='w').close()\n_buf.seek(0)\n_tf = tarfile.open(fileobj=_buf, mode='r')"
call       = "_tf.extractall('dest', filter='nope')"
expect_exc = "ValueError"
source     = "Lib/test/test_tarfile.py"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule each)
# ===========================================================================

# --- core round-trip / membership ----------------------------------------

[[case]]
dimension = "behavior"
case      = "addfile_extractfile_roundtrip"
subject   = "tarfile.TarFile"
kind      = "semantic"
module    = "tarfile"
intent    = "content added via addfile is retrieved byte-for-byte via extractfile after a write -> seek(0) -> read round-trip"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "gzip_compresses_repeated_bytes"
subject   = "tarfile.TarFile"
kind      = "semantic"
module    = "tarfile"
intent    = "a w:gz archive of 10000 identical bytes is smaller on the wire than the same payload written to a plain (uncompressed) w archive"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "multiple_members_roundtrip"
subject   = "tarfile.TarFile"
kind      = "semantic"
module    = "tarfile"
intent    = "three distinct members written into one archive are each retrieved with their own content intact via extractfile"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "getnames_getmembers_shapes"
subject   = "tarfile.TarFile"
kind      = "semantic"
module    = "tarfile"
intent    = "getnames returns a list of name strings (including a subdir path) and getmembers returns a matching list of TarInfo objects; getmember/extractfile resolve a member by name and TarInfo carries name/size/mode/mtime/type"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "extractall_writes_tree_to_disk"
subject   = "tarfile.TarFile"
kind      = "semantic"
module    = "tarfile"
intent    = "extractall(filter='data') materializes both a top-level file and a nested subdir/file onto a TemporaryDirectory with the original content"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "type_distinguishes_file_from_dir"
subject   = "tarfile.TarFile"
kind      = "semantic"
module    = "tarfile"
intent    = "a member tagged REGTYPE reads back as isreg() while a member tagged DIRTYPE reads back as isdir(), and TarInfo.type round-trips each constant"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "next_on_empty_archive_is_none"
subject   = "tarfile.TarFile"
kind      = "semantic"
module    = "tarfile"
intent    = "next() returns None at the end of an empty archive in both seekable ('r') and streaming ('r|') read modes"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "context_manager_tracks_closed"
subject   = "tarfile.TarFile"
kind      = "semantic"
module    = "tarfile"
intent    = "an open TarFile reports .closed False, .close() flips it to True, and re-entering an already-closed TarFile as a context manager raises OSError"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "is_tarfile_preserves_stream_position"
subject   = "tarfile.is_tarfile"
kind      = "semantic"
intent    = "is_tarfile returns True for a valid in-memory tar stream and leaves the file-like object's seek position at 0 (untouched)"
source    = "Lib/test/test_tarfile.py"

# --- number-field encode/decode (nti/itn/stn/nts) -------------------------

[[case]]
dimension = "behavior"
case      = "nti_decodes_octal_and_base256"
subject   = "tarfile.nti"
kind      = "semantic"
intent    = "nti reads octal-ASCII number fields (1, 2**21-1, 0 for nul/spaces) and GNU base-256 fields with the high bit set (2**21, -1, -100)"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "itn_encodes_octal_and_base256"
subject   = "tarfile.itn"
kind      = "semantic"
intent    = "itn writes the octal form by default (1, 2**21-1) and the GNU base-256 form for values that overflow octal or are negative (2**21, -1, -100)"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "itn_nti_roundtrip_gnu_range"
subject   = "tarfile.itn"
kind      = "semantic"
intent    = "itn and nti are inverses across the GNU range: nti(itn(n, GNU_FORMAT)) == n for representative n including 0, 2**21-1, 2**21, 2**32-1, -1, -100"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "stn_nts_pad_and_truncate"
subject   = "tarfile.stn"
kind      = "semantic"
intent    = "stn nul-pads a string into a fixed-width field and truncates an overlong one; nts decodes a nul-terminated field back, stopping at the first nul"
source    = "Lib/test/test_tarfile.py"

# --- PAX (POSIX.1-2001) extended-header behavior --------------------------

[[case]]
dimension = "behavior"
case      = "get_info_exposes_metadata"
subject   = "tarfile.TarInfo"
kind      = "semantic"
module    = "tarfile"
intent    = "TarInfo.get_info() returns the header-building metadata dict carrying name/size/uid/gid and a fractional mtime preserved verbatim"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "create_pax_header_magic_prefix"
subject   = "tarfile.TarInfo"
kind      = "semantic"
module    = "tarfile"
intent    = "create_pax_header emits a bytes block beginning with the PAX extended-header magic name './@PaxHeader'"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "pax_roundtrips_oversized_numeric_fields"
subject   = "tarfile.TarFile"
kind      = "semantic"
module    = "tarfile"
intent    = "a PAX-format archive round-trips uid and mtime values too large for the classic ustar octal fields (uid=2**24, mtime=10**10), recovering the exact integers and payload"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "pax_roundtrips_nonascii_name"
subject   = "tarfile.TarFile"
kind      = "semantic"
module    = "tarfile"
intent    = "a non-ASCII member name survives a PAX-format write/read round-trip via the PAX path= record"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "pax_roundtrips_custom_headers"
subject   = "tarfile.TarFile"
kind      = "semantic"
module    = "tarfile"
intent    = "a custom pax_headers key/value pair round-trips by key through a PAX-format archive"
source    = "Lib/test/test_tarfile.py"

# --- per-format header field-width limits (no-raise side) -----------------

[[case]]
dimension = "behavior"
case      = "ustar_name_within_limits_ok"
subject   = "tarfile.TarInfo"
kind      = "semantic"
module    = "tarfile"
intent    = "USTAR accepts a 100-char name and a name that splits into prefix(<=155)+name(<=100); tobuf(USTAR_FORMAT) succeeds for both"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "gnu_lifts_name_limits"
subject   = "tarfile.TarInfo"
kind      = "semantic"
module    = "tarfile"
intent    = "GNU_FORMAT encodes long names and linknames that overflow USTAR, so tobuf(GNU_FORMAT) succeeds where USTAR would raise"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "pax_has_no_practical_field_limits"
subject   = "tarfile.TarInfo"
kind      = "semantic"
module    = "tarfile"
intent    = "PAX_FORMAT carries oversized names and a 2**56 uid in extended headers, so tobuf(PAX_FORMAT) raises nothing where USTAR/GNU would"
source    = "Lib/test/test_tarfile.py"

# --- extraction filters (PEP 706) -----------------------------------------

[[case]]
dimension = "behavior"
case      = "fully_trusted_filter_is_identity"
subject   = "tarfile.fully_trusted_filter"
kind      = "semantic"
intent    = "fully_trusted_filter returns the same TarInfo object it was given (identity), applying no sanitization"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "tar_and_data_filters_preserve_name_type"
subject   = "tarfile.data_filter"
kind      = "semantic"
intent    = "tar_filter and data_filter return sanitized copies that preserve a safe member's name and type"
source    = "Lib/test/test_tarfile.py"

[[case]]
dimension = "behavior"
case      = "data_filter_strips_leading_slash"
subject   = "tarfile.data_filter"
kind      = "semantic"
intent    = "data_filter strips a leading absolute slash ('/etc/evil.txt' -> 'etc/evil.txt') rather than letting the path escape to root"
source    = "Lib/test/test_tarfile.py"

# ===========================================================================
# SECURITY — semantic (adversarial / untrusted-input)
# ===========================================================================

[[case]]
dimension = "security"
case      = "data_filter_rejects_path_traversal"
subject   = "tarfile.data_filter"
kind      = "semantic"
intent    = "an untrusted member whose name traverses out of the destination ('../escape.txt') is refused by data_filter with OutsideDestinationError, and the exception subclasses FilterError subclasses TarError"
source    = "Lib/test/test_tarfile.py"
