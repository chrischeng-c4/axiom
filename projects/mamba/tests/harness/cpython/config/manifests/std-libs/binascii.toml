# Manifest for the stdlib `binascii` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/binascii/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape:
#   surface.py, behavior.py, errors.py (root monoliths) and
#   base64_strict.py, quoted_printable.py, uu.py (loose features).
# No paired *.expected goldens existed. bench/ is left as-is (perf,
# golden-less); real_world/_stub.py is left as-is (placeholder).
#
# binascii subjects are all module-level functions / exception classes, so the
# import inferer (which stops at the first CapWords component, i.e. Error /
# Incomplete) needs `module = "binascii"` on the exception-class cases.

bucket = "std-libs"
lib = "binascii"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_binascii"
subject   = "binascii"
kind      = "mechanical"
probe     = "attr"
attr      = "hexlify"

