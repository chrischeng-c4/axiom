# Manifest for the stdlib `http.cookies` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/http_cookies/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the loose feature files encoding.py / morsel.py / header_injection.py /
# http_cookies_basic.py (paired *.expected golden).
#
# IMPORT QUIRK: mamba's `import http.cookies` dotted-path binding does not
# round-trip attribute access (project_mamba_import_dotted_quirk). Every case
# uses the portable `from http import cookies` / `from http.cookies import X`
# form, and `subject`/`call` are written against that binding.
#
# MAMBA STATE: http.cookies is wired as a passive shell in
# src/runtime/stdlib/http_cookies_mod.rs — the class constructors return
# attribute-less Instance shells with no bound `load`/`output`/Morsel methods
# and no real `dict`/exception machinery. Surface probes (hasattr / callable /
# zero-arg construction) pass; every case that needs real parse, serialize,
# Morsel semantics, or CookieError raising is xfailed against mamba.

bucket = "std-libs"
lib = "http_cookies"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr). mamba PASSES these.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_http_cookies"
subject   = "cookies.SimpleCookie"
kind      = "mechanical"
probe     = "attr"
attr      = "load"
import    = "from http import cookies"

[[case]]
dimension = "surface"
case      = "simplecookie_is_callable"
subject   = "cookies.SimpleCookie"
kind      = "mechanical"
probe     = "callable"
import    = "from http import cookies"

[[case]]
dimension = "surface"
case      = "morsel_is_callable"
subject   = "cookies.Morsel"
kind      = "mechanical"
probe     = "callable"
import    = "from http import cookies"

[[case]]
dimension = "surface"
case      = "basecookie_is_callable"
subject   = "cookies.BaseCookie"
kind      = "mechanical"
probe     = "callable"
import    = "from http import cookies"

[[case]]
dimension = "surface"
case      = "cookieerror_exists"
subject   = "cookies"
kind      = "mechanical"
probe     = "attr"
attr      = "CookieError"
import    = "from http import cookies"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc). mamba's shell raises neither the
# CookieError nor the KeyError (no real __setitem__/dict), so all are xfailed.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "name_with_control_char_raises"
subject    = "cookies.SimpleCookie"
kind       = "mechanical"
call       = "cookies.SimpleCookie().__setitem__('bad\\x01name', 'value')"
expect_exc = "cookies.CookieError"
import     = "from http import cookies"
xfail      = "mamba http.cookies SimpleCookie is a passive shell; __setitem__ does not validate names (http_cookies_mod.rs carve-out)"
source     = "Lib/test/test_http_cookies.py"

[[case]]
dimension  = "errors"
case       = "missing_key_raises_keyerror"
subject    = "cookies.SimpleCookie"
kind       = "mechanical"
call       = "cookies.SimpleCookie()['never_set']"
expect_exc = "KeyError"
import     = "from http import cookies"
xfail      = "mamba SimpleCookie shell is not a real dict; missing-key lookup returns None instead of raising KeyError (http_cookies_mod.rs carve-out)"

[[case]]
dimension  = "errors"
case       = "load_bare_comma_raises"
subject    = "cookies.SimpleCookie"
kind       = "mechanical"
call       = "cookies.SimpleCookie().load('a=b; c,d=e')"
expect_exc = "cookies.CookieError"
import     = "from http import cookies"
xfail      = "mamba SimpleCookie shell has no bound load(); does not parse or raise CookieError (http_cookies_mod.rs carve-out)"
source     = "Lib/test/test_http_cookies.py"

[[case]]
dimension  = "errors"
case       = "morsel_set_reserved_name_raises"
subject    = "cookies.Morsel"
kind       = "mechanical"
call       = "cookies.Morsel().set('expires', 'v', 'v')"
expect_exc = "cookies.CookieError"
import     = "from http import cookies"
xfail      = "mamba Morsel shell has no bound set(); reserved-name guard is absent (http_cookies_mod.rs carve-out)"

[[case]]
dimension  = "errors"
case       = "morsel_set_illegal_chars_raises"
subject    = "cookies.Morsel"
kind       = "mechanical"
call       = "cookies.Morsel().set('foo bar', 'v', 'v')"
expect_exc = "cookies.CookieError"
import     = "from http import cookies"
xfail      = "mamba Morsel shell has no bound set(); illegal-char guard is absent (http_cookies_mod.rs carve-out)"

