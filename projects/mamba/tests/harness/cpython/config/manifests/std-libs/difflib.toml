# Manifest for the stdlib `difflib` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/difflib/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the loose feature fixtures differ_compare.py / html_diff.py / junk_apis.py,
# with a few extra cases recovered from the CPython oracle
# (Lib/test/test_difflib.py). All subjects are CapWords classes or module-level
# callables under `difflib`, so the import inferer resolves module="difflib"
# without an explicit override.

bucket = "std-libs"
lib = "difflib"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_difflib"
subject   = "difflib"
kind      = "mechanical"
probe     = "attr"
attr      = "SequenceMatcher"

[[case]]
dimension = "surface"
case      = "sequencematcher_is_callable"
subject   = "difflib.SequenceMatcher"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "differ_is_callable"
subject   = "difflib.Differ"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
