subject   = "difflib.get_close_matches"
kind      = "semantic"
intent    = "get_close_matches('helo', words, n=3, cutoff=0.5) returns at most 3 results and includes a real near-match like 'hello' or 'help'"

[[case]]
dimension = "behavior"
case      = "get_close_matches_empty_when_below_cutoff"
subject   = "difflib.get_close_matches"
kind      = "semantic"
intent    = "get_close_matches with a high cutoff and no qualifying word returns []"

