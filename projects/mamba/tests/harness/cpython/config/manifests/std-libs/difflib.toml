# ===========================================================================
# ERRORS — mechanical (call + expect_exc; assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "get_close_matches_non_iterable_raises"
subject    = "difflib.get_close_matches"
kind       = "mechanical"
call       = "difflib.get_close_matches(\"a\", 123)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "get_close_matches_negative_cutoff_raises"
subject    = "difflib.get_close_matches"
kind       = "mechanical"
call       = "difflib.get_close_matches(\"a\", [\"a\"], cutoff=-0.1)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "get_close_matches_high_cutoff_raises"
subject    = "difflib.get_close_matches"
kind       = "mechanical"
call       = "difflib.get_close_matches(\"a\", [\"a\"], cutoff=1.5)"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "unified_diff_non_iterable_raises"
subject    = "difflib.unified_diff"
kind       = "mechanical"
call       = "list(difflib.unified_diff(123, [\"a\"]))"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "unified_diff_mixed_str_bytes_raises"
subject    = "difflib.unified_diff"
kind       = "mechanical"
call       = "list(difflib.unified_diff([b\"hello\"], [\"hello\"]))"
expect_exc = "TypeError"
source     = "Lib/test/test_difflib.py"

[[case]]
dimension  = "errors"
case       = "diff_bytes_str_arg_raises"
subject    = "difflib.diff_bytes"
kind       = "mechanical"
call       = "list(difflib.diff_bytes(difflib.unified_diff, [b\"hello\"], [\"hello\"]))"
expect_exc = "TypeError"
source     = "Lib/test/test_difflib.py"

# ===========================================================================
# ERRORS — semantic (happy-path "no raise" beyond the plain call template)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "unified_diff_negative_n_no_raise"
subject   = "difflib.unified_diff"
kind      = "semantic"
intent    = "unified_diff(n=-1) does NOT raise; it just yields a clamped (empty-context) diff"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- SequenceMatcher.ratio ------------------------------------------------

[[case]]
dimension = "behavior"
case      = "ratio_identical_is_one"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "ratio() of two identical strings is exactly 1.0"

[[case]]
dimension = "behavior"
case      = "ratio_disjoint_is_zero"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "ratio() of two strings with no common characters is exactly 0.0"

[[case]]
dimension = "behavior"
case      = "ratio_partial_match_fraction"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "ratio() of 'hello' vs 'helo' is 2*M/T = 8/9; quick_ratio is an upper bound >= ratio"

[[case]]
dimension = "behavior"
case      = "ratio_empty_sequences_is_one"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "ratio/quick_ratio/real_quick_ratio of two empty sequences are all 1.0 (vacuously identical)"
source    = "Lib/test/test_difflib.py"

# --- SequenceMatcher.get_opcodes ------------------------------------------

[[case]]
dimension = "behavior"
case      = "get_opcodes_are_five_tuples"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "get_opcodes returns 5-tuples whose tags are drawn from {equal, insert, delete, replace}"

[[case]]
dimension = "behavior"
case      = "get_opcodes_reconstruct_target"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "applying the opcodes of ABCDE->ACE (taking equal/insert/replace from b, skipping delete) reconstructs 'ACE'"

[[case]]
dimension = "behavior"
case      = "get_opcodes_single_insert"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "a single leading insertion ('b'*100 vs 'a'+'b'*100) yields exactly [insert 0,0,0,1; equal 0,100,1,101] and ratio ~= 0.995"
source    = "Lib/test/test_difflib.py"

[[case]]
dimension = "behavior"
case      = "get_opcodes_single_delete"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "a single middle deletion yields exactly [equal 0,40,0,40; delete 40,41,40,40; equal 41,81,40,80] and ratio ~= 0.994"
source    = "Lib/test/test_difflib.py"

[[case]]
dimension = "behavior"
case      = "get_grouped_opcodes_empty_is_empty"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "get_grouped_opcodes() over two empty sequences yields nothing (next() raises StopIteration)"
source    = "Lib/test/test_difflib.py"

# --- SequenceMatcher.get_matching_blocks ----------------------------------

[[case]]
dimension = "behavior"
case      = "matching_blocks_cached_and_sentinel"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "get_matching_blocks for 'abxcd' vs 'abcd' is cached/idempotent; block[0] is Match(a=0,b=0,size=2) and the trailing sentinel block has size 0"
source    = "Lib/test/test_difflib.py"

# --- SequenceMatcher.find_longest_match -----------------------------------

[[case]]
dimension = "behavior"
case      = "find_longest_match_default_args"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "find_longest_match() with no args finds the largest block of 'foo bar' in 'foo baz bar' -> Match(a=0,b=0,size=6)"
source    = "Lib/test/test_difflib.py"

[[case]]
dimension = "behavior"
case      = "find_longest_match_popular_chars"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "with a 200+ length b that triggers the popular-element heuristic, find_longest_match still locates 'dabcd' -> Match(a=0,b=99,size=5)"
source    = "Lib/test/test_difflib.py"

# --- SequenceMatcher junk / autojunk --------------------------------------

[[case]]
dimension = "behavior"
case      = "autojunk_false_keeps_long_match"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "with autojunk=False a 200-char common run is NOT treated as junk, so ratio of 'a'*200+'b' vs 'a'*200+'c' is > 0.99"

[[case]]
dimension = "behavior"
case      = "autojunk_true_marks_popular"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "default autojunk=True marks the repeated 'b' as bpopular for a 200+ sequence, collapsing ratio toward 0"
source    = "Lib/test/test_difflib.py"

[[case]]
dimension = "behavior"
case      = "isjunk_classifies_bjunk_set"
subject   = "difflib.SequenceMatcher"
kind      = "semantic"
intent    = "the isjunk predicate populates the bjunk set with the b-sequence elements it flags (just ' ', then ' ' and 'b')"
source    = "Lib/test/test_difflib.py"

# --- get_close_matches ----------------------------------------------------

[[case]]
dimension = "behavior"
case      = "get_close_matches_finds_typo"
subject   = "difflib.get_close_matches"
kind      = "semantic"
intent    = "get_close_matches('aple', ['apple', 'apricot', 'banana', 'mango']) ranks 'apple' first as the closest word"

[[case]]
dimension = "behavior"
