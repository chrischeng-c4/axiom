# --- junk predicates ------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "is_character_junk_space_tab_only"
subject   = "difflib.IS_CHARACTER_JUNK"
kind      = "semantic"
intent    = "IS_CHARACTER_JUNK is True only for ' ' and '\\t'; False for 'a', '#', newline, formfeed, carriage-return, vertical-tab"
source    = "Lib/test/test_difflib.py"

[[case]]
dimension = "behavior"
case      = "is_line_junk_blank_or_single_hash"
subject   = "difflib.IS_LINE_JUNK"
kind      = "semantic"
intent    = "IS_LINE_JUNK is True for a line of only blanks and/or a single '#'; False for '##', non-blank text, etc."
source    = "Lib/test/test_difflib.py"

# ===========================================================================
# SECURITY — semantic (adversarial input)
# ===========================================================================

[[case]]
dimension = "security"
case      = "is_line_junk_redos_resistant"
subject   = "difflib.IS_LINE_JUNK"
kind      = "semantic"
intent    = "IS_LINE_JUNK must not catastrophically backtrack: a million leading tabs followed by '##' classifies quickly as non-junk"
source    = "Lib/test/test_difflib.py"
