probe     = "callable"

[[case]]
dimension = "surface"
case      = "unified_diff_is_callable"
subject   = "difflib.unified_diff"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "context_diff_is_callable"
subject   = "difflib.context_diff"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "ndiff_is_callable"
subject   = "difflib.ndiff"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "restore_is_callable"
subject   = "difflib.restore"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "diff_bytes_is_callable"
subject   = "difflib.diff_bytes"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "get_close_matches_is_callable"
subject   = "difflib.get_close_matches"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "is_character_junk_is_callable"
subject   = "difflib.IS_CHARACTER_JUNK"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "is_line_junk_is_callable"
