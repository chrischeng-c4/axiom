# Manifest for the stdlib `contextvars` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/contextvars/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the loose feature fixture contextvars_basic.py (+ its paired .expected golden)
# and the real_world placeholder _stub.py. bench/ stays as-is (perf, golden-less).
# No coverage lost.
#
# Every public subject is a CapWords class (ContextVar / Context / Token), so the
# import inferer stops before the module; we set module="contextvars" on every
# case so the generated import line is `import contextvars`.

bucket = "std-libs"
lib = "contextvars"

# ===========================================================================
# SURFACE — mechanical probes (the four CPython 3.12 public names + the
# ContextVar/Token instance methods exist and are callable).
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_contextvars"
subject   = "contextvars"
kind      = "mechanical"
module    = "contextvars"
probe     = "attr"
attr      = "ContextVar"

[[case]]
dimension = "surface"
case      = "has_context"
subject   = "contextvars"
kind      = "mechanical"
module    = "contextvars"
probe     = "attr"
attr      = "Context"

[[case]]
dimension = "surface"
case      = "has_token"
subject   = "contextvars"
kind      = "mechanical"
module    = "contextvars"
probe     = "attr"
attr      = "Token"

[[case]]
dimension = "surface"
case      = "contextvar_is_callable"
subject   = "contextvars.ContextVar"
kind      = "mechanical"
module    = "contextvars"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "copy_context_is_callable"
subject   = "contextvars.copy_context"
kind      = "mechanical"
module    = "contextvars"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "contextvar_get_is_callable"
subject   = "contextvars.ContextVar.get"
kind      = "mechanical"
module    = "contextvars"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "contextvar_set_is_callable"
subject   = "contextvars.ContextVar.set"
kind      = "mechanical"
module    = "contextvars"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "contextvar_reset_is_callable"
subject   = "contextvars.ContextVar.reset"
kind      = "mechanical"
module    = "contextvars"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "context_run_is_callable"
subject   = "contextvars.Context.run"
kind      = "mechanical"
module    = "contextvars"
probe     = "callable"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc -> assert-it-raised).
#
# Each `call` is a self-contained expression that raises under CPython 3.12.
# The generator wraps it so a missing raise becomes a failed assert.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "unset_get_raises_lookuperror"
subject    = "contextvars.ContextVar"
kind       = "mechanical"
module     = "contextvars"
call       = "contextvars.ContextVar('e_unset').get()"
expect_exc = "LookupError"

[[case]]
dimension  = "errors"
case       = "reset_wrong_var_raises_valueerror"
subject    = "contextvars.ContextVar"
kind       = "mechanical"
module     = "contextvars"
call       = "contextvars.ContextVar('e_a').reset(contextvars.ContextVar('e_b').set(1))"
expect_exc = "ValueError"

# ===========================================================================
# ERRORS — semantic (the documented exception paths that need a few lines of
# setup beyond a single call/expect_exc, or assert a no-raise happy path).
# ===========================================================================

[[case]]
dimension = "errors"
case      = "reuse_token_raises_runtimeerror"
subject   = "contextvars.ContextVar"
kind      = "semantic"
module    = "contextvars"
intent    = "resetting with a Token a second time (the Token was already consumed) raises RuntimeError"

[[case]]
dimension = "errors"
case      = "get_with_default_arg_no_raise"
subject   = "contextvars.ContextVar"
kind      = "semantic"
module    = "contextvars"
intent    = "get(default) on an unset ContextVar returns the supplied default instead of raising LookupError"

[[case]]
dimension = "errors"
case      = "set_then_get_no_raise"
subject   = "contextvars.ContextVar"
kind      = "semantic"
module    = "contextvars"
intent    = "set() then get() on a no-default ContextVar returns the set value without raising"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file; output matches CPython).
# ===========================================================================

# --- ContextVar create / name / default ----------------------------------

[[case]]
dimension = "behavior"
case      = "contextvar_name_attribute"
subject   = "contextvars.ContextVar"
kind      = "semantic"
module    = "contextvars"
intent    = "a freshly constructed ContextVar exposes its name via the read-only .name attribute"

[[case]]
dimension = "behavior"
case      = "default_returned_when_unset"
subject   = "contextvars.ContextVar"
kind      = "semantic"
module    = "contextvars"
intent    = "a ContextVar declared with default= returns that default from get() while no value is set"

# --- set / get / reset round-trip -----------------------------------------

[[case]]
dimension = "behavior"
case      = "set_returns_token_and_updates_value"
subject   = "contextvars.ContextVar"
kind      = "semantic"
module    = "contextvars"
intent    = "set(v) returns a contextvars.Token and get() afterwards returns v"

[[case]]
dimension = "behavior"
case      = "reset_restores_previous_value"
subject   = "contextvars.ContextVar"
kind      = "semantic"
module    = "contextvars"
intent    = "reset(token) restores the value the ContextVar held before the matching set()"

[[case]]
dimension = "behavior"
case      = "reset_to_unset_after_first_set"
subject   = "contextvars.ContextVar"
kind      = "semantic"
module    = "contextvars"
intent    = "reset(token) of the first-ever set on a no-default var returns it to the unset state, so get() raises LookupError again"

# --- Token introspection --------------------------------------------------

[[case]]
dimension = "behavior"
case      = "token_var_points_back"
subject   = "contextvars.Token"
kind      = "semantic"
module    = "contextvars"
intent    = "the Token returned by set() carries .var identical (is) to the ContextVar it came from"

[[case]]
dimension = "behavior"
case      = "token_old_value_missing_when_unset"
subject   = "contextvars.Token"
kind      = "semantic"
module    = "contextvars"
intent    = "the Token from the first set() of a previously-unset var has old_value identical to contextvars.Token.MISSING"

[[case]]
dimension = "behavior"
case      = "token_old_value_holds_previous"
subject   = "contextvars.Token"
kind      = "semantic"
module    = "contextvars"
intent    = "overwriting an already-set var yields a Token whose old_value is the prior value"

# --- multiple vars are independent ----------------------------------------

[[case]]
dimension = "behavior"
case      = "multiple_vars_independent"
subject   = "contextvars.ContextVar"
kind      = "semantic"
module    = "contextvars"
intent    = "two distinct ContextVars hold independent values; setting one does not change the other"

# --- copy_context / Context.run isolation ---------------------------------

[[case]]
dimension = "behavior"
case      = "copy_context_returns_context"
subject   = "contextvars.copy_context"
kind      = "semantic"
module    = "contextvars"
intent    = "copy_context() returns a contextvars.Context instance"

[[case]]
dimension = "behavior"
case      = "copy_context_snapshots_current_values"
subject   = "contextvars.Context"
kind      = "semantic"
module    = "contextvars"
intent    = "a Context captured by copy_context sees the value present at copy time, not a later overwrite, when run() reads the var"

[[case]]
dimension = "behavior"
case      = "context_run_writes_do_not_leak"
subject   = "contextvars.Context"
kind      = "semantic"
module    = "contextvars"
intent    = "a set() performed inside Context.run() is visible there but does not leak back into the outer context after run() returns"

[[case]]
dimension = "behavior"
case      = "context_iteration_yields_var_value_pairs"
subject   = "contextvars.Context"
kind      = "semantic"
module    = "contextvars"
intent    = "iterating a Context yields its ContextVar keys; dict(context) maps each captured var to its value, and membership-tests by var"

# --- thread isolation -----------------------------------------------------

[[case]]
dimension = "behavior"
case      = "thread_starts_with_own_context"
subject   = "contextvars.ContextVar"
kind      = "semantic"
module    = "contextvars"
intent    = "a new thread starts with its own context: it sees the var's default (not the main thread's set value), and its own writes do not leak back to main"

# ===========================================================================
# REAL_WORLD — semantic end-user integration scenario.
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "request_scoped_value_isolation"
subject   = "contextvars.ContextVar"
kind      = "semantic"
module    = "contextvars"
intent    = "request-scoped state: each simulated request runs its handler in its own copy_context so a per-request ContextVar (e.g. a request id) stays isolated across requests and never leaks into the surrounding scope"
