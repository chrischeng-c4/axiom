source    = "Lib/test/test_pathlib.py"

[[case]]
dimension = "behavior"
case      = "anchor_absolute_vs_relative"
subject   = "pathlib.Path"
kind      = "semantic"
intent    = "Path('/a/b').anchor == '/' (absolute root) while Path('a/b').anchor == '' (relative has no anchor)"
module    = "pathlib"
source    = "Lib/test/test_pathlib.py"

