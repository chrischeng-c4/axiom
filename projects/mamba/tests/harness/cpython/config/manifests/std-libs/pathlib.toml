# ===========================================================================
# ERRORS — mechanical (call + expect_exc; generator emits assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "read_text_missing_raises"
subject    = "pathlib.Path.read_text"
kind       = "mechanical"
call       = "pathlib.Path('/no/such/file/xyzzy_abc').read_text()"
expect_exc = "FileNotFoundError"
module     = "pathlib"
source     = "Lib/test/test_pathlib.py"

[[case]]
dimension  = "errors"
case       = "iterdir_missing_raises"
subject    = "pathlib.Path.iterdir"
kind       = "mechanical"
call       = "list(pathlib.Path('/no/such/dir/xyzzy_abc').iterdir())"
expect_exc = "FileNotFoundError"
module     = "pathlib"
source     = "Lib/test/test_pathlib.py"

[[case]]
dimension  = "errors"
case       = "unlink_missing_raises"
subject    = "pathlib.Path.unlink"
