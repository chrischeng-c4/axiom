# --- name/anchor parsing (from legacy surface.py value assertions) ---

[[case]]
dimension = "behavior"
case      = "name_stem_suffix_parts"
subject   = "pathlib.Path"
kind      = "semantic"
intent    = "Path('/tmp/test/file.txt') exposes name='file.txt', stem='file', suffix='.txt', parent=Path('/tmp/test'), parts=('/','a','b','c'), and str() round-trips"
module    = "pathlib"
source    = "Lib/test/test_pathlib.py"

[[case]]
dimension = "behavior"
case      = "suffixes_and_multi_suffix_stem"
subject   = "pathlib.Path"
kind      = "semantic"
intent    = "Path('file.tar.gz').suffixes == ['.tar', '.gz'] and its stem keeps all but the last suffix ('file.tar')"
module    = "pathlib"
source    = "Lib/test/test_pathlib.py"

[[case]]
dimension = "behavior"
case      = "with_suffix_name_stem"
subject   = "pathlib.Path"
kind      = "semantic"
intent    = "with_suffix/.with_name/.with_stem return new paths: file.txt.with_suffix('.csv')==file.csv, /tmp/old.txt.with_name('new.csv')==/tmp/new.csv, /a/b.tar.gz.with_stem('d')==/a/d.gz"
