# --- cohesive feature files (kept as one table each; high cohesion) ---

[[case]]
dimension = "behavior"
case      = "pure_path_parsing"
subject   = "pathlib.PurePath"
kind      = "semantic"
intent    = "PurePath parsing: anchor/root/drive on absolute vs relative, multi-arg and PurePath-instance constructors, the parent chain bottoming out at '.'/'/', the parents sequence (index/negative/slice/iterate/immutable), and name/stem/suffix dot edge cases"
module    = "pathlib"
source    = "Lib/test/test_pathlib.py"

[[case]]
dimension = "behavior"
case      = "purepath_match_patterns"
subject   = "pathlib.PurePosixPath.match"
kind      = "semantic"
intent    = "PurePath.match glob semantics: tail-matching of relative patterns, wildcards, leading-slash anchoring, '**' segment spanning, the case_sensitive flag, and empty-path vs '*'/'**' behavior"
module    = "pathlib"
source    = "Lib/test/test_pathlib.py"

[[case]]
dimension = "behavior"
case      = "posix_flavour_semantics"
subject   = "pathlib.PurePosixPath"
kind      = "semantic"
intent    = "POSIX-flavour rules: case sensitivity, single/double/triple-slash root handling, is_absolute, absolute-component reset on join, is_reserved always False, and coercion of a PureWindowsPath string form"
module    = "pathlib"
source    = "Lib/test/test_pathlib.py"

[[case]]
dimension = "behavior"
case      = "cross_flavour_inequality"
subject   = "pathlib.PurePosixPath"
kind      = "semantic"
intent    = "POSIX and Windows pure paths are never equal even with identical strings, ordering comparisons across flavours raise TypeError, the non-host concrete flavour cannot be instantiated, and path APIs reject bytes arguments"
module    = "pathlib"
source    = "Lib/test/test_pathlib.py"

[[case]]
dimension = "behavior"
case      = "serialization_roundtrip"
subject   = "pathlib.PurePath"
kind      = "semantic"
intent    = "Path serialization: pickle round-trips preserve class/value/hash/str across protocols, bytes()/os.fspath give the OS-encoded string, as_posix always uses forward slashes, as_uri percent-encodes absolute POSIX paths, and equality against foreign types is False without raising"
module    = "pathlib"
source    = "Lib/test/test_pathlib.py"
