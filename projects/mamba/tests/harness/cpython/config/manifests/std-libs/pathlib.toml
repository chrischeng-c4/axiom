# Manifest for the stdlib `pathlib` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/pathlib/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + paired-.expected golden shape (surface.py,
# behavior.py, errors.py, and the loose feature files flavours.py, matching.py,
# posix_semantics.py, pure_path.py, serialization.py, plus the trivial
# pathlib_ops.py/.expected import smoke test). bench/ is left as-is.
#
# Subject classes (Path / PurePath / PurePosixPath / PureWindowsPath /
# PosixPath / WindowsPath) are CapWords, so the import inferer stops before
# them — every case that touches a class sets an explicit `module = "pathlib"`
# (or an explicit `import`).

bucket = "std-libs"
lib = "pathlib"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable existence on the pathlib module)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_pathlib"
subject   = "pathlib"
kind      = "mechanical"
probe     = "attr"
attr      = "Path"

