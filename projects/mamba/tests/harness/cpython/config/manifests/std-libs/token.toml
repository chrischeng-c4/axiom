# Manifest for the stdlib `token` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/token/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py
# and the real_world/_stub.py placeholder. The token module is constant-only:
# integer token-type constants + the tok_name (int->name) and
# EXACT_TOKEN_TYPES (op-str->int) dicts + the ISTERMINAL / ISNONTERMINAL /
# ISEOF predicate callables. CPython 3.12 is the oracle. bench/ is kept as-is.

bucket = "std-libs"
lib    = "token"

# ===========================================================================
# SURFACE — mechanical probes (attr / type / callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_token"
subject   = "token"
kind      = "mechanical"
probe     = "attr"
attr      = "tok_name"

[[case]]
dimension = "surface"
case      = "tok_name_is_dict"
subject   = "token.tok_name"
kind      = "mechanical"
probe     = "type"
typename  = "dict"

[[case]]
dimension = "surface"
case      = "exact_token_types_is_dict"
subject   = "token.EXACT_TOKEN_TYPES"
kind      = "mechanical"
probe     = "type"
typename  = "dict"
module    = "token"

[[case]]
dimension = "surface"
case      = "name_is_int"
subject   = "token.NAME"
kind      = "mechanical"
probe     = "type"
typename  = "int"

[[case]]
dimension = "surface"
case      = "isterminal_is_callable"
subject   = "token.ISTERMINAL"
kind      = "mechanical"
probe     = "callable"
module    = "token"

[[case]]
dimension = "surface"
case      = "isnonterminal_is_callable"
subject   = "token.ISNONTERMINAL"
kind      = "mechanical"
probe     = "callable"
module    = "token"

[[case]]
dimension = "surface"
case      = "iseof_is_callable"
subject   = "token.ISEOF"
kind      = "mechanical"
probe     = "callable"
module    = "token"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc; assert-it-raised)
#
# The token module defines no exception classes of its own. The documented
# exception paths come from the dict-lookup and unknown-attribute surface.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "tok_name_unknown_key_raises_keyerror"
subject    = "token.tok_name"
kind       = "mechanical"
call       = "token.tok_name[99999]"
expect_exc = "KeyError"
source     = "Lib/token.py"

[[case]]
dimension  = "errors"
case       = "unknown_attribute_raises_attributeerror"
subject    = "token"
kind       = "mechanical"
call       = "token.NO_SUCH_TOKEN_XYZZY"
expect_exc = "AttributeError"
source     = "Lib/token.py"

# ===========================================================================
# BEHAVIOR — semantic (output matches CPython 3.12)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "token_constants_are_ints"
subject   = "token.NAME"
kind      = "semantic"
intent    = "the public token-type constants NAME/NUMBER/OP/STRING/ENDMARKER are plain ints"
source    = "Lib/token.py"

[[case]]
dimension = "behavior"
case      = "tok_name_maps_int_to_name"
subject   = "token.tok_name"
kind      = "semantic"
intent    = "tok_name is a dict mapping each token-type int back to its symbolic name (ENDMARKER=0, NAME=1)"
source    = "Lib/token.py"

[[case]]
dimension = "behavior"
case      = "exact_token_types_maps_op_to_int"
subject   = "token.EXACT_TOKEN_TYPES"
kind      = "semantic"
intent    = "EXACT_TOKEN_TYPES maps an operator string to its token-type int ('+' -> PLUS=14) and omits unknown operators"
source    = "Lib/token.py"
module    = "token"

[[case]]
dimension = "behavior"
case      = "isterminal_partitions_at_nt_offset"
subject   = "token.ISTERMINAL"
kind      = "semantic"
intent    = "ISTERMINAL is True below NT_OFFSET and False at/above it, the exact complement of ISNONTERMINAL"
source    = "Lib/token.py"
module    = "token"

[[case]]
dimension = "behavior"
case      = "iseof_only_for_endmarker"
subject   = "token.ISEOF"
kind      = "semantic"
intent    = "ISEOF is True only for the ENDMARKER type (0) and False for ordinary token types"
source    = "Lib/token.py"
module    = "token"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
#
# Promotes the legacy real_world/_stub.py placeholder to a meaningful flow:
# classify a stream of token-type ids the way a tokenizer consumer would.
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "classify_token_stream"
subject   = "token.tok_name"
kind      = "semantic"
intent    = "a tokenizer consumer names a stream of token-type ids via tok_name and partitions them by ISTERMINAL/ISEOF"
