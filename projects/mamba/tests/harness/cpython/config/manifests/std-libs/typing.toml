# Manifest for the stdlib `typing` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/typing/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py).
# The legacy surface/behavior monoliths were import-only stubs; the legacy
# errors monolith carried the real coverage (non-runtime Protocol isinstance,
# TypeVar bound+constraints, bad forward-ref get_type_hints, non-generic
# subscript, cast no-op, Final/List parameterization). Every legacy case is
# preserved below and the surface/behavior dimensions are filled out from the
# CPython 3.12 oracle so the tree is a proper one-case-per-file corpus.
#
# All subjects are rooted at the plain `typing` module (CapWords leaves like
# `typing.List` / `typing.TypeVar` still infer `import typing`), so no case
# needs an explicit `module=`/`import=`.

bucket = "std-libs"
lib = "typing"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_typing"
subject   = "typing"
kind      = "mechanical"
probe     = "attr"
attr      = "List"

