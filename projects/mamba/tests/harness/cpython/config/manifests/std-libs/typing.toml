# ===========================================================================
# ERRORS — mechanical (call + expect_exc, assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "typevar_bound_and_constraints_raises"
subject    = "typing.TypeVar"
kind       = "mechanical"
call       = "typing.TypeVar(\"T\", int, str, bound=int)"
expect_exc = "TypeError"
source     = "Lib/test/test_typing.py"

[[case]]
dimension  = "errors"
case       = "non_generic_subscript_raises"
subject    = "int"
kind       = "mechanical"
import     = "import typing  # noqa: F401"
call       = "int[\"x\"]"
expect_exc = "TypeError"
source     = "Lib/test/test_typing.py"

# ===========================================================================
# ERRORS — semantic (paths that need a defined Protocol / function / forward
# ref before the raising call, beyond the plain call/expect_exc template)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "non_runtime_protocol_isinstance_raises"
subject   = "typing.Protocol"
kind      = "semantic"
intent    = "isinstance against a Protocol that is NOT @runtime_checkable raises TypeError (instance checks need the @runtime_checkable decorator)"
source    = "Lib/test/test_typing.py"

[[case]]
dimension = "errors"
case      = "get_type_hints_bad_forward_ref_raises"
subject   = "typing.get_type_hints"
kind      = "semantic"
intent    = "get_type_hints on a function annotated with an unresolvable forward reference 'NoSuchType' raises NameError"
source    = "Lib/test/test_typing.py"

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- introspection: get_origin / get_args ---------------------------------

[[case]]
dimension = "behavior"
case      = "get_origin_list_is_list"
subject   = "typing.get_origin"
kind      = "semantic"
intent    = "get_origin(List[int]) is the runtime class list and get_origin(Dict[str, int]) is dict"
source    = "Lib/test/test_typing.py"

[[case]]
dimension = "behavior"
case      = "get_args_unpacks_parameters"
subject   = "typing.get_args"
kind      = "semantic"
intent    = "get_args unpacks the type parameters: List[int] -> (int,), Dict[str, int] -> (str, int), Union[int, str] -> (int, str)"
source    = "Lib/test/test_typing.py"

[[case]]
dimension = "behavior"
case      = "optional_is_union_with_none"
subject   = "typing.Optional"
kind      = "semantic"
intent    = "Optional[int] is exactly Union[int, None]; get_origin reports typing.Union and get_args reports (int, NoneType)"
source    = "Lib/test/test_typing.py"

# --- TypeVar ---------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "typevar_name_and_repr"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "a bare TypeVar('T') records its name in __name__ and has neither bound nor constraints"
source    = "Lib/test/test_typing.py"

[[case]]
dimension = "behavior"
case      = "typevar_bound_recorded"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "TypeVar('T', bound=int) records the upper bound on __bound__ and leaves __constraints__ empty"
source    = "Lib/test/test_typing.py"

[[case]]
dimension = "behavior"
case      = "typevar_constraints_recorded"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "TypeVar('T', int, str) records the constraint set (int, str) on __constraints__ and leaves __bound__ unset"
source    = "Lib/test/test_typing.py"

# --- Generic ---------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "generic_subclass_instantiates"
subject   = "typing.Generic"
kind      = "semantic"
intent    = "a Generic[T] subclass instantiates and stores its value at runtime; the type parameter is erased so behavior is plain Python"
source    = "Lib/test/test_typing.py"

[[case]]
dimension = "behavior"
case      = "generic_subscription_alias"
subject   = "typing.Generic"
kind      = "semantic"
intent    = "subscripting a Generic[T] subclass (Box[int]) yields a parameterized alias whose get_origin is the Box class and get_args is (int,)"
source    = "Lib/test/test_typing.py"

# --- NewType ---------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "newtype_is_identity_at_runtime"
subject   = "typing.NewType"
kind      = "semantic"
intent    = "NewType('UserId', int) is the identity function at runtime: UserId(5) == 5 and is a plain int; the name is exposed via __name__"
source    = "Lib/test/test_typing.py"

# --- cast ------------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "cast_returns_value_unchanged"
subject   = "typing.cast"
kind      = "semantic"
intent    = "cast is a runtime no-op: cast(int, 'not an int') returns the original string object unchanged, doing no conversion or validation"
source    = "Lib/test/test_typing.py"

# --- NamedTuple ------------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "namedtuple_fields_and_tuple_shape"
subject   = "typing.NamedTuple"
kind      = "semantic"
intent    = "a class-syntax NamedTuple (Point: x, y) builds an instance addressable by field name and by index, equal to the plain tuple of its values"
source    = "Lib/test/test_typing.py"

# --- get_type_hints --------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "get_type_hints_resolves_function"
subject   = "typing.get_type_hints"
kind      = "semantic"
intent    = "get_type_hints on a function returns a dict mapping each parameter and 'return' to its resolved runtime type (a: int, b: str, return: bool)"
source    = "Lib/test/test_typing.py"

# --- runtime_checkable Protocol --------------------------------------------

[[case]]
dimension = "behavior"
case      = "runtime_checkable_protocol_isinstance"
subject   = "typing.runtime_checkable"
kind      = "semantic"
intent    = "a @runtime_checkable Protocol declaring __len__ supports isinstance: a list satisfies it (True) while an int does not (False)"
source    = "Lib/test/test_typing.py"

# --- parameterized alias repr ----------------------------------------------

[[case]]
dimension = "behavior"
case      = "parameterized_alias_round_trip"
subject   = "typing.List"
kind      = "semantic"
intent    = "List[int] and Final[int] are subscriptable special forms; List[int] round-trips through get_origin (list) and get_args ((int,))"
source    = "Lib/test/test_typing.py"

# ===========================================================================
# REAL_WORLD — semantic (one end-to-end introspection walkthrough)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "annotation_introspection_walkthrough"
subject   = "typing"
kind      = "semantic"
intent    = "a downstream tool annotates a dataclass-style function with List/Dict/Optional/Union, then drives get_type_hints + get_origin + get_args to resolve and decompose every annotation into its runtime origin and parameters"
source    = "Lib/test/test_typing.py"
