# Manifest for the stdlib `pickle` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/std-libs/pickle/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py
# and the loose feature file untrusted_payload.py + real_world/_stub.py.
# CPython 3.12 is the oracle; bench/ is owned separately and untouched here.
#
# mamba gaps (src/runtime/stdlib/pickle_mod.rs): the pickle shim is a compact
# text format (NOT the CPython wire protocol) and supports only
# None/bool/int/float/str/list/tuple/str-keyed-dict. set/frozenset and custom
# classes serialize to "N"; dump/load are stubs (dump discards, load->None);
# Pickler/Unpickler construction is out of scope (class shells only); loads on
# bad input returns None instead of raising. Cases that exercise those gaps
# carry xfail so conformance skips mamba while CPython still gates the fixture.

bucket = "std-libs"
lib    = "pickle"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_pickle"
subject   = "pickle"
kind      = "mechanical"
probe     = "attr"
attr      = "dumps"

[[case]]
dimension = "surface"
case      = "dumps_is_callable"
subject   = "pickle.dumps"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "loads_is_callable"
subject   = "pickle.loads"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "dump_is_callable"
subject   = "pickle.dump"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "load_is_callable"
subject   = "pickle.load"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "pickler_is_attr"
subject   = "pickle"
kind      = "mechanical"
probe     = "attr"
attr      = "Pickler"

[[case]]
dimension = "surface"
case      = "unpickler_is_attr"
subject   = "pickle"
kind      = "mechanical"
probe     = "attr"
attr      = "Unpickler"

[[case]]
dimension = "surface"
case      = "picklingerror_is_attr"
subject   = "pickle"
kind      = "mechanical"
probe     = "attr"
attr      = "PicklingError"

[[case]]
dimension = "surface"
case      = "unpicklingerror_is_attr"
subject   = "pickle"
kind      = "mechanical"
probe     = "attr"
attr      = "UnpicklingError"

[[case]]
dimension = "surface"
case      = "highest_protocol_attr"
subject   = "pickle"
kind      = "mechanical"
probe     = "attr"
attr      = "HIGHEST_PROTOCOL"

[[case]]
dimension = "surface"
case      = "default_protocol_attr"
subject   = "pickle"
kind      = "mechanical"
probe     = "attr"
attr      = "DEFAULT_PROTOCOL"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc, assert-it-raised)
#
# mamba's loads/dumps return None / silent text instead of raising, so each
# errors case carries xfail (pickle shim has no raise paths).
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "truncated_stream_raises"
subject    = "pickle.loads"
kind       = "mechanical"
call       = "pickle.loads(b'\\x80')"
expect_exc = "pickle.UnpicklingError"
xfail      = "pickle shim returns None on bad input, never raises UnpicklingError (src/runtime/stdlib/pickle_mod.rs:324)"
source     = "Lib/test/test_pickle.py"

[[case]]
dimension  = "errors"
case       = "garbage_stream_raises"
subject    = "pickle.loads"
kind       = "mechanical"
call       = "pickle.loads(b'not_a_pickle_stream')"
expect_exc = "pickle.UnpicklingError"
xfail      = "pickle shim returns None on bad input, never raises UnpicklingError (src/runtime/stdlib/pickle_mod.rs:324)"
source     = "Lib/test/test_pickle.py"

[[case]]
dimension  = "errors"
case       = "lambda_raises"
subject    = "pickle.dumps"
kind       = "mechanical"
call       = "pickle.dumps(lambda x: x)"
expect_exc = "(pickle.PicklingError, AttributeError)"
xfail      = "pickle shim serializes unsupported objects to the 'N' (None) sentinel instead of raising PicklingError (src/runtime/stdlib/pickle_mod.rs:220)"
source     = "Lib/test/test_pickle.py"

[[case]]
dimension  = "errors"
case       = "generator_raises"
subject    = "pickle.dumps"
kind       = "mechanical"
call       = "pickle.dumps(i for i in range(3))"
expect_exc = "(TypeError, pickle.PicklingError)"
xfail      = "pickle shim serializes unsupported objects to the 'N' (None) sentinel instead of raising (src/runtime/stdlib/pickle_mod.rs:220)"
source     = "Lib/test/test_pickle.py"

[[case]]
dimension  = "errors"
case       = "bad_protocol_raises"
subject    = "pickle.dumps"
kind       = "mechanical"
call       = "pickle.dumps('hi', protocol=99)"
expect_exc = "ValueError"
xfail      = "pickle shim ignores the protocol kwarg and never validates it (src/runtime/stdlib/pickle_mod.rs:318)"
source     = "Lib/test/test_pickle.py"

# ===========================================================================
# BEHAVIOR — semantic (output matches CPython 3.12)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "dumps_returns_bytes_with_protocol_header"
subject   = "pickle.dumps"
kind      = "semantic"
intent    = "pickle.dumps returns a bytes object whose first byte is the protocol-2+ opcode marker b'\\x80', and loads round-trips the value"
xfail     = "pickle shim emits a non-CPython text format with no b'\\x80' header byte (src/runtime/stdlib/pickle_mod.rs:318)"
source    = "Lib/test/test_pickle.py"

[[case]]
dimension = "behavior"
case      = "primitive_roundtrip_preserves_type"
subject   = "pickle.loads"
kind      = "semantic"
intent    = "every primitive (int/float/bool/None/str including unicode/bytes including empty) round-trips through dumps+loads equal to itself and with its exact type preserved"
xfail     = "pickle shim has no bytes serialization branch; bytes serialize to the 'N' sentinel (src/runtime/stdlib/pickle_mod.rs:220)"
source    = "Lib/test/test_pickle.py"

[[case]]
dimension = "behavior"
case      = "container_roundtrip"
subject   = "pickle.loads"
kind      = "semantic"
intent    = "list/tuple/dict (incl. nested) round-trip through dumps+loads equal to the original, including a list-of-lists with mixed depth"
source    = "Lib/test/test_pickle.py"

[[case]]
dimension = "behavior"
case      = "tuple_type_preserved"
subject   = "pickle.loads"
kind      = "semantic"
intent    = "a tuple round-trips as a tuple (not a list): pickle.loads(pickle.dumps((1,'a',True))) is a tuple and equals the original"
source    = "Lib/test/test_pickle.py"

[[case]]
dimension = "behavior"
case      = "frozenset_roundtrip"
subject   = "pickle.loads"
kind      = "semantic"
intent    = "a frozenset round-trips through dumps+loads equal to the original frozenset"
xfail     = "pickle shim has no set/frozenset serialization branch; sets serialize to the 'N' sentinel (src/runtime/stdlib/pickle_mod.rs:220)"
source    = "Lib/test/test_pickle.py"

[[case]]
dimension = "behavior"
case      = "deep_nested_roundtrip"
subject   = "pickle.loads"
kind      = "semantic"
intent    = "a deeply nested dict-of-dict-of-list-of-dict round-trips through dumps+loads equal to the original"
source    = "Lib/test/test_pickle.py"

[[case]]
dimension = "behavior"
case      = "protocol_selection_roundtrip"
subject   = "pickle.dumps"
kind      = "semantic"
intent    = "dumping with an explicit protocol (0 ASCII and 2 binary) and loading back reconstructs the original dict equal to itself"
xfail     = "pickle shim ignores the protocol kwarg and emits one fixed text format (src/runtime/stdlib/pickle_mod.rs:318)"
source    = "Lib/test/test_pickle.py"

[[case]]
dimension = "behavior"
case      = "custom_class_default_roundtrip"
subject   = "pickle.loads"
kind      = "semantic"
intent    = "a plain user class with instance attributes round-trips via default pickling: the reconstructed object is an instance of the class and compares equal by attributes"
xfail     = "pickle shim serializes Instance objects to the 'N' sentinel; default user-class pickling is unsupported (src/runtime/stdlib/pickle_mod.rs:220)"
source    = "Lib/test/test_pickle.py"

[[case]]
dimension = "behavior"
case      = "custom_reduce_roundtrip"
subject   = "pickle.loads"
kind      = "semantic"
intent    = "a class defining __reduce__ controls its own reconstruction: the round-tripped instance equals the original via the reduce-provided constructor args"
xfail     = "pickle shim does not consult __reduce__ and serializes Instance objects to the 'N' sentinel (src/runtime/stdlib/pickle_mod.rs:220)"
source    = "Lib/test/test_pickle.py"

[[case]]
dimension = "behavior"
case      = "shared_object_memo"
subject   = "pickle.loads"
kind      = "semantic"
intent    = "a structure that references the same list object twice survives a dumps+loads round-trip: both positions reconstruct equal to the shared value"
source    = "Lib/test/test_pickle.py"

[[case]]
dimension = "behavior"
case      = "pickler_unpickler_roundtrip"
subject   = "pickle.Pickler"
kind      = "semantic"
intent    = "the streaming API round-trips a dict: a Pickler over a BytesIO writes via dump, and an Unpickler over the rewound buffer reconstructs it via load equal to the original"
module    = "pickle"
xfail     = "pickle.Pickler/Unpickler are class shells; construction is out of scope (src/runtime/stdlib/pickle_mod.rs:50-54)"
source    = "Lib/test/test_pickle.py"

[[case]]
dimension = "behavior"
case      = "dump_load_file_roundtrip"
subject   = "pickle.dump"
kind      = "semantic"
intent    = "pickle.dump writes a value into a BytesIO file object and pickle.load reads it back from the rewound buffer equal to the original"
xfail     = "pickle.dump is a stub that discards its output and pickle.load returns None (src/runtime/stdlib/pickle_mod.rs:346-353)"
source    = "Lib/test/test_pickle.py"

[[case]]
dimension = "behavior"
case      = "error_class_hierarchy"
subject   = "pickle.PickleError"
kind      = "semantic"
intent    = "PicklingError and UnpicklingError are both subclasses of pickle.PickleError"
module    = "pickle"
source    = "Lib/test/test_pickle.py"

# ===========================================================================
# REAL_WORLD — semantic (end-user serialization flow)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "config_snapshot_roundtrip"
subject   = "pickle"
kind      = "semantic"
intent    = "a settings layer serializes a nested config dict (str keys; int/str/bool/list/tuple/nested-dict values) with pickle.dumps and reloads it with pickle.loads, asserting the reloaded snapshot equals the original and a derived aggregate is stable"
source    = "Lib/test/test_pickle.py"

# ===========================================================================
# SECURITY — semantic (adversarial / untrusted input)
# ===========================================================================

[[case]]
dimension = "security"
case      = "restricted_unpickler_allowlist"
subject   = "pickle.Unpickler"
kind      = "semantic"
intent    = "a RestrictedUnpickler subclass overriding find_class with a deny-by-default allowlist blocks hostile GLOBAL references (os.system, builtins.eval) by raising UnpicklingError before resolution, while permitting allowlisted globals (builtins.set) and pure-data payloads to round-trip"
module    = "pickle"
xfail     = "pickle.Unpickler is a class shell only; construction and the find_class trust-boundary hook are out of scope (src/runtime/stdlib/pickle_mod.rs:50-54)"
source    = "Lib/test/test_pickle.py"
