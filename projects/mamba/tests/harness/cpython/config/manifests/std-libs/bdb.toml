# Manifest for the stdlib `bdb` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/bdb/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py).
# bench/ (bdb_type_read_hot.py, perf-pin #1261) and the real_world/ placeholder
# are replaced by a real real_world walkthrough; bench/ is left as-is.
#
# xfail rationale: mamba's `bdb` is a near-empty stub. `bdb.Bdb()` returns a
# dict-like object with no debugger methods (no runcall / runeval / set_break /
# get_break / breaks dict), `bdb.BdbQuit` is not a real Exception subclass,
# and `bdb.checkfuncname` / `Breakpoint.bplist` are absent. Confirmed against
# the installed mamba binary (2026-05-29); see
# project_mamba_stdlib_stub_audit_2026_05_26 (silent-stub audit) and the bdb
# perf pin #1261. The handful of probes that DO pass (import / class callable /
# BdbQuit & Breakpoint & set_trace attr presence / Bdb < object / skip default
# None) carry no xfail.

bucket = "std-libs"
lib = "bdb"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_bdb"
subject   = "bdb"
kind      = "mechanical"
probe     = "attr"
attr      = "Bdb"

[[case]]
dimension = "surface"
case      = "bdb_class_is_callable"
subject   = "bdb.Bdb"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "bdbquit_attr_present"
subject   = "bdb"
kind      = "mechanical"
probe     = "attr"
attr      = "BdbQuit"

[[case]]
dimension = "surface"
case      = "breakpoint_attr_present"
subject   = "bdb"
kind      = "mechanical"
probe     = "attr"
attr      = "Breakpoint"

[[case]]
dimension = "surface"
case      = "set_trace_attr_present"
subject   = "bdb"
kind      = "mechanical"
probe     = "attr"
attr      = "set_trace"

[[case]]
dimension = "surface"
case      = "checkfuncname_is_callable"
subject   = "bdb.checkfuncname"
kind      = "mechanical"
probe     = "callable"
xfail     = "mamba bdb stub: checkfuncname absent (#1261; stdlib-stub-audit 2026-05-26)"

[[case]]
dimension = "surface"
case      = "bdb_runcall_is_callable"
subject   = "bdb.Bdb.runcall"
kind      = "mechanical"
probe     = "callable"
module    = "bdb"
xfail     = "mamba bdb stub: Bdb has no runcall method (#1261; stdlib-stub-audit 2026-05-26)"

[[case]]
dimension = "surface"
case      = "bdbquit_is_exception_type"
subject   = "bdb.BdbQuit"
kind      = "mechanical"
probe     = "type"
typename  = "type"
module    = "bdb"
xfail     = "mamba bdb stub: BdbQuit is not a real Exception subclass (#1261)"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc, self-asserting)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "runeval_syntax_error_raises"
subject    = "bdb.Bdb.runeval"
kind       = "mechanical"
call       = "bdb.Bdb().runeval('def 0bad():')"
expect_exc = "SyntaxError"
module     = "bdb"
source     = "Lib/test/test_bdb.py"
xfail      = "mamba bdb stub: Bdb() is dict-like, no runeval method (#1261)"

[[case]]
dimension  = "errors"
case       = "get_bpbynumber_non_numeric_raises"
subject    = "bdb.Bdb.get_bpbynumber"
kind       = "mechanical"
call       = "bdb.Bdb().get_bpbynumber('not_a_number')"
expect_exc = "ValueError"
module     = "bdb"
source     = "Lib/test/test_bdb.py"
xfail      = "mamba bdb stub: Bdb() is dict-like, no get_bpbynumber method (#1261)"

[[case]]
dimension  = "errors"
case       = "get_bpbynumber_out_of_range_raises"
subject    = "bdb.Bdb.get_bpbynumber"
kind       = "mechanical"
call       = "bdb.Bdb().get_bpbynumber(9999)"
expect_exc = "ValueError"
module     = "bdb"
source     = "Lib/test/test_bdb.py"
xfail      = "mamba bdb stub: Bdb() is dict-like, no get_bpbynumber method (#1261)"

# ===========================================================================
# BEHAVIOR — semantic (agent-filled bodies ported from the legacy monoliths)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "bdbquit_subclasses_exception"
subject   = "bdb.BdbQuit"
kind      = "semantic"
intent    = "BdbQuit is an Exception subclass usable for cleanly aborting a debug session"
module    = "bdb"
xfail     = "mamba bdb stub: BdbQuit is not a real Exception subclass (#1261)"

[[case]]
dimension = "behavior"
case      = "skip_default_is_none"
subject   = "bdb.Bdb"
kind      = "semantic"
intent    = "a freshly constructed Bdb has skip == None (no skip patterns configured)"

[[case]]
dimension = "behavior"
case      = "runcall_returns_function_result"
subject   = "bdb.Bdb.runcall"
kind      = "semantic"
intent    = "runcall runs a function under the debugger and returns its result (a Bdb subclass that set_continue()s on each line returns 42 from a lambda)"
module    = "bdb"
xfail     = "mamba bdb stub: Bdb has no runcall method (#1261)"

[[case]]
dimension = "behavior"
case      = "runcall_passes_arguments"
subject   = "bdb.Bdb.runcall"
kind      = "semantic"
intent    = "runcall forwards positional arguments to the traced function: runcall(add, 10, 20) returns 30"
module    = "bdb"
xfail     = "mamba bdb stub: Bdb has no runcall method (#1261)"

[[case]]
dimension = "behavior"
case      = "user_line_called_per_line"
subject   = "bdb.Bdb.user_line"
kind      = "semantic"
intent    = "the debugger invokes user_line at least once while tracing a multi-statement function, and runcall still returns the correct result"
module    = "bdb"
xfail     = "mamba bdb stub: Bdb has no runcall/user_line tracing (#1261)"

[[case]]
dimension = "behavior"
case      = "set_quit_aborts_and_returns_none"
subject   = "bdb.Bdb.set_quit"
kind      = "semantic"
intent    = "set_quit() during tracing aborts the run (runcall returns None) and sets the quitting flag True"
module    = "bdb"
xfail     = "mamba bdb stub: Bdb has no runcall/set_quit (#1261)"

[[case]]
dimension = "behavior"
case      = "runeval_evaluates_expression"
subject   = "bdb.Bdb.runeval"
kind      = "semantic"
intent    = "runeval evaluates an expression under the debugger and returns its value: runeval('1 + 2 + 3') is 6"
module    = "bdb"
xfail     = "mamba bdb stub: Bdb has no runeval method (#1261)"

[[case]]
dimension = "behavior"
case      = "user_return_receives_retval"
subject   = "bdb.Bdb.user_return"
kind      = "semantic"
intent    = "user_return fires when a traced function returns and receives the return value (the recorded returns list contains the function's result)"
module    = "bdb"
xfail     = "mamba bdb stub: Bdb has no runcall/user_return tracing (#1261)"

[[case]]
dimension = "behavior"
case      = "set_break_clear_all_roundtrip"
subject   = "bdb.Bdb.set_break"
kind      = "semantic"
intent    = "breaks starts empty, set_break on a real source line populates it, and clear_all_breaks empties it again"
module    = "bdb"
xfail     = "mamba bdb stub: Bdb() is dict-like, no breaks/set_break/clear_all_breaks (#1261)"

[[case]]
dimension = "behavior"
case      = "get_break_missing_returns_false"
subject   = "bdb.Bdb.get_break"
kind      = "semantic"
intent    = "get_break for a file/line with no breakpoint returns False (no raise)"
module    = "bdb"
xfail     = "mamba bdb stub: Bdb() is dict-like, no get_break method (#1261)"

[[case]]
dimension = "behavior"
case      = "set_break_invalid_file_returns_error_string"
subject   = "bdb.Bdb.set_break"
kind      = "semantic"
intent    = "set_break on a nonexistent file returns an error string rather than raising"
