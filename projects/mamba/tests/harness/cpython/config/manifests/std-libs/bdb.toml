xfail     = "mamba bdb stub: Bdb() is dict-like, no clear_break method (#1261)"

[[case]]
dimension = "behavior"
case      = "breakpoint_bplist_initially_empty"
subject   = "bdb.Breakpoint"
kind      = "semantic"
intent    = "the class-level Breakpoint.bplist registry is an empty dict before any breakpoint is created"
module    = "bdb"
xfail     = "mamba bdb stub: Breakpoint.bplist is None, not an empty dict (#1261)"

# ===========================================================================
# REAL_WORLD — semantic (end-user debugger-driver walkthrough)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "tracing_debugger_session_walkthrough"
subject   = "bdb.Bdb"
kind      = "semantic"
intent    = "a downstream consumer subclasses Bdb to drive a real trace session: runcall a function with args, count user_line / user_return callbacks, capture the return value, and set/clear a breakpoint on a temp source file"
module    = "bdb"
source    = "Lib/test/test_bdb.py"
xfail     = "mamba bdb stub: Bdb() is dict-like, no debugger methods (#1261)"
