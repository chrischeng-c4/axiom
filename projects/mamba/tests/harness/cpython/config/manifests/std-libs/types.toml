# Manifest for the stdlib `types` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/types/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, class_creation.py, coroutine.py, simplenamespace.py,
# union.py, real_world/_stub.py). bench/ is left as-is.
#
# Method/exception subjects (types.SimpleNamespace.*, types.MappingProxyType.*,
# types.UnionType.*) would make the import inferer stop at the first CapWords
# component and emit a non-importable `import types.SimpleNamespace`, so each
# such case sets an explicit `module`/`import`.

bucket = "std-libs"
lib = "types"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_types"
subject   = "types"
kind      = "mechanical"
probe     = "attr"
attr      = "SimpleNamespace"

[[case]]
dimension = "surface"
case      = "simplenamespace_is_callable"
subject   = "types.SimpleNamespace"
kind      = "mechanical"
probe     = "callable"
module    = "types"

[[case]]
dimension = "surface"
case      = "new_class_is_callable"
subject   = "types.new_class"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "prepare_class_is_callable"
subject   = "types.prepare_class"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "resolve_bases_is_callable"
subject   = "types.resolve_bases"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "coroutine_is_callable"
subject   = "types.coroutine"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "mappingproxytype_is_callable"
subject   = "types.MappingProxyType"
kind      = "mechanical"
probe     = "callable"
module    = "types"

[[case]]
dimension = "surface"
case      = "uniontype_is_a_type"
subject   = "types.UnionType"
kind      = "mechanical"
probe     = "type"
typename  = "type"
module    = "types"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc) and one semantic path
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "simplenamespace_positional_arg_raises"
subject    = "types.SimpleNamespace"
kind       = "mechanical"
call       = "types.SimpleNamespace(1, 2)"
expect_exc = "TypeError"
module     = "types"
source     = "Lib/test/test_types.py"

[[case]]
dimension  = "errors"
case       = "new_class_bad_metaclass_raises"
subject    = "types.new_class"
kind       = "mechanical"
call       = "types.new_class('X', (object,), {'metaclass': 'not_a_class'})"
expect_exc = "TypeError"
source     = "Lib/test/test_types.py"

[[case]]
dimension  = "errors"
case       = "mappingproxy_setitem_raises"
subject    = "types.MappingProxyType"
kind       = "mechanical"
call       = "operator.setitem(types.MappingProxyType({'a': 1}), 'b', 2)"
expect_exc = "TypeError"
import     = "import operator, types"
source     = "Lib/test/test_types.py"

[[case]]
dimension  = "errors"
case       = "mappingproxy_delitem_raises"
subject    = "types.MappingProxyType"
kind       = "mechanical"
call       = "operator.delitem(types.MappingProxyType({'a': 1}), 'a')"
expect_exc = "TypeError"
import     = "import operator, types"
source     = "Lib/test/test_types.py"

[[case]]
dimension = "errors"
case      = "coroutine_wrapped_arg_mismatch_raises"
subject   = "types.coroutine"
kind      = "semantic"
intent    = "coroutine() returns a wrapper that forwards the call to the wrapped plain function, so calling it with an extra positional arg the function does not accept raises TypeError"
module    = "types"
source    = "Lib/test/test_types.py"

[[case]]
dimension = "errors"
case      = "union_wrong_arity_substitution_raises"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "substituting the wrong number of parameters into a parameterized union (int | T)[int, str] raises TypeError"
module    = "types"
source    = "Lib/test/test_types.py"

