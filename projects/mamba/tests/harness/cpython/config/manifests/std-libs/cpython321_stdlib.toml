# Nested structures roundtrip identically
data = {"users": [{"name": "Alice", "age": 30}, {"name": "Bob", "age": 25}], "count": 2}
assert json.loads(json.dumps(data)) == data; _ledger.append(1)

nested = [[1, 2], [3, [4, 5, [6]]]]
