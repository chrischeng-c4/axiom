_ledger.append(1)

unpacked, = struct.unpack(">d", packed)
assert unpacked == 1.5, f"unpack('>d', ...) == 1.5, got {unpacked}"
_ledger.append(1)

# calcsize for the formats this seed touches
assert struct.calcsize(">I") == 4, "calcsize('>I') == 4"
_ledger.append(1)

assert struct.calcsize(">Q") == 8, "calcsize('>Q') == 8"
_ledger.append(1)

