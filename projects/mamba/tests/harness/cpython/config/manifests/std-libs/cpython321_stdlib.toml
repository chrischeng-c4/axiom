assert str(calls2[0]) == "2"; _ledger.append(1)
s4 = g(1)
assert s4 == 101; _ledger.append(1)
assert str(calls2[0]) == "2"; _ledger.append(1)

print(f"MAMBA_ASSERTION_PASS: test_functools_cache_hit_count_ops {sum(_ledger)} asserts")
