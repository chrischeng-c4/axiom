assert pickle.loads(pickle.dumps([])) == []; _ledger.append(1)
assert pickle.loads(pickle.dumps({})) == {}; _ledger.append(1)
assert pickle.loads(pickle.dumps(())) == (); _ledger.append(1)
assert pickle.loads(pickle.dumps("")) == ""; _ledger.append(1)

# Single-element containers round-trip
assert pickle.loads(pickle.dumps([42])) == [42]; _ledger.append(1)
