assert unicodedata.normalize("NFKD", "abc") == "abc"; _ledger.append(1)
assert unicodedata.normalize("NFC", "hello") == "hello"; _ledger.append(1)
assert unicodedata.normalize("NFD", "world") == "world"; _ledger.append(1)

