# Manifest for the stdlib `sqlite3` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/sqlite3/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py)
# into one-case files. bench/ (parse_flags_const_read_hot) and the real_world/
# _stub.py placeholder are left as-is.
#
# Import-inference note: every subject under `sqlite3.Connection` /
# `sqlite3.Cursor` / `sqlite3.Row` (a CapWords component) would otherwise stop
# the inferer before reaching an importable module, so those cases set an
# explicit `module = "sqlite3"`.

bucket = "std-libs"
lib = "sqlite3"

# ===========================================================================
# SURFACE — mechanical probes (callable / not_callable / attr / type)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_sqlite3"
subject   = "sqlite3"
kind      = "mechanical"
probe     = "attr"
attr      = "connect"

[[case]]
dimension = "surface"
case      = "connect_is_callable"
subject   = "sqlite3.connect"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "connection_class_is_callable"
subject   = "sqlite3.Connection"
kind      = "mechanical"
probe     = "callable"
module    = "sqlite3"

[[case]]
dimension = "surface"
case      = "cursor_class_is_callable"
subject   = "sqlite3.Cursor"
kind      = "mechanical"
probe     = "callable"
module    = "sqlite3"

[[case]]
dimension = "surface"
case      = "row_class_is_callable"
subject   = "sqlite3.Row"
kind      = "mechanical"
probe     = "callable"
module    = "sqlite3"

[[case]]
dimension = "surface"
case      = "parse_decltypes_attr"
subject   = "sqlite3"
kind      = "mechanical"
probe     = "attr"
attr      = "PARSE_DECLTYPES"

[[case]]
dimension = "surface"
case      = "parse_colnames_attr"
subject   = "sqlite3"
kind      = "mechanical"
probe     = "attr"
attr      = "PARSE_COLNAMES"

[[case]]
dimension = "surface"
case      = "error_class_attr"
subject   = "sqlite3"
kind      = "mechanical"
probe     = "attr"
attr      = "Error"

[[case]]
dimension = "surface"
case      = "operationalerror_class_attr"
subject   = "sqlite3"
kind      = "mechanical"
probe     = "attr"
attr      = "OperationalError"

[[case]]
dimension = "surface"
case      = "integrityerror_class_attr"
subject   = "sqlite3"
kind      = "mechanical"
probe     = "attr"
attr      = "IntegrityError"

[[case]]
dimension = "surface"
case      = "databaseerror_class_attr"
subject   = "sqlite3"
kind      = "mechanical"
probe     = "attr"
attr      = "DatabaseError"

[[case]]
dimension = "surface"
case      = "programmingerror_class_attr"
subject   = "sqlite3"
kind      = "mechanical"
probe     = "attr"
attr      = "ProgrammingError"

[[case]]
dimension = "surface"
case      = "execute_method_is_callable"
subject   = "sqlite3.Cursor.execute"
kind      = "mechanical"
probe     = "callable"
module    = "sqlite3"

[[case]]
dimension = "surface"
case      = "executemany_method_is_callable"
subject   = "sqlite3.Cursor.executemany"
kind      = "mechanical"
