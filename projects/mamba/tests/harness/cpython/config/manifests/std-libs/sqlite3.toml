# ===========================================================================
# SURFACE — semantic (live object construction + type/isinstance checks that
# go beyond the plain mechanical probe template)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "connect_returns_connection_instance"
subject   = "sqlite3.connect"
kind      = "semantic"
intent    = "connect(':memory:') returns an instance of sqlite3.Connection, whose .cursor() returns an instance of sqlite3.Cursor"

[[case]]
dimension = "surface"
case      = "error_hierarchy_subclassing"
subject   = "sqlite3.Error"
kind      = "semantic"
intent    = "the documented exception hierarchy holds: Error subclasses Exception; DatabaseError/OperationalError/IntegrityError/ProgrammingError/DataError/InterfaceError all subclass Error; the *Error DB-API exceptions subclass DatabaseError"
module    = "sqlite3"

# ===========================================================================
# ERRORS — mechanical (single self-contained call + expect_exc)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "connect_directory_raises"
subject    = "sqlite3.connect"
kind       = "mechanical"
call       = "sqlite3.connect(\"/\")"
expect_exc = "sqlite3.OperationalError"

[[case]]
dimension  = "errors"
case       = "bad_sql_raises"
subject    = "sqlite3.Connection"
kind       = "mechanical"
call       = "sqlite3.connect(\":memory:\").execute(\"NOT VALID SQL\")"
expect_exc = "sqlite3.OperationalError"
module     = "sqlite3"

[[case]]
dimension  = "errors"
case       = "missing_table_raises"
subject    = "sqlite3.Connection"
kind       = "mechanical"
call       = "sqlite3.connect(\":memory:\").execute(\"SELECT * FROM nope_table\")"
expect_exc = "sqlite3.OperationalError"
module     = "sqlite3"

# ===========================================================================
# ERRORS — semantic (cases needing setup before the raising call, plus the
# subclass-relationship assertions ported from the legacy errors monolith)
# ===========================================================================

[[case]]
dimension = "errors"
case      = "primary_key_violation_raises_integrityerror"
subject   = "sqlite3.Cursor"
kind      = "semantic"
intent    = "inserting a duplicate PRIMARY KEY value raises sqlite3.IntegrityError (a DatabaseError subclass)"
module    = "sqlite3"

[[case]]
dimension = "errors"
case      = "wrong_param_count_raises_programmingerror"
subject   = "sqlite3.Cursor"
kind      = "semantic"
intent    = "binding the wrong number of '?' parameters raises sqlite3.ProgrammingError"
module    = "sqlite3"

[[case]]
dimension = "errors"
case      = "not_null_constraint_raises_integrityerror"
subject   = "sqlite3.Cursor"
kind      = "semantic"
intent    = "inserting NULL into a NOT NULL column raises sqlite3.IntegrityError"
module    = "sqlite3"

# ===========================================================================
# BEHAVIOR — semantic (one observable DB-API rule each, ported from the
# legacy behavior monolith)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "commit_persists_rollback_discards"
subject   = "sqlite3.Connection"
kind      = "semantic"
intent    = "a committed INSERT persists while a subsequent uncommitted INSERT is discarded by rollback(); the surviving row count is 1"
module    = "sqlite3"

[[case]]
dimension = "behavior"
case      = "qmark_parameter_binding"
subject   = "sqlite3.Cursor"
kind      = "semantic"
intent    = "'?' positional placeholders bind a tuple of values into INSERT/SELECT so the round-tripped value matches"
module    = "sqlite3"

[[case]]
dimension = "behavior"
case      = "named_parameter_binding"
subject   = "sqlite3.Cursor"
kind      = "semantic"
intent    = "':name' named placeholders bind a dict of values into INSERT/SELECT so the round-tripped value matches"
module    = "sqlite3"

[[case]]
dimension = "behavior"
case      = "context_manager_commits_on_success"
subject   = "sqlite3.Connection"
kind      = "semantic"
intent    = "using the connection as a context manager auto-commits the enclosed writes when the block exits normally"
module    = "sqlite3"

[[case]]
dimension = "behavior"
case      = "context_manager_rolls_back_on_exception"
subject   = "sqlite3.Connection"
kind      = "semantic"
intent    = "when an exception escapes the connection context-manager block, the enclosed writes are rolled back and the exception re-raised"
module    = "sqlite3"

[[case]]
dimension = "behavior"
case      = "fetchmany_returns_at_most_size_rows"
subject   = "sqlite3.Cursor"
kind      = "semantic"
intent    = "fetchmany(size) returns at most `size` rows from the result set, in order"
module    = "sqlite3"

[[case]]
dimension = "behavior"
case      = "cursor_iteration_yields_rows"
subject   = "sqlite3.Cursor"
kind      = "semantic"
intent    = "iterating a cursor after execute() yields each result row in order, one at a time"
module    = "sqlite3"

[[case]]
dimension = "behavior"
case      = "null_roundtrips_as_none"
subject   = "sqlite3.Connection"
kind      = "semantic"
intent    = "SQL NULL values are stored and retrieved as Python None for both TEXT and INTEGER columns"
module    = "sqlite3"

[[case]]
dimension = "behavior"
case      = "lastrowid_reports_inserted_rowid"
subject   = "sqlite3.Cursor"
kind      = "semantic"
intent    = "cursor.lastrowid reports the rowid of the most recently inserted row"
module    = "sqlite3"

[[case]]
dimension = "behavior"
case      = "rowcount_reports_affected_rows"
subject   = "sqlite3.Cursor"
kind      = "semantic"
intent    = "cursor.rowcount reports the number of rows affected by an UPDATE"
module    = "sqlite3"

[[case]]
dimension = "behavior"
case      = "executemany_inserts_each_row"
subject   = "sqlite3.Cursor"
kind      = "semantic"
intent    = "executemany(sql, seq) runs the statement once per parameter tuple; the row count reflects every inserted tuple"
module    = "sqlite3"

[[case]]
dimension = "behavior"
case      = "row_factory_enables_named_access"
subject   = "sqlite3.Row"
kind      = "semantic"
intent    = "setting connection.row_factory = sqlite3.Row lets fetched rows be indexed by column name as well as by position"
module    = "sqlite3"
