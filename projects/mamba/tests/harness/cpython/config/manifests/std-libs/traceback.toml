# ===========================================================================
# ERRORS — mechanical (call + expect_exc; generator emits assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "format_exception_non_exception_raises"
subject    = "traceback.format_exception"
kind       = "mechanical"
call       = "traceback.format_exception(42)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "format_exception_mixed_args_raises"
subject    = "traceback.format_exception"
kind       = "mechanical"
call       = "traceback.format_exception(Exception, Exception('x'))"
expect_exc = "ValueError"

[[case]]
dimension  = "errors"
case       = "extract_tb_non_traceback_raises"
subject    = "traceback.extract_tb"
kind       = "mechanical"
call       = "traceback.extract_tb(123)"
expect_exc = "AttributeError"

[[case]]
dimension  = "errors"
case       = "stacksummary_from_list_bad_entry_raises"
subject    = "traceback.StackSummary"
kind       = "mechanical"
call       = "traceback.StackSummary.from_list([42]).format()"
expect_exc = "TypeError"
module     = "traceback"

# ===========================================================================
# BEHAVIOR — semantic (one observable rule each; agent-filled)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "format_exception_only_renders_type_and_message"
subject   = "traceback.format_exception_only"
kind      = "semantic"
intent    = "format_exception_only(ValueError, ValueError('bad value')) returns a single line 'ValueError: bad value\\n'"

[[case]]
dimension = "behavior"
case      = "format_exception_only_bare_baseexception_type_only"
subject   = "traceback.format_exception_only"
kind      = "semantic"
intent    = "a BaseException with no message (KeyboardInterrupt()) renders type-only ['KeyboardInterrupt\\n'] with no trailing ': message'"

[[case]]
dimension = "behavior"
case      = "format_exception_only_swallows_broken_str"
subject   = "traceback.format_exception_only"
kind      = "semantic"
intent    = "when an exception's __str__ raises, format_exception_only swallows it and renders '<exception str() failed>' on a single line"

[[case]]
dimension = "behavior"
case      = "format_exception_only_syntaxerror_three_lines"
subject   = "traceback.format_exception_only"
kind      = "semantic"
intent    = "a SyntaxError with (file, line, col, text) renders three lines: File location, the source line ('bad syntax'), then 'SyntaxError: error\\n'"

[[case]]
dimension = "behavior"
case      = "format_exc_captures_active_exception"
subject   = "traceback.format_exc"
kind      = "semantic"
intent    = "inside an except block, format_exc() includes the 'Traceback (most recent call last):' header and the 'RuntimeError: runtime msg' type+message"

[[case]]
dimension = "behavior"
case      = "format_exc_outside_except_is_none_sentinel"
subject   = "traceback.format_exc"
kind      = "semantic"
intent    = "format_exc() with no active exception returns the sentinel 'NoneType: None\\n'"

[[case]]
dimension = "behavior"
case      = "none_exception_renders_sentinel_across_apis"
subject   = "traceback.format_exception"
kind      = "semantic"
intent    = "a None exception renders 'NoneType: None\\n' across format_exc(None), format_exception(None)/(None,None,None), and format_exception_only(None)/(None,None)"

[[case]]
dimension = "behavior"
case      = "format_tb_includes_source_and_raise"
subject   = "traceback.format_tb"
kind      = "semantic"
intent    = "format_tb of a live traceback joins to a string containing a '.py' filename and the offending 'raise TypeError' source statement"

[[case]]
dimension = "behavior"
case      = "format_exception_three_arg_returns_str_list"
subject   = "traceback.format_exception"
kind      = "semantic"
intent    = "the 3-arg form format_exception(type, value, tb) of a live IndexError returns a list of str whose join contains 'IndexError: idx'"

[[case]]
dimension = "behavior"
case      = "format_exception_one_arg_instance_form"
subject   = "traceback.format_exception"
kind      = "semantic"
intent    = "the 3.12 single-arg form accepts a bare exception instance: format_exception(Exception('projector')) and format_exception_only(...) both yield ['Exception: projector\\n']"

[[case]]
dimension = "behavior"
case      = "format_list_empty_returns_empty_list"
subject   = "traceback.format_list"
kind      = "semantic"
intent    = "format_list([]) over an empty stack returns an empty list (no lines)"

[[case]]
dimension = "behavior"
case      = "print_exc_writes_to_stream"
subject   = "traceback.print_exc"
kind      = "semantic"
intent    = "print_exc(file=StringIO()) inside an except block writes the exception type 'KeyError' and message 'key_msg' to the given stream"

[[case]]
dimension = "behavior"
case      = "print_exc_no_active_exception_returns_none"
subject   = "traceback.print_exc"
kind      = "semantic"
intent    = "print_exc(file=StringIO()) with no active exception returns None (the return-value contract is the parity oracle)"

[[case]]
dimension = "behavior"
case      = "print_exception_three_arg_and_one_arg_forms"
subject   = "traceback.print_exception"
kind      = "semantic"
intent    = "print_exception accepts both the 3-arg (type, value, None) and 1-arg (instance) forms; both emit 'Exception: projector\\n' to the stream"

[[case]]
dimension = "behavior"
case      = "extract_tb_none_returns_empty_summary"
subject   = "traceback.extract_tb"
kind      = "semantic"
intent    = "extract_tb(None) returns a StackSummary of length 0 (no frames)"

[[case]]
dimension = "behavior"
case      = "extract_tb_entries_have_frame_fields"
subject   = "traceback.extract_tb"
kind      = "semantic"
intent    = "extract_tb of a live traceback yields StackSummary entries whose filename/lineno/name have str/int/str types"

[[case]]
dimension = "behavior"
case      = "walk_stack_returns_iterator"
subject   = "traceback.walk_stack"
kind      = "semantic"
intent    = "walk_stack(None) starts from the current frame and returns an iterable (has __iter__)"

[[case]]
dimension = "behavior"
case      = "walk_tb_yields_one_pair_per_level"
subject   = "traceback.walk_tb"
kind      = "semantic"
intent    = "walk_tb yields one (frame, lineno) pair per traceback level: a single-frame ZeroDivisionError traceback has exactly one entry"

[[case]]
dimension = "behavior"
case      = "clear_frames_empties_frame_locals"
subject   = "traceback.clear_frames"
kind      = "semantic"
intent    = "clear_frames(tb) empties each traceback frame's f_locals: an innermost frame with one local has 0 locals after the call"

