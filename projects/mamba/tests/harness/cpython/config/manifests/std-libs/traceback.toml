# Manifest for the stdlib `traceback` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/traceback/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py)
# plus the loose feature files frame_summary.py, stack_summary.py, and
# traceback_exception.py. bench/ is left as-is. No coverage is dropped.
#
# Subjects on the CapWords classes (TracebackException, StackSummary,
# FrameSummary) carry an explicit `module = "traceback"` so the import inferer
# resolves the real module instead of stopping at the class component.
#
# mamba gotchas (repo memory): traceback.format_exc returns the literal
# "NoneType: None\n" stub regardless of active exception (no frame walk), and
# e.__traceback__ is None under mamba — the harness verdict path / MISSING_RAISE
# promotion gates those divergences at run time (the reference inspect_traceback
# corpus, same module + same gaps, likewise sets no preemptive xfail here).

bucket = "std-libs"
lib = "traceback"

# ===========================================================================
# SURFACE — mechanical probes (callable / attr)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_traceback"
subject   = "traceback"
kind      = "mechanical"
probe     = "attr"
attr      = "format_exc"

