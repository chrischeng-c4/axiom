# ===========================================================================
# ERRORS — mechanical (call + expect_exc; assert-it-raised, self-gating)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "signal_non_int_signum_typeerror"
subject    = "signal.signal"
kind       = "mechanical"
call       = "signal.signal('not_a_signum', signal.SIG_IGN)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "signal_out_of_range_signum_raises"
subject    = "signal.signal"
kind       = "mechanical"
call       = "signal.signal(99999, signal.SIG_IGN)"
expect_exc = "(ValueError, OSError)"

[[case]]
dimension  = "errors"
case       = "signal_non_callable_handler_typeerror"
subject    = "signal.signal"
kind       = "mechanical"
call       = "signal.signal(signal.SIGUSR1, 42)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "signal_none_handler_typeerror"
subject    = "signal.signal"
kind       = "mechanical"
call       = "signal.signal(signal.SIGUSR1, None)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "signal_sigkill_oserror"
subject    = "signal.signal"
kind       = "mechanical"
call       = "signal.signal(signal.SIGKILL, signal.SIG_IGN)"
expect_exc = "OSError"

[[case]]
dimension  = "errors"
case       = "signal_sigstop_oserror"
subject    = "signal.signal"
kind       = "mechanical"
call       = "signal.signal(signal.SIGSTOP, signal.SIG_IGN)"
expect_exc = "OSError"

[[case]]
dimension  = "errors"
case       = "set_wakeup_fd_keyword_typeerror"
subject    = "signal.set_wakeup_fd"
kind       = "mechanical"
call       = "signal.set_wakeup_fd(signum=signal.SIGINT)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "set_wakeup_fd_two_positional_typeerror"
subject    = "signal.set_wakeup_fd"
kind       = "mechanical"
call       = "signal.set_wakeup_fd(signal.SIGINT, False)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "set_wakeup_fd_bad_descriptor_raises"
subject    = "signal.set_wakeup_fd"
kind       = "mechanical"
call       = "signal.set_wakeup_fd(2 ** 30)"
expect_exc = "(ValueError, OSError)"

[[case]]
dimension  = "errors"
case       = "pthread_sigmask_no_args_typeerror"
subject    = "signal.pthread_sigmask"
kind       = "mechanical"
call       = "signal.pthread_sigmask()"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "pthread_sigmask_one_arg_typeerror"
subject    = "signal.pthread_sigmask"
kind       = "mechanical"
call       = "signal.pthread_sigmask(1)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "pthread_sigmask_three_args_typeerror"
subject    = "signal.pthread_sigmask"
kind       = "mechanical"
call       = "signal.pthread_sigmask(1, 2, 3)"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "pthread_sigmask_bad_how_oserror"
subject    = "signal.pthread_sigmask"
kind       = "mechanical"
call       = "signal.pthread_sigmask(1700, [])"
expect_exc = "OSError"

[[case]]
dimension  = "errors"
case       = "pthread_sigmask_nsig_valueerror"
subject    = "signal.pthread_sigmask"
kind       = "mechanical"
call       = "signal.pthread_sigmask(signal.SIG_BLOCK, [signal.NSIG])"
