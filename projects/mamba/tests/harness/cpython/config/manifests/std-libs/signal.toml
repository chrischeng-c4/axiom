# ===========================================================================
# BEHAVIOR — semantic (one observable rule per file; output matches CPython)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "signal_returns_previous_handler"
subject   = "signal.signal"
kind      = "semantic"
intent    = "signal.signal returns the handler it replaced; installing a second handler over SIGUSR1 returns the first one, then restore SIG_DFL"

[[case]]
dimension = "behavior"
case      = "handler_receives_signum"
subject   = "signal.signal"
kind      = "semantic"
intent    = "a custom SIGUSR1 handler installed via signal.signal runs exactly once per os.kill(getpid(), SIGUSR1) and receives the signal number as its first argument"

[[case]]
dimension = "behavior"
case      = "sig_ign_suppresses_delivery"
subject   = "signal.signal"
kind      = "semantic"
intent    = "installing SIG_IGN for SIGUSR2 makes os.kill(getpid(), SIGUSR2) a no-op (handler never runs) and getsignal still reports SIG_IGN; then restore SIG_DFL"

[[case]]
dimension = "behavior"
case      = "handler_fires_once_per_kill"
subject   = "signal.signal"
kind      = "semantic"
intent    = "a counting SIGUSR1 handler fires once per os.kill so three kills increment the counter to exactly 3"

[[case]]
dimension = "behavior"
case      = "sigterm_sigint_constant_values"
subject   = "signal.Signals"
kind      = "semantic"
intent    = "POSIX-stable signal numbers: SIGTERM == 15, SIGINT == 2, SIGKILL == 9, SIGHUP == 1, SIGALRM == 14, SIG_DFL == 0, SIG_IGN == 1"
module    = "signal"

[[case]]
dimension = "behavior"
case      = "alarm_zero_returns_zero"
subject   = "signal.alarm"
kind      = "semantic"
intent    = "alarm(0) cancels any pending alarm and returns 0 (no previous alarm was scheduled)"

[[case]]
dimension = "behavior"
case      = "signals_enum_roundtrip"
subject   = "signal.Signals"
kind      = "semantic"
intent    = "signal constants are typed Signals/Handlers enum members (SIGINT/SIGTERM are Signals, SIG_DFL/SIG_IGN are Handlers); Signals(2) is SIGINT and Signals(SIGINT).name == 'SIGINT'"
module    = "signal"

[[case]]
dimension = "behavior"
case      = "valid_signals_set_contents"
subject   = "signal.valid_signals"
kind      = "semantic"
intent    = "valid_signals() returns a set holding SIGTERM and SIGINT but excluding the 0 and NSIG boundary markers, smaller than NSIG and with many entries"

[[case]]
dimension = "behavior"
case      = "raise_signal_default_int_handler_keyboardinterrupt"
subject   = "signal.raise_signal"
kind      = "semantic"
intent    = "with default_int_handler installed for SIGINT, raise_signal(SIGINT) surfaces synchronously as KeyboardInterrupt"

[[case]]
dimension = "behavior"
case      = "raise_signal_custom_handler_routing"
subject   = "signal.raise_signal"
kind      = "semantic"
intent    = "a custom SIGINT handler intercepts raise_signal(SIGINT); each call routes to the handler and raise_signal itself returns None"

[[case]]
dimension = "behavior"
case      = "strsignal_keyword_descriptions"
subject   = "signal.strsignal"
kind      = "semantic"
intent    = "strsignal returns the OS description string carrying a stable keyword per signal (Interrupt for SIGINT, Terminated for SIGTERM, Hangup for SIGHUP) and accepts the raw int just like the enum member"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenarios)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "pthread_sigmask_block_pending_unblock"
subject   = "signal.pthread_sigmask"
kind      = "semantic"
intent    = "per-thread masking flow: pthread_kill delivers straight to the current thread; blocking SIGUSR1 makes a raised signal pending (sigpending reports typed Signals members) until pthread_sigmask SIG_UNBLOCK flushes it into the handler; sigwait consumes a blocked signal synchronously without invoking the handler"

[[case]]
dimension = "real_world"
case      = "set_wakeup_fd_writes_signal_byte"
subject   = "signal.set_wakeup_fd"
kind      = "semantic"
intent    = "event-loop wakeup pattern: register a socketpair write end via set_wakeup_fd, raise SIGINT under a no-op handler, and observe the one wakeup byte (the signal number) on the read end; restore the previous fd and handler afterwards"
