# Manifest for the stdlib `signal` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/signal/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py
# and the loose feature files pthread_sigmask.py / raise_signal.py /
# strsignal.py / wakeup_fd.py. bench/ is kept as-is. CPython 3.12 is the
# oracle. signal constants asserted here (SIGINT=2, SIGTERM=15, SIGKILL=9,
# SIGHUP=1, SIGALRM=14, SIG_DFL=0, SIG_IGN=1) are POSIX-stable on Linux/macOS.

bucket = "std-libs"
lib = "signal"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable / not_callable / type)
# ===========================================================================

