# --- errors needing multi-statement setup -> semantic ----------------------

[[case]]
dimension = "errors"
case      = "restart_started_thread_raises"
subject   = "threading.Thread"
kind      = "semantic"
module    = "threading"
intent    = "starting an already-started-and-joined thread a second time raises RuntimeError ('threads can only be started once')"

[[case]]
dimension = "errors"
case      = "bounded_semaphore_over_release_raises"
subject   = "threading.BoundedSemaphore"
kind      = "semantic"
module    = "threading"
intent    = "BoundedSemaphore(2): acquire then release returns to the bound; one more release past the bound raises ValueError"

[[case]]
dimension = "errors"
case      = "daemonize_running_thread_raises"
subject   = "threading.Thread"
kind      = "semantic"
module    = "threading"
intent    = "setting daemon=True on an already-running thread raises RuntimeError; gate the worker with an Event so the run is deterministic and joined"

# ===========================================================================
