# ===========================================================================

[[case]]
dimension = "behavior"
case      = "thread_runs_target"
subject   = "threading.Thread"
kind      = "semantic"
module    = "threading"
intent    = "a Thread runs its target function and the side effect is visible after join()"

[[case]]
dimension = "behavior"
case      = "join_blocks_until_finished"
subject   = "threading.Thread"
kind      = "semantic"
module    = "threading"
intent    = "Thread.join() blocks until the worker finishes, so a worker append precedes the post-join main append in order"

[[case]]
dimension = "behavior"
case      = "lock_serializes_increments"
subject   = "threading.Lock"
kind      = "semantic"
module    = "threading"
intent    = "a shared Lock serializes 5 threads x 100 increments of a shared counter to exactly 500"

[[case]]
dimension = "behavior"
case      = "event_wait_returns_after_set"
subject   = "threading.Event"
kind      = "semantic"
module    = "threading"
intent    = "Event.wait() in a worker returns only after the main thread calls set()"

[[case]]
