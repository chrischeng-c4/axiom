case      = "event_clear_resets_is_set"
subject   = "threading.Event"
kind      = "semantic"
module    = "threading"
intent    = "Event.set() makes is_set() true; Event.clear() resets is_set() to false"

[[case]]
dimension = "behavior"
case      = "daemon_flag_roundtrip"
subject   = "threading.Thread"
kind      = "semantic"
module    = "threading"
intent    = "the Thread(daemon=...) constructor flag is observable via the .daemon attribute for both True and False"

[[case]]
