# ===========================================================================
# ERRORS — mechanical (call + expect_exc; assert-it-raised)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "release_unlocked_lock_raises"
subject    = "threading.Lock"
kind       = "mechanical"
call       = "threading.Lock().release()"
expect_exc = "RuntimeError"
module     = "threading"

[[case]]
dimension  = "errors"
case       = "release_unheld_rlock_raises"
subject    = "threading.RLock"
kind       = "mechanical"
call       = "threading.RLock().release()"
expect_exc = "RuntimeError"
module     = "threading"

[[case]]
dimension  = "errors"
case       = "condition_wait_without_lock_raises"
subject    = "threading.Condition"
kind       = "mechanical"
call       = "threading.Condition().wait(timeout=0.001)"
expect_exc = "RuntimeError"
module     = "threading"

[[case]]
