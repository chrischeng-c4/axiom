# ===========================================================================
# SECURITY — semantic (adversarial / resilience)
# ===========================================================================

[[case]]
dimension = "security"
case      = "concurrent_mutation_stress"
subject   = "threading.Thread"
kind      = "semantic"
module    = "threading"
xfail     = "shared-state SIGABRT under concurrent mutation (project_mamba_conformance_blockers)"
intent    = "~9 worker threads hammer a shared dict + list (insert/pop/slice-del/clear) while the main thread drives gc.collect() across the racing containers; the process must not crash or deadlock and both structures stay type-valid and usable afterward"

# ===========================================================================
# REAL_WORLD — semantic (end-user integration scenario)
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "producer_consumer_queue"
subject   = "threading.Thread"
kind      = "semantic"
module    = "threading"
intent    = "a bounded producer/consumer pipeline: a producer thread enqueues N items into a queue.Queue and a consumer thread dequeues and sums them, coordinated only by the queue, with the total verified after join"
