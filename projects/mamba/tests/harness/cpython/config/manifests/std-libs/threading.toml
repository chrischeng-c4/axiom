subject   = "threading.Thread"
kind      = "semantic"
module    = "threading"
intent    = "Thread.is_alive() is False before start, True while running, and False again after join"

[[case]]
dimension = "behavior"
case      = "thread_local_isolation"
subject   = "threading.local"
kind      = "semantic"
intent    = "a value stored on threading.local() in the main thread is not visible in a worker thread (per-thread storage isolation)"

[[case]]
