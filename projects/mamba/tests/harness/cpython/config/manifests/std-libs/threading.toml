# Manifest for the stdlib `threading` conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/std-libs/threading/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, excepthook.py, identity.py, naming.py,
# concurrent_mutation_stress.py, real_world/_stub.py). bench/ is left as-is.
#
# Method/exception subjects (threading.Thread.*, threading.Lock, etc.) infer
# their import to the first CapWords component, so every CapWords subject sets
# module = "threading" explicitly to keep the import line correct.

bucket = "std-libs"
lib = "threading"

# ===========================================================================
# SURFACE — mechanical probes (attr / callable / type / not_callable)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "import_threading"
subject   = "threading"
kind      = "mechanical"
probe     = "attr"
attr      = "Thread"

