# Empty OrderedDict
_od_e = collections.OrderedDict()
assert len(_od_e) == 0; _ledger.append(1)
assert list(_od_e.items()) == []; _ledger.append(1)
assert _od_e.get("x", "Z") == "Z"; _ledger.append(1)

