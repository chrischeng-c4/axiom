# int.to_bytes — positive ints big/little
assert (256).to_bytes(2, 'big') == b'\x01\x00'; _ledger.append(1)
assert (256).to_bytes(2, 'little') == b'\x00\x01'; _ledger.append(1)

# int.to_bytes — single byte boundary
