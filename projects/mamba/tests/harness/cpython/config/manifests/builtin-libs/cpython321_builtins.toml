# Comma separator combined with width + align + precision
assert f"{1234567:,}" == "1,234,567"; _ledger.append(1)
assert f"{1234.5678:,.2f}" == "1,234.57"; _ledger.append(1)
assert f"{1234.5:>15,.2f}" == "       1,234.50"; _ledger.append(1)
assert f"{1234.5:<15,.2f}" == "1,234.50       "; _ledger.append(1)
assert f"{1234.5:^15,.2f}" == "   1,234.50    "; _ledger.append(1)

