# Manifest for the PEP 695 (type-parameter syntax: `type X = ...`,
# `def f[T]()`, `class C[T]`) conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/pep/695/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic behavior cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature shape (surface.py,
# behavior.py, errors.py, generic_class.py, scoping.py, type_alias.py,
# type_params_dunder.py, typevar_attrs.py). No paired .expected goldens and no
# bench/ existed for this lib; none is added.
#
# Mamba gaps (PEP 695 is parse-accepted but only partly realized at runtime;
# probed 2026-05-29, cited per case):
#   - `type X = ...` statement does NOT bind the alias name -> "undefined name"
#     (so every TypeAliasType case xfails).
#   - generic fn / class are runtime-polymorphic and callable (first([1,2])==1,
#     Box(42).value==42, unenforced bounds/constraints, defaults) -> these
#     BEHAVIOR cases PASS on mamba and carry no xfail.
#   - the introspection dunders diverge: f.__type_params__, C.__type_params__,
#     C.__bases__, C.__parameters__ all return None instead of the tuple
#     (Generic base not implicitly added; type params not recorded).
#   - the `[ ]` params are not real typing.TypeVar/ParamSpec/TypeVarTuple
#     objects (a bound param `A` is an int, not a TypeVar; __bound__ absent).
#   - class type params do NOT raise NameError when used out of scope, and the
#     MRO/Generic TypeErrors (object+Generic, double Generic, undeclared
#     TypeVar in base) do NOT fire.
# Companion: N+6 row in project_mamba_py312_session_handoff_2026_04_29
# (runtime bound-enforcement is intentionally CPython-equivalent / unenforced).
# All cases stay CPython-3.12 exit-0 green; xfail only suppresses mamba.

bucket = "pep"
lib    = "695"

# ===========================================================================
# SURFACE — mechanical probes (the type-parameter machinery types exist).
# These resolve on both runtimes, so no xfail.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "typevar_exists"
subject   = "typing.TypeVar"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "typevartuple_exists"
subject   = "typing.TypeVarTuple"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "paramspec_exists"
subject   = "typing.ParamSpec"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "typealiastype_exists"
subject   = "typing.TypeAliasType"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "generic_exists"
subject   = "typing.Generic"
kind      = "mechanical"
probe     = "attr"
attr      = "__class_getitem__"

# ===========================================================================
# BEHAVIOR — semantic. The runtime-polymorphism cases (no dunder / no typing
# object introspection) PASS on mamba and carry NO xfail. The cases that touch
# __type_params__ / __bases__ / __parameters__, real TypeVar objects, the
# `type X = ...` statement, or out-of-scope NameError DO carry xfail.
# ===========================================================================

# --- runtime polymorphism (mamba green) -----------------------------------

[[case]]
dimension = "behavior"
case      = "generic_function_polymorphic"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "a generic function def first[T](xs)->T is fully polymorphic at runtime: first([1,2,3]) is 1 and first(['a','b']) is 'a' (the type param is erased)"

[[case]]
dimension = "behavior"
case      = "generic_class_stores_values"
subject   = "typing.Generic"
kind      = "semantic"
intent    = "a generic class Box[T] instantiates and stores any value regardless of the declared T: Box(42).value==42 and Box('hi').value=='hi'"

[[case]]
dimension = "behavior"
case      = "bound_not_enforced_at_runtime"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "a type-param bound is metadata only: def shout[T: str](x) still runs for a non-str arg (shout('hi')=='hi!' and shout(42)=='42!')"

[[case]]
dimension = "behavior"
case      = "constraints_not_enforced_at_runtime"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "type-param constraints are unenforced: def pick[T: (int, str)](x) returns 1, 'z', and even 3.5 (a float matching neither constraint)"

[[case]]
dimension = "behavior"
case      = "typeparam_default_args"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "default arguments annotated with a type param work normally: def defaulted[T](a=..., *, b=...) yields ('a','b'), (1,'b'), ('a',2)"

# --- introspection dunders (mamba returns None -> xfail) -------------------

[[case]]
dimension = "behavior"
case      = "function_type_params_dunder"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "a generic function exposes its params via __type_params__; nested def outer[A,B] / inner[C,D] each record their own (a,b) and (c,d)"
xfail     = "fn.__type_params__ returns None on mamba (type params not recorded; probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "class_type_params_and_parameters"
subject   = "typing.Generic"
kind      = "semantic"
intent    = "nested generic classes each keep __type_params__, and a generic class also gains a matching __parameters__ tuple from Generic"
xfail     = "cls.__type_params__ / __parameters__ return None on mamba (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "type_params_empty_on_plain"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "non-generic callables, classes, and builtin types carry an empty-but-present __type_params__ == () (plain fn, plain class, type, object)"
xfail     = "plain.__type_params__ returns None on mamba, not () (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "type_params_writable"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "__type_params__ is writable on both a generic function and a generic class: assigning () is observed back"
xfail     = "cls/fn.__type_params__ returns None on mamba and the attribute is not writable (probed 2026-05-29)"

# --- implicit Generic base / orig_bases (mamba __bases__ None -> xfail) ----

[[case]]
dimension = "behavior"
case      = "implicit_generic_base"
subject   = "typing.Generic"
kind      = "semantic"
intent    = "class Box[T]: with no explicit bases implicitly gains Generic as its base, records Generic[T] in get_original_bases, and exposes __parameters__"
xfail     = "Box.__bases__ returns None on mamba (Generic base not implicitly added; probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "explicit_base_keeps_generic_appended"
subject   = "typing.Generic"
kind      = "semantic"
intent    = "an explicit base is preserved with Generic appended after it; keyword args and **dict expansion flow to __init_subclass__ (Child[T](Base, a=1, b=2, **extra))"
xfail     = "Child.__bases__ returns None on mamba so the (Base, Generic) ordering can't be checked (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "star_unpacked_base_lists"
subject   = "typing.Generic"
kind      = "semantic"
intent    = "star-unpacked base lists work for generic classes: class Empty[T](*()) yields just (Generic,) and class Starred[T](*[Base]) yields (Base, Generic)"
xfail     = "Empty/Starred.__bases__ return None on mamba (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "generic_method_zero_arg_super"
subject   = "typing.Generic"
kind      = "semantic"
intent    = "a generic method def greet[T](self, tag) can still use zero-arg super() to reach its base: Sub().greet(1) == 'parent-sub'"
xfail     = "zero-arg super() inside a def greet[T] generic method diverges on mamba (PEP 695 method type-param path; probed 2026-05-29)"

# --- scoping / name-mangling (mamba diverges -> xfail) ----------------------

[[case]]
dimension = "behavior"
case      = "type_param_out_of_scope_nameerror"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "a class type param is visible only inside that class scope; using Tp after class Generic1[Tp] raises NameError mentioning 'Tp'"
xfail     = "mamba raises a compile-time 'undefined name' for the class type param rather than the runtime NameError (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "type_params_nest_across_scopes"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "type params nest: an inner generic (class A[X] -> def b[Y] -> class C[Z] -> def d[W]) can see every enclosing param via a returned closure"
xfail     = "A.__type_params__ returns None and nested type params are not captured on mamba (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "type_param_name_collision_distinct"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "a type-param name may collide with a parameter name (def shadow[Arg](Arg)) and same-named params on an outer class and inner method are distinct objects"
xfail     = "shadow.__type_params__ / Outer.meth.__type_params__ return None on mamba so the TypeVar identities can't be compared (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "type_params_not_name_mangled"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "type-param names are NOT mangled: a class Mangled[__T] keeps the literal '__T' name on its param, its method's __U, and its alias's __V"
xfail     = "Mangled.__type_params__ returns None on mamba so the unmangled names can't be read (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "nested_generator_yields_typevars"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "a nested generic generator (def make_gen[A] -> def gen[B]) yields the TypeVars of each enclosing scope, named 'A' and 'B'"
xfail     = "the yielded objects are not TypeVars with __name__ on mamba (type params erased; probed 2026-05-29)"

# --- type alias statement (mamba: alias name unbound -> xfail) --------------

[[case]]
dimension = "behavior"
case      = "type_alias_builds_typealiastype"
subject   = "typing.TypeAliasType"
kind      = "semantic"
intent    = "type Plain = int builds a TypeAliasType whose __value__ is int, __name__ is 'Plain', and __type_params__ is ()"
xfail     = "`type X = ...` does not bind the alias name on mamba ('undefined name'; probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "parameterized_type_alias"
subject   = "typing.TypeAliasType"
kind      = "semantic"
intent    = "a parameterized alias type Pair[T] = list[T] keeps its own __type_params__ and its __value__ equals list[T]"
xfail     = "`type Pair[T] = ...` does not bind the alias name on mamba (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "recursive_type_alias_lazy"
subject   = "typing.TypeAliasType"
kind      = "semantic"
intent    = "the alias value is lazily evaluated, so type Recursive = Recursive | None may reference itself: __value__ equals Recursive | None"
xfail     = "`type Recursive = ...` does not bind the alias name on mamba (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "type_alias_lambda_value"
subject   = "typing.TypeAliasType"
kind      = "semantic"
intent    = "an alias value may be a lambda closing over its own type param: type Lazy[T] = lambda: T has __value__() is that param"
xfail     = "`type Lazy[T] = ...` does not bind the alias name on mamba (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "type_alias_class_namespace"
subject   = "typing.TypeAliasType"
kind      = "semantic"
intent    = "inside a class body an alias resolves names against the class namespace: class Holder with member=int and type Inner=member gives Holder.Inner.__value__ is int"
xfail     = "`type Inner = ...` inside a class body does not bind on mamba (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "type_alias_lazy_classvar_mutation"
subject   = "typing.TypeAliasType"
kind      = "semantic"
intent    = "lazy evaluation observes a class-var change before first access: rebinding Mutable.seed to float before touching the alias makes Mutable.Alias.__value__ float"
xfail     = "`type Alias = ...` inside a class body does not bind on mamba (probed 2026-05-29)"

# --- TypeVar / ParamSpec / TypeVarTuple objects (mamba: not real typing
#     objects -> xfail) --------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "typevar_bound_and_constraints"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "a [ ] param is a real TypeVar: def with_bound[A: str, B: str|int, C: (int,str)] gives A.__bound__ is str, C.__bound__ is None with __constraints__ (int,str), and __infer_variance__ set"
xfail     = "a bound [ ] param is a plain value (an int), not a typing.TypeVar with __bound__ on mamba (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "paramspec_and_typevartuple_params"
subject   = "typing.ParamSpec"
kind      = "semantic"
intent    = "**P creates a ParamSpec and *Ts creates a TypeVarTuple from the [ ] syntax; both are real typing objects with __infer_variance__ on the ParamSpec"
xfail     = "**P / *Ts params are not real ParamSpec / TypeVarTuple objects on mamba (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "typevar_references_earlier_param"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "a later type param may reference an earlier one in its bound: def ordered[S, T: Sequence[S]] has T.__bound__ == Sequence[S]"
xfail     = "ordered.__type_params__ returns None and params are not TypeVars on mamba (probed 2026-05-29)"

[[case]]
dimension = "behavior"
case      = "typevar_bound_lazy_forward_ref"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "bounds/constraints are evaluated lazily: class LazyBound[T: Undefined, U: (Undefined,)] raises NameError on T.__bound__ until Undefined is defined, then resolves to 'defined'"
xfail     = "LazyBound.__type_params__ returns None and the lazy-bound TypeVar machinery is absent on mamba (probed 2026-05-29)"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc). Each builds a generic class whose
# MRO/Generic conflict CPython rejects; mamba does not raise, so all xfail.
# `module = "695"` is unused by the body, but the subject is a typing class so
# the import inferer would otherwise stop at CapWords; we set an explicit
# import on each errors case instead via `module`.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "object_base_plus_generic_mro_raises"
subject    = "typing.Generic"
kind       = "mechanical"
import     = "from typing import Generic"
call       = "exec('class _W[X](object):\\n    ...')"
expect_exc = "TypeError"
xfail      = "class _[X](object) does not raise the object+Generic MRO TypeError on mamba (probed 2026-05-29)"

[[case]]
dimension  = "errors"
case       = "double_generic_base_raises"
subject    = "typing.Generic"
kind       = "mechanical"
import     = "from typing import Generic"
call       = "exec('class _D[T](Generic[T]):\\n    ...')"
expect_exc = "TypeError"
xfail      = "class _[T](Generic[T]) does not raise the double-Generic TypeError on mamba (probed 2026-05-29)"

[[case]]
dimension  = "errors"
case       = "undeclared_typevar_in_base_raises"
subject    = "typing.TypeVar"
kind       = "mechanical"
import     = "from typing import TypeVar"
call       = "exec('S = TypeVar(\"S\")\\nclass _M[T](dict[T, S]):\\n    ...')"
expect_exc = "TypeError"
xfail      = "an undeclared module-level TypeVar in a new-style generic base does not raise TypeError on mamba (probed 2026-05-29)"
