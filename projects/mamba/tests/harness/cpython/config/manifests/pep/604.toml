# Manifest for the PEP 604 (union type expression `X | Y`) conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/pep/604/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic behavior cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature + paired-.expected golden
# shape (surface.py, behavior.py, errors.py, union_types_isinstance_raises.py
# /.expected). bench/ did not exist for this lib; none is added.
#
# Mamba gap (cited on every `X | Y` case): `int | str` returns None on mamba
# where CPython 3.12 returns a types.UnionType, and `isinstance(x, int | str)`
# then raises TypeError (None as the second arg) where CPython returns a bool.
# See repo memory project_mamba_pep_silent_divergences_2026_05_27 and the legacy
# pep/604/errors.py contract that documented the same divergence. Those cases
# carry xfail so `conformance` skips mamba; CPython 3.12 remains the green oracle.

bucket = "pep"
lib    = "604"

# ===========================================================================
# SURFACE — mechanical probes (the union machinery type exists)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "union_type_exists"
subject   = "types.UnionType"
kind      = "mechanical"
probe     = "attr"
attr      = "__args__"
module    = "types"

# ===========================================================================
# BEHAVIOR — semantic (every case builds a union with `|`, so xfail on mamba)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "union_creates_uniontype"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "int | str produces an instance of types.UnionType"
module    = "types"
xfail     = "`int | str` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "isinstance_matches_member"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "isinstance(x, int | str) is True for an int or a str member and False for a non-member (float)"
module    = "types"
xfail     = "isinstance(x, int | str) raises TypeError on mamba (None second arg; project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "issubclass_matches_member"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "issubclass(int, int | str) is True; the union acts as the second arg to issubclass"
module    = "types"
xfail     = "`int | str` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "none_pipe_int_is_optional"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "None | int yields a UnionType whose __args__ is (NoneType, int) and whose repr is 'None | int'"
module    = "types"
xfail     = "`None | int` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "union_args_tuple"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "(int | str).__args__ is the ordered tuple (int, str) of the union members"
module    = "types"
xfail     = "`int | str` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "union_dedupes_repeated_member"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "a union of one type with itself collapses to that bare type: int | int is int"
module    = "types"
xfail     = "`int | int` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "union_repr_uses_pipe"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "the repr of int | str renders the members joined by ' | ': 'int | str'"
module    = "types"
xfail     = "`int | str` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc; each builds a union, so xfail on mamba)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "union_with_non_type_value_raises"
subject    = "types.UnionType"
kind       = "mechanical"
call       = "int | 42"
expect_exc = "TypeError"
module     = "types"
xfail      = "`int | 42` returns None on mamba instead of raising TypeError (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension  = "errors"
case       = "union_with_string_value_raises"
subject    = "types.UnionType"
kind       = "mechanical"
call       = "int | 'not_a_type'"
expect_exc = "TypeError"
module     = "types"
xfail      = "`int | 'x'` returns None on mamba instead of raising TypeError (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension  = "errors"
case       = "calling_union_raises"
subject    = "types.UnionType"
kind       = "mechanical"
call       = "(int | str)(1)"
expect_exc = "TypeError"
module     = "types"
xfail      = "`int | str` returns None on mamba so calling it does not raise TypeError (project_mamba_pep_silent_divergences_2026_05_27)"
