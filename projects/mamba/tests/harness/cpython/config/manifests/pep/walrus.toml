# Manifest for the PEP 572 walrus operator (`:=`) conformance corpus, lib=walrus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/pep/walrus/<dimension>/<case>.py:
#   - mechanical errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# The walrus operator is a *language construct*, not an importable module, so
# there is no dotted API to probe and no `import` to infer. Each case sets an
# explicit `import = "pass"` so the generator emits a valid, import-free
# skeleton/body; the walrus, `compile`, and `exec` are all builtins / syntax.
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py.
# bench/ (perf, golden-less) is kept as-is and is not described here.

bucket = "pep"
lib    = "walrus"

# ===========================================================================
# SURFACE — the construct parses and binds in each placement (run-probe,
# therefore semantic). Decomposed from surface.py.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "named_expr_returns_rhs_value"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a parenthesized named expression evaluates to the right-hand value and binds the name: x = (y := 42) leaves both x and y equal to 42"

[[case]]
dimension = "surface"
case      = "walrus_in_while_reads_list"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus in a while-condition captures each list element so the loop body can append the captured value, stopping when the guard fails"

[[case]]
dimension = "surface"
case      = "walrus_in_if_computes_once"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus in an if-condition computes a value once and the binding is reused in the chosen branch body"

[[case]]
dimension = "surface"
case      = "walrus_in_comprehension_filter"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus in a comprehension filter binds a computed value that is also used as the element expression"

[[case]]
dimension = "surface"
case      = "walrus_in_call_argument"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus used as a function-call argument binds the name in the surrounding scope and passes the value to the callee"

[[case]]
dimension = "surface"
case      = "consecutive_walrus_chain"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "consecutive walrus statements each build on the previous binding: (a:=1), (b:=a+1), (c:=b+1) leaves c == 3"

# ===========================================================================
# BEHAVIOR — semantic runtime value rules. Decomposed from behavior.py.
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "lower_precedence_than_arithmetic"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "the walrus has lower precedence than arithmetic, so y = (x := 1) + 10 binds x to 1 and the whole expression to 11"

[[case]]
dimension = "behavior"
case      = "walrus_does_not_create_scope"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus does not create a new scope: a walrus in an if-condition overwrites the existing module-level binding"

[[case]]
dimension = "behavior"
case      = "comp_walrus_leaks_to_enclosing"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus target inside a comprehension leaks to the enclosing scope, holding the last value assigned during iteration"

[[case]]
dimension = "behavior"
case      = "comp_filter_walrus_valid_form"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus bound in a comprehension filter is usable as the element expression: [d for v in range(5) if (d := v*2) > 2] yields [4, 6, 8]"

[[case]]
dimension = "behavior"
case      = "while_walrus_holds_last_value_after_loop"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus in a while-condition reads from the enclosing scope and, after the loop exits on a falsy value, the target still holds that last assigned (falsy) value"
xfail     = "mamba walrus-in-while target reads 0 after loop exit; matches the legacy behavior.py mamba-xfail (val2 after loop = 0)"

[[case]]
dimension = "behavior"
case      = "nested_comp_walrus_accumulator"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus that reads and writes the same enclosing name accumulates a running total across a comprehension: [(o := o + v) for v in range(5)] yields [0,1,3,6,10] and o == 10"

[[case]]
dimension = "behavior"
case      = "walrus_in_boolean_short_circuit"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus on the right of `or` binds and short-circuits correctly: False or (z := fn(7)) is 7, z == 7, and fn was called exactly once"

# ===========================================================================
# ERRORS — mechanical (compile/exec the rejected construct, expect SyntaxError).
# Decomposed from errors.py.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "bare_walrus_statement_rejected"
subject    = ":="
kind       = "mechanical"
import     = "pass"
call       = "exec('a := 5')"
expect_exc = "SyntaxError"
