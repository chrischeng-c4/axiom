# Manifest for the PEP 557 (dataclasses) conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/pep/557/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / errors.py and the loose
# feature files (behavior.py, field_defaults.py, frozen_hash_slots.py,
# helpers.py, initvar.py, keyword_only.py, make_dataclass.py). No coverage is
# lost — each independent concern becomes one named one-case file.
#
# xfail rationale: `@dataclass` synthesizes its methods through the class
# machinery that mamba diverges on (classmethod returning cls() -> None,
# __match_args__/__slots__/frozen/__hash__ not honored, etc. — see repo memory
# project_mamba_class_machinery_silent_divergences, atomic 325, 2026-05-27).
# The two legacy monoliths surface.py and errors.py were whole-file
# `# mamba-xfail`'d for exactly this reason. Pure API-existence surface probes
# (no decorator use) are NOT xfail'd; every case that exercises a synthesized
# dataclass method is xfail'd against mamba (CPython 3.12 is still the oracle).

bucket = "pep"
lib = "557"

# ===========================================================================
# SURFACE — mechanical probes (API existence: callable / not_callable / attr)
# These do NOT use the @dataclass decorator, so they pass on mamba.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "dataclass_is_callable"
subject   = "dataclasses.dataclass"
kind      = "mechanical"
probe     = "callable"

