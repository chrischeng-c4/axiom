# Manifest for the PEP 572 (assignment expressions, the walrus operator `:=`)
# conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/pep/572/<dimension>/<case>.py:
#   - mechanical errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# PEP 572 is a *language construct*, not an importable module, so there is no
# dotted API to probe and no `import` to infer. Each case sets an explicit
# `import = "pass"` so the generator emits a valid, import-free skeleton/body;
# the walrus, `compile`, and `exec` are all builtins / syntax.
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the loose feature files comprehension.py / scope.py.

bucket = "pep"
lib    = "572"

# ===========================================================================
# SURFACE — the construct parses and binds (a run-probe, so semantic)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "walrus_parses_and_binds"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "the walrus operator parses inside a parenthesized condition and binds the name to the assigned value"

# ===========================================================================
# ERRORS — mechanical (compile/exec the rejected construct, expect SyntaxError)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "bare_walrus_statement_rejected"
subject    = ":="
kind       = "mechanical"
import     = "pass"
call       = "compile('a := 5', '<t>', 'exec')"
expect_exc = "SyntaxError"

[[case]]
dimension  = "errors"
case       = "subscript_target_rejected"
subject    = ":="
kind       = "mechanical"
import     = "pass"
call       = "compile(\"(d := {}); (d['k'] := 1)\", '<t>', 'exec')"
expect_exc = "SyntaxError"

[[case]]
dimension  = "errors"
case       = "attribute_target_rejected"
subject    = ":="
kind       = "mechanical"
import     = "pass"
call       = "compile('(o.x := 5)', '<t>', 'exec')"
expect_exc = "SyntaxError"

[[case]]
dimension  = "errors"
case       = "tuple_target_rejected"
subject    = ":="
kind       = "mechanical"
import     = "pass"
call       = "compile('((a, b) := (1, 2))', '<t>', 'exec')"
expect_exc = "SyntaxError"

[[case]]
dimension  = "errors"
case       = "lambda_target_rejected"
subject    = ":="
kind       = "mechanical"
import     = "pass"
call       = "compile('(lambda: x := 1)', '<t>', 'exec')"
expect_exc = "SyntaxError"

[[case]]
dimension  = "errors"
case       = "comprehension_iterable_target_rejected"
subject    = ":="
kind       = "mechanical"
import     = "pass"
call       = "compile('[i + 1 for i in i := [1, 2]]', '<t>', 'exec')"
expect_exc = "SyntaxError"

[[case]]
dimension  = "errors"
case       = "rebind_iteration_variable_rejected"
subject    = ":="
kind       = "mechanical"
import     = "pass"
call       = "compile('[[(__x := 2) for _ in range(2)] for __x in range(2)]', '<t>', 'exec')"
expect_exc = "SyntaxError"

[[case]]
dimension  = "errors"
case       = "class_body_comprehension_rejected"
subject    = ":="
kind       = "mechanical"
import     = "pass"
call       = "compile('class Foo:\\n    [(42, j := i) for i in range(5)]\\n', '<t>', 'exec')"
expect_exc = "SyntaxError"

# ===========================================================================
# BEHAVIOR — semantic runtime value behaviors
# ===========================================================================

# --- core named-expression value semantics --------------------------------

[[case]]
dimension = "behavior"
case      = "bare_named_expr_binds"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a bare parenthesized named expression (a := 10) binds the name and the statement's value is the assigned value"

[[case]]
dimension = "behavior"
case      = "named_expr_value_usable_inline"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a named expression evaluates to the assigned value usable inline: len((lines := [1,2,3])) is 3 and lines is bound to the list"

[[case]]
dimension = "behavior"
case      = "chained_walrus_same_value"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "chained walrus (z := (y := (x := 0))) binds every name to the same innermost value 0"

[[case]]
dimension = "behavior"
case      = "walrus_in_if_guard_binds"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus in an if-condition binds the name and the bound value is visible in the body: if (n := 10) > 5 sees n == 10"

[[case]]
dimension = "behavior"
case      = "walrus_in_while_condition_reevaluated"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus in a while-condition is re-evaluated each iteration; an integer floor-sqrt loop over 9 converges to base == 1"

[[case]]
dimension = "behavior"
case      = "falsy_while_guard_binds_no_body"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus while-guard that is falsy never runs the body but still binds the name: while (flag := False) leaves flag False and the body unexecuted"

[[case]]
dimension = "behavior"
case      = "walrus_in_subscript_index"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus inside a subscript index binds and indexes in one expression: data[(pos := 2)] binds pos == 2 and picks data[2]"

# --- placements that are ALLOWED (no-raise behavior) ----------------------

[[case]]
dimension = "behavior"
case      = "default_arg_walrus_allowed"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus in a parameter default is allowed (the def does not raise): def f(x=(n := 5)) compiles and f() returns 5"

[[case]]
dimension = "behavior"
case      = "slice_with_walrus_index_allowed"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a parenthesized walrus inside a slice bound is allowed: s[(i := 0):] compiles, runs, and binds i == 0"

# --- comprehensions: walrus carrying state --------------------------------

[[case]]
dimension = "behavior"
case      = "comp_filter_binding_reused_and_leaks"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus in a comprehension filter binds per-element, is reusable in that element's value expression, and the last filter binding leaks to the enclosing scope"

[[case]]
dimension = "behavior"
case      = "comp_value_binding_reused_in_element"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus bound in a comprehension's value expression can be reused later in the same element, and the final binding leaks to the enclosing scope"

[[case]]
dimension = "behavior"
case      = "comp_running_total_accumulator"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus that reads and writes the same enclosing name accumulates a running total across a comprehension: [(total := total + v) for v in range(5)] yields [0,1,3,6,10] and total == 10"

[[case]]
dimension = "behavior"
case      = "comp_preseeded_accumulator"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a pre-seeded accumulator outside the comprehension is honored by the walrus accumulation inside it"

[[case]]
dimension = "behavior"
case      = "genexp_walrus_no_preleak_until_consumed"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a generator expression does NOT pre-leak its walrus target before consumption; the bound name only appears after the generator is iterated"

# --- scoping rules --------------------------------------------------------

[[case]]
dimension = "behavior"
case      = "function_local_does_not_escape"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus target inside a function is local and does not escape to the module after the function returns"

[[case]]
dimension = "behavior"
case      = "global_walrus_writes_module_binding"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus inside a function declared global writes the module-level binding"

[[case]]
dimension = "behavior"
case      = "list_comp_walrus_binds_enclosing_scope"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus target in a list comprehension binds in the ENCLOSING scope, not the comprehension's own scope (the deliberate PEP 572 exception): [(j := i) for i in range(5)] leaves j == 4"

[[case]]
dimension = "behavior"
case      = "nested_comp_walrus_leaks_enclosing"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "the enclosing-scope walrus binding survives nesting; the inner walrus of a nested comprehension leaks out to the surrounding scope"

[[case]]
dimension = "behavior"
case      = "call_arg_walrus_leaks"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus passed as a positional call argument binds in the surrounding scope after the call"

[[case]]
dimension = "behavior"
case      = "keyword_arg_walrus_leaks"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus passed as a keyword call argument binds in the surrounding scope after the call"

[[case]]
dimension = "behavior"
case      = "genexp_arg_walrus_leaks_after_consume"
subject   = ":="
kind      = "semantic"
import    = "pass"
intent    = "a walrus inside a generator-expression argument to a builtin (any) leaks to the surrounding scope once the generator has been consumed"
