# Manifest for the PEP 634 (structural pattern matching) conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/pep/634/<dimension>/<case>.py:
#   - mechanical errors come out complete (status="filled")
#   - semantic surface/behavior cases come out as fillable skeletons
#     (status="generated")
#
# PEP 634 is a syntax feature, not an importable module: there is no symbol to
# probe. Every case therefore uses `import = "pass"` (a harmless no-op line) and
# expresses the API under test through the `match`/`case` syntax in the body.
# `subject` reads as `match.<pattern-kind>` to name the pattern construct.
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py and
# the loose feature files binding.py / class_patterns.py / mapping_patterns.py /
# sequence_patterns.py. No coverage dropped; the fall-through "no raise" cases
# that lived in errors.py move to behavior/ (they assert a value, not a raise).

bucket = "pep"
lib    = "634"

# ===========================================================================
# SURFACE — each PEP 634 pattern kind parses and runs (semantic: it runs a
# match statement and asserts the taken branch). One file per pattern kind.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "literal_pattern_parses"
subject   = "match.literal_pattern"
kind      = "semantic"
import    = "pass"
intent    = "a literal pattern (case 0) parses, runs, and matches by equality"

[[case]]
dimension = "surface"
case      = "singleton_pattern_parses"
subject   = "match.singleton_pattern"
kind      = "semantic"
import    = "pass"
intent    = "a singleton pattern (case None) parses, runs, and matches by identity"

[[case]]
dimension = "surface"
case      = "or_pattern_parses"
subject   = "match.or_pattern"
kind      = "semantic"
import    = "pass"
intent    = "an OR pattern (case 'x' | 'y') parses, runs, and matches any alternative"

[[case]]
dimension = "surface"
case      = "sequence_star_pattern_parses"
subject   = "match.sequence_pattern"
kind      = "semantic"
import    = "pass"
intent    = "a sequence pattern with a star (case [a, *_]) parses, runs, and captures the head"

[[case]]
dimension = "surface"
case      = "mapping_pattern_parses"
subject   = "match.mapping_pattern"
kind      = "semantic"
import    = "pass"
intent    = "a mapping pattern (case {'k': v}) parses, runs, and binds the value"

[[case]]
dimension = "surface"
case      = "class_positional_pattern_parses"
subject   = "match.class_pattern"
kind      = "semantic"
import    = "pass"
intent    = "a positional class pattern (case Pt(px, py)) parses, runs, and binds via __match_args__"

[[case]]
dimension = "surface"
case      = "capture_guard_pattern_parses"
subject   = "match.guard_pattern"
kind      = "semantic"
import    = "pass"
intent    = "a capture pattern with a guard (case n if n > 100) parses, runs, and binds the subject"

[[case]]
dimension = "surface"
case      = "capture_as_pattern_parses"
subject   = "match.as_pattern"
kind      = "semantic"
import    = "pass"
intent    = "an AS capture pattern (case other as kept) parses, runs, and binds the whole value"

# ===========================================================================
# ERRORS — mechanical: a malformed pattern raises (compile-time SyntaxError or
# runtime ValueError/TypeError). The generator emits an assert-it-raised body.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "dup_mapping_literal_key_syntaxerror"
subject    = "match.mapping_pattern"
kind       = "mechanical"
import     = "pass"
call       = "compile(\"match {}:\\n case {'a': 1, 'a': 2}: pass\", '<dup>', 'exec')"
expect_exc = "SyntaxError"

# Semantic: a runtime-equal-keys ValueError needs a real `match` statement with
# a dotted value key (Keys.KEY == "a"), which cannot be expressed as a one-line
# mechanical `call=` exec string (the generator's mechanical errors path is for
# single-expression calls). Filled with the assert-it-raised body by hand.
[[case]]
dimension = "errors"
case      = "runtime_equal_mapping_keys_valueerror"
subject   = "match.mapping_pattern"
kind      = "semantic"
import    = "pass"
intent    = "two mapping-pattern keys that compare equal at runtime raise ValueError during matching"

[[case]]
dimension  = "errors"
case       = "match_args_not_tuple_typeerror"
subject    = "match.class_pattern"
kind       = "mechanical"
import     = "pass"
call       = "exec(\"class C:\\n __match_args__ = None\\nmatch C():\\n case C(_a): pass\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "match_args_non_str_entry_typeerror"
subject    = "match.class_pattern"
kind       = "mechanical"
import     = "pass"
call       = "exec(\"class C:\\n __match_args__ = (None,)\\nmatch C():\\n case C(_a): pass\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "too_many_positional_subpatterns_typeerror"
subject    = "match.class_pattern"
kind       = "mechanical"
import     = "pass"
call       = "exec(\"class C:\\n __match_args__ = ()\\nmatch C():\\n case C(_a): pass\")"
expect_exc = "TypeError"

[[case]]
dimension  = "errors"
case       = "duplicate_attribute_binding_typeerror"
subject    = "match.class_pattern"
kind       = "mechanical"
import     = "pass"
call       = "exec(\"class C:\\n __match_args__ = ('a', 'a')\\n a = None\\nmatch C():\\n case C(_p, _q): pass\")"
expect_exc = "TypeError"

