# Manifest for the PEP 526 (syntax for variable annotations) conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/pep/526/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py)
# plus the loose feature fixture function_annotations_dict_raises.py and its
# paired .expected golden. bench/ (none here) would be left as-is.
#
# PEP 526 is a SYNTAX feature, not an importable module: there is no
# `import 526`. The subject is the language feature itself (variable
# annotations + the `__annotations__` mapping). Mechanical cases therefore
# carry an explicit `import = "import sys"` no-op anchor so the generator does
# not try to `import __annotations__` (a builtin, not a module).
#
# Mamba gotcha (xfail driver): module/function/class `__annotations__` is an
# UNDEFINED NAME under mamba (force-typed; the dict is never materialized), and
# function `__annotations__` returns None. Every case that reads
# `__annotations__`, or that depends on annotation values not being runtime
# type-checked, diverges. See repo-memory
# project_mamba_pep_silent_divergences_2026_05_27 (function __annotations__ is
# None) and project_mamba_eval_silent_none_cross_type (exec/eval defer parsing
# -> silent None instead of raising). The harness skips mamba for xfail cases.

bucket = "pep"
lib    = "526"

# ===========================================================================
# SURFACE — mechanical probe
# ===========================================================================

# The PEP 526 surface is the module-level `__annotations__` mapping. It exists
# as a dict (so it supports `keys`) even before any annotation is written.
# Mamba: `__annotations__` is an undefined name -> xfail.
[[case]]
dimension = "surface"
case      = "annotations_mapping_exists"
subject   = "__annotations__"
kind      = "mechanical"
probe     = "attr"
attr      = "keys"
import    = "import sys"
xfail     = "module __annotations__ is an undefined name on mamba (force-typed; the mapping is never materialized). See project_mamba_pep_silent_divergences_2026_05_27."

# ===========================================================================
# ERRORS — mechanical (call + expect_exc)
# ===========================================================================

# A syntactically invalid annotation expression raises SyntaxError at compile
# time; exec() of the bad source surfaces it. Mamba: exec defers parsing and
# returns None silently instead of raising -> the self-asserting template's
# `assert _raised` fails -> xfail.
[[case]]
dimension  = "errors"
case       = "bad_annotation_syntax_raises"
subject    = "exec"
kind       = "mechanical"
call       = "exec('x: not::a::valid::type = 1')"
expect_exc = "SyntaxError"
import     = "import sys"
xfail      = "mamba exec defers parsing and returns None silently instead of raising SyntaxError. See project_mamba_eval_silent_none_cross_type."

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- module-scope annotations + the __annotations__ mapping ---------------

[[case]]
dimension = "behavior"
case      = "module_annotation_records"
subject   = "__annotations__"
kind      = "semantic"
intent    = "an annotated module-scope assignment `x: int = 1` records 'x' in the module __annotations__ mapping"
import    = "pass  # PEP 526 is syntax-only; __annotations__ is a builtin"
xfail     = "module __annotations__ is an undefined name on mamba. See project_mamba_pep_silent_divergences_2026_05_27."

[[case]]
dimension = "behavior"
case      = "annotation_only_does_not_bind"
subject   = "__annotations__"
kind      = "semantic"
intent    = "a bare annotation `y: int` (no value) does NOT bind the name at module scope (NameError on read) but DOES record 'y' in __annotations__"
import    = "pass  # PEP 526 is syntax-only; __annotations__ is a builtin"
xfail     = "module __annotations__ is an undefined name on mamba. See project_mamba_pep_silent_divergences_2026_05_27."

[[case]]
dimension = "behavior"
case      = "annotated_value_binds"
subject   = "__annotations__"
kind      = "semantic"
intent    = "an annotated assignment with a value `x: int = 42` binds the name to that value (42) like a normal assignment"
import    = "pass  # PEP 526 is syntax-only; __annotations__ is a builtin"
xfail     = "module __annotations__ is an undefined name on mamba. See project_mamba_pep_silent_divergences_2026_05_27."

[[case]]
dimension = "behavior"
case      = "wrong_typed_value_still_binds"
subject   = "__annotations__"
kind      = "semantic"
intent    = "CPython does not runtime type-check annotations: `z: int = 'not_an_int'` still binds z to the string (no TypeError)"
import    = "pass  # PEP 526 is syntax-only; __annotations__ is a builtin"
xfail     = "mamba is force-typed; an annotation/value type mismatch is rejected rather than bound. See project_mamba_pep_silent_divergences_2026_05_27."

# --- class- and function-scope annotations --------------------------------

[[case]]
dimension = "behavior"
case      = "class_annotation_records"
subject   = "__annotations__"
kind      = "semantic"
intent    = "class-body annotations `a: int = 1; b: str = 'hi'` are recorded in the class __annotations__ mapping (keys {'a', 'b'})"
import    = "pass  # PEP 526 is syntax-only; __annotations__ is a builtin"
xfail     = "class __annotations__ is an undefined name on mamba. See project_mamba_pep_silent_divergences_2026_05_27."

[[case]]
dimension = "behavior"
case      = "function_annotation_records"
subject   = "__annotations__"
kind      = "semantic"
intent    = "function parameter and return annotations populate fn.__annotations__ with keys {'a', 'b', 'return'}"
import    = "pass  # PEP 526 is syntax-only; __annotations__ is a builtin"
xfail     = "function __annotations__ returns None on mamba. See project_mamba_pep_silent_divergences_2026_05_27."

[[case]]
dimension = "behavior"
case      = "function_annotations_dict"
subject   = "__annotations__"
kind      = "semantic"
intent    = "fn.__annotations__ is a dict mapping each annotated name to its annotation object: {'x': int, 'y': int, 'return': int}"
import    = "pass  # PEP 526 is syntax-only; __annotations__ is a builtin"
xfail     = "function __annotations__ returns None on mamba; subscripting it raises TypeError. See project_mamba_pep_silent_divergences_2026_05_27."

[[case]]
dimension = "behavior"
case      = "forward_ref_string_kept"
subject   = "__annotations__"
kind      = "semantic"
intent    = "a string forward-reference annotation `x: 'Undefined'` is stored verbatim as the string 'Undefined' in __annotations__ (never evaluated)"
import    = "pass  # PEP 526 is syntax-only; __annotations__ is a builtin"
xfail     = "function __annotations__ returns None on mamba. See project_mamba_pep_silent_divergences_2026_05_27."
