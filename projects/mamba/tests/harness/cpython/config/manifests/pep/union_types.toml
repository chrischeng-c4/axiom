# Manifest for the PEP 604 union-type-expression (`X | Y`) conformance corpus,
# tracked under the `union_types` lib alias.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/pep/union_types/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic behavior cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py),
# each of which carried a head-of-file `# mamba-xfail` directive. The legacy
# errors.py was a thin alias pointing at the canonical pep/604 coverage; this
# corpus recovers union_types' own richer behavior set (commutativity, nested
# flattening, dedup, multi-member unions, annotation usage, typing.Union interop)
# as one-case files. bench/ is kept as-is (perf, golden-less); no .expected
# goldens existed for this lib.
#
# Mamba gap (cited on every `X | Y` case): `int | str` returns None on mamba
# where CPython 3.12 returns a types.UnionType, and `isinstance(x, int | str)`
# then raises TypeError (None as the second arg) where CPython returns a bool.
# `int | 42` likewise returns None instead of raising TypeError. See repo memory
# project_mamba_pep_silent_divergences_2026_05_27 and the matching pep/604
# corpus that documents the same divergence. Those cases carry xfail so `conformance`
# skips mamba; CPython 3.12 remains the green oracle.

bucket = "pep"
lib    = "union_types"

# ===========================================================================
# SURFACE — mechanical probe (the union machinery type exists)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "union_type_exists"
subject   = "types.UnionType"
kind      = "mechanical"
probe     = "attr"
attr      = "__args__"
module    = "types"

# ===========================================================================
# BEHAVIOR — semantic (every case builds a union with `|`, so xfail on mamba)
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "union_creates_uniontype"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "int | str produces an instance of types.UnionType"
module    = "types"
xfail     = "`int | str` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "isinstance_matches_member"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "isinstance(x, int | str) is True for an int or a str member and False for a non-member (float)"
module    = "types"
xfail     = "isinstance(x, int | str) raises TypeError on mamba (None second arg; project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "none_pipe_int_is_optional"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "int | None is the Optional idiom: None and an int member both isinstance-match, a str does not"
module    = "types"
xfail     = "`int | None` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "union_is_commutative"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "operand order does not matter: int | str equals str | int"
module    = "types"
xfail     = "`int | str` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "union_flattens_nested"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "nested unions flatten: (int | str) | float and int | (str | float) both contain float and share __args__"
module    = "types"
xfail     = "`int | str` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "union_args_tuple"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "(int | str | bytes).__args__ holds exactly the member types {int, str, bytes}"
module    = "types"
xfail     = "`int | str` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "union_dedupes_repeated_member"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "a union of one type with itself collapses to that bare type: int | int is int"
module    = "types"
xfail     = "`int | int` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "issubclass_matches_member"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "issubclass(x, int | str) is True for a member or a member's subclass (bool <: int) and False for a non-member (list)"
module    = "types"
xfail     = "`int | str` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "union_multi_member_isinstance"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "a four-member union int | str | float | bytes isinstance-matches each member type and rejects a non-member (list)"
module    = "types"
xfail     = "`int | str | float | bytes` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "union_in_function_annotation"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "a `X | Y | None` parameter annotation does not change runtime call behavior; the function dispatches on isinstance over the union"
module    = "types"
xfail     = "`int | str | None` annotation evaluates to None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "union_interops_with_typing_union"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "isinstance over an X | Y union and over typing.Union[X, Y] agree on the same members"
module    = "types"
xfail     = "`int | str` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "type_of_union_is_uniontype"
subject   = "types.UnionType"
kind      = "semantic"
intent    = "type(int | float) is types.UnionType"
module    = "types"
xfail     = "`int | float` returns None on mamba (project_mamba_pep_silent_divergences_2026_05_27)"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc; each builds a union, so xfail on mamba)
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "union_with_non_type_value_raises"
subject    = "types.UnionType"
kind       = "mechanical"
call       = "int | 42"
expect_exc = "TypeError"
module     = "types"
xfail      = "`int | 42` returns None on mamba instead of raising TypeError (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension  = "errors"
case       = "calling_union_raises"
subject    = "types.UnionType"
kind       = "mechanical"
call       = "(int | str)(1)"
expect_exc = "TypeError"
module     = "types"
xfail      = "`int | str` returns None on mamba so calling it does not raise TypeError (project_mamba_pep_silent_divergences_2026_05_27)"
