# ===========================================================================
# BEHAVIOR — semantic (documented typing runtime behaviors)
# ===========================================================================

# --- bare special-form repr stability (from legacy surface.py) ------------

[[case]]
dimension = "behavior"
case      = "bare_special_form_repr_stable"
subject   = "typing.Any"
kind      = "semantic"
intent    = "the bare special forms have a stable, module-qualified repr: repr(typing.Any)=='typing.Any', repr(typing.NoReturn)=='typing.NoReturn', repr(typing.Never)=='typing.Never'"

# --- get_origin / get_args runtime introspection (from legacy behavior.py) -

[[case]]
dimension = "behavior"
case      = "get_origin_strips_typing_wrapper"
subject   = "typing.get_origin"
kind      = "semantic"
intent    = "get_origin strips the typing wrapper to its underlying origin: a Generic subclass for Box[int], list for List[int]/list[int], tuple for Tuple[int,str], Union for Union[int,str], Literal/ClassVar/Final/Annotated for their own forms, collections.abc.Callable for Callable[[int],str], type(int|str) for int|str, and None for a bare int"

[[case]]
dimension = "behavior"
case      = "get_args_yields_param_tuple"
subject   = "typing.get_args"
kind      = "semantic"
intent    = "get_args yields the parameter tuple in declaration order: (int,) for List[int], (int,str) for Union[int,str], (1,2,3) for Literal[1,2,3], (int,Ellipsis) for Tuple[int,...], () for a bare int, and ([int,str],bool) for Callable[[int,str],bool]"

[[case]]
dimension = "behavior"
case      = "optional_is_union_with_none"
subject   = "typing.Optional"
kind      = "semantic"
intent    = "Optional[X] is exactly Union[X,None]: typing.Optional[int]==Union[int,None] and get_args(Optional[int])==(int,type(None))"

# --- Union structure (from legacy special_forms.py) -----------------------

[[case]]
dimension = "behavior"
case      = "union_dedups_and_flattens"
subject   = "typing.Union"
kind      = "semantic"
intent    = "Union deduplicates members, ignores order, collapses a single member, and flattens nested unions: Union[int,int] is int, Union[int,str]==Union[str,int], Union[int,str,int]==Union[int,str], Union[Union[int,str],float]==Union[int,str,float], and Union[int,float]!=Union"

# --- Literal structure (from legacy special_forms.py) ---------------------

[[case]]
dimension = "behavior"
case      = "literal_value_and_type_identity"
subject   = "typing.Literal"
kind      = "semantic"
intent    = "Literal compares by value-and-type, dedups, ignores order, flattens nesting, and keeps bool/int distinct: Literal[1,2]==Literal[2,1], Literal[1,2,3]==Literal[1,2,3,3], Literal[True]!=Literal[1], Literal[0]!=Literal[False], and Literal[Literal[1,2],3].__args__==(1,2,3)"

# --- Annotated structure (from legacy special_forms.py) -------------------

[[case]]
dimension = "behavior"
case      = "annotated_origin_metadata_repr"
subject   = "typing.Annotated"
kind      = "semantic"
intent    = "Annotated keeps its origin and folds nested metadata in order: Annotated[Annotated[int,4],5]==Annotated[int,4,5], .__origin__ is int, .__metadata__==(4,5), repr=='typing.Annotated[int, 4, 5]'; equality is order/identity sensitive and hashable metadata makes the form deduplicable"

# --- cast runtime behavior (from legacy runtime_helpers.py) ---------------

[[case]]
dimension = "behavior"
case      = "cast_is_runtime_noop"
subject   = "typing.cast"
kind      = "semantic"
intent    = "cast is a runtime no-op that returns its argument unchanged with no coercion for any type form: cast(int,42)==42, cast(float,42) stays an int, cast(Any,'x')=='x', cast(Union[str,float],42)==42, cast(None,42)==42"

# --- assert_type runtime behavior (from legacy runtime_helpers.py) --------

[[case]]
dimension = "behavior"
case      = "assert_type_returns_value_identity"
subject   = "typing.assert_type"
kind      = "semantic"
intent    = "assert_type returns the value object itself (identity), never a copy: assert_type(arg,object) is arg, assert_type(arg,str|float) is arg, assert_type(arg,None) is arg"

# --- NewType runtime behavior (from legacy runtime_helpers.py) ------------

[[case]]
dimension = "behavior"
case      = "newtype_identity_with_metadata"
subject   = "typing.NewType"
kind      = "semantic"
intent    = "NewType produces a callable identity function with introspectable metadata: UserId=NewType('UserId',int) gives UserId(5)==5, UserId.__name__=='UserId', UserId.__supertype__ is int"

# --- overload runtime behavior (from legacy runtime_helpers.py) -----------

[[case]]
dimension = "behavior"
case      = "overload_stubs_and_get_overloads"
subject   = "typing.overload"
kind      = "semantic"
intent    = "a function with only @overload stubs raises NotImplementedError when called; once a concrete impl is defined the function works and get_overloads returns its two stubs"

# --- Generic subclassing (from legacy errors.py happy path) ---------------

[[case]]
dimension = "behavior"
case      = "generic_subclass_holds_value"
subject   = "typing.Generic"
kind      = "semantic"
intent    = "a Generic[T] subclass is an ordinary class at runtime: Container(typing.Generic[T]) stores and returns its value, Container(42).value==42"

# --- NamedTuple class form (from legacy namedtuple_typeddict.py) ----------

[[case]]
dimension = "behavior"
case      = "namedtuple_class_form"
subject   = "typing.NamedTuple"
kind      = "semantic"
intent    = "a class-form NamedTuple is a real tuple subclass with named fields, defaults, and helpers: Point(NamedTuple) with x:int, y:int=0 gives Point(1)==(1,0), isinstance tuple, _fields==('x','y'), _field_defaults=={'y':0}, __annotations__=={'x':int,'y':int}, _replace(y=5)==(1,5), _asdict()=={'x':1,'y':0}"

[[case]]
dimension = "behavior"
case      = "namedtuple_functional_form"
subject   = "typing.NamedTuple"
kind      = "semantic"
intent    = "the functional NamedTuple('Employee',[('name',str),('age',int)]) syntax builds a tuple subclass with named access and metadata: Employee('Nick',25).name=='Nick', __name__=='Employee', _fields==('name','age'); mixing the list form with keywords raises TypeError"

# --- TypedDict class form (from legacy namedtuple_typeddict.py) -----------

[[case]]
dimension = "behavior"
case      = "typeddict_class_form"
subject   = "typing.TypedDict"
kind      = "semantic"
intent    = "a class-form TypedDict carries field metadata while instances are plain dicts: Movie(TypedDict) with title:str, year:int gives a dict instance, __annotations__=={'title':str,'year':int}, __total__ is True, __required_keys__==frozenset({'title','year'})"

[[case]]
dimension = "behavior"
case      = "is_typeddict_discriminates"
subject   = "typing.is_typeddict"
kind      = "semantic"
intent    = "is_typeddict distinguishes TypedDict classes from everything else: True for a TypedDict subclass (Movie), False for a NamedTuple class (Point), for dict, and for int"

# --- runtime_checkable Protocol (from legacy protocols.py) ----------------

[[case]]
dimension = "behavior"
case      = "runtime_checkable_data_protocol_isinstance"
subject   = "typing.runtime_checkable"
kind      = "semantic"
intent    = "a @runtime_checkable Protocol with a data member supports isinstance by structural presence: a Person with a .name attribute isinstance HasName is True while an Anonymous without it is False"

[[case]]
dimension = "behavior"
case      = "runtime_checkable_method_protocol_isinstance"
subject   = "typing.runtime_checkable"
kind      = "semantic"
intent    = "a @runtime_checkable method Protocol matches by attribute presence: a File with a close() method isinstance Closeable is True while the int 42 is False"

[[case]]
dimension = "behavior"
case      = "protocol_concrete_subclass_inherits"
subject   = "typing.Protocol"
kind      = "semantic"
intent    = "a concrete class may subclass a Protocol to inherit its interface and is then an ordinary class: Square(Drawable) implements draw() and Square().draw()=='square'"

# --- @override runtime flag (from legacy protocols.py) --------------------

[[case]]
dimension = "behavior"
case      = "override_sets_runtime_flag"
subject   = "typing.override"
kind      = "semantic"
intent    = "@override is a pass-through that sets the __override__ flag at runtime: a Child.run decorated with @override returns 2, Child.run.__override__ is True, and the undecorated Base.run has no __override__ attribute"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc) for documented typing guards.
# Inherited xfail from the legacy errors.py monolith: mamba's runtime does not
# raise these typing-machinery exceptions (silent divergence). conformance skips
# mamba for these; CPython 3.12 still gates them green.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "nonruntime_protocol_isinstance_raises"
subject    = "typing.Protocol"
kind       = "mechanical"
call       = "isinstance(1, _NonRuntimeProto)"
expect_exc = "TypeError"
xfail      = "mamba does not raise on isinstance against a non-runtime-checkable Protocol (project_mamba_class_machinery_silent_divergences)"
import     = "import typing\n\nclass _NonRuntimeProto(typing.Protocol):\n    def foo(self) -> int: ...\n"

[[case]]
dimension  = "errors"
case       = "typevar_bound_and_constraints_raises"
subject    = "typing.TypeVar"
kind       = "mechanical"
call       = "typing.TypeVar('T', int, str, bound=int)"
expect_exc = "TypeError"
xfail      = "mamba does not raise when a TypeVar mixes constraints with bound= (project_mamba_class_machinery_silent_divergences)"

[[case]]
dimension  = "errors"
case       = "get_type_hints_bad_forward_ref_raises"
subject    = "typing.get_type_hints"
kind       = "mechanical"
call       = "typing.get_type_hints(_with_bad_ref)"
expect_exc = "NameError"
xfail      = "mamba does not resolve/raise on an undefined forward ref in get_type_hints (project_mamba_function_machinery_silent_divergences)"
import     = "import typing\n\ndef _with_bad_ref(x: \"NoSuchType\") -> int:\n    return 1\n"

[[case]]
dimension  = "errors"
case       = "generic_too_many_params_raises"
subject    = "typing.List"
kind       = "mechanical"
call       = "typing.List[int, str, float]"
expect_exc = "TypeError"
xfail      = "mamba does not enforce typing.List parameter arity (project_mamba_class_machinery_silent_divergences)"

[[case]]
dimension  = "errors"
case       = "non_subscriptable_type_raises"
subject    = "typing"
kind       = "mechanical"
call       = "int['x']"
expect_exc = "TypeError"
module     = "typing"
xfail      = "mamba does not raise on subscripting a non-subscriptable builtin type (project_mamba_class_machinery_silent_divergences)"

[[case]]
dimension  = "errors"
case       = "runtime_checkable_non_protocol_raises"
subject    = "typing.runtime_checkable"
kind       = "mechanical"
call       = "typing.runtime_checkable(_PlainClass)"
expect_exc = "TypeError"
xfail      = "mamba does not guard @runtime_checkable to Protocol classes (project_mamba_class_machinery_silent_divergences)"
import     = "import typing\n\nclass _PlainClass:\n    pass\n"

[[case]]
dimension  = "errors"
case       = "protocol_direct_instantiation_raises"
subject    = "typing.Protocol"
kind       = "mechanical"
call       = "_DirectProto()"
expect_exc = "TypeError"
xfail      = "mamba does not block direct instantiation of a Protocol class (project_mamba_class_machinery_silent_divergences)"
import     = "import typing\n\nclass _DirectProto(typing.Protocol):\n    def draw(self) -> None: ...\n"

[[case]]
dimension  = "errors"
case       = "overload_only_stub_call_raises"
subject    = "typing.overload"
kind       = "mechanical"
call       = "_only_stub(1)"
expect_exc = "NotImplementedError"
xfail      = "mamba does not raise NotImplementedError when calling an overload-only function (project_mamba_function_machinery_silent_divergences)"
import     = "import typing\n\n@typing.overload\ndef _only_stub(x: int) -> int: ...\n@typing.overload\ndef _only_stub(x: str) -> str: ...\n"

[[case]]
dimension  = "errors"
case       = "namedtuple_list_form_with_kwargs_raises"
subject    = "typing.NamedTuple"
kind       = "mechanical"
call       = "typing.NamedTuple('Bad', [('x', int)], y=str)"
expect_exc = "TypeError"
xfail      = "mamba does not reject mixing the NamedTuple list form with keyword fields (project_mamba_class_machinery_silent_divergences)"

[[case]]
dimension  = "errors"
case       = "unhashable_annotated_metadata_raises"
subject    = "typing.Annotated"
kind       = "mechanical"
call       = "hash(typing.Annotated[int, []])"
expect_exc = "TypeError"
xfail      = "mamba does not raise hashing an Annotated form with unhashable metadata (project_mamba_class_machinery_silent_divergences)"

