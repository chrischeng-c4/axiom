[[case]]
dimension = "real_world"
case      = "typed_record_pipeline"
subject   = "typing"
kind      = "semantic"
intent    = "a downstream consumer drives the typing runtime surface together end to end: a NamedTuple record type and a TypedDict view, a runtime_checkable Protocol gate on real instances, cast/assert_type identity pass-through, and get_origin/get_args introspection over Optional/Union/List annotations, asserting a deterministic aggregate over the processed records"
