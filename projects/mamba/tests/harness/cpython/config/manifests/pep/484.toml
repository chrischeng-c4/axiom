# Manifest for the PEP 484 (typing) conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/pep/484/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy loose-feature shape (surface.py, behavior.py,
# errors.py, special_forms.py, namedtuple_typeddict.py, protocols.py,
# runtime_helpers.py). No paired .expected goldens existed; no bench/ existed.
# PEP libs have no single CPython oracle test file — the existing fixtures plus
# the PEP 484 / `typing` runtime semantics are the source of truth.
#
# All subjects are dotted under the lowercase `typing` module, so the import
# inferer resolves `import typing` correctly (it stops at the first CapWords
# leaf — NamedTuple, Union, Protocol, ... — and falls back to `typing`); no
# explicit `module =` overrides are needed.
#
# xfail: the legacy errors.py monolith carried `# mamba-xfail` (mamba diverges
# on these documented runtime guards). Each decomposed errors case inherits that
# known gap. Repo memory: project_mamba_function_machinery_silent_divergences,
# project_mamba_class_machinery_silent_divergences (mamba runtime does not raise
# these typing-machinery TypeErrors/NameErrors — silent divergence).

bucket = "pep"
lib = "484"

