# Manifest for the PEP 570 (positional-only parameters, the `/` separator)
# conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/pep/positional_only/<dimension>/<case>.py:
#   - mechanical errors come out complete (status="filled")
#   - semantic surface/behavior cases come out as fillable skeletons
#     (status="generated")
#
# PEP 570 is a *language construct*, not an importable module: the subject is
# the `/` separator in a def signature, so there is no dotted API to probe and
# no `import` to infer. Each case sets an explicit `import = "pass"` so the
# generator emits a valid, import-free skeleton/body (the cases that need
# `inspect` import it inline in the body).
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py
# and the loose feature file errors.py. The bench/ dir (posonly_call_hot.py)
# is left untouched (perf, golden-less).
#
# Known mamba gaps (xfail driver) — see repo-memory
# project_mamba_function_machinery_silent_divergences:
#   #3 keyword-only enforcement missing: `def k(*, b): k(1)` does NOT raise.
#   #4 positional-only enforcement missing: `def p(a, /): p(a=1)` does NOT raise.
#   #8 function introspection attrs return None: `fn.__code__` is None, so
#      co_varnames / inspect.signature do not reflect the real signature.
# Every case that asserts enforcement or reads __code__ / inspect.signature is
# xfail-ed; the harness then skips mamba for it.

bucket = "pep"
lib    = "positional_only"

# ===========================================================================
# SURFACE — the `/` construct parses and the function calls (a run-probe, so
# semantic). CPython 3.12 is the oracle.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "posonly_def_parses_and_calls"
subject   = "/"
kind      = "semantic"
import    = "pass"
intent    = "a def with a `/` separator (def f(a, b, /)) parses and is callable positionally, returning the expected value"

[[case]]
dimension = "surface"
case      = "mixed_signature_parses_and_calls"
subject   = "/"
kind      = "semantic"
import    = "pass"
intent    = "a mixed signature (pos-only `/`, regular, keyword-only `*`) parses and is callable with the regular param given positionally or by keyword"

[[case]]
dimension = "surface"
case      = "kw_only_def_parses_and_calls"
subject   = "*"
kind      = "semantic"
import    = "pass"
intent    = "a keyword-only signature (def f(*, host, port)) parses and is callable when every argument is passed by keyword"

# ===========================================================================
# ERRORS — mechanical (the rejected call/construct, assert-it-raised).
# ===========================================================================

# Pure-syntax rejection: `/` as the sole parameter is a SyntaxError at compile
# time. This is a parser-level gate, not the enforcement gap, so not xfail.
[[case]]
dimension  = "errors"
case       = "solo_slash_rejected"
subject    = "/"
kind       = "mechanical"
import     = "pass"
call       = "compile('def h(/): pass', '<t>', 'exec')"
expect_exc = "SyntaxError"

# Calling a positional-only param by keyword must raise TypeError. Mamba does
# NOT enforce this (gap #4) -> xfail.
[[case]]
dimension  = "errors"
case       = "posonly_as_keyword_rejected"
subject    = "/"
kind       = "mechanical"
import     = "exec(\"def _p(a, b, /):\\n    return a + b\", globals())"
call       = "_p(a=1, b=2)"
expect_exc = "TypeError"
xfail      = "mamba does not enforce positional-only parameters: `_p(a=1, b=2)` is accepted silently instead of raising TypeError (project_mamba_function_machinery_silent_divergences #4)"

# Calling a keyword-only param positionally must raise TypeError. Mamba does
# NOT enforce this (gap #3) -> xfail.
[[case]]
dimension  = "errors"
case       = "kwonly_as_positional_rejected"
subject    = "*"
kind       = "mechanical"
import     = "exec(\"def _k(*, n, m):\\n    return n * m\", globals())"
call       = "_k(3, 4)"
expect_exc = "TypeError"
xfail      = "mamba does not enforce keyword-only parameters: `_k(3, 4)` is accepted silently instead of raising TypeError (project_mamba_function_machinery_silent_divergences #3)"

# ===========================================================================
# BEHAVIOR — semantic runtime value behaviors. CPython 3.12 is the oracle.
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "posonly_positional_call_returns_value"
subject   = "/"
kind      = "semantic"
import    = "pass"
intent    = "a positional-only function called positionally returns the computed value: def f(a, b, /): return a + b; f(1, 2) == 3"

# Mamba: __code__ is None (gap #8), so co_varnames is not readable -> xfail.
[[case]]
dimension = "behavior"
case      = "posonly_names_in_co_varnames"
subject   = "/"
kind      = "semantic"
import    = "pass"
intent    = "positional-only parameter names still appear in __code__.co_varnames"
xfail     = "mamba function introspection returns None for fn.__code__, so co_varnames is unreadable (project_mamba_function_machinery_silent_divergences #8)"

[[case]]
dimension = "behavior"
case      = "kwargs_shadows_posonly_name"
subject   = "/"
kind      = "semantic"
import    = "pass"
intent    = "a keyword colliding with a positional-only param name lands in **kwargs and does not shadow it: def f(a, /, **kw); f(1, a=999) binds a==1 and kw=={'a': 999}"

[[case]]
dimension = "behavior"
case      = "regular_param_positional_or_keyword"
subject   = "/"
kind      = "semantic"
import    = "pass"
intent    = "a regular (non-pos-only, non-kw-only) parameter can be passed positionally, by keyword, or mixed, all yielding the same result"

[[case]]
dimension = "behavior"
case      = "kw_only_required_by_keyword"
subject   = "*"
kind      = "semantic"
import    = "pass"
intent    = "a keyword-only parameter (after `*`) is bound when passed by keyword: def f(*, n, m): return n * m; f(n=3, m=4) == 12"

[[case]]
dimension = "behavior"
case      = "mixed_defaults_resolution"
subject   = "/"
kind      = "semantic"
import    = "pass"
intent    = "a mixed pos-only/regular/kw-only signature with defaults resolves each override correctly: def f(po, /, reg=10, *, ko=100) yields 111 / 103 / 16 / 6 across the override combinations"

# Mamba: __code__ is None (gap #8); inspect.signature cannot reflect the real
# signature, so the rendered `/` is unreliable -> xfail.
[[case]]
dimension = "behavior"
case      = "signature_renders_slash"
subject   = "/"
kind      = "semantic"
import    = "pass"
intent    = "inspect.signature renders the positional-only `/` separator: str(inspect.signature(f)) contains '/'"
xfail     = "mamba function introspection returns None for fn.__code__, so inspect.signature does not reflect the positional-only `/` (project_mamba_function_machinery_silent_divergences #8)"
