# Manifest for the PEP 501 (f-string `=` self-documenting debug syntax)
# conformance corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/pep/501/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# PEP 501 covers the `{expr = }` debug form: CPython 3.12 renders the source
# text of the expression, an `=`, and the value, e.g. `f"{x = }"` -> "x = 10".
# The subject is a language feature, not a module, so fixtures carry an
# explicit `import=""` (no import needed) and the subject is the documented
# syntax `fstring.debug_equals`.
#
# Known mamba gap: mamba strips the `name = ` prefix from PEP 501 debug
# f-strings (renders just the value); CPython renders `name = <value>`.
# See repo-memory project_mamba_pep_silent_divergences_2026_05_27. Every case
# that asserts the rendered `name = ` / `expr = ` prefix is xfail-ed.

bucket = "pep"
lib    = "501"

# ===========================================================================
# SURFACE — mechanical probe: the `{expr = }` debug form parses and runs.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "debug_equals_form_parses"
subject   = "f'{(10) = }'"
kind      = "mechanical"
import     = "pass"
probe     = "type"
typename  = "str"
# The `type` probe emits `assert type(<subject>).__name__ == "str"`; the
# subject is the literal `{expr = }` debug f-string, so the probe asserts the
# debug form parses and evaluates to a str. CPython-green; mamba parses it too
# (the prefix-stripping divergence is a render-content concern, covered by the
# behavior dimension, not by this existence probe).

# ===========================================================================
# ERRORS — mechanical (the malformed debug form CPython rejects).
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "empty_braces_with_equals_raises"
subject    = "fstring.debug_equals"
kind       = "mechanical"
import     = "pass"
call       = "eval('f\"{ = }\"')"
expect_exc = "SyntaxError"

# ===========================================================================
# BEHAVIOR — semantic (CPython's documented `{expr = }` rendering).
# ===========================================================================

[[case]]
dimension = "behavior"
case      = "renders_name_equals_value"
subject   = "fstring.debug_equals"
kind      = "semantic"
import     = "pass"
intent    = "f\"{x = }\" renders the expression source, an '=', and the value -> 'x = 10'"
xfail     = "mamba strips the `name = ` prefix from PEP 501 debug f-strings, rendering just the value (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "renders_expression_source"
subject   = "fstring.debug_equals"
kind      = "semantic"
import     = "pass"
intent    = "f\"{x + 1 = }\" echoes the full expression source text before the '=' -> 'x + 1 = 4'"
xfail     = "mamba strips the `expr = ` prefix from PEP 501 debug f-strings (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "honors_format_spec"
subject   = "fstring.debug_equals"
kind      = "semantic"
import     = "pass"
intent    = "a format spec after the debug '=' applies to the value only: f\"{x = :04d}\" -> 'x = 0042'"
xfail     = "mamba strips the `name = ` prefix from PEP 501 debug f-strings (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "repr_conversion_applies"
subject   = "fstring.debug_equals"
kind      = "semantic"
import     = "pass"
intent    = "an explicit !r conversion after the debug '=' reprs the value: f\"{x = !r}\" -> \"x = 42\" with the int repr"
xfail     = "mamba strips the `name = ` prefix from PEP 501 debug f-strings (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "multiple_debug_fields"
subject   = "fstring.debug_equals"
kind      = "semantic"
import     = "pass"
intent    = "two `{expr = }` fields in one f-string each render their own 'name = value' segment -> \"x = 42, y = 'hi'\""
xfail     = "mamba strips the `name = ` prefix from PEP 501 debug f-strings (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "whitespace_around_equals_preserved"
subject   = "fstring.debug_equals"
kind      = "semantic"
import     = "pass"
intent    = "leading/trailing inner whitespace is preserved verbatim: f\"{x= }\" -> 'x= 10' and f\"{x =}\" -> 'x =10'"
xfail     = "mamba strips the `name = ` prefix from PEP 501 debug f-strings (project_mamba_pep_silent_divergences_2026_05_27)"
