# Manifest for the PEP 498 (formatted string literals / f-strings) corpus,
# under the `fstrings` lib name.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/pep/fstrings/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py).
# The bench/ dir (bench/fstring_build_hot.py) is left as-is (perf, golden-less).
# This decomposition preserves every assertion in those three monoliths, one
# coherent concern per file.
#
# PEP 498 is a SYNTAX-level language feature: f-strings need no module import.
# The import inferer would try `import fstring` from a subject like
# `fstring.interpolation`, so each case carries an explicit `import` line — a
# real `import` where the body needs one (e.g. `import ast`), otherwise a
# harmless comment line (the generator emits the `import` value verbatim as the
# first body line).
#
# xfail citations: per repo memory
#   project_mamba_pep_silent_divergences_2026_05_27 — `{x = }` strips the name,
#     format-spec mismatches return None instead of raising ValueError; and
#   project_mamba_eval_silent_none_cross_type — mamba `eval()` defers the
#     strict-typing gate, so cross-type/format-spec mismatches silently return
#     None where CPython raises. The retired monoliths surface.py / behavior.py
#     carried `# mamba-xfail: goal-end sweep` head comments confirming mamba
#     diverges on the `!a` ASCII probe and the dynamic format-spec rule.

bucket = "pep"
lib    = "fstrings"

# ===========================================================================
# SURFACE — mechanical probes (the f-string machinery exists)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "format_builtin_is_callable"
subject   = "format"
kind      = "mechanical"
probe     = "callable"
import    = "# PEP 498 f-strings dispatch via the format() builtin / str.__format__"

[[case]]
dimension = "surface"
case      = "str_has_format_dunder"
subject   = "str"
kind      = "mechanical"
probe     = "attr"
attr      = "__format__"
import    = "# f-strings call __format__ on each replacement field"

[[case]]
dimension = "surface"
case      = "ascii_builtin_is_callable"
subject   = "ascii"
kind      = "mechanical"
probe     = "callable"
import    = "# the !a conversion flag dispatches via the ascii() builtin"

[[case]]
dimension = "surface"
case      = "repr_builtin_is_callable"
subject   = "repr"
kind      = "mechanical"
probe     = "callable"
import    = "# the !r conversion flag dispatches via the repr() builtin"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc), self-asserting via assert-it-raised
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "empty_expression_raises"
subject    = "fstring.syntax"
kind       = "mechanical"
call       = "eval('f\"{}\"')"
expect_exc = "SyntaxError"
import     = "# an empty replacement field {} is a SyntaxError"

[[case]]
dimension  = "errors"
case       = "bad_format_spec_raises"
subject    = "fstring.format_spec"
kind       = "mechanical"
call       = "eval('f\"{1:Q}\"')"
expect_exc = "ValueError"
xfail      = "mamba eval() defers parsing past the strict-typing gate; an invalid format code returns None instead of raising ValueError (project_mamba_pep_silent_divergences_2026_05_27, project_mamba_eval_silent_none_cross_type)"
import     = "# an invalid presentation type in the format spec raises ValueError"

# ===========================================================================
# BEHAVIOR — semantic (generator emits skeletons; agent fills the body)
# ===========================================================================

# --- basic interpolation & expression embedding (from surface.py) -----------

[[case]]
dimension = "behavior"
case      = "interpolates_name_value"
subject   = "fstring.interpolation"
kind      = "semantic"
intent    = "a bare name field interpolates its value: with x=10, f'{x}' is '10'"
import    = "# f-string interpolation is syntax; no import needed"

[[case]]
dimension = "behavior"
case      = "inline_arithmetic_expression"
subject   = "fstring.expression"
kind      = "semantic"
intent    = "an arithmetic expression evaluates inline: with x=10, f'{x + 5}' is '15'"
import    = "# replacement fields hold arbitrary expressions"

[[case]]
dimension = "behavior"
case      = "method_call_in_field"
subject   = "fstring.expression"
kind      = "semantic"
intent    = "a method call inside a field is evaluated and formatted: f\"{'hello'.upper()}\" is 'HELLO'"
import    = "# a call expression in a field is evaluated and formatted"

[[case]]
dimension = "behavior"
case      = "multiple_fields_with_arithmetic"
subject   = "fstring.interpolation"
kind      = "semantic"
intent    = "multiple fields interleave with literal text and a derived field: with a=3, b=4, f'{a} + {b} = {a + b}' is '3 + 4 = 7'"
import    = "# fields and literal runs concatenate left to right"

[[case]]
dimension = "behavior"
case      = "conditional_expression_in_field"
subject   = "fstring.expression"
kind      = "semantic"
intent    = "a conditional expression evaluates inside a field: with n=5, f\"{'odd' if n % 2 else 'even'}\" is 'odd'"
import    = "# a ternary conditional is a valid field expression"

[[case]]
dimension = "behavior"
case      = "dict_subscript_in_field"
subject   = "fstring.expression"
kind      = "semantic"
intent    = "a dict subscript evaluates inside a field: with d={'key':'value'}, f'{d[\"key\"]}' is 'value'"
import    = "# an f-string index key is an evaluated subscript expression"

# --- format specs & conversion flags (from surface.py / behavior.py) --------

[[case]]
dimension = "behavior"
case      = "float_precision_spec"
subject   = "fstring.format_spec"
kind      = "semantic"
intent    = "a float precision spec rounds: f'{3.14159:.2f}' is '3.14'"
import    = "# a presentation-type format spec controls float rendering"

[[case]]
dimension = "behavior"
case      = "hex_fill_and_width_spec"
subject   = "fstring.format_spec"
kind      = "semantic"
intent    = "an alternate-form zero-padded hex spec applies fill and width: f'{255:#010x}' is '0x000000ff'"
import    = "# '#' alt-form, zero fill, and width compose in the format spec"

[[case]]
dimension = "behavior"
case      = "integer_base_format_codes"
subject   = "fstring.format_spec"
kind      = "semantic"
intent    = "integer presentation codes render the base: f'{255:b}' is '11111111', f'{255:o}' is '377', f'{255:x}' is 'ff', f'{255:X}' is 'FF'"
import    = "# b/o/x/X presentation types render an int in binary/octal/hex"

[[case]]
dimension = "behavior"
case      = "underscore_grouping_spec"
subject   = "fstring.format_spec"
kind      = "semantic"
intent    = "the '_' grouping option inserts underscores every three digits: f'{1000000:_}' is '1_000_000'"
import    = "# '_' is a thousands-grouping option in the format spec"

[[case]]
dimension = "behavior"
case      = "conversion_flags_str_and_repr"
subject   = "fstring.conversion"
kind      = "semantic"
intent    = "!s uses str and !r uses repr: with v=\"it's alive\", f'{v!s}' is v and f'{v!r}' is repr(v)"
import    = "# !s / !r conversion flags select str / repr before formatting"

[[case]]
dimension = "behavior"
case      = "conversion_flags_custom_dunders"
subject   = "fstring.conversion"
kind      = "semantic"
intent    = "!r calls __repr__ and !s calls __str__ on a custom class: a class with __repr__ 'Custom(repr)' and __str__ 'Custom(str)' gives f'{c!r}' 'Custom(repr)' and f'{c!s}' 'Custom(str)'"
import    = "# conversion flags dispatch the matching dunder on a custom type"

[[case]]
dimension = "behavior"
case      = "ascii_conversion_escapes_non_ascii"
subject   = "fstring.conversion"
kind      = "semantic"
intent    = "!a escapes non-ASCII characters via ascii(): f'{\"caf\\u00e9\"!a}' contains the backslash-escaped code point '\\\\u00e9'"
xfail     = "mamba diverges on the !a ASCII conversion of a non-ASCII string (retired surface.py head comment: AssertionError !a = \"'cafe'\"; project_mamba_pep_silent_divergences_2026_05_27)"
import    = "# !a converts via ascii(), backslash-escaping non-ASCII code points"

[[case]]
dimension = "behavior"
case      = "dynamic_width_from_nested_field"
subject   = "fstring.format_spec"
kind      = "semantic"
intent    = "a nested {} inside the spec supplies the width dynamically: with width=10, f\"{'hi':^{width}}\" centres to '    hi    '"
import    = "# a replacement field may appear inside the format spec"

[[case]]
dimension = "behavior"
case      = "dynamic_format_spec_from_variable"
subject   = "fstring.format_spec"
kind      = "semantic"
intent    = "the whole format spec is itself an expression: with fmt='.3f', pi=3.14159265, f'{pi:{fmt}}' is '3.142'"
xfail     = "mamba diverges on a fully dynamic format spec built from a variable (retired behavior.py head comment: AssertionError dynamic fmt = '3.14159265'; project_mamba_pep_silent_divergences_2026_05_27)"
import    = "# the format spec after ':' is evaluated as an expression"

[[case]]
dimension = "behavior"
case      = "nested_field_supplies_sign_option"
subject   = "fstring.format_spec"
kind      = "semantic"
intent    = "a nested {} inside the spec supplies the sign option: with sign='+', f'{42:{sign}d}' is '+42'"
import    = "# a nested field can supply any part of the format spec"

# --- literal forms & escapes (from surface.py / behavior.py) ----------------

[[case]]
dimension = "behavior"
case      = "doubled_braces_are_literal"
subject   = "fstring.literal"
kind      = "semantic"
intent    = "doubled braces produce single literal braces and never start a field: f'{{not interpolated}}' is '{not interpolated}'"
import    = "# {{ and }} escape to literal braces"

[[case]]
dimension = "behavior"
case      = "empty_fstring_is_empty"
subject   = "fstring.literal"
kind      = "semantic"
intent    = "an f-string with no fields and no text is the empty string: f'' is ''"
import    = "# an f-string with no content is an ordinary empty literal"

[[case]]
dimension = "behavior"
case      = "implicit_concatenation_of_fstrings"
subject   = "fstring.literal"
kind      = "semantic"
intent    = "adjacent f-string literals concatenate at compile time: f'part1' f'-part2' f'-part3' is 'part1-part2-part3'"
import    = "# implicit string-literal concatenation works across f-string parts"

# --- evaluation & scoping semantics (from behavior.py) ----------------------

[[case]]
dimension = "behavior"
case      = "field_evaluated_in_enclosing_scope"
subject   = "fstring.evaluation"
kind      = "semantic"
intent    = "a field expression is evaluated in the enclosing scope with its side effects: a counter-incrementing call inside f'{next_val()}' yields '1' and bumps the module counter to 1"
import    = "# replacement fields evaluate in the enclosing scope, side effects included"

[[case]]
dimension = "behavior"
case      = "nested_fstring_is_just_an_expression"
subject   = "fstring.nesting"
kind      = "semantic"
intent    = "an inner f-string is just another expression in a field: inner = f\"{'world'}\" then f'hello {inner}' is 'hello world'"
import    = "# f-strings nest because a field holds any expression"

[[case]]
dimension = "behavior"
case      = "builtin_call_in_field"
subject   = "fstring.expression"
kind      = "semantic"
intent    = "a builtin call result interpolates: with data=[10,20,30], f'sum={sum(data)}' is 'sum=60'"
import    = "# a builtin call is a valid field expression"

[[case]]
dimension = "behavior"
case      = "generator_join_workaround_for_backslash"
subject   = "fstring.expression"
kind      = "semantic"
intent    = "binding a join result before the field avoids a literal backslash in the field: with items=[1,2,3], joined=', '.join(str(i) for i in items), f'[{joined}]' is '[1, 2, 3]'"
import    = "# bind a computed value first, then interpolate it"

# ===========================================================================
# REAL_WORLD — semantic end-user scenario
# ===========================================================================

[[case]]
dimension = "real_world"
case      = "render_aligned_report_table"
subject   = "fstring.format_spec"
kind      = "semantic"
intent    = "render an aligned plain-text report row using f-string width/alignment/precision specs over a small dataset, producing a fixed-width table"
import    = "# f-strings are the idiomatic way to render aligned tabular text"
