# Manifest for the PEP 526 variable-annotations conformance corpus, addressed
# under its descriptive alias `variable_annotations` (the human-readable twin of
# the numeric `pep/526` lib).
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/pep/variable_annotations/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic behavior cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith shape (surface.py, behavior.py, errors.py).
# Those monoliths had NO paired .expected goldens, so there are none to delete.
# bench/ (varanno_access_hot.py) is perf-only and left as-is.
#
# PEP 526 is a SYNTAX feature, not an importable module: there is no
# `import variable_annotations`. The subject is the language feature itself
# (variable annotations + the `__annotations__` mapping) plus the typing helpers
# (`ClassVar`, `Final`, `get_type_hints`). Cases whose subject is the bare
# `__annotations__` mapping carry an explicit `import = "import typing"` (or a
# `pass` no-op) anchor so the generator does not try to `import __annotations__`
# (a builtin, not a module). Cases whose subject is a `typing` symbol import
# `typing` normally.
#
# Mamba gotcha (xfail driver): module / class / function `__annotations__` is an
# UNDEFINED NAME under mamba (force-typed; the dict is never materialized), and
# function `__annotations__` returns None. mamba is also force-typed, so an
# annotation/value type mismatch (`z: int = "x"`) is rejected rather than bound,
# and `exec()` of bad source defers parsing -> silent None instead of raising.
# Every case that reads `__annotations__`, calls `get_type_hints`, or depends on
# annotation values NOT being runtime type-checked therefore diverges. See
# repo-memory project_mamba_pep_silent_divergences_2026_05_27 (function/class/
# module __annotations__) and project_mamba_eval_silent_none_cross_type
# (exec/eval defer parsing -> silent None). The harness skips mamba for xfail
# cases.

bucket = "pep"
lib    = "variable_annotations"

# ===========================================================================
# SURFACE — mechanical probes
# ===========================================================================

# The PEP 526 surface is the module-level `__annotations__` mapping. It exists
# as a dict (so it supports `keys`) even before any annotation is written.
# Mamba: `__annotations__` is an undefined name -> xfail.
[[case]]
dimension = "surface"
case      = "annotations_mapping_exists"
subject   = "__annotations__"
kind      = "mechanical"
probe     = "attr"
attr      = "keys"
import    = "import typing"
xfail     = "module __annotations__ is an undefined name on mamba (force-typed; the mapping is never materialized). See project_mamba_pep_silent_divergences_2026_05_27."

# The typing helpers PEP 526 leans on are real importable symbols.
[[case]]
dimension = "surface"
case      = "classvar_importable"
subject   = "typing.ClassVar"
kind      = "mechanical"
probe     = "attr"
attr      = "__getitem__"
import    = "import typing"

[[case]]
dimension = "surface"
case      = "final_importable"
subject   = "typing.Final"
kind      = "mechanical"
probe     = "attr"
attr      = "__getitem__"
import    = "import typing"

[[case]]
dimension = "surface"
case      = "get_type_hints_is_callable"
subject   = "typing.get_type_hints"
kind      = "mechanical"
probe     = "callable"
import    = "import typing"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc)
# ===========================================================================

# A bare annotation `y: int` (no value) does NOT bind the name; reading it
# raises NameError. exec() keeps the assignment in a fresh namespace so the read
# is in the same scope. Mamba: exec defers parsing and returns None silently
# instead of running the body -> the self-asserting template's `assert _raised`
# fails -> xfail.
[[case]]
dimension  = "errors"
case       = "annotation_only_name_unbound_raises"
subject    = "exec"
kind       = "mechanical"
call       = "exec('y: int\\nprint(y)')"
expect_exc = "NameError"
import     = "import typing"
xfail      = "mamba exec defers parsing and returns None silently instead of executing the body / raising NameError. See project_mamba_eval_silent_none_cross_type."

# A syntactically invalid annotation expression raises SyntaxError at compile
# time; exec() of the bad source surfaces it. Mamba: exec defers parsing and
# returns None silently instead of raising -> xfail.
[[case]]
dimension  = "errors"
case       = "bad_annotation_syntax_raises"
subject    = "exec"
kind       = "mechanical"
call       = "exec('x: not::a::valid::type = 1')"
expect_exc = "SyntaxError"
import     = "import typing"
xfail      = "mamba exec defers parsing and returns None silently instead of raising SyntaxError. See project_mamba_eval_silent_none_cross_type."

# ===========================================================================
# BEHAVIOR — semantic
# ===========================================================================

# --- module-scope annotations + the __annotations__ mapping ---------------

[[case]]
dimension = "behavior"
case      = "module_annotation_records"
subject   = "__annotations__"
kind      = "semantic"
intent    = "an annotated module-scope assignment `x: int = 42` records 'x' in the module __annotations__ mapping AND binds x to 42"
import    = "pass  # PEP 526 is syntax-only; __annotations__ is a builtin"
xfail     = "module __annotations__ is an undefined name on mamba. See project_mamba_pep_silent_divergences_2026_05_27."

[[case]]
dimension = "behavior"
case      = "module_annotations_is_dict"
subject   = "__annotations__"
kind      = "semantic"
intent    = "module-level __annotations__ is a plain dict after a `score: int = 0` annotation"
import    = "pass  # PEP 526 is syntax-only; __annotations__ is a builtin"
xfail     = "module __annotations__ is an undefined name on mamba. See project_mamba_pep_silent_divergences_2026_05_27."

[[case]]
dimension = "behavior"
case      = "final_not_enforced_at_runtime"
subject   = "__annotations__"
kind      = "semantic"
intent    = "a `Final` annotation is a type-checker hint only; at runtime `MAX: Final = 100` can be reassigned to 200 with no error"
import    = "from typing import Final"
xfail     = "mamba is force-typed; reassigning a Final-annotated name may be rejected, and the underlying annotation machinery diverges. See project_mamba_pep_silent_divergences_2026_05_27."

