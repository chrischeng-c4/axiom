dimension = "behavior"
case      = "wrong_typed_value_still_binds"
subject   = "__annotations__"
kind      = "semantic"
intent    = "CPython does not runtime type-check annotations: `z: int = 'not_an_int'` still binds z to the string (no TypeError)"
