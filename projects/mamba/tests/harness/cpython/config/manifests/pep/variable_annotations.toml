[[case]]
dimension = "behavior"
case      = "instance_annotation_in_init_binds"
subject   = "__annotations__"
kind      = "semantic"
intent    = "class-body instance annotations (`x: float; y: float`) are recorded in the class __annotations__ while the values are bound per-instance in __init__"
import    = "pass  # PEP 526 is syntax-only; __annotations__ is a builtin"
