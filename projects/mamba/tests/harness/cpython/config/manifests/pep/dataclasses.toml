# Manifest for the PEP 557 (dataclasses) conformance corpus — `dataclasses` lib.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/pep/dataclasses/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Decomposed from the legacy monoliths surface.py / behavior.py / errors.py that
# previously lived at the lib root (each whole-file `# mamba-xfail`'d). No
# coverage is lost — each independent concern becomes one named one-case file.
# The bench/ scenario (dataclass_create_hot.py) is kept as-is (golden-less).
#
# xfail rationale: `@dataclass` synthesizes its methods (__init__, __eq__,
# __repr__, ordering, __hash__, frozen __setattr__, default_factory, ...)
# through the class machinery that mamba diverges on — classmethod returning
# cls() -> None, frozen/__hash__/__slots__ not honored, synthesized __init__
# missing, etc. (repo memory project_mamba_class_machinery_silent_divergences,
# atomic 325, 2026-05-27). The three legacy monoliths were whole-file
# `# mamba-xfail`'d for exactly this reason. Pure API-existence surface probes
# (no decorator use) are NOT xfail'd; every case that exercises a synthesized
# dataclass method IS xfail'd against mamba. CPython 3.12 stays the oracle.

bucket = "pep"
lib = "dataclasses"

# ===========================================================================
# SURFACE — mechanical probes (API existence: callable). These do NOT use the
# @dataclass decorator, so they pass on mamba and are not xfail'd.
# ===========================================================================

[[case]]
dimension = "surface"
case      = "dataclass_is_callable"
subject   = "dataclasses.dataclass"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "field_is_callable"
subject   = "dataclasses.field"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "fields_is_callable"
subject   = "dataclasses.fields"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "replace_is_callable"
subject   = "dataclasses.replace"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "asdict_is_callable"
subject   = "dataclasses.asdict"
kind      = "mechanical"
probe     = "callable"

[[case]]
dimension = "surface"
case      = "astuple_is_callable"
subject   = "dataclasses.astuple"
kind      = "mechanical"
probe     = "callable"

# ===========================================================================
# ERRORS — frozen mutation path. Needs a @dataclass class def, so the
# mechanical single-call template does not apply; the body self-asserts the
# documented exception fires. xfail'd against mamba (synthesized frozen
# __setattr__ is not honored).
# ===========================================================================

[[case]]
dimension = "errors"
case      = "frozen_setattr_raises"
subject   = "dataclasses.FrozenInstanceError"
kind      = "semantic"
intent    = "assigning to a field of a frozen=True instance raises FrozenInstanceError"
xfail     = "mamba does not honor frozen synthesized __setattr__ (repo memory project_mamba_class_machinery_silent_divergences)"
source    = "errors.py"

# ===========================================================================
# BEHAVIOR — semantic (synthesized dataclass method behavior). All xfail'd
# against mamba; CPython 3.12 is the oracle.
# ===========================================================================

# --- core synthesized __init__ / __eq__ / __repr__ (from behavior.py) ------

[[case]]
dimension = "behavior"
case      = "init_from_annotated_fields"
