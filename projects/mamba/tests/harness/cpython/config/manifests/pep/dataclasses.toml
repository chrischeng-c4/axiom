kind      = "semantic"
intent    = "@dataclass generates __init__ from annotated fields, applying declared defaults; positional and keyword construction both work"
xfail     = "mamba does not synthesize __init__ from annotated fields (repo memory project_mamba_class_machinery_silent_divergences)"
source    = "behavior.py"

[[case]]
