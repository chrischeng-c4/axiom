# Manifest for the PEP 498 (formatted string literals / f-strings) corpus.
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/fixtures/pep/498/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# Migrated off the legacy monolith + loose-feature + paired-.expected shape
# (surface.py, behavior.py, errors.py, conversions_and_specs.py,
# evaluation_semantics.py, quoting_and_escapes.py, scoping.py,
# self_documenting.py, format_spec_mismatch_via_eval_raises.py/.expected).
# bench/ (if present) is left as-is.
#
# PEP 498 is a SYNTAX-level language feature: f-strings need no module import.
# The import inferer would try `import fstring` from a subject like
# `fstring.interpolation`, so each case carries an explicit `import` line — a
# real `import ast` where the body uses ast, otherwise a harmless comment line
# (the generator emits the `import` value verbatim as the first body line).
#
# xfail citations: per repo memory
#   project_mamba_pep_silent_divergences_2026_05_27 — `{x = }` strips the name,
#     format-spec mismatches return None instead of raising ValueError; and
#   project_mamba_eval_silent_none_cross_type — mamba `eval()` defers the
#     strict-typing gate, so cross-type/format-spec mismatches silently return
#     None where CPython raises.

bucket = "pep"
lib    = "498"

# ===========================================================================
# SURFACE — mechanical probes (the f-string machinery exists)
# ===========================================================================

[[case]]
dimension = "surface"
case      = "format_builtin_is_callable"
subject   = "format"
kind      = "mechanical"
probe     = "callable"
import    = "# PEP 498 f-strings dispatch via the format() builtin / str.__format__"

[[case]]
dimension = "surface"
case      = "str_has_format_dunder"
subject   = "str"
kind      = "mechanical"
probe     = "attr"
attr      = "__format__"
import    = "# f-strings call __format__ on each replacement field"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc), self-asserting via assert-it-raised
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "div_zero_propagates"
subject    = "fstring.expression"
kind       = "mechanical"
call       = "eval('f\"{1/0}\"')"
expect_exc = "ZeroDivisionError"
import     = "# expression failures inside a field propagate (builtin eval)"

[[case]]
dimension  = "errors"
case       = "missing_name_raises"
subject    = "fstring.expression"
kind       = "mechanical"
call       = "eval('f\"v:{undefined_name}\"')"
expect_exc = "NameError"
import     = "# an unbound name in a field raises NameError at runtime"

[[case]]
dimension  = "errors"
case       = "call_non_callable_raises"
subject    = "fstring.expression"
kind       = "mechanical"
call       = "eval('f\"{(1)()}\"')"
expect_exc = "TypeError"
import     = "# calling a non-callable inside a field raises TypeError"

[[case]]
dimension  = "errors"
case       = "empty_expression_raises"
subject    = "fstring.syntax"
kind       = "mechanical"
call       = "eval('f\"{}\"')"
expect_exc = "SyntaxError"
import     = "# an empty replacement field {} is a SyntaxError"

[[case]]
dimension  = "errors"
case       = "unclosed_brace_raises"
subject    = "fstring.syntax"
kind       = "mechanical"
call       = "eval('f\"hello {x\"')"
expect_exc = "SyntaxError"
import     = "# an unclosed replacement-field brace is a SyntaxError"

[[case]]
dimension  = "errors"
case       = "starred_expression_raises"
subject    = "fstring.syntax"
kind       = "mechanical"
call       = "compile(\"f'{*a}'\", '?', 'exec')"
expect_exc = "SyntaxError"
import     = "# a starred expression is not a valid f-string field (SyntaxError)"

[[case]]
dimension  = "errors"
case       = "literal_eval_rejects_fstring"
subject    = "ast.literal_eval"
kind       = "mechanical"
call       = "ast.literal_eval(\"f'x'\")"
expect_exc = "ValueError"
import     = "import ast"

[[case]]
dimension  = "errors"
case       = "bad_format_spec_raises"
subject    = "fstring.format_spec"
kind       = "mechanical"
call       = "eval('f\"{1:Q}\"')"
expect_exc = "ValueError"
xfail      = "mamba eval() defers parsing past the strict-typing gate; an invalid format code returns None instead of raising ValueError (project_mamba_pep_silent_divergences_2026_05_27, project_mamba_eval_silent_none_cross_type)"
import     = "# an invalid presentation type in the format spec raises ValueError"

[[case]]
dimension  = "errors"
case       = "comma_underscore_grouping_raises"
subject    = "fstring.format_spec"
kind       = "mechanical"
call       = "eval(\"f'{1:,_}'\")"
expect_exc = "ValueError"
xfail      = "mamba eval() returns None for the mutually-exclusive ',' and '_' grouping options instead of raising ValueError (project_mamba_pep_silent_divergences_2026_05_27)"
import     = "# ',' and '_' grouping options are mutually exclusive (ValueError)"

[[case]]
dimension  = "errors"
case       = "decimal_code_on_str_raises"
subject    = "fstring.format_spec"
kind       = "mechanical"
call       = "'{:d}'.format('x')"
expect_exc = "ValueError"
xfail      = "mamba returns None for a format-code/value-type mismatch (':d' on str) instead of raising ValueError (project_mamba_pep_silent_divergences_2026_05_27)"
import     = "# 'd' (decimal-integer) applied to a str is a ValueError"

[[case]]
dimension  = "errors"
case       = "decimal_code_on_float_raises"
subject    = "fstring.format_spec"
kind       = "mechanical"
call       = "eval(\"f'{1.5:d}'\")"
expect_exc = "ValueError"
xfail      = "mamba returns None for a format-code/value-type mismatch (':d' on float) instead of raising ValueError (project_mamba_pep_silent_divergences_2026_05_27)"
import     = "# 'd' (decimal-integer) applied to a float is a ValueError"

[[case]]
dimension  = "errors"
case       = "string_code_on_int_raises"
subject    = "fstring.format_spec"
kind       = "mechanical"
call       = "eval(\"f'{1:s}'\")"
expect_exc = "ValueError"
xfail      = "mamba returns None for a format-code/value-type mismatch (':s' on int) instead of raising ValueError (project_mamba_pep_silent_divergences_2026_05_27)"
import     = "# 's' (string) applied to an int is a ValueError"

[[case]]
dimension  = "errors"
case       = "float_code_on_str_raises"
subject    = "fstring.format_spec"
kind       = "mechanical"
call       = "'{:.2f}'.format('x')"
expect_exc = "ValueError"
xfail      = "mamba returns None for a format-code/value-type mismatch ('.2f' on str) instead of raising ValueError (project_mamba_pep_silent_divergences_2026_05_27)"
import     = "# '.2f' applied to a str is a ValueError"

[[case]]
dimension  = "errors"
case       = "binary_code_on_float_raises"
subject    = "fstring.format_spec"
kind       = "mechanical"
call       = "'{:b}'.format(1.5)"
expect_exc = "ValueError"
xfail      = "mamba returns None for a format-code/value-type mismatch (':b' on float) instead of raising ValueError (project_mamba_pep_silent_divergences_2026_05_27)"
import     = "# 'b' (binary) applied to a float is a ValueError"

[[case]]
dimension  = "errors"
case       = "hex_code_on_str_raises"
subject    = "fstring.format_spec"
kind       = "mechanical"
call       = "'{:x}'.format('a')"
expect_exc = "ValueError"
xfail      = "mamba returns None for a format-code/value-type mismatch (':x' on str) instead of raising ValueError (project_mamba_pep_silent_divergences_2026_05_27)"
import     = "# 'x' (hex) applied to a str is a ValueError"

# ===========================================================================
# BEHAVIOR — semantic (generator emits skeletons; agent fills the body)
# ===========================================================================

# --- basic interpolation & literal forms (from surface.py / behavior.py) ----

[[case]]
dimension = "behavior"
case      = "interpolates_name_and_format_spec"
subject   = "fstring.interpolation"
kind      = "semantic"
intent    = "a bare name field and a name with a format spec interpolate: f'{x}' is '42' and f'{x:04d}' is '0042' for x = 42"
import    = "# f-string interpolation is syntax; no import needed"

[[case]]
dimension = "behavior"
case      = "empty_and_whitespace_literals"
subject   = "fstring.literal"
kind      = "semantic"
intent    = "an f-string with no fields is an ordinary literal: f'' is '', f' ' is ' ', f'a' is 'a'"
import    = "# f-string literal portions behave like plain string literals"

[[case]]
dimension = "behavior"
case      = "raw_fstring_prefix_orders"
subject   = "fstring.prefix"
kind      = "semantic"
intent    = "both prefix orders combine raw + f: rf'\\n{1}' is '\\\\n1' and fr'{1}\\t' is '1\\\\t'"
import    = "# rf and fr prefixes both yield a raw f-string"

[[case]]
dimension = "behavior"
case      = "inline_arithmetic_and_comparison_expressions"
subject   = "fstring.expression"
kind      = "semantic"
intent    = "arbitrary expressions evaluate inline: f'{x*2}' is '20' (x=10), f'{3 + 4}' is '7', f'{0 == 1}' is 'False', f'{3 != 4}' is 'True'"
import    = "# replacement fields hold arbitrary expressions"

[[case]]
dimension = "behavior"
case      = "multiple_fields_mix_with_literal_text"
subject   = "fstring.interpolation"
kind      = "semantic"
intent    = "multiple fields interleave with literal text: with a=98, b='abc', f'X{a}Y{b}Z' is 'X98YabcZ'"
import    = "# fields and literal runs concatenate left to right"

[[case]]
dimension = "behavior"
case      = "function_call_result_interpolates"
subject   = "fstring.expression"
kind      = "semantic"
intent    = "a function-call result interpolates: with label(v) returning 'x='+str(v), f'{label(10)}' is 'x=10'"
import    = "# a call expression in a field is evaluated and formatted"

# --- conversion flags & format specs (from behavior.py / conversions_and_specs.py)

[[case]]
dimension = "behavior"
case      = "conversion_flags_repr_and_str"
subject   = "fstring.conversion"
kind      = "semantic"
intent    = "!r uses repr and !s uses str: f\"{'x'!r}\" is \"'x'\" and f'{3 != 4!s}' is 'True'"
import    = "# !r / !s conversion flags select repr / str before formatting"

[[case]]
dimension = "behavior"
case      = "conversion_then_format_spec"
subject   = "fstring.conversion"
kind      = "semantic"
intent    = "a conversion then a format spec apply in order: f'{3 != 4!s:.3}' converts True via str then truncates to 'Tru'"
import    = "# conversion runs before the format spec"

[[case]]
dimension = "behavior"
case      = "empty_spec_equals_no_spec"
subject   = "fstring.format_spec"
kind      = "semantic"
intent    = "an empty format spec equals no spec for str: f'{x}', f'{x:}', f'{x!s:}' all give 'test' and f'{x!r:}' gives \"'test'\" for x='test'"
import    = "# {x:} dispatches __format__('') just like {x}"

[[case]]
dimension = "behavior"
case      = "nested_field_supplies_dynamic_width"
subject   = "fstring.format_spec"
kind      = "semantic"
intent    = "a nested {} inside the spec supplies the width dynamically: with width=10, f\"x={'foo'*2:{width}}\" is 'x=foofoo    ' and f'{10*2:{width}}' is '        20'"
import    = "# a replacement field may appear inside the format spec"

[[case]]
dimension = "behavior"
case      = "custom_format_dispatch_on_spec"
subject   = "fstring.format_spec"
kind      = "semantic"
intent    = "__format__ receives the raw spec: a Marker whose __format__ returns '*' when spec is empty else the spec gives f'{m}' '*', f'{m:}' '*', f'{m:x}' 'x'"
import    = "# the format spec string is passed verbatim to __format__"

[[case]]
dimension = "behavior"
case      = "trailing_double_brace_is_literal_after_format"
subject   = "fstring.format_spec"
kind      = "semantic"
intent    = "the spec is read greedily to the closing brace and a trailing }} is a literal brace: f'{1:}}}' is '1}' and f'{1:>3{5}}}}' right-aligns 1 in width 5 then appends '}'"
import    = "# }} after a field's closing brace is a literal '}'"

# --- evaluation & dispatch semantics (from evaluation_semantics.py) ---------

[[case]]
dimension = "behavior"
case      = "fields_evaluated_left_to_right"
subject   = "fstring.evaluation"
kind      = "semantic"
intent    = "replacement fields evaluate left to right: a Counter whose __format__ returns an incrementing count gives f'{c} {c}' == '1 2'"
import    = "# field evaluation order is left to right, observable via side effects"

[[case]]
dimension = "behavior"
case      = "format_dispatches_on_type_not_instance"
subject   = "fstring.evaluation"
kind      = "semantic"
intent    = "f-string format dispatches __format__ on the type, ignoring a per-instance __format__ attribute, while calling the bound attribute directly uses it"
import    = "import types"

[[case]]
dimension = "behavior"
case      = "nested_fstring_is_just_an_expression"
subject   = "fstring.nesting"
kind      = "semantic"
intent    = "an inner f-string is just another expression: with y=5, f\"{f'{y}' * 3}\" is '555'"
import    = "# f-strings nest because a field holds any expression"

[[case]]
dimension = "behavior"
case      = "walrus_binds_and_leaks"
subject   = "fstring.expression"
kind      = "semantic"
intent    = "a walrus inside a field binds and leaks: f'{(z := 10)}' is '10' and z == 10 afterward"
import    = "# the walrus operator works inside a replacement field"

[[case]]
dimension = "behavior"
case      = "leading_fstring_is_not_a_docstring"
subject   = "fstring.statement"
kind      = "semantic"
intent    = "an f-string as a function's first statement is not a docstring: fn.__doc__ is None"
import    = "# only a plain str literal as the first statement is a docstring"

[[case]]
dimension = "behavior"
case      = "field_evaluates_key_expression"
subject   = "fstring.expression"
kind      = "semantic"
intent    = "f-strings evaluate the index key expression while str.format treats [a] as the literal key 'a': with d={'a':'string',0:'integer'}, a=0, f'{d[a]}' is 'integer' but '{d[a]}'.format(d=d) is 'string'"
import    = "# unlike str.format, an f-string index key is an evaluated expression"

# --- quoting, brace escapes, backslashes (from quoting_and_escapes.py) ------

[[case]]
dimension = "behavior"
case      = "doubled_braces_are_literal"
subject   = "fstring.literal"
kind      = "semantic"
intent    = "doubled braces produce a single literal brace and never start a field: f'{{1+1}}' is '{1+1}' and f'{{1+1' is '{1+1'"
import    = "# {{ and }} escape to literal braces"

[[case]]
dimension = "behavior"
case      = "inner_quotes_differ_from_delimiter"
subject   = "fstring.quoting"
kind      = "semantic"
intent    = "a field's string literal may use a different quote style, including inside a triple-quoted f-string: f'''{d[\"'\"]}''' is 'squote' and f'''{d['\"']}''' is 'dquote'"
import    = "# an f-string field may contain differently-quoted string literals"

[[case]]
dimension = "behavior"
case      = "triple_quoted_embeds_both_quote_styles"
subject   = "fstring.quoting"
kind      = "semantic"
intent    = "a triple-quoted f-string lets a field embed both quote styles: f'''{\"eric's\"}''' is \"eric's\" and f'''{'xeric\"sy'}''' is 'xeric\"sy'"
import    = "# triple-quoted f-strings relax the inner quote constraint"

[[case]]
dimension = "behavior"
case      = "literal_backslashes_behave_normally"
subject   = "fstring.literal"
kind      = "semantic"
intent    = "backslashes in the literal portion behave like a normal string: f'\\\\' is '\\\\' and f'\\\\\\\\' is '\\\\\\\\'"
import    = "# backslash escapes in literal runs match plain string literals"

[[case]]
dimension = "behavior"
case      = "raw_fstring_keeps_backslashes"
subject   = "fstring.prefix"
kind      = "semantic"
intent    = "raw f-strings keep backslashes verbatim: rf'\\n' is '\\\\n' and rf'{1}\\t' is '1\\\\t'"
import    = "# the r prefix disables backslash interpretation in the literal run"

[[case]]
dimension = "behavior"
case      = "line_continuation_collapses"
subject   = "fstring.literal"
kind      = "semantic"
intent    = "a line-continuation backslash collapses to nothing even inside an f-string: eval('f\"\\\\\\n\"') is ''"
import    = "# a trailing backslash-newline is a line continuation"

# --- name resolution / scoping (from scoping.py) ----------------------------

[[case]]
dimension = "behavior"
case      = "field_sees_module_globals"
subject   = "fstring.scope"
kind      = "semantic"
intent    = "an f-string field reads module globals: a function returning f'g:{a_global}' sees the module-level a_global"
import    = "# replacement fields resolve names in the enclosing scope chain"

[[case]]
dimension = "behavior"
case      = "field_sees_locals_and_shadowing"
subject   = "fstring.scope"
kind      = "semantic"
intent    = "a field reads locals and a local shadows the same-named global within the function"
import    = "# a local binding shadows a global of the same name in a field"

[[case]]
dimension = "behavior"
case      = "field_captures_closure_variable"
subject   = "fstring.scope"
kind      = "semantic"
intent    = "a nested function's f-string captures the enclosing variable: closure('987')() is 'x:987' and closure(7)() is 'x:7'"
import    = "# an f-string field closes over enclosing-function variables"

[[case]]
dimension = "behavior"
case      = "loop_variable_resolves_freshly"
subject   = "fstring.scope"
kind      = "semantic"
intent    = "a loop variable resolves freshly each iteration: f'i:{i}' over range(5) yields ['i:0','i:1','i:2','i:3','i:4']"
import    = "# a field re-reads the loop variable on each pass"

# --- self-documenting `=` debug (from self_documenting.py / behavior.py) ----

[[case]]
dimension = "behavior"
case      = "debug_eq_emits_expr_and_value"
subject   = "fstring.debug"
kind      = "semantic"
intent    = "{expr=} emits the source text, '=', then the value (repr by default): with x=10, f'{x=}' is 'x=10' and f'{name=}' is \"name='world'\" for name='world'"
import    = "# the =-debug form echoes the expression source plus its value"

[[case]]
dimension = "behavior"
case      = "debug_eq_preserves_internal_spacing"
subject   = "fstring.debug"
kind      = "semantic"
intent    = "the =-debug form echoes verbatim spacing/operators: f'{x = }' is 'x = 10', f'1 == 2={1 == 2!r}' is '1 == 2=False', f'{1 + 2 = }' is '1 + 2 = 3', f'{total*2=}' is 'total*2=6'"
xfail     = "mamba strips the expression name/spacing from the {expr = } debug form (project_mamba_pep_silent_divergences_2026_05_27)"
import    = "# whitespace and operators inside the debug field are echoed verbatim"

[[case]]
dimension = "behavior"
case      = "debug_eq_with_conversion_and_spec"
subject   = "fstring.debug"
kind      = "semantic"
intent    = "an explicit conversion or spec overrides the =-debug default repr: with val=3.14159, f'{val=:.2f}' is 'val=3.14' and f'{name=!s}' is 'name=world' for name='world'"
import    = "# !s or a format spec override the default repr in a debug field"
