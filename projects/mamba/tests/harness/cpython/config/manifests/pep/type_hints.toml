# Manifest for the PEP 484 type-hints conformance corpus (lib slug `type_hints`).
#
# One [[case]] per fixture. `fixture_gen.py` turns this into the files under
# tests/cpython/pep/type_hints/<dimension>/<case>.py:
#   - mechanical surface/errors come out complete (status="filled")
#   - semantic cases come out as fillable skeletons (status="generated")
#
# DECOMPOSE-EXISTING migration. Replaces the legacy root monoliths
# surface.py / behavior.py / errors.py (no paired .expected goldens existed;
# bench/type_hints_call_hot.py is KEPT as-is — perf, golden-less). The cases
# below recover every assertion in those three monoliths, split one concern per
# file and kept cohesive where a single rule was exercised over a few inputs.
#
# PEP libs have no single CPython oracle test file — the existing fixtures plus
# the PEP 484 / `typing` runtime semantics are the source of truth. CPython 3.12
# is the oracle (exit-0).
#
# All subjects are dotted under the lowercase `typing` module (or a builtin like
# `list`), so the import inferer resolves `import typing` correctly: it stops at
# the first CapWords leaf (Optional, Union, Generic, Protocol, ...) and falls
# back to `typing`. No explicit `module =` overrides are needed except where the
# subject is itself a builtin form.
#
# xfail: the legacy surface.py and behavior.py monoliths carried
# `# mamba-xfail: goal-end sweep; mamba diverges (   |)` (the `|` union render
# and the typing-runtime machinery diverge on mamba). The decomposed semantic
# cases inherit that known gap and cite repo memory:
#   - project_mamba_pep_silent_divergences_2026_05_27  (int|str -> None, function
#     __annotations__ -> None on mamba)
#   - project_mamba_function_machinery_silent_divergences
#   - project_mamba_class_machinery_silent_divergences  (typing-machinery guards
#     do not raise on mamba — silent divergence)
# conformance skips mamba for xfail cases; CPython 3.12 still gates them green.

bucket = "pep"
lib = "type_hints"

