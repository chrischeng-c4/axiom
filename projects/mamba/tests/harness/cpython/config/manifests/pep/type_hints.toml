# ===========================================================================
# BEHAVIOR — semantic (documented typing runtime behaviors recovered from the
# legacy surface.py / behavior.py / errors.py monoliths).
# Each inherits the legacy `# mamba-xfail: ... mamba diverges (   |)` gap.
# ===========================================================================

# --- function annotations (surface.py _add / behavior.py Rule 1) ----------

[[case]]
dimension = "behavior"
case      = "annotated_function_runs_and_records_annotations"
subject   = "typing.get_type_hints"
kind      = "semantic"
intent    = "an int->int annotated function runs normally and stores its hints: _add(a:int,b:int)->int returns 5 for (2,3), is callable, and 'return' is in _add.__annotations__"
xfail     = "mamba returns None for a function's __annotations__ (project_mamba_pep_silent_divergences_2026_05_27)"

[[case]]
dimension = "behavior"
case      = "annotations_not_runtime_enforced"
subject   = "typing"
kind      = "semantic"
intent    = "annotations are advisory only: _fn(x:int,y:str='hi')->bool has a dict __annotations__ yet calling _fn('not_int') is accepted at runtime and returns True with no type enforcement"
xfail     = "mamba returns None for a function's __annotations__ (project_mamba_pep_silent_divergences_2026_05_27)"

# --- Optional == Union[X, None] (surface.py / behavior.py Rule 2) ----------

[[case]]
dimension = "behavior"
case      = "optional_equals_union_with_none"
subject   = "typing.Optional"
kind      = "semantic"
intent    = "Optional[X] is exactly Union[X,None]: typing.Optional[int]==Union[int,None] and typing.Optional[str]==Union[str,None]"
xfail     = "mamba diverges on the typing union/| machinery (project_mamba_pep_silent_divergences_2026_05_27)"

# --- Union annotation accepts either member (surface.py _first) ------------

[[case]]
dimension = "behavior"
case      = "union_annotation_accepts_either_member"
subject   = "typing.Union"
kind      = "semantic"
intent    = "a Union[int,str]-annotated function accepts either member at runtime: _first(1)=='1' and _first('a')=='a' (annotation is advisory)"
xfail     = "mamba diverges on the typing union/| machinery (project_mamba_pep_silent_divergences_2026_05_27)"

# --- TypeVar placeholder, not enforced (behavior.py Rule 3) ---------------

[[case]]
dimension = "behavior"
case      = "typevar_identity_not_enforced"
subject   = "typing.TypeVar"
kind      = "semantic"
intent    = "a TypeVar is an unenforced placeholder: T=TypeVar('T'); _identity(x:T)->T returns 42 for 42 and 'hi' for 'hi', and isinstance(T, TypeVar) is True"
xfail     = "mamba diverges on the typing TypeVar/runtime machinery (project_mamba_class_machinery_silent_divergences)"

# --- Generic[T] subclass holds value (surface.py _Box / behavior.py Rule 4)

[[case]]
dimension = "behavior"
case      = "generic_box_holds_value"
subject   = "typing.Generic"
kind      = "semantic"
intent    = "a Generic[T] subclass is an ordinary class at runtime: _Box(Generic[T]) stores and returns any value, _Box(42).get()==42 and _Box('hello').get()=='hello'"
xfail     = "mamba diverges on the typing Generic runtime machinery (project_mamba_class_machinery_silent_divergences)"

[[case]]
dimension = "behavior"
case      = "generic_stack_lifo_and_size"
subject   = "typing.Generic"
kind      = "semantic"
intent    = "a Generic[T] _Stack subclass behaves as a normal LIFO container: push 1,2,3 then pop()==3 and size()==2"
xfail     = "mamba diverges on the typing Generic runtime machinery (project_mamba_class_machinery_silent_divergences)"

# --- Dict / Tuple annotated functions (surface.py / behavior.py Rule 5,6) --

[[case]]
dimension = "behavior"
case      = "list_int_annotated_sum"
subject   = "typing.List"
kind      = "semantic"
intent    = "a List[int]-annotated function works on a normal list: _sum_list(items:List[int])->int returns 6 for [1,2,3]"
xfail     = "mamba diverges on the typing generic-alias runtime machinery (project_mamba_class_machinery_silent_divergences)"

[[case]]
dimension = "behavior"
case      = "dict_annotated_word_count"
subject   = "typing.Dict"
kind      = "semantic"
intent    = "a Dict[str,int]-annotated function returns a plain dict: _count_words('a b a') returns {'a':2,'b':1}"
xfail     = "mamba diverges on the typing generic-alias runtime machinery (project_mamba_class_machinery_silent_divergences)"

[[case]]
dimension = "behavior"
case      = "tuple_annotated_fixed_arity"
subject   = "typing.Tuple"
kind      = "semantic"
intent    = "a Tuple[int,int]-annotated function returns a real 2-tuple: _divmod2(17,5) unpacks to q==3, r==2"
xfail     = "mamba diverges on the typing generic-alias runtime machinery (project_mamba_class_machinery_silent_divergences)"

# --- Callable annotation (surface.py _apply) ------------------------------

[[case]]
dimension = "behavior"
case      = "callable_annotation_applies_function"
subject   = "typing.Callable"
kind      = "semantic"
intent    = "a Callable[[int],int]-annotated parameter is just a function at runtime: _apply(lambda x: x*2, 5)==10"
xfail     = "mamba diverges on the typing Callable runtime machinery (project_mamba_class_machinery_silent_divergences)"

# --- cast no-op (surface.py / behavior.py Rule 8 / errors.py) --------------

[[case]]
dimension = "behavior"
case      = "cast_is_runtime_noop"
subject   = "typing.cast"
kind      = "semantic"
intent    = "cast is a runtime no-op returning its argument unchanged with no coercion: cast(int,'hello')=='hello' and cast(int,'still a str')=='still a str'"
