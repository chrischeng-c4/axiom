# --- get_type_hints resolves hints (surface.py / behavior.py Rule 7) -------

[[case]]
dimension = "behavior"
case      = "get_type_hints_returns_param_dict"
subject   = "typing.get_type_hints"
kind      = "semantic"
intent    = "get_type_hints returns a dict of resolved annotations: for _typed(a:int,b:Optional[str]=None)->List[int] it is a dict containing 'a', 'b' and 'return'"

# --- List[int] generic alias has __origin__ (behavior.py Rule 9) ----------

[[case]]
dimension = "behavior"
case      = "list_int_alias_origin_is_list"
subject   = "typing.List"
kind      = "semantic"
intent    = "List[int] is a generic alias exposing its origin: hasattr(List[int],'__origin__') is True and List[int].__origin__ is the builtin list"
