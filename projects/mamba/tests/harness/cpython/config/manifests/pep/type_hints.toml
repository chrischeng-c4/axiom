# --- special forms exist at runtime (errors.py hasattr probes) ------------

[[case]]
dimension = "behavior"
case      = "annotated_final_classvar_exist"
subject   = "typing"
kind      = "semantic"
intent    = "the documented PEP 484/586/591 special forms are present on the typing module: hasattr(typing,'Annotated'), hasattr(typing,'Final') and hasattr(typing,'ClassVar') are all True"
xfail     = "mamba diverges on the typing special-form surface (project_mamba_class_machinery_silent_divergences)"

# ===========================================================================
# ERRORS — mechanical (call + expect_exc). From errors.py: isinstance against a
# non-runtime-checkable Protocol must raise TypeError. Inherits the known mamba
# gap (silent divergence — does not raise), so conformance skips mamba.
# ===========================================================================

[[case]]
dimension  = "errors"
case       = "nonruntime_protocol_isinstance_raises"
subject    = "typing.Protocol"
kind       = "mechanical"
call       = "isinstance(1, _NonRuntimeProto)"
expect_exc = "TypeError"
xfail      = "mamba does not raise on isinstance against a non-runtime-checkable Protocol (project_mamba_class_machinery_silent_divergences)"
import     = "import typing\n\nclass _NonRuntimeProto(typing.Protocol):\n    def foo(self) -> int: ...\n"
