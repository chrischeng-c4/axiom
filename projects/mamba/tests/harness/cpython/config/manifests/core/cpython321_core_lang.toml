class _Adder:
    def __init__(self, x):
        self.x = x

    def __add__(self, other):
        return _Adder(self.x + other.x)

    def __repr__(self):
        return f"_Adder({self.x})"

    def __eq__(self, other):
        return isinstance(other, _Adder) and self.x == other.x

    def __hash__(self):
        return hash(self.x)

    def __lt__(self, other):
        return self.x < other.x

    def __bool__(self):
        return self.x != 0

    def __len__(self):
        return self.x

    def __contains__(self, val):
        return val == self.x

    def __call__(self, y):
        return self.x + y


class _Base:
    def greet(self):
        return "base"


class _Child(_Base):
    def greet(self):  # type: ignore[override]
        return "child:" + super().greet()


class _C2:
    @classmethod
    def cm(cls):
        return cls.__name__

    @staticmethod
    def sm():
        return "static"

    @property
    def p(self):
        return 42


class _MyErr(Exception):
    pass


def _gen_simple():
    yield 1
    yield 2
    yield 3


def _gen_from():
    yield from [1, 2, 3]
    yield from "ab"


def _make_counter():
    count = 0

    def inc():
        nonlocal count
        count += 1
        return count

    return inc


