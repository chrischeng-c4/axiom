assert _ok == True; _ledger.append(1)
assert list(iter("abc")) == ["a", "b", "c"]; _ledger.append(1)
assert list(iter((1, 2, 3))) == [1, 2, 3]; _ledger.append(1)
assert sorted(iter({"a": 1, "b": 2})) == ["a", "b"]; _ledger.append(1)
