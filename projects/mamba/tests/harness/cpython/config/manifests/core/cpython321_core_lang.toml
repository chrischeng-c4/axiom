def classify(x):
    match x:
        case 0:
            return "zero"
        case 1 | 2 | 3:
            return "small"
        case n if n > 100:
            return "big"
        case _:
            return "other"

# Literal pattern
r1 = classify(0)
assert r1 == "zero"; _ledger.append(1)
# OR pattern — any of the three literals matches
r2 = classify(2)
assert r2 == "small"; _ledger.append(1)
# Capture pattern with guard
r3 = classify(200)
assert r3 == "big"; _ledger.append(1)
# Wildcard fallback
