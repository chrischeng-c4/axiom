    _d: Any = {"a": 1}
    _d.update(_int)
    raise AssertionError("d.update(5) must raise TypeError")
except TypeError:
    _ledger.append(1)

# dict.update(None)
try:
    _d: Any = {"a": 1}
    _d.update(_none)
    raise AssertionError("d.update(None) must raise TypeError")
except TypeError:
    _ledger.append(1)

# dict.update(float)
try:
    _d: Any = {"a": 1}
