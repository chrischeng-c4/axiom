    def __init__(self, v):
        self.v = v
    def __add__(self, other):
        return _N(self.v + (other.v if isinstance(other, _N) else other))
    def __sub__(self, other):
        return _N(self.v - (other.v if isinstance(other, _N) else other))
    def __mul__(self, other):
        return _N(self.v * (other.v if isinstance(other, _N) else other))

