except TypeError:
    _ledger.append(1)

# complex > complex
try:
    _ = _c > _d
    raise AssertionError("complex > complex must raise TypeError")
except TypeError:
    _ledger.append(1)

# complex >= complex
try:
    _ = _c >= _d
    raise AssertionError("complex >= complex must raise TypeError")
except TypeError:
    _ledger.append(1)

# complex < int
try:
