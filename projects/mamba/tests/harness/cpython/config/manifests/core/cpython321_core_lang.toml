        case 0:
            return "zero-int"
        case "hi":
            return "greet-str"
        case None:
            return "none-literal"
        case 1 | 2 | 3:
            return "small-or"
        case bound:
            return ("captured", bound)


def wildcard_check(v):
    match v:
        case 42:
            return "forty-two"
        case _:
            return "wildcard"


