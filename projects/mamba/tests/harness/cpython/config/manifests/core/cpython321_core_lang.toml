# 2) type ctors + chr/ord/hash/repr/bool
assert chr(97) == "a"; _ledger.append(1)
assert ord("a") == 97; _ledger.append(1)
assert hash(42) == 42; _ledger.append(1)
assert repr([1, 2]) == "[1, 2]"; _ledger.append(1)
