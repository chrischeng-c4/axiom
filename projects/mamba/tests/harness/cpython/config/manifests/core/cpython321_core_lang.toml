assert r4 == "other"; _ledger.append(1)

class Point:
    def __init__(self, x, y):
        self.x = x
        self.y = y

def describe(p):
    match p:
        case Point(x=0, y=0):
            return "origin"
        case Point(x=0, y=y):
            return f"on-y:{y}"
        case Point(x=x, y=0):
            return f"on-x:{x}"
        case Point():
            return "elsewhere"
    return "none"

# Class pattern with literal keyword subpatterns
