    _s: Any = {1, 2}
    _ = _s.intersection(_none)
    raise AssertionError("s.intersection(None) must raise TypeError")
except TypeError:
    _ledger.append(1)

# set.difference(int)
try:
    _s: Any = {1, 2}
    _ = _s.difference(_int)
    raise AssertionError("s.difference(5) must raise TypeError")
except TypeError:
    _ledger.append(1)

# set.difference(None)
try:
