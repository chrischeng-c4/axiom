#   • complex < complex            → mamba: False (TypeError)
#   • complex <= complex           → mamba: False (TypeError)
#   • complex > complex            → mamba: False (TypeError)
#   • complex >= complex           → mamba: False (TypeError)
#   • complex < int                → mamba: False (TypeError)
#   • complex < float              → mamba: False (TypeError)
#   • int >= complex               → mamba: False (TypeError)
