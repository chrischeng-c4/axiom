# / `get_paths` / `get_path` / `get_platform` /
# `get_python_version` / `get_path_names` /
# `get_scheme_names` / `get_default_scheme` hasattr
# surface + accessor types, pathlib full hasattr surface
# of `Path` / `PurePath` / `PurePosixPath` /
