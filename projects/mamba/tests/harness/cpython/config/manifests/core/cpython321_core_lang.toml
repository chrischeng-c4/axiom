#   • type("X", 5, {})               → mamba: <type instance>(TypeError)
#   • type("X", [object], {})        → mamba: <type instance>(TypeError)
#   • type("X", (object,), 5)        → mamba: <type instance>(TypeError)
#   • type("X", (object,), [1])      → mamba: <type instance>(TypeError)
#
