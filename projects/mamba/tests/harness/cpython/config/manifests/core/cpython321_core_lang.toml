assert dict([("a", 1), ("b", 2)]) == {"a": 1, "b": 2}; _ledger.append(1)
assert dict(a=1, b=2) == {"a": 1, "b": 2}; _ledger.append(1)

# PEP 584 — dict merge operator `|` (introduced in Python 3.9)
merged = {"a": 1} | {"b": 2}
assert merged == {"a": 1, "b": 2}; _ledger.append(1)
