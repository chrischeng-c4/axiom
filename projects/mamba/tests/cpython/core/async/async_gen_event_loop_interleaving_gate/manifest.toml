# Async-generator real event-loop interleaving fixture — closes #1255.
# Parent epic: epic-py3-12-single-master-tracking (C5 follow-up).
# Sibling closed: #850 (single async-gen path landed there).
#
# Pins the shape of the C5 async-gen real-event-loop interleaving
# acceptance gate. Single async-gen behavior (`async for`,
# `async with`, `asend`, `athrow`, `aclose`) already lands via
# routing through synchronous iteration. Multi-async-gen interleaving
# under `asyncio.gather` does NOT interleave — Generator A drains
# fully before B starts. This gate locks the shape required to make
# N concurrent async generators actually interleave:
#
#   - R1: a distinct `MbAsyncGenerator` runtime entity, separate
#     from `MbGenerator`, yields suspended frames the event loop
#     can resume.
#   - R2: `__anext__` returns a coroutine awaitable, not a
#     synchronous result, so `asyncio` can schedule across
#     multiple async generators.
#   - R3: `asyncio.gather` of N async generators interleaves yields
#     (timing-based fixture).
#   - R4: 583/583 single-async-gen conformance stays green.
#   - R5: new fixture under
#     `projects/mamba/tests/cpython/core/async/async_gen_concurrent/`
#     pins the interleave behavior.
#
# Out of scope: rewriting MbGenerator, async I/O backends beyond
# asyncio, performance gates, C-extension paths.
#
# Shape locked by src/runtime/tests/async_gen_event_loop_interleaving_gate.rs.

version = 1
fixture = "async_gen_event_loop_interleaving_gate"
issue = 1255
related_issues = [850, 1265]
profile = "conformance"
family = "async_gen_event_loop_interleaving_gate"

network = "offline"

[isolation]
forbid_writes_outside_project = true
forbid_user_home_reads = true
forbid_global_cache_reads = true
forbid_global_cache_writes = true

[python_target]
python_major = 3
python_minor = 12
must_be_python_3_12 = true

[surface]
must_cover_distinct_mb_async_generator_entity = true
must_cover_anext_returns_coroutine_awaitable = true
must_cover_gather_interleaves_n_async_gens = true
must_cover_single_async_gen_conformance_stays_green = true
must_cover_new_concurrent_fixture_under_async_dir = true
must_be_offline = true
must_be_deterministic_modulo_timing = true

# R1 — distinct MbAsyncGenerator entity, separate from MbGenerator.
[r1_distinct_mb_async_generator_entity_contract]
case = "mb_async_generator_is_distinct_runtime_entity_from_mb_generator"
requirement_id = "R1"
must_define_mb_async_generator_runtime_entity = true
must_keep_mb_async_generator_distinct_from_mb_generator = true
must_yield_suspended_frame_event_loop_can_resume = true
forbid_aliasing_async_gen_to_sync_gen = true
forbid_routing_async_gen_through_synchronous_iteration_for_multi_gen = true
async_gen_runtime_entity_field_name = "async_gen_runtime_entity"
expected_async_gen_runtime_entity = "MbAsyncGenerator"
generator_runtime_entity_field_name = "generator_runtime_entity"
expected_generator_runtime_entity = "MbGenerator"
async_gen_aliased_to_sync_gen_failure_kind = "async_gen_runtime_aliased_to_sync_generator"
async_gen_aliased_to_sync_gen_exit_code = 303
async_gen_routed_through_sync_iteration_failure_kind = "async_gen_routed_through_sync_iteration_for_multi_gen"
async_gen_routed_through_sync_iteration_exit_code = 304
must_distinguish_aliased_from_routed_through_sync_iteration = true

# R2 — __anext__ returns coroutine awaitable, not sync result.
[r2_anext_returns_coroutine_awaitable_contract]
case = "dunder_anext_returns_coroutine_awaitable_not_synchronous_result"
requirement_id = "R2"
must_return_coroutine_awaitable_from_anext = true
must_allow_asyncio_to_schedule_across_multiple_async_gens = true
forbid_anext_returning_synchronous_result = true
forbid_anext_returning_plain_value_object = true
anext_return_kind_field_name = "anext_return_kind"
allowed_anext_return_kinds = ["coroutine", "awaitable"]
disallowed_anext_return_kinds = ["sync_result", "plain_value"]
anext_returned_sync_result_failure_kind = "async_gen_anext_returned_sync_result"
anext_returned_sync_result_exit_code = 305
anext_returned_plain_value_failure_kind = "async_gen_anext_returned_plain_value_object"
anext_returned_plain_value_exit_code = 306
must_distinguish_anext_sync_result_from_plain_value = true

# R3 — `asyncio.gather` of N async-gens interleaves yields.
[r3_gather_interleaves_n_async_gens_contract]
case = "asyncio_gather_of_n_async_gens_interleaves_yields"
requirement_id = "R3"
must_use_asyncio_gather_to_collect_n_async_gens = true
must_observe_interleaved_yield_sequence = true
must_use_timing_based_verification = true
forbid_drain_a_before_b_starts = true
forbid_silently_serializing_async_gens = true
n_async_gens_field_name = "n_async_gens"
expected_min_n_async_gens = 2
yield_sequence_field_name = "yield_sequence"
interleave_observed_field_name = "interleave_observed"
drain_before_other_failure_kind = "async_gen_gather_drained_a_before_b_started"
drain_before_other_exit_code = 307
serialized_silently_failure_kind = "async_gen_gather_serialized_silently"
serialized_silently_exit_code = 308
must_distinguish_drain_before_other_from_serialized_silently = true

# R4 — existing single-async-gen conformance stays green (583/583).
[r4_single_async_gen_conformance_stays_green_contract]
case = "single_async_gen_conformance_stays_green_at_583_of_583"
requirement_id = "R4"
must_keep_single_async_gen_conformance_passing = true
forbid_silently_relaxing_single_async_gen_baseline = true
required_single_async_gen_pass_count = 583
required_single_async_gen_total_count = 583
single_async_gen_pass_count_field_name = "single_async_gen_pass_count"
single_async_gen_total_count_field_name = "single_async_gen_total_count"
single_async_gen_regression_failure_kind = "async_gen_single_gen_conformance_regression"
single_async_gen_regression_exit_code = 309
single_async_gen_baseline_relaxed_failure_kind = "async_gen_single_gen_conformance_baseline_relaxed"
single_async_gen_baseline_relaxed_exit_code = 310
must_distinguish_regression_from_baseline_relaxed = true

# R5 — new fixture pins concurrent interleave behavior.
[r5_concurrent_fixture_contract]
case = "concurrent_async_gen_fixture_pins_interleave_behavior"
requirement_id = "R5"
must_provide_concurrent_async_gen_fixture = true
must_pin_concurrent_async_gen_fixture_relative_path = true
forbid_concurrent_async_gen_fixture_being_skipped = true
forbid_concurrent_async_gen_fixture_silently_classified_as_single_gen = true
concurrent_fixture_relative_path = "projects/mamba/tests/cpython/core/async/async_gen_concurrent"
concurrent_fixture_relative_path_field_name = "concurrent_fixture_relative_path"
concurrent_fixture_missing_failure_kind = "async_gen_concurrent_fixture_missing"
concurrent_fixture_missing_exit_code = 311
concurrent_fixture_classified_as_single_gen_failure_kind = "async_gen_concurrent_fixture_classified_as_single_gen"
concurrent_fixture_classified_as_single_gen_exit_code = 312
must_distinguish_concurrent_fixture_missing_from_classified_as_single_gen = true

[runner_contract]
keys = [
    "outcome",
    "case",
    "requirement_id",
    "async_gen_runtime_entity",
    "generator_runtime_entity",
    "anext_return_kind",
    "n_async_gens",
    "yield_sequence",
    "interleave_observed",
    "single_async_gen_pass_count",
    "single_async_gen_total_count",
    "concurrent_fixture_relative_path",
    "failure_kind",
    "exit_code",
]
outcome_values = ["pass", "fail", "missing", "skip"]
case_values = [
    "mb_async_generator_is_distinct_runtime_entity_from_mb_generator",
    "dunder_anext_returns_coroutine_awaitable_not_synchronous_result",
    "asyncio_gather_of_n_async_gens_interleaves_yields",
    "single_async_gen_conformance_stays_green_at_583_of_583",
    "concurrent_async_gen_fixture_pins_interleave_behavior",
]

[out_of_scope]
# Issue body: rewriting MbGenerator, async I/O backends beyond
# asyncio, perf, C-extension paths.
rewriting_mb_generator = true
async_io_backends_beyond_asyncio = true
performance_gates = true
c_extension_fast_paths = true
runtime_implementation_of_mb_async_generator = true
runtime_implementation_of_asyncio_event_loop = true
