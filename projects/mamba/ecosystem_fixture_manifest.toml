category = "3p"
module = "rich"
relpath = "3p/rich/real_world/render_record.py"
required_modules = ["rich"]
# rich's Console with record=True captures rendered output and strips
# markup via export_text. The load-bearing stdlib surface is `io`
# (StringIO sink), `re` (markup tokenizer), `os` (terminal-width
# fallback short-circuited by explicit width=), and `typing` /
# `dataclasses` (rich's Style + Segment internal records).
required_stdlib_modules = ["io", "re", "os", "typing", "dataclasses"]
expected_outcome = "pass"
command = "mamba run tests/cpython/3p/rich/real_world/render_record.py"

[fixtures.3p-jinja2-render_template]
category = "3p"
module = "jinja2"
relpath = "3p/jinja2/real_world/render_template.py"
required_modules = ["jinja2"]
# Jinja2's Environment + from_string path compiles the template
# source to bytecode at runtime. The load-bearing stdlib surface is
# `re` (the lexer), `ast` (the compiler frontend), `inspect`
# (callable signature inspection for filter binding), and
# `markupsafe` is itself a 3p dep (escape primitives) but its
# stdlib reach is `html` (escape table) and `string` (Formatter).
required_stdlib_modules = ["re", "ast", "inspect", "html", "string"]
expected_outcome = "pass"
command = "mamba run tests/cpython/3p/jinja2/real_world/render_template.py"

[fixtures.3p-markupsafe-escape_concat]
category = "3p"
module = "markupsafe"
relpath = "3p/markupsafe/real_world/escape_concat.py"
required_modules = ["markupsafe"]
# markupsafe has a pure-python fast-path and an optional C accelerator
# (`markupsafe._speedups`). The pure-python escape table is built off
# `html` (the canonical entity table) and `string` (the formatter
# protocol Markup.format hooks into); `typing` covers the import-time
# annotations. The C accelerator is not required for this fixture
# (pure-python path is functionally identical).
required_stdlib_modules = ["html", "string", "typing"]
expected_outcome = "pass"
command = "mamba run tests/cpython/3p/markupsafe/real_world/escape_concat.py"

[fixtures.3p-numpy-array_smoke]
category = "3p"
module = "numpy"
relpath = "3p/numpy/real_world/array_smoke.py"
required_modules = ["numpy"]
# numpy is a C-extension package; the load-bearing stdlib reach is
# small relative to its C core (`importlib` for the import machinery
# that loads `_multiarray_umath`, `os`/`sys` for the runtime
# detection logic, `warnings` for deprecation channels). The xfail
# is gated on the C-extension surface (epic #2526), not on a stdlib
# gap — declaring those modules keeps the rollup honest if mamba
# adds the C surface but a stdlib regression keeps numpy broken.
required_stdlib_modules = ["importlib", "os", "sys", "warnings"]
expected_outcome = "xfail"
blocker = "#2526 mamba native-extension loader not ready for numpy C core"
command = "mamba run tests/cpython/3p/numpy/real_world/array_smoke.py"

[fixtures.3p-pandas-dataframe_smoke]
category = "3p"
module = "pandas"
relpath = "3p/pandas/real_world/dataframe_smoke.py"
required_modules = ["pandas"]
# pandas transitively requires the numpy C core plus its own C
# extensions; xfail is gated on the same native-extension loader
# story as numpy (epic #2526). The Python surface still touches
# `importlib`, `datetime` (Timestamp interop), `decimal` (numeric
# coercion path), `os`/`sys` (config detection), and `warnings`
# (deprecation channels).
required_stdlib_modules = ["importlib", "datetime", "decimal", "os", "sys", "warnings"]
expected_outcome = "xfail"
blocker = "#2526 mamba native-extension loader not ready for pandas C extensions (transitively requires numpy C core)"
command = "mamba run tests/cpython/3p/pandas/real_world/dataframe_smoke.py"

[fixtures.3p-anyio-task_group_collect]
category = "3p"
module = "anyio"
relpath = "3p/anyio/real_world/task_group_collect.py"
required_modules = ["anyio"]
# anyio shims asyncio (or trio) under a backend-agnostic API. The
# load-bearing stdlib reach for the asyncio backend + task-group
