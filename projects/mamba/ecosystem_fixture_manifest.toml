# ---------- 3p required fixtures (already on disk) ----------

[fixtures.3p-pytest-hello_assert]
category = "3p"
module = "pytest"
relpath = "3p/pytest/real_world/hello_assert.py"
required_modules = ["pytest"]
# pytest's collector loads test files from a real on-disk path, so the
# fixture writes one to a TemporaryDirectory. The load-bearing stdlib
# deps for a single `pytest.main` round-trip are `os` + `tempfile`
# (for the temp test file), plus pytest's own internal walk over
# `importlib`, `inspect`, `pathlib`, and `traceback`. `inspect` and
# `traceback` underpin the failure-rendering path even on green runs
# (pytest installs the hooks unconditionally).
required_stdlib_modules = ["os", "tempfile", "importlib", "inspect", "pathlib", "traceback"]
expected_outcome = "pass"
command = "mamba run tests/cpython/3p/pytest/real_world/hello_assert.py"

[fixtures.3p-requests-local_adapter_roundtrip]
category = "3p"
module = "requests"
relpath = "3p/requests/real_world/local_adapter_roundtrip.py"
required_modules = ["requests"]
# requests mounts a custom transport adapter that intercepts the
# send path before any urllib3 / network code runs. The load-bearing
# stdlib deps for the mocked path are `io` (BytesIO body), plus
# requests' import-time reach into `json`, `urllib.parse` (URL
# preparation), `http` (status constants), and `email` (header
# parsing — requests still uses email.utils for date headers).
required_stdlib_modules = ["io", "json", "urllib.parse", "http", "email"]
expected_outcome = "pass"
command = "mamba run tests/cpython/3p/requests/real_world/local_adapter_roundtrip.py"

[fixtures.3p-click-greet_cli]
category = "3p"
module = "click"
relpath = "3p/click/real_world/greet_cli.py"
required_modules = ["click"]
# click's CliRunner runs the parser and callback in-process and
# captures stdout. The load-bearing stdlib deps for that path are
# `io` (StringIO output capture), `contextlib` (CliRunner's
# isolation context manager), `os` (env snapshot), `sys` (stdout
# redirection), and `shutil` (terminal-width fallback used by the
# help formatter at import time).
required_stdlib_modules = ["io", "contextlib", "os", "sys", "shutil"]
expected_outcome = "pass"
command = "mamba run tests/cpython/3p/click/real_world/greet_cli.py"

[fixtures.3p-idna-encode_idn]
category = "3p"
module = "idna"
relpath = "3p/idna/real_world/encode_idn.py"
required_modules = ["idna"]
# idna 3.x in pure Python pulls in `unicodedata` + `re` + `bisect`
# transitively. `unicodedata` is the load-bearing stdlib dep — without
# it the package's IDNAError import path raises at import time.
required_stdlib_modules = ["unicodedata", "re", "bisect"]
expected_outcome = "pass"
command = "mamba run tests/cpython/3p/idna/real_world/encode_idn.py"

[fixtures.3p-flask-wsgi_hello]
category = "3p"
module = "flask"
relpath = "3p/flask/real_world/wsgi_hello.py"
required_modules = ["flask"]
# Flask 3.x's request/response machinery touches a wide stdlib surface
# at import time. The load-bearing pieces for a single test-client
# round-trip are `werkzeug`'s WSGI helpers (`io`, `urllib.parse`),
# `json` for the response body shim, `typing` for the routing
# annotations, and `datetime` for the response date header. Without
# these the `app.test_client()` call cannot construct a response.
required_stdlib_modules = ["io", "urllib.parse", "json", "typing", "datetime"]
expected_outcome = "pass"
command = "mamba run tests/cpython/3p/flask/real_world/wsgi_hello.py"

[fixtures.3p-werkzeug-routing_map_dispatch]
category = "3p"
module = "werkzeug"
relpath = "3p/werkzeug/real_world/routing_map_dispatch.py"
required_modules = ["werkzeug"]
# werkzeug.routing parses URL converter expressions via `re`, builds
# rule tables out of `collections` containers, and raises HTTP errors
# from `werkzeug.exceptions` which leans on `http` for status codes.
# `typing` covers the routing annotations the import-time machinery
# evaluates.
required_stdlib_modules = ["re", "collections", "http", "typing"]
expected_outcome = "pass"
command = "mamba run tests/cpython/3p/werkzeug/real_world/routing_map_dispatch.py"

