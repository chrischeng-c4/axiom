# for the Rust ext), `os`/`sys` (build-config detection), and
# `warnings` (deprecation channels). xfail is gated on the same
# native-extension loader story as numpy/pandas (epic #2526).
required_stdlib_modules = ["importlib", "os", "sys", "warnings"]
expected_outcome = "xfail"
blocker = "#2526 mamba native-extension loader not ready for cryptography Rust _rust extension"
command = "mamba run tests/cpython/3p/cryptography/real_world/hash_smoke.py"
