# propagates context into child tasks), `inspect` (callable-shape
# checks at start_soon), `typing` (import-time generics), and
# `sniffio` (3p dep, not stdlib — covered via required_modules).
required_stdlib_modules = ["asyncio", "contextvars", "inspect", "typing"]
expected_outcome = "pass"
command = "mamba run tests/cpython/3p/anyio/real_world/task_group_collect.py"

[fixtures.3p-cryptography-hash_smoke]
category = "3p"
module = "cryptography"
relpath = "3p/cryptography/real_world/hash_smoke.py"
required_modules = ["cryptography"]
# cryptography ships a Rust-backed C extension (`cryptography._rust`
