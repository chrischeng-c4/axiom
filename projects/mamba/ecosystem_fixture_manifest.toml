[fixtures.3p-pydantic-model_validate]
category = "3p"
module = "pydantic"
relpath = "3p/pydantic/real_world/model_validate.py"
required_modules = ["pydantic"]
# pydantic 2.x's validator core is the Rust `pydantic-core` extension,
# but the Python surface still touches `typing` (annotation parsing),
# `dataclasses` (field metadata interop), `json` (model_dump_json),
# `enum` (StrEnum support), and `decimal` (numeric coercion path).
# Stdlib gaps on any of these will surface before the Rust core is
# even loaded.
required_stdlib_modules = ["typing", "dataclasses", "json", "enum", "decimal"]
expected_outcome = "pass"
command = "mamba run tests/cpython/3p/pydantic/real_world/model_validate.py"

