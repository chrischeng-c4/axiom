# Required Py3.12 ecosystem fixture manifest — #2551 / parent #2529.
#
# Defines the **required** real-world fixture set the MVP ecosystem gate
# walks. Each entry must point at a `.py` file that already exists under
# `tests/cpython/{category}/{module}/real_world/`. A
# missing file = test failure (smoke gate enforces this).
#
# This file is the source of truth for "which real-world fixtures
# count toward MVP green". Optional / experimental fixtures live outside
# this manifest and are walked by `conformance_real_world.rs` but their
# pass / fail counts never gate MVP (the gating logic itself lives in
# the follow-up issue #2550).
#
# Schema (locked-in by the smoke test):
#
#   [fixtures.<fixture_id>]
#   category                 = "stdlib" | "3p"                  required
#   module                   = "<dirname under category>"        required
#   relpath                  = "<.py path relative to fixtures root>"   required
#   required_modules         = ["mod1", "mod2", ...]            required, non-empty
#   required_stdlib_modules  = ["stdlib_mod1", ...]             required, non-empty (#2553)
#   expected_outcome         = "pass" | "xfail" | "skip"        required (#2555)
#   blocker                  = "<#issue or short reason>"        required iff expected_outcome != "pass" (#2555)
#   command                  = "mamba run <relpath>"             required, command worker should run
#
# - `fixture_id` is the TOML table key. Must be unique. The convention
#   is `{category}-{module}-{file-stem}` (e.g. `stdlib-re-regex_logs`).
# - `expected_outcome` (#2555) is one of:
#     `pass`  — fixture must exit 0 on both interpreters; counts toward
#               required pass tally.
#     `xfail` — fixture is expected to fail under mamba today; failure
#               does NOT gate MVP, and an unexpected pass surfaces as
#               a warning ("graduate to pass"). Must declare `blocker`.
#     `skip`  — fixture is structurally unrunnable in the default gate
#               (e.g. needs a C-extension mamba can't load yet). Counts
#               only in the skip bucket; never gates MVP. Must declare
#               `blocker`.
#   The runner reports pass / fail / xfail / skip as separate counts;
#   "required pass count excludes xfail and skip" (#2555 acceptance).
# - `required_stdlib_modules` (#2553) names the **stdlib** dependencies
#   the fixture exercises. For stdlib fixtures it typically equals
#   `required_modules` minus 3p imports; for 3p fixtures it names the
#   stdlib modules the 3p library transitively touches and that mamba
#   must implement for the fixture to be runnable. This lets a future
#   report group required-fixture failures by stdlib dependency
#   ("five fixtures block on `re`"), which is the headline value-add
#   of #2553. Coverage proof is explicitly out of scope; the field is
#   author-declared, not auto-derived.
# - When a new required fixture lands, add it here in the same commit;
#   when an existing fixture is renamed or moved, update both `relpath`
#   and `command`. Missing-file violations surface in the smoke test
#   (#2551) and fixture-redundancy violations will surface once the
#   #2550 runner enforces required/optional splits.

