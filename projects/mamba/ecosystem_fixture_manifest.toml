category = "3p"
module = "packaging"
relpath = "3p/packaging/real_world/version_compare.py"
required_modules = ["packaging"]
# packaging.version + packaging.specifiers are pure-Python and pull
# in `re` (PEP 440 grammar), `itertools` (component normalization),
