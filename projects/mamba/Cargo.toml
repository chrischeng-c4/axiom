[package]
name = "mamba"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Mamba - Force-typed Python compiler with native code generation"

[features]
default = []
# Gate real-network integration tests: cargo test -p mamba --features integration -- --test-threads=1 pypi_index_client_integration
integration = []
native-modules = [
    "dep:mambalibs-http-binding",
    "dep:mambalibs-di-binding",
    "dep:cclab-schema-mamba",
    "dep:agentkit-binding",
    "dep:pgkit-binding",
    "dep:cclab-log-mamba",
    "dep:cclab-mcp-mamba",
    "dep:cclab-qc-mamba",
    "dep:arraykit-binding",
    "dep:cryptokit-binding",
    "dep:mediakit-binding",
    "dep:plotkit-binding",
    "dep:scikit-binding",
    "dep:mongokit-binding",
]

[dependencies]
# Lexer generator (compile-time DFA)
logos = "0.15"

# Native code generation (Cranelift)
cranelift-codegen = "0.116"
cranelift-frontend = "0.116"
cranelift-module = "0.116"
cranelift-object = "0.116"
cranelift-native = "0.116"
cranelift-jit = { version = "0.116", features = ["selinux-fix"] }

# Workspace deps
thiserror.workspace = true
anyhow.workspace = true
serde.workspace = true
clap.workspace = true
tokio.workspace = true
reqwest.workspace = true

# Native module registry (MambaModule trait, MAMBA_MODULES slice, MbValue)
cclab-mamba-registry = { path = "../../crates/cclab-mamba-registry" }
mambalibs-http-binding = { path = "mambalibs/httpkit/binding", optional = true }
mambalibs-di-binding = { path = "mambalibs/dikit/binding", optional = true }
cclab-schema-mamba = { path = "../../crates/cclab-schema-mamba", optional = true }
agentkit-binding = { path = "mambalibs/agentkit/binding", optional = true }
pgkit-binding = { path = "mambalibs/pgkit/binding", optional = true }
cclab-log-mamba = { path = "../../crates/cclab-log-mamba", optional = true }
cclab-mcp-mamba = { path = "../../crates/cclab-mcp-mamba", optional = true }
cclab-qc-mamba = { path = "../../crates/cclab-qc-mamba", optional = true }
arraykit-binding = { path = "mambalibs/arraykit/binding", optional = true }
cryptokit-binding = { path = "mambalibs/cryptokit/binding", optional = true }
mediakit-binding = { path = "mambalibs/mediakit/binding", optional = true }
plotkit-binding = { path = "mambalibs/plotkit/binding", optional = true }
scikit-binding = { path = "mambalibs/scikit/binding", optional = true }
mongokit-binding = { path = "mambalibs/mongokit/binding", optional = true }

# Config parsing
toml = "0.8"
semver = "1"
# Process-internal fast hasher for the GC's pointer-keyed `HashSet<usize>` /
# `HashMap<usize, i64>` (mitigation 2A for #2100). Already in the dep tree
# transitively via hashbrown/petgraph — promote to an explicit dep.
rustc-hash = "2"
# Uncontended-fast-path RwLock for ObjData::{List,Dict,Set,ByteArray}
# container locks + InstanceFields — #2518. parking_lot 0.12 has been
# in the workspace dep tree for a while (used by cclab-runtime / cclab-kv
# / cclab-log etc.) so this does not add a new transitive dep.
# Wrapped via `runtime::rc::MbRwLock<T>` so existing `.read().unwrap()`
# / `.write().unwrap()` call sites compile unchanged (the wrapper
# returns `Result<_, Infallible>` so `.unwrap()` remains valid but the
# inner lock is parking_lot's uncontended-fast-path RwLock).
# Measured win on uncontended write+read micro-loop: ~30% / 6 ns per
# read+write pair (parking_lot 16 ns vs std::sync 22 ns on aarch64),
# clearing the #2518 acceptance gate (≥20% reduction).
parking_lot = "0.12"
# Hashlib backends — enable `asm` feature so aarch64 builds use the ARMv8
# SHA hardware extensions (~7× faster steady-state per Task #20 / #23).
# - sha2 asm: aarch64 SHA-NI codepath in sha2-asm crate (~2.4 GB/s vs
#   ~0.35 GB/s for the pure-SIMD fallback on Apple Silicon).
# - sha1 asm: DISABLED — sha1-asm v0.5.3 aarch64 path produces wrong
#   digests on macOS (SHA1("abc") returns
#   "0ac8cfcddd4015547fd11a45c060266d832daa55" instead of the canonical
#   "a9993e36...0d89d"). Tracked separately; fall back to pure-Rust SHA1
#   until sha1-asm publishes a fix. The pure-Rust path is correct and
#   passes hmac_mod / uuid5 / hashlib known-vector tests.
# - md-5 asm: md5-asm is x86-only — flag is a no-op on aarch64 but harmless.
# - sha3 asm: enables keccak/asm which feeds the same arch-asm path.
sha2 = { version = "0.10", features = ["asm"] }
md-5 = { version = "0.10", features = ["asm"] }
sha1 = { version = "0.10" }
sha3 = { version = "0.10", features = ["asm"] }
blake2 = "0.10"
hmac = "0.12"
zip = { version = "0.6", default-features = false, features = ["deflate"] }
# Sdist (`.tar.gz`) unpack for PEP 517 build path (Tick 18). Pure-Rust tar
# reader; works with the existing flate2 GzDecoder for the gzip layer.
tar = "0.4"

# HTML parsing for PEP 503 Simple API
scraper.workspace = true

# Async stream utilities for streaming artifact download
futures-util.workspace = true

# Native stdlib backends
serde_json.workspace = true
regex.workspace = true
chrono.workspace = true
base64.workspace = true
rand = "0.8"
# MT19937 backend for `random` stdlib (#1265 Task #40) — CPython's random
# module uses Mersenne Twister; `rand_mt::Mt` is the same generator family
# so distribution shapes match (not bit-for-bit seed compat).
rand_mt = "6"
# Real DEFLATE for zlib (#1265 Task #17) — replaces identity stub so the
# perf bench measures real compression cost not a no-op.
flate2 = "1"
# Real LZMA via canonical liblzma (#1265 Task #21) — same-family backend
# pair to CPython's `_lzma` (both wrap liblzma).
xz2 = "0.1"
# Real bzip2 via canonical libbz2 (#1265 Task #28) — same-family backend
# pair to CPython's `_bz2` (both wrap libbz2). Last compress-tier sibling
# of zlib/gzip/lzma in the bulk-work tier:compute set.
bzip2 = "0.4"
# Hardware-accelerated CRC32 (#1265 Task #27) — replaces the bit-by-bit
# zlib.crc32 loop that was 242× slower than CPython's table-lookup.
# Single-fix unblocker for zlib/gzip/lzma internal-time gates (all three
# call zlib.crc32 in their hot loops). crc32fast uses ARMv8 crc32 hw on
# aarch64 and SSE4.2 PCLMULQDQ on x86_64.
crc32fast = "1"
# Real arbitrary-precision decimal arithmetic (#1265 Task #24) — replaces
# f64 stub so the perf bench measures real IEEE-754-correct fixed-point
# work, not a lossy float passthrough. Cross-family pair to CPython's
# `_decimal` (libmpdec C extension); native-shim tier:compute, used as
# the 3rd cross-family data point under the perf-is-the-product framing.
rust_decimal = "1"

# Coroutine stack allocation for generators (#1187)
libc = "0.2"

# Ordered dict (Python 3.7+ insertion order)
indexmap = "2"

# Inline-storage container for small list/set literals — #2517.
# `MbList = SmallVec<[MbValue; 8]>` eliminates the inner Vec heap alloc
# for `[a, b, c, d]`-style literals with N <= 8 elements (the dominant
# JIT-emitted shape via mb_list_new_1..mb_list_new_8). Already in the
# workspace dep tree transitively (used by hashbrown / petgraph etc.)
# so promoting to explicit dep does not add a new transitive dep.
smallvec = "1"

# Arbitrary-precision integers for BigInt fallback (#833)
num-bigint = "0.4"
num-traits = "0.2"

# REPL readline support (#838)
rustyline = "15"

# Target triple detection
target-lexicon = "0.13"

# Unicode general-category + numeric properties (CPython parity for str.isdigit / isdecimal / isnumeric)
unicode-properties = "0.1"

[dev-dependencies]
datatest-stable = "0.2"
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"
cclab-schema-mamba = { path = "../../crates/cclab-schema-mamba" }
# Unified profiling toolchain (Phase 1.5 / Task #13 / cclab #2093).
# Used by `benches/3p/cross_runtime.rs` for wall-time + memory snapshotting.
qc = { package = "meter", path = "../meter" }
wiremock.workspace = true

# ── Integration test binaries (DDD-grouped under tests/<domain>/) ──
#
# tests/ is organised by capability domain. cargo auto-discovers only
# top-level tests/*.rs, so each binary inside a domain subdir is listed
# below with an explicit path. Binary names retain the legacy
# `conformance` / `perf_pin` prefixes so existing `cargo test --test
# conformance` invocations keep working.
#
# Domains:
#   cpython/     — Python 3.12 fixture data/config/tools
#   harness/     — execution, collection, and reporting harnesses
#   mambalibs/   — mamba-only native libraries (no CPython oracle)
#   pkgmgr/      — `mamba` CLI / package-manager behavior
#   governance/  — cross-cutting meta gates + CI guard

# harness/cpython — runtime parity (Q1 has-it / Q2 correct / Q3 fast)
[[test]]
name = "conformance"
path = "tests/harness/cpython/runner.rs"
harness = false

[[test]]
name = "conformance_pipeline"
path = "tests/harness/cpython/pipeline.rs"
harness = false

[[test]]
name = "conformance_cpython_grammar"
path = "tests/harness/cpython/grammar.rs"
harness = false

[[test]]
name = "conformance_contract"
path = "tests/harness/cpython/contract.rs"

[[test]]
name = "conformance_real_world"
path = "tests/harness/cpython/real_world.rs"

[[test]]
name = "conformance_cpython_lib_test"
path = "tests/harness/cpython/lib_test.rs"

[[test]]
name = "conformance_runtime_shutdown"
path = "tests/harness/cpython/runtime_shutdown.rs"

[[test]]
name = "cpython_status"
path = "tests/harness/cpython/status.rs"
harness = false

# cpython — consolidated perf-pin regression gate (#1265 Goal 2 / G3.1).
# Replaces 119 per-pin `<lib>_perf_pin_<issue>.rs` binaries. Reads
# declarative pin TOMLs under tests/harness/cpython/config/perf/pins/ and emits one
# test per pin via datatest_stable; G3.1 selector:
#   cargo test -p mamba --release --test perf_pin -- perf_pin
# Opt-in only (`test = false`): per docs/MVP_TEST_PROFILE.md G3.1 and the
# harness header, the perf gate requires the release profile — under the
# default debug `cargo test -p mamba` it measures debug-build CPU/RSS and
# fails spuriously.
[[test]]
name = "perf_pin"
path = "tests/harness/cpython/perf_pin.rs"
harness = false
test = false

# mambalibs — mamba-only native library behavior
[[test]]
name = "mambalibs"
path = "tests/mambalibs/runner.rs"

# pkgmgr — `mamba` CLI verbs (umbrella over 11 verbs)
[[test]]
name = "pkgmgr"
path = "tests/pkgmgr/runner.rs"

# governance — cross-cutting gates + CI guard
[[test]]
name = "schema_gates"
path = "tests/governance/schema_gates.rs"

[[test]]
name = "mvp_gates"
path = "tests/governance/mvp_gates.rs"

[[test]]
name = "ci_guard"
path = "tests/governance/ci_guard.rs"

[[bench]]
name = "mamba_bench"
harness = false

# Cross-runtime bench harness (Phase 1.C — issue #1265 tier gates).
# Shells out to python3 and mamba per fixture, emits one ratio line per
# fixture, exits non-zero on floor violation. Fixtures live under
# tests/cpython/{std-libs,3rd-libs}/<lib>/bench/<scenario>.py.
[[bench]]
name = "cross_runtime_3p"
path = "benches/3p/cross_runtime.rs"
harness = false
