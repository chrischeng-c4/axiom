# Mamba MVP validation profile inventory.
#
# This file is intentionally small for now: it gives worker-created tests a
# stable landing zone before the full TD/schema is written.

version = 1
status = "staging"
td_status = "pending"
owner_issue = 2526

[policy]
release_required_outcomes = ["pass", "AssertionPass"]
non_passing_outcomes = ["skip", "xfail", "Stub", "ImportPass", "Fail", "Timeout", "blocked"]
default_network = "offline"
default_runtime = "mamba"
comparison_runtime = "CPython 3.12"

[existing_manifests]
# cpython_lib_test_baseline.toml + cpython_lib_test_allowlist.toml retired
# by #3729 — replaced by the folder-based contract convention under
# `tests/cpython/lib_test_seeds/{pass,spec,stub,fail,import_pass,timeout}/`.
cpython_lib_test_fixtures = "../tests/cpython/lib_test_seeds/"
ecosystem = "../ecosystem_fixture_manifest.toml"
performance_baseline = "../baseline.json"

[profiles.smoke]
required = true
description = "Fast compile/list/inventory gate for worker handoff."
parent_issue = 2527
manifest = "profiles/smoke.toml"
issue = 2819

[profiles.correctness]
required = true
description = "Python language semantics plus CPython assertion-running seeds."
parent_issues = [2528, 2774]
manifest = "profiles/correctness.toml"
issue = 2818

[profiles.stdlib]
required = true
description = "Required Py3.12 stdlib import and behavior fixtures."
parent_issue = 2529

[profiles.ecosystem]
required = true
description = "Required third-party ecosystem fixtures, offline by default."
parent_issue = 2529
manifest = "profiles/ecosystem.toml"
issue = 2814

[profiles.performance]
required = true
description = "Correctness-checked benchmark corpus with 1x floor and 10x suite average."
parent_issue = 2530
manifest = "profiles/performance.toml"
issue = 2815

[profiles.mambalibs]
required = true
description = "Mode 2 build/import gate and real cclab library import gates."
parent_issue = 2531
manifest = "profiles/mambalibs.toml"
issue = 2817

[profiles.package_manager]
required = true
description = "uv-like package manager workflow using frozen local indexes."
parent_issue = 2532
manifest = "profiles/package_manager.toml"
issue = 2816

[profiles.release_gate]
required = true
description = "Profile manifests, summary schema, and release-blocking policy."
parent_issue = 2775
manifest = "profiles/release_gate.toml"
issue = 2775
