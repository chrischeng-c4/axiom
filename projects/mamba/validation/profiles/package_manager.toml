# Mamba MVP package-manager profile manifest — closes #2816.
# Parent: #2775 (MVP release blocking CI profiles).
#
# Release-blocking gate for uv-like package-manager workflows. Covers
# the eight CLI verbs the MVP must keep green — init, add, lock,
# sync, run, install, hash, cache — and pins every required fixture
# to local frozen indexes so the gate stays deterministic and offline.
# Live PyPI exercises stay opt-in and never block.
#
# Acceptance (issue #2816):
#
#   - Profile fails on any required offline workflow failure. The
#     eight workflow families below all live in the `required` bucket
#     and `[policy].network = "offline"` + `[policy].index_source =
#     "frozen_local"` ban any required entry that reaches the network.
#   - Live network tests are reported as opt-in, not blocking
#     defaults. `[live_network]` block declares the opt-in workflows
#     under the `optional` bucket; they are walked, reported, and
#     never gate.
#   - Summary names project, lockfile, and environment paths.
#     `[summary].fields` carries `project_path`, `lockfile_path`,
#     and `environment_path`.
#
# Schema (locked by `mvp_package_manager_profile_manifest_2816.rs`):
#
#   version, profile, parent_issue, issue : header.
#   buckets                : canonical four.
#   [policy]               : offline + frozen-index defaults + release
#                            gating buckets.
#   [families.<id>]        : one entry per workflow verb (8 total).
#   [live_network]         : opt-in network workflows; never blocking.
#   [summary]              : naming/rendering contract.
#   [runner_contract]      : JSON keys per family.

version = 1
profile = "package_manager"
parent_issue = 2775
issue = 2816

buckets = ["required", "optional", "xfail", "blocker"]

[policy]
# Acceptance: "Profile fails on any required offline workflow
# failure." All required families must satisfy these defaults.
network = "offline"
index_source = "frozen_local"
release_required_buckets = ["required"]
report_only_buckets = ["optional", "xfail", "blocker"]
# Live-network entries live under `optional`; never count toward
# blocking even if they fail.
forbid_required_network = true

# Eight workflow verbs the MVP gates against. Each must point at a
# fixture directory under tests/governance/gates/pkgmgr/<verb>/. Sources are
# forward references until per-fixture issues land; the manifest
# fixes the shape today.
[families.init]
kind = "pkgmgr_init"
source = "tests/governance/gates/pkgmgr/init"
outcome_rule = "must_succeed"
description = "mamba init / scaffolding workflow."

[families.add]
kind = "pkgmgr_add"
source = "tests/governance/gates/pkgmgr/add"
outcome_rule = "must_succeed"
description = "mamba add <dep> against a frozen local index."

[families.lock]
kind = "pkgmgr_lock"
source = "tests/governance/gates/pkgmgr/lock"
outcome_rule = "must_match_baseline"
description = "Lockfile generation determinism — byte-identical against baseline."

[families.sync]
kind = "pkgmgr_sync"
source = "tests/governance/gates/pkgmgr/sync"
outcome_rule = "must_succeed"
description = "mamba sync — environment converges to the lockfile."

[families.run]
kind = "pkgmgr_run"
source = "tests/governance/gates/pkgmgr/run"
outcome_rule = "must_succeed"
description = "mamba run — exec a command in the project env."

[families.install]
kind = "pkgmgr_install"
source = "tests/governance/gates/pkgmgr/install"
outcome_rule = "must_succeed"
description = "Tool / executable install path."

[families.hash]
kind = "pkgmgr_hash"
source = "tests/governance/gates/pkgmgr/hash"
outcome_rule = "must_match_baseline"
description = "Content-addressed hash determinism for distribution + cache."

[families.cache]
kind = "pkgmgr_cache"
source = "tests/governance/gates/pkgmgr/cache"
outcome_rule = "must_succeed"
description = "Cache lookup / population / GC across runs."

[live_network]
# Acceptance: "Live network tests are reported as opt-in, not
# blocking defaults." Listed entries are walked only when the runner
# is invoked with `--include-live-network`; failures are reported
# under the `optional` bucket and never block.
bucket = "optional"
enabled_by = "--include-live-network"
workflows = ["add", "sync", "install"]

[summary]
# Acceptance: "Summary names project, lockfile, and environment
# paths."
fields = [
    "family",
    "fixture_id",
    "outcome",
    "project_path",
    "lockfile_path",
    "environment_path",
]
include_failed = true
include_missing = true
include_live_network = true
sort = ["status_priority", "family", "fixture_id"]

[runner_contract]
init = ["passed", "failed", "missing", "fixtures"]
add = ["passed", "failed", "missing", "fixtures"]
lock = ["passed", "failed", "missing", "fixtures"]
sync = ["passed", "failed", "missing", "fixtures"]
run = ["passed", "failed", "missing", "fixtures"]
install = ["passed", "failed", "missing", "fixtures"]
hash = ["passed", "failed", "missing", "fixtures"]
cache = ["passed", "failed", "missing", "fixtures"]
