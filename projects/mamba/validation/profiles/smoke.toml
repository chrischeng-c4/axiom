# Mamba MVP smoke profile manifest — closes #2819.
# Parent: #2775 (MVP release blocking CI profiles).
#
# The fast worker gate every PR/worker runs *before* any deeper profile.
# Stays offline and finishes well under a minute on a clean checkout so
# the inner loop never gets blocked by environment problems.
#
# Three required commands (acceptance for #2819: "Missing smoke profile
# entry fails validation"):
#
#   compile_list        cargo test --list via scripts/gate0_list_tests.py.
#                       Proves the test profile compiles and tests can be
#                       enumerated. Non-zero exit blocks every deeper gate
#                       (#2527 family — see scripts/gate0_list_tests.py).
#   inventory_summary   Source-tree inventory via
#                       scripts/inventory_summary.py (#2537). Cheap stat
#                       walk that surfaces Rust + datatest + bench counts.
#   skip_debt_summary   Roll-up of skip / xfail / Stub / ImportPass debt.
#                       Reported, not blocking — keeps the worker honest
#                       about how much "passing" is non-asserting today.
#                       Script lives at scripts/skip_debt_summary.py and
#                       is added by the issue that wires the runner
#                       (#2821); the manifest entry exists today so the
#                       smoke profile shape is locked.
#
# Schema (locked by `mvp_smoke_profile_manifest_2819.rs`):
#
#   [commands.<id>]
#   id              required, must equal the table key.
#   command         required, exact shell invocation the worker runs.
#                   Must reference a Python script under `scripts/`.
#   kind            required, one of {compile_list, inventory, skip_debt}.
#                   "bench" / "perf" / "ecosystem" kinds are forbidden —
#                   acceptance: "The profile excludes long-running
#                   benchmarks." Those live in performance / ecosystem
#                   profiles, not here.
#   blocking        required bool, true if a non-zero exit blocks smoke.
#                   compile_list is blocking; the other two report only.
#   max_seconds     required int in (0, 60]. Smoke is "fast" by contract;
#                   anything that needs more than a minute belongs in a
#                   different profile.
#   outcome_field   required, the JSON key in the command's --json output
#                   that carries the pass/fail string. Acceptance:
#                   "Smoke profile output includes command names and
#                   pass/fail status."
#   description     optional, human-readable summary for tooling output.
#
# The set of command kinds is closed (compile_list, inventory, skip_debt)
# until #2775 adds a follow-up issue to extend the smoke profile.

version = 1
profile = "smoke"
parent_issue = 2775
issue = 2819

# Acceptance for #2819 names these three command kinds explicitly. The
# validation test asserts all three exist; removing any entry below
# fails the smoke profile gate at compile-test time.
required_commands = ["compile_list", "inventory_summary", "skip_debt_summary"]

# Whole-profile contract: smoke is fast + offline + non-benchmark.
[policy]
offline = true
max_wall_seconds = 60
forbid_kinds = ["bench", "perf", "ecosystem", "real_world"]

[commands.compile_list]
id = "compile_list"
kind = "compile_list"
command = "python3 scripts/gate0_list_tests.py --json"
blocking = true
max_seconds = 60
outcome_field = "status"
description = "cargo test --list profile compile + enumeration gate (#2534)."

[commands.inventory_summary]
id = "inventory_summary"
kind = "inventory"
command = "python3 scripts/inventory_summary.py --json"
blocking = false
max_seconds = 15
outcome_field = "status"
description = "Static source-tree inventory of the mamba test surface (#2537)."

[commands.skip_debt_summary]
id = "skip_debt_summary"
kind = "skip_debt"
command = "python3 scripts/skip_debt_summary.py --json"
blocking = false
max_seconds = 30
outcome_field = "status"
description = "Roll-up of skip/xfail/Stub/ImportPass debt for triage."

# Cross-reference: skip-debt baseline updates are governed by the
# release-gate baseline update policy (#2823). Raising the tolerated
# skip / xfail / Stub / ImportPass count must include a tracking issue
# + before/after in `validation/baseline_changelog.toml`.
[references.baseline_update_policy]
path = "../baseline_update_policy.toml"
governs = ["scripts/skip_debt_summary.py"]
issue = 2823
