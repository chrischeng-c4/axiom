# Mamba MVP mambalibs profile manifest — closes #2817.
# Parent: #2775 (MVP release blocking CI profiles).
#
# Release-blocking gate for Mode 2 mambalibs behavior — the
# build / lock / artifact / import / diagnostics / type-roundtrip
# pipeline that turns a mamba package into a usable artifact.
#
# Local mambalibs fixtures graduate to real cclab library import gates
# only after every family below is green. The profile stays isolated
# from any global cache so a stale wheel or cached lockfile can't mask
# a regression.
#
# Acceptance (issue #2817):
#
#   - Profile fails if build succeeds but import fails.
#     `[policy].pair_build_and_import = true` plus the
#     `[pairs.build_then_import]` block that names the linked families;
#     the schema test enforces both families exist.
#   - Profile fails if diagnostics fixtures crash or pass silently.
#     `[families.diagnostics].outcome_rule = "must_emit_diagnostic"`
#     plus `[policy].forbid_silent_pass` listing diagnostics.
#   - Summary names dependency and artifact identity.
#     `[summary].fields` includes `dependency` and `artifact_identity`.
#
# Schema (locked by `mvp_mambalibs_profile_manifest_2817.rs`):
#
#   version, profile, parent_issue, issue : header.
#   buckets                : same canonical four.
#   [policy]               : release gating + isolation rules.
#   [families.<id>]        : one entry per pipeline stage. Each carries
#                            `kind`, `source` (forward reference until
#                            the fixtures land), `outcome_rule`, and a
#                            human description.
#   [pairs.<id>]           : sequencing pairs (build_then_import).
#   [summary]              : naming/rendering contract.
#   [runner_contract]      : JSON keys per family.

version = 1
profile = "mambalibs"
parent_issue = 2775
issue = 2817

buckets = ["required", "optional", "xfail", "blocker"]

[policy]
# Acceptance: "Profile fails if build succeeds but import fails."
pair_build_and_import = true

# Acceptance: "Profile fails if diagnostics fixtures crash or pass
# silently." Silent-pass = exit 0 with no diagnostic emitted; a
# diagnostics fixture that doesn't surface its expected diagnostic
# is structurally broken.
forbid_silent_pass = ["diagnostics"]

# Required scope.
release_required_buckets = ["required"]
report_only_buckets = ["optional", "xfail", "blocker"]

# Mambalibs profile MUST run isolated from global caches so a stale
# wheel / lockfile cache can't mask a regression. The runner clears
# these dirs before each run.
isolated_from = ["XDG_CACHE_HOME", "~/.cache/mamba", "/tmp/mamba-cache"]

[families.build]
kind = "mode2_build"
source = "tests/mambalibs/fixtures/build"
outcome_rule = "must_succeed"
description = "mamba build over a Mode 2 fixture package; non-zero exit blocks the profile."

[families.lock]
kind = "mode2_lock"
source = "tests/mambalibs/fixtures/lock"
outcome_rule = "must_match_baseline"
description = "Lockfile generation determinism — same inputs must produce byte-identical output."

[families.artifact_layout]
kind = "mode2_artifact"
source = "tests/mambalibs/fixtures/artifact"
outcome_rule = "must_match_layout"
description = "Built artifact tree shape (wheel/sdist layout, metadata, RECORD)."

[families.import]
kind = "mode2_import"
source = "tests/mambalibs/fixtures/import"
outcome_rule = "must_succeed"
description = "Importing the built artifact via mamba run from a clean env."

[families.diagnostics]
kind = "mode2_diagnostics"
source = "tests/mambalibs/fixtures/diagnostics"
# Each diagnostics fixture declares its expected diagnostic code; the
# runner asserts the diagnostic was emitted. Exit code alone is not
# proof of pass.
outcome_rule = "must_emit_diagnostic"
description = "Build / lock / import diagnostics must surface; crashes and silent passes fail."

[families.type_roundtrip]
kind = "mode2_type_roundtrip"
source = "tests/mambalibs/fixtures/type_roundtrip"
outcome_rule = "must_roundtrip"
description = "Type info survives the build -> install -> import roundtrip."

[pairs.build_then_import]
# The build family must succeed and then the import family must succeed
# for the SAME fixture id. If build is green but import fails for that
# fixture, the profile fails (acceptance: "Profile fails if build
# succeeds but import fails").
left = "build"
right = "import"
rule = "right_must_succeed_when_left_succeeds"

[summary]
# Acceptance: "Summary names dependency and artifact identity."
fields = [
    "family",
    "fixture_id",
    "outcome",
    "diagnostic_code",
    "dependency",
    "artifact_identity",
]
include_failed = true
include_missing = true
include_silent_pass = true
sort = ["status_priority", "family", "fixture_id"]

[runner_contract]
build = ["passed", "failed", "missing", "fixtures"]
lock = ["passed", "failed", "missing", "fixtures"]
artifact_layout = ["passed", "failed", "missing", "fixtures"]
import = ["passed", "failed", "missing", "fixtures"]
diagnostics = ["passed", "failed", "missing", "silent_pass", "fixtures"]
type_roundtrip = ["passed", "failed", "missing", "fixtures"]
