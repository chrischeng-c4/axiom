# Mamba MVP ecosystem profile manifest — closes #2814.
# Parent: #2775 (MVP release blocking CI profiles).
#
# The release-blocking gate for required third-party + stdlib-backed
# real-world fixtures. The fixture set itself already lives in
# `ecosystem_fixture_manifest.toml` (#2551); this profile wrapper
# codifies the *bucketing* layer the MVP gate uses to decide what
# blocks vs. what is reported.
#
# Acceptance (issue #2814):
#
#   - Required ecosystem fixture failure blocks the profile.
#   - Optional failures are reported but do not block.
#   - xfail/blocker items do not count as pass.
#   - Default execution offline and deterministic.
#
# Four bucket categories, all four must be declared:
#
#   required   Fixture MUST pass on both CPython 3.12 and mamba. A
#              failure here fails the ecosystem profile and blocks
#              MVP release. In the source manifest: any entry with
#              `expected_outcome = "pass"` is required.
#   optional   Fixture is walked and its pass/fail tracked, but a
#              failure is reported, never gating. Source-manifest
#              entries opt into this bucket explicitly via
#              `bucket = "optional"` (a future bench-style fixture
#              that mamba should converge on but doesn't yet block
#              the MVP). Today: empty — encoded but unused.
#   xfail      Fixture is expected to fail today. Tracked as an
#              "unexpected pass" warning (graduate-to-pass) but
#              never counted as a pass. In the source manifest:
#              `expected_outcome = "xfail"` plus a `blocker` field.
#   blocker    Items explicitly flagged as MVP blockers. Different
#              from xfail: an xfail is "known-broken, tolerated"
#              while a blocker is "known-broken, must-fix-before-MVP".
#              Encoded at the profile level by listing the source
#              manifest entries below; the source manifest's
#              `blocker = "<#issue>"` annotation identifies the gap.
#
# Schema (locked by `mvp_ecosystem_profile_manifest_2814.rs`):
#
#   version, profile, parent_issue, issue : header fields.
#   source_manifest : path to the source-of-truth fixture manifest,
#                     resolved relative to this file's directory.
#   buckets         : array of all four declared bucket names. The
#                     test enforces that exactly the four canonical
#                     buckets above are present.
#   [policy]        : offline + deterministic flags + outcome rules.
#   [outcome_map]   : maps `expected_outcome` strings in the source
#                     manifest to bucket names. Lets the gate stay
#                     declarative — adding a new outcome type means
#                     extending this table.
#   [blockers]      : optional table of explicit MVP blockers; each
#                     entry names a fixture id and the gating issue.

version = 1
profile = "ecosystem"
parent_issue = 2775
issue = 2814

source_manifest = "../../ecosystem_fixture_manifest.toml"

buckets = ["required", "optional", "xfail", "blocker"]

# Whole-profile contract: offline + deterministic + bucketed gating.
[policy]
offline = true
deterministic = true
description = "Required ecosystem fixtures gate MVP; optional/xfail/blocker do not."
release_required_buckets = ["required"]
report_only_buckets = ["optional", "xfail", "blocker"]
# xfail and blocker items must NEVER be counted toward a "pass" tally.
non_pass_outcomes = ["xfail", "skip", "Stub", "ImportPass", "Fail", "Timeout"]

# How source-manifest entries map into profile buckets. The validation
# test walks every entry in `source_manifest` and asserts its
# `expected_outcome` is a key in this table.
[outcome_map]
pass = "required"
xfail = "xfail"
skip = "optional"

# Explicit MVP blockers. Empty today — populated as the runner
# (#2821) starts reporting concrete blocker items. Listed entries
# must also appear in the source manifest with a `blocker` field.
[blockers]

# Cross-reference: baseline updates for `ecosystem_fixture_manifest.toml`
# are governed by the release-gate baseline update policy (#2823). Any
# fixture removal or downgrade must include a tracking issue +
# before/after in `validation/baseline_changelog.toml`.
[references.baseline_update_policy]
path = "../baseline_update_policy.toml"
governs = ["ecosystem_fixture_manifest.toml"]
issue = 2823
