# Mamba MVP required-correctness profile manifest — closes #2818.
# Parent: #2775 (MVP release blocking CI profiles).
#
# Release-blocking gate for Python language semantics plus the
# CPython Lib/test seeds that must execute real assertions. The
# profile owns three input families:
#
#   language_semantics   datatest-style `.py` + `.expected` fixtures
#                        under tests/cpython/. Categories
#                        cover syntax, control-flow, datamodel,
#                        comprehensions, decorators, etc.
#   cpython_seeds        CPython 3.12 Lib/test allowlist (#2547). Only
#                        the AssertionPass floor counts toward MVP
#                        green — Stub/ImportPass are tracked but
#                        report-only.
#   stdlib_behavior      stdlib-category required fixtures from
#                        ecosystem_fixture_manifest.toml. Filtered to
#                        `category = "stdlib"` so 3p ecosystem
#                        coverage stays out of correctness scope.
#
# Acceptance (issue #2818):
#
#   - Required correctness profile fails if any required fixture is
#     skipped. Encoded as `[policy].fail_on_required_skip = true`
#     plus an `excluded_outcomes` list that bans ImportPass / Stub /
#     skip / xfail from contributing to a "pass" tally.
#   - Summary names each failed or missing fixture.
#     `[summary]` declares per-family rendering: `fields`,
#     `include_missing`, and `include_failed`.
#   - Manifest can be consumed by worker scripts.
#     Strict TOML schema (no fields without documented purpose) +
#     `[runner_contract]` block names the JSON keys workers emit so
#     the release summary (#2820) and runner (#2821) stay aligned.
#
# Schema (locked by `mvp_required_correctness_profile_manifest_2818.rs`):
#
#   version, profile, parent_issue, issue : header.
#   buckets                : same canonical four (required / optional /
#                            xfail / blocker) as ecosystem / performance.
#   [policy]               : release gating rules — required buckets,
#                            excluded outcomes, fail_on_required_skip.
#   [families.<id>]        : one entry per input family. Each carries
#                            `kind`, `source` (absolute or
#                            crate-root-relative path), and `selector`
#                            (filter expression the runner applies).
#   [summary]              : naming/rendering contract for the failure
#                            summary.
#   [runner_contract]      : JSON keys the worker MUST emit per family,
#                            keyed by family id.

version = 1
profile = "correctness"
parent_issue = 2775
issue = 2818

buckets = ["required", "optional", "xfail", "blocker"]

[policy]
# Acceptance: "Required correctness profile fails if any required
# fixture is skipped."
fail_on_required_skip = true
release_required_buckets = ["required"]
report_only_buckets = ["optional", "xfail", "blocker"]
# Outcomes that MUST NOT count toward a required-bucket pass tally.
# Acceptance: "Exclude import-only, Stub, xfail, and optional
# fixtures from pass counts."
excluded_outcomes = ["ImportPass", "Stub", "skip", "xfail", "optional"]
# Outcomes that DO count toward a required-bucket pass tally.
counted_pass_outcomes = ["pass", "AssertionPass"]

[families.language_semantics]
kind = "datatest"
source = "tests/cpython/fixtures"
# Selector: every `.py` file with a sibling `.expected` is a fixture.
# The runner enumerates them; any file under the source root that
# matches this pattern is part of the family.
selector = "**/*.py+expected_sibling"
description = "Python language semantics fixtures (#2528)."

[families.cpython_seeds]
kind = "cpython_folder_contract"
source = "tests/cpython/config/seeds/"
# Folder-based contract convention (#3729): per-seed outcome is pinned
# by parent directory (pass/, spec/, stub/, fail/, import_pass/,
# timeout/). Only seeds living under `pass/` count toward MVP green —
# matches the runner's `Outcome::is_mvp_pass` (AssertionPass only).
selector = "subdir == \"pass\""
description = "CPython 3.12 Lib/test AssertionPass seeds, folder-contract pinned (#3729)."

[families.stdlib_behavior]
kind = "ecosystem_subset"
source = "ecosystem_fixture_manifest.toml"
# Restrict to the stdlib slice — third-party ecosystem coverage lives
# in the ecosystem profile (#2814), not here.
selector = "category == \"stdlib\" AND expected_outcome == \"pass\""
description = "Required stdlib behavior fixtures (#2553)."

[summary]
# Acceptance: "Summary names each failed or missing fixture."
include_failed = true
include_missing = true
# Per-family per-entry fields the runner emits. The release-summary
# schema (#2820) keys on these names; keep stable.
fields = ["family", "id", "outcome", "expected_outcome", "blocker"]
# Render order — failures first, then missing, then xfail surfacing.
sort = ["status_priority", "family", "id"]

[runner_contract]
# JSON shape the worker script must produce so the release summary
# (#2820) can render this profile uniformly. Keys are family ids
# declared above; values are the JSON keys the worker emits.
language_semantics = ["passed", "failed", "missing", "fixtures"]
cpython_seeds = ["passed", "failed", "missing", "stub_only", "seeds"]
stdlib_behavior = ["passed", "failed", "missing", "fixtures"]

# Cross-reference: baseline updates for the cpython_lib_test fixtures
# are governed by the release-gate baseline update policy (#2823). Any
# change that demotes a seed out of `pass/` must include a tracking
# issue + before/after in `validation/baseline_changelog.toml`. The
# `cpython_lib_test_baseline.toml` + `cpython_lib_test_allowlist.toml`
# files were retired by #3729 — `tests/cpython/config/seeds/` IS
# the contract.
[references.baseline_update_policy]
path = "../baseline_update_policy.toml"
governs = ["tests/cpython/config/seeds/"]
issue = 2823
