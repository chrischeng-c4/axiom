# Mamba MVP release-gate aggregation manifest — closes #2775.
# Parent: #2526 (MVP test completeness and release gates).
#
# The umbrella profile that locks the *set* of release-blocking
# profiles MVP commits to. Child profile manifests (smoke #2819,
# correctness #2818, ecosystem #2814, performance #2815, mambalibs
# #2817, package_manager #2816) define their own gating policy; this
# manifest pins which profiles are required, which order CI runs them
# in, and the cross-profile contract every required profile must
# honor (no skips/xfails/stubs counted as pass, worker command names
# documented, release summary keyed by MVP objective).
#
# Acceptance (issue #2775):
#
#   1. Child leaf issues define profile membership and pass/fail
#      policy. Six child profile manifests are referenced by file
#      path below; the schema gate (`tests/schema_gates/mvp_release_blocking_profiles_2775.rs` (dispatched by the `tests/schema_gates.rs` umbrella))
#      asserts every referenced manifest file exists and points back
#      to #2775 via `parent_issue`.
#   2. CI or worker command names are documented and deterministic.
#      `[ci_runner]` block fixes the worker invocation pattern and
#      the deterministic command id every profile must accept
#      (`run-profile <profile-id> --format json`).
#   3. Release summary exposes blockers by MVP objective.
#      `[summary]` declares the four MVP objectives the summary must
#      group by (compatibility, ecosystem, performance, distribution)
#      and the JSON shape blockers are reported in.
#
# Schema (locked by `tests/schema_gates/mvp_release_blocking_profiles_2775.rs` (dispatched by the `tests/schema_gates.rs` umbrella)):
#
#   version, profile, issue, parent_issue : header.
#   [policy]                : release-wide outcome ban list +
#                             required-bucket convention.
#   [profiles.<id>]         : one entry per release-blocking profile.
#                             Each carries `manifest` (path relative
#                             to this file's directory), `issue`
#                             (the closing leaf issue), `objective`
#                             (one of the four MVP objectives), and
#                             `required` (must be true for blocking
#                             profiles).
#   [run_order]             : ordered array of profile ids. Workers
#                             run them in this order so smoke fails
#                             fast before perf/ecosystem ever start.
#   [ci_runner]             : worker invocation contract.
#   [summary]               : per-objective blocker grouping contract.

version = 1
profile = "release_gate"
issue = 2775
parent_issue = 2526

[policy]
# Release-wide outcome ban: no required profile may count any of
# these outcomes toward a "pass" tally. This is the cross-profile
# contract — individual profile manifests may layer extra rules on
# top (e.g. correctness adds ImportPass to its own ban list) but
# may not weaken this floor.
non_pass_outcomes = [
    "skip",
    "xfail",
    "Stub",
    "ImportPass",
    "Fail",
    "Timeout",
    "blocked",
]
# Every required profile MUST declare a `required` bucket plus the
# canonical three reporting buckets. The four-bucket convention
# (required / optional / xfail / blocker) is shared with ecosystem,
# performance, correctness, mambalibs, and package_manager.
required_bucket = "required"
canonical_buckets = ["required", "optional", "xfail", "blocker"]
# `required = true` on a profile here means a non-zero exit from
# that profile blocks the release. Workers MUST treat any required
# profile crash as a release blocker, not a skip.
treat_required_crash_as_blocker = true

# Six release-blocking profiles. The schema gate asserts every
# `manifest` path resolves to an existing file and that each
# referenced file's `parent_issue` is 2775 (closing the umbrella
# loop).
[profiles.smoke]
manifest = "smoke.toml"
issue = 2819
objective = "compatibility"
required = true
description = "Fast compile/list/inventory gate — runs first, fails fast."

[profiles.correctness]
manifest = "correctness.toml"
issue = 2818
objective = "compatibility"
required = true
description = "Python language semantics + CPython Lib/test assertion seeds."

[profiles.ecosystem]
manifest = "ecosystem.toml"
issue = 2814
objective = "ecosystem"
required = true
description = "Required third-party + stdlib-backed real-world fixtures (offline)."

[profiles.performance]
manifest = "performance.toml"
issue = 2815
objective = "performance"
required = true
description = "Benchmark corpus with 1x floor + 10x suite geomean against CPython 3.12."

[profiles.mambalibs]
manifest = "mambalibs.toml"
issue = 2817
objective = "distribution"
required = true
description = "Mode 2 build/lock/import/diagnostics/type-roundtrip pipeline."

[profiles.package_manager]
manifest = "package_manager.toml"
issue = 2816
objective = "distribution"
required = true
description = "uv-like CLI workflows against frozen local indexes."

# Worker execution order. Smoke runs first so a broken compile blocks
# every deeper gate; correctness runs before perf/ecosystem because a
# semantic regression invalidates downstream measurements. Distribution
# profiles (mambalibs, package_manager) close out the run.
[run_order]
sequence = [
    "smoke",
    "correctness",
    "ecosystem",
    "performance",
    "mambalibs",
    "package_manager",
]

[ci_runner]
# Acceptance: "CI or worker command names are documented and
# deterministic."
command = "run-profile"
# Each profile id below appears as the first positional argument to
# `run-profile`. Workers MUST accept `--format json` and emit the
# release-summary shape declared in `[summary.profile_record]`.
format_flag = "--format json"
# Worker-script forward reference. The release-gate runner (#2821)
# binds this to the actual Python entrypoint.
script = "scripts/release_gate_runner.py"
# Exit-code contract every profile honors: 0 = pass, 1 = blocker,
# 101 = harness/IO error. The runner aggregates these per profile.
exit_codes = { pass = 0, blocker = 1, harness_error = 101 }

[summary]
# Acceptance: "Release summary exposes blockers by MVP objective."
# Blockers MUST be grouped under these four objectives in the
# rendered summary. Each profile declares its `objective` above; the
# grouping is purely a relabeling of the per-profile blocker lists.
objectives = ["compatibility", "ecosystem", "performance", "distribution"]
# Per-objective fields the runner emits. Empty arrays for objectives
# with no blockers — the key MUST be present even when empty so
# downstream consumers can rely on the shape.
fields = ["objective", "profile_ids", "blocker_count", "blockers"]
# Per-blocker entry shape. Profile-specific extra fields (e.g.
# `speedup_vs_cpython` from performance) are layered on top but
# these three are mandatory across every profile.
[summary.blocker_record]
required_fields = ["profile", "id", "outcome"]
# Each profile MUST emit a record for every required-bucket entry,
# pass or fail, so consumers can tell missing from passing.
[summary.profile_record]
required_fields = ["profile", "objective", "passed", "blockers"]

# Cross-reference: the release-summary JSON schema (#2820) and the
# release-gate runner script (#2821) consume this manifest; both are
# tracked under the release_gate profile umbrella.
[references.release_summary_schema]
issue = 2820
note = "Consumes `[summary]` block above; locks the rendered JSON shape."

[references.release_gate_runner]
issue = 2821
note = "Reads `[ci_runner]` + `[run_order]`; invokes per-profile workers."

[references.baseline_update_policy]
path = "../baseline_update_policy.toml"
issue = 2823
note = "Governs baseline mutations referenced by performance + correctness."
