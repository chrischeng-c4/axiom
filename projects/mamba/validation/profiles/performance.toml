# Mamba MVP performance profile manifest — closes #2815.
# Parent: #2775 (MVP release blocking CI profiles).
#
# Defines the release-blocking performance gate. Encodes the two
# perf rules the MVP commits to:
#
#   per_benchmark_floor   each required benchmark must be ≥ 1.0× CPython.
#                         Any required entry below the floor is a blocker
#                         and surfaces in the slowest-blockers summary.
#   suite_average_floor   the geometric mean of `speedup_vs_cpython` across
#                         all required entries must be ≥ 10.0× CPython.
#                         Geometric mean is the right average for ratios —
#                         arithmetic mean over-weights one big outlier.
#
# Both rules apply only against required benchmarks. Optional /
# regression-watch entries are reported but never gate.
#
# Acceptance (issue #2815):
#
#   - Profile fails if CPython runtime is not CPython 3.12.
#     `runtime_identity.required_cpython` is `"3.12"`; the runner
#     refuses to score any baseline whose CPython identity disagrees.
#   - Profile fails if required benchmarks miss 1x floor or 10x average.
#     Encoded as `[policy].per_benchmark_floor` and
#     `[policy].suite_average_floor`.
#   - Summary names slowest blockers. `[summary].slowest_blocker_count`
#     pins how many sub-floor entries the summary surfaces;
#     `[summary].fields` lists the JSON keys the worker emits per
#     blocker entry so reports are self-describing.
#
# Schema (locked by `mvp_performance_profile_manifest_2815.rs`):
#
#   version, profile, parent_issue, issue : header fields.
#   baseline                : path to baseline.json (the perf source of
#                             truth — owned by the bench harness).
#   [runtime_identity]      : required CPython major.minor + mamba edition
#                             so a stale baseline can't shadow a real
#                             regression.
#   [policy]                : per-benchmark floor (1.0×), suite-average
#                             floor (10.0×), averaging method
#                             ("geometric_mean"), and the gating buckets.
#   [summary]               : slowest-blocker rendering contract.
#   [buckets]               : same four buckets as the ecosystem profile
#                             (required / optional / xfail / blocker) so
#                             the runner can render perf and ecosystem
#                             output uniformly.

version = 1
profile = "performance"
parent_issue = 2775
issue = 2815

baseline = "../../baseline.json"

buckets = ["required", "optional", "xfail", "blocker"]

[runtime_identity]
# Acceptance: "Profile fails if CPython runtime is not CPython 3.12."
# We pin the major.minor only; patch-level drift is acceptable across
# CPython releases.
required_cpython = "3.12"
# Mamba pins its own runtime edition so a baseline captured against an
# old runtime can't be reused after a runtime breaking change. "edition"
# is the cclab.runtime.python_compat tag; bump in lockstep with that
# tag whenever runtime semantics change.
required_mamba_edition = "py312"

[policy]
# Acceptance: "Profile fails if required benchmarks miss 1x floor or
# 10x average."
per_benchmark_floor = 1.0
suite_average_floor = 10.0
suite_average_method = "geometric_mean"
release_required_buckets = ["required"]
report_only_buckets = ["optional", "xfail", "blocker"]
# xfail/blocker perf entries are never counted in the suite-average
# calculation so a single neglected outlier can't poison the headline.
average_includes = ["required"]

[summary]
# Acceptance: "Summary names slowest blockers."
slowest_blocker_count = 5
# Per-blocker fields the runner must emit so the summary stays
# machine-readable. The release-summary schema (#2820) consumes these
# names; keep them stable.
fields = ["name", "speedup_vs_cpython", "mamba_ns", "cpython_ns", "kind"]
# Sort order applied to required-bucket entries when picking the top-N
# blockers. "speedup_asc" = ascending speedup (slowest first).
sort = "speedup_asc"

# Forward-reference table for the runner (#2821): a benchmark id whose
# entry exists in baseline.json but whose speedup is below the floor is
# a blocker by definition. The runner populates the summary at run-time;
# this table records the source-of-truth field name so the schema gate
# can lock the contract.
[summary.source]
field = "benchmarks"
speedup_key = "speedup_vs_cpython"
name_key = "name"

# Cross-reference: baseline updates for `baseline.json` are governed by
# the release-gate baseline update policy (#2823). Any change that
# weakens this profile's floors must include a tracking issue + before
# /after in `validation/baseline_changelog.toml`.
[references.baseline_update_policy]
path = "../baseline_update_policy.toml"
governs = ["baseline.json"]
issue = 2823
