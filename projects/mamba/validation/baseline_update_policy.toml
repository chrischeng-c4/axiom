# Mamba MVP release-gate baseline update policy — closes #2823.
# Parent: #2775 (MVP release blocking CI profiles).
#
# Defines how the MVP release baselines may be updated without silently
# weakening the gates. Four baseline families are governed:
#
#   performance     baseline.json (per-benchmark speedup floor + suite
#                   average floor; consumed by performance.toml #2815).
#   cpython_seeds   tests/cpython/lib_test_seeds/ folder-based
#                   contract (pass/, spec/, stub/, fail/, import_pass/,
#                   timeout/) — per-seed outcome is pinned by parent
#                   directory, not TOML. Migrated by #3729 from
#                   `cpython_lib_test_baseline.toml`. Consumed by
#                   correctness.toml #2818.
#   ecosystem       ecosystem_fixture_manifest.toml (third-party
#                   conformance; consumed by ecosystem.toml #2814).
#   skip_debt       skip_debt baseline targets (skip / xfail / Stub /
#                   ImportPass counts; consumed by smoke.toml #2819 +
#                   correctness.toml #2818).
#
# Acceptance (issue #2823):
#
#   1. Baseline changes without reason or issue link fail validation.
#      Every entry under [direction.<weaker>] requires `reason` AND
#      `tracking_issue` in the changelog row, enforced by the validator
#      at policy-check time.
#   2. Stronger baselines are allowed with summary. Entries under
#      [direction.<stronger>] require only `summary` (the why-this-is-
#      better narrative); no tracking issue mandatory.
#   3. Policy is referenced by release profile manifests. The four
#      consumers above each cite this file at the top of their manifest
#      (see `[references.baseline_update_policy]` in each).
#
# Schema (locked by `tests/mvp_runners/mvp_release_baseline_policy_2823.rs`,
# dispatched by the `tests/mvp_runners.rs` umbrella):
#
#   version, profile, parent_issue, issue        : header.
#   [baselines.<family>]                         : one entry per family.
#   [baselines.<family>].path                    : repo-relative path.
#   [baselines.<family>].consumer_profile        : profile id that reads
#                                                  it.
#   [direction.weaker] / [direction.stronger]    : required-fields map.
#   [validation]                                 : enforcement settings.

version = 1
profile = "release_gate"
parent_issue = 2775
issue = 2823

# ─── Governed baselines ─────────────────────────────────────────────

[baselines.performance]
path = "baseline.json"
consumer_profile = "performance"
description = "Per-benchmark speedup floor + suite-average floor (#2815)."

[baselines.cpython_seeds]
path = "tests/cpython/lib_test_seeds/"
consumer_profile = "correctness"
description = "CPython Lib/test folder-based contract (#3729). The parent directory under tests/cpython/lib_test_seeds/ IS the per-seed pinned outcome — promotion is `git mv spec/<f>.py pass/<f>.py`."

[baselines.ecosystem]
path = "ecosystem_fixture_manifest.toml"
consumer_profile = "ecosystem"
description = "Third-party ecosystem fixture conformance (#2814)."

[baselines.skip_debt]
path = "scripts/skip_debt_summary.py"
consumer_profile = "smoke"
description = "skip / xfail / Stub / ImportPass debt baseline (#2819, #2818)."

# ─── Change-direction rules ─────────────────────────────────────────
#
# A "weaker" change LOWERS a floor or RAISES a tolerated-failure count.
# A "stronger" change RAISES a floor or LOWERS a tolerated-failure count.
# Bidirectional shape changes (adding a new benchmark, dropping a
# retired fixture) count as weaker for governance purposes — they need
# the full justification packet so they don't sneak past review.

[direction.weaker]
# Acceptance: "Baseline changes without reason or issue link fail
# validation." Both fields are required.
required_fields = ["reason", "tracking_issue", "before", "after"]
fail_action = "block"
description = "Lowered floor, raised tolerated-failure count, or fixture removal."

[direction.stronger]
# Acceptance: "Stronger baselines are allowed with summary."
required_fields = ["summary"]
fail_action = "allow"
description = "Raised floor, lowered tolerated-failure count, or new gate added."

# ─── Validator behavior ─────────────────────────────────────────────

[validation]
# Path to the audit changelog. The validator walks every entry and
# applies the direction rules above. Missing changelog = no governance
# coverage = soft-fail (warning), so a fresh repo doesn't refuse to
# operate.
changelog_path = "validation/baseline_changelog.toml"
missing_changelog_action = "warn"
# Reject duplicate entries (same family + same `after_hash`) so authors
# can't accidentally re-stage the same waiver twice.
duplicate_entry_action = "block"
# Require the issue link to look like `#<digits>` or a full URL. Empty
# strings or "TODO" fail.
issue_link_regex = "^(#[0-9]+|https?://.+)$"

# ─── Cross-manifest references ──────────────────────────────────────
#
# The four release profiles below MUST cite this file in their own
# manifest header. The locking test reads each manifest and asserts the
# reference is present, so a renamed/moved policy file fails the gate.

[references]
performance = "projects/mamba/validation/profiles/performance.toml"
correctness = "projects/mamba/validation/profiles/correctness.toml"
ecosystem = "projects/mamba/validation/profiles/ecosystem.toml"
smoke = "projects/mamba/validation/profiles/smoke.toml"
