# Mamba MVP release-gate flaky test quarantine policy — closes #2824.
# Parent: #2775 (MVP release blocking CI profiles).
#
# Defines how flaky tests are handled in the release gate without hiding
# release blockers. Out of scope: building retry infrastructure (the
# release gate is single-shot).
#
# Acceptance (issue #2824):
#
#   1. Required flaky item without issue link fails policy validation.
#      `[validation].require_tracking_issue = true` together with
#      `[validation].issue_link_regex` enforce this: any entry under
#      `[[quarantine]]` whose `bucket = "required"` must carry a
#      tracking_issue that matches the regex.
#   2. Quarantined item appears in release summary and blocker budget.
#      `[summary_emission]` declares the runner contract — quarantined
#      items surface in the release summary's `blockers_by_objective`
#      block under the kind `"flaky_quarantine"` and are counted by
#      `release_blocker_report.py` (#2822).
#   3. No flaky item is silently dropped. The validator walks the full
#      quarantine list, never trims an entry, and refuses to operate if
#      the list is unreadable. `[validation].silent_drop_action = "block"`.
#
# Schema (locked by `tests/mvp_runners/mvp_release_flaky_quarantine_2824.rs`,
# dispatched by the `tests/mvp_runners.rs` umbrella):
#
#   version, profile, parent_issue, issue   : header.
#   [status]                                : enum + transition rules.
#   [validation]                            : enforcement settings.
#   [summary_emission]                      : runner integration contract.
#   [[quarantine]]                          : zero or more inline entries.

version = 1
profile = "release_gate"
parent_issue = 2775
issue = 2824

# ─── Buckets ────────────────────────────────────────────────────────
#
# Every quarantine entry lives in exactly one bucket. Required entries
# count toward the release blocker budget (#2822); optional entries are
# reported but never gate. This bucket layout mirrors the four-bucket
# model used by every profile manifest (smoke / correctness / etc.) so
# the same triage vocabulary applies end-to-end.

buckets = ["required", "optional", "xfail", "blocker"]

# ─── Status machine ─────────────────────────────────────────────────
#
# The four legal statuses for a flaky test. Status is the canonical
# field every entry must carry; "active" means the entry is currently
# masking a real signal; "released" means the entry can be dropped on
# the next sweep.

[status]
enum = ["active", "investigating", "fixed", "released"]
default = "active"
# Acceptance: "Quarantined item appears in release summary and blocker
# budget." `active` and `investigating` entries surface; `fixed` is
# tracked but not blocker-counted (waiting on cleanup sweep);
# `released` entries are kept for one MVP cycle as audit history then
# pruned.
blocker_visible = ["active", "investigating"]
audit_history = ["released"]

# ─── Validator behavior ─────────────────────────────────────────────

[validation]
# Acceptance: "Required flaky item without issue link fails policy
# validation."
require_tracking_issue = true
required_buckets = ["required", "blocker"]
issue_link_regex = "^(#[0-9]+|https?://.+)$"

# Acceptance: "No flaky item is silently dropped." Unparseable inline
# entries OR a missing quarantine list are blocking errors, not warnings.
silent_drop_action = "block"

# Per-entry required fields. Missing any of these on a required-bucket
# entry fails validation.
required_fields_required = ["id", "bucket", "status", "owner_profile", "tracking_issue"]
required_fields_optional = ["id", "bucket", "status", "owner_profile"]

# Optional retry hint surfaced in the report; not authoritative because
# the release gate is single-shot. Treated as documentation only.
allow_retry_hint = true

# ─── Runner / summary integration ───────────────────────────────────

[summary_emission]
# Acceptance: "Quarantined item appears in release summary and blocker
# budget." The release-gate runner (#2821) MUST inject every visible
# quarantine entry into the summary's `blockers_by_objective` under the
# kind below, even if the underlying profile reports pass.
blocker_kind = "flaky_quarantine"
# Map quarantine.owner_profile -> MVP objective key in
# blockers_by_objective. The runner uses the owner_profile literally
# unless an entry below remaps it.
[summary_emission.objective_map]
smoke = "smoke"
correctness = "correctness"
performance = "performance"
ecosystem = "ecosystem"
package_manager = "package_manager"
mambalibs = "mambalibs"

# Reporting must NEVER drop an entry to keep the summary tidy.
[summary_emission.never_drop]
status_in = ["active", "investigating", "fixed", "released"]
bucket_in = ["required", "optional", "xfail", "blocker"]

# ─── Inline quarantine list ─────────────────────────────────────────
#
# Empty today; entries are added as flakiness is identified. Each entry
# follows this template:
#
#   [[quarantine]]
#   id              required, stable handle (test name or fixture id).
#   bucket          required, one of `buckets` above.
#   status          required, one of `[status].enum`.
#   owner_profile   required, one of the six MVP profile ids; identifies
#                   which release profile's run hosts this test.
#   tracking_issue  required for required/blocker buckets; matches
#                   `[validation].issue_link_regex`.
#   summary         optional, one-line human description.
#   rerun_hint      optional, e.g. "cargo test -p mamba --test foo -- --include-ignored".
#
# Worked example (commented out — uncomment to land a real entry):
#
#   [[quarantine]]
#   id = "performance::cross_runtime::hashlib_blake2"
#   bucket = "required"
#   status = "investigating"
#   owner_profile = "performance"
#   tracking_issue = "#2096"
#   summary = "blake2 speedup occasionally dips below 1.0x under thermal load"
#   rerun_hint = "cargo bench --bench cross_runtime -- hashlib_blake2"
