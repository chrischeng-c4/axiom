# Mamba MVP release-gate blocker budget — closes #2822.
# Parent: #2775 (MVP release blocking CI profiles).
#
# Companion policy file to the release-gate runner (#2821) and the
# summary schema (#2820). Defines how the runner's `blockers_by_objective`
# rollup is turned into a release/no-release decision, and what counts as
# "concise" in the human-readable report.
#
# Acceptance (issue #2822):
#
#   1. Report lists blocker counts per MVP objective. `[budgets]` carries
#      one entry per MVP objective id; the report compares the runner's
#      actual blocker count against this budget. Zero is the MVP target
#      — any nonzero actual is a budget overrun.
#   2. Missing issue links for required blockers fail or warn according
#      to policy. `[issue_link_policy]` declares the action for each
#      bucket; the reporter exits nonzero when a required blocker is
#      missing a tracking issue and policy = "fail".
#   3. Human summary is concise. `[summary]` caps the human report at
#      `human_max_lines` and trims zero-blocker objectives unless
#      `include_zero_objectives` is true.
#
# Schema (locked by `tests/mvp_runners/mvp_release_blocker_budget_2822.rs`,
# dispatched by the `tests/mvp_runners.rs` umbrella):
#
#   version, profile, parent_issue, issue   : header.
#   [budgets]                              : one int per objective id.
#   [issue_link_policy]                    : two policy keys, enum
#                                            "fail" | "warn".
#   [summary]                              : human-output limits.
#
# Out of scope (per #2822): assigning owners automatically. The reporter
# names the blocker + objective + tracking issue; it does NOT route to a
# person.

version = 1
profile = "release_gate"
parent_issue = 2775
issue = 2822

# Acceptance: "Report lists blocker counts per MVP objective."
# Objectives mirror the keys allowed in `blockers_by_objective` in the
# release-summary schema (#2820). MVP target is zero everywhere; bumping
# any value here is an explicit decision to ship with that many known
# blockers in the named objective.
[budgets]
smoke = 0
correctness = 0
performance = 0
ecosystem = 0
package_manager = 0
mambalibs = 0
release_gate = 0

# Acceptance: "Missing issue links for required blockers fail or warn
# according to policy."
#
# Each blocker entry in `blockers_by_objective` has a `tracking_issue`
# field (#2820 schema). When that field is null/missing, the reporter
# applies the policy below.
#
#   "fail" — exit nonzero; the run is treated as a budget overrun even
#            if the blocker count would otherwise fit the budget.
#   "warn" — print a warning line in the human report and a
#            "missing_tracker": true flag in the machine report, but do
#            not change the exit code.
[issue_link_policy]
required_blocker_missing_tracker = "fail"
optional_blocker_missing_tracker = "warn"

# Acceptance: "Human summary is concise."
[summary]
# Hard cap on lines the human report may emit. Anything beyond is
# truncated with a single "(+N more)" footer so triage stays scannable.
human_max_lines = 25
# When false, objectives with zero blockers are omitted from the human
# report (the machine report always lists every budgeted objective).
include_zero_objectives = false
# Sort key for the per-objective rows. "overrun_first" sorts objectives
# with `actual > budget` to the top, then `actual desc`, then alpha.
sort = "overrun_first"
