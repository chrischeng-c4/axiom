# Mamba MVP performance benchmark manifest — closes #2567.
# Parent: #2530 (performance gate suite).
#
# Defines the exact benchmark corpus used for the MVP 10× performance
# gate. Bridges the gap between
#
#   `baseline.json`               — the canonical perf source of truth
#                                   (name + timings + tier, owned by
#                                   the bench harness).
#   `tests/cpython/_regression/core/bench/*.py`   — the Python fixtures the cross-runtime
#                                   bench actually executes.
#
# Without this manifest the harness has no machine-readable way to say
# "benchmark X lives at fixture path Y, belongs to category Z, and is
# default-MVP (not exploratory)." Downstream gates (#2565 floor, #2569
# suite geomean, #2820 release summary) can already select required
# benchmarks via tier metadata (#2566), but the manifest is what lets
# a CI runner confirm the fixture file exists before scoring.
#
# Acceptance (issue #2567):
#
#   1. Gate fails if a required benchmark fixture is missing.
#      Encoded as `[[benchmarks]] tier = "required"`. The checker
#      (`scripts/perf_benchmark_manifest_check.py`) resolves
#      `fixture_root / fixture` and exits 1 when the file is absent.
#   2. Exploratory benchmarks are reported but not counted in MVP geomean.
#      Encoded as `[[benchmarks]] tier = "exploratory"`. The checker
#      surfaces missing exploratory fixtures as warnings, never as gate
#      failures. The suite geomean reads `[policy].average_includes`
#      from `validation/profiles/performance.toml` (still `["required"]`)
#      so exploratory entries never poison the headline.
#   3. Manifest location and update command are documented.
#      Encoded as `[update]` and `[references]`. The release-summary
#      runner (#2820) and the bench harness both follow the
#      `update.command` to refresh the manifest in a single step.
#
# Schema (locked by `tests/mvp_runners/mvp_perf_benchmark_manifest_2567.rs`,
# dispatched by the `tests/mvp_runners.rs` umbrella):
#
#   version, manifest, parent_issue, issue : header fields.
#   fixture_root             : root for resolving every `[[benchmarks]] fixture`,
#                              relative to this manifest's directory.
#   categories               : enum of permitted `[[benchmarks]] category`.
#   tiers                    : enum of permitted `[[benchmarks]] tier`.
#                              `required` gates; `exploratory` is report-only.
#   [[benchmarks]]           : array of benchmark records (id, fixture,
#                              category, tier, optional weight).
#   [update]                 : checker command + docs pointer.
#   [references]             : cross-refs to the perf profile + baseline.

version = 1
manifest = "perf_benchmark"
parent_issue = 2530
issue = 2567

# Resolved relative to this manifest's directory
# (`projects/mamba/validation/`). The actual fixture root is
# `projects/mamba/tests/cpython/_regression/core/bench/`.
fixture_root = "../tests/cpython/_regression/core/bench"

# Permitted category values. Mirrors the `kind` field used by
# `baseline.json` entries so release-summary output stays consistent.
categories = ["numeric", "recursion", "workload"]

# Two-tier model — kept deliberately separate from the four-bucket
# baseline tier model (#2566). The four-bucket model classifies the
# perf result (required/optional/xfail/blocker); this two-tier model
# classifies the manifest entry's role in the MVP gate. A benchmark
# can be `required` in the manifest yet land in any baseline bucket
# depending on how it actually scored.
tiers = ["required", "exploratory"]

# Permitted timing-mode values (#2570). Required benchmarks must
# declare `timing_mode = "internal"` so process-startup + harness
# overhead does not dominate the result. Exploratory benchmarks may
# remain `timing_mode = "process_wall"` (legacy fixtures) without
# gating, but the release summary distinguishes the two cohorts so a
# reviewer knows which numbers came from internal `INTERNAL_TIME_NS`
# markers and which from `/usr/bin/time` wall measurement.
timing_modes = ["internal", "process_wall"]

# Default MVP benchmarks. Every entry below must have a fixture file at
# `fixture_root / fixture`; the checker validates this on every run.
[[benchmarks]]
id = "int_sum_loop"
fixture = "int_sum.py"
category = "numeric"
tier = "required"
weight = 1.0
timing_mode = "internal"

[[benchmarks]]
id = "range_sum_loop"
fixture = "range_sum.py"
category = "numeric"
tier = "required"
weight = 1.0
timing_mode = "internal"

# Exploratory benchmarks. Reported in the release summary so a worker
# can see whether they regressed, but never counted in the MVP geomean.
# These intentionally match the `blocker` entries in `baseline.json`
# that have tracking issues — the bench runs them every release so the
# tracking-issue status stays honest.
[[benchmarks]]
id = "fib_recursive"
fixture = "fib30.py"
category = "recursion"
tier = "exploratory"
tracking_issue = "#1260"
timing_mode = "process_wall"

[[benchmarks]]
id = "generator_sum"
fixture = "generator_sum.py"
category = "workload"
tier = "exploratory"
tracking_issue = "#1260"
timing_mode = "process_wall"

[update]
# Acceptance #3: "Manifest location and update command are documented."
location = "projects/mamba/validation/perf_benchmark_manifest.toml"
command = "python3 projects/mamba/scripts/perf_benchmark_manifest_check.py"
# Step-by-step: edit this manifest to add or remove benchmarks, drop the
# matching fixture under `tests/cpython/_regression/core/bench/`, then run the command
# above. The checker prints one line per validated entry; non-zero exit
# means a required fixture is missing.
docs = """
To add a benchmark:
  1. Drop the fixture at projects/mamba/tests/cpython/_regression/core/bench/<id>.py.
  2. Add a [[benchmarks]] entry to this file with id, fixture, category, tier.
  3. Run: python3 projects/mamba/scripts/perf_benchmark_manifest_check.py
  4. If the entry is `tier = "required"`, add a matching entry to
     projects/mamba/baseline.json (see #2566 for tier metadata rules).
"""

[references]
# The suite geomean / per-benchmark floor enforcement lives in the
# performance profile manifest. This manifest only catalogs benchmark
# fixtures; it does not redefine the gate rules.
[references.performance_profile]
path = "profiles/performance.toml"
issue = 2815
governs = ["baseline.json"]

# The baseline tier metadata schema is the gate-policy source of truth
# for which benchmarks the floor/geomean apply to. The manifest below
# only governs fixture file existence + category + manifest tier.
[references.baseline_tier_metadata]
path = "../baseline.json"
issue = 2566
