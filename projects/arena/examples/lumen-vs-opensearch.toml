# arena comparison spec: lumen vs OpenSearch on search latency.
#
# Both targets speak HTTP/JSON, so arena's service flavor (rig loadgen over
# ureq) can drive them fairly. Postgres is NOT here: pg speaks its native wire
# protocol, not HTTP, so it belongs to the deferred `command` flavor (a SQL
# driver that emits one latency number), not the HTTP service flavor.
#
# Run (with lumen on :7373 and OpenSearch on :9200 already up):
#   arena run --spec projects/arena/examples/lumen-vs-opensearch.toml
# First run records baselines:
#   arena run --spec ... --update-baselines
#
# The per-target `request` bodies are GLUE authored here — the SAME logical
# query expressed as lumen JSON vs OpenSearch DSL. arena never reads them; it
# only guarantees both are compared as the same cell.

spec_version = 1
name = "lumen-vs-opensearch"
base = "lumen"            # ratios divide BY lumen (ratio = peer/lumen; >1 = lumen wins)
metric = "p99_ms"        # tail latency, lower-is-better
ratchet = 0.8
baseline = ".arena/baselines.json"

[targets.lumen]
kind = "service"
[targets.lumen.load]
target_qps = 500
workers = 16
duration_secs = 20
warmup_secs = 5

[targets.opensearch]
kind = "service"
[targets.opensearch.load]
target_qps = 500
workers = 16
duration_secs = 20
warmup_secs = 5

# --- text_bm25: full-text BM25 over the bio field. lumen must WIN. ---
[[cells]]
name = "text_bm25"
[cells.targets.lumen]
request = { method = "POST", url = "http://127.0.0.1:7373/collections/docs/search", body = '{"query":{"match":{"field":"bio","text":"engineer"}},"limit":10}' }
[cells.targets.opensearch]
gate = "win"
request = { method = "POST", url = "http://127.0.0.1:9200/docs/_search", body = '{"query":{"match":{"bio":"engineer"}},"size":10}' }

# --- kw_term: exact keyword lookup. OpenSearch's keyword field is home turf
#     on loopback where the HTTP floor dominates — report it, don't gate it. ---
[[cells]]
name = "kw_term"
[cells.targets.lumen]
request = { method = "POST", url = "http://127.0.0.1:7373/collections/docs/search", body = '{"query":{"term":{"field":"city","value":"taipei"}},"limit":10}' }
[cells.targets.opensearch]
gate = "exempt"
reason = "keyword term lookup is floor-dominated on loopback; not a fair engine comparison"
request = { method = "POST", url = "http://127.0.0.1:9200/docs/_search", body = '{"query":{"term":{"city":"taipei"}},"size":10}' }
