# arena comparison spec: lumen vs Postgres on search latency.
#
# Both targets are driven by the SAME thin Rust client on rig's ONE open-loop
# scheduler — lumen over HTTP (rig http transport), pg over its native wire
# protocol (rig postgres transport, tokio-postgres prepared statements). The
# client overhead is a near-constant floor across both, so the ratio reflects
# the backend + protocol, not the client library. Protocol cost is kept (it is
# part of what each backend delivers); cells where the floor dominates are
# marked `exempt`.
#
# Prereqs: lumen serving on :7373 with a `docs` collection; a Postgres with a
# `docs` table (tsvector GIN index on bio, btree on city/age) loaded with the
# SAME corpus. Run:
#   arena run --spec projects/arena/examples/lumen-vs-pg.toml --update-baselines   # record
#   arena run --spec projects/arena/examples/lumen-vs-pg.toml                       # gate
#
# The per-target payloads (`request` for lumen, `query` for pg) are GLUE — the
# SAME logical query expressed two ways. arena never reads them; it only
# guarantees both run as the same cell. lumen's payloads are easy to author
# from its published /openapi.json; pg's are hand-written SQL.

spec_version = 1
name = "lumen-vs-pg"
base = "lumen"            # ratio = pg / lumen  (>1 = lumen wins)
metric = "p99_ms"
ratchet = 0.8
baseline = ".arena/baselines.json"

[targets.lumen]
kind = "http"
[targets.lumen.load]
target_qps = 500
workers = 16
duration_secs = 20
warmup_secs = 5

[targets.pg]
kind = "postgres"
dsn = "host=/tmp user=postgres dbname=lumenbench"
[targets.pg.load]
target_qps = 500
workers = 16
duration_secs = 20
warmup_secs = 5

# --- text_bm25: full-text relevance search. lumen must WIN. ---
[[cells]]
name = "text_bm25"
[cells.targets.lumen]
request = { method = "POST", url = "http://127.0.0.1:7373/collections/docs/search", body = '{"query":{"match":{"field":"bio","text":"engineer"}},"limit":10}' }
[cells.targets.pg]
gate = "win"
query = "SELECT id FROM docs WHERE to_tsvector('english', bio) @@ websearch_to_tsquery('english', 'engineer') ORDER BY ts_rank(to_tsvector('english', bio), websearch_to_tsquery('english', 'engineer')) DESC LIMIT 10"

# --- kw_term: exact keyword lookup. pg's btree is home turf on loopback where
#     the protocol floor dominates — report it, don't gate it. ---
[[cells]]
name = "kw_term"
[cells.targets.lumen]
request = { method = "POST", url = "http://127.0.0.1:7373/collections/docs/search", body = '{"query":{"term":{"field":"city","value":"taipei"}},"limit":10}' }
[cells.targets.pg]
gate = "exempt"
reason = "pg btree point-lookup home turf; floor-dominated on loopback, not an engine comparison"
query = "SELECT id FROM docs WHERE city = 'taipei' LIMIT 10"
