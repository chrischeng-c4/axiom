# arena comparison spec: lumen vs BOTH Postgres AND OpenSearch on search latency.
#
# One arena run, three targets, one open-loop scheduler: lumen is the base; pg
# (native wire protocol, rig postgres transport) and OpenSearch (HTTP/JSON, rig
# http transport) are each compared against the SAME lumen baseline. Every cell
# runs all three as the same logical query; ratio = peer / lumen (>1 = lumen
# wins). This is the EC 效能 (benchmark) gate: lumen must beat BOTH databases on
# the contracted relevance-search cells, with floor-dominated point lookups
# marked `exempt` rather than gated.
#
# Prereqs (all on loopback, SAME corpus in a `docs` collection/table/index):
#   - lumen serving on :7373 with a `docs` collection
#   - Postgres with a `docs` table (tsvector GIN on bio, btree on city/age),
#     reachable at the dsn below
#   - OpenSearch on :9200 with a `docs` index
# Run:
#   arena run --spec projects/arena/examples/lumen-vs-pg-and-opensearch.toml --update-baselines  # record
#   arena run --spec projects/arena/examples/lumen-vs-pg-and-opensearch.toml                      # gate
#
# Per-target payloads (`request` for lumen/opensearch, `query` for pg) are GLUE
# — the SAME logical query expressed three ways. arena never reads them; it only
# guarantees all three run as the same cell.

spec_version = 1
name = "lumen-vs-pg-and-opensearch"
base = "lumen"            # ratio = peer / lumen  (>1 = lumen wins)
metric = "p99_ms"        # tail latency, lower-is-better
ratchet = 0.8
baseline = ".arena/baselines.json"

[targets.lumen]
kind = "http"
[targets.lumen.load]
target_qps = 500
workers = 16
duration_secs = 20
warmup_secs = 5

[targets.pg]
kind = "postgres"
dsn = "host=/tmp user=postgres dbname=lumenbench"
[targets.pg.load]
target_qps = 500
workers = 16
duration_secs = 20
warmup_secs = 5

[targets.opensearch]
kind = "http"
[targets.opensearch.load]
target_qps = 500
workers = 16
duration_secs = 20
warmup_secs = 5

# --- text_bm25: full-text BM25 over the bio field. lumen must WIN both. ---
[[cells]]
name = "text_bm25"
[cells.targets.lumen]
request = { method = "POST", url = "http://127.0.0.1:7373/collections/docs/search", body = '{"query":{"match":{"field":"bio","text":"engineer"}},"limit":10}' }
[cells.targets.pg]
gate = "win"
query = "SELECT eid FROM docs WHERE bio_tsv @@ websearch_to_tsquery('simple', 'engineer') ORDER BY ts_rank(bio_tsv, websearch_to_tsquery('simple', 'engineer')) DESC LIMIT 10"
[cells.targets.opensearch]
gate = "win"
request = { method = "POST", url = "http://127.0.0.1:9200/docs/_search", body = '{"query":{"match":{"bio":"engineer"}},"size":10}' }

# --- kw_term: exact keyword lookup. The peers' keyword/btree path is home turf
#     on loopback where the protocol floor favours native-wire pg, so lumen is
#     not expected to WIN here. But we report it HONESTLY rather than exempt it:
#     a `target` gate with floor 0.95 means lumen must stay within ~5% of each
#     peer — below that it shows RED in the report (a tracked weakness) without
#     hard-failing the benchmark gate. No hiding slow cells behind `exempt`. ---
[[cells]]
name = "kw_term"
[cells.targets.lumen]
request = { method = "POST", url = "http://127.0.0.1:7373/collections/docs/search", body = '{"query":{"term":{"field":"city","value":"taipei"}},"limit":10}' }
[cells.targets.pg]
gate = "target"
floor = 0.95
reason = "point lookup; lumen must hold within 5% of pg (honest floor, not exempt)"
query = "SELECT eid FROM docs WHERE city = 'taipei' LIMIT 10"
[cells.targets.opensearch]
gate = "target"
floor = 0.95
reason = "point lookup; lumen must hold within 5% of OpenSearch (honest floor, not exempt)"
request = { method = "POST", url = "http://127.0.0.1:9200/docs/_search", body = '{"query":{"term":{"city":"taipei"}},"size":10}' }
