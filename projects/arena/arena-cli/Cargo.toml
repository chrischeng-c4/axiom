[package]
name = "arena-cli"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "CLI surface for arena — JSON-on-stdout-by-default N-target comparison runner"

[lib]
name = "arena_cli"
path = "src/lib.rs"

[[bin]]
name = "arena"
path = "src/bin/arena.rs"

[dependencies]
arena = { path = ".." }
clap = { workspace = true, features = ["derive"] }
serde_json.workspace = true
anyhow.workspace = true
