[package]
name = "arena"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "N-target competitive comparison runner — fan one workload across targets, ratio + ratchet-gate, one agent-readable JSON report"

[lib]
name = "arena"
crate-type = ["rlib"]

[dependencies]
# The whole point: reuse rig's loadgen (measurement), BaselineStore (ratchet
# gate), and report envelope (worst-wins + exit ladder). meter is NOT a dep —
# the deferred runtime flavor will shell out to the `meter` CLI, not link it.
rig = { path = "../rig" }
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
toml = "0.8"

[dev-dependencies]
tempfile = "3"
