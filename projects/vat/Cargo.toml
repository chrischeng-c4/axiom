[package]
name = "vat"
version = "0.4.2"
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "vat — agent-native, GPU-native dev containers for macOS/Linux. No VM: workloads run as sandboxed host processes, so the Apple GPU just works."

[lib]
name = "vat"
path = "src/lib.rs"
# The vendored googleapis protos (google.api/iam/rpc/type) carry doc-comment
# prose that prost emits as `///` docs; cargo would run them as doctests and
# fail (they aren't Rust). vat has no real doctests, so disable them crate-wide.
doctest = false

[[bin]]
name = "vat"
path = "src/main.rs"

[features]
# Built-in Rust emulators (Pub/Sub gRPC + Firebase Auth REST). Default-on so the
# shipped binary always has them; `--no-default-features` drops the async stack
# for a lean build (the `vat emulator` verb then errors cleanly).
default = ["emulator", "self-update", "issue"]
emulator = ["dep:tokio", "dep:axum", "dep:jsonwebtoken", "dep:tonic", "dep:prost", "dep:prost-types", "dep:async-trait", "dep:tokio-stream", "dep:async-stream", "dep:reqwest", "dep:cron", "dep:base64", "dep:serde_yaml", "dep:percent-encoding", "dep:md-5", "dep:rcgen", "dep:rustls", "dep:tokio-rustls", "dep:hyper", "dep:hyper-util", "dep:http-body-util"]
# self-update / issue — the network paths come from the shared cli-std
# crate's `online` feature; `dep:tokio` provides the runtime vat's sync dispatch
# uses to drive cli-std's async `run`. Lean build (neither feature) compiles and
# the verbs bail cleanly.
self-update = ["cli-std/online", "dep:tokio"]
issue = ["cli-std/online", "dep:tokio"]
# Deprecated compatibility alias for old feature pins; the CLI verb is `issue`.
report-issue = ["issue"]

[dependencies]
clap = { workspace = true, features = ["derive", "color"] }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
walkdir = { workspace = true }
url = { workspace = true }
dirs = "5"
toml = "0.8"
libc = "0.2"

# Shared agent-facing CLI commands (llm / upgrade / issue); offline paths build
# without features, the `online` HTTPS path is pulled by self-update/issue.
cli-std = { path = "../../libs/cli-std", default-features = false }

# Emulator stack (feature-gated).
tokio = { workspace = true, optional = true }
axum = { workspace = true, optional = true }
jsonwebtoken = { workspace = true, optional = true }
tonic = { version = "0.12", optional = true }
prost = { version = "0.13", optional = true }
prost-types = { version = "0.13", optional = true }
async-trait = { version = "0.1", optional = true }
tokio-stream = { version = "0.1", optional = true }
async-stream = { version = "0.3", optional = true }
reqwest = { version = "0.12", optional = true, default-features = false, features = ["rustls-tls", "json"] }
cron = { version = "0.12", optional = true }
base64 = { version = "0.22", optional = true }
serde_yaml = { version = "0.9", optional = true }
percent-encoding = { version = "2", optional = true }
md-5 = { version = "0.10", optional = true }
rcgen = { version = "0.13", optional = true }
rustls = { version = "0.23", optional = true }
tokio-rustls = { version = "0.26", optional = true }
hyper = { version = "1", optional = true, features = ["server", "client", "http1", "http2"] }
hyper-util = { version = "0.1", optional = true, features = ["tokio"] }
http-body-util = { version = "0.1", optional = true }

[build-dependencies]
tonic-build = "0.12"
protoc-bin-vendored = "3"

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true }
tonic = "0.12"
tokio-stream = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
# gRPC-through-MITM e2e (network sandbox v2): a raw h2 client over a CONNECT +
# TLS(ALPN h2) tunnel, encoding the generated prost messages.
hyper = { version = "1", features = ["client", "http2"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"
tokio-rustls = "0.26"
rustls-pemfile = "2"
prost = "0.13"

# Emulator integration tests need the emulator feature (skipped in a lean build).
[[test]]
name = "vat_emulator_auth"
required-features = ["emulator"]

[[test]]
name = "vat_emulator_pubsub"
required-features = ["emulator"]

[[test]]
name = "vat_emulator_tasks"
required-features = ["emulator"]

[[test]]
name = "vat_emulator_scheduler"
required-features = ["emulator"]

[[test]]
name = "vat_emulator_workflows"
required-features = ["emulator"]

[[test]]
name = "vat_emulator_storage"
required-features = ["emulator"]

[[test]]
name = "vat_emulator_httpmock"
required-features = ["emulator"]

[[test]]
name = "vat_emulator_openapi"
required-features = ["emulator"]

[[test]]
name = "vat_emulator_tasks_grpc"
required-features = ["emulator"]

[[test]]
name = "vat_emulator_scheduler_grpc"
required-features = ["emulator"]

[[test]]
name = "vat_emulator_httpmock_routing"
required-features = ["emulator"]

[[test]]
name = "vat_emulator_httpmock_hermetic"
required-features = ["emulator"]

[[test]]
name = "vat_emulator_grpc_mitm_routing"
required-features = ["emulator"]
