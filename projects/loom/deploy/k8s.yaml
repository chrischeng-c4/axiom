# loom on k8s — one image (loom:verify) backs every role. relay + keep + the
# loom controller + the job-controller run as Deployments; the job-controller has
# RBAC to create the per-task Jobs it spawns (image loom:verify, `loom run-task`).
# Apply after `kind load docker-image loom:verify`. See scripts/k8s-e2e.sh.
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: loom-jobctl }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: loom-jobctl }
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: loom-jobctl }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: loom-jobctl }
subjects:
  - { kind: ServiceAccount, name: loom-jobctl }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: relay }
spec:
  replicas: 1
  selector: { matchLabels: { app: relay } }
  template:
    metadata: { labels: { app: relay } }
    spec:
      containers:
        - name: relay
          image: loom:verify
          imagePullPolicy: IfNotPresent
          command: ["relay-server"]
          env: [{ name: RELAY_BIND, value: "0.0.0.0:7400" }]
          ports: [{ containerPort: 7400 }]
---
apiVersion: v1
kind: Service
metadata: { name: relay }
spec:
  selector: { app: relay }
  ports: [{ port: 7400, targetPort: 7400 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: keep }
spec:
  replicas: 1
  selector: { matchLabels: { app: keep } }
  template:
    metadata: { labels: { app: keep } }
    spec:
      containers:
        - name: keep
          image: loom:verify
          imagePullPolicy: IfNotPresent
          command: ["keep"]
          args: ["--host", "0.0.0.0", "--port", "7379"]
          env: [{ name: KEEP_BODY_LIMIT, value: "134217728" }]
          ports: [{ containerPort: 7379 }]
---
apiVersion: v1
kind: Service
metadata: { name: keep }
spec:
  selector: { app: keep }
  ports: [{ port: 7379, targetPort: 7379 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: loom-controller }
spec:
  replicas: 1
  selector: { matchLabels: { app: loom-controller } }
  template:
    metadata: { labels: { app: loom-controller } }
    spec:
      containers:
        - name: controller
          image: loom:verify
          imagePullPolicy: IfNotPresent
          args: ["controller"]
          env:
            - { name: LOOM_ADDR, value: "0.0.0.0:7474" }
            - { name: LOOM_RELAY, value: "http://relay:7400" }
          ports: [{ containerPort: 7474 }]
---
apiVersion: v1
kind: Service
metadata: { name: loom }
spec:
  selector: { app: loom-controller }
  ports: [{ port: 7474, targetPort: 7474 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: job-controller }
spec:
  replicas: 1
  selector: { matchLabels: { app: job-controller } }
  template:
    metadata: { labels: { app: job-controller } }
    spec:
      serviceAccountName: loom-jobctl
      containers:
        - name: job-controller
          image: loom:verify
          imagePullPolicy: IfNotPresent
          args: ["job-controller"]
          env:
            - { name: LOOM_RELAY, value: "http://relay:7400" }
            - { name: LOOM_KEEP, value: "http://keep:7379" }
            - { name: LOOM_JOB_IMAGE, value: "loom:verify" }
