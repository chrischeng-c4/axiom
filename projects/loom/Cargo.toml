[package]
name = "loom"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "loom — DAG workflow scheduler. Control-plane orchestrator over relay (broker) + keep (store); owns sharded, strongly-consistent workflow/DAG state and never sits in the data path."
# Stamp git sha / build time / target for the standard CLI ops (#475).
build = "build.rs"

[lib]
name = "loom"
path = "src/lib.rs"

[[bin]]
name = "loom"
path = "src/main.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
tower = { workspace = true, features = ["util"] }
# Explicit hyper auto-server for HTTP/2 cleartext (h2c) + HTTP/1.1 on one port —
# axum::serve alone is HTTP/1-only. (Same as keep/lumen.)
hyper = { version = "1", features = ["server", "http1", "http2"] }
hyper-util = { version = "0.1", features = ["server", "server-auto", "tokio"] }
async-trait = { workspace = true }
# Bidi h2 stream plumbing for the schema layer (#432): read the request stream
# while writing the response stream.
futures = { workspace = true }
async-stream = { workspace = true }
# relay/keep clients (h2c, no TLS — same as lumen's relay client).
reqwest = { workspace = true }
# Shared Raft consensus engine for replicated workflow state (#110).
raft-core = { path = "../../libs/raft-core" }
# Scoped claim-check tokens the schema layer signs for workers (#444).
claimtoken = { path = "../../libs/claimtoken" }
# Standard agent-facing CLI ops — llm/upgrade/report-issue (#475). Offline paths
# always build; the network paths are gated behind loom's online features below.
cli-std = { path = "../../libs/cli-std", default-features = false }

[features]
default = []
# Online (HTTPS) paths of the standard CLI ops (#475): `upgrade` self-install +
# `report-issue` submit. Offline paths (llm, `upgrade --check`, `report-issue
# --dry-run`) always build; release builds enable these.
self-update = ["cli-std/online"]
report-issue = ["cli-std/online"]
