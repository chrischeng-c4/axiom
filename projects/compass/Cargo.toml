[package]
name = "cclab-compass"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Code intelligence arsenal — navigate, analyze, refactor, and watch any codebase"

[lib]
name = "cclab_compass"
path = "src/lib.rs"

[dependencies]
# Serialization
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
toml = "0.8"

# Error handling
anyhow.workspace = true
thiserror.workspace = true

# File operations
walkdir.workspace = true
glob = "0.3"
ignore = "0.4"
dirs = "5"
fs2 = "0.4"

# Regex
regex.workspace = true
regex-lite = "0.1"

# Async runtime (LSP server + Argus daemon)
tokio.workspace = true
async-trait.workspace = true

# AST parsing (tree-sitter)
tree-sitter = "0.25"
tree-sitter-rust = "0.24"
tree-sitter-python = "0.25"
tree-sitter-javascript = "0.25"
tree-sitter-typescript = "0.23"
tree-sitter-go = "0.25"
tree-sitter-html = "0.23"
tree-sitter-css = "0.25"
tree-sitter-hcl = "1.1"
tree-sitter-yaml = "0.7"
tree-sitter-sequel = "0.3"
tree-sitter-proto = "0.4"
tree-sitter-graphql = "0.1"
tree-sitter-toml-ng = "0.7"

# LSP server
tower-lsp = "0.20"

# File watching
notify = "7"

# Persistent cache
bincode = "1.3"

# Parallelism
rayon.workspace = true
jwalk.workspace = true

# Logging
tracing.workspace = true

# UUID
uuid = { version = "1", features = ["v4", "serde"] }

# JSON Schema (schemas/ module for K8s + GitLab CI validation)
jsonschema = "0.29"

# Hashing (cache content addressing)
sha2 = "0.10"

# Terminal output
crossterm = "0.28"
colored = "3"

# Template engine (for code generators in gen/)
tera = "1"
heck = "0.5"
indexmap = { version = "2", features = ["serde"] }

# Markdown parsing (spec/)
pulldown-cmark = "0.12"

# HTTP client (type_inference/typeshed downloads + gen/rust/reqwest generator)
reqwest = { version = "0.12", features = ["blocking", "json"] }

# Date/time
chrono.workspace = true

[dev-dependencies]
tempfile = "3"
