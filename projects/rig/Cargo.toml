[package]
name = "rig"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Declarative test-scenario harness engine — e2e scenarios + open-loop load pins, one agent-readable JSON report"

[lib]
name = "rig"
crate-type = ["rlib"]

[dependencies]
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
toml = "0.8"
# Read OpenAPI specs in YAML as well as JSON (both parse into serde_json::Value).
serde_yaml = "0.9"
# Sync HTTP client: scenario steps and the open-loop load generator run on
# plain worker threads, no async runtime needed.
ureq = { version = "2", features = ["json"] }
# Sync Postgres client (feature-gated) for the postgres load transport — same
# blocking thread model as the HTTP path. Off by default to keep rig lean.
postgres = { version = "0.19", optional = true }

[features]
# Enables the postgres load transport (pulls a tokio runtime via the `postgres`
# crate). Consumers comparing a SQL backend (e.g. arena) opt in.
postgres = ["dep:postgres"]

[dev-dependencies]
tempfile = "3"
