[package]
name = "rig-cli"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "CLI surface for rig — JSON-on-stdout-by-default scenario/load harness verbs"

[lib]
name = "rig_cli"
path = "src/lib.rs"

[[bin]]
name = "rig"
path = "src/bin/rig.rs"

[dependencies]
rig = { path = ".." }
clap = { workspace = true, features = ["derive"] }
serde_json.workspace = true
anyhow.workspace = true
