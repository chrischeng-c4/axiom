# The keep operator runs in its own namespace and needs cluster-wide permission
# to manage the child kinds it renders for every Keep custom resource.
apiVersion: v1
kind: Namespace
metadata:
  name: keep-system
  labels:
    app.kubernetes.io/name: keep-operator
    app.kubernetes.io/part-of: keep
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keep-operator
  namespace: keep-system
  labels:
    app.kubernetes.io/name: keep-operator
    app.kubernetes.io/part-of: keep
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: keep-operator
  labels:
    app.kubernetes.io/name: keep-operator
    app.kubernetes.io/part-of: keep
rules:
  # The custom resource it owns + its status subresource.
  - apiGroups: ["keep.dev"]
    resources: ["keeps", "keeps/status", "keeps/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # The durable store workload.
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Serving Service/ConfigMap/ServiceAccount.
  - apiGroups: [""]
    resources: ["services", "configmaps", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leader-election Lease (HA: only the holder reconciles).
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: keep-operator
  labels:
    app.kubernetes.io/name: keep-operator
    app.kubernetes.io/part-of: keep
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: keep-operator
subjects:
  - kind: ServiceAccount
    name: keep-operator
    namespace: keep-system
