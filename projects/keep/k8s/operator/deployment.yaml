# The keep operator: a controller that watches Keep objects cluster-wide. Ships
# in the same `keep` image (run as `keep k8s operator run`, built with
# --features operator). HA-safe: a coordination.k8s.io Lease elects one active
# reconciler, so this can be scaled to replicas > 1 (the others stand by).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keep-operator
  namespace: keep-system
  labels:
    app.kubernetes.io/name: keep-operator
    app.kubernetes.io/part-of: keep
spec:
  # Scale to 2+ for HA — leader-election guarantees a single active reconciler.
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: keep-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keep-operator
    spec:
      serviceAccountName: keep-operator
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: keep:latest
          imagePullPolicy: IfNotPresent
          command: ["keep", "k8s", "operator", "run"]
          env:
            - name: RUST_LOG
              value: "info"
            # Leader-election identity + the namespace the Lease lives in.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
