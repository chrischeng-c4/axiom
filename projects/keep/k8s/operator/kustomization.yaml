apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Installs the keep Operator: the Keep CRD, its RBAC, and the controller
# Deployment (in the keep-system namespace). After this is applied, create
# `Keep` objects (see `keep k8s instance render --profile prod`) instead of
# hand-applying k8s/base + overlays for the HA topology. k8s/base stays the
# small single-node direct install; the operator CR path owns HA.
#
#   kubectl apply -k k8s/operator
#   keep k8s instance render --profile prod | kubectl apply -f -
#
# crd.yaml is generated — regenerate with:
#   cargo run -p keep --features operator --bin keep -- k8s crd render > k8s/operator/crd.yaml

resources:
  - crd.yaml
  - rbac.yaml
  - deployment.yaml
