apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keep

resources:
  - ../../base

# staging: one store node sized close to prod, JSON logs, a mid-size disk tier.

replicas:
  - name: keep
    count: 1

patches:
  - target:
      kind: ConfigMap
      name: keep-config
    patch: |-
      - op: replace
        path: /data/KEEP_SHARDS
        value: "128"
      - op: replace
        path: /data/KEEP_LOG_LEVEL
        value: "info"
  - target:
      kind: StatefulSet
      name: keep
    patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: "20Gi"
