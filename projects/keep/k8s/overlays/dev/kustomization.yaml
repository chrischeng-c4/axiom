apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keep

resources:
  - ../../base

# dev: a single store node, smallest viable footprint, verbose human-readable
# logs. The ConfigMap is a static base resource (stable name), so the overlay
# patches its data in place.

replicas:
  - name: keep
    count: 1

patches:
  - target:
      kind: ConfigMap
      name: keep-config
    patch: |-
      - op: replace
        path: /data/KEEP_SHARDS
        value: "16"
      - op: replace
        path: /data/KEEP_LOG_LEVEL
        value: "debug"
  - target:
      kind: StatefulSet
      name: keep
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: "2Gi"
