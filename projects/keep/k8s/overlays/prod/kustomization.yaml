apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keep

resources:
  - ../../base

# prod: full-size store node(s), JSON logs, a large durable disk tier and a
# CPU/mem envelope that lets the sharded engine saturate cores. Replicas are
# independent stores until sharding/raft HA lands (keep epic #121).

patches:
  - target:
      kind: ConfigMap
      name: keep-config
    patch: |-
      - op: replace
        path: /data/KEEP_SHARDS
        value: "512"
      - op: replace
        path: /data/KEEP_LOG_LEVEL
        value: "info"
  - target:
      kind: StatefulSet
      name: keep
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "8"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "16Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "8"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "16Gi"
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: "200Gi"
