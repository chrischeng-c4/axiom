apiVersion: v1
kind: ConfigMap
metadata:
  name: keep-config
  namespace: keep
  labels:
    app: keep
    role: server
data:
  # HTTP API listener port (HTTP/1.1 + HTTP/2 cleartext).
  KEEP_PORT: "7117"
  # Engine shard count for multi-core scaling. Tune to the CPU limit.
  KEEP_SHARDS: "256"
  # trace|debug|info|warn|error (RUST_LOG overrides). Overridden per overlay.
  KEEP_LOG_LEVEL: "info"
