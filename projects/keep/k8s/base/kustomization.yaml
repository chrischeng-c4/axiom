apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keep

# Single-component app (the store). includeSelectors:false keeps these common
# labels out of the immutable StatefulSet/Service selectors (pinned to
# app+role), so re-applies never hit a selector-immutability error.
labels:
  - pairs:
      app.kubernetes.io/name: keep
      app.kubernetes.io/part-of: keep
    includeSelectors: false

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - statefulset.yaml
  - service.yaml
  - pdb.yaml
