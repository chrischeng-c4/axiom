# Headless service: stable per-pod DNS (keep-0.keep-headless...) required by
# the StatefulSet for ordered identity.
apiVersion: v1
kind: Service
metadata:
  name: keep-headless
  namespace: keep
  labels:
    app: keep
    role: server
spec:
  clusterIP: None
  selector:
    app: keep
    role: server
  ports:
    - name: http
      port: 7117
      targetPort: http
      protocol: TCP
---
# Client endpoint. Callers (loom / relay workers, other services) hit the store
# through this ClusterIP.
apiVersion: v1
kind: Service
metadata:
  name: keep
  namespace: keep
  labels:
    app: keep
    role: server
spec:
  type: ClusterIP
  selector:
    app: keep
    role: server
  ports:
    - name: http
      port: 7117
      targetPort: http
      protocol: TCP
