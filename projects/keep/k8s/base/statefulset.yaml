apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keep
  namespace: keep
  labels:
    app: keep
    role: server
spec:
  # keep is stateful: each pod owns a durable disk tier (WAL + snapshots) on
  # its own PVC, recovered on cold start. Replicas here are independent stores,
  # NOT replicas of one dataset — sharding / raft HA is tracked separately
  # (keep epic #121). The base floor is a single node.
  serviceName: keep-headless
  replicas: 1
  revisionHistoryLimit: 5
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: keep
      role: server
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: keep
        role: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7117"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: keep
      # SIGTERM -> /readyz flips to 503 -> drain in-flight -> flush WAL -> exit.
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: keep
          image: keep:0.4.0
          imagePullPolicy: IfNotPresent
          command: ["keep"]
          ports:
            - name: http
              containerPort: 7117
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Bind all interfaces inside the pod network namespace.
            - name: KEEP_HOST
              value: "0.0.0.0"
            # Durable disk tier lives on the mounted PVC.
            - name: KEEP_DATA_DIR
              value: "/data"
            # Graceful-drain window; should track terminationGracePeriodSeconds.
            - name: KEEP_GRACE_SECS
              value: "30"
            - name: KEEP_PORT
              valueFrom:
                configMapKeyRef:
                  name: keep-config
                  key: KEEP_PORT
            - name: KEEP_SHARDS
              valueFrom:
                configMapKeyRef:
                  name: keep-config
                  key: KEEP_SHARDS
            - name: KEEP_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: keep-config
                  key: KEEP_LOG_LEVEL
          # QoS Guaranteed: requests == limits.
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            # 503 while draining; generous failureThreshold lets a cold pod
            # finish WAL replay before it is rolled or restarted.
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            # Covers the cold-start WAL/snapshot replay window; once healthy,
            # the liveness probe takes over.
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 120
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            # Scratch (readOnlyRootFilesystem=true needs a writable /tmp).
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: keep
          role: server
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
