# Keep at least one store pod available across voluntary disruptions (node
# drains / cluster upgrades). At replicas=1 this still blocks a drain from
# evicting the sole pod without an operator override.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: keep
  namespace: keep
  labels:
    app: keep
    role: server
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: keep
      role: server
