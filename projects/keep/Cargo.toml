[package]
name = "keep"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "keep — cloud-native, multi-core key-value / claim-check store (HTTP/2 + OpenAPI)"

[lib]
name = "keep"
path = "src/lib.rs"
crate-type = ["rlib"]

[[bin]]
name = "keep"
path = "src/bin/keep.rs"

[dependencies]
# Async runtime + core
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
async-trait.workspace = true
parking_lot.workspace = true
# Lock-free read of the persistence handle on the write hot path.
arc-swap = "1"
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
futures.workspace = true
# Scoped claim-check token verification (#446).
claimtoken = { path = "../../libs/claimtoken" }

# High-precision numeric (KvValue::Decimal)
rust_decimal = { version = "1.36", features = ["serde"] }

# Persistence (WAL / snapshot / recovery)
bincode = "1.3"
crc32fast = "1.4"
crossbeam-channel = "0.5"
sha2 = "0.10"

# HTTP/2 + OpenAPI surface
axum.workspace = true
tower = { workspace = true, features = ["util"] }
tower-http.workspace = true
utoipa = { workspace = true, features = ["axum_extras"] }
# Shared polyglot OpenAPI client codegen (libs/openapi-codegen). `keep spec gen`
# composes its `generate(...)` on keep's own OpenAPI — one codegen path, no
# external tool. Always linked (pure Rust, no network).
cclab-openapi-codegen = { path = "../../libs/openapi-codegen" }
# Shared k8s-native HTTP service shell (#751) — standard probes, request
# tracing, h2c serve, and graceful drain. Composes libs/h2c for HTTP/2 cleartext
# + HTTP/1.1 on one port, so keep no longer hand-rolls the hyper-util auto-server.
service-http = { path = "../../libs/service-http" }
# Shared request-auth plumbing (#746) — the Verifier trait + bearer extraction.
# keep's KeepVerifier composes libs/claimtoken; the per-handler scope decision
# (claim-check-only, bare-id, 403) stays in keep, not in a blanket middleware.
service-auth = { path = "../../libs/service-auth" }
# Shared backup contract (#776) — destination/policy/sink/runner. keep's backup
# module produces consistent snapshot bytes and wires them through this instead
# of a bespoke sink; the `operator` feature also embeds BackupPolicy in KeepSpec.
# Always linked (lightweight: anyhow + serde + schemars).
service-backup = { path = "../../libs/service-backup" }
# HTTP client for in-tree Rust consumers (behind the `client` feature).
reqwest = { workspace = true, optional = true }
# Shared h2c client construction + ln(concurrency) pool sizing (#467).
h2c = { path = "../../libs/h2c", optional = true }
# Standard agent-facing CLI ops — llm/upgrade/issue (#471). Offline paths
# always build; the network paths are gated behind keep's online features below.
cli-std = { path = "../../libs/cli-std", default-features = false }
# Error glue for the binary dispatch + the raft module.
anyhow = { workspace = true }
# Shared Raft host driver (libs/raft-host: tick/pump loop, h2c peer transport,
# sole-applier apply + snapshot/compaction over libs/raft-core). keep supplies a
# per-shard RaftStateMachine and gets the HA + backup layer for free, instead of
# hand-rolling a single-node driver.
raft-host = { path = "../../libs/raft-host", optional = true }

# K8s operator (feature `operator`) — the shared libs/operator scaffold + render
# toolkit. keep supplies a KeepSpec CRD + ManagedService and gets the reconcile
# controller for free. Versions mirror the workspace's existing kube-rs users
# (lumen / mambalibs) so the lockfile stays single-versioned. Optional so the
# serving image never links kube-rs unless built with `--features operator`.
kube = { version = "0.98", features = ["runtime", "derive", "client"], optional = true }
k8s-openapi = { version = "0.24", features = ["v1_32"], optional = true }
schemars = { version = "0.8", optional = true }
operator = { path = "../../libs/operator", optional = true }
# YAML serialization. Non-optional: `keep spec --format openapi-yaml` (offline)
# emits the OpenAPI document as YAML in every build; the operator feature also
# uses it to render manifests.
serde_yaml = { workspace = true }
# Process-level rustls crypto provider install (operator/kube, raft-host peer
# transport, and the online CLI ops all link rustls). Optional so the default
# build stays rustls-free and fast.
rustls = { version = "0.23", optional = true }

# Config
clap = { workspace = true, features = ["env"] }

[features]
default = []
# keep::client — a convenience HTTP/2 client for in-tree Rust callers migrating
# off the raw-TCP cclab-kv client (e.g. queuekit's ion backend).
client = ["dep:reqwest", "dep:h2c", "rustls-provider"]
# raft — raft-host-backed consensus (HA phase C; per-shard hosts + h2c peer
# transport; see HA.md). raft-host pulls libs/raft-core transitively.
raft = ["dep:raft-host", "rustls-provider"]
# Online (HTTPS) paths of the standard CLI ops (#471): `upgrade` self-install +
# `issue` search/view/create. Offline paths (llm, `upgrade --check`, `issue
# create --dry-run`) always build; release builds enable these.
self-update = ["cli-std/online", "rustls-provider"]
issue = ["cli-std/online", "rustls-provider"]
# Deprecated build-feature alias kept for release scripts that have not yet
# renamed their feature set. The CLI command itself is `keep issue`, not
# `keep report-issue` (#540).
report-issue = ["issue"]
# operator — the shared libs/operator scaffold: a KeepSpec CRD + ManagedService
# render, driven by operator::run. Ships the `keep k8s operator run` controller
# and the CRD generator; pulls kube-rs, so the serving image stays kube-free
# unless built with this feature (#775).
operator = [
    "dep:kube",
    "dep:k8s-openapi",
    "dep:schemars",
    "dep:operator",
    "rustls-provider",
]
# Private: link rustls + install its process-level crypto provider at startup.
# Enabled by every feature that links a rustls path (operator/raft/client/online
# CLI ops), so the default build pays nothing.
rustls-provider = ["dep:rustls"]

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.12"
# Competitor perf comparison (examples/bench_compare.rs, issue #126).
redis = { version = "0.27", features = ["tokio-comp"] }
reqwest = { workspace = true }
# Shared h2c pool for the bench example (#467) — always available to examples.
h2c = { path = "../../libs/h2c" }
# Sign scoped claim-check tokens in the namespace-isolation tests (#464).
claimtoken = { path = "../../libs/claimtoken" }
# Engine perf-gate benchmark (meter bench, issue #126).
criterion = "0.5"

[[example]]
name = "bench_compare"
path = "examples/bench_compare.rs"

[[bench]]
name = "engine_bench"
harness = false
