# keep perf-gate resource contract (issue #126).
#
# Enforced by meter's vitals gate on the keep server under a FIXED load:
#
#   cd projects/keep
#   meter measure --exec ../../target/release/keep --level vitals \
#     --drive 'for i in $(seq 1 15); do curl -sf -o /dev/null --max-time 1 \
#       http://127.0.0.1:7117/healthz && break; sleep 1; done; \
#       ../../target/release/examples/bench_compare --backend keep --ops 200000 \
#       --concurrency 1000 --batch 1 --keep-clients 10'
#
# A ceiling breach is a non-zero-exit finding. Engine THROUGHPUT regressions are
# gated separately by the criterion bench (`meter bench --target projects/keep`
# + a saved baseline) — see PERF-GATE.md.

# Resting measurement level: vitals = cpu_time / wall_time / peak_rss, no sampler.
level = "vitals"

[gate]
# Peak RSS ceiling (MiB). The fixed gate load rests around ~82 MiB; 256 catches
# real memory bloat / leaks while tolerating run-to-run variance. 0 = no gate.
max_peak_rss_mb = 256
# Total CPU-time ceiling (ms) for the fixed gate load (200k ops). ~6 s measured;
# 15 s catches a gross per-op CPU regression. 0 = no gate.
max_cpu_time_ms = 15000
