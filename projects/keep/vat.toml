version = 1
name = "keep-ec"
default_runner = "meter-efficiency"

[workspace]
base = "../.."
workdir = "projects/keep"
keep = "always"

[env]
PATH = "/Users/chrischeng/.rustup/toolchains/stable-aarch64-apple-darwin/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Users/chrischeng/.cargo/bin"

[[setup]]
id = "build-aw-tools"
cmd = ["cargo", "build", "-p", "meter-cli", "-p", "guard-cli"]

[[setup]]
id = "build-keep-ec-tests"
cmd = [
  "cargo",
  "test",
  "-p",
  "keep",
  "--test",
  "http_api",
  "--test",
  "collections_api",
  "--test",
  "durability",
  "--no-run",
]

[[runners]]
id = "meter-efficiency"
cmd = [
  "../../target/debug/meter",
  "test",
  "--",
  "-p",
  "keep",
  "--test",
  "http_api",
  "--test",
  "collections_api",
  "--test",
  "durability",
  "--",
  "--nocapture",
]
timeout_s = 600

[[runners]]
id = "guard-security"
cmd = [
  "../../target/debug/guard",
  "scan",
  ".",
  "--profile",
  "security-lint",
  "--compact",
  "--no-persist",
  "--meter-command",
  "../../target/debug/meter test -- -p keep --test http_api -- --nocapture",
]
timeout_s = 600
