[package]
name = "vuln_crate"
version = "0.0.0"
edition = "2021"
publish = false

# `time = "=0.1.45"` pins a crate with a KNOWN RustSec advisory
# (RUSTSEC-2020-0071 — potential segfault in the time crate) so that
# `cargo audit` reports at least one vulnerability against this fixture.
[dependencies]
time = "=0.1.45"

# Empty [workspace] table keeps this fixture OUT of the parent cargo
# workspace, so the vulnerable pin never affects the real build graph.
[workspace]
