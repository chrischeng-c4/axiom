[package]
name = "meter"
version = "0.3.62"
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Rust runtime resource measurement for the cclab workspace (embed as a library, or run as a capture tool)"

[lib]
name = "meter"
crate-type = ["rlib"]

[dependencies]
# Async runtime
tokio.workspace = true
futures.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true

# Zero-copy serialization
rkyv = { version = "0.7", features = ["validation"], optional = true }
bytecheck = { version = "0.6", optional = true }

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# Utilities
chrono.workspace = true
regex.workspace = true
walkdir.workspace = true
jwalk.workspace = true
tracing.workspace = true
rand = "0.8"
libc = "0.2"

# Flamegraph generation
inferno = "0.12"

# HTTP Server (for test server)
axum.workspace = true
tower.workspace = true

# HTTP client (for async fuzzer HTTP endpoint testing)
reqwest.workspace = true

# Optional: HTTP client (mambalibs_http::client) for API testing.
mambalibs-http = { path = "../../projects/mamba/mambalibs/httpkit", optional = true }

# Content hashing for carried fuzz/injection internals (not part of the public meter core).
blake3 = { version = "1.8", optional = true }

# Optional: AST-assisted instrumentation-point discovery via the compass
# code-intelligence engine (libs/compass). Heavy (tree-sitter grammars), so it
# is gated off by default; enable with `--features ast`.
cclab-compass = { path = "../../libs/compass", optional = true }

[dev-dependencies]
reqwest.workspace = true
criterion = "0.5"
tempfile = "3.8"

[[bench]]
name = "discovery_benchmark"
harness = false

[[bench]]
name = "serialization_benchmark"
harness = false

[features]
default = ["http", "rkyv", "capture"]
http = ["dep:mambalibs-http"]
rkyv = ["dep:rkyv", "dep:bytecheck"]
# `capture` enables the spawn-based capture-mode populators in `src/capture/`
# (test delegate, bench, profile sampler, and carried non-core engines).
# `blake3` remains available for carried internals; public meter findings focus
# on resource/performance/footprint/leak measurement.
capture = ["dep:blake3"]
# `embed` (no extra deps) marks the in-process embed/no-spawn populator path;
# kept for symmetry with `capture`. The embed engines (performance/*) compile
# unconditionally today, so this is currently a no-op marker feature.
embed = []
# `ast` enables AST-assisted probe-point discovery (src/instrument/) backed by
# compass. Off by default so the lean capture/release binary stays free of
# tree-sitter grammars.
ast = ["dep:cclab-compass"]
