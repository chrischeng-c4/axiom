[package]
name = "meter-cli"
version = "0.3.62"
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Agent-first CLI surface for meter — JSON-on-stdout-by-default runtime resource measurement verbs"

[lib]
name = "meter_cli"
path = "src/lib.rs"

[[bin]]
name = "meter"
path = "src/bin/meter.rs"

[dependencies]
meter = { path = "..", features = ["capture"] }
cclab-cli-registry = { path = "../../../crates/cclab-cli-registry" }
clap = { workspace = true, features = ["derive"] }
linkme.workspace = true
serde_json.workspace = true
chrono.workspace = true
anyhow.workspace = true
