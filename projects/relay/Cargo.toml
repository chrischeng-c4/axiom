chrono = { workspace = true }

# HTTP/2 (h2c) + OpenAPI transport (#115).
tokio = { workspace = true }
axum = { workspace = true }
futures = { workspace = true }
utoipa = { workspace = true, features = ["axum_extras"] }
ciborium = "0.2"
crc32fast = "1.4"

# Shared Raft consensus engine (extracted to libs/raftcore; serde-only).
raftcore = { path = "../../libs/raftcore" }

# HA: the follower is an HTTP/2 client tailing the leader (#135).
reqwest = { workspace = true }

[dev-dependencies]
tempfile = "3"
criterion = "0.5"
