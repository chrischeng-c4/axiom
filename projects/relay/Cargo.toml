[package]
name = "relay"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "relay core — durable ordered log per subject/shard serving broadcast (replay) and work-queue (lease/ack/redeliver) delivery."

[lib]
name = "relay"
path = "src/lib.rs"

[[bin]]
name = "relay-server"
path = "src/bin/relay_server.rs"

# Raft-backed node for k8s (HA): identity/peers from the downward API.
[[bin]]
name = "relay-raft"
path = "src/bin/relay_raft.rs"

[[bench]]
name = "relay_bench"
harness = false

[dependencies]
# The broker core is payload-agnostic (epic #120: "knows nothing about
# workflows"): a message body is carried as opaque JSON. relay stays standalone
# — it depends on no other axiom project, only third-party crates.
serde = { workspace = true }
