[package]
name = "lumen"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "lumen — standalone search and duplicate-detection index. Generic Collection / Field primitive, HTTP/2, sharded Raft."

[lib]
name = "lumen"
path = "src/lib.rs"

[[bin]]
name = "lumen"
path = "src/bin/lumen.rs"

[[bin]]
name = "lumen-consumer"
path = "src/bin/lumen-consumer.rs"

[[bin]]
name = "lumen-openapi-dump"
path = "src/bin/lumen-openapi-dump.rs"

[[bin]]
name = "lumen-bench"
path = "src/bin/lumen-bench.rs"

# K8s Operator: a Lumen CRD reconcile loop. Feature-gated so the serving
# image's build stays free of the kube-rs / k8s-openapi tree.
[[bin]]
name = "lumen-operator"
path = "src/bin/lumen-operator.rs"
required-features = ["operator"]

[dependencies]
anyhow.workspace = true
async-nats = { workspace = true }
async-trait = { workspace = true }
axum.workspace = true
base64.workspace = true
byteorder = "1.5"
bytemuck = { version = "1", features = ["derive"], optional = true }
roaring = "0.10"
chrono.workspace = true
clap = { workspace = true, features = ["env"] }
crc32fast = "1.4"
futures.workspace = true
hnsw_rs = "0.3"
jieba-rs = { version = "0.7", optional = true }
# K8s Operator (feature `operator`). Versions mirror the workspace's existing
# kube-rs user (mambalibs/queuekit) so the lockfile stays single-versioned.
kube = { version = "0.98", features = ["runtime", "derive", "client"], optional = true }
k8s-openapi = { version = "0.24", features = ["v1_32"], optional = true }
schemars = { version = "0.8", optional = true }
serde_yaml = { version = "0.9", optional = true }
lz4_flex = "0.11"
moka = { version = "0.12", features = ["sync"] }
pollster = { version = "0.4", optional = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json.workspace = true
thiserror.workspace = true
tokio = { workspace = true }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "request-id", "util"] }
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }
utoipa = { workspace = true, features = ["axum_extras"] }
wgpu = { version = "24", optional = true }

[features]
default = []
jieba = ["dep:jieba-rs"]
gpu = ["dep:wgpu", "dep:bytemuck", "dep:pollster"]
operator = ["dep:kube", "dep:k8s-openapi", "dep:schemars", "dep:serde_yaml"]
# Gates the not-yet-wired LSM disk backend (storage_lsm) until WS4 promotes it
# to a runtime-selectable tier. (openraft consensus was retired — NATS is the
# replication substrate.)
experimental = []

[dev-dependencies]
axum-test = "17"
criterion = "0.5"
proptest = "1"
rand = "0.8"
serde_json.workspace = true
tempfile = "3"

[[bench]]
name = "bench_index"
harness = false

[[bench]]
name = "bench_search"
harness = false

[[bench]]
name = "bench_duplicates"
harness = false
