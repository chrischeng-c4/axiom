[package]
name = "lumen"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "lumen — standalone search and duplicate-detection index. Generic Collection / Field primitive, HTTP/2, sharded Raft."

[lib]
name = "lumen"
path = "src/lib.rs"

[[bin]]
name = "lumen"
path = "src/bin/lumen.rs"

[dependencies]
anyhow.workspace = true
async-nats = { workspace = true }
async-trait = { workspace = true }
axum.workspace = true
base64.workspace = true
byteorder = "1.5"
# On-disk snapshots: CBOR (self-describing binary) + lz4, replacing serde_json.
# Self-describing is required because the persisted types reuse the wire types,
# which use `skip_serializing_if` / untagged / internally-tagged serde — none of
# which a non-self-describing codec (bincode/postcard) can round-trip.
ciborium = "0.2"
bytemuck = { version = "1", features = ["derive"] }
roaring = "0.10"
chrono.workspace = true
clap = { workspace = true, features = ["env"] }
crc32fast = "1.4"
futures.workspace = true
# Broker log-tailing on relay (#124, behind the `relay-wal` feature). Off by
# default so the serving binary stays HTTP-client-free; relay is h2c so reqwest
# uses rustls (no openssl) when enabled.
relay = { path = "../relay", optional = true }
reqwest = { workspace = true, optional = true }
# `lumen spec gen` — generate a typed client from lumen's own OpenAPI.
cclab-openapi-codegen = { path = "../../libs/openapi-codegen" }
rayon = "1.10"
# simdeez_f compiles anndists' SIMD distance kernels (aarch64 NEON `asimd`,
# x86 AVX2/SSE2) for DistL2/DistDot. The cosine path routes through DistDot on
# internally unit-normalized vectors to use the NEON kernel (DistCosine has no
# SIMD path and recomputes both operand norms per comparison).
hnsw_rs = { version = "0.3", features = ["simdeez_f"] }
jieba-rs = { version = "0.7", optional = true }
# K8s Operator (feature `operator`). Versions mirror the workspace's existing
# kube-rs user (mambalibs/queuekit) so the lockfile stays single-versioned.
kube = { version = "0.98", features = ["runtime", "derive", "client"], optional = true }
k8s-openapi = { version = "0.24", features = ["v1_32"], optional = true }
schemars = { version = "0.8", optional = true }
serde_yaml.workspace = true
lz4_flex = "0.11"
memmap2 = "0.9"
moka = { version = "0.12", features = ["sync"] }
serde = { workspace = true }
serde_json.workspace = true
rustc-hash = "2.1"
rustls = "0.23"
rustls-pemfile = "2"
smallvec = "1"
thiserror.workspace = true
tokio = { workspace = true }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "request-id", "util"] }
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }
# OpenTelemetry (feature `otel`): OTLP trace export, opt-in at RUNTIME via
# LUMEN_OTLP_ENDPOINT. Versions match queue/queuekit so the workspace lock stays
# single-versioned. tonic gRPC is plaintext → no openssl, keeps cross-compile clean.
opentelemetry = { version = "0.21", optional = true }
opentelemetry-otlp = { version = "0.14", features = ["tonic", "metrics"], optional = true }
opentelemetry_sdk = { version = "0.21", features = ["rt-tokio"], optional = true }
tracing-opentelemetry = { version = "0.22", optional = true }
utoipa = { workspace = true, features = ["axum_extras"] }

[features]
default = []
jieba = ["dep:jieba-rs"]
# relay-wal — tail relay's broadcast as the WAL backend (#124), instead of NATS.
relay-wal = ["dep:relay", "dep:reqwest"]
operator = ["dep:kube", "dep:k8s-openapi", "dep:schemars"]
# OTLP trace export. Compiled into the release binary (lumen-release.yml / build.sh
# pass --features otel); off in plain dev builds so they don't pay the OTLP build
# cost. At runtime it stays dormant unless LUMEN_OTLP_ENDPOINT is set.
otel = ["dep:opentelemetry", "dep:opentelemetry-otlp", "dep:opentelemetry_sdk", "dep:tracing-opentelemetry"]

[dev-dependencies]
axum-test = "17"
criterion = "0.5"
proptest = "1"
rand = "0.8"
serde_json.workspace = true
tempfile = "3"
# HTTP client for the perf-gate / write-qps harness (drives lumen + OpenSearch).
# DEV-ONLY on purpose: the serving binary speaks REST/OpenAPI and ships no Rust
# client SDK, so it never links an HTTP client → no openssl → clean cross-compile.
reqwest = { workspace = true }
# Native pg driver for the competitive perf gate (tests/perf_gate.rs). Postgres
# is driven over its own wire protocol so the lumen-vs-pg end-to-end comparison
# is honest.
tokio-postgres = "0.7"
# Stage 2 Phase 2i scale proof (tests/disk_scale_proof.rs). `memory-stats` reads
# cross-platform PHYSICAL resident set size (macOS task_info, Linux /proc/self/statm)
# so the disk-engine's bounded-RSS claim is measured, not asserted. `libc` exposes
# getrusage(RUSAGE_SELF) for ru_majflt/ru_minflt — the demand-paging (major page
# fault) evidence. libc is already a transitive dep; naming it here is a no-op on
# the lockfile. Both are test-only.
memory-stats = "1"
libc = "0.2"

[[bench]]
name = "bench_index"
harness = false

[[bench]]
name = "bench_search"
harness = false

[[bench]]
name = "bench_duplicates"
harness = false
