# Grafana auto-provisioned datasources: Prometheus (lumen metrics via collector)
# + Jaeger (lumen traces). Anonymous admin is on (see compose.yaml) for local use.
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
