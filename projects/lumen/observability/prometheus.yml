# Prometheus scrapes ONLY the otel-collector (one target), not each lumen
# replica. The collector aggregates the metrics all replicas pushed via OTLP, so
# a scaling/ephemeral replica fleet needs no service discovery here.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
