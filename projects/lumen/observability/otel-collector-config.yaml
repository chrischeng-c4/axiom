# otel-collector (gateway role) — receives OTLP from the lumen replicas and fans
# out: metrics → Prometheus exporter (scraped by Prometheus), traces → Jaeger.
# In production your GKE otlp-gateway plays this role; this file mirrors it so the
# local stack exercises the same lumen→collector→backends path.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch: {}

exporters:
  # Collector re-exposes the pushed metrics in Prometheus text format; Prometheus
  # scrapes THIS endpoint (one target) instead of each lumen replica.
  prometheus:
    endpoint: 0.0.0.0:8889
  # Traces → Jaeger's OTLP gRPC ingest.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
