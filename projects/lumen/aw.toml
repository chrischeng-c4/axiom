[project]
name = "lumen"
cap_path = "README.md"
label = "project:lumen"

[ec.efficiency]
tool = "meter"
meter = "projects/lumen"
command = "target/debug/meter test -- -p lumen --release --test perf_gate_vs_db -- --ignored --test-threads=1"

[ec.stability]
tool = "rig"
dir = "projects/lumen/tests/rig/cases/resilience"

[[workspaces]]
name = "lumen"
paths = ["**"]
target = "rust"
test_cmd = "cargo test -p lumen"
codegen.profile = "rust/score-crate"

