[project]
name = "lumen"
cap_path = "README.md"
label = "project:lumen"

[ec.benchmark]
tool = "arena"
spec = "projects/arena/examples/lumen-vs-pg-and-opensearch.toml"
command = "target/debug/arena run --spec projects/arena/examples/lumen-vs-pg-and-opensearch.toml"

[ec.stability]
tool = "rig"
dir = "projects/lumen/tests/rig/scenarios/resilience"

[[workspaces]]
name = "lumen"
paths = ["**"]
target = "rust"
test_cmd = "cargo test -p lumen"
codegen.profile = "rust/score-crate"
