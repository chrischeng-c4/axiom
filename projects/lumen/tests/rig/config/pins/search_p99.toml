# Load pins for lumen search under fixed offered load. `floor` is the
# absolute promised envelope (lower-is-better metric); `ratchet` gates
# against the recorded per-host baseline (regression if new > baseline/0.8).
[[pins]]
issue = "axiom#5"
scenario = "load/search_qps"
metric = "p99_ms"
floor = 25.0
ratchet = 0.8

[[pins]]
issue = "axiom#5"
scenario = "load/search_qps"
metric = "error_rate"
floor = 0.01
