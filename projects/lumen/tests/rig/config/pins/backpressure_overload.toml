# Overload envelope for load/backpressure_overload. These are DEGRADATION
# ceilings, not steady-state targets: at 3x the steady-state offered load the
# system is allowed to be slower and to shed a little, but it must NOT melt
# down. `floor` is the absolute promised ceiling (lower-is-better metric).
#
# error_rate: under heavy overload some requests may time out / shed; cap the
#   shed fraction at 5% so a healthy backpressure path passes but a crash
#   (error_rate -> 1.0) trips the gate.
# p99_ms: surviving-request tail stays bounded (no runaway queueing). 250ms is
#   ~10x the 25ms steady-state floor — generous for the overload regime while
#   still catching an unbounded blow-up into seconds.
[[pins]]
issue = "axiom#5"
scenario = "load/backpressure_overload"
metric = "error_rate"
floor = 0.05

[[pins]]
issue = "axiom#5"
scenario = "load/backpressure_overload"
metric = "p99_ms"
floor = 250.0
