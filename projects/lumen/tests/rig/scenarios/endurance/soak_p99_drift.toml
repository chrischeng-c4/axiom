# Latency-drift sibling of soak_rss_plateau: instead of (or alongside) RSS,
# watch search p99 across THREE windows of a bounded-keyspace mixed workload
# and assert the tail does not drift up over the soak. A server that slowly
# rots — fragmenting segments, growing a cache it never bounds, leaking a lock
# under contention — shows up as p99 climbing window over window even though
# every request still returns 200. This is the time-analogue of the RSS
# plateau gate: rss_w2 <= 1.10*rss_w1 there, p99_w3 <= 1.10*p99_w1 here.
#
# Re-indexes the SAME bounded keyspace each window (unbounded ingest would be
# growth, not drift). Each window samples enough searches that the p99 is a
# stable magnitude rather than sub-ms quantization noise; the absolute +2ms
# tolerance term (same spirit as the chaos ports' +1/+20) keeps a healthy
# sub-ms baseline from false-failing on jitter while a real multi-ms climb
# still trips the 1.10x relative gate.
#
# Requires: lumen serving on {{upstream}}. This is the BOUNDED ci-sized soak;
# a longer-window nightly is the same scenario with more/larger windows.
[record]
suite = "lumen"
dimension = "endurance"
case = "soak_p99_drift"
subject = "search p99 does not drift up across windows of a bounded-keyspace soak"
kind = "e2e"
expected = "pass"
required = true

[env]
upstream = "127.0.0.1:7373"
collection = "users"
keyspace = "5000"

[vat]
runner = "rig-endurance"
services = ["lumen"]

[limits]
timeout_secs = 600

[[steps]]
type = "http"
name = "collection_exists"
method = "PUT"
url = "http://{{upstream}}/collections/{{collection}}"
body = '{"fields": {"bio": {"type": "text"}, "email": {"type": "keyword"}}}'
expect = { statuses = [200, 201, 400, 409] }

# -- warmup: establish the working set so window 1 is already steady-state ----

[[steps]]
type = "exec"
name = "warmup_index"
cmd = ["python3", "-c", "import json,sys,random,time,urllib.request\nupstream,coll,keyspace=sys.argv[1],sys.argv[2],int(sys.argv[3])\nrng=random.Random(time.time_ns())\nitems=[]\nfor i in range(1000):\n    ext=f'soak-{rng.randrange(keyspace)}'\n    items.append({'external_id':ext,'field':'bio','value':f'engineer {ext}'})\nbody=json.dumps({'items':items}).encode()\nreq=urllib.request.Request(f'http://{upstream}/collections/{coll}/index',data=body,method='POST',headers={'content-type':'application/json'})\nwith urllib.request.urlopen(req,timeout=30) as r:\n    sys.exit(0 if r.status<400 else 2)", "{{upstream}}", "{{collection}}", "{{keyspace}}"]
timeout_secs = 60

[[steps]]
type = "sample"
name = "warmup_searches"
samples = 500
capture = { warmup_fail = "fail_count" }
[steps.request]
method = "POST"
url = "http://{{upstream}}/collections/{{collection}}/search"
body = '{"query": {"match": {"field": "bio", "text": "engineer"}}, "limit": 1}'
expect = { status = 200, timeout_ms = 10000 }

# -- window 1 ----------------------------------------------------------------

[[steps]]
type = "exec"
name = "window_1_index"
cmd = ["python3", "-c", "import json,sys,random,time,urllib.request\nupstream,coll,keyspace=sys.argv[1],sys.argv[2],int(sys.argv[3])\nrng=random.Random(time.time_ns())\nitems=[]\nfor i in range(1000):\n    ext=f'soak-{rng.randrange(keyspace)}'\n    items.append({'external_id':ext,'field':'bio','value':f'engineer {ext}'})\nbody=json.dumps({'items':items}).encode()\nreq=urllib.request.Request(f'http://{upstream}/collections/{coll}/index',data=body,method='POST',headers={'content-type':'application/json'})\nwith urllib.request.urlopen(req,timeout=30) as r:\n    sys.exit(0 if r.status<400 else 2)", "{{upstream}}", "{{collection}}", "{{keyspace}}"]
timeout_secs = 60

[[steps]]
type = "sample"
name = "window_1_searches"
samples = 500
capture = { window_1_fail = "fail_count", p99_w1 = "p99_ms" }
[steps.request]
method = "POST"
url = "http://{{upstream}}/collections/{{collection}}/search"
body = '{"query": {"match": {"field": "bio", "text": "engineer"}}, "limit": 1}'
expect = { status = 200, timeout_ms = 10000 }

# -- window 2 ----------------------------------------------------------------

[[steps]]
type = "exec"
name = "window_2_index"
cmd = ["python3", "-c", "import json,sys,random,time,urllib.request\nupstream,coll,keyspace=sys.argv[1],sys.argv[2],int(sys.argv[3])\nrng=random.Random(time.time_ns())\nitems=[]\nfor i in range(1000):\n    ext=f'soak-{rng.randrange(keyspace)}'\n    items.append({'external_id':ext,'field':'bio','value':f'engineer {ext}'})\nbody=json.dumps({'items':items}).encode()\nreq=urllib.request.Request(f'http://{upstream}/collections/{coll}/index',data=body,method='POST',headers={'content-type':'application/json'})\nwith urllib.request.urlopen(req,timeout=30) as r:\n    sys.exit(0 if r.status<400 else 2)", "{{upstream}}", "{{collection}}", "{{keyspace}}"]
timeout_secs = 60

[[steps]]
type = "sample"
name = "window_2_searches"
samples = 500
capture = { window_2_fail = "fail_count", p99_w2 = "p99_ms" }
[steps.request]
method = "POST"
url = "http://{{upstream}}/collections/{{collection}}/search"
body = '{"query": {"match": {"field": "bio", "text": "engineer"}}, "limit": 1}'
expect = { status = 200, timeout_ms = 10000 }

# -- window 3 ----------------------------------------------------------------

[[steps]]
type = "exec"
name = "window_3_index"
cmd = ["python3", "-c", "import json,sys,random,time,urllib.request\nupstream,coll,keyspace=sys.argv[1],sys.argv[2],int(sys.argv[3])\nrng=random.Random(time.time_ns())\nitems=[]\nfor i in range(1000):\n    ext=f'soak-{rng.randrange(keyspace)}'\n    items.append({'external_id':ext,'field':'bio','value':f'engineer {ext}'})\nbody=json.dumps({'items':items}).encode()\nreq=urllib.request.Request(f'http://{upstream}/collections/{coll}/index',data=body,method='POST',headers={'content-type':'application/json'})\nwith urllib.request.urlopen(req,timeout=30) as r:\n    sys.exit(0 if r.status<400 else 2)", "{{upstream}}", "{{collection}}", "{{keyspace}}"]
timeout_secs = 60

[[steps]]
type = "sample"
name = "window_3_searches"
samples = 500
capture = { window_3_fail = "fail_count", p99_w3 = "p99_ms" }
[steps.request]
method = "POST"
url = "http://{{upstream}}/collections/{{collection}}/search"
body = '{"query": {"match": {"field": "bio", "text": "engineer"}}, "limit": 1}'
expect = { status = 200, timeout_ms = 10000 }

# -- gates -------------------------------------------------------------------

[[steps]]
type = "assert"
name = "no_errors"
exprs = [
  "warmup_fail == 0",
  "window_1_fail == 0",
  "window_2_fail == 0",
  "window_3_fail == 0",
]

[[steps]]
type = "assert"
name = "p99_baseline_sane"
exprs = ["p99_w1 > 0"]

[[steps]]
type = "assert"
name = "p99_drift_within_10pct"
# Last window vs first window, mirroring soak_rss_plateau's rss_w2 <= 1.10*rss_w1,
# with each adjacent pair bounded too so a monotone climb can't hide by spreading
# itself across windows.
#
# CALIBRATION (jitter floor, not a pass-knob): unlike RSS, search p99 over a few
# hundred samples carries real run-to-run jitter even on a healthy server — the
# tail rides the OS scheduler, page cache, and (on a shared dev/CI box) co-tenant
# load. A measured healthy run showed p99_w1=6.4ms, p99_w2=9.7ms — a ~3ms swing
# off a low-ms baseline that is jitter, not drift. A pure 1.10x relative budget
# over a sub-10ms baseline false-fails that healthy run. The +6ms absolute term
# is the healthy-jitter floor at this magnitude; the 1.10x term still catches a
# PROPORTIONAL regression once the baseline is itself multi-ms, and a REAL soak
# leak (p99 rotting into tens/hundreds of ms window over window) still trips this
# gate by a wide margin. Tighten the absolute term on a dedicated quiet CI host.
exprs = [
  "p99_w3 <= 1.10 * p99_w1 + 6",
  "p99_w2 <= 1.10 * p99_w1 + 6",
  "p99_w3 <= 1.10 * p99_w2 + 6",
]
