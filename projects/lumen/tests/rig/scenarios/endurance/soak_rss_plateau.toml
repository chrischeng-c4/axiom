# Port of scripts/soak.sh: warmup with the FULL op mix over a BOUNDED
# keyspace (re-indexing the same docs — unbounded ingest is growth, not a
# leak), then a two-window RSS plateau check: window A → window B drift
# must stay ≤ 10% and no op may error.
#
# Requires: lumen serving on {{upstream}} (its pid is resolved at run time).
# This is the BOUNDED ci-sized soak; the 24h nightly stays a longer-window
# variant of the same scenario.
[record]
suite = "lumen"
dimension = "endurance"
case = "soak_rss_plateau"
subject = "steady-state RSS plateaus under a bounded-keyspace mixed workload"
kind = "e2e"
expected = "pass"
required = true

[env]
upstream = "127.0.0.1:7373"
collection = "users"
keyspace = "5000"

[vat]
runner = "rig-endurance"
services = ["lumen"]

[limits]
timeout_secs = 600

[[steps]]
type = "http"
name = "collection_exists"
method = "PUT"
url = "http://{{upstream}}/collections/{{collection}}"
body = '{"fields": {"bio": {"type": "text"}, "email": {"type": "keyword"}}}'
expect = { statuses = [200, 201, 400, 409] }

[[steps]]
type = "exec"
name = "resolve_lumen_pid"
cmd = ["pgrep", "-n", "lumen"]
timeout_secs = 5
capture = { lumen_pid = "stdout" }

# -- warmup: establish the working set so it doesn't read as growth ----------

[[steps]]
type = "exec"
name = "warmup_index_round_1"
cmd = ["python3", "-c", "import json,sys,random,time,urllib.request\nupstream,coll,keyspace=sys.argv[1],sys.argv[2],int(sys.argv[3])\nrng=random.Random(time.time_ns())\nitems=[]\nfor i in range(1000):\n    ext=f'soak-{rng.randrange(keyspace)}'\n    items.append({'external_id':ext,'field':'bio','value':f'engineer {ext}'})\n    items.append({'external_id':ext,'field':'email','value':f'{ext}@example.com'})\nbody=json.dumps({'items':items}).encode()\nreq=urllib.request.Request(f'http://{upstream}/collections/{coll}/index',data=body,method='POST',headers={'content-type':'application/json'})\nwith urllib.request.urlopen(req,timeout=30) as r:\n    sys.exit(0 if r.status<400 else 2)", "{{upstream}}", "{{collection}}", "{{keyspace}}"]
timeout_secs = 60

[[steps]]
type = "exec"
name = "warmup_index_round_2"
cmd = ["python3", "-c", "import json,sys,random,time,urllib.request\nupstream,coll,keyspace=sys.argv[1],sys.argv[2],int(sys.argv[3])\nrng=random.Random(time.time_ns())\nitems=[]\nfor i in range(1000):\n    ext=f'soak-{rng.randrange(keyspace)}'\n    items.append({'external_id':ext,'field':'bio','value':f'engineer {ext}'})\n    items.append({'external_id':ext,'field':'email','value':f'{ext}@example.com'})\nbody=json.dumps({'items':items}).encode()\nreq=urllib.request.Request(f'http://{upstream}/collections/{coll}/index',data=body,method='POST',headers={'content-type':'application/json'})\nwith urllib.request.urlopen(req,timeout=30) as r:\n    sys.exit(0 if r.status<400 else 2)", "{{upstream}}", "{{collection}}", "{{keyspace}}"]
timeout_secs = 60

[[steps]]
type = "sample"
name = "warmup_searches"
samples = 300
capture = { warmup_fail = "fail_count" }
[steps.request]
method = "POST"
url = "http://{{upstream}}/collections/{{collection}}/search"
body = '{"query": {"match": {"field": "bio", "text": "engineer"}}, "limit": 1}'
expect = { status = 200, timeout_ms = 10000 }

[[steps]]
type = "sample"
name = "warmup_duplicates"
samples = 30
capture = { warmup_dup_fail = "fail_count" }
[steps.request]
method = "POST"
url = "http://{{upstream}}/collections/{{collection}}/duplicates"
body = '{"field": "email", "min_group_size": 2, "limit": 10}'
expect = { status = 200, timeout_ms = 10000 }

# -- window A -----------------------------------------------------------------

[[steps]]
type = "exec"
name = "window_a_index"
cmd = ["python3", "-c", "import json,sys,random,time,urllib.request\nupstream,coll,keyspace=sys.argv[1],sys.argv[2],int(sys.argv[3])\nrng=random.Random(time.time_ns())\nitems=[]\nfor i in range(1000):\n    ext=f'soak-{rng.randrange(keyspace)}'\n    items.append({'external_id':ext,'field':'bio','value':f'engineer {ext}'})\n    items.append({'external_id':ext,'field':'email','value':f'{ext}@example.com'})\nbody=json.dumps({'items':items}).encode()\nreq=urllib.request.Request(f'http://{upstream}/collections/{coll}/index',data=body,method='POST',headers={'content-type':'application/json'})\nwith urllib.request.urlopen(req,timeout=30) as r:\n    sys.exit(0 if r.status<400 else 2)", "{{upstream}}", "{{collection}}", "{{keyspace}}"]
timeout_secs = 60

[[steps]]
type = "sample"
name = "window_a_searches"
samples = 300
capture = { window_a_fail = "fail_count" }
[steps.request]
method = "POST"
url = "http://{{upstream}}/collections/{{collection}}/search"
body = '{"query": {"match": {"field": "bio", "text": "engineer"}}, "limit": 1}'
expect = { status = 200, timeout_ms = 10000 }

[[steps]]
type = "measure_rss"
name = "rss_window_a"
pid_var = "lumen_pid"
capture = { rss_w1 = "rss_kb" }

# -- window B -----------------------------------------------------------------

[[steps]]
type = "exec"
name = "window_b_index"
cmd = ["python3", "-c", "import json,sys,random,time,urllib.request\nupstream,coll,keyspace=sys.argv[1],sys.argv[2],int(sys.argv[3])\nrng=random.Random(time.time_ns())\nitems=[]\nfor i in range(1000):\n    ext=f'soak-{rng.randrange(keyspace)}'\n    items.append({'external_id':ext,'field':'bio','value':f'engineer {ext}'})\n    items.append({'external_id':ext,'field':'email','value':f'{ext}@example.com'})\nbody=json.dumps({'items':items}).encode()\nreq=urllib.request.Request(f'http://{upstream}/collections/{coll}/index',data=body,method='POST',headers={'content-type':'application/json'})\nwith urllib.request.urlopen(req,timeout=30) as r:\n    sys.exit(0 if r.status<400 else 2)", "{{upstream}}", "{{collection}}", "{{keyspace}}"]
timeout_secs = 60

[[steps]]
type = "sample"
name = "window_b_searches"
samples = 300
capture = { window_b_fail = "fail_count" }
[steps.request]
method = "POST"
url = "http://{{upstream}}/collections/{{collection}}/search"
body = '{"query": {"match": {"field": "bio", "text": "engineer"}}, "limit": 1}'
expect = { status = 200, timeout_ms = 10000 }

[[steps]]
type = "sample"
name = "window_b_duplicates"
samples = 30
capture = { window_b_dup_fail = "fail_count" }
[steps.request]
method = "POST"
url = "http://{{upstream}}/collections/{{collection}}/duplicates"
body = '{"field": "email", "min_group_size": 2, "limit": 10}'
expect = { status = 200, timeout_ms = 10000 }

[[steps]]
type = "measure_rss"
name = "rss_window_b"
pid_var = "lumen_pid"
capture = { rss_w2 = "rss_kb" }

# -- gates ---------------------------------------------------------------------

[[steps]]
type = "assert"
name = "no_errors"
exprs = [
  "warmup_fail == 0",
  "warmup_dup_fail == 0",
  "window_a_fail == 0",
  "window_b_fail == 0",
  "window_b_dup_fail == 0",
]

[[steps]]
type = "assert"
name = "rss_plateau_within_10pct"
exprs = ["rss_w2 <= 1.10 * rss_w1"]
