# Port of scripts/chaos.sh §3-6: baseline p99 through a toxiproxy proxy,
# 30s full partition (must observe failures), recovery within budget,
# post-recovery p99 ≤ 2× baseline.
#
# Requires: toxiproxy-server on {{toxiproxy}}, lumen serving on {{upstream}}.
# The partition window ≈ partition_samples × 5s request timeout.
[record]
suite = "lumen"
dimension = "resilience"
case = "partition_recovery"
subject = "search p99 survives a full network partition and recovers within budget"
kind = "e2e"
expected = "pass"
required = true

[env]
upstream = "127.0.0.1:7373"
toxiproxy = "127.0.0.1:8474"
proxy_listen = "127.0.0.1:18080"
proxy_name = "rig-lumen-partition"
collection = "users"

[vat]
runner = "rig-resilience"
services = ["toxiproxy", "lumen"]

[limits]
timeout_secs = 300

# -- setup -------------------------------------------------------------------

[[steps]]
type = "http"
name = "collection_exists"
method = "PUT"
url = "http://{{upstream}}/collections/{{collection}}"
body = '{"fields": {"bio": {"type": "text"}, "email": {"type": "keyword"}}}'
expect = { statuses = [200, 201, 400, 409] }   # create-if-absent (PUT on existing may reject)

[[steps]]
type = "http"
name = "seed_doc"
method = "POST"
url = "http://{{upstream}}/collections/{{collection}}/index"
body = '{"items": [{"external_id": "rig-seed-1", "field": "bio", "value": "senior engineer in taipei"}]}'

[[steps]]
type = "http"
name = "clean_stale_proxy"
method = "DELETE"
url = "http://{{toxiproxy}}/proxies/{{proxy_name}}"
expect = { statuses = [204, 404] }   # idempotent pre-clean: a prior aborted run may have left it

[[steps]]
type = "http"
name = "create_proxy"
method = "POST"
url = "http://{{toxiproxy}}/proxies"
body = '{"name": "{{proxy_name}}", "listen": "{{proxy_listen}}", "upstream": "{{upstream}}", "enabled": true}'
expect = { statuses = [200, 201] }

# -- baseline ----------------------------------------------------------------

[[steps]]
type = "sample"
name = "baseline"
samples = 100
capture = { baseline_p99 = "p99_ms" }
[steps.request]
method = "POST"
url = "http://{{proxy_listen}}/collections/{{collection}}/search"
body = '{"query": {"match": {"field": "bio", "text": "engineer"}}, "limit": 1}'
expect = { status = 200, timeout_ms = 5000 }

[[steps]]
type = "assert"
name = "baseline_sane"
exprs = ["baseline_p99 > 0"]

# -- partition ---------------------------------------------------------------

[[steps]]
type = "http"
name = "add_partition_toxic"
method = "POST"
url = "http://{{toxiproxy}}/proxies/{{proxy_name}}/toxics"
body = '{"name": "partition", "type": "latency", "stream": "downstream", "toxicity": 1.0, "attributes": {"latency": 600000, "jitter": 0}}'

[[steps]]
type = "sample"
name = "during_partition"
samples = 6
allow_failures = true
capture = { partition_fail = "fail_count" }
[steps.request]
method = "POST"
url = "http://{{proxy_listen}}/collections/{{collection}}/search"
body = '{"query": {"match": {"field": "bio", "text": "engineer"}}, "limit": 1}'
expect = { status = 200, timeout_ms = 5000 }

[[steps]]
type = "assert"
name = "partition_observed"
exprs = ["partition_fail > 0"]

# -- recovery ----------------------------------------------------------------

[[steps]]
type = "http"
name = "remove_partition_toxic"
method = "DELETE"
url = "http://{{toxiproxy}}/proxies/{{proxy_name}}/toxics/partition"
expect = { statuses = [200, 204] }

[[steps]]
type = "wait_until"
name = "recovered"
budget_secs = 10
interval_ms = 500
[steps.probe]
method = "POST"
url = "http://{{proxy_listen}}/collections/{{collection}}/search"
body = '{"query": {"match": {"field": "bio", "text": "engineer"}}, "limit": 1}'
expect = { status = 200, timeout_ms = 5000 }

[[steps]]
type = "sample"
name = "post_recovery"
samples = 100
capture = { recovery_p99 = "p99_ms" }
[steps.request]
method = "POST"
url = "http://{{proxy_listen}}/collections/{{collection}}/search"
body = '{"query": {"match": {"field": "bio", "text": "engineer"}}, "limit": 1}'
expect = { status = 200, timeout_ms = 5000 }

[[steps]]
type = "assert"
name = "recovery_within_2x_baseline"
exprs = ["recovery_p99 <= 2 * baseline_p99"]

# -- teardown ----------------------------------------------------------------

[[steps]]
type = "http"
name = "delete_proxy"
method = "DELETE"
url = "http://{{toxiproxy}}/proxies/{{proxy_name}}"
expect = { statuses = [204, 404] }
