# Graceful degradation under overload: drive search at 600 offered qps — 3x the
# 200-qps steady-state of load/search_qps — and assert lumen stays UP and
# BOUNDED rather than crashing or melting down. The gates are split:
#
#   * error_rate / p99_ms floors (config/pins/backpressure_overload.toml) cap
#     the degradation — under overload some requests may queue or shed, but the
#     error rate stays small and the surviving p99 stays bounded (not runaway).
#   * rig's built-in load-honesty check fails this scenario if achieved_qps
#     collapses (a crash / OOM / total saturation shows up as a throughput that
#     falls below 95% of offered), so "process does not crash / does not
#     saturate into the floor" is covered without a post-load step (load
#     scenarios run setup steps, then the load block — there is no post-load
#     assert phase).
#   * the readyz setup probe confirms the process is live and serving before
#     the storm; pair this scenario with endurance/fd_leak for the after-state.
#
# CALIBRATION (3x, not 10x): the overload must stress the SERVER while staying
# measurable. Pushing offered load far past what a single loopback + the rig
# generator can sustain saturates the TEST PATH (ephemeral-port / accept-queue
# exhaustion on 127.0.0.1), not lumen — that shows up as a collapsed achieved_qps
# and trips load_honesty on the harness rather than measuring the server's
# degradation. 3x steady-state is a real overload whose offered schedule the
# generator can still deliver, so error_rate/p99 gate lumen's behavior honestly.
# On a host with a bigger loopback budget, raise target_qps/workers.
#
# Requires: lumen serving on {{upstream}}. Setup is self-contained (vat clean
# workspaces) — it creates + seeds the collection the load block hits.
[record]
suite = "lumen"
dimension = "load"
case = "backpressure_overload"
subject = "search stays up with bounded error_rate/p99 under 3x steady-state offered load"
kind = "load"
expected = "pass"
required = true

[env]
upstream = "127.0.0.1:7373"
collection = "users"

[vat]
runner = "rig-load"
services = ["lumen"]

[limits]
timeout_secs = 180

# -- setup (runs before the load block) ---------------------------------------

[[steps]]
type = "http"
name = "liveness_before"
method = "GET"
url = "http://{{upstream}}/readyz"
expect = { status = 200 }

[[steps]]
type = "http"
name = "collection_exists"
method = "PUT"
url = "http://{{upstream}}/collections/{{collection}}"
body = '{"fields": {"bio": {"type": "text"}, "email": {"type": "keyword"}}}'
expect = { statuses = [200, 201, 400, 409] }

[[steps]]
type = "exec"
name = "seed_corpus"
cmd = ["python3", "-c", "import json,sys,urllib.request\nupstream,coll=sys.argv[1],sys.argv[2]\nitems=[]\nfor i in range(2000):\n    items.append({'external_id':f'rig-seed-{i}','field':'bio','value':f'senior engineer number {i} in taipei'})\nbody=json.dumps({'items':items}).encode()\nreq=urllib.request.Request(f'http://{upstream}/collections/{coll}/index',data=body,method='POST',headers={'content-type':'application/json'})\nwith urllib.request.urlopen(req,timeout=30) as r:\n    sys.exit(0 if r.status<400 else 2)", "{{upstream}}", "{{collection}}"]
timeout_secs = 60

# -- overload load block ------------------------------------------------------
# 600 qps across 16 workers for 30s, 5s warmup excluded. 3x the pinned 200-qps
# steady-state envelope, so the system is pushed into the backpressure regime
# while the offered schedule stays deliverable — the pins decide whether it
# degrades gracefully.

[load]
target_qps = 600
workers = 16
duration_secs = 30
warmup_secs = 5

[load.request]
method = "POST"
url = "http://{{upstream}}/collections/{{collection}}/search"
body = '{"query": {"match": {"field": "bio", "text": "engineer"}}, "limit": 1}'
expect = { status = 200, timeout_ms = 2000 }
