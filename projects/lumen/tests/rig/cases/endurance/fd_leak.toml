# Lifecycle case (migrated from scenarios/endurance/fd_leak.toml). The sustained
# index+search load is the repeated exercise; fd-count boundedness is asserted by
# the efficiency-EC pin (error_rate proxy here; fd telemetry via meter/vat).
[case]
id = "fd_leak"
suite = "lumen"
dimension = "endurance"
subject = "open file-descriptor count stays bounded across a sustained index+search load"
expected = "pass"
required = true
source_contract = "lumen-search-stability-resilience"

[env]
upstream = "127.0.0.1:7373"
collection = "users"

[prepare]
needs = ["lumen"]
runner = "rig-load"
[[prepare.step]]
type = "http"
name = "collection_exists"
method = "PUT"
url = "http://{{upstream}}/collections/{{collection}}"
body = '{"fields": {"bio": {"type": "text"}}}'
expect = { statuses = [200, 201, 400, 409] }

[exercise]
n = 4000
[exercise.request]
method = "POST"
url = "http://{{upstream}}/collections/{{collection}}/search"
body = '{"query": {"match": {"field": "bio", "text": "engineer"}}, "limit": 1}'
[exercise.request.expect]
status = 200
timeout_ms = 2000

[load]
metric = "error_rate"

[clean]
delegate = "vat-cow"
