[record]
suite = "lumen"
dimension = "load"
case = "data_table_browse"
subject = "filter plus sort cursor pagination remains depth-invariant over HTTP"
kind = "e2e"
expected = "pass"
required = true

[[steps]]
type = "exec"
name = "capture_p99_ms"
cmd = [
  "python3",
  "-c",
  """
import json
import statistics
import sys
import time
import urllib.error
import urllib.request

base = "http://127.0.0.1:7373"
headers = {"content-type": "application/json"}
collection = "browse_docs_%d" % int(time.time() * 1000)
n = 1000
page_size = 50

def send(method, path, payload):
    data = json.dumps(payload).encode()
    req = urllib.request.Request(base + path, data=data, headers=headers, method=method)
    with urllib.request.urlopen(req, timeout=30) as resp:
        body = resp.read().decode()
        return json.loads(body) if body else {}

try:
    send("PUT", "/collections/" + collection, {
        "fields": {
            "city": {"type": "keyword"},
            "age": {"type": "number"}
        }
    })
    items = []
    for i in range(n):
        eid = "doc-%06d" % i
        city = "taipei" if i % 3 == 0 else "tokyo"
        items.append({"external_id": eid, "field": "city", "value": city})
        items.append({"external_id": eid, "field": "age", "value": i})
    send("POST", "/collections/" + collection + "/index", {"items": items})

    base_query = {
        "query": {"range": {"field": "age", "gte": 0}},
        "sort": [{"field": "age", "order": "asc"}],
        "limit": page_size,
        "track_total": False
    }
    oracle_req = dict(base_query)
    oracle_req["limit"] = n
    oracle = [
        hit["external_id"]
        for hit in send("POST", "/collections/" + collection + "/search", oracle_req)["hits"]
    ]

    cursor = None
    got = []
    latencies = []
    while True:
        req = dict(base_query)
        if cursor:
            req["cursor"] = cursor
        started = time.perf_counter()
        resp = send("POST", "/collections/" + collection + "/search", req)
        latencies.append(time.perf_counter() - started)
        got.extend(hit["external_id"] for hit in resp["hits"])
        cursor = resp.get("cursor")
        if not cursor:
            break

    if got != oracle:
        raise SystemExit("cursor pages did not match one-shot oracle")

    shallow = max(latencies[:3])
    deep = max(latencies[-3:])
    if deep > max(shallow * 20.0, 0.050):
        raise SystemExit("deep pages drifted: shallow=%fs deep=%fs" % (shallow, deep))

    p99 = sorted(latencies)[round((len(latencies) - 1) * 0.99)] * 1000.0
    print("%.6f" % p99)
except urllib.error.HTTPError as exc:
    sys.stderr.write(exc.read().decode() + "\\n")
    raise
""",
]
timeout_secs = 120
capture = { p99_ms = "stdout" }
