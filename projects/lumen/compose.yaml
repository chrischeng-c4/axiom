# Local verification stack: NATS log-replication + OTLP observability.
#
#   docker compose -f projects/lumen/compose.yaml up --build
#
# Proves two things end-to-end on one machine:
#   1. NATS JetStream log-replication — write to lumen-0, search hits on lumen-1
#      (both tail the same NATS write-log; no per-node state).
#   2. OTLP — both replicas PUSH traces+metrics to otel-collector, which fans out
#      to Prometheus (metrics) and Jaeger (traces). In production you point
#      LUMEN_OTLP_ENDPOINT at your GKE otlp-gateway instead of this collector;
#      lumen ships no collector of its own.
#
# UIs:  lumen-0 http://localhost:7373/docs · Prometheus :9090 · Jaeger :16686 · Grafana :3000

services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"] # JetStream + monitoring
    ports: ["4222:4222", "8222:8222"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC (what lumen pushes to)
      - "8889:8889" # Prometheus exporter (what Prometheus scrapes)
    depends_on: [jaeger]

  # Serving replica A. Builds the distroless download image from the published 0.4.0 release
  # 0.4.0 release (which is built --features otel), then runs it against NATS.
  lumen-0:
    build:
      context: .
      dockerfile: Dockerfile.release
      args:
        LUMEN_VERSION: lumen@0.4.0
    image: lumen:0.4.0
    hostname: lumen-0
    depends_on: [nats, otel-collector]
    environment:
      LUMEN_HOST: "0.0.0.0"
      LUMEN_WAL: nats
      LUMEN_NATS_URL: nats://nats:4222
      LUMEN_OTLP_ENDPOINT: http://otel-collector:4317
      LUMEN_AUTH: "off"
      LUMEN_LOG_FORMAT: json
    ports: ["7373:7373"]

  # Serving replica B. Same image; tails the same NATS log → same index.
  lumen-1:
    image: lumen:0.4.0
    hostname: lumen-1
    depends_on: [nats, otel-collector, lumen-0]
    environment:
      LUMEN_HOST: "0.0.0.0"
      LUMEN_WAL: nats
      LUMEN_NATS_URL: nats://nats:4222
      LUMEN_OTLP_ENDPOINT: http://otel-collector:4317
      LUMEN_AUTH: "off"
      LUMEN_LOG_FORMAT: json
    ports: ["7374:7373"]

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    depends_on: [otel-collector]

  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports: ["16686:16686"] # Jaeger UI

  grafana:
    image: grafana/grafana:11.5.1
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ./observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/ds.yaml:ro
    ports: ["3000:3000"]
    depends_on: [prometheus, jaeger]

networks:
  default:
    name: lumen-otlp
