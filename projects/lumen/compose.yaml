# Local verification stack: Lumen + OTLP observability.
#
#   docker compose -f projects/lumen/compose.yaml up --build
#
# Proves the local service and OTLP path on one machine. For multi-node local
# raft replication, use scripts/dev-cluster.sh.
#
# UIs:  Lumen http://localhost:7373/docs · Prometheus :9090 · Jaeger :16686 · Grafana :3000

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC (what lumen pushes to)
      - "8889:8889" # Prometheus exporter (what Prometheus scrapes)
    depends_on: [jaeger]

  lumen:
    build:
      context: ../..
      dockerfile: projects/lumen/Dockerfile
    image: lumen:dev
    hostname: lumen
    depends_on: [otel-collector]
    environment:
      LUMEN_HOST: "0.0.0.0"
      LUMEN_WAL: embedded
      LUMEN_OTLP_ENDPOINT: http://otel-collector:4317
      LUMEN_AUTH: "off"
      LUMEN_LOG_FORMAT: json
    ports: ["7373:7373"]

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    depends_on: [otel-collector]

  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports: ["16686:16686"] # Jaeger UI

  grafana:
    image: grafana/grafana:11.5.1
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ./observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/ds.yaml:ro
    ports: ["3000:3000"]
    depends_on: [prometheus, jaeger]

networks:
  default:
    name: lumen-otlp
