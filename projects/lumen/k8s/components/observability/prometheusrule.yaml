apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: lumen-slo
  namespace: lumen
  labels:
    app: lumen
    role: server
    release: prometheus
spec:
  groups:
    - name: lumen.slo
      interval: 30s
      rules:
        # Search p99 SLO: single-field p99 <= 50 ms (README v1 quality gate).
        - alert: LumenSearchP99High
          expr: |
            histogram_quantile(
              0.99,
              sum by (le, app, role) (
                rate(lumen_search_latency_seconds_bucket{app="lumen",role="server"}[5m])
              )
            ) > 0.050
          for: 10m
          labels:
            severity: warning
            app: lumen
            role: server
          annotations:
            summary: "lumen search p99 latency above SLO (>50ms)"
            description: "Search p99 has exceeded 50ms for 10m. Check posting cache hit ratio, pod CPU saturation, and WAL apply lag."

        # Write rate sanity: sustained zero published mutations across the
        # fleet is almost always a regression (upstream stuck, auth broken,
        # or write path stalled), not a real idle window.
        - alert: LumenWriteRateZero
          expr: |
            sum(rate(lumen_index_writes_total{app="lumen",role="server"}[5m])) == 0
          for: 15m
          labels:
            severity: warning
            app: lumen
            role: server
          annotations:
            summary: "lumen has accepted no writes for 15m"
            description: "Fleet-wide index write rate is zero. Check upstream consumer health, auth configuration, and the Lumen write path."

        # WAL apply lag: a serving node that falls behind is serving an
        # increasingly stale index.
        - alert: LumenConsumerLagHigh
          expr: |
            max by (app, role, pod) (
              lumen_consumer_lag_seconds{app="lumen",role="server"}
            ) > 30
          for: 5m
          labels:
            severity: warning
            app: lumen
            role: server
          annotations:
            summary: "lumen WAL apply lag > 30s"
            description: "A serving node is more than 30s behind the Lumen write log. Its in-memory index is stale; reads from it may miss recent writes. README perf gate is P95 <= 30s."

        - alert: LumenConsumerLagCritical
          expr: |
            max by (app, role, pod) (
              lumen_consumer_lag_seconds{app="lumen",role="server"}
            ) > 120
          for: 5m
          labels:
            severity: critical
            app: lumen
            role: server
          annotations:
            summary: "lumen WAL apply lag > 120s"
            description: "A serving node is severely behind the write log and is almost certainly unable to catch up under current load. Check raft health, CPU, and memory pressure."

        # Pod restarts: serving nodes are ephemeral, but a tight restart loop
        # (OOM, raft store failure, panic) signals a real problem.
        - alert: LumenPodRestarting
          expr: |
            increase(
              kube_pod_container_status_restarts_total{namespace="lumen",container="lumen"}[15m]
            ) > 2
          for: 5m
          labels:
            severity: warning
            app: lumen
            role: server
          annotations:
            summary: "lumen pod restarting repeatedly"
            description: "A lumen serving container has restarted more than twice in 15m. Check for OOMKills, raft store failures, or panics in the log."
