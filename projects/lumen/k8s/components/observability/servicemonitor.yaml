apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: lumen
  namespace: lumen
  labels:
    app: lumen
    role: server
    # Picked up by the prometheus-operator default release selector.
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - lumen
  selector:
    matchLabels:
      app: lumen
      role: server
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
