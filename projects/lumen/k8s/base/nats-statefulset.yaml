apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lumen-nats
  namespace: lumen
  labels:
    app: lumen
    role: nats
spec:
  # The write log / broker. Durability, ordering, replication and fan-out
  # all live here. 1 replica is fine for dev/staging; the prod overlay
  # bumps this to 3 for a clustered, HA JetStream RAFT meta-group.
  replicas: 1
  serviceName: lumen-nats-headless
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: lumen
      role: nats
  template:
    metadata:
      labels:
        app: lumen
        role: nats
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8222"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: lumen
      # Give JetStream time to checkpoint streams before SIGKILL.
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nats
          image: nats:2.10-alpine
          imagePullPolicy: IfNotPresent
          # JetStream on, file store at /data, monitoring endpoint on :8222.
          # `-c` loads nats.conf for settings that have no CLI flag — notably
          # max_payload (a write is published as one message, and bulk index
          # batches exceed NATS's 1MB default). Config + flags merge.
          args: ["-c", "/etc/nats/nats.conf", "-js", "-sd", "/data", "-m", "8222"]
          ports:
            - name: client
              containerPort: 4222
              protocol: TCP
            - name: cluster
              containerPort: 6222
              protocol: TCP
            - name: monitor
              containerPort: 8222
              protocol: TCP
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: monitor
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: nats-config
              mountPath: /etc/nats
              readOnly: true
      volumes:
        - name: nats-config
          configMap:
            name: lumen-nats-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: lumen
          role: nats
      spec:
        accessModes: [ReadWriteOnce]
        # No storageClassName: use the cluster default so the base applies on
        # any cluster (kind → local-path `standard`). The staging/prod overlays
        # patch in their cloud SSD class.
        resources:
          requests:
            storage: 20Gi
