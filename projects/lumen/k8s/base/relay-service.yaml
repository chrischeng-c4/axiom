# Stable ClusterIP the serving nodes use to reach Relay.
# LUMEN_RELAY_URL=http://lumen-relay:7000 resolves here.
apiVersion: v1
kind: Service
metadata:
  name: lumen-relay
  namespace: lumen
  labels:
    app: lumen
    role: broker
spec:
  type: ClusterIP
  selector:
    app: lumen
    role: broker
  ports:
    - name: http
      port: 7000
      targetPort: http
      protocol: TCP
---
# Headless service for the StatefulSet's stable pod DNS.
apiVersion: v1
kind: Service
metadata:
  name: lumen-relay-headless
  namespace: lumen
  labels:
    app: lumen
    role: broker
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: lumen
    role: broker
  ports:
    - name: http
      port: 7000
      targetPort: http
      protocol: TCP
