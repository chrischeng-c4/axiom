# Relay is the stateful broker component, so it gets the meaningful PDB:
# keep voluntary disruptions from silently removing the only managed broker.
# Use an external Relay URL for HA until relay-raft exposes subscribe/len.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lumen-relay
  namespace: lumen
  labels:
    app: lumen
    role: broker
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: lumen
      role: broker
---
# Light PDB on the stateless serving fleet: keep read capacity during node
# drains / cluster upgrades. The pods are cattle, so this is a comfort
# guard, not a correctness requirement.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lumen
  namespace: lumen
  labels:
    app: lumen
    role: server
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: lumen
      role: server
