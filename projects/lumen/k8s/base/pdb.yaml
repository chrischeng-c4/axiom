# Light PDB on the direct serving singleton. HA/scaling uses the operator's raft
# StatefulSet path.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lumen
  namespace: lumen
  labels:
    app: lumen
    role: server
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: lumen
      role: server
