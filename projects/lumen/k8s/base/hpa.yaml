apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lumen
  namespace: lumen
  labels:
    app: lumen
    role: server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lumen
  # Direct kustomize install stays single-node. HA/scaling uses the operator's
  # raft StatefulSet path (`replicasPerShard > 1`).
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      # React quickly to read-traffic spikes.
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      # Keep the singleton stable under noisy metrics.
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
