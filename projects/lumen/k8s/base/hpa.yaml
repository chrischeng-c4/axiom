apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lumen
  namespace: lumen
  labels:
    app: lumen
    role: server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lumen
  # Serving nodes scale on read QPS, proxied here by CPU utilization.
  # Stateless + log-rebuildable, so scaling out is cheap and safe.
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      # React quickly to read-traffic spikes.
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      # Each new pod must rebuild its index from the log, so scale down
      # slowly to avoid thrashing that warm-up cost.
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
