# Client endpoint. Callers hit any serving pod through this ClusterIP;
# the pods are symmetric, so no leader/follower routing is involved.
apiVersion: v1
kind: Service
metadata:
  name: lumen
  namespace: lumen
  labels:
    app: lumen
    role: server
spec:
  type: ClusterIP
  selector:
    app: lumen
    role: server
  ports:
    - name: http
      port: 7373
      targetPort: http
      protocol: TCP
