apiVersion: v1
kind: ConfigMap
metadata:
  name: lumen-config
  namespace: lumen
  labels:
    app: lumen
    role: server
data:
  # Install-time shard fan-out for client-side crc32 routing. Not
  # online-changeable; overlays may override but a live cluster must not.
  SHARD_COUNT: "3"
  # NATS JetStream write-log endpoint (ClusterIP service over the broker).
  LUMEN_NATS_URL: "nats://lumen-nats:4222"
  # json (prod/staging) or pretty (dev). Overridden per overlay.
  LUMEN_LOG_FORMAT: "json"
  # Client API listener port.
  LUMEN_PORT: "7373"
