apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lumen-relay
  namespace: lumen
  labels:
    app: lumen
    role: broker
spec:
  # Managed Relay broker. This uses relay-server, which exposes the full publish
  # + broadcast subscribe API Lumen needs. Keep this at one replica; use an
  # external Relay URL for HA until relay-raft exposes subscribe/len too.
  replicas: 1
  serviceName: lumen-relay-headless
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: lumen
      role: broker
  template:
    metadata:
      labels:
        app: lumen
        role: broker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7000"
        prometheus.io/path: /healthz
    spec:
      serviceAccountName: lumen
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: relay
          image: relay:latest
          imagePullPolicy: IfNotPresent
          command: ["relay-server"]
          ports:
            - name: http
              containerPort: 7000
              protocol: TCP
          env:
            - name: RELAY_BIND
              value: "0.0.0.0:7000"
            - name: RELAY_DATA_DIR
              value: /data
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: lumen
          role: broker
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi
