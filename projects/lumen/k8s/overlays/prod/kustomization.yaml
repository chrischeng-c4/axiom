# CODEGEN-BEGIN
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lumen

resources:
  - ../../base

# prod runs the prometheus-operator, so pull in the ServiceMonitor +
# PrometheusRule SLO alerts.
components:
  - ../../components/observability

# prod: direct single-node install with strict auth, json logs, full resources.
# Production HA uses the operator CR path (`replicasPerShard > 1`) so Lumen owns
# raft replication without an external broker.

replicas:
  - name: lumen
    count: 1

patches:
  # Prod ConfigMap values: 6 shards, json logs, strict auth.
  - target:
      kind: ConfigMap
      name: lumen-config
    patch: |-
      - op: replace
        path: /data/SHARD_COUNT
        value: "6"
      - op: replace
        path: /data/LUMEN_LOG_FORMAT
        value: "json"
      - op: add
        path: /data/LUMEN_AUTH
        value: "required"
  - target:
      kind: Deployment
      name: lumen
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "4"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "16Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "4"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "16Gi"
      # Tighten host spread in prod: refuse to co-locate serving pods.
      - op: replace
        path: /spec/template/spec/topologySpreadConstraints/1/whenUnsatisfiable
        value: "DoNotSchedule"
      # Strict auth: LUMEN_TOKENS must be supplied out-of-band (e.g. a Secret
      # patched in by the platform layer). Wire LUMEN_AUTH from the ConfigMap.
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LUMEN_AUTH
          valueFrom:
            configMapKeyRef:
              name: lumen-config
              key: LUMEN_AUTH
  # Direct kustomize stays single-node. Use the operator for raft HA/scaling.
  - target:
      kind: HorizontalPodAutoscaler
      name: lumen
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1
# CODEGEN-END
