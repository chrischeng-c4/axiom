# Lumen bearer-token registry Secret — EXAMPLE / TEMPLATE. Do NOT apply as-is.
#
# Auth is OFF by default. To require a bearer token on data-plane routes:
#   1. cp secret.example.yaml secret.yaml          # keep secret.yaml gitignored
#   2. replace the placeholder token + claims with real values
#   3. in kustomization.yaml: uncomment the `- secret.yaml` resource line AND
#      the OPTIONAL auth patch block (wires LUMEN_AUTH=required +
#      LUMEN_TOKEN_REGISTRY_FILE)
#   4. grep -rn REPLACE_ME <your-env> --include='*.yaml' | grep -v '\.example\.'  # empty, then apply
#
# token-registry.json format (authoritative source: src/auth.rs) — a JSON map of
#   "<bearer-token>": { "subject": "...", "roles": { "<collection>|*": "read|write|admin" } }
# Roles nest: admin ⊇ write ⊇ read. Collection "*" grants the role everywhere.
# On GKE, materialize this K8s Secret from GCP Secret Manager via External
# Secrets Operator or Secret Store CSI; Lumen only reads the mounted file.
# Lumen reads the registry at startup; roll serving pods after rotation or use
# a Secret reloader controller.
apiVersion: v1
kind: Secret
metadata:
  name: lumen-tokens
type: Opaque
stringData:
  token-registry.json: |
    {
      "REPLACE_ME__BEARER_TOKEN": {
        "subject": "my-app",
        "roles": { "*": "admin" }
      }
    }
