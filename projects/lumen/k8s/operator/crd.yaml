apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: lumens.lumen.dev
spec:
  group: lumen.dev
  names:
    categories: []
    kind: Lumen
    plural: lumens
    shortNames:
    - lum
    singular: lumen
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.servingReadyReplicas
      name: Ready
      type: integer
    - jsonPath: .status.shardCount
      name: Shards
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for LumenSpec via `CustomResource`
        properties:
          spec:
            description: '`lumen.dev/v1alpha1` `Lumen`. Namespaced: every child object the operator renders lands in this object''s namespace, so multiple independent lumen deployments can coexist by name. @spec projects/lumen/tech-design/semantic/source/projects-lumen-src-operator-crd-rs.md#source'
            properties:
              auth:
                default: disabled
                description: 'Auth mode: `off` (dev) or `required` (token registry supplied via `tokensSecret`).'
                enum:
                - disabled
                - required
                type: string
              image:
                description: Serving container image, e.g. `lumen:latest`. Required.
                type: string
              imagePullPolicy:
                description: Image pull policy. Defaults to `IfNotPresent`.
                nullable: true
                type: string
              logFormat:
                default: pretty
                description: 'Log output format: `json` (prod/staging) or `pretty` (dev).'
                enum:
                - json
                - pretty
                type: string
              logLevel:
                description: Log level (`trace|debug|info|warn|error`). Defaults to `info`.
                nullable: true
                type: string
              observability:
                default: false
                description: Emit a ServiceMonitor + PrometheusRule. Requires the prometheus-operator CRDs (`monitoring.coreos.com/v1`) to be installed in the cluster.
                type: boolean
              replicasPerShard:
                default: 1
                description: Raft replicas per shard. `1` (default) = stateless serving (a Deployment + HPA). `> 1` switches the serving fleet to a raft-HA **StatefulSet** whose pods inject the downward-API env `raft_host::cluster` reads.
                type: integer
                minimum: 0.0
              serving:
                default:
                  autoscaling:
                    minReplicas: 3
                    maxReplicas: 12
                    targetCpuUtilization: 70
                  cpu: '2'
                  memory: 4Gi
                  graceSecs: 30
                  raftStorage: 20Gi
                  raftStorageClass: null
                description: Stateless serving-fleet shape.
                properties:
                  autoscaling:
                    default:
                      minReplicas: 3
                      maxReplicas: 12
                      targetCpuUtilization: 70
                    description: HPA bounds + CPU target.
                    properties:
                      maxReplicas:
                        description: Ceiling.
                        format: int32
                        type: integer
                      minReplicas:
                        description: Floor (also the Deployment's apply-time replica count).
                        format: int32
                        type: integer
                      targetCpuUtilization:
                        description: Target average CPU utilization (%) — read QPS proxied by CPU.
                        format: int32
                        type: integer
                    required:
                    - maxReplicas
                    - minReplicas
                    - targetCpuUtilization
                    type: object
                  cpu:
                    default: '2'
                    description: Per-pod CPU, applied as request==limit (Guaranteed QoS). e.g. `"2"`.
                    type: string
                  graceSecs:
                    default: 30
                    description: Graceful drain window on SIGTERM (seconds); tracks `terminationGracePeriodSeconds`.
                    type: integer
                    minimum: 0.0
                  memory:
                    default: 4Gi
                    description: Per-pod memory, applied as request==limit. e.g. `"4Gi"`.
                    type: string
                  raftStorage:
                    default: 20Gi
                    description: Per-pod raft hard-state PVC size. Used only when `replicasPerShard > 1`.
                    type: string
                  raftStorageClass:
                    description: PVC StorageClass for raft hard state. Unset means cluster default.
                    nullable: true
                    type: string
                type: object
              shardCount:
                default: 1
                description: Install-time shard fan-out for client-side `crc32(collection) % N` routing. The operator surfaces it but never reshards a live cluster (clients own the routing); treat as immutable after first apply.
                type: integer
                minimum: 0.0
              tokensSecret:
                description: 'Name of a Secret whose `token-registry.json` key is mounted at `/var/run/secrets/lumen/token-registry.json` and exposed to the serving process as `LUMEN_TOKEN_REGISTRY_FILE` when `auth: required`. Ignored when `auth: off`.'
                nullable: true
                type: string
              voterCount:
                default: 1
                description: Voting members per shard (the rest are learners). Only meaningful when `replicasPerShard > 1`.
                type: integer
                minimum: 0.0
            required:
            - image
            type: object
          status:
            description: Status subresource, written back by the reconcile loop. @spec projects/lumen/tech-design/semantic/source/projects-lumen-src-operator-crd-rs.md#source
            nullable: true
            properties:
              desiredReplicas:
                default: 0
                description: Desired serving replicas (HPA floor at apply, or the live count).
                format: int32
                type: integer
              message:
                default: ''
                description: Last human-readable reconcile message.
                type: string
              observedGeneration:
                default: 0
                description: The `.metadata.generation` this status reflects (drift detection).
                format: int64
                type: integer
              phase:
                default: ''
                description: '`Pending | Reconciling | Ready | Degraded`.'
                type: string
              servingReadyReplicas:
                default: 0
                description: Ready serving replicas (from the Deployment status).
                format: int32
                type: integer
              shardCount:
                default: 0
                description: Effective shard count.
                type: integer
                minimum: 0.0
            type: object
        required:
        - spec
        title: Lumen
        type: object
    served: true
    storage: true
    subresources:
      status: {}
