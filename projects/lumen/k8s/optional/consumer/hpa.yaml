apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lumen-consumer
  namespace: lumen
  labels:
    app: lumen
    role: consumer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lumen-consumer
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
