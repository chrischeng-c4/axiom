# Example Lumen custom resources. Apply after `kubectl apply -k k8s/operator`.
# The operator reconciles each into a Lumen-owned data plane. Inspect with:
# kubectl get lumen -A

---
# Dev / kind: one serving pod, embedded WAL, no auth, pretty logs. The smallest
# thing that runs.
apiVersion: lumen.dev/v1alpha1
kind: Lumen
metadata:
  name: search
  namespace: default
spec:
  image: lumen:latest
  shardCount: 1
  replicasPerShard: 1
  voterCount: 1
  logFormat: pretty
  serving:
    autoscaling:
      minReplicas: 1
      maxReplicas: 3
      targetCpuUtilization: 70

---
# Production: 6 shards x 3 replicas per shard, Lumen-owned raft WAL,
# bearer-token auth (tokens from a Secret), json logs, and Prometheus
# ServiceMonitor + alerts.
apiVersion: lumen.dev/v1alpha1
kind: Lumen
metadata:
  name: lumen
  namespace: lumen
spec:
  image: registry.example.com/lumen:1.2.3
  imagePullPolicy: Always
  shardCount: 6
  replicasPerShard: 3
  voterCount: 3
  logFormat: json
  logLevel: warn
  auth: required
  tokensSecret: lumen-tokens
  serving:
    autoscaling:
      minReplicas: 6
      maxReplicas: 12
      targetCpuUtilization: 65
    cpu: "4"
    memory: 16Gi
    graceSecs: 45
    raftStorage: 100Gi
    raftStorageClass: ssd
  observability: true
