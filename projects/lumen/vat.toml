# vat environment for lumen's rig scenarios: vat owns the services
# (toxiproxy + a serving lumen) and the COW workspace; each runner's cmd
# re-invokes rig inside the clone, and the outer `rig run --vat` lifts the
# inner report back out.
#
# Prereqs on the host: `projects/rig/build.sh debug` (installs ~/.cargo/bin/rig),
# `cargo build --release -p lumen --bin lumen`, `brew install toxiproxy`.
version = 1
name = "lumen-rig"
default_runner = "rig-resilience"

[workspace]
# Clone the whole repo (APFS clonefile, O(1)): the lumen service binary and
# the rig binary live in target/ at the repo root.
base = "../.."
workdir = "projects/lumen"
# `always`: rig must read the runner's captured stdout (the inner report)
# AFTER the run, then removes the vat itself — `failed` would delete a
# successful vat before the report can be lifted.
keep = "always"

[env]
# vat children get spec.env ONLY (no parent-env inheritance); commands
# resolved from PATH (pgrep, python3, toxiproxy-server) need it explicit.
PATH = "/Users/chrischeng/.rustup/toolchains/stable-aarch64-apple-darwin/bin:/Users/chrischeng/.cargo/bin:/opt/homebrew/bin:/opt/homebrew/opt/postgresql@17/bin:/usr/bin:/bin:/usr/sbin"
LUMEN_REQUIRE_DB_PEERS = "1"

[[services]]
id = "lumen"
cmd = ["sh", "-c", "CARGO_TARGET_DIR=\"$VAT_WORKSPACE_BASE/target\" cargo build --release -p lumen --bin lumen && exec \"$VAT_WORKSPACE_BASE/target/release/lumen\" serve"]
ready_http = "http://127.0.0.1:7373/healthz"
timeout_s = 600

[[services]]
id = "toxiproxy"
cmd = ["toxiproxy-server", "-host", "127.0.0.1", "-port", "8474"]
ready_http = "http://127.0.0.1:8474/version"
timeout_s = 30

# Postgres + OpenSearch EC peers for the competitive search perf gate.
# perf_gate_vs_db self-hosts lumen in-process and creates its own corpus in both
# peers, so they only need to be UP (pg with the `lumenbench` db; OS empty).
# vat exports LUMEN_BENCH_PG_DSN / LUMEN_BENCH_OS_URL; perf_gate_vs_db reads them.
[[services]]
id = "pg"
preset = "postgres"
port = 55432
seed = ["tests/ec/pg/schema.sql"]
export = { DATABASE_URL = "LUMEN_BENCH_PG_DSN" }
ready_cmd = ["sh", "-c", "psql -h 127.0.0.1 -p 55432 -U postgres -d lumenbench -tAc 'select 1' >/dev/null 2>&1"]
timeout_s = 120

[[services]]
id = "opensearch"
preset = "opensearch"
port = 9200
export = { OPENSEARCH_URL = "LUMEN_BENCH_OS_URL" }
timeout_s = 120

# Runner cmds use the host repo target via VAT_WORKSPACE_BASE; vat rootfs
# intentionally excludes the Rust target cache so runner startup stays bounded.
[[runners]]
id = "rig-resilience"
requires = ["lumen", "toxiproxy"]
cmd = ["sh", "-c", "export CARGO_TARGET_DIR=\"$VAT_WORKSPACE_BASE/target\" && cargo test -p lumen --test api_e2e --test drop_drain_e2e --test perf_gate --test planner_diff --test reindex_stream_e2e --no-run && exec \"$VAT_WORKSPACE_BASE/target/debug/rig\" run --dir tests/rig/cases/resilience"]
timeout_s = 600

[[runners]]
id = "rig-endurance"
requires = ["lumen"]
cmd = ["sh", "-c", "export CARGO_TARGET_DIR=\"$VAT_WORKSPACE_BASE/target\" && cargo test -p lumen --test api_e2e --test drop_drain_e2e --test perf_gate --test planner_diff --test reindex_stream_e2e --no-run && exec \"$VAT_WORKSPACE_BASE/target/debug/rig\" run --dir tests/rig/cases/endurance"]
timeout_s = 900

[[runners]]
id = "rig-load"
requires = ["lumen"]
cmd = ["sh", "-c", "export CARGO_TARGET_DIR=\"$VAT_WORKSPACE_BASE/target\" && cargo test -p lumen --test api_e2e --test drop_drain_e2e --test perf_gate --test planner_diff --test reindex_stream_e2e --no-run && exec \"$VAT_WORKSPACE_BASE/target/debug/rig\" run --dir tests/rig/cases/load --pins tests/rig/config/pins"]
timeout_s = 300

# Legacy competitive comparison runners: vat owns the serving lumen process;
# arena fans the workload across lumen and the external peer named by the spec.
# These remain compatibility helpers during arena retirement and are not the
# production Lumen efficiency EC dispatch path.
[[runners]]
id = "arena-pg"
requires = ["lumen"]
cmd = [
  "sh",
  "-c",
  """
python3 - <<'PY'
import json, urllib.request

upstream = "127.0.0.1:7373"
headers = {"content-type": "application/json"}

def send(method, path, payload):
    body = json.dumps(payload).encode()
    req = urllib.request.Request(f"http://{upstream}{path}", data=body, method=method, headers=headers)
    with urllib.request.urlopen(req, timeout=30) as resp:
        if resp.status >= 400:
            raise SystemExit(resp.status)

send("PUT", "/collections/docs", {
    "fields": {
        "bio": {"type": "text"},
        "city": {"type": "keyword"},
        "age": {"type": "number"}
    }
})
items = []
for i in range(2000):
    external_id = f"doc-{i}"
    city = "taipei" if i % 3 == 0 else "tokyo"
    items.append({"external_id": external_id, "field": "bio", "value": f"engineer search document {i} in {city}"})
    items.append({"external_id": external_id, "field": "city", "value": city})
    items.append({"external_id": external_id, "field": "age", "value": 20 + (i % 50)})
send("POST", "/collections/docs/index", {"items": items})
PY
exec "$VAT_WORKSPACE_BASE/target/debug/arena" run --spec "$VAT_WORKSPACE_BASE/projects/arena/examples/lumen-vs-pg.toml"
""",
]
timeout_s = 900

[[runners]]
id = "arena-opensearch"
requires = ["lumen"]
cmd = [
  "sh",
  "-c",
  """
python3 - <<'PY'
import json, urllib.request

upstream = "127.0.0.1:7373"
headers = {"content-type": "application/json"}

def send(method, path, payload):
    body = json.dumps(payload).encode()
    req = urllib.request.Request(f"http://{upstream}{path}", data=body, method=method, headers=headers)
    with urllib.request.urlopen(req, timeout=30) as resp:
        if resp.status >= 400:
            raise SystemExit(resp.status)

send("PUT", "/collections/docs", {
    "fields": {
        "bio": {"type": "text"},
        "city": {"type": "keyword"},
        "age": {"type": "number"}
    }
})
items = []
for i in range(2000):
    external_id = f"doc-{i}"
    city = "taipei" if i % 3 == 0 else "tokyo"
    items.append({"external_id": external_id, "field": "bio", "value": f"engineer search document {i} in {city}"})
    items.append({"external_id": external_id, "field": "city", "value": city})
    items.append({"external_id": external_id, "field": "age", "value": 20 + (i % 50)})
send("POST", "/collections/docs/index", {"items": items})
PY
exec "$VAT_WORKSPACE_BASE/target/debug/arena" run --spec "$VAT_WORKSPACE_BASE/projects/arena/examples/lumen-vs-opensearch.toml"
""",
]
timeout_s = 900

# Concurrent-profiling companion: `vat run rig-load meter-profile` drives
# load against the serving lumen WHILE meter samples an engine workload in
# the same workspace. (Attaching meter to the serving pid itself needs a
# meter `--pid` mode — tracked separately.)
[[runners]]
id = "meter-profile"
requires = ["lumen"]
cmd = ["sh", "-c", "CARGO_TARGET_DIR=\"$VAT_WORKSPACE_BASE/target\" cargo build -p meter-cli && CARGO_TARGET_DIR=\"$VAT_WORKSPACE_BASE/target\" cargo build --release -p lumen --bin lumen-bench && exec \"$VAT_WORKSPACE_BASE/target/debug/meter\" profile --exec \"$VAT_WORKSPACE_BASE/target/release/lumen-bench\" --duration 25 -- run --tiers s --types sorted_page_deep --documents 20000 --page-size 100 --queries 200"]
timeout_s = 300

# Self-provisioned efficiency helpers. The production EC dispatch path is the
# meter-wrapped Lumen-only regression gate in aw.toml; retained pg/OpenSearch
# ratios are calibration evidence and are refreshed only by explicit compare
# runners when benchmark cells or peer configs change.
[[runners]]
id = "ec-efficiency"
cmd = ["sh", "-c", "LUMEN_GATE_N=10000 LUMEN_GATE_QPS_TARGETS=100 LUMEN_GATE_WINDOW_S=0.5 LUMEN_SCALE_ROWS=1000,10000,100000 LUMEN_SCALE_MAX_ROWS=100000 CARGO_TARGET_DIR=\"$VAT_WORKSPACE_BASE/target\" exec cargo test -p lumen --release --test perf_gate_vs_db competitive_perf_gate -- --ignored --exact --test-threads=1 --nocapture"]
timeout_s = 1800

[[runners]]
id = "ec-efficiency-meter"
cmd = ["sh", "-c", "CARGO_TARGET_DIR=\"$VAT_WORKSPACE_BASE/target\" cargo build -p meter-cli && LUMEN_GATE_N=10000 LUMEN_GATE_QPS_TARGETS=100 LUMEN_GATE_WINDOW_S=0.5 CARGO_TARGET_DIR=\"$VAT_WORKSPACE_BASE/target\" exec \"$VAT_WORKSPACE_BASE/target/debug/meter\" test -- -p lumen --release --test perf_gate_vs_db competitive_perf_gate -- --ignored --exact --test-threads=1 --nocapture"]
timeout_s = 1800

[[runners]]
id = "ec-efficiency-meter-calibrate"
requires = ["pg", "opensearch"]
cmd = ["sh", "-c", "CARGO_TARGET_DIR=\"$VAT_WORKSPACE_BASE/target\" cargo build -p meter-cli && LUMEN_GATE_COMPARE_PEERS=1 LUMEN_GATE_N=100000 CARGO_TARGET_DIR=\"$VAT_WORKSPACE_BASE/target\" exec \"$VAT_WORKSPACE_BASE/target/debug/meter\" test -- -p lumen --release --test perf_gate_vs_db competitive_perf_gate -- --ignored --exact --test-threads=1 --nocapture"]
timeout_s = 1800

[[runners]]
id = "ec-efficiency-meter-soak"
requires = ["pg", "opensearch"]
cmd = ["sh", "-c", "CARGO_TARGET_DIR=\"$VAT_WORKSPACE_BASE/target\" cargo build -p meter-cli && LUMEN_GATE_COMPARE_PEERS=1 LUMEN_GATE_RELEASE_SOAK=1 CARGO_TARGET_DIR=\"$VAT_WORKSPACE_BASE/target\" exec \"$VAT_WORKSPACE_BASE/target/debug/meter\" test -- -p lumen --release --test perf_gate_vs_db competitive_perf_gate -- --ignored --exact --test-threads=1 --nocapture"]
timeout_s = 1800
