[package]
name = "service-http"
version = "0.1.0"
edition = "2021"
description = "Shared HTTP-service scaffolding for the ecosystem's k8s-native services: the standard probe routes (/healthz /readyz /metrics /openapi.json /docs), env-driven tracing init, SIGTERM-aware graceful-drain shutdown, and the h2c transport — the common shape lumen/keep/relay/loom each hand-roll today."

[lib]
name = "service_http"
path = "src/lib.rs"

[dependencies]
# Inherit the workspace pins so the lock stays single-versioned.
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true, features = ["trace"] }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }
utoipa = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }

# The h2c serve loop (HTTP/1.1 + h2c on one port) is composed, not re-implemented.
h2c = { path = "../h2c", features = ["server"] }

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
tower = { workspace = true, features = ["util"] }
http-body-util = "0.1"
