# ─────────────────────────────────────────────────────────────────────────────
# Agents — registry of LLM runners available for work-item assignment.
#
# `aw wi create --agent <name>` resolves <name> against `[[agents]].name`
# and emits the corresponding `label` field on the issue. Mirrors the
# `[[projects]]` shape so the same lookup pattern (`name` → `label`) works
# for both routing dimensions.
#
# Label syntax uses GitLab-style scoped labels (`::`) so a work-item is
# constrained to exactly one agent on GitLab via native mutex semantics.
# GitHub treats the value as a plain string — no behavioral difference.
#
# `strengths` is informational. It captures each agent's comparative
# strengths so the WI author (human or AI) can pick the best fit when
# creating a work-item, and so a future `aw wi suggest-agent` heuristic
# has in-repo context. Update when usage patterns shift.
# ─────────────────────────────────────────────────────────────────────────────

[[agents]]
name = "claude-code"
label = "agent::claude-code"
strengths = [
  "large-codebase exploration and cross-file refactor",
  "backend logic, algorithms, data pipelines",
  "terminal-native automation, CI / shell scripting",
  "deep debugging in a shell environment",
  "SDD lifecycle execution (issue → TD → CB → merge)",
]

[[agents]]
name = "codex"
label = "agent::codex"
strengths = [
  "frontend UI / UX, interaction polish",
  "browser QA and visual verification",
  "parallel agent orchestration (multi-task fan-out)",
  "product delivery — PR descriptions, docs, handoff packaging",
  "rapid prototyping of user-facing tools",
]


