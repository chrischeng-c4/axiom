version = "0.3.60"
interface = "cli"

# ─────────────────────────────────────────────────────────────────────────────
# Agentic Workflow platforms
# ─────────────────────────────────────────────────────────────────────────────

[agentic_workflow.issue_platform]
type = "github"
repo = "chrischeng-c4/axiom"
auth_method = "cli"

[agentic_workflow.repo_platform]
type = "github"
repo = "chrischeng-c4/axiom"
default_branch = "main"
auto_commit = true
auto_pr = false

[agentic_workflow.tech_design_platform]
type = "local"
path = ".aw/tech-design"


# ─────────────────────────────────────────────────────────────────────────────
# Team identity — used by `aw chat` to pick the team name when no env var
# / git remote is set.
# ─────────────────────────────────────────────────────────────────────────────

[team]
name = "agentic-workflow"


# ─────────────────────────────────────────────────────────────────────────────
# Project routing — hand-written, NOT auto-generated by `aw sync`.
#
# Two levels, two scopes:
#
#   PROJECT level — for TD (tech design).
#     A TD is a single co-designed artifact spanning every workspace
#     of the project (frontend + backend + SRE designed together, one
#     spec tree). The default TD location is project-scoped:
#         <project.path>/tech-design/...
#     and there is exactly one TD root per project regardless of how
#     many workspaces it contains. `td_path` is an override only.
#
#   WORKSPACE level — for CB (codebase).
#     Code is per-workspace because toolchains differ: a project's
#     frontend (TypeScript/React), backend (Python/FastAPI), and SRE
#     (terraform/k8s) each have their own paths, target, and
#     test_cmd. Hook decisions about which build to run, which type
#     checker to invoke, etc. dispatch by `[[projects.workspaces]]`.
#
# Routing keys per `[[projects]]`:
#
#   • path     — source-tree root for the project (e.g. `projects/agentic-workflow`,
#                `projects/conductor`). Hooks route "which project
#                owns this source file?" by longest-prefix match.
#   • td_path  — Optional TD spec root override, full repo-relative path.
#                Omit it when TD lives at `<path>/tech-design`. Keep it
#                only for legacy/external TD roots that intentionally live
#                outside the project tree. Hooks route override TD files
#                by longest-prefix match on `td_path` directly.
#   • label    — GitHub label SDD attaches to the issue
#                (`project:<name>`). One-issue-one-project except
#                epics (R12). Hooks grep this label to map issue →
#                project.
#
# Routing keys per `[[projects.workspaces]]`:
#
#   • paths     — CB glob(s) for this workspace's code.
#   • target    — language toolchain (rust / python / typescript / …).
#   • test_cmd  — how this workspace runs its tests.
#   • codegen.profile — optional generator/template profile for this
#                 workspace's codebase. TD remains project-scoped; codegen
#                 profile is workspace-scoped because each workspace has its
#                 own language/runtime/build shape.
#
# Branch naming today is project-less (`issue-<slug>` / `td-<slug>` /
# `cb-<slug>`) per Phase C, so there is no `td_prefix` / `cb_prefix`
# field. Hooks that need branch → project lookup go through the
# issue's `project:*` label, not branch syntax.
#
# Why hand-written: hooks need to read this without spawning the
# aw binary. `aw sync` only manages the AW SYNC block below —
# the entries above are the authoritative ones for any project that
# participates in CRRR.
#
# To add a new project: copy a block, adjust name/path/label, list
# every workspace it owns, and (if applicable) remove the auto entry
# of the same name from the AW SYNC block below.
# ─────────────────────────────────────────────────────────────────────────────

[[projects]]
name = "agentic-workflow"
aliases = ["aw"]
path = "projects/agentic-workflow"
td_path = "projects/agentic-workflow/tech-design"
cap_path = "projects/agentic-workflow/README.md"
label = "project:agentic-workflow"

[[projects.workspaces]]
name = "agentic-workflow"
paths = ["projects/agentic-workflow/**"]
target = "rust"
test_cmd = "cargo test -p agentic-workflow"
verify_cold = true
codegen.profile = "rust/score-crate"


