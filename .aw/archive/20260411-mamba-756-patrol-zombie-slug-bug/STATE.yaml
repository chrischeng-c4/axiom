archive_reason: |
  Zombie — score init_change's try_structured_issue_skip() never fired
  because extract_issue_slug(description) looks for pattern `issue:{slug}`
  in the description string, but the description passed was
  "Py3.12 conformance: Generator & iterator protocol #756" (no `issue:` prefix).
  The `--issue "#756"` CLI flag is used only for DAG bookkeeping, not for
  structured-issue lookup. As a result, normal path ran without creating
  groups/default/, and subsequent create_reference_context failed with
  "No groups found". Re-run with description containing `issue:<filename-slug>`.
