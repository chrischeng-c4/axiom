<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cclab Server Dashboard</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #e94560;
            --text-secondary: #eee;
            --text-muted: #888;
            --accent: #e94560;
            --success: #4ade80;
            --warning: #fbbf24;
            --border: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-secondary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            color: var(--text-primary);
            font-size: 1.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border-radius: 0.5rem;
            font-size: 0.875rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .server-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .info-card {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
        }

        .info-card label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .info-card .value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        h2 {
            color: var(--text-secondary);
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }

        .projects-grid {
            display: grid;
            gap: 1rem;
        }

        .project-card {
            background: var(--bg-card);
            border-radius: 0.75rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }

        .project-card:hover {
            border-color: var(--accent);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .project-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .project-path {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-family: monospace;
            margin-top: 0.25rem;
        }

        .changes-list {
            margin-top: 1rem;
        }

        .changes-list h4 {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .change-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            text-decoration: none;
            color: var(--text-secondary);
            transition: background 0.2s;
        }

        .change-item:hover {
            background: var(--bg-primary);
        }

        .change-id {
            font-family: monospace;
            font-weight: 500;
        }

        .change-status {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            background: var(--bg-primary);
        }

        .change-status.proposal { color: var(--warning); }
        .change-status.challenge { color: #f97316; }
        .change-status.implement { color: #3b82f6; }
        .change-status.review { color: #8b5cf6; }
        .change-status.complete { color: var(--success); }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .error {
            background: #7f1d1d;
            color: #fecaca;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>cclab Server</h1>
            <div class="server-status">
                <span class="status-dot"></span>
                <span id="server-port">Loading...</span>
            </div>
        </header>

        <div class="server-info" id="server-info">
            <div class="info-card">
                <label>Port</label>
                <div class="value" id="info-port">-</div>
            </div>
            <div class="info-card">
                <label>PID</label>
                <div class="value" id="info-pid">-</div>
            </div>
            <div class="info-card">
                <label>Uptime</label>
                <div class="value" id="info-uptime">-</div>
            </div>
            <div class="info-card">
                <label>Projects</label>
                <div class="value" id="info-projects">-</div>
            </div>
        </div>

        <h2>Registered Projects</h2>
        <div id="projects-container" class="projects-grid">
            <div class="loading">Loading projects...</div>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('/api/dashboard');
                if (!response.ok) throw new Error('Failed to load dashboard');
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                document.getElementById('projects-container').innerHTML = `
                    <div class="error">Failed to load dashboard: ${error.message}</div>
                `;
            }
        }

        function renderDashboard(data) {
            // Update server info
            document.getElementById('server-port').textContent = `Port ${data.server_info.port}`;
            document.getElementById('info-port').textContent = data.server_info.port;
            document.getElementById('info-pid').textContent = data.server_info.pid;
            document.getElementById('info-uptime').textContent = data.server_info.uptime;
            document.getElementById('info-projects').textContent = data.projects.length;

            // Render projects
            const container = document.getElementById('projects-container');

            if (data.projects.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>No projects registered yet.</p>
                        <p style="margin-top: 0.5rem; font-size: 0.875rem;">
                            Run <code>cc server register</code> in a project directory to add it.
                        </p>
                    </div>
                `;
                return;
            }

            container.innerHTML = data.projects.map(project => `
                <div class="project-card">
                    <div class="project-header">
                        <div>
                            <div class="project-name">${project.name}</div>
                            <div class="project-path">${project.path}</div>
                        </div>
                    </div>
                    ${project.changes.length > 0 ? `
                        <div class="changes-list">
                            <h4>Active Changes</h4>
                            ${project.changes.map(change => `
                                <a href="/view/${project.name}/${change.id}/" class="change-item">
                                    <span class="change-id">${change.id}</span>
                                    <span class="change-status ${change.status}">${change.status}</span>
                                </a>
                            `).join('')}
                        </div>
                    ` : `
                        <div class="changes-list">
                            <p style="color: var(--text-muted); font-size: 0.875rem;">No active changes</p>
                        </div>
                    `}
                </div>
            `).join('');
        }

        // Load on page load and refresh periodically
        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
