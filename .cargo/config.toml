[target.aarch64-apple-darwin]
rustflags = [
  "-C", "link-arg=-undefined",
  "-C", "link-arg=dynamic_lookup",
]

[target.x86_64-apple-darwin]
rustflags = [
  "-C", "link-arg=-undefined",
  "-C", "link-arg=dynamic_lookup",
]

# ── cclab-mamba test aliases ──────────────────────────────────────────────
#
# The full `cargo test -p cclab-mamba` runs 2954 in-tree unit tests that
# share global runtime state (GC, symbols) and deadlock on sequential runs
# (see runtime::gc::tests hangs). For day-to-day development, prefer the
# integration test binaries below — they compile and run in under 2s each
# and exercise the real JIT pipeline end-to-end.
#
# Fast feedback (<5s total):
#   cargo mbt              # = cargo test -p cclab-mamba --test behavioral_lang_tests
#   cargo mbt-all          # all fast integration suites
#
# Full (slow, may hang — only for CI/audit):
#   cargo test -p cclab-mamba
[alias]
mbt = "test -p cclab-mamba --test behavioral_lang_tests"
mbtb = "test -p cclab-mamba --test behavioral_builtins_tests"
mbts = "test -p cclab-mamba --test behavioral_stdlib_tests"
mbc = "test -p cclab-mamba --test conformance_tests"
mbp0 = "test -p cclab-mamba --test p0_conformance_tests"
mbck = "check -p cclab-mamba"
